sée en MAOM"}, {"doc_source": "V2", "doc_cible": "H1", "pour_concept": "ISR et densité nutritionnelle"}, {"doc_source": "V2", "doc_cible": "H2", "pour_concept": "continuum holobionte plante → humain"}, {"doc_source": "V2", "doc_cible": "H3", "pour_concept": "Le cycle de rhizophagie (colonisation endophytique) est le mécanisme de transmission sol→plante→humain"}, {"doc_source": "V2", "doc_cible": "P2", "pour_concept": "Le recrutement microbien par chimiotactisme explique pourquoi la diversité des couverts ACS améliore le microbiome"}, {"doc_source": "V2", "doc_cible": "P3", "pour_concept": "Mécanismes hormonaux (ACC désaminase, IAA) et cycle de rhizophagie comme fondements de l'efficacité des biostimulants"}, {"doc_source": "V2", "doc_cible": "S4", "pour_concept": "Les exsudats racinaires déclenchent la solubilisation biologique du phosphore décrite dans S4"}, {"doc_source": "V2 L'Holobionte Plante-Microbiome", "doc_cible": "S2 Le Microbiome du Sol §IV (Cycle de l'azote)", "pour_concept": "Fixation biologique de l'azote comme service rendu par le microbiome de l'holobionte"}, {"doc_source": "V2 L'Holobionte Plante-Microbiome", "doc_cible": "V3 Les Fermentations Microbiennes §IV (Acide 3-phényllactique)", "pour_concept": "Métabolites fermentaires comme signaux hormonaux pour l'holobionte"}, {"doc_source": "V2 L'Holobionte Plante-Microbiome §II (SIREM, exsudats)", "doc_cible": "S3 Le Microbiome Fongique et Mycorhizien §I (Strigolactones, signalisation CMA)", "pour_concept": "Strigolactones comme cas spécifique de SIREM pour le recrutement des CMA"}, {"doc_source": "V2 L'Holobionte Plante-Microbiome §IV (ISR/SAR)", "doc_cible": "H1 Sol, Alimentation et Santé Humaine §II (Métabolites secondaires et antioxydants)", "pour_concept": "Les polyphénols produits par ISR/SAR comme nutriments protecteurs pour l'humain"}, {"doc_source": "V2 L'Holobionte Plante-Microbiome §IV (ISR/SAR)", "doc_cible": "H2 Résistances Antimicrobiennes §III (ACS comme rempart)", "pour_concept": "ISR/SAR comme alternative fonctionnelle aux fongicides réduisant la pression de sélection ARG"}, {"doc_source": "V3", "doc_cible": "H1", "pour_concept": "métabolites fermentés et densité nutritionnelle"}, {"doc_source": "V3", "doc_cible": "H2", "pour_concept": "métabolites fermentaires et microbiome intestinal"}, {"doc_source": "V3", "doc_cible": "H3", "pour_concept": "Homologie des voies fermentaires sol-intestin et aliments fermentés comme vecteurs de consortia microbiens"}, {"doc_source": "V3 Les Fermentations Microbiennes", "doc_cible": "S4 Le Carbone et les Grands Cycles §II (Diagramme Eh-pH)", "pour_concept": "Fondement physico-chimique de la conservation énergétique des fermentations"}, {"doc_source": "V3 Les Fermentations Microbiennes §II.1 (Bokashi)", "doc_cible": "S4 Le Carbone et les Grands Cycles §I (Priming Effect)", "pour_concept": "Risque de priming effect par le carbone labile du bokashi frais"}, {"doc_source": "V3 Les Fermentations Microbiennes §III (LAB, acide 3-phényllactique)", "doc_cible": "H1 Sol, Alimentation et Santé Humaine §II (ISR/SAR et phytochimie fonctionnelle)", "pour_concept": "L'acide 3-phényllactique comme éliciteur de l'ISR produisant des polyphénols de défense mesurables dans l'aliment"}, {"doc_source": "V3 Les Fermentations Microbiennes §V (Lactofermentation du sol à l'assiette)", "doc_cible": "H2 Résistances Antimicrobiennes §II (THG, transfert horizontal de gènes)", "pour_concept": "Risque ARG dans les fermentations LAB : plasmides conjugatifs des Lactobacillus"}], "cascade": [{"niveau": 0, "code": "EAU", "label": "Eau", "sous_label": "Disponibilité et continuité hydraulique", "logique": "Sans eau disponible à un potentiel > pF 4,2, toute activité biologique s'arrête. C'est le prérequis absolu de tout le reste.", "indicateurs_cles": ["pF (potentiel hydrique)", "Réserve Utile (RU)", "Ksat (conductivité hydraulique saturée)", "Connectivité des films d'eau", "Biopores fonctionnels"], "seuils_critiques": [{"indicateur": "pF", "seuil": "> 4,2", "interpretation": "Activité biologique nulle"}, {"indicateur": "pF", "seuil": "2,5 – 4,2", "interpretation": "Zone biologiquement active (RU)"}, {"indicateur": "Ksat", "seuil": "< 5 mm/h", "interpretation": "Macroporosité détruite — compaction ou battance"}, {"indicateur": "Test infiltration", "seuil": "> 30 min", "interpretation": "Risque engorgement ou compaction forte"}], "erreurs_typiques": ["Sécheresse persistante malgré des apports", "Engorgement hivernal récurrent", "Infiltration nulle après pluie (battance)", "Hydrophobie post-sécheresse"], "leviers_action": ["Biopuncture (radis daïkon, mélilot)", "Mulch permanent (réduction évaporation 30–70%)", "Réduction du labour (préservation biopores)", "Keyline Design (redistribution topographique)", "+1% MO → +2 mm/m RU"]}, {"niveau": 1, "code": "STRUCT", "label": "Structure physique", "sous_label": "Habitat — la maison des micro-organismes", "logique": "Sans structure stable (micro-agrégats, porosité hiérarchisée), les micro-organismes n'ont pas d'habitat protégé. Même si l'eau est disponible, la biologie ne peut pas s'installer durablement.", "indicateurs_cles": ["VESS (Visual Evaluation of Soil Structure)", "Stabilité des agrégats", "Test infiltration (macroporosité)", "Test ficelle GEPPA (texture)", "Densité apparente"], "seuils_critiques": [{"indicateur": "VESS", "seuil": ">= 4", "interpretation": "Structure dégradée — intervention requise"}, {"indicateur": "VESS", "seuil": "1–2", "interpretation": "Bonne structure — maintenir"}, {"indicateur": "Stabilité agrégats", "seuil": "Désagrégation < 10 s", "interpretation": "Sol très sensible à l'érosion"}], "erreurs_typiques": ["Compaction (semelle de labour)", "Battance et croûte de surface", "Agrégats instables (slaking)", "Racines superficielles sans obstacle chimique"], "leviers_action": ["Non-labour ou travail superficiel", "Couverts permanents (production EPS racinaire)", "Apports calciques (floculation argiles)", "Vers anéciques (galeries persistantes)", "Apports fermentés en surface (biofilms structurants)"]}, {"niveau": 2, "code": "REDOX", "label": "Redox & Chimie", "sous_label": "Le contexte physico-chimique — pH, Eh, CEC", "logique": "Même si l'eau et la structure sont bonnes, un pH ou un Eh inadapté bloque les voies enzymatiques microbiennes et la disponibilité des nutriments. La chimie détermine quelles voies métaboliques sont thermodynamiquement possibles.", "indicateurs_cles": ["pH eau et KCl", "Potentiel redox Eh (mV)", "CEC + taux de saturation", "P Olsen (phosphore disponible)", "Calcaire actif (% CaCO3)", "Eh gradient (microsites)"], "seuils_critiques": [{"indicateur": "pH eau", "seuil": "6,0–7,0", "interpretation": "Optimum microbiome et CMA"}, {"indicateur": "pH eau", "seuil": "< 5,5", "interpretation": "Al3+ et Mn2+ toxiques — blocage enzymes"}, {"indicateur": "Eh", "seuil": "> 300 mV", "interpretation": "Aérobie — conditions favorables"}, {"indicateur": "Eh", "seuil": "< 100 mV", "interpretation": "Anaérobie — risque N2O, Fe/Mn réduits"}, {"indicateur": "P Olsen", "seuil": "> 60 mg/kg", "interpretation": "Inhibition CMA — réduire apports P"}, {"indicateur": "P Olsen", "seuil": "< 15 mg/kg", "interpretation": "CMA actives — favorable"}, {"indicateur": "Calcaire actif", "seuil": "> 5%", "interpretation": "Risque chlorose ferrique + blocage P"}], "erreurs_typiques": ["pH < 5,5 (aluminium toxique)", "P Olsen > 60 — CMA inhibées", "Asphyxie locale (Eh < 100 mV)", "Calcaire actif élevé — chlorose ferrique", "Salinité excessive"], "leviers_action": ["Chaulage raisonné (pH < 5,8)", "Réduction apports P solubles (si > 60 mg/kg)", "Gestion hydrique (éviter engorgement)", "Soufre et bore à faibles doses (si carences répétées)", "Calcium échangeable fonctionnel"]}, {"niveau": 3, "code": "MO", "label": "MO & Plante", "sous_label": "La nourriture — substrat et exsudats", "logique": "Sans substrat carboné (MO) ni exsudats racinaires actifs (plante vivante), le microbiome entre en dormance. C'est le flux d'énergie qui maintient le réseau biologiquement actif.", "indicateurs_cles": ["COS % (carbone organique total)", "C/N ratio", "k1 (coefficient d'humification)", "k2 (taux minéralisation humus)", "LAI (Indice Aire Foliaire)", "Allocation C exsudats (5–40% photosynthèse)", "Respiration du sol (FDA)"], "seuils_critiques": [{"indicateur": "MO %", "seuil": "< 1%", "interpretation": "Critique — sol biologiquement inerte"}, {"indicateur": "MO %", "seuil": "1–2%", "interpretation": "Transition — fragilité forte"}, {"indicateur": "MO %", "seuil": "> 3%", "interpretation": "Sol biologiquement actif"}, {"indicateur": "C/N", "seuil": "< 20", "interpretation": "Minéralisation active (libération N)"}, {"indicateur": "C/N", "seuil": "> 30", "interpretation": "Faim d'azote microbienne (immobilisation N)"}, {"indicateur": "Respiration sol", "seuil": "< 0,5 µg CO2-C/g/h", "interpretation": "Microbiome en dormance"}], "erreurs_typiques": ["Faim d'azote après apport C élevé (paille, BRF)", "Sol nu en inter-culture (pas d'exsudats)", "Minéralisation accélérée après labour (k2 élevé)", "Priming effect mal géré (perte C stable)"], "leviers_action": ["Couvert végétal permanent (exsudats en continu)", "Apports MO à k1 élevé (fumier composté, légumineuses)", "Bokashi (k1 biologique ~48%)", "Diversité du couvert (diversité exsudats → diversité microbienne)", "Réduction du travail du sol (protection k2)"]}, {"niveau": 4, "code": "MICROBIOME", "label": "Microbiome", "sous_label": "Les habitants — guildes, diversité, fonctions", "logique": "Si les 4 prérequis précédents sont satisfaits, le microbiome peut s'installer et jouer ses rôles fonctionnels (minéralisation, suppressivité, ISR, CMN). Sa dégradation est toujours la conséquence d'une défaillance en amont — jamais la cause première.", "indicateurs_cles": ["Ratio F/B (PLFA)", "Diversité Chao1 (métagénomique)", "Biomasse microbienne ATP", "β-glucosidase + phosphatase + uréase", "Suppressivité (tests bioassay)", "Ratio copiotrophes/oligotrophes"], "seuils_critiques": [{"indicateur": "Ratio F/B (PLFA)", "seuil": "< 0,3", "interpretation": "Sol perturbé — dominance bactérienne"}, {"indicateur": "Ratio F/B (PLFA)", "seuil": "> 0,8", "interpretation": "Sol mature — dominance fongique"}, {"indicateur": "Biomasse ATP", "seuil": "< 200 µg ATP/kg", "interpretation": "Microbiome appauvri"}, {"indicateur": "Copiotrophes/oligotrophes", "seuil": "> 2", "interpretation": "Sol sous pression azotée (Haber-Bosch C2)"}], "erreurs_typiques": ["Ratio F/B < 0,3 (agriculture intensive)", "Perte de suppressivité après désinfection", "Copiotrophes dominants (excès N minéral)", "Faible diversité sans explication chimique (chercher prérequis 0–3)"], "leviers_action": ["Correction des prérequis 0–3 en priorité", "Inoculation ciblée (PGPR, CMA selon PLFA)", "Bokashi / EM (réintroduction consortia)", "Couverts multi-espèces (diversité exsudats)", "IMO local (capture microbiome natif)"]}, {"niveau": 5, "code": "PLANTE", "label": "Plante saine", "sous_label": "L'output — densité nutritionnelle, résilience, rendement", "logique": "La plante saine est le résultat des 5 niveaux précédents satisfaits. Un problème à ce niveau est toujours le signal d'une défaillance en amont — il ne faut jamais traiter les symptômes sans remonter la cascade.", "indicateurs_cles": ["ISR/SAR actif (polyphénols ×1,3–1,5)", "Densité nutritionnelle (Zn, Fe, Mg, vitamines B)", "Taux Brix (sucres foliaires)", "Absence de carences visuelles", "Résistance aux ravageurs (Trophobiose)"], "seuils_critiques": [{"indicateur": "Brix feuilles", "seuil": "> 12", "interpretation": "Sol vivant actif — ISR fonctionnel"}, {"indicateur": "Brix feuilles", "seuil": "< 6", "interpretation": "Plante affaiblie — chercher prérequis 0–4"}, {"indicateur": "Acides aminés libres (excès)", "seuil": "Élevés", "interpretation": "Trophobiose — risque ravageurs (C2)"}], "erreurs_typiques": ["Carences récurrentes malgré apports", "Sensibilité accrue aux ravageurs (Trophobiose)", "Rendement normal mais densité nutritionnelle faible (Growth Dilution Effect)", "Plante stressée sans explication climatique"], "leviers_action": ["Remonter la cascade et corriger le prérequis défaillant", "Ne PAS traiter le symptôme (fongicide, insecticide) sans diagnostic amont", "Mesurer le Brix comme proxy rapide de l'état du sol"]}], "cards": [{"id": 1, "title": "Coût réel de l’énergie fossile et 'esclaves énergétiques'", "description": "Cadre de comparaison : comptabiliser énergie externe, travail, exergie, externalités. Permet d’éviter les comparaisons faussées entre systèmes (conventionnel vs MSV/ACS).\n\n[Complément fusionné] Cadre de comparaison : intégrer l’énergie externe (pétrole), l’exergie, et les externalités (dette écologique). Évite les comparaisons faussées entre systèmes (conventionnel vs MSV/ACS) quand le 'bilan' ignore le coût énergétique réel.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["F2"], "source": "legacy_v1_to_review"}, {"id": 2, "title": "Temporalité, irréversibilités et entropie des pratiques humaines", "description": "Cadre : expliciter l’échelle de temps et le sens matériel. Exemple : transformer une forêt en broyat peut être incohérent selon objectif et bilan matière/énergie.\n\n[Complément fusionné] Cadre : expliciter les échelles de temps, les irréversibilités (érosion, perte de structure, minéralisation accélérée) et le sens matériel des pratiques (ex. raser une forêt pour broyat). Les bilans doivent intégrer pertes/temps de reconstruction.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["F1", "F2"], "source": "legacy_v1_to_review"}, {"id": 3, "title": "Types de sols et comportements différenciés", "description": "Cadre : mêmes apports et mêmes pratiques → effets différents selon texture (sable/limon/argile), minéralogie, calcaire, hydromorphie. Les règles de diagnostic doivent être filtrées par type de sol.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["S1"], "source": "legacy_v1_to_review"}, {"id": 4, "title": "Histoire des sols : désastres et réussites (Croissant fertile, Nil, Terra Preta, Milpa)", "description": "Objectif : fournir un contexte historique pour valider/illustrer des mécanismes du corpus.\nOn ne compare pas des systèmes agricoles sans intégrer : érosion, salinisation, irrigation mal gérée, déboisement, perte de structure, baisse de fertilité, désertification.\nUsage : ancrer les diagnostics (pédologie + eau + redox + pratiques) dans des trajectoires historiques.\n\n[Complément fusionné] Objectif : documenter des systèmes qui réussissent à maintenir/accroître la fertilité, la structure et la résilience.\nUsage : comparer sans idéologie, en identifiant les invariants mécanistiques : continuité de couverture, flux de carbone, diversité, biochar/MAOM, polyculture/agroforesterie.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["F1"], "source": "legacy_v1_to_review"}, {"id": 5, "title": "Redox central : gradients, microzones et 'redox ladder'", "description": "Cadre : raisonner par gradients Eh/O2 et microzones. Les voies microbiennes (respiration, dénitrification, fermentation, méthanogenèse…) dépendent du redox, qui est piloté par l’eau, la structure (biofilms/agrégats) et les apports (surface vs enfouissement).", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["S4", "S0"], "source": "legacy_v1_to_review"}, {"id": 6, "title": "Eau facteur limitant : potentiel, continuité hydraulique, diffusion des gaz", "description": "Cadre : l’eau (teneur, potentiel, continuité) gouverne diffusion O2/CO2, mobilité des solutés, activité microbienne/racinaire et stabilité structurale. Les diagnostics doivent partir de l’hydrologie du sol avant de conclure à une 'carence' ou une 'recette'.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["S0"], "source": "legacy_v1_to_review"}, {"id": 8, "title": "Socio-économique : travail, filières, risques et dépendances", "description": "Cadre : une pratique n’est pas seulement biophysique. Les contraintes (main d’œuvre, équipements, filières, risques, réglementation, capital) conditionnent l’adoption. À utiliser pour comparer des systèmes sans idéologie.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["F2", "P5"], "source": "legacy_v1_to_review"}, {"id": 11, "title": "Profil sol sableux : aération élevée, apports fractionnés, dynamique MO rapide", "description": "Sol sableux : faible CEC et réserve utile ; aération forte. Compatible avec apports fermentés si fractionnés ; attention à la minéralisation rapide.", "scope_type": "global", "scope_ref": "soil_type:SAND", "status": "active", "docs_codes": ["S1", "S0"], "source": "legacy_v1_to_review"}, {"id": 12, "title": "Profil sol argileux : potentiel élevé mais risques redox si enfouissement et excès d'eau", "description": "Sol argileux : potentiel d’agrégation élevé (Ca + biofilms/EPS), mais risque de réduction profonde/anoxie si enfouissement + excès matière réduite + saturation.", "scope_type": "global", "scope_ref": "soil_type:CLAY", "status": "active", "docs_codes": ["S1", "S4", "S0"], "source": "legacy_v1_to_review"}, {"id": 13, "title": "Profil sol limoneux : battance/érosion, priorité couverture et biofilms de surface", "description": "Sol limoneux : structure fragile ; battance/ruissellement si sol nu. Priorité à couverture permanente, apports de surface et consolidation biologique.", "scope_type": "global", "scope_ref": "soil_type:SILT", "status": "active", "docs_codes": ["S1", "S0"], "source": "legacy_v1_to_review"}, {"id": 14, "title": "Profil sol calcaire/argilo-calcaire : calcium structurant, risques de blocages P/oligo", "description": "Sol calcaire : calcium structurant (floculation), porosité durable ; attention aux blocages P et oligo-éléments (soufre/bore) qui impactent métabolismes & symbioses.", "scope_type": "global", "scope_ref": "soil_type:CALC", "status": "active", "docs_codes": ["S1", "S4"], "source": "legacy_v1_to_review"}, {"id": 15, "title": "Profil sol hydromorphe/organique : redox bas, émissions, gestion de l’eau centrale", "description": "Sol hydromorphe/organique : redox bas fréquent ; risques N2O/CH4 et toxicités (Fe/Mn réduits). Éviter apports réduits enfouis ; gérer l’eau et la continuité racinaire.", "scope_type": "global", "scope_ref": "soil_type:HYDRO", "status": "active", "docs_codes": ["S1", "S0", "S4"], "source": "legacy_v1_to_review"}, {"id": 16, "title": "Profil sol 'franc' (loam) : effets intermédiaires, sensibilité au travail du sol", "description": "Sol loam : bon compromis texture ; répond bien aux apports réguliers et couverts ; sensible aux perturbations mécaniques qui cassent habitats/biofilms.", "scope_type": "global", "scope_ref": "soil_type:LOAM", "status": "active", "docs_codes": ["S1"], "source": "legacy_v1_to_review"}, {"id": 17, "title": "Mode d’application : surface vs incorporation (profondeur) change le diagnostic", "description": "Cadre : par défaut, beaucoup de raisonnements supposent des apports en surface (mulch/compost de surface). Si incorporation/enfouissement, le redox, la cinétique et les risques (anoxie, faim d’azote, pertes) changent radicalement. Toute analyse doit déclarer la profondeur d’application.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["P1", "P2", "P3"], "source": "legacy_v1_to_review"}, {"id": 18, "title": "Amendements organiques : compostage aérobie thermophile vs fermentations vs autres voies", "description": "Cadre : comparer des apports par (matière × procédé × état × usage), pas par mots. Compost thermophile (aérobie chaud), compostage en pile statique, compost 'de surface', compost réductif, compost fermenté… n’ont pas les mêmes processus ni les mêmes effets (redox, pertes de masse, stimulation vs stabilisation).", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["P3", "V3"], "source": "legacy_v1_to_review"}, {"id": 19, "title": "Stratégies microbiennes : r/K et Y-A-S (rendement, acquisition, stress) le long de la succession", "description": "Cadre : interpréter les effets des apports et pratiques selon les stratégies dominantes : r (opportunistes), K (efficience/stabilité), et Y-A-S (rendement/acquisition/stress). Indispensable pour lire sol nu → climax et éviter d’attribuer une 'recette' hors contexte.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["S2", "S3"], "source": "legacy_v1_to_review"}, {"id": 21, "title": "Lombriciens : catégories écologiques, drilosphère, turricules, biopores et interactions racines", "description": "Cadre : structurer l’analyse des vers de terre par catégories (épigés/endogés/anéciques) et par fonctions. Relier digestion (mucus/microbiote), ingénierie (drilosphère, bioturbation, turricules, biopores) et interactions avec racines (chemins préférentiels, aération locale). Évite l’abus 'lombricompostage' : le vermicompostage concerne surtout des vers épigés.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["V1", "S0"], "source": "legacy_v1_to_review"}, {"id": 22, "title": "Évolution du vivant : monde anaérobie → photosynthèse → oxygénation → respiration (cadre redox)", "description": "Objectif : fournir un contexte 'histoire du vivant' utilisable en diagnostic et en comparaison de systèmes.\nIdée centrale : la biosphère démarre majoritairement anaérobie ; l’arrivée de la photosynthèse oxygénique modifie les gradients (O2/Eh) et ouvre les métabolismes aérobie.\nUsage éditorial : éviter d’exiger des 'preuves' pour des concepts fondamentaux déjà admis (ex. chimie/biologie de base) et replacer les mécanismes micro-biogéochimiques dans une trajectoire temporelle.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["F1"], "source": "legacy_v1_to_review"}, {"id": 23, "title": "Évolution des plantes et construction du sol : racines, mycorhizes, rhizosphère, boucles plante–microbiome", "description": "Objectif : relier l’évolution des plantes (et de leurs interfaces) à la formation/organisation du sol.\nPivot : racines + exsudats + mycorhizes → rhizosphère → réseaux trophiques → structure/agrégation.\nUsage : comparer des systèmes (prairie/forêt/couverts) sans analogies bancales, en explicitant les mécanismes (flux carbone, redox local, réseaux mycorhiziens).", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["S3", "V2", "S0"], "source": "legacy_v1_to_review"}, {"id": 26, "title": "Évolution écologique du sol : sol nu → climax, stratégies microbiennes r/K et Y‑A‑S (cadre diagnostique)", "description": "Objectif : caler les diagnostics et comparaisons sur une trajectoire écologique, plutôt que sur des recettes.\nAxe : sol nu → stades pionniers → systèmes structurés → climax. Les stratégies microbiennes (r/K, Y‑A‑S) changent avec ressources, stress, redox, eau, couverture et continuité racinaire.\nUsage : relier pratiques (couvert, mulch, non-labour, compost/fermentation) aux mécanismes (flux C, agrégation, redox) et aux indicateurs de dynamique de MO (K1/K2).", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["F1", "P1"], "source": "legacy_v1_to_review"}, {"id": 27, "title": "Carbonates pédogéniques – cadre intégré", "description": "Cadre intégré thermodynamique, cinétique, biologique et hydrologique des carbonates pédogéniques.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["S4", "S1"], "source": "legacy_v1_to_review"}, {"id": 29, "title": "MO–argile → transition stœchiométrique → stratégies microbiennes", "description": "Carte passerelle : trajectoire écologique + MO (SOC) + taux d’argile → disponibilité/qualité du C + transitions stœchiométriques (C:N:P) → bascules de stratégies microbiennes (r/K, copio/oligo, Y-A-S). Outil d’audit + set de recherche.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["S2", "S4"], "source": "legacy_v1_to_review"}, {"id": 30, "title": "Hydrique & redox → stress / microzones → stratégies", "description": "Passerelle : régime hydrique (sécheresse/réhumectation), microzones redox, diffusion dans agrégats → stress + opportunisme → déplacements Y-A-S, dormance, syntrophie.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["S0", "S4", "S2"], "source": "legacy_v1_to_review"}, {"id": 31, "title": "Azote (formes, pertes) → stœchiométrie → stratégies microbiennes", "description": "Passerelle : formes d’azote, minéralisation/immobilisation, nitrification/dénitrification, pertes (N2O) → bascules de limitation et d’investissement A/Y/S.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["S2", "S4"], "source": "legacy_v1_to_review"}, {"id": 32, "title": "Structure du sol (agrégats/EPS) → habitats → stabilité/résilience", "description": "Passerelle : structure, agrégats, EPS/biofilms, porosité → habitats et protection → stabilité/résilience, trajectoires microbiennes.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["S1", "S2"], "source": "legacy_v1_to_review"}, {"id": 33, "title": "Compaction / semelle / faible porosité", "description": "Diagnostic terrain : compaction, semelle, limitation racinaire, infiltration faible. Objectif : discriminer structure vs hydrique vs MO/stœchio.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["P1", "S1"], "source": "legacy_v1_to_review"}, {"id": 34, "title": "Asphyxie / anaérobie locale (odeurs, horizons réduits)", "description": "Diagnostic terrain : signaux redox/anoxie, odeurs, racines stressées. Objectif : relier hydrique, structure, C labile, microzones.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["P1", "S4", "S0"], "source": "legacy_v1_to_review"}, {"id": 35, "title": "Battance / croûte / ruissellement (surface)", "description": "Diagnostic terrain : croûte, ruissellement, éclaboussures, infiltration de surface faible. Objectif : structure, MO de surface, agrégation.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["P1", "S1", "S0"], "source": "legacy_v1_to_review"}, {"id": 36, "title": "Infiltration lente / engorgement (profil)", "description": "Diagnostic terrain : infiltration lente, engorgement, stagnation. Objectif : distinguer hydrique (nappe), structure, texture/argile.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["P1", "S0"], "source": "legacy_v1_to_review"}, {"id": 37, "title": "Hydrophobie / infiltration hétérogène (spots secs)", "description": "Diagnostic terrain : zones qui refusent l’eau, infiltration patchy. Objectif : MO, hydrique, structure, biofilms/EPS.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["P1", "S0"], "source": "legacy_v1_to_review"}, {"id": 38, "title": "‘Faim d’azote’ après apport carboné (immobilisation)", "description": "Diagnostic terrain : jaunissement post-apport C, ralentissement croissance. Objectif : stœchiométrie, immobilisation, C labile.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["P1", "S2", "S4"], "source": "legacy_v1_to_review"}, {"id": 39, "title": "Excès de C très fermentescible (odeurs, chauffe, instabilités)", "description": "Diagnostic terrain : odeurs, chaleur, instabilités post-apports. Objectif : bascules redox, microzones, trajectoires.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["P1", "S4", "V3"], "source": "legacy_v1_to_review"}, {"id": 40, "title": "Sol ‘inerte’ / faible activité apparente", "description": "Diagnostic terrain : faible faune visible, agrégats pauvres, racines superficielles. Objectif : éviter faux diagnostic (saison/hydrique), cibler drivers.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["P1", "S2"], "source": "legacy_v1_to_review"}, {"id": 41, "title": "Racines superficielles / enracinement bloqué", "description": "Diagnostic terrain : racines en surface, peu profondes, déviation. Objectif : compaction, anoxie, sécheresse, stœchio.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["P1", "S1", "S0"], "source": "legacy_v1_to_review"}, {"id": 42, "title": "Stabilité d’agrégats faible / désagrégation rapide", "description": "Diagnostic terrain : slaking, agrégats qui se défont. Objectif : EPS, MO, structure, hydrique.", "scope_type": "global", "scope_ref": null, "status": "active", "docs_codes": ["P1", "S1", "S2"], "source": "legacy_v1_to_review"}], "tests": [{"code": "t01_test_beche", "title": "Test bêche", "description": "Observation directe du sol à la bêche pour évaluer la structure, la porosité, l’enracinement, la compaction et l’activité biologique visible."}, {"code": "t02_profil_cultural", "title": "Profil cultural", "description": "Ouverture d’une fosse ou tranchée pour analyser les horizons du sol, l’historique des pratiques, les zones compactées et la dynamique racinaire."}, {"code": "t03_test_bocal_test_de_sedimentation", "title": "Test bocal (test de sédimentation)", "description": "Mise en suspension du sol dans l’eau pour observer la décantation et estimer les proportions sable, limon et argile."}, {"code": "t04_test_dinfiltration", "title": "Test d’infiltration", "description": "Mesure du temps nécessaire à l’eau pour pénétrer dans le sol afin d’évaluer la porosité fonctionnelle et le risque de ruissellement."}, {"code": "t05_test_de_stabilite_des_agregats", "title": "Test de stabilité des agrégats", "description": "Observation de la résistance des mottes du sol à la désagrégation dans l’eau, indicateur de sensibilité à l’érosion."}, {"code": "t06_test_de_battance", "title": "Test de battance", "description": "Observation de la formation de croûtes de surface après mouillage ou pluie simulée."}, {"code": "t07_comptage_des_vers_de_terre", "title": "Comptage des vers de terre", "description": "Dénombrement des lombrics pour estimer l’activité biologique et la structuration naturelle du sol."}, {"code": "t08_test_racinaire", "title": "Test racinaire", "description": "Observation de la profondeur, de la densité et de l’orientation des racines pour diagnostiquer compaction et fertilité fonctionnelle."}, {"code": "t09_test_olfactif_du_sol", "title": "Test olfactif du sol", "description": "Évaluation de l’odeur du sol pour détecter fermentation, putréfaction ou asphyxie."}, {"code": "t10_test_de_couleur_du_sol", "title": "Test de couleur du sol", "description": "Observation visuelle de la couleur du sol pour inférer matière organique, hydromorphie ou oxydation."}, {"code": "t11_test_de_portance", "title": "Test de portance", "description": "Appréciation de la résistance du sol au tassement sous une charge légère."}, {"code": "t12_test_de_friabilite", "title": "Test de friabilité", "description": "Évaluation de la facilité avec laquelle le sol se fragmente entre les doigts."}, {"code": "t13_test_de_croute_de_surface", "title": "Test de croûte de surface", "description": "Observation de la présence et de l’épaisseur de croûtes limitant les échanges sol–air–eau."}, {"code": "t14_test_dhumidite_au_toucher", "title": "Test d’humidité au toucher", "description": "Appréciation manuelle de l’état hydrique du sol."}, {"code": "t15_test_de_respiration_du_sol_simplifie", "title": "Test de respiration du sol (simplifié)", "description": "Estimation de l’activité biologique par dégagement de CO₂ dans un dispositif simple."}, {"code": "t16_test_de_decomposition_des_residus", "title": "Test de décomposition des résidus", "description": "Observation de la vitesse de dégradation de résidus organiques enfouis ou en surface."}, {"code": "t17_test_de_couverture_du_sol", "title": "Test de couverture du sol", "description": "Évaluation visuelle de la proportion du sol protégée par des résidus ou couverts végétaux."}, {"code": "t18_test_de_compactage_a_la_tige", "title": "Test de compactage à la tige", "description": "Enfoncement manuel d’une tige pour détecter des couches compactées."}, {"code": "t19_test_de_ruissellement", "title": "Test de ruissellement", "description": "Observation du comportement de l’eau en surface après pluie ou arrosage."}, {"code": "t20_test_de_biodiversite_visible", "title": "Test de biodiversité visible", "description": "Observation globale de la faune et flore du sol visibles à l’œil nu."}], "stats": {"n_docs": 18, "n_terms": 378, "n_chains": 6, "n_crossrefs": 114, "n_cards": 35, "n_tests": 20, "n_sections": 191, "generated": "2026-03-28 08:51"}};</script>
<script>const HAS_TECHNIQUE = false;</script>
<script type="text/babel">

const STRATE_NAMES = { F: "Fondements", S: "Sol", V: "Vivant", P: "Pratiques", H: "Humain" };
const STRATE_COLORS = { F: "#8B5CF6", S: "#3B82F6", V: "#10B981", P: "#F59E0B", H: "#EF4444" };
const CASCADE_COLORS = ["#3B82F6","#8B5CF6","#F59E0B","#10B981","#6366F1","#22C55E"];

function Badge({strate, small}) {
  return <span className={`strate-${strate}-light inline-block rounded-full px-2 py-0.5 ${small ? 'text-xs' : 'text-sm'} font-medium`}>
    {strate}
  </span>;
}

function StatCard({label, value}) {
  return <div className="bg-white rounded-xl p-4 border border-gray-100 shadow-sm text-center">
    <div className="text-3xl font-bold text-gray-800">{value}</div>
    <div className="text-xs text-gray-500 uppercase tracking-wider mt-1">{label}</div>
  </div>;
}

function Header() {
  const s = DATA.stats;
  return <div>
    <div className="header-bar">
      <h1 className="text-2xl font-bold">Le Sol Vivant cet Holobionte</h1>
      <p className="text-sm opacity-75 mt-1">Cartographie du corpus — {s.generated}</p>
    </div>
    <div className="px-6 mb-6">
      <div className="grid grid-cols-3 md:grid-cols-6 gap-3">
        <StatCard label="Documents" value={s.n_docs} />
        <StatCard label="Sections" value={s.n_sections} />
        <StatCard label="Termes" value={s.n_terms} />
        <StatCard label="Chaines" value={s.n_chains} />
        <StatCard label="Cross-refs" value={s.n_crossrefs} />
        <StatCard label="Tests terrain" value={s.n_tests} />
      </div>
    </div>
  </div>;
}

// ── DOCUMENTS ──
function DocumentsTab() {
  const [expanded, setExpanded] = React.useState(null);
  const strates = [...new Set(DATA.documents.map(d => d.strate))];
  return <div>
    {strates.map(st => <div key={st} className="mb-6">
      <h3 className="text-lg font-semibold mb-3 flex items-center gap-2">
        <span className={`strate-${st} text-white rounded-full w-8 h-8 flex items-center justify-center text-sm font-bold`}>{st}</span>
        {STRATE_NAMES[st]}
      </h3>
      {DATA.documents.filter(d => d.strate === st).map(doc => <div key={doc.code} className="card cursor-pointer" onClick={() => setExpanded(expanded === doc.code ? null : doc.code)}>
        <div className="flex justify-between items-start">
          <div>
            <span className="font-bold text-gray-800">{doc.code}</span>
            <span className="text-gray-600 ml-2">{doc.titre_jenni || doc.titre}</span>
          </div>
          <div className="flex gap-2 text-xs text-gray-400">
            <span>{doc.sections.length} sec.</span>
            <span>{doc.n_terms} termes</span>
          </div>
        </div>
        {doc.note && <p className="text-sm text-gray-500 mt-1">{String(doc.note).slice(0, 150)}</p>}
        {expanded === doc.code && <div className="mt-3 border-t pt-3">
          {doc.sections.filter(s => s.enrichissement_notes).map((s, i) =>
            <div key={i} className="bg-blue-50 rounded-lg p-3 mb-3 text-sm">
              <div className="font-medium text-blue-800 mb-1">Cadre conceptuel</div>
              <div className="text-blue-700 whitespace-pre-line">{s.enrichissement_notes}</div>
            </div>
          )}
          <div className="grid grid-cols-1 gap-1">
            {doc.sections.map((s, i) => <div key={i} className="text-sm flex gap-2">
              <span className="text-gray-400 w-12 text-right font-mono">{s.numero}</span>
              {s.titre_h1 && <span className="text-gray-500 font-medium">{s.titre_h1} /</span>}
              <span className="text-gray-700">{s.titre_h2 || ''}</span>
              {s.tableau_requis ? <span className="text-xs bg-amber-100 text-amber-700 rounded px-1">tableau</span> : null}
            </div>)}
          </div>
        </div>}
      </div>)}
    </div>)}
  </div>;
}

// ── CHAINES CAUSALES ──
function ChainesTab() {
  const [selected, setSelected] = React.useState(DATA.chains[0]?.id);
  const chain = DATA.chains.find(c => c.id === selected);
  return <div>
    <div className="flex gap-2 mb-4 flex-wrap">
      {DATA.chains.map(c => <button key={c.id} onClick={() => setSelected(c.id)}
        className={`px-3 py-1.5 rounded-lg text-sm font-medium transition ${selected === c.id ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>
        {c.id}
      </button>)}
    </div>
    {chain && <div>
      <h3 className="text-lg font-semibold text-gray-800 mb-1">{chain.titre}</h3>
      {chain.valeur_ajoutee && <p className="text-sm text-gray-500 italic mb-4 border-l-4 border-blue-200 pl-3">{chain.valeur_ajoutee}</p>}
      <div className="ml-2">
        {chain.etapes.map((e, i) => <div key={i} className="chain-step">
          <div className="chain-dot" style={{background: STRATE_COLORS[e.strate_etape] || '#6B7280'}}></div>
          <div className="flex items-start gap-2">
            <Badge strate={e.strate_etape} small />
            <div>
              <span className="font-medium text-gray-800">{e.term_fr_text}</span>
              <p className="text-sm text-gray-500 mt-0.5">{e.role_dans_chaine}</p>
            </div>
          </div>
        </div>)}
      </div>
    </div>}
  </div>;
}

// ── THESAURUS ──
function ThesaurusTab() {
  const [search, setSearch] = React.useState('');
  const [expandedDoc, setExpandedDoc] = React.useState(null);
  const filtered = search.length >= 2
    ? DATA.terms.filter(t => t.fr.toLowerCase().includes(search.toLowerCase()) || (t.en && t.en.toLowerCase().includes(search.toLowerCase())))
    : DATA.terms;
  const docs = [...new Set(filtered.map(t => t.doc_code || '?'))].sort();

  // Bar chart data
  const docCounts = docs.map(dc => ({code: dc, n: filtered.filter(t => (t.doc_code || '?') === dc).length}));
  const maxCount = Math.max(...docCounts.map(d => d.n), 1);

  // Group by strate for stacked bar
  const strateGroups = {};
  docCounts.forEach(d => {
    const st = d.code[0];
    if (!strateGroups[st]) strateGroups[st] = {strate: st, docs: [], total: 0};
    strateGroups[st].docs.push(d);
    strateGroups[st].total += d.n;
  });
  const strateList = Object.values(strateGroups).sort((a, b) => {
    const order = 'FSVPH';
    return order.indexOf(a.strate) - order.indexOf(b.strate);
  });
  const totalTerms = filtered.length;

  const [hovered, setHovered] = React.useState(null);

  return <div>
    <input className="search-input mb-4" placeholder="Rechercher un terme..." value={search} onChange={e => setSearch(e.target.value)} />
    <div className="card mb-4 p-3">
      <div className="flex justify-between items-center mb-2">
        <span className="text-xs text-gray-500 uppercase tracking-wider">Termes par strate</span>
        <span className="text-sm text-gray-600 font-medium">{totalTerms} termes{search ? ` pour "${search}"` : ''}</span>
      </div>
      <div className="flex rounded-lg overflow-hidden h-8">
        {strateList.map(sg => <div key={sg.strate}
          className={`strate-${sg.strate} relative cursor-pointer transition-opacity ${hovered && hovered !== sg.strate ? 'opacity-50' : ''}`}
          style={{width: `${(sg.total / totalTerms) * 100}%`}}
          onMouseEnter={() => setHovered(sg.strate)}
          onMouseLeave={() => setHovered(null)}>
          {(sg.total / totalTerms) > 0.06 && <span className="absolute inset-0 flex items-center justify-center text-white text-xs font-bold">
            {sg.strate} {sg.total}
          </span>}
        </div>)}
      </div>
      {hovered && <div className="mt-2 flex gap-2 flex-wrap">
        {strateGroups[hovered].docs.map(d => <span key={d.code} className={`strate-${hovered}-light text-xs rounded-full px-2 py-0.5 font-medium`}>
          {d.code}: {d.n}
        </span>)}
      </div>}
      {!hovered && <div className="mt-2 flex gap-3 text-xs text-gray-400">
        {strateList.map(sg => <span key={sg.strate} className="flex items-center gap-1">
          <span className={`strate-${sg.strate} w-2.5 h-2.5 rounded-full inline-block`}></span>
          {STRATE_NAMES[sg.strate]} ({sg.total})
        </span>)}
      </div>}
    </div>
    {docs.map(dc => <div key={dc} className="mb-2">
      <button className="w-full text-left px-3 py-2 bg-gray-50 rounded-lg hover:bg-gray-100 flex justify-between items-center"
        onClick={() => setExpandedDoc(expandedDoc === dc ? null : dc)}>
        <span className="flex items-center gap-2"><Badge strate={dc[0]} small /> <span className="font-medium">{dc}</span></span>
        <span className="text-gray-400 text-sm">{filtered.filter(t => (t.doc_code || '?') === dc).length} termes</span>
      </button>
      {expandedDoc === dc && <div className="pl-4 mt-1">
        {filtered.filter(t => (t.doc_code || '?') === dc).map((t, i) => <div key={i} className="py-1.5 border-b border-gray-50">
          <span className="font-medium text-gray-800">{t.fr}</span>
          {t.en && <span className="text-gray-400 ml-2">/ {t.en}</span>}
          {t.definition && <p className="text-sm text-gray-500 mt-0.5">{t.definition.slice(0, 150)}</p>}
        </div>)}
      </div>}
    </div>)}
  </div>;
}

// ── CROSS-REFS ──
function CrossRefsTab() {
  const [selectedDoc, setSelectedDoc] = React.useState(null);
  const docCodes = [...new Set(DATA.documents.map(d => d.code))].sort();

  // Matrice de connexions
  const matrix = {};
  DATA.crossrefs.forEach(cr => {
    const src = cr.doc_source.slice(0, 2);
    const dst = cr.doc_cible.slice(0, 2);
    const key = `${src}-${dst}`;
    matrix[key] = (matrix[key] || 0) + 1;
  });

  // Refs pour le doc sélectionné
  const asSource = selectedDoc ? DATA.crossrefs.filter(cr => cr.doc_source.startsWith(selectedDoc)) : [];
  const asTarget = selectedDoc ? DATA.crossrefs.filter(cr => cr.doc_cible.startsWith(selectedDoc)) : [];

  return <div>
    <p className="text-sm text-gray-500 mb-3">Cliquez sur un document pour voir ses connexions</p>
    <div className="overflow-x-auto mb-4">
      <table className="text-xs border-collapse">
        <thead><tr><th className="p-1"></th>{docCodes.map(d => <th key={d} className="p-1 text-center w-8"><span className="writing-mode-vertical" style={{writingMode:'vertical-rl'}}>{d}</span></th>)}</tr></thead>
        <tbody>{docCodes.map(src => <tr key={src}>
          <td className="p-1 font-medium cursor-pointer hover:text-blue-600" onClick={() => setSelectedDoc(selectedDoc === src ? null : src)}>
            <Badge strate={src[0]} small /> {src}
          </td>
          {docCodes.map(dst => {
            const n = (matrix[`${src}-${dst}`] || 0);
            const rev = (matrix[`${dst}-${src}`] || 0);
            const bidi = n > 0 && rev > 0;
            return <td key={dst} className={`p-1 text-center w-8 h-8 rounded ${n > 0 ? (bidi ? 'bg-green-200 text-green-800' : 'bg-blue-100 text-blue-700') : src === dst ? 'bg-gray-100' : ''}`}>
              {n > 0 ? n : ''}
            </td>;
          })}
        </tr>)}</tbody>
      </table>
    </div>
    <div className="flex gap-3 text-xs text-gray-500 mb-4">
      <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-green-200 inline-block"></span> Bidirectionnel</span>
      <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-blue-100 inline-block"></span> Unidirectionnel</span>
    </div>
    {selectedDoc && <div className="card">
      <h4 className="font-semibold mb-2 flex items-center gap-2"><Badge strate={selectedDoc[0]} /> {selectedDoc}</h4>
      {asSource.length > 0 && <div className="mb-3">
        <div className="text-sm font-medium text-gray-600 mb-1">Renvoie vers ({asSource.length})</div>
        {asSource.map((cr, i) => <div key={i} className="text-sm py-1 border-b border-gray-50">
          <span className="text-blue-600">{cr.doc_cible}</span> : {cr.pour_concept}
        </div>)}
      </div>}
      {asTarget.length > 0 && <div>
        <div className="text-sm font-medium text-gray-600 mb-1">Recu de ({asTarget.length})</div>
        {asTarget.map((cr, i) => <div key={i} className="text-sm py-1 border-b border-gray-50">
          <span className="text-green-600">{cr.doc_source}</span> : {cr.pour_concept}
        </div>)}
      </div>}
    </div>}
  </div>;
}

// ── CASCADE ──
function CascadeTab() {
  const [expanded, setExpanded] = React.useState(null);
  return <div>
    {DATA.cascade.map((c, i) => <div key={i} className={`card cascade-${c.niveau} cursor-pointer`} onClick={() => setExpanded(expanded === i ? null : i)}>
      <div className="flex items-center gap-3">
        <div className="text-white rounded-full w-10 h-10 flex items-center justify-center font-bold text-lg" style={{background: CASCADE_COLORS[i]}}>
          N{c.niveau}
        </div>
        <div>
          <div className="font-semibold text-gray-800">{c.label}</div>
          <div className="text-sm text-gray-500">{c.sous_label}</div>
        </div>
      </div>
      {expanded === i && <div className="mt-4 space-y-3">
        <p className="text-sm text-gray-600">{c.logique}</p>
        {Array.isArray(c.indicateurs_cles) && c.indicateurs_cles.length > 0 && <div>
          <div className="text-xs font-semibold text-gray-500 uppercase mb-1">Indicateurs</div>
          <div className="flex flex-wrap gap-1">{c.indicateurs_cles.map((ind, j) =>
            <span key={j} className="text-xs bg-blue-50 text-blue-700 rounded-full px-2 py-0.5">{typeof ind === 'string' ? ind : JSON.stringify(ind)}</span>
          )}</div>
        </div>}
        {Array.isArray(c.seuils_critiques) && c.seuils_critiques.length > 0 && <div>
          <div className="text-xs font-semibold text-gray-500 uppercase mb-1">Seuils critiques</div>
          <div className="space-y-1">{c.seuils_critiques.map((s, j) => {
            if (typeof s === 'object' && s !== null) {
              return <div key={j} className="text-sm"><span className="font-medium">{s.indicateur}</span> {s.seuil} — <span className="text-gray-500">{s.interpretation}</span></div>;
            }
            return <div key={j} className="text-sm">{JSON.stringify(s)}</div>;
          })}</div>
        </div>}
        {Array.isArray(c.leviers_action) && c.leviers_action.length > 0 && <div>
          <div className="text-xs font-semibold text-gray-500 uppercase mb-1">Leviers</div>
          <ul className="text-sm text-gray-600 space-y-0.5">{c.leviers_action.map((l, j) =>
            <li key={j} className="flex items-start gap-1"><span className="text-green-500 mt-0.5">+</span> {typeof l === 'string' ? l : JSON.stringify(l)}</li>
          )}</ul>
        </div>}
        {Array.isArray(c.erreurs_typiques) && c.erreurs_typiques.length > 0 && <div>
          <div className="text-xs font-semibold text-gray-500 uppercase mb-1">Erreurs typiques</div>
          <ul className="text-sm text-red-600 space-y-0.5">{c.erreurs_typiques.map((e, j) =>
            <li key={j} className="flex items-start gap-1"><span className="mt-0.5">!</span> {typeof e === 'string' ? e : JSON.stringify(e)}</li>
          )}</ul>
        </div>}
      </div>}
      {i < DATA.cascade.length - 1 && <div className="flex justify-center my-1 text-gray-300 text-2xl">|</div>}
    </div>)}
  </div>;
}

// ── CONCEPT CARDS ──
function ConceptCardsTab() {
  const [filter, setFilter] = React.useState('all');
  const scopeTypes = [...new Set(DATA.cards.map(c => c.scope_type))].sort();
  const filtered = filter === 'all' ? DATA.cards : DATA.cards.filter(c => c.scope_type === filter);
  return <div>
    <div className="flex gap-2 mb-4 flex-wrap">
      <button onClick={() => setFilter('all')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'all' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700'}`}>
        Toutes ({DATA.cards.length})
      </button>
      {scopeTypes.map(st => <button key={st} onClick={() => setFilter(st)}
        className={`px-3 py-1 rounded-lg text-sm ${filter === st ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700'}`}>
        {st} ({DATA.cards.filter(c => c.scope_type === st).length})
      </button>)}
    </div>
    <div className="space-y-2">
      {filtered.map(c => <div key={c.id} className="card">
        <div className="flex justify-between items-start">
          <div>
            <span className="font-semibold text-gray-800">{c.title}</span>
            <span className={`ml-2 text-xs rounded-full px-2 py-0.5 ${c.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}`}>{c.status}</span>
          </div>
          <div className="flex gap-1">
            {(Array.isArray(c.docs_codes) ? c.docs_codes : []).map((dc, i) => <Badge key={i} strate={dc[0]} small />)}
          </div>
        </div>
        {c.description && <p className="text-sm text-gray-500 mt-1">{c.description.slice(0, 200)}</p>}
      </div>)}
    </div>
  </div>;
}

// ── TECHNIQUE (optionnel) ──
function TechniqueTab() {
  if (!DATA.scripts) return <p className="text-gray-500">Partie technique non incluse. Relancer avec --technique.</p>;
  return <div>
    <h3 className="text-lg font-semibold mb-3">Scripts ({DATA.scripts.length})</h3>
    <div className="space-y-1 mb-6">
      {DATA.scripts.map((s, i) => <div key={i} className="flex justify-between items-center py-1.5 border-b border-gray-50">
        <div><span className="text-gray-400 text-sm">{s.folder}</span><span className="font-medium">{s.nom}</span></div>
        <div className="flex gap-3 items-center">
          <span className="text-xs bg-blue-50 text-blue-700 rounded px-2 py-0.5">v{s.version}</span>
        </div>
      </div>)}
    </div>
    <h3 className="text-lg font-semibold mb-3">Tables ({DATA.tables.length})</h3>
    <div className="grid grid-cols-2 md:grid-cols-3 gap-1">
      {DATA.tables.map((t, i) => <div key={i} className="text-sm flex justify-between py-1 px-2 bg-gray-50 rounded">
        <span>{t.name}</span>
        <span className="text-gray-400">{t.rows}</span>
      </div>)}
    </div>
  </div>;
}

// ── APP ──
function App() {
  const baseTabs = [
    {id: 'documents', label: 'Documents'},
    {id: 'chaines', label: 'Chaines Causales'},
    {id: 'thesaurus', label: 'Thesaurus'},
    {id: 'crossrefs', label: 'Cross-refs'},
    {id: 'cascade', label: 'Cascade N0-N5'},
    {id: 'cards', label: 'Concept Cards'},
  ];
  if (HAS_TECHNIQUE) baseTabs.push({id: 'technique', label: 'Infrastructure'});
  const [tab, setTab] = React.useState('documents');

  return <div className="max-w-5xl mx-auto px-4 pb-12">
    <Header />
    <div className="flex gap-1 border-b border-gray-200 mb-6 overflow-x-auto">
      {baseTabs.map(t => <button key={t.id} onClick={() => setTab(t.id)}
        className={`px-4 py-2.5 text-sm whitespace-nowrap transition ${tab === t.id ? 'tab-active' : 'text-gray-500 hover:text-gray-700'}`}>
        {t.label}
      </button>)}
    </div>
    <div>
      {tab === 'documents' && <DocumentsTab />}
      {tab === 'chaines' && <ChainesTab />}
      {tab === 'thesaurus' && <ThesaurusTab />}
      {tab === 'crossrefs' && <CrossRefsTab />}
      {tab === 'cascade' && <CascadeTab />}
      {tab === 'cards' && <ConceptCardsTab />}
      {tab === 'technique' && <TechniqueTab />}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
