astoraux", "tableau_requis": 1, "enrichissement_notes": null}, {"numero": "§I.2", "titre_h1": null, "titre_h2": "1.2 Agriculture syntropic : succession vers la forêt-jardin", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§II.1", "titre_h1": "II — Fonctionnement biologique", "titre_h2": "2.1 Le CMN agroforestier : réseau de communication", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§II.2", "titre_h1": null, "titre_h2": "2.2 Hydraulic lift et redistribution hydrique", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§II.3", "titre_h1": null, "titre_h2": "2.3 La voie oxalate-carbonate en agroforesterie", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§III.1", "titre_h1": "III — Conception", "titre_h2": "3.1 Espèces clés pour l'agroforesterie tempérée", "tableau_requis": 1, "enrichissement_notes": null}, {"numero": "§IV.1", "titre_h1": null, "titre_h2": "4.1 Conception et mise en oeuvre", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§CHAPITRE V  Économie", "titre_h1": "V — Économie", "titre_h2": "5.1 Économie et services écosystémiques", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "Conclu", "titre_h1": null, "titre_h2": null, "tableau_requis": 0, "enrichissement_notes": null}], "n_terms": 13}, {"code": "P5", "titre": "La Transition", "strate": "P", "note": "Absorbe T2 Intelligence biologique. Chronoséquence 4 phases, capital biologique comme actif, carbon farming, labels, algorithme diagnostic→action→résultat économique.", "titre_jenni": "La Transition — Chronoséquence et capital biologique", "style": "scientifique synthétique", "statut_redaction": "a_faire", "priorite": 17, "sections": [{"numero": "Intro", "titre_h1": null, "titre_h2": null, "tableau_requis": 0, "enrichissement_notes": "ENRICHISSEMENT P5 — La Transition\n→ Le faux plat du rendement (Husson, Zone 2) N'EST PAS un échec : les micro-organismes Y captent N,P,S pour construire l'humus AVANT la plante. Gain C proportionnel à baisse rendement. Levier : foliaire pour nourrir la plante sans alimenter la compétition au sol.\n→ Concentrer la biomasse pour passer les seuils : zaï burkinabé, planches permanentes, fosse de couche chaude = même logique à 3 échelles.\n→ Agrorecyclerie (Cagnolle) : MO 1.4%→9% en 10 ans avec balayures scierie + broyats déchetterie. 90% sans irrigation après 14 ans. Preuve que la trajectoire est possible.\n→ La ration du sol : l'apport carboné annuel en surface qui entretient le réseau fongique pourvoyeur d'eau, de nutriments et de défense. Le salaire des pourvoyeurs d'eau.\n→ Deux stratégies : intrant massif (50-400t, Zone 4) vs douce (20-50t, Zone 3).\n→ Rotation prairie MSV (2ans+1an bâche+1an paille).\n→ 5cm BRF=+1%MO (K1=50%). Légume ~1t vs 20t nécessaire."}, {"numero": "§I.1", "titre_h1": "I — Planches permanentes", "titre_h2": "1.1 Planches permanentes : principe et mise en oeuvre", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§I.2", "titre_h1": null, "titre_h2": "1.2 Enrichissement en surface : compost, bokashi, paillage", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§II.1", "titre_h1": "II — Gestion du paillage", "titre_h2": "2.1 Types de paillage et effets sur le microbiome", "tableau_requis": 1, "enrichissement_notes": null}, {"numero": "§III.1", "titre_h1": "III — Biostimulants liquides", "titre_h2": "3.1 JADAM JMS : biostimulant microbien à coût zéro", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§III.2", "titre_h1": null, "titre_h2": "3.2 EM, lixiviat bokashi et LiFoFer en maraîchage", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§IV.1", "titre_h1": "IV — Rotations", "titre_h2": "4.1 Rotations et associations maraîchères", "tableau_requis": 1, "enrichissement_notes": null}, {"numero": "§V.1", "titre_h1": "V — Densité nutritionnelle", "titre_h2": "5.1 Densité nutritionnelle : du sol vivant à l'assiette", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "Conclu", "titre_h1": null, "titre_h2": null, "tableau_requis": 0, "enrichissement_notes": null}], "n_terms": 14}, {"code": "S0", "titre": "L'Eau dans le Sol Vivant", "strate": "S", "note": "Angle mort critique identifie par analyse Opus. Physique de l eau (potentiel hydrique, RU, hystéresis), macroporosité biologique (Ksat, biopores), hydraulic lift (mécanisme physique), films d eau comme habitats microbiens, résilience climatique hydrique.", "titre_jenni": "L'Eau dans le Sol Vivant", "style": "scientifique accessible", "statut_redaction": "a_faire", "priorite": 5, "sections": [{"numero": "Intro", "titre_h1": null, "titre_h2": null, "tableau_requis": 0, "enrichissement_notes": "ENRICHISSEMENT S0 — L'Eau dans le Sol Vivant\n→ N0 n'est pas un prérequis linéaire — c'est un PRODUIT ÉMERGENT. L'accès à l'eau dépend de N4 (champignons → hyphes dans micropores) qui dépend de N3 (carbone) qui dépend de N5 (photosynthèse) qui dépend de N0 (eau). BOUCLE.\n→ Les 3 étages hydrauliques : (1) Biofilms anaérobies = rétention eau micropores (4 Ga). (2) Hyphes saprotrophes = remontée eau par capillarité pour dégrader lignine + culture de bactéries. (3) CMA = livraison eau à la plante depuis micropores inaccessibles aux racines (2-5 µm vs 20 µm racine).\n→ La forêt ne gère pas l'eau — elle la PRODUIT (son accès) par son réseau fongique + CMN + hydraulic lift. Cagnolle 90% sans irrigation = preuve que la reconstruction du réseau fongique résout N0.\n→ Le mulch carboné annuel (ration du sol) entretient le service hydraulique fongique."}, {"numero": "§I.1", "titre_h1": "I — La physique de l'eau dans le sol", "titre_h2": "1.1 Potentiel hydrique et courbe de rétention", "tableau_requis": 1, "enrichissement_notes": null}, {"numero": "§I.2", "titre_h1": null, "titre_h2": "1.2 La loi de Darcy et les flux hydriques", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§II.1", "titre_h1": "II — La macroporosité biologique", "titre_h2": "2.1 Les macropores biologiques : galeries, racines, hyphes", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§II.2", "titre_h1": null, "titre_h2": "2.2 La biopuncture : reconstruire la macroporosité", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§III.1", "titre_h1": "III — L'hydraulic lift", "titre_h2": "3.1 Mécanisme de l'hydraulic lift", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§III.2", "titre_h1": null, "titre_h2": "3.2 Hydraulic lift et réseaux mycorhiziens : synergie", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§IV.1", "titre_h1": "IV — Les films d'eau et la vie microbienne", "titre_h2": "4.1 Les films d'eau comme habitat microbien", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§IV.2", "titre_h1": null, "titre_h2": "4.2 Stratégies de survie à la dessiccation", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§V.1", "titre_h1": "V — L'eau dans les sols cultivés", "titre_h2": "5.1 Le sol vivant comme tampon climatique hydrique", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§V.2", "titre_h1": null, "titre_h2": "5.2 Gérer l'eau par la biologie : leviers pratiques", "tableau_requis": 1, "enrichissement_notes": null}, {"numero": "Conclu", "titre_h1": null, "titre_h2": null, "tableau_requis": 0, "enrichissement_notes": null}], "n_terms": 19}, {"code": "S1", "titre": "Architecture du Sol", "strate": "S", "note": "Absorbe P1 Pédologie. Physico-chimie : texture, argiles, CEC, CAH, agrégation, porosité, horizons. Socle sans biologie — les mécanismes biologiques restent dans S2/S3.", "titre_jenni": "Architecture du Sol — Texture, agrégats et porosité", "style": "scientifique dense", "statut_redaction": "a_faire", "priorite": 6, "sections": [{"numero": "Intro", "titre_h1": null, "titre_h2": null, "tableau_requis": 0, "enrichissement_notes": "ENRICHISSEMENT S1 — Architecture du Sol\n→ Micro-agrégat anaérobie à cœur (hypothèse conférence Eh/pH). L'atmosphère du sol en profondeur ≈ atmosphère primitive. La stabilité structurale dépend du MAINTIEN de conditions réduites internes.\n→ Sol structuré vs compacté (Husson) : faibles variations redox dans le TEMPS + large gamme dans l'ESPACE = robuste (Hamant). Fortes fluctuations TEMPS + gamme étroite ESPACE = fragile.\n→ Réaction de Fenton : alternance aérobie/anaérobie en sol compacté → radicaux hydroxyles OH• → destruction 30-50% MO « stable ». Le labour ne détruit pas la MO par exposition à l'air — il crée les conditions pour Fenton.\n→ Premier micro-agrégat de l'histoire = EPS bactérien anaérobie + argile (4 Ga, océan). Avant les champignons, avant les racines."}, {"numero": "§I.1", "titre_h1": "I — Les minéraux argileux", "titre_h2": "1.1 Propriétés physico-chimiques des argiles", "tableau_requis": 1, "enrichissement_notes": null}, {"numero": "§I.2", "titre_h1": null, "titre_h2": "1.2 Les complexes argilo-humiques et la CEC", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§II.1", "titre_h1": "II — Les agrégats", "titre_h2": "2.1 Formation et hiérarchie des agrégats", "tableau_requis": 1, "enrichissement_notes": null}, {"numero": "§II.2", "titre_h1": null, "titre_h2": "2.2 Rôle des agrégats dans la protection du carbone", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§III.1", "titre_h1": "III — Porosité et eau dans les agrégats", "titre_h2": "3.1 Architecture des pores et fonctions hydrauliques", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§III.2", "titre_h1": null, "titre_h2": "3.2 Réserve utile et résilience à la sécheresse", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§IV.1", "titre_h1": "IV — MAOM et POC", "titre_h2": "4.1 MAOM et POC : les deux formes de carbone organique", "tableau_requis": 1, "enrichissement_notes": null}, {"numero": "§V.1", "titre_h1": "V — Architecture du sol cultivé", "titre_h2": "5.1 Ce que le labour fait à l'architecture du sol", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§V.2", "titre_h1": null, "titre_h2": "5.2 Profil idéal d'un sol vivant régénératif", "tableau_requis": 1, "enrichissement_notes": null}, {"numero": "§V.3", "titre_h1": null, "titre_h2": "5.3 Compaction et tassement : diagnostic et seuils", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "Conclu", "titre_h1": null, "titre_h2": null, "tableau_requis": 0, "enrichissement_notes": null}], "n_terms": 21}, {"code": "S2", "titre": "Le Microbiome du Sol", "strate": "S", "note": "Document de référence du microbiome bactérien. Inclut guildes fonctionnelles, copiotrophes/oligotrophes, nécromasse (80% C stable), suppressivité, PLFA, Chao1.", "titre_jenni": "Le Microbiome du Sol", "style": "scientifique dense", "statut_redaction": "a_faire", "priorite": 7, "sections": [{"numero": "Intro", "titre_h1": null, "titre_h2": null, "tableau_requis": 0, "enrichissement_notes": "ENRICHISSEMENT S2 — Le Microbiome du Sol\n→ Stratégies S-A-Y (Husson) en complément du ratio F/B : S (stress, faible CUE, sol dégradé) → A (acquisition minéraux, CUE moyenne) → Y (rendement, forte CUE, forte humification). La trajectoire de régénération = bascule S→A→Y.\n→ Le biofilm comme système hydraulique : EPS = 97% eau structurée. La rétention d'eau dans les micropores n'est pas passive (capillarité) — elle est BIOLOGIQUE (biofilms bactériens). Sans biofilms, pas de rétention, pas de vie.\n→ Plasmides = outil d'adaptation rapide construit en 3 Ga. La plante reprogramme les plasmides de ses endophytes (cycle rhizophagique étendu, conférence Eh/pH).\n→ 50% du microbiome pulmonaire sain = anaérobies strictes. Les anaérobies intestinaux fournissent vitamines B et antioxydants. Les anaérobies du sol font PAREIL pour la plante."}, {"numero": "§I.1", "titre_h1": "I — Composition et diversité du microbiome", "titre_h2": "1.1 Les grands phylums et leur rôle écologique", "tableau_requis": 1, "enrichissement_notes": null}, {"numero": "§I.2", "titre_h1": null, "titre_h2": "1.2 Diversité alpha, bêta et UISSANT ET LE MOINS CONNU.\n→ Ration du sol : apport annuel de C de surface = k1/k2 de Hénin-Dupuis appliqué. La forêt produit sa propre ration depuis des millions d'années."}, {"numero": "§I.1", "titre_h1": "I — Le cycle du carbone dans le sol", "titre_h2": "1.1 Les pools de carbone et leurs temps de résidence", "tableau_requis": 1, "enrichissement_notes": null}, {"numero": "§I.2", "titre_h1": null, "titre_h2": "1.2 La Microbial Carbon Pump : de la plante à la MAOM", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§II.1", "titre_h1": "II — Le potentiel redox", "titre_h2": "2.1 La tour redox : séquence des accepteurs d'électrons", "tableau_requis": 1, "enrichissement_notes": null}, {"numero": "§II.2", "titre_h1": null, "titre_h2": "2.2 Le Eh comme outil de pilotage agronomique", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§III.1", "titre_h1": "III — Le cycle de l'azote", "titre_h2": "3.1 Nitrification, dénitrification et pertes gazeuses", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§III.2", "titre_h1": null, "titre_h2": "3.2 La stœchiométrie C:N:P:S comme verrou de la stabilisation", "tableau_requis": 1, "enrichissement_notes": null}, {"numero": "§IV.1", "titre_h1": "IV — Le cycle du phosphore", "titre_h2": "4.1 Le cycle du phosphore : Fe, Al, pH et disponibilité", "tableau_requis": 1, "enrichissement_notes": null}, {"numero": "§V.1", "titre_h1": "V — Les cycles du soufre et voie oxalate-carbonate", "titre_h2": "5.1 Le cycle du soufre", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§V.2", "titre_h1": null, "titre_h2": "5.2 La voie oxalate-carbonate : séquestration inorganique", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "Conclu", "titre_h1": null, "titre_h2": null, "tableau_requis": 0, "enrichissement_notes": null}], "n_terms": 37}, {"code": "V1", "titre": "La Faune du Sol", "strate": "V", "note": "Nouveau document. 3 guildes de vers (Bouché), nématodes (5 guildes trophique 'holobionte : concept et implications", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§II.2", "titre_h1": null, "titre_h2": "2.2 Auxines, cytokinines et gibbérellines : production microbienne", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§III.1", "titre_h1": "III — Rhizophagie", "titre_h2": "3.1 Mécanisme du cycle rhizophagique", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§IV.1", "titre_h1": "IV — ISR et SAR", "titre_h2": "4.1 ISR vs SAR : deux voies complémentaires", "tableau_requis": 1, "enrichissement_notes": null}, {"numero": "§IV.2", "titre_h1": null, "titre_h2": "4.2 Communication inter-règnes : miARN, volatils et signaux", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§V.1", "titre_h1": "V — Trophobiose", "titre_h2": "5.1 La trophobiose : plante saine sur sol vivant", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "Conclu", "titre_h1": null, "titre_h2": null, "tableau_requis": 0, "enrichissement_notes": null}], "n_terms": 27}, {"code": "V3", "titre": "Les Fermentations Microbiennes", "strate": "V", "note": "Absorbe Stratégies Microbiennes (bio). Thermodynamique ΔG, bokashi, lactofermentation, LAB, acide 3-phényllactique, succession microbienne, KNF.", "titre_jenni": "Les Fermentations Microbiennes — Thermodynamique et applications", "style": "scientifique accessible", "statut_redaction": "a_faire", "priorite": 12, "sections": [{"numero": "Intro", "titre_h1": null, "titre_h2": null, "tableau_requis": 0, "enrichissement_notes": "ENRICHISSEMENT V3 — Les Fermentations Microbiennes\n→ Le lacto-fermenté n'est pas un amendement — c'est une BOMBE BIOLOGIQUE à 6 effets simultanés : (1) réimplantation microbiome fonctionnel (2) choc redox descendant (-170 mV) (3) solubilisation Fe²⁺, Mn²⁺, P (4) métabolites anti-stress (vitamines B, GABA, polyphénols) (5) bascule S→A→Y (6) formation biofilms sur argile.\n→ L'inversion acide/réduit : en chimie classique, acidifier = oxyder. Les bactéries lactiques font l'INVERSE (pH 3.5 ET Eh -170 mV). Impossible sans biologie.\n→ Lacto-fermentés = reproduction contrôlée des conditions anaérobies primitives (4 Ga). Même métabolisme, même Eh, même logique.\n→ Sols méditerranéens bio à 500-620 mV (oxydés). Correction mesurable à 40 cm, 1 mois après application."}, {"numero": "§I.1", "titre_h1": "I — Fermentation vs aérobiose", "titre_h2": "1.1 Thermodynamique comparée : fermentation vs compostage aérobie", "tableau_requis": 1, "enrichissement_notes": null}, {"numero": "§I.2", "titre_h1": null, "titre_h2": "1.2 Successions microbiennes dans la fermentation", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§II.1", "titre_h1": "II — Bokashi", "titre_h2": "2.1 Composition et fabrication du bokashi", "tableau_requis": 1, "enrichissement_notes": null}, {"numero": "§II.2", "titre_h1": null, "titre_h2": "2.2 Les PNSB : bactéries photosynthétiques non soufrées", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§III.1", "titre_h1": "III — EM et dérivés", "titre_h2": "3.1 EM : origine, composition et philosophie", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§III.2", "titre_h1": null, "titre_h2": "3.2 Applications des EM en agriculture : données probantes", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§IV.1", "titre_h1": "IV — KNF et dérivés", "titre_h2": "4.1 Korean Natural Farming et IMO", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§IV.2", "titre_h1": null, "titre_h2": "4.2 LiFoFer : la litière forestière fermentée", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "§V.1", "titre_h1": "V — Lactofermentation", "titre_h2": "5.1 La lactofermentation : du sol à l'assiette", "tableau_requis": 0, "enrichissement_notes": null}, {"numero": "Conclu", "titre_h1": null, "titre_h2": null, "tableau_requis": 0, "enrichissement_notes": null}], "n_terms": 17}], "terms": [{"fr": "Archéen", "en": "Archean", "doc_code": "F1", "definition": "Ère géologique 4-2,5 Ga, caractérisée par une atmosphère anoxique et une vie exclusivement microbienne (procaryotes). L'Archéen a développé tous les métabolismes de base : fermentation, photosynthèse anoxygénique, chimiolithotrophe. Ces voies sont conservées dans les micro-organismes actuels et réactivées dans les microsites anoxiques du sol.", "statut": "◆"}, {"fr": "BIFs", "en": "banded iron formations", "doc_code": "F1", "definition": "Formations sédimentaires marines témoins de l'atmosphère anoxique archéenne. Le fer dissous (Fe²⁺) précipitait en cycles alternant oxydes (Fe₂O₃, hématite) et carbonates selon les fluctuations de l'O₂ photosynthétique. Marqueurs géochimiques de la transition Archéen → Protérozoïque.", "statut": "◆"}, {"fr": "Dust Bowl", "en": "Dust Bowl", "doc_code": "F1", "definition": "Catastrophe écologique des années 1930 dans les Grandes Plaines américaines. Le labour intensif des prairies a détruit la structure du sol, provoquant des tempêtes de poussière massives et la perte de millions d hectares de terres arables. Cas d étude fondamental de la dégradation des sols.", "statut": "◆"}, {"fr": "Grand Événement d'Oxydation (GOE)", "en": "Great Oxidation Event (GOE)", "doc_code": "F1", "definition": "Augmentation spectaculaire de l'O₂ atmosphérique au Paléoprotérozoïque (~2,45-2,0 Ga), causée par la photosynthèse oxygénique des cyanobactéries. Événement évolutif majeur ayant rendu la vie aérobie possible. Correspond à la précipitation des formations de fer rubanées (BIFs). La commutation métabolique anaérobiose→aérobiose a façonné tous les métabolismes actuels, incluant les voies fermentatives préservées dans les microsites anoxiques du sol.", "statut": "◆"}, {"fr": "Great Oxidation Event (GOE)", "en": "Great Oxidation Event", "doc_code": "F1", "definition": "Événement géologique majeur (~2.4 Ga) : l accumulation d O₂ atmosphérique produit par les cyanobactéries a provoqué l extinction massive des anaérobies stricts et l apparition de la respiration aérobie. A transformé la géochimie de la Terre (formation des BIFs, oxydes Fe).", "statut": "◆"}, {"fr": "Rhynie Chert", "en": "Rhynie Chert", "doc_code": "F1", "definition": "Gisement fossile écossais (~407 Ma) préservant les premiers témoignages des symbioses mycorhiziennes CMA associées aux premières plantes terrestres. Démontre que les mycorhizes ont précédé les systèmes racinaires complexes — les CMA ont colonisé la terre avant les racines.", "statut": "◆"}, {"fr": "Révolution verte", "en": null, "doc_code": "F1", "definition": "Période d'intensification agricole basée sur la génétique à haut rendement et les intrants de synthèse (azote, pesticides)(Lorel, 2018).\n\nEnjeu : Si elle a augmenté les calories produites, elle a souvent conduit à une \"faim cachée\" : des aliments abondants mais pauvres en micronutriments et protecteurs naturels (Erisman, 2020; Montgomery & Biklé, 2021).", "statut": "◆"}, {"fr": "cascade hydraulique évolutive", "en": "evolutionary hydraulic cascade", "doc_code": "F1", "definition": "Chronologie de la gestion de l'eau dans le vivant terrestre. Biofilms anaérobies (4 Ga) → rétention d'eau dans micropores. Champignons saprotrophes (1 Ga) → transport d'eau par réseau hyphique. CMA + plantes (470 Ma) → livraison à la plante + photosynthèse → exsudats → nourriture bactéries et champignons → plus de biofilms → boucle fermée. Les anaérobies sont la FONDATION, les champignons l'INFRASTRUCTURE, les plantes les CLIENTS, la litière le PAIEMENT.", "statut": "◆"}, {"fr": "chimiolithoautotrophie", "en": "chemolithotrophy", "doc_code": "F1", "definition": "Métabolisme d'organismes utilisant des composés inorganiques (H₂S, Fe²⁺, NH₄⁺, H₂) comme source d'énergie et le CO₂ comme source de carbone. Première forme de nutrition de la biosphère, antérieure à la photosynthèse. Conservée dans les bactéries nitrifiantes (Nitrosomonas, Nitrobacter), les bactéries sulfureuses et les archées méthanogènes.", "statut": "◆"}, {"fr": "colonisation terrestre", "en": "land colonization (plants)", "doc_code": "F1", "definition": "Sortie des plantes hors de l eau il y a ~470 Ma. Impossible sans la symbiose mycorhizienne (Glomeromycota) qui a permis l accès aux nutriments du sol minéral. Co-évolution racines/champignons comme moteur de la formation des premiers sols.", "statut": "◆"}, {"fr": "endosymbiose", "en": "endosymbiosis", "doc_code": "F1", "definition": "Incorporation d'un organisme procaryote dans une cellule hôte, à l'origine des mitochondries (α-protéobactérie, ~2 Ga) et des chloroplastes (cyanobactérie, ~1.5 Ga). Théorie de Lynn Margulis. Fondement de toute vie eucaryote.", "statut": "◆"}, {"fr": "photosynthèse oxygénique", "en": "oxygenic photosynthesis", "doc_code": "F1", "definition": "Processus métabolique apparu chez les cyanobactéries il y a ~2.7 Ga, utilisant H₂O comme donneur d'électrons et libérant O₂. A provoqué le Great Oxidation Event (GOE, ~2.4 Ga) qui a transformé l'atmosphère et ouvert la voie à la respiration aérobie.", "statut": "◆"}, {"fr": "pédogenèse", "en": "pedogenesis", "doc_code": "F1", "definition": "Ensemble des processus biologiques, chimiques et physiques par lesquels la roche mère se transforme progressivement en sol (Dokouchaïev, 1883 — sol comme 'corps naturel organisé'). Processus multi-millénaire (1 cm / 200 à 2 000 ans selon le climat). Mobilise des communautés pionnières de lichens, bactéries lithotrophes et champignons altérant les minéraux. Les pratiques agricoles dégradantes peuvent détruire en décennies ce que la pédogenèse a construit en millénaires. Évaluer toute pratique selon son impact sur la vitesse de pédogenèse (Montagne, 2020).", "statut": "◆"}, {"fr": "serpentinisation", "en": "serpentinization", "doc_code": "F1", "definition": "Réaction géochimique de l'eau avec les roches ultrabasiques (péridotites, dunites) produisant de l'H₂ abiotique et de la chaleur. Source d'énergie primitive pour les premiers micro-organismes chimio-lithotropes avant l'apparition de la photosynthèse.", "statut": "◆"}, {"fr": "terra preta", "en": "terra preta (Amazonian dark earths)", "doc_code": "F1", "definition": "Sols anthropiques amazoniennes créés entre 450 et 8000 ans par les populations indigènes. Enrichis en charbon de bois (biochar), tessons de poterie, déchets organiques fermentés. COS 3-10× supérieur aux sols adjacents. Preuve que l homme peut construire un sol fertile durablement.", "statut": "◆"}, {"fr": "Agriculture Biodynamique", "en": "biodynamic agriculture", "doc_code": "F1/F2", "definition": "Approche holistique (Rudolf Steiner, 1924) concevant la ferme comme un organisme autonome et autosuffisant (concept d'organisme-ferme). Préfigure les principes régénératifs : gestion de la MO, biodiversité, absence de synthèse chimique, observation phénologique. Ses préparations biodynamiques (BD 500, BD 501) visent à stimuler l'activité biologique du sol.", "statut": "◆"}, {"fr": "Agriculture Organique Régénératrice", "en": "regenerative organic agriculture", "doc_code": "F1/F2", "definition": "Modèle combinant la certification biologique et les objectifs de régénération active du capital biologique. Amélioration mesurable des indicateurs de vie du sol à chaque cycle cultural. Intègre les dimensions sociale et économique de la transition (Rodale Institute ; Newton et al., 2020).", "statut": "◆"}, {"fr": "Néguentropie", "en": "negentropy", "doc_code": "F1/F2", "definition": "Processus par lequel le vivant capte l'énergie solaire pour créer de l'organisation et de la complexité à partir du chaos minéral(Alombert & Krzykawski, 2021).\n\nEnjeu : Un sol vivant est une structure hautement organisée qui lutte contre la dégradation naturelle(Martins, 2019).\n\nLevier de décision : Chaque passage d'outil qui simplifie le sol (travail du sol) augmente l'entropie ; chaque implantation de plante augmente la néguentropie(Loiret, 2016).", "statut": "◆"}, {"fr": "succession écologique", "en": "ecological succession", "doc_code": "F1/P4", "definition": "Évolution naturelle d'un écosystème depuis un stade pionnier (dominance bactérienne, copiotrophes, ratio F/B < 0,5) vers un stade climacique stable (dominance fongique, oligotrophes, ratio F/B > 2). Cadre théorique expliquant l'évolution du microbiome lors d'une transition vers l'ACS. L'agriculture régénératrice cherche à accélérer cette succession via les couverts diversifiés, les biostimulants et l'absence de labour.", "statut": "◆"}, {"fr": "Biofilms", "en": "biofilms", "doc_code": "F1/S1/S0", "definition": "Matrices de polymères extracellulaires (EPS : polysaccharides, protéines, ADN) sécrétées par les bactéries pour adhérer aux agrégats et créer des microenvironnements protégés. Ciment bactérien des agrégats, complémentaire de la glomaline (ciment fongique). Favorisés par les apports de sucres simples et d'exsudats (couverts jeunes) qui nourrissent les bactéries productrices d'EPS. Rôle clé dans la stabilisation de la structure du sol à l'échelle microscopique (Costa et al., 2018).", "statut": "◆"}, {"fr": "Théorie de l'Humus", "en": "humus theory", "doc_code": "F1/S4", "definition": "Théorie (Thaer, 1809) selon laquelle les plantes se nourrissent directement d'humus. Réfutée par Liebig (1840) au profit de la théorie de la nutrition minérale. Partiellement réhabilitée par la découverte du rôle de la nécromasse microbienne (80% du C stable) et de la nutrition non-ionique (rhizophagie, White et al. 2018) : la plante digère bien de la MO microbienne via des endophytes. La continuité Thaer→nécromasse→rhizophagie est le récit scientifique fondateur du corpus (Kokou, 2011 ; Gunina & Kuzyakov, 2023).", "statut": "◆"}, {"fr": "Chaîne 4 — Anaérobiose archéenne → Fermentations alimentaires", "en": "Chain 4 — Archean anaerobiosis to modern fermented foods", "doc_code": "F1/S4/V3/P3/V2/H3/H1", "definition": "F1: Vie primitive dans un monde anoxique (3,8 Ga), voies fermentaires comme métabolisme originel → S4: Conservation des microsites anoxiques dans les agrégats → V3: Thermodynamique de la fermentation (ΔG favorable à la conservation C/N) → P3: Application via Bokashi/EM/IMO reproduisant les conditions anaérobies contrôlées → V2: Endophytes racinaires conservant des voies fermentaires anaérobies → H3: Microbiome intestinal majoritairement anaérobie → H1: Aliments fermentés réactivant ces voies dans l'intestin. Le récit fondateur du corpus : les fermentations ne sont pas une technique mais la réactivation du métabolisme le plus ancien de la biosphère.", "statut": "◆"}, {"fr": "Cycle d'Indore", "en": "Indore process", "doc_code": "F1/V3", "definition": "Procédé de compostage aérobie mis au point par Albert Howard à Indore (Inde, années 1920-30). Alternance de couches de matières végétales et animales, retourné régulièrement. Première démonstration à grande échelle de régénération de fertilité sans intrants de synthèse. Fondateur de l'agriculture organique moderne.", "statut": "◆"}, {"fr": "Anthropocène", "en": "Anthropocene", "doc_code": "F2", "definition": "Époque géologique actuelle caractérisée par l'impact prédominant des activités humaines sur l'écosystème terrestre. L'agriculture industrielle est identifiée comme l'un des principaux vecteurs de cette rupture planétaire. La transition régénératrice constitue un levier majeur pour inverser la trajectoire (Grimonprez, 2022).", "statut": "◆"}, {"fr": "EROI", "en": "energy return on investment", "doc_code": "F2", "definition": "Ratio énergie alimentaire produite / énergie fossile investie. L'agriculture conventionnelle a souvent un EROI faible (< 3:1) voire négatif à cause des engrais de synthèse Haber-Bosch (Courtonne et al., 2015 ; Tello et al., 2023 ; Dardonville, 2021). L'ACS vise un EROI > 5:1 en réduisant les intrants fossiles. Levier : 30-40% de légumineuses en rotation pour court-circuiter la synthèse industrielle d'azote.", "statut": "~"}, {"fr": "Haber-Bosch", "en": "Haber-Bosch process", "doc_code": "F2", "definition": "Procédé industriel de synthèse de l'ammoniac (N₂+H₂→NH₃) à haute pression et température (1913). Consomme 1-2% de l'énergie mondiale (Robertson & Groffman, 2014). Responsable de la rupture des cycles naturels de l'azote et de la dépendance aux énergies fossiles. Levier : 30-40% de légumineuses en rotation pour court-circuiter ce procédé. Connexion Loi de la Trophobiose : l'azote Haber-Bosch favorise un excès d'acides aminés libres dans la sève, rendant les plantes vulnérables aux ravageurs.", "statut": "◆"}, {"fr": "L'Organisme-Ferme", "en": null, "doc_code": "F2", "definition": "Concept fondateur de l'agriculture \"organique\" (bio), stipulant que la ferme doit posséder une \"complétude biologique\" et un équilibre interne (Bless et al., 2023).\n\nEnjeu : Distinction entre traiter la terre comme une ressource inanimée (industriel) et la gérer comme une entité vivante complexe (Bless et al., 2023).\n\nLevier de décision : Concevoir les rotations non pas comme des successions de cultures mais comme des cycles de renouvellement de la vie du sol(Trabelsi, 2017).", "statut": "◆"}, {"fr": "Loi du Minimum", "en": "Liebig's law of the minimum", "doc_code": "F2", "definition": "Principe (Liebig, 1840) : la croissance d'un organisme est limitée par la ressource la plus rare, quelle que soit l'abondance des autres. En agriculture régénératrice, s'applique au capital biologique total : un sol pauvre en diversité fongique limitera la nutrition minérale même en présence de NPK abondant (Kokou, 2011). La CMA est souvent le facteur limitant le moins visible mais le plus structurant.", "statut": "◆"}, {"fr": "Scope 3", "en": "Scope 3 emissions", "doc_code": "F2", "definition": "Émissions indirectes de la chaîne de valeur agricole (amont : production des intrants ; aval : transport, transformation). Les plus sous-déclarées. Inclut notamment les émissions de la synthèse Haber-Bosch (N₂O des engrais) et du labour (déstockage de CO₂ du sol).", "statut": "≈"}, {"fr": "antifragilité", "en": "antifragility", "doc_code": "F2", "definition": "Propriété d'un système qui se renforce face aux chocs plutôt que de simplement y résister (Taleb). Un sol vivant diversifié est plus performant après un stress (sécheresse, inondation) qu'un sol stérile protégé artificiellement (Equihua et al., 2020 ; Shi et al., 2021). Construite par la diversité spécifique : mélanges de 10-12 espèces en couverts pour saturer les niches écologiques (Bommarco et al., 2012). L'antifragilité est l'horizon de la transition, au-delà de la résilience.", "statut": "◆"}, {"fr": "bioéconomie circulaire", "en": "circular bioeconomy", "doc_code": "F2", "definition": "Économie basée sur le carbone photosynthétique, pas sur le carbone fossile (Hamant). Biodiversité → agroécologie → biomasse → biomatériaux biodégradables compostables qui nourrissent les écosystèmes. Condition : les objets doivent pouvoir retourner au sol. Le sol vivant est le socle de la bioéconomie circulaire.", "statut": "◆"}, {"fr": "burnout planétaire", "en": "planetary burnout", "doc_code": "F2", "definition": "Métaphore systémique de Hamant : comme un burnout humain est causé par un excès de performance, le burnout planétaire (dérèglement climatique, effondrement de la biodiversité, pollutions, pénuries) est le produit de notre performance collective. La réponse habituelle à un burnout — demander encore plus d'effort — est exactement ce que font les politiques actuelles face à la crise écologique. Le monde fluctuant (écart-type, pas moyenne) qui en résulte est le signal que le système a dépassé ses limites de performance.", "statut": "◆"}, {"fr": "capital biologique", "en": "biological capital", "doc_code": "F2", "definition": "Stock intégré de biodiversité fonctionnelle et de matière organique stable accumulé dans un sol, générant des intérêts annuels sous forme de fertilité gratuite (fixation d'azote, solubilisation du phosphore, suppressivité, résilience hydrique, densité nutritionnelle). Contrairement au matériel, ce capital se valorise avec le temps si on ne le perturbe pas (Bourgeois et al., 2012). Calculer le ROI sur la capitalisation de l'humus à 5 ans, pas sur le rendement de la culture suivante.", "statut": "◆"}, {"fr": "compromis performance/robustesse", "en": "performance-robustness trade-off", "doc_code": "F2", "definition": "Loi universelle (Hamant, 2024) : un système ne peut pas être simultanément très performant et très robuste. Performant = optimisé, spécialisé, adapté, donc peu adaptable. Robuste = diversifié, redondant, sous-optimal, donc très adaptable. Le sol vivant est robuste (ratio F/B équilibré, diversité microbienne élevée, résilience aux stress). Le sol industriel est performant (rendement maximal année 1, effondrement décennie 2). Les êtres vivants sont robustes parce qu'ils ne sont pas performants — c'est ce que sélectionne l'évolution darwinienne.", "statut": "◆"}, {"fr": "contreperformances du vivant", "en": "biological counter-performances", "doc_code": "F2", "definition": "Caractéristiques sélectionnées par l'évolution darwinienne parce qu'elles élargissent l'espace de viabilité : inefficacité, hétérogénéité, redondance, lenteur, incohérence, imprécision, inachèvement. Dans le sol vivant : redondance fonctionnelle (des centaines d'espèces pour la même fonction), hétérogénéité spatiale (microsites aérobies et anaérobies), lenteur de la MO stable (humification sur des décennies). Un sol industriel « optimisé » est fragile ; un sol vivant « contreperformant » est robuste.", "statut": "◆"}, {"fr": "contreperformances sélectionnées", "en": "selected counter-performances", "doc_code": "F2", "definition": "Observation biologique fondamentale (Hamant) : l'évolution darwinienne sélectionne l'inefficacité, l'hétérogénéité, la redondance, la lenteur, l'imprécision — parce que ces propriétés élargissent l'espace de viabilité du système. Un arbre a des milliers de feuilles (redondance), une crosse aortique sous-optimale (imprécision), un système immunitaire en veilleuse à 37°C (sous-performance de croisière). Transposé au sol : la diversité microbienne, les guildes fonctionnelles redondantes et les cycles lents de la MO stable sont des contreperformances qui garantissent la robustesse.", "statut": "◆"}, {"fr": "contreperformances sélectionnées par l évolution", "en": "evolutionary selection of counter-performance", "doc_code": "F2", "definition": "Ce que l'évolution darwinienne sélectionne dans les systèmes vivants : inefficacité, hétérogénéité, redondance, lenteur, erreur, imprécision, incohérence, inachèvement. Ce sont des marges de manœuvre — du jeu dans les rouages. Un arbre optimisé serait une tige avec une feuille ; un arbre réel a des milliers de feuilles redondantes. Un sol vivant est redondant (mille espèces pour la même fonction), hétérogène (microsites aérobies et anaérobies), lent (humification sur des décennies). C'est exactement pourquoi il est résilient.", "statut": "◆"}, {"fr": "coûts cachés", "en": "hidden costs", "doc_code": "F2", "definition": "Coûts environnementaux et sociaux non reflétés dans le prix de marché, synonyme opérationnel des externalités. Ex : coût de la dépollution de l'eau, soins médicaux liés aux pesticides, effondrement des pollinisateurs.", "statut": "◆"}, {"fr": "culture de la variabilité", "en": "culture of variability", "doc_code": "F2", "definition": "Compétence clé pour habiter le monde fluctuant (Hamant / TED-Néo Loco). Remplacer les moyennes par les écarts-types dans les tableurs, construire son modèle économique sur les colonnes les plus fluctuantes. Pour l'agriculture : piloter par le diagnostic de variabilité (P1), pas par le rendement moyen.", "statut": "◆"}, {"fr": "efficiency trap (piège de la performance)", "en": "efficiency trap", "doc_code": "F2", "definition": "Boucle auto-renforçante décrite par Olivier Hamant (ENS Lyon) : crise → besoin de sécurité → besoin de contrôle → augmentation de la performance → épuisement des ressources → crise suivante. Explique pourquoi l'agriculture industrielle ne peut pas se réformer de l'intérieur : chaque crise (résistance aux pesticides, érosion, perte de fertilité) déclenche une réponse performante (nouvel intrant, nouvelle molécule, nouveau OGM) qui prépare la crise suivante. Le sprinter qui épuise ses ressources.", "statut": "◆"}, {"fr": "esclaves énergétiques", "en": "energy slave", "doc_code": "F2", "definition": "Métaphore : équivalent en travail humain d'une unité d'énergie fossile. Un litre de pétrole équivaut à ~10 jours de travail humain. Permet de visualiser concrètement le capital énergétique fossile mobilisé par l'agriculture conventionnelle.", "statut": "◆"}, {"fr": "externalités", "en": "externalities", "doc_code": "F2", "definition": "Coûts environnementaux et sociaux non internalisés dans le prix de marché des produits agricoles. Estimés à 12 000 milliards $/an mondialement (eutrophisation, maladies chroniques, effondrement de la biodiversité, coût des antibiorésistances). Le prix réel d'un aliment conventionnel intégrant les externalités est 3-5× le prix de marché.", "statut": "✓"}, {"fr": "maladaptation", "en": "maladaptation", "doc_code": "F2", "definition": "Solution performante à un problème complexe qui aggrave les problèmes adjacents. Exemples : l'usine de capture directe du CO₂ en Islande (Climeworks, 2024) qui privatise le CO₂ et permet aux industries de continuer à émettre via des quotas carbone. La batterie au lithium qui lutte contre le changement climatique mais aggrave les pénuries de ressources, l'effondrement de la biodiversité et les pollutions. En agriculture : la biofortification agronomique (engrais enrichis) au lieu de la biofortification biologique (sol vivant).", "statut": "◆"}, {"fr": "monde fluctuant", "en": "volatile world / VUCA world", "doc_code": "F2", "definition": "Caractérisation du monde post-Holocène (Hamant) : variable et imprévisible. La fréquence des événements climatiques extrêmes en France a été multipliée par 4,5 depuis 2000. Le monde fluctuant exige la robustesse, pas la performance. Implications pour l'agriculture : le rendement stable n'existe plus, seule la résilience du système compte.", "statut": "◆"}, {"fr": "paradigme régénératif", "en": "regenerative paradigm", "doc_code": "F2", "definition": "Cadre de pensée dépassant la durabilité (ne pas dégrader) pour viser la reconstruction active des écosystèmes. Repositionne l'agriculture comme ingénierie écosystémique et branche de la santé publique (Newton et al., 2020).", "statut": "◆"}, {"fr": "sobriété comme produit de sortie", "en": "sufficiency as output (not input)", "doc_code": "F2", "definition": "Concept clé de Hamant : la sobriété ne doit pas être la contrainte d'entrée mais le produit de sortie. Quand la sobriété s'hybride avec le culte de la performance, elle produit de l'efficience énergétique — des avions sobres en kérosène qui transportent de l'ultra-fast fashion, des SUV électriques, des effets rebonds généralisés. À l'inverse, un objet réparable (non sobre, plus gros, avec des boulons) génère de la sobriété comme résultat : il dure, se transmet, crée du lien social. Le sol vivant suit la même logique : il n'est pas sobre (il est redondant, diversifié, exubérant), mais il produit de la sobriété systémique en éliminant le besoin d'intrants.", "statut": "◆"}, {"fr": "sobriété récupérée (effet rebond)", "en": "rebound effect (recovered sobriety)", "doc_code": "F2", "definition": "Mécanisme par lequel la sobriété, hybridée au culte de la performance, produit de l'efficience qui libère des ressources pour encore plus de consommation (Hamant). L'avion sobre en kérosène transporte de l'ultra fast fashion. Le SUV électrique pèse 2.5 tonnes. L'écran basse consommation fait 65 pouces. La sobriété comme contrainte d'entrée produit de l'ébriété. La sobriété doit être le produit de sortie (objets réparables → durabilité → sobriété émergente), pas la contrainte d'entrée.", "statut": "◆"}, {"fr": "technodiversité", "en": "technodiversity", "doc_code": "F2", "definition": "Maintien de la diversité des technologies et savoir-faire dans un territoire, par analogie avec la biodiversité (Hamant). Le monde de la performance est technophobe (une technologie performante écrase les autres). Le monde de la robustesse est technophile (on garde tout ce qui est robuste). Exemples : terre crue + impression 3D, bokashi + métabarcoding.", "statut": "◆"}, {"fr": "transformation par les marges", "en": "transformation from the margins", "doc_code": "F2", "definition": "Loi de transformation des systèmes complexes (Hamant, d'après les nuées d'étourneaux). Ce sont toujours les acteurs à la périphérie — les premiers exposés aux fluctuations — qui guident le changement. La marge contamine le cœur. En agriculture : les pionniers ACS/MSV (marge) contaminent l'agriculture conventionnelle (cœur). Mélanges variétaux : 5% en 2010 → 40% en 2020.", "statut": "◆"}, {"fr": "résilience", "en": "resilience", "doc_code": "F2/P1", "definition": "Vitesse à laquelle un sol retrouve son fonctionnement optimal après une perturbation (Bommarco et al., 2012). Distinct de la résistance (ne pas être affecté) et de l'antifragilité (s'améliorer). Les réseaux mycorhiziens (CMN) agissent comme des pipelines de secours pour l'eau en période de stress (Simard, 2018). Un sol résilient sécurise les rendements en contexte climatique instable (Vialatte et al., 2023).", "statut": "◆"}, {"fr": "homéostasie du sol", "en": "soil homeostasis", "doc_code": "F2/S1", "definition": "Capacité du sol à maintenir des conditions internes stables (pH, T°, humidité, activité biologique) malgré les variations extérieures. Un sol nu perd son homéostasie en quelques heures lors de pics thermiques, tuant la biologie de surface (Feng et al., 2025). Levier : mulch permanent pour stabiliser les conditions du microbiome de surface. Distinct de l'homéostasie microbienne (stœchiométrie interne des micro-organismes).", "statut": "◆"}, {"fr": "Chaîne 2 — Haber-Bosch → Maladie chronique", "en": "Chain 2 — Haber-Bosch to chronic disease", "doc_code": "F2/S2/S3/S4/V2/H1/H2/H3", "definition": "F2: Azote Haber-Bosch (EROI négatif) → S2: Déséquilibre copiotrophes/oligotrophes, effondrement de la diversité → S3: Dégradation des réseaux CMA → S4: Priming Effect sur le COS, déstockage → V2: Loi de la Trophobiose, vulnérabilité phytosanitaire → H1: Dilution de la densité nutritionnelle → H2: Pression de sélection des ARG par antibiotiques compensatoires → H3: Appauvrissement du microbiome intestinal. La chaîne de dégradation : chaque maillon a un coût caché non comptabilisé dans le prix de marché.", "statut": "◆"}, {"fr": "Bio-accessibilité et Chélation Naturelle", "en": null, "doc_code": "H", "definition": "Aptitude des nutriments contenus dans l'aliment à être libérés de la matrice alimentaire et absorbés par l'intestin, facilitée par les complexes organiques (chélates) formés par la biologie du sol (Montgomery et al., 2022; White, 2018).\n\nEnjeu : Un fer ou un zinc \"bio-fortifié\" biologiquement par le sol est mieux assimilé qu'un supplément minéral de synthèse (Montgomery et al., 2022).\n\nLevier de décision : Stimuler les bactéries sidérophores (solubilisatrices de fer) pour améliorer naturellement la qualité minérale biodisponible des produits (Delaporte‐Quintana et al., 2020).", "statut": "◆"}, {"fr": "Biodisponibilité", "en": null, "doc_code": "H", "definition": "Fraction d'un nutriment ingéré qui est réellement absorbée et utilisée par l'organisme.\n\nEnjeu : La présence de métabolites microbiens et de chélates naturels dans les aliments issus de sols vivants favorise leur absorption intestinale (White, 2018).", "statut": "◆"}, {"fr": "Biofortification biologique", "en": null, "doc_code": "H", "definition": "Amélioration de la teneur en nutriments des plantes via la stimulation de la biologie du sol (mycorhizes, PGPR) plutôt que par enrichissement chimique (Montgomery et al., 2022).\n\nEnjeu : Les micro-organismes comme les bactéries solubilisatrices ou les champignons mycorhiziens augmentent l'extraction des oligo-éléments du sol vers la plante (Delaporte‐Quintana et al., 2020; Martin, 2017; Simard, 2018).", "statut": "◆"}, {"fr": "LPS", "en": null, "doc_code": "H", "definition": "Endotoxines issues de la paroi des bactéries Gram-négatives(Vors, 2012). Leur passage dans le sang (endotoxémie) déclenche une inflammation chronique de bas grade (Cani et al., 2007).\n\nEnjeu : Un déséquilibre du microbiome intestinal (dysbiose) augmente la charge en LPS circulants.", "statut": "◆"}, {"fr": "Leaky gut", "en": null, "doc_code": "H", "definition": "Altération de la barrière muqueuse laissant passer des toxines ou des pathogènes dans le sang (Chelakkot, 2018).\n\nEnjeu : Souvent induit par une alimentation pauvre en nutriments ou contenant des résidus de pesticides qui perturbent l'équilibre microbien.", "statut": "◆"}, {"fr": "Microbiome (ou Microbiote) intestinal", "en": null, "doc_code": "H", "definition": "Communauté de micro-organismes résidant dans l'appareil digestif humain, dont la diversité est influencée par le microbiome des aliments consommés (Ma et al., 2025; Rosier et al., 2025).\n\nEnjeu : Un microbiome intestinal appauvri est lié à l'obésité, au diabète et aux maladies inflammatoires (Ananthakrishnan, 2015; Cani et al., 2007).\n\nLevier de décision : Favoriser la consommation d'aliments \"vivants\" (lactofermentés, issus de sols régénérés) pour entretenir la diversité du microbiote intestinal.", "statut": "◆"}, {"fr": "Pression de sélection", "en": null, "doc_code": "H", "definition": "Force environnementale (pH, toxiques, azote massif) qui élimine les espèces fragiles et favorise les plus résistantes (souvent des pathogènes r-stratèges) (Fierer et al., 2007; Philippot, 2013).\n\nEnjeu : En agriculture conventionnelle, la pression de sélection chimique appauvrit le microbiome, ne laissant que des espèces opportunistes potentiellement néfastes pour l'humain.", "statut": "◆"}, {"fr": "SCFA (Acides gras à chaîne courte : Butyrate, Propionate, Acétate)", "en": null, "doc_code": "H", "definition": "Métabolites produits par la fermentation des fibres (prébiotiques) par les bactéries intestinales.\n\nEnjeu : Le butyrate est la source d'énergie principale des colonocytes et assure l'étanchéité de la muqueuse intestinale (Chelakkot, 2018).\n\nLevier de décision : Produire des végétaux riches en polysaccharides complexes (inuline, fructanes) pour maximiser la production de SCFA dans l'intestin.", "statut": "◆"}, {"fr": "One Health", "en": "One Health", "doc_code": "H1", "definition": "Approche intégrée (OMS/OIE/FAO) reconnaissant l interdependance des santés humaine, animale et environnementale. Cadre liant santé des sols, écosystèmes, animaux et humains. Clé pour comprendre les liens alimentation-santé et le rôle des pratiques agricoles sur la santé publique.", "statut": "✓"}, {"fr": "axe sol-plante-homme", "en": "soil-plant-human continuum", "doc_code": "H1", "definition": "Continuum fonctionnel large liant santé du sol, qualité nutritionnelle et santé humaine. Cadre conceptuel englobant. Voir entrée H — Axe sol-plante-goût (SPG) pour le mécanisme de transfert microbien spécifique (Ma et al., 2025).", "statut": "≈"}, {"fr": "biofortification par le sol vivant", "en": "biofortification through living soil", "doc_code": "H1", "definition": "Enrichissement naturel des aliments en micronutriments (Fe, Zn, Se, vitamines B) par l action combinée des CMA (transport P, Zn, Cu), des PGPR (solubilisation Fe, Mn) et de la diversité microbienne du sol vivant. Alternative à la biofortification agronomique (engrais enrichis) ou génétique (sélection variétale).", "statut": "◆"}, {"fr": "densité nutritionnelle", "en": "nutrient density", "doc_code": "H1", "definition": "Concentration en micronutriments (minéraux, vitamines) et métabolites secondaires (polyphénols, antioxydants) des aliments. Les sols régénératifs produisent des cultures à densité nutritionnelle supérieure aux sols conventionnels : +30-50% en polyphénols, +20% en minéraux biodisponibles, synthèse de vitamines B par le microbiome (Rosier et al., 2025 — meilleur indicateur proxy de la santé du sol ; Montgomery et al., 2022). L'effet de dilution (excès d'azote + croissance rapide) est la cause principale de la baisse de densité nutritionnelle observée depuis 1950.", "statut": "✓"}, {"fr": "effet de dilution", "en": "dilution effect", "doc_code": "H1", "definition": "Diminution de la concentration en micronutriments et métabolites secondaires à mesure que le rendement augmente (fertilisation azotée intensive + sélection variétale volume). Un grain de blé contenant 30% plus d'eau et d'amidon qu'en 1950 présente mécaniquement des concentrations relatives moindres en zinc, fer, protéines et antioxydants. Cause principale de la 'faim cachée' (Rosier et al., 2025 ; Montgomery et al., 2022).", "statut": "◆"}, {"fr": "flavonoïdes", "en": "flavonoids", "doc_code": "H1", "definition": "Sous-classe majeure de polyphénols aux propriétés anti-inflammatoires, antivirales et antioxydantes. Produits par la voie ISR/SAR déclenchée par le microbiome du sol. Marqueurs de densité nutritionnelle des aliments issus de sols vivants.", "statut": "◆"}, {"fr": "polyphénols", "en": "polyphenols", "doc_code": "H1", "definition": "Composés antioxydants et anti-inflammatoires synthétisés par les plantes en réponse aux signaux du microbiome du sol (voies ISR/SAR). Leur production est maximale dans les systèmes biologiquement riches et avec stress modérés (hormèse). Déclin de 20-40% observé dans les cultures conventionnelles depuis 1950.", "statut": "✓"}, {"fr": "vitamine B12", "en": "vitamin B12", "doc_code": "H1", "definition": "Vitamine synthétisée exclusivement par des micro-organismes (bactéries du sol, bactéries intestinales). Assimilable par les plantes via la rhizosphère et transmise à l'homme via la consommation. Les sols biologiquement actifs produisent des légumes naturellement enrichis en vitamines B (B12, B9, B1).", "statut": "≈"}, {"fr": "services écosystémiques de régulation", "en": "regulatory ecosystem services", "doc_code": "H1/F2", "definition": "Services rendus par les sols vivants : filtration et dépollution des eaux, régulation du cycle de l'azote, séquestration carbone, atténuation des inondations, régulation thermique locale. Non marchands mais quantifiables : plusieurs milliers €/ha/an. Base de l'argument économique de la transition régénératrice.", "statut": "◆"}, {"fr": "phytochimie fonctionnelle", "en": "functional phytochemistry", "doc_code": "H1/H2", "definition": "Ensemble des composés bioactifs secondaires synthétisés par les plantes en interaction avec leur microbiome (polyphénols, flavonoïdes, terpènes, glucosinolates, anthocyanes). Production maximale dans les systèmes biologiquement riches et avec stress modérés. Ces molécules sont les principaux agents de santé des aliments végétaux. Voir sous-entrées : polyphénols, flavonoïdes.", "statut": "◆"}, {"fr": "synergie des phytochimiques", "en": "phytochemical synergy", "doc_code": "H1/H2", "definition": "Les nutriments et métabolites secondaires d'un aliment entier exercent des effets protecteurs plus efficaces consommés ensemble que séparément. Explique l'échec relatif des supplémentations mono-éléments vs la protection apportée par les aliments entiers issus de sols vivants.", "statut": "◆"}, {"fr": "axe sol-plante-goût (SPG)", "en": "soil-plant-gut axis", "doc_code": "H1/H2/H3", "definition": "Continuum de transfert bidirectionnel micro-organismes et métabolites : sol → endophytes végétaux → microbiote intestinal humain lors de la consommation d'aliments. Service de vaccination microbienne silencieuse : consommer des aliments issus de sols biologiquement diversifiés entretient la diversité du microbiote intestinal. Ma et al. (2025) ; Duarte et al. (2024). Sous-ensemble de l axe sol-plante-homme focalisé sur les composés aromatiques, les polyphénols et la densité en micronutriments. SPG = dimension sensorielle et nutritionnelle de la chaîne sol-alimentation.", "statut": "◆"}, {"fr": "exposome cumulé", "en": "cumulative exposome", "doc_code": "H1/H3", "definition": "Somme totale des expositions environnementales d'un individu (pesticides, métaux, perturbateurs endocriniens) via l'alimentation, l'air, l'eau et le contact cutané. L'agriculture régénératrice réduit l'exposome des populations locales au-delà des résidus alimentaires : qualité de l'air et des eaux de surface (Rebouillat, 2021 ; Cognez, 2020).", "statut": "◆"}, {"fr": "phyto-élicitation par le sol", "en": "soil-induced phyto-elicitation", "doc_code": "H1/V2", "definition": "Stimulation de la synthèse des métabolites secondaires de la plante (polyphénols, flavonoïdes, antioxydants) déclenchée par les signaux biochimiques du microbiome du sol via les voies ISR/SAR. Les sols biologiquement actifs, en maintenant une pression biotique positive sur les racines, amplifient la qualité nutritionnelle et sanitaire des récoltes. Feliziani et al. (2025) valident l'interconnexion entre agriculture régénératrice et prévention des maladies métaboliques.", "statut": "◆"}, {"fr": "axe intestin-cerveau", "en": "gut-brain axis", "doc_code": "H2", "definition": "Communication bidirectionnelle entre le microbiome intestinal et le système nerveux central via le nerf vague, les métabolites microbiens (SCFA, tryptophane), les neurotransmetteurs (90% de la sérotonine produite dans l'intestin), et le système immunitaire muqueux. Impliqué dans la dépression, l'anxiété et les troubles neurodégénératifs.", "statut": "◆"}, {"fr": "biodiversity hypothesis", "en": "biodiversity hypothesis", "doc_code": "H2", "definition": "Extension de l'hypothèse hygiéniste : la perte de biodiversité environnementale (sols appauvris, alimentation industrielle) réduit la résilience immunitaire des populations humaines (Rook, 2011 ; 2013). Prédirait une augmentation des maladies auto-immunes corrélée avec la simplification des agroécosystèmes.", "statut": "◆"}, {"fr": "co-évolution sol-microbiome-humain", "en": "soil-microbiome-human co-evolution", "doc_code": "H2", "definition": "Interdépendance évolutive entre microbiotes du sol et microbiote intestinal humain, co-évoluant depuis des millions d'années au contact des mêmes phyla microbiens. La transition vers des environnements urbains et une agriculture 'stérile' a rompu ce contact, corrélée à l'émergence de maladies auto-immunes (hypothèse hygiéniste, Rook, 2011).", "statut": "◆"}, {"fr": "dysbiose", "en": "dysbiosis", "doc_code": "H2", "definition": "Perturbation qualitative et/ou quantitative de la composition du microbiote intestinal. Associée à la perte de diversité (chute de Chao1 intestinal), à la dominance de pathobiontes et à l'augmentation de la perméabilité intestinale (leaky gut). Facteurs : antibiotiques, alimentation ultra-transformée, stress chronique.", "statut": "◆"}, {"fr": "hygiene hypothesis", "en": "hygiene hypothesis", "doc_code": "H2", "definition": "L'exposition réduite aux micro-organismes environnementaux (sols, végétaux, animaux) dans les pays industrialisés est corrélée à l'augmentation des maladies allergiques et auto-immunes. Le contact avec la biodiversité microbienne du sol éduque le système immunitaire. L'alimentation issue de sols régénératifs = 'inoculation' du microbiote intestinal depuis le microbiome local.", "statut": "◆"}, {"fr": "microbiome global", "en": "global microbiome", "doc_code": "H2", "definition": "Interconnexion des microbiomes sol, rhizosphère, plante, intestin humain et poumon. Même phyla dominants (Firmicutes, Proteobacteria, Actinobacteria), mêmes voies métaboliques fermentaires conservées depuis l'Archéen. Fondement de l'approche One Microbiome et de l'hypothèse hygiéniste (Rook, 2011).", "statut": "◆"}, {"fr": "microbiome intestinal", "en": "gut microbiome", "doc_code": "H2", "definition": "Communauté microbienne du tube digestif humain (>10¹³ cellules, >1 000 espèces). Sa diversité est directement influencée par la diversité microbienne des aliments consommés (continuum sol→aliment→intestin). Un microbiome intestinal appauvri est lié à l'obésité, au diabète et aux maladies inflammatoires (Ananthakrishnan, 2015 ; Cani et al., 2007).", "statut": "✓"}, {"fr": "microbiome pulmonaire", "en": "lung microbiome", "doc_code": "H2", "definition": "Communauté microbienne des voies respiratoires basses (< 10⁶ bactéries/g de tissu). Modulé par les particules microbiennes de l'air et par l'environnement agricole. Lien documenté entre exposition aux micro-organismes des sols sains et réduction des allergies respiratoires (hypothèse hygiéniste).", "statut": "◆"}, {"fr": "probiotiques", "en": "probiotics", "doc_code": "H2", "definition": "Micro-organismes vivants (Lactobacillus, Bifidobacterium) qui, administrés en quantité adéquate, confèrent un bénéfice pour la santé de l'hôte. Sources alimentaires : kéfir, kimchi, miso, tempeh, yaourt. Distinction avec les aliments fermentés qui ne contiennent pas tous des probiotiques viables.", "statut": "◆"}, {"fr": "prébiotiques", "en": "prebiotics", "doc_code": "H2", "definition": "Substrats alimentaires non digestibles (FOS, GOS, inuline, fibres fermentescibles) qui stimulent sélectivement la croissance ou l'activité de micro-organismes bénéfiques du microbiote intestinal. Les polyphénols végétaux sont reconnus comme prébiotiques émergents.", "statut": "◆"}, {"fr": "ratio Firmicutes/Bacteroidetes", "en": "Firmicutes/Bacteroidetes ratio (gut)", "doc_code": "H2", "definition": "Rapport entre les deux phyla bactériens dominants du microbiote intestinal. Un ratio F/B élevé est associé à l'obésité et au syndrome métabolique. Analogue au ratio copiotrophes/oligotrophes du sol — même logique de dominance écologique.", "statut": "◆"}, {"fr": "transfert sol-microbiote intestinal", "en": "soil-to-gut microbial transfer", "doc_code": "H2", "definition": "Transfert direct de micro-organismes et de gènes de résistance du sol vers le microbiote humain via les endophytes des plantes consommées. Mécanisme : les bactéries endophytes colonisent les tissus végétaux via le cycle de la rhizophagie (V2) et sont transmises à l'homme lors de la consommation d'aliments crus ou peu transformés. Ma et al. (2025) fondent scientifiquement l'axe sol-plante-intestin comme pilier de la santé humaine. Duarte et al. (2024) analysent le rôle des phytochimiques des légumineuses dans ce transfert.", "statut": "◆"}, {"fr": "AMR", "en": "antimicrobial resistance (AMR)", "doc_code": "H3", "definition": "Résistance des pathogènes aux antibiotiques. Crise sanitaire mondiale amplifiée par l'usage d'antibiotiques vétérinaires en élevage industriel et la transmission sol-plante-intestin du résistome (Ma et al., 2025). L'agriculture régénératrice réduit la pression de sélection via la diversité microbienne et l'absence d'antibiotiques dans les préparations.", "statut": "≈"}, {"fr": "ARG (gènes de résistance aux antibiotiques)", "en": "ARG (antibiotic resistance genes)", "doc_code": "H3", "definition": "Gènes codant des mécanismes de résistance aux antibiotiques, présents naturellement dans le résistome du sol mais amplifiés par l usage d antibiotiques vétérinaires et les épandages de lisiers. Transférables horizontalement entre bactéries via plasmides, transposons et intégrons.", "statut": "◆"}, {"fr": "inoculation du microbiome par l'achat local", "en": "local microbiome inoculation via food", "doc_code": "H3", "definition": "Concept du Corpus Le Sol Vivant cet Holobionte : l'achat local est une forme d'inoculation du microbiome intestinal par le microbiome local du terroir. Les aliments issus de sols locaux transmettent des micro-organismes et des métabolites adaptés à l'environnement microbien de la région, diversifiant et renforçant le microbiome intestinal du consommateur local.", "statut": "◆"}, {"fr": "suppressivité comme alternative aux antibiotiques", "en": "soil suppressiveness as antibiotic alternative", "doc_code": "H3", "definition": "Concept clé : un sol vivant avec une forte suppressivité naturelle réduit la pression pathogène sur les plantes et les animaux, diminuant le recours aux antibiotiques vétérinaires et phytosanitaires. Boucle vertueuse : moins d antibiotiques → moins d ARG → résistome contrôlé.", "statut": "◆"}, {"fr": "transfert horizontal de gènes", "en": "horizontal gene transfer (HGT)", "doc_code": "H3", "definition": "Échange de matériel génétique entre organismes non apparentés, mécanisme majeur de la propagation des gènes de résistance aux antibiotiques (ARG) entre bactéries du sol et pathogènes humains (Ma et al., 2025).", "statut": "~"}, {"fr": "résistome", "en": "resistome", "doc_code": "H3/S2", "definition": "Ensemble des gènes de résistance aux antibiotiques (ARG) d'une communauté microbienne, y compris les gènes cryptiques non encore exprimés. Le sol agricole est un réservoir majeur du résistome en raison de l'usage d'antibiotiques vétérinaires et de la présence naturelle de bactéries productrices d'antibiotiques (Actinobacteria).", "statut": "≈"}, {"fr": "Indice de maturité de Bongers", "en": null, "doc_code": "P1", "definition": "Indicateur basé sur la diversité des nématodes du sol pour évaluer le niveau de perturbation et la santé du réseau trophique (CORPUS SOL VIVANT, 2026).\n\nEnjeu : Révèle si le sol est dominé par des opportunistes (r-stratèges) ou des organismes stables.\n\nLevier de décision : Un indice bas indique un besoin urgent de réduire les perturbations mécaniques et chimiques pour laisser la vie se stabiliser.", "statut": "◆"}, {"fr": "Solvita", "en": "Solvita test", "doc_code": "P1", "definition": "Test colorimétrique de l'activité biologique du sol par mesure du CO₂ dégagé en 24h par un échantillon de sol frais humidifié. Indicateur rapide de la biomasse microbienne active. Interprétation : > 6 = sol très actif ; 3-6 = actif ; < 3 = faible activité biologique.", "statut": "◆"}, {"fr": "VESS", "en": "visual evaluation of soil structure (VESS)", "doc_code": "P1", "definition": "Score de 1 à 5 évaluant la qualité structurale du sol par observation directe d'un bloc de terre extrait à la bêche (20-25 cm de profondeur). Sq1 : agrégats arrondis et poreux — excellente structure. Sq2 : agrégats friables — bonne structure. Sq3 : mottes avec quelques fissures — dégradation débutante. Sq4 : mottes anguleuses lisses — compactage signficatif. Sq5 : bloc massif, imperméable — compactage sévère. Score > 3 : barrière physique à l'enracinement nécessitant une biopuncture ou un arrêt total du trafic lourd (Boizard et al., 2019 ; Olivares et al., 2023).", "statut": "~"}, {"fr": "arbre de décision diagnostic", "en": "diagnostic decision tree", "doc_code": "P1", "definition": "Outil structuré pour le diagnostic du sol vivant : parcourir la cascade N0→N5 en vérifiant chaque niveau. Si N0 (eau) non satisfait → inutile de traiter N4 (microbiome). Le diagnostic suit la logique des prérequis : corriger le problème le plus fondamental d abord.", "statut": "◆"}, {"fr": "entonnoir de Baermann", "en": "Baermann funnel", "doc_code": "P1", "definition": "Dispositif d'extraction des nématodes du sol par migration dans l'eau à travers un tamis. Permet d'inventorier les guildes trophiques de nématodes (bactérivores, fongivores, omnivores, prédateurs, phytoparasites) nécessaires au calcul de l'indice de maturité de Bongers.", "statut": "◆"}, {"fr": "indicateurs biologiques", "en": "biological soil indicators", "doc_code": "P1", "definition": "Paramètres mesurables reflétant la santé biologique du sol. Hiérarchie d'escalade : niveau 1 — observation terrain (VESS, test bêche, collemboles visibles) ; niveau 2 — tests terrains (<50€ : Solvita, test ficelle GEPPA) ; niveau 3 — laboratoire (PLFA, Chao1, biomasse ATP, indice de Bongers).", "statut": "≈"}, {"fr": "plantes bio-indicatrices", "en": "bio-indicator plants", "doc_code": "P1", "definition": "Flore spontanée dont la présence indique les conditions pédologiques (engorgement, compaction, excès d azote, acidité). Références : Gérard Ducerf. Le plantain (compaction), le rumex (engorgement), le mouron (sol riche en N). Complément du diagnostic physique et chimique.", "statut": "◆"}, {"fr": "profil cultural", "en": "cultural profile", "doc_code": "P1", "definition": "Méthode de diagnostic par ouverture d'une fosse ou tranchée pour analyser les horizons du sol, l'historique des pratiques (semelles de labour, zones compactées), la dynamique racinaire et l'activité biologique. Permet de visualiser la structure en 3D.", "statut": "◆"}, {"fr": "pénétrométrie", "en": "penetrometry", "doc_code": "P1", "definition": "Mesure de la résistance mécanique du sol à la pénétration (en MPa). Permet de localiser les semelles de labour et les zones de compaction. Seuil critique : >2 MPa = enracinement bloqué. Variabilité selon l'humidité — toujours mesurer à capacité au champ.", "statut": "◆"}, {"fr": "ratio stœchiométrique NPS (Kirkby)", "en": "NPS stoichiometric ratio (Kirkby)", "doc_code": "P1", "definition": "Pour 1 tonne de C humifié, il faut 83 kg N + 20 kg P + 14 kg S (Kirkby et al.). En apportant NPS en stœchiométrie sur les résidus de culture, le coefficient d'humification passe de 0.15 à 0.60 en 5 ans (+5.5 tC/ha vs -3 tC/ha sans NPS). Levier le plus puissant et le moins connu pour accélérer la séquestration de carbone. Permet de basculer les micro-organismes de stratégie A vers stratégie Y.", "statut": "◆"}, {"fr": "respiration basale du sol", "en": "basal soil respiration", "doc_code": "P1", "definition": "Quantité de CO₂ dégagée par unité de sol et de temps, mesure de l'activité métabolique globale du microbiome. Test Solvita : mesure en 24h. Valeurs types : sol vivant 50–150 mg CO₂/kg/j, sol dégradé < 20 mg CO₂/kg/j.", "statut": "◆"}, {"fr": "test bêche (VESS)", "en": "VESS (Visual Evaluation of Soil Structure)", "doc_code": "P1", "definition": "Diagnostic de terrain par prélèvement et observation d'un bloc de sol à 25-30 cm. Évalue simultanément la structure (mottes, fissures), l'enracinement (profondeur, ramification), la présence de vers de terre et la couleur (teneur en MO). Premier niveau de diagnostic avant toute analyse de laboratoire.", "statut": "◆"}, {"fr": "test de sédimentation (test bocal)", "en": "jar sedimentation test", "doc_code": "P1", "definition": "Mise en suspension du sol dans l'eau pour estimer les proportions de sable (décante en 30s), limon (2h) et argile (24h). Méthode terrain rapide pour évaluer la texture et adapter les recommandations (CEC, RU, risque de battance).", "statut": "◆"}, {"fr": "test ficelle GEPPA", "en": "GEPPA ribbon test", "doc_code": "P1", "definition": "Test de terrain du Groupe d'Étude Pour les Problèmes de Pédologie Appliquée pour estimer la teneur en argile du sol. Humidifier une poignée de terre et former un boudin de 5-10 cm : s'il peut être courbé en anneau sans se rompre → > 18% d'argile. La plasticité et la cohésion orientent l'adaptation des pratiques (travail du sol, amendements). Gratuit, immédiat, accessible à tous les agriculteurs.", "statut": "◆"}, {"fr": "ratio C/Argile", "en": "carbon-to-clay ratio", "doc_code": "P1/S1/P5", "definition": "Rapport C organique/argile. Seuils Husson/Boivin : <12% dégradé, 17% limite, >24% bonne structure.", "statut": "validé"}, {"fr": "PLFA", "en": "phospholipid fatty acid analysis (PLFA)", "doc_code": "P1/S2", "definition": "Analyse des acides gras phospholipidiques des membranes cellulaires microbiennes vivantes (les PLFA se dégradent en quelques heures après la mort des cellules — pas de signal des cellules mortes). Fournit : (1) biomasse microbienne totale vivante (nmol PLFA/g sol), (2) ratio Fungi/Bacteria (F/B), (3) structure des guildes (Gram+, Gram-, champignons, actinobactéries), (4) marqueurs de stress microbien (ratio cy17:0/16:1ω7). Référence pour évaluer l'impact des pratiques (Norris et al., 2023 ; Brinton, 2020 ; Drenovsky et al., 2004).", "statut": "✓"}, {"fr": "respiration du sol", "en": "soil respiration", "doc_code": "P1/S2", "definition": "Flux de CO2 émis par le sol, intégrant la respiration microbienne (hétérotrophe) et racinaire (autotrophe). Mesurée par FDA (fluorescéine diacétate) ou respiromètre. Indicateur de l'activité biologique totale et du turnover de la MO. Varie de 0 (sol inerte) à >10 µg CO2-C·g⁻¹·h⁻¹ (sol très actif).", "statut": "◆"}, {"fr": "Chaîne 5 — Diagnostic terrain → Trajectoire économique", "en": "Chain 5 — Soil diagnosis to economic trajectory", "doc_code": "P1/S2/S4/P2/P3/P5/F2", "definition": "P1: Diagnostic VESS, PLFA, Chao1, COS → S2: Interprétation via guildes fonctionnelles et ratio copiotrophes/oligotrophes → S4: Positionnement sur la courbe RothC → P2: Choix pratiques ACS adaptés → P3: Biostimulants selon le déficit microbien identifié → P5: Positionnement sur chronoséquence des 4 phases, objectifs +0,1% MO/an → F2: Traduction économique : réduction charges, crédits carbone, capital biologique. Le parcours praticien complet : du diagnostic à la décision au résultat économique. Chaîne manquante pour que le praticien connaisse la rentabilité de la transition.", "statut": "◆"}, {"fr": "ACS", "en": "conservation agriculture (CA)", "doc_code": "P2", "definition": "Agriculture de Conservation des Sols — trio indissociable : semis direct / couverture végétale permanente / rotations diversifiées (Carpentier et al., 2020). Règle : ne jamais supprimer un seul pilier — l'équilibre du système repose sur leur synergie pour maintenir la structure (Trabelsi, 2017). Equivalent français du no-till farming.", "statut": "✓"}, {"fr": "Agriculture de Conservation des Sols", "en": null, "doc_code": "P2", "definition": "Modèle reposant sur trois piliers indissociables : absence de travail du sol, couverture végétale permanente et rotation diversifiée(Carpentier et al., 2020).\n\nEnjeu : Préserver l'habitat des micro-organismes contre l'oxydation brutale provoquée par le labour(Trabelsi, 2017).\n\nLevier de décision : Ne jamais supprimer un pilier (ex: supprimer le couvert en gardant le non-labour), car l'équilibre du système repose sur leur synergie pour maintenir la structure (Rabot, 2018).", "statut": "◆"}, {"fr": "Bandes Fleuries et Zones de Biodiversité", "en": null, "doc_code": "P2", "definition": "Aménagements de bordures riches en espèces nectarifères hébergeant les auxiliaires de culture", "statut": "◆"}, {"fr": "Bio-inoculants et Extraits Fermentés (JMS / LiFoFer)", "en": null, "doc_code": "P2", "definition": "Préparations biologiques à base de microorganismes indigènes multipliés à la ferme pour restaurer la diversité du microbiome", "statut": "◆"}, {"fr": "Biomasse annuelle", "en": null, "doc_code": "P2", "definition": "Quantité totale de matière organique (aérienne et racinaire) produite par hectare et par an. Les systèmes régénératifs visent 15 à 25 tonnes de matière sèche/ha/an (faire des recherches pour étayer ce point nd.).\n\nEnjeu : Maximiser la capture de l'énergie solaire pour nourrir le bioréacteur microbien via la rhizodéposition (Pascale, 2020).\n\nLevier de décision : Ne jamais laisser de \"fenêtre vide\" dans le calendrier. Chaque jour sans photosynthèse est une perte de capital biologique et de stockage de carbone (Schmidt et al., 2011; Villat & Nicholas, 2024).", "statut": "◆"}, {"fr": "Faim d'azote", "en": "nitrogen immobilization", "doc_code": "P2", "definition": "Séquestration temporaire de l'azote minéral par les microbes décomposant des résidus à fort ratio C/N (ex: paille, BRF) (Robertson & Groffman, 2014).\n\nEnjeu : Peut pénaliser la culture suivante si l'azote n'est pas ggéré(Jardim et al., 2023)\n\nLevier de décision : Anticiper en associant des légumineuses aux résidus carbonés ou en pratiquant un enfouissement léger pour accélérer le recyclage biologique (Fred & Harold, 2021; Robertson & Groffman, 2014).", "statut": "◆"}, {"fr": "Indice d’Aire Foliaire", "en": null, "doc_code": "P2", "definition": "Mesure de la surface totale des feuilles par unité de surface au sol. En agriculture régénératrice, l'objectif est de maximiser le LAI sur la plus longue période possible de l'année (Laurent, 2012; Pascale, 2020).\n\nEnjeu : Un LAI élevé garantit une interception maximale de l'énergie solaire, moteur de la rhizodéposition qui nourrit le microbiome (Pascale, 2020; Villat & Nicholas, 2024).\n\nLevier de décision : Utiliser des couverts multi-étagés (ex : association de graminées hautes et de trèfles rampants) pour saturer l'espace foliaire et optimiser le pompage de carbone (Vialatte et al., 2023).", "statut": "◆"}, {"fr": "Roulage-crimping", "en": null, "doc_code": "P2", "definition": "Technique de destruction mécanique des couverts végétaux à l'aide d'un rouleau fâcheur qui pince la tige sans la couper, créant un mulch protecteur au sol(Canali et al., 2015; Hardy, 2019).\n\nEnjeu : Terminer le couvert sans chimie tout en conservant une barrière physique contre l'évaporation et les adventices.\n\nLevier de décision : Intervenir au stade \"floraison\" des espèces du couvert pour garantir une destruction efficace et éviter les repousses dans la culture suivante(Vincent-Caboud, 2020).", "statut": "◆"}, {"fr": "SCV", "en": "direct seeding mulch-based cropping system", "doc_code": "P2", "definition": "Semis Direct sous Couverture Végétale — système ACS complet associant les 3 piliers indissociables : absence de travail du sol, semis direct, couverture permanente par mulch ou couvert vivant. Standard de l'agriculture de conservation tropicale (CIRAD). Preserve la macroporosité biologique, les réseaux mycorhiziens et la structure des agrégats.", "statut": "≈"}, {"fr": "biopuncture", "en": "bio-drilling", "doc_code": "P2", "definition": "Décompaction biologique utilisant des plantes à racines pivotantes (radis daikon, mélilot, luzerne, navette) pour percer les horizons compactés et créer des macropores permanents. Les biopores créés sont tapissés de mucilages et de MO, constituant des guides préférentiels stables pour les racines suivantes. Alternative biologique au sous-solage qui détruit les réseaux fongiques.", "statut": "◆"}, {"fr": "couvert biomax", "en": "biomax cover crop mix", "doc_code": "P2", "definition": "Mélange 5-11 sp. haute densité. Jusqu'à 10 t MS/ha, 100-250 kg N/ha. Thomas & Archambeaud 2018.", "statut": "validé"}, {"fr": "couverts végétaux", "en": "cover crops", "doc_code": "P2", "definition": "Cultures intermédiaires couvrant le sol entre deux cultures principales pour assurer les services écosystémiques : couverture anti-érosive, fixation d'azote (légumineuses), alimentation du microbiome en exsudats, restructuration par les racines (pivotantes), enrichissement de la MO. Design optimal : mélanges 10-12 espèces (graminées + légumineuses + crucifères + composées) pour saturer les niches écologiques et maximiser la diversité des exsudats.", "statut": "✓"}, {"fr": "couverture permanente", "en": "permanent soil cover", "doc_code": "P2", "definition": "Maintien d'une couverture végétale vivante ou de résidus toute l'année. Protège l'homéostasie du sol (régulation thermique, évite la dessication), nourrit le microbiome en continu, réduit l'érosion et l'évaporation.", "statut": "◆"}, {"fr": "efficience d utilisation de l azote (NUE)", "en": "nitrogen use efficiency (NUE)", "doc_code": "P2", "definition": "Rapport entre l azote exporté par la culture et l azote total apporté (%). NUE élevée = moins de pertes par lixiviation et dénitrification. Objectif : NUE > 70% en agriculture de conservation.", "statut": "◆"}, {"fr": "plantes hôtes intermédiaires", "en": "nurse crops (mycorrhizal host crops)", "doc_code": "P2", "definition": "Espèces à forte mycotrophie (sorgho, millet, allium, lin) intercalées dans la rotation pour maintenir et amplifier les réseaux CMA. Particulièrement utiles avant cultures mycotrophes sensibles.", "statut": "◆"}, {"fr": "roulage-crimpage", "en": "roller-crimping", "doc_code": "P2", "definition": "Technique de destruction mécanique des couverts végétaux par pincement de la tige (rouleau crimper) sans coupe ni labour, créant un mulch plat protecteur. Intervenir au stade floraison pour garantir une destruction efficace et éviter les repousses (Vincent-Caboud, 2020). Préserve la macroporosité et les réseaux biologiques.", "statut": "◆"}, {"fr": "indice d'aire foliaire (LAI)", "en": "leaf area index (LAI)", "doc_code": "P2/P4", "definition": "Rapport surface foliaire totale / surface de sol sous-jacente. Indicateur de la capacité d'interception solaire et donc de la puissance de la pompe à carbone rhizosphérique. Maximiser le LAI sur la plus longue période possible de l'année, via des couverts multi-étagés, est l'objectif premier : c'est lui qui alimente en exsudats la biologie souterraine.", "statut": "◆"}, {"fr": "chronosequence de regeneration", "en": "regeneration chronosequence", "doc_code": "P2/P5", "definition": "Evolution temporelle des indicateurs biologiques du sol au cours de la transition agroecologique. Permet de definir des trajectoires et seuils de changement significatif.", "statut": "◆"}, {"fr": "cultures de services", "en": "service crops", "doc_code": "P2/P5", "definition": "Espèces végétales cultivées non pour leur valeur marchande directe mais pour les services écosystémiques rendus : fixation d'azote (légumineuses), biopuncture (pivots profonds), rupture des cycles de ravageurs, couverture anti-érosive, alimentation du microbiome. Leur contribution au C stable via les racines est 5× supérieure à celle des résidus de surface (Rasse et al., 2005).", "statut": "◆"}, {"fr": "rotation sur prairie (MSV)", "en": "prairie rotation (MSV)", "doc_code": "P2/P5", "definition": "2 ans prairie + 1 an bâche + 1 an paille. Autonomie MO, casse cycle adventices.", "statut": "validé"}, {"fr": "Chaîne 6 — Diversité des couverts → Résilience immunitaire", "en": "Chain 6 — Cover crop diversity to immune resilience", "doc_code": "P2/S2/S3/V2/H1/H3", "definition": "P2: Couvert multi-espèces saturant les niches écologiques → S2: Augmentation Chao1 et CUE par diversité des exsudats → S3: Renfo
