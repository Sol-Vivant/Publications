ication encore universellement utilisée. Démontré la capacité des anéciques à structurer les paysages via leurs galeries.", "statut": "◆"}, {"fr": "Phagie microbienne", "en": null, "doc_code": "V1", "definition": "Terme générique incluant la rhizophagie, mais aussi la consommation de microbes par la microfaune (protozoaires, nématodes)(Rajalingam et al., 2026).\n\nEnjeu : C'est ce \"broutage\" microbien qui libère l'azote stocké dans les bactéries sous une forme assimilable pour les plantes(Martínez-Reyes et al., 2021).\n\nLevier de décision : Un sol sans prédateurs (protozoaires) est un sol où l'azote reste bloqué dans les bactéries(Martínez-Reyes et al., 2021). La diversité des étages du réseau trophique est donc une condition de la fertilité azotée(Roux et al., 2008).", "statut": "◆"}, {"fr": "Vers de terre", "en": null, "doc_code": "V1", "definition": "Lombrics creusant des galeries verticales permanentes, reliant la surface aux horizons profonds (Bottinelli, 2015).\n\nEnjeu : Ingénieurs du sol qui gèrent à la fois la porosité, le drainage et le mélange de la matière organique(Araujo, 2022; Detrey, 2021)\n\nLevier de décision : Compter les turricules en surface. Un manque de turricules indique une famine (manque de mulch) ou une toxicité (certains fongicides/insecticides) qui bloque la circulation verticale de la fertilité(Fernández et al., 2023; Yasir et al., 2025)", "statut": "◆"}, {"fr": "acariens du sol", "en": "soil mites (Acari)", "doc_code": "V1", "definition": "Micro-arthropodes (0,2–2 mm) comprenant les oribates (décomposeurs de litière, très abondants), les prédateurs (Mesostigmata — régulateurs du réseau trophique) et les détritivores. Bioindicateurs de la santé du sol par leur diversité et leur abondance.", "statut": "◆"}, {"fr": "anéciques", "en": "anecic earthworms", "doc_code": "V1", "definition": "Vers constructeurs de galeries verticales profondes (0-2 m), migrateurs entre la surface et la profondeur. Ingèrent la litière de surface et l'incorporent en profondeur (biomélanges). Créent des biopores permanents tapissés de mucus, assurant la macroporosité biologique et la conductivité hydraulique saturée. Lumbricus terrestris est l'espèce de référence. Extrêmement sensibles au labour : 15 jours de sol nu élimine 90% des anéciques.", "statut": "✓"}, {"fr": "bioturbation", "en": "bioturbation", "doc_code": "V1", "definition": "Remaniement mécanique du sol par l'activité de la faune : enfouissement de la MO (vers anéciques), perforation du sol (acariens, insectes), création de vides (fourmis, termites). Augmente la porosité, l'aération et le contact sol-résidus. Service écosystémique équivalent à un labour doux permanent mais biologique.", "statut": "◆"}, {"fr": "boucle microbienne", "en": "microbial loop", "doc_code": "V1", "definition": "Circuit trophique sol : exsudats racinaires → bactéries → protozoaires brouteurs → libération N/P → absorption végétale. Mécanisme clé de recyclage rapide des nutriments dans la rhizosphère.", "statut": "◆"}, {"fr": "collemboles", "en": "Collembola", "doc_code": "V1", "definition": "Micro-arthropodes (0,1-5 mm) régulateurs majeurs du microbiome du sol : consomment préférentiellement les champignons pathogènes et les hyphes de croissance rapide, tout en épargnant les CMA (qui produisent des composés défensifs). Indicateurs de la richesse du réseau trophique. Densité : 10 000-100 000/m² dans les sols sains.", "statut": "✓"}, {"fr": "drilosphère", "en": "drilosphere", "doc_code": "V1", "definition": "Zone d'influence biochimique autour des galeries de vers de terre. Parois tapissées de mucus et turricules, activité microbienne 10 à 100 fois supérieure au sol adjacent. Hotspot de minéralisation, nitrification et production d'EPS structurants.", "statut": "◆"}, {"fr": "endogés", "en": "endogeic earthworms", "doc_code": "V1", "definition": "Vers géophages vivant dans les horizons minéraux (5-40 cm), se nourrissant de la MO incorporée aux argiles. Créent des galeries horizontales non permanentes. Indicateurs d'une bonne agrégation biologique des horizons de labour.", "statut": "◆"}, {"fr": "facteur de bioturbation", "en": "bioturbation factor", "doc_code": "V1", "definition": "Coefficient quantifiant l intensité du remaniement du sol par la faune (vers, arthropodes). Élevé = mélange actif des horizons, enfouissement de la MO, création de biopores. Indicateur de vitalité faunistique.", "statut": "◆"}, {"fr": "mésofaune", "en": "mesofauna", "doc_code": "V1", "definition": "Organismes du sol de 0,2 à 2 mm : collemboles, acariens, enchytréides. Rôle clé dans la fragmentation de la litière, la régulation des populations microbiennes et la formation des micro-agrégats. Sensibles au labour et aux pesticides — bioindicateurs de la qualité biologique du sol.", "statut": "◆"}, {"fr": "nématodes du sol", "en": "soil nematodes", "doc_code": "V1", "definition": "Vers microscopiques (0,5–5 mm) organisés en guildes trophiques : bactérivores (minéralisation N), fungivores (régulation fongique), prédateurs (top-down), phytoparasites (dégâts racinaires). L'indice de maturité de Bongers (MI) basé sur les nématodes est un bioindicateur de perturbation du sol.", "statut": "◆"}, {"fr": "protozoaires", "en": "protozoa", "doc_code": "V1", "definition": "Eucaryotes unicellulaires du sol (ciliés, flagellés, amibes) représentant 30-50% du turnover bactérien. Libèrent l azote immobilisé dans la biomasse microbienne (boucle microbienne).", "statut": "◆"}, {"fr": "réseau trophique du sol", "en": "soil food web", "doc_code": "V1", "definition": "Ensemble des relations alimentaires entre les organismes du sol : bactéries et champignons (décomposeurs) → protozoaires et nématodes bactérivores (brouteurs) → micro-arthropodes et nématodes prédateurs → macro-arthropodes et vers de terre. La structure du réseau détermine les flux de nutriments et la résilience de l'écosystème.", "statut": "◆"}, {"fr": "turricules", "en": "earthworm casts", "doc_code": "V1", "definition": "Déjections des vers de terre, enrichies en bactéries, azote, phosphore et calcium par rapport au sol adjacent. Micro-agrégats stables, hotspots de diversité microbienne et de disponibilité nutritive. Production : jusqu'à 50 t/ha/an par une communauté de vers abondante.", "statut": "◆"}, {"fr": "épigés", "en": "epigeic earthworms", "doc_code": "V1", "definition": "Vers de surface vivant dans la litière (0-5 cm), petits et pigmentés. Rôle principal : fragmentation et ingestion de la litière (ex : Eisenia fetida, Lumbricus castaneus). Très sensibles aux pesticides et au travail du sol.", "statut": "◆"}, {"fr": "ACC désaminase", "en": "ACC deaminase", "doc_code": "V2", "definition": "Enzyme microbienne (produite par Bacillus, Pseudomonas, Rhizobium) dégradant le précurseur de l'éthylène (ACC) dans les racines, réduisant le stress éthylénique. Améliore la tolérance des plantes aux stress abiotiques (sécheresse, salinité, métaux lourds).", "statut": "◆"}, {"fr": "Bioréacteur microbien", "en": null, "doc_code": "V2", "definition": "Concept qui voit le sol (et particulièrement la rhizosphère) comme un système de transformation biochimique où les microbes convertissent le carbone solaire en nutriments et en humus (Young & Crawford, 2004).\n\nEnjeu : La performance de la ferme dépend de l'efficacité métabolique de ce réacteur, et non de la simple quantité d'engrais apportée.\n\nLevier de décision : Gérer le sol par le \"nourrissage\" (ratio C/N des apports) pour orienter le bioréacteur soit vers la production de nutriments (minéralisation), soit vers la construction de sol (humification) (Zhu et al., 2020).", "statut": "◆"}, {"fr": "Elicitation par les débris microbiens", "en": null, "doc_code": "V2", "definition": "Fragments de parois cellulaires microbiennes (chitine, flagelline) qui, au contact de la plante, simulent une attaque et stimulent une réponse immunitaire préventive (Molefe et al., 2023; Wang et al., 2022).\n\nEnjeu : Permet de maintenir la plante dans un état de \"vigilance\" métabolique sans le coût énergétique d'une véritable infection(Rojas et al., 2014).\n\nLevier de décision : Appliquer des extraits fermentés riches en nécromasse microbienne pour \"vacciner\" biologiquement la culture avant les périodes de pression parasitaire.", "statut": "◆"}, {"fr": "Endophytes", "en": null, "doc_code": "V2", "definition": "Micro-organismes (bactéries ou champignons) qui vivent à l'intérieur même des tissus de la plante sans lui nuire(Barthélémy, 2019).\n\nEnjeu : Ils stimulent l'immunité de la plante de l'intérieur et produisent souvent des hormones de croissance(Chaudhary et al., 2022).\n\nLevier de décision : L'utilisation de semences traitées avec des fongicides systémiques détruit souvent ces endophytes bénéfiques(Ayesha et al., 2021). Privilégier des semences de ferme ou non traitées pour préserver ce capital interne.", "statut": "◆"}, {"fr": "ISR", "en": "induced systemic resistance (ISR)", "doc_code": "V2", "definition": "Résistance systémique induite par les micro-organismes bénéfiques du rhizomicrobiome (PGPR, CMA). Voie de signalisation jasmonate/éthylène. Prépare la plante à résister aux agressions sans activer des défenses coûteuses en énergie. Génère une résistance large spectre (champignons, bactéries, insectes). Produit des polyphénols et flavonoïdes qui améliorent la densité nutritionnelle des aliments. Distinct de la SAR (voie acide salicylique, déclenchée par un pathogène atténué).", "statut": "~"}, {"fr": "Quorum Sensing", "en": "quorum sensing", "doc_code": "V2", "definition": "Communication chimique bactérienne via des molécules signal (acyl-homosérine lactones chez les Gram-négatives, oligopeptides chez les Gram-positives) permettant aux bactéries d'évaluer leur densité et de coordonner des comportements collectifs (formation de biofilms, production d'enzymes, virulence). Cible potentielle du biocontrôle.", "statut": "✓"}, {"fr": "SAR", "en": "systemic acquired resistance (SAR)", "doc_code": "V2", "definition": "Résistance systémique acquise déclenchée par un agent pathogène atténué ou une molécule élicitrice. Voie acide salicylique. Active une protection durable et large spectre dans les tissus distaux. Produit des PR-protéines et accumule des polyphénols. Coût énergétique plus élevé que l'ISR mais protection plus puissante.", "statut": "✓"}, {"fr": "SIREM", "en": null, "doc_code": "V2", "definition": "Mécanisme par lequel la plante émet des exsudats spécifiques pour attirer des microbes capables de résoudre un problème précis (ex : manque de fer ou attaque de pucerons) (Pascale, 2020).\n\nEnjeu : C'est le levier de l'autonomie sanitaire de la plante(Song et al., 2021)\n\nLevier de décision : Ne pas sur-fertiliser. Une plante \"gavée\" de minéraux solubles réduit la diversité de son microbiome et la rend vulnérable aux maladies(Frontini, 2021; Jetter et al., 2025)", "statut": "◆"}, {"fr": "acidification rhizosphérique", "en": "rhizosphere acidification", "doc_code": "V2", "definition": "Abaissement du pH (0.5-2 unités) dans la rhizosphère par excrétion de protons (H⁺) et d acides organiques. Solubilise Fe, Mn, P. Mécanisme clé d acquisition des micronutriments en sols calcaires.", "statut": "◆"}, {"fr": "auxines", "en": "auxins", "doc_code": "V2", "definition": "Hormones végétales de croissance (principalement l'acide indole-3-acétique — AIA) stimulant l'élongation cellulaire et la formation des racines latérales. Synthétisées par les PGPR (Azospirillum, Bacillus) et par les racines. L'acide 3-phényllactique du Bokashi agit en synergie avec le tryptophane (précurseur des auxines) pour amplifier l'enracinement latéral.", "statut": "~"}, {"fr": "cycle de la rhizophagie", "en": "rhizophagy cycle", "doc_code": "V2", "definition": "Cycle par lequel les racines internalisent des bactéries endophytes depuis la rhizosphère dans leurs cellules épidermiques, les soumettent à un stress oxydatif (production de ROS dans la zone de dénudation racinaire) extrayant les nutriments stockés dans les bactéries, puis les expulsent vers la rhizosphère pour qu'elles se rechargent en nutriments du sol avant d'être réinternalisées (White et al., 2018 ; Molefe et al., 2023 ; Rajalingam et al., 2026). Mécanisme de transfert de microbes du sol vers les tissus végétaux : les endophytes produits par la rhizophagie sont ensuite transmis au microbiome intestinal humain via la consommation d'aliments crus — premier maillon de la chaîne sol→intestin.", "statut": "◆"}, {"fr": "cytokinines", "en": "cytokinins", "doc_code": "V2", "definition": "Hormones végétales stimulant la division et la différenciation cellulaire, synthétisées par certains PGPR. Régulent la sénescence des feuilles et la mobilisation des nutriments.", "statut": "◆"}, {"fr": "effet rhizosphère", "en": "rhizosphere effect", "doc_code": "V2", "definition": "Stimulation de l activité microbienne (10-100x) dans la zone racinaire par les exsudats et la mucilage. Représente 10-30% du C photosynthétique alloué. Pilote le recrutement sélectif du microbiome.", "statut": "◆"}, {"fr": "exsudats racinaires", "en": "root exudates", "doc_code": "V2", "definition": "Composés organiques libérés activement par les racines vivantes dans la rhizosphère (sucres simples, acides organiques, acides aminés, mucilages, phénols). 5-40% du C fixé par photosynthèse. Moteur principal de l'activité biologique rhizosphérique : recrutent chimiotactiquement les PGPR, initient la symbiose mycorhizienne, solubilisent le phosphore. La composition des exsudats change selon les besoins de la plante (recrutement sélectif).", "statut": "✓"}, {"fr": "gibbérellines", "en": "gibberellins", "doc_code": "V2", "definition": "Hormones végétales stimulant l'allongement des tiges et la levée de dormance des graines. Synthétisées par certains PGPR (Bacillus, Azospirillum) et champignons. La stimulation de la croissance par les PGPR passe en partie par la production de gibbérellines.", "statut": "✓"}, {"fr": "holobionte", "en": "holobiont", "doc_code": "V2", "definition": "Unité hôte + ensemble de ses micro-organismes associés formant une entité biologique unique et indissociable. La plante et son microbiome forment un holobionte dont le génome combiné (hologénome) est sélectionné comme un tout. La santé de la plante dépend à 80% de son microbiome racinaire (Hartmann et al., 2014). Les signaux moléculaires et les métabolites secondaires coordonnent croissance et immunité (Marks et al., 2025). Implication pratique : traiter le système plante+microbiome et non la plante isolée.", "statut": "◆"}, {"fr": "hologénome", "en": "hologenome", "doc_code": "V2", "definition": "Génome combiné de l'hôte et de tous ses micro-organismes associés (microbiotes). Unité de sélection naturelle pour les holobiontes. Implique que la sélection variétale pour la santé du sol devrait intégrer la capacité de recrutement microbien de la variété.", "statut": "◆"}, {"fr": "quorum quenching", "en": "quorum quenching", "doc_code": "V2", "definition": "Interférence avec le quorum sensing bactérien par dégradation enzymatique des acyl-homosérine lactones (AHL). Mécanisme de défense végétale contre les pathogènes à QS-dépendant.", "statut": "◆"}, {"fr": "recrutement sélectif", "en": "selective microbiome recruitment", "doc_code": "V2", "definition": "Sélection active par la plante de micro-organismes spécifiques dans la rhizosphère via la composition et les quantités d'exsudats racinaires sécrétés. Mécanisme SIREM (Systemic Induced Root Exudate Modulation). La plante est le prescripteur actif de son microbiome, pas un hôte passif.", "statut": "◆"}, {"fr": "reprogrammation plasmidique par la plante", "en": "plant-driven plasmid reprogramming", "doc_code": "V2", "definition": "Extension du cycle rhizophagique : la plante ne se contente pas d'internaliser et de digérer les bactéries — elle influence leurs plasmides pour leur commander la production de métabolites spécifiques. Les bactéries rejetées dans la rhizosphère sont reprogrammées. La bactérie réagit en 20 minutes là où la plante mettrait des heures. Mécanisme fondamental du concept d'holobionte.", "statut": "◆"}, {"fr": "volatils microbiens", "en": "microbial volatile organic compounds (mVOC)", "doc_code": "V2", "definition": "Molécules gazeuses de faible poids moléculaire (2,3-butanediol, acétoïne) produites par le microbiome du sol, agissant comme signaux de communication microbiome-plante à distance. Stimulent la croissance végétale, induisent l'ISR et régulent la colonisation racinaire.", "statut": "≈"}, {"fr": "Loi de la Trophobiose", "en": "trophobiosis law", "doc_code": "V2/F2", "definition": "Théorie de Francis Chaboussou (1985) : un parasite ne peut s'attaquer qu'à une plante dont le métabolisme est déséquilibré, présentant un excès d'acides aminés libres et de sucres réducteurs non transformés en protéines complètes. Les engrais azotés solubles (Haber-Bosch) provoquent ce déséquilibre biochimique en perturbant la synthèse protéique. Maillon 5 de la chaîne causale C2.\n\nEnjeu : démontre que la vulnérabilité phytosanitaire n'est pas un problème de plante mais un problème de nutrition azotée.\n\nLevier : nutrition azotée biologique (légumineuses, fixation N) garantissant une synthèse protéique complète et une résistance naturelle aux ravageurs.", "statut": "◆"}, {"fr": "hormèse", "en": "hormesis", "doc_code": "V2/H1", "definition": "Phénomène par lequel un stress de faible intensité stimule la croissance ou la résistance d'un organisme, alors qu'une dose nulle n'a aucun effet et qu'une dose élevée est néfaste. En agriculture : les stress modérés (légère sécheresse, compétition racinaire contrôlée, micro-agressions pathogènes surmontées) induisent synthèse accrue de métabolites secondaires, défenses renforcées et densité nutritionnelle améliorée. La phyto-élicitation biologique exploite ce principe.", "statut": "◆"}, {"fr": "compétition apparente", "en": "apparent competition", "doc_code": "V2/S2", "definition": "Interaction négative entre deux espèces proies partageant un prédateur commun. Dans le sol : champignons pathogènes et bénéfiques compétitent pour l hôte plante via les voies ISR/JA/SA.", "statut": "◆"}, {"fr": "élicitation par débris microbiens", "en": "MAMP-triggered immunity (MTI)", "doc_code": "V2/S2", "definition": "Activation des mécanismes de défense et de croissance végétale par la reconnaissance de fragments microbiens (MAMPs : Microbe-Associated Molecular Patterns) — chitine fongique, peptidoglycane bactérien, LPS. Analogue de la mémoire immunitaire : exposer la plante à des débris microbiens inoffensifs la prépare à résister aux agressions. Les préparations contenant de la nécromasse microbienne et fongique exploitent ce mécanisme.", "statut": "◆"}, {"fr": "allocation du carbone photosynthétique", "en": "photosynthetic carbon allocation", "doc_code": "V2/S4", "definition": "Répartition du carbone fixé entre croissance aérienne (40-60%), racines (15-25%) et exsudats (5-33%). Pilote directement la pompe microbienne à carbone. Modulée par la symbiose CMA et les stress.", "statut": "◆"}, {"fr": "Allocation C photosynthétique aux exsudats", "en": "photosynthetic carbon allocation to root exudates", "doc_code": "V2/S4/P2", "definition": "Fraction du carbone fixé par photosynthèse allouée aux exsudats racinaires, variant de 5% (stress, sol dégradé) à 40% (sol vivant, couvert multi-espèces diversifié). Cette allocation est le premier maillon de la pompe microbienne à carbone. Elle dépend du LAI, de la diversité du couvert et de la santé du sol. Maillon 2 de la chaîne causale C1.\n\nEnjeu : quantifier la contribution réelle du design du couvert à la séquestration carbone.\n\nLevier : maximiser le LAI sur la plus longue période de l'année avec des mélanges 10-12 espèces.", "statut": "◆"}, {"fr": "FAA (Fish Amino Acid)", "en": "fish amino acid (FAA)", "doc_code": "V3", "definition": "Fertilisant fermenté du KNF obtenu par lactofermentation de poisson avec du sucre brun (jaggery). Riche en acides aminés libres directement assimilables et en micronutriments chélatés. Utilisé en pulvérisation foliaire ou au sol pour corriger les carences azotées et stimuler la croissance foliaire.", "statut": "◆"}, {"fr": "Fermentations anaérobies (Lactiques / JADAM)", "en": null, "doc_code": "V3", "definition": "Transformation de la matière organique en absence d'oxygène par des micro-organismes spécialisés, produisant des métabolites protecteurs (acides organiques, vitamines) (Prescott, 2002, 2016).\n\nEnjeu : Permet de stabiliser la biomasse très humide sans pertes de carbone par CO2 et sans odeurs pathogènes(Guo et al., 2016; Tamar & Umer, 2022).\n\nLevier de décision : Préférer la fermentation (type JMS ou Bokashi) pour recycler les déchets verts ou les lisiers, car elle préserve mieux l'énergie et l'azote que le compostage aérobie classique.", "statut": "◆"}, {"fr": "Inoculum microbien indigène (IMO / LiFoFer)", "en": null, "doc_code": "V3", "definition": "Prélèvement de micro-organismes locaux (souvent en forêt) pour les multiplier et les réintroduire dans les sols cultivés (Mayer, 2019).\n\nEnjeu : Garantit que les microbes introduits sont adaptés au climat et à la géologie locale(Zanella et al., 2017), contrairement aux souches commerciales de laboratoire.\n\nLevier de décision : Utiliser la technique LiFoFer pour restaurer la signature fongique des parcelles après une période de culture intensive ou de travail du sol (Hartmann et al., 2014).", "statut": "◆"}, {"fr": "LiFoFer", "en": "LiFoFer (fermented forest litter)", "doc_code": "V3", "definition": "Préparation fermentaire à base de litière forestière diversifiée, obtenue par fermentation contrôlée anaérobie-aérobie sur 3-6 mois. Contient une communauté fongique et bactérienne complexe adaptée aux conditions forestières. Reproduit l'ambiance microbiologique d'un sol forestier mature. Restaure les communautés fongiques dans les sols agricoles dégradés.", "statut": "◆"}, {"fr": "PNSB", "en": "purple non-sulfur bacteria (PNSB)", "doc_code": "V3", "definition": "Bactéries photosynthétiques anoxygéniques utilisant la lumière, la chaleur et les composés organiques comme sources d'énergie en conditions anaérobies. Clés du bokashi et des EM : produisent des acides aminés, acides nucléiques et hormones de croissance dans les fermentations. Indicateur de la qualité d'une préparation EM.", "statut": "◆"}, {"fr": "acide lactique (dans les fermentations)", "en": "lactic acid (in fermented preparations)", "doc_code": "V3", "definition": "Métabolite principal des bactéries lactiques lors de la fermentation anaérobie des sucres. Abaisse le pH (pH 3,5-4,5 dans le Bokashi) créant des conditions défavorables aux pathogènes. Acidifie localement le sol au point d'application, solubilisant les minéraux bloqués. Précurseur de l'acide 3-phényllactique lors des fermentations plus longues.", "statut": "◆"}, {"fr": "bactéries lactiques (LAB)", "en": "lactic acid bacteria (LAB)", "doc_code": "V3", "definition": "Groupe fonctionnel bactérien produisant l'acide lactique comme métabolite principal de la fermentation des sucres. Genres principaux : Lactobacillus, Lactococcus, Leuconostoc, Pediococcus, Streptococcus. Rôle dans les fermentations agricoles : préservation des nutriments, production d'acide 3-phényllactique (Jaffar et al., 2023), d'acides organiques suppresseurs, et de métabolites stimulant l'enracinement et l'immunité végétale.", "statut": "◆"}, {"fr": "bactéries photosynthétiques", "en": "phototrophic bacteria", "doc_code": "V3", "definition": "Bactéries utilisant la lumière comme source d'énergie en conditions anaérobies (photohétérotrophes). Incluent les PNSB et les bactéries sulfureuses violettes. Productrices de substances bioactives dans les fermentations.", "statut": "◆"}, {"fr": "bokashi", "en": "bokashi", "doc_code": "V3", "definition": "Technique de fermentation anaérobie de MO (son de riz inoculé avec EM) d'origine japonaise. Produit des métabolites bioactifs incluant l'acide 3-phényllactique (promoteur d'enracinement latéral, Maki et al., 2021), des acides organiques abaissant le pH et des enzymes extracellulaires. Conservation thermodynamique optimale du C et N vs compostage aérobie. Risque applicatif : le carbone labile peut déclencher un Priming Effect sur les sols riches en COS — fractionner les doses.", "statut": "◆"}, {"fr": "lacto-fermentés correcteurs redox", "en": "redox-correcting lacto-ferments", "doc_code": "V3", "definition": "Produits de lacto-fermentation (LiFoFer, résidus végétaux fermentés, fumiers fermentés anaérobie) utilisés comme intrants correcteurs du potentiel redox du sol. Eh de -100 à -200 mV. Effet mesuré à 40 cm de profondeur, persistant 1 mois après application. Particulièrement pertinent en sols méditerranéens oxydés (500-620 mV) où l'accès au fumier bovin est limité.", "statut": "◆"}, {"fr": "lactofermentation", "en": "lactic acid fermentation", "doc_code": "V3", "definition": "Fermentation par bactéries lactiques (LAB), abaissant le pH par production d'acide lactique et conservant les nutriments dans les métabolites. Voie fermentaire la plus ancienne et la plus répandue, conservée depuis 3,8 Ga. Base du Bokashi, des EM, du Jeevamrit et des aliments fermentés humains.", "statut": "✓"}, {"fr": "succession microbienne", "en": "microbial succession", "doc_code": "V3", "definition": "Séquence temporelle de communautés microbiennes se succédant dans un substrat fermenté ou un sol en régénération : phases pionnières copiotrophes (fermentaires, dégradant les sucres simples) → phases intermédiaires (dégradant la cellulose, l'amidon) → phases climaciques oligotrophes/fongiques (dégradant la lignine, l'humus). Dans un Bokashi : succession LAB → PNSB → Actinobactéries.", "statut": "◆"}, {"fr": "thermodynamique fermentation", "en": "fermentation thermodynamics", "doc_code": "V3", "definition": "Énergie libérée faible lors des fermentations (ΔG négatif mais limité) → le carbone et l'azote sont conservés dans les métabolites organiques plutôt qu'oxydés en CO₂ et N₂. Avantage vs compostage aérobie : moins d'énergie dissipée, plus de C et N conservés dans les produits. Voir S4 — Thermodynamique des Cycles pour le cadre biogéochimique général.", "statut": "≈"}, {"fr": "Korean Natural Farming (KNF)", "en": "Korean Natural Farming (KNF)", "doc_code": "V3/P3", "definition": "Système d'agriculture naturelle coréen (Cho Han-kyu) utilisant des micro-organismes indigènes (IMO) collectés localement et des fermentations végétales et animales pour substituer les intrants chimiques. Préparations clés : IMO (inoculums indigènes), FPJ (Fermented Plant Juice — exsudats végétaux fermentés), FAA (Fish Amino Acid), OHN (Oriental Herbal Nutrient), BRV (Brown Rice Vinegar). Philosophie : mobiliser la biologie locale plutôt que d'importer des microorganismes standardisés.", "statut": "◆"}, {"fr": "acide 3-phényllactique", "en": "3-phenyllactic acid", "doc_code": "V3/P3", "definition": "Métabolite organique produit par les bactéries lactiques lors des fermentations de type Bokashi/JADAM. Puissant promoteur de l'enracinement latéral en synergie avec le tryptophane (précurseur des auxines) via un effet sur les transporteurs d'auxines (Maki et al., 2021). Activité antifongique supprimant certains pathogènes du sol (Jaffar et al., 2023). Composé bioactif central expliquant l'efficacité agronomique observée des biostimulants lactiques.", "statut": "◆"}, {"fr": "Jeevamrit", "en": "Jeevamrit", "doc_code": "V3/P3/P5", "definition": "Préparation biostimulante fermentée indienne obtenant sa richesse par fermentation 48-72h d'un mélange : bouse + urine bovine + farine de légumineuse + jaggery (sucre brut) + eau. Équivalent indien du JADAM JMS, riche en bactéries lactiques, levures et actinomycètes locaux. Application en drench ou pulvérisation foliaire. Production simple et zéro-intrant permettant l'autonomie totale du producteur.", "statut": "◆"}, {"fr": "métabolites secondaires microbiens", "en": "microbial secondary metabolites", "doc_code": "V3/S2", "definition": "Composés bioactifs non essentiels à la croissance microbienne mais jouant des rôles écologiques critiques : antibiotiques (suppressivité), sidérophores (nutrition ferrique), acides organiques (solubilisation P, suppression pathogènes), phytohormones (auxines microbiennes), vitamines du complexe B (nutrition végétale et humaine), acide 3-phényllactique (promotion racinaire). Concentrés par fermentation. Marks et al. (2025) : coordonnateurs de la croissance et de l'immunité dans l'holobionte.", "statut": "◆"}], "chains": [{"id": "C1", "titre": "Photosynthèse du couvert → Immunité intestinale humaine", "valeur_ajoutee": "Argument le plus puissant pour les décideurs publics : un choix de couvert impacte la santé humaine via 7 étapes documentées. La politique agricole est une politique de santé publique.", "etapes": [{"position": 1, "strate_etape": "P2", "term_fr_text": "[P2]", "role_dans_chaine": "Design couvert multi-espèces (10-12 sp.) fixant le C par photosynthèse"}, {"position": 2, "strate_etape": "S4", "term_fr_text": "[S4]", "role_dans_chaine": "Exsudats racinaires → pompe microbienne à carbone, CUE augmentée"}, {"position": 3, "strate_etape": "S2", "term_fr_text": "[S2]", "role_dans_chaine": "Diversification guildes bactériennes, turnover microbien, nécromasse"}, {"position": 4, "strate_etape": "S3", "term_fr_text": "[S3]", "role_dans_chaine": "Développement CMA/CMN → transport P, Zn, Cu vers les plantes"}, {"position": 5, "strate_etape": "V2", "term_fr_text": "[V2]", "role_dans_chaine": "Recrutement PGPR/endophytes, activation ISR/SAR, production polyphénols"}, {"position": 6, "strate_etape": "V3", "term_fr_text": "[V3]", "role_dans_chaine": "Production vitamines B et métabolites secondaires rhizosphériques"}, {"position": 7, "strate_etape": "H1", "term_fr_text": "[H1]", "role_dans_chaine": "Augmentation densité nutritionnelle (antioxydants, minéraux, vitamines B)"}, {"position": 8, "strate_etape": "H3", "term_fr_text": "[H3]", "role_dans_chaine": "Transfert endophytes → microbiome intestinal via alimentation"}]}, {"id": "C2", "titre": "Haber-Bosch → Maladie chronique (chaîne de dégradation)", "valeur_ajoutee": "Démontre que chaque maillon de la dégradation a un coût caché. Argument systémique pour dépasser la vision cloisonnée agriculture/santé/environnement.", "etapes": [{"position": 1, "strate_etape": "F2", "term_fr_text": "[F2]", "role_dans_chaine": "Azote Haber-Bosch → EROI faible ou négatif, dépendance fossile"}, {"position": 2, "strate_etape": "S2", "term_fr_text": "[S2]", "role_dans_chaine": "Déséquilibre copiotrophes/oligotrophes, effondrement diversité microbienne"}, {"position": 3, "strate_etape": "S3", "term_fr_text": "[S3]", "role_dans_chaine": "Dégradation réseaux CMA par excès N et P solubles, perte GRSP"}, {"position": 4, "strate_etape": "S4", "term_fr_text": "[S4]", "role_dans_chaine": "Priming Effect sur COS, déstockage carbone stable"}, {"position": 5, "strate_etape": "V2", "term_fr_text": "[V2]", "role_dans_chaine": "Loi de la Trophobiose : excès acides aminés libres, vulnérabilité ravageurs"}, {"position": 6, "strate_etape": "H1", "term_fr_text": "[H1]", "role_dans_chaine": "Dilution de la densité nutritionnelle (croissance rapide sans synthèse complète)"}, {"position": 7, "strate_etape": "H2", "term_fr_text": "[H2]", "role_dans_chaine": "Appauvrissement microbiome intestinal humain"}, {"position": 8, "strate_etape": "H3", "term_fr_text": "[H3]", "role_dans_chaine": "Pression de sélection ARG par usage compensatoire antibiotiques/fongicides"}]}, {"id": "C3", "titre": "Bokashi → Suppressivité du sol", "valeur_ajoutee": "Donne un fondement mécaniste aux biostimulants fermentés. Permet de prédire quand le Bokashi sera efficace vs risqué (sol riche en COS → risque Priming Effect).", "etapes": [{"position": 1, "strate_etape": "P3", "term_fr_text": "[P3]", "role_dans_chaine": "Application Bokashi (substrat fermenté LAB/levures/PNSB)"}, {"position": 2, "strate_etape": "V3", "term_fr_text": "[V3]", "role_dans_chaine": "Métabolites actifs : acide 3-phényllactique, acides organiques, sidérophores"}, {"position": 3, "strate_etape": "S2", "term_fr_text": "[S2]", "role_dans_chaine": "Réintroduction consortia microbiens, compétition pour niches écologiques"}, {"position": 4, "strate_etape": "S4", "term_fr_text": "[S4]", "role_dans_chaine": "Modification Eh local, solubilisation P fixé sur oxydes Fe/Al"}, {"position": 5, "strate_etape": "S3", "term_fr_text": "[S3]", "role_dans_chaine": "Stimulation saprotrophes ligneux occupant la place des champignons pathogènes"}, {"position": 6, "strate_etape": "V2", "term_fr_text": "[V2]", "role_dans_chaine": "Activation ISR via métabolites microbiens perçus par les racines"}, {"position": 7, "strate_etape": "P1", "term_fr_text": "[P1]", "role_dans_chaine": "Mesure PLFA (ratio F/B amélioré) et VESS (amélioration structurale)"}]}, {"id": "C4", "titre": "Anaérobiose archéenne → Fermentations alimentaires modernes", "valeur_ajoutee": "Le récit fondateur du corpus : les fermentations ne sont pas une technique mais la réactivation du métabolisme le plus ancien de la biosphère. Différenciateur philosophique majeur.", "etapes": [{"position": 1, "strate_etape": "F1", "term_fr_text": "[F1]", "role_dans_chaine": "Vie primitive dans monde anoxique (3,8 Ga) — voies fermentaires originelles"}, {"position": 2, "strate_etape": "S4", "term_fr_text": "[S4]", "role_dans_chaine": "Conservation microsites anoxiques dans agrégats du sol actuel"}, {"position": 3, "strate_etape": "V3", "term_fr_text": "[V3]", "role_dans_chaine": "Thermodynamique fermentation (ΔG favorable à conservation C/N)"}, {"position": 4, "strate_etape": "P3", "term_fr_text": "[P3]", "role_dans_chaine": "Application via Bokashi/EM/IMO reproduisant conditions anaérobies contrôlées"}, {"position": 5, "strate_etape": "V2", "term_fr_text": "[V2]", "role_dans_chaine": "Endophytes racinaires conservant voies fermentaires dans tissus végétaux"}, {"position":
