RU de 20-30 L/m³ par point de % de MO. Sur 1 m de profondeur, 1% de MO en plus = 20 000-30 000 L/ha de réserve supplémentaire. C'est l'assurance sécheresse du sol.\n→ La résilience à la sécheresse dépend de la CONNECTIVITÉ des pores, pas seulement de leur volume. Les hyphes mycorhiziens connectent les micropores aux racines — sans eux, 30-40% de l'eau est piégée.", "contexte_sci": "La réserve utile est la quantité d'eau disponible pour les plantes entre capacité au champ et point de flétrissement. Elle dépend de la structure du sol et de la teneur en MO.", "instructions": "Quantifier l'impact de la MO sur la réserve utile. Relier à la résilience hydrique et au changement climatique. Termes : réserve utile, résilience hydrique.", "style": "scientifique pratique"}, {"type": "section", "chapitre": 4, "section": 1, "titre_h1": "IV. MAOM et POC", "titre_h2": "4.1 MAOM et POC : les deux formes de carbone organique", "titre_h3": null, "tableau": 1, "enrichissement": "→ MAOM (Mineral-Associated Organic Matter) = carbone adsorbé sur les surfaces minérales (argiles, oxydes Fe/Al). Temps de résidence 100-10 000 ans. C'est le pool STABLE — celui qu'on veut construire.\n→ POC (Particulate Organic Carbon) = fragments de débris végétaux et fongiques en décomposition. Temps de résidence 1-50 ans. C'est le pool ACTIF — celui qui nourrit les micro-organismes.\n→ La Microbial Carbon Pump (Liang 2017) : les micro-organismes mangent le POC, le transforment en nécromasse (chitine, peptidoglycane), qui se stabilise en MAOM sur les argiles. Les bactéries FABRIQUENT le carbone stable.", "contexte_sci": "Deux formes de carbone organique coexistent : MAOM (associée aux minéraux, stable, décennies-siècles) et POC (particulaire, labile, mois-années). Leur ratio détermine la dynamique du carbone du sol. Lien avec les grands cycles (la MAOM se forme par adsorption sur les surfaces du CAH).", "instructions": "Expliquer les deux pools MAOM et POC : formation, stabilité, rôles. Le ratio C/Argile comme indicateur de saturation. Termes : MAOM, POC, ratio C/Argile, adsorption, complexe argilo-humique (CAH).", "style": "scientifique dense"}, {"type": "section", "chapitre": 5, "section": 1, "titre_h1": "V. Architecture du sol cultivé", "titre_h2": "5.1 Ce que le labour fait à l'architecture du sol", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le labour fait 3 destructions simultanées : (1) casse les macro-agrégats → libère le carbone occlus (2) expose les surfaces MAOM à l'O₂ → désorption (3) mélange les horizons → réaction de Fenton (Fe²⁺ + H₂O₂ → OH•).\n→ La réaction de Fenton détruit 30-50% de la MO « stable » dans les sols riches en fer. Ce n'est PAS l'exposition à l'air qui minéralise — ce sont les radicaux hydroxyles produits par l'alternance aérobie/anaérobie.\n→ Un sol labouré perd 0.1-0.5% de MO par an pendant les 5-10 premières années. Après 50 ans de labour, le sol a perdu 30-50% de son carbone initial. Le non-labour INVERSE la tendance en 5-15 ans.", "contexte_sci": "Le labour détruit la hiérarchie des agrégats, expose la MO protégée à la minéralisation, et compacte les horizons profonds. C'est le mécanisme principal de dégradation de l'architecture du sol.", "instructions": "Décrire les effets du labour sur chaque niveau de l'architecture : agrégats, porosité, MO, vie biologique. Relier au tassement-compaction. Termes : tassement-compaction, agrégats, bioturbation.", "style": "analytique engagé"}, {"type": "section", "chapitre": 5, "section": 2, "titre_h1": null, "titre_h2": "5.2 Profil idéal d'un sol vivant régénératif", "titre_h3": null, "tableau": 1, "enrichissement": "→ Le profil idéal d'un sol régénératif : horizon A sombre (MO > 4%), grumeleux, odorant (géosmine = actinomycètes actifs), racines profondes, galeries visibles, faune abondante. Score VESS 1-2.\n→ Indicateurs de maturité : ratio F/B > 1 (dominance fongique), indice de Bongers > 3 (nématodes prédateurs), CUE > 0.5 (efficience microbienne), ratio C/Argile Zone 1 (>1/8).\n→ Ce profil est ATTEIGNABLE en 5-15 ans de pratiques régénératives (non-labour + couvert permanent + apport MO + agroforesterie). Cagnolle a atteint 9% MO en 10 ans sur un sol initialement à 1.4%.", "contexte_sci": "Le profil idéal d'un sol régénéré : agrégats stables, porosité structurelle élevée, ratio F/B favorable aux champignons, MAOM saturée, réserve utile maximale.", "instructions": "Décrire le profil cible et les indicateurs mesurables. Relier aux pratiques régénératives (non-labour, couverts, apports MO). Termes : biostructuration, bioturbation, réserve utile, ratio C/Argile.", "style": "opérationnel pratique"}, {"type": "section", "chapitre": 5, "section": 3, "titre_h1": null, "titre_h2": "5.3 Compaction et tassement : diagnostic et seuils", "titre_h3": null, "tableau": 0, "enrichissement": "→ La compaction crée une semelle de labour (15-30 cm) imperméable : Ksat < 1 mm/h, densité > 1.6, porosité < 35%. Les racines ne passent plus, l'eau stagne, l'anaérobiose forcée produit H₂S (toxique).\n→ Seuils critiques : pénétrométrie > 2 MPa = compaction problématique. > 3 MPa = arrêt de croissance racinaire. Test simple : enfoncer un couteau — s'il résiste, le sol est compacté.\n→ Décompaction biologique vs mécanique : le sous-solage mécanique est temporaire (6-12 mois, le sol se retasse). Les racines pivotantes + vers de terre = décompaction permanente (le canal est tapissé de MO).", "contexte_sci": "Le tassement et la compaction sont des dégradations physiques mesurables (densité apparente, résistance à la pénétration). Le diagnostic de terrain permet de les quantifier.", "instructions": "Méthodes de diagnostic du tassement : profil cultural, pénétromètre, densité apparente. Seuils critiques. Termes : tassement-compaction, régolithe.", "style": "opérationnel pratique"}, {"type": "conclusion", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": null, "contexte_sci": "Ce document couvre 10 sections organisées autour de 5 chapitres : I. Les minéraux argileux, II. Les agrégats, III. Porosité et eau dans les agrégats, IV. MAOM et POC et 1 autres. La conclusion doit synthétiser les mécanismes clés et ouvrir sur les perspectives pratiques ou scientifiques.", "instructions": "L'architecture du sol est un édifice biologique. Synthétiser : argiles fournissent la matrice, les organismes construisent la structure, la MO cimente l'ensemble. Le labour défait ce que la biologie construit.", "style": "narratif synthétique"}], "n_terms": 29}, {"code": "S2", "titre": "Le Microbiome du Sol", "strate": "S", "note": "Document de référence du microbiome bactérien. Inclut guildes fonctionnelles, copiotrophes/oligotrophes, nécromasse (80% C stable), suppressivité, PLFA, Chao1.", "titre_jenni": "Le Microbiome du Sol", "style": "scientifique dense", "statut_redaction": "a_faire", "priorite": 7, "angle_entree": "85% de la biomasse terrestre est microbienne. Le sol héberge plus de génomes que d'étoiles dans la galaxie.", "public_cible": "chercheur, agronome expert", "sources_core": null, "notes_jenni": "Document central strate S. Guildes fonctionnelles, diversité, suppressivité. 13 sections.", "sections": [{"type": "intro", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": "→ Stratégies S-A-Y (Husson) en complément du ratio F/B : S (stress, faible CUE, sol dégradé) → A (acquisition minéraux, CUE moyenne) → Y (rendement, forte CUE, forte humification). La trajectoire de régénération = bascule S→A→Y.\n→ Le biofilm comme système hydraulique : EPS = 97% eau structurée. La rétention d'eau dans les micropores n'est pas passive (capillarité) — elle est BIOLOGIQUE (biofilms bactériens). Sans biofilms, pas de rétention, pas de vie.\n→ Plasmides = outil d'adaptation rapide construit en 3 Ga. La plante reprogramme les plasmides de ses endophytes (cycle rhizophagique étendu, conférence Eh/pH).\n→ 50% du microbiome pulmonaire sain = anaérobies strictes. Les anaérobies intestinaux fournissent vitamines B et antioxydants. Les anaérobies du sol font PAREIL pour la plante.", "contexte_sci": "85% de la biomasse terrestre est microbienne. Le sol héberge plus de génomes que d'étoiles dans la galaxie. Il mobilise 56 termes canoniques et 8 connexions vers d'autres documents du corpus. Il intervient dans les chaînes causales : [À VALIDER] Piège de la performance → Robustesse par les contreperformances.", "instructions": "Présenter le microbiome du sol comme le moteur invisible de tous les cycles biogéochimiques. Un gramme de sol contient des milliards de bactéries organisées en guildes fonctionnelles. Le microbiome est au carrefour de 5 chaînes causales du corpus. Annoncer : phylums et diversité, guildes fonctionnelles (fixation N, solubilisation P), PGPR, nécromasse et carbone, suppressivité.", "style": "scientifique dense"}, {"type": "section", "chapitre": 1, "section": 1, "titre_h1": "I. Composition et diversité du microbiome", "titre_h2": "1.1 Les grands phylums et leur rôle écologique", "titre_h3": null, "tableau": 1, "enrichissement": "→ Les phylums dominants du sol (Proteobacteria, Actinobacteria, Firmicutes, Bacteroidetes) sont les MÊMES que dans l'intestin humain. La divergence sol/intestin date de ~500 Ma mais les voies métaboliques centrales sont conservées.\n→ Les copiotrophes (r-stratèges, croissance rapide, CUE faible) dominent en sol perturbé. Les oligotrophes (K-stratèges, croissance lente, CUE élevée) dominent en sol stable. Le ratio r/K est un indicateur de l'état de dégradation.\n→ Stratégies S-A-Y (Husson) : S (stress) = copiotrophes dominants, CUE faible, sol dégradé. Y (rendement) = oligotrophes dominants, CUE élevée, forte humification. La transition régénérative = bascule S→A→Y.", "contexte_sci": "Les grands phylums bactériens du sol (Acidobacteria, Actinobacteria, Proteobacteria, Firmicutes) occupent des niches écologiques distinctes. Le ratio copiotrophes/oligotrophes est un indicateur clé de l'état du sol.", "instructions": "Décrire les phylums dominants et leur écologie. Expliquer le continuum copiotrophes (r-stratèges) / oligotrophes (K-stratèges). Termes : Acidobacteria, Actinobacteria, copiotrophes, oligotrophes, guildes fonctionnelles.", "style": "scientifique dense"}, {"type": "section", "chapitre": 1, "section": 2, "titre_h1": null, "titre_h2": "1.2 Diversité alpha, bêta et indicateurs de santé", "titre_h3": null, "tableau": 0, "enrichissement": "→ La diversité alpha (richesse spécifique d'un échantillon) est un indicateur de SANTÉ mais pas de FONCTION. Un sol peut avoir 10 000 espèces et fonctionner mal si les guildes clés sont absentes.\n→ Les indices de Shannon et Chao1 mesurent des aspects différents : Shannon = équitabilité (dominance ou non), Chao1 = richesse estimée (incluant les espèces rares). Un sol régénéré a Shannon > 4 et Chao1 > 5000.\n→ La diversité bêta (variation entre échantillons) révèle l'hétérogénéité spatiale. Un sol labouré est homogène (bêta faible) — un sol non-labouré est un patchwork de micro-habitats (bêta élevée).", "contexte_sci": "La diversité microbienne se mesure à plusieurs échelles : alpha (richesse locale), bêta (variation entre sites). Les indicateurs PLFA et indices Chao1/Shannon permettent le diagnostic. Lien avec le diagnostic du sol vivant (indicateurs PLFA et Chao1).", "instructions": "Expliquer les indices de diversité et leur interprétation agronomique. Relier PLFA au ratio F/B (champignons/bactéries). Termes : ratio F/B, guildes fonctionnelles. Lien : ces indicateurs servent au diagnostic pratique.", "style": "scientifique dense"}, {"type": "section", "chapitre": 2, "section": 1, "titre_h1": "II. Les guildes fonctionnelles", "titre_h2": "2.1 La fixation biologique de l'azote", "titre_h3": null, "tableau": 0, "enrichissement": "→ La fixation biologique de l'azote par les rhizobiums et les azotobacters est GRATUITE et a fonctionné pendant 3 Ga. Le procédé Haber-Bosch (1909) l'a remplacée à coût énergétique colossal (1-2% de l'énergie mondiale).\n→ La nitrogénase (enzyme de fixation) est INACTIVÉE par l'oxygène. Elle ne fonctionne que dans des microsites anaérobies : nodules racinaires, biofilms, intérieur des agrégats. La structure du sol CONDITIONNE la fixation.\n→ Les légumineuses fixent 80-300 kg N/ha/an. En couvert multi-espèces, elles alimentent les graminées voisines via les exsudats racinaires et le réseau mycorhizien. La diversité du couvert = fixation distribuée.", "contexte_sci": "La fixation biologique de l'azote par les rhizobiums (symbiose légumineuses) et les fixateurs libres (Azotobacter, Azospirillum) est le premier service écosystémique du microbiome.", "instructions": "Distinguer fixation symbiotique (Rhizobium, Bradyrhizobium) et fixation libre (Azotobacter, Azospirillum). Quantifier les apports (50-300 kg N/ha/an en symbiose). Termes : Rhizobium, Bradyrhizobium, Azotobacter, Azospirillum.", "style": "scientifique dense"}, {"type": "section", "chapitre": 2, "section": 2, "titre_h1": null, "titre_h2": "2.2 Solubilisation du phosphore et des micronutriments", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le phosphore est le VERROU de la fertilité des sols : 80% du P total est fixé sur les oxydes de fer et d'aluminium, inaccessible aux racines. La solubilisation biologique est la SEULE voie durable d'accès.\n→ Les PGPR (Bacillus, Pseudomonas) solubilisent le P par production d'acides organiques (citrique, oxalique) qui chélatent Fe³⁺ et Al³⁺. Les mycorhizes explorent les micropores inaccessibles aux racines pour capter le P dissous.\n→ Le cycle rhizophagique étend la solubilisation : la plante ingère les bactéries chargées en P, extrait le nutriment, puis recrache la bactérie reprogrammée. C'est de la « micro-agriculture » cellulaire.", "contexte_sci": "Les bactéries solubilisatrices du phosphore (PSB) et des microéléments libèrent les nutriments fixés sur les oxydes et les argiles. La détection du quorum coordonne cette activité collective.", "instructions": "Expliquer les mécanismes de solubilisation (acidification, chélation, enzymes phosphatases). Relier à la détection du quorum comme régulateur. Termes : bactéries solubilisatrices (PSB), détection du quorum.", "style": "scientifique dense"}, {"type": "section", "chapitre": 3, "section": 1, "titre_h1": "III. Les PGPR", "titre_h2": "3.1 Mécanismes directs des PGPR sur la croissance", "titre_h3": null, "tableau": 0, "enrichissement": "→ Les PGPR agissent par au moins 5 mécanismes directs : (1) fixation N (2) solubilisation P (3) production sidérophores (Fe) (4) production phytohormones (IAA, cytokinines) (5) production ACC-désaminase (réduit le stress éthylène).\n→ L'ACC-désaminase est le mécanisme le plus sous-estimé : elle dégrade le précurseur de l'éthylène (hormone de stress). Les bactéries « calment » la plante stressée. C'est le fondement de l'efficacité des biostimulants sur sol dégradé.\n→ La production bactérienne d'IAA (auxine) stimule la croissance racinaire → plus d'exsudats → plus de bactéries → plus d'IAA. BOUCLE de rétroaction positive qui s'auto-amplifie.", "contexte_sci": "Les PGPR (Plant Growth-Promoting Rhizobacteria) stimulent directement la croissance par la production de phytohormones (auxines, gibbérellines), la synthèse d'ACC déaminase, et l'amélioration de l'absorption des nutriments.", "instructions": "Détailler les mécanismes directs des PGPR : phytohormones, ACC déaminase, sidérophores. Quantifier les effets sur la croissance. Termes : PGPR, Pseudomonas, Azospirillum, biofilm.", "style": "scientifique dense"}, {"type": "section", "chapitre": 3, "section": 2, "titre_h1": null, "titre_h2": "3.2 Mécanismes indirects : biocontrôle et ISR", "titre_h3": null, "tableau": 0, "enrichissement": "→ L'ISR (Induced Systemic Resistance) est déclenchée par les PGPR racinaires et protège TOUTE la plante : feuilles, tiges, fruits. C'est un système immunitaire ACQUIS, pas inné — il faut les bonnes bactéries.\n→ L'ISR produit des polyphénols, terpénoïdes, alcaloïdes de défense qui sont AUSSI des nutriments protecteurs pour l'humain (antioxydants). Un sol riche en PGPR = aliment plus dense nutritionnellement.\n→ La suppressivité du sol = ISR à l'échelle de l'écosystème : un sol avec un microbiome diversifié et fonctionnel protège TOUTES les plantes contre les pathogènes telluriques. C'est la définition de la santé du sol.", "contexte_sci": "Les PGPR protègent indirectement les plantes par le biocontrôle (compétition, antibiose, parasitisme) et l'induction de résistance systémique. Lien avec les fermentations microbiennes (guildes fonctionnelles du sol correspondent aux groupes fonctionnels des fermentations).", "instructions": "Expliquer biocontrôle, antibiose, ISR. Relier aux Trichoderma et Pseudomonas fluorescents. Termes : suppressivité, Trichoderma, Pseudomonas, biofilm.", "style": "scientifique dense"}, {"type": "section", "chapitre": 4, "section": 1, "titre_h1": "IV. Nécromasse microbienne et carbone du sol", "titre_h2": "4.1 La nécromasse comme source principale du carbone stable", "titre_h3": null, "tableau": 0, "enrichissement": "→ La nécromasse microbienne (chitine fongique, peptidoglycane bactérien, mélanine) constitue 50-80% du carbone stable du sol (MAOM). Les micro-organismes ne décomposent pas seulement — ils CONSTRUISENT le carbone du sol en mourant.\n→ La Microbial Carbon Pump (Liang 2017) : POC (débris végétaux) → métabolisme microbien → nécromasse → adsorption sur argiles = MAOM. Chaque génération microbienne transforme du carbone labile en carbone stable.\n→ Le CUE (Carbon Use Efficiency) détermine combien de carbone est incorporé en biomasse (puis nécromasse) vs respiré en CO₂. CUE 0.3 (champignons) à 0.6 (bactéries oligotrophes). Les oligotrophes sont les meilleurs « constructeurs » de carbone stable.", "contexte_sci": "La nécromasse microbienne (résidus de cellules mortes) est la source principale de la MAOM — le carbone stable du sol. Le renouvellement microbien rapide produit plus de carbone stable que les résidus végétaux. Lien avec les grands cycles (effet d'amorçage et copiotrophes).", "instructions": "Expliquer le concept de pompe microbienne du carbone : biomasse vivante → nécromasse → MAOM. Le renouvellement microbien comme moteur de séquestration. Termes : nécromasse microbienne, MAOM, renouvellement microbien, CUE.", "style": "scientifique dense"}, {"type": "section", "chapitre": 4, "section": 2, "titre_h1": null, "titre_h2": "4.2 CUE et homéostasie microbienne", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le CUE (Carbon Use Efficiency) est le RENDEMENT de la pompe à carbone microbienne : CUE = biomasse produite / carbone consommé. CUE 0.6 = 60% du carbone ingéré devient biomasse (puis nécromasse → MAOM).\n→ Les champignons ont un CUE supérieur aux bactéries (0.3-0.5 vs 0.1-0.4 pour les copiotrophes). Un sol à dominance fongique (ratio F/B > 1) séquestre PLUS de carbone à apport égal.\n→ L'homéostasie microbienne = les micro-organismes ajustent leur stœchiométrie (C:N:P) pour maintenir des ratios internes stables. Si le substrat est déséquilibré (C:N trop élevé), ils excrètent l'excès — c'est la minéralisation « involontaire ».", "contexte_sci": "Le CUE (Carbon Use Efficiency) mesure la fraction du carbone consommé qui est incorporée en biomasse vs respirée en CO2. C'est le rendement de la pompe microbienne.", "instructions": "Expliquer le CUE et ses déterminants (qualité du substrat, température, nutriments). Relier à l'homéostasie microbienne. Termes : CUE, nécromasse microbienne, renouvellement microbien.", "style": "scientifique dense"}, {"type": "section", "chapitre": 4, "section": 3, "titre_h1": null, "titre_h2": "4.3 Le priming effect", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le priming effect est le mécanisme le plus DANGEREUX de la transition : un apport de carbone labile (sucres, exsudats) stimule les copiotrophes qui, en manque d'N, s'attaquent au carbone stable (MAOM) pour extraire l'azote.\n→ Le priming est maximal en Phase 1 de la transition (sol dégradé, ratio C/N déséquilibré). Risque : le bokashi frais sur sol appauvri peut ACCÉLÉRER la perte de carbone au lieu de la compenser.\n→ Antidote au priming : (1) apporter C + N simultanément (ratio C:N 25-30) (2) incorporer des argiles (bentonite) pour adsorber la nécromasse (3) inoculer des oligotrophes (CUE élevée). La stœchiométrie de Kirkby (83N + 20P + 14S par tC) est la clé.", "contexte_sci": "L'effet d'amorçage est la stimulation de la décomposition de la matière organique stable par l'apport de carbone frais (exsudats racinaires). C'est un mécanisme à double tranchant : il libère des nutriments mais peut déstabiliser le stock de carbone. Lien avec les biostimulants (risque d'effet d'amorçage) et la transition (risque maximal en phase de sevrage).", "instructions": "Expliquer le mécanisme de l'effet d'amorçage. Distinguer effet positif (libération nutriments) et négatif (perte carbone). Relier au risque en début de transition. Termes : effet d'amorçage, copiotrophes, MAOM.", "style": "scientifique dense"}, {"type": "section", "chapitre": 5, "section": 1, "titre_h1": "V. Suppressivité et résistome", "titre_h2": "5.1 La suppressivité : quand le sol protège la plante", "titre_h3": null, "tableau": 0, "enrichissement": "→ La suppressivité = un sol qui EMPÊCHE l'établissement des pathogènes malgré leur présence. Ce n'est pas l'absence de pathogènes — c'est la DOMINANCE des antagonistes (Trichoderma, Bacillus, Pseudomonas fluorescens).\n→ Deux types de suppressivité : (1) générale = compétition pour les ressources (les niches sont occupées, le pathogène n'a pas de place) (2) spécifique = antibiose ciblée (production d'antibiotiques, parasitisme).\n→ La chaîne bokashi → suppressivité : le fermenté inocule des LAB et des Bacillus qui colonisent la rhizosphère AVANT les pathogènes. Premier arrivé, premier servi. C'est le même principe que les probiotiques intestinaux.", "contexte_sci": "La suppressivité est la capacité d'un sol à empêcher le développement des pathogènes malgré leur présence. Elle repose sur la diversité microbienne, la compétition et l'antibiose. C'est l'aboutissement fonctionnel d'un microbiome sain.", "instructions": "Distinguer suppressivité générale (diversité) et spécifique (antagonistes). Relier à Trichoderma, Pseudomonas, Bacillus. Termes : suppressivité, Trichoderma, Pseudomonas, biofilm, détection du quorum.", "style": "scientifique dense"}, {"type": "section", "chapitre": 5, "section": 2, "titre_h1": null, "titre_h2": "5.2 Le résistome du sol : les gènes de résistance", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le résistome du sol = l'ensemble des gènes de résistance aux antibiotiques présents naturellement dans le sol. Il existe depuis >2 Ga — BIEN avant l'usage humain des antibiotiques.\n→ Le sol est le RÉSERVOIR originel des ARG (Antibiotic Resistance Genes). Les antibiotiques sont des armes bactériennes naturelles — les gènes de résistance sont les boucliers correspondants. Le problème n'est pas leur existence mais leur PROPAGATION par les plasmides.\n→ Un sol à haute diversité microbienne DILUE les ARG : les gènes de résistance sont répartis entre de nombreuses espèces, empêchant la dominance de souches multi-résistantes. La biodiversité est un rempart contre l'antibiorésistance.", "contexte_sci": "Le résistome du sol est l'ensemble des gènes de résistance aux antimicrobiens présents dans le microbiome. C'est un réservoir naturel qui peut devenir problématique sous pression de sélection (antibiotiques, biocides). Lien avec la résistance antimicrobienne (santé humaine).", "instructions": "Expliquer le résistome comme réservoir naturel. Relier aux transferts horizontaux de gènes. Distinguer résistome naturel et résistome anthropique (sélectionné par les antibiotiques). Termes : résistome, suppressivité.", "style": "scientifique dense"}, {"type": "conclusion", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": null, "contexte_sci": "Ce document couvre 11 sections organisées autour de 5 chapitres : I. Composition et diversité du microbiome, II. Les guildes fonctionnelles, III. Les PGPR, IV. Nécromasse microbienne et carbone du sol et 1 autres. La conclusion doit synthétiser les mécanismes clés et ouvrir sur les perspectives pratiques ou scientifiques.", "instructions": "Le microbiome est l'orchestre invisible du sol. Synthétiser : diversité → fonctions (fixation N, solubilisation P, PGPR, biocontrôle) → services (nutrition, protection, séquestration carbone). La suppressivité est l'indicateur ultime de santé.", "style": "narratif synthétique"}], "n_terms": 57}, {"code": "S3", "titre": "Le Microbiome Fongique et Mycorhizien", "strate": "S", "note": "Absorbe Carbone et Régénération Fongique. CMA, ECM, CMN, glomaline, guildes fongiques, ratio F/B, succession fongique.", "titre_jenni": "Le Microbiome Fongique et Mycorhizien", "style": "scientifique dense", "statut_redaction": "a_faire", "priorite": 8, "angle_entree": "Les champignons représentent 75% de la biomasse microbienne du sol. Leur réseau construit la structure.", "public_cible": "chercheur, mycologue, agronome", "sources_core": null, "notes_jenni": "CMA, ECM, guildes fongiques, nécromasse fongique. Rôle structural + nutritionnel.", "sections": [{"type": "intro", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": "→ Les saprotrophes sont des POURVOYEURS D'EAU, pas seulement des décomposeurs. Ils remontent l'eau du sol vers le mulch par capillarité hyphique pour dégrader la lignine (enzymes extracellulaires hydrauliques). Ils colonisent le broyat AVANT les CMA.\n→ Les saprotrophes CULTIVENT des bactéries dans les films d'eau hyphiques : exsudats fongiques (oxalate, sucres) → recrutement sélectif de fixateurs N et solubilisateurs P. C'est la rhizophagie version fongique.\n→ La nécromasse fongique (chitine, mélanine, glomaline) = le carbone-structure (gîte de Husson). Elle se lie aux argiles/bentonite pour former la MAOM. Le champignon meurt mais son cadavre construit le sol.\n→ Cascade hydraulique : saprotrophes (transport eau dans broyat) PUIS CMA (livraison eau à la plante). Deux réseaux superposés, complémentaires.", "contexte_sci": "Les champignons représentent 75% de la biomasse microbienne du sol. Leur réseau construit la structure. Il mobilise 21 termes canoniques et 6 connexions vers d'autres documents du corpus. Il intervient dans les chaînes causales : [À VALIDER] Piège de la performance → Robustesse par les contreperformances.", "instructions": "Présenter le royaume fongique du sol comme l'architecte invisible de la fertilité. Les champignons construisent le réseau tridimensionnel qui structure le sol, transporte l'eau et connecte les plantes entre elles. Annoncer : guildes fongiques, CMA, ECM et CMN, nécromasse fongique, biocontrôle fongique.", "style": "scientifique dense"}, {"type": "section", "chapitre": 1, "section": 1, "titre_h1": "I. Les guildes fongiques", "titre_h2": "1.1 Les 4 guildes fonctionnelles principales", "titre_h3": null, "tableau": 1, "enrichissement": "→ Les 4 guildes fongiques : (1) saprotrophes = décomposeurs de lignine, pourvoyeurs d'eau (2) CMA = symbiotes obligatoires des plantes (3) ECM = symbiotes des arbres forestiers (4) pathogènes = régulateurs des populations végétales.\n→ Les saprotrophes sont les PREMIERS colonisateurs du mulch et du broyat. Ils remontent l'eau du sol par capillarité hyphique pour dégrader la lignine. Ils préparent le terrain pour les CMA.\n→ La guilde dominante indique l'état du sol : saprotrophes dominants = sol en reconstruction (apport MO actif), CMA dominants = sol stable (symbiose établie), pathogènes dominants = sol perturbé (stress biotique).", "contexte_sci": "Quatre guildes fonctionnelles dominent : saprotrophes (dégradation MO), mycorhiziens (symbiose plante), pathogènes, et mycoparasites. Leur équilibre détermine la santé du sol.", "instructions": "Décrire les 4 guildes, leur métabolisme et leurs interactions. Le ratio champignons/bactéries (F/B) comme indicateur. Termes : champignons saprotrophes, CMA, ECM, mycoparasitisme, ratio F/B.", "style": "scientifique dense"}, {"type": "section", "chapitre": 1, "section": 2, "titre_h1": null, "titre_h2": "1.2 Identifier le mycobiome : métabarcoding ITS", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le métabarcoding ITS (Internal Transcribed Spacer) est la méthode standard pour identifier le mycobiome. L'ADN fongique du sol révèle 2000-5000 espèces par gramme — une diversité comparable au microbiome bactérien.\n→ Limite du métabarcoding : il détecte l'ADN (vivant + mort), pas l'activité. Un sol peut montrer un profil ITS « sain » mais avec une faune fongique dormante. Le PLFA (phospholipides) mesure la biomasse VIVANTE uniquement.\n→ Le ratio F/B (biomasse fongique / biomasse bactérienne, mesuré en PLFA) est l'indicateur de maturité le plus utilisé : F/B < 0.5 = sol bactérien (perturbé), F/B > 1 = sol fongique (mature, forestier).", "contexte_sci": "Le métabarcoding ITS permet d'identifier la diversité fongique. Les méthodes PLFA quantifient la biomasse. Ces outils diagnostiques relient diversité fongique et fonctions du sol.", "instructions": "Méthodes d'identification : ITS, PLFA, ergostérol. Distinguer diversité taxonomique et fonctionnelle. Termes : ratio F/B.", "style": "scientifique dense"}, {"type": "section", "chapitre": 2, "section": 1, "titre_h1": "II. Les CMA", "titre_h2": "2.1 Architecture de la symbiose CMA", "titre_h3": null, "tableau": 0, "enrichissement": "→ Architecture de la symbiose CMA : le mycélium extra-racinaire explore le sol (eau + P), les arbuscules dans les cellules corticales échangent P/N contre C photosynthétique. L'investissement : 2-20% de la photosynthèse de la plante.\n→ Les CMA ne décomposent PAS la MO (ils sont biotrophes obligatoires). Leur seule source de carbone est la plante hôte. C'est pourquoi un sol nu sans couvert PERD ses CMA en 6-12 mois.\n→ Un réseau CMA fonctionnel donne accès à 100× le volume de sol explorable par les racines seules. Pour le phosphore (immobile), c'est la différence entre carence et suffisance.", "contexte_sci": "Les CMA (champignons mycorhiziens à arbuscules, Glomeromycota) forment la symbiose la plus ancienne et la plus répandue (>80% des plantes terrestres). Leur architecture (arbuscules, hyphes extraracinaires) étend massivement la surface d'absorption. Lien évolutif avec le temps long (conservation des signaux LCO depuis le Dévonien).", "instructions": "Décrire l'architecture de la symbiose : colonisation, arbuscules, vésicules, réseau extraracinaire. Signalisation strigolactones → LCO/facteurs Myc. Termes : CMA, strigolactones, LCO/facteurs Myc, Rhizophagus, Funneliformis, Glomus.", "style": "scientifique dense"}, {"type": "section", "chapitre": 2, "section": 2, "titre_h1": null, "titre_h2": "2.2 Bénéfices agronomiques et facteurs d'inhibition", "titre_h3": null, "tableau": 1, "enrichissement": "→ Facteurs d'inhibition des CMA : (1) engrais P solubles (la plante n'a plus besoin du champignon) (2) labour (rupture des hyphes) (3) sol nu > 6 mois (pas d'hôte) (4) fongicides systémiques.\n→ Paradoxe de la fertilisation phosphatée : apporter du P soluble DÉTRUIT le mécanisme biologique d'accès au P. À court terme, rendement maintenu. À long terme, dépendance totale aux intrants — et le P du sol reste fixé sur les oxydes.\n→ Les couverts multi-espèces maintiennent les CMA pendant l'interculture (toujours un hôte vivant). La luzerne et le trèfle sont les meilleurs « mainteneurs » de CMA en rotation.", "contexte_sci": "Les bénéfices des CMA : absorption P et microéléments, résistance hydrique, protection pathogènes. Les facteurs de disruption : labour, engrais P solubles, fongicides, absence de plante hôte.", "instructions": "Quantifier les bénéfices (absorption P ×10, résistance sécheresse). Identifier les pratiques qui détruisent les CMA. Lien : les couverts multi-espèces maintiennent le réseau CMA pendant l'interculture.", "style": "scientifique pratique"}, {"type": "section", "chapitre": 3, "section": 1, "titre_h1": "III. Les ECM et le CMN", "titre_h2": "3.1 Les ECM : champignons des forêts et agroforesterie", "titre_h3": null, "tableau": 0, "enrichissement": "→ Les ECM (ectomycorhizes) sont le réseau des FORÊTS : ils associent les arbres (chênes, hêtres, pins) et décomposent la litière ligneuse. Ils ne colonisent PAS les cultures annuelles — c'est le domaine des CMA.\n→ En agroforesterie, les ECM de l'arbre et les CMA des cultures coexistent. L'arbre fournit la lignine (via ses racines et sa litière) qui nourrit les saprotrophes, lesquels préparent le terrain pour les CMA des cultures voisines.\n→ Les ECM séquestrent du carbone dans leurs manteaux hyphiques (glomaline, mélanine) qui se lient aux argiles. L'arbre est une usine à MAOM via ses champignons associés.", "contexte_sci": "Les ectomycorhizes (ECM) dominent les écosystèmes forestiers et pérennes. Leur réseau de Hartig et leur manteau fongique créent une interface massive pour les échanges nutritifs.", "instructions": "Distinguer CMA (arbuscules, intracellulaire) et ECM (manteau, réseau de Hartig). Les ECM et les arbres pérennes. Termes : ECM, CMN.", "style": "scientifique dense"}, {"type": "section", "chapitre": 3, "section": 2, "titre_h1": null, "titre_h2": "3.2 Le CMN : réseau souterrain et mémoire écologique", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le CMN (Common Mycorrhizal Network) connecte les arbres entre eux et avec les plantes herbacées via les hyphes mycorhiziens. Il redistribue : eau (hydraulic lift), phosphore, azote, signaux de défense (ISR).\n→ Le « wood wide web » : les arbres mères (les plus grands, les plus anciens) redistribuent les nutriments vers les jeunes pousses via le CMN. C'est un réseau de SOLIDARITÉ, pas de compétition.\n→ Le CMN est une mémoire écologique : il conserve l'information sur les pathogènes rencontrés et transmet les signaux d'alerte aux plantes connectées. Un sol avec un CMN intact a une « mémoire immunitaire » collective.", "contexte_sci": "Le CMN (Common Mycorrhizal Network) connecte les plantes entre elles via les hyphes mycorhiziens. Il permet le transfert de carbone, d'azote et de signaux de défense entre individus. Lien avec l'agroforesterie (CMN agroforestier comme extension pratique).", "instructions": "Expliquer le CMN comme réseau de communication et de partage. Le concept de plante-mère (mother tree). Transfert de ressources et signaux d'alerte. Termes : CMN, réseau mycorhizien, mycorrhizosphère.", "style": "scientifique dense"}, {"type": "section", "chapitre": 4, "section": 1, "titre_h1": "IV. La nécromasse fongique", "titre_h2": "4.1 Pourquoi la nécromasse fongique stabilise le carbone", "titre_h3": null, "tableau": 0, "enrichissement": "→ La nécromasse fongique est le pool de carbone le plus STABLE du sol : chitine (temps de résidence > 100 ans), mélanine (résiste à l'oxydation), glomaline (hydrophobe, lie les agrégats). Les champignons construisent le gîte (Husson) en mourant.\n→ La nécromasse fongique se lie préférentiellement aux argiles et aux oxydes Fe/Al = MAOM. Le ratio nécromasse/biomasse augmente avec la maturité du sol : un sol stable a plus de carbone fongique MORT que vivant.\n→ Le non-labour favorise l'accumulation de nécromasse : les hyphes ne sont pas brisés, ils meurent naturellement in situ et se stabilisent sur place. Le labour disperse la nécromasse et l'expose à la minéralisation.", "contexte_sci": "La nécromasse fongique (parois de chitine, mélanine) est plus résistante à la décomposition que la nécromasse bactérienne. Elle contribue massivement à la MAOM et à la stabilisation du carbone. La GRSP/glomaline cimente les agrégats. Lien avec l'architecture du sol (hyphes et glomaline stabilisent les agrégats).", "instructions": "Expliquer pourquoi la nécromasse fongique stabilise mieux le carbone que la bactérienne (chitine vs peptidoglycane). Le rôle de la GRSP/glomaline dans la stabilisation des agrégats. Termes : nécromasse fongique, GRSP/glomaline.", "style": "scientifique dense"}, {"type": "section", "chapitre": 4, "section": 2, "titre_h1": null, "titre_h2": "4.2 Le ratio F/B : indicateur clé", "titre_h3": null, "tableau": 1, "enrichissement": "→ Le ratio F/B (PLFA) est le meilleur proxy terrain de la maturité du sol : F/B < 0.5 = sol bactérien, perturbé, copiotrophes dominants. F/B 0.5-1 = transition. F/B > 1 = sol fongique, mature, oligotrophes + champignons.\n→ Le F/B corrèle avec les zones de Husson : Zone 4 (F/B < 0.3), Zone 3 (0.3-0.7), Zone 2 (0.7-1.2), Zone 1 (> 1.2). C'est un indicateur de la chronoséquence : où en est le sol dans sa trajectoire de régénération.\n→ Attention : le F/B varie naturellement avec la saison (plus élevé en automne/hiver quand la litière alimente les saprotrophes) et la profondeur (plus élevé en surface). Comparer des mesures à même saison et même profondeur.", "contexte_sci": "Le ratio F/B (champignons/bactéries) est un indicateur clé de maturité du sol. Un ratio élevé indique un écosystème mature dominé par les champignons. Lien avec la transition (le ratio F/B positionne l'exploitation sur la chronoséquence de régénération).", "instructions": "Expliquer le ratio F/B comme indicateur de maturité écologique du sol. Relier aux pratiques : le non-labour et les apports carbonés favorisent les champignons. Termes : ratio F/B, nécromasse fongique.", "style": "opérationnel pratique"}, {"type": "section", "chapitre": 5, "section": 1, "titre_h1": "V. Mycoparasites et biocontrôle fongique", "titre_h2": "5.1 Trichoderma : le couteau suisse fongique du sol", "titre_h3": null, "tableau": 0, "enrichissement": "→ Trichoderma = le « couteau suisse » fongique : (1) mycoparasite (attaque les pathogènes) (2) promoteur de croissance (production IAA, solubilisation P) (3) inducteur d'ISR (4) décomposeur de cellulose (5) producteur d'antibiotiques (gliotoxine).\n→ Trichoderma est le biocontrol agent le plus utilisé au monde (>60% des biofongicides commerciaux). Il colonise la rhizosphère en 24-48h et établit une barrière permanente contre Fusarium, Pythium, Rhizoctonia.\n→ Le bokashi enrichi en Trichoderma = double action : fermentation (correction redox, métabolites bénéfiques) + biocontrôle (colonisation rhizosphérique). Les deux effets sont synergiques.", "contexte_sci": "Trichoderma est un genre polyvalent : biocontrôle par mycoparasitisme, stimulation de croissance, dégradation de la MO. C'est le champignon le plus utilisé en biocontrôle agricole.", "instructions": "Décrire les mécanismes de Trichoderma : mycoparasitisme direct, enzymes lytiques, compétition, ISR. Applications pratiques. Termes : Trichoderma, mycoparasitisme.", "style": "scientifique pratique"}, {"type": "section", "chapitre": 5, "section": 2, "titre_h1": null, "titre_h2": "5.2 Le mycobiome et la résistance aux pathogènes", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le mycobiome sain = diversité fongique qui empêche la dominance d'un pathogène. La résistance aux pathogènes est une propriété ÉMERGENTE de la diversité, pas d'un organisme unique.\n→ La succession fongique après perturbation : Mucor/Rhizopus (pionniers, r-stratèges) → Trichoderma/Penicillium (colonisateurs) → CMA/ECM (symbiotes stables). Le labour bloque la succession au stade pionnier.\n→ Les champignons entomopathogènes (Beauveria, Metarhizium) sont un service écosystémique GRATUIT du sol fongique : ils contrôlent les ravageurs sans pesticides. Ils sont détruits par le labour et les fongicides.", "contexte_sci": "Le mycobiome du sol contribue à la résistance aux pathogènes par compétition, antibiose et induction de résistance. La diversité fongique est une assurance contre les maladies telluriques.", "instructions": "Relier diversité fongique et résistance aux maladies. Les champignons endophytes protecteurs. Le concept de sol suppressif vu du côté fongique. Termes : mycoparasitisme, suppressivité.", "style": "scientifique dense"}, {"type": "conclusion", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": null, "contexte_sci": "Ce document couvre 10 sections organisées autour de 5 chapitres : I. Les guildes fongiques, II. Les CMA, III. Les ECM et le CMN, IV. La nécromasse fongique et 1 autres. La conclusion doit synthétiser les mécanismes clés et ouvrir sur les perspectives pratiques ou scientifiques.", "instructions": "Le royaume fongique est l'architecte et le réseau du sol vivant. Synthétiser : les saprotrophes structurent, les mycorhiziens connectent et nourrissent, la nécromasse stabilise le carbone, les mycoparasites protègent. Sans champignons, pas de sol vivant.", "style": "narratif synthétique"}], "n_terms": 23}, {"code": "S4", "titre": "Le Carbone et les Grands Cycles", "strate": "S", "note": "Absorbe Redox + Enzymes + Carbone. POC/MAOM, pompe microbienne, k1, RothC, diagramme Eh-pH, cycles N/P/S/Fe couplés, microsites anoxiques, priming effect.", "titre_jenni": "Le Carbone et les Grands Cycles Biogéochimiques", "style": "scientifique dense", "statut_redaction": "a_faire", "priorite": 9, "angle_entree": "65% du carbone organique stable du sol est d'origine microbienne. La nécromasse est le chemin royal.", "public_cible": "chercheur, climatologue, agronome", "sources_core": null, "notes_jenni": "MAOM vs POM, priming effect, stabilisation. Document le plus cité du corpus.", "sections": [{"type": "intro", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": "→ Carbone = gîte (structure, capacité tampon) + couvert (énergie micro-organismes). Distinction fondamentale de Husson. L'humification convertit le couvert en gîte. Un sol fonctionnel a besoin des DEUX.\n→ Ratio C/Argile comme proxy de l'état structural : >1/8 (Zone 1, structuré) → 1/10 (Zone 2, faux plat) → 1/13 (Zone 3, seuil critique) → <1/13 (Zone 4, effondré). Corrélé au score VESS.\n→ Réaction de Fenton : 30-50% de la minéralisation dans sols riches en fer. Le vrai mécanisme de destruction du C par le labour.\n→ Ratio stœchiométrique Kirkby : 1 tC → 83N + 20P + 14S. Coeff. humification passe de 0.15 à 0.60. +5.5 tC/ha vs -3 tC/ha en 5 ans. LEVIER LE PLUS PUISSANT ET LE MOINS CONNU.\n→ Ration du sol : apport annuel de C de surface = k1/k2 de Hénin-Dupuis appliqué. La forêt produit sa propre ration depuis des millions d'années.", "contexte_sci": "65% du carbone organique stable du sol est d'origine microbienne. La nécromasse est le chemin royal. Il mobilise 47 termes canoniques et 6 connexions vers d'autres documents du corpus. Il intervient dans les chaînes causales : [À VALIDER] Piège de la performance → Robustesse par les contreperformances.", "instructions": "Présenter les grands cycles biogéochimiques (C, N, P, S) comme les flux d'énergie et de matière qui traversent le sol vivant. Le carbone est le cycle central qui conditionne tous les autres. Annoncer : pools de carbone, potentiel redox, cycle de l'azote, cycle du phosphore, soufre et voie oxalate-carbonate.", "style": "scientifique dense"}, {"type": "section", "chapitre": 1, "section": 1, "titre_h1": "I. Le cycle du carbone dans le sol", "titre_h2": "1.1 Les pools de carbone et leurs temps de résidence", "titre_h3": null, "tableau": 1, "enrichissement": "→ Trois pools de carbone : (1) POC (particulate, 1-50 ans, débris végétaux, énergie pour les micro-organismes = « couvert » de Husson) (2) MAOM (mineral-associated, 100-10000 ans, nécromasse sur argiles = « gîte ») (3) carbonates (inorganique, séquestration par la voie oxalate-carbonate).\n→ Le POC est le CARBURANT du sol — il nourrit les micro-organismes. Le MAOM est la STRUCTURE — il stabilise les agrégats et retient l'eau. Un sol fonctionnel a besoin des DEUX.\n→ Le temps de résidence dépend de la PROTECTION : le même composé organique a un temps de résidence de 1 an en surface libre et de 1000 ans adsorbé dans un micro-agrégat. La structure du sol détermine le stockage.", "contexte_sci": "Le carbone du sol existe sous deux formes principales : POC (particulaire, labile) et MAOM (associée aux minéraux, stable). Leur dynamique détermine la séquestration et la fertilité à long terme. Le ratio C/Argile indique le degré de saturation.", "instructions": "Distinguer POC et MAOM : formation, temps de résidence, rôles. Le coefficient K1 (humification). Les 133 GtC du stock mondial de carbone du sol. Termes : POC, MAOM, K1 (coefficient d'humification), ratio C/Argile, 133 GtC, séquestration.", "style": "scientifique dense"}, {"type": "section", "chapitre": 1, "section": 2, "titre_h1": null, "titre_h2": "1.2 La Microbial Carbon Pump : de la plante à la MAOM", "titre_h3": null, "tableau": 0, "enrichissement": "→ La Microbial Carbon Pump (Liang 2017) : les micro-organismes transforment le POC (labile) en nécromasse (stable) qui se stabilise en MAOM sur les argiles. C'est le mécanisme dominant de formation du carbone stable — PAS l'humification classique.\n→ Le paradigme a changé : l'ancien modèle (humification progressive : litière → humus) est remplacé par le modèle MCP (turnover microbien : litière → métabolisme → nécromasse → MAOM). Les micro-organismes sont les AGENTS, pas les témoins.\n→ Le CUE détermine l'efficience de la pompe : CUE 0.6 = 60% du carbone ingéré devient nécromasse (puis MAOM). Les oligotrophes (CUE élevé) sont les meilleurs constructeurs de carbone stable.", "contexte_sci": "La pompe microbienne du carbone transforme le carbone végétal labile en MAOM stable via la nécromasse. Le CUE microbien détermine l'efficacité de cette pompe. C'est le mécanisme principal de séquestration.", "instructions": "Expliquer le cycle : exsudats racinaires → biomasse microbienne → nécromasse → MAOM. Le concept de carbone-énergie vs carbone-structure. Termes : nécromasse microbienne, MAOM, CUE, carbone-énergie vs carbone-structure, ration du sol.", "style": "scientifique dense"}, {"type": "section", "chapitre": 2, "section": 1, "titre_h1": "II. Le potentiel redox", "titre_h2": "2.1 La tour redox : séquence des accepteurs d'électrons", "titre_h3": null, "tableau": 1, "enrichissement": "→ La tour redox (redox ladder) : O₂ → NO₃⁻ → Mn⁴⁺ → Fe³⁺ → SO₄²⁻ → CO₂. Chaque accepteur d'électrons s'épuise dans l'ordre, et le métabolisme associé prend le relais. C'est la LOGIQUE des microsites anaérobies du sol.\n→ Le Eh (potentiel redox) pilote TOUT : +400 mV = sol aéré (nitrification), +200 mV = réduction Mn (mobilisation), +100 mV = réduction Fe (solubilisation P), -100 mV = sulfato-réduction (H₂S si excès), -200 mV = méthanogenèse.\n→ Un sol bien structuré a une LARGE gamme de Eh dans l'ESPACE (microsites aérobies et anaérobies coexistent) et de FAIBLES variations dans le TEMPS. C'est la définition de la robustesse (Hamant) appliquée au redox.", "contexte_sci": "La tour redox est la séquence des accepteurs d'électrons utilisés par les micro-organismes lors de la décomposition : O2 → NO3- → Mn4+ → Fe3+ → SO42- → CO2. Le potentiel redox (Eh) mesure cette séquence.", "instructions": "Expliquer la séquence redox et ses implications pour la fertilité. Relier à la réaction de Fenton (fer et dégradation MO). Termes : potentiel redox (Eh), tour redox, réaction de Fenton.", "style": "scientifique dense"}, {"type": "section", "chapitre": 2, "section": 2, "titre_h1": null, "titre_h2": "2.2 Le Eh comme outil de pilotage agronomique", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le Eh comme outil de pilotage agronomique : mesurer le Eh à 15 et 30 cm donne l'état redox du sol en temps réel. Eh < -100 mV à 15 cm = sol engorgé (risque H₂S). Eh > +300 mV à 30 cm = sol trop aéré (minéralisation active).\n→ La réaction de Fenton (Fe²⁺ + H₂O₂ → OH•) est déclenchée par l'alternance redox. Les radicaux OH• détruisent 30-50% de la MO « stable » dans les sols riches en fer. Le labour crée ces alternances en exposant les horizons profonds.\n→ En sol de maraîchage (arrosage/drainage fréquent), le Fenton peut être le premier mécanisme de perte de MO — devant la respiration microbienne. Réduire les alternances humide/sec protège le carbone.", "contexte_sci": "Le Eh comme outil de diagnostic agronomique. Les zones Eh/pH caractérisent les types de sol et leur fonctionnement biologique. Lien avec le bokashi (le potentiel redox piloté par les fermentations).", "instructions": "Applications pratiques du Eh : diagnostic, pilotage des fermentations, interprétation des analyses de sol. Termes : potentiel redox (Eh).", "style": "opérationnel pratique"}, {"type": "section", "chapitre": 3, "section": 1, "titre_h1": "III. Le cycle de l'azote", "titre_h2": "3.1 Nitrification, dénitrification et pertes gazeuses", "titre_h3": null, "tableau": 0, "enrichissement": "→ La nitrification (NH₄⁺ → NO₂⁻ → NO₃⁻) est un processus aérobie qui ACIDIFIE le sol (2H⁺ par NH₄⁺ oxydé). L'engrais azoté ammoniacal nitrification → acidification → perte de structure → lessivage nitrates → eutrophisation.\n→ La dénitrification (NO₃⁻ → N₂O → N₂) est anaérobie et produit du N₂O (298× le pouvoir réchauffant du CO₂). En sol compacté (anaérobiose forcée + nitrates du lessivage), les pertes gazeuses peuvent atteindre 5-10% de l'azote apporté.\n→ La fixation biologique (rhizobiums) produit NH₄⁺ directement dans le nodule, sans passer par la nitrification. Pas d'acidification, pas de lessivage, pas de N₂O. Le système biologique est PROPRE par conception.", "contexte_sci": "Le cycle de l'azote : fixation biologique → ammonification → nitrification → assimilation. Les pertes par dénitrification et lessivage. Le N-mining (extraction d'azote de la MO stable par les microbes affamés en carbone).", "instructions": "Expliquer les étapes du cycle N dans le sol vivant. Le N-mining comme risque en sol appauvri. La stœchiométrie CNPS comme verrou. Termes : N-mining, CNPS, ratio stœchiométrique NPS (Kirkby), minéralisation secondaire.", "style": "scientifique dense"}, {"type": "section", "chapitre": 3, "section": 2, "titre_h1": null, "titre_h2": "3.2 La stœchiométrie C:N:P:S comme verrou de la stabilisation", "titre_h3": null, "tableau": 1, "enrichissement": "→ Le ratio stœchiométrique de Kirkby : 1 tonne de carbone stabilisé nécessite 83 kg N + 20 kg P + 14 kg S. Si l'un des trois manque, le carbone est minéralisé au lieu d'être stabilisé. C'est le VERROU de la séquestration.\n→ Le rapport C:N du substrat détermine le sort du carbone : C:N < 20 = minéralisation nette (N libéré pour la plante), C:N > 30 = immobilisation (N capté par les micro-organismes, « faim d'azote »), C:N 20-30 = humification optimale.\n→ Le bokashi + urine (N) + cendre (P, K) ≈ Kirkby empirique. La diversité du substrat fermenté équilibre naturellement les ratios. C'est plus fiable qu'un calcul théorique sur des apports simples.", "contexte_sci": "La stœchiométrie C:N:P:S détermine si les micro-organismes minéralisent ou immobilisent les nutriments. Le ratio de Kirkby (NPS) est le seuil critique. C'est le verrou nutritionnel du sol vivant.", "instructions": "Expliquer le concept de stœchiométrie comme clé de la nutrition des plantes. Ratio C/N critique (~25), ratio NPS de Kirkby. Termes : CNPS, ratio stœchiométrique NPS (Kirkby).", "style": "scientifique dense"}, {"type": "section", "chapitre": 4, "section": 1, "titre_h1": "IV. Le cycle du phosphore", "titre_h2": "4.1 Le cycle du phosphore : Fe, Al, pH et disponibilité", "titre_h3": null, "tableau": 1, "enrichissement": "→ Le phosphore est IMMOBILE dans le sol : il ne se déplace que par diffusion sur quelques mm. 80% du P total est fixé sur les oxydes Fe/Al (en sol acide) ou les carbonates (en sol calcaire). La chimie du sol PIÈGE le P.\n→ La solubilisation biologique est la SEULE voie durable : (1) acides organiques bactériens (citrate, oxalate) qui chélatent Fe³⁺/Al³⁺ (2) phosphatases microbiennes qui minéralisent le P organique (3) hyphes mycorhiziens qui explorent les micropores.\n→ Le pH est le levier : disponibilité P maximale entre pH 6.0-7.0. En sol acide, le chaulage libère le P fixé sur Fe/Al. En sol calcaire, l'acidification rhizosphérique (exsudats racinaires) solubilise le P fixé sur CaCO₃.", "contexte_sci": "Le phosphore est fixé sur les oxydes Fe/Al et les argiles. Sa libération dépend du pH, du Eh et de l'activité biologique (PSB, mycorhizes, exsudats racinaires). Lien avec l'holobionte (les exsudats racinaires déclenchent la solubilisation biologique du phosphore).", "instructions": "Expliquer les mécanismes de fixation et libération du P. Relier aux oxydes Fe/Al et au pH du sol. Les PSB et les CMA comme libérateurs biologiques du P. Termes : adsorption, oxydes Fe/Al.", "style": "scientifique dense"}, {"type": "section", "chapitre": 5, "section": 1, "titre_h1": "V. Les cycles du soufre et voie oxalate-carbonate", "titre_h2": "5.1 Le cycle du soufre", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le cycle du soufre est le « cycle oublié » : le S est requis pour la méthionine et la cystéine (acides aminés essentiels) ET pour la stabilisation du carbone (ratio de Kirkby). Les sols agricoles sont de plus en plus carencés en S (fin des pluies acides).\n→ La sulfato-réduction (SO₄²⁻ → H₂S) est anaérobie et produit des sulfures toxiques. L'odeur d'œuf pourri dans un sol engorgé = H₂S = sol en sulfato-réduction. Signal d'alerte : drainage ou décompaction urgente.\n→ Les bactéries sulfo-oxydantes (Thiobacillus) recyclent le H₂S en sulfate disponible dès que l'oxygène revient. Le cycle S est auto-régulé si le sol a un gradient redox sain (microsites aérobies ET anaérobies).", "contexte_sci": "Le cycle du soufre est couplé au cycle redox. Le soufre oscille entre formes oxydées (sulfates) et réduites (sulfures, thiosulfates) selon le Eh. Les micro-organismes sulfo-oxydants et sulfato-réducteurs sont les moteurs de ce cycle.", "instructions": "Expliquer le cycle S dans le contexte du sol vivant. Relier au Eh et aux microsites anaérobies. Termes : potentiel redox (Eh), microsites.", "style": "scientifique dense"}, {"type": "section", "chapitre": 5, "section": 2, "titre_h1": null, "titre_h2": "5.2 La voie oxalate-carbonate : séquestration inorganique", "titre_h3": null, "tableau": 0, "enrichissement": "→ La voie oxalate-carbonate : les champignons sécrètent de l'oxalate → bactéries oxalotrophes oxydent l'oxalate → production de CaCO₃ biogénique. C'est une séquestration INORGANIQUE de carbone, quasi permanente.\n→ En agroforesterie, les racines d'arbres + ECM produisent de l'oxalate en profondeur. Les carbonates précipités stabilisent le pH et créent une réserve calcique. L'arbre est une usine à carbonates biogéniques.\n→ Le potentiel est énorme : 0.5-2 tCO₂/ha/an séquestrés par la voie OCP dans les systèmes agroforestiers tropicaux. En climat tempéré, les données sont encore rares mais les mécanismes sont identiques.", "contexte_sci": "La voie oxalate-carbonate est un mécanisme de séquestration du carbone par minéralisation : les champignons produisent de l'acide oxalique qui attaque les silicates, libérant du calcium qui précipite en carbonate de calcium. C'est une séquestration géologique. Lien avec l'agroforesterie (CMN agroforestier et oxalate-carbonate).", "instructions": "Expliquer le mécanisme : oxalate fongique → dissolution silicates → CaCO3. Quantifier le potentiel de séquestration. Termes : voie oxalate-carbonate, séquestration.", "style": "scientifique dense"}, {"type": "conclusion", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": null, "contexte_sci": "Ce document couvre 9 sections organisées autour de 5 chapitres : I. Le cycle du carbone dans le sol, II. Le potentiel redox, III. Le cycle de l'azote, IV. Le cycle du phosphore et 1 autres. La conclusion doit synthétiser les mécanismes clés et ouvrir sur les perspectives pratiques ou scientifiques.", "instructions": "Le carbone est la monnaie du sol vivant. Synthétiser : le carbone nourrit le microbiome, le microbiome stabilise le carbone, les cycles N/P/S dépendent du carbone. Le Eh pilote les transitions entre états. Relier au bilan carbone net et à l'économie du vivant.", "style": "narratif synthétique"}], "n_terms": 60}, {"code": "V1", "titre": "La Faune du Sol", "strate": "V", "note": "Nouveau document. 3 guildes de vers (Bouché), nématodes (5 guildes trophiques), collemboles, acariens, réseau trophique, bio-tillage.", "titre_jenni": "La Faune du Sol — Vers de terre, nématodes et réseau trophique", "style": "scientifique synthétique", "statut_redaction": "a_faire", "priorite": 10, "angle_entree": "La plante n'est pas passive — elle orchestre activement son microbiome via des milliers de molécules signal.", "public_cible": "chercheur, agronome", "sources_core": null, "notes_jenni": "Exsudats, signals, trophobiose. Relier à V2 (holobionte) et S2 (recrutement sélectif).", "sections": [{"type": "intro", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": "→ Les vers de terre créent les germes d'agrégation (Husson). Leur tube digestif anaérobie produit des micro-agrégats enrichis en MO stabilisée par mucus. Chaque turricule = un hotspot de microagrégation.\n→ Le réseau de galeries anéciques = le système de plomberie du sol. Macroporosité biologique, Ksat ×10. Détruit par le labour, 2-5 ans pour reconstruire.\n→ L'indice de maturité de Bongers positionne sur la trajectoire Husson : nématodes bactérivores/fungivores = Zones 2-3 (dynamique MO), prédateurs = Zone 1 (régulation, sol mature).", "contexte_sci": "La plante n'est pas passive — elle orchestre activement son microbiome via des milliers de molécules signal. Il mobilise 19 termes canoniques et 4 connexions vers d'autres documents du corpus.", "instructions": "Présenter la faune du sol comme les ingénieurs et régulateurs de l'écosystème souterrain. Les vers de terre, collemboles, acariens et nématodes sont les acteurs de la bioturbation, de la décomposition et du réseau trophique. Annoncer : vers de terre, mésofaune, nématodes, réseau trophique.", "style": "scientifique accessible"}, {"type": "section", "chapitre": 1, "section": 1, "titre_h1": "I. Les vers de terre", "titre_h2": "1.1 Classification de Marcel Bouché : 3 guildes", "titre_h3": null, "tableau": 1, "enrichissement": "→ Marcel Bouché (3 guildes) : (1) épigés (surface, litière, 3-5 cm) (2) endogés (sol minéral, 10-30 cm, pas de litière) (3) anéciques (verticaux, 0.5-2 m, litière → profondeur). Les anéciques sont les INGÉNIEURS clés — ils connectent surface et profondeur.\n→ Un sol sain contient 1-5 tonnes de vers de terre par hectare. En sol labouré : 100-500 kg/ha. Le labour détruit 50-90% de la population en un passage, avec 2-5 ans de reconstitution.\n→ Les vers de terre ne sont pas « utiles au sol » — ils SONT le sol. Sans eux, pas de macroporosité, pas de brassage MO-argile, pas de turricules (hotspots de microagrégation).", "contexte_sci": "Les vers de terre se classent en 3 guildes écologiques (Marcel Bouché) : épigés (litière), endogés (sol), anéciques (vertical). Chaque guilde a un rôle hydraulique et structural distinct. Lien avec l'eau dans le sol (biopores et conductivité hydraulique).", "instructions": "Classification de Marcel Bouché. Distinguer les 3 guildes : habitats, tailles, rôles. Termes : vers de terre, anéciques, drilosphère, bioturbation, biopore.", "style": "scientifique dense"}, {"type": "section", "chapitre": 1, "section": 2, "titre_h1": null, "titre_h2": "1.2 Le tube digestif comme bioréacteur microbien", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le tube digestif du ver de terre est un bioréacteur anaérobie : pH neutre, Eh -200 mV, transit 2-4h. Il transforme la litière + sol en turricules enrichis en bactéries fixatrices de N, en CaCO₃ biogénique, et en micro-agrégats stabilisés.\n→ Le turricule est un HOTSPOT : 5× plus de biomasse bactérienne, 7× plus de P disponible, 3× plus de N minéralisable que le sol environnant. Chaque turricule est une micro-zone de fertilité.\n→ Convergence avec l'intestin humain : même conditions (anaérobie, pH neutre), mêmes voies fermentaires (SCFA), même rôle de brassage et de transformation. Le ver de terre est l'intestin du sol.", "contexte_sci": "Le tube digestif du ver de terre est un bioréacteur : il broie, mélange la MO aux argiles, stimule les micro-organismes et produit des turricules enrichis en nutriments assimilables. Le mucus lombricien est une glycoprotéine dont le rôle nutritif pour les plantes reste mal compris.", "instructions": "Décrire le processus digestif et la transformation de la MO. Le mucus comme interface biologique. Termes : vers de terre, biopore, bioturbation.", "style": "scientifique dense"}, {"type": "section", "chapitre": 1, "section": 3, "titre_h1": null, "titre_h2": "1.3 Services écosystémiques des vers de terre", "titre_h3": null, "tableau": 0, "enrichissement": "→ Services écosystémiques : (1) macroporosité (galeries = Ksat ×10) (2) incorporation MO (litière → profondeur) (3) agrégation (turricules = micro-agrégats stables) (4) régulation pathogènes (ingestion de spores) (5) aération sélective.\n→ Le service hydraulique est le plus critique : les galeries d'anéciques sont les seuls conduits verticaux continus de la surface au sous-sol. Sans eux, l'infiltration repose uniquement sur la matrice = risque de ruissellement.\n→ Les vers de terre travaillent GRATUITEMENT : 10-40 tonnes de turricules/ha/an. L'équivalent mécanique (sous-solage + incorporation MO + amendement calcique) coûterait 2000-5000 €/ha/an.", "contexte_sci": "Les services écosystémiques des vers : structuration du sol (biopores, macroporosité), cycle des nutriments (N, P via turricules), régulation hydrique (infiltration ×10 dans les galeries anéciques).", "instructions": "Quantifier les services : données sur infiltration, recyclage N, structuration. Relier aux pratiques qui favorisent les vers. Termes : vers de terre, anéciques, bioturbation, biopore.", "style": "scientifique pratique"}, {"type": "section", "chapitre": 2, "section": 1, "titre_h1": "II. Faune mésoédaphique", "titre_h2": "2.1 Collemboles : régulateurs des micro-habitats", "titre_h3": null, "tableau": 0, "enrichissement": "→ Les collemboles (1-5 mm) régulent les populations fongiques : ils broutent les hyphes, sélectionnant les espèces fongiques résistantes (CMA, saprotrophes mélanisés). C'est un contrôle TOP-DOWN qui façonne le mycobiome.\n→ Densités typiques : 10 000-100 000 individus/m² dans un sol forestier. En sol labouré : 1 000-5 000/m². Leur abondance est un indicateur de la qualité de l'habitat (litière, humidité, structure).\n→ Les collemboles créent des micro-habitats par leurs déjections et leurs tunnels (50-500 µm). Ils améliorent la microporosité et redistribuent les spores fongiques. Ce sont les jardiniers microscopiques du sol.", "contexte_sci": "Les collemboles régulent les populations fongiques et bactériennes par broutage sélectif. Ils influencent la décomposition de la litière et la structure des micro-habitats.", "instructions": "Écologie des collemboles : alimentation, habitats, rôle régulateur. Termes : collemboles, phagie microbienne.", "style": "scientifique dense"}, {"type": "section", "chapitre": 2, "section": 2, "titre_h1": null, "titre_h2": "2.2 Acariens du sol : diversité et rôles", "titre_h3": null, "tableau": 0, "enrichissement": "→ Les acariens du sol (oribates, prédateurs, parasites) : 200 000+ espèces décrites. Les oribates décomposent la litière et transportent les spores fongiques. Les prédateurs (Gamasina) contrôlent les populations de nématodes et collemboles.\n→ Le ratio prédateurs/proies dans la mésofaune indique la stabilité de l'écosystème. Un sol mature a plus de prédateurs (régulation top-down = homéostasie). Un sol perturbé a des explosions de proies sans contrôle.\n→ Les oribates sont des indicateurs de NON-PERTURBATION : cycle de vie long (1-2 ans), mobilité faible, sensibles au labour. Leur présence signale un sol qui n'a pas été perturbé depuis > 3 ans.", "contexte_sci": "Les acariens du sol : grande diversité fonctionnelle (prédateurs, détritivores, fongivores). Indicateurs de qualité du sol.", "instructions": "Diversité des acariens : Oribates (détritivores), Gamasina (prédateurs). Rôle dans le réseau trophique. Termes : acariens du sol.", "style": "scientifique dense"}, {"type": "section", "chapitre": 3, "section": 1, "titre_h1": "III. Nématodes", "titre_h2": "3.1 Guildes trophiques des nématodes", "titre_h3": null, "tableau": 1, "enrichissement": "→ Les nématodes sont les organismes les plus ABONDANTS du sol (1-10 millions/m²). Quatre guildes trophiques : bactérivores (recyclage N), fungivores (régulation champignons), herbivores (pathogènes racinaires), prédateurs/omnivores (régulation faune).\n→ L'indice de maturité de Bongers classe les nématodes de c-p 1 (colonisateurs, opportunistes, sol perturbé) à c-p 5 (persistants, prédateurs, sol mature). Un MI > 3 indique un sol en bonne santé écologique.\n→ Les nématodes bactérivores libèrent l'azote « piégé » dans la biomasse bactérienne : ils mangent les bactéries et excrètent NH₄⁺ directement dans la rhizosphère. C'est le « grazing loop » = recyclage rapide de N.", "contexte_sci": "Les nématodes se classent en guildes trophiques : bactérivores, fongivores, prédateurs, phytophages, omnivores. L'indice de maturité de Bongers est un outil diagnostique puissant. Lien avec la transition (indice de Bongers comme indicateur de position dans la chronoséquence).", "instructions": "Décrire les guildes trophiques. L'indice de maturité de Bongers (colonisateurs c-p 1 → persistants c-p 5). Termes : nématodes, boucle microbienne.", "style": "scientifique dense"}, {"type": "section", "chapitre": 3, "section": 2, "titre_h1": null, "titre_h2": "3.2 Extraction et diagnostic par entonnoir de Baermann", "titre_h3": null, "tableau": 0, "enrichissement": "→ L'entonnoir de Baermann est le diagnostic TERRAIN le plus simple pour la mésofaune : sol humide sur tamis, éclairage par dessus, les nématodes migrent vers le bas par phototropisme négatif. Résultat en 48h, sans microscope de recherche.\n→ Le dénombrement par guildes (bactérivores/fungivores/prédateurs) donne plus d'information que le comptage total. Un sol avec 80% de bactérivores est en phase de reconstruction (MO labile abondante). Un sol avec 20% de prédateurs est mature.\n→ Complémentarité avec le PLFA : les nématodes indiquent l'état du réseau trophique (qui mange qui), le PLFA indique la biomasse vivante (combien de biomasse fongique vs bactérienne). Les deux ensemble = diagnostic complet.", "contexte_sci": "L'extraction des nématodes par entonnoir de Baermann est une méthode de diagnostic terrain accessible. L'analyse du profil trophique révèle l'état fonctionnel du sol.", "instructions": "Méthode pratique : extraction, comptage, interprétation. Relier au diagnostic. Termes : nématodes.", "style": "opérationnel pratique"}, {"type": "section", "chapitre": 4, "section": 1, "titre_h1": "IV. Réseau trophique", "titre_h2": "4.1 Structure et fonctionnement du réseau trophique", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le réseau trophique du sol = 5 niveaux : (1) ressources (litière, exsudats, nécromasse) (2) décomposeurs primaires (bactéries, champignons) (3) consommateurs primaires (nématodes bactérivores, collemboles) (4) prédateurs (nématodes prédateurs, acariens Gamasina) (5) super-prédateurs (carabes, staphylins).\n→ Le réseau trophique contrôle le RECYCLAGE des nutriments : sans prédation, les bactéries immobilisent N et P. La prédation (grazing loop) libère 40-60% de l'N bactérien en NH₄⁺ disponible pour les plantes.\n→ La complexité du réseau trophique = résilience. Un sol avec 4-5 niveaux trophiques fonctionnels récupère plus vite d'une perturbation qu'un sol simplifié (2 niveaux). C'est la robustesse (Hamant) appliquée à l'écologie du sol.", "contexte_sci": "Le réseau trophique du sol fonctionne en cascade : bactéries/champignons → nématodes/collemboles → prédateurs. La phagie microbienne libère les nutriments immobilisés dans la biomasse. Lien avec les grands cycles (régulation faunistique de l'effet d'amorçage).", "instructions": "Décrire la cascade trophique. Quantifier le rôle de la prédation dans le recyclage des nutriments. Le concept de boucle microbienne. Termes : phagie microbienne, boucle microbienne, réseau trophique.", "style": "scientifique dense"}, {"type": "section", "chapitre": 4, "section": 2, "titre_h1": null, "titre_h2": "4.2 Impact des pratiques sur le réseau trophique", "titre_h3": null, "tableau": 1, "enrichissement": "→ Le labour simplifie le réseau trophique : il élimine les niveaux 4-5 (prédateurs, super-prédateurs) et réduit le niveau 3 (collemboles, acariens). Le sol labouré fonctionne avec 2 niveaux = instable, sujet aux explosions de pathogènes.\n→ Le non-labour + mulch permanent reconstruit le réseau en 3-5 ans : d'abord les décomposeurs (1 an), puis les consommateurs primaires (2-3 ans), enfin les prédateurs (4-5 ans). La succession trophique est plus lente que la succession végétale.\n→ Les pesticides (insecticides, fongicides) détruisent sélectivement les niveaux supérieurs du réseau (prédateurs plus sensibles que les proies). Le résultat paradoxal : plus de pesticides → plus de ravageurs (perte de régulation top-down).", "contexte_sci": "Les pratiques agricoles affectent directement le réseau trophique : le labour détruit la macrofaune, les pesticides éliminent les prédateurs, le non-labour et les couverts restaurent la diversité fonctionnelle.", "instructions": "Impact du labour, des pesticides, du non-labour. Données sur la restauration des populations après transition. Termes : bioturbation, vers de terre.", "style": "scientifique pratique"}, {"type": "conclusion", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": null, "contexte_sci": "Ce document couvre 9 sections organisées autour de 4 chapitres : I. Les vers de terre, II. Faune mésoédaphique, III. Nématodes, IV. Réseau trophique. La conclusion doit synthétiser les mécanismes clés et ouvrir sur les perspectives pratiques ou scientifiques.", "instructions": "La faune du sol est le moteur vivant de la fertilité. Synthétiser : les vers structurent, les nématodes régulent, les collemboles recyclent, et le réseau trophique libère les nutriments. Sans faune, le sol est un substrat mort.", "style": "narratif synthétique"}], "n_terms": 20}, {"code": "V2", "titre": "L'Holobionte Plante-Microbiome", "strate": "V", "note": "Holobionte, hologénome, exsudats racinaires, recrutement sélectif, ISR/SAR, cycle de la rhizophagie (White 2018), LCO/facteurs Myc.", "titre_jenni": "L'Holobionte Plante-Microbiome", "style": "scientifique synthétique", "statut_redaction": "a_faire", "priorite": 11, "angle_entree": "La plante n'est pas un individu — c'est un holobionte. Son microbiome endophytique est partie intégrante de son immunité.", "public_cible": "chercheur, agronome expert", "sources_core": null, "notes_jenni": "ISR/SAR, rhizophagie, endophytes. Concept clé de la strate V.", "sections": [{"type": "intro", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": "→ Reprogrammation plasmidique : la plante ne fait pas que manger les bactéries (rhizophagie) — elle REPROGRAMME leurs plasmides pour commander la production de métabolites spécifiques. Les bactéries rejetées sont modifiées. Réponse bactérienne en 20 min vs heures pour la plante.\n→ « Nous cultivons des holobiontes, pas des plantes. Vous mangez un légume de sol vivant, vous mangez plus de cellules microbiennes que de cellules végétales » (conférence Eh/pH).\n→ Les endophytes SONT la chaîne sol-plante-humain. Sans endophytes = perte système immunitaire + croissance + biomasse.", "contexte_sci": "La plante n'est pas un individu — c'est un holobionte. Son microbiome endophytique est partie intégrante de son immunité. Il mobilise 34 termes canoniques et 11 connexions vers d'autres documents du corpus.", "instructions": "Présenter le concept d'holobionte : la plante et son microbiome forment une unité fonctionnelle indissociable. La communication chimique entre règnes pilote la nutrition, la défense et l'adaptation. Annoncer : exsudats racinaires, hormones microbiennes, rhizophagie, ISR/SAR, trophobiose.", "style": "scientifique dense"}, {"type": "section", "chapitre": 1, "section": 1, "titre_h1": "I. Communication plante-microbiome", "titre_h2": "1.1 Les exsudats racinaires : composition et fonctions", "titre_h3": null, "tableau": 0, "enrichissement": "→ Les exsudats racinaires = 10-40% du carbone photosynthétique. La plante INVESTIT massivement pour recruter et nourrir son microbiome. Ce n'est pas une perte — c'est un salaire versé aux employés microbiens.\n→ Composition des exsudats : sucres simples (glucose, fructose = énergie pour copiotrophes), acides organiques (citrate, malate = solubilisation P et Fe), acides aminés (tryptophane = précurseur d'IAA bactérienne), mucilage (lubrification + biofilm).\n→ La composition change avec le stress : sous carence P, la plante augmente les acides organiques. Sous attaque pathogène, elle augmente les phytoalexines. Les exsudats sont un SIGNAL, pas seulement une nourriture.", "contexte_sci": "Les exsudats racinaires représentent 20-40% du carbone fixé par photosynthèse. Leur composition (sucres, acides organiques, acides aminés) recrute sélectivement les micro-organismes bénéfiques. Lien avec les grands cycles (les exsudats déclenchent la solubilisation biologique du phosphore).", "instructions": "Décrire la composition des exsudats et leur rôle de recrutement sélectif. Quantifier l'allocation C. Termes : allocation C photosynthétique aux exsudats, SIREM, exsudats racinaires.", "style": "scientifique dense"}, {"type": "section", "chapitre": 1, "section": 2, "titre_h1": null, "titre_h2": "1.2 Recrutement par chimiotactisme", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le chimiotactisme = mouvement dirigé des bactéries vers les exsudats racinaires. Les PGPR « sentent » les acides organiques et le tryptophane à distance (gradient de concentration) et nagent vers la racine.\n→ La sélection est ACTIVE : la plante recrute spécifiquement les bactéries bénéfiques en émettant des signaux chimiques ciblés. Différentes espèces végétales recrutent des communautés microbiennes différentes — le microbiome est « sous commande ».\n→ Les strigolactones (signal mycorhizien conservé depuis 470 Ma) sont un cas particulier de chimiotactisme : la plante carencée en P émet des strigolactones → les CMA germent et colonisent → accès au P résolu.", "contexte_sci": "Le chimiotactisme permet aux bactéries de nager vers les exsudats racinaires. Ce recrutement actif façonne la rhizosphère comme un écosystème sélectionné par la plante. Lien avec l'agriculture de conservation (le recrutement microbien par chimiotactisme explique pourquoi la diversité des couverts améliore le microbiome).", "instructions": "Mécanisme du chimiotactisme. La rhizosphère comme zone d'influence. Relier au design des couverts végétaux. Termes : SIREM, endophytes.", "style": "scientifique dense"}, {"type": "section", "chapitre": 2, "section": 1, "titre_h1": "II. Hormones et signaux", "titre_h2": "2.1 L'holobionte : concept et implications", "titre_h3": null, "tableau": 0, "enrichissement": "→ L'organisme-microbiome = la plante + son microbiome considérés comme UN organisme. « Nous cultivons des organisme-microbiomes, pas des plantes. Un légume contient plus de cellules microbiennes que de cellules végétales. »\n→ L'hologénome (Zilber-Rosenberg & Rosenberg 2008) = le génome de la plante + les génomes de tous ses micro-organismes associés. L'évolution agit sur l'organisme-microbiome entier — la sélection variétale DEVRAIT sélectionner des organisme-microbiomes, pas des plantes isolées.\n→ La sélection variétale moderne a CASSÉ l'organisme-microbiome : les variétés sélectionnées en sol stérile (substrat + engrais) ont perdu la capacité de recruter efficacement les PGPR et les CMA. L'antifragilité (Hamant) a été sacrifiée pour la performance.", "contexte_sci": "L'holobionte est l'unité de sélection évolutive : plante + microbiome co-évoluent. Le génome étendu (gènes de la plante + gènes du microbiome) confère des capacités métaboliques impossibles pour la plante seule.", "instructions": "Définir l'holobionte et ses implications. Le microbiome comme extension génomique. Termes : holobionte, endophytes.", "style": "scientifique dense"}, {"type": "section", "chapitre": 2, "section": 2, "titre_h1": null, "titre_h2": "2.2 Auxines, cytokinines et gibbérellines : production microbienne", "titre_h3": null, "tableau": 0, "enrichissement": "→ Les bactéries produisent les MÊMES phytohormones que les plantes : IAA (auxine, croissance racinaire), cytokinines (division cellulaire), gibbérellines (élongation). La plante et ses bactéries partagent un langage hormonal commun.\n→ La production bactérienne d'IAA (10-100 µg/mL) stimule la croissance racinaire → plus de surface racinaire → plus d'exsudats → plus de bactéries → plus d'IAA. C'est une BOUCLE de rétroaction positive qui s'auto-amplifie.\n→ L'ACC-désaminase bactérienne dégrade le précurseur de l'éthylène (hormone de stress). Les PGPR « calment » la plante stressée en abaissant son éthylène. C'est le mécanisme principal de l'efficacité des biostimulants sur sol dégradé.", "contexte_sci": "Les micro-organismes produisent des phytohormones (auxines, cytokinines, gibbérellines) qui stimulent la croissance racinaire et aérienne. L'ACC déaminase dégrade le précurseur de l'éthylène de stress.", "instructions": "Détailler les phytohormones microbiennes et leur effet sur la plante. L'ACC déaminase comme mécanisme clé de tolérance aux stress. Termes : ACC déaminase, PGPR.", "style": "scientifique dense"}, {"type": "section", "chapitre": 3, "section": 1, "titre_h1": "III. Rhizophagie", "titre_h2": "3.1 Mécanisme du cycle rhizophagique", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le cycle rhizophagique (White, Papadopoulos 2019) : la plante MANGE ses bactéries endophytiques. Les bactéries chargées en N/P pénètrent dans les cellules racinaires → la plante les digère → extrait les nutriments → recrache les bactéries survivantes REPROGRAMMÉES.\n→ Reprogrammation plasmidique : les bactéries recrachées ont des plasmides modifiés — la plante a commandé la production de métabolites spécifiques. Les bactéries rejetées sont des « employés formés » qui retournent dans la rhizosphère.\n→ Réponse bactérienne en 20 min vs heures pour la plante. Le microbiome est le système de réponse RAPIDE de l'organisme-microbiome. La plante pilote la stratégie, les bactéries exécutent.", "contexte_sci": "Le cycle rhizophagique : les racines internalisent les bactéries endophytes, les dégradent partiellement dans les cellules racinaires, récupèrent leurs nutriments (N, P, Fe), puis les réémettent sous forme de protoplastes qui se reforment en bactéries dans la rhizosphère. Lien avec la résistance antimicrobienne (le cycle de rhizophagie comme colonisation endophytique).", "instructions": "Décrire le cycle rhizophagique étape par étape. Relier à la nutrition non conventionnelle des plantes. Termes : rhizophagie, endophytes.", "style": "scientifique dense"}, {"type": "section", "chapitre": 4, "section": 1, "titre_h1": "IV. ISR et SAR", "titre_h2": "4.1 ISR vs SAR : deux voies complémentaires", "titre_h3": null, "tableau": 1, "enrichissement": "→ L'ISR (Induced Systemic Resistance) est déclenchée par les PGPR racinaires et protège TOUTE la plante : feuilles, tiges, fruits. Elle induit la production de polyphénols, terpénoïdes, alcaloïdes — des composés de défense qui sont AUSSI des nutriments protecteurs pour l'humain.\n→ ISR vs SAR :
