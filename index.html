2 de Hénin-Dupuis : stock stable quand apport × k1 = stock × k2. Sans la ration, le stock décline exponentiellement.", "statut": "◆", "syn_fr": "dose annuelle de carbone ; restitution organique", "syn_en": "annual carbon input", "bt": "bilan de carbone", "type": "concept"}, {"fr": "redistribution hydraulique fongique", "en": "fungal hydraulic redistribution", "doc_code": "S3", "strate": "S", "definition": "Transport d'eau par hyphes. Saprotrophes 0,3 cm/min. CMA 1-6% absorption. Empêche rupture ponts hydrauliques.", "statut": "✓", "type": "concept"}, {"fr": "redox ladder (séquence des accepteurs d'électrons)", "en": "redox ladder / electron acceptor sequence", "doc_code": "S4", "strate": "S", "definition": "Séquence thermodynamique d'utilisation des accepteurs d'électrons selon le potentiel Eh décroissant : O2 (aérobie) → NO3 (dénitrification) → Mn4+ → Fe3+ → SO4 → CO2 (méthanogenèse). Chaque seuil Eh correspond à des voies microbiennes spécifiques et des émissions gazeuses différentes.", "statut": "◆", "syn_fr": "séquence redox ; cascade des accepteurs d'électrons ; échelle redox", "syn_en": "electron acceptor sequence", "bt": "biogéochimie redox", "type": "concept"}, {"fr": "renouvellement microbien", "en": "microbial turnover", "doc_code": "S2", "strate": "S", "definition": "Taux de renouvellement de la biomasse microbienne. Bactéries : heures à jours. Champignons : semaines. Pilote la production de nécromasse et donc le stockage de C organique stable (MAOM).", "statut": "◆", "syn_fr": "turnover microbien", "bt": "dynamique des populations microbiennes", "type": "concept"}, {"fr": "renouvellement racinaire", "en": "root turnover", "doc_code": "S4/V2", "strate": "S", "definition": "Renouvellement des racines fines (<2 mm) par mort et remplacement (50-70%/an). Constitue une source majeure de C organique (0.5-3 tC/ha/an). Alimentent directement la pompe microbienne à carbone.", "statut": "◆", "syn_fr": "turnover racinaire ; mortalité racinaire", "bt": "rhizodéposition", "type": "concept"}, {"fr": "resilience hydrique", "en": "hydraulic resilience", "doc_code": "S0", "strate": "S", "definition": "Capacité du sol a maintenir une teneur en eau fonctionnelle sous contrainte climatique. Dépend de la structure biologique (biopores, agregats, MO).", "statut": "◆", "syn_fr": "élasticité hydrique ; capacité de récupération hydrique", "syn_en": "water resilience", "bt": "résilience écologique", "type": "concept"}, {"fr": "respiration du sol", "en": "soil respiration", "doc_code": "P1/S2", "strate": "S", "definition": "Flux de CO2 émis par le sol, intégrant la respiration microbienne (hétérotrophe) et racinaire (autotrophe). Mesurée par FDA (fluorescéine diacétate) ou respiromètre. Indicateur de l'activité biologique totale et du turnover de la MO. Varie de 0 (sol inerte) à >10 µg CO2-C·g⁻¹·h⁻¹ (sol très actif).", "statut": "◆", "syn_fr": "Flux de CO2 du sol ; activité respiratoire édaphique", "bt": "Flux de gaz à effet de serre", "type": "concept"}, {"fr": "rhizosphère", "en": "rhizosphere", "doc_code": "S2/V2", "strate": "S", "definition": "Zone de sol (1-5 mm) sous influence directe des racines. 10-100× plus de micro-organismes que le sol nu. Moteur du recrutement sélectif.", "statut": "~", "syn_fr": "interface sol-racine ; zone rhizosphérique", "bt": "zone d'influence racinaire", "type": "glossaire"}, {"fr": "ruissellement", "en": "surface runoff", "doc_code": "S0", "strate": "S", "definition": "Écoulement d'eau à la surface du sol lorsque l'intensité des précipitations dépasse la capacité d'infiltration.", "statut": "◆", "type": "concept"}, {"fr": "réaction de Fenton (sol)", "en": "Fenton reaction (soil)", "doc_code": "S4", "strate": "S", "definition": "Réaction chimique dans les sols lors des transitions aérobie→anaérobie : le Fe²⁺ (fer réduit) réagit avec le peroxyde d'hydrogène métabolique pour produire des radicaux hydroxyles (OH•), agents hyper-oxydants qui détruisent la MO y compris celle considérée comme stable. Peut représenter 30-50% de la minéralisation dans les sols riches en fer. Aggravée par la compaction qui augmente les fluctuations redox.", "statut": "◆", "syn_fr": "oxydation de type Fenton ; production de radicaux hydroxyles", "syn_en": "Fenton-like reaction", "bt": "oxydation chimique de la MO", "type": "concept"}, {"fr": "réseau de Hartig", "en": "Hartig net", "doc_code": "S3", "strate": "S", "definition": "Réseau d'hyphes ECM s'infiltrant entre les cellules épidermiques et corticales des racines fines, sans pénétrer les cellules. Interface d'échange ECM analogue aux arbuscules des CMA.", "statut": "◆", "syn_fr": "réseau de Hartig", "rt": "ECM · CMA · arbuscule", "bt": "ECM", "type": "concept"}, {"fr": "réserve utile", "en": "plant available water capacity", "doc_code": "S0/S1", "strate": "S", "definition": "Volume d'eau retenu dans le sol entre la capacité au champ (pF 2,5) et le point de flétrissement permanent (pF 4,2), disponible pour les plantes. Exprimée en mm/m de sol. Dépend de la texture (argiles > limons > sables), de la teneur en MO et de la profondeur du profil exploité par les racines. La RU d'un sol régénératif augmente avec le stock de MO : chaque point de MO supplémentaire accroît la RU d'environ 2 mm/m.", "statut": "◆", "syn_fr": "RU · capacité de rétention en eau disponible ; réservoir utilisable ; capacité en eau disponible", "syn_en": "available water capacity · AWC ; PAWC ; available water content", "inrae": "06. SCIENCES DE LA TERRE › 06.01 SCIENCES DU SOL", "rt": "CEC · matière organique · argiles", "bt": "bilan hydrique", "type": "concept"}, {"fr": "saprotrophes", "en": "saprotrophic fungi", "doc_code": "S3", "strate": "S", "definition": "Champignons décomposeurs de MO morte (litière, bois, résidus). White-rot fungi : dégradent la lignine via les laccases/peroxydases. Brown-rot fungi : dégradent la cellulose mais pas la lignine. Saprotrophes généraux : dégradent les protéines, la chitine, la cellulose. Première guilde d'humification et de libération de nutriments bloqués dans les résidus récalcitrants.", "statut": "~", "syn_fr": "champignons saproxyliques · décomposeurs", "syn_en": "saprotrophic fungi · decomposers", "inrae": "12. ORGANISMES VIVANTS › 12.02 NOTIONS LIÉES AUX ORGANISMES › champignon (par type)", "rt": "lignine · nécromasse fongique · ratio F/B", "bt": "guildes fongiques", "type": "concept"}, {"fr": "saprotrophes pourvoyeurs d'eau", "en": "saprotrophic fungi as water providers", "doc_code": "S3", "strate": "S", "definition": "Les champignons saprotrophes remontent l'eau du sol vers le broyat de surface par capillarité hyphique pour dégrader la lignine (enzymes extracellulaires hydrauliques). Colonisent le mulch AVANT les CMA (pas besoin de racines). Créent des ponts capillaires entre grains de sol, homogénéisent la distribution d'eau. Cultivent des bactéries dans les films d'eau hyphiques (exsudats fongiques → recrutement sélectif). Leur nécromasse (chitine, mélanine) forme la MAOM stable.", "statut": "◆", "syn_fr": "champignons saprotrophes redistribuant l'eau", "syn_en": "fungal hydraulic redistribution", "bt": "redistribution hydraulique", "type": "concept"}, {"fr": "saturation en carbone du sol", "en": "soil carbon saturation", "doc_code": "S4", "strate": "S", "definition": "Capacité maximale d un sol à stocker du carbone stable (MAOM). Dépend de la surface spécifique des minéraux argileux et de la CEC. Au-delà de la saturation, le C supplémentaire reste en POC labile.", "statut": "◆", "syn_fr": "capacité maximale de stockage ; plateau de saturation", "syn_en": "SOC saturation", "bt": "dynamique du carbone du sol", "type": "concept"}, {"fr": "sidérophore", "en": "siderophore", "doc_code": "S2", "strate": "S", "definition": "Molécule organique de faible poids moléculaire produite par des bactéries et champignons pour chélater le Fe³⁺ et le rendre biodisponible. Jouent un rôle dans la nutrition ferrique des plantes et dans la suppressivité (compétition pour le fer avec les pathogènes).", "statut": "✓", "syn_fr": "chélateur de fer microbien", "inrae": "10.02 SUBSTANCES ET PRODUITS CHIMIQUES › chélateur", "rt": "PGPR · chélation · suppressivité · PSB", "bt": "métabolite secondaire", "type": "concept"}, {"fr": "sol suppressif / sols suppressifs", "en": "suppressive soil / disease suppressive soil", "doc_code": "S2/S3", "strate": "S", "definition": "Propriété d un sol inhibant naturellement le développement des pathogènes telluriques. Suppressivité générale (microbiome diversifié) vs spécifique (guildes particulières). Indicateur clé de santé du sol.", "statut": "~", "syn_fr": "résistance du sol aux maladies · capacité suppressive", "syn_en": "disease suppressiveness · soil disease suppression · soil suppressiveness", "inrae": "04. SANTÉ HUMAINE, ANIMALE ET VÉGÉTALE › 04.02 CAUSES ET VECTEURS DE MALADIE", "rt": "sol suppressif · biocontrôle · diversité microbienne", "bt": "santé du sol", "type": "concept"}, {"fr": "stabilité structurale", "en": "aggregate stability", "doc_code": "S1", "strate": "S", "definition": "Résistance des agrégats à la désagrégation par l'eau (test au diamètre moyen pondéré — MWD) ou par l'impact des gouttes de pluie. Indicateur clé de la santé physique du sol.", "statut": "◆", "syn_fr": "résistance à la désagrégation ; stabilité des agrégats", "syn_en": "structural stability", "bt": "qualité physique du sol", "type": "concept"}, {"fr": "stratégie Y-A-S", "en": "Y-A-S strategy", "doc_code": "S2", "strate": "S", "definition": "", "statut": "◆", "syn_en": "Yield-Acquisition-Stress framework", "bt": "trait de vie microbien", "type": "concept"}, {"fr": "stratégie Y-A-S (Rendement-Acquisition-Stress)", "en": "Y-A-S strategy (Yield-Acquisition-Stress)", "doc_code": "S2/S3", "strate": "S", "definition": "Cadre de traits microbiens proposé par Malik (2020) : Yield (CUE, efficience carbone), Acquisition (enzymes extracellulaires, mobilité), Stress tolerance (osmolytes, EPS, dormance). Permet de prédire les réponses des communautés microbiennes aux perturbations et aux apports.", "statut": "◆", "syn_fr": "stratégie Rendement-Acquisition-Stress", "syn_en": "Y-A-S strategy", "type": "concept"}, {"fr": "stratégies microbiennes S-A-Y", "en": "microbial strategies S-A-Y (stress-acquisition-yield)", "doc_code": "S2", "strate": "S", "definition": "Framework écologique pour les micro-organismes du sol. S (stress-tolerant) : milieu dégradé, fluctuant, faible efficience d'utilisation du carbone (CUE). A (acquisition) : milieu pauvre, forte capacité d'extraction des minéraux mais faible CUE. Y (yield/rendement) : milieu équilibré, forte CUE, forte humification. La trajectoire de régénération = bascule S → A → Y. Les Y dominent en sol structuré (Zone 1-2).", "statut": "◆", "syn_en": "Stress-Acquisition-Yield framework", "bt": "stratégie adaptative microbienne", "type": "concept"}, {"fr": "strigolactone", "en": "strigolactone", "doc_code": "S3", "strate": "S", "definition": "Signal racinaire (phytohormone) déclenchant la germination des spores CMA et la ramification des hyphes pré-symbiotiques. Sécrétée par les racines en conditions de faible P. Perçue par les CMA comme signal de l'hôte. Aussi piège pour les plantes parasites (Striga, Orobanche) — aspect négatif potentiel à considérer. Production stimulée par carence en P. Signal de recrutement CMA en conditions de faible disponibilité en phosphore.", "statut": "◆", "rt": "LCO/facteurs Myc · CMA · phosphore · rhizosphère", "bt": "hormone végétale", "type": "concept"}, {"fr": "stœchiométrie C/N", "en": "carbon to nitrogen ratio", "doc_code": "S4/P2", "strate": "S", "definition": "Rapport carbone/azote des résidus organiques, outil de pilotage terrain le plus courant pour les couverts végétaux et les apports organiques. C/N < 20 : minéralisation nette (libération d'N), risque de lixiviation. C/N 20-30 : équilibre immobilisation/minéralisation. C/N > 30 : faim d'azote (immobilisation microbienne de l'N minéral). Distinct de la stœchiométrie de Kirkby (CNPS de l'humus stable). Outil opérationnel pour concevoir les mélanges de couverts et éviter la pénalisation de la culture suivante.", "statut": "◆", "syn_fr": "ratio C/N · rapport carbone sur azote ; rapport C/N ; rapport carbone sur azote", "syn_en": "C/N ratio · carbon to nitrogen ratio ; C/N ratio", "inrae": "02. AGRICULTURE ET AGRONOMIE › 02.02 PRATIQUES CULTURALES", "rt": "stœchiométrie de Kirkby · faim d\\ · , · ,", "bt": "indicateur de décomposabilité", "type": "concept"}, {"fr": "stœchiométrie CNPS", "en": "C:N:P:S stoichiometry", "doc_code": "S4", "strate": "S", "definition": "Rapport C:N:P:S optimal pour l'humification (Kirkby et al., 2016). Ratio 100:8:2:1.5 pour la formation d'humus stable.", "statut": "◆", "type": "concept"}, {"fr": "stœchiométrie de Kirkby", "en": "Kirkby stoichiometry", "doc_code": "S2", "strate": "S", "definition": "Ratio C:N:P:S = 10 000:833:200:143 de l'humus stable optimal (Kirkby, 2013). Ce rapport stœchiométrique définit les proportions d'éléments nécessaires à la formation de MO stable. Verrou théorique : un apport de C sans N, P, S en proportions correctes ne pourra pas être humifié. Distinct du ratio C/N pratique des couverts (outil terrain).", "statut": "✓", "syn_fr": "stœchiométrie microbienne de Kirkby", "syn_en": "microbial C:N:P:S ratios", "inrae": "10. CHIMIE › 10.01 CHIMIE ANALYTIQUE", "rt": "stœchiométrie C/N · CNPS · humification · CUE", "bt": "stœchiométrie écologique", "type": "concept"}, {"fr": "suppressivité", "en": "suppressiveness", "doc_code": "S2/S3", "strate": "S", "definition": "Capacité d'un sol à limiter l'expression des maladies telluriques malgré la présence du pathogène. Résulte de la diversité microbienne et de la compétition.", "statut": "~", "syn_fr": "effet suppressif", "bt": "régulation biologique des bioagresseurs", "type": "glossaire"}, {"fr": "suppressivité du sol", "en": "soil suppressiveness", "doc_code": "S2", "strate": "S", "definition": "Capacité naturelle d'un sol à réduire l'incidence des maladies telluriques malgré la présence de pathogènes et d'un hôte sensible. Mécanismes : compétition pour niches, antibiose, parasitisme, ISR. Indicateur de maturité biologique.", "statut": "◆", "syn_fr": "résistance biotique du sol ; sol résistant aux maladies", "syn_en": "disease-suppressive soil", "bt": "santé des sols", "type": "concept"}, {"fr": "séquestration carbone", "en": "carbon sequestration", "doc_code": "S4", "strate": "S", "definition": "Stockage du CO₂ atmosphérique dans le sol sous forme de MO stable (MAOM, nécromasse). Potentiel 4‰/an. Dépend de la CUE, du ratio F/B, du travail du sol et des apports organiques. Base du carbon farming.", "statut": "≈", "syn_fr": "piégeage du carbone ; stockage de carbone", "syn_en": "carbon storage", "inrae": "05.12 ÉCOLOGIE › cycle du carbone", "rt": "MAOM · CUE · nécromasse microbienne · RothC · carbon farming", "bt": "atténuation du changement climatique", "type": "concept"}, {"fr": "temps de résidence moyen", "en": "mean residence time", "doc_code": "S4", "strate": "S", "definition": "Durée moyenne de séjour d un atome de carbone dans un pool donné (jours pour POC, décennies-siècles pour MAOM). Indicateur clé de la stabilité du stockage carbone.", "statut": "◆", "syn_fr": "durée de séjour moyenne ; TRM", "syn_en": "MRT", "bt": "dynamique temporelle", "type": "concept"}, {"fr": "texture du sol", "en": "soil texture", "doc_code": "S1", "strate": "S", "definition": "Proportion relative de sable (2–0,05 mm), limon (0,05–0,002 mm) et argile (<0,002 mm) dans la terre fine. Propriété permanente du sol qui détermine sa capacité de rétention d'eau, sa CEC et son comportement mécanique.", "statut": "◆", "syn_fr": "granulométrie ; composition granulométrique", "syn_en": "particle size distribution", "bt": "propriété physique du sol", "type": "concept"}, {"fr": "thermodynamique des cycles", "en": "thermodynamics of biogeochemical cycles", "doc_code": "S4", "strate": "S", "definition": "", "statut": "◆", "syn_fr": "bioénergétique des cycles ; enthalpie libre des réactions", "syn_en": "ΔG of reactions", "bt": "thermodynamique chimique", "type": "concept"}, {"fr": "thermodynamique des cycles (ΔG)", "en": "thermodynamics of biogeochemical cycles", "doc_code": "S4/V3", "strate": "S", "definition": "Pilotage des cycles biogéochimiques via le potentiel énergétique des réactions (énergie libre ΔG). La fermentation anaérobie libère peu d'énergie (ΔG faible) mais conserve le carbone et l'azote dans les métabolites ; la respiration aérobie libère beaucoup d'énergie mais oxyde le C en CO₂. En agriculture régénératrice : favoriser les voies fermentaires (ΔG négatif faible) dans les microsites anoxiques pour conserver le capital C et N plutôt que de tout oxyder. Fondement thermodynamique de la valeur du Bokashi vs compost aérobie.", "statut": "◆", "syn_fr": "bilan énergétique des cycles · ΔG biogéochimique", "inrae": "10. CHIMIE › 10.01 CHIMIE ANALYTIQUE", "rt": "fermentation · microsites anoxiques · bokashi · CUE · conservation C/N", "type": "concept"}, {"fr": "turnover", "en": "turnover", "doc_code": "S2", "strate": "S", "definition": "Taux de renouvellement de la biomasse microbienne. Un turnover rapide produit plus de nécromasse → plus de MAOM stable.", "statut": "~", "syn_fr": "taux de renouvellement ; rotation", "syn_en": "turnover rate", "bt": "dynamique temporelle des éléments", "type": "glossaire"}, {"fr": "voie oxalate-carbonate", "en": "oxalate-carbonate pathway", "doc_code": "S4", "strate": "S", "definition": "Séquestration stable du carbone via la transformation oxalate (produit fongique) → calcite (CaCO₃) catalysée par des bactéries oxalotrophes. Voie unique de séquestration inorganique du C photosynthétique. Particulièrement active dans les systèmes agroforestiers (Salix, Populus).", "statut": "≈", "syn_fr": "cycle oxalate-carbonate", "syn_en": "OCP", "inrae": "05.12 ÉCOLOGIE › cycle biogéochimique (correction v2.2)", "rt": "agroforesterie · champignons · séquestration carbone", "bt": "cycle biogéochimique du calcium", "type": "concept"}, {"fr": "ACC désaminase", "en": "ACC deaminase", "doc_code": "V2", "strate": "V", "definition": "Enzyme microbienne (produite par Bacillus, Pseudomonas, Rhizobium) dégradant le précurseur de l'éthylène (ACC) dans les racines, réduisant le stress éthylénique. Améliore la tolérance des plantes aux stress abiotiques (sécheresse, salinité, métaux lourds).", "statut": "◆", "syn_fr": "1-aminocyclopropane-1-carboxylate désaminase", "rt": "PGPR · stress · éthylène · holobionte", "bt": "enzyme microbienne de régulation du stress", "type": "concept"}, {"fr": "Allocation C photosynthétique aux exsudats", "en": "photosynthetic carbon allocation to root exudates", "doc_code": "V2/S4/P2", "strate": "V", "definition": "Fraction du carbone fixé par photosynthèse allouée aux exsudats racinaires, variant de 5% (stress, sol dégradé) à 40% (sol vivant, couvert multi-espèces diversifié). Cette allocation est le premier maillon de la pompe microbienne à carbone. Elle dépend du LAI, de la diversité du couvert et de la santé du sol. Maillon 2 de la chaîne causale C1.\n\nEnjeu : quantifier la contribution réelle du design du couvert à la séquestration carbone.\n\nLevier : maximiser le LAI sur la plus longue période de l'année avec des mélanges 10-12 espèces.", "statut": "◆", "syn_fr": "rhizodéposition active · allocation carbonée racinaire ; transfert de carbone récent vers la rhizosphère", "syn_en": "rhizodeposition · C allocation · belowground C input", "inrae": "05. SCIENCES BIOLOGIQUES › 05.04 ANATOMIE › rhizosphère", "rt": "exsudats racinaires · pompe microbienne · LAI · chaîne C1", "bt": "rhizodéposition", "type": "concept"}, {"fr": "Bioréacteur microbien", "en": "Microbial Bioreactor", "doc_code": "V2", "strate": "V", "definition": "Concept qui voit le sol (et particulièrement la rhizosphère) comme un système de transformation biochimique où les microbes convertissent le carbone solaire en nutriments et en humus (Young & Crawford, 2004).\n\nEnjeu : La performance de la ferme dépend de l'efficacité métabolique de ce réacteur, et non de la simple quantité d'engrais apportée.\n\nLevier de décision : Gérer le sol par le \"nourrissage\" (ratio C/N des apports) pour orienter le bioréacteur soit vers la production de nutriments (minéralisation), soit vers la construction de sol (humification) (Zhu et al., 2020).", "statut": "◆", "syn_fr": "microréservoir d'activité biologique", "bt": "système biologique de transformation", "type": "concept"}, {"fr": "Elicitation par les débris microbiens", "en": "Elicitation by Microbial Debris", "doc_code": "V2", "strate": "V", "definition": "Fragments de parois cellulaires microbiennes (chitine, flagelline) qui, au contact de la plante, simulent une attaque et stimulent une réponse immunitaire préventive (Molefe et al., 2023; Wang et al., 2022).\n\nEnjeu : Permet de maintenir la plante dans un état de \"vigilance\" métabolique sans le coût énergétique d'une véritable infection(Rojas et al., 2014).\n\nLevier de décision : Appliquer des extraits fermentés riches en nécromasse microbienne pour \"vacciner\" biologiquement la culture avant les périodes de pression parasitaire.", "statut": "◆", "syn_fr": "induction par les MAMP ; élicitation par les détrimétabolites", "syn_en": "MAMP-triggered immunity", "bt": "immunité végétale innée", "type": "concept"}, {"fr": "Endophytes", "en": "Endophytes", "doc_code": "V2", "strate": "V", "definition": "Micro-organismes (bactéries ou champignons) qui vivent à l'intérieur même des tissus de la plante sans lui nuire(Barthélémy, 2019).\n\nEnjeu : Ils stimulent l'immunité de la plante de l'intérieur et produisent souvent des hormones de croissance(Chaudhary et al., 2022).\n\nLevier de décision : L'utilisation de semences traitées avec des fongicides systémiques détruit souvent ces endophytes bénéfiques(Ayesha et al., 2021). Privilégier des semences de ferme ou non traitées pour préserver ce capital interne.", "statut": "◆", "syn_fr": "micro-organismes endophytes ; flore endophyte", "bt": "symbiote végétal", "type": "concept"}, {"fr": "FAA", "en": "fish amino acid", "doc_code": "V3", "strate": "V", "definition": "Concentré d'acides aminés du KNF obtenu par décomposition enzymatique (autolyse) de déchets de poisson. Ratio 1:1 poisson/sucre de canne non raffiné, SANS eau. La pression osmotique du sucre absorbe l'eau des tissus, les bactéries entrent en dormance (milieu hypertonique), et ce sont les enzymes protéolytiques endogènes du poisson (protéases, peptidases) qui hydrolysent les protéines en acides aminés libres. Ce n'est PAS une lactofermentation. Durée : 7-10 jours (rapide) à 6 mois (qualité commerciale). Riche en N, acides aminés libres et micronutriments chélatés. Dilution 1:1000, phase végétative uniquement (risque de sur-croissance en phase reproductive). Les os résiduels peuvent être ajoutés au vinaigre de riz brun (BRV) pour produire du calcium phosphate soluble (UH-CTAHR SA-12).", "statut": "◆", "syn_fr": "hydrolysat de poisson ; engrais d'acides aminés de poisson ; biostimulant de poisson ; acides aminés de poisson · FAA", "syn_en": "FAA ; fish hydrolysate ; FAA · fish amino acid", "bt": "engrais organique", "type": "concept"}, {"fr": "Fermentations anaérobies (Lactiques / JADAM)", "en": "Anaerobic Fermentation (Lactic / JADAM)", "doc_code": "V3", "strate": "V", "definition": "Transformation de la matière organique en absence d'oxygène par des micro-organismes spécialisés, produisant des métabolites protecteurs (acides organiques, vitamines) (Prescott, 2002, 2016).\n\nEnjeu : Permet de stabiliser la biomasse très humide sans pertes de carbone par CO2 et sans odeurs pathogènes(Guo et al., 2016; Tamar & Umer, 2022).\n\nLevier de décision : Préférer la fermentation (type JMS ou Bokashi) pour recycler les déchets verts ou les lisiers, car elle préserve mieux l'énergie et l'azote que le compostage aérobie classique.", "statut": "◆", "syn_fr": "fermentation JADAM ; JLF ; fermentation lactique anaérobie", "syn_en": "JADAM fermentation ; lactic fermentation", "bt": "fermentation anaérobie", "type": "concept"}, {"fr": "ISR", "en": "induced systemic resistance (ISR)", "doc_code": "V2", "strate": "V", "definition": "Résistance systémique induite par les micro-organismes bénéfiques du rhizomicrobiome (PGPR, CMA). Voie de signalisation jasmonate/éthylène. Prépare la plante à résister aux agressions sans activer des défenses coûteuses en énergie. Génère une résistance large spectre (champignons, bactéries, insectes). Produit des polyphénols et flavonoïdes qui améliorent la densité nutritionnelle des aliments. Distinct de la SAR (voie acide salicylique, déclenchée par un pathogène atténué).", "statut": "~", "syn_fr": "Résistance Systémique Induite ; RSI", "syn_en": "ISR · induced systemic resistance ; ISR", "inrae": "05. SCIENCES BIOLOGIQUES › 05.05 PHYSIOLOGIE › résistance induite (correction v2.2)", "rt": "SAR · PGPR · CMA · polyphénols · densité nutritionnelle", "bt": "défense végétale induite", "type": "concept"}, {"fr": "Inoculum microbien indigène (IMO / LiFoFer)", "en": "Indigenous Microbial Inoculum (IMO / LiFoFer)", "doc_code": "V3", "strate": "V", "definition": "Prélèvement de micro-organismes locaux (souvent en forêt) pour les multiplier et les réintroduire dans les sols cultivés (Mayer, 2019).\n\nEnjeu : Garantit que les microbes introduits sont adaptés au climat et à la géologie locale(Zanella et al., 2017), contrairement aux souches commerciales de laboratoire.\n\nLevier de décision : Utiliser la technique LiFoFer pour restaurer la signature fongique des parcelles après une période de culture intensive ou de travail du sol (Hartmann et al., 2014).", "statut": "◆", "syn_fr": "IMO ; micro-organismes indigènes ; levains indigènes", "syn_en": "IMO", "bt": "inoculum microbien", "type": "concept"}, {"fr": "Jeevamrit", "en": "Jeevamrit", "doc_code": "V3/P3/P5", "strate": "V", "definition": "Préparation biostimulante fermentée indienne obtenant sa richesse par fermentation 48-72h d'un mélange : bouse + urine bovine + farine de légumineuse + jaggery (sucre brut) + eau. Équivalent indien du JADAM JMS, riche en bactéries lactiques, levures et actinomycètes locaux. Application en drench ou pulvérisation foliaire. Production simple et zéro-intrant permettant l'autonomie totale du producteur.", "statut": "◆", "syn_fr": "eau de vie microbienne ; Jivamrut ; thé de bouse fermenté", "syn_en": "Jeevamrit ; Jivamrut", "rt": "KNF · IMO · JADAM · biostimulants", "bt": "biostimulant organique", "type": "concept"}, {"fr": "Korean Natural Farming", "en": "Korean Natural Farming", "doc_code": "V3", "strate": "V", "definition": "", "statut": "◆", "syn_fr": "agriculture naturelle coréenne ; méthode Cho", "syn_en": "KNF", "bt": "agroécologie", "type": "concept"}, {"fr": "Korean Natural Farming (KNF)", "en": "Korean Natural Farming (KNF)", "doc_code": "V3/P3", "strate": "V", "definition": "Système d'agriculture naturelle coréen développé par Cho Han-kyu (années 1960). Repose sur 5 piliers : (1) LAB — bactéries lactiques (fermentation riz-lait), (2) FPJ — Fermented Plant Juice (extraction osmotique de pousses végétatives avant le lever du soleil, sucre brun 1:1, 7 jours), (3) FAA — Fish Amino Acid (décomposition enzymatique par pression osmotique, PAS une fermentation), (4) OHN — Oriental Herbal Nutrient (extraction alcoolique d'ail/gingembre/cannelle/réglisse, immunostimulant), (5) WCA — Water Soluble Calcium (vinaigre + coquilles d'oeuf). Intègre aussi les IMO (Indigenous Micro-Organisms) et le FFJ (Fermented Fruit Juice, phase reproductive). Philosophie : mobiliser la biologie locale plutôt qu'importer des souches standardisées. Dilutions typiques 1:500-1:1000. Publications scientifiques limitées (UH-CTAHR SA-7, SA-12, SA-19).", "statut": "◆", "syn_fr": "KNF · agriculture naturelle coréenne", "syn_en": "KNF · Korean Natural Farming", "inrae": "02. AGRICULTURE ET AGRONOMIE › 02.01 AGRICULTURE ET SYSTÈMES DE PRODUCTION (correction v2.2 — fusion KNF + Korean Natural Farming + suppression alignement erroné)", "rt": "IMO · JADAM · FAA · LiFoFer · biostimulants", "type": "concept"}, {"fr": "LiFoFer", "en": "LiFoFer (fermented forest litter)", "doc_code": "V3", "strate": "V", "definition": "Préparation fermentaire à base de litière forestière diversifiée, obtenue par fermentation contrôlée anaérobie-aérobie sur 3-6 mois. Contient une communauté fongique et bactérienne complexe adaptée aux conditions forestières. Reproduit l'ambiance microbiologique d'un sol forestier mature. Restaure les communautés fongiques dans les sols agricoles dégradés.", "statut": "◆", "syn_fr": "litière forestière fermentée ; inoculum de litière", "syn_en": "fermented forest litter", "rt": "IMO · KNF · communauté fongique · succession microbienne", "bt": "Inoculum microbien indigène", "type": "concept"}, {"fr": "Marcel Bouché", "en": "Marcel Bouché", "doc_code": "V1", "strate": "V", "definition": "Zoologiste français, auteur de la classification fonctionnelle des vers de terre en trois guildes (épigés, endogés, anéciques), 1972. Classification encore universellement utilisée. Démontré la capacité des anéciques à structurer les paysages via leurs galeries.", "statut": "◆", "syn_fr": "Père de la classification écologique des vers de terre", "rt": "anéciques · vers de terre · classification fonctionnelle", "bt": "Pédobiologiste / Écologue des sols", "type": "concept"}, {"fr": "PNSB", "en": "purple non-sulfur bacteria (PNSB)", "doc_code": "V3", "strate": "V", "definition": "Bactéries photosynthétiques anoxygéniques utilisant la lumière, la chaleur et les composés organiques comme sources d'énergie en conditions anaérobies. Clés du bokashi et des EM : produisent des acides aminés, acides nucléiques et hormones de croissance dans les fermentations. Indicateur de la qualité d'une préparation EM.", "statut": "◆", "syn_fr": "bactéries pourpres non sulfureuses ; bactéries photo-hétérotrophes", "syn_en": "PNSB ; anoxygenic phototrophic bacteria", "rt": "bokashi · EM · fermentation · microorganismes fermentaires", "bt": "bactéries photosynthétiques anoxygéniques", "type": "concept"}, {"fr": "Phagie microbienne", "en": "Microbial Grazing (Microbivory)", "doc_code": "V1", "strate": "V", "definition": "Terme générique incluant la rhizophagie, mais aussi la consommation de microbes par la microfaune (protozoaires, nématodes)(Rajalingam et al., 2026).\n\nEnjeu : C'est ce \"broutage\" microbien qui libère l'azote stocké dans les bactéries sous une forme assimilable pour les plantes(Martínez-Reyes et al., 2021).\n\nLevier de décision : Un sol sans prédateurs (protozoaires) est un sol où l'azote reste bloqué dans les bactéries(Martínez-Reyes et al., 2021). La diversité des étages du réseau trophique est donc une condition de la fertilité azotée(Roux et al., 2008).", "statut": "◆", "syn_fr": "Microbivorie ; broutage microbien ; prédation microbienne", "syn_en": "microbivory", "bt": "Interaction trophique", "type": "concept"}, {"fr": "SAR", "en": "systemic acquired resistance (SAR)", "doc_code": "V2", "strate": "V", "definition": "Résistance systémique acquise déclenchée par un agent pathogène atténué ou une molécule élicitrice. Voie acide salicylique. Active une protection durable et large spectre dans les tissus distaux. Produit des PR-protéines et accumule des polyphénols. Coût énergétique plus élevé que l'ISR mais protection plus puissante.", "statut": "✓", "syn_fr": "Résistance Systémique Acquise ; RSA", "syn_en": "SAR · systemic acquired resistance ; SAR", "inrae": "05. SCIENCES BIOLOGIQUES › 05.05 PHYSIOLOGIE", "rt": "ISR · polyphénols · défenses végétales", "bt": "immunité systémique des plantes", "type": "concept"}, {"fr": "SIREM", "en": "SIREM (Système Intégré Rhizosphère-Endosphère-Microbiome)", "doc_code": "V2", "strate": "V", "definition": "Mécanisme par lequel la plante émet des exsudats spécifiques pour attirer des microbes capables de résoudre un problème précis (ex : manque de fer ou attaque de pucerons) (Pascale, 2020).\n\nEnjeu : C'est le levier de l'autonomie sanitaire de la plante(Song et al., 2021)\n\nLevier de décision : Ne pas sur-fertiliser. Une plante \"gavée\" de minéraux solubles réduit la diversité de son microbiome et la rend vulnérable aux maladies(Frontini, 2021; Jetter et al., 2025)", "statut": "◆", "syn_fr": "aucun (acronyme spécifique au concept d'holobionte)", "bt": "modèle d'interaction plante-sol", "type": "concept"}, {"fr": "Vers de terre", "en": "Earthworms", "doc_code": "V1", "strate": "V", "definition": "Lombrics creusant des galeries verticales permanentes, reliant la surface aux horizons profonds (Bottinelli, 2015).\n\nEnjeu : Ingénieurs du sol qui gèrent à la fois la porosité, le drainage et le mélange de la matière organique(Araujo, 2022; Detrey, 2021)\n\nLevier de décision : Compter les turricules en surface. Un manque de turricules indique une famine (manque de mulch) ou une toxicité (certains fongicides/insecticides) qui bloque la circulation verticale de la fertilité(Fernández et al., 2023; Yasir et al., 2025)", "statut": "◆", "syn_fr": "Lombricidés ; oligochètes terrestres ; ingénieurs du sol", "bt": "Macrofaune du sol", "type": "concept"}, {"fr": "acariens du sol", "en": "soil mites (Acari)", "doc_code": "V1", "strate": "V", "definition": "Micro-arthropodes (0,2–2 mm) comprenant les oribates (décomposeurs de litière, très abondants), les prédateurs (Mesostigmata — régulateurs du réseau trophique) et les détritivores. Bioindicateurs de la santé du sol par leur diversité et leur abondance.", "statut": "◆", "syn_fr": "Acari", "syn_en": "Acari", "bt": "Mésofaune du sol", "type": "concept"}, {"fr": "acide 3-phényllactique", "en": "3-phenyllactic acid", "doc_code": "V3/P3", "strate": "V", "definition": "Métabolite organique produit par les bactéries lactiques lors des fermentations de type Bokashi/JADAM. Puissant promoteur de l'enracinement latéral en synergie avec le tryptophane (précurseur des auxines) via un effet sur les transporteurs d'auxines (Maki et al., 2021). Activité antifongique supprimant certains pathogènes du sol (Jaffar et al., 2023). Composé bioactif central expliquant l'efficacité agronomique observée des biostimulants lactiques.", "statut": "◆", "syn_fr": "PLA ; acide β-phényllactique ; acide 2-hydroxy-3-phénylpropionique", "syn_en": "3-phenyllactic acid · PLA ; PLA", "rt": "bactéries lactiques · auxines · enracinement · bokashi", "bt": "métabolite antimicrobien", "type": "concept"}, {"fr": "acide lactique (dans les fermentations)", "en": "lactic acid (in fermented preparations)", "doc_code": "V3", "strate": "V", "definition": "Métabolite principal des bactéries lactiques lors de la fermentation anaérobie des sucres. Abaisse le pH (pH 3,5-4,5 dans le Bokashi) créant des conditions défavorables aux pathogènes. Acidifie localement le sol au point d'application, solubilisant les minéraux bloqués. Précurseur de l'acide 3-phényllactique lors des fermentations plus longues.", "statut": "◆", "syn_fr": "acide lactique ; lactate ; acide 2-hydroxypropanique", "syn_en": "lactic acid ; lactate", "inrae": "10. CHIMIE › 10.02 SUBSTANCES ET PRODUITS CHIMIQUES", "rt": "bactéries lactiques · acide 3-phényllactique · bokashi", "bt": "acide organique", "type": "concept"}, {"fr": "acidification rhizosphérique", "en": "rhizosphere acidification", "doc_code": "V2", "strate": "V", "definition": "Abaissement du pH (0.5-2 unités) dans la rhizosphère par excrétion de protons (H⁺) et d acides organiques. Solubilise Fe, Mn, P. Mécanisme clé d acquisition des micronutriments en sols calcaires.", "statut": "◆", "syn_fr": "abaissement du pH rhizosphérique ; sécrétion de protons racinaires", "bt": "modification chimique de la rhizosphère", "type": "concept"}, {"fr": "allocation du carbone photosynthétique", "en": "photosynthetic carbon allocation", "doc_code": "V2/S4", "strate": "V", "definition": "Répartition du carbone fixé entre croissance aérienne (40-60%), racines (15-25%) et exsudats (5-33%). Pilote directement la pompe microbienne à carbone. Modulée par la symbiose CMA et les stress.", "statut": "◆", "syn_fr": "flux de carbone assimilé ; partitionnement du carbone fixé", "bt": "métabolisme du carbone", "type": "concept"}, {"fr": "anéciques", "en": "anecic earthworms", "doc_code": "V1", "strate": "V", "definition": "Vers constructeurs de galeries verticales profondes (0-2 m), migrateurs entre la surface et la profondeur. Ingèrent la litière de surface et l'incorporent en profondeur (biomélanges). Créent des biopores permanents tapissés de mucus, assurant la macroporosité biologique et la conductivité hydraulique saturée. Lumbricus terrestris est l'espèce de référence. Extrêmement sensibles au labour : 15 jours de sol nu élimine 90% des anéciques.", "statut": "✓", "syn_fr": "ver de rosée", "inrae": "Oligochaete › Lumbricina › Lumbricus", "rt": "conductivité hydraulique saturée · macroporosité · biopuncture · Marcel Bouché", "bt": "vers de terre", "type": "concept"}, {"fr": "auxines", "en": "auxins", "doc_code": "V2", "strate": "V", "definition": "Hormones végétales de croissance (principalement l'acide indole-3-acétique — AIA) stimulant l'élongation cellulaire et la formation des racines latérales. Synthétisées par les PGPR (Azospirillum, Bacillus) et par les racines. L'acide 3-phényllactique du Bokashi agit en synergie avec le tryptophane (précurseur des auxines) pour amplifier l'enracinement latéral.", "statut": "~", "syn_fr": "acide indole-3-acétique ; hormones de croissance", "syn_en": "IAA", "inrae": "05. SCIENCES BIOLOGIQUES › 05.02 BIOLOGIE MOLÉCULAIRE ET BIOCHIMIE › régulateur de croissance › auxine", "rt": "PGPR · acide 3-phényllactique · enracinement · IAA", "bt": "phytohormone", "type": "concept"}, {"fr": "bactéries lactiques", "en": "lactic acid bacteria", "doc_code": "V3", "strate": "V", "definition": "Groupe fonctionnel bactérien produisant l'acide lactique comme métabolite principal de la fermentation des sucres. Genres principaux : Lactobacillus, Lactococcus, Leuconostoc, Pediococcus, Streptococcus. Rôle dans les fermentations agricoles : préservation des nutriments, production d'acide 3-phényllactique (Jaffar et al., 2023), d'acides organiques suppresseurs, et de métabolites stimulant l'enracinement et l'immunité végétale.", "statut": "◆", "syn_fr": "ferments lactiques ; LAB ; Lactobacillus ; Leuconostoc ; LAB · bactéries fermentiques", "syn_en": "LAB ; lactic acid bacteria · LAB", "bt": "bactéries fermentaires", "type": "concept"}, {"fr": "bactéries photosynthétiques", "en": "phototrophic bacteria", "doc_code": "V3", "strate": "V", "definition": "Bactéries utilisant la lumière comme source d'énergie en conditions anaérobies (photohétérotrophes). Incluent les PNSB et les bactéries sulfureuses violettes. Productrices de substances bioactives dans les fermentations.", "statut": "◆", "syn_fr": "bactéries phototrophes ; microorganismes photosynthétiques", "syn_en": "photosynthetic bacteria", "rt": "PNSB · fermentation · KNF", "bt": "microorganismes du sol", "type": "concept"}, {"fr": "bioturbation", "en": "bioturbation", "doc_code": "V1", "strate": "V", "definition": "Remaniement mécanique du sol par l'activité de la faune : enfouissement de la MO (vers anéciques), perforation du sol (acariens, insectes), création de vides (fourmis, termites). Augmente la porosité, l'aération et le contact sol-résidus. Service écosystémique équivalent à un labour doux permanent mais biologique.", "statut": "◆", "syn_fr": "Brassage biologique ; remaniement biologique du sol ; transport de matière par la faune", "rt": "macroporosité · vers de terre · réseau trophique", "bt": "Processus pédobiologique", "type": "concept"}, {"fr": "bokashi", "en": "bokashi", "doc_code": "V3", "strate": "V", "definition": "Technique de fermentation anaérobie de MO (son de riz inoculé avec EM) d'origine japonaise. Produit des métabolites bioactifs incluant l'acide 3-phényllactique (promoteur d'enracinement latéral, Maki et al., 2021), des acides organiques abaissant le pH et des enzymes extracellulaires. Conservation thermodynamique optimale du C et N vs compostage aérobie. Risque applicatif : le carbone labile peut déclencher un Priming Effect sur les sols riches en COS — fractionner les doses.", "statut": "◆", "syn_fr": "matière organique fermentée ; compostage anaérobie", "syn_en": "fermented organic matter", "rt": "EM · acide 3-phényllactique · priming effect · succession microbienne", "bt": "amendement organique", "type": "concept"}, {"fr": "boucle microbienne", "en": "microbial loop", "doc_code": "V1", "strate": "V", "definition": "Circuit trophique sol : exsudats racinaires → bactéries → protozoaires brouteurs → libération N/P → absorption végétale. Mécanisme clé de recyclage rapide des nutriments dans la rhizosphère.", "statut": "◆", "syn_fr": "Cycle de libération des nutriments par prédation", "syn_en": "soil microbial loop", "bt": "Réseau trophique du sol", "type": "concept"}, {"fr": "chimiotaxisme", "en": "chemotaxis", "doc_code": "V2", "strate": "V", "definition": "Mouvement orienté des micro-organismes vers les exsudats racinaires. Mécanisme de base du recrutement sélectif dans la rhizosphère.", "statut": "~", "syn_fr": "chimiotaxie ; chimiotactisme", "bt": "mobilité microbienne sensu lato", "type": "glossaire"}, {"fr": "collemboles", "en": "Collembola", "doc_code": "V1", "strate": "V", "definition": "Micro-arthropodes (0,1-5 mm) régulateurs majeurs du microbiome du sol : consomment préférentiellement les champignons pathogènes et les hyphes de croissance rapide, tout en épargnant les CMA (qui produisent des composés défensifs). Indicateurs de la richesse du réseau trophique. Densité : 10 000-100 000/m² dans les sols sains.", "statut": "✓", "syn_fr": "collembole ; Collembola", "syn_en": "springtails", "inrae": "12.01 TAXONOMIE D'ORGANISMES VIVANTS › Animalia › Arthropoda", "rt": "phagie microbienne · réseau trophique · CMA · mésofaune", "bt": "Mésofaune du sol", "type": "concept"}, {"fr": "compétition apparente", "en": "apparent competition", "doc_code": "V2/S2", "strate": "V", "definition": "Interaction négative entre deux espèces proies partageant un prédateur commun. Dans le sol : champignons pathogènes et bénéfiques compétitent pour l hôte plante via les voies ISR/JA/SA.", "statut": "◆", "syn_fr": "interaction indirecte par médiation d'un ennemi commun", "bt": "dynamique des populations", "type": "concept"}, {"fr": "conservation C/N", "en": "C/N conservation", "doc_code": "V3", "strate": "V", "definition": "Propriété des fermentations : contrairement à la minéralisation aérobie, la fermentation conserve le C et le N dans les métabolites.", "statut": "~", "syn_fr": "maintien du rapport carbone/azote ; stabilisation du C/N", "syn_en": "C:N ratio stabilization", "bt": "gestion de la fertilité du sol", "type": "glossaire"}, {"fr": "continuum sol-intestin", "en": "soil-gut continuum", "doc_code": "V2/H2", "strate": "V", "definition": "Continuité microbienne entre le sol, la rhizosphère, l'endosphère végétale et le microbiote intestinal humain. Vecteur : alimentation.", "statut": "~", "syn_fr": "interface microbiote du sol-microbiote humain ; axe sol-santé", "bt": "écologie de la santé", "type": "glossaire"}, {"fr": "cycle de la rhizophagie", "en": "rhizophagy cycle", "doc_code": "V2", "strate": "V", "definition": "Cycle par lequel les racines internalisent des bactéries endophytes depuis la rhizosphère dans leurs cellules épidermiques, les soumettent à un stress oxydatif (production de ROS dans la zone de dénudation racinaire) extrayant les nutriments stockés dans les bactéries, puis les expulsent vers la rhizosphère pour qu'elles se rechargent en nutriments du sol avant d'être réinternalisées (White et al., 2018 ; Molefe et al., 2023 ; Rajalingam et al., 2026). Mécanisme de transfert de microbes du sol vers les tissus végétaux : les endophytes produits par la rhizophagie sont ensuite transmis au microbiome intestinal humain via la consommation d'aliments crus — premier maillon de la chaîne sol→intestin.", "statut": "◆", "syn_fr": "endocytose microbienne racinaire", "rt": "endophytes · continuum sol-intestin · transfert microbien · rhizosphère", "bt": "mode de nutrition minérale des plantes", "type": "concept"}, {"fr": "cytokinines", "en": "cytokinins", "doc_code": "V2", "strate": "V", "definition": "Hormones végétales stimulant la division et la différenciation cellulaire, synthétisées par certains PGPR. Régulent la sénescence des feuilles et la mobilisation des nutriments.", "statut": "◆", "rt": "auxines · gibbérellines · PGPR", "bt": "phytohormone", "type": "concept"}, {"fr": "drilosphère", "en": "drilosphere", "doc_code": "V1", "strate": "V", "definition": "Zone d'influence biochimique autour des galeries de vers de terre. Parois tapissées de mucus et turricules, activité microbienne 10 à 100 fois supérieure au sol adjacent. Hotspot de minéralisation, nitrification et production d'EPS structurants.", "statut": "◆", "syn_fr": "Zone d'influence des vers de terre ; environnement drilosphérique", "bt": "Biosphère du sol", "type": "concept"}, {"fr": "défenses végétales", "en": "plant defenses", "doc_code": "V2", "strate": "V", "definition": "Mécanismes de protection : ISR, SAR, barrières physiques (lignine, subérine), métabolites secondaires.", "statut": "~", "syn_fr": "immunité des plantes ; système défensif de l'hôte", "bt": "biologie végétale", "type": "glossaire"}, {"fr": "détection du quorum", "en": "quorum sensing", "doc_code": "V2", "strate": "V", "definition": "Communication chimique bactérienne via des molécules signal (acyl-homosérine lactones chez les Gram-négatives, oligopeptides chez les Gram-positives) permettant aux bactéries d'évaluer leur densité et de coordonner des comportements collectifs (formation de biofilms, production d'enzymes, virulence). Cible potentielle du biocontrôle.", "statut": "✓", "syn_fr": "quorum sensing ; communication intercellulaire bactérienne", "inrae": "05. SCIENCES BIOLOGIQUES › 05.07 MICROBIOLOGIE", "rt": "biofilms · holobionte · suppressivité", "bt": "signalisation microbienne", "type": "concept"}, {"fr": "effet rhizosphère", "en": "rhizosphere effect", "doc_code": "V2", "strate": "V", "definition": "Stimulation de l activité microbienne (10-100x) dans la zone racinaire par les exsudats et la mucilage. Représente 10-30% du C photosynthétique alloué. Pilote le recrutement sélectif du microbiome.", "statut": "◆", "syn_fr": "stimulation rhizosphérique ; effet de niche racinaire", "bt": "interaction sol-plante", "type": "concept"}, {"fr": "endogés", "en": "endogeic earthworms", "doc_code": "V1", "strate": "V", "definition": "Vers géophages vivant dans les horizons minéraux (5-40 cm), se nourrissant de la MO incorporée aux argiles. Créent des galeries horizontales non permanentes. Indicateurs d'une bonne agrégation biologique des horizons de labour.", "statut": "◆", "syn_fr": "Vers de terre géophages ; vers de terre de profondeur", "syn_en": "endogeic species", "bt": "vers de terre", "type": "concept"}, {"fr": "endophytisme fongique", "en": "fungal endophytism", "doc_code": "V2", "strate": "V", "definition": "Colonisation tissus végétaux internes sans pathologie. CEP colonisent via apoplaste et xylème. Souche-dépendant.", "statut": "✓", "type": "concept"}, {"fr": "enracinement", "en": "rooting", "doc_code": "V2", "strate": "V", "definition": "Développement du système racinaire en profondeur et densité. Stimulé par les auxines (PGPR), les CMA et l'absence de semelle de labour.", "statut": "~", "syn_fr": "développement racinaire ; mise en place du système racinaire", "syn_en": "root development", "bt": "croissance végétale", "type": "glossaire"}, {"fr": "exsudats racinaires", "en": "root exudates", "doc_code": "V2", "strate": "V", "definition": "Composés organiques libérés activement par les racines vivantes dans la rhizosphère (sucres simples, acides organiques, acides aminés, mucilages, phénols). 5-40% du C fixé par photosynthèse. Moteur principal de l'activité biologique rhizosphérique : recrutent chimiotactiquement les PGPR, initient la symbiose mycorhizienne, solubilisent le phosphore. La composition des exsudats change selon les besoins de la plante (recrutement sélectif).", "statut": "✓", "syn_fr": "rhizodépôts ; exsudats carbonés ; sécrétions racinaires", "inrae": "05.04 ANATOMIE ET FLUIDES BIOLOGIQUES › exsudat", "rt": "rhizodéposition · recrutement sélectif · SIREM · rhizosphère", "bt": "rhizodéposition", "type": "concept"}, {"fr": "facteur de bioturbation", "en": "bioturbation factor", "doc_code": "V1", "strate": "V", "definition": "Coefficient quantifiant l intensité du remaniement du sol par la faune (vers, arthropodes). Élevé = mélange actif des horizons, enfouissement de la MO, création de biopores. Indicateur de vitalité faunistique.", "statut": "◆", "syn_fr": "Intensité du brassage biologique ; indice de remaniement", "bt": "Indicateur de fonctionnement du sol", "type": "concept"}, {"fr": "fermentation anaérobie", "en": "anaerobic fermentation", "doc_code": "V3", "strate": "V", "definition": "Décomposition de matière organique sans oxygène, préservant énergie et nutriments. Bokashi : 95-98% de rétention MO vs 48-51% en compostage aérobie.", "statut": "◆", "type": "concept"}, {"fr": "gibbérellines", "en": "gibberellins", "doc_code": "V2", "strate": "V", "definition": "Hormones végétales stimulant l'allongement des tiges et la levée de dormance des graines. Synthétisées par certains PGPR (Bacillus, Azospirillum) et champignons. La stimulation de la croissance par les PGPR passe en partie par la production de gibbérellines.", "statut": "✓", "inrae": "05.02 BIOLOGIE MOLÉCULAIRE ET BIOCHIMIE › régulateur de croissance", "rt": "auxines · PGPR · cytokinines", "bt": "phytohormone", "type": "concept"}, {"fr": "holobionte", "en": "holobiont", "doc_code": "V2", "strate": "V", "definition": "Unité hôte + ensemble de ses micro-organismes associés formant une entité biologique unique et indissociable. La plante et son microbiome forment un holobionte dont le génome combiné (hologénome) est sélectionné comme un tout. La santé de la plante dépend à 80% de son microbiome racinaire (Hartmann et al., 2014). Les signaux moléculaires et les métabolites secondaires coordonnent croissance et immunité (Marks et al., 2025). Implication pratique : traiter le système plante+microbiome et non la plante isolée.", "statut": "◆", "syn_fr": "unité holobionte ; méta-organisme ; unité biologique intégrée", "syn_en": "holobiont", "rt": "hologénome · ISR · PGPR · métabolites secondaires", "bt": "unité de sélection évolutive", "type": "concept"}, {"fr": "hologénome", "en": "hologenome", "doc_code": "V2", "strate": "V", "definition": "Génome combiné de l'hôte et de tous ses micro-organismes associés (microbiotes). Unité de sélection naturelle pour les holobiontes. Implique que la sélection variétale pour la santé du sol devrait intégrer la capacité de recrutement microbien de la variété.", "statut": "◆", "syn_fr": "génome combiné hôte-microbiote ; génome de l'holobionte", "rt": "holobionte · sélection variétale · microbiome", "bt": "holobionte", "type": "concept"}, {"fr": "hormèse", "en": "hormesis", "doc_code": "V2/H1", "strate": "V", "definition": "Phénomène par lequel un stress de faible intensité stimule la croissance ou la résistance d'un organisme, alors qu'une dose nulle n'a aucun effet et qu'une dose élevée est néfaste. En agriculture : les stress modérés (légère sécheresse, compétition racinaire contrôlée, micro-agressions pathogènes surmontées) induisent synthèse accrue de métabolites secondaires, défenses renforcées et densité nutritionnelle améliorée. La phyto-élicitation biologique exploite ce principe.", "statut": "◆", "syn_fr": "réponse biphasique ; stimulation par faible dose de stress", "rt": "ISR · polyphénols · densité nutritionnelle · phyto-élicitation", "bt": "réponse physiologique au stress", "type": "concept"}, {"fr": "inhibition du quorum", "en": "quorum quenching", "doc_code": "V2", "strate": "V", "definition": "Interférence avec le quorum sensing bactérien par dégradation enzymatique des acyl-homosérine lactones (AHL). Mécanisme de défense végétale contre les pathogènes à QS-dépendant.", "statut": "◆", "syn_fr": "quorum quenching ; brouillage du signal", "bt": "régulation de la signalisation microbienne", "type": "concept"}, {"fr": "lacto-fermentés correcteurs redox", "en": "redox-correcting lacto-ferments", "doc_code": "V3", "strate": "V", "definition": "Produits de lacto-fermentation (LiFoFer, résidus végétaux fermentés, fumiers fermentés anaérobie) utilisés comme intrants correcteurs du potentiel redox du sol. Eh de -100 à -200 mV. Effet mesuré à 40 cm de profondeur, persistant 1 mois après application. Particulièrement pertinent en sols méditerranéens oxydés (500-620 mV) où l'accès au fumier bovin est limité.", "statut": "◆", "syn_fr": "préparations lacto-fermentées antioxydantes ; sérum de bactéries lactiques", "bt": "biostimulant redox", "type": "concept"}, {"fr": "lactofermentation", "en": "lactic acid fermentation", "doc_code": "V3", "strate": "V", "definition": "Fermentation par bactéries lactiques (LAB), abaissant le pH par production d'acide lactique et conservant les nutriments dans les métabolites. Voie fermentaire la plus ancienne et la plus répandue, conservée depuis 3,8 Ga. Base du Bokashi, des EM, du Jeevamrit et des aliments fermentés humains.", "statut": "✓", "syn_fr": "fermentation lactique", "syn_en": "lacto-fermentation", "inrae": "procédé biotechnologique › fermentation › fermentation anaérobie", "rt": "bactéries lactiques · bokashi · acide lactique · JADAM", "bt": "fermentation anaérobie", "type": "concept"}, {"fr": "mixotrophie racinaire", "en": "root mixotrophy", "doc_code": "V2", "strate": "V", "definition": "Absorption directe de protéines et acides aminés du sol. Confirmé chez tomate, maïs, oignon. Contribution débattue.", "statut": "✓", "type": "concept"}, {"fr": "mémoire thermique", "en": "thermal memory", "doc_code": "V2", "strate": "V", "definition": "Réponse accrue au stress thermique après première exposition. Amorçage constitutif HSFA2 par H3K4me3.", "statut": "✓", "type": "concept"}, {"fr": "mésofaune", "en": "mesofauna", "doc_code": "V1", "strate": "V", "definition": "Organismes du sol de 0,2 à 2 mm : collemboles, acariens, enchytréides. Rôle clé dans la fragmentation de la litière, la régulation des populations microbiennes et la formation des micro-agrégats. Sensibles au labour et aux pesticides — bioindicateurs de la qualité biologique du sol.", "statut": "◆", "syn_fr": "Faune de taille intermédiaire (0,2 à 2 mm)", "bt": "Faune du sol", "type": "concept"}, {"fr": "métabolites secondaires", "en": "secondary metabolites", "doc_code": "V3/S2", "strate": "V", "definition": "Composés non essentiels au métabolisme primaire mais cruciaux pour les interactions : antibiotiques, sidérophores, volatils, pigments.", "statut": "~", "syn_fr": "composés spécialisés ; biomolécules actives", "bt": "produits du métabolisme", "type": "glossaire"}, {"fr": "métabolites secondaires microbiens", "en": "microbial secondary metabolites", "doc_code": "V3/S2", "strate": "V", "definition": "Composés bioactifs non essentiels à la croissance microbienne mais jouant des rôles écologiques critiques : antibiotiques (suppressivité), sidérophores (nutrition ferrique), acides organiques (solubilisation P, suppression pathogènes), phytohormones (auxines microbiennes), vitamines du complexe B (nutrition végétale et humaine), acide 3-phényllactique (promotion racinaire). Concentrés par fermentation. Marks et al. (2025) : coordonnateurs de la croissance et de l'immunité dans l'holobionte.", "statut": "◆", "syn_fr": "métabolites microbiens spécialisés ; exométabolites", "rt": "sidérophore · acide 3-phényllactique · vitamines B · antibiotiques naturels · holobionte", "bt": "métabolites secondaires", "type": "concept"}, {"fr": "nématodes du sol", "en": "soil nematodes", "doc_code": "V1", "strate": "V", "definition": "Vers microscopiques (0,5–5 mm) organisés en guildes trophiques : bactérivores (minéralisation N), fungivores (régulation fongique), prédateurs (top-down), phytoparasites (dégâts racinaires). L'indice de maturité de Bongers (MI) basé sur les nématodes est un bioindicateur de perturbation du sol.", "statut": "◆", "syn_fr": "Nématofaune ; vers ronds du sol", "bt": "Microfaune du sol", "type": "concept"}, {"fr": "nématodes phytoparasites", "en": "plant-parasitic nematodes", "doc_code": "V1", "strate": "V", "definition": "Nématodes se nourrissant des tissus racinaires. Bokashi réduit leur population de 27% par rapport au témoin.", "statut": "◆", "type": "concept"}, {"fr": "protozoaires", "en": "protozoa", "doc_code": "V1", "strate": "V", "definition": "Eucaryotes unicellulaires du sol (ciliés, flagellés, amibes) représentant 30-50% du turnover bactérien. Libèrent l azote immobilisé dans la biomasse microbienne (boucle microbienne).", "statut": "◆", "syn_fr": "Protistes du sol ; microfaune unicellulaire", "bt": "Microfaune du sol", "type": "concept"}, {"fr": "recrutement sélectif", "en": "selective microbiome recruitment", "doc_code": "V2", "strate": "V", "definition": "Sélection active par la plante de micro-organismes spécifiques dans la rhizosphère via la composition et les quantités d'exsudats racinaires sécrétés. Mécanisme SIREM (Systemic Induced Root Exudate Modulation). La plante est le prescripteur actif de son microbiome, pas un hôte passif.", "statut": "◆", "syn_fr": "sélection active du microbiote ; effet de niche racinaire sélectif", "rt": "exsudats racinaires · SIREM · holobionte · chimiotaxisme", "bt": "interaction hôte-microbiote", "type": "concept"}, {"fr": "reprogrammation plasmidique par la plante", "en": "plant-driven plasmid reprogramming", "doc_code": "V2", "strate": "V", "definition": "Extension du cycle rhizophagique : la plante ne se contente pas d'internaliser et de digérer les bactéries — elle influence leurs plasmides pour leur commander la production de métabolites spécifiques. Les bactéries rejetées dans la rhizosphère sont reprogrammées. La bactérie réagit en 20 minutes là où la plante mettrait des heures. Mécanisme fondamental du concept d'holobionte.", "statut": "◆", "syn_fr": "régulation du métatranscriptome plasmidique", "bt": "interaction moléculaire plante-bactérie", "type": "concept"}, {"fr": "réseau trophique", "en": "trophic network", "doc_code": "V1", "strate": "V", "definition": "Relations alimentaires entre organismes du sol. Bactéries → protozoaires → nématodes → microarthropodes → macrofaune. Régule le recyclage des nutriments.", "statut": "~", "syn_fr": "Chaîne alimentaire ; réseau d'interactions alimentaires", "syn_en": "food web", "bt": "Structure des communautés", "type": "glossaire"}, {"fr": "réseau trophique du sol", "en": "soil food web", "doc_code": "V1", "strate": "V", "definition": "Ensemble des relations alimentaires entre les organismes du sol : bactéries et champignons (décomposeurs) → protozoaires et nématodes bactérivores (brouteurs) → micro-arthropodes et nématodes prédateurs → macro-arthropodes et vers de terre. La structure du réseau détermine les flux de nutriments et la résilience de l'écosystème.", "statut": "◆", "syn_fr": "Réseau trophique édaphique ; soil food web", "bt": "Écosystème du sol", "type": "concept"}, {"fr": "rétention de matière organique", "en": "organic matter retention", "doc_code": "V3", "strate": "V", "definition": "Pourcentage de MO initiale préservée après traitement. Bokashi 97% vs compost 38% (SPNA, 2016).", "statut": "◆", "type": "concept"}, {"fr": "signalisation chimique", "en": "chemical signaling", "doc_code": "V2", "strate": "V", "definition": "Communication entre plantes et micro-organismes via molécules signal : strigolactones, flavonoïdes, LCO, volatils.", "statut": "~", "syn_fr": "médiation chimique ; dialogue moléculaire ; communication inter-organismes", "bt": "interaction biotique", "type": "glossaire"}, {"fr": "succession microbienne", "en": "microbial succession", "doc_code": "V3", "strate": "V", "definition": "Séquence temporelle de communautés microbiennes se succédant dans un substrat fermenté ou un sol en régénération : phases pionnières copiotrophes (fermentaires, dégradant les sucres simples) → phases intermédiaires (dégradant la cellulose, l'amidon) → phases climaciques oligotrophes/fongiques (dégradant la lignine, l'humus). Dans un Bokashi : succession LAB → PNSB → Actinobactéries.", "statut": "◆", "syn_fr": "dynamique des populations microbiennes ; assemblage des communautés ; transition microbienne", "syn_en": "community succession", "rt": "copiotrophes · oligotrophes · ratio F/B · guildes fongiques", "bt": "écologie microbienne", "type": "concept"}, {"fr": "sélection variétale", "en": "cultivar selection", "doc_code": "V2", "strate": "V", "definition": "Choix de variétés végétales. L'approche hologénomique sélectionne la plante ET son microbiome associé, pas seulement le génotype végétal.", "statut": "~", "syn_fr": "amélioration des cultivars ; sélection génétique végétale", "bt": "gestion agronomique", "type": "glossaire"}, {"fr": "thermodynamique fermentation", "en": "fermentation thermodynamics", "doc_code": "V3", "strate": "V", "definition": "Énergie libérée faible lors des fermentations (ΔG négatif mais limité) → le carbone et l'azote sont conservés dans les métabolites organiques plutôt qu'oxydés en CO₂ et N₂. Avantage vs compostage aérobie : moins d'énergie dissipée, plus de C et N conservés dans les produits. Voir S4 — Thermodynamique des Cycles pour le cadre biogéochimique général.", "statut": "≈", "syn_fr": "bioénergétique de la fermentation ; contraintes thermodynamiques microbiennes", "syn_en": "microbial thermodynamics", "inrae": "03.01 PROCÉDÉS ET ÉQUIPEMENTS DE TRANSFORMATION › fermentation", "rt": "thermodynamique des cycles ΔG · bokashi · conservation C/N", "bt": "thermodynamique microbienne", "type": "concept"}, {"fr": "thermotolérance", "en": "thermotolerance", "doc_code": "V2", "strate": "V", "definition": "Capacité à survivre sous stress thermique. Amplifiée par microbiome via ACC déaminase, EPS, osmolytes, HSFA2/H3K4me3.", "statut": "✓", "type": "concept"}, {"fr": "turricules", "en": "earthworm casts", "doc_code": "V1", "strate": "V", "definition": "Déjections des vers de terre, enrichies en bactéries, azote, phosphore et calcium par rapport au sol adjacent. Micro-agrégats stables, hotspots de diversité microbienne et de disponibilité nutritive. Production : jusqu'à 50 t/ha/an par une communauté de vers abondante.", "statut": "◆", "syn_fr": "Déjections de vers de terre ; casts ; biostructures de surface", "syn_en": "worm casts", "rt": "vers de terre · micro-agrégats · fertilité biologique", "bt": "Biostructures", "type": "concept"}, {"fr": "vers de terre anéciques", "en": "anecic earthworms", "doc_code": "V1", "strate": "V", "definition": "Grande taille (10-110 cm), galeries verticales permanentes. Ingèrent la litière en surface et la mélangent aux horizons profonds.", "statut": "~", "syn_fr": "Vers de terre à déplacement vertical ; anéciques", "bt": "Vers de terre", "type": "glossaire"}, {"fr": "vitamines B", "en": "B vitamins", "doc_code": "V3/H1", "strate": "V", "definition": "Vitamines du groupe B produites par les micro-organismes du sol et transférées à la plante. Densité nutritionnelle liée au microbiome.", "statut": "~", "syn_fr": "complexe vitaminique B ; vitamines hydrosolubles", "syn_en": "vitamin B complex", "bt": "micronutriment", "type": "glossaire"}, {"fr": "volatils microbiens", "en": "microbial volatile organic compounds (mVOC)", "doc_code": "V2", "strate": "V", "definition": "Molécules gazeuses de faible poids moléculaire (2,3-butanediol, acétoïne) produites par le microbiome du sol, agissant comme signaux de communication microbiome-plante à distance. Stimulent la croissance végétale, induisent l'ISR et régulent la colonisation racinaire.", "statut": "≈", "syn_fr": "composés organiques volatils microbiens ; COVm", "syn_en": "mVOC · microbial VOCs ; mVOC", "inrae": "10. CHIMIE › 10.02 SUBSTANCES ET PRODUITS CHIMIQUES › composé organique volatil (correction v2.2)", "rt": "ISR · PGPR · signalisation chimique", "bt": "métabolite secondaire microbien", "type": "concept"}, {"fr": "élicitation par débris microbiens", "en": "MAMP-triggered immunity (MTI)", "doc_code": "V2/S2", "strate": "V", "definition": "Activation des mécanismes de défense et de croissance végétale par la reconnaissance de fragments microbiens (MAMPs : Microbe-Associated Molecular Patterns) — chitine fongique, peptidoglycane bactérien, LPS. Analogue de la mémoire immunitaire : exposer la plante à des débris microbiens inoffensifs la prépare à résister aux agressions. Les préparations contenant de la nécromasse microbienne et fongique exploitent ce mécanisme.", "statut": "◆", "syn_fr": "immunité par MAMPs ; élicitation par les MAMP ; immunité déclenchée par les microbes", "syn_en": "MTI · MAMP-triggered immunity ; MTI", "rt": "ISR · SAR · nécromasse microbienne · biocontrôle", "bt": "immunité induite des plantes", "type": "concept"}, {"fr": "épigés", "en": "epigeic earthworms", "doc_code": "V1", "strate": "V", "definition": "Vers de surface vivant dans la litière (0-5 cm), petits et pigmentés. Rôle principal : fragmentation et ingestion de la litière (ex : Eisenia fetida, Lumbricus castaneus). Très sensibles aux pesticides et au travail du sol.", "statut": "◆", "syn_fr": "Vers de terre de surface ; vers détritivores de litière", "syn_en": "epigeic species", "bt": "vers de terre", "type": "concept"}, {"fr": "éthylène", "en": "ethylene", "doc_code": "V2", "strate": "V", "definition": "Hormone végétale de stress. Les PGPR producteurs d'ACC désaminase dégradent son précurseur (ACC), réduisant le stress.", "statut": "~", "syn_fr": "hormone de maturation ; gaz de stress ; C2H4", "bt": "phytohormone", "type": "glossaire"}], "chains": [{"id": "C1", "titre": "Photosynthèse du couvert → Immunité intestinale humaine", "valeur_ajoutee": "Argument le plus puissant pour les décideurs publics : un choix de couvert impacte la santé humaine via 7 étapes documentées. La politique agricole est une politique de santé publique.", "docs_traverses": "P2/S4/S2/S3/V2/V3/H1/H3", "etapes": [{"position": 1, "strate_etape": "P2", "term_fr_text": "[P2]", "role_dans_chaine": "Design couvert multi-espèces (10-12 sp.) fixant le C par photosynthèse"}, {"position": 2, "strate_etape": "S4", "term_fr_text": "[S4]", "role_dans_chaine": "Exsudats racinaires → pompe microbienne à carbone, CUE augmentée"}, {"position": 3, "strate_etape": "S2", "term_fr_text": "[S2]", "role_dans_chaine": "Diversification guildes bactériennes, turnover microbien, nécromasse"}, {"position": 4, "strate_etape": "S3", "term_fr_text": "[S3]", "role_dans_chaine": "Développement CMA/CMN → transport P, Zn, Cu vers les plantes"}, {"position": 5, "strate_etape": "V2", "term_fr_text": "[V2]", "role_dans_chaine": "Recrutement PGPR/endophytes, activation ISR/SAR, production polyphénols"}, {"position": 6, "strate_etape": "V3", "term_fr_text": "[V3]", "role_dans_chaine": "Production vitamines B et métabolites secondaires rhizosphériques"}, {"position": 7, "strate_etape": "H1", "term_fr_text": "[H1]", "role_dans_chaine": "Augmentation densité nutritionnelle (antioxydants, minéraux, vitamines B)"}, {"position": 8, "strate_etape": "H3", "term_fr_text": "[H3]", "role_dans_chaine": "Transfert endophytes → microbiome intestinal via alimentation"}]}, {"id": "C2", "titre": "Haber-Bosch → Maladie chronique (chaîne de dégradation)", "valeur_ajoutee": "Démontre que chaque maillon de la dégradation a un coût caché. Argument systémique pour dépasser la vision cloisonnée agriculture/santé/environnement.", "docs_traverses": "F2/S2/S3/S4/V2/H1/H2/H3", "etapes": [{"position": 1, "strate_etape": "F2", "term_fr_text": "[F2]", "role_dans_chaine": "Azote Haber-Bosch → EROI faible ou négatif, dépendance fossile"}, {"position": 2, "strate_etape": "S2", "term_fr_text": "[S2]", "role_dans_chaine": "Déséquilibre copiotrophes/oligotrophes, effondrement diversité microbienne"}, {"position": 3, "strate_etape": "S3", "term_fr_text": "[S3]", "role_dans_chaine": "Dégradation réseaux CMA par excès N et P solubles, perte GRSP"}, {"position": 4, "strate_etape": "S4", "term_fr_text": "[S4]", "role_dans_chaine": "Priming Effect sur COS, déstockage carbone stable"}, {"position": 5, "strate_etape": "V2", "term_fr_text": "[V2]", "role_dans_chaine": "Loi de la Trophobiose : excès acides aminés libres, vulnérabilité ravageurs"}, {"position": 6, "strate_etape": "H1", "term_fr_text": "[H1]", "role_dans_chaine": "Dilution de la densité nutritionnelle (croissance rapide sans synthèse complète)"}, {"position": 7, "strate_etape": "H2", "term_fr_text": "[H2]", "role_dans_chaine": "Appauvrissement microbiome intestinal humain"}, {"position": 8, "strate_etape": "H3", "term_fr_text": "[H3]", "role_dans_chaine": "Pression de sélection ARG par usage compensatoire antibiotiques/fongicides"}]}, {"id": "C3", "titre": "Bokashi → Suppressivité du sol", "valeur_ajoutee": "Donne un fondement mécaniste aux biostimulants fermentés. Permet de prédire quand le Bokashi sera efficace vs risqué (sol riche en COS → risque Priming Effect).", "docs_traverses": "P3/V3/S2/S4/S3/V2/P1", "etapes": [{"position": 1, "strate_etape": "P3", "term_fr_text": "[P3]", "role_dans_chaine": "Application Bokashi (substrat fermenté LAB/levures/PNSB)"}, {"position": 2, "strate_etape": "V3", "term_fr_text": "[V3]", "role_dans_chaine": "Métabolites actifs : acide 3-phényllactique, acides organiques, sidérophores"}, {"position": 3, "strate_etape": "S2", "term_fr_text": "[S2]", "role_dans_chaine": "Réintroduction consortia microbiens, compétition pour niches écologiques"}, {"position": 4, "strate_etape": "S4", "term_fr_text": "[S4]", "role_dans_chaine": "Modification Eh local, solubilisation P fixé sur oxydes Fe/Al"}, {"position": 5, "strate_etape": "S3", "term_fr_text": "[S3]", "role_dans_chaine": "Stimulation saprotrophes ligneux occupant la place des champignons pathogènes"}, {"position": 6, "strate_etape": "V2", "term_fr_text": "[V2]", "role_dans_chaine": "Activation ISR via métabolites microbiens perçus par les racines"}, {"position": 7, "strate_etape": "P1", "term_fr_text": "[P1]", "role_dans_chaine": "Mesure PLFA (ratio F/B amélioré) et VESS (amélioration structurale)"}]}, {"id": "C4", "titre": "Anaérobiose archéenne → Fermentations alimentaires modernes", "valeur_ajoutee": "Le récit fondateur du corpus : les fermentations ne sont pas une technique mais la réactivation du métabolisme le plus ancien de la biosphère. Différenciateur philosophique majeur.", "docs_traverses": "F1/S4/V3/P3/V2/H3/H1", "etapes": [{"position": 1, "strate_etape": "F1", "term_fr_text": "[F1]", "role_dans_chaine": "Vie primitive dans monde anoxique (3,8 Ga) — voies fermentaires originelles"}, {"position": 2, "strate_etape": "S4", "term_fr_text": "[S4]", "role_dans_chaine": "Conservation microsites anoxiques dans agrégats du sol actuel"}, {"position": 3, "strate_etape": "V3", "term_fr_text": "[V3]", "role_dans_chaine": "Thermodynamique fermentation (ΔG favorable à conservation C/N)"}, {"position": 4, "strate_etape": "P3", "term_fr_text": "[P3]", "role_dans_chaine": "Application via Bokashi/EM/IMO reproduisant conditions anaérobies contrôlées"}, {"position": 5, "strate_etape": "V2", "term_fr_text": "[V2]", "role_dans_chaine": "Endophytes racinaires conservant voies fermentaires dans tissus végétaux"}, {"position": 6, "strate_etape": "H3", "term_fr_text": "[H3]", "role_dans_chaine": "Microbiome intestinal majoritairement anaérobie — mêmes voies conservées"}, {"position": 7, "strate_etape": "H1", "term_fr_text": "[H1]", "role_dans_chaine": "Aliments fermentés (kimchi, kéfir...) réactivent voies métaboliques ancestrales"}]}, {"id": "C5", "titre": "Diagnostic terrain → Trajectoire économique", "valeur_ajoutee": "Le parcours praticien complet manquant dans le corpus : du diagnostic à la décision rentable. Chaîne indispensable pour que la transition soit économiquement pilotée.", "docs_traverses": "P1/S2/S4/P2/P3/P5/F2", "etapes": [{"position": 1, "strate_etape": "P1", "term_fr_text": "[P1]", "role_dans_chaine": "Diagnostic VESS + PLFA + Chao1 + COS"}, {"position": 2, "strate_etape": "S2", "term_fr_text": "[S2]", "role_dans_chaine": "Interprétation via guildes fonctionnelles et ratio copiotrophes/oligotrophes"}, {"position": 3, "strate_etape": "S4", "term_fr_text": "[S4]", "role_dans_chaine": "Positionnement sur courbe de stockage carbone (modèle RothC)"}, {"position": 4, "strate_etape": "P2", "term_fr_text": "[P2]", "role_dans_chaine": "Choix pratiques ACS adaptés au diagnostic (type couvert, stœchiométrie C/N)"}, {"position": 5, "strate_etape": "P3", "term_fr_text": "[P3]", "role_dans_chaine": "Choix biostimulants selon déficit microbien identifié (inoculation ciblée)"}, {"position": 6, "strate_etape": "P5", "term_fr_text": "[P5]", "role_dans_chaine": "Positionnement sur chronoséquence 4 phases, objectifs +0,1% MO/an"}, {"position": 7, "strate_etape": "F2", "term_fr_text": "[F2]", "role_dans_chaine": "Traduction économique : réduction charges, crédits carbone, capital biologique"}]}, {"id": "C6", "titre": "Diversité des couverts → Résilience immunitaire des populations", "valeur_ajoutee": "L'argument le plus radical : un choix technique anodin (nb d'espèces dans un couvert) a des implications mesurables sur l'épidémiologie des maladies chroniques.", "docs_traverses": "P2/S2/S3/V2/H1/H3", "etapes": [{"position": 1, "strate_etape": "P2", "term_fr_text": "[P2]", "role_dans_chaine": "Couvert multi-espèces saturant les niches écologiques"}, {"position": 2, "strate_etape": "S2", "term_fr_text": "[S2]", "role_dans_chaine": "Augmentation Chao1 et CUE par diversité des exsudats racinaires"}, {"position": 3, "strate_etape": "S3", "term_fr_text": "[S3]", "role_dans_chaine": "Renforcement CMN inter-espèces, suppressivité accrue"}, {"position": 4, "strate_etape": "V2", "term_fr_text": "[V2]", "role_dans_chaine": "Élicitation ISR/SAR par diversité microbienne, production métabolites défensifs"}, {"position": 5, "strate_etape": "H1", "term_fr_text": "[H1]", "role_dans_chaine": "Aliments plus riches en polyphénols, vitamines B, protection anti-inflammation"}, {"position": 6, "strate_etape": "H3", "term_fr_text": "[H3]", "role_dans_chaine": "Diversité microbienne transmise à l'intestin, réduction maladies auto-immunes"}]}, {"id": "C7", "titre": "Piège de la performance → Robustesse par les contreperformances", "valeur_ajoutee": "Chaîne philosophique reliant le cadre conceptuel Hamant (pourquoi la performance détruit les systèmes vivants) à la pratique agricole (comment la contreperformance régénère). Argument systémique pour dépasser le productivisme sans tomber dans la décroissance subie. [NON VALIDÉE — à sourcer avec Jenni avant activation]", "docs_traverses": "F2/S2/P2/P5", "etapes": [{"position": 1, "strate_etape": "F", "term_fr_text": "efficiency trap (piège de la performance)", "role_dans_chaine": "Point de départ : boucle crise → besoin de contrôle → performance → fragilité → crise"}, {"position": 2, "strate_etape": "F", "term_fr_text": "compromis performance/robustesse", "role_dans_chaine": "Loi universelle Hamant : un système ne peut pas être simultanément très performant et très robuste"}, {"position": 3, "strate_etape": "F", "term_fr_text": "contreperformances sélectionnées par l'évolution", "role_dans_chaine": "La solution darwinienne : inefficacité, hétérogénéité, redondance, lenteur élargissent l'espace de viabilité"}, {"position": 4, "strate_etape": "P", "term_fr_text": "couverts végétaux multi-espèces", "role_dans_chaine": "Traduction agronomique : diversité spécifique = contreperformance productive (rendement unitaire moindre, robustesse systémique supérieure)"}, {"position": 5, "strate_etape": "S", "term_fr_text": "CUE et diversité microbienne", "role_dans_chaine": "Le sol diversifié est \"inefficace\" (CUE variable) mais robuste — la redondance fonctionnelle microbienne absorbe les perturbations"}, {"position": 6, "strate_etape": "P", "term_fr_text": "chronoséquence de transition", "role_dans_chaine": "Le temps long comme contreperformance assumée — 4 phases, objectif +0,1% MO/an vs résultat immédiat"}, {"position": 7, "strate_etape": "F", "term_fr_text": "antifragilité", "role_dans_chaine": "Le système gagne en robustesse sous stress — propriété émergente des contreperformances accumulées"}, {"position": 8, "strate_etape": "F", "term_fr_text": "sobriété comme produit de sortie", "role_dans_chaine": "Output : la sobriété émerge naturellement du système robuste, elle n'est plus une contrainte d'entrée"}]}], "crossrefs": [{"doc_code_source": "F1", "section_source": "III", "doc_code_cible": "S3", "section_cible": "I", "pour_concept": "Conservation phylogénétique de la signalisation LCO depuis 470 Ma", "justification": "La section F1§III décrit l'endosymbiose Glomeromycota-plantes à ~470 Ma. Le fait que les mêmes molécules de signalisation (LCO) soient encore fonctionnelles aujourd'hui est un argument majeur pour la robustesse évolutive de cette symbiose. F1 doit renvoyer à S3 pour les détails moléculaires actuels.", "doc_source": "F1 Le Temps Long §III (Colonisation terrestre, mycorhizes)", "doc_cible": "S3 Le Microbiome Fongique et Mycorhizien §I (CMA, signalisation LCO)"}, {"doc_code_source": "F1", "section_source": "III", "doc_code_cible": "V2", "section_cible": "I", "pour_concept": "Conservation phylogénétique des strigolactones comme signal de recrutement mycorhizien depuis 470 Ma", "justification": "F1 décrit les premières symbioses mycorhiziennes (470 Ma, avant les vraies racines). V2 décrit les mécanismes moléculaires actuels de recrutement (strigolactones, LCO). Le renvoi explicite démontre que la molécule de signalisation (strigolactone) est conservée depuis 470 Ma, ce qui en fait un des sy", "doc_source": "F1 Le Temps Long §III (Colonisation terrestre, mycorhizes)", "doc_cible": "V2 L'Holobionte Plante-Microbiome §I (Exsudats racinaires, strigolactones)"}, {"doc_code_source": "F1", "section_source": null, "doc_code_cible": "V3", "section_cible": "I", "pour_concept": "Continuité entre voies métaboliques archéennes et fermentations actuelles", "justification": "F1 §V est défini comme traitant des fermentations comme réactivation de 3,8 Ga de métabolisme conservé, mais doit explicitement renvoyer à V3 §I pour la biochimie détaillée des voies fermentatives qui sont la démonstration moléculaire de cette conservation évolutive.", "doc_source": "F1 Le Temps Long", "doc_cible": "V3 Les Fermentations Microbiennes §I (Histoire des lactofermentations)"}, {"doc_code_source": "F1", "section_source": "V", "doc_code_cible": "V3", "section_cible": "II", "pour_concept": "La démonstration thermodynamique que les fermentations conservent 93% de l'énergie comme fondement physique du récit philosophique", "justification": "Le renvoi F1→V3 §I existe dans les 20 identifiés, mais il cible l'histoire des lactofermentations. Il manque le renvoi spécifique F1 §V → V3 §II pour la démonstration thermodynamique (ΔG) qui est le fondement physique de la thèse philosophique de F1 §V : les fermentations sont néguentropiques parce ", "doc_source": "F1 Le Temps Long §V (Fermentations comme réactivation)", "doc_cible": "V3 Les Fermentations Microbiennes §II (Thermodynamique ΔG, conservation C/N)"}, {"doc_code_source": "F1", "section_source": null, "doc_code_cible": "V3", "section_cible": null, "pour_concept": "continuité évolutive anaérobiose → fermentations", "justification": "F1 §V fermentations comme réactivation du métabolisme archéen ↔ V3 fermentations actuelles", "doc_source": "F1", "doc_cible": "V3"}, {"doc_code_source": "F2", "section_source": "II", "doc_code_cible": "H1", "section_cible": "I", "pour_concept": "Effet de dilution comme externalité sanitaire non comptabilisée de l'agriculture intensive", "justi
