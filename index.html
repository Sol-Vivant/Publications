 Sol ; carbone organique", "syn_en": "SOC", "bt": "matière organique du sol", "type": "glossaire"}, {"fr": "CUE", "en": "carbon use efficiency", "doc_code": "S2", "strate": "S", "definition": "Rapport biomasse microbienne construite / carbone total consommé (0,2 à 0,6). CUE élevée = construction de MO stable (nécromasse, MAOM) ; CUE faible = respiration (CO₂ émis). La diversité végétale des couverts multi-espèces augmente mécaniquement la CUE via la diversification des exsudats racinaires (Domeignoz-Horta et al., 2024). CUE diminuée par : excès d'azote minéral, températures élevées, perturbations mécaniques. Levier de pilotage du stockage carbone.", "statut": "◆", "syn_fr": "efficacité d'utilisation du carbone ; EUC", "syn_en": "CUE · microbial carbon use efficiency ; CUE", "rt": "nécromasse microbienne · pompe microbienne · couverts végétaux · diversité microbienne", "bt": "métabolisme microbien", "type": "concept"}, {"fr": "Capacité d’Échange Cationique", "en": "Cation Exchange Capacity (CEC)", "doc_code": "S1", "strate": "S", "definition": "Mesure de la quantité totale de cations (Ca²⁺, Mg²⁺, K⁺, NH₄⁺) qu'un sol peut retenir sur son complexe argilo-humique (Oursin, 2021). Elle dépend de la nature des argiles et, de manière critique, du taux de matière organique, dont la CEC est environ 10 fois supérieure à celle des argiles (Pellerin, Bamière, Savini, Rechauchère, et al., 2021; Pellerin, Bamière, Savini, Réchauchère, et al., 2021).\n\nEnjeu : Un sol avec une faible CEC est vulnérable au lessivage des nutriments, ce qui augmente les risques environnementaux et les coûts d'intrants (Nivelle, 2017).\n\nLevier de décision : En sols sableux (faible CEC minérale), l'augmentation du taux d'humus est le seul levier pour augmenter le \"réservoir\" de nutriments et limiter les pertes par lixiviation (Pellerin et al., 2021).", "statut": "◆", "syn_fr": "CEC ; T", "syn_en": "CEC", "bt": "complexe argilo-humique", "type": "concept"}, {"fr": "Chao1", "en": "Chao1 richness estimator", "doc_code": "S2/P1", "strate": "S", "definition": "Estimateur statistique non paramétrique de la richesse totale en espèces microbiennes d'un sol (Chao, 1984). Extrapole le nombre d'espèces non détectées à partir des singletons et doubletons dans les données de métabarcoding. Un Chao1 élevé indique une 'banque de gènes' diversifiée permettant de répondre aux aléas climatiques. Chao1 faible → système simplifié manquant de redondance fonctionnelle → diversifier les rotations. Outil central du pilotage de la diversité microbienne.", "statut": "◆", "syn_fr": "indice Chao1 ; estimateur de richesse Chao1", "syn_en": "Chao1 · species richness estimator ; Chao1 index", "inrae": "05. SCIENCES BIOLOGIQUES › 05.12 ÉCOLOGIE › diversité", "rt": "diversité alpha · métabarcoding · ratio F/B", "bt": "estimateur de richesse spécifique", "type": "concept"}, {"fr": "Complexe Argilo-Humique (CAH)", "en": "organo-mineral complex", "doc_code": "S1", "strate": "S", "definition": "Association intime argiles-humus stabilisée par des ponts cationiques bivalents (Ca²⁺, Mg²⁺) et des liaisons de coordination. Siège de la CEC et de la structure physique du sol. Le CAH protège la matière organique de la minéralisation rapide et détermine la stabilité des agrégats. Un sol à CAH bien développé (limon+argile+MO>3%) allie fertilité chimique, structure physique et résilience hydrique. Le labour détruit mécaniquement le CAH en fractionnant les agrégats organo-minéraux.", "statut": "◆", "syn_fr": "complexe absorbant · complexe humique", "syn_en": "organo-mineral complex · clay-humus complex", "inrae": "06. SCIENCES DE LA TERRE › 06.01 SCIENCES DU SOL", "rt": "argiles · humus · CEC · agrégation", "bt": "complexe du sol", "type": "concept"}, {"fr": "ECM", "en": "ectomycorrhiza", "doc_code": "S3", "strate": "S", "definition": "Champignons ectomycorhiziens formant un manteau externe autour des racines fines et pénétrant entre les cellules corticales (réseau de Hartig) sans intracellularité. Associés aux arbres (chênes, hêtres, pins, bouleaux). Sécrètent des protéases extracellulaires mobilisant l'N organique du sol. Essentiels aux systèmes agroforestiers.", "statut": "✓", "syn_fr": "ectomycorhizes", "syn_en": "ectomycorrhizae · ECM fungi ; ECM ; EcM", "inrae": "12. ORGANISMES VIVANTS › 12.02 NOTIONS LIÉES AUX ORGANISMES › mycorhize", "rt": "réseau de Hartig · CMN · agroforesterie", "bt": "symbiose mycorhizienne", "type": "concept"}, {"fr": "EPS (substances polymériques extracellulaires)", "en": "EPS (extracellular polymeric substances)", "doc_code": "S1/S2", "strate": "S", "definition": "Matrice de polysaccharides, protéines et ADN extracellulaire sécrétée par les biofilms microbiens. Assure la cohésion des micro-agrégats, module les gradients redox locaux et protège les cellules contre la dessication.", "statut": "◆", "syn_fr": "exopolysaccharides ; mucilages microbiens", "syn_en": "EPS", "bt": "polymères microbiens", "type": "concept"}, {"fr": "Firmicutes", "en": "Firmicutes", "doc_code": "S2", "strate": "S", "definition": "Phylum bactérien Gram+ incluant Bacillus, Clostridium, Lactobacillus. Sporulants, dominants en sols perturbés. Rôle clé dans les fermentations et la dégradation de la cellulose. Analogue du rapport copiotrophes dans le microbiome intestinal.", "statut": "◆", "syn_fr": "Bacillota (nomenclature récente)", "syn_en": "Bacillota", "bt": "bactéries Gram-positives", "type": "concept"}, {"fr": "Funneliformis", "en": "Funneliformis mosseae", "doc_code": "S3", "strate": "S", "definition": "Genre CMA (ex-Glomus mosseae). Espèce généraliste à large spectre d'hôtes, colonisant préférentiellement les graminées et légumineuses en sol calcaire.", "statut": "◆", "rt": "CMA · Rhizophagus · Glomeromycota", "bt": "Glomeromycota", "type": "concept"}, {"fr": "Glomus", "en": "Glomus (historical genus)", "doc_code": "S3", "strate": "S", "definition": "Genre obsolète (reclassé en 2012). Rhizophagus irregularis (ex-Glomus intraradices) est l espèce type. Utiliser Rhizophagus. Note historique : les études antérieures à 2012 utilisent Glomus.", "statut": "~", "syn_fr": "genre historique CMA", "inrae": "Fungi › Glomeromycota › Rhizophagus", "rt": "Rhizophagus · Funneliformis · CMA", "bt": "Glomeromycota", "type": "concept"}, {"fr": "ISMO", "en": "organic matter stability index", "doc_code": "S4", "strate": "S", "definition": "Indice de Stabilité de la Matière Organique. Pourcentage de MO stable par rapport à la MO totale apportée.", "statut": "◆", "type": "concept"}, {"fr": "Illite", "en": "illite", "doc_code": "S1", "strate": "S", "definition": "Argile micacée 2:1 non gonflante, intermédiaire entre micas et smectites. CEC modérée (15-40 cmol+/kg), source progressive de potassium structural par altération des bords des feuillets. Dominante dans les sols tempérés modérément altérés. Sa présence offre un équilibre favorable entre stabilité structurale et fertilité potassique. L'activité microbienne mobilise progressivement le K structural des illites — service écosystémique annulé par le recours au K soluble.", "statut": "◆", "syn_fr": "argile illitique · hydromica", "syn_en": "illite · hydrous mica", "inrae": "06. SCIENCES DE LA TERRE › 06.01 SCIENCES DU SOL › minéralogie", "rt": "CEC · kaolinite · smectite", "bt": "argiles 2:1", "type": "concept"}, {"fr": "K1 (coefficient d'humification)", "en": "humification coefficient (K1)", "doc_code": "S4/P3", "strate": "S", "definition": "Fraction MO→humus. BRF ~50%, broyat ~35%, fumier bovin ~25%, paille ~15%, compost ~10%.", "statut": "validé", "syn_fr": "rendement d'humification ; taux de transformation en humus", "syn_en": "K1", "bt": "paramètre du modèle Hénin-Dupuis", "type": "concept"}, {"fr": "Kaolinite", "en": "kaolinite", "doc_code": "S1", "strate": "S", "definition": "Argile 1:1 stable, non gonflante, à faible CEC (3-15 cmol+/kg) et surface spécifique réduite. Caractéristique des sols tropicaux et subtropicaux fortement altérés et lessivés. Sa faible capacité de rétention nutritive impose des apports organiques élevés pour compenser les limitations minéralogiques. En ACS sur sols kaolinitiques : maximiser les apports de MO et l'activité biologique pour créer une fertilité par voie biologique.", "statut": "◆", "syn_fr": "argile kaolinique", "syn_en": "kaolinite · kaoline clay", "inrae": "06. SCIENCES DE LA TERRE › 06.01 SCIENCES DU SOL › minéralogie", "rt": "CEC · illite · oxydes Fe/Al", "bt": "argiles 1:1", "type": "concept"}, {"fr": "LCO / facteurs Myc", "en": "lipochitooligosaccharides (LCO) / Myc factors", "doc_code": "S3/V2", "strate": "S", "definition": "Molécules signal produites par les champignons mycorhiziens (Glomeromycota) pour initier la symbiose avec les racines. Reconnus par les récepteurs LysM de la plante. Rôle dans ISR et suppressivité.", "statut": "◆", "syn_fr": "facteurs Myc · signaux LCO · facteurs Nod ; lipo-chitooligosaccharides", "syn_en": "LCO · Myc factors · Nod factors ; LCOs ; Myc factors", "inrae": "05. SCIENCES BIOLOGIQUES › 05.02 BIOLOGIE MOLÉCULAIRE", "rt": "CMA · Rhizobium · strigolactone · programme symbiotique", "bt": "signal symbiotique", "type": "concept"}, {"fr": "LUCA", "en": "Last Universal Common Ancestor", "doc_code": "S2", "strate": "S", "definition": "Ancêtre commun universel de toute vie terrestre, apparu il y a ~4.2 Ga dans un environnement entièrement réduit (anaérobie), sans O₂, sans couche d'ozone. Tous les métabolismes fondamentaux (fermentation, transfert horizontal de gènes, biofilms) étaient déjà en place chez LUCA. La maturité génétique du monde bactérien a pris 3 Ga — avant le GOE.", "statut": "◆", "syn_fr": "dernier ancêtre commun universel ; DACU", "syn_en": "LUCA", "bt": "phylogénie", "type": "concept"}, {"fr": "MAOM", "en": "mineral-associated organic matter", "doc_code": "S2/S4", "strate": "S", "definition": "Carbone organique d'origine microbienne associé et stabilisé aux surfaces des argiles et des oxydes Fe/Al. Fraction stable du sol (temps de résidence > 100 ans). Formée par précipitation de métabolites microbiens et de fragments de nécromasse sur les surfaces minérales. Complémentaire du POC (fraction labile). Le MAOM est le pool cible du carbon farming.", "statut": "✓", "syn_fr": "matière organique associée aux minéraux · MO stabilisée sur les argiles ; matière organique liée aux minéraux ; MOS associée aux minéraux", "syn_en": "MAOM", "inrae": "06. SCIENCES DE LA TERRE › 06.01 SCIENCES DU SOL", "rt": "nécromasse microbienne · POC · argiles · oxydes Fe/Al · séquestration carbone", "bt": "matière organique du sol", "type": "concept"}, {"fr": "MO", "en": "OM", "doc_code": "S4", "strate": "S", "definition": "Matière organique du sol. Ensemble des composés carbonés d'origine biologique : résidus végétaux, nécromasse microbienne, humus, exsudats. MO ≈ COS × 1,724.", "statut": "~", "syn_fr": "Matière Organique ; fractions organiques", "syn_en": "OM", "bt": "constituant du sol", "type": "glossaire"}, {"fr": "MOS", "en": "SOM", "doc_code": "S4", "strate": "S", "definition": "Matière organique stable du sol. Fraction humifiée résistante à la dégradation, principalement sous forme MAOM. Temps de résidence > 50 ans.", "statut": "~", "syn_fr": "Matière Organique du Sol ; MOS", "syn_en": "SOM", "bt": "complexe organo-minéral", "type": "glossaire"}, {"fr": "Microsites", "en": "soil microsites", "doc_code": "S1/S2/S4", "strate": "S", "definition": "Micro-environnements de quelques micromètres à quelques millimètres présentant des conditions physico-chimiques distinctes du macrovolume du sol. Ces niches créent des gradients d'O₂, de pH et de nutriments permettant la coexistence d'organismes aux besoins contradictoires. Les microsites aérobies (surface des agrégats) et anaérobies (intérieur des agrégats) coexistent à quelques mm de distance, rendant possibles la nitrification et la dénitrification simultanées dans un même sol. Le non-labour préserve la diversité et la connectivité des microsites.", "statut": "◆", "syn_fr": "microhabitats · niches édaphiques", "syn_en": "soil microsites · microhabitats", "inrae": "06. SCIENCES DE LA TERRE › 06.01 SCIENCES DU SOL", "rt": "agrégats · porosité · guildes fonctionnelles", "bt": "microsites", "nt": "microsites anoxiques", "type": "concept"}, {"fr": "Minéralisation Secondaire", "en": "Secondary Mineralization", "doc_code": "S4", "strate": "S", "definition": "Vitesse de décomposition lente de l'humus stable (matière organique humifiée), s'étendant sur des décennies ou des siècles (Noirot-Cosson, 2016; Robert, 2016).\n\nEnjeu : Elle assure le flux de nutriments de fond de la ferme. Si k2 est trop élevé (travail du sol intense), le capital sol s'épuise (Balesdent & Recous, 1997).\n\nLevier de décision : Réduire les perturbations mécaniques pour stabiliser le stock humique et garantir une fertilité résiliente sur le long terme (Balesdent & Recous, 1997).", "statut": "◆", "syn_fr": "minéralisation de l'humus ; minéralisation lente", "syn_en": "slow mineralization", "bt": "minéralisation de la matière organique", "type": "concept"}, {"fr": "N-mining", "en": "nitrogen mining", "doc_code": "S2/S4", "strate": "S", "definition": "Processus par lequel les micro-organismes décomposent la matière organique stable pour accéder à l'azote organique qu'elle contient, déstockant simultanément le carbone. Mécanisme clé du Priming Effect induit par l'azote minéral : l'excès d'azote soluble stimule les copiotrophes qui 'minent' la MO stable à la recherche de N → perte de COS. Maillon 4 de la chaîne causale C2.\n\nEnjeu : déstockage silencieux du capital carbone dans les sols sur-fertilisés en azote.\n\nLevier : maintenir l'équilibre copiotrophes/oligotrophes via les couverts diversifiés et la réduction des intrants azotés minéraux.", "statut": "◆", "syn_fr": "mining azoté · déstockage par minéralisation forcée ; minage d'azote ; minéralisation de l'humus induite", "syn_en": "N-mining · nitrogen priming ; N-mining", "inrae": "06. SCIENCES DE LA TERRE › 06.01 SCIENCES DU SOL › azote", "rt": "Priming Effect · copiotrophes · Haber-Bosch · COS", "bt": "minéralisation de la matière organique", "type": "concept"}, {"fr": "N2O", "en": "nitrous oxide", "doc_code": "S4", "strate": "S", "definition": "Protoxyde d'azote, gaz à effet de serre émis lors de la dénitrification incomplète (NO₃⁻→N₂O au lieu de N₂). 265× plus puissant que le CO₂ sur 100 ans. Principal GES de l'agriculture (excès d'azote minéral + conditions semi-anoxiques). Réduit par : limitation de l'azote soluble, couverture permanente du sol, augmentation de la diversité microbienne.", "statut": "✓", "syn_fr": "oxyde nitreux ; protoxyde d'azote", "syn_en": "nitrous oxide · N₂O ; N2O", "inrae": "composé chimique › composé minéral › oxyde", "rt": "dénitrification · cycle azote · Priming Effect", "bt": "gaz à effet de serre", "type": "concept"}, {"fr": "Nitrobacter", "en": "Nitrobacter", "doc_code": "S2", "strate": "S", "definition": "Bactérie nitrifiante oxidant le nitrite en nitrate (NO₂⁻→NO₃⁻), deuxième étape de la nitrification. Avec Nitrosomonas, forme le couple nitrificateur.", "statut": "◆", "rt": "nitrification · Nitrosomonas · N2O", "bt": "bactéries nitritoxydantes", "type": "concept"}, {"fr": "Nitrosomonas", "en": "Nitrosomonas", "doc_code": "S2", "strate": "S", "definition": "Bactérie nitrifiante oxidant l'ammonium en nitrite (NH₄⁺→NO₂⁻), première étape de la nitrification. Indicateur de minéralisation active de la MO.", "statut": "◆", "rt": "nitrification · Nitrobacter · cycle azote", "bt": "bactéries ammonio-oxydantes", "type": "concept"}, {"fr": "Oxydes Fe/Al", "en": "iron and aluminium oxides", "doc_code": "S1/S4", "strate": "S", "definition": "Formes minérales secondaires de fer (goethite, hématite, ferrihydrite) et d'aluminium (gibbsite, boehmite) issues de l'altération des silicates. Surface spécifique très élevée (100-600 m²/g), charges variables selon le pH. Adsorbent le phosphate de manière quasi irréversible en sols acides (pF < 5) — principale cause de blocage du P disponible. En conditions réductrices, leur dissolution libère P et Fe biodisponibles. Les CMA court-circuitent partiellement ce blocage via les phosphatases et les acides organiques racinaires.", "statut": "◆", "syn_fr": "sesquioxydes · oxyhydroxydes · ferrihydrite · goethite ; sesquioxydes ; oxydes de fer et d'aluminium", "syn_en": "Fe/Al oxides · sesquioxides ; Fe/Al oxides", "inrae": "10. CHIMIE › 10.02 SUBSTANCES ET PRODUITS CHIMIQUES", "rt": "phosphore · adsorption · potentiel redox · MAOM", "bt": "minéraux secondaires du sol", "type": "concept"}, {"fr": "PGPR", "en": "plant growth-promoting rhizobacteria", "doc_code": "S2", "strate": "S", "definition": "Plant Growth-Promoting Rhizobacteria — bactéries de la rhizosphère stimulant la croissance végétale par : (a) production de phytohormones (auxines, cytokinines, gibbérellines), (b) solubilisation de nutriments (P, Fe via sidérophores), (c) fixation d'azote, (d) biocontrôle des pathogènes (ISR, antibiose). Fondement des bio-inoculants modernes.", "statut": "✓", "syn_fr": "RFCP ; rhizobactéries promotrices de la croissance des plantes ; RPCP", "syn_en": "PGPR", "inrae": "micro-organisme › bactérie (par type) › rhizobactérie", "rt": "ISR · PSB · Azospirillum · rhizobactéries", "bt": "microbiote rhizosphérique", "type": "concept"}, {"fr": "POC", "en": "particulate organic carbon", "doc_code": "S4", "strate": "S", "definition": "Carbone organique particulaire (>50 µm), fraction labile de la MO du sol. Sensible aux pratiques culturales : indicateur précoce de changement. Temps de résidence : 10-100 ans. Distinct du MAOM (fraction stable). Un sol en amélioration montre d'abord une augmentation du POC avant celle du MAOM. Complémentaire : POC = réserve d'énergie pour le microbiome ; MAOM = stock de C stable.", "statut": "◆", "syn_fr": "carbone organique particulaire · MOP (matière organique particulaire) ; carbone organique particulaire ; COP", "syn_en": "POC · particulate organic matter (POM) ; POC", "inrae": "06. SCIENCES DE LA TERRE › 06.01 SCIENCES DU SOL (correction v2.2 — suppression alignement aliment)", "rt": "MAOM · MOS · nécromasse microbienne · turnover", "bt": "fraction de la matière organique", "type": "concept"}, {"fr": "PSB", "en": "phosphate solubilizing bacteria", "doc_code": "S2", "strate": "S", "definition": "Bactéries solubilisatrices de phosphate, groupe fonctionnel mobilisant le P inorganique fixé sur les oxydes Fe/Al et les carbonates via la sécrétion d'acides organiques (gluconique, citrique, oxalique) et de phosphatases extracellulaires. Genres principaux : Pseudomonas, Bacillus, Burkholderia, Arthrobacter. Actives dans la rhizosphère où les exsudats racinaires fournissent les substrats. Complémentaires aux CMA (voie mycorhizienne) pour l'alimentation phosphatée des plantes. Critères de sélection pour bio-inoculants : efficacité en conditions de pH et de teneur en P proches des conditions du sol cible.", "statut": "◆", "syn_fr": "bactéries solubilisatrices de phosphore ; bactéries solubilisatrices de phosphate ; BSP", "syn_en": "phosphate solubilizing bacteria · PSB ; PSB", "inrae": "05. SCIENCES BIOLOGIQUES › 05.07 MICROBIOLOGIE (correction v2.2 — suppression alignement INRAE erroné)", "rt": "PGPR · phosphore · CMA · rhizosphère", "bt": "PGPR", "type": "concept"}, {"fr": "Proteobacteria", "en": "Proteobacteria", "doc_code": "S2", "strate": "S", "definition": "Phylum bactérien le plus diversifié fonctionnellement, incluant les PGPR (Pseudomonas, Azospirillum), les rhizobia, les bactéries nitrifiantes. Majoritairement copiotrophe. Augmente rapidement après apports organiques frais ou travail du sol.", "statut": "◆", "syn_fr": "Protéobactéries ; Pseudomonadota (nomenclature récente)", "syn_en": "Pseudomonadota", "rt": "copiotrophes · PGPR · Rhizobium", "bt": "phyla bactériens", "type": "concept"}, {"fr": "Rhizobium", "en": "Rhizobium", "doc_code": "S2", "strate": "S", "definition": "Bactérie fixatrice d'azote en symbiose obligatoire avec les légumineuses (nodosités racinaires). Fixe 50-200 kg N/ha/an selon l'espèce et les conditions. Source la plus efficace d'azote biologique pour les cultures.", "statut": "✓", "syn_fr": "rhizobia", "inrae": "12.01 TAXONOMIE D'ORGANISMES VIVANTS › Bacteria › Rhizobiaceae", "rt": "fixation azote · légumineuses · Bradyrhizobium · LCO", "bt": "bactérie fixatrice d'azote symbiotique", "type": "concept"}, {"fr": "Rhizodéposition", "en": "Rhizodeposition", "doc_code": "S2", "strate": "S", "definition": "Processus par lequel les racines vivantes libèrent des composés organiques (exsudats, mucilages) dans la rhizosphère, représentant 10 à 40% du carbone fixé par la photosynthèse (Carof et al., 2018).\n\nEnjeu : C'est le \"salaire\" versé par la plante aux microbes en échange de nutriments et de protection. Les racines contribuent 5 fois plus au stockage du carbone que les pailles de surface (Rasse et al., 2005).\n\nLevier de décision : Maximiser la durée de présence de racines vivantes (doubles cultures, relais) pour maintenir le flux d'énergie vers le microbiome (Hinsinger et al., 2016).", "statut": "◆", "syn_fr": "sécrétion racinaire ; exsudation racinaire", "syn_en": "root exudation", "bt": "interaction plante-micro-organisme", "type": "concept"}, {"fr": "Rhizophagus", "en": "Rhizophagus irregularis", "doc_code": "S3", "strate": "S", "definition": "Genre CMA principal et espèce de référence Rhizophagus irregularis (ex-Glomus intraradices, renommé en 2012). Espèce CMA la plus étudiée, la plus utilisée en bio-inoculants, généraliste colonisant la majorité des plantes cultivées.", "statut": "✓", "inrae": "12.01 TAXONOMIE D'ORGANISMES VIVANTS › Fungi › Glomeromycota", "rt": "CMA · Glomus · Funneliformis", "bt": "Glomeromycota", "type": "concept"}, {"fr": "RothC", "en": "RothC model", "doc_code": "S4", "strate": "S", "definition": "Modèle mécaniste de dynamique du carbone organique du sol développé à Rothamsted Research (Coleman & Jenkinson, 1996). Divise la MO en 5 pools : DPM (décomposable), RPM (résistante), BIO (biomasse microbienne), HUM (humus), IOM (inerte). Les transferts entre pools suivent des cinétiques du premier ordre modulées par température, humidité et couverture. Outil de référence pour certifier les crédits carbone agricoles. Entrées nécessaires : COS initial, pluviométrie, ETP, type de sol, apports de MO. Disponible en open source.", "statut": "◆", "syn_fr": "modèle Rothamsted · modèle RothC-26.3 ; modèle de Rothamsted", "syn_en": "RothC · Rothamsted Carbon Model ; RothC", "inrae": "05. SCIENCES BIOLOGIQUES › 05.12 ÉCOLOGIE › modélisation", "rt": "k1 · séquestration carbone · COS · carbon farming", "bt": "modèle de dynamique du carbone", "type": "concept"}, {"fr": "Réseau Mycorhizien", "en": "Mycorrhizal Network (Common Mycorrhizal Network, CMN)", "doc_code": "S3", "strate": "S", "definition": "Réseau de filaments fongiques (hyphes) reliant les racines de différentes plantes, permettant l'échange d'eau, de nutriments et de signaux d'alerte (Simard, 2018).\n\nEnjeu : Véritable internet du sol, il mutualise les ressources à l'échelle de la parcelle.\n\nLevier de décision : Supprimer le labour, qui agit comme une section de câbles fibre optique, pour préserver l'intégrité de ce réseau de communication et de transport (Simard, 2018).", "statut": "◆", "syn_fr": "réseau de filaments", "bt": "structure biotique du sol", "type": "concept"}, {"fr": "Surface spécifique", "en": "specific surface area", "doc_code": "S1", "strate": "S", "definition": "Aire totale des surfaces colloïdales par unité de masse (m²/g). Détermine la capacité d'adsorption, la rétention d'eau et la création de microhabitats microbiens. Varie de 1-10 m²/g (sables) à 10-40 m²/g (kaolinite), 80-120 m²/g (illite) et 600-800 m²/g (smectites). La MO humifiée atteint 800-900 m²/g. La surface spécifique active — argiles + MO — est l'indicateur physico-chimique le plus direct de la fertilité potentielle d'un sol.", "statut": "◆", "syn_fr": "surface massique", "syn_en": "specific surface area · SSA ; SSA", "inrae": "06. SCIENCES DE LA TERRE › 06.01 SCIENCES DU SOL", "rt": "argiles · CEC · adsorption", "bt": "propriété physique du sol", "nt": "surface spécifique argiles · surface spécifique MO", "type": "concept"}, {"fr": "Thaumarchaeota", "en": "Thaumarchaeota", "doc_code": "S2", "strate": "S", "definition": "Phylum d'archées nitrifiantes dominant la nitrification en sols acides, surpassant Nitrosomonas dans les sols forestiers et les prairies permanentes. Bioindicateur de sols stables peu perturbés.", "statut": "◆", "syn_fr": "Thaumarchées ; Thaumarchaeota", "syn_en": "Thaumarchaea", "rt": "archées · nitrification · microsites", "bt": "archées nitrifiantes", "type": "concept"}, {"fr": "Trichoderma", "en": "Trichoderma", "doc_code": "S3", "strate": "S", "definition": "Genre fongique saprophyte et mycoparasite. Agent de biocontrôle majeur : compétition pour le substrat, production d'enzymes lytiques (chitinases, glucanases), induction de résistance systémique (ISR) chez la plante hôte.", "statut": "◆", "bt": "Ascomycota", "type": "concept"}, {"fr": "accepteurs d'électrons", "en": "electron acceptors", "doc_code": "S4", "strate": "S", "definition": "Composés chimiques réduits en absence d'O₂ selon une cascade de potentiels redox décroissants : O₂ → NO₃⁻ → Fe³⁺ → SO₄²⁻ → CO₂. Déterminent les voies métaboliques actives et la structure des communautés microbiennes dans les microsites anoxiques.", "statut": "◆", "syn_fr": "oxydants ; accepteurs terminaux d'électrons", "rt": "potentiel redox · microsites anoxiques · dénitrification", "bt": "réaction d'oxydoréduction", "type": "concept"}, {"fr": "agrégat", "en": "soil aggregate", "doc_code": "S1", "strate": "S", "definition": "Assemblage de particules minérales et organiques liées par des agents biologiques (hyphes, EPS, glomaline) et chimiques (oxydes Fe/Al, CAH). Unité structurale fondamentale du sol dont la stabilité conditionne la porosité, l'infiltration et la protection du carbone.", "statut": "◆", "syn_fr": "unité structurale ; motte", "syn_en": "ped", "bt": "structure du sol", "type": "concept"}, {"fr": "agrégation", "en": "aggregation", "doc_code": "S1", "strate": "S", "definition": "Processus de formation des agrégats du sol par cimentation de particules minérales et organiques via les hyphes fongiques, les EPS bactériens, la glomaline et les racines.", "statut": "~", "syn_fr": "structuration du sol ; formation d'agrégats", "syn_en": "soil aggregation", "bt": "processus physique du sol", "type": "glossaire"}, {"fr": "agrégats", "en": "aggregates", "doc_code": "S1", "strate": "S", "definition": "Assemblages de particules minérales et organiques liées par des agents biologiques (hyphes, glomaline, EPS, racines). Micro-agrégats (< 250 µm) et macro-agrégats (> 250 µm).", "statut": "~", "syn_fr": "unités structurales ; peds", "syn_en": "soil aggregates", "bt": "structure du sol", "type": "glossaire"}, {"fr": "anaérobiose", "en": "anaerobiosis", "doc_code": "S4/F1", "strate": "S", "definition": "Conditions sans O₂. Présentes dans les microsites anoxiques des agrégats, les sols engorgés, les biofilms. Activent les voies fermentaires ancestrales.", "statut": "~", "syn_fr": "anoxie ; hypoxie ; milieu réducteur", "syn_en": "anaerobic conditions", "bt": "métabolisme microbien", "type": "glossaire"}, {"fr": "archées", "en": "archaea", "doc_code": "S2", "strate": "S", "definition": "Troisième domaine du vivant, distincts des bactéries et des eucaryotes. Dans les sols, les archées jouent des rôles clés : Thaumarchaeota (nitrification en sols acides), Euryarchaeota (méthanogenèse en zones humides). Représentent 1-5% des procaryotes du sol mais parfois dominants dans les microsites anoxiques.", "statut": "✓", "syn_fr": "archéobactérie · archée ; Archaebacteria (obsolète)", "syn_en": "archaea · archaeon ; Archaea", "inrae": "12.01 TAXONOMIE D'ORGANISMES VIVANTS", "rt": "méthanogènes · Thaumarchaeota · microsites anoxiques", "bt": "procaryotes", "type": "concept"}, {"fr": "argiles", "en": "clays", "doc_code": "S1", "strate": "S", "definition": "Particules minérales < 2 µm (kaolinite, illite, smectite). Déterminent la CEC, la rétention d'eau et la formation du CAH. Surface spécifique de 10 à 800 m²/g.", "statut": "~", "syn_fr": "fraction argileuse ; phyllosilicates", "syn_en": "clay minerals", "bt": "fraction granulométrique", "type": "glossaire"}, {"fr": "bilan humique", "en": "humic balance", "doc_code": "S4", "strate": "S", "definition": "Trajectoire du stock de carbone organique du sol sur 15-20 ans en fonction des pratiques culturales. Calculé par le modèle AMG.", "statut": "◆", "type": "concept"}, {"fr": "biocontrôle", "en": "biocontrol", "doc_code": "S2/S3", "strate": "S", "definition": "Régulation biologique des pathogènes par compétition, antibiose, parasitisme ou induction de résistance (ISR). Alternatif aux fongicides.", "statut": "~", "syn_fr": "lutte biologique ; protection biologique des cultures", "syn_en": "biological control", "bt": "protection des plantes", "type": "glossaire"}, {"fr": "biofilm comme système hydraulique", "en": "biofilm as water management system", "doc_code": "S2", "strate": "S", "definition": "Le biofilm bactérien est la première technologie de rétention d'eau de l'histoire de la vie (4 Ga). Matrice d'EPS composée à 97% d'eau structurée, protégée de l'évaporation. Sur une surface minérale (argile, sable, roche), le biofilm CRÉE son propre environnement hydrique. C'est le fondement de la rétention d'eau dans les micropores et le premier maillon de la microagrégation (EPS + argile = premier micro-agrégat, bien avant les champignons).", "statut": "◆", "syn_fr": "régulation hydrique par le biofilm ; hydrogel microbien", "syn_en": "microbial hydrogel", "bt": "matrice EPS", "type": "concept"}, {"fr": "biopore (macropore biologique)", "en": "biopore", "doc_code": "S0/V1", "strate": "S", "definition": "Canal biologique de diamètre > 0,3 mm créé par les racines (pivot) ou les vers anéciques. Conductivité hydraulique ×100 à ×1000 vs matrice. Persistance 6–18 mois après décomposition racinaire. Principal vecteur de l'infiltration rapide et de la colonisation des horizons profonds par les micro-organismes.", "statut": "◆", "syn_fr": "macropore biologique ; pore tubulaire", "bt": "macroporosité", "type": "concept"}, {"fr": "biostimulants", "en": "biostimulants", "doc_code": "S2/P3", "strate": "S", "definition": "Substances ou micro-organismes qui stimulent la nutrition et la tolérance au stress des plantes. Bokashi, AMF, PGPR.", "statut": "~", "syn_fr": "substances biostimulantes ; biostimulants microbiens", "syn_en": "plant biostimulants", "bt": "intrant biologique", "type": "glossaire"}, {"fr": "capacité au champ", "en": "field capacity", "doc_code": "S0", "strate": "S", "definition": "Teneur en eau maximale retenue après ressuyage gravitaire (pF 2.5, -33 kPa). Limite supérieure de la réserve utile. Dépend de la texture, structure et MO du sol.", "statut": "◆", "syn_fr": "humidité à la capacité au champ ; capacité de rétention ; capacité de rétention spécifique", "syn_en": "FC ; field water capacity", "bt": "paramètre hydrodynamique", "type": "concept"}, {"fr": "capacité redox", "en": "redox poising capacity", "doc_code": "S4", "strate": "S", "definition": "Résistance du sol aux variations brusques de Eh. MO diversifiée = capacité redox élevée = rhizosphère stable.", "statut": "✓", "type": "concept"}, {"fr": "carbone actif", "en": "active carbon", "doc_code": "S4", "strate": "S", "definition": "Fraction labile (35%) du stock de carbone organique du sol, soumise à la minéralisation. Répond aux pratiques culturales.", "statut": "◆", "type": "concept"}, {"fr": "carbone stable", "en": "stable carbon", "doc_code": "S4", "strate": "S", "definition": "Fraction récalcitrante (65%) du stock de carbone organique, non minéralisée à l'échelle de la simulation AMG.", "statut": "◆", "type": "concept"}, {"fr": "carbone-énergie vs carbone-structure (gîte et couvert)", "en": "energy carbon vs structural carbon", "doc_code": "S4", "strate": "S", "definition": "Distinction fondamentale (Husson) entre deux usages du carbone dans le sol. Carbone-énergie (couvert) : molécules labiles (sucres, acides organiques) qui alimentent les micro-organismes. Carbone-structure (gîte) : molécules récalcitrantes et humus condensé qui donnent la capacité tampon et la stabilité physique. Un sol fonctionnel a besoin des deux — l'humification convertit le couvert en gîte.", "statut": "◆", "syn_fr": "carbone métabolique vs carbone structural", "bt": "métabolisme microbien", "type": "concept"}, {"fr": "cascade redox biologique", "en": "biological redox cascade", "doc_code": "S4", "strate": "S", "definition": "Sequence d accepteurs d electrons en conditions d anaerobiose partielle : O2 → NO3- → Mn4+ → Fe3+ → SO42- → CO2. Pilote les cycles N, P, Fe.", "statut": "◆", "syn_fr": "chaîne de transport d'électrons ; cascade d'oxydoréduction", "syn_en": "electron transport chain", "bt": "bioénergétique", "type": "concept"}, {"fr": "champignon entomopathogène", "en": "entomopathogenic fungi (EPF)", "doc_code": "S3", "strate": "S", "definition": "Champignon du sol à double identité : entomopathogène ET endophyte bénéfique. Transfert N insecte→plante via mycelium.", "statut": "✓", "type": "concept"}, {"fr": "chitine fongique", "en": "fungal chitin", "doc_code": "S3", "strate": "S", "definition": "Polymère de N-acétylglucosamine constituant les parois fongiques (30–60% de la masse sèche). Résistant à la dégradation, principal contributeur à la nécromasse fongique stabilisée en MAOM dans les micro-agrégats.", "statut": "◆", "bt": "polysaccharide de structure", "type": "concept"}, {"fr": "chélation", "en": "chelation", "doc_code": "S4", "strate": "S", "definition": "Liaison d'un ion métallique par un ligand organique (acides fulviques, sidérophores). Solubilise Fe, Zn, Cu bloqués sur les oxydes.", "statut": "~", "syn_fr": "complexation organique ; organo-complexation", "syn_en": "organo-metallic complexation", "bt": "réaction physico-chimique", "type": "glossaire"}, {"fr": "coefficient d'humification (k1)", "en": "humification coefficient k1", "doc_code": "S4", "strate": "S", "definition": "Fraction de la matière organique fraîche transformée en humus stable après 1 an, variant de 0,05 (sucres, protéines) à 0,50 (lignines) selon la nature des résidus et les conditions pédoclimatiques. Paramètre fondateur du modèle de bilan humique Hénin-Dupuis (1945). Calcul : Humification = k1 × apport annuel de MO fraîche. Pour maintenir ou augmenter le stock d'humus, les apports doivent compenser la minéralisation (constante k2 × stock). Un k1 élevé impose d'associer des résidus riches en lignine (paille, copeaux) aux apports azotés.", "statut": "◆", "syn_fr": "taux d'humification · k1 Hénin-Dupuis ; aucun (souvent confondu avec le rendement d'humification)", "syn_en": "k1 coefficient · humification rate ; k1", "inrae": "06. SCIENCES DE LA TERRE › 06.01 SCIENCES DU SOL", "rt": "RothC · humification · modèle Hénin-Dupuis · humus", "bt": "paramètre de cinétique du carbone", "type": "concept"}, {"fr": "coefficient de minéralisation", "en": "mineralization coefficient", "doc_code": "S4", "strate": "S", "definition": "Taux annuel K de minéralisation du carbone actif du sol. Dépend de la température, pH, argile, C:N, bilan hydrique.", "statut": "◆", "type": "concept"}, {"fr": "coefficient isohumique", "en": "isohumic coefficient", "doc_code": "S4", "strate": "S", "definition": "Fraction K1 de la matière organique fraîche qui s'intègre au pool de carbone actif du sol. Varie selon le type de résidu (0.15-0.40).", "statut": "◆", "type": "concept"}, {"fr": "compaction", "en": "soil compaction", "doc_code": "S1", "strate": "S", "definition": "Augmentation de la densité apparente et réduction de la porosité sous l'effet d'une contrainte mécanique (passages d'engins, piétinement). Réduit l'infiltration, l'enracinement et l'activité biologique.", "statut": "◆", "syn_fr": "tassement ; compactage ; dégradation de la structure", "syn_en": "soil packing", "bt": "dégradation physique du sol", "type": "concept"}, {"fr": "complexe organo-minéral", "en": "organo-mineral complex", "doc_code": "S1", "strate": "S", "definition": "Association entre matière organique et particules minérales (argile, limon) protégeant le carbone de la minéralisation.", "statut": "◆", "type": "concept"}, {"fr": "conductivité hydraulique", "en": "hydraulic conductivity", "doc_code": "S0", "strate": "S", "definition": "Capacité du sol à transmettre l'eau sous l'effet d'un gradient de potentiel (loi de Darcy). Dépend de la texture, de la structure et de la macroporosité biologique. Unité : mm/h ou cm/jour.", "statut": "◆", "syn_fr": "conductivité hydrique ; perméabilité hydraulique", "syn_en": "soil water conductivity", "bt": "propriété hydrodynamique du sol", "type": "concept"}, {"fr": "conductivité hydraulique saturée", "en": "saturated hydraulic conductivity", "doc_code": "S0/V1/P2", "strate": "S", "definition": "Vitesse maximale d'écoulement de l'eau dans un sol saturé (Ksat), exprimée en mm/h. Détermine la capacité d'infiltration et le risque de ruissellement. Varie de 0,01 mm/h (argile compacte) à >1 000 mm/h (sol biologique actif). Les macropores biologiques (galeries de vers anéciques, biopores racinaires) contribuent à 90% du flux malgré <5% du volume. L'activité biologique peut multiplier Ksat par 100 par rapport à un sol nu compacté.", "statut": "◆", "syn_fr": "Ksat · perméabilité saturée ; K_s ; conductivité du milieu à saturation", "syn_en": "Ksat ; sat-K ; K_s", "inrae": "06. SCIENCES DE LA TERRE › 06.03 HYDROLOGIE", "rt": "macroporosité · galeries biogènes · vers de terre anéciques", "bt": "conductivité hydraulique", "type": "concept"}, {"fr": "copiotrophes", "en": "copiotrophic microorganisms", "doc_code": "S2", "strate": "S", "definition": "Micro-organismes à croissance rapide en milieux riches en carbone labile, dominant rapidement les substrats labiles frais (exsudats racinaires, résidus jeunes, apports d'engrais). Stratèges r : métabolisme rapide mais peu efficient, forte consommation de C sans construction de MO stable. Incluent Proteobacteria, Firmicutes, Bacteroidetes. Un sol dominé par les copiotrophes après un apport de C labile (bokashi, compost frais) risque un Priming Effect si le rapport copiotrophes/oligotrophes reste déséquilibré. La succession écologique naturelle va des copiotrophes vers les oligotrophes.", "statut": "◆", "syn_fr": "stratèges r · micro-organismes copiotrophes", "syn_en": "copiotrophs · r-strategists", "inrae": "05. SCIENCES BIOLOGIQUES › 05.12 ÉCOLOGIE", "rt": "oligotrophes · succession écologique · Priming Effect · ratio F/B", "bt": "stratégies écologiques microbiennes", "type": "concept"}, {"fr": "courbe de rétention", "en": "water retention curve (soil water characteristic curve)", "doc_code": "S0", "strate": "S", "definition": "Relation entre teneur en eau volumique (θ) et potentiel matriciel (ψm). Permet de calculer la réserve utile, d interpréter les tests pF, et de modéliser les flux hydriques dans le profil.", "statut": "◆", "syn_fr": "courbe caractéristique d'humidité ; courbe de succion ; courbe pF-teneur en eau", "syn_en": "SWRC ; moisture characteristic curve", "bt": "relation hydrodynamique", "type": "concept"}, {"fr": "cycle azote", "en": "nitrogen cycle", "doc_code": "S4", "strate": "S", "definition": "Cycle biogéochimique : fixation N₂ → ammonification → nitrification → dénitrification → N₂O. Le sol vivant favorise le recyclage interne vs les pertes.", "statut": "~", "syn_fr": "cycle biogéochimique de l'azote", "syn_en": "N-cycle", "bt": "cycle biogéochimique", "type": "glossaire"}, {"fr": "cycle du soufre", "en": "sulfur cycle", "doc_code": "S4", "strate": "S", "definition": "Transformations biogéochimiques du soufre entre ses formes : SO₄²⁻ (sulfate oxydé, disponible) → SO₃²⁻ → H₂S (sulfure réduit, toxique à haute concentration) → S₀ (soufre élémentaire). Le soufre est le 4ème élément de la stœchiométrie de Kirkby (CNPS). Carencé dans les sols intensifs depuis la réduction des dépôts acides.", "statut": "◆", "syn_fr": "cycle biogéochimique du soufre", "syn_en": "S-cycle", "rt": "CNPS · potentiel redox · accepteurs d\\", "bt": "cycle biogéochimique", "type": "concept"}, {"fr": "densité apparente", "en": "bulk density", "doc_code": "S1", "strate": "S", "definition": "Masse de sol sec par unité de volume (g/cm³). Indicateur direct de la compaction. Sol sain : 0,9–1,3 g/cm³ ; sol compacté : >1,5 g/cm³ pour un limon.", "statut": "◆", "syn_fr": "masse volumique apparente ; DA", "syn_en": "BD ; soil bulk density", "bt": "propriété physique du sol", "type": "concept"}, {"fr": "design en keyline", "en": "keyline design", "doc_code": "S0", "strate": "S", "definition": "Technique de gestion hydraulique du paysage par courbes de niveau. Conception P.A. Yeomans (1954). Maximise l'infiltration et redistribue l'eau.", "statut": "◆", "type": "concept"}, {"fr": "dessiccation", "en": "desiccation", "doc_code": "S0", "strate": "S", "definition": "Perte d'eau du sol au-delà du point de flétrissement (pF > 4.2). Provoque la dormance microbienne, la sporulation des Firmicutes, la production d'EPS protecteurs et l'accumulation de solutés compatibles (tréhalose, proline).", "statut": "◆", "syn_fr": "désorption ; tarissement ; séchage du sol", "syn_en": "soil drying ; desorption", "bt": "transfert de masse", "type": "concept"}, {"fr": "diagramme Eh-pH", "en": "Eh-pH diagram (Pourbaix diagram)", "doc_code": "S4", "strate": "S", "definition": "Représentation graphique des domaines de stabilité des espèces chimiques en fonction du potentiel redox (Eh en mV) et du pH. Prédit la spéciation des éléments redox-sensibles (Fe, Mn, S, N, P) et donc leur biodisponibilité. Zone optimale pour la biologie du sol : Eh 200-400 mV, pH 6-7. En dessous de Eh 0 mV : conditions réductrices, dissolution des oxydes Fe/Al, mobilisation du P. Outil prédictif pour comprendre la disponibilité du phosphore dans les microsites anoxiques.", "statut": "◆", "syn_fr": "diagramme de Pourbaix · diagramme redox-pH ; diagramme de Pourbaix ; diagramme de stabilité", "syn_en": "Pourbaix diagram · Eh-pH diagram ; Pourbaix diagram", "inrae": "10. CHIMIE › 10.01 CHIMIE ANALYTIQUE", "rt": "potentiel redox · microsites anoxiques · oxydes Fe/Al · phosphore", "bt": "thermodynamique électrochimique", "type": "concept"}, {"fr": "diazotrophe", "en": "diazotroph", "doc_code": "S2", "strate": "S", "definition": "Organisme capable de fixer N₂ atmosphérique (N₂→NH₃) via la nitrogénase. Inclut les rhizobia (symbiotiques), Azotobacter (libres aérobies) et Clostridium (libres anaérobies). Service écosystémique majeur : chaque kg de N2 fixé économise l'équivalent de 3 kg d'urée.", "statut": "◆", "syn_fr": "fixateur d'azote", "syn_en": "nitrogen-fixer", "bt": "groupe fonctionnel microbien", "nt": "Rhizobium · Azotobacter · Azospirillum", "type": "concept"}, {"fr": "dissipation entropique", "en": "entropic dissipation", "doc_code": "S4", "strate": "S", "definition": "Cadre thermodynamique : interaction microbiome × humidité × température = système dissipatif efficace sous stress.", "statut": "✓", "type": "concept"}, {"fr": "diversité alpha", "en": "alpha diversity", "doc_code": "S2", "strate": "S", "definition": "Nombre d'espèces (richesse) dans un échantillon donné. Chao1 en est l'estimateur standard en métagénomique des sols.", "statut": "~", "syn_fr": "diversité locale ; richesse spécifique locale", "syn_en": "-diversity", "bt": "diversité microbienne", "type": "glossaire"}, {"fr": "diversité microbienne", "en": "microbial diversity", "doc_code": "S2", "strate": "S", "definition": "Richesse et régularité des communautés microbiennes du sol. Mesurée par Chao1 (richesse), Shannon (diversité), indices de β-diversité.", "statut": "~", "syn_fr": "biodiversité du sol ; diversité biotique", "syn_en": "soil microbial diversity", "bt": "microbiologie du sol", "type": "glossaire"}, {"fr": "dormance microbienne", "en": "microbial dormancy", "doc_code": "S2", "strate": "S", "definition": "État de vie ralentie adopté par les micro-organismes en réponse aux stress (sécheresse, faim, froid). Les bactéries sporulantes (Bacillus, Actinobacteria) résistent à pF > 5. La dormance préserve le potentiel biologique lors des perturbations et explique le Birch effect lors de la réhumectation.", "statut": "◆", "syn_fr": "état de vie ralentie ; anabiose", "syn_en": "microbial metabolic inactivity", "bt": "stratégie de survie microbienne", "type": "concept"}, {"fr": "dénitrification", "en": "denitrification", "doc_code": "S4", "strate": "S", "definition": "Réduction dissimilatrice de NO₃⁻ en N₂ via NO₂⁻ → NO → N₂O → N₂ par des bactéries anaérobies facultatives. Se produit dans les microsites anoxiques des agrégats. Source majeure de N₂O si incomplète.", "statut": "◆", "bt": "cycle de l'azote", "type": "concept"}, {"fr": "effet Birch", "en": "Birch effect", "doc_code": "S0", "strate": "S", "definition": "Pic brutal de minéralisation (C, N) survenant lors de la réhumectation d'un sol sec. Causé par la lyse des cellules microbiennes mortes pendant la sécheresse et la libération de MO protégée dans les agrégats éclatés. Peut représenter 5–15% de la minéralisation annuelle en une seule vague.", "statut": "◆", "syn_fr": "pic de minéralisation après réhumectation ; minéralisation induite par le séchage-mouillage", "syn_en": "Birch effect", "bt": "cycle biogéochimique du carbone", "type": "concept"}, {"fr": "effet d'amorçage", "en": "priming effect", "doc_code": "S2/S4", "strate": "S", "definition": "Stimulation de la décomposition de la matière organique stabilisée par l'apport de carbone frais (exsudats racinaires, résidus). Terme INRAE : effet d'amorçage.", "statut": "◆", "syn_fr": "amorçage du carbone ; priming effect", "syn_en": "priming effect ; PE", "rt": "copiotrophes · biostimulants · bokashi · CUE · Priming Effect avertissement→P3", "bt": "interaction carbone-azote", "type": "concept"}, {"fr": "effet de masse microbienne", "en": "microbial mass effect", "doc_code": "S2", "strate": "S", "definition": "Phénomène par lequel une forte biomasse microbienne indigene inhibe l etablissement d inoculants. Explique la variabilité des résultats des biostimulants selon le sol.", "statut": "◆", "syn_fr": "flux de biomasse microbienne ; effet de masse", "bt": "écologie des métacommunautés", "type": "concept"}, {"fr": "empreinte carbone des amendements", "en": "carbon footprint of amendments", "doc_code": "S4", "strate": "S", "definition": "Émissions GES par tonne de produit fini. Bokashi : 25 kg CO2-eq/t vs compost : 669 kg CO2-eq/t (×27).", "statut": "◆", "type": "concept"}, {"fr": "faux plat du rendement", "en": "yield plateau", "doc_code": "S4", "strate": "S", "definition": "Phase de la trajectoire de régénération (MO/Argile 17-24%) où le rendement stagne ou baisse alors que le carbone du sol augmente rapidement. Cause : les micro-organismes Y (forte CUE) captent N, P, S pour construire l'humus avant la plante. Le gain C est proportionnel à la baisse de rendement (Kirkby). Levier : fertilisation foliaire pour nourrir la plante sans alimenter la compétition microbienne.", "statut": "◆", "syn_fr": "plateau de rendement ; zone de stagnation du rendement", "syn_en": "yield stagnation zone", "bt": "loi des rendements décroissants", "type": "concept"}, {"fr": "fermentation", "en": "fermentation", "doc_code": "S4/V3", "strate": "S", "definition": "Voie métabolique anaérobie produisant de l'énergie sans O₂ comme accepteur terminal d'électrons. ΔG faible mais conservation maximale du C et N.", "statut": "~", "syn_fr": "catabolisme anaérobie", "bt": "respiration anaérobie", "type": "glossaire"}, {"fr": "fixation azote", "en": "nitrogen fixation", "doc_code": "S2", "strate": "S", "definition": "Conversion du N₂ atmosphérique en NH₄⁺ par la nitrogénase des diazotrophes (Rhizobium, Azotobacter, cyanobactéries). Fixe 100-300 kg N/ha/an en symbiose.", "statut": "~", "syn_fr": "fixation biologique de l'azote ; FBA", "syn_en": "biological nitrogen fixation", "bt": "cycle de l'azote", "type": "glossaire"}, {"fr": "flux préférentiel", "en": "preferential flow", "doc_code": "S0", "strate": "S", "definition": "Mouvement rapide de l eau dans les macropores (galeries de vers, fissures, canaux racinaires) court-circuitant la matrice du sol. Permet l infiltration même lors de pluies intenses. Dominant dans les sols vivants, quasi absent dans les sols compactés.", "statut": "◆", "syn_fr": "écoulement préférentiel ; transport par chemin préférentiel", "syn_en": "bypass flow ; macropore flow", "bt": "transfert hydrique", "type": "concept"}, {"fr": "galeries biogènes", "en": "biogenic galleries", "doc_code": "S0/V1", "strate": "S", "definition": "Canaux creusés par les vers de terre et les racines. Persistent après la mort de l'organisme. Contribuent à 90% du flux Ksat.", "statut": "~", "syn_fr": "biostructures ; traits pédologiques biologiques", "syn_en": "earthworm burrows", "bt": "bioturbation", "type": "glossaire"}, {"fr": "glomaline", "en": "glomalin-related soil protein (GRSP)", "doc_code": "S3", "strate": "S", "definition": "Glycoprotéine produite par les hyphes des CMA, principale colle biologique des macro-agrégats du sol. Représente 3-5% de la MO totale du sol. Temps de résidence : 7-42 ans. Sa concentration est l'un des indicateurs les plus sensibles à la détérioration du réseau mycorhizien par le labour. Contribution estimée : 60-70% de la stabilité des macro-agrégats.", "statut": "◆", "syn_fr": "glycoprotéine produite par les CMA", "syn_en": "glomalin-related soil protein ; GRSP", "rt": "CMA · agrégation · macro-agrégats · biofilms", "bt": "matière organique du sol", "type": "concept"}, {"fr": "gradient Eh (gradient redox)", "en": "redox gradient", "doc_code": "S4", "strate": "S", "definition": "Variation spatiale du potentiel redox (Eh) à l'échelle du microsite ou du profil de sol. Les gradients Eh pilotent la coexistence de voies aérobies et anaérobies à quelques micromètres de distance, constituant la base physique de la diversité métabolique microbienne.", "statut": "◆", "syn_fr": "gradient de potentiel d'oxydoréduction", "syn_en": "Eh gradient", "bt": "hétérogénéité physico-chimique", "type": "concept"}, {"fr": "gradient redox du sol", "en": "soil redox gradient", "doc_code": "S4", "strate": "S", "definition": "Variation du potentiel d'oxydo-réduction (Eh) avec la profondeur dans un sol vivant. Surface : 500-520 mV (oxydé). Sous broyat : -40 mV. À 20 cm dans sol poreux vivant : atmosphère proche de l'atmosphère primitive (pauvre en O₂, riche en COV, CO₂, NH₃). Plus on descend, plus on retrouve les conditions anaérobies originelles et les métabolismes associés.", "statut": "◆", "syn_fr": "variabilité spatio-temporelle du potentiel redox", "bt": "santé des sols", "type": "concept"}, {"fr": "guildes fonctionnelles", "en": "functional guilds", "doc_code": "S2", "strate": "S", "definition": "Groupes de micro-organismes partageant une même fonction écologique : décomposeurs, nitrificateurs, fixateurs N₂, PSB, mycorhiziens, suppresseurs.", "statut": "~", "syn_fr": "groupes fonctionnels", "syn_en": "functional groups", "bt": "structure des communautés", "type": "glossaire"}, {"fr": "guildes fongiques", "en": "fungal guilds", "doc_code": "S2/S3", "strate": "S", "definition": "Groupes fonctionnels de champignons partageant des stratégies écologiques similaires, indépendamment de leur phylogénie (outil FUNGuild, Nguyen et al., 2015). Trois guildes principales : symbiotiques (CMA, ECM, endophytes) — échangent C contre nutriments ; saprotrophes (décomposeurs de litière, de bois, de MO récalcitrante) — minéralisent la MO ; pathogènes (biotropes, nécrotropes) — exploitent les plantes affaiblies. Le ratio guildes symbiotiques/pathogènes est un indicateur de santé du sol. L'absence de labour et la diversité végétale favorisent les guildes symbiotiques.", "statut": "◆", "syn_fr": "groupes fonctionnels fongiques", "syn_en": "fungal guilds · FUNGuild", "inrae": "05. SCIENCES BIOLOGIQUES › 05.12 ÉCOLOGIE", "rt": "CMA · ECM · saprotrophes · ratio F/B · suppressivité", "bt": "guildes fonctionnelles", "nt": "saprotrophes · mycorhiziens · pathogènes fongiques · endophytes fongiques", "type": "concept"}, {"fr": "homéostasie microbienne", "en": "microbial homeostasis", "doc_code": "S2", "strate": "S", "definition": "Maintien d'une composition chimique stœchiométrique constante par les micro-organismes malgré les variations du substrat. Mécanisme par lequel le microbiome régule les cycles C, N, P en immobilisant ou en minéralisant selon ses besoins. Distinct de l'homéostasie du sol (condition physico-chimique globale).", "statut": "◆", "syn_fr": "régulation homéostatique microbienne", "rt": "stœchiométrie de Kirkby · CNPS · CUE", "bt": "homéostasie", "type": "concept"}, {"fr": "horizon pédologique", "en": "soil horizon", "doc_code": "S1", "strate": "S", "definition": "Couche de sol relativement homogène, parallèle à la surface, différenciée par sa couleur, texture, structure et composition. Horizons principaux : O (litière), A (organo-minéral), B (accumulation), C (altération roche-mère).", "statut": "◆", "syn_fr": "horizon du sol ; couche pédologique", "syn_en": "soil layer", "bt": "profil de sol", "type": "concept"}, {"fr": "humification", "en": "humification", "doc_code": "S4", "strate": "S", "definition": "Processus biologique de transformation des résidus organiques frais en humus stable via des voies microbiennes complexes : polymérisation, condensation avec les fractions minérales, formation de liaisons hydrophobes. Contrôlé par le k1 (coefficient d'humification) et les conditions redox.", "statut": "◆", "syn_fr": "néosynthèse d'humus ; stabilisation carbonée", "syn_en": "humus formation", "rt": "k1 · humus · nécromasse microbienne · k2", "bt": "pédogenèse", "type": "concept"}, {"fr": "humus", "en": "humus", "doc_code": "S4", "strate": "S", "definition": "Fraction stable de la MO du sol, résultat de l'humification (transformation biologique des résidus organiques). Comprend le MAOM (carbone minéralisé-associé aux minéraux) et le POC stable. Temps de résidence > 1 000 ans pour la fraction la plus stable. Siège de la CEC, de la rétention d'eau et de l'activité biologique.", "statut": "✓", "syn_fr": "matière humifiée ; complexe humique", "syn_en": "humic substances", "inrae": "06. SCIENCES DE LA TERRE › 06.01 SCIENCES DU SOL", "rt": "MAOM · k1 · CAH · nécromasse microbienne", "bt": "matière organique du sol", "type": "concept"}, {"fr": "hydraulic lift", "en": "hydraulic lift", "doc_code": "S0/P4", "strate": "S", "definition": "Remontée passive d'eau des horizons profonds vers la surface via les racines et les hyphes mycorhiziens pendant la nuit. Bénéficie aux plantes voisines via le CMN.", "statut": "~", "syn_fr": "ascenseur hydraulique ; redistribution nocturne de l'eau", "syn_en": "hydraulic redistribution", "bt": "transfert racinaire", "type": "glossaire"}, {"fr": "hydrophobie du sol", "en": "soil water repellency", "doc_code": "S0", "strate": "S", "definition": "Hydrophobie temporaire du sol après sécheresse, causée par les exsudats hydrophobes des hyphes fongiques et la glomaline. Protège les agrégats lors des pluies violentes en ralentissant la pénétration de l eau. Disparaît après réhumectation complète.", "statut": "◆", "syn_fr": "répulsion à l'eau ; mouillabilité réduite ; water repellency", "syn_en": "SWR ; hydrophobicity", "bt": "état de surface du sol", "type": "concept"}, {"fr": "hystérésis hydrique", "en": "hydraulic hysteresis", "doc_code": "S0/S1", "strate": "S", "definition": "Phénomène par lequel la relation teneur en eau/potentiel hydrique diffère selon que le sol est en humectation ou en dessication. Un sol retient plus d'eau lors de son drainage qu'il n'en absorbe lors de sa réhumectation, à potentiel égal. Amplifié par la matière organique et les réseaux fongiques qui modifient la géométrie et la mouillabilité des pores. Important pour optimiser l'irrigation et anticiper les disponibilités en eau.", "statut": "◆", "syn_fr": "hysteresis de drainage ; effet de bouteille d'encre ; différence sorption-désorption", "syn_en": "soil water hysteresis", "inrae": "06. SCIENCES DE LA TERRE › 06.03 HYDROLOGIE", "rt": "macroporosité · conductivité hydraulique saturée", "bt": "hystérésis", "type": "concept"}, {"fr": "indice de diversité de Shannon", "en": "Shannon diversity index (H)", "doc_code": "S2", "strate": "S", "definition": "H = -Σ(pi × ln(pi)) mesurant la diversité microbienne du sol. Sol sain : H > 4.5. Sol dégradé : H < 3.5. Corrélé à la suppressivité et à la résilience face aux perturbations.", "statut": "◆", "syn_fr": "indice de Shannon-Wiener ; H'", "syn_en": "Shannon-Wiener index", "bt": "indice de diversité", "type": "concept"}, {"fr": "infiltration", "en": "water infiltration", "doc_code": "S0", "strate": "S", "definition": "Pénétration de l'eau dans le sol par la surface. Dépend de la porosité de surface, de la stabilité structurale et de la couverture du sol. Premier facteur limitant en agriculture pluviale.", "statut": "◆", "syn_fr": "infiltration d'eau", "syn_en": "soil infiltration", "bt": "composante du bilan hydrique", "type": "concept"}, {"fr": "interception végétale", "en": "canopy interception", "doc_code": "S0", "strate": "S", "definition": "Fraction des précipitations retenue par le couvert végétal avant d'atteindre le sol. Réduit l'énergie cinétique des gouttes.", "statut": "◆", "type": "concept"}, {"fr": "k1 (constante de décomposition rapide)", "en": "k1 decomposition rate constant", "doc_code": "S4", "strate": "S", "definition": "Constante de vitesse de décomposition de la matière organique labile (pool DPM dans RothC). Ne pas confondre avec le coefficient d'humification k1 (fraction humifiée). k1 décomposition : vitesse ; k1 humification : rendement.", "statut": "◆", "syn_fr": "coefficient de décomposition de la matière organique fraîche", "syn_en": "fast decomposition rate constant", "bt": "cinétique de minéralisation", "type": "concept"}, {"fr": "k2 (constante de minéralisation lente)", "en": "k2 slow decomposition rate constant", "doc_code": "S4", "strate": "S", "definition": "Vitesse de décomposition de la matière organique stable (MAOM, humus) par les oligotrophes. Typiquement 0,001–0,01 an⁻¹. Très sensible aux perturbations mécaniques (labour) et au priming effect. Liée au pool MAOM dans le modèle RothC.", "statut": "◆", "syn_fr": "coefficient de minéralisation de l'humus ; taux de minéralisation secondaire", "syn_en": "slow mineralization rate constant", "bt": "dynamique du carbone du sol", "type": "concept"}, {"fr": "labour", "en": "tillage (ploughing)", "doc_code": "S1", "strate": "S", "definition": "Retournement mécanique du sol (charrue) sur 20–30 cm. Détruit les macro-agrégats, coupe les réseaux mycorhiziens, expose le carbone protégé à l'oxydation et élimine la macroporosité biologique.", "statut": "◆", "syn_fr": "travail du sol avec retournement ; retournement de la prairie", "syn_en": "ploughing ; plowing", "bt": "pratique culturale", "type": "concept"}, {"fr": "lignine", "en": "lignin", "doc_code": "S3", "strate": "S", "definition": "Polymère phénolique complexe des parois végétales, dégradé principalement par les champignons saprotrophes (white-rot fungi). Source de MAOM stable.", "statut": "~", "bt": "composé carboné végétal", "type": "glossaire"}, {"fr": "macro-agrégat", "en": "macroaggregate", "doc_code": "S1", "strate": "S", "definition": "Agrégat de taille >250 µm, stabilisé principalement par les hyphes fongiques, les racines fines et les EPS bactériens. Contient des micro-agrégats emboîtés. Premier compartiment affecté par le labour.", "statut": "◆", "syn_fr": "agrégat macroscopique", "bt": "agrégat", "type": "concept"}, {"fr": "macro-agrégats", "en": "macroaggregates", "doc_code": "S1", "strate": "S", "definition": "Agrégats > 250 µm stabilisés par les hyphes fongiques et les racines. Protègent le POC et créent la macroporosité. Sensibles au labour.", "statut": "~", "bt": "agrégats", "type": "glossaire"}, {"fr": "macroporosité", "en": "macroporosity", "doc_code": "S0/S1", "strate": "S", "definition": "Pores > 50 µm créés par l'activité biologique (vers, racines) et la fissuration. Permettent le drainage gravitaire, l'aération et l'infiltration rapide.", "statut": "~", "syn_fr": "porosité structurale ; porosité tubulaire", "bt": "porométrie du sol", "type": "glossaire"}, {"fr": "matière organique", "en": "organic matter", "doc_code": "S4", "strate": "S", "definition": "Ensemble des composés carbonés d'origine biologique dans le sol. Synonyme de MO. Stock mesuré en % (MO = COS × 1,724).", "statut": "~", "syn_fr": "MO ; fractions organiques ; constituants organiques", "syn_en": "OM", "bt": "constituant du sol", "type": "glossaire"}, {"fr": "matrice EPS (substances polymériques extracellulaires)", "en": "extracellular polymeric substances (EPS) matrix", "doc_code": "S0", "strate": "S", "definition": "Gel de polysaccharides, protéines et ADN sécrété par les micro-organismes. Forme les biofilms, stabilise les micro-agrégats, retient l'eau (jusqu'à 10× leur masse) et protège les cellules contre la dessiccation.", "statut": "◆", "syn_fr": "exopolysaccharides ; matrice extracellulaire", "syn_en": "EPS matrix", "bt": "matrice de biofilm", "type": "concept"}, {"fr": "micro-agrégat", "en": "micro-aggregate", "doc_code": "S1/S2", "strate": "S", "definition": "Unité fonctionnelle du sol de 20–250 µm, stabilisée par la nécromasse microbienne, les EPS et les argiles. Protège le carbone organique de la décomposition (MAOM). Sa formation dépend de la diversité microbienne et de la présence de calcium.", "statut": "◆", "syn_fr": "agrégat élémentaire", "bt": "agrégat", "type": "concept"}, {"fr": "micro-agrégat anaérobie", "en": "anaerobic micro-aggregate", "doc_code": "S1", "strate": "S", "definition": "Hypothèse forte : les micro-agrégats du sol (20-250 µm) maintiennent un cœur anaérobie où persistent les métabolismes bactériens primitifs. Sans O₂ à l'intérieur, les bactéries anaérobies y conservent des conditions redox très basses. La stabilité du micro-agrégat dépend du maintien de ces conditions réduites — le labour ou la dessication détruit cette niche en l'oxydant.", "statut": "◆", "syn_fr": "microsite réducteur ; micro-agrégat hydromorphe", "bt": "micro-agrégat", "type": "concept"}, {"fr": "micro-agrégats", "en": "microaggregates", "doc_code": "S1", "strate": "S", "definition": "Agrégats < 250 µm stabilisés par les EPS bactériens et les oxydes. Protègent le MAOM. Résistants au labour. Unité fonctionnelle de la séquestration carbone.", "statut": "~", "syn_fr": "agrégats microscopiques", "bt": "agrégats", "type": "glossaire"}, {"fr": "microsites anoxiques", "en": "anaerobic microsites", "doc_code": "S4", "strate": "S", "definition": "Zones localement sans oxygène à l'intérieur des agrégats du sol, où la consommation d'O₂ microbienne dépasse la diffusion atmosphérique. Permettent la coexistence de la nitrification (surface aérobie) et de la dénitrification (intérieur anaérobie) dans le même sol. Siège des voies fermentaires conservées depuis l'Archéen. Le labour détruit ces agrégats et homogénéise les conditions en éliminant les microsites anoxiques.", "statut": "◆", "syn_fr": "microsites anaérobies ; zones de réduction ; îlots d'anoxie", "syn_en": "anoxic microsites ; reduced microsites", "rt": "potentiel redox · diagramme Eh-pH · fermentation · agrégation · Archéen", "bt": "microsites", "type": "concept"}, {"fr": "modèle AMG", "en": "AMG model", "doc_code": "S4", "strate": "S", "definition": "Modèle Andriulo-Mary-Guérif v2 de dynamique du carbone organique du sol. Bi-compartimental (actif 35% / stable 65%). Calibré sur 60 sites français.", "statut": "◆", "type": "concept"}, {"fr": "montmorillonite (smectite)", "en": "montmorillonite (smectite)", "doc_code": "S1", "strate": "S", "definition": "Argile 2:1 gonflante à très forte CEC (80–120 cmol+/kg) et surface spécifique (600–800 m²/g). Responsable du retrait-gonflement des sols. Capacité de fixation des cations et de l'eau interfoliaire.", "statut": "◆", "syn_fr": "smectite ; argile gonflante", "syn_en": "smectite", "bt": "minéral argileux 2:1", "type": "concept"}, {"fr": "mycobiome", "en": "mycobiome", "doc_code": "S3", "strate": "S", "definition": "Ensemble des champignons et de leurs fonctions dans un écosystème sol. Représente 20-70% de la biomasse microbienne totale selon l'état du sol. Caractérisé par métabarcoding ITS et PLFA (marqueurs fongiques). Un ratio F/B élevé indique un sol mature à cycles lents et stables.", "statut": "≈", "syn_fr": "communauté fongique · population fongique ; microbiome fongique ; fonge", "inrae": "05. SCIENCES BIOLOGIQUES › 05.12 ÉCOLOGIE", "rt": "ratio F/B · guildes fongiques · nécromasse fongique", "bt": "communauté microbienne du sol", "type": "concept"}, {"fr": "mycoparasite", "en": "mycoparasite", "doc_code": "S3", "strate": "S", "definition": "Champignon parasitant d'autres champignons pathogènes. Trichoderma, Coniothyrium, Clonostachys sont les plus utilisés en biocontrôle. Mécanismes : antagonisme direct (enroulement d'hyphes, enzymes lytiques), compétition pour les nutriments, induction d'ISR.", "statut": "✓", "syn_fr": "hyperparasite", "inrae": "04. SANTÉ HUMAINE, ANIMALE ET VÉGÉTALE › 04.02 CAUSES ET VECTEURS DE MALADIE › parasitisme", "rt": "biocontrôle · suppressivité · Trichoderma", "bt": "interaction biotique", "type": "concept"}, {"fr": "métabarcoding", "en": "metabarcoding", "doc_code": "S2", "strate": "S", "definition": "Séquençage massif de marqueurs taxonomiques (16S ARNr pour les bactéries, ITS pour les champignons) permettant d'inventorier simultanément des milliers d'espèces microbiennes à partir d'un échantillon de sol. Outil central de la caractérisation du microbiome. Fournit richesse taxonomique (Chao1), diversité fonctionnelle et structure des guildes.", "statut": "≈", "syn_fr": "barcoding moléculaire · DNA barcoding", "syn_en": "metabarcoding · amplicon sequencing ; DNA metabarcoding", "inrae": "05. SCIENCES BIOLOGIQUES › 05.08 GÉNÉTIQUE", "rt": "métagénomique · Chao1 · PLFA", "bt": "analyse moléculaire haut débit", "type": "concept"}, {"fr": "métagénomique", "en": "metagenomics", "doc_code": "S2", "strate": "S", "definition": "Séquençage de l'ADN total d'un environnement sans culture préalable, permettant d'accéder au potentiel fonctionnel du microbiome (gènes présents, voies métaboliques) en complément du métabarcoding taxonomique. Standard analytique pour les études de recherche sur le microbiome du sol.", "statut": "✓", "syn_fr": "génomique environnementale", "inrae": "11. APPROCHE SCIENTIFIQUE › 11.01 MÉTHODES", "rt": "métabarcoding · PLFA · microbiome", "bt": "biologie moléculaire environnementale", "type": "concept"}, {"fr": "méthanogènes", "en": "methanogens", "doc_code": "S4", "strate": "S", "definition": "Archées productrices de méthane (CH₄) en conditions strictement anoxiques (Eh < -200 mV), voie métabolique terminale de la dégradation anaérobie de la MO. Domaine Archaea, groupes Euryarchaeota. Actives dans les microsites anoxiques profonds, les zones humides et les digesteurs anaérobies. Indicateurs de conditions réductrices extrêmes. Le méthane est un GES 28× plus puissant que le CO₂.", "statut": "~", "syn_fr": "archées méthanogènes ; microorganismes méthanogènes", "syn_en": "methanogens · methanogenic archaea", "inrae": "12. ORGANISMES VIVANTS › 12.01 TAXONOMIE D'ORGANISMES VIVANTS › Archaea (correction v2.2)", "rt": "archées · microsites anoxiques · potentiel redox · fermentation", "bt": "Archaea", "type": "concept"}, {"fr": "nifH", "en": "nifH", "doc_code": "S2", "strate": "S", "definition": "Gène marqueur universel de la fixation biologique d'azote, codant la sous-unité dinitrogenase réductase de la nitrogénase. Utilisé en métabarcoding pour inventorier les diazotrophes du sol.", "statut": "◆", "syn_fr": "gène nifH ; gène de la nitrogénase", "rt": "nitrogénase · diazotrophe · métabarcoding", "bt": "biomarqueur fonctionnel", "type": "concept"}, {"fr": "nitrification", "en": "nitrification", "doc_code": "S4", "strate": "S", "definition": "Oxydation biologique séquentielle de NH₄⁺ en NO₂⁻ (Nitrosomonas, AOA) puis NO₃⁻ (Nitrobacter). Processus aérobie obligatoire, sensible au pH et à la température. Source de N₂O par nitrification incomplète.", "statut": "◆", "syn_fr": "oxydation de l'ammoniaque ; production de nitrates", "bt": "cycle de l'azote", "type": "concept"}, {"fr": "nitrogénase", "en": "nitrogenase", "doc_code": "S2", "strate": "S", "definition": "Complexe enzymatique Fe-Mo catalysant N₂→NH₃. Inhibé de manière irréversible par l'O₂ — exige des conditions microaérobies ou anaérobies (microsites anoxiques des légumineuses, hétérocystes des cyanobactéries).", "statut": "✓", "syn_fr": "EC 1.18.6.1", "inrae": "composé biochimique › enzyme › oxydoréductase", "rt": "fixation azote · diazotrophe · microsites anoxiques", "bt": "complexe enzymatique d'oxydoréduction", "type": "concept"}, {"fr": "nécromasse fongique", "en": "fungal necromass", "doc_code": "S3", "strate": "S", "definition": "Résidus de parois fongiques (chitine, mélanine, glucanes) stabilisés dans le sol après la mort des champignons. Composante majeure de la nécromasse microbienne totale. La mélanine des parois fongiques est l'un des polymères organiques les plus résistants de la biosphère (temps de résidence > 1 000 ans). Contribue significativement au pool MAOM.", "statut": "◆", "syn_fr": "nécromasse fongique ; résidus mycéliens ; biomasse fongique morte", "syn_en": "mycelial residues", "rt": "chitine · mélanine · MAOM · nécromasse microbienne", "bt": "nécromasse microbienne", "type": "concept"}, {"fr": "nécromasse microbienne", "en": "microbial necromass", "doc_code": "S2", "strate": "S", "definition": "Résidus cellulaires des micro-organismes morts, principale source de carbone stable du sol. Jusqu'à 80% du carbone organique stable du sol provient de la nécromasse et non directement des résidus végétaux (Khangura et al., 2023 ; Zhu et al., 2020). Mieux protégée physiquement dans les agrégats que le C végétal. Alimentée par un turnover microbien actif : une CUE élevée et un microbiome diversifié maximisent la production de nécromasse. Source principale du MAOM. Chiffre clé : 1 t de biomasse microbienne produira ~0,5 t de nécromasse stable.", "statut": "◆", "syn_fr": "biomasse microbienne morte ; résidus microbiens", "syn_en": "microbial residues · microbial carbon ; microbial cadavers", "rt": "CUE · MAOM · pompe microbienne · turnover", "bt": "matière organique du sol", "nt": "nécromasse fongique", "type": "concept"}, {"fr": "oligotrophes", "en": "oligotrophic microorganisms", "doc_code": "S2", "strate": "S", "definition": "Micro-organismes adaptés aux environnements pauvres en nutriments (< mg/L de C organique dissous), capables de croître à des concentrations de substrats très faibles. Stratèges K : métabolisme lent et efficient, systèmes enzymatiques haute affinité. Incluent Acidobacteria, Actinobacteria, certains champignons. Dans les sols, dominants dans les horizons appauvris et les phases tardives de décomposition de la MO récalcitrante. Un sol riche en oligotrophes indique des cycles nutritifs serrés et une faible perte de C. Les engrais azotés solubles les éliminent au profit des copiotrophes.", "statut": "◆", "syn_fr": "stratèges K · micro-organismes oligotrophes", "syn_en": "oligotrophs · K-strategists", "inrae": "05. SCIENCES BIOLOGIQUES › 05.12 ÉCOLOGIE", "rt": "copiotrophes · ratio F/B · guildes fonctionnelles · Acidobacteria", "bt": "stratégies écologiques microbiennes", "type": "concept"}, {"fr": "pF (log du potentiel matriciel)", "en": "pF (log of matric potential)", "doc_code": "S0", "strate": "S", "definition": "Échelle logarithmique du potentiel matriciel du sol (pF = log₁₀ de la succion en cm d'eau). pF 0 = saturation, pF 2.5 = capacité au champ (–33 kPa), pF 4.2 = point de flétrissement (–1500 kPa). Unité standard des courbes de rétention.", "statut": "◆", "syn_fr": "log de la succion ; potentiel capillaire", "syn_en": "soil moisture tension", "bt": "potentiel matriciel", "type": "concept"}, {"fr": "paillage", "en": "mulch", "doc_code": "S0", "strate": "S", "definition": "Couverture organique du sol (paille, BRF, résidus de culture). Réduit l évaporation de 30-60%, tamponne la température du sol de 3-5°C en été, protège la surface contre la battance et nourrit la faune décomposeur. Pilier de la gestion hydrique biologique.", "statut": "◆", "syn_fr": "mulch · paillis ; mulch", "syn_en": "mulching", "bt": "technique de couverture du sol", "type": "concept"}, {"fr": "phoD", "en": "phoD", "doc_code": "S2", "strate": "S", "definition": "Gène marqueur de la solubilisation du phosphore organique, codant une phosphodiestérase alcaline. Permet d'évaluer le potentiel de mobilisation du P organique par le microbiome.", "statut": "◆", "syn_fr": "gène phoD ; gène de la phosphatase alcaline", "rt": "PSB · phosphore · métabarcoding", "bt": "gène fonctionnel du cycle du phosphore", "type": "concept"}, {"fr": "phosphore", "en": "phosphorus", "doc_code": "S4", "strate": "S", "definition": "Élément limitant majeur. Bloqué par les oxydes Fe/Al en sol acide, par le Ca en sol calcaire. Solubilisé par les PSB et les CMA.", "statut": "~", "syn_en": "P", "bt": "macroélément", "type": "glossaire"}, {"fr": "phosphore organique", "en": "organic phosphorus", "doc_code": "S4", "strate": "S", "definition": "Fraction du phosphore total liée à la matière organique (30-80% du P total en sols non fertilisés). Minéralisé par les phosphatases microbiennes (phoD). Flux dominant en sols biologiquement actifs.", "statut": "◆", "syn_fr": "P organique ; phosphore lié à la MO", "syn_en": "Po", "bt": "phosphore du sol", "type": "concept"}, {"fr": "plasmides", "en": "plasmids", "doc_code": "S2", "strate": "S", "definition": "Petits fragments d'ADN circulaires extra-chromosomiques présents chez les bactéries. Portent des gènes de résistance aux antibiotiques, de production d'enzymes de dégradation, et de métabolites. Transférables horizontalement entre espèces bactériennes sans restriction taxonomique. Outil génétique clé de l'adaptabilité du monde bactérien — la plante reprogramme les plasmides de ses endophytes via le cycle rhizophagique.", "statut": "◆", "bt": "élément génétique mobile", "type": "concept"}, {"fr": "point de flétrissement permanent", "en": "permanent wilting point", "doc_code": "S0", "strate": "S", "definition": "Teneur en eau à pF 4.2 (-1.5 MPa) en dessous de laquelle les plantes ne peuvent plus extraire l eau. Limite inférieure de la réserve utile. Dépend principalement de la texture argileuse.", "statut": "◆", "syn_fr": "PFP ; humidité au flétrissement", "syn_en": "PWP ; wilting point", "bt": "limite de disponibilité en eau", "type": "concept"}, {"fr": "pompe microbienne à carbone", "en": "microbial carbon pump", "doc_code": "S4", "strate": "S", "definition": "Mécanisme par lequel les micro-organismes transforment le carbone organique labile (exsudats, résidus) en nécromasse stabilisée (MAOM). Le CUE microbien et le turnover déterminent l'efficacité de la pompe. Concept central de la séquestration biologique du carbone.", "statut": "◆", "syn_fr": "MCP ; mécanisme de stabilisation microbienne", "syn_en": "MCP", "bt": "mécanisme de séquestration du carbone", "type": "concept"}, {"fr": "pont mycorhizien", "en": "mycorrhizal bridge", "doc_code": "S3/P4", "strate": "S", "definition": "Connexion fonctionnelle entre deux plantes via un reseau de champignons mycorhiziens partage. Transfert de C, N, P et signaux de defense.", "statut": "◆", "syn_en": "physical linkage", "bt": "interaction plante-micro-organisme", "type": "concept"}, {"fr": "porosité", "en": "soil porosity", "doc_code": "S1", "strate": "S", "definition": "Fraction volumique du sol occupée par l'air et l'eau. Macroporosité (>50 µm) = drainage et aération ; mésoporosité (50–0,2 µm) = réserve utile ; microporosité (<0,2 µm) = eau liée.", "statut": "◆", "syn_fr": "espace poral ; volume des vides", "syn_en": "pore space", "bt": "architecture du sol", "type": "concept"}, {"fr": "potentiel hydrique", "en": "water potential", "doc_code": "S0", "strate": "S", "definition": "Énergie potentielle de l eau dans le sol par unité de volume (MPa ou pF). Composantes : matriciel (ψm), osmotique (ψo), gravitaire (ψg). Détermine la disponibilité de l eau pour les plantes et microbes.", "statut": "◆", "syn_fr": "charge hydraulique ; succion ; tension de l'eau", "syn_en": "total water potential", "bt": "thermodynamique du sol", "type": "concept"}, {"fr": "potentiel redox", "en": "redox potential", "doc_code": "S4", "strate": "S", "definition": "Mesure du pouvoir oxydant ou réducteur du sol (Eh en mV). Détermine les voies métaboliques actives : aérobie (Eh > 300 mV), anaérobie (Eh < 0 mV).", "statut": "~", "syn_fr": "potentiel d'oxydoréduction ; Eh ; tension électrique du sol", "syn_en": "Eh", "bt": "thermodynamique du sol", "type": "glossaire"}, {"fr": "quotient métabolique (qCO₂)", "en": "metabolic quotient (qCO₂)", "doc_code": "S2", "strate": "S", "definition": "Rapport respiration/biomasse microbienne (mgCO₂-C/mgBiomasse-C/h). qCO₂ élevé = stress microbien ou sol dégradé (énergie dépensée en survie, pas en croissance). Indicateur de maturité écologique.", "statut": "◆", "syn_fr": "respiration spécifique ; quotient respiratoire microbien", "syn_en": "qCO₂ ; specific respiration rate", "bt": "indicateur d'activité microbienne", "type": "concept"}, {"fr": "ratio C/N optimal", "en": "optimal C/N ratio", "doc_code": "S4", "strate": "S", "definition": "Ratio carbone/azote idéal pour l'activité biologique du sol. ~20:1 pour les amendements (bokashi 19.5-22.3 vs compost 10.1-11.4).", "statut": "◆", "type": "concept"}, {"fr": "ratio Carbone/Argile (C/Argile)", "en": "Carbon-to-Clay ratio (C/Clay)", "doc_code": "S4", "strate": "S", "definition": "Proxy de l'état structural du sol (Husson, CIRAD). MO/Argile > 24% (ou C/Argile > 1/8) = sol bien structuré (Zone 1). 17-24% = zone de transition avec faux plat du rendement (Zone 2). 12-17% = seuil critique de déstructuration (Zone 3). < 12% = sol effondré (Zone 4). Corrélé au score VESS. Utilisable comme indicateur de pilotage de la régénération.", "statut": "◆", "syn_fr": "rapport C/Argile ; indice de protection physique", "syn_en": "C/Clay ratio", "bt": "indicateur de stockage de carbone", "type": "concept"}, {"fr": "ratio F/B", "en": "fungi to bacteria ratio", "doc_code": "S3", "strate": "S", "definition": "Rapport biomasse fongique / biomasse bactérienne, mesuré par PLFA. Indicateur de maturité et de stabilité du sol. F/B > 2 : sol forestier mature à cycles lents, stockage C élevé. F/B < 0,5 : sol perturbé, dominance bactérienne, cycles rapides, pertes de C. La succession écologique naturelle augmente progressivement le F/B. Les apports de MO carbonée et le non-labour augmentent le F/B.", "statut": "≈", "syn_fr": "rapport champignons/bactéries", "syn_en": "F/B ratio", "inrae": "05. SCIENCES BIOLOGIQUES › 05.12 ÉCOLOGIE", "rt": "PLFA · mycobiome · succession écologique · oligotrophes", "bt": "structure des communautés microbiennes", "type": "concept"}, {"fr": "ratio MO/argile", "en": "OM/clay ratio", "doc_code": "S1", "strate": "S", "definition": "Indicateur de qualité structurale du sol. Seuils : >24% optimal, 17% réaliste, <12% dégradé.", "statut": "◆", "type": "concept"}, {"fr": "ration du sol", "en": "soil ration (annual carbon input)", "doc_code": "S4", "strate": "S", "definition": "Apport annuel de carbone de surface nécessaire au maintien de l'homéostasie du sol — analogue de la litière forestière. Entretient les trois étages biologiques : bactéries anaérobies (rétention eau par biofilms), champignons saprotrophes et mycorhiziens (transport eau, dégradation lignine), plantes (recyclage par photosynthèse). Modèle k1/k
