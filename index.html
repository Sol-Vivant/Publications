on des maladies métaboliques.", "statut": "◆", "syn_fr": "bio-fortification par élicitation ; induction de métabolites par les microbes du sol ; élicitation édaphique", "rt": "ISR · SAR · densité nutritionnelle · polyphénols · hormèse", "bt": "Immunité végétale induite", "type": "concept"}, {"fr": "phytochimie fonctionnelle", "en": "functional phytochemistry", "doc_code": "H1/H2", "strate": "H", "definition": "Ensemble des composés bioactifs secondaires synthétisés par les plantes en interaction avec leur microbiome (polyphénols, flavonoïdes, terpènes, glucosinolates, anthocyanes). Production maximale dans les systèmes biologiquement riches et avec stress modérés. Ces molécules sont les principaux agents de santé des aliments végétaux. Voir sous-entrées : polyphénols, flavonoïdes.", "statut": "◆", "syn_fr": "profil métabolique actif ; chimie végétale de service", "rt": "ISR · densité nutritionnelle · hormèse · phyto-élicitation", "bt": "Biologie végétale spécialisée", "nt": "polyphénols · flavonoïdes", "type": "concept"}, {"fr": "polyphénols", "en": "polyphenols", "doc_code": "H1", "strate": "H", "definition": "Composés antioxydants et anti-inflammatoires synthétisés par les plantes en réponse aux signaux du microbiome du sol (voies ISR/SAR). Leur production est maximale dans les systèmes biologiquement riches et avec stress modérés (hormèse). Déclin de 20-40% observé dans les cultures conventionnelles depuis 1950.", "statut": "✓", "syn_fr": "composés phénoliques ; antioxydants naturels ; métabolites spécialisés végétaux", "inrae": "composé organique › composé aromatique › composé phénolique", "rt": "ISR · densité nutritionnelle · phytochimie fonctionnelle", "bt": "phytochimie fonctionnelle", "nt": "flavonoïdes", "type": "concept"}, {"fr": "probiotiques", "en": "probiotics", "doc_code": "H2", "strate": "H", "definition": "Micro-organismes vivants (Lactobacillus, Bifidobacterium) qui, administrés en quantité adéquate, confèrent un bénéfice pour la santé de l'hôte. Sources alimentaires : kéfir, kimchi, miso, tempeh, yaourt. Distinction avec les aliments fermentés qui ne contiennent pas tous des probiotiques viables.", "statut": "◆", "syn_fr": "microorganismes vivants bénéfiques ; ferments de santé", "bt": "biostimulant de l'hôte", "type": "concept"}, {"fr": "prébiotiques", "en": "prebiotics", "doc_code": "H2", "strate": "H", "definition": "Substrats alimentaires non digestibles (FOS, GOS, inuline, fibres fermentescibles) qui stimulent sélectivement la croissance ou l'activité de micro-organismes bénéfiques du microbiote intestinal. Les polyphénols végétaux sont reconnus comme prébiotiques émergents.", "statut": "◆", "syn_fr": "substrats sélectifs pour microbes bénéfiques ; fibres fermentescibles nutritionnelles", "bt": "nutriment du microbiome", "type": "concept"}, {"fr": "ratio Firmicutes/Bacteroidetes", "en": "Firmicutes/Bacteroidetes ratio (gut)", "doc_code": "H2", "strate": "H", "definition": "Rapport entre les deux phyla bactériens dominants du microbiote intestinal. Un ratio F/B élevé est associé à l'obésité et au syndrome métabolique. Analogue au ratio copiotrophes/oligotrophes du sol — même logique de dominance écologique.", "statut": "◆", "syn_fr": "rapport F/B ; indice d'équilibre taxonomique intestinal", "bt": "biomarqueur du microbiote", "type": "concept"}, {"fr": "résistome", "en": "resistome", "doc_code": "H3/S2", "strate": "H", "definition": "Ensemble des gènes de résistance aux antibiotiques (ARG) d'une communauté microbienne, y compris les gènes cryptiques non encore exprimés. Le sol agricole est un réservoir majeur du résistome en raison de l'usage d'antibiotiques vétérinaires et de la présence naturelle de bactéries productrices d'antibiotiques (Actinobacteria).", "statut": "≈", "syn_fr": "antibiorésistance · ARG pool ; Résistome environnemental ; réservoir de gènes de résistance ; métagénome de résistance", "syn_en": "resistome · antibiotic resistance genes pool ; environmental resistome", "inrae": "04. SANTÉ HUMAINE, ANIMALE ET VÉGÉTALE › 04.03 MESURES PRÉVENTIVES ET CURATIVES › résistance aux traitements", "rt": "AMR · THG · Actinobacteria · sol suppressif", "bt": "Métagénome", "type": "concept"}, {"fr": "services écosystémiques de régulation", "en": "regulatory ecosystem services", "doc_code": "H1/F2", "strate": "H", "definition": "Services rendus par les sols vivants : filtration et dépollution des eaux, régulation du cycle de l'azote, séquestration carbone, atténuation des inondations, régulation thermique locale. Non marchands mais quantifiables : plusieurs milliers €/ha/an. Base de l'argument économique de la transition régénératrice.", "statut": "◆", "syn_fr": "fonctions de régulation du sol ; services de contrôle environnemental", "rt": "capital biologique · EROI · externalités · eutrophisation", "bt": "Service écosystémique", "type": "concept"}, {"fr": "suppressivité comme alternative aux antibiotiques", "en": "soil suppressiveness as antibiotic alternative", "doc_code": "H3", "strate": "H", "definition": "Concept clé : un sol vivant avec une forte suppressivité naturelle réduit la pression pathogène sur les plantes et les animaux, diminuant le recours aux antibiotiques vétérinaires et phytosanitaires. Boucle vertueuse : moins d antibiotiques → moins d ARG → résistome contrôlé.", "statut": "◆", "syn_fr": "Contrôle biologique naturel ; antibiose édaphique ; suppressivité des sols", "bt": "Service écosystémique de régulation", "type": "concept"}, {"fr": "synergie des phytochimiques", "en": "phytochemical synergy", "doc_code": "H1/H2", "strate": "H", "definition": "Les nutriments et métabolites secondaires d'un aliment entier exercent des effets protecteurs plus efficaces consommés ensemble que séparément. Explique l'échec relatif des supplémentations mono-éléments vs la protection apportée par les aliments entiers issus de sols vivants.", "statut": "◆", "syn_fr": "effet d'entourage moléculaire ; complémentarité métabolique ; synergie des nutriments", "rt": "phytochimie fonctionnelle · densité nutritionnelle · polyphénols", "bt": "Pharmacologie nutritionnelle", "type": "concept"}, {"fr": "transfert horizontal de gènes", "en": "horizontal gene transfer (HGT)", "doc_code": "H3", "strate": "H", "definition": "Échange de matériel génétique entre organismes non apparentés, mécanisme majeur de la propagation des gènes de résistance aux antibiotiques (ARG) entre bactéries du sol et pathogènes humains (Ma et al., 2025).", "statut": "~", "syn_fr": "transfert latéral de gènes · THG ; THG ; échange de gènes inter-espèces ; HGT", "syn_en": "HGT · lateral gene transfer · LGT ; HGT", "inrae": "05. SCIENCES BIOLOGIQUES › 05.08 GÉNÉTIQUE › transgénèse", "rt": "résistome · AMR · ARG · biofilms", "bt": "Transfert de matériel génétique", "type": "concept"}, {"fr": "transfert sol-microbiote intestinal", "en": "soil-to-gut microbial transfer", "doc_code": "H2", "strate": "H", "definition": "Transfert direct de micro-organismes et de gènes de résistance du sol vers le microbiote humain via les endophytes des plantes consommées. Mécanisme : les bactéries endophytes colonisent les tissus végétaux via le cycle de la rhizophagie (V2) et sont transmises à l'homme lors de la consommation d'aliments crus ou peu transformés. Ma et al. (2025) fondent scientifiquement l'axe sol-plante-intestin comme pilier de la santé humaine. Duarte et al. (2024) analysent le rôle des phytochimiques des légumineuses dans ce transfert.", "statut": "◆", "syn_fr": "axe sol-intestin · transfert microbien endophytique ; inoculation du microbiote par l'environnement ; flux de microorganismes édaphiques vers l'intestin", "syn_en": "soil-to-gut transfer · plant endophyte transfer", "rt": "cycle de la rhizophagie · endophytes · microbiome intestinal · ARG · continuum sol-intestin", "bt": "axe sol-plante-humain", "type": "concept"}, {"fr": "vitamine B12", "en": "vitamin B12", "doc_code": "H1", "strate": "H", "definition": "Vitamine synthétisée exclusivement par des micro-organismes (bactéries du sol, bactéries intestinales). Assimilable par les plantes via la rhizosphère et transmise à l'homme via la consommation. Les sols biologiquement actifs produisent des légumes naturellement enrichis en vitamines B (B12, B9, B1).", "statut": "≈", "syn_fr": "cobalamine ; vitamine d'origine bactérienne", "syn_en": "cobalamin", "inrae": "05. SCIENCES BIOLOGIQUES › 05.02 BIOLOGIE MOLÉCULAIRE ET BIOCHIMIE › vitamine › cyanocobalamine", "rt": "microbiome intestinal · densité nutritionnelle · métabolites secondaires microbiens", "bt": "Micronutriment d'origine microbienne", "type": "concept"}, {"fr": "Chaîne 1 — Photosynthèse → Immunité intestinale", "en": "Chain 1 — Cover crop photosynthesis to gut immunity", "doc_code": "P2/S4/S2/S3/V2/V3/H1/H3", "strate": "META", "definition": "P2: Design du couvert multi-espèces fixant le C → S4: Exsudats racinaires alimentant la pompe microbienne → S2: Diversification des guildes bactériennes, augmentation de la CUE → S3: Développement des réseaux CMA/CMN → V2: Recrutement PGPR et endophytes, activation ISR/SAR → V3: Production vitamines B et métabolites secondaires → H1: Augmentation de la densité nutritionnelle → H3: Transfert d'endophytes au microbiome intestinal via l'alimentation. Argument le plus puissant du corpus pour les décideurs publics : un choix de couvert impacte la santé humaine via 7 étapes documentées.", "statut": "◆", "syn_fr": "aucun (concept d'intégration One Health)", "rt": "P2 · S2 · S3 · S4 · V2 · V3 · H1 · H3", "bt": "modèle de santé globale", "type": "concept"}, {"fr": "Chaîne 2 — Haber-Bosch → Maladie chronique", "en": "Chain 2 — Haber-Bosch to chronic disease", "doc_code": "F2/S2/S3/S4/V2/H1/H2/H3", "strate": "META", "definition": "F2: Azote Haber-Bosch (EROI négatif) → S2: Déséquilibre copiotrophes/oligotrophes, effondrement de la diversité → S3: Dégradation des réseaux CMA → S4: Priming Effect sur le COS, déstockage → V2: Loi de la Trophobiose, vulnérabilité phytosanitaire → H1: Dilution de la densité nutritionnelle → H2: Pression de sélection des ARG par antibiotiques compensatoires → H3: Appauvrissement du microbiome intestinal. La chaîne de dégradation : chaque maillon a un coût caché non comptabilisé dans le prix de marché.", "statut": "◆", "rt": "F2 · S2 · S3 · S4 · V2 · H1 · H2 · H3", "bt": "impact sanitaire de l'agrochimie", "type": "concept"}, {"fr": "Chaîne 3 — Bokashi → Suppressivité du sol", "en": "Chain 3 — Bokashi to soil suppressiveness", "doc_code": "P3/V3/S2/S4/S3/V2/P1", "strate": "META", "definition": "P3: Application Bokashi → V3: Métabolites actifs (acide 3-phényllactique, acides organiques, sidérophores) → S2: Réintroduction consortia fonctionnels, compétition avec pathogènes → S4: Modification Eh local, solubilisation P → S3: Stimulation saprotrophes ligneux occupant la place des pathogènes fongiques → V2: Activation ISR via métabolites microbiens → P1: Mesure PLFA (ratio F/B) et VESS. Donne un fondement mécaniste aux biostimulants fermentés. Avertissement : Priming Effect si surdosage sur sol riche en COS.", "statut": "◆", "syn_fr": "aucun (concept de protection induite par le ferment)", "rt": "P3 · V3 · S2 · S4 · S3 · V2 · P1", "bt": "mécanisme de santé des sols", "type": "concept"}, {"fr": "Chaîne 4 — Anaérobiose archéenne → Fermentations alimentaires", "en": "Chain 4 — Archean anaerobiosis to modern fermented foods", "doc_code": "F1/S4/V3/P3/V2/H3/H1", "strate": "META", "definition": "F1: Vie primitive dans un monde anoxique (3,8 Ga), voies fermentaires comme métabolisme originel → S4: Conservation des microsites anoxiques dans les agrégats → V3: Thermodynamique de la fermentation (ΔG favorable à la conservation C/N) → P3: Application via Bokashi/EM/IMO reproduisant les conditions anaérobies contrôlées → V2: Endophytes racinaires conservant des voies fermentaires anaérobies → H3: Microbiome intestinal majoritairement anaérobie → H1: Aliments fermentés réactivant ces voies dans l'intestin. Le récit fondateur du corpus : les fermentations ne sont pas une technique mais la réactivation du métabolisme le plus ancien de la biosphère.", "statut": "◆", "rt": "F1 · S4 · V3 · P3 · V2 · H3 · H1", "bt": "histoire des fermentations", "type": "concept"}, {"fr": "Chaîne 5 — Diagnostic terrain → Trajectoire économique", "en": "Chain 5 — Soil diagnosis to economic trajectory", "doc_code": "P1/S2/S4/P2/P3/P5/F2", "strate": "META", "definition": "P1: Diagnostic VESS, PLFA, Chao1, COS → S2: Interprétation via guildes fonctionnelles et ratio copiotrophes/oligotrophes → S4: Positionnement sur la courbe RothC → P2: Choix pratiques ACS adaptés → P3: Biostimulants selon le déficit microbien identifié → P5: Positionnement sur chronoséquence des 4 phases, objectifs +0,1% MO/an → F2: Traduction économique : réduction charges, crédits carbone, capital biologique. Le parcours praticien complet : du diagnostic à la décision au résultat économique. Chaîne manquante pour que le praticien connaisse la rentabilité de la transition.", "statut": "◆", "syn_fr": "aucun (concept d'intégration agronomique)", "rt": "P1 · S2 · S4 · P2 · P3 · P5 · F2", "bt": "Modèle de gestion d'exploitation", "type": "concept"}, {"fr": "Chaîne 6 — Diversité des couverts → Résilience immunitaire", "en": "Chain 6 — Cover crop diversity to immune resilience", "doc_code": "P2/S2/S3/V2/H1/H3", "strate": "META", "definition": "P2: Couvert multi-espèces saturant les niches écologiques → S2: Augmentation Chao1 et CUE par diversité des exsudats → S3: Renforcement des CMN inter-espèces → V2: Élicitation ISR/SAR par la diversité microbienne, production métabolites secondaires défensifs → H1: Aliments plus riches en polyphénols et vitamines B, protection contre l'inflammation → H3: Diversité microbienne transmise à l'intestin, corrélation avec réduction des maladies auto-immunes (Rook, 2011 ; Ma et al., 2025). Le choix du nombre d'espèces dans un couvert a des implications mesurables sur l'épidémiologie des maladies chroniques.", "statut": "◆", "syn_fr": "aucun (concept de cascade agroécologique)", "rt": "P2 · S2 · S3 · V2 · H1 · H3", "bt": "modèle de santé systémique", "type": "concept"}, {"fr": "ACS", "en": "conservation agriculture (CA)", "doc_code": "P2", "strate": "P", "definition": "Agriculture de Conservation des Sols — trio indissociable : semis direct / couverture végétale permanente / rotations diversifiées (Carpentier et al., 2020). Règle : ne jamais supprimer un seul pilier — l'équilibre du système repose sur leur synergie pour maintenir la structure (Trabelsi, 2017). Equivalent français du no-till farming.", "statut": "✓", "syn_fr": "agriculture de conservation des sols ; Agriculture de Conservation", "syn_en": "conservation agriculture · no-till farming ; CA", "inrae": "02. AGRICULTURE ET AGRONOMIE › 02.01 AGRICULTURE ET SYSTÈMES DE PRODUCTION › agriculture", "rt": "SCV · couverts végétaux · roulage-crimpage · macroporosité", "bt": "système de culture durable", "type": "concept"}, {"fr": "Agriculture de Conservation des Sols", "en": "Conservation Agriculture", "doc_code": "P2", "strate": "P", "definition": "Modèle reposant sur trois piliers indissociables : absence de travail du sol, couverture végétale permanente et rotation diversifiée(Carpentier et al., 2020).\n\nEnjeu : Préserver l'habitat des micro-organismes contre l'oxydation brutale provoquée par le labour(Trabelsi, 2017).\n\nLevier de décision : Ne jamais supprimer un pilier (ex: supprimer le couvert en gardant le non-labour), car l'équilibre du système repose sur leur synergie pour maintenir la structure (Rabot, 2018).", "statut": "◆", "syn_fr": "ACS ; agriculture de protection des sols", "syn_en": "CA", "bt": "mode de production agroécologique", "type": "concept"}, {"fr": "Agroforesterie et Bocage", "en": "Agroforestry and Hedgerow Systems", "doc_code": "P4", "strate": "P", "definition": "Intégration d'arbres et de haies dans les parcelles cultivées pour recréer une structure forestière simplifiée (Vialatte et al., 2023).\n\nEnjeu : Utilisation des réseaux de pipelines mycéliens pour le transport horizontal de l'eau et des nutriments entre l'arbre et la culture (Simard, 2018).\n\nLevier de décision : Utiliser l'effet de \"redistribution hydraulique\" (hydraulic lift) des arbres profonds pour soutenir les cultures de surface lors des sécheresses estivales.", "statut": "◆", "syn_fr": "Paysages bocagers ; réseaux de haies champêtres ; systèmes arborés", "bt": "Agroforesterie", "type": "concept"}, {"fr": "BRF (bois raméal fragmenté)", "en": "ramial chipped wood (RCW)", "doc_code": "P3", "strate": "P", "definition": "Broyat de rameaux de feuillus de diamètre < 7 cm, riche en lignine jeune et en nutriments. Inoculé aux champignons saprotrophes. Stimule la succession fongique et augmente le ratio F/B. Application en surface comme mulch, jamais enfoui.", "statut": "◆", "syn_fr": "bois de rameaux broyés ; mulch de bois ligneux ; broyat de branches fraîches", "syn_en": "RCW", "bt": "amendement organique ligneux", "type": "concept"}, {"fr": "Bandes Fleuries et Zones de Biodiversité", "en": "Flower Strips and Biodiversity Zones", "doc_code": "P2", "strate": "P", "definition": "Aménagements de bordures riches en espèces nectarifères hébergeant les auxiliaires de culture", "statut": "◆", "syn_fr": "infrastructures agroécologiques ; zones de régulation écologique ; bandes enherbées", "bt": "aménagement parcellaire", "type": "concept"}, {"fr": "Bio-inoculants et Extraits Fermentés (JMS / LiFoFer)", "en": "Bio-inoculants and Fermented Extracts (FPJ / LiFoFer)", "doc_code": "P2", "strate": "P", "definition": "Préparations biologiques à base de microorganismes indigènes multipliés à la ferme pour restaurer la diversité du microbiome", "statut": "◆", "syn_fr": "biostimulants microbiens ; extraits fermentés de litière", "bt": "intrant biologique de conservation", "type": "concept"}, {"fr": "Biomasse annuelle", "en": "Annual Biomass", "doc_code": "P2", "strate": "P", "definition": "Quantité totale de matière organique (aérienne et racinaire) produite par hectare et par an. Les systèmes régénératifs visent 15 à 25 tonnes de matière sèche/ha/an (faire des recherches pour étayer ce point nd.).\n\nEnjeu : Maximiser la capture de l'énergie solaire pour nourrir le bioréacteur microbien via la rhizodéposition (Pascale, 2020).\n\nLevier de décision : Ne jamais laisser de \"fenêtre vide\" dans le calendrier. Chaque jour sans photosynthèse est une perte de capital biologique et de stockage de carbone (Schmidt et al., 2011; Villat & Nicholas, 2024).", "statut": "◆", "syn_fr": "production de matière sèche annuelle ; biomasse végétale totale", "bt": "productivité primaire de l'écosystème", "type": "concept"}, {"fr": "CIVE", "en": "energy biomass catch crops", "doc_code": "P2", "strate": "P", "definition": "Cultures Intermédiaires à Valorisation Énergétique. Couverts récoltés pour la méthanisation sans dégrader le bilan humique en semis direct.", "statut": "◆", "type": "concept"}, {"fr": "CMN agroforestier", "en": "agroforestry common mycorrhizal network", "doc_code": "P4", "strate": "P", "definition": "Réseau mycorhizien inter-espèces particulièrement développé dans les systèmes agroforestiers, connectant arbres et cultures via les hyphes de CMA et ECM. Transferts de C, N, eau et signaux chimiques entre espèces. Les arbres profonds soutiennent les cultures de surface en période de stress via le CMN.", "statut": "◆", "syn_fr": "Réseau mycorhizien commun ; connexion fongique inter-arbres ; réseau de transfert de nutriments", "rt": "CMN · ECM · CMA · hydraulic lift", "bt": "CMN", "type": "concept"}, {"fr": "EM (micro-organismes efficaces)", "en": "effective microorganisms (EM)", "doc_code": "P3", "strate": "P", "definition": "Consortium de micro-organismes sélectionnés : bactéries lactiques (LAB), levures, bactéries photosynthétiques (PNSB). Utilisés pour la fermentation du bokashi, les pulvérisations foliaires et l'inoculation des composts. Concept développé par Teruo Higa.", "statut": "◆", "syn_fr": "micro-organismes utiles ; préparation Higa ; ferments microbiens du commerce", "syn_en": "EM", "bt": "inoculum microbien", "type": "concept"}, {"fr": "Ernst Götsch", "en": "Ernst Götsch", "doc_code": "P4", "strate": "P", "definition": "Agriculteur-chercheur suisse naturalisé brésilien, fondateur de l'agriculture syntropic. A régénéré 500 ha de caatinga dégradée au Bahia (Brésil) en 40 ans en mimant la succession écologique forestière.", "statut": "◆", "syn_fr": "Fondateur de l'agriculture syntropique ; chercheur-praticien en agrobiologie", "rt": "agriculture syntropic · succession écologique · agroforesterie", "bt": "Écologue / Agronome", "type": "concept"}, {"fr": "Faim d'azote", "en": "nitrogen immobilization", "doc_code": "P2", "strate": "P", "definition": "Séquestration temporaire de l'azote minéral par les microbes décomposant des résidus à fort ratio C/N (ex: paille, BRF) (Robertson & Groffman, 2014).\n\nEnjeu : Peut pénaliser la culture suivante si l'azote n'est pas ggéré(Jardim et al., 2023)\n\nLevier de décision : Anticiper en associant des légumineuses aux résidus carbonés ou en pratiquant un enfouissement léger pour accélérer le recyclage biologique (Fred & Harold, 2021; Robertson & Groffman, 2014).", "statut": "◆", "syn_fr": "immobilisation de l'azote ; organisation microbienne de l'azote", "syn_en": "N-lockup", "bt": "cycle de l'azote", "type": "concept"}, {"fr": "IMO", "en": "indigenous microorganisms", "doc_code": "P3", "strate": "P", "definition": "Micro-organismes indigènes collectés localement (litière forestière, sols riches) et multipliés à la ferme selon le protocole KNF en 5 étapes : IMO1 (capture sur riz cuit en forêt, 3-5 jours), IMO2 (multiplication en sucre brun 1:1), IMO3 (mélange son de riz + terre locale), IMO4 (acclimatation au sol de la parcelle). Adaptés aux conditions pédoclimatiques locales. Utilisés pour restaurer la diversité microbienne en sols intensifs. NUANCE SCIENTIFIQUE : Thompson et al. (2025, bioRxiv) montrent que le processus IMO sélectionne un nombre limité de taxons bactériens et RÉDUIT la diversité fongique, contrairement à l'objectif affiché. La diversité bactérienne est mieux préservée que la diversité fongique. L'efficacité dépend fortement du site de collecte (UH-CTAHR SA-19).", "statut": "◆", "syn_fr": "micro-organismes indigènes ; levains naturels locaux", "syn_en": "IMO", "rt": "KNF · JADAM · LiFoFer · biostimulants", "bt": "inoculum microbien", "type": "concept"}, {"fr": "Indice de maturité de Bongers", "en": "Bongers Maturity Index", "doc_code": "P1", "strate": "P", "definition": "Indicateur basé sur la diversité des nématodes du sol pour évaluer le niveau de perturbation et la santé du réseau trophique (CORPUS SOL VIVANT, 2026).\n\nEnjeu : Révèle si le sol est dominé par des opportunistes (r-stratèges) ou des organismes stables.\n\nLevier de décision : Un indice bas indique un besoin urgent de réduire les perturbations mécaniques et chimiques pour laisser la vie se stabiliser.", "statut": "◆", "syn_fr": "Indice de maturité ; indice nématologique de santé du sol", "syn_en": "Maturity Index", "bt": "Bio-indicateur nématologique", "type": "concept"}, {"fr": "Indice d’Aire Foliaire", "en": "Leaf Area Index (LAI)", "doc_code": "P2", "strate": "P", "definition": "Mesure de la surface totale des feuilles par unité de surface au sol. En agriculture régénératrice, l'objectif est de maximiser le LAI sur la plus longue période possible de l'année (Laurent, 2012; Pascale, 2020).\n\nEnjeu : Un LAI élevé garantit une interception maximale de l'énergie solaire, moteur de la rhizodéposition qui nourrit le microbiome (Pascale, 2020; Villat & Nicholas, 2024).\n\nLevier de décision : Utiliser des couverts multi-étagés (ex : association de graminées hautes et de trèfles rampants) pour saturer l'espace foliaire et optimiser le pompage de carbone (Vialatte et al., 2023).", "statut": "◆", "syn_fr": "IAF ; surface foliaire spécifique", "syn_en": "LAI", "bt": "paramètre de croissance végétale", "type": "concept"}, {"fr": "JADAM", "en": "JADAM (Jadam Organic Farming)", "doc_code": "P3", "strate": "P", "definition": "Système d'agriculture biologique ultra-low-cost développé par Youngsang Cho (fils de Han-kyu Cho, fondateur du KNF). Acronyme de jayeon-eul dalm-eun salamdeul ('personnes qui ressemblent à la nature'). Préparation clé : JMS (JADAM Microbial Solution) = pomme de terre cuite + litière forestière + eau non chlorée, PAS de sucre (contrairement au KNF). Fermentation active 3-7 jours, utiliser dans les 12h après le pic d'activité (ne se conserve pas). Coût quasi nul (500 L pour le prix d'1 kg de pommes de terre). Plus simple que le KNF : principe SESE (Simple, Easy, Scientific, Effective). Open source (pas de brevet, 100 000 membres, jadam.kr). Inclut aussi le JNP (JADAM Natural Pesticide) et le JLF (JADAM Liquid Fertilizer).", "statut": "◆", "syn_fr": "agriculture naturelle JADAM ; JOM", "syn_en": "Jadam Organic Farming", "rt": "KNF · IMO · LiFoFer · bokashi", "bt": "méthode agroécologique ultra-low cost", "type": "concept"}, {"fr": "PLFA", "en": "phospholipid fatty acid analysis (PLFA)", "doc_code": "P1/S2", "strate": "P", "definition": "Analyse des acides gras phospholipidiques des membranes cellulaires microbiennes vivantes (les PLFA se dégradent en quelques heures après la mort des cellules — pas de signal des cellules mortes). Fournit : (1) biomasse microbienne totale vivante (nmol PLFA/g sol), (2) ratio Fungi/Bacteria (F/B), (3) structure des guildes (Gram+, Gram-, champignons, actinobactéries), (4) marqueurs de stress microbien (ratio cy17:0/16:1ω7). Référence pour évaluer l'impact des pratiques (Norris et al., 2023 ; Brinton, 2020 ; Drenovsky et al., 2004).", "statut": "✓", "syn_fr": "analyse PLFA · acides gras phospholipidiques", "syn_en": "PLFA · phospholipid fatty acid", "inrae": "05. SCIENCES BIOLOGIQUES › 05.02 BIOLOGIE MOLÉCULAIRE ET BIOCHIMIE", "rt": "ratio F/B · biomasse microbienne · Chao1 · diagnostic", "type": "concept"}, {"fr": "PLFA (phospholipid fatty acid analysis)", "en": "phospholipid fatty acid analysis", "doc_code": "P1", "strate": "P", "definition": "", "statut": "◆", "syn_fr": "Analyse des acides gras phospholipidiques ; profilage des communautés microbiennes", "syn_en": "PLFA", "bt": "Indicateur de structure des communautés", "type": "concept"}, {"fr": "Roulage-crimping", "en": "Roller-Crimping", "doc_code": "P2", "strate": "P", "definition": "Technique de destruction mécanique des couverts végétaux à l'aide d'un rouleau fâcheur qui pince la tige sans la couper, créant un mulch protecteur au sol(Canali et al., 2015; Hardy, 2019).\n\nEnjeu : Terminer le couvert sans chimie tout en conservant une barrière physique contre l'évaporation et les adventices.\n\nLevier de décision : Intervenir au stade \"floraison\" des espèces du couvert pour garantir une destruction efficace et éviter les repousses dans la culture suivante(Vincent-Caboud, 2020).", "statut": "◆", "syn_fr": "roulage-pliage ; destruction mécanique par écrasage", "bt": "technique de gestion des couverts", "type": "concept"}, {"fr": "SCFA", "en": "Short-Chain Fatty Acids", "doc_code": "P5", "strate": "P", "definition": "", "statut": "◆", "syn_fr": "AGCC ; métabolites de fermentation des fibres ; butyrate, propionate et acétate", "syn_en": "SCFA", "bt": "Médiateur de l'immunité innée", "type": "concept"}, {"fr": "SCV", "en": "direct seeding mulch-based cropping system", "doc_code": "P2", "strate": "P", "definition": "Semis Direct sous Couverture Végétale — système ACS complet associant les 3 piliers indissociables : absence de travail du sol, semis direct, couverture permanente par mulch ou couvert vivant. Standard de l'agriculture de conservation tropicale (CIRAD). Preserve la macroporosité biologique, les réseaux mycorhiziens et la structure des agrégats.", "statut": "≈", "syn_fr": "semis direct sous couverture ; Semis Direct sur Couverture Végétale permanente", "syn_en": "SCV · direct seeding mulch-based", "inrae": "02. AGRICULTURE ET AGRONOMIE (correction v2.2 — suppression alignement erroné)", "rt": "ACS · non-labour · couverts végétaux · macroporosité", "bt": "système de semis direct", "type": "concept"}, {"fr": "Solvita", "en": "Solvita test", "doc_code": "P1", "strate": "P", "definition": "Test colorimétrique de l'activité biologique du sol par mesure du CO₂ dégagé en 24h par un échantillon de sol frais humidifié. Indicateur rapide de la biomasse microbienne active. Interprétation : > 6 = sol très actif ; 3-6 = actif ; < 3 = faible activité biologique.", "statut": "◆", "syn_fr": "Test de respiration Solvita ; mesure rapide du CO2", "syn_en": "Solvita soil respiration test", "rt": "biomasse microbienne · activité biologique · PLFA", "bt": "Test d'activité biologique", "type": "concept"}, {"fr": "VESS", "en": "visual evaluation of soil structure (VESS)", "doc_code": "P1", "strate": "P", "definition": "Score de 1 à 5 évaluant la qualité structurale du sol par observation directe d'un bloc de terre extrait à la bêche (20-25 cm de profondeur). Sq1 : agrégats arrondis et poreux — excellente structure. Sq2 : agrégats friables — bonne structure. Sq3 : mottes avec quelques fissures — dégradation débutante. Sq4 : mottes anguleuses lisses — compactage signficatif. Sq5 : bloc massif, imperméable — compactage sévère. Score > 3 : barrière physique à l'enracinement nécessitant une biopuncture ou un arrêt total du trafic lourd (Boizard et al., 2019 ; Olivares et al., 2023).", "statut": "~", "syn_fr": "évaluation visuelle de la structure du sol ; test bêche", "syn_en": "VESS · Sq score ; VESS", "inrae": "06. SCIENCES DE LA TERRE › 06.01 SCIENCES DU SOL (correction alignement v2.2)", "rt": "test bêche · agrégation · compaction · macroporosité", "bt": "Méthode de diagnostic physique du sol", "type": "concept"}, {"fr": "acides humiques et fulviques", "en": "humic and fulvic acids", "doc_code": "P3", "strate": "P", "definition": "Biostimulants issus de la décomposition de la MO. Acides humiques : macromolécules, chélation des micronutriments, stimulation racinaire. Acides fulviques : petites molécules, pénètrent les membranes cellulaires, vecteurs de nutriments. Méta-analyses : +10-25% croissance racinaire.", "statut": "◆", "syn_fr": "substances humiques ; fractions extractibles de l'humus ; acides organiques complexes", "bt": "matière organique stabilisée", "type": "concept"}, {"fr": "activité biologique", "en": "biological activity", "doc_code": "P1", "strate": "P", "definition": "Intensité du métabolisme microbien du sol, mesurée par respiration (CO₂), activité enzymatique (FDA), ou Solvita.", "statut": "~", "syn_fr": "Vie du sol ; dynamisme biologique ; fonctionnement biologique", "syn_en": "soil life", "bt": "Fonctionnement du sol", "type": "glossaire"}, {"fr": "agriculture de précision", "en": "precision agriculture", "doc_code": "P1", "strate": "P", "definition": "Utilisation de technologies (capteurs, GPS, drones, télédétection) pour adapter les interventions à la variabilité spatiale et temporelle des parcelles.", "statut": "◆", "type": "concept"}, {"fr": "agriculture syntropic", "en": "syntropic agriculture", "doc_code": "P4", "strate": "P", "definition": "Système agro-sylvo-pastoral mimant la succession écologique naturelle d'un pionnier vers le climax, développé par Ernst Götsch. Associe strates végétales successives (strates pionnières, secondaires, climaciques) qui s'éliminent naturellement en intensifiant la production des strates suivantes.", "statut": "◆", "syn_fr": "agriculture de succession ; agriculture syntropique", "rt": "succession écologique · agroforesterie · Ernst Götsch", "bt": "Système agroforestier complexe", "type": "concept"}, {"fr": "agriculture syntropique", "en": "syntropic agriculture", "doc_code": "P5", "strate": "P", "definition": "Système développé par Ernst Götsch au Brésil. Principe : reproduire la succession écologique forestière dans un système productif. Élagage intensif comme stimulant de croissance et apport de MO. Mélange d espèces pionnières, secondaires et climaciques sur la même parcelle.", "statut": "◆", "syn_fr": "méthode Götsch ; agroforesterie de succession intensive", "bt": "Agroforesterie", "type": "concept"}, {"fr": "agriculture syntropique (Götsch)", "en": "syntropic farming (Götsch method)", "doc_code": "P4", "strate": "P", "definition": "Système agroforestier développé par Ernst Götsch. Succession planifiée : espèces pionnières (manioc, bananier) → secondaires (café, cacao) → climaciques (arbres de canopée). Élagage intensif = apport de MO + stimulation de croissance. Adaptation en climat tempéré en cours.", "statut": "◆", "type": "concept"}, {"fr": "agroforesterie", "en": "agroforestry", "doc_code": "P4", "strate": "P", "definition": "Intégration d'arbres dans les systèmes de culture ou d'élevage. CMN inter-espèces, hydraulic lift, brise-vent, séquestration carbone.", "statut": "~", "syn_fr": "association arbres-cultures ; culture sous couvert arboré", "bt": "Système de culture durable", "type": "glossaire"}, {"fr": "agrorecyclerie", "en": "agro-recycling", "doc_code": "P5", "strate": "P", "definition": "Concept développé par la Ferme de Cagnolle (Benoît Le Baube, Dordogne). Agriculture basée sur le recyclage de déchets carbonés locaux : balayures de scierie, broyats de déchetterie, déchets alimentaires. MO passée de 1.4% à 9% en 10 ans. 90% des cultures sans irrigation. Principe : tout ce qui est carboné et local est récupéré — la bioéconomie circulaire de Hamant appliquée à l'échelle d'une ferme.", "statut": "◆", "syn_fr": "recyclage à la ferme ; boucle de matière locale ; valorisation des résidus", "syn_en": "on-farm recycling", "bt": "économie circulaire agricole", "type": "concept"}, {"fr": "arbre de décision diagnostic", "en": "diagnostic decision tree", "doc_code": "P1", "strate": "P", "definition": "Outil structuré pour le diagnostic du sol vivant : parcourir la cascade N0→N5 en vérifiant chaque niveau. Si N0 (eau) non satisfait → inutile de traiter N4 (microbiome). Le diagnostic suit la logique des prérequis : corriger le problème le plus fondamental d abord.", "statut": "◆", "syn_fr": "Clé de détermination diagnostic ; protocole de décision", "bt": "Outil d'aide à la décision", "type": "concept"}, {"fr": "auto-fertilité", "en": "self-fertility", "doc_code": "P5/F2", "strate": "P", "definition": "Sol fournissant les nutriments sans apport extérieur. Seuil ~3,5-5% MO. Légume ~1 t MS/ha/an vs 20 t nécessaire.", "statut": "validé", "syn_fr": "autonomie en fertilité ; fertilité intrinsèque ; système auto-fertile", "syn_en": "self-sustaining fertility", "bt": "Objectif de système autonome", "type": "concept"}, {"fr": "bandes fleuries", "en": "flower strips / insectary strips", "doc_code": "P4", "strate": "P", "definition": "Aménagements linéaires ou intra-parcellaires implantés avec des espèces nectarifères, pollinifères et à floraison échelonnée. Hébergent les auxiliaires de culture et pollinisateurs. 5-12% de la surface de la parcelle est optimal. Contribuent à la connectivité paysagère et hébergent des micro-organismes antagonistes des pathogènes.", "statut": "◆", "syn_fr": "jachères fleuries · bandes enherbées diversifiées ; zones de régulation écologique ; bandes mellifères ; réservoirs d'auxiliaires", "syn_en": "flower strips · insectary strips ; insectary strips", "rt": "niche partitioning · biodiversité fonctionnelle · auxiliaires de culture", "bt": "Infrastructure agroécologique", "type": "concept"}, {"fr": "bio-inoculant", "en": "bioinoculant", "doc_code": "P3", "strate": "P", "definition": "Préparation contenant des micro-organismes vivants (bactéries, champignons) ayant un effet bénéfique documenté sur la croissance végétale ou la santé du sol. Inclut les inoculants CMA, les rhizobia, les PGPR. Qualité critique : viabilité au moment de l'application.", "statut": "◆", "syn_fr": "biofertilisant ; inoculum microbien ; agent de biostimulation", "syn_en": "bioinoculant", "rt": "CMA · PGPR · IMO · enrobage de semences", "bt": "biostimulant microbien", "type": "concept"}, {"fr": "biomasse microbienne", "en": "microbial biomass", "doc_code": "P1", "strate": "P", "definition": "Masse totale des micro-organismes vivants dans le sol, mesurée par fumigation-extraction (C-mic) ou ATP.", "statut": "~", "syn_fr": "C-microbien ; masse des microorganismes du sol", "syn_en": "soil microbial biomass", "bt": "Compartiment biologique du sol", "type": "glossaire"}, {"fr": "biopuncture", "en": "bio-drilling", "doc_code": "P2", "strate": "P", "definition": "Décompaction biologique utilisant des plantes à racines pivotantes (radis daikon, mélilot, luzerne, navette) pour percer les horizons compactés et créer des macropores permanents. Les biopores créés sont tapissés de mucilages et de MO, constituant des guides préférentiels stables pour les racines suivantes. Alternative biologique au sous-solage qui détruit les réseaux fongiques.", "statut": "◆", "syn_fr": "décompaction biologique · bio-tillage ; forage biologique ; structuration racinaire", "syn_en": "bio-drilling · bio-tillage", "rt": "macroporosité · compaction · couverts végétaux · galeries biogènes", "bt": "structuration biologique du sol", "type": "concept"}, {"fr": "bocage", "en": "bocage landscape", "doc_code": "P4", "strate": "P", "definition": "Paysage traditionnel européen de haies, prairies et parcelles cultivées. Système agroforestier à l'échelle du territoire.", "statut": "◆", "type": "concept"}, {"fr": "carbon farming", "en": "carbon farming", "doc_code": "P5/F2", "strate": "P", "definition": "Valorisation économique du stockage de carbone dans les sols agricoles via la vente de crédits carbone. Protocole de certification : mesure initiale (RothC), pratiques définies (ACS, agroforesterie, couvertures), suivi annuel, vérification tierce. Potentiel de stockage estimé : 4‰/an de COS sur les sols cultivés mondiaux.", "statut": "◆", "syn_fr": "agriculture carbone ; séquestration de carbone agricole ; agriculture du carbone", "syn_en": "carbon sequestration farming", "rt": "RothC · COS · séquestration carbone · capital biologique", "bt": "Stratégie climatique", "type": "concept"}, {"fr": "chaîne causale (substrat→métabolites→microbiome→plante)", "en": "causal chain", "doc_code": "P3", "strate": "P", "definition": "Modèle opérationnel séquentiel décrivant le chemin d'action des biostimulants fermentés et des pratiques régénératrices : un substrat organique fermenté (Bokashi, IMO, KNF, LiFoFer) produit des métabolites actifs (acides organiques, phytohormones, sidérophores) → qui restructurent le microbiome du sol (diversité fonctionnelle, ratio F/B, CUE) → lequel module la rhizosphère et l'holobionte végétal (nutrition, ISR/SAR) → déterminant la qualité nutritionnelle et sanitaire de l'aliment produit. Principe opérationnel central de la strate P.", "statut": "◆", "syn_fr": "chaîne causale biostimulants ; cascade d'effets biologiques ; séquence d'action des biostimulants", "syn_en": "causal chain · action chain", "rt": "biostimulants · holobionte · métabolites secondaires · ISR · densité nutritionnelle", "bt": "modèle d'interaction biogéochimique", "type": "concept"}, {"fr": "chronosequence de regeneration", "en": "regeneration chronosequence", "doc_code": "P2/P5", "strate": "P", "definition": "Evolution temporelle des indicateurs biologiques du sol au cours de la transition agroecologique. Permet de definir des trajectoires et seuils de changement significatif.", "statut": "◆", "syn_fr": "trajectoire de restauration du sol ; chronoséquence de pédogenèse anthropique", "bt": "dynamique temporelle des sols", "type": "concept"}, {"fr": "chronoséquence de transition", "en": "transition chronosequence", "doc_code": "P5", "strate": "P", "definition": "Séquence temporelle des 4 phases de la transition vers l'agriculture régénératrice (Madarász et al., 2025) : (1) Sevrage des intrants (1-3 ans, fragilité maximale, risque de baisse de rendement), (2) Redémarrage biologique (3-7 ans, réapparition des indicateurs biologiques), (3) Consolidation (7-15 ans, accumulation de MO, stabilisation des rendements), (4) Antifragilité (> 15 ans, amélioration après les stress). Outil de positionnement du praticien pour calibrer ses objectifs.", "statut": "◆", "syn_fr": "trajectoire de conversion ; chronoséquence de pédogenèse anthropique ; étapes de transition", "rt": "antifragilité · capital biologique · ACS · diagnostic", "bt": "Dynamique temporelle des systèmes", "type": "concept"}, {"fr": "compostage", "en": "composting", "doc_code": "P3", "strate": "P", "definition": "Transformation aérobie contrôlée de MO fraîche en compost stable. Phases thermophile (60-70°C), mésophile, maturation.", "statut": "~", "syn_fr": "stabilisation aérobie de la MO ; transformation biologique des déchets ; humification contrôlée", "bt": "transformation de la matière organique", "type": "glossaire"}, {"fr": "corridor écologique", "en": "ecological corridor", "doc_code": "P4", "strate": "P", "definition": "Bande de végétation (haie, bande enherbée, ripisylve) connectant des habitats fragmentés. Permet la circulation de la faune auxiliaire (pollinisateurs, prédateurs de ravageurs), le transfert de graines et de spores fongiques, et la régulation hydrique du paysage.", "statut": "◆", "syn_fr": "trame verte ; zone de connectivité biologique ; passage biologique", "bt": "Aménagement écologique du paysage", "type": "concept"}, {"fr": "couvert biomax", "en": "biomax cover crop mix", "doc_code": "P2", "strate": "P", "definition": "Mélange 5-11 sp. haute densité. Jusqu'à 10 t MS/ha, 100-250 kg N/ha. Thomas & Archambeaud 2018.", "statut": "validé", "syn_fr": "mélange multi-espèces à haute biomasse ; couvert végétal complexe", "bt": "couvert végétal intermédiaire", "type": "concept"}, {"fr": "couvert multi-espèces", "en": "multi-species cover crop", "doc_code": "P2", "strate": "P", "definition": "Mélange de plusieurs espèces de plantes de couverture combinant légumineuses, graminées et crucifères pour maximiser les services écosystémiques.", "statut": "◆", "type": "concept"}, {"fr": "couverts végétaux", "en": "cover crops", "doc_code": "P2", "strate": "P", "definition": "Cultures intermédiaires couvrant le sol entre deux cultures principales pour assurer les services écosystémiques : couverture anti-érosive, fixation d'azote (légumineuses), alimentation du microbiome en exsudats, restructuration par les racines (pivotantes), enrichissement de la MO. Design optimal : mélanges 10-12 espèces (graminées + légumineuses + crucifères + composées) pour saturer les niches écologiques et maximiser la diversité des exsudats.", "statut": "✓", "syn_fr": "tapis végétal ; cultures intermédiaires ; engrais verts ; CIPAN", "syn_en": "cover crops · vegetative cover", "inrae": "02. AGRICULTURE ET AGRONOMIE › 02.02 PRATIQUES CULTURALES", "rt": "stœchiométrie C/N · ACS · cultures de services · biopuncture", "bt": "plante de service", "type": "concept"}, {"fr": "couverture permanente", "en": "permanent soil cover", "doc_code": "P2", "strate": "P", "definition": "Maintien d'une couverture végétale vivante ou de résidus toute l'année. Protège l'homéostasie du sol (régulation thermique, évite la dessication), nourrit le microbiome en continu, réduit l'érosion et l'évaporation.", "statut": "◆", "syn_fr": "sol toujours couvert ; mulch permanent ; couverture intégrale du sol", "rt": "ACS · mulch · homéostasie du sol · évapotranspiration", "bt": "principe fondamental de l'ACS", "type": "concept"}, {"fr": "cultures de services", "en": "service crops", "doc_code": "P2/P5", "strate": "P", "definition": "Espèces végétales cultivées non pour leur valeur marchande directe mais pour les services écosystémiques rendus : fixation d'azote (légumineuses), biopuncture (pivots profonds), rupture des cycles de ravageurs, couverture anti-érosive, alimentation du microbiome. Leur contribution au C stable via les racines est 5× supérieure à celle des résidus de surface (Rasse et al., 2005).", "statut": "◆", "syn_fr": "CIPAN (cultures intermédiaires pièges à nitrates)", "syn_en": "service crops · cover crops (service function)", "rt": "couverts végétaux · biopuncture · fixation azote · séquestration carbone", "bt": "couverts végétaux", "type": "concept"}, {"fr": "design en courbes de niveau", "en": "Keyline Design", "doc_code": "P4", "strate": "P", "definition": "Système de conception du paysage agricole (P.A. Yeomans, Australie, 1954) optimisant rétention et redistribution de l'eau de pluie par travail selon les lignes clés de topographie. Dévie l'eau des zones humides (vallées) vers les zones sèches (crêtes) par gravité, sans pompage. Aligner les plantations d'arbres sur les keylines pour créer des barrières d'infiltration naturelles.", "statut": "◆", "syn_fr": "conception Yeomans ; aménagement en ligne clé ; gestion hydrique Keyline ; Keyline Design · Keyline", "bt": "Gestion conservatoire de l'eau", "type": "concept"}, {"fr": "diagnostic", "en": "diagnosis", "doc_code": "P1", "strate": "P", "definition": "Évaluation de l'état du sol via la cascade N0→N5. Combine observation terrain (VESS), tests simples et analyses (PLFA, Chao1).", "statut": "~", "syn_fr": "État des lieux du sol ; évaluation pédologique", "syn_en": "soil assessment", "bt": "Gestion des sols", "type": "glossaire"}, {"fr": "efficience d utilisation de l azote", "en": "nitrogen use efficiency", "doc_code": "P2", "strate": "P", "definition": "Rapport entre l azote exporté par la culture et l azote total apporté (%). NUE élevée = moins de pertes par lixiviation et dénitrification. Objectif : NUE > 70% en agriculture de conservation.", "statut": "◆", "syn_fr": "EUN ; efficacité d'utilisation de l'azote ; coefficient d'utilisation de l'azote", "syn_en": "NUE", "bt": "indicateur de performance agronomique", "type": "concept"}, {"fr": "enrichissement de surface", "en": "surface amendment", "doc_code": "P5", "strate": "P", "definition": "Apport de matière organique (compost, bokashi, paillage) uniquement en surface, sans enfouissement. Mime la litière forestière. Préserve la macroporosité biologique et la stratification des horizons. Principe fondamental du non-labour et des planches permanentes.", "statut": "◆", "syn_fr": "amendement superficiel ; restitution en surface ; mulch actif", "syn_en": "surface application", "bt": "Technique d'amendement", "type": "concept"}, {"fr": "enrobage de semences biologique", "en": "biological seed coating", "doc_code": "P3/P5", "strate": "P", "definition": "Application de micro-organismes bénéfiques (CMA, PGPR, Trichoderma, Bacillus) et de substances nutritives sur la semence avant le semis. Assure une colonisation immédiate de la rhizosphère dès la germination. Utiliser des inoculums indigènes (IMO, LiFoFer) pour l'adaptation au contexte local (Weller et al., 2002 ; Pellegrini et al., 2025 ; Díaz-Rodríguez et al., 2025).", "statut": "◆", "syn_fr": "pelliculage biologique ; pelliculage microbien ; coating biologique", "syn_en": "biological seed coating · seed treatment", "rt": "bio-inoculant · CMA · PGPR · IMO", "bt": "technique de protection des cultures", "type": "concept"}, {"fr": "entonnoir de Baermann", "en": "Baermann funnel", "doc_code": "P1", "strate": "P", "definition": "Dispositif d'extraction des nématodes du sol par migration dans l'eau à travers un tamis. Permet d'inventorier les guildes trophiques de nématodes (bactérivores, fongivores, omnivores, prédateurs, phytoparasites) nécessaires au calcul de l'indice de maturité de Bongers.", "statut": "◆", "syn_fr": "Dispositif de Baermann ; méthode d'extraction par hydrotropisme", "syn_en": "Baermann technique", "rt": "nématodes · indice de maturité de Bongers · réseau trophique", "bt": "Méthode d'extraction de la microfaune", "type": "concept"}, {"fr": "fertigations biologiques", "en": "biological fertigation", "doc_code": "P5", "strate": "P", "definition": "Système d'irrigation enrichi en nutriments et micro-organismes vivants (thés de compost, extraits fermentés, solutions enzymatiques) combinant hydratation et nutrition biologique. Les micro-organismes colonisent la rhizosphère et créent un biofilm protecteur. Remplace la fertigation chimique par une nutrition vivante.", "statut": "◆", "syn_fr": "fertigation organique ; irrigation fertilisante biologique", "syn_en": "organic fertigation", "rt": "thés de compost · bio-inoculant · biostimulants", "bt": "Technique d'apport de nutriments", "type": "concept"}, {"fr": "haie brise-vent", "en": "windbreak hedgerow", "doc_code": "P4", "strate": "P", "definition": "Haie orientée pour réduire la vitesse du vent et protéger cultures et bétail de l'érosion éolienne.", "statut": "◆", "type": "concept"}, {"fr": "haie multistrate", "en": "multi-layered hedgerow", "doc_code": "P4", "strate": "P", "definition": "Haie à trois strates (herbacée + arbustive + arborée) maximisant les services écosystémiques.", "statut": "◆", "type": "concept"}, {"fr": "haie vive", "en": "living hedge / hedgerow", "doc_code": "P4", "strate": "P", "definition": "Plantation linéaire d'arbres et arbustes en bordure ou au sein des parcelles. Fonctions : brise-vent, corridor écologique, interception des eaux de ruissellement, habitat pour auxiliaires, source de BRF, séquestration carbone aérien et racinaire.", "statut": "◆", "syn_fr": "haie champêtre ; clôture végétale ; brise-vent", "syn_en": "hedgerow", "bt": "Infrastructure agroécologique", "type": "concept"}, {"fr": "indicateurs biologiques", "en": "biological soil indicators", "doc_code": "P1", "strate": "P", "definition": "Paramètres mesurables reflétant la santé biologique du sol. Hiérarchie d'escalade : niveau 1 — observation terrain (VESS, test bêche, collemboles visibles) ; niveau 2 — tests terrains (<50€ : Solvita, test ficelle GEPPA) ; niveau 3 — laboratoire (PLFA, Chao1, biomasse ATP, indice de Bongers).", "statut": "≈", "syn_fr": "bioindicateur · organisme sentinelle ; Bio-indicateurs ; paramètres biologiques de santé du sol", "syn_en": "biological indicator · bioindicator ; bioindicators", "inrae": "05. SCIENCES BIOLOGIQUES › 05.12 ÉCOLOGIE › indicateur écologique", "rt": "VESS · PLFA · Chao1 · Solvita · entonnoir de Baermann", "bt": "Indicateur de qualité du sol", "type": "concept"}, {"fr": "indice d'aire foliaire", "en": "leaf area index", "doc_code": "P2", "strate": "P", "definition": "", "statut": "◆", "syn_fr": "IAF", "syn_en": "LAI", "bt": "indice physiologique de développement", "type": "concept"}, {"fr": "indice d'aire foliaire (LAI)", "en": "leaf area index (LAI)", "doc_code": "P2/P4", "strate": "P", "definition": "Rapport surface foliaire totale / surface de sol sous-jacente. Indicateur de la capacité d'interception solaire et donc de la puissance de la pompe à carbone rhizosphérique. Maximiser le LAI sur la plus longue période possible de l'année, via des couverts multi-étagés, est l'objectif premier : c'est lui qui alimente en exsudats la biologie souterraine.", "statut": "◆", "syn_fr": "LAI · indice foliaire", "syn_en": "LAI · leaf area index", "rt": "rhizodéposition · exsudats racinaires · biomasse annuelle", "type": "concept"}, {"fr": "inoculum mycorhizien", "en": "mycorrhizal inoculum", "doc_code": "P3", "strate": "P", "definition": "Préparation contenant des propagules viables de CMA (spores, fragments d hyphes, racines colonisées). Efficace uniquement si : sol pauvre en CMA indigènes (< 10 spores/100g), plante mycotrophe, absence d excès de P.", "statut": "◆", "syn_fr": "inoculant de champignons mycorhiziens ; propagules de mycorhizes", "bt": "bio-inoculant", "type": "concept"}, {"fr": "intrant massif", "en": "massive organic input", "doc_code": "P5", "strate": "P", "definition": "Apport 50-400 t MS/ha sur sol <2% MO pour viser 5%. Faim d'azote prolongée. Opposé : remise en vie douce (20-50 t, C/N 20-30).", "statut": "validé", "syn_fr": "apport organique important ; dose de démarrage ; restitution massive de carbone", "syn_en": "heavy organic amendment", "bt": "Stratégie de conversion", "type": "concept"}, {"fr": "lutte biologique par conservation", "en": "conservation biological control (CBC)", "doc_code": "P3", "strate": "P", "definition": "Adapter les pratiques pour favoriser biocontrôle indigène plutôt qu'inonder de spores commerciales.", "statut": "✓", "type": "concept"}, {"fr": "légumineuses", "en": "legumes", "doc_code": "P2", "strate": "P", "definition": "Plantes fixatrices d'azote via symbiose Rhizobium. Fournissent 100-300 kg N/ha/an. Pilier des couverts multi-espèces.", "statut": "~", "syn_fr": "Fabacées ; plantes fixatrices d'azote atmosphérique", "syn_en": "Fabaceae", "bt": "famille botanique de service", "type": "glossaire"}, {"fr": "maraîchage biointensif", "en": "biointensive market gardening", "doc_code": "P5", "strate": "P", "definition": "Système de production sur petite surface (1000-5000 m²) maximisant la densité de plantation, la diversité et le turnover. Planches permanentes, compostage intensif, rotations courtes. Références : Jean-Martin Fortier, Eliot Coleman.", "statut": "◆", "syn_fr": "maraîchage sur planches permanentes ; jardinage biointensif ; micro-maraîchage", "syn_en": "biointensive farming", "bt": "Système maraîcher durable", "type": "concept"}, {"fr": "maraîchage sur sol vivant", "en": "living soil market gardening", "doc_code": "P3", "strate": "P", "definition": "Système de maraîchage basé sur le non-labour, le paillage permanent et la stimulation de la vie biologique du sol. Mouvement MSV.", "statut": "◆", "type": "concept"}, {"fr": "micro-organismes efficaces", "en": "Effective Microorganisms", "doc_code": "P3", "strate": "P", "definition": "Consortium standardisé de micro-organismes fermenté (bactéries lactiques, levures, PNSB, actinomycètes) formulé par Teruo Higa (années 1980). Distinct des IMO (micro-organismes indigènes locaux du KNF). Les EM sont standardisés et reproductibles ; les IMO sont locaux et adaptés. Les EM introduisent une communauté exogène, les IMO amplifient la biologie présente.", "statut": "◆", "syn_fr": "EM · Effective Microorganisms", "syn_en": "EM ; EM · effective microorganisms", "bt": "inoculum microbien", "type": "concept"}, {"fr": "mulch", "en": "mulch", "doc_code": "P2", "strate": "P", "definition": "Couverture organique permanente du sol (paille, BRF, résidus). Réduit l'évaporation, tamponne la température, nourrit la faune.", "statut": "~", "syn_fr": "paillis ; couverture morte ; résidus de surface", "bt": "protection physique du sol", "type": "glossaire"}, {"fr": "niche partitioning", "en": "niche partitioning", "doc_code": "P4", "strate": "P", "definition": "Stratégie de diversification spatiale (étages racinaires à profondeurs complémentaires) et temporelle (rotations, successions) pour optimiser l'utilisation des ressources. Associer des plantes à pivots (radis, luzerne) et à chevelus (graminées) pour explorer 100% du profil de sol. Base théorique de la saturation des niches écologiques comme protection contre les pathogènes.", "statut": "◆", "syn_fr": "partage des ressources ; différenciation des niches ; complémentarité de niche", "rt": "biopuncture · couverts végétaux · suppressivité · résilience", "bt": "Interaction écologique", "type": "concept"}, {"fr": "non-labour", "en": "no-till", "doc_code": "P2", "strate": "P", "definition": "Suppression du travail du sol profond. Préserve les réseaux fongiques, les galeries biogènes et la stratification biologique. Pilier ACS.", "statut": "~", "syn_fr": "travail du sol nul ; semis direct intégral ; sans labour", "syn_en": "no-tillage", "bt": "technique culturale simplifiée", "type": "glossaire"}, {"fr": "nématodes", "en": "nematodes", "doc_code": "P1/V1", "strate": "P", "definition": "Vers microscopiques du sol organisés en guildes trophiques. L'indice de maturité de Bongers mesure la santé du réseau trophique.", "statut": "~", "syn_fr": "Nématofaune ; vers ronds microscopiques", "bt": "Microfaune du sol", "type": "glossaire"}, {"fr": "occultation (bâchage)", "en": "occultation (tarping)", "doc_code": "P5/P2", "strate": "P", "definition": "Couverture opaque. 6 mois vivaces, 1 mois annuelles. Alternative au labour.", "statut": "validé", "syn_fr": "couverture plastique ; bâchage ; solarisation ; faux-semis", "syn_en": "tarping ; soil tarping", "bt": "Technique de gestion des adventices", "type": "concept"}, {"fr": "phase de sevrage", "en": "weaning phase (transition)", "doc_code": "P5", "strate": "P", "definition": "Première phase de la chronoséquence de transition (0–2 ans). Arrêt des intrants chimiques, risque maximal de priming effect, creux productif temporaire (-10 à -30%). Le microbiome bascule de copiotrophes dépendants vers un début de diversification. Leviers : couverts multi-espèces, biostimulants fermentés.", "statut": "◆", "syn_fr": "phase de transition ; période d'adaptation ; sevrage des intrants", "syn_en": "transition phase", "bt": "Étape de conversion", "type": "concept"}, {"fr": "planche permanente", "en": "permanent raised bed", "doc_code": "P5", "strate": "P", "definition": "Planche de culture de 75-80 cm de large, jamais piétinée, jamais labourée. Le sol se structure biologiquement sur 3-5 ans : macroporosité biologique croissante, réseau mycorhizien continu, microbiome qui évolue vers un stade mature (dominance oligotrophes et champignons).", "statut": "◆", "syn_fr": "planche surélevée permanente ; planche de culture non labourée ; butte permanente", "syn_en": "permanent bed", "bt": "Infrastructure culturale", "type": "concept"}, {"fr": "plantes bio-indicatrices", "en": "bio-indicator plants", "doc_code": "P1", "strate": "P", "definition": "Flore spontanée dont la présence indique les conditions pédologiques (engorgement, compaction, excès d azote, acidité). Références : Gérard Ducerf. Le plantain (compaction), le rumex (engorgement), le mouron (sol riche en N). Complément du diagnostic physique et chimique.", "statut": "◆", "syn_fr": "Flore indicatrice ; plantes témoins des conditions de sol", "syn_en": "indicator species", "bt": "Indicateur écologique de terrain", "type": "concept"}, {"fr": "plantes hôtes intermédiaires", "en": "nurse crops (mycorrhizal host crops)", "doc_code": "P2", "strate": "P", "definition": "Espèces à forte mycotrophie (sorgho, millet, allium, lin) intercalées dans la rotation pour maintenir et amplifier les réseaux CMA. Particulièrement utiles avant cultures mycotrophes sensibles.", "statut": "◆", "syn_fr": "plantes relais de mycorhization ; cultures de renfort", "syn_en": "mycorrhizal host crops", "bt": "plante de service", "type": "concept"}, {"fr": "profil cultural", "en": "cultural profile", "doc_code": "P1", "strate": "P", "definition": "Méthode de diagnostic par ouverture d'une fosse ou tranchée pour analyser les horizons du sol, l'historique des pratiques (semelles de labour, zones compactées), la dynamique racinaire et l'activité biologique. Permet de visualiser la structure en 3D.", "statut": "◆", "syn_fr": "Méthode du profil cultural ; observation Manichon", "syn_en": "soil profile observation", "bt": "Diagnostic de structure au champ", "type": "concept"}, {"fr": "pâturage tournant dynamique", "en": "adaptive multi-paddock (AMP) grazing", "doc_code": "P4", "strate": "P", "definition": "Gestion intensive du pâturage par rotation rapide sur petites surfaces (1-3 jours) + longues périodes de repos (60-120 jours). Mime les grands troupeaux sauvages accompagnés de prédateurs. Stimule la croissance racinaire par le broutage et l'injection massive de C par la rhizodéposition après le repos. L'effet trampling incorpore mécaniquement MO et accélère la minéralisation.", "statut": "◆", "syn_fr": "pâturage holiste · AMP grazing ; pâturage adaptatif ; gestion dynamique de l'herbe ; AMP grazing", "syn_en": "AMP grazing · adaptive multi-paddock", "rt": "biomasse annuelle · rhizodéposition · cycle azote", "bt": "Gestion des prairies", "type": "concept"}, {"fr": "pénétrométrie", "en": "penetrometry", "doc_code": "P1", "strate": "P", "definition": "Mesure de la résistance mécanique du sol à la pénétration (en MPa). Permet de localiser les semelles de labour et les zones de compaction. Seuil critique : >2 MPa = enracinement bloqué. Variabilité selon l'humidité — toujours mesurer à capacité au champ.", "statut": "◆", "syn_fr": "Mesure de la résistance à la pénétration ; test de compactage", "syn_en": "soil strength measurement", "bt": "Propriété physique du sol", "type": "concept"}, {"fr": "période critique de colonisation mycorhizienne", "en": "critical period for mycorrhizal colonization", "doc_code": "P3", "strate": "P", "definition": "Fenêtre temporelle (2-4 semaines après levée) pendant laquelle l inoculation est la plus efficace. Après cette période, les racines sont lignifiées et la colonisation difficile.", "statut": "◆", "syn_fr": "fenêtre d'infection mycorhizienne ; stade de sensibilité à l'inoculation", "bt": "dynamique de la colonisation symbiotique", "type": "concept"}, {"fr": "ratio C/Argile", "en": "carbon-to-clay ratio", "doc_code": "P1/S1/P5", "strate": "P", "definition": "Rapport C organique/argile. Seuils Husson/Boivin : <12% dégradé, 17% limite, >24% bonne structure.", "statut": "validé", "syn_fr": "Rapport carbone sur argile ; indice de protection organique", "syn_en": "C/Clay ratio", "bt": "Indicateur de stockage de carbone", "type": "concept"}, {"fr": "ratio stœchiométrique NPS", "en": "NPS stoichiometric ratio", "doc_code": "P1", "strate": "P", "definition": "Pour 1 tonne de C humifié, il faut 83 kg N + 20 kg P + 14 kg S (Kirkby et al.). En apportant NPS en stœchiométrie sur les résidus de culture, le coefficient d'humification passe de 0.15 à 0.60 en 5 ans (+5.5 tC/ha vs -3 tC/ha sans NPS). Levier le plus puissant et le moins connu pour accélérer la séquestration de carbone. Permet de basculer les micro-organismes de stratégie A vers stratégie Y.", "statut": "◆", "syn_fr": "Ratio de Kirkby ; équilibre carbone-azote-phosphore-soufre", "syn_en": "Kirkby ratio", "bt": "Stœchiométrie de la matière organique", "type": "concept"}, {"fr": "remontée hydraulique", "en": "hydraulic lift (hydraulic redistribution)", "doc_code": "P4/S0", "strate": "P", "definition": "Transfert passif d'eau par les racines depuis les horizons humides vers les horizons secs, piloté par le gradient de potentiel hydrique. Phénomène surtout nocturne via les racines des arbres et graminées profondes, redistribuant l'eau des horizons profonds vers la surface par diffusion passive. Service hydrique majeur des systèmes agroforestiers en période de stress estival. Maintient l'activité microbienne en surface pendant la sécheresse. Impact sur le potentiel redox local : l'humectation nocturne modifie la disponibilité du P et du Fe.", "statut": "✓", "syn_fr": "redistribution hydraulique ; transfert d'eau passif par les racines", "syn_en": "hydraulic lift ; hydraulic redistribution", "inrae": "02. AGRICULTURE ET AGRONOMIE (correction alignement tracteur v2.2)", "rt": "CMN agroforestier · Salix · diagramme Eh-pH · réserve utile", "bt": "Flux hydrique sol-plante", "type": "concept"}, {"fr": "respiration basale du sol", "en": "basal soil respiration", "doc_code": "P1", "strate": "P", "definition": "Quantité de CO₂ dégagée par unité de sol et de temps, mesure de l'activité métabolique globale du microbiome. Test Solvita : mesure en 24h. Valeurs types : sol vivant 50–150 mg CO₂/kg/j, sol dégradé < 20 mg CO₂/kg/j.", "statut": "◆", "syn_fr": "Respiration microbienne de base ; flux de CO2 basal", "syn_en": "BSR", "bt": "Indicateur d'activité microbienne", "type": "concept"}, {"fr": "rhizobactéries", "en": "rhizobacteria", "doc_code": "P3", "strate": "P", "definition": "Bactéries de la rhizosphère à effet promoteur de croissance. Terme générique incluant les PGPR. Voir entrée S2 — PGPR pour la définition complète.", "statut": "✓", "syn_fr": "PGPR ; bactéries de la rhizosphère ; bactéries favorisant la croissance des plantes", "inrae": "12.02 NOTIONS LIÉES AUX ORGANISMES › bactérie (par type)", "rt": "PGPR · rhizosphère · ISR", "bt": "PGPR", "type": "concept"}, {"fr": "rotation et association", "en": "crop rotation and intercropping", "doc_code": "P5", "strate": "P", "definition": "Alternance des familles botaniques dans le temps (rotation) et combinaison d espèces complémentaires dans l espace (association). Réduit les pathogènes telluriques, diversifie les exsudats racinaires et optimise l utilisation des nutriments. Base du maraîchage biointensif.", "statut": "◆", "syn_fr": "assolement ; rotation des cultures ; association culturale ; polyculture", "syn_en": "rotation and association", "bt": "Principe agroécologique", "type": "concept"}, {"fr": "rotation sur prairie", "en": "prairie rotation", "doc_code": "P2", "strate": "P", "definition": "", "statut": "◆", "syn_fr": "alternance culture-prairie ; rotation incluant des prairies temporaires", "syn_en": "MSV rotation", "bt": "système de rotation culturale", "type": "concept"}, {"fr": "rotation sur prairie (MSV)", "en": "prairie rotation (MSV)", "doc_code": "P2/P5", "strate": "P", "definition": "2 ans prairie + 1 an bâche + 1 an paille. Autonomie MO, casse cycle adventices.", "statut": "validé", "type": "concept"}, {"fr": "roulage-crimpage", "en": "roller-crimping", "doc_code": "P2", "strate": "P", "definition": "Technique de destruction mécanique des couverts végétaux par pincement de la tige (rouleau crimper) sans coupe ni labour, créant un mulch plat protecteur. Intervenir au stade floraison pour garantir une destruction efficace et éviter les repousses (Vincent-Caboud, 2020). Préserve la macroporosité et les réseaux biologiques.", "statut": "◆", "syn_fr": "roulage-pliage ; destruction par rouleau hacheur", "rt": "couverts végétaux · mulch · ACS", "bt": "technique culturale de destruction des couverts", "type": "concept"}, {"fr": "régénération des sols", "en": "soil regeneration", "doc_code": "P5", "strate": "P", "definition": "Processus actif de restauration de la fertilité biologique, chimique et physique d'un sol dégradé par des pratiques régénératrices.", "statut": "◆", "type": "concept"}, {"fr": "résilience climatique", "en": "climate resilience", "doc_code": "P5", "strate": "P", "definition": "Capacité d'un système agricole à absorber les perturbations climatiques et à se réorganiser sans perdre ses fonctions essentielles.", "statut": "◆", "type": "concept"}, {"fr": "système silvopastoral", "en": "silvopastoral system", "doc_code": "P4", "strate": "P", "definition": "Intégration d arbres (fruitiers, fourragères, bois d œuvre) dans des prairies pâturées. Les arbres fournissent ombre (réduction stress thermique du bétail de 3-5°C), fourrage foliaire, brise-vent et séquestration carbone. Le pâturage entretient le sous-étage.", "statut": "◆", "syn_fr": "sylvopastoralisme ; agroforesterie d'élevage ; pâturage sous bois", "bt": "Agroforesterie", "type": "concept"}, {"fr": "séquence ERC", "en": "avoid-reduce-compensate sequence", "doc_code": "P4", "strate": "P", "definition": "Cadre réglementaire de protection de la biodiversité (Loi Biodiversité 2016). Éviter → Réduire → Compenser.", "statut": "◆", "type": "concept"}, {"fr": "test bêche", "en": "spade test", "doc_code": "P1", "strate": "P", "definition": "Diagnostic de terrain par prélèvement et observation d'un bloc de sol à 25-30 cm. Évalue simultanément la structure (mottes, fissures), l'enracinement (profondeur, ramification), la présence de vers de terre et la couleur (teneur en MO). Premier niveau de diagnostic avant toute analyse de laboratoire.", "statut": "◆", "syn_fr": "VESS ; test de la bêche ; examen de la structure en blocs", "syn_en": "VESS", "bt": "Diagnostic de terrain", "type": "concept"}, {"fr": "test de sédimentation (test bocal)", "en": "jar sedimentation test", "doc_code": "P1", "strate": "P", "definition": "Mise en suspension du sol dans l'eau pour estimer les proportions de sable (décante en 30s), limon (2h) et argile (24h). Méthode terrain rapide pour évaluer la texture et adapter les recommandations (CEC, RU, risque de battance).", "statut": "◆", "syn_fr": "Test du bocal ; sédimentation simplifiée", "syn_en": "soil texture jar test", "bt": "Analyse granulométrique simplifiée", "type": "concept"}, {"fr": "test ficelle GEPPA", "en": "GEPPA ribbon test", "doc_code": "P1", "strate": "P", "definition": "Test de terrain du Groupe d'Étude Pour les Problèmes de Pédologie Appliquée pour estimer la teneur en argile du sol. Humidifier une poignée de terre et former un boudin de 5-10 cm : s'il peut être courbé en anneau sans se rompre → > 18% d'argile. La plasticité et la cohésion orientent l'adaptation des pratiques (travail du sol, amendements). Gratuit, immédiat, accessible à tous les agriculteurs.", "statut": "◆", "syn_fr": "test ficelle · test du boudin ; Test du ruban ; détermination de la texture au toucher", "syn_en": "ribbon test · GEPPA test ; soil ribbon test", "inrae": "06. SCIENCES DE LA TERRE › 06.01 SCIENCES DU SOL", "rt": "texture · argiles · CEC", "bt": "Détermination de la texture au champ", "type": "concept"}, {"fr": "texture", "en": "texture", "doc_code": "P1", "strate": "P", "definition": "Proportions de sable, limon et argile. Détermine rétention d'eau, CEC, porosité. Test bocal ou granulométrie laser.", "statut": "~", "syn_fr": "Granulométrie du sol ; composition physique", "syn_en": "soil texture", "bt": "Constituant physique du sol", "type": "glossaire"}, {"fr": "thés de compost oxygénés", "en": "aerated compost tea (ACT)", "doc_code": "P3/P5", "strate": "P", "definition": "Extraits liquides de micro-organismes obtenus par macération d'un compost mûr sous bullage d'air continu pendant 24-48 heures. Sélectionne et multiplie les populations aérobies bénéfiques (Bacillus, Pseudomonas, Streptomyces). Apporte une charge biologique massive pour restaurer la vie microbienne après un stress. Application en pulvérisation foliaire ou au sol.", "statut": "◆", "syn_fr": "ACT · extrait de compost aéré ; extraits de compost aérés ; TCO ; jus de compost", "syn_en": "ACT · aerated compost tea ; ACT", "rt": "compostage · bio-inoculant · PGPR · ISR", "bt": "amendement liquide biologique", "type": "concept"}, {"fr": "trognes", "en": "pollarded trees", "doc_code": "P4", "strate": "P", "definition": "Arbres taillés régulièrement (têtards) pour la production de bois, fourrage et litière sur un pied fixe.", "statut": "◆", "type": "concept"}, {"fr": "télédétection agricole", "en": "agricultural remote sensing", "doc_code": "P1", "strate": "P", "definition": "Observation à distance (satellite, drone) pour le diagnostic parcellaire : NDVI, stress hydrique, biomasse.", "statut": "◆", "type": "concept"}, {"fr": "vitiforesterie", "en": "vineyard agroforestry", "doc_code": "P4", "strate": "P", "definition": "Intégration d'arbres dans les vignobles pour le microclimat, la biodiversité et la diversification.", "statut": "◆", "type": "concept"}, {"fr": "économie de la fonctionnalité", "en": "economy of functionality", "doc_code": "P5", "strate": "P", "definition": "Modèle économique basé sur l'usage partagé plutôt que la propriété individuelle. Objets haut de gamme (robustes, réparables) partagés au prix le plus bas. Résout simultanément le pouvoir d'achat, la sobriété et la durabilité. Exemples : bibliothèques d'objets, Décathlon seconde vie, Mobion. Bascule de l'abondance matérielle à l'abondance des interactions.", "statut": "◆", "syn_fr": "économie de service ; économie de l'usage ; modèle fonctionnel", "syn_en": "service economy", "bt": "Modèle économique", "type": "concept"}, {"fr": "évapotranspiration", "en": "evapotranspiration", "doc_code": "P2/S0", "strate": "P", "definition": "Perte d'eau du sol par évaporation directe et transpiration végétale. Réduite de 30-60% par le mulch.", "statut": "~", "syn_fr": "ET ; flux d'eau sol-plante-atmosphère", "bt": "bilan hydrique de la parcelle", "type": "glossaire"}, {"fr": "133 GtC", "en": "133 GtC soil carbon debt", "doc_code": "S4", "strate": "S", "definition": "Perte estimée de 133 GtC de carbone organique depuis l'apparition de l'agriculture intensive (Sanderman et al., 2017). Constitue la dette carbone de l'agriculture. Restaurable à hauteur de 4‰/an par des pratiques régénératrices sur les sols cultivés.", "statut": "◆", "syn_fr": "dette historique de carbone du sol ; perte de carbone globale", "syn_en": "historical soil carbon loss", "rt": "séquestration carbone · COS · carbon farming · Anthropocène", "bt": "cycle global du carbone", "type": "concept"}, {"fr": "AOA", "en": "ammonia-oxidizing archaea (AOA)", "doc_code": "S2", "strate": "S", "definition": "Archées oxydant l ammonium en nitrite (NH₄⁺→NO₂⁻) via archée ammonia monooxygenase (amoA). Dominent la nitrification dans les sols acides et oligotrophes. Thaumarchaeota (TACK superphylum).", "statut": "◆", "syn_fr": "archées oxydantes de l'ammoniac ; archées nitrifiantes", "syn_en": "AOA", "bt": "micro-organismes nitrifiants", "type": "concept"}, {"fr": "Acidobacteria", "en": "Acidobacteria", "doc_code": "S2", "strate": "S", "definition": "Phylum bactérien dominant des sols (15-30% des communautés), stratège K oligotrophe, prospérant en sols acides. Contribue à la décomposition de la MO récalcitrante. Bioindicateur de sols stables peu perturbés.", "statut": "◆", "syn_fr": "Acidobactéries", "rt": "oligotrophes · Proteobacteria · ratio F/B", "bt": "phyla bactériens", "type": "concept"}, {"fr": "Actinobacteria", "en": "Actinobacteria", "doc_code": "S2", "strate": "S", "definition": "Phylum bactérien filamenteux, décomposeurs spécialisés de MO récalcitrante (cellulose, chitine, lignine). Producteurs d'antibiotiques naturels majeurs (streptomycine, tétracycline). Bioindicateur de sols matures. Le genre Streptomyces est le principal agent de suppressivité spécifique.", "statut": "✓", "syn_fr": "actinobactérie ; Actinobactéries", "syn_en": "Actinomycetes (terme historique)", "inrae": "12.01 TAXONOMIE D'ORGANISMES VIVANTS › Bacteria", "rt": "suppressivité · oligotrophes · biocontrôle", "bt": "bactéries Gram-positives", "type": "concept"}, {"fr": "Adsorption", "en": "adsorption", "doc_code": "S1/S4", "strate": "S", "definition": "Fixation réversible de molécules ou d'ions à la surface des colloïdes du sol (argiles, oxydes Fe/Al, MO) par forces électrostatiques, liaisons hydrogène ou interactions hydrophobes. L'adsorption contrôle la rétention des cations nutritifs (CEC), l'immobilisation du phosphate sur les oxydes Fe/Al et la stabilisation de la MO sur les surfaces minérales (MAOM). La matière organique augmente l'adsorption par sa charge négative et sa surface spécifique élevée. Gérer l'adsorption par le pH et la MO optimise la disponibilité nutritive.", "statut": "◆", "syn_fr": "sorption · fixation ionique", "syn_en": "adsorption · sorption", "inrae": "10. CHIMIE › 10.01 CHIMIE ANALYTIQUE, PROCESSUS ET RÉACTIONS CHIMIQUES", "rt": "CEC · MAOM · oxydes Fe/Al · phosphore", "bt": "phénomène d'interface physico-chimique", "type": "concept"}, {"fr": "Azospirillum", "en": "Azospirillum", "doc_code": "S2", "strate": "S", "definition": "PGPR fixateur d'azote associatif vivant dans la rhizosphère des graminées. Stimule la croissance végétale par production d'auxines et amélioration de l'absorption hydrique. Bio-inoculant largement utilisé.", "statut": "◆", "rt": "PGPR · fixation azote · rhizosphère", "bt": "bactérie fixatrice d'azote non-symbiotique", "type": "concept"}, {"fr": "Azotobacter", "en": "Azotobacter", "doc_code": "S2", "strate": "S", "definition": "Genre bactérien aérobie fixateur d'azote libre (non-symbiotique). Produit des phytohormones (auxines, gibbérellines) et des sidérophores. Bioindicateur de sols aérés et riches en MO.", "statut": "◆", "rt": "fixation azote · PGPR · diazotrophe", "bt": "bactérie fixatrice d'azote libre", "type": "concept"}, {"fr": "Bactéries Solubilisatrices (ex: PSB)", "en": "Phosphate-Solubilizing Bacteria (PSB)", "doc_code": "S2", "strate": "S", "definition": "Micro-organismes capables de transformer des minéraux insolubles (comme le phosphore bloqué ou le fer) en formes directement assimilables par la plante via la sécrétion d'acides organiques ou de sidérophores (Delaporte‐Quintana et al., 2020).\n\nEnjeu : Elles permettent de réduire la dépendance aux engrais phosphatés en débloquant les réserves historiques du sol.\n\nLevier de décision : Inoculer ces bactéries (via des extraits fermentés ou des thés de compost) lors du semis pour garantir une nutrition précoce sans apport d'engrais starter soluble qui inhibe les mycorhizes.", "statut": "◆", "syn_fr": "bactéries solubilisatrices du phosphate ; BSP", "syn_en": "PSB", "bt": "rhizobactéries promotrices de la croissance végétale", "type": "concept"}, {"fr": "Bradyrhizobium", "en": "Bradyrhizobium", "doc_code": "S2", "strate": "S", "definition": "Rhizobium à croissance lente, partenaire symbiotique des soja, arachide et lupin. Tolérant l'acidité et les sols pauvres en N.", "statut": "✓", "inrae": "12.01 TAXONOMIE D'ORGANISMES VIVANTS › Bacteria", "rt": "Rhizobium · fixation azote", "bt": "Rhizobiaceae", "type": "concept"}, {"fr": "CEC", "en": "CEC", "doc_code": "S1", "strate": "S", "definition": "Capacité d'échange cationique. Quantité de cations (Ca²⁺, Mg²⁺, K⁺, Na⁺, H⁺) qu'un sol peut retenir sur ses sites d'échange (argiles, MO). Exprimée en cmol+/kg.", "statut": "~", "syn_fr": "Capacité d'Échange Cationique ; T (capacité totale)", "syn_en": "CEC", "bt": "propriété physico-chimique du sol", "type": "glossaire"}, {"fr": "CMA (champignons mycorhiziens à arbuscules) / Glomeromycota", "en": "AMF (arbuscular mycorrhizal fungi) / Glomeromycota", "doc_code": "S3", "strate": "S", "definition": "Champignons mycorhiziens à arbuscules (phylum Glomeromycota) formant des structures d'échange (arbuscules) à l'intérieur des cellules corticales racinaires. Échangent phosphore, zinc, cuivre et eau contre jusqu'à 30% du carbone photosynthétique de la plante. Colonisent 80% des plantes terrestres. Synthétisent la glomaline, ciment des agrégats. La teneur en P soluble >50 mg/kg et le travail du sol inhibent leur développement.", "statut": "~", "syn_fr": "champignons mycorhiziens arbusculaires ; champignons mycorhizogènes à arbuscule ; endomycorhizes à arbuscules", "syn_en": "AMF · arbuscular mycorrhizal fungi ; AM fungi", "inrae": "12. ORGANISMES VIVANTS › 12.02 NOTIONS LIÉES AUX ORGANISMES › mycorhize (correction v2.2)", "rt": "glomaline · LCO/facteurs Myc · CMN · phosphore · Glomeromycota", "bt": "Glomeromycota", "type": "concept"}, {"fr": "CMN", "en": "common mycorrhizal network", "doc_code": "S3", "strate": "S", "definition": "Réseau fongique mycorhizien inter-espèces reliant plusieurs plantes via les hyphes. Transfère C, N, eau et signaux chimiques entre plantes connectées. Constitue l'infrastructure de communication souterraine de l'écosystème. La richesse du CMN corrèle avec la productivité et la résilience de l'agroécosystème.", "statut": "◆", "syn_fr": "réseaux mycorhiziens communs ; réseaux mycéliens communs ; réseaux communs mycéliens", "syn_en": "CMN", "rt": "CMA · ECM · hydraulic lift · agroforesterie", "bt": "interaction biotique", "type": "concept"}, {"fr": "CNPS", "en": "soil C:N:P:S stoichiometry", "doc_code": "S4", "strate": "S", "definition": "Équilibre stœchiométrique des éléments C, N, P, S dans les apports organiques et le sol. Complément de la stœchiométrie de Kirkby : le CNPS élargi intègre S comme 4ème élément limitant. Un apport de C sans S en proportion correcte ne permettra pas une humification complète.", "statut": "≈", "syn_fr": "stœchiométrie carbone-azote-phosphore-soufre", "syn_en": "elemental stoichiometry", "inrae": "10. CHIMIE › 10.01 CHIMIE ANALYTIQUE", "rt": "stœchiométrie de Kirkby · stœchiométrie C/N · humification", "bt": "stœchiométrie écologique", "type": "concept"}, {"fr": "COS", "en": "SOC", "doc_code": "S4", "strate": "S", "definition": "Carbone organique du sol. Stock total de carbone dans la matière organique, mesuré en % ou t C/ha. Indicateur central de la santé du sol.", "statut": "~", "syn_fr": "Carbone Organique du
