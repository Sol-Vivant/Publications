fication": "La dilution nutritionnelle (Rosier et al. 2025) documentée en H1 est un coût externalisé majeur non inclus dans les 12 000 Mds$/an d'externalités de F2 §II. Son inclusion renforcerait considérablement l'argument économique.", "doc_source": "F2 L'Économie du Vivant §II (Externalités invisibles)", "doc_cible": "H1 Sol, Alimentation et Santé Humaine §I (Dilution nutritionnelle)"}, {"doc_code_source": "F2", "section_source": "IV", "doc_code_cible": "P1", "section_cible": "III", "pour_concept": "Indicateurs biologiques comme métriques de valorisation du capital sol", "justification": "F2 développe le concept de capital biologique mais manque de métriques concrètes pour le valoriser comptablement. P1 fournit les outils de mesure (PLFA pour la biomasse microbienne, Chao1 pour la richesse, Bongers pour la maturité du réseau trophique). Le renvoi explicite permettrait de proposer une", "doc_source": "F2 L'Économie du Vivant §IV (Capital biologique comme actif de bilan)", "doc_cible": "P1 Diagnostic du Sol Vivant §III (PLFA, Chao1, indice de Bongers)"}, {"doc_code_source": "F2", "section_source": null, "doc_code_cible": "P5", "section_cible": null, "pour_concept": "capital biologique et chronoséquence économique", "justification": "F2 §IV capital biologique / P5 §V trajectoire économique maraîchage — même argument économique", "doc_source": "F2", "doc_cible": "P5"}, {"doc_code_source": "F2", "section_source": null, "doc_code_cible": "S4", "section_cible": "I", "pour_concept": "Base scientifique pour la certification des crédits carbone", "justification": "F2 mentionne le carbon farming comme nouveau levier de revenu mais ne renvoie pas au modèle RothC de S4 qui est l'outil de simulation utilisé pour certifier ces crédits. Sans cette référence, l'argument économique manque de fondement méthodologique.", "doc_source": "F2 L'Économie du Vivant", "doc_cible": "S4 Le Carbone et les Grands Cycles §I (modèle RothC)"}, {"doc_code_source": "F2", "section_source": "IV", "doc_code_cible": "S4", "section_cible": null, "pour_concept": "Simulation de la trajectoire carbone sur 10 ans pour valoriser le capital biologique", "justification": "Le capital biologique (F2) doit être quantifié par un outil de simulation (RothC, S4) pour passer du concept philosophique à l'actif comptable. F2 doit renvoyer à S4 pour le mode de calcul et la certification des crédits carbone.", "doc_source": "F2 L'Économie du Vivant §IV (Capital biologique comme actif de bilan)", "doc_cible": "S4 Le Carbone et les Grands Cycles (modèle RothC)"}, {"doc_code_source": "F2", "section_source": "V", "doc_code_cible": "V2", "section_cible": "V", "pour_concept": "L'hologénome comme mécanisme biologique de l'antifragilité", "justification": "L'antifragilité (F2) est un concept économique emprunté à Taleb. Son mécanisme biologique est l'hologénome (V2) : un holobionte diversifié s'adapte plus vite qu'un organisme isolé parce que son microbiome apporte une plasticité immédiate. F2 doit renvoyer à V2 pour le fondement biologique de l'antif", "doc_source": "F2 L'Économie du Vivant §V (Antifragilité)", "doc_cible": "V2 L'Holobionte Plante-Microbiome §V (Hologénome)"}, {"doc_code_source": "F2", "section_source": "I", "doc_code_cible": "V3", "section_cible": "I", "pour_concept": "EROI des fermentations à la ferme", "justification": "F2 démontre le coût énergétique ruineux du Haber-Bosch (1-2% énergie mondiale). V3 démontre que les fermentations conservent 93-100% du C et N sans énergie fossile. Le contraste EROI Haber-Bosch (~5:1 déclinant) vs EROI fermentations (potentiellement >100:1) est l'argument économique le plus percuta", "doc_source": "F2 L'Économie du Vivant §I (EROI, Haber-Bosch)", "doc_cible": "V3 Les Fermentations Microbiennes §I (Thermodynamique fermentation vs compostage)"}, {"doc_code_source": "H1", "section_source": null, "doc_code_cible": "H2", "section_cible": null, "pour_concept": "densité nutritionnelle et microbiome intestinal", "justification": "H1 qualité nutritionnelle aliments ↔ H2 substrats microbiome — lien direct", "doc_source": "H1", "doc_cible": "H2"}, {"doc_code_source": "H1", "section_source": null, "doc_code_cible": "P5", "section_cible": null, "pour_concept": "Chronoséquence nutritionnelle : la densité nutritionnelle évolue avec les 4 phases de transition", "justification": "Retour P5→H. La qualité nutritionnelle (H1) est un indicateur de progression dans la transition (P5).", "doc_source": "H1", "doc_cible": "P5"}, {"doc_code_source": "H1", "section_source": "III", "doc_code_cible": "S1", "section_cible": "II", "pour_concept": "CEC comme déterminant de la composition minérale des aliments", "justification": "Les 5 carences documentées (Zn, Fe, Mg, Se, I) dépendent directement de la CEC du sol et de l'intégrité du CAH. Un sol à faible CEC (sables, kaolinite) ou à CAH dégradé (pH acide) ne peut pas fournir ces cations aux plantes, quelle que soit la qualité du microbiome. H1 doit référencer S1 pour montre", "doc_source": "H1 Sol, Alimentation et Santé Humaine §III (Carences chroniques)", "doc_cible": "S1 Architecture du Sol §II (CEC, Complexe Argilo-Humique)"}, {"doc_code_source": "H1", "section_source": null, "doc_code_cible": "S3", "section_cible": "II", "pour_concept": "Rôle des mycorhizes dans la biodisponibilité des minéraux des aliments", "justification": "H1 mentionne les minéraux biodisponibles comme indicateur de densité nutritionnelle (Rosier et al. 2025) mais ne renvoie pas aux CMA de S3 qui sont le principal vecteur de transport du P, Zn et Cu vers les racines. La densité minérale des aliments est directement corrélée à l'intégrité du réseau mycorhizien.", "doc_source": "H1 Sol, Alimentation et Santé Humaine", "doc_cible": "S3 Le Microbiome Fongique et Mycorhizien §II (CMA, transport de nutriments)"}, {"doc_code_source": "H1", "section_source": null, "doc_code_cible": "V2", "section_cible": "V", "pour_concept": "Mécanisme d'induction des polyphénols par le microbiome du sol", "justification": "H1 mentionne la richesse en polyphénols des aliments issus de sols vivants (Feliziani et al. 2025) mais ne renvoie pas au mécanisme biologique (ISR/SAR) qui en est la cause, détaillé dans V2. Le lecteur de H1 ne peut pas comprendre pourquoi un sol vivant produit plus de polyphénols sans cette référence.", "doc_source": "H1 Sol, Alimentation et Santé Humaine", "doc_cible": "V2 L'Holobionte Plante-Microbiome §V (ISR/SAR)"}, {"doc_code_source": "H1", "section_source": "II", "doc_code_cible": "V2", "section_cible": "III", "pour_concept": "Le cycle de la rhizophagie comme mécanisme direct de transfert de nutriments microbiens vers la plante", "justification": "Le cycle de la rhizophagie est le mécanisme par lequel la plante 'digère' les microbes pour en extraire N, P et oligoéléments. C'est le lien le plus direct entre la richesse microbienne du sol et la densité nutritionnelle de l'aliment. H1 doit renvoyer à V2§III pour le mécanisme détaillé.", "doc_source": "H1 Sol, Alimentation et Santé Humaine §II (Mécanismes biologiques de la densité nutritionnelle)", "doc_cible": "V2 L'Holobionte Plante-Microbiome §III (Cycle de la rhizophagie)"}, {"doc_code_source": "H1", "section_source": "II", "doc_code_cible": "V2", "section_cible": "III", "pour_concept": "Rhizophagie comme vecteur de transfert d'azote, phosphore et micronutriments microbiens vers le grain", "justification": "Le renvoi est identifié dans la cartographie mais H1 doit expliciter le mécanisme : la plante ne se contente pas d'absorber des ions du sol — elle cultive, ingère et digère des microbes entiers via la rhizophagie, récupérant leur contenu en N, P, Fe, Zn sous forme organique (donc bio-accessible). Ce", "doc_source": "H1 Sol, Alimentation et Santé Humaine §II (Mécanismes biologiques densité nutritionnelle)", "doc_cible": "V2 L'Holobionte Plante-Microbiome §III (Cycle de la rhizophagie)"}, {"doc_code_source": "H1", "section_source": null, "doc_code_cible": "V3", "section_cible": null, "pour_concept": "L'acide 3-phényllactique (V3) active l'ISR qui produit les polyphénols augmentant la densité nutritionnelle", "justification": "Retour V3→H. Le PLA documenté en V3 est le mécanisme causal de la densité nutritionnelle décrite en H1.", "doc_source": "H1", "doc_cible": "V3"}, {"doc_code_source": "H2", "section_source": "II", "doc_code_cible": "F2", "section_cible": "II", "pour_concept": "Loi de la Trophobiose comme mécanisme amont de la pression de sélection AMR", "justification": "La boucle de dégradation C11 montre que l'excès d'azote Haber-Bosch → Trophobiose → usage compensatoire pesticides → pression de sélection ARG. H2 §II doit référencer F2 §II pour documenter l'origine agronomique de la crise AMR.", "doc_source": "H2 Résistances Antimicrobiennes §II (Pression de sélection)", "doc_cible": "F2 L'Économie du Vivant §II (Loi de la Trophobiose)"}, {"doc_code_source": "H2", "section_source": null, "doc_code_cible": "H1", "section_cible": null, "pour_concept": "La densité nutritionnelle des aliments (H1) détermine les substrats disponibles pour le microbiome intestinal", "justification": "Retour H↔H. Le microbiome intestinal (H2) dépend de la qualité nutritionnelle (H1).", "doc_source": "H2", "doc_cible": "H1"}, {"doc_code_source": "H2", "section_source": null, "doc_code_cible": "H3", "section_cible": null, "pour_concept": "diversité microbiome intestinal et AMR", "justification": "H2 diversité microbiome intestinal comme rempart ↔ H3 résistance antimicrobienne", "doc_source": "H2", "doc_cible": "H3"}, {"doc_code_source": "H2", "section_source": null, "doc_code_cible": "P3", "section_cible": null, "pour_concept": "Vigilance THG : les inoculums fermentés peuvent transférer des gènes de résistance aux antibiotiques", "justification": "Retour P3→H. Le risque ARG des biostimulants (P3) est documenté en détail dans H2.", "doc_source": "H2", "doc_cible": "P3"}, {"doc_code_source": "H2", "section_source": null, "doc_code_cible": "S2", "section_cible": "I", "pour_concept": "Diversité microbienne comme barrière contre la propagation des ARG", "justification": "H2 traite les ARG comme un risque sanitaire mais ne renvoie pas à S2 pour le mécanisme par lequel un sol diversifié dilue la pression de sélection des résistances. La compétition interspécifique et la saturation des niches (Bommarco et al. 2012) réduisent la fréquence des gènes de résistance dans les communautés microbiennes complexes.", "doc_source": "H2 Résistances Antimicrobiennes", "doc_cible": "S2 Le Microbiome du Sol §I (Diversité fonctionnelle et suppressivité)"}, {"doc_code_source": "H2", "section_source": "I", "doc_code_cible": "V1", "section_cible": "IV", "pour_concept": "La phagie microbienne comme mécanisme de contrôle biologique des populations bactériennes résistantes", "justification": "La prédation par les protozoaires et nématodes bactérivores (V1) est un mécanisme de régulation des populations bactériennes qui limite la prolifération des souches résistantes. H2 doit intégrer cette régulation top-down comme un levier biologique contre la dissémination des ARG, complémentaire de l", "doc_source": "H2 Résistances Antimicrobiennes §I (Résistome du sol)", "doc_cible": "V1 La Faune du Sol §IV (Réseau trophique)"}, {"doc_code_source": "H2", "section_source": null, "doc_code_cible": "V3", "section_cible": null, "pour_concept": "Risque ARG des LAB : les plasmides conjugatifs des Lactobacillus sont un vecteur de transfert horizontal", "justification": "Retour V3→H. Vigilance : les LAB présentées comme bénéfiques en V3 portent un risque ARG documenté en H2.", "doc_source": "H2", "doc_cible": "V3"}, {"doc_code_source": "H3", "section_source": "I", "doc_code_cible": "F1", "section_cible": "III", "pour_concept": "Les microsites anoxiques du sol comme explication évolutive de la convergence sol-intestin", "justification": "La convergence des microbiomes (mêmes phyla dominants sol/intestin) s'explique par la conservation des mêmes niches physicochimiques anaérobies depuis 3,8 Ga. F1 §III fournit le fondement évolutif de la convergence documentée par Ma et al. (2025) en H3 §I.", "doc_source": "H3 Le Microbiome Global §I (Convergence des microbiomes)", "doc_cible": "F1 Le Temps Long §III (Anaérobiose universelle dans le vivant actuel)"}, {"doc_code_source": "H3", "section_source": null, "doc_code_cible": "H2", "section_cible": null, "pour_concept": "La diversité du microbiome intestinal est le premier rempart contre la propagation des ARG", "justification": "Retour H↔H. La résistance antimicrobienne (H3) est modulée par la diversité microbienne (H2).", "doc_source": "H3", "doc_cible": "H2"}, {"doc_code_source": "H3", "section_source": null, "doc_code_cible": "P1", "section_cible": null, "pour_concept": "Le ratio F/B du sol est un proxy de la qualité nutritionnelle potentielle des récoltes", "justification": "Retour P1→H. Le diagnostic (P1) peut prédire la qualité sanitaire (H3) via le ratio F/B.", "doc_source": "H3", "doc_cible": "P1"}, {"doc_code_source": "H3", "section_source": null, "doc_code_cible": "P3", "section_cible": null, "pour_concept": "Les ARG documentées en H3 s'appliquent aux biostimulants fermentés de P3", "justification": "Retour P3→H. Le cadre AMR de H3 s'applique directement aux pratiques de P3.", "doc_source": "H3", "doc_cible": "P3"}, {"doc_code_source": "H3", "section_source": "I", "doc_code_cible": "S2", "section_cible": "I", "pour_concept": "Homologie copiotrophes/oligotrophes sol ↔ Bacteroidetes/Firmicutes intestin", "justification": "H3 documente la convergence entre microbiomes du sol et de l'intestin mais ne formalise pas le parallèle stratégique le plus opérant : copiotrophes sol (excès N soluble) = Bacteroidetes intestin (sucres simples), oligotrophes sol (humus stable) = Firmicutes butyrategènes (fibres complexes). Ce paral", "doc_source": "H3 Le Microbiome Global §I (Convergence microbiomes)", "doc_cible": "S2 Le Microbiome du Sol §I (Copiotrophes/oligotrophes)"}, {"doc_code_source": "H3", "section_source": null, "doc_code_cible": "V2", "section_cible": "IV", "pour_concept": "Mécanisme de colonisation endophytique comme vecteur de transmission sol-humain", "justification": "H3 postule le transfert de microbes du sol vers l'intestin humain via les plantes (Ma et al. 2025, Duarte et al. 2024) mais ne décrit pas le mécanisme par lequel les bactéries pénètrent les tissus végétaux (rhizophagie, White et al. 2018). Sans cette référence, l'axe sol-plante-intestin reste une corrélation sans mécanisme causal.", "doc_source": "H3 Le Microbiome Global", "doc_cible": "V2 L'Holobionte Plante-Microbiome §IV (Cycle de la Rhizophagie)"}, {"doc_code_source": "H3", "section_source": "II", "doc_code_cible": "V3", "section_cible": "IV", "pour_concept": "Les aliments fermentés comme vecteurs de transmission directe des consortia microbiens du sol vers l'intestin", "justification": "La chaîne C4 (F1→H3) documente la continuité des voies fermentaires, mais H3 §II doit explicitement relier la consommation d'aliments fermentés (produits par les mêmes LAB que le Bokashi, V3 §IV) à la colonisation du microbiote intestinal. Les aliments fermentés sont le pendant alimentaire des biost", "doc_source": "H3 Le Microbiome Global §II (Continuum sol-plante-intestin)", "doc_cible": "V3 Les Fermentations Microbiennes §IV (Bokashi, EM, succession microbienne)"}, {"doc_code_source": "H3", "section_source": "I", "doc_code_cible": "V3", "section_cible": "V", "pour_concept": "Homologie des voies fermentaires sol-intestin", "justification": "H3 documente la convergence sol-intestin. V3 documente les mêmes genres bactériens (Lactobacillus, Leuconostoc) dans le bokashi et les aliments fermentés. Les mêmes voies métaboliques (production de SCFA, acide lactique) fonctionnent identiquement dans le sol, le bocal de fermentation et le côlon. H", "doc_source": "H3 Le Microbiome Global §I (Convergence des microbiomes)", "doc_cible": "V3 Les Fermentations Microbiennes §V (Lactofermentation du sol à l'assiette)"}, {"doc_code_source": "P1", "section_source": "III", "doc_code_cible": "H3", "section_cible": "II", "pour_concept": "Ratio F/B du sol comme proxy de la qualité nutritionnelle potentielle des récoltes", "justification": "Un ratio F/B élevé dans le sol (dominance fongique) indique une succession écologique avancée, un stockage de carbone stable, et une production accrue de métabolites secondaires par la plante (stimulée par les CMA). Ce ratio, mesurable en routine par PLFA, pourrait donc servir de proxy terrain pour ", "doc_source": "P1 Diagnostic du Sol Vivant §III (PLFA, ratio F/B)", "doc_cible": "H3 Le Microbiome Global §II (Continuum sol-intestin)"}, {"doc_code_source": "P1", "section_source": null, "doc_code_cible": "P5", "section_cible": null, "pour_concept": "diagnostic adapté au maraîchage", "justification": "P1 outils diagnostic généraux → P5 maraîchage biointensif (protocoles adaptés)", "doc_source": "P1", "doc_cible": "P5"}, {"doc_code_source": "P1", "section_source": "I", "doc_code_cible": "S1", "section_cible": "II", "pour_concept": "Implications de la texture sur la CEC et la surface spécifique", "justification": "Le test ficelle GEPPA (P1) donne une estimation de la teneur en argile, mais son interprétation agronomique dépend de la connaissance de la minéralogie (illite vs kaolinite), de la surface spécifique et de la CEC qui en découlent. P1 doit renvoyer à S1 pour l'interprétation fonctionnelle de la textu", "doc_source": "P1 Diagnostic du Sol Vivant §I (Classification textures GEPPA)", "doc_cible": "S1 Architecture du Sol §II (CEC, surface spécifique)"}, {"doc_code_source": "P1", "section_source": null, "doc_code_cible": "S2", "section_cible": null, "pour_concept": "Les indicateurs PLFA et Chao1 du diagnostic mesurent directement les guildes fonctionnelles de S2", "justification": "Retour cascade N5→N4. Le diagnostic (P1) interprète les données du microbiome (S2).", "doc_source": "P1", "doc_cible": "S2"}, {"doc_code_source": "P1", "section_source": "III", "doc_code_cible": "S3", "section_cible": "IV", "pour_concept": "Interprétation agronomique du ratio F/B dans le contexte de la succession écologique fongique", "justification": "P1 §III fournit le protocole de mesure PLFA et les seuils, mais l'interprétation biologique du ratio F/B nécessite le cadre de succession fongique de S3 §IV. Un ratio F/B de 0,3 ne signifie pas la même chose en sol sableux pionnier qu'en sol argileux post-labour. Le renvoi P1→S3 est indispensable po", "doc_source": "P1 Diagnostic du Sol Vivant §III (PLFA, Chao1, ratio F/B)", "doc_cible": "S3 Le Microbiome Fongique et Mycorhizien §IV (Ratio F/B et succession fongique)"}, {"doc_code_source": "P2", "section_source": null, "doc_code_cible": "S0", "section_cible": null, "pour_concept": "Couverts : infiltration ×1.5-5, évaporation -24-32%", "justification": null, "doc_source": "P2 Agriculture de Conservation", "doc_cible": "S0 L'Eau dans le Sol Vivant"}, {"doc_code_source": "P2", "section_source": "I", "doc_code_cible": "S1", "section_cible": null, "pour_concept": "Le non-labour et le mulch comme prévention de l'hystérésis hydrique", "justification": "Le maintien d'un taux d'humidité résiduelle sous le couvert végétal (glossaire S1) est un bénéfice direct du mulch permanent (P2). Sans ce lien, l'argument pour le non-labour reste incomplet : il ne s'agit pas seulement de protéger les pores mais d'éviter le point de non-retour hydrophobe qui rend l", "doc_source": "P2 Agriculture de Conservation §I (Non-labour)", "doc_cible": "S1 Architecture du Sol (Hystérésis hydrique)"}, {"doc_code_source": "P2", "section_source": null, "doc_code_cible": "S2", "section_cible": "II", "pour_concept": "Stœchiométrie complète C:N:P:S des couverts végétaux", "justification": "P2 discute du ratio C/N pour éviter la faim d'azote mais ne mentionne pas les ratios P et S nécessaires à la formation d'humus stable selon Kirkby. Les recommandations de mélange de couverts doivent intégrer la stœchiométrie complète définie dans S2.", "doc_source": "P2 Agriculture de Conservation", "doc_cible": "S2 Le Microbiome du Sol §II (Stœchiométrie de Kirkby)"}, {"doc_code_source": "P2", "section_source": null, "doc_code_cible": "S3", "section_cible": null, "pour_concept": "couverts mycorhizogènes et CMN", "justification": "P2 §III choix couverts → S3 §III CMN — couverts mycorhizogènes maintiennent le réseau", "doc_source": "P2", "doc_cible": "S3"}, {"doc_code_source": "P2", "section_source": "I", "doc_code_cible": "S4", "section_cible": "II", "pour_concept": "Le non-labour préserve les microsites anoxiques essentiels au couplage nitrification/dénitrification", "justification": "Le labour homogénéise l'aération du sol et détruit les microsites anoxiques (gradients Eh, S4 §II). Ce sont ces microsites qui permettent le couplage nitrification/dénitrification et la réduction des pertes de N2O. Le renvoi P2→S4 est manquant et fondamental pour expliquer pourquoi le non-labour réd", "doc_source": "P2 Agriculture de Conservation §I (Non-labour, macroporosité biologique)", "doc_cible": "S4 Le Carbone et les Grands Cycles §II (Microsites anoxiques, potentiel redox)"}, {"doc_code_source": "P2", "section_source": null, "doc_code_cible": "V1", "section_cible": "II", "pour_concept": "Bio-tillage comme complément au non-labour", "justification": "P2 prescrit l'absence de travail du sol mais ne formalise pas le rôle des vers de terre anéciques comme agents de bio-tillage (Zhang & Peng 2020) qui assurent naturellement la décompaction et la macroporosité que le labour tentait de créer. Cette référence croisée renforce l'argument du non-labour.", "doc_source": "P2 Agriculture de Conservation", "doc_cible": "V1 La Faune du Sol §II (Vers de terre anéciques)"}, {"doc_code_source": "P2", "section_source": "I", "doc_code_cible": "V1", "section_cible": "II", "pour_concept": "Bio-tillage : les galeries de vers anéciques comme remplacement fonctionnel du sous-solage mécanique", "justification": "Le renvoi est identifié mais P2 doit quantifier : un vers anécique (Lumbricus terrestris) creuse des galeries de 1-2 m de profondeur, d'un diamètre de 8-11 mm, tapissées de mucus riche en azote. Ces galeries persistent des années en non-labour et servent de guide aux racines, d'infiltration préféren", "doc_source": "P2 Agriculture de Conservation §I (Non-labour)", "doc_cible": "V1 La Faune du Sol §II (Vers de terre anéciques)"}, {"doc_code_source": "P2", "section_source": null, "doc_code_cible": "V2", "section_cible": null, "pour_concept": "design couvert pour recrutement microbien", "justification": "P2 couverts multi-espèces ↔ V2 recrutement sélectif microbiome — lien direct", "doc_source": "P2", "doc_cible": "V2"}, {"doc_code_source": "P3", "section_source": null, "doc_code_cible": "H2", "section_cible": "III", "pour_concept": "Risque de transfert horizontal de gènes de résistance via inoculums fermentés", "justification": "P3 recommande l'usage de consortia microbiens fermentés sans évaluer le risque de THG d'ARG. H2 traite la vigilance ARG mais ne mentionne pas spécifiquement les biostimulants. Une référence croisée bidirectionnelle est nécessaire pour garantir la biosécurité des préparations.", "doc_source": "P3 Biostimulants et Fermentations Appliquées", "doc_cible": "H2 Résistances Antimicrobiennes §III"}, {"doc_code_source": "P3", "section_source": null, "doc_code_cible": "H3", "section_cible": null, "pour_concept": "risque ARG des biostimulants fermentés", "justification": "P3 mentionne risque ARG mais H3 traite les ARG en détail — renvoi à corriger", "doc_source": "P3", "doc_cible": "H3"}, {"doc_code_source": "P3", "section_source": null, "doc_code_cible": "S2", "section_cible": "I", "pour_concept": "Impact des biostimulants fermentés sur l'équilibre copiotrophes/oligotrophes", "justification": "Les biostimulants apportent du carbone labile qui favorise les copiotrophes (croissance rapide, consommation rapide du COS). P3 doit renvoyer à S2 pour que le praticien comprenne que l'effet à court terme (stimulation copiotrophique) peut être contradictoire avec l'objectif à long terme (dominance oligotrophique et stabilité du carbone).", "doc_source": "P3 Biostimulants et Fermentations Appliquées", "doc_cible": "S2 Le Microbiome du Sol §I (Guildes fonctionnelles, ratio copiotrophes/oligotrophes)"}, {"doc_code_source": "P3", "section_source": null, "doc_code_cible": "S4", "section_cible": "I", "pour_concept": "Risque de Priming Effect lors d'apports de carbone labile fermenté", "justification": "P3 recommande des apports de Bokashi et fermentations riches en sucres simples et acides organiques sans mentionner le risque de déstockage du carbone stable par Priming Effect (Cardinael et al. 2016). Un encadré d'avertissement dans P3 doit renvoyer au mécanisme détaillé dans S4.", "doc_source": "P3 Biostimulants et Fermentations Appliquées", "doc_cible": "S4 Le Carbone et les Grands Cycles §I (Priming Effect)"}, {"doc_code_source": "P3", "section_source": null, "doc_code_cible": "S4", "section_cible": null, "pour_concept": "bokashi et potentiel redox", "justification": "P3 §IV.1 bokashi amendent biologique ↔ S4 §II.1 potentiel redox", "doc_source": "P3", "doc_cible": "S4"}, {"doc_code_source": "P3", "section_source": "I", "doc_code_cible": "V2", "section_cible": "IV", "pour_concept": "La dernière étape de la chaîne S→M→M→P passe par le cycle de rhizophagie pour l'absorption effective des nutriments microbiens", "justification": "Le modèle S→M→M→P (Substrat→Métabolites→Microbiome→Plante) de P3 §I s'arrête à 'Plante' sans détailler le mécanisme d'absorption. Or V2 §IV montre que l'absorption passe par la rhizophagie (internalisation bactérienne + extraction nutriments par ROS). Ce renvoi complète mécaniquement la chaîne opéra", "doc_source": "P3 Biostimulants et Fermentations Appliquées §I (Chaîne S→M→M→P)", "doc_cible": "V2 L'Holobionte Plante-Microbiome §IV (Cycle de la rhizophagie)"}, {"doc_code_source": "P3", "section_source": "I", "doc_code_cible": "V2", "section_cible": "II", "pour_concept": "Les mécanismes hormonaux (ACC désaminase, IAA) comme base de l'efficacité des biostimulants", "justification": "L'efficacité des biostimulants fermentés (P3) repose sur des mécanismes hormonaux décrits en V2 : production d'ACC désaminase qui désamorce le stress éthylénique, production d'IAA qui stimule l'enracinement. P3 doit renvoyer à V2 pour que l'agriculteur comprenne pourquoi son biostimulant fonctionne.", "doc_source": "P3 Biostimulants et Fermentations Appliquées §I", "doc_cible": "V2 L'Holobionte Plante-Microbiome §II (Orchestration hormonale)"}, {"doc_code_source": "P4", "section_source": null, "doc_code_cible": "F1", "section_cible": "III", "pour_concept": "L'agroforesterie comme accélérateur de la succession écologique du sol", "justification": "L'agroforesterie introduit des composants ligneux qui font évoluer le sol du stade pionnier bactérien vers le stade fongique stable (glossaire F1). P4 doit renvoyer à F1 pour le cadre théorique de la succession écologique qui justifie l'introduction d'arbres dans les parcelles.", "doc_source": "P4 Agroforesterie et Systèmes Pérennes", "doc_cible": "F1 Le Temps Long §III (Succession écologique)"}, {"doc_code_source": "P4", "section_source": null, "doc_code_cible": "S0", "section_cible": null, "pour_concept": "remontée hydraulique et résilience hydrique", "justification": "P4 §II.2 hydraulic lift arbres ↔ S0 §III.2 hydraulic lift — même mécanisme, deux échelles", "doc_source": "P4", "doc_cible": "S0"}, {"doc_code_source": "P4", "section_source": "II", "doc_code_cible": "S1", "section_cible": null, "pour_concept": "L'hydraulic lift comme mécanisme de prévention de l'hystérésis hydrique en surface", "justification": "L'hystérésis hydrique (seuil hydrophobe du sol sec) est documentée en S1 mais non reliée au mécanisme de prévention naturel qu'est l'hydraulic lift (P4 §II). Ce renvoi bidirectionnel est critique pour les systèmes en zone sèche.", "doc_source": "P4 Agroforesterie et Systèmes Pérennes §II (Hydraulic lift)", "doc_cible": "S1 Architecture du Sol (Hystérésis hydrique)"}, {"doc_code_source": "P4", "section_source": null, "doc_code_cible": "S4", "section_cible": "II", "pour_concept": "Impact de l'hydraulic lift sur les conditions redox de surface", "justification": "P4 décrit l'hydraulic lift comme redistribution hydrique mais ne mentionne pas son impact sur le Eh local qui modifie la disponibilité du P et du Fe. S4 fournit le cadre redox nécessaire pour comprendre cet effet collatéral bénéfique.", "doc_source": "P4 Agroforesterie et Systèmes Pérennes", "doc_cible": "S4 Le Carbone et les Grands Cycles §II (Potentiel redox)"}, {"doc_code_source": "P4", "section_source": null, "doc_code_cible": "V2", "section_cible": "V", "pour_concept": "L'arbre comme réservoir permanent d'hologénome pour les cultures annuelles adjacentes", "justification": "P4 décrit l'agroforesterie principalement sous l'angle physique (hydraulic lift, ombrage, brise-vent). Le rôle de l'arbre comme 'banque d'inoculum vivant permanent' hébergeant un hologénome mature et diversifié, capable de recoloniser les cultures annuelles via le CMN à chaque saison, est un argumen", "doc_source": "P4 Agroforesterie et Systèmes Pérennes", "doc_cible": "V2 L'Holobionte Plante-Microbiome §V (Hologénome)"}, {"doc_code_source": "P5", "section_source": null, "doc_code_cible": "F2", "section_cible": "II", "pour_concept": "Valorisation économique de la trajectoire de transition", "justification": "P5 décrit les 4 phases de la transition et les objectifs biologiques mais ne renvoie pas au cadre économique de F2 qui permet de convertir chaque gain biologique en valeur monétaire. Le praticien en transition a besoin de voir simultanément le gain biologique et le gain économique.", "doc_source": "P5 La Transition", "doc_cible": "F2 L'Économie du Vivant §II (Capital biologique comme actif de bilan)"}, {"doc_code_source": "P5", "section_source": "II", "doc_code_cible": "H1", "section_cible": "IV", "pour_concept": "Chronoséquence nutritionnelle de la transition : évolution de la densité nutritionnelle des récoltes sur 10 ans", "justification": "P5 documente les 4 phases de la transition sous l'angle agronomique et économique. H1 documente les indicateurs de qualité nutritionnelle (Brix, analyse minérale). La connexion manquante : à chaque phase de transition correspond un niveau attendu de densité nutritionnelle. Phase 1 : baisse possible.", "doc_source": "P5 La Transition §II (Chronoséquence 4 phases)", "doc_cible": "H1 Sol, Alimentation et Santé Humaine §IV (Indicateurs qualité nutritionnelle)"}, {"doc_code_source": "P5", "section_source": null, "doc_code_cible": "P1", "section_cible": null, "pour_concept": "Indicateurs de base pour positionner l'exploitation sur la chronoséquence de transition", "justification": "P5 décrit les 4 phases de transition et les objectifs de progression (+0,1% MO/an) mais ne renvoie pas explicitement aux outils de diagnostic de P1 (VESS, PLFA, Chao1) nécessaires pour évaluer la phase actuelle. Le praticien doit savoir quel diagnostic faire avant de choisir sa trajectoire.", "doc_source": "P5 La Transition", "doc_cible": "P1 Diagnostic du Sol Vivant"}, {"doc_code_source": "P5", "section_source": null, "doc_code_cible": "S2", "section_cible": null, "pour_concept": "Le ratio copiotrophes/oligotrophes positionne l'exploitation sur la chronoséquence de transition", "justification": "Retour S2→P5. Les guildes fonctionnelles (S2) sont des marqueurs de la phase de transition (P5).", "doc_source": "P5", "doc_cible": "S2"}, {"doc_code_source": "P5", "section_source": "II", "doc_code_cible": "S3", "section_cible": "IV", "pour_concept": "Ratio F/B comme indicateur biologique de positionnement sur la chronoséquence", "justification": "Les 4 phases de transition de P5 correspondent directement à des seuils de ratio F/B mesurables par PLFA (S3 §IV). Ce renvoi transforme la chronoséquence conceptuelle en trajectoire mesurable.", "doc_source": "P5 La Transition §II (Chronoséquence 4 phases)", "doc_cible": "S3 Le Microbiome Fongique et Mycorhizien §IV (Ratio F/B et succession fongique)"}, {"doc_code_source": "P5", "section_source": "II", "doc_code_cible": "S4", "section_cible": "IV", "pour_concept": "Risque maximal de Priming Effect en Phase 1 de la transition", "justification": "La Phase 1 (sevrage) est la période de vulnérabilité maximale au Priming Effect car le sol est biologiquement appauvri mais contient encore du COS ancien. Un apport massif de C labile peut provoquer un déstockage net. Avertissement critique manquant dans P5.", "doc_source": "P5 La Transition §II (Phase 1 Sevrage)", "doc_cible": "S4 Le Carbone et les Grands Cycles §IV (Priming Effect)"}, {"doc_code_source": "P5", "section_source": null, "doc_code_cible": "V1", "section_cible": null, "pour_concept": "L'indice de maturité de Bongers (nématodes) positionne l'exploitation sur la chronoséquence", "justification": "Retour V1→P5. L'indice de Bongers (V1) est un indicateur de maturité écosystémique corrélé à la transition (P5).", "doc_source": "P5", "doc_cible": "V1"}, {"doc_code_source": "S0", "section_source": null, "doc_code_cible": "S2", "section_cible": null, "pour_concept": "films eau et activité microbienne", "justification": "S0 §IV films d eau comme habitat microbien ↔ S2 activité microbienne dans les pores", "doc_source": "S0", "doc_cible": "S2"}, {"doc_code_source": "S0", "section_source": null, "doc_code_cible": "V1", "section_cible": null, "pour_concept": "macroporosité biologique et biopores", "justification": "S0 §II.1 macropores biologiques ↔ V1 §I.3 galeries vers anéciques", "doc_source": "S0", "doc_cible": "V1"}, {"doc_code_source": "S1", "section_source": null, "doc_code_cible": "S0", "section_cible": null, "pour_concept": "agrégats et rétention hydrique", "justification": "Structure des agrégats (S1 §II.1) conditionne la rétention hydrique (S0) — connexion fondamentale", "doc_source": "S1", "doc_cible": "S0"}, {"doc_code_source": "S1", "section_source": null, "doc_code_cible": "S3", "section_cible": "II.3", "pour_concept": "Agents biologiques de stabilisation des agrégats", "justification": "S1 décrit la structure physique du sol sans biologie (par design), mais doit au minimum renvoyer vers S3 pour les colles biologiques (glomaline, biofilms) qui sont responsables de 60-70% de la stabilité des macro-agrégats (Wu et al. 2014). Sans cette référence, S1 donne une vision incomplète de la stabilité structurale.", "doc_source": "S1 Architecture du Sol", "doc_cible": "S3 Le Microbiome Fongique et Mycorhizien §II.3 (GRSP/Glomaline)"}, {"doc_code_source": "S1", "section_source": "II", "doc_code_cible": "S4", "section_cible": "I", "pour_concept": "La MAOM se forme par adsorption sur les surfaces du CAH — la CEC et la surface spécifique conditionnent la capacité de stabilisation du carbone", "justification": "La formation de MAOM (S4 §I) dépend directement de la surface spécifique et des sites d'adsorption du CAH (S1 §II). Un sol à forte CEC peut stabiliser plus de MAOM qu'un sol sableux à faible CEC. Ce renvoi est le lien physico-chimique entre l'architecture du sol et la séquestration du carbone.", "doc_source": "S1 Architecture du Sol §II (CEC, CAH)", "doc_cible": "S4 Le Carbone et les Grands Cycles §I (MAOM, pompe microbienne)"}, {"doc_code_source": "S1", "section_source": "III", "doc_code_cible": "V1", "section_cible": "I", "pour_concept": "Macroporosité biologique créée par les vers de terre comme composante de la structure", "justification": "Le renvoi existant P2→V1 traite du bio-tillage comme pratique, mais S1 doit référencer V1 comme mécanisme fondamental de la porosité structurale du sol. Les galeries anéciques ne sont pas une technique — elles sont un composant de l'architecture du sol au même titre que les argiles.", "doc_source": "S1 Architecture du Sol §III (Structure, agrégats, porosité)", "doc_cible": "V1 La Faune du Sol §I (Vers anéciques, bio-tillage)"}, {"doc_code_source": "S2", "section_source": null, "doc_code_cible": "P1", "section_cible": null, "pour_concept": "indicateurs PLFA/Chao1 et diagnostic", "justification": "S2 guildes + indicateurs → P1 interprétation — algorithme de décision manquant", "doc_source": "S2", "doc_cible": "P1"}, {"doc_code_source": "S2", "section_source": null, "doc_code_cible": "P3", "section_cible": null, "pour_concept": "diagnostic microbien → choix biostimulant", "justification": "S2 guildes microbiennes → P3 biostimulants — l algorithme de décision manque", "doc_source": "S2", "doc_cible": "P3"}, {"doc_code_source": "S2", "section_source": "I", "doc_code_cible": "P5", "section_cible": "II", "pour_concept": "Ratio copiotrophes/oligotrophes comme indicateur de positionnement sur la chronoséquence de transition", "justification": "Les copiotrophes dominent en Phase 1 (sevrage, sols perturbés, excès N minéral). Les oligotrophes augmentent progressivement vers la Phase 4 (antifragilité). Le ratio copiotrophes/oligotrophes (Fierer et al. 2007) est un indicateur complémentaire au ratio F/B pour le pilotage de la transition.", "doc_source": "S2 Le Microbiome du Sol §I (Guildes fonctionnelles, copiotrophes/oligotrophes)", "doc_cible": "P5 La Transition §II (Chronoséquence 4 phases)"}, {"doc_code_source": "S2", "section_source": null, "doc_code_cible": "S0", "section_cible": null, "pour_concept": "Les films d'eau contrôlent l'activité microbienne — prérequis hydraulique du microbiome", "justification": "Retour cascade N4→N0. Le microbiome (S2) dépend de l'eau (S0) comme prérequis absolu.", "doc_source": "S2", "doc_cible": "S0"}, {"doc_code_source": "S2", "section_source": null, "doc_code_cible": "S4", "section_cible": null, "pour_concept": "priming effect et copiotrophes", "justification": "Priming effect (S4) mécanistiquement lié au ratio copiotrophes/oligotrophes (S2 §I.1). Lien bidirectionnel.", "doc_source": "S2", "doc_cible": "S4"}, {"doc_code_source": "S2", "section_source": null, "doc_code_cible": "V1", "section_cible": "IV", "pour_concept": "Régulation top-down du microbiome par la prédation", "justification": "S2 décrit les guildes bactériennes et leur dynamique mais ne mentionne pas la régulation par les prédateurs (nématodes, protozoaires, collemboles). Martinez-Reyes et al. 2021 montrent que la prédation par Colpoda sp. stimule la fixation d'azote. La faune (V1) est un régulateur essentiel du microbiome (S2) et cette connexion top-down est absente.", "doc_source": "S2 Le Microbiome du Sol", "doc_cible": "V1 La Faune du Sol §IV (Nématodes bactérivores)"}, {"doc_code_source": "S2", "section_source": "I", "doc_code_cible": "V2", "section_cible": "I", "pour_concept": "Les exsudats racinaires comme déterminants de la structure des guildes microbiennes", "justification": "La composition des guildes fonctionnelles (copiotrophes vs oligotrophes, S2) est directement modulée par le profil d'exsudats racinaires (V2). Des exsudats riches en sucres simples favorisent les copiotrophes r-stratèges ; des exsudats complexes (acides organiques, strigolactones) recrutent les olig", "doc_source": "S2 Le Microbiome du Sol §I (Guildes fonctionnelles)", "doc_cible": "V2 L'Holobionte Plante-Microbiome §I (Exsudats racinaires)"}, {"doc_code_source": "S2", "section_source": "I", "doc_code_cible": "V3", "section_cible": "III", "pour_concept": "Correspondance entre guildes fonctionnelles du sol et groupes fonctionnels des EM", "justification": "S2 décrit les guildes fonctionnelles du sol (solubilisateurs, fixateurs, décomposeurs). V3 décrit les groupes fonctionnels des EM (LAB, levures, PNSB). Le renvoi explicite permettrait de montrer que les EM ne sont pas un 'ajout magique' mais la réintroduction ciblée de guildes fonctionnelles identif", "doc_source": "S2 Le Microbiome du Sol §I (Guildes fonctionnelles)", "doc_cible": "V3 Les Fermentations Microbiennes §III (EM, LAB, levures, PNSB)"}, {"doc_code_source": "S3", "section_source": "I", "doc_code_cible": "F1", "section_cible": "II", "pour_concept": "Conservation phylogénétique de la signalisation LCO/facteurs Myc depuis 407 Ma", "justification": "La voie de signalisation symbiotique commune (SYMRK/DMI) documentée en S3 §I est conservée depuis le Rhynie Chert documenté en F1 §II. Ce renvoi ancre la biologie moléculaire de la mycorhization dans son histoire évolutive et renforce la thèse centrale de F1.", "doc_source": "S3 Le Microbiome Fongique et Mycorhizien §I (CMA, strigolactones, LCO)", "doc_cible": "F1 Le Temps Long §II (Rhynie Chert, premières mycorhizes)"}, {"doc_code_source": "S3", "section_source": "II", "doc_code_cible": "P2", "section_cible": null, "pour_concept": "Les couverts multi-espèces comme maintien du CMN pendant l'interculture", "justification": "Les CMA ont besoin de racines vivantes pour survivre. Les couverts multi-espèces (P2) maintiennent des hôtes mycorhiziens permanents qui préservent le CMN. S3 doit renvoyer à P2 pour la pratique concrète de maintien des réseaux fongiques.", "doc_source": "S3 Le Microbiome Fongique et Mycorhizien §II (CMA, transport nutriments)", "doc_cible": "P2 Agriculture de Conservation (Couverts végétaux multi-espèces)"}, {"doc_code_source": "S3", "section_source": null, "doc_code_cible": "P3", "section_cible": null, "pour_concept": "CEP et lutte biologique par conservation (CBC)", "justification": null, "doc_source": "S3 Le Microbiome Fongique et Mycorhizien", "doc_cible": "P3 Biostimulants et Fermentations Appliquées"}, {"doc_code_source": "S3", "section_source": null, "doc_code_cible": "P4", "section_cible": null, "pour_concept": "CMN agroforestier comme extension pratique des réseaux mycorhiziens", "justification": "S3 décrit les CMN comme mécanisme de transfert de ressources entre plantes et P4 utilise les CMN en contexte agroforestier. Mais S3 ne mentionne pas l'agroforesterie comme le contexte pratique où les CMN sont les plus développés et les plus fonctionnels, ce qui limiterait la compréhension du lecteur de S3 qui ne lirait pas P4.", "doc_source": "S3 Le Microbiome Fongique et Mycorhizien", "doc_cible": "P4 Agroforesterie et Systèmes Pérennes"}, {"doc_code_source": "S3", "section_source": null, "doc_code_cible": "P4", "section_cible": null, "pour_concept": "CMN agroforestier et oxalate-carbonate", "justification": "CMN agroforestier (P4 §II.1) lié à voie oxalate-carbonate (S4) via ECM — connexion à expliciter", "doc_source": "S3", "doc_cible": "P4"}, {"doc_code_source": "S3", "section_source": null, "doc_code_cible": "P5", "section_cible": null, "pour_concept": "Le ratio F/B (PLFA) positionne l'exploitation sur la chronoséquence des 4 phases", "justification": "Retour P5→S. Le ratio F/B (S3) est l'indicateur biologique de positionnement sur la chronoséquence (P5).", "doc_source": "S3", "doc_cible": "P5"}, {"doc_code_source": "S3", "section_source": null, "doc_code_cible": "S1", "section_cible": null, "pour_concept": "Les agents biologiques (hyphes, EPS, glomaline) stabilisent les agrégats décrits dans S1", "justification": "Retour cascade N4→N1. Les champignons (S3) sont les principaux agents de stabilisation de la structure (S1).", "doc_source": "S3", "doc_cible": "S1"}, {"doc_code_source": "S3", "section_source": null, "doc_code_cible": "V2", "section_cible": null, "pour_concept": "Endophytisme CEP : colonisation tissus végétaux et transfert N insecte→plante", "justification": null, "doc_source": "S3 Le Microbiome Fongique et Mycorhizien", "doc_cible": "V2 L'Holobionte Plante-Microbiome"}, {"doc_code_source": "S4", "section_source": null, "doc_code_cible": "F2", "section_cible": null, "pour_concept": "bilan carbone net et EROI agricole", "justification": "S4 séquestration C (4‰/an) ↔ F2 EROI et externalités agricoles — argument chiffré", "doc_source": "S4", "doc_cible": "F2"}, {"doc_code_source": "S4", "section_source": null, "doc_code_cible": "P2", "section_cible": null, "pour_concept": "Stœchiométrie CNPS : choix couverts et amendements", "justification": null, "doc_source": "S4 Le Carbone et les Grands Cycles", "doc_cible": "P2 Agriculture de Conservation"}, {"doc_code_source": "S4", "section_source": null, "doc_code_cible": "P3", "section_cible": null, "pour_concept": "priming effect et risque biostimulants", "justification": "S4 §IV priming effect ↔ P3 §V limites biostimulants — lien mécaniste direct manquant", "doc_source": "S4", "doc_cible": "P3"}, {"doc_code_source": "S4", "section_source": null, "doc_code_cible": "P5", "section_cible": null, "pour_concept": "Risque maximal de Priming Effect en Phase 1 (sevrage) — vigilance sur les apports de C labile", "justification": "Retour P5→S. Vigilance : le priming effect (S4) est maximal en Phase 1 de transition (P5).", "doc_source": "S4", "doc_cible": "P5"}, {"doc_code_source": "S4", "section_source": "II", "doc_code_cible": "S1", "section_cible": null, "pour_concept": "Fixation du phosphore sur les oxydes Fe/Al comme mécanisme de blocage", "justification": "Le cycle du phosphore (S4) est limité par la fixation sur les oxydes Fe/Al (glossaire S1). S4 doit renvoyer à S1 pour les propriétés physico-chimiques des oxydes qui conditionnent la biodisponibilité du phosphore.", "doc_source": "S4 Le Carbone et les Grands Cycles §II (Cycle du phosphore)", "doc_cible": "S1 Architecture du Sol (Oxydes Fe/Al)"}, {"doc_code_source": "S4", "section_source": "I", "doc_code_cible": "V1", "section_cible": "IV", "pour_concept": "Régulation faunistique du priming effect", "justification": "Le priming effect est présenté dans S4 comme un phénomène exclusivement microbien. Or, la mésofaune prédatrice (nématodes bactérivores, protozoaires, collemboles) régule la vitesse de turnover microbien et donc l'intensité du priming. Un réseau trophique complet module le priming, un sol sans prédat", "doc_source": "S4 Le Carbone et les Grands Cycles §I (Priming Effect)", "doc_cible": "V1 La Faune du Sol §IV (Réseau trophique, phagie microbienne)"}, {"doc_code_source": "S4", "section_source": "III", "doc_code_cible": "V2", "section_cible": "II", "pour_concept": "Exsudats racinaires comme déclencheurs de la solubilisation biologique du phosphore fixé sur les oxydes Fe/Al", "justification": "Le cycle du phosphore (S4 §III) décrit les PSB et la solubilisation via acides organiques, mais le déclencheur est le SIREM racinaire (V2 §II) : la plante carencée en P sécrète des strigolactones et des acides organiques spécifiques pour recruter les PSB. Ce couplage S4↔V2 est essentiel pour compren", "doc_source": "S4 Le Carbone et les Grands Cycles §III (Cycle du phosphore)", "doc_cible": "V2 L'Holobionte Plante-Microbiome §II (SIREM, exsudats racinaires)"}, {"doc_code_source": "V1", "section_source": "II", "doc_code_cible": "H2", "section_cible": "II", "pour_concept": "Indice de maturité de Bongers comme proxy terrain du risque AMR", "justification": "Un indice de Bongers bas (dominance r-stratèges) signale un sol sous forte pression de sélection chimique — la même pression qui sélectionne les ARG documentés en H2 §II. Ce renvoi V1→H2 transforme un indicateur faunistique en outil d'évaluation du risque sanitaire.", "doc_source": "V1 La Faune du Sol §II (Nématodes, indice de Bongers)", "doc_cible": "H2 Résistances Antimicrobiennes §II (Pression de sélection)"}, {"doc_code_source": "V1", "section_source": "III", "doc_code_cible": "P5", "section_cible": "II", "pour_concept": "Indice de maturité de Bongers comme indicateur de positionnement sur la chronoséquence", "justification": "L'indice de Bongers augmente avec la maturité de l'écosystème. Il devrait être corrélé aux 4 phases de la transition (P5) : Phase 1 (MI < 1,5), Phase 2 (MI 1,5–2,0), Phase 3 (MI 2,0–2,5), Phase 4 (MI > 2,5). V1 doit renvoyer à P5 pour cette calibration pratique.", "doc_source": "V1 La Faune du Sol §III (Nématodes, indice de Bongers)", "doc_cible": "P5 La Transition §II (Chronoséquence 4 phases)"}, {"doc_code_source": "V1", "section_source": null, "doc_code_cible": "S0", "section_cible": null, "pour_concept": "biopores et conductivité hydraulique", "justification": "Les galeries de vers anéciques (V1 §I.3) sont la source principale des biopores — connexion explicite avec conductivité hydraulique (S0)", "doc_source": "V1", "doc_cible": "S0"}, {"doc_code_source": "V1", "section_source": "IV", "doc_code_cible": "S4", "section_cible": "I", "pour_concept": "Phagie microbienne comme moteur du turnover et de la production de nécromasse stabilisée en MAOM", "justification": "La boucle microbienne décrite en V1 §IV est le mécanisme biologique amont de la pompe microbienne à carbone de S4 §I. Sans prédation (V1), pas de turnover, pas de nécromasse, pas de MAOM. Ce renvoi est absent des 20 identifiés et constitue le chaînon manquant de C7.", "doc_source": "V1 La Faune du Sol §IV (Réseau trophique intégré)", "doc_cible": "S4 Le Carbone et les Grands Cycles §I (POC, MAOM, pompe microbienne)"}, {"doc_code_source": "V2", "section_source": "IV", "doc_code_cible": "H1", "section_cible": "II", "pour_concept": "Les polyphénols produits par ISR/SAR comme nutriments protecteurs pour l'humain", "justification": "L'activation de l'ISR par le microbiome produit des polyphénols et flavonoïdes dans la plante. Ces mêmes molécules sont les agents anti-inflammatoires et anti-oxydants qui protègent la santé humaine (H1). V2 doit renvoyer à H1 pour montrer que le mécanisme de défense de la plante est simultanément u", "doc_source": "V2 L'Holobionte Plante-Microbiome §IV (ISR/SAR)", "doc_cible": "H1 Sol, Alimentation et Santé Humaine §II (Métabolites secondaires et antioxydants)"}, {"doc_code_source": "V2", "section_source": null, "doc_code_cible": "H1", "section_cible": null, "pour_concept": "ISR et densité nutritionnelle", "justification": "Activation ISR/SAR (V2 §IV) induit synthèse polyphénols et métabolites secondaires — lien direct avec densité nutritionnelle H1", "doc_source": "V2", "doc_cible": "H1"}, {"doc_code_source": "V2", "section_source": "IV", "doc_code_cible": "H2", "section_cible": "III", "pour_concept": "ISR/SAR comme alternative fonctionnelle aux fongicides réduisant la pression de sélection ARG", "justification": "V2 décrit les mécanismes de défense induits par le microbiome (ISR/SAR). H2 décrit la pression de sélection chimique comme moteur de l'AMR. La connexion explicite est : activer ISR/SAR → réduire les traitements fongicides → réduire la pression de sélection sur le résistome → réduire l'AMR. Ce renvoi", "doc_source": "V2 L'Holobionte Plante-Microbiome §IV (ISR/SAR)", "doc_cible": "H2 Résistances Antimicrobiennes §III (ACS comme rempart)"}, {"doc_code_source": "V2", "section_source": null, "doc_code_cible": "H2", "section_cible": null, "pour_concept": "continuum holobionte plante → humain", "justification": "V2 holobionte plante+microbiome ↔ H2 microbiome intestinal — même concept, deux échelles", "doc_source": "V2", "doc_cible": "H2"}, {"doc_code_source": "V2", "section_source": null, "doc_code_cible": "H3", "section_cible": null, "pour_concept": "Le cycle de rhizophagie (colonisation endophytique) est le mécanisme de transmission sol→plante→humain", "justification": "Retour H3→V2. Le mécanisme de colonisation endophytique (V2) explique le vecteur de transmission postulé en H3.", "doc_source": "V2", "doc_cible": "H3"}, {"doc_code_source": "V2", "section_source": null, "doc_code_cible": "P2", "section_cible": null, "pour_concept": "Le recrutement microbien par chimiotactisme explique pourquoi la diversité des couverts ACS améliore le microbiome", "justification": "Retour même niveau N5. V2 fournit le mécanisme biologique de ce que P2 prescrit en pratique.", "doc_source": "V2", "doc_cible": "P2"}, {"doc_code_source": "V2", "section_source": null, "doc_code_cible": "P3", "section_cible": null, "pour_concept": "Mécanismes hormonaux (ACC désaminase, IAA) et cycle de rhizophagie comme fondements de l'efficacité des biostimulants", "justification": "Retour cascade N5→N3. V2 décrit les mécanismes que P3 applique — le lecteur de V2 doit savoir que P3 en fait l'application pratique.", "doc_source": "V2", "doc_cible": "P3"}, {"doc_code_source": "V2", "section_source": null, "doc_code_cible": "S2", "section_cible": "IV", "pour_concept": "Fixation biologique de l'azote comme service rendu par le microbiome de l'holobionte", "justification": "V2 décrit le recrutement sélectif du microbiome par la plante mais ne renvoie pas explicitement aux mécanismes de fixation de N décrits dans S2. La fixation d'azote par les rhizobia et les bactéries libres est le service écosystémique le plus quantifiable du concept d'holobionte et justifie les 30-40% de légumineuses recommandés dans les rotations.", "doc_source": "V2 L'Holobionte Plante-Microbiome", "doc_cible": "S2 Le Microbiome du Sol §IV (Cycle de l'azote)"}, {"doc_code_source": "V2", "section_source": "II", "doc_code_cible": "S3", "section_cible": "I", "pour_concept": "Strigolactones comme cas spécifique de SIREM pour le recrutement des CMA", "justification": "Le SIREM est le mécanisme général de recrutement microbien par les exsudats ; les strigolactones sont le cas spécifique pour les CMA. V2 §II doit renvoyer explicitement à S3 §I pour le détail moléculaire de cette signalisation.", "doc_source": "V2 L'Holobionte Plante-Microbiome §II (SIREM, exsudats)", "doc_cible": "S3 Le Microbiome Fongique et Mycorhizien §I (Strigolactones, signalisation CMA)"}, {"doc_code_source": "V2", "section_source": null, "doc_code_cible": "S4", "section_cible": null, "pour_concept": "Les exsudats racinaires déclenchent la solubilisation biologique du phosphore décrite dans S4", "justification": "Retour cascade N5→N3. L'holobionte (V2) pilote les cycles biogéochimiques (S4) via les exsudats.", "doc_source": "V2", "doc_cible": "S4"}, {"doc_code_source": "V2", "section_source": null, "doc_code_cible": "V3", "section_cible": "IV", "pour_concept": "Métabolites fermentaires comme signaux hormonaux pour l'holobionte", "justification": "V2 décrit l'orchestration hormonale de l'holobionte (auxines, cytokinines) mais ne mentionne pas l'acide 3-phényllactique (Maki et al. 2021) qui agit comme promoteur d'enracinement latéral avec un effet synergique au tryptophane. Ce métabolite fermentaire est un pont direct entre les préparations de V3 et la réponse de l'holobionte de V2.", "doc_source": "V2 L'Holobionte Plante-Microbiome", "doc_cible": "V3 Les Fermentations Microbiennes §IV (Acide 3-phényllactique)"}, {"doc_code_source": "V3", "section_source": "III", "doc_code_cible": "H1", "section_cible": "II", "pour_concept": "L'acide 3-phényllactique comme éliciteur de l'ISR produisant des polyphénols de défense mesurables dans l'aliment", "justification": "Le PLA (Jaffar et al. 2023, Maki et al. 2021) documenté en V3 §III ne stimule pas seulement l'enracinement — il active la voie JA qui déclenche l'ISR (V2 §III) et in fine la production de polyphénols mesurables dans l'aliment (H1 §II). Ce renvoi complète la chaîne fermentation→densité nutritionnelle", "doc_source": "V3 Les Fermentations Microbiennes §III (LAB, acide 3-phényllactique)", "doc_cible": "H1 Sol, Alimentation et Santé Humaine §II (ISR/SAR et phytochimie fonctionnelle)"}, {"doc_code_source": "V3", "section_source": null, "doc_code_cible": "H1", "section_cible": null, "pour_concept": "métabolites fermentés et densité nutritionnelle", "justification": "V3 production métabolites secondaires → H1 densité nutritionnelle", "doc_source": "V3", "doc_cible": "H1"}, {"doc_code_source": "V3", "section_source": "V", "doc_code_cible": "H2", "section_cible": "II", "pour_concept": "Risque ARG dans les fermentations LAB : plasmides conjugatifs des Lactobacillus", "justification": "V3 présente les LAB comme universellement bénéfiques. H2 documente le risque de THG. La connexion explicite est nécessaire : les LAB possèdent des plasmides conjugatifs (résistance tétracycline, érythromycine) qui peuvent être transférés à des pathogènes intestinaux si les substrats de fermentation ", "doc_source": "V3 Les Fermentations Microbiennes §V (Lactofermentation du sol à l'assiette)", "doc_cible": "H2 Résistances Antimicrobiennes §II (THG, transfert horizontal de gènes)"}, {"doc_code_source": "V3", "section_source": null, "doc_code_cible": "H2", "section_cible": null, "pour_concept": "métabolites fermentaires et microbiome intestinal", "justification": "Métabolites des fermentations agricoles (V3) → microbiome intestinal (H2) : acide lactique, acide 3-phényllactique", "doc_source": "V3", "doc_cible": "H2"}, {"doc_code_source": "V3", "section_source": null, "doc_code_cible": "H3", "section_cible": null, "pour_concept": "Homologie des voies fermentaires sol-intestin et aliments fermentés comme vecteurs de consortia microbiens", "justification": "Retour H3→V3. La convergence fermentaire sol-intestin renforce l'axe One Health de H3.", "doc_source": "V3", "doc_cible": "H3"}, {"doc_code_source": "V3", "section_source": null, "doc_code_cible": "S4", "section_cible": "II", "pour_concept": "Fondement physico-chimique de la conservation énergétique des fermentations", "justification": "V3 décrit la thermodynamique des fermentations (Delta G, conservation du C et du N) mais ne renvoie pas au cadre Eh-pH de S4 qui explique pourquoi les voies fermentatives sont thermodynamiquement favorables dans les conditions anoxiques. Le diagramme Eh-pH est l'outil prédictif manquant dans V3.", "doc_source": "V3 Les Fermentations Microbiennes", "doc_cible": "S4 Le Carbone et les Grands Cycles §II (Diagramme Eh-pH)"}, {"doc_code_source": "V3", "section_source": "II.1", "doc_code_cible": "S4", "section_cible": "I", "pour_concept": "Risque de priming effect par le carbone labile du bokashi frais", "justification": "Le bokashi immature contient des sucres simples et des acides organiques labiles qui peuvent activer le priming effect sur l'humus stable. V3 doit explicitement avertir du risque et renvoyer à S4 pour le mécanisme, en précisant que la maturation complète (phase 4) réduit ce risque par pré-humificati", "doc_source": "V3 Les Fermentations Microbiennes §II.1 (Bokashi)", "doc_cible": "S4 Le Carbone et les Grands Cycles §I (Priming Effect)"}], "cascade": [{"niveau": 0, "code": "EAU", "label": "Eau", "sous_label": "Disponibilité et continuité hydraulique", "logique": "Sans eau disponible à un potentiel > pF 4,2, toute activité biologique s'arrête. C'est le prérequis absolu de tout le reste.", "indicateurs_cles": ["pF (potentiel hydrique)", "Réserve Utile (RU)", "Ksat (conductivité hydraulique saturée)", "Connectivité des films d'eau", "Biopores fonctionnels"], "seuils_critiques": [{"indicateur": "pF", "seuil": "> 4,2", "interpretation": "Activité biologique nulle"}, {"indicateur": "pF", "seuil": "2,5 – 4,2", "interpretation": "Zone biologiquement active (RU)"}, {"indicateur": "Ksat", "seuil": "< 5 mm/h", "interpretation": "Macroporosité détruite — compaction ou battance"}, {"indicateur": "Test infiltration", "seuil": "> 30 min", "interpretation": "Risque engorgement ou compaction forte"}], "erreurs_typiques": ["Sécheresse persistante malgré des apports", "Engorgement hivernal récurrent", "Infiltration nulle après pluie (battance)", "Hydrophobie post-sécheresse"], "leviers_action": ["Biopuncture (radis daïkon, mélilot)", "Mulch permanent (réduction évaporation 30–70%)", "Réduction du labour (préservation biopores)", "Keyline Design (redistribution topographique)", "+1% MO → +2 mm/m RU"], "docs_codes": ["S0", "P1"], "term_codes": ["réserve utile", "hystérésis hydrique", "conductivité hydraulique saturée", "biopore (macropore biologique)", "film d'eau"], "card_ids": [6, 36, 37], "rule_ids": [10], "test_ids": [4, 14, 19]}, {"niveau": 1, "code": "STRUCT", "label": "Structure physique", "sous_label": "Habitat — la maison des micro-organismes", "logique": "Sans structure stable (micro-agrégats, porosité hiérarchisée), les micro-organismes n'ont pas d'habitat protégé. Même si l'eau est disponible, la biologie ne peut pas s'installer durablement.", "indicateurs_cles": ["VESS (Visual Evaluation of Soil Structure)", "Stabilité des agrégats", "Test infiltration (macroporosité)", "Test ficelle GEPPA (texture)", "Densité apparente"], "seuils_critiques": [{"indicateur": "VESS", "seuil": ">= 4", "interpretation": "Structure dégradée — intervention requise"}, {"indicateur": "VESS", "seuil": "1–2", "interpretation": "Bonne structure — maintenir"}, {"indicateur": "Stabilité agrégats", "seuil": "Désagrégation < 10 s", "interpretation": "Sol très sensible à l'érosion"}], "erreurs_typiques": ["Compaction (semelle de labour)", "Battance et croûte de surface", "Agrégats instables (slaking)", "Racines superficielles sans obstacle chimique"], "leviers_action": ["Non-labour ou travail superficiel", "Couverts permanents (production EPS racinaire)", "Apports calciques (floculation argiles)", "Vers anéciques (galeries persistantes)", "Apports fermentés en surface (biofilms structurants)"], "docs_codes": ["S1", "S0", "P1"], "term_codes": ["micro-agrégat", "EPS (substances polymériques extracellulaires)", "VESS", "Biofilms", "MAOM", "biopore (macropore biologique)"], "card_ids": [3, 11, 12, 13, 14, 15, 16, 32, 33, 35, 42], "rule_ids": [4, 7, 8, 11, 14, 16], "test_ids": [1, 2, 5, 6, 11, 12, 13, 18]}, {"niveau": 2, "code": "REDOX", "label": "Redox & Chimie", "sous_label": "Le contexte physico-chimique — pH, Eh, CEC", "logique": "Même si l'eau et la structure sont bonnes, un pH ou un Eh inadapté bloque les voies enzymatiques microbiennes et la disponibilité des nutriments. La chimie détermine quelles voies métaboliques sont thermodynamiquement possibles.", "indicateurs_cles": ["pH eau et KCl", "Potentiel redox Eh (mV)", "CEC + taux de saturation", "P Olsen (phosphore disponible)", "Calcaire actif (% CaCO3)", "Eh gradient (microsites)"], "seuils_critiques": [{"indicateur": "pH eau", "seuil": "6,0–7,0", "interpretation": "Optimum microbiome et CMA"}, {"indicateur": "pH eau", "seuil": "< 5,5", "interpretation": "Al3+ et Mn2+ toxiques — blocage enzymes"}, {"indicateur": "Eh", "seuil": "> 300 mV", "interpretation": "Aérobie — conditions favorables"}, {"indicateur": "Eh", "seuil": "< 100 mV", "interpretation": "Anaérobie — risque N2O, Fe/Mn réduits"}, {"indicateur": "P Olsen", "seuil": "> 60 mg/kg", "interpretation": "Inhibition CMA — réduire apports P"}, {"indicateur": "P Olsen", "seuil": "< 15 mg/kg", "interpretation": "CMA actives — favorable"}, {"indicateur": "Calcaire actif", "seuil": "> 5%", "interpretation": "Risque chlorose ferrique + blocage P"}], "erreurs_typiques": ["pH < 5,5 (aluminium toxique)", "P Olsen > 60 — CMA inhibées", "Asphyxie locale (Eh < 100 mV)", "Calcaire actif élevé — chlorose ferrique", "Salinité excessive"], "leviers_action": ["Chaulage raisonné (pH < 5,8)", "Réduction apports P solubles (si > 60 mg/kg)", "Gestion hydrique (éviter engorgement)", "Soufre et bore à faibles doses (si carences répétées)", "Calcium échangeable fonctionnel"], "docs_codes": ["S4", "S1", "P1"], "term_codes": ["potentiel redox", "redox ladder (séquence des accepteurs d'électrons)", "gradient Eh (gradient redox)", "diagramme Eh-pH", "microsites anoxiques", "CEC"], "card_ids": [5, 29, 30, 31, 34], "rule_ids": [4, 6, 14, 15, 17, 19], "test_ids": [9, 10]}, {"niveau": 3, "code": "MO", "label": "MO & Plante", "sous_label": "La nourriture — substrat et exsudats", "logique": "Sans substrat carboné (MO) ni exsudats racinaires actifs (plante vivante), le microbiome entre en dormance. C'est le flux d'énergie qui maintient le réseau biologiquement actif.", "indicateurs_cles": ["COS % (carbone organique total)", "C/N ratio", "k1 (coefficient d'humification)", "k2 (taux minéralisation humus)", "LAI (Indice Aire Foliaire)", "Allocation C exsudats (5–40% photosynthèse)", "Respiration du sol (FDA)"], "seuils_critiques": [{"indicateur": "MO %", "seuil": "< 1%", "interpretation": "Critique — sol biologiquement inerte"}, {"indicateur": "MO %", "seuil": "1–2%", "interpretation": "Transition — fragilité forte"}, {"indicateur": "MO %", "seuil": "> 3%", "interpretation": "Sol biologiquement actif"}, {"indicateur": "C/N", "seuil": "< 20", "interpretation": "Minéralisation active (libération N)"}, {"indicateur": "C/N", "seuil": "> 30", "interpretation": "Faim d'azote microbienne (immobilisation N)"}, {"indicateur": "Respiration sol", "seuil": "< 0,5 µg CO2-C/g/h", "interpretation": "Microbiome en dormance"}], "erreurs_typiques": ["Faim d'azote après apport C élevé (paille, BRF)", "Sol nu en inter-culture (pas d'exsudats)", "Minéralisation accélérée après labour (k2 élevé)", "Priming effect mal géré (perte C stable)"], "leviers_action": ["Couvert végétal permanent (exsudats en continu)", "Apports MO à k1 élevé (fumier composté, légumineuses)", "Bokashi (k1 biologique ~48%)", "Diversité du couvert (diversité exsudats → diversité microbienne)", "Réduction du travail du sol (protection k2)"], "docs_codes": ["S4", "P2", "P3", "S2"], "term_codes": ["COS (carbone organique du sol)", "MAOM", "POC", "nécromasse microbienne", "CUE", "k1 (constante de minéralisation rapide)", "k2 (constante de minéralisation lente)", "exsudats racinaires", "Allocation C photosynthétique aux exsudats", "priming effect", "faim d'azote", "respiration du sol"], "card_ids": [17, 18, 29, 38, 39], "rule_ids": [1, 2, 5, 13, 16, 18], "test_ids": [15, 16, 17]}, {"niveau": 4, "code": "MICROBIOME", "label": "Microbiome", "sous_label": "Les habitants — guildes, diversité, fonctions", "logique": "Si les 4 prérequis précédents sont satisfaits, le microbiome peut s'installer et jouer ses rôles fonctionnels (minéralisation, suppressivité, ISR, CMN). Sa dégradation est toujours la conséquence d'une défaillance en amont — jamais la cause première.", "indicateurs_cles": ["Ratio F/B (PLFA)", "Diversité Chao1 (métagénomique)", "Biomasse microbienne ATP", "β-glucosidase + phosphatase + uréase", "Suppressivité (tests bioassay)", "Ratio copiotrophes/oligotrophes"], "seuils_critiques": [{"indicateur": "Ratio F/B (PLFA)", "seuil": "< 0,3", "interpretation": "Sol perturbé — dominance bactérienne"}, {"indicateur": "Ratio F/B (PLFA)", "seuil": "> 0,8", "interpretation": "Sol mature — dominance fongique"}, {"indicateur": "Biomasse ATP", "seuil": "< 200 µg ATP/kg", "interpretation": "Microbiome appauvri"}, {"indicateur": "Copiotrophes/oligotrophes", "seuil": "> 2", "interpretation": "Sol sous pression azotée (Haber-Bosch C2)"}], "erreurs_typiques": ["Ratio F/B < 0,3 (agriculture intensive)", "Perte de suppressivité après désinfection", "Copiotrophes dominants (excès N minéral)", "Faible diversité sans explication chimique (chercher prérequis 0–3)"], "leviers_action": ["Correction des prérequis 0–3 en priorité", "Inoculation ciblée (PGPR, CMA selon PLFA)", "Bokashi / EM (réintroduction consortia)", "Couverts multi-espèces (diversité exsudats)", "IMO local (capture microbiome natif)"], "docs_codes": ["S2", "S3", "V2", "P1"], "term_codes": ["ratio F/B", "PLFA", "guildes fonctionnelles", "copiotrophes", "oligotrophes", "suppressivité", "stratégie Y-A-S (Yield-Acquisition-Stress)", "dormance microbienne", "CMN (Common Mycorrhizal Network)", "transfert horizontal de gènes", "biomasse microbienne"], "card_ids": [19, 30, 31, 40], "rule_ids": [5, 6, 9, 13, 16, 17], "test_ids": [7, 15, 20]}, {"niveau": 5, "code": "PLANTE", "label": "Plante saine", "sous_label": "L'output — densité nutritionnelle, résilience, rendement", "logique": "La plante saine est le résultat des 5 niveaux précédents satisfaits. Un problème à ce niveau est toujours le signal d'une défaillance en amont — il ne faut jamais traiter les symptômes sans remonter la cascade.", "indicateurs_cles": ["ISR/SAR actif (polyphénols ×1,3–1,5)", "Densité nutritionnelle (Zn, Fe, Mg, vitamines B)", "Taux Brix (sucres foliaires)", "Absence de carences visuelles", "Résistance aux ravageurs (Trophobiose)"], "seuils_critiques": [{"indicateur": "Brix feuilles", "seuil": "> 12", "interpretation": "Sol vivant actif — ISR fonctionnel"}, {"indicateur": "Brix feuilles", "seuil": "< 6", "interpretation": "Plante affaiblie — chercher prérequis 0–4"}, {"indicateur": "Acides aminés libres (excès)", "seuil": "Élevés", "interpretation": "Trophobiose — risque ravageurs (C2)"}], "erreurs_typiques": ["Carences récurrentes malgré apports", "Sensibilité accrue aux ravageurs (Trophobiose)", "Rendement normal mais densité nutritionnelle faible (Growth Dilution Effect)", "Plante stressée sans explication climatique"], "leviers_action": ["Remonter la cascade et corriger le prérequis défaillant", "Ne PAS traiter le symptôme (fongicide, insecticide) sans diagnostic amont", "Mesurer le Brix comme proxy rapide de l'état du sol"], "docs_codes": ["V2", "H1", "P1", "P2"], "term_codes": ["ISR", "SAR", "Loi de la Trophobiose", "holobionte", "Allocation C photosynthétique aux exsudats", "densité nutritionnelle"], "card_ids": [23, 26], "rule_ids": [5, 17, 18], "test_ids": [8, 20]}], "cards": [{"id": 1, "title": "Coût réel de l’énergie fossile et 'esclaves énergétiques'", "description": "Cadre de comparaison : comptabiliser énergie externe, travail, exergie, externalités. Permet d’éviter les comparaisons faussées entre systèmes (conventionnel vs MSV/ACS).\n\n[Complément fusionné] Cadre de comparaison : intégrer l’énergie externe (pétrole), l’exergie, et les externalités (dette écologique). Évite les comparaisons faussées entre systèmes (conventionnel vs MSV/ACS) quand le 'bilan' ignore le coût énergétique réel.", "scope_type": "global", "category": "cadre", "status": "active", "docs_codes": ["F2"], "source": "legacy_v1_to_review", "notes": "Fusionné avec card 7 ('Thermodynamique : énergie externe, exergie et coût réel des intrants fossiles')", "adapted": 0}, {"id": 2, "title": "Temporalité, irréversibilités et entropie des pratiques humaines", "description": "Cadre : expliciter l’échelle de temps et le sens matériel. Exemple : transformer une forêt en broyat peut être incohérent selon objectif et bilan matière/énergie.\n\n[Complément fusionné] Cadre : expliciter les échelles de temps, les irréversibilités (érosion, perte de structure, minéralisation accélérée) et le sens matériel des pratiques (ex. raser une forêt pour broyat). Les bilans doivent intégrer pertes/temps de reconstruction.", "scope_type": "global", "category": "cadre", "status": "active", "docs_codes": ["F1", "F2"], "source": "legacy_v1_to_review", "notes": "Fusionné avec card 9 ('Temporalité & entropie : irréversibilités et sens des pratiques')", "adapted": 0}, {"id": 3, "title": "Types de sols et comportements différenciés", "description": "Cadre : mêmes apports et mêmes pratiques → effets différents selon texture (sable/limon/argile), minéralogie, calcaire, hydromorphie. Les règles de diagnostic doivent être filtrées par type de sol.", "scope_type": "global", "category": "cadre", "status": "active", "docs_codes": ["S1"], "source": "legacy_v1_to_review", "notes": "Fusionné avec card 10 ('Pédologie : types de sols et comportemen') le 2026-03-28", "adapted": 0}, {"id": 5, "title": "Redox central : gradients, microzones et 'redox ladder'", "description": "Cadre : raisonner par gradients Eh/O2 et microzones. Les voies microbiennes (respiration, dénitrification, fermentation, méthanogenèse…) dépendent du redox, qui est piloté par l’eau, la structure (biofilms/agrégats) et les apports (surface vs enfouissement).", "scope_type": "global", "category": "cadre", "status": "active", "docs_codes": ["S4", "S0"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 6, "title": "Eau facteur limitant : potentiel, continuité hydraulique, diffusion des gaz", "description": "Cadre : l’eau (teneur, potentiel, continuité) gouverne diffusion O2/CO2, mobilité des solutés, activité microbienne/racinaire et stabilité structurale. Les diagnostics doivent partir de l’hydrologie du sol avant de conclure à une 'carence' ou une 'recette'.", "scope_type": "global", "category": "cadre", "status": "active", "docs_codes": ["S0"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 8, "title": "Socio-économique : travail, filières, risques et dépendances", "description": "Cadre : une pratique n’est pas seulement biophysique. Les contraintes (main d’œuvre, équipements, filières, risques, réglementation, capital) conditionnent l’adoption. À utiliser pour comparer des systèmes sans idéologie.", "scope_type": "global", "category": "cadre", "status": "active", "docs_codes": ["F2", "P5"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 19, "title": "Stratégies microbiennes : r/K et Y-A-S (rendement, acquisition, stress) le long de la succession", "description": "Cadre : interpréter les effets des apports et pratiques selon les stratégies dominantes : r (opportunistes), K (efficience/stabilité), et Y-A-S (rendement/acquisition/stress). Indispensable pour lire sol nu → climax et éviter d’attribuer une 'recette' hors contexte.", "scope_type": "global", "category": "cadre", "status": "active", "docs_codes": ["S2", "S3"], "source": "legacy_v1_to_review", "notes": "Fusionné avec card 28 ('Y-A-S') le 2026-03-28", "adapted": 0}, {"id": 27, "title": "Carbonates pédogéniques – cadre intégré", "description": "Cadre intégré thermodynamique, cinétique, biologique et hydrologique des carbonates pédogéniques.", "scope_type": "global", "category": "cadre", "status": "active", "docs_codes": ["S4", "S1"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 45, "title": "Stœchiométrie CNPS et modèle AMG", "description": "Kirkby 100:8:2:1.5. AMG bi-compartimental validé 60 sites. Priming Effect. 4p1000.", "scope_type": null, "category": "cadre", "status": "active", "docs_codes": ["S4", "S1"], "source": "analyse_fiches", "notes": null, "adapted": 1}, {"id": 21, "title": "Lombriciens : catégories écologiques, drilosphère, turricules, biopores et interactions racines", "description": "Cadre : structurer l’analyse des vers de terre par catégories (épigés/endogés/anéciques) et par fonctions. Relier digestion (mucus/microbiote), ingénierie (drilosphère, bioturbation, turricules, biopores) et interactions avec racines (chemins préférentiels, aération locale). Évite l’abus 'lombricompostage' : le vermicompostage concerne surtout des vers épigés.", "scope_type": "global", "category": "faune", "status": "active", "docs_codes": ["V1", "S0"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 4, "title": "Histoire des sols : désastres et réussites (Croissant fertile, Nil, Terra Preta, Milpa)", "description": "Objectif : fournir un contexte historique pour valider/illustrer des mécanismes du corpus.\nOn ne compare pas des systèmes agricoles sans intégrer : érosion, salinisation, irrigation mal gérée, déboisement, perte de structure, baisse de fertilité, désertification.\nUsage : ancrer les diagnostics (pédologie + eau + redox + pratiques) dans des trajectoires historiques.\n\n[Complément fusionné] Objectif : documenter des systèmes qui réussissent à maintenir/accroître la fertilité, la structure et la résilience.\nUsage : comparer sans idéologie, en identifiant les invariants mécanistiques : continuité de couverture, flux de carbone, diversité, biochar/MAOM, polyculture/agroforesterie.", "scope_type": "global", "category": "histoire", "status": "active", "docs_codes": ["F1"], "source": "legacy_v1_to_review", "notes": "Fusionné avec card 20 ('Histoire des sols : désertification, érosion, salinisation — et réussites (Terra Preta)') | Fusionné avec card 24 ('Histoire de l’humanité et systèmes agric') le 2026-03-28", "adapted": 0}, {"id": 22, "title": "Évolution du vivant : monde anaérobie → photosynthèse → oxygénation → respiration (cadre redox)", "description": "Objectif : fournir un contexte 'histoire du vivant' utilisable en diagnostic et en comparaison de systèmes.\nIdée centrale : la biosphère démarre majoritairement anaérobie ; l’arrivée de la photosynthèse oxygénique modifie les gradients (O2/Eh) et ouvre les métabolismes aérobie.\nUsage éditorial : éviter d’exiger des 'preuves' pour des concepts fondamentaux déjà admis (ex. chimie/biologie de base) et replacer les mécanismes micro-biogéochimiques dans une trajectoire temporelle.", "scope_type": "global", "category": "mecanisme", "status": "active", "docs_codes": ["F1"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 23, "title": "Évolution des plantes et construction du sol : racines, mycorhizes, rhizosphère, boucles plante–microbiome", "description": "Objectif : relier l’évolution des plantes (et de leurs interfaces) à la formation/organisation du sol.\nPivot : racines + exsudats + mycorhizes → rhizosphère → réseaux trophiques → structure/agrégation.\nUsage : comparer des systèmes (prairie/forêt/couverts) sans analogies bancales, en explicitant les mécanismes (flux carbone, redox local, réseaux mycorhiziens).", "scope_type": "global", "category": "mecanisme", "status": "active", "docs_codes": ["S3", "V2", "S0"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 26, "title": "Évolution écologique du sol : sol nu → climax, stratégies microbiennes r/K et Y‑A‑S (cadre diagnostique)", "description": "Objectif : caler les diagnostics et comparaisons sur une trajectoire écologique, plutôt que sur des recettes.\nAxe : sol nu → stades pionniers → systèmes structurés → climax. Les stratégies microbiennes (r/K, Y‑A‑S) changent avec ressources, stress, redox, eau, couverture et continuité racinaire.\nUsage : relier pratiques (couvert, mulch, non-labour, compost/fermentation) aux mécanismes (flux C, agrégation, redox) et aux indicateurs de dynamique de MO (K1/K2).", "scope_type": "global", "category": "mecanisme", "status": "active", "docs_codes": ["F1", "P1"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 43, "title": "CEP : double identité entomopathogène/endophyte et CBC", "description": "Transfert N insecte→plante. CBC vs inondation spores. Indicateur santé sols.", "scope_type": null, "category": "mecanisme", "status": "active", "docs_codes": ["S3", "V2", "P3"], "source": "analyse_fiches", "notes": null, "adapted": 1}, {"id": 44, "title": "Thermotolérance microbienne : 7 mécanismes", "description": "ACC déaminase, EPS, osmolytes, HSFA2, redistribution hydraulique, MO, mixotrophie. Asymétrie thermique.", "scope_type": null, "category": "mecanisme", "status": "active", "docs_codes": ["S2", "S3", "V2"], "source": "analyse_fiches", "notes": null, "adapted": 1}, {"id": 46, "title": "Biostimulation indigène KNF/JADAM et thermodynamique redox", "description": "FAA N 1.41-2.04%. Bokashi 1:27 CO2. Capacité redox. Pourbaix. Eh/pH boussole.", "scope_type": null, "category": "mecanisme", "status": "active", "docs_codes": ["V3", "P3", "P5"], "source": "analyse_fiches", "notes": null, "adapted": 1}, {"id": 11, "title": "Profil sol sableux : aération élevée, apports fractionnés, dynamique MO rapide", "description": "Sol sableux : faible CEC et réserve utile ; aération forte. Compatible avec apports fermentés si fractionnés ; attention à la minéralisation rapide.", "scope_type": "global", "category": "profil_sol", "status": "active", "docs_codes": ["S1", "S0"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 12, "title": "Profil sol argileux : potentiel élevé mais risques redox si enfouissement et excès d'eau", "description": "Sol argileux : potentiel d’agrégation élevé (Ca + biofilms/EPS), mais risque de réduction profonde/anoxie si enfouissement + excès matière réduite + saturation.", "scope_type": "global", "category": "profil_sol", "status": "active", "docs_codes": ["S1", "S4", "S0"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 13, "title": "Profil sol limoneux : battance/érosion, priorité couverture et biofilms de surface", "description": "Sol limoneux : structure fragile ; battance/ruissellement si sol nu. Priorité à couverture permanente, apports de surface et consolidation biologique.", "scope_type": "global", "category": "profil_sol", "status": "active", "docs_codes": ["S1", "S0"], "source": "legacy_v1_to_r
