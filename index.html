rcement des CMN inter-espèces → V2: Élicitation ISR/SAR par la diversité microbienne, production métabolites secondaires défensifs → H1: Aliments plus riches en polyphénols et vitamines B, protection contre l'inflammation → H3: Diversité microbienne transmise à l'intestin, corrélation avec réduction des maladies auto-immunes (Rook, 2011 ; Ma et al., 2025). Le choix du nombre d'espèces dans un couvert a des implications mesurables sur l'épidémiologie des maladies chroniques.", "statut": "◆"}, {"fr": "Chaîne 1 — Photosynthèse → Immunité intestinale", "en": "Chain 1 — Cover crop photosynthesis to gut immunity", "doc_code": "P2/S4/S2/S3/V2/V3/H1/H3", "definition": "P2: Design du couvert multi-espèces fixant le C → S4: Exsudats racinaires alimentant la pompe microbienne → S2: Diversification des guildes bactériennes, augmentation de la CUE → S3: Développement des réseaux CMA/CMN → V2: Recrutement PGPR et endophytes, activation ISR/SAR → V3: Production vitamines B et métabolites secondaires → H1: Augmentation de la densité nutritionnelle → H3: Transfert d'endophytes au microbiome intestinal via l'alimentation. Argument le plus puissant du corpus pour les décideurs publics : un choix de couvert impacte la santé humaine via 7 étapes documentées.", "statut": "◆"}, {"fr": "BRF (bois raméal fragmenté)", "en": "ramial chipped wood (RCW)", "doc_code": "P3", "definition": "Broyat de rameaux de feuillus de diamètre < 7 cm, riche en lignine jeune et en nutriments. Inoculé aux champignons saprotrophes. Stimule la succession fongique et augmente le ratio F/B. Application en surface comme mulch, jamais enfoui.", "statut": "◆"}, {"fr": "EM (micro-organismes efficaces)", "en": "effective microorganisms (EM)", "doc_code": "P3", "definition": "Consortium de micro-organismes sélectionnés : bactéries lactiques (LAB), levures, bactéries photosynthétiques (PNSB). Utilisés pour la fermentation du bokashi, les pulvérisations foliaires et l'inoculation des composts. Concept développé par Teruo Higa.", "statut": "◆"}, {"fr": "Effective Microorganisms (EM)", "en": "effective microorganisms", "doc_code": "P3", "definition": "Consortium standardisé de micro-organismes fermenté (bactéries lactiques, levures, PNSB, actinomycètes) formulé par Teruo Higa (années 1980). Distinct des IMO (micro-organismes indigènes locaux du KNF). Les EM sont standardisés et reproductibles ; les IMO sont locaux et adaptés. Les EM introduisent une communauté exogène, les IMO amplifient la biologie présente.", "statut": "~"}, {"fr": "IMO", "en": "indigenous microorganisms", "doc_code": "P3", "definition": "Micro-organismes indigènes collectés localement dans la litière forestière ou les sols riches et multipliés à la ferme (KNF). Parfaitement adaptés aux conditions pédoclimatiques locales. Utilisés pour restaurer la diversité microbienne dans les sols intensifs ou pour occuper les niches rhizosphériques avant les pathogènes.", "statut": "◆"}, {"fr": "JADAM", "en": "JADAM (Jadam Organic Farming)", "doc_code": "P3", "definition": "Pratique coréenne/japonaise de fermentation agricole naturelle dérivée du KNF, développée par Youngsang Cho. Solution microbienne JADAM (JMS) utilisant pommes de terre, eau et sel pour cultiver les micro-organismes indigènes. Plus simple et moins coûteux que les EM commerciaux. Production entièrement réalisable à la ferme.", "statut": "◆"}, {"fr": "acides humiques et fulviques", "en": "humic and fulvic acids", "doc_code": "P3", "definition": "Biostimulants issus de la décomposition de la MO. Acides humiques : macromolécules, chélation des micronutriments, stimulation racinaire. Acides fulviques : petites molécules, pénètrent les membranes cellulaires, vecteurs de nutriments. Méta-analyses : +10-25% croissance racinaire.", "statut": "◆"}, {"fr": "bio-inoculant", "en": "bioinoculant", "doc_code": "P3", "definition": "Préparation contenant des micro-organismes vivants (bactéries, champignons) ayant un effet bénéfique documenté sur la croissance végétale ou la santé du sol. Inclut les inoculants CMA, les rhizobia, les PGPR. Qualité critique : viabilité au moment de l'application.", "statut": "◆"}, {"fr": "chaîne causale (substrat→métabolites→microbiome→plante)", "en": "causal chain", "doc_code": "P3", "definition": "Modèle opérationnel séquentiel décrivant le chemin d'action des biostimulants fermentés et des pratiques régénératrices : un substrat organique fermenté (Bokashi, IMO, KNF, LiFoFer) produit des métabolites actifs (acides organiques, phytohormones, sidérophores) → qui restructurent le microbiome du sol (diversité fonctionnelle, ratio F/B, CUE) → lequel module la rhizosphère et l'holobionte végétal (nutrition, ISR/SAR) → déterminant la qualité nutritionnelle et sanitaire de l'aliment produit. Principe opérationnel central de la strate P.", "statut": "◆"}, {"fr": "inoculum mycorhizien", "en": "mycorrhizal inoculum", "doc_code": "P3", "definition": "Préparation contenant des propagules viables de CMA (spores, fragments d hyphes, racines colonisées). Efficace uniquement si : sol pauvre en CMA indigènes (< 10 spores/100g), plante mycotrophe, absence d excès de P.", "statut": "◆"}, {"fr": "période critique de colonisation mycorhizienne", "en": "critical period for mycorrhizal colonization", "doc_code": "P3", "definition": "Fenêtre temporelle (2-4 semaines après levée) pendant laquelle l inoculation est la plus efficace. Après cette période, les racines sont lignifiées et la colonisation difficile.", "statut": "◆"}, {"fr": "rhizobactéries", "en": "rhizobacteria", "doc_code": "P3", "definition": "Bactéries de la rhizosphère à effet promoteur de croissance. Terme générique incluant les PGPR. Voir entrée S2 — PGPR pour la définition complète.", "statut": "✓"}, {"fr": "enrobage de semences biologique", "en": "biological seed coating", "doc_code": "P3/P5", "definition": "Application de micro-organismes bénéfiques (CMA, PGPR, Trichoderma, Bacillus) et de substances nutritives sur la semence avant le semis. Assure une colonisation immédiate de la rhizosphère dès la germination. Utiliser des inoculums indigènes (IMO, LiFoFer) pour l'adaptation au contexte local (Weller et al., 2002 ; Pellegrini et al., 2025 ; Díaz-Rodríguez et al., 2025).", "statut": "◆"}, {"fr": "thés de compost oxygénés", "en": "aerated compost tea (ACT)", "doc_code": "P3/P5", "definition": "Extraits liquides de micro-organismes obtenus par macération d'un compost mûr sous bullage d'air continu pendant 24-48 heures. Sélectionne et multiplie les populations aérobies bénéfiques (Bacillus, Pseudomonas, Streptomyces). Apporte une charge biologique massive pour restaurer la vie microbienne après un stress. Application en pulvérisation foliaire ou au sol.", "statut": "◆"}, {"fr": "Chaîne 3 — Bokashi → Suppressivité du sol", "en": "Chain 3 — Bokashi to soil suppressiveness", "doc_code": "P3/V3/S2/S4/S3/V2/P1", "definition": "P3: Application Bokashi → V3: Métabolites actifs (acide 3-phényllactique, acides organiques, sidérophores) → S2: Réintroduction consortia fonctionnels, compétition avec pathogènes → S4: Modification Eh local, solubilisation P → S3: Stimulation saprotrophes ligneux occupant la place des pathogènes fongiques → V2: Activation ISR via métabolites microbiens → P1: Mesure PLFA (ratio F/B) et VESS. Donne un fondement mécaniste aux biostimulants fermentés. Avertissement : Priming Effect si surdosage sur sol riche en COS.", "statut": "◆"}, {"fr": "Agroforesterie et Bocage", "en": null, "doc_code": "P4", "definition": "Intégration d'arbres et de haies dans les parcelles cultivées pour recréer une structure forestière simplifiée (Vialatte et al., 2023).\n\nEnjeu : Utilisation des réseaux de pipelines mycéliens pour le transport horizontal de l'eau et des nutriments entre l'arbre et la culture (Simard, 2018).\n\nLevier de décision : Utiliser l'effet de \"redistribution hydraulique\" (hydraulic lift) des arbres profonds pour soutenir les cultures de surface lors des sécheresses estivales.", "statut": "◆"}, {"fr": "CMN agroforestier", "en": "agroforestry common mycorrhizal network", "doc_code": "P4", "definition": "Réseau mycorhizien inter-espèces particulièrement développé dans les systèmes agroforestiers, connectant arbres et cultures via les hyphes de CMA et ECM. Transferts de C, N, eau et signaux chimiques entre espèces. Les arbres profonds soutiennent les cultures de surface en période de stress via le CMN.", "statut": "◆"}, {"fr": "Ernst Götsch", "en": "Ernst Götsch", "doc_code": "P4", "definition": "Agriculteur-chercheur suisse naturalisé brésilien, fondateur de l'agriculture syntropic. A régénéré 500 ha de caatinga dégradée au Bahia (Brésil) en 40 ans en mimant la succession écologique forestière.", "statut": "◆"}, {"fr": "Keyline Design", "en": "Keyline design", "doc_code": "P4", "definition": "Système de conception du paysage agricole (P.A. Yeomans, Australie, 1954) optimisant rétention et redistribution de l'eau de pluie par travail selon les lignes clés de topographie. Dévie l'eau des zones humides (vallées) vers les zones sèches (crêtes) par gravité, sans pompage. Aligner les plantations d'arbres sur les keylines pour créer des barrières d'infiltration naturelles.", "statut": "◆"}, {"fr": "agriculture syntropic", "en": "syntropic agriculture", "doc_code": "P4", "definition": "Système agro-sylvo-pastoral mimant la succession écologique naturelle d'un pionnier vers le climax, développé par Ernst Götsch. Associe strates végétales successives (strates pionnières, secondaires, climaciques) qui s'éliminent naturellement en intensifiant la production des strates suivantes.", "statut": "◆"}, {"fr": "agriculture syntropique (Götsch)", "en": "syntropic farming (Götsch method)", "doc_code": "P4", "definition": "Système agroforestier développé par Ernst Götsch. Succession planifiée : espèces pionnières (manioc, bananier) → secondaires (café, cacao) → climaciques (arbres de canopée). Élagage intensif = apport de MO + stimulation de croissance. Adaptation en climat tempéré en cours.", "statut": "◆"}, {"fr": "bandes fleuries", "en": "flower strips / insectary strips", "doc_code": "P4", "definition": "Aménagements linéaires ou intra-parcellaires implantés avec des espèces nectarifères, pollinifères et à floraison échelonnée. Hébergent les auxiliaires de culture et pollinisateurs. 5-12% de la surface de la parcelle est optimal. Contribuent à la connectivité paysagère et hébergent des micro-organismes antagonistes des pathogènes.", "statut": "◆"}, {"fr": "corridor écologique", "en": "ecological corridor", "doc_code": "P4", "definition": "Bande de végétation (haie, bande enherbée, ripisylve) connectant des habitats fragmentés. Permet la circulation de la faune auxiliaire (pollinisateurs, prédateurs de ravageurs), le transfert de graines et de spores fongiques, et la régulation hydrique du paysage.", "statut": "◆"}, {"fr": "haie vive", "en": "living hedge / hedgerow", "doc_code": "P4", "definition": "Plantation linéaire d'arbres et arbustes en bordure ou au sein des parcelles. Fonctions : brise-vent, corridor écologique, interception des eaux de ruissellement, habitat pour auxiliaires, source de BRF, séquestration carbone aérien et racinaire.", "statut": "◆"}, {"fr": "hydraulic lift", "en": "hydraulic lift", "doc_code": "P4", "definition": "Remontée nocturne de l'eau des horizons profonds via les racines des arbres et graminées profondes, redistribuée dans les horizons de surface par diffusion passive. Service hydrique majeur des systèmes agroforestiers en période de stress estival. Impact sur le potentiel redox local des horizons superficiels : l'humectation nocturne modifie la disponibilité du P et du Fe.", "statut": "✓"}, {"fr": "niche partitioning", "en": "niche partitioning", "doc_code": "P4", "definition": "Stratégie de diversification spatiale (étages racinaires à profondeurs complémentaires) et temporelle (rotations, successions) pour optimiser l'utilisation des ressources. Associer des plantes à pivots (radis, luzerne) et à chevelus (graminées) pour explorer 100% du profil de sol. Base théorique de la saturation des niches écologiques comme protection contre les pathogènes.", "statut": "◆"}, {"fr": "pâturage tournant dynamique", "en": "adaptive multi-paddock (AMP) grazing", "doc_code": "P4", "definition": "Gestion intensive du pâturage par rotation rapide sur petites surfaces (1-3 jours) + longues périodes de repos (60-120 jours). Mime les grands troupeaux sauvages accompagnés de prédateurs. Stimule la croissance racinaire par le broutage et l'injection massive de C par la rhizodéposition après le repos. L'effet trampling incorpore mécaniquement MO et accélère la minéralisation.", "statut": "◆"}, {"fr": "système silvopastoral", "en": "silvopastoral system", "doc_code": "P4", "definition": "Intégration d arbres (fruitiers, fourragères, bois d œuvre) dans des prairies pâturées. Les arbres fournissent ombre (réduction stress thermique du bétail de 3-5°C), fourrage foliaire, brise-vent et séquestration carbone. Le pâturage entretient le sous-étage.", "statut": "◆"}, {"fr": "agriculture syntropique", "en": "syntropic agriculture", "doc_code": "P5", "definition": "Système développé par Ernst Götsch au Brésil. Principe : reproduire la succession écologique forestière dans un système productif. Élagage intensif comme stimulant de croissance et apport de MO. Mélange d espèces pionnières, secondaires et climaciques sur la même parcelle.", "statut": "◆"}, {"fr": "agrorecyclerie", "en": "agro-recycling", "doc_code": "P5", "definition": "Concept développé par la Ferme de Cagnolle (Benoît Le Baube, Dordogne). Agriculture basée sur le recyclage de déchets carbonés locaux : balayures de scierie, broyats de déchetterie, déchets alimentaires. MO passée de 1.4% à 9% en 10 ans. 90% des cultures sans irrigation. Principe : tout ce qui est carboné et local est récupéré — la bioéconomie circulaire de Hamant appliquée à l'échelle d'une ferme.", "statut": "◆"}, {"fr": "chronoséquence de transition", "en": "transition chronosequence", "doc_code": "P5", "definition": "Séquence temporelle des 4 phases de la transition vers l'agriculture régénératrice (Madarász et al., 2025) : (1) Sevrage des intrants (1-3 ans, fragilité maximale, risque de baisse de rendement), (2) Redémarrage biologique (3-7 ans, réapparition des indicateurs biologiques), (3) Consolidation (7-15 ans, accumulation de MO, stabilisation des rendements), (4) Antifragilité (> 15 ans, amélioration après les stress). Outil de positionnement du praticien pour calibrer ses objectifs.", "statut": "◆"}, {"fr": "enrichissement de surface", "en": "surface amendment", "doc_code": "P5", "definition": "Apport de matière organique (compost, bokashi, paillage) uniquement en surface, sans enfouissement. Mime la litière forestière. Préserve la macroporosité biologique et la stratification des horizons. Principe fondamental du non-labour et des planches permanentes.", "statut": "◆"}, {"fr": "fertigations biologiques", "en": "biological fertigation", "doc_code": "P5", "definition": "Système d'irrigation enrichi en nutriments et micro-organismes vivants (thés de compost, extraits fermentés, solutions enzymatiques) combinant hydratation et nutrition biologique. Les micro-organismes colonisent la rhizosphère et créent un biofilm protecteur. Remplace la fertigation chimique par une nutrition vivante.", "statut": "◆"}, {"fr": "intrant massif", "en": "massive organic input", "doc_code": "P5", "definition": "Apport 50-400 t MS/ha sur sol <2% MO pour viser 5%. Faim d'azote prolongée. Opposé : remise en vie douce (20-50 t, C/N 20-30).", "statut": "validé"}, {"fr": "maraîchage biointensif", "en": "biointensive market gardening", "doc_code": "P5", "definition": "Système de production sur petite surface (1000-5000 m²) maximisant la densité de plantation, la diversité et le turnover. Planches permanentes, compostage intensif, rotations courtes. Références : Jean-Martin Fortier, Eliot Coleman.", "statut": "◆"}, {"fr": "phase de sevrage", "en": "weaning phase (transition)", "doc_code": "P5", "definition": "Première phase de la chronoséquence de transition (0–2 ans). Arrêt des intrants chimiques, risque maximal de priming effect, creux productif temporaire (-10 à -30%). Le microbiome bascule de copiotrophes dépendants vers un début de diversification. Leviers : couverts multi-espèces, biostimulants fermentés.", "statut": "◆"}, {"fr": "planche permanente", "en": "permanent raised bed", "doc_code": "P5", "definition": "Planche de culture de 75-80 cm de large, jamais piétinée, jamais labourée. Le sol se structure biologiquement sur 3-5 ans : macroporosité biologique croissante, réseau mycorhizien continu, microbiome qui évolue vers un stade mature (dominance oligotrophes et champignons).", "statut": "◆"}, {"fr": "rotation et association", "en": "crop rotation and intercropping", "doc_code": "P5", "definition": "Alternance des familles botaniques dans le temps (rotation) et combinaison d espèces complémentaires dans l espace (association). Réduit les pathogènes telluriques, diversifie les exsudats racinaires et optimise l utilisation des nutriments. Base du maraîchage biointensif.", "statut": "◆"}, {"fr": "économie de la fonctionnalité", "en": "economy of functionality", "doc_code": "P5", "definition": "Modèle économique basé sur l'usage partagé plutôt que la propriété individuelle. Objets haut de gamme (robustes, réparables) partagés au prix le plus bas. Résout simultanément le pouvoir d'achat, la sobriété et la durabilité. Exemples : bibliothèques d'objets, Décathlon seconde vie, Mobion. Bascule de l'abondance matérielle à l'abondance des interactions.", "statut": "◆"}, {"fr": "auto-fertilité", "en": "self-fertility", "doc_code": "P5/F2", "definition": "Sol fournissant les nutriments sans apport extérieur. Seuil ~3,5-5% MO. Légume ~1 t MS/ha/an vs 20 t nécessaire.", "statut": "validé"}, {"fr": "carbon farming", "en": "carbon farming", "doc_code": "P5/F2", "definition": "Valorisation économique du stockage de carbone dans les sols agricoles via la vente de crédits carbone. Protocole de certification : mesure initiale (RothC), pratiques définies (ACS, agroforesterie, couvertures), suivi annuel, vérification tierce. Potentiel de stockage estimé : 4‰/an de COS sur les sols cultivés mondiaux.", "statut": "◆"}, {"fr": "occultation (bâchage)", "en": "occultation (tarping)", "doc_code": "P5/P2", "definition": "Couverture opaque. 6 mois vivaces, 1 mois annuelles. Alternative au labour.", "statut": "validé"}, {"fr": "Birch effect", "en": "Birch effect", "doc_code": "S0", "definition": "Pic brutal de minéralisation (C, N) survenant lors de la réhumectation d'un sol sec. Causé par la lyse des cellules microbiennes mortes pendant la sécheresse et la libération de MO protégée dans les agrégats éclatés. Peut représenter 5–15% de la minéralisation annuelle en une seule vague.", "statut": "◆"}, {"fr": "capacité au champ", "en": "field capacity", "doc_code": "S0", "definition": "Teneur en eau maximale retenue après ressuyage gravitaire (pF 2.5, -33 kPa). Limite supérieure de la réserve utile. Dépend de la texture, structure et MO du sol.", "statut": "◆"}, {"fr": "conductivité hydraulique", "en": "hydraulic conductivity", "doc_code": "S0", "definition": "Capacité du sol à transmettre l'eau sous l'effet d'un gradient de potentiel (loi de Darcy). Dépend de la texture, de la structure et de la macroporosité biologique. Unité : mm/h ou cm/jour.", "statut": "◆"}, {"fr": "courbe de rétention", "en": "water retention curve (soil water characteristic curve)", "doc_code": "S0", "definition": "Relation entre teneur en eau volumique (θ) et potentiel matriciel (ψm). Permet de calculer la réserve utile, d interpréter les tests pF, et de modéliser les flux hydriques dans le profil.", "statut": "◆"}, {"fr": "dessiccation", "en": "desiccation", "doc_code": "S0", "definition": "Perte d'eau du sol au-delà du point de flétrissement (pF > 4.2). Provoque la dormance microbienne, la sporulation des Firmicutes, la production d'EPS protecteurs et l'accumulation de solutés compatibles (tréhalose, proline).", "statut": "◆"}, {"fr": "flux préférentiel", "en": "preferential flow", "doc_code": "S0", "definition": "Mouvement rapide de l eau dans les macropores (galeries de vers, fissures, canaux racinaires) court-circuitant la matrice du sol. Permet l infiltration même lors de pluies intenses. Dominant dans les sols vivants, quasi absent dans les sols compactés.", "statut": "◆"}, {"fr": "hydraulic lift (redistribution hydraulique)", "en": "hydraulic lift (hydraulic redistribution)", "doc_code": "S0", "definition": "Transfert passif d'eau par les racines depuis les horizons humides vers les horizons secs, piloté par le gradient de potentiel hydrique. Bénéfice collatéral : maintient l'activité microbienne en surface pendant la sécheresse.", "statut": "◆"}, {"fr": "infiltration", "en": "water infiltration", "doc_code": "S0", "definition": "Pénétration de l'eau dans le sol par la surface. Dépend de la porosité de surface, de la stabilité structurale et de la couverture du sol. Premier facteur limitant en agriculture pluviale.", "statut": "◆"}, {"fr": "matrice EPS (substances polymériques extracellulaires)", "en": "extracellular polymeric substances (EPS) matrix", "doc_code": "S0", "definition": "Gel de polysaccharides, protéines et ADN sécrété par les micro-organismes. Forme les biofilms, stabilise les micro-agrégats, retient l'eau (jusqu'à 10× leur masse) et protège les cellules contre la dessiccation.", "statut": "◆"}, {"fr": "mulch (paillage)", "en": "mulch", "doc_code": "S0", "definition": "Couverture organique du sol (paille, BRF, résidus de culture). Réduit l évaporation de 30-60%, tamponne la température du sol de 3-5°C en été, protège la surface contre la battance et nourrit la faune décomposeur. Pilier de la gestion hydrique biologique.", "statut": "◆"}, {"fr": "pF (log du potentiel matriciel)", "en": "pF (log of matric potential)", "doc_code": "S0", "definition": "Échelle logarithmique du potentiel matriciel du sol (pF = log₁₀ de la succion en cm d'eau). pF 0 = saturation, pF 2.5 = capacité au champ (–33 kPa), pF 4.2 = point de flétrissement (–1500 kPa). Unité standard des courbes de rétention.", "statut": "◆"}, {"fr": "point de flétrissement permanent", "en": "permanent wilting point", "doc_code": "S0", "definition": "Teneur en eau à pF 4.2 (-1.5 MPa) en dessous de laquelle les plantes ne peuvent plus extraire l eau. Limite inférieure de la réserve utile. Dépend principalement de la texture argileuse.", "statut": "◆"}, {"fr": "potentiel hydrique", "en": "water potential", "doc_code": "S0", "definition": "Énergie potentielle de l eau dans le sol par unité de volume (MPa ou pF). Composantes : matriciel (ψm), osmotique (ψo), gravitaire (ψg). Détermine la disponibilité de l eau pour les plantes et microbes.", "statut": "◆"}, {"fr": "resilience hydrique", "en": "hydraulic resilience", "doc_code": "S0", "definition": "Capacité du sol a maintenir une teneur en eau fonctionnelle sous contrainte climatique. Dépend de la structure biologique (biopores, agregats, MO).", "statut": "◆"}, {"fr": "water repellency (hydrophobie du sol)", "en": "soil water repellency", "doc_code": "S0", "definition": "Hydrophobie temporaire du sol après sécheresse, causée par les exsudats hydrophobes des hyphes fongiques et la glomaline. Protège les agrégats lors des pluies violentes en ralentissant la pénétration de l eau. Disparaît après réhumectation complète.", "statut": "◆"}, {"fr": "hystérésis hydrique", "en": "hydraulic hysteresis", "doc_code": "S0/S1", "definition": "Phénomène par lequel la relation teneur en eau/potentiel hydrique diffère selon que le sol est en humectation ou en dessication. Un sol retient plus d'eau lors de son drainage qu'il n'en absorbe lors de sa réhumectation, à potentiel égal. Amplifié par la matière organique et les réseaux fongiques qui modifient la géométrie et la mouillabilité des pores. Important pour optimiser l'irrigation et anticiper les disponibilités en eau.", "statut": "◆"}, {"fr": "réserve utile", "en": "plant available water capacity", "doc_code": "S0/S1", "definition": "Volume d'eau retenu dans le sol entre la capacité au champ (pF 2,5) et le point de flétrissement permanent (pF 4,2), disponible pour les plantes. Exprimée en mm/m de sol. Dépend de la texture (argiles > limons > sables), de la teneur en MO et de la profondeur du profil exploité par les racines. La RU d'un sol régénératif augmente avec le stock de MO : chaque point de MO supplémentaire accroît la RU d'environ 2 mm/m.", "statut": "◆"}, {"fr": "biopore (macropore biologique)", "en": "biopore", "doc_code": "S0/V1", "definition": "Canal biologique de diamètre > 0,3 mm créé par les racines (pivot) ou les vers anéciques. Conductivité hydraulique ×100 à ×1000 vs matrice. Persistance 6–18 mois après décomposition racinaire. Principal vecteur de l'infiltration rapide et de la colonisation des horizons profonds par les micro-organismes.", "statut": "◆"}, {"fr": "conductivité hydraulique saturée", "en": "saturated hydraulic conductivity", "doc_code": "S0/V1/P2", "definition": "Vitesse maximale d'écoulement de l'eau dans un sol saturé (Ksat), exprimée en mm/h. Détermine la capacité d'infiltration et le risque de ruissellement. Varie de 0,01 mm/h (argile compacte) à >1 000 mm/h (sol biologique actif). Les macropores biologiques (galeries de vers anéciques, biopores racinaires) contribuent à 90% du flux malgré <5% du volume. L'activité biologique peut multiplier Ksat par 100 par rapport à un sol nu compacté.", "statut": "◆"}, {"fr": "Capacité d’Échange Cationique", "en": null, "doc_code": "S1", "definition": "Mesure de la quantité totale de cations (Ca²⁺, Mg²⁺, K⁺, NH₄⁺) qu'un sol peut retenir sur son complexe argilo-humique (Oursin, 2021). Elle dépend de la nature des argiles et, de manière critique, du taux de matière organique, dont la CEC est environ 10 fois supérieure à celle des argiles (Pellerin, Bamière, Savini, Rechauchère, et al., 2021; Pellerin, Bamière, Savini, Réchauchère, et al., 2021).\n\nEnjeu : Un sol avec une faible CEC est vulnérable au lessivage des nutriments, ce qui augmente les risques environnementaux et les coûts d'intrants (Nivelle, 2017).\n\nLevier de décision : En sols sableux (faible CEC minérale), l'augmentation du taux d'humus est le seul levier pour augmenter le \"réservoir\" de nutriments et limiter les pertes par lixiviation (Pellerin et al., 2021).", "statut": "◆"}, {"fr": "Complexe Argilo-Humique (CAH)", "en": "organo-mineral complex", "doc_code": "S1", "definition": "Association intime argiles-humus stabilisée par des ponts cationiques bivalents (Ca²⁺, Mg²⁺) et des liaisons de coordination. Siège de la CEC et de la structure physique du sol. Le CAH protège la matière organique de la minéralisation rapide et détermine la stabilité des agrégats. Un sol à CAH bien développé (limon+argile+MO>3%) allie fertilité chimique, structure physique et résilience hydrique. Le labour détruit mécaniquement le CAH en fractionnant les agrégats organo-minéraux.", "statut": "◆"}, {"fr": "Illite", "en": "illite", "doc_code": "S1", "definition": "Argile micacée 2:1 non gonflante, intermédiaire entre micas et smectites. CEC modérée (15-40 cmol+/kg), source progressive de potassium structural par altération des bords des feuillets. Dominante dans les sols tempérés modérément altérés. Sa présence offre un équilibre favorable entre stabilité structurale et fertilité potassique. L'activité microbienne mobilise progressivement le K structural des illites — service écosystémique annulé par le recours au K soluble.", "statut": "◆"}, {"fr": "Kaolinite", "en": "kaolinite", "doc_code": "S1", "definition": "Argile 1:1 stable, non gonflante, à faible CEC (3-15 cmol+/kg) et surface spécifique réduite. Caractéristique des sols tropicaux et subtropicaux fortement altérés et lessivés. Sa faible capacité de rétention nutritive impose des apports organiques élevés pour compenser les limitations minéralogiques. En ACS sur sols kaolinitiques : maximiser les apports de MO et l'activité biologique pour créer une fertilité par voie biologique.", "statut": "◆"}, {"fr": "Surface spécifique", "en": "specific surface area", "doc_code": "S1", "definition": "Aire totale des surfaces colloïdales par unité de masse (m²/g). Détermine la capacité d'adsorption, la rétention d'eau et la création de microhabitats microbiens. Varie de 1-10 m²/g (sables) à 10-40 m²/g (kaolinite), 80-120 m²/g (illite) et 600-800 m²/g (smectites). La MO humifiée atteint 800-900 m²/g. La surface spécifique active — argiles + MO — est l'indicateur physico-chimique le plus direct de la fertilité potentielle d'un sol.", "statut": "◆"}, {"fr": "agrégat", "en": "soil aggregate", "doc_code": "S1", "definition": "Assemblage de particules minérales et organiques liées par des agents biologiques (hyphes, EPS, glomaline) et chimiques (oxydes Fe/Al, CAH). Unité structurale fondamentale du sol dont la stabilité conditionne la porosité, l'infiltration et la protection du carbone.", "statut": "◆"}, {"fr": "compaction", "en": "soil compaction", "doc_code": "S1", "definition": "Augmentation de la densité apparente et réduction de la porosité sous l'effet d'une contrainte mécanique (passages d'engins, piétinement). Réduit l'infiltration, l'enracinement et l'activité biologique.", "statut": "◆"}, {"fr": "densité apparente", "en": "bulk density", "doc_code": "S1", "definition": "Masse de sol sec par unité de volume (g/cm³). Indicateur direct de la compaction. Sol sain : 0,9–1,3 g/cm³ ; sol compacté : >1,5 g/cm³ pour un limon.", "statut": "◆"}, {"fr": "horizon pédologique", "en": "soil horizon", "doc_code": "S1", "definition": "Couche de sol relativement homogène, parallèle à la surface, différenciée par sa couleur, texture, structure et composition. Horizons principaux : O (litière), A (organo-minéral), B (accumulation), C (altération roche-mère).", "statut": "◆"}, {"fr": "labour", "en": "tillage (ploughing)", "doc_code": "S1", "definition": "Retournement mécanique du sol (charrue) sur 20–30 cm. Détruit les macro-agrégats, coupe les réseaux mycorhiziens, expose le carbone protégé à l'oxydation et élimine la macroporosité biologique.", "statut": "◆"}, {"fr": "macro-agrégat", "en": "macroaggregate", "doc_code": "S1", "definition": "Agrégat de taille >250 µm, stabilisé principalement par les hyphes fongiques, les racines fines et les EPS bactériens. Contient des micro-agrégats emboîtés. Premier compartiment affecté par le labour.", "statut": "◆"}, {"fr": "micro-agrégat anaérobie", "en": "anaerobic micro-aggregate", "doc_code": "S1", "definition": "Hypothèse forte : les micro-agrégats du sol (20-250 µm) maintiennent un cœur anaérobie où persistent les métabolismes bactériens primitifs. Sans O₂ à l'intérieur, les bactéries anaérobies y conservent des conditions redox très basses. La stabilité du micro-agrégat dépend du maintien de ces conditions réduites — le labour ou la dessication détruit cette niche en l'oxydant.", "statut": "◆"}, {"fr": "montmorillonite (smectite)", "en": "montmorillonite (smectite)", "doc_code": "S1", "definition": "Argile 2:1 gonflante à très forte CEC (80–120 cmol+/kg) et surface spécifique (600–800 m²/g). Responsable du retrait-gonflement des sols. Capacité de fixation des cations et de l'eau interfoliaire.", "statut": "◆"}, {"fr": "porosité", "en": "soil porosity", "doc_code": "S1", "definition": "Fraction volumique du sol occupée par l'air et l'eau. Macroporosité (>50 µm) = drainage et aération ; mésoporosité (50–0,2 µm) = réserve utile ; microporosité (<0,2 µm) = eau liée.", "statut": "◆"}, {"fr": "stabilité structurale", "en": "aggregate stability", "doc_code": "S1", "definition": "Résistance des agrégats à la désagrégation par l'eau (test au diamètre moyen pondéré — MWD) ou par l'impact des gouttes de pluie. Indicateur clé de la santé physique du sol.", "statut": "◆"}, {"fr": "texture du sol", "en": "soil texture", "doc_code": "S1", "definition": "Proportion relative de sable (2–0,05 mm), limon (0,05–0,002 mm) et argile (<0,002 mm) dans la terre fine. Propriété permanente du sol qui détermine sa capacité de rétention d'eau, sa CEC et son comportement mécanique.", "statut": "◆"}, {"fr": "EPS (substances polymériques extracellulaires)", "en": "EPS (extracellular polymeric substances)", "doc_code": "S1/S2", "definition": "Matrice de polysaccharides, protéines et ADN extracellulaire sécrétée par les biofilms microbiens. Assure la cohésion des micro-agrégats, module les gradients redox locaux et protège les cellules contre la dessication.", "statut": "◆"}, {"fr": "micro-agrégat", "en": "micro-aggregate", "doc_code": "S1/S2", "definition": "Unité fonctionnelle du sol de 20–250 µm, stabilisée par la nécromasse microbienne, les EPS et les argiles. Protège le carbone organique de la décomposition (MAOM). Sa formation dépend de la diversité microbienne et de la présence de calcium.", "statut": "◆"}, {"fr": "Microsites", "en": "soil microsites", "doc_code": "S1/S2/S4", "definition": "Micro-environnements de quelques micromètres à quelques millimètres présentant des conditions physico-chimiques distinctes du macrovolume du sol. Ces niches créent des gradients d'O₂, de pH et de nutriments permettant la coexistence d'organismes aux besoins contradictoires. Les microsites aérobies (surface des agrégats) et anaérobies (intérieur des agrégats) coexistent à quelques mm de distance, rendant possibles la nitrification et la dénitrification simultanées dans un même sol. Le non-labour préserve la diversité et la connectivité des microsites.", "statut": "◆"}, {"fr": "Adsorption", "en": "adsorption", "doc_code": "S1/S4", "definition": "Fixation réversible de molécules ou d'ions à la surface des colloïdes du sol (argiles, oxydes Fe/Al, MO) par forces électrostatiques, liaisons hydrogène ou interactions hydrophobes. L'adsorption contrôle la rétention des cations nutritifs (CEC), l'immobilisation du phosphate sur les oxydes Fe/Al et la stabilisation de la MO sur les surfaces minérales (MAOM). La matière organique augmente l'adsorption par sa charge négative et sa surface spécifique élevée. Gérer l'adsorption par le pH et la MO optimise la disponibilité nutritive.", "statut": "◆"}, {"fr": "Oxydes Fe/Al", "en": "iron and aluminium oxides", "doc_code": "S1/S4", "definition": "Formes minérales secondaires de fer (goethite, hématite, ferrihydrite) et d'aluminium (gibbsite, boehmite) issues de l'altération des silicates. Surface spécifique très élevée (100-600 m²/g), charges variables selon le pH. Adsorbent le phosphate de manière quasi irréversible en sols acides (pF < 5) — principale cause de blocage du P disponible. En conditions réductrices, leur dissolution libère P et Fe biodisponibles. Les CMA court-circuitent partiellement ce blocage via les phosphatases et les acides organiques racinaires.", "statut": "◆"}, {"fr": "AOA", "en": "ammonia-oxidizing archaea (AOA)", "doc_code": "S2", "definition": "Archées oxydant l ammonium en nitrite (NH₄⁺→NO₂⁻) via archée ammonia monooxygenase (amoA). Dominent la nitrification dans les sols acides et oligotrophes. Thaumarchaeota (TACK superphylum).", "statut": "◆"}, {"fr": "Acidobacteria", "en": "Acidobacteria", "doc_code": "S2", "definition": "Phylum bactérien dominant des sols (15-30% des communautés), stratège K oligotrophe, prospérant en sols acides. Contribue à la décomposition de la MO récalcitrante. Bioindicateur de sols stables peu perturbés.", "statut": "◆"}, {"fr": "Actinobacteria", "en": "Actinobacteria", "doc_code": "S2", "definition": "Phylum bactérien filamenteux, décomposeurs spécialisés de MO récalcitrante (cellulose, chitine, lignine). Producteurs d'antibiotiques naturels majeurs (streptomycine, tétracycline). Bioindicateur de sols matures. Le genre Streptomyces est le principal agent de suppressivité spécifique.", "statut": "✓"}, {"fr": "Azospirillum", "en": "Azospirillum", "doc_code": "S2", "definition": "PGPR fixateur d'azote associatif vivant dans la rhizosphère des graminées. Stimule la croissance végétale par production d'auxines et amélioration de l'absorption hydrique. Bio-inoculant largement utilisé.", "statut": "◆"}, {"fr": "Azotobacter", "en": "Azotobacter", "doc_code": "S2", "definition": "Genre bactérien aérobie fixateur d'azote libre (non-symbiotique). Produit des phytohormones (auxines, gibbérellines) et des sidérophores. Bioindicateur de sols aérés et riches en MO.", "statut": "◆"}, {"fr": "Bactéries Solubilisatrices (ex: PSB)", "en": null, "doc_code": "S2", "definition": "Micro-organismes capables de transformer des minéraux insolubles (comme le phosphore bloqué ou le fer) en formes directement assimilables par la plante via la sécrétion d'acides organiques ou de sidérophores (Delaporte‐Quintana et al., 2020).\n\nEnjeu : Elles permettent de réduire la dépendance aux engrais phosphatés en débloquant les réserves historiques du sol.\n\nLevier de décision : Inoculer ces bactéries (via des extraits fermentés ou des thés de compost) lors du semis pour garantir une nutrition précoce sans apport d'engrais starter soluble qui inhibe les mycorhizes.", "statut": "◆"}, {"fr": "Bradyrhizobium", "en": "Bradyrhizobium", "doc_code": "S2", "definition": "Rhizobium à croissance lente, partenaire symbiotique des soja, arachide et lupin. Tolérant l'acidité et les sols pauvres en N.", "statut": "✓"}, {"fr": "CUE", "en": "carbon use efficiency", "doc_code": "S2", "definition": "Rapport biomasse microbienne construite / carbone total consommé (0,2 à 0,6). CUE élevée = construction de MO stable (nécromasse, MAOM) ; CUE faible = respiration (CO₂ émis). La diversité végétale des couverts multi-espèces augmente mécaniquement la CUE via la diversification des exsudats racinaires (Domeignoz-Horta et al., 2024). CUE diminuée par : excès d'azote minéral, températures élevées, perturbations mécaniques. Levier de pilotage du stockage carbone.", "statut": "◆"}, {"fr": "Firmicutes", "en": "Firmicutes", "doc_code": "S2", "definition": "Phylum bactérien Gram+ incluant Bacillus, Clostridium, Lactobacillus. Sporulants, dominants en sols perturbés. Rôle clé dans les fermentations et la dégradation de la cellulose. Analogue du rapport copiotrophes dans le microbiome intestinal.", "statut": "◆"}, {"fr": "LUCA (Last Universal Common Ancestor)", "en": "LUCA (Last Universal Common Ancestor)", "doc_code": "S2", "definition": "Ancêtre commun universel de toute vie terrestre, apparu il y a ~4.2 Ga dans un environnement entièrement réduit (anaérobie), sans O₂, sans couche d'ozone. Tous les métabolismes fondamentaux (fermentation, transfert horizontal de gènes, biofilms) étaient déjà en place chez LUCA. La maturité génétique du monde bactérien a pris 3 Ga — avant le GOE.", "statut": "◆"}, {"fr": "Nitrobacter", "en": "Nitrobacter", "doc_code": "S2", "definition": "Bactérie nitrifiante oxidant le nitrite en nitrate (NO₂⁻→NO₃⁻), deuxième étape de la nitrification. Avec Nitrosomonas, forme le couple nitrificateur.", "statut": "◆"}, {"fr": "Nitrosomonas", "en": "Nitrosomonas", "doc_code": "S2", "definition": "Bactérie nitrifiante oxidant l'ammonium en nitrite (NH₄⁺→NO₂⁻), première étape de la nitrification. Indicateur de minéralisation active de la MO.", "statut": "◆"}, {"fr": "PGPR", "en": "plant growth-promoting rhizobacteria", "doc_code": "S2", "definition": "Plant Growth-Promoting Rhizobacteria — bactéries de la rhizosphère stimulant la croissance végétale par : (a) production de phytohormones (auxines, cytokinines, gibbérellines), (b) solubilisation de nutriments (P, Fe via sidérophores), (c) fixation d'azote, (d) biocontrôle des pathogènes (ISR, antibiose). Fondement des bio-inoculants modernes.", "statut": "✓"}, {"fr": "PSB", "en": "phosphate solubilizing bacteria", "doc_code": "S2", "definition": "Bactéries solubilisatrices de phosphate, groupe fonctionnel mobilisant le P inorganique fixé sur les oxydes Fe/Al et les carbonates via la sécrétion d'acides organiques (gluconique, citrique, oxalique) et de phosphatases extracellulaires. Genres principaux : Pseudomonas, Bacillus, Burkholderia, Arthrobacter. Actives dans la rhizosphère où les exsudats racinaires fournissent les substrats. Complémentaires aux CMA (voie mycorhizienne) pour l'alimentation phosphatée des plantes. Critères de sélection pour bio-inoculants : efficacité en conditions de pH et de teneur en P proches des conditions du sol cible.", "statut": "◆"}, {"fr": "Proteobacteria", "en": "Proteobacteria", "doc_code": "S2", "definition": "Phylum bactérien le plus diversifié fonctionnellement, incluant les PGPR (Pseudomonas, Azospirillum), les rhizobia, les bactéries nitrifiantes. Majoritairement copiotrophe. Augmente rapidement après apports organiques frais ou travail du sol.", "statut": "◆"}, {"fr": "Rhizobium", "en": "Rhizobium", "doc_code": "S2", "definition": "Bactérie fixatrice d'azote en symbiose obligatoire avec les légumineuses (nodosités racinaires). Fixe 50-200 kg N/ha/an selon l'espèce et les conditions. Source la plus efficace d'azote biologique pour les cultures.", "statut": "✓"}, {"fr": "Rhizodéposition", "en": null, "doc_code": "S2", "definition": "Processus par lequel les racines vivantes libèrent des composés organiques (exsudats, mucilages) dans la rhizosphère, représentant 10 à 40% du carbone fixé par la photosynthèse (Carof et al., 2018).\n\nEnjeu : C'est le \"salaire\" versé par la plante aux microbes en échange de nutriments et de protection. Les racines contribuent 5 fois plus au stockage du carbone que les pailles de surface (Rasse et al., 2005).\n\nLevier de décision : Maximiser la durée de présence de racines vivantes (doubles cultures, relais) pour maintenir le flux d'énergie vers le microbiome (Hinsinger et al., 2016).", "statut": "◆"}, {"fr": "Thaumarchaeota", "en": "Thaumarchaeota", "doc_code": "S2", "definition": "Phylum d'archées nitrifiantes dominant la nitrification en sols acides, surpassant Nitrosomonas dans les sols forestiers et les prairies permanentes. Bioindicateur de sols stables peu perturbés.", "statut": "◆"}, {"fr": "archées", "en": "archaea", "doc_code": "S2", "definition": "Troisième domaine du vivant, distincts des bactéries et des eucaryotes. Dans les sols, les archées jouent des rôles clés : Thaumarchaeota (nitrification en sols acides), Euryarchaeota (méthanogenèse en zones humides). Représentent 1-5% des procaryotes du sol mais parfois dominants dans les microsites anoxiques.", "statut": "✓"}, {"fr": "biofilm comme système hydraulique", "en": "biofilm as water management system", "doc_code": "S2", "definition": "Le biofilm bactérien est la première technologie de rétention d'eau de l'histoire de la vie (4 Ga). Matrice d'EPS composée à 97% d'eau structurée, protégée de l'évaporation. Sur une surface minérale (argile, sable, roche), le biofilm CRÉE son propre environnement hydrique. C'est le fondement de la rétention d'eau dans les micropores et le premier maillon de la microagrégation (EPS + argile = premier micro-agrégat, bien avant les champignons).", "statut": "◆"}, {"fr": "copiotrophes", "en": "copiotrophic microorganisms", "doc_code": "S2", "definition": "Micro-organismes à croissance rapide en milieux riches en carbone labile, dominant rapidement les substrats labiles frais (exsudats racinaires, résidus jeunes, apports d'engrais). Stratèges r : métabolisme rapide mais peu efficient, forte consommation de C sans construction de MO stable. Incluent Proteobacteria, Firmicutes, Bacteroidetes. Un sol dominé par les copiotrophes après un apport de C labile (bokashi, compost frais) risque un Priming Effect si le rapport copiotrophes/oligotrophes reste déséquilibré. La succession écologique naturelle va des copiotrophes vers les oligotrophes.", "statut": "◆"}, {"fr": "diazotrophe", "en": "diazotroph", "doc_code": "S2", "definition": "Organisme capable de fixer N₂ atmosphérique (N₂→NH₃) via la nitrogénase. Inclut les rhizobia (symbiotiques), Azotobacter (libres aérobies) et Clostridium (libres anaérobies). Service écosystémique majeur : chaque kg de N2 fixé économise l'équivalent de 3 kg d'urée.", "statut": "◆"}, {"fr": "dormance microbienne", "en": "microbial dormancy", "doc_code": "S2", "definition": "État de vie ralentie adopté par les micro-organismes en réponse aux stress (sécheresse, faim, froid). Les bactéries sporulantes (Bacillus, Actinobacteria) résistent à pF > 5. La dormance préserve le potentiel biologique lors des perturbations et explique le Birch effect lors de la réhumectation.", "statut": "◆"}, {"fr": "effet de masse microbienne", "en": "microbial mass effect", "doc_code": "S2", "definition": "Phénomène par lequel une forte biomasse microbienne indigene inhibe l etablissement d inoculants. Explique la variabilité des résultats des biostimulants selon le sol.", "statut": "◆"}, {"fr": "homéostasie microbienne", "en": "microbial homeostasis", "doc_code": "S2", "definition": "Maintien d'une composition chimique stœchiométrique constante par les micro-organismes malgré les variations du substrat. Mécanisme par lequel le microbiome régule les cycles C, N, P en immobilisant ou en minéralisant selon ses besoins. Distinct de l'homéostasie du sol (condition physico-chimique globale).", "statut": "◆"}, {"fr": "indice de diversité de Shannon", "en": "Shannon diversity index (H)", "doc_code": "S2", "definition": "H = -Σ(pi × ln(pi)) mesurant la diversité microbienne du sol. Sol sain : H > 4.5. Sol dégradé : H < 3.5. Corrélé à la suppressivité et à la résilience face aux perturbations.", "statut": "◆"}, {"fr": "métabarcoding", "en": "metabarcoding", "doc_code": "S2", "definition": "Séquençage massif de marqueurs taxonomiques (16S ARNr pour les bactéries, ITS pour les champignons) permettant d'inventorier simultanément des milliers d'espèces microbiennes à partir d'un échantillon de sol. Outil central de la caractérisation du microbiome. Fournit richesse taxonomique (Chao1), diversité fonctionnelle et structure des guildes.", "statut": "≈"}, {"fr": "métagénomique", "en": "metagenomics", "doc_code": "S2", "definition": "Séquençage de l'ADN total d'un environnement sans culture préalable, permettant d'accéder au potentiel fonctionnel du microbiome (gènes présents, voies métaboliques) en complément du métabarcoding taxonomique. Standard analytique pour les études de recherche sur le microbiome du sol.", "statut": "✓"}, {"fr": "nifH", "en": "nifH", "doc_code": "S2", "definition": "Gène marqueur universel de la fixation biologique d'azote, codant la sous-unité dinitrogenase réductase de la nitrogénase. Utilisé en métabarcoding pour inventorier les diazotrophes du sol.", "statut": "◆"}, {"fr": "nitrogénase", "en": "nitrogenase", "doc_code": "S2", "definition": "Complexe enzymatique Fe-Mo catalysant N₂→NH₃. Inhibé de manière irréversible par l'O₂ — exige des conditions microaérobies ou anaérobies (microsites anoxiques des légumineuses, hétérocystes des cyanobactéries).", "statut": "✓"}, {"fr": "nécromasse microbienne", "en": "microbial necromass", "doc_code": "S2", "definition": "Résidus cellulaires des micro-organismes morts, principale source de carbone stable du sol. Jusqu'à 80% du carbone organique stable du sol provient de la nécromasse et non directement des résidus végétaux (Khangura et al., 2023 ; Zhu et al., 2020). Mieux protégée physiquement dans les agrégats que le C végétal. Alimentée par un turnover microbien actif : une CUE élevée et un microbiome diversifié maximisent la production de nécromasse. Source principale du MAOM. Chiffre clé : 1 t de biomasse microbienne produira ~0,5 t de nécromasse stable.", "statut": "◆"}, {"fr": "oligotrophes", "en": "oligotrophic microorganisms", "doc_code": "S2", "definition": "Micro-organismes adaptés aux environnements pauvres en nutriments (< mg/L de C organique dissous), capables de croître à des concentrations de substrats très faibles. Stratèges K : métabolisme lent et efficient, systèmes enzymatiques haute affinité. Incluent Acidobacteria, Actinobacteria, certains champignons. Dans les sols, dominants dans les horizons appauvris et les phases tardives de décomposition de la MO récalcitrante. Un sol riche en oligotrophes indique des cycles nutritifs serrés et une faible perte de C. Les engrais azotés solubles les éliminent au profit des copiotrophes.", "statut": "◆"}, {"fr": "phoD", "en": "phoD", "doc_code": "S2", "definition": "Gène marqueur de la solubilisation du phosphore organique, codant une phosphodiestérase alcaline. Permet d'évaluer le potentiel de mobilisation du P organique par le microbiome.", "statut": "◆"}, {"fr": "plasmides", "en": "plasmids", "doc_code": "S2", "definition": "Petits fragments d'ADN circulaires extra-chromosomiques présents chez les bactéries. Portent des gènes de résistance aux antibiotiques, de production d'enzymes de dégradation, et de métabolites. Transférables horizontalement entre espèces bactériennes sans restriction taxonomique. Outil génétique clé de l'adaptabilité du monde bactérien — la plante reprogramme les plasmides de ses endophytes via le cycle rhizophagique.", "statut": "◆"}, {"fr": "quotient métabolique (qCO₂)", "en": "metabolic quotient (qCO₂)", "doc_code": "S2", "definition": "Rapport respiration/biomasse microbienne (mgCO₂-C/mgBiomasse-C/h). qCO₂ élevé = stress microbien ou sol dégradé (énergie dépensée en survie, pas en croissance). Indicateur de maturité écologique.", "statut": "◆"}, {"fr": "sidérophore", "en": "siderophore", "doc_code": "S2", "definition": "Molécule organique de faible poids moléculaire produite par des bactéries et champignons pour chélater le Fe³⁺ et le rendre biodisponible. Jouent un rôle dans la nutrition ferrique des plantes et dans la suppressivité (compétition pour le fer avec les pathogènes).", "statut": "✓"}, {"fr": "stratégies microbiennes S-A-Y", "en": "microbial strategies S-A-Y (stress-acquisition-yield)", "doc_code": "S2", "definition": "Framework écologique pour les micro-organismes du sol. S (stress-tolerant) : milieu dégradé, fluctuant, faible efficience d'utilisation du carbone (CUE). A (acquisition) : milieu pauvre, forte capacité d'extraction des minéraux mais faible CUE. Y (yield/rendement) : milieu équilibré, forte CUE, forte humification. La trajectoire de régénération = bascule S → A → Y. Les Y dominent en sol structuré (Zone 1-2).", "statut": "◆"}, {"fr": "stœchiométrie de Kirkby", "en": "Kirkby stoichiometry", "doc_code": "S2", "definition": "Ratio C:N:P:S = 10 000:833:200:143 de l'humus stable optimal (Kirkby, 2013). Ce rapport stœchiométrique définit les proportions d'éléments nécessaires à la formation de MO stable. Verrou théorique : un apport de C sans N, P, S en proportions correctes ne pourra pas être humifié. Distinct du ratio C/N pratique des couverts (outil terrain).", "statut": "✓"}, {"fr": "suppressivité du sol", "en": "soil suppressiveness", "doc_code": "S2", "definition": "Capacité naturelle d'un sol à réduire l'incidence des maladies telluriques malgré la présence de pathogènes et d'un hôte sensible. Mécanismes : compétition pour niches, antibiose, parasitisme, ISR. Indicateur de maturité biologique.", "statut": "◆"}, {"fr": "turnover microbien", "en": "microbial turnover", "doc_code": "S2", "definition": "Taux de renouvellement de la biomasse microbienne. Bactéries : heures à jours. Champignons : semaines. Pilote la production de nécromasse et donc le stockage de C organique stable (MAOM).", "statut": "◆"}, {"fr": "Chao1", "en": "Chao1 richness estimator", "doc_code": "S2/P1", "definition": "Estimateur statistique non paramétrique de la richesse totale en espèces microbiennes d'un sol (Chao, 1984). Extrapole le nombre d'espèces non détectées à partir des singletons et doubletons dans les données de métabarcoding. Un Chao1 élevé indique une 'banque de gènes' diversifiée permettant de répondre aux aléas climatiques. Chao1 faible → système simplifié manquant de redondance fonctionnelle → diversifier les rotations. Outil central du pilotage de la diversité microbienne.", "statut": "◆"}, {"fr": "guildes fongiques", "en": "fungal guilds", "doc_code": "S2/S3", "definition": "Groupes fonctionnels de champignons partageant des stratégies écologiques similaires, indépendamment de leur phylogénie (outil FUNGuild, Nguyen et al., 2015). Trois guildes principales : symbiotiques (CMA, ECM, endophytes) — échangent C contre nutriments ; saprotrophes (décomposeurs de litière, de bois, de MO récalcitrante) — minéralisent la MO ; pathogènes (biotropes, nécrotropes) — exploitent les plantes affaiblies. Le ratio guildes symbiotiques/pathogènes est un indicateur de santé du sol. L'absence de labour et la diversité végétale favorisent les guildes symbiotiques.", "statut": "◆"}, {"fr": "sol suppressif / sols suppressifs", "en": "suppressive soil / disease suppressive soil", "doc_code": "S2/S3", "definition": "Propriété d un sol inhibant naturellement le développement des pathogènes telluriques. Suppressivité générale (microbiome diversifié) vs spécifique (guildes particulières). Indicateur clé de santé du sol.", "statut": "~"}, {"fr": "stratégie Y-A-S (Yield-Acquisition-Stress)", "en": "Y-A-S framework (yield-acquisition-stress)", "doc_code": "S2/S3", "definition": "Cadre de traits microbiens proposé par Malik (2020) : Yield (CUE, efficience carbone), Acquisition (enzymes extracellulaires, mobilité), Stress tolerance (osmolytes, EPS, dormance). Permet de prédire les réponses des communautés microbiennes aux perturbations et aux apports.", "statut": "◆"}, {"fr": "MAOM", "en": "mineral-associated organic matter", "doc_code": "S2/S4", "definition": "Carbone organique d'origine microbienne associé et stabilisé aux surfaces des argiles et des oxydes Fe/Al. Fraction stable du sol (temps de résidence > 100 ans). Formée par précipitation de métabolites microbiens et de fragments de nécromasse sur les surfaces minérales. Complémentaire du POC (fraction labile). Le MAOM est le pool cible du carbon farming.", "statut": "✓"}, {"fr": "N-mining", "en": "nitrogen mining", "doc_code": "S2/S4", "definition": "Processus par lequel les micro-organismes décomposent la matière organique stable pour accéder à l'azote organique qu'elle contient, déstockant simultanément le carbone. Mécanisme clé du Priming Effect induit par l'azote minéral : l'excès d'azote soluble stimule les copiotrophes qui 'minent' la MO stable à la recherche de N → perte de COS. Maillon 4 de la chaîne causale C2.\n\nEnjeu : déstockage silencieux du capital carbone dans les sols sur-fertilisés en azote.\n\nLevier : maintenir l'équilibre copiotrophes/oligotrophes via les couverts diversifiés et la réduction des intrants azotés minéraux.", "statut": "◆"}, {"fr": "priming effect", "en": "priming effect", "doc_code": "S2/S4", "definition": "Accélération (priming positif) ou inhibition (priming négatif) de la minéralisation de la MO stable suite à un apport de carbone labile. Un apport de sucres simples (Bokashi, exsudats racinaires) stimule l'activité des copiotrophes qui, en se multipliant, sécrètent des enzymes déstabilisant également la MO ancienne. Risque opérationnel : un surdosage de biostimulants fermentés sur un sol déjà riche en COS peut provoquer un déstockage net. Cardinael et al. (2016). Levier : fractionner les apports, surveiller le ratio copiotrophes/oligotrophes. Distinguer priming réel (accélération enzymatique de la minéralisation de la MO native) vs apparent (co-métabolisme sans déstabilisation nette). Mesurable par isotopes stables (13C).", "statut": "◆"}, {"fr": "CMA (champignons mycorhiziens à arbuscules) / Glomeromycota", "en": "AMF (arbuscular mycorrhizal fungi) / Glomeromycota", "doc_code": "S3", "definition": "Champignons mycorhiziens à arbuscules (phylum Glomeromycota) formant des structures d'échange (arbuscules) à l'intérieur des cellules corticales racinaires. Échangent phosphore, zinc, cuivre et eau contre jusqu'à 30% du carbone photosynthétique de la plante. Colonisent 80% des plantes terrestres. Synthétisent la glomaline, ciment des agrégats. La teneur en P soluble >50 mg/kg et le travail du sol inhibent leur développement.", "statut": "~"}, {"fr": "CMN", "en": "common mycorrhizal network", "doc_code": "S3", "definition": "Réseau fongique mycorhizien inter-espèces reliant plusieurs plantes via les hyphes. Transfère C, N, eau et signaux chimiques entre plantes connectées. Constitue l'infrastructure de communication souterraine de l'écosystème. La richesse du CMN corrèle avec la productivité et la résilience de l'agroécosystème.", "statut": "◆"}, {"fr": "ECM", "en": "ectomycorrhiza", "doc_code": "S3", "definition": "Champignons ectomycorhiziens formant un manteau externe autour des racines fines et pénétrant entre les cellules corticales (réseau de Hartig) sans intracellularité. Associés aux arbres (chênes, hêtres, pins, bouleaux). Sécrètent des protéases extracellulaires mobilisant l'N organique du sol. Essentiels aux systèmes agroforestiers.", "statut": "✓"}, {"fr": "Funneliformis", "en": "Funneliformis mosseae", "doc_code": "S3", "definition": "Genre CMA (ex-Glomus mosseae). Espèce généraliste à large spectre d'hôtes, colonisant préférentiellement les graminées et légumineuses en sol calcaire.", "statut": "◆"}, {"fr": "Glomus", "en": "Glomus (historical genus)", "doc_code": "S3", "definition": "Genre obsolète (reclassé en 2012). Rhizophagus irregularis (ex-Glomus intraradices) est l espèce type. Utiliser Rhizophagus. Note historique : les études antérieures à 2012 utilisent Glomus.", "statut": "~"}, {"fr": "Rhizophagus", "en": "Rhizophagus irregularis", "doc_code": "S3", "definition": "Genre CMA principal et espèce de référence Rhizophagus irregularis (ex-Glomus intraradices, renommé en 2012). Espèce CMA la plus étudiée, la plus utilisée en bio-inoculants, généraliste colonisant la majorité des plantes cultivées.", "statut": "✓"}, {"fr": "Réseau Mycorhizien", "en": null, "doc_code": "S3", "definition": "Réseau de filaments fongiques (hyphes) reliant les racines de différentes plantes, permettant l'échange d'eau, de nutriments et de signaux d'alerte (Simard, 2018).\n\nEnjeu : Véritable internet du sol, il mutualise les ressources à l'échelle de la parcelle.\n\nLevier de décision : Supprimer le labour, qui agit comme une section de câbles fibre optique, pour préserver l'intégrité de ce réseau de communication et de transport (Simard, 2018).", "statut": "◆"}, {"fr": "Trichoderma", "en": "Trichoderma", "doc_code": "S3", "definition": "Genre fongique saprophyte et mycoparasite. Agent de biocontrôle majeur : compétition pour le substrat, production d'enzymes lytiques (chitinases, glucanases), induction de résistance systémique (ISR) chez la plante hôte.", "statut": "◆"}, {"fr": "chitine fongique", "en": "fungal chitin", "doc_code": "S3", "definition": "Polymère de N-acétylglucosamine constituant les parois fongiques (30–60% de la masse sèche). Résistant à la dégradation, principal contributeur à la nécromasse fongique stabilisée en MAOM dans les micro-agrégats.", "statut": "◆"}, {"fr": "glomaline", "en": "glomalin-related soil protein (GRSP)", "doc_code": "S3", "definition": "Glycoprotéine produite par les hyphes des CMA, principale colle biologique des macro-agrégats du sol. Représente 3-5% de la MO totale du sol. Temps de résidence : 7-42 ans. Sa concentration est l'un des indicateurs les plus sensibles à la détérioration du réseau mycorhizien par le labour. Contribution estimée : 60-70% de la stabilité des macro-agrégats.", "statut": "◆"}, {"fr": "mycobiome", "en": "mycobiome", "doc_code": "S3", "definition": "Ensemble des champignons et de leurs fonctions dans un écosystème sol. Représente 20-70% de la biomasse microbienne totale selon l'état du sol. Caractérisé par métabarcoding ITS et PLFA (marqueurs fongiques). Un ratio F/B élevé indique un sol mature à cycles lents et stables.", "statut": "≈"}, {"fr": "mycoparasite", "en": "mycoparasite", "doc_code": "S3", "definition": "Champignon parasitant d'autres champignons pathogènes. Trichoderma, Coniothyrium, Clonostachys sont les plus utilisés en biocontrôle. Mécanismes : antagonisme direct (enroulement d'hyphes, enzymes lytiques), compétition pour les nutriments, induction d'ISR.", "statut": "✓"}, {"fr": "nécromasse fongique", "en": "fungal necromass", "doc_code": "S3", "definition": "Résidus de parois fongiques (chitine, mélanine, glucanes) stabilisés dans le sol après la mort des champignons. Composante majeure de la nécromasse microbienne totale. La mélanine des parois fongiques est l'un des polymères organiques les plus résistants de la biosphère (temps de résidence > 1 000 ans). Contribue significativement au pool MAOM.", "statut": "◆"}, {"fr": "ratio F/B", "en": "fungi to bacteria ratio", "doc_code": "S3", "definition": "Rapport biomasse fongique / biomasse bactérienne, mesuré par PLFA. Indicateur de maturité et de stabilité du sol. F/B > 2 : sol forestier mature à cycles lents, stockage C élevé. F/B < 0,5 : sol perturbé, dominance bactérienne, cycles rapides, pertes de C. La succession écologique naturelle augmente progressivement le F/B. Les apports de MO carbonée et le non-labour augmentent le F/B.", "statut": "≈"}, {"fr": "réseau de Hartig", "en": "Hartig net", "doc_code": "S3", "definition": "Réseau d'hyphes ECM s'infiltrant entre les cellules épidermiques et corticales des racines fines, sans pénétrer les cellules. Interface d'échange ECM analogue aux arbuscules des CMA.", "statut": "◆"}, {"fr": "saprotrophes", "en": "saprotrophic fungi", "doc_code": "S3", "definition": "Champignons décomposeurs de MO morte (litière, bois, résidus). White-rot fungi : dégradent la lignine via les laccases/peroxydases. Brown-rot fungi : dégradent la cellulose mais pas la lignine. Saprotrophes généraux : dégradent les protéines, la chitine, la cellulose. Première guilde d'humification et de libération de nutriments bloqués dans les résidus récalcitrants.", "statut": "~"}, {"fr": "saprotrophes pourvoyeurs d'eau", "en": "saprotrophic fungi as water providers", "doc_code": "S3", "definition": "Les champignons saprotrophes remontent l'eau du sol vers le broyat de surface par capillarité hyphique pour dégrader la lignine (enzymes extracellulaires hydrauliques). Colonisent le mulch AVANT les CMA (pas besoin de racines). Créent des ponts capillaires entre grains de sol, homogénéisent la distribution d'eau. Cultivent des bactéries dans les films d'eau hyphiques (exsudats fongiques → recrutement sélectif). Leur nécromasse (chitine, mélanine) forme la MAOM stable.", "statut": "◆"}, {"fr": "strigolactone", "en": "strigolactone", "doc_code": "S3", "definition": "Signal racinaire (phytohormone) déclenchant la germination des spores CMA et la ramification des hyphes pré-symbiotiques. Sécrétée par les racines en conditions de faible P. Perçue par les CMA comme signal de l'hôte. Aussi piège pour les plantes parasites (Striga, Orobanche) — aspect négatif potentiel à considérer. Production stimulée par carence en P. Signal de recrutement CMA en conditions de faible disponibilité en phosphore.", "statut": "◆"}, {"fr": "pont mycorhizien", "en": "mycorrhizal bridge", "doc_code": "S3/P4", "definition": "Connexion fonctionnelle entre deux plantes via un reseau de champignons mycorhiziens partage. Transfert de C, N, P et signaux de defense.", "statut": "◆"}, {"fr": "LCO / facteurs Myc", "en": "lipochitooligosaccharides (LCO) / Myc factors", "doc_code": "S3/V2", "definition": "Molécules signal produites par les champignons mycorhiziens (Glomeromycota) pour initier la symbiose avec les racines. Reconnus par les récepteurs LysM de la plante. Rôle dans ISR et suppressivité.", "statut": "◆"}, {"fr": "133 GtC", "en": "133 GtC soil carbon debt", "doc_code": "S4", "definition": "Perte estimée de 133 GtC de carbone organique depuis l'apparition de l'agriculture intensive (Sanderman et al., 2017). Constitue la dette carbone de l'agriculture. Restaurable à hauteur de 4‰/an par des pratiques régénératrices sur les sols cultivés.", "statut": "◆"}, {"fr": "CNPS", "en": "soil C:N:P:S stoichiometry", "doc_code": "S4", "definition": "Équilibre stœchiométrique des éléments C, N, P, S dans les apports organiques et le sol. Complément de la stœchiométrie de Kirkby : le CNPS élargi intègre S comme 4ème élément limitant. Un apport de C sans S en proportion correcte ne permettra pas une humification complète.", "statut": "≈"}, {"fr": "Minéralisation Secondaire", "en": null, "doc_code": "S4", "definition": "Vitesse de décomposition lente de l'humus stable (matière organique humifiée), s'étendant sur des décennies ou des siècles (Noirot-Cosson, 2016; Robert, 2016).\n\nEnjeu : Elle assure le flux de nutriments de fond de la ferme. Si k2 est trop élevé (travail du sol intense), le capital sol s'épuise (Balesdent & Recous, 1997).\n\nLevier de décision : Réduire les perturbations mécaniques pour stabiliser le stock humique et garantir une fertilité résiliente sur le long terme (Balesdent & Recous, 1997).", "statut": "◆"}, {"fr": "N2O", "en": "nitrous oxide", "doc_code": "S4", "definition": "Protoxyde d'azote, gaz à effet de serre émis lors de la dénitrification incomplète (NO₃⁻→N₂O au lieu de N₂). 265× plus puissant que le CO₂ sur 100 ans. Principal GES de l'agriculture (excès d'azote minéral + conditions semi-anoxiques). Réduit par : limitation de l'azote soluble, couverture permanente du sol, augmentation de la diversité microbienne.", "statut": "✓"}, {"fr": "POC", "en": "particulate organic carbon", "doc_code": "S4", "definition": "Carbone organique particulaire (>50 µm), fraction labile de la MO du sol. Sensible aux pratiques culturales : indicateur précoce de changement. Temps de résidence : 10-100 ans. Distinct du MAOM (fraction stable). Un sol en amélioration montre d'abord une augmentation du POC avant celle du MAOM. Complémentaire : POC = réserve d'énergie pour le microbiome ; MAOM = stock de C stable.", "statut": "◆"}, {"fr": "RothC", "en": "RothC model", "doc_code": "S4", "definition": "Modèle mécaniste de dynamique du carbone organique du sol développé à Rothamsted Research (Coleman & Jenkinson, 1996). Divise la MO en 5 pools : DPM (décomposable), RPM (résistante), BIO (biomasse microbienne), HUM (humus), IOM (inerte). Les transferts entre pools suivent des cinétiques du premier ordre modulées par température, humidité et couverture. Outil de référence pour certifier les crédits carbone agricoles. Entrées nécessaires : COS initial, pluviométrie, ETP, type de sol, apports de MO. Disponible en open source.", "statut": "◆"}, {"fr": "accepteurs d'électrons", "en": "electron acceptors", "doc_code": "S4", "definition": "Composés chimiques réduits en absence d'O₂ selon une cascade de potentiels redox décroissants : O₂ → NO₃⁻ → Fe³⁺ → SO₄²⁻ → CO₂. Déterminent les voies métaboliques actives et la structure des communautés microbiennes dans les microsites anoxiques.", "statut": "◆"}, {"fr": "carbone-énergie vs carbone-structure (gîte et couvert)", "en": "energy carbon vs structural carbon", "doc_code": "S4", "definition": "Distinction fondamentale (Husson) entre deux usages du carbone dans le sol. Carbone-énergie (couvert) : molécules labiles (sucres, acides organiques) qui alimentent les micro-organismes. Carbone-structure (gîte) : molécules récalcitrantes et humus condensé qui donnent la capacité tampon et la stabilité physique. Un sol fonctionnel a besoin des deux — l'humification convertit le couvert en gîte.", "statut": "◆"}, {"fr": "cascade redox biologique", "en": "biological redox cascade", "doc_code": "S4", "definition": "Sequence d accepteurs d electrons en conditions d anaerobiose partielle : O2 → NO3- → Mn4+ → Fe3+ → SO42- → CO2. Pilote les cycles N, P, Fe.", "statut": "◆"}, {"fr": "coefficient d'humification (k1)", "en": "humification coefficient k1", "doc_code": "S4", "definition": "Fraction de la matière organique fraîche transformée en humus stable après 1 an, variant de 0,05 (sucres, protéines) à 0,50 (lignines) selon la nature des résidus et les conditions pédoclimatiques. Paramètre fondateur du modèle de bilan humique Hénin-Dupuis (1945). Calcul : Humification = k1 × apport annuel de MO fraîche. Pour maintenir ou augmenter le stock d'humus, les apports doivent compenser la minéralisation (constante k2 × stock). Un k1 élevé impose d'associer des résidus riches en lignine (paille, copeaux) aux apports azotés.", "statut": "◆"}, {"fr": "cycle du soufre", "en": "sulfur cycle", "doc_code": "S4", "definition": "Transformations biogéochimiques du soufre entre ses formes : SO₄²⁻ (sulfate oxydé, disponible) → SO₃²⁻ → H₂S (sulfure réduit, toxique à haute concentration) → S₀ (soufre élémentaire). Le soufre est le 4ème élément de la stœchiométrie de Kirkby (CNPS). Carencé dans les sols intensifs depuis la réduction des dépôts acides.", "statut": "◆"}, {"fr": "diagramme Eh-pH", "en": "Eh-pH diagram (Pourbaix diagram)", "doc_code": "S4", "definition": "Représentation graphique des domaines de stabilité des espèces chimiques en fonction du potentiel redox (Eh en mV) et du pH. Prédit la spéciation des éléments redox-sensibles (Fe, Mn, S, N, P) et donc leur biodisponibilité. Zone optimale pour la biologie du sol : Eh 200-400 mV, pH 6-7. En dessous de Eh 0 mV : conditions réductrices, dissolution des oxydes Fe/Al, mobilisation du P. Outil prédictif pour comprendre la disponibilité du phosphore dans les microsites anoxiques.", "statut": "◆"}, {"fr": "dénitrification", "en": "denitrification", "doc_code": "S4", "definition": "Réduction dissimilatrice de NO₃⁻ en N₂ via NO₂⁻ → NO → N₂O → N₂ par des bactéries anaérobies facultatives. Se produit dans les microsites anoxiques des agrégats. Source majeure de N₂O si incomplète.", "statut": "◆"}, {"fr": "faux plat du rendement (Zone 2)", "en": "yield plateau (regeneration Zone 2)", "doc_code": "S4", "definition": "Phase de la trajectoire de régénération (MO/Argile 17-24%) où le rendement stagne ou baisse alors que le carbone du sol augmente rapidement. Cause : les micro-organismes Y (forte CUE) captent N, P, S pour construire l'humus avant la plante. Le gain C est proportionnel à la baisse de rendement (Kirkby). Levier : fertilisation foliaire pour nourrir la plante sans alimenter la compétition microbienne.", "statut": "◆"}, {"fr": "gradient Eh (gradient redox)", "en": "redox gradient", "doc_code": "S4", "definition": "Variation spatiale du potentiel redox (Eh) à l'échelle du microsite ou du profil de sol. Les gradients Eh pilotent la coexistence de voies aérobies et anaérobies à quelques micromètres de distance, constituant la base physique de la diversité métabolique microbienne.", "statut": "◆"}, {"fr": "gradient redox du sol", "en": "soil redox gradient", "doc_code": "S4", "definition": "Variation du potentiel d'oxydo-réduction (Eh) avec la profondeur dans un sol vivant. Surface : 500-520 mV (oxydé). Sous broyat : -40 mV. À 20 cm dans sol poreux vivant : atmosphère proche de l'atmosphère primitive (pauvre en O₂, riche en COV, CO₂, NH₃). Plus on descend, plus on retrouve les conditions anaérobies originelles et les métabolismes associés.", "statut": "◆"}, {"fr": "humification", "en": "humification", "doc_code": "S4", "definition": "Processus biologique de transformation des résidus organiques frais en humus stable via des voies microbiennes complexes : polymérisation, condensation avec les fractions minérales, formation de liaisons hydrophobes. Contrôlé par le k1 (coefficient d'humification) et les conditions redox.", "statut": "◆"}, {"fr": "humus", "en": "humus", "doc_code": "S4", "definition": "Fraction stable de la MO du sol, résultat de l'humification (transformation biologique des résidus organiques). Comprend le MAOM (carbone minéralisé-associé aux minéraux) et le POC stable. Temps de résidence > 1 000 ans pour la fraction la plus stable. Siège de la CEC, de la rétention d'eau et de l'activité biologique.", "statut": "✓"}, {"fr": "k1 (constante de décomposition rapide)", "en": "k1 decomposition rate constant", "doc_code": "S4", "definition": "Constante de vitesse de décomposition de la matière organique labile (pool DPM dans RothC). Ne pas confondre avec le coefficient d'humification k1 (fraction humifiée). k1 décomposition : vitesse ; k1 humification : rendement.", "statut": "◆"}, {"fr": "k2 (constante de minéralisation lente)", "en": "k2 slow decomposition rate constant", "doc_code": "S4", "definition": "Vitesse de décomposition de la matière organique stable (MAOM, humus) par les oligotrophes. Typiquement 0,001–0,01 an⁻¹. Très sensible aux perturbations mécaniques (labour) et au priming effect. Liée au pool MAOM dans le modèle RothC.", "statut": "◆"}, {"fr": "microsites anoxiques", "en": "anaerobic microsites", "doc_code": "S4", "definition": "Zones localement sans oxygène à l'intérieur des agrégats du sol, où la consommation d'O₂ microbienne dépasse la diffusion atmosphérique. Permettent la coexistence de la nitrification (surface aérobie) et de la dénitrification (intérieur anaérobie) dans le même sol. Siège des voies fermentaires conservées depuis l'Archéen. Le labour détruit ces agrégats et homogénéise les conditions en éliminant les microsites anoxiques.", "statut": "◆"}, {"fr": "méthanogènes", "en": "methanogens", "doc_code": "S4", "definition": "Archées productrices de méthane (CH₄) en conditions strictement anoxiques (Eh < -200 mV), voie métabolique terminale de la dégradation anaérobie de la MO. Domaine Archaea, groupes Euryarchaeota. Actives dans les microsites anoxiques profonds, les zones humides et les digesteurs anaérobies. Indicateurs de conditions réductrices extrêmes. Le méthane est un GES 28× plus puissant que le CO₂.", "statut": "~"}, {"fr": "nitrification", "en": "nitrification", "doc_code": "S4", "definition": "Oxydation biologique séquentielle de NH₄⁺ en NO₂⁻ (Nitrosomonas, AOA) puis NO₃⁻ (Nitrobacter). Processus aérobie obligatoire, sensible au pH et à la température. Source de N₂O par nitrification incomplète.", "statut": "◆"}, {"fr": "phosphore organique (Po)", "en": "organic phosphorus (Po)", "doc_code": "S4", "definition": "Fraction du phosphore total liée à la matière organique (30-80% du P total en sols non fertilisés). Minéralisé par les phosphatases microbiennes (phoD). Flux dominant en sols biologiquement actifs.", "statut": "◆"}, {"fr": "pompe microbienne à carbone (MCP)", "en": "microbial carbon pump (MCP)", "doc_code": "S4", "definition": "Mécanisme par lequel les micro-organismes transforment le carbone organique labile (exsudats, résidus) en nécromasse stabilisée (MAOM). Le CUE microbien et le turnover déterminent l'efficacité de la pompe. Concept central de la séquestration biologique du carbone.", "statut": "◆"}, {"fr": "ratio Carbone/Argile (C/Argile)", "en": "Carbon-to-Clay ratio (C/Clay)", "doc_code": "S4", "definition": "Proxy de l'état structural du sol (Husson, CIRAD). MO/Argile > 24% (ou C/Argile > 1/8) = sol bien structuré (Zone 1). 17-24% = zone de transition avec faux plat du rendement (Zone 2). 12-17% = seuil critique de déstructuration (Zone 3). < 12% = sol effondré (Zone 4). Corrélé au score VESS. Utilisable comme indicateur de pilotage de la régénération.", "statut": "◆"}, {"fr": "ration du sol", "en": "soil ration (annual carbon input)", "doc_code": "S4", "definition": "Apport annuel de carbone de surface nécessaire au maintien de l'homéostasie du sol — analogue de la litière forestière. Entretient les trois étages biologiques : bactéries anaérobies (rétention eau par biofilms), champignons saprotrophes et mycorhiziens (transport eau, dégradation lignine), plantes (recyclage par photosynthèse). Modèle k1/k2 de Hénin-Dupuis : stock stable quand apport × k1 = stock × k2. Sans la ration, le stock décline exponentiellement.", "statut": "◆"}, {"fr": "redox ladder (séquence des accepteurs d'électrons)", "en": "redox ladder / electron acceptor sequence", "doc_code": "S4", "definition": "Séquence thermodynamique d'utilisation des accepteurs d'électrons selon le potentiel Eh décroissant : O2 (aérobie) → NO3 (dénitrification) → Mn4+ → Fe3+ → SO4 → CO2 (méthanogenèse). Chaque seuil Eh correspond à des voies microbiennes spécifiques et des émissions gazeuses différentes.", "statut": "◆"}, {"fr": "réaction de Fenton (sol)", "en": "Fenton reaction (soil)", "doc_code": "S4", "definition": "Réaction chimique dans les sols lors des transitions aérobie→anaérobie : le Fe²⁺ (fer réduit) réagit avec le peroxyde d'hydrogène métabolique pour produire des radicaux hydroxyles (OH•), agents hyper-oxydants qui détruisent la MO y compris celle considérée comme stable. Peut représenter 30-50% de la minéralisation dans les sols riches en fer. Aggravée par la compaction qui augmente les fluctuations redox.", "statut": "◆"}, {"fr": "saturation en carbone du sol", "en": "soil carbon saturation", "doc_code": "S4", "definition": "Capacité maximale d un sol à stocker du carbone stable (MAOM). Dépend de la surface spécifique des minéraux argileux et de la CEC. Au-delà de la saturation, le C supplémentaire reste en POC labile.", "statut": "◆"}, {"fr": "séquestration carbone", "en": "carbon sequestration", "doc_code": "S4", "definition": "Stockage du CO₂ atmosphérique dans le sol sous forme de MO stable (MAOM, nécromasse). Potentiel 4‰/an. Dépend de la CUE, du ratio F/B, du travail du sol et des apports organiques. Base du carbon farming.", "statut": "≈"}, {"fr": "temps de résidence moyen (MRT)", "en": "mean residence time (MRT)", "doc_code": "S4", "definition": "Durée moyenne de séjour d un atome de carbone dans un pool donné (jours pour POC, décennies-siècles pour MAOM). Indicateur clé de la stabilité du stockage carbone.", "statut": "◆"}, {"fr": "voie oxalate-carbonate", "en": "oxalate-carbonate pathway", "doc_code": "S4", "definition": "Séquestration stable du carbone via la transformation oxalate (produit fongique) → calcite (CaCO₃) catalysée par des bactéries oxalotrophes. Voie unique de séquestration inorganique du C photosynthétique. Particulièrement active dans les systèmes agroforestiers (Salix, Populus).", "statut": "≈"}, {"fr": "stœchiométrie C/N", "en": "carbon to nitrogen ratio", "doc_code": "S4/P2", "definition": "Rapport carbone/azote des résidus organiques, outil de pilotage terrain le plus courant pour les couverts végétaux et les apports organiques. C/N < 20 : minéralisation nette (libération d'N), risque de lixiviation. C/N 20-30 : équilibre immobilisation/minéralisation. C/N > 30 : faim d'azote (immobilisation microbienne de l'N minéral). Distinct de la stœchiométrie de Kirkby (CNPS de l'humus stable). Outil opérationnel pour concevoir les mélanges de couverts et éviter la pénalisation de la culture suivante.", "statut": "◆"}, {"fr": "K1 (coefficient d'humification)", "en": "humification coefficient (K1)", "doc_code": "S4/P3", "definition": "Fraction MO→humus. BRF ~50%, broyat ~35%, fumier bovin ~25%, paille ~15%, compost ~10%.", "statut": "validé"}, {"fr": "turnover racinaire", "en": "root turnover", "doc_code": "S4/V2", "definition": "Renouvellement des racines fines (<2 mm) par mort et remplacement (50-70%/an). Constitue une source majeure de C organique (0.5-3 tC/ha/an). Alimentent directement la pompe microbienne à carbone.", "statut": "◆"}, {"fr": "thermodynamique des cycles (ΔG)", "en": "thermodynamics of biogeochemical cycles", "doc_code": "S4/V3", "definition": "Pilotage des cycles biogéochimiques via le potentiel énergétique des réactions (énergie libre ΔG). La fermentation anaérobie libère peu d'énergie (ΔG faible) mais conserve le carbone et l'azote dans les métabolites ; la respiration aérobie libère beaucoup d'énergie mais oxyde le C en CO₂. En agriculture régénératrice : favoriser les voies fermentaires (ΔG négatif faible) dans les microsites anoxiques pour conserver le capital C et N plutôt que de tout oxyder. Fondement thermodynamique de la valeur du Bokashi vs compost aérobie.", "statut": "◆"}, {"fr": "Marcel Bouché", "en": "Marcel Bouché", "doc_code": "V1", "definition": "Zoologiste français, auteur de la classification fonctionnelle des vers de terre en trois guildes (épigés, endogés, anéciques), 1972. Classif
