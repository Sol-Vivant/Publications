": "→ Le tableau de bord sur 5 ans suit 8 indicateurs : (1) MO % (2) ratio C/Argile (3) Ksat (4) VESS (5) comptage faune (6) ratio F/B (7) rendement (8) coût intrants. Mesure annuelle en même saison, même profondeur.\n→ La trajectoire attendue en transition : année 1-2 baisse rendement + hausse MO modeste. Année 3-4 faux plat (Husson Zone 2). Année 5+ rendement remonte, intrants chutent, tous les indicateurs biologiques en hausse.\n→ Le tableau de bord est la PREUVE de la transition : il montre que la baisse de rendement initiale est un investissement, pas une perte. Il rassure l'agriculteur et convainc le banquier.", "contexte_sci": "Le suivi sur 5 ans permet de mesurer la trajectoire de régénération. Les indicateurs à suivre : MO, ratio F/B, infiltration, vers de terre, rendement, densité nutritionnelle.", "instructions": "Tableau de bord de suivi : indicateur × fréquence × méthode × objectif à 5 ans. Termes : réserve utile, biomasse microbienne.", "style": "opérationnel pratique"}, {"type": "conclusion", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": null, "contexte_sci": "Ce document couvre 10 sections organisées autour de 4 chapitres : I. La texture comme fondation, II. Tests terrain, III. Analyses laboratoire, IV. De l'analyse à la décision. La conclusion doit synthétiser les mécanismes clés et ouvrir sur les perspectives pratiques ou scientifiques.", "instructions": "Le diagnostic est le premier acte de la régénération. Synthétiser : terrain → labo → arbre de décision → action → suivi. Le sol raconte son histoire à qui sait le lire.", "style": "narratif praticien"}], "n_terms": 26}, {"code": "P2", "titre": "Agriculture de Conservation", "strate": "P", "note": "Absorbe NOYAU partie P. 3 piliers ACS indissociables (Carpentier 2020), couverts multi-espèces, biopuncture, cultures de services, stœchiométrie C/N.", "titre_jenni": "Agriculture de Conservation des Sols", "style": "scientifique pratique", "statut_redaction": "a_faire", "priorite": 14, "angle_entree": "La diversité botanique du couvert est le premier levier — elle détermine la diversité des exsudats et donc du microbiome.", "public_cible": "agronome praticien, agriculteur", "sources_core": null, "notes_jenni": "Conception, espèces, C/N, roulage-crimpage. Lien S2 (recrutement), S3 (CMA).", "sections": [{"type": "intro", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": "→ L'ACS EST la bascule performance→robustesse de Hamant appliquée à l'agriculture. Non-labour = accepter la contreperformance (pas de résultat immédiat) pour la robustesse (structure biologique sur 5 ans).\n→ Mélanges variétaux : 5% en 2010 → 40% en 2020 (Hamant). Les pionniers ACS = les étourneaux à la périphérie qui contaminent le cœur. La transformation est en cours.\n→ Les plantes exploiteuses (Zones 3-4) vs conservatrices (Zone 1) : adapter les couverts au diagnostic C/Argile.", "contexte_sci": "La diversité botanique du couvert est le premier levier — elle détermine la diversité des exsudats et donc du microbiome. Il mobilise 26 termes canoniques et 7 connexions vers d'autres documents du corpus. Il intervient dans les chaînes causales : [À VALIDER] Piège de la performance → Robustesse par les contreperformances.", "instructions": "Présenter l'ACS (Agriculture de Conservation des Sols) comme le changement de paradigme : de la mécanique à la biologie. Trois piliers : non-labour, couverts permanents, diversification. Annoncer les 5 chapitres.", "style": "scientifique praticien"}, {"type": "section", "chapitre": 1, "section": 1, "titre_h1": "I. Fondements de l'ACS", "titre_h2": "1.1 Définition, histoire et diffusion mondiale", "titre_h3": null, "tableau": 0, "enrichissement": "→ L'ACS (Agriculture de Conservation des Sols) repose sur 3 piliers : (1) non-labour (2) couverture permanente du sol (3) rotation diversifiée. Ces 3 piliers sont synergiques — en retirer un réduit drastiquement les bénéfices.\n→ Historique : Edward Faulkner (1943) « Plowman's Folly », Masanobu Fukuoka (1975) « La Révolution d'un seul brin de paille », Lucien Seguy (CIRAD, 1970s) au Brésil. L'ACS n'est pas nouvelle — elle est redécouverte après 70 ans d'oubli.\n→ Diffusion mondiale : 200 millions d'hectares en ACS (2020), principalement en Amérique (Brésil, Argentine, USA). En France : < 5% des surfaces. Le frein principal : le « faux plat » des premières années.", "contexte_sci": "L'ACS est définie par la FAO : non-labour, couverture permanente, diversification. Historique depuis Edward Faulkner (1943) et Masanobu Fukuoka. Diffusion mondiale : 200M ha.", "instructions": "Définir les 3 piliers ACS. Histoire et chiffres de diffusion mondiale. Termes : agriculture de conservation des sols (ACS).", "style": "scientifique accessible"}, {"type": "section", "chapitre": 1, "section": 2, "titre_h1": null, "titre_h2": "1.2 Le changement de paradigme : de la mécanique au biologique", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le changement de paradigme : de la mécanique au biologique. L'agriculture conventionnelle cherche le sol comme un support INERTE à fertiliser. L'ACS considère le sol comme un organisme VIVANT à nourrir.\n→ Le labour = pensée mécaniste (Descartes : le sol est une machine). Le non-labour = pensée systémique (le sol est un écosystème). Le changement de paradigme est aussi philosophique que technique.\n→ La bascule performance → robustesse (Hamant) : le labour maximise le rendement immédiat (minéralisation forcée de la MO). Le non-labour accepte la contreperformance initiale pour la résilience à long terme.", "contexte_sci": "Le changement de paradigme : passer de la gestion mécanique du sol (labour, compaction, érosion) à la gestion biologique (vers de terre, champignons, couverts). Le sol comme organisme vivant, pas comme substrat.", "instructions": "Comparer les deux paradigmes. Pourquoi le labour a été efficace à court terme et destructeur à long terme. Termes : bioturbation, tassement-compaction.", "style": "analytique engagé"}, {"type": "section", "chapitre": 2, "section": 1, "titre_h1": "II. Non-labour", "titre_h2": "2.1 Ce que le non-labour préserve", "titre_h3": null, "tableau": 0, "enrichissement": "→ Ce que le non-labour préserve : (1) les galeries de vers de terre (macroporosité, Ksat ×10) (2) le réseau mycorhizien (CMA, accès eau + P) (3) les agrégats et le carbone occlus (4) la stratification naturelle des horizons (gradient redox).\n→ Un seul passage de charrue détruit 3-5 ans de construction biologique : galeries bouchées, hyphes sectionnés, agrégats éclatés, carbone occlus exposé. Le coût réel du labour n'est pas le gas-oil — c'est la destruction du capital biologique.\n→ L'effet du non-labour sur le carbone : +0.3 à +0.8 tC/ha/an de séquestration nette (méta-analyses). Sur 20 ans = 6-16 tC/ha = 22-59 tCO₂eq/ha. À 30 €/tCO₂, c'est 660-1770 €/ha de valeur carbone.", "contexte_sci": "Le non-labour préserve : les galeries de vers, le réseau mycorhizien, la stratification de la MO, les agrégats, la faune. Chaque passage de charrue détruit des années de construction biologique.", "instructions": "Quantifier ce que le non-labour préserve (réseau CMA, vers, agrégats). Données comparatives labour vs non-labour. Termes : bioturbation, agrégats, CMA.", "style": "scientifique dense"}, {"type": "section", "chapitre": 2, "section": 2, "titre_h1": null, "titre_h2": "2.2 Gestion du désherbage sans labour", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le désherbage sans labour est le DÉFI TECHNIQUE majeur de l'ACS. Quatre stratégies : (1) couverts étouffants (seigle/vesce, 8-12 t MS/ha) (2) roulage-crimpage (destruction mécanique sans retournement) (3) herbicide de contact (glyphosate, controversé) (4) faux semis.\n→ Le mulch de couvert détruit supprime 70-90% des adventices par effet physique (lumière bloquée) + allélopathie (composés inhibiteurs du seigle : benzoxazinoïdes). C'est un « herbicide biologique » gratuit.\n→ La question du glyphosate en ACS : c'est le dilemme éthique. Le non-labour sans glyphosate est possible (couverts + roulage + faux semis) mais plus exigeant techniquement. Le labour sans glyphosate est la norme mais détruit le sol. Aucune option n'est parfaite.", "contexte_sci": "Le désherbage sans labour : faux-semis, occultation (bâchage), roulage-crimpage, couverts étouffants, désherbage mécanique de surface.", "instructions": "Les alternatives au glyphosate en ACS. Avantages/limites de chaque technique. Termes : occultation (bâchage), couvert biomax.", "style": "opérationnel pratique"}, {"type": "section", "chapitre": 3, "section": 1, "titre_h1": "III. Couverts végétaux", "titre_h2": "3.1 Types de couverts et choix agronomique", "titre_h3": null, "tableau": 1, "enrichissement": "→ Types de couverts : (1) hivernaux (seigle, vesce, trèfle — protègent le sol l'hiver) (2) estivaux (sorgho, tournesol — structure + biomasse) (3) multi-espèces (8-15 espèces — diversité fonctionnelle maximale).\n→ Les mélanges multi-espèces sont SUPÉRIEURS aux couverts mono-spécifiques : plus de biomasse (+20-40%), plus de diversité racinaire (recrutement microbien diversifié), plus de services (fixation N + décompaction + P mining + CMA).\n→ Le choix du couvert dépend du diagnostic : sol compacté → radis fourrager + féverole (pivots). Faible N → trèfle + vesce (légumineuses). Faible MO → seigle + avoine (biomasse C élevée). Carence P → sarrasin + lupin (P mining).", "contexte_sci": "Les couverts végétaux sont le deuxième pilier : ils nourrissent le sol, protègent la surface, pompent les nutriments en profondeur. Le choix des espèces détermine les services rendus. Lien avec le microbiome fongique (couverts mycorhizogènes et CMN).", "instructions": "Types de couverts : crucifères (décompaction), légumineuses (fixation N), graminées (carbone), multi-espèces (synergie). Termes : couvert biomax, rotation sur prairie (MSV).", "style": "scientifique pratique"}, {"type": "section", "chapitre": 3, "section": 2, "titre_h1": null, "titre_h2": "3.2 Roulage-crimpage : destruction sans labour", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le roulage-crimpage (roller-crimper) : un rouleau de 2-3 tonnes aplatit et plie le couvert sans le couper. Le couvert meurt par interruption vasculaire et forme un mulch de 8-15 t MS/ha directement en place.\n→ Conditions de réussite : le couvert doit être à floraison (seigle) ou début grenaison (vesce) pour que le crimpage soit létal. Trop tôt = repousse. Trop tard = graines viables (adventice l'année suivante).\n→ Le semis direct dans le mulch crimpé : le semoir à disques coupe le mulch et dépose la graine en contact avec le sol. Le mulch conserve l'humidité (suppression évaporation 50-70%) et supprime les adventices (barrière physique + allélopathie).", "contexte_sci": "Le roulage-crimpage est la destruction mécanique du couvert sans retournement du sol. Il crée un paillage in situ. Technique clé de la transition ACS.", "instructions": "Protocole du roulage-crimpage : stade du couvert, matériel, conditions. Termes : paillage.", "style": "opérationnel pratique"}, {"type": "section", "chapitre": 4, "section": 1, "titre_h1": "IV. Diversification", "titre_h2": "4.1 Rotations et diversification des cultures", "titre_h3": null, "tableau": 0, "enrichissement": "→ La rotation diversifiée est le TROISIÈME pilier de l'ACS, souvent négligé. La monoculture + non-labour = accumulation de pathogènes et d'adventices résistantes. La rotation brise les cycles parasitaires.\n→ Rotation type ACS : blé → colza → blé → pois → blé → tournesol sur 6 ans. Avec couverts intermédiaires multi-espèces entre chaque culture. Chaque culture modifie le microbiome du sol et prépare la suivante.\n→ Les associations (relay cropping, strip-till) poussent le concept plus loin : deux cultures simultanées dans la même parcelle. Le maïs + haricot grimpant (milpa mexicaine) est un système vieux de 7000 ans qui maximise la complémentarité.", "contexte_sci": "La diversification des rotations casse les cycles de pathogènes, améliore le profil nutritionnel du sol, et stimule la diversité microbienne.", "instructions": "Principes de rotation : alternance familles, alternance racines pivotantes/fasciculées, introduction légumineuses. Termes : rotation sur prairie (MSV).", "style": "scientifique pratique"}, {"type": "section", "chapitre": 5, "section": 1, "titre_h1": "V. Transition", "titre_h2": "5.1 Les 4 phases de la transition ACS", "titre_h3": null, "tableau": 0, "enrichissement": "→ Les 4 phases de la transition ACS correspondent aux zones de Husson : Phase 1 (sevrage, 1-3 ans, Zone 4→3) : arrêt labour + premiers couverts. Baisse rendement 10-20%. Phase 2 (faux plat, 3-5 ans, Zone 3→2) : MO monte, rendement stagne.\n→ Phase 3 (acquisition, 5-10 ans, Zone 2→1) : le sol commence à « rendre ». Rendement remonte, coût intrants baisse. Phase 4 (maturité, >10 ans, Zone 1) : résilience + rendement + autonomie. Cagnolle : 1.4% → 9% MO en 10 ans.\n→ Le foliaire en Phase 1-2 : nourrir la plante par les feuilles (micronutriments + acides aminés) pendant que le sol reconstruit sa biologie. Le foliaire contourne la compétition sol-plante pour N/P/S et aide à passer le « faux plat ».", "contexte_sci": "La transition ACS se fait en 4 phases : (1) sevrage chimique, (2) reconstruction biologique, (3) autonomie partielle, (4) sol vivant fonctionnel. Le ratio copiotrophes/oligotrophes positionne l'exploitation.", "instructions": "Décrire les 4 phases avec indicateurs de passage. Les difficultés de chaque phase. Termes : auto-fertilité.", "style": "opérationnel pratique"}, {"type": "section", "chapitre": 5, "section": 2, "titre_h1": null, "titre_h2": "5.2 La Pompe à Carbone Microbienne en ACS", "titre_h3": null, "tableau": 0, "enrichissement": "→ La Pompe à Carbone Microbienne en ACS : les couverts photosynthétisent → exsudats racinaires nourrissent les micro-organismes → la nécromasse microbienne se stabilise en MAOM sur les argiles. Le non-labour préserve cette chaîne intacte.\n→ L'ACS maximise la MCP (Microbial Carbon Pump) : couvert permanent = apport C continu. Non-labour = nécromasse préservée in situ. Rotation diversifiée = diversité microbienne → CUE élevé → plus de nécromasse par unité de C.\n→ Potentiel de séquestration en ACS complète (3 piliers respectés) : 1-3 tC/ha/an pendant 20-30 ans. Si généralisé aux 30 Mha de terres arables françaises = 30-90 MtC/an = compensation de 5-15% des émissions nationales.", "contexte_sci": "La pompe à carbone microbienne en ACS : les couverts alimentent le microbiome qui produit la nécromasse qui stabilise le carbone. C'est le mécanisme de séquestration en contexte ACS.", "instructions": "Expliquer le cycle vertueux couvert → exsudats → microbiome → nécromasse → MAOM. Quantifier la séquestration en ACS (0.5-1 tC/ha/an). Termes : nécromasse microbienne, MAOM, séquestration.", "style": "scientifique dense"}, {"type": "conclusion", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": null, "contexte_sci": "Ce document couvre 9 sections organisées autour de 5 chapitres : I. Fondements de l'ACS, II. Non-labour, III. Couverts végétaux, IV. Diversification et 1 autres. La conclusion doit synthétiser les mécanismes clés et ouvrir sur les perspectives pratiques ou scientifiques.", "instructions": "L'ACS est la transition du sol mort au sol vivant. Synthétiser les 3 piliers et les 4 phases. Le sol se régénère quand on cesse de le détruire et qu'on nourrit sa biologie.", "style": "narratif praticien"}], "n_terms": 30}, {"code": "P3", "titre": "Biostimulants et Fermentations Appliquées", "strate": "P", "note": "Pendant pratique de V3. Catalogue EM/KNF/JADAM/LiFoFer. Chaînes causales. Avertissement priming effect (S4) + risque ARG (H2). Enrobage semences.", "titre_jenni": "Biostimulants et Fermentations Appliquées", "style": "opérationnel pratique", "statut_redaction": "a_faire", "priorite": 15, "angle_entree": "Du bokashi au PGPR — les outils biologiques disponibles, leur mode d'action, leurs limites.", "public_cible": "agronome praticien, conseiller", "sources_core": null, "notes_jenni": "Trichoderma, Bacillus, CMA inoculés, bokashi. Matrice efficacité × contexte.", "sections": [{"type": "intro", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": "→ Le bokashi + urine (N) + cendre (P,K) = approximation empirique du ratio de Kirkby. Pas besoin de calculer — la fermentation intègre naturellement les bons ratios si le substrat est diversifié.\n→ Sur sol dégradé (Zone 4) : MO incorporée + lacto-fermenté = amorçage. Contact MO-argile + inoculation simultanée + correction redox. 3 leviers en 1 geste.\n→ Sur sol vivant (Zone 1-2) : lacto-fermenté en surface uniquement. Le sol a ses propres acteurs — le ferment est un boost, pas une reconstruction.", "contexte_sci": "Du bokashi au PGPR — les outils biologiques disponibles, leur mode d'action, leurs limites. Il mobilise 15 termes canoniques et 7 connexions vers d'autres documents du corpus. Il intervient dans les chaînes causales : [À VALIDER] Piège de la performance → Robustesse par les contreperformances.", "instructions": "Présenter les biostimulants comme l'interface entre la science du microbiome et la pratique agricole. Le cadre réglementaire européen structure ce marché en pleine croissance. Annoncer : réglementation, biostimulants abiotiques, bioinoculants, bokashi, limites.", "style": "scientifique praticien"}, {"type": "section", "chapitre": 1, "section": 1, "titre_h1": "I. Cadre réglementaire", "titre_h2": "1.1 Règlement UE 2019/1009 : définition et catégories", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le règlement UE 2019/1009 définit les biostimulants comme des produits qui « stimulent les processus naturels de nutrition des plantes indépendamment des nutriments qu'ils contiennent ». C'est la reconnaissance officielle de l'effet BIOLOGIQUE distinct de l'effet CHIMIQUE.\n→ 7 catégories : (1) substances humiques/fulviques (2) produits à base d'algues (3) acides aminés et peptides (4) micro-organismes (5) biopolymères (chitosane) (6) extraits végétaux (7) composés inorganiques.\n→ Le marché mondial des biostimulants : 3.5 Md€ (2023), croissance 12%/an. La transition réglementaire crée un cadre pour les fermentations artisanales (bokashi, EM, LiFoFer) — mais aussi un risque de récupération par l'agrochimie.", "contexte_sci": "Le règlement UE 2019/1009 définit les biostimulants et leurs catégories. C'est le cadre légal qui distingue biostimulants, engrais et produits phytosanitaires.", "instructions": "Décrire le cadre réglementaire. Catégories fonctionnelles des biostimulants. Termes : biostimulants.", "style": "scientifique accessible"}, {"type": "section", "chapitre": 1, "section": 2, "titre_h1": null, "titre_h2": "1.2 La chaîne causale biostimulant → sol → plante", "titre_h3": null, "tableau": 0, "enrichissement": "→ La chaîne causale biostimulant → sol → plante : le biostimulant ne nourrit pas la plante directement — il STIMULE le microbiome du sol qui nourrit la plante. L'effet est INDIRECT et dépend de l'état biologique du sol.\n→ Sur sol dégradé (microbiome appauvri) : le biostimulant a un effet MAJEUR (il apporte ce qui manque). Sur sol riche (microbiome fonctionnel) : l'effet est MARGINAL (le sol fait déjà le travail). C'est pourquoi les résultats varient tant.\n→ Le diagnostic AVANT le biostimulant : ratio C/Argile (état structural) + F/B (état biologique) + analyse chimique (carences NPS). Le biostimulant est un OUTIL de transition, pas une solution permanente.", "contexte_sci": "La chaîne causale biostimulant → sol → plante passe par le microbiome. Le biostimulant n'agit pas directement sur la plante mais sur le système sol-microbiome. Lien avec le diagnostic (diagnostic microbien → choix biostimulant).", "instructions": "Expliquer la chaîne causale et pourquoi le contexte sol détermine l'efficacité. Termes : biostimulants, PGPR.", "style": "scientifique synthétique"}, {"type": "section", "chapitre": 2, "section": 1, "titre_h1": "II. Biostimulants abiotiques", "titre_h2": "2.1 Acides humiques, fulviques et aminés", "titre_h3": null, "tableau": 1, "enrichissement": "→ Les acides humiques et fulviques sont des FRAGMENTS de MO en décomposition. Les fulviques (faible poids moléculaire, solubles) chélatent les micronutriments et les rendent disponibles. Les humiques (haut poids moléculaire) structurent les agrégats.\n→ Les acides aminés exogènes (glutamate, glycine) stimulent le métabolisme microbien et le chimiotactisme racinaire. Ils fournissent de l'azote organique directement utilisable sans nitrification (pas d'acidification, pas de lessivage).\n→ Limite : les acides humiques/fulviques commerciaux sont extraits de léonardite (lignite oxydé) = ressource fossile non renouvelable. Les alternatives durables : compost de qualité, vermicompost, fermentations qui produisent les MÊMES molécules in situ.", "contexte_sci": "Les acides humiques et fulviques stimulent l'absorption racinaire et la CEC. Les acides aminés (hydrolysat) fournissent de l'azote organique directement assimilable.", "instructions": "Mécanismes d'action des biostimulants abiotiques. Données d'efficacité. Termes : biostimulants.", "style": "scientifique dense"}, {"type": "section", "chapitre": 3, "section": 1, "titre_h1": "III. Bioinoculants", "titre_h2": "3.1 PGPR : sélection et application", "titre_h3": null, "tableau": 1, "enrichissement": "→ Les PGPR sélectionnées (Bacillus subtilis, B. amyloliquefaciens, Pseudomonas fluorescens) sont les biostimulants les plus étudiés : > 5000 publications. Effets : fixation N, solubilisation P, production IAA, ISR, biocontrôle.\n→ Le CHOIX de la souche dépend du problème : carence P → Bacillus megaterium (phosphatase). Stress hydrique → B. subtilis (production EPS, biofilms). Pathogènes → P. fluorescens (antibiotiques, ISR). Stress froid → Pseudomonas sp. psychrotolérantes.\n→ Limites de l'inoculation commerciale : les souches importées survivent rarement > 2-4 semaines dans un sol qui ne leur est pas favorable. L'approche IMO/KNF (micro-organismes locaux) est souvent plus durable car adaptée au contexte.", "contexte_sci": "Les PGPR comme bioinoculants : sélection de souches, formulation, application. Le défi de la survie dans le sol et de la compétition avec le microbiome indigène.", "instructions": "Décrire le processus de sélection et d'application des PGPR. Le problème de la persistance. Termes : PGPR, Pseudomonas, Azospirillum, Bacillus.", "style": "scientifique pratique"}, {"type": "section", "chapitre": 3, "section": 2, "titre_h1": null, "titre_h2": "3.2 Bioinoculants mycorhiziens CMA : conditions de succès", "titre_h3": null, "tableau": 0, "enrichissement": "→ Les bioinoculants CMA (Rhizophagus irregularis, Funneliformis mosseae) restaurent la symbiose mycorhizienne sur sol dégradé. Succès condition : sol pauvre en P soluble (sinon la plante n'active pas la symbiose) + absence de fongicides.\n→ Facteurs d'échec de l'inoculation CMA : (1) P soluble trop élevé (> 20 mg/kg Olsen) → la plante n'investit pas dans le champignon (2) fongicides systémiques (3) labour qui détruit le réseau (4) jachère prolongée (pas d'hôte vivant).\n→ La meilleure stratégie CMA n'est PAS l'inoculation — c'est la PRÉSERVATION : non-labour + couvert permanent avec plantes mycorhizogènes (trèfle, luzerne, graminées). Le sol a ses propres CMA locales, adaptées — il suffit de ne pas les détruire.", "contexte_sci": "Les bioinoculants mycorhiziens (CMA) : conditions de succès (absence de P soluble, plante hôte, non-labour) et conditions d'échec (sol labouré, P élevé, fongicides).", "instructions": "Conditions de succès et d'échec de l'inoculation CMA. Le paradoxe : les sols qui en ont le plus besoin sont les plus hostiles à l'inoculation. Termes : CMA, strigolactones.", "style": "scientifique pratique"}, {"type": "section", "chapitre": 4, "section": 1, "titre_h1": "IV. Bokashi", "titre_h2": "4.1 Bokashi comme amendement biologique : mécanismes", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le bokashi comme amendement biologique : 6 effets simultanés documentés. (1) Apport MO fermentée (C labile + C récalcitrant) (2) inoculation microbienne (LAB, Bacillus, levures) (3) choc redox descendant (-170 mV) (4) métabolites actifs (GABA, vitamines B, polyphénols) (5) solubilisation minérale (Fe²⁺, Mn²⁺, P) (6) biofilms sur argile.\n→ Le mécanisme redox est le plus ORIGINAL : le bokashi abaisse le Eh du sol de +200 à +50 mV en quelques heures. Cela mobilise Fe²⁺ (solubilise le P fixé), Mn²⁺ (oligo-élément), et favorise les anaérobies fonctionnels.\n→ Dosage selon le diagnostic : sol dégradé (Zone 4) = 5-10 t/ha incorporé (contact MO-argile). Sol en transition (Zone 2-3) = 2-5 t/ha en surface. Sol mature (Zone 1) = 1-2 t/ha ou rien (le sol se suffit).", "contexte_sci": "Le bokashi comme amendement biologique : apport de microbiome diversifié, métabolites actifs, carbone fermenté. Lien avec les grands cycles (risque d'effet d'amorçage par le carbone labile) et le potentiel redox.", "instructions": "Mécanismes d'action du bokashi dans le sol. Quantifier les apports. Le risque d'effet d'amorçage avec le carbone labile. Termes : bokashi, potentiel redox (Eh), effet d'amorçage.", "style": "scientifique dense"}, {"type": "section", "chapitre": 4, "section": 2, "titre_h1": null, "titre_h2": "4.2 Modalités d'application et formulations", "titre_h3": null, "tableau": 0, "enrichissement": "→ Trois modes d'application : (1) bokashi solide en surface ou incorporé (2) extrait liquide (fermentation prolongée en eau, 1:20, aération intermittente) (3) spray foliaire dilué (1:500, métabolites + micro-organismes).\n→ Formulations adaptées : bokashi + urine (N disponible) + cendre (K, P, Ca) ≈ ratio de Kirkby empirique. Bokashi + argile broyée (bentonite) = création de complexes organo-minéraux (accélère la stabilisation MAOM).\n→ Le timing d'application est CRITIQUE : automne (avant l'hiver, nourrir les micro-organismes pendant la période froide) > printemps (stimuler la reprise biologique) > été (risque de priming effect si sol sec).", "contexte_sci": "Modalités d'application : doses, fréquence, moment, incorporation vs surface. Formulations commerciales vs fabrication fermière.", "instructions": "Guide pratique d'application. Termes : bokashi, LiFoFer.", "style": "opérationnel pratique"}, {"type": "section", "chapitre": 5, "section": 1, "titre_h1": "V. Intégration et limites", "titre_h2": "5.1 Conditions de succès et limites", "titre_h3": null, "tableau": 0, "enrichissement": "→ Conditions de succès des biostimulants : (1) sol avec une capacité biologique minimale (pas sur sol mort — il faut d'abord reconstruire) (2) diagnostic préalable (ratio C/Argile, F/B, carences) (3) application combinée (biostimulant + mulch + non-labour > biostimulant seul).\n→ Limites documentées : (1) variabilité des résultats (30% des essais montrent un effet nul) (2) dépendance au contexte (sol, climat, culture) (3) absence de standardisation des produits artisanaux (4) coût si achat commercial.\n→ Le biostimulant n'est PAS une fin en soi — c'est un ACCÉLÉRATEUR de transition. L'objectif est un sol qui se passe de biostimulants (Zone 1, microbiome autonome). Les meilleures fermes en transition n'en utilisent plus après 5-7 ans.", "contexte_sci": "Les conditions de succès des biostimulants : sol biologiquement actif, MO suffisante, pas de fongicides, pH compatible. Les limites : un biostimulant ne compense pas un sol mort.", "instructions": "Synthèse critique : quand ça marche, quand ça ne marche pas, pourquoi. Le biostimulant amplifie la biologie existante, il ne la crée pas.", "style": "scientifique synthétique"}, {"type": "conclusion", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": null, "contexte_sci": "Ce document couvre 8 sections organisées autour de 5 chapitres : I. Cadre réglementaire, II. Biostimulants abiotiques, III. Bioinoculants, IV. Bokashi et 1 autres. La conclusion doit synthétiser les mécanismes clés et ouvrir sur les perspectives pratiques ou scientifiques.", "instructions": "Les biostimulants sont des outils, pas des solutions miracles. Synthétiser : le sol doit être prêt (biologie active) pour que le biostimulant fonctionne. Le diagnostic précède toujours la prescription.", "style": "narratif praticien"}], "n_terms": 17}, {"code": "P4", "titre": "Agroforesterie et Systèmes Pérennes", "strate": "P", "note": "Absorbe Saule §IV. CMN agroforestier, hydraulic lift, Ernst Götsch, syntropic, Keyline Design, pâturage tournant, bandes fleuries.", "titre_jenni": "Agroforesterie et Systèmes Pérennes", "style": "scientifique pratique", "statut_redaction": "a_faire", "priorite": 16, "angle_entree": "Le non-labour est nécessaire mais insuffisant. La combinaison ACS + couvert + diversité est la clé.", "public_cible": "agronome praticien, chercheur", "sources_core": null, "notes_jenni": "ACS, TCS, non-labour. Données carbone, biodiversité, rendement long terme.", "sections": [{"type": "intro", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": "→ La forêt comme modèle de robustesse ultime (Hamant) : zéro intrant, zéro irrigation, productivité millénaire. Elle produit sa propre ration du sol, gère son eau par CMN + hydraulic lift, construit son sol par bioturbation + humification fongique.\n→ L'agroforesterie = tentative de reproduire la logique forestière avec contrainte de production. L'arbre fournit le GÎTE (lignine → nécromasse fongique → structure), le couvert fournit le COUVERT (exsudats → énergie micro-organismes).\n→ Technodiversité (Hamant) : garder toutes les technologies robustes. Le Keyline Design (1954) n'est pas obsolète parce que le drone existe.", "contexte_sci": "Le non-labour est nécessaire mais insuffisant. La combinaison ACS + couvert + diversité est la clé. Il mobilise 14 termes canoniques et 5 connexions vers d'autres documents du corpus. Il intervient dans les chaînes causales : [À VALIDER] Piège de la performance → Robustesse par les contreperformances.", "instructions": "Présenter l'agroforesterie comme le retour de l'arbre dans le système agricole. Les arbres créent un étage supplémentaire de services : ombre, remontée hydraulique, CMN, séquestration carbone. Annoncer : systèmes, biologie, conception, économie.", "style": "scientifique praticien"}, {"type": "section", "chapitre": 1, "section": 1, "titre_h1": "I. Systèmes agroforestiers", "titre_h2": "1.1 Systèmes sylvoarables et silvopastoraux", "titre_h3": null, "tableau": 1, "enrichissement": "→ Systèmes sylvoarables : arbres + cultures annuelles dans la même parcelle. Réduction rendement de 0-15% compensée par les produits de l'arbre (bois, fruits) + les services écosystémiques (ombre, eau, biodiversité).\n→ Systèmes silvopastoraux : arbres + pâturage. L'ombre réduit le stress thermique animal (-2°C), l'arbre fournit des feuilles fourragères, les déjections animales nourrissent l'arbre. Boucle vertueuse.\n→ L'agroforesterie est le système qui se rapproche le PLUS du modèle forestier (la forêt comme modèle de robustesse ultime) tout en maintenant une production agricole. C'est le compromis optimal entre productivité et résilience.", "contexte_sci": "Les systèmes sylvoarables (arbres + cultures) et silvopastoraux (arbres + élevage) sont les deux formes principales. Chiffres de développement en Europe et dans le monde.", "instructions": "Décrire les types de systèmes agroforestiers. Exemples concrets. Termes : agroforesterie, haie vive, trogne.", "style": "scientifique dense"}, {"type": "section", "chapitre": 1, "section": 2, "titre_h1": null, "titre_h2": "1.2 Agriculture syntropic : succession vers la forêt-jardin", "titre_h3": null, "tableau": 0, "enrichissement": "→ L'agriculture syntropique (Ernst Götsch, Brésil) : la parcelle est conçue comme une SUCCESSION écologique accélérée. Pionnières → intermédiaires → climaciques, en 15-30 ans. L'objectif final : forêt-jardin productive.\n→ Principe syntropique : chaque plante a un rôle fonctionnel dans la succession. Les pionnières (bananier, manioc) fournissent de la biomasse qui nourrit le sol. Les intermédiaires (cacao, café) produisent le revenu. Les climaciques (arbres à bois) capitalisent.\n→ La syntropie imite la thermodynamique forestière : la forêt AUGMENTE sa complexité dans le temps (néguentropie). L'agriculture conventionnelle fait l'inverse (simplification → entropie). Götsch propose de renverser le sens.", "contexte_sci": "L'agriculture syntropic (Ernst Götsch) mime la succession forestière pour créer des systèmes productifs : du pionnier à la forêt-jardin. Le design en courbes de niveau (Keyline) optimise la gestion de l'eau.", "instructions": "Principes de la syntropie : succession, stratification, élagage comme moteur. Le Keyline Design. Termes : agriculture syntropic, design en courbes de niveau (Keyline).", "style": "scientifique synthétique"}, {"type": "section", "chapitre": 2, "section": 1, "titre_h1": "II. Fonctionnement biologique", "titre_h2": "2.1 Le CMN agroforestier : réseau de communication", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le CMN en agroforesterie connecte les arbres (ECM ou CMA selon l'espèce) aux cultures annuelles (CMA). L'arbre redistribue eau (hydraulic lift) et nutriments (P, N) vers les cultures via ce réseau souterrain.\n→ Le CMN transmet aussi des signaux d'alerte : quand un arbre est attaqué par un pathogène, il envoie des signaux chimiques via le réseau mycorhizien qui déclenchent l'ISR chez les plantes voisines. Mémoire immunitaire collective.\n→ La distance optimale arbre-culture (8-15 m en tempéré) correspond à l'étendue du réseau mycorhizien de l'arbre. Trop près = compétition lumière/eau. Trop loin = pas de connexion mycorhizienne. Le CMN détermine le design spatial.", "contexte_sci": "Le CMN agroforestier connecte arbres et cultures via les hyphes mycorhiziens. Les arbres fournissent du carbone aux champignons qui nourrissent les cultures. Lien avec le microbiome fongique (CMN agroforestier comme extension pratique des réseaux mycorhiziens).", "instructions": "Le CMN comme réseau de partage arbre-culture. Transfert de carbone, eau, signaux de défense. Termes : CMN, réseau mycorhizien.", "style": "scientifique dense"}, {"type": "section", "chapitre": 2, "section": 2, "titre_h1": null, "titre_h2": "2.2 Hydraulic lift et redistribution hydrique", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le hydraulic lift : les racines profondes de l'arbre (3-10 m) pompent l'eau des nappes et la relâchent la nuit dans les horizons superficiels. Les cultures voisines bénéficient de cette « irrigation biologique ».\n→ Quantification : 0.1-0.5 mm/nuit redistribués par hydraulic lift. Sur une saison sèche de 60 jours = 6-30 mm d'eau apportés gratuitement. En sol sableux (faible RU), c'est la différence entre survie et mort des cultures.\n→ Le hydraulic lift ne fonctionne que si l'arbre a accès à l'eau profonde (nappe ou horizon humide) ET si le sol superficiel est sec (gradient de potentiel hydrique). En sol engorgé, le mécanisme s'inverse (hydraulic descent).", "contexte_sci": "La remontée hydraulique en agroforesterie : les arbres à racines profondes remontent l'eau nocturne qui bénéficie aux cultures de surface. C'est le service hydraulique majeur de l'arbre dans le système.", "instructions": "Quantifier la remontée hydraulique par les arbres. Espèces efficaces (noyer, saule). Termes : remontée hydraulique, résilience hydrique.", "style": "scientifique dense"}, {"type": "section", "chapitre": 2, "section": 3, "titre_h1": null, "titre_h2": "2.3 La voie oxalate-carbonate en agroforesterie", "titre_h3": null, "tableau": 0, "enrichissement": "→ La voie oxalate-carbonate (OCP) : les champignons ECM des arbres sécrètent de l'oxalate → les bactéries oxalotrophes l'oxydent → production de CaCO₃ biogénique. C'est une séquestration INORGANIQUE de carbone, quasi permanente (>10 000 ans).\n→ En agroforesterie, l'OCP fonctionne en profondeur (30-100 cm) là où les racines d'arbres + ECM sont actifs. Elle crée une réserve calcique qui tamponise le pH et enrichit le sous-sol en carbonates.\n→ Potentiel : 0.5-2 tCO₂/ha/an dans les systèmes agroforestiers tropicaux (cacao, café sous ombrage). En tempéré, les données sont rares mais le mécanisme est identique. Les essences à forte production d'oxalate (chêne, hêtre, noyer) sont les meilleures candidates.", "contexte_sci": "La voie oxalate-carbonate en agroforesterie : les champignons produisent de l'oxalate qui dissout les silicates et précipite le carbone en CaCO3. C'est une séquestration géologique couplée à la fertilisation. Lien avec les grands cycles.", "instructions": "Expliquer le mécanisme oxalate-carbonate dans le contexte agroforestier. Potentiel de séquestration. Termes : voie oxalate-carbonate.", "style": "scientifique dense"}, {"type": "section", "chapitre": 3, "section": 1, "titre_h1": "III. Conception", "titre_h2": "3.1 Espèces clés pour l'agroforesterie tempérée", "titre_h3": null, "tableau": 1, "enrichissement": "→ Espèces clés tempérées : noyer (Juglans regia, bois + fruit, CMA), chêne (Quercus, bois + mycobiome ECM riche), aulne (Alnus, fixation N symbiotique avec Frankia, 50-300 kg N/ha/an), tilleul (mellifère + litière riche).\n→ L'aulne est l'arbre MIRACLE de l'agroforesterie : fixation N via Frankia (actinomycète) + litière riche en N (C:N 15) + racines superficielles (pas de compétition avec les cultures) + croissance rapide (bois de chauffage en 15 ans).\n→ Le design multi-strates : arbre de canopée (noyer, chêne) + arbre intermédiaire (aulne, saule) + arbuste (noisetier, sureau) + couvert herbacé (trèfle, luzerne). Chaque couche exploite un horizon lumineux et racinaire différent.", "contexte_sci": "Les espèces clés pour l'agroforesterie tempérée : noyer, aulne (fixateur N), saule (remontée hydraulique), fruitiers à haute tige. Critères de choix : enracinement, ombrage, production.", "instructions": "Guide de choix d'espèces : critères, compatibilités, espacements. Termes : agroforesterie, haie vive.", "style": "opérationnel pratique"}, {"type": "section", "chapitre": 4, "section": 1, "titre_h1": null, "titre_h2": "4.1 Conception et mise en oeuvre", "titre_h3": null, "tableau": 0, "enrichissement": "→ Conception : (1) orientation des lignes (est-ouest en tempéré pour maximiser la lumière) (2) espacement (8-15 m entre lignes en sylvoarable) (3) choix d'espèces (complémentarité racinaire + temporelle) (4) protection jeunes arbres (manchons, paillage).\n→ Le Keyline Design (P.A. Yeomans, 1954) intègre la topographie dans le design agroforestier : les lignes d'arbres suivent les courbes de niveau pour redistribuer l'eau des crêtes vers les vallées. L'arbre + le relief = gestion hydrique passive.\n→ Erreur courante : planter des arbres sans modifier les pratiques au sol. L'agroforesterie fonctionne avec non-labour + couvert permanent + couverts multi-espèces. Arbre + labour = l'arbre souffre (racines coupées, mycorhizes détruites).", "contexte_sci": "La conception d'un système agroforestier : orientation des rangées, espacements, gestion de la lumière, intégration des couverts permanents.", "instructions": "Principes de conception : lignes N-S, espacement adapté aux engins, gestion de la concurrence racinaire. Termes : design en courbes de niveau (Keyline).", "style": "opérationnel pratique"}, {"type": "section", "chapitre": 5, "section": 1, "titre_h1": "V. Économie", "titre_h2": "5.1 Économie et services écosystémiques", "titre_h3": null, "tableau": 0, "enrichissement": "→ Économie : l'agroforesterie est rentable à 10-15 ans (délai de production de l'arbre) mais génère des services valorisables immédiatement : crédits carbone (30-100 €/tCO₂), biodiversité (PAC éco-régimes), réduction intrants (-30-50%).\n→ Les services écosystémiques non marchands : habitat faune auxiliaire (régulation ravageurs), pollinisation, régulation thermique (ombre), réduction érosion, filtration eau. Valeur estimée : 2000-5000 €/ha/an selon les méthodes.\n→ Le retour sur investissement en tempéré : coût d'installation 3000-8000 €/ha. Revenus bois à 25-40 ans : 15 000-40 000 €/ha (noyer, chêne). Revenus fruits dès 5-8 ans. Le rendement financier à 30 ans dépasse celui des grandes cultures.", "contexte_sci": "L'économie de l'agroforesterie : services écosystémiques non marchands (carbone, biodiversité, eau) + production (bois, fruits, fourrage). Les PSE (paiements pour services écosystémiques).", "instructions": "Chiffrer les services et les productions. Les modèles économiques viables. Termes : services écosystémiques.", "style": "analytique engagé"}, {"type": "conclusion", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": null, "contexte_sci": "Ce document couvre 8 sections organisées autour de 4 chapitres : I. Systèmes agroforestiers, II. Fonctionnement biologique, III. Conception, V. Économie. La conclusion doit synthétiser les mécanismes clés et ouvrir sur les perspectives pratiques ou scientifiques.", "instructions": "L'arbre est le pilier oublié de l'agriculture. Synthétiser : l'arbre structure le sol, connecte le réseau mycorhizien, remonte l'eau, séquestre le carbone, et produit. L'agroforesterie est le système le plus complet.", "style": "narratif praticien"}], "n_terms": 20}, {"code": "P5", "titre": "La Transition", "strate": "P", "note": "Absorbe T2 Intelligence biologique. Chronoséquence 4 phases, capital biologique comme actif, carbon farming, labels, algorithme diagnostic→action→résultat économique.", "titre_jenni": "La Transition — Chronoséquence et capital biologique", "style": "scientifique synthétique", "statut_redaction": "a_faire", "priorite": 17, "angle_entree": "L'arbre dans la parcelle n'est pas un obstacle — il est un accélérateur de cycles biologiques.", "public_cible": "agronome, sylviculteur, chercheur", "sources_core": null, "notes_jenni": "Haies, alignements, systèmes silvopastoraux. Lien S3 (ECM), S4 (C sol).", "sections": [{"type": "intro", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": "→ Le faux plat du rendement (Husson, Zone 2) N'EST PAS un échec : les micro-organismes Y captent N,P,S pour construire l'humus AVANT la plante. Gain C proportionnel à baisse rendement. Levier : foliaire pour nourrir la plante sans alimenter la compétition au sol.\n→ Concentrer la biomasse pour passer les seuils : zaï burkinabé, planches permanentes, fosse de couche chaude = même logique à 3 échelles.\n→ Agrorecyclerie (Cagnolle) : MO 1.4%→9% en 10 ans avec balayures scierie + broyats déchetterie. 90% sans irrigation après 14 ans. Preuve que la trajectoire est possible.\n→ La ration du sol : l'apport carboné annuel en surface qui entretient le réseau fongique pourvoyeur d'eau, de nutriments et de défense. Le salaire des pourvoyeurs d'eau.\n→ Deux stratégies : intrant massif (50-400t, Zone 4) vs douce (20-50t, Zone 3).\n→ Rotation prairie MSV (2ans+1an bâche+1an paille).\n→ 5cm BRF=+1%MO (K1=50%). Légume ~1t vs 20t nécessaire.", "contexte_sci": "L'arbre dans la parcelle n'est pas un obstacle — il est un accélérateur de cycles biologiques. Il mobilise 14 termes canoniques et 7 connexions vers d'autres documents du corpus. Il intervient dans les chaînes causales : [À VALIDER] Piège de la performance → Robustesse par les contreperformances.", "instructions": "Présenter la transition vers le maraîchage sol vivant (MSV) comme un chemin structuré, pas un saut dans le vide. Chaque phase a ses indicateurs, ses risques et ses leviers. Annoncer : planches permanentes, paillage, biostimulants liquides, rotations, densité nutritionnelle.", "style": "scientifique praticien"}, {"type": "section", "chapitre": 1, "section": 1, "titre_h1": "I. Planches permanentes", "titre_h2": "1.1 Planches permanentes : principe et mise en oeuvre", "titre_h3": null, "tableau": 0, "enrichissement": "→ Les planches permanentes (raised beds, 80-120 cm de large) concentrent la biomasse, les amendements et le piétinement sur les allées. Le sol de culture n'est JAMAIS compacté — structure préservée indéfiniment.\n→ En maraîchage, les planches permanentes remplacent le labour : le sol est travaillé en surface seulement (grelinette, campagnol) sur 10-15 cm. Les horizons profonds restent intacts (galeries de vers, mycorhizes, structure).\n→ La concentration de la biomasse sur les planches accélère la montée en MO : au lieu de 2 t/ha sur toute la parcelle, on apporte 4-6 t/ha sur la surface cultivée. Le ratio C/Argile monte plus vite, la transition est raccourcie.", "contexte_sci": "Les planches permanentes sont la base du MSV : pas de labour, pas de passage d'engins, accumulation de vie. Le sol se structure par le haut grâce aux apports de surface.", "instructions": "Principe et mise en œuvre des planches permanentes. Dimensions, cheminements, gestion. Termes : planches permanentes, auto-fertilité.", "style": "opérationnel pratique"}, {"type": "section", "chapitre": 1, "section": 2, "titre_h1": null, "titre_h2": "1.2 Enrichissement en surface : compost, bokashi, paillage", "titre_h3": null, "tableau": 0, "enrichissement": "→ L'enrichissement en surface (mulch, compost, bokashi) imite la forêt : la litière se dépose sur le sol et est incorporée par la faune (vers de terre, collemboles). PAS d'enfouissement mécanique — la biologie fait le travail.\n→ Séquence d'apports recommandée sur planche permanente : automne = bokashi + BRF (recharge biologique avant l'hiver). Printemps = compost mûr + paillage (nutrition + couverture). Été = mulch permanent (conservation eau + suppression adventices).\n→ L'apport de BRF (Bois Raméal Fragmenté) est SPÉCIFIQUE au maraîchage et à l'agroforesterie : rameaux de < 7 cm Ø, riches en lignine tendre + nutriments. Les saprotrophes le colonisent en 3-6 mois et construisent de la nécromasse fongique stable.", "contexte_sci": "L'enrichissement en surface : compost, bokashi, paillage carboné. Le paillage nourrit les services hydrauliques fongiques. La ration du sol (~20 t MS/ha/an) est la condition de fonctionnement.", "instructions": "Types d'apports de surface et leur rôle. Quantifier la ration du sol. Termes : paillage, bokashi, ration du sol, K1 (coefficient d'humification).", "style": "opérationnel pratique"}, {"type": "section", "chapitre": 2, "section": 1, "titre_h1": "II. Gestion du paillage", "titre_h2": "2.1 Types de paillage et effets sur le microbiome", "titre_h3": null, "tableau": 1, "enrichissement": "→ Types de paillage et effets : paille de céréales (C:N 80, décomposition lente, bon mulch mais faim d'azote si incorporée). Foin (C:N 30, décomposition rapide, apport N modéré). BRF (C:N 50-80, nourrit les champignons saprotrophes, excellent pour F/B).\n→ L'épaisseur de mulch détermine l'effet : < 5 cm = effet minimal (adventices passent, évaporation peu réduite). 10-15 cm = optimal (suppression adventices 80-95%, réduction évaporation 50-70%). > 20 cm = risque de barrière (limaces, campagnols).\n→ Le mulch crée un GRADIENT redox vertical : surface aérée (aérobie) → base du mulch humide (micro-aérobie) → interface sol-mulch (anaérobie, biofilms). Ce gradient reproduit la litière forestière et maximise la diversité microbienne.", "contexte_sci": "Le type de paillage détermine la succession microbienne : carboné (BRF, broyat → champignons), vert (tonte → bactéries), mixte. Le ratio C/N du paillage pilote le ratio F/B du sol.", "instructions": "Comparer paillages carboné vs vert : effets sur F/B, décomposition, effet d'amorçage. Termes : paillage, ratio F/B, effet d'amorçage.", "style": "scientifique pratique"}, {"type": "section", "chapitre": 3, "section": 1, "titre_h1": "III. Biostimulants liquides", "titre_h2": "3.1 JADAM JMS : biostimulant microbien à coût zéro", "titre_h3": null, "tableau": 0, "enrichissement": "→ JADAM JMS (Jayeon Nongbeop Microorganism Solution) : pomme de terre bouillie + feuilles de bambou/saule + eau, fermentée 3-7 jours. Coût : quasi nul. Production : 20 L en 1 semaine. Application : arrosage 1:50 ou pulvérisation 1:500.\n→ Le JMS capture les micro-organismes LOCAUX de la pomme de terre (riche en amidon = sélection des fermentaires) et des feuilles (phytobiome forestier). C'est un IMO liquide ultra-simplifié.\n→ Le JMS est l'entrée de gamme des biostimulants artisanaux : zéro coût, zéro matériel spécialisé, effet documenté sur la biomasse microbienne du sol (+20-40% en 4 semaines d'application hebdomadaire).", "contexte_sci": "Le JADAM JMS est un biostimulant microbien à coût quasi-zéro : eau + sol de sous-bois + sucre. Il inocule le microbiome indigène.", "instructions": "Recette et protocole JADAM JMS. Mécanisme d'action. Termes : Jeevamrit, inoculum microbien indigène (IMO/LiFoFer).", "style": "opérationnel pratique"}, {"type": "section", "chapitre": 3, "section": 2, "titre_h1": null, "titre_h2": "3.2 EM, lixiviat bokashi et LiFoFer en maraîchage", "titre_h3": null, "tableau": 0, "enrichissement": "→ EM (Effective Microorganisms) : consortium commercial standardisé. Lixiviat de bokashi : extrait liquide de la fermentation du bokashi (métabolites + micro-organismes). LiFoFer : litière forestière fermentée (mycobiome local).\n→ Comparaison : EM = standardisé mais importé (souches non locales). Lixiviat = sous-produit du bokashi (gratuit). LiFoFer = micro-organismes forestiers locaux (diversité maximale). Les trois ont des effets comparables sur sol dégradé.\n→ En maraîchage, les fermentations artisanales sont ÉCONOMIQUEMENT viables : coût de production < 1 €/L, application 1-2 L/10 m², 10-20 applications/an = 10-40 €/100 m². Vs biostimulants commerciaux : 200-500 €/ha.", "contexte_sci": "Les biostimulants liquides en maraîchage : EM activés, lixiviat de bokashi, LiFoFer dilué. Applications foliaires et au sol.", "instructions": "Comparaison des biostimulants liquides : préparation, doses, fréquence, effets observés. Termes : micro-organismes efficaces (EM), LiFoFer, bokashi.", "style": "opérationnel pratique"}, {"type": "section", "chapitre": 4, "section": 1, "titre_h1": "IV. Rotations", "titre_h2": "4.1 Rotations et associations maraîchères", "titre_h3": null, "tableau": 1, "enrichissement": "→ Les rotations en maraîchage sont CRITIQUES : la monoculture de solanacées (tomate 3 ans de suite) accumule Fusarium, Verticillium, nématodes à galles. Rotation minimale : 3-4 ans entre familles botaniques.\n→ Les associations favorables : tomate + basilic (répulsion aleurodes). Carotte + oignon (répulsion mouche de la carotte/de l'oignon). Maïs + haricot + courge (milpa, la « trois sœurs » — fixation N + tuteur + couverture sol).\n→ Le calendrier biodynamique (Thun) est controversé : aucune preuve scientifique de l'effet lunaire sur les cultures (méta-analyse Chalker-Scott 2013). Le seul effet documenté de la lune : marées → variation du niveau de la nappe phréatique en sol côtier.", "contexte_sci": "Les rotations et associations maraîchères : familles botaniques, successions saisonnières, associations bénéfiques. Le concept de triple performance (rendement, environnement, social).", "instructions": "Principes de rotation en maraîchage : familles, exigences, compatibilités. Termes : rotation sur prairie (MSV), triple performance MSV.", "style": "opérationnel pratique"}, {"type": "section", "chapitre": 5, "section": 1, "titre_h1": "V. Densité nutritionnelle", "titre_h2": "5.1 Densité nutritionnelle : du sol vivant à l'assiette", "titre_h3": null, "tableau": 0, "enrichissement": "→ La densité nutritionnelle (nutriments/calorie) est le critère de qualité FINAL de l'agriculture régénérative. Un sol biologiquement actif produit des aliments avec 20-40% plus de Zn, Fe, vitamines que le même génotype sur sol conventionnel.\n→ Le mécanisme : les PGPR et CMA augmentent l'absorption des micronutriments (Zn, Fe, Se, Mn) par la plante. L'ISR induite par les PGPR augmente les polyphénols et les antioxydants de défense — qui sont aussi des nutriments protecteurs pour l'humain.\n→ La boucle complète : sol biologiquement actif → microbiome racinaire diversifié → absorption minérale améliorée + polyphénols de défense → aliment dense nutritionnellement → microbiome intestinal nourri → santé humaine. Chaque maillon dépend du précédent.", "contexte_sci": "La densité nutritionnelle est le résultat final mesurable d'un sol vivant : plus de vitamines, minéraux, antioxydants par calorie. Le Brix (réfractomètre) comme indicateur terrain. Lien avec la santé humaine (ISR et densité nutritionnelle).", "instructions": "Expliquer la densité nutritionnelle et comment la mesurer. Données comparatives sol vivant vs conventionnel. Termes : densité nutritionnelle, Brix.", "style": "scientifique synthétique"}, {"type": "conclusion", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": null, "contexte_sci": "Ce document couvre 7 sections organisées autour de 5 chapitres : I. Planches permanentes, II. Gestion du paillage, III. Biostimulants liquides, IV. Rotations et 1 autres. La conclusion doit synthétiser les mécanismes clés et ouvrir sur les perspectives pratiques ou scientifiques.", "instructions": "La transition MSV est un investissement dans le capital biologique. Synthétiser : planches permanentes → paillage → biostimulants → rotations → densité nutritionnelle. Le résultat se mesure dans l'assiette.", "style": "narratif praticien"}], "n_terms": 17}, {"code": "S0", "titre": "L'Eau dans le Sol Vivant", "strate": "S", "note": "Angle mort critique identifie par analyse Opus. Physique de l eau (potentiel hydrique, RU, hystéresis), macroporosité biologique (Ksat, biopores), hydraulic lift (mécanisme physique), films d eau comme habitats microbiens, résilience climatique hydrique.", "titre_jenni": "L'Eau dans le Sol Vivant", "style": "scientifique accessible", "statut_redaction": "a_faire", "priorite": 5, "angle_entree": "Le sol n'est pas un substrat inerte — c'est le système vivant le plus complexe de la planète.", "public_cible": "agronome praticien, grand public instruit", "sources_core": null, "notes_jenni": "Document d'entrée strate S. Poser les bases physico-chimiques avant S1-S4.", "sections": [{"type": "intro", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": "→ L'accès à l'eau n'est pas un prérequis linéaire — c'est un PRODUIT ÉMERGENT. Il dépend du réseau fongique (hyphes dans micropores) qui dépend du carbone organique qui dépend de la photosynthèse qui dépend de l'eau. BOUCLE.\n→ Les 3 étages hydrauliques : (1) Biofilms anaérobies = rétention eau micropores (4 Ga). (2) Hyphes saprotrophes = remontée eau par capillarité pour dégrader lignine + culture de bactéries. (3) CMA = livraison eau à la plante depuis micropores inaccessibles aux racines (2-5 µm vs 20 µm racine).\n→ La forêt ne gère pas l'eau — elle la PRODUIT (son accès) par son réseau fongique + CMN + hydraulic lift. Cagnolle 90% sans irrigation = preuve que la reconstruction du réseau fongique résout le problème de l'eau.\n→ Le mulch carboné annuel (ration du sol) entretient le service hydraulique fongique.", "contexte_sci": "Le sol n'est pas un substrat inerte — c'est le système vivant le plus complexe de la planète. Il mobilise 21 termes canoniques et 2 connexions vers d'autres documents du corpus. Il intervient dans les chaînes causales : [À VALIDER] Piège de la performance → Robustesse par les contreperformances.", "instructions": "Ouvrir sur le paradoxe : le sol est l'écosystème le plus complexe de la planète, et l'eau y est un produit émergent du vivant, pas un simple intrant. Présenter les 3 étages hydrauliques (biofilms → hyphes saprotrophes → mycorhizes). Annoncer les 5 chapitres : physique de l'eau, macroporosité biologique, remontée hydraulique, films d'eau, gestion pratique.", "style": "narratif accessible, accroche forte"}, {"type": "section", "chapitre": 1, "section": 1, "titre_h1": "I. La physique de l'eau dans le sol", "titre_h2": "1.1 Potentiel hydrique et courbe de rétention", "titre_h3": null, "tableau": 1, "enrichissement": "→ Le potentiel hydrique (pF) détermine TOUT : activité microbienne, mobilité ionique, diffusion O₂. Un sol à pF 4.2 (point de flétrissement) est un désert microbien — les biofilms survivent mais ne fonctionnent plus.\n→ La courbe de rétention est un outil DIAGNOSTIC : sa forme révèle la distribution des pores (macro/méso/micro), donc l'état structural du sol. Deux sols de même texture peuvent avoir des courbes radicalement différentes selon leur biologie.\n→ Les micropores (<2 µm) retiennent l'eau inaccessible aux racines (20 µm) mais accessible aux hyphes mycorhiziens (2-5 µm). Le réseau fongique est la CLÉ d'accès à 30-40% de l'eau du sol.", "contexte_sci": "Le potentiel hydrique (pF) est la grandeur physique fondamentale pour comprendre la disponibilité de l'eau. La courbe de rétention est l'empreinte digitale du sol — modifiée par l'activité biologique (biofilms, EPS). L'hystérésis hydrique crée une mémoire du sol.", "instructions": "Tableau obligatoire : pF × disponibilité de l'eau × état microbien et biologique. Expliquer la courbe de rétention comme outil diagnostique. Utiliser les termes : potentiel hydrique, pF, capacité au champ, point de flétrissement permanent, hystérésis hydrique, matrice EPS.", "style": "scientifique dense"}, {"type": "section", "chapitre": 1, "section": 2, "titre_h1": null, "titre_h2": "1.2 La loi de Darcy et les flux hydriques", "titre_h3": null, "tableau": 0, "enrichissement": "→ La loi de Darcy (flux = K × gradient) ne s'applique pas dans les sols biologiquement actifs : les macropores biologiques (galeries, racines mortes) créent des flux préférentiels qui court-circuitent la matrice.\n→ La conductivité hydraulique (Ksat) d'un sol non-labouré peut être 10× supérieure à un sol labouré grâce aux galeries de vers de terre anéciques — continus de la surface à la nappe.\n→ Paradoxe : un sol argileux bien structuré infiltre PLUS qu'un sol sableux compacté. La biologie (agrégation, galeries, racines) domine la physique (texture).", "contexte_sci": "La loi de Darcy décrit le mouvement de l'eau dans le sol. La conductivité hydraulique est le paramètre clé — variable pilotée par l'architecture biologique des pores, pas une constante physique. Les biopores créent des autoroutes hydrauliques.", "instructions": "Expliquer la loi de Darcy. Relier conductivité hydraulique aux biopores. Distinguer flux matriciel et flux préférentiel. Termes : conductivité hydraulique, conductivité hydraulique saturée, biopore, flux préférentiel, infiltration.", "style": "scientifique dense"}, {"type": "section", "chapitre": 2, "section": 1, "titre_h1": "II. La macroporosité biologique", "titre_h2": "2.1 Les macropores biologiques : galeries, racines, hyphes", "titre_h3": null, "tableau": 0, "enrichissement": "→ Les macropores biologiques sont les AUTOROUTES de l'eau : galeries de vers de terre (Ø 2-8 mm), canaux racinaires décomposés (Ø 0.5-5 mm), cavités de collemboles. Ils permettent l'infiltration rapide (>100 mm/h).\n→ Un ver anécique crée une galerie verticale de 1-2 m, tapissée de mucus (biofilm). Cette galerie est stable pendant 5-10 ans. Le labour la détruit en 1 passage.\n→ Les hyphes mycorhiziens connectent les macropores aux micropores : l'eau descend par gravité dans les galeries, puis est redistribuée par capillarité hyphique dans la microporosité. Deux échelles, un seul réseau.", "contexte_sci": "La macroporosité biologique est le squelette hydraulique du sol. Trois types d'ingénieurs : vers de terre (galeries 2-11mm), racines (canaux pérennes après décomposition), hyphes fongiques (micropores). Lien avec le document sur faune du sol.", "instructions": "Distinguer les 3 types d'ingénieurs du sol avec données quantitatives (diamètres, profondeurs). Relier à la conductivité hydraulique saturée. Termes : biopore, infiltration, flux préférentiel. Lien : la faune du sol crée l'infrastructure hydraulique.", "style": "scientifique dense"}, {"type": "section", "chapitre": 2, "section": 2, "titre_h1": null, "titre_h2": "2.2 La biopuncture : reconstruire la macroporosité", "titre_h3": null, "tableau": 0, "enrichissement": "→ La biopuncture = reconstruire la macroporosité détruite par le labour et la compaction. Outils : racines pivotantes (radis fourrager, luzerne), vers de terre (inoculation indirecte par apport MO), sous-solage biologique (féverole).\n→ Le radis fourrager crée un trou de 3-5 cm de diamètre × 30-60 cm de profondeur. En se décomposant, il laisse un canal tapissé de MO qui est colonisé par les vers de terre et les mycorhizes.\n→ Séquence de reconstruction : apport MO en surface → recrutement faune → galeries → racines profondes → mycorhizes → microporosité. 3-5 ans pour reconstruire une macroporosité fonctionnelle.", "contexte_sci": "La biopuncture est la restauration de la macroporosité par les forces biologiques (racines pivotantes, lombriciens) sans intervention mécanique. C'est le levier pratique de la régénération hydraulique.", "instructions": "Montrer le processus : couverts à racines pivotantes (luzerne, radis fourrager, mélilot) → biopores verticaux → réutilisation par la culture suivante (32-47%). Relier à la transition ACS/MSV. Termes : biopore, infiltration.", "style": "scientifique pratique"}, {"type": "section", "chapitre": 3, "section": 1, "titre_h1": "III. La remontée hydraulique", "titre_h2": "3.1 Mécanisme de la remontée hydraulique", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le hydraulic lift (ou hydraulic redistribution) : les racines profondes pompent l'eau des horizons humides et la relâchent dans les horizons secs la nuit. Les plantes arrosent le sol, pas l'inverse.\n→ En agroforesterie, l'arbre fait du hydraulic lift pour les cultures voisines via le réseau mycorhizien commun. L'arbre est une POMPE qui redistribue l'eau à tout l'écosystème.\n→ Le Keyline Design (P.A. Yeomans, 1954) utilise la topographie pour redistribuer l'eau des crêtes vers les vallées. C'est la version mécanique du hydraulic lift biologique.", "contexte_sci": "La remontée hydraulique (redistribution hydraulique) est le transfert passif d'eau par les racines depuis les horizons humides vers les horizons secs, piloté par le gradient de potentiel hydrique. Phénomène surtout nocturne.", "instructions": "Expliquer le mécanisme physique : gradient de potentiel, fermeture des stomates la nuit. Identifier les plantes pompes (racines pivotantes profondes). Montrer le bénéfice collatéral : maintien de l'activité microbienne en surface. Termes : remontée hydraulique, potentiel hydrique, résilience hydrique.", "style": "scientifique dense"}, {"type": "section", "chapitre": 3, "section": 2, "titre_h1": null, "titre_h2": "3.2 Remontée hydraulique et réseaux mycorhiziens : synergie", "titre_h3": null, "tableau": 0, "enrichissement": "→ Les mycorhizes ne se contentent pas de capter l'eau des micropores — elles la TRANSPORTENT activement sur des distances de 10-50 cm via le flux cytoplasmique hyphique. C'est une plomberie biologique.\n→ Synergie hydraulic lift + CMN : l'arbre pompe l'eau profonde → la relâche dans la rhizosphère → le réseau mycorhizien la distribue aux plantes connectées. Deux mécanismes complémentaires.\n→ Les hyphes explorent un volume de sol 100× supérieur aux poils absorbants. Un seul mètre de racine peut être connecté à 100 m d'hyphes. L'investissement en carbone (2-20% de la photosynthèse) est compensé par l'accès à l'eau et au phosphore.", "contexte_sci": "La synergie entre remontée hydraulique et champignons mycorhiziens crée un double accès à l'eau : racines profondes (flux massifs) + hyphes (micropores 2-5µm inaccessibles aux racines de 20µm). Lien avec le document sur microbiome fongique. Lien avec le document sur agroforesterie.", "instructions": "Expliquer le concept de double accès à l'eau. Les CMA (champignons mycorhiziens à arbuscules) étendent le volume de prospection hydrique. Quantifier le bénéfice : retard de limitation de transpiration en sécheresse. Termes : remontée hydraulique.", "style": "scientifique synthétique"}, {"type": "section", "chapitre": 4, "section": 1, "titre_h1": "IV. Les films d'eau et la vie microbienne", "titre_h2": "4.1 Les films d'eau comme habitat microbien", "titre_h3": null, "tableau": 0, "enrichissement": "→ Les films d'eau (0.1-10 µm d'épaisseur) autour des particules de sol sont l'HABITAT réel des bactéries. Pas le sol lui-même — le film d'eau. Quand le film s'amincit (dessiccation), l'activité microbienne s'effondre.\n→ L'épaisseur du film d'eau contrôle le gradient redox : film épais (>5 µm) = diffusion O₂ possible = aérobiose. Film mince (<2 µm) = O₂ consommé = anaérobiose. La GÉOMÉTRIE de l'eau pilote le MÉTABOLISME.\n→ Les biofilms bactériens GÈRENT leur propre eau : la matrice EPS (exopolysaccharides) retient 97% d'eau structurée. Le biofilm est un micro-réservoir autonome qui survit à la dessiccation du sol.", "contexte_sci": "À l'échelle microscopique, les films d'eau sur les surfaces minérales et organiques sont l'habitat des micro-organismes. L'épaisseur du film (dictée par le potentiel hydrique) contrôle la biodiversité et l'activité biochimique. Lien avec le document sur microbiome du sol.", "instructions": "Seuils critiques d'épaisseur : 1.5µm = seuil bactérien, <10nm = arrêt diffusion. Expliquer que la connectivité des films contrôle les échanges entre communautés. Termes : Biofilms, matrice EPS, pF, dessiccation.", "style": "scientifique dense"}, {"type": "section", "chapitre": 4, "section": 2, "titre_h1": null, "titre_h2": "4.2 Stratégies de survie à la dessiccation", "titre_h3": null, "tableau": 0, "enrichissement": "→ Stratégies de survie : sporulation (Bacillus, Clostridium), enkystement (protozoaires), anhydrobiose (nématodes Anguina), biofilms EPS (résistance collective). La vie dans le sol = alterner entre activité et dormance.\n→ Les spores bactériennes survivent des millénaires (Bacillus subtilis viable après 250 Ma dans du sel gemme). La banque de spores du sol est un réservoir de biodiversité indestructible.\n→ La rhizosphère comme oasis : les exsudats racinaires maintiennent un film d'eau et des nutriments dans un rayon de 2-5 mm. Les bactéries migrent par chimiotactisme vers cette zone humide. La plante crée son propre micro-environnement.", "contexte_sci": "Au-delà du point de flétrissement (pF 4.2), la vie microbienne change de régime. Stratégies : dormance, spores, EPS hydrogel, hydrophobie du sol, effet Birch au réhumectage. Cadre Y-A-S : stratégie S (tolérance au stress).", "instructions": "Détailler les mécanismes de survie : osmoprotectants, EPS comme hydrogel, hydrophobie biologique (champignons, glomaline). Expliquer l'effet Birch (pulse de minéralisation au mouillage). Utiliser le cadre stratégie Y-A-S (Rendement-Acquisition-Stress). Termes : dessiccation, effet Birch, Biofilms, matrice EPS, hydrophobie du sol.", "style": "scientifique dense"}, {"type": "section", "chapitre": 5, "section": 1, "titre_h1": "V. L'eau dans les sols cultivés", "titre_h2": "5.1 Le sol vivant comme tampon climatique hydrique", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le sol est le plus grand réservoir d'eau douce continental après les glaciers : 1 m de sol peut stocker 100-300 mm d'eau. 1% de MO en plus = 20-30 m³/ha de capacité de rétention supplémentaire.\n→ Un sol sous couvert permanent transpire 3-5 mm/jour, créant un effet de refroidissement de 5-10°C en surface par rapport au sol nu. Le sol couvert CLIMATISE le microclimat local.\n→ Le mulch réduit l'évaporation de 50-70% tout en maintenant l'humidité de surface pour les biofilms et les saprotrophes. C'est le « couvert » de Husson — la ration quotidienne du sol.", "contexte_sci": "Le sol vivant fonctionne comme un tampon climatique : il absorbe l'excès de pluie (infiltration, biopores) et prolonge la disponibilité en sécheresse (réserve utile augmentée, remontée hydraulique). Opposition sol vivant vs sol dégradé.", "instructions": "Comparer sol vivant et sol dégradé sur : infiltration, réserve utile, résilience sécheresse. S'appuyer sur les méta-analyses ACS/couverts. Termes : réserve utile, infiltration, capacité au champ, résilience hydrique, flux préférentiel.", "style": "scientifique pratique"}, {"type": "section", "chapitre": 5, "section": 2, "titre_h1": null, "titre_h2": "5.2 Gérer l'eau par la biologie : leviers pratiques", "titre_h3": null, "tableau": 1, "enrichissement": "→ Gérer l'eau par la biologie = INVERSER la logique conventionnelle : au lieu de compenser la perte d'eau (irrigation), on augmente la capacité de rétention (MO) et on réduit les pertes (mulch, couvert).\n→ Leviers pratiques par ordre d'efficacité : (1) mulch permanent (réduction évaporation 50-70%) (2) couverts vivants (pompe à eau inversée via transpiration nocturne) (3) non-labour (préservation macropores) (4) agroforesterie (hydraulic lift) (5) bokashi (stimulation biofilms).\n→ Un sol en Zone 1 (>1/8 C/Argile) ne nécessite PLUS d'irrigation en climat tempéré sauf sécheresse exceptionnelle. Cagnolle : 90% sans irrigation après 14 ans de transition.", "contexte_sci": "Leviers biologiques pour gérer l'eau sans irrigation : couverts diversifiés, apports MO, stimulation lombriciens, gestion des réseaux CMA, paillage.", "instructions": "Tableau obligatoire : pratique × effet sur la réserve utile × délai d'action. Insister sur le temps long (3-10 ans pour les effets structurels). Termes : paillage, biopore, réserve utile, remontée hydraulique, infiltration. Le paillage nourrit les services hydrauliques fongiques.", "style": "opérationnel pratique"}, {"type": "conclusion", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": null, "contexte_sci": "Ce document couvre 10 sections organisées autour de 5 chapitres : I. La physique de l'eau dans le sol, II. La macroporosité biologique, III. La remontée hydraulique, IV. Les films d'eau et la vie microbienne et 1 autres. La conclusion doit synthétiser les mécanismes clés et ouvrir sur les perspectives pratiques ou scientifiques.", "instructions": "L'eau est le miroir de la santé du sol. Synthétiser les 5 chapitres : la physique donne le cadre, la biologie construit l'infrastructure, les pratiques activent les leviers. Le sol vivant est une éponge active, pas un réservoir passif.", "style": "narratif synthétique"}], "n_terms": 24}, {"code": "S1", "titre": "Architecture du Sol", "strate": "S", "note": "Absorbe P1 Pédologie. Physico-chimie : texture, argiles, CEC, CAH, agrégation, porosité, horizons. Socle sans biologie — les mécanismes biologiques restent dans S2/S3.", "titre_jenni": "Architecture du Sol — Texture, agrégats et porosité", "style": "scientifique dense", "statut_redaction": "a_faire", "priorite": 6, "angle_entree": "Les agrégats sont l'unité structurale fondamentale — leur formation, leur stabilité, leur destruction.", "public_cible": "chercheur, agronome expert", "sources_core": null, "notes_jenni": "Hiérarchie agrégats macro→micro. Rôle glomaline, hyphes, EPS. Lien structure → protection carbone.", "sections": [{"type": "intro", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": "→ Micro-agrégat anaérobie à cœur (hypothèse conférence Eh/pH). L'atmosphère du sol en profondeur ≈ atmosphère primitive. La stabilité structurale dépend du MAINTIEN de conditions réduites internes.\n→ Sol structuré vs compacté (Husson) : faibles variations redox dans le TEMPS + large gamme dans l'ESPACE = robuste (Hamant). Fortes fluctuations TEMPS + gamme étroite ESPACE = fragile.\n→ Réaction de Fenton : alternance aérobie/anaérobie en sol compacté → radicaux hydroxyles OH• → destruction 30-50% MO « stable ». Le labour ne détruit pas la MO par exposition à l'air — il crée les conditions pour Fenton.\n→ Premier micro-agrégat de l'histoire = EPS bactérien anaérobie + argile (4 Ga, océan). Avant les champignons, avant les racines.", "contexte_sci": "Les agrégats sont l'unité structurale fondamentale — leur formation, leur stabilité, leur destruction. Il mobilise 27 termes canoniques et 4 connexions vers d'autres documents du corpus. Il intervient dans les chaînes causales : [À VALIDER] Piège de la performance → Robustesse par les contreperformances.", "instructions": "Présenter l'architecture du sol comme une construction biologique, pas un simple empilement minéral. Le sol est un édifice vivant dont les propriétés émergent de l'interaction entre minéraux argileux, matière organique et organismes ingénieurs. Annoncer les 5 chapitres : argiles, agrégats, porosité, carbone du sol, sol cultivé.", "style": "narratif scientifique dense"}, {"type": "section", "chapitre": 1, "section": 1, "titre_h1": "I. Les minéraux argileux", "titre_h2": "1.1 Propriétés physico-chimiques des argiles", "titre_h3": null, "tableau": 1, "enrichissement": "→ Les argiles ne sont pas inertes — elles sont des surfaces RÉACTIVES. La surface spécifique varie de 10 m²/g (kaolinite) à 800 m²/g (montmorillonite). C'est sur ces surfaces que se stabilise le carbone (MAOM).\n→ La minéralogie détermine le POTENTIEL du sol : un sol de montmorillonite peut stocker 5× plus de carbone qu'un sol de kaolinite à même teneur en argile. Le diagnostic doit intégrer la NATURE des argiles, pas seulement leur proportion.\n→ La charge de surface des argiles (CEC) est le mécanisme de rétention des cations nutritifs (Ca²⁺, Mg²⁺, K⁺). Sans CEC suffisante, les nutriments sont lessivés dès la première pluie.", "contexte_sci": "Les minéraux argileux (kaolinite, illite, smectite) déterminent la capacité d'échange cationique et la surface réactive du sol. Le complexe argilo-humique est la brique fondamentale de la fertilité. Lien avec le carbone du sol (MAOM se forme par adsorption sur les surfaces du CAH).", "instructions": "Décrire les 3 grandes familles d'argiles et leurs propriétés (CEC, surface spécifique, gonflement). Expliquer le complexe argilo-humique comme interface minéral-organique. Termes : kaolinite, illite, smectite (montmorillonite), Capacité d'Échange Cationique, complexe argilo-humique (CAH), adsorption, oxydes Fe/Al.", "style": "scientifique dense"}, {"type": "section", "chapitre": 1, "section": 2, "titre_h1": null, "titre_h2": "1.2 Les complexes argilo-humiques et la CEC", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le complexe argilo-humique (CAH) est la STRUCTURE FONDAMENTALE de la fertilité : argile + MO + ponts cationiques (Ca²⁺, Fe³⁺) = agrégat stable, chargé, capacitif. C'est le « gîte » de Husson.\n→ La CEC totale = CEC argile + CEC MO. En sol tempéré, la MO contribue 50-80% de la CEC. Perdre 1% de MO = perdre la moitié de la capacité de rétention des nutriments.\n→ Les ponts calciques (Ca²⁺) stabilisent le CAH. Le chaulage n'est pas qu'un correcteur de pH — c'est un agent de STRUCTURATION qui renforce les ponts argile-humus.", "contexte_sci": "Le complexe argilo-humique est le siège de la rétention des nutriments et de l'eau. La CEC conditionne la fertilité chimique du sol.", "instructions": "Relier CEC à la fertilité pratique. Expliquer le rôle des oxydes Fe/Al dans la fixation du phosphore. Termes : complexe argilo-humique (CAH), Capacité d'Échange Cationique, adsorption, oxydes Fe/Al.", "style": "scientifique dense"}, {"type": "section", "chapitre": 2, "section": 1, "titre_h1": "II. Les agrégats", "titre_h2": "2.1 Formation et hiérarchie des agrégats", "titre_h3": null, "tableau": 1, "enrichissement": "→ Hiérarchie d'agrégation : micro-agrégats (<250 µm, stabilisés par MO + argile + biofilms, très stables) → macro-agrégats (>250 µm, stabilisés par hyphes + racines + mucus, sensibles au labour).\n→ Les macro-agrégats PROTÈGENT les micro-agrégats : à l'intérieur du macro-agrégat, l'atmosphère est appauvrie en O₂ → conditions réductrices → le carbone piégé dans les micro-agrégats est protégé de la minéralisation.\n→ Le labour brise les macro-agrégats, expose les micro-agrégats à l'O₂, et déclenche la minéralisation du carbone protégé. Un seul passage de charrue peut libérer 1-3 tCO₂/ha.", "contexte_sci": "Les agrégats sont les unités structurelles du sol, organisés en hiérarchie (micro → macro). Leur formation dépend des agents biologiques : hyphes fongiques, EPS bactériens, glomaline, racines. Lien avec le microbiome fongique (hyphes et glomaline stabilisent les agrégats).", "instructions": "Expliquer la hiérarchie des agrégats (micro <250µm, macro >250µm). Décrire les agents de formation et stabilisation : argiles, MO, hyphes, EPS, glomaline, racines. Termes : agrégats, biostructuration, EPS, GRSP/glomaline.", "style": "scientifique dense"}, {"type": "section", "chapitre": 2, "section": 2, "titre_h1": null, "titre_h2": "2.2 Rôle des agrégats dans la protection du carbone", "titre_h3": null, "tableau": 0, "enrichissement": "→ Les agrégats protègent le carbone par OCCLUSION PHYSIQUE : la MO piégée à l'intérieur est inaccessible aux enzymes microbiennes extracellulaires. C'est la prison de carbone du sol.\n→ Deux mécanismes de protection : (1) occlusion dans les micro-agrégats (protection physique, temps de résidence 100-1000 ans) (2) adsorption sur les surfaces minérales = MAOM (protection chimique, temps de résidence 100-10 000 ans).\n→ Le non-labour préserve les deux mécanismes : les agrégats restent intacts (protection physique) et les surfaces minérales ne sont pas exposées (protection chimique). C'est pourquoi le non-labour séquestre du carbone.", "contexte_sci": "Les agrégats protègent physiquement la matière organique de la minéralisation en créant des microsites inaccessibles aux enzymes microbiennes.", "instructions": "Expliquer le mécanisme de protection physique de la MO dans les agrégats. Relier à la séquestration du carbone (MAOM vs POC). Termes : agrégats, microsites, MAOM, POC.", "style": "scientifique dense"}, {"type": "section", "chapitre": 3, "section": 1, "titre_h1": "III. Porosité et eau dans les agrégats", "titre_h2": "3.1 Architecture des pores et fonctions hydrauliques", "titre_h3": null, "tableau": 0, "enrichissement": "→ L'architecture des pores est un GRADIENT : macropores (>50 µm, drainage gravitaire, galeries faune) → mésopores (2-50 µm, réserve utile, capillarité) → micropores (<2 µm, eau liée, habitat anaérobie).\n→ La distribution des pores détermine le régime hydrique ET le régime redox : macropores drainés = aérobie, micropores saturés = anaérobie. Un bon sol a les DEUX — c'est le gradient qui crée la diversité métabolique.\n→ La porosité totale d'un sol non-labouré (50-65%) est supérieure à celle d'un sol labouré (40-50%). Le labour crée des macropores temporaires mais détruit la mésoporosité biologique permanente.", "contexte_sci": "La porosité du sol détermine la circulation de l'eau et de l'air. Deux types : porosité texturale (héritée des minéraux) et porosité structurelle (créée par la biologie). Lien avec l'eau dans le sol (agrégats et rétention hydrique).", "instructions": "Distinguer porosité texturale et structurelle. Relier à la conductivité hydraulique et à la réserve utile. Termes : porosité structurelle, porosité texturale, réserve utile.", "style": "scientifique dense"}, {"type": "section", "chapitre": 3, "section": 2, "titre_h1": null, "titre_h2": "3.2 Réserve utile et résilience à la sécheresse", "titre_h3": null, "tableau": 0, "enrichissement": "→ La réserve utile (RU) = eau entre capacité au champ (pF 2.5) et point de flétrissement (pF 4.2). En sol limoneux : 150-200 mm/m. En sol sableux : 60-100 mm/m. En sol argileux bien structuré : 120-180 mm/m.\n→ La MO augmente la
