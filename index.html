─────\\nAccepteur : SO₄²⁻ → H₂S\"]\n\n    Z5[\"⚫ SÉDIMENT — Méthanogenèse\\n─────────────────────────────\\nEh : -300 à -400 mV\\nH₂S abondant · FeS (noircissement)\\n\\nArchées méthanogènes\\n(Methanobacterium, Methanosarcina)\\n\\nCO₂ + H₂ → CH₄ + H₂O\\nAcétate → CH₄ + CO₂\\n─────────────────────────────\\nAccepteur terminal : CO₂ → CH₄\"]\n\n    ECHELLE[\"📏 REDOX LADDER\\n─────────────\\n+600 mV ← O₂\\n+200 mV ← NO₃⁻\\n 0   mV ← Mn⁴⁺/Fe³⁺\\n-150 mV ← SO₄²⁻\\n-300 mV ← CO₂/CH₄\"]\n\n    LUMIERE -->|\"Pénétration décroissante\\nen profondeur\"| Z1\n    Z1 -->|\"O₂ consommé\\nmatière org. produite\"| Z2\n    Z2 -->|\"O₂ épuisé\\nH₂S apparaît\"| Z3\n    Z3 -->|\"Réduction sulfate\\nH₂S accumulé\"| Z4\n    Z4 -->|\"Fermentation\\nH₂ + acétate produits\"| Z5\n    Z5 -.->|\"CH₄ + H₂S bulles\\nremontent\"| Z2\n\n    ECHELLE -.->|\"Guide thermodynamique\\ndes voies métaboliques\"| Z3\n\n    NOTE[\"🌱 Application au sol agricole :\\nLes mêmes gradients existent\\nà l'échelle du microsite (µm–mm)\\nà l'intérieur des agrégats.\\nUn agrégat = une colonne de Winogradsky\\nen miniature.\"]\n\n    Z5 -.->|\"Analogie\\nà l'échelle du sol\"| NOTE\n\n    style Z1    fill:#E3F2FD,stroke:#1565C0,color:#0D47A1\n    style Z2    fill:#FFF3E0,stroke:#E65100,color:#BF360C\n    style Z3    fill:#FFFDE7,stroke:#F9A825,color:#F57F17\n    style Z4    fill:#EFEBE9,stroke:#6D4C41,color:#4E342E\n    style Z5    fill:#263238,stroke:#37474F,color:#ECEFF1\n    style LUMIERE fill:#FFFDE7,stroke:#FDD835,color:#F57F17\n    style ECHELLE fill:#F3E5F5,stroke:#6A1B9A,color:#4A148C\n    style NOTE  fill:#E8F5E9,stroke:#2E7D32,color:#1B5E20", "sources": "[{\"auteur\": \"Suleiman et al.\", \"annee\": 2021, \"doi\": \"10.1002/mbo3.1189\"}, {\"auteur\": \"Pagaling et al.\", \"annee\": 2017, \"doi\": \"10.1111/1462-2920.13849\"}, {\"auteur\": \"Cabello-Yeves et al.\", \"annee\": 2023, \"doi\": \"10.1002/lno.12437\"}]", "notes": "Un agrégat de sol = une colonne de Winogradsky en miniature. Redox ladder O₂→NO₃→Mn→Fe→SO₄→CH₄. Lien direct S4 §II (potentiel redox) et S1 (microsites anoxiques).", "statut": "produit"}, {"concept": "Priming effect", "docs_codes": ["S4", "S2", "P2"], "mermaid": "flowchart TD\n    CLABILE[\"🌿 APPORT DE C LABILE\\n─────────────────────\\nExsudats racinaires\\nRésidus frais — C/N < 20\\nGlucose · Acides aminés · Saccharose\\n\\n5–33% du C photosynthétique\\nvers la rhizosphère\"]\n\n    RSTRAT[\"🔵 ACTIVATION r-STRATÈGES\\n─────────────────────\\nBactéries copiotrophes\\n(Proteobacteria, Bacteroidetes)\\n\\nCroissance rapide · CUE élevée\\nConsommation C labile\\n\\nPas de limitation C → activité maximale\"]\n\n    KSTRAT[\"🍄 RECRUTEMENT K-STRATÈGES\\n─────────────────────\\nChampignons saprophytes\\nBactéries oligotrophes\\n(Actinobacteria, Acidobacteria)\\n\\nProduction d'enzymes extracellulaires :\\nLigninases · Cellulases · Oxidases\\n\\nBesoin en N → minage MO stable\"]\n\n    DESTAB[\"⚡ DÉSTABILISATION MO STABLE\\n─────────────────────\\nEnzymes attaquent la MAOM\\n(MO stabilisée par les minéraux)\\n\\nHydrolyse des liaisons organo-minérales\\nLibération N · P · oligo-éléments\\n\\n+200% de minéralisation MO stable\\n(Paterson & Sim, 2013)\"]\n\n    BILAN[\"⚖️ BILAN PRIMING\\n─────────────────────\\nPriming POSITIF (réel) :\\nN mining → N disponible ↑↑\\nC stable perdu → CO₂↑\\n\\nPriming NÉGATIF (apparent) :\\nPréférence C labile → MO stable protégée\\nRéponse rapide < 48h\\n\\nDépend : qualité substrat · ratio F/B · pH\"]\n\n    NECRO[\"🔄 RETOUR → MAOM\\n─────────────────────\\nNécromasse microbienne\\n(chitine, peptidoglycane, protéines)\\n\\nAdsorption aux minéraux (argiles)\\n→ nouveau MAOM stable\\n\\nCUE élevée + ratio F/B > 0,8\\n→ double bénéfice séquestration\"]\n\n    CLABILE -->|\"C labile disponible\\nplus de limitation\"| RSTRAT\n    RSTRAT -->|\"Compétition C labile\\nréduction limitation r-strat.\"| KSTRAT\n    KSTRAT -->|\"Enzymes extracell.\\nN mining\"| DESTAB\n    DESTAB -->|\"N · P · C\\nlibérés\"| BILAN\n    KSTRAT -->|\"Mort cellulaire\\nturnover rapide\"| NECRO\n    NECRO -.->|\"Stabilisation argilo-minérale\\n(MAOM nouveau)\"| DESTAB\n\n    SANS[\"🔒 SANS C LABILE\\n─────────────────────\\nMicrobiome en dormance\\nMO stable peu accessible\\nEnzymes inactives\\n\\nCO₂ minimal\\nN immobilisé\"]\n\n    CLABILE -.->|\"Comparaison\\navec absence\"| SANS\n\n    style CLABILE fill:#FFF9C4,stroke:#F9A825,color:#E65100\n    style RSTRAT  fill:#E3F2FD,stroke:#1565C0,color:#0D47A1\n    style KSTRAT  fill:#F3E5F5,stroke:#6A1B9A,color:#4A148C\n    style DESTAB  fill:#FFF3E0,stroke:#E65100,color:#BF360C\n    style BILAN   fill:#FAFAFA,stroke:#424242,color:#212121\n    style NECRO   fill:#E8F5E9,stroke:#2E7D32,color:#1B5E20\n    style SANS    fill:#EEEEEE,stroke:#757575,color:#424242", "sources": "[{\"ref\": \"Kuzyakov (2010)\"}, {\"ref\": \"Paterson & Sim (2013) [doi:10.1111/gcb.12140]\"}, {\"ref\": \"Rousk et al. (2016) [doi:10.1111/gcb.13296]\"}]", "notes": "C labile → activation microbiome → minéralisation MO stable", "statut": "produit"}, {"concept": "Formation des micro-agrégats", "docs_codes": ["S1", "S2", "S4"], "mermaid": "flowchart LR\n    COMP[\"🧩 COMPOSANTS INITIAUX\\n─────────────────────\\nArgiles (phyllosilicates)\\nBactéries vivantes\\nChampignons (hyphes)\\nNécromasse microbienne\\nEPS (sécrétions)\"]\n\n    EPS_STEP[\"🟡 BIOFILM + EPS\\n─────────────────────\\nEPS = polysaccharides\\n+ protéines + ADNec\\n\\nBactéries → surface argile\\nEPS → ponts entre particules\\nCa²⁺ → pontage organo-minéral\\n\\nProto-micro-agrégat\\n(20–50 µm)\"]\n\n    NECRO_STEP[\"💀 NÉCROMASSE → MAOM\\n─────────────────────\\nMort microbienne (turnover)\\nCellules lysées →\\nProtéines · Lipides\\nAmino-sucres (chitine)\\n\\nAdsorption aux argiles\\n→ MAOM (organo-minéral)\\n\\nt½ MAOM = 50–500 ans\\n(vs 1–3 ans biomasse)\"]\n\n    AGGREGATE[\"🏗️ MICRO-AGRÉGAT STABLE\\n─────────────────────\\nTaille : 20–250 µm\\n\\nStructure concentrique :\\n• Cœur : argiles + MAOM\\n• Milieu : bactéries + EPS\\n• Enveloppe : hyphes fongiques\\n\\nMicropores anoxiques internes\\n→ C occlus ultra-protégé\\n\\nContient 50–70%\\ndu C organique stable du sol\\n(Liang et al., 2019)\"]\n\n    PROTECTION[\"🛡️ PROTECTION DU CARBONE\\n─────────────────────\\nMécanismes de protection :\\n1. Liaison organo-minérale\\n   (forces électrostatiques)\\n2. Occlusion physique\\n   (inaccessible aux enzymes)\\n3. Anoxie locale\\n   (pas d'oxydation)\\n\\nDégradation par :\\n→ Labour (rupture mécanique)\\n→ Dessiccation/réhumectation\\n→ Excès N minéral (pH < 5,5)\"]\n\n    COMP -->|\"Bactéries sécrètent EPS\\nen contact avec les argiles\"| EPS_STEP\n    EPS_STEP -->|\"Mort + turnover microbien\\n~3 ans de vie moyenne\"| NECRO_STEP\n    NECRO_STEP -->|\"Hyphes fongiques\\nenveloppent l'agrégat\"| AGGREGATE\n    AGGREGATE -->|\"Durabilité si\\nnon perturbé\"| PROTECTION\n    PROTECTION -.->|\"Labour ou sécheresse\\n→ rupture\"| COMP\n\n    style COMP      fill:#EFEBE9,stroke:#6D4C41,color:#4E342E\n    style EPS_STEP  fill:#FFFDE7,stroke:#F9A825,color:#E65100\n    style NECRO_STEP fill:#E8F5E9,stroke:#2E7D32,color:#1B5E20\n    style AGGREGATE fill:#E3F2FD,stroke:#1565C0,color:#0D47A1\n    style PROTECTION fill:#F3E5F5,stroke:#6A1B9A,color:#4A148C", "sources": "[{\"ref\": \"Sokol et al. (2022) [doi:10.1111/1365-2435.14040]\"}, {\"ref\": \"Zhong et al. (2025) [doi:10.1111/1365-2435.70076]\"}, {\"ref\": \"Liang et al. (2019)\"}]", "notes": "EPS + nécromasse + argiles → MAOM → protection carbone", "statut": "produit"}, {"concept": "Réseau mycorhizien commun (CMN)", "docs_codes": ["S3", "V2", "P2"], "mermaid": "flowchart TD\n    PLANTE_A[\"🌾 Plante donneuse (graminée)\\n─────────────────\\nPhotosynthèse active\\nAllocation C racinaire :\\n5–33% du C photosynthétique\\n→ exsudats + mycorhizes\"]\n\n    PLANTE_B[\"🌿 Plante receveuse (semis)\\n─────────────────\\nJeune plante / ombre\\nC limité\\n\\nReçoit : C (jusqu'à 10%)\\nN, P, signaux de défense\\nvia le CMN\"]\n\n    PLANTE_C[\"🫘 Légumineuse\\n─────────────────\\nFixation N₂ atmosphérique\\n(nodosités Rhizobium)\\n\\nDonne : N fixé\\nReçoit : P, eau, micronutriments\"]\n\n    CMN[\"🍄 RÉSEAU MYCORHIZIEN COMMUN\\n─────────────────\\nCMA (Arbusculaires) : Glomeromycota\\nEcto-mycorhizes : Basidiomycota\\n\\nArbuscules : échanges C/P intracellulaires\\nAnastomoses : fusions hyphales\\n\\nCouvre jusqu'à 100× la zone racinaire\\n\\n>400 millions d'années d'évolution\\n(Dawson et al., 2024)\"]\n\n    SOL[\"🌍 SOL — Réservoir de nutriments\\n─────────────────\\nP inorganique : apatites, argiles\\nFe, Zn, Cu : complexés aux minéraux\\nN organique : protéines, acides aminés\\n\\nSiderophores fongiques\\n→ chélation Fe, Zn, Cu\\n\\n80% du P végétal\\ntransitera par les CMA\"]\n\n    DEFENSE[\"🛡️ SIGNAUX DE DÉFENSE\\n─────────────────\\nAttaque herbivore ou pathogène\\n→ signal chimique\\npropagé via CMN\\n→ ISR plantes voisines\\n\\nPré-alerte systémique\\nbefore pathogen arrives\"]\n\n    PLANTE_A -->|\"C photosynthétique\\n(glucose, saccharose)\"| CMN\n    PLANTE_C -->|\"N fixé\\n(glutamine)\"| CMN\n    CMN -->|\"C + signaux\\nvers semis\"| PLANTE_B\n    CMN -->|\"P, Fe, Zn, Cu\\nvers toutes les plantes\"| PLANTE_A\n    CMN -->|\"P, Fe, Zn, Cu\"| PLANTE_B\n    CMN -->|\"P, micronutriments\"| PLANTE_C\n    SOL -->|\"Hyphes extra-racinaires\\ncaptent P, Fe, eau\"| CMN\n    PLANTE_A -->|\"Signal attaque\\ninsecte/pathogène\"| DEFENSE\n    DEFENSE -->|\"Via CMN\\nISR systémique\"| PLANTE_B\n\n    style PLANTE_A fill:#E8F5E9,stroke:#2E7D32,color:#1B5E20\n    style PLANTE_B fill:#FFF9C4,stroke:#F9A825,color:#E65100\n    style PLANTE_C fill:#E8F5E9,stroke:#43A047,color:#2E7D32\n    style CMN      fill:#F3E5F5,stroke:#7B1FA2,color:#4A148C\n    style SOL      fill:#EFEBE9,stroke:#6D4C41,color:#4E342E\n    style DEFENSE  fill:#FFEBEE,stroke:#C62828,color:#B71C1C", "sources": "Dawson et al. (2024) [doi:10.1111/1365-2435.14634] · Workman & Cruzan (2016) [doi:10.3732/ajb.1600142]", "notes": "Connexions entre plantes — flux C, P, signaux de défense", "statut": "produit"}, {"concept": "Cycle C/N — faim d'azote", "docs_codes": ["S4", "P2", "P3"], "mermaid": "flowchart TD\n    APPORT[\"🌿 APPORT DE MATIÈRE ORGANIQUE\\n─────────────────\\nRésidus de cultures · Fumiers\\nComposts · Couverts végétaux\\nBRF · Bokashi\"]\n\n    SCALE[\"📏 RATIO C/N — SEUILS DÉCISIONNELS\\n─────────────────\\n< 20 → MINÉRALISATION\\n20–25 → ÉQUILIBRE\\n25–30 → Début immobilisation\\n> 30 → FAIM D'AZOTE\\n> 100 → Structure physique\\n(pas d'apport N, décomposition très lente)\"]\n\n    MINERALISATION[\"✅ C/N < 20 — MINÉRALISATION\\n─────────────────\\nExemples :\\nLégumineuses (C/N 10–20)\\nFumier poulet (C/N 7–10)\\nBoues épuration (C/N 5)\\n\\nMicrobes → N en excès\\n→ NH₄⁺ → NO₃⁻ libéré\\n\\nN disponible pour les plantes\\nAttention : lessivage si pluie\"]\n\n    EQUILIBRE[\"⚖️ C/N 20–25 — ÉQUILIBRE\\n─────────────────\\nExemples :\\nCompost mûr (C/N ~18)\\nFumier bovin (C/N 16–21)\\nBokashi équilibré (~22)\\n\\nNi gain ni perte nette de N\\nCible pour les amendements\\nStabilité biologique maximale\"]\n\n    IMMOBILISATION[\"⚠️ C/N > 30 — FAIM D'AZOTE\\n─────────────────\\nExemples :\\nPaille de blé (C/N 100–150)\\nBRF (C/N 50–100)\\nCopeaux bois (C/N 200–1300)\\n\\n🔴 N minéral immobilisé\\ndans biomasse microbienne\\n4–8 semaines\\n\\nSymptôme : jaunissement\\nplantes même si MO élevée\\n(Alghamdi & Cihacek, 2021)\"]\n\n    SOLUTIONS[\"🔧 SOLUTIONS FAIM D'AZOTE\\n─────────────────\\n1. Roulage-crimpage avant épiaison\\n   (C/N encore < 30 → moins d'immobilisation)\\n\\n2. Apport N minéral d'accompagnement\\n   (10–15 kg N/ha)\\n\\n3. Mélange : paille (C/N 100) + légumineuse\\n   (C/N 15) → C/N résultant ~25\\n\\n4. Délai : 4–8 semaines avant semis\\n   (N libéré après mort des bactéries)\"]\n\n    APPORT --> SCALE\n    SCALE -->|\"C/N < 20\"| MINERALISATION\n    SCALE -->|\"C/N 20–25\"| EQUILIBRE\n    SCALE -->|\"C/N > 30\"| IMMOBILISATION\n    IMMOBILISATION --> SOLUTIONS\n\n    style MINERALISATION fill:#E8F5E9,stroke:#2E7D32,color:#1B5E20\n    style EQUILIBRE      fill:#FFF9C4,stroke:#F9A825,color:#E65100\n    style IMMOBILISATION fill:#FFEBEE,stroke:#C62828,color:#B71C1C\n    style SOLUTIONS      fill:#E3F2FD,stroke:#1565C0,color:#0D47A1\n    style SCALE          fill:#F5F5F5,stroke:#424242,color:#212121\n    style APPORT         fill:#EFEBE9,stroke:#6D4C41,color:#4E342E", "sources": "Alghamdi & Cihacek (2021) [doi:10.1002/agj2.20885] · Raigne et al. (2025) [doi:10.1002/csc2.70155]", "notes": "C/N > 30 → immobilisation N microbienne — règle de décision", "statut": "produit"}, {"concept": "Cycle redox Fe comme shuttle P", "docs_codes": ["S4", "S3", "P1"], "mermaid": "flowchart LR\n    AEROB[\"🟠 CONDITIONS AÉROBIES\\n─────────────────\\nEh > +200 mV · O₂ présent\\npH 5–7 optimal\\n\\nFe³⁺ (oxydes) : goethite, ferrihydrite\\n\\nP PIÉGÉ :\\nPO₄³⁻ adsorbé sur Fe³⁺\\nLiaison covalente forte\\n\\n→ P total élevé MAIS\\nP disponible faible\\n\\nCalcaire : pH > 7,5\\n→ Ca₃(PO₄)₂ précipité\\n→ double piège P\"]\n\n    ANOXIQUE[\"🔵 CONDITIONS ANOXIQUES\\n─────────────────\\nEh < +100 mV · O₂ épuisé\\n\\nBactéries ferro-réductrices\\n(Geobacter, Shewanella)\\nFe³⁺ → Fe²⁺ (soluble)\\n\\nP LIBÉRÉ :\\nFe²⁺ ne retient pas PO₄³⁻\\nP passe en solution\\n\\n→ P disponible\\npour racines et CMA\\n(Smith et al., 2021)\"]\n\n    CONTROLE[\"💧 CONTRÔLE DU CYCLE\\n─────────────────\\nVers anaérobiose :\\n• Engorgement d'eau\\n• Teneur MO élevée\\n• Activité microbienne ↑\\n\\nVers aérobiose :\\n• Drainage · Aération\\n• Labour\\n• Sécheresse\\n\\nMicrobiome = catalyseur :\\nAccélère ×100 vs réactions abiotiques\"]\n\n    MICROSITE[\"🔬 MICROSITES DANS LES AGRÉGATS\\n─────────────────\\nMême en sol bien drainé :\\n\\nIntérieur agrégat > 200 µm\\n→ O₂ limité\\n→ Fe³⁺ → Fe²⁺ localement\\n→ P libéré au coeur de l'agrégat\\n\\nCMA hyphes accèdent\\naux microsites\\n→ captent P libéré\\n→ transfèrent aux racines\"]\n\n    PRATIQUES[\"🌱 IMPLICATIONS PRATIQUES\\n─────────────────\\n✓ Sol vivant humide :\\nmicrosites anoxiques → P libéré\\nCMA → transport P\\n\\n⚠️ Excès P soluble (> 60 mg/kg)\\n→ inhibe les CMA\\n→ moins d'exploration\\n\\n✗ Labour + sécheresse :\\nFe³⁺ dominant → P bloqué\\nmême si P total élevé\\n\\nCauses cachées de\\n'blocage P en sol calcaire'\"]\n\n    AEROB <-->|\"Cycle Fe redox\\ncontrôlé par Eh et eau\"| ANOXIQUE\n    CONTROLE -->|\"Eau → anaérobiose\"| ANOXIQUE\n    CONTROLE -->|\"Aération → aérobiose\"| AEROB\n    ANOXIQUE -->|\"P libéré\\naccès CMA\"| MICROSITE\n    MICROSITE -->|\"Absorption P\\npar plantes\"| PRATIQUES\n    AEROB -.->|\"P bloqué\\nmalgré P total élevé\"| PRATIQUES\n\n    style AEROB    fill:#FFF3E0,stroke:#E65100,color:#BF360C\n    style ANOXIQUE fill:#E3F2FD,stroke:#1565C0,color:#0D47A1\n    style CONTROLE fill:#FAFAFA,stroke:#424242,color:#212121\n    style MICROSITE fill:#F3E5F5,stroke:#6A1B9A,color:#4A148C\n    style PRATIQUES fill:#E8F5E9,stroke:#2E7D32,color:#1B5E20", "sources": "Smith et al. (2021) [doi:10.1002/jeq2.20256] · Calabrese et al. (2020) [doi:10.1029/2020JG005894]", "notes": "Fe³⁺/Fe²⁺ contrôle disponibilité P — piège au pH > 6,5", "statut": "produit"}, {"concept": "Structure d'un agrégat — microsites", "docs_codes": ["S1", "S4", "S2"], "mermaid": "flowchart TD\n    SURFACE[\"🌐 SURFACE EXTERNE — AÉROBIE\\n─────────────────\\nEh > +300 mV · O₂ présent\\n\\nBiofilm EPS externe\\nHyphes CMA\\nBactéries aérobies (copiotrophes)\\nFongique dominant\\n\\nDégradation MO labile\\nProduction CO₂\\n\\nÉchanges avec solution du sol\"]\n\n    SUBOXIQUE[\"🔵 ZONE SUBOXIQUE\\n─────────────────\\nEh +100 à +300 mV\\nO₂ limitant (diffusion < consommation)\\n\\nBactéries dénitrifiantes\\nNO₃⁻ → N₂O → N₂\\n\\nBactéries facultatives\\n(passent entre aérobie/anaérobie)\\n\\nProduction N₂O si sécheresse+humidité\"]\n\n    ANOXIQUE[\"🟡 ZONE ANOXIQUE\\n─────────────────\\nEh < +100 mV\\n\\nBactéries ferro-réductrices\\nFe³⁺ → Fe²⁺\\n→ P libéré localement\\n\\nBactéries réductrices sulfate\\nSO₄²⁻ → H₂S\\n\\nMO stable accessible\\naux hyphes CMA seules\"]\n\n    COEUR[\"⚫ CŒUR ANAÉROBIE STRICT\\n─────────────────\\nEh < -200 mV\\n\\nMéthanogènes (Archaea)\\nCO₂ + H₂ → CH₄\\n\\nBactéries fermentaires\\nAcides gras courts · H₂\\n\\nMO occluse ultra-protégée\\nt½ > 100 ans\\n(Zhang et al., 2025)\"]\n\n    GRADIENT[\"📏 GRADIENTS DANS L'AGRÉGAT\\n─────────────────\\n↓ O₂  : surface → centre\\n↑ CO₂ : centre → surface\\n↑ H₂S : centre → surface\\n↑ Fe²⁺ : centre → surface\\n\\nRéplication exacte\\nde la colonne de Winogradsky\\nà l'échelle du µm\"]\n\n    PROTECTION[\"🛡️ PROTECTION DU CARBONE\\n─────────────────\\nMécanismes combinés :\\n1. MAOM : liaison argilo-minérale\\n2. Occlusion physique dans l'agrégat\\n3. Anoxie locale → pas d'oxydation\\n\\nEAP = 33–36% en sol naturel\\nvs 0% en sol labouré\\n(Zhang et al., 2025)\\n\\n= Protection à 3 niveaux simultanés\"]\n\n    SURFACE --> SUBOXIQUE\n    SUBOXIQUE --> ANOXIQUE\n    ANOXIQUE --> COEUR\n    GRADIENT -.->|\"Contrôle\\nles zones\"| COEUR\n    COEUR -.->|\"CO₂ · CH₄ · Fe²⁺\\nremontent\"| SURFACE\n    COEUR --> PROTECTION\n\n    style SURFACE   fill:#FFF3E0,stroke:#E65100,color:#BF360C\n    style SUBOXIQUE fill:#E3F2FD,stroke:#1565C0,color:#0D47A1\n    style ANOXIQUE  fill:#E8F5E9,stroke:#2E7D32,color:#1B5E20\n    style COEUR     fill:#263238,stroke:#37474F,color:#ECEFF1\n    style GRADIENT  fill:#F3E5F5,stroke:#6A1B9A,color:#4A148C\n    style PROTECTION fill:#E8F5E9,stroke:#43A047,color:#2E7D32", "sources": "Zhang et al. (2025) [doi:10.1111/ejss.70201] · Kasanke et al. (2020) [doi:10.1111/gcbb.12777]", "notes": "Zones oxiques/anoxiques µm — mini colonne Winogradsky", "statut": "produit"}, {"concept": "ISR / SAR — immunité plante", "docs_codes": ["V2", "S2", "P2"], "mermaid": "flowchart TD\n    PGPR[\"🔵 MICROBIOME RACINAIRE (PGPR)\\n─────────────────\\nBacillus, Pseudomonas, Trichoderma\\n\\nProduisent : MAMPs · surfactines\\nlipopeptides · composés volatils\\n\\nPercus par récepteurs PRR\\ndes cellules racinaires\\n(Debois et al., 2015)\"]\n\n    ISR[\"⬆️ ISR — Signal JA/ET\\n─────────────────\\nJasmonate (JA) +\\nEthylène (ET)\\n\\nPropagation systémique\\nascendante\\n\\nPas de SA requis\\nRéponse large spectre\\n(biotrophes + nécrotrophes)\"]\n\n    PATHOGENE[\"🦠 PATHOGÈNE FOLIAIRE\\n─────────────────\\nFongique · Bactérien · Viral\\n\\nInfection locale\\n→ lésion visible\\n→ mort cellulaire\\nhypersensible (HR)\"]\n\n    SAR[\"⬇️↕️ SAR — Signal SA + Pip\\n─────────────────\\nAcide salicylique (SA)\\n+ Acide pipécolique (Pip)\\n+ N-hydroxy-Pip (NHP)\\n\\nPropagation systémique\\n+ VOCs aériens\\n→ plantes voisines alertées\\n(Vlot et al., 2020)\"]\n\n    PRIME[\"🛡️ CELLULES PRIMÉES\\n─────────────────\\nISR → état de pré-alerte\\n\\nRéponse PLUS RAPIDE et PLUS FORTE\\nsi attaque ultérieure :\\n• Polyphénols ×1,3–1,5\\n• Parois renforcées\\n• PR protéines\\n• Callose déposée\\n\\nPas de coût permanent\\n(PRIMING ≠ activation constante)\"]\n\n    CROSSTALK[\"⚖️ DIALOGUE HORMONAL\\n─────────────────\\nJA ↔ SA : antagonisme partiel\\n\\nJA/ET → efficace contre\\nnécrotrophes + herbivores\\n\\nSA → efficace contre\\nbiotrophes + virus\\n\\nMicrobiome module le ratio JA/SA\\n→ optimise la défense\"]\n\n    FEEDBACK[\"🔄 FEEDBACK MICROBIOME\\n─────────────────\\nISR/SAR modifient\\nla composition du microbiome :\\n\\n• Plus de PGPR protecteurs\\n• Moins de pathogènes\\n• Microbiome → bouclier\\n\\nSol vivant = système\\nimmunitaire végétal actif\"]\n\n    PGPR -->|\"MAMPs perçus\\npar racines\"| ISR\n    PATHOGENE -->|\"Infection locale\\ndéclenche SA\"| SAR\n    ISR -->|\"JA/ET systémique\\nvers feuilles\"| PRIME\n    SAR -->|\"SA + Pip + NHP\\n+ VOCs aériens\"| PRIME\n    ISR <-->|\"Dialogue\\nhormonal\"| CROSSTALK\n    SAR <-->|\"Dialogue\\nhormonal\"| CROSSTALK\n    PRIME -->|\"Microbiome\\nmodifié en retour\"| FEEDBACK\n    FEEDBACK -->|\"Sélection PGPR\\nbénéfiques\"| PGPR\n\n    style PGPR     fill:#E3F2FD,stroke:#1565C0,color:#0D47A1\n    style ISR      fill:#FFF9C4,stroke:#F9A825,color:#E65100\n    style PATHOGENE fill:#FFEBEE,stroke:#C62828,color:#B71C1C\n    style SAR      fill:#FFEBEE,stroke:#E53935,color:#B71C1C\n    style PRIME    fill:#E8F5E9,stroke:#2E7D32,color:#1B5E20\n    style CROSSTALK fill:#F3E5F5,stroke:#7B1FA2,color:#4A148C\n    style FEEDBACK fill:#E0F2F1,stroke:#00695C,color:#004D40", "sources": "Vlot et al. (2020) [doi:10.1111/nph.16953] · Debois et al. (2015) [doi:10.1111/1758-2229.12286]", "notes": "Microbiome rhizosphérique → signaux ISR/SAR systémiques", "statut": "produit"}, {"concept": "Stratégies Y-A-S", "docs_codes": ["S2", "S3", "P1"], "mermaid": "flowchart LR\n    subgraph YAS [\"Espace Y-A-S (Malik et al., 2020)\"]\n        Y[\"🟢 Y — RENDEMENT\\n─────────────\\nCUE élevée : 40–60%\\nCroissance rapide\\nCopiotrophes\\n\\nTrigger : C abondant\\nFaible stress\\n\\nEffet sol : Nécromasse → MAOM\\nBiomasse ↑ · Séquestration C\"]\n        A[\"🟠 A — ACQUISITION\\n─────────────\\nEnzymes extracell. :\\nLigninases · Cellulases\\nPhosphatases · Uréase\\nSidérophores\\n\\nTrigger : N/P/C limitant\\nSubstrat récalcitrant\\n\\nEffet sol : Priming effect\\nMinéralisation MO stable\"]\n        S[\"🔵 S — STRESS\\n─────────────\\nDormance (spores)\\nEPS · Osmoprotectants\\nTréhalose · Bétaïne\\n\\nTrigger : Sécheresse\\npF > 4 · pH extrême · Froid\\n\\nEffet sol : Dormance microbienne\\nBirch effect à la réhumectation\"]\n    end\n\n    CONDITION[\"🌡️ CONDITIONS ENVIRONNEMENTALES\\n─────────────────────\\nDriving factors :\\n• Disponibilité C (exsudats, MO fraîche)\\n• Disponibilité N, P\\n• pF (potentiel hydrique)\\n• Température\\n• pH\"]\n\n    SOL_REGEN[\"✅ SOL RÉGÉNÉRATIF\\n─────────────────────\\nCommunauté dominée par Y\\n\\nCouvert permanent → exsudats continus\\nC/N équilibré → CUE élevée\\nRatio F/B > 0,8\\nBiomasse ATP élevée\\n\\nIndicateur terrain : Brix foliaire ↑\"]\n\n    SOL_DEGRADE[\"❌ SOL DÉGRADÉ\\n─────────────────────\\nCommunauté dominée par S\\n\\nSol nu · Labour fréquent\\npF élevé (sécheresse)\\nN minéral excessif → A\\nRatio F/ const STRATE_DESCRIPTIONS = DATA.strate_descriptions || {};

// Matching fuzzy pour les termes reliés (rt)
function findTerm(allTerms, query) {
  if (!query) return null;
  const q = query.trim();
  if (q.length < 2 || q === ',') return null;
  const ql = q.toLowerCase();
  // 1. Exact
  let found = allTerms.find(x => x.fr === q);
  if (found) return found;
  // 2. Case-insensitive
  found = allTerms.find(x => x.fr.toLowerCase() === ql);
  if (found) return found;
  // 3. Abbreviation avant parenthèse: "CMA" → "CMA (champignons...)"
  found = allTerms.find(x => x.fr.toLowerCase().startsWith(ql + ' (') || x.fr.toLowerCase().startsWith(ql + ' /'));
  if (found) return found;
  // 4. Contenu entre parenthèses: "GOE" → "Grand Événement (GOE)"
  found = allTerms.find(x => { const m = x.fr.match(/\\(([^)]+)\\)/); return m && m[1].toLowerCase() === ql; });
  if (found) return found;
  // 5. Pluriel/singulier
  found = allTerms.find(x => x.fr.toLowerCase() === ql + 's' || x.fr.toLowerCase() + 's' === ql);
  if (found) return found;
  // 6. Match sur synonymes FR
  found = allTerms.find(x => x.syn_fr && x.syn_fr.toLowerCase().split(' · ').some(s => s.trim() === ql));
  if (found) return found;
  // 7. Match sur nom anglais
  found = allTerms.find(x => x.en && x.en.toLowerCase() === ql);
  if (found) return found;
  // 8. Contient comme mot entier dans le nom: "priming effect" → "effet d'amorçage" non, mais "Priming Effect" → terme contenant
  found = allTerms.find(x => x.fr.toLowerCase().includes(ql) && x.fr.length < ql.length + 20);
  if (found) return found;
  return null;
}

// ── CROSS-REFS ──
function CrossRefsTab() {
  const [selectedDoc, setSelectedDoc] = React.useState(null);
  const docCodes = [...new Set(DATA.documents.map(d => d.code))].sort();

  // Matrice de connexions
  const matrix = {};
  DATA.crossrefs.forEach(cr => {
    const src = cr.doc_code_source;
    const dst = cr.doc_code_cible;
    const key = `${src}-${dst}`;
    matrix[key] = (matrix[key] || 0) + 1;
  });

  // Refs pour le doc sélectionné
  const asSource = selectedDoc ? DATA.crossrefs.filter(cr => cr.doc_code_source === selectedDoc) : [];
  const asTarget = selectedDoc ? DATA.crossrefs.filter(cr => cr.doc_code_cible === selectedDoc) : [];

  return <div>
    <p className="text-sm text-gray-500 mb-3">Cliquez sur un document pour voir ses connexions</p>
    <div className="overflow-x-auto mb-4">
      <table className="text-xs border-collapse">
        <thead><tr><th className="p-1"></th>{docCodes.map(d => <th key={d} className="p-1 text-center w-8"><span className="writing-mode-vertical" style={{writingMode:'vertical-rl'}}>{d}</span></th>)}</tr></thead>
        <tbody>{docCodes.map(src => <tr key={src}>
          <td className="p-1 font-medium cursor-pointer hover:text-blue-600" onClick={() => setSelectedDoc(selectedDoc === src ? null : src)}>
            <Badge strate={src[0]} small /> {src}
          </td>
          {docCodes.map(dst => {
            const n = (matrix[`${src}-${dst}`] || 0);
            const rev = (matrix[`${dst}-${src}`] || 0);
            const bidi = n > 0 && rev > 0;
            return <td key={dst} className={`p-1 text-center w-8 h-8 rounded ${n > 0 ? (bidi ? 'bg-green-200 text-green-800' : 'bg-blue-100 text-blue-700') : src === dst ? 'bg-gray-100' : ''}`}>
              {n > 0 ? n : ''}
            </td>;
          })}
        </tr>)}</tbody>
      </table>
    </div>
    <div className="flex gap-3 text-xs text-gray-500 mb-4">
      <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-green-200 inline-block"></span> Bidirectionnel</span>
      <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-blue-100 inline-block"></span> Unidirectionnel</span>
    </div>
    {selectedDoc && <div className="card">
      <h4 className="font-semibold mb-2 flex items-center gap-2"><Badge strate={selectedDoc[0]} /> {selectedDoc}</h4>
      {asSource.length > 0 && <div className="mb-3">
        <div className="text-sm font-medium text-gray-600 mb-1">Renvoie vers ({asSource.length})</div>
        {asSource.map((cr, i) => <div key={i} className="text-sm py-1.5 border-b border-gray-50">
          <div><span className="text-blue-600 font-medium">{cr.doc_code_cible}{cr.section_cible ? '\u00a7'+cr.section_cible : ''}</span> : {cr.pour_concept}</div>
          {cr.justification && <div className="text-xs text-gray-400 mt-0.5 leading-relaxed">{cr.justification}</div>}
        </div>)}
      </div>}
      {asTarget.length > 0 && <div>
        <div className="text-sm font-medium text-gray-600 mb-1">Recu de ({asTarget.length})</div>
        {asTarget.map((cr, i) => <div key={i} className="text-sm py-1.5 border-b border-gray-50">
          <div><span className="text-green-600 font-medium">{cr.doc_code_source}{cr.section_source ? '\u00a7'+cr.section_source : ''}</span> : {cr.pour_concept}</div>
          {cr.justification && <div className="text-xs text-gray-400 mt-0.5 leading-relaxed">{cr.justification}</div>}
        </div>)}
      </div>}
    </div>}
  </div>;
}

        </div>
        <div className="flex-1">
          <div className="font-semibold text-gray-800">{c.label}</div>
          <div className="text-sm text-gray-500">{c.sous_label}</div>
        </div>
        <span className={`text-lg text-gray-400 leading-none transition-transform ${expanded === i ? 'rotate-45' : ''}`}>+</span>
      </div>
      {expanded === i && <div className="mt-4 space-y-3">
        <p className="text-sm text-gray-600">{c.logique}</p>
        {Array.isArray(c.indicateurs_cles) && c.indicateurs_cles.length > 0 && <div>
          <div className="text-xs font-semibold text-gray-500 uppercase mb-1">Indicateurs</div>
          <div className="flex flex-wrap gap-1">{c.indicateurs_cles.map((ind, j) =>
            <span key={j} className="text-xs bg-blue-50 text-blue-700 rounded-full px-2 py-0.5">{typeof ind === 'string' ? ind : JSON.stringify(ind)}</span>
          )}</div>
        </div>}
        {Array.isArray(c.seuils_critiques) && c.seuils_critiques.length > 0 && <div>
          <div className="text-xs font-semibold text-gray-500 uppercase mb-1">Seuils critiques</div>
          <div className="space-y-1">{c.seuils_critiques.map((s, j) => {
            if (typeof s === 'object' && s !== null) {
              return <div key={j} className="text-sm"><span className="font-medium">{s.indicateur}</span> {s.seuil} — <span className="text-gray-500">{s.interpretation}</span></div>;
            }
            return <div key={j} className="text-sm">{JSON.stringify(s)}</div>;
          })}</div>
        </div>}
        {Array.isArray(c.leviers_action) && c.leviers_action.length > 0 && <div>
          <div className="text-xs font-semibold text-gray-500 uppercase mb-1">Leviers</div>
          <ul className="text-sm text-gray-600 space-y-0.5">{c.leviers_action.map((l, j) =>
            <li key={j} className="flex items-start gap-1"><span className="text-green-500 mt-0.5">+</span> {typeof l === 'string' ? l : JSON.stringify(l)}</li>
          )}</ul>
        </div>}
        {Array.isArray(c.erreurs_typiques) && c.erreurs_typiques.length > 0 && <div>
          <div className="text-xs font-semibold text-gray-500 uppercase mb-1">Erreurs typiques</div>
          <ul className="text-sm text-red-600 space-y-0.5">{c.erreurs_typiques.map((e, j) =>
            <li key={j} className="flex items-start gap-1"><span className="mt-0.5">!</span> {typeof e === 'string' ? e : JSON.stringify(e)}</li>
          )}</ul>
        </div>}

        {/* Entités liées */}
        {(c.card_ids?.length > 0 || c.rule_ids?.length > 0 || c.test_ids?.length > 0 || c.term_codes?.length > 0) && <div className="pt-2 border-t border-gray-100 mt-2">
          <div className="text-xs font-semibold text-gray-500 uppercase mb-1.5">Entites liees</div>
          <div className="flex flex-wrap gap-1.5">
            {Array.isArray(c.card_ids) && c.card_ids.map((cid, j) => {
              const card = (DATA.cards || []).find(x => x.id === cid);
              return <span key={'c'+j} className="text-xs bg-indigo-50 text-indigo-700 rounded-full px-2 py-0.5" title={card ? card.description?.slice(0,100) : ''}>
                {card ? card.title.slice(0, 40) : 'Card #'+cid}
              </span>;
            })}
            {Array.isArray(c.rule_ids) && c.rule_ids.map((rid, j) => {
              const rule = (DATA.rules || []).find(x => x.id === rid);
              return <span key={'r'+j} className="text-xs bg-amber-50 text-amber-700 rounded-full px-2 py-0.5" title={rule ? rule.condition_text : ''}>
                {rule ? rule.rule_name : 'Rule #'+rid}
              </span>;
            })}
            {Array.isArray(c.test_ids) && c.test_ids.map((tid, j) => {
              const test = (DATA.tests || []).find(x => x.code === 'T'+tid || x.code === tid);
              return <span key={'t'+j} className="text-xs bg-emerald-50 text-emerald-700 rounded-full px-2 py-0.5">
                {test ? test.title.slice(0, 40) : 'Test #'+tid}
              </span>;
            })}
            {Array.isArray(c.term_codes) && c.term_codes.map((tc, j) =>
              <span key={'tc'+j} className="text-xs bg-blue-50 text-blue-700 rounded-full px-2 py-0.5">{tc}</span>
            )}
          </div>
          {Array.isArray(c.docs_codes) && c.docs_codes.length > 0 && <div className="flex gap-1 mt-1.5">
            {c.docs_codes.map((dc, j) => <Badge key={j} strate={dc[0]} small />)}
          </div>}
        </div>}
      </div>}
      {i < DATA.cascade.length - 1 && <div className="flex justify-center my-1 text-gray-300 text-2xl">|</div>}
    </div>)}
  </div>;
}

// ── CONCEPT CARDS ──
function ConceptCardsTab() {
  const [filter, setFilter] = React.useState('all');
  const [expandedId, setExpandedId] = React.useState(null);
  const categories = [...new Set(DATA.cards.map(c => c.category).filter(Boolean))].sort();
  const filtered = filter === 'all' ? DATA.cards : DATA.cards.filter(c => c.category === filter);
  const rules = DATA.rules || [];

  // Find diagnostic rules linked to a card via shared docs_codes
  function linkedRules(card) {
    const cardDocs = Array.isArray(card.docs_codes) ? card.docs_codes : [];
    if (!cardDocs.length) return [];
    return rules.filter(r => {
      const ruleDocs = Array.isArray(r.docs_codes) ? r.docs_codes : [];
      return ruleDocs.some(d => cardDocs.includes(d));
    });
  }

  const CAT_ICONS = DATA.cat_icons || Object.fromEntries(categories.map(c => [c, c.charAt(0).toUpperCase()]));
  const CAT_COLORS_DEFAULT = ['bg-indigo-100 text-indigo-700', 'bg-orange-100 text-orange-700', 'bg-red-100 text-red-700', 'bg-emerald-100 text-emerald-700', 'bg-purple-100 text-purple-700', 'bg-lime-100 text-lime-700', 'bg-cyan-100 text-cyan-700', 'bg-pink-100 text-pink-700'];
  const CAT_BG = DATA.cat_bg || Object.fromEntries(categories.map((c, i) => [c, CAT_COLORS_DEFAULT[i % CAT_COLORS_DEFAULT.length]]));

  return <div>
    <p className="text-sm text-gray-500 mb-4">{DATA.cards.length} fiches synthétiques : mécanismes, profils de sol, symptômes et cadres conceptuels. Briques élémentaires pour le diagnostic (P1) et les prompts d'analyse. Cliquez sur une fiche pour voir le détail complet.</p>
    <div className="flex gap-2 mb-4 flex-wrap">
      <button onClick={() => setFilter('all')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'all' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700'}`}>
        Toutes ({DATA.cards.length})
      </button>
      {categories.map(cat => <button key={cat} onClick={() => setFilter(cat)}
        className={`px-3 py-1 rounded-lg text-sm ${filter === cat ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700'}`}>
        {cat} ({DATA.cards.filter(c => c.category === cat).length})
      </button>)}
    </div>
    <div className="space-y-2">
      {filtered.map(c => {
        const isExpanded = expandedId === c.id;
        const needsTruncate = c.description && c.description.length > 200;
        const cardRules = linkedRules(c);
        return <div key={c.id} className="card cursor-pointer hover:shadow-sm transition-shadow"
          onClick={() => setExpandedId(isExpanded ? null : c.id)}>
          <div className="flex justify-between items-start">
            <div className="flex-1 min-w-0">
              <span className="font-semibold text-gray-800">{c.title}</span>
              <span className={`ml-2 text-xs rounded-full px-2 py-0.5 ${c.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}`}>{c.status}</span>
              {c.adapted === 1 && <span className="ml-1 text-xs rounded-full px-2 py-0.5 bg-blue-100 text-blue-700">adapté</span>}
              {c.scope_type && <span className="ml-1 text-xs text-gray-400">{c.scope_type}</span>}
            </div>
            <div className="flex gap-1 ml-2 flex-shrink-0">
              {(Array.isArray(c.docs_codes) ? c.docs_codes : []).map((dc, i) => <Badge key={i} strate={dc[0]} small />)}
            </div>
          </div>

          {/* Description : tronquée ou complète */}
          {c.description && <p className="text-sm text-gray-600 mt-2 leading-relaxed whitespace-pre-line">
            {isExpanded || !needsTruncate ? c.description : c.description.slice(0, 200) + '...'}
            {!isExpanded && needsTruncate && <span className="text-blue-500 text-xs ml-1">Voir plus</span>}
          </p>}

          {/* Panneau étendu */}
          {isExpanded && <div className="mt-3 pt-3 border-t border-gray-100 space-y-3">

            {/* Notes internes */}
            {c.notes && <div className="text-xs text-gray-400 italic bg-gray-50 rounded px-3 py-2">{c.notes}</div>}

            {/* Source */}
            {c.source && <div className="text-xs text-gray-400">Source : {c.source}</div>}

            {/* Diagnostic rules liées */}
            {cardRules.length > 0 && <div>
              <div className="text-xs text-gray-400 uppercase tracking-wider mb-1.5">Regles diagnostiques liees ({cardRules.length})</div>
              <div className="space-y-1.5">
                {cardRules.map(r => {
                  const ruleTerms = (DATA.rule_terms || []).filter(rt => rt.rule_id === r.id);
                  return <div key={r.id} className="text-xs bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
                    <div className="font-medium text-amber-800">{r.rule_name}</div>
                    <div className="text-amber-700 mt-0.5"><span className="text-amber-400">Si</span> {r.condition_text}</div>
                    <div className="text-amber-700"><span className="text-amber-400">Alors</span> {r.action_text}</div>
                    {r.expected_effect && <div className="text-amber-600 mt-0.5">{r.expected_effect}</div>}
                    {ruleTerms.length > 0 && <div className="flex flex-wrap gap-1 mt-1">{ruleTerms.map((rt, j) =>
                      <span key={j} className="bg-amber-100 text-amber-800 rounded-full px-1.5 py-0.5">{rt.term_fr}</span>
                    )}</div>}
                    <div className="text-amber-400 mt-0.5">Confiance : {Math.round((r.confidence || 0) * 100)}% · {r.source}</div>
                  </div>;
                })}
              </div>
            </div>}

            {/* Tests terrain liés */}
            {(() => {
              const cardTests = (DATA.card_tests || []).filter(ct => ct.card_id === c.id);
              if (!cardTests.length) return null;
              return <div>
                <div className="text-xs text-gray-400 uppercase tracking-wider mb-1.5">Tests terrain lies ({cardTests.length})</div>
                <div className="space-y-1">
                  {cardTests.map((ct, j) => {
                    const test = (DATA.tests || []).find(t => t.code === 'T' + ct.test_id);
                    return <div key={j} className="text-xs bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2">
                      <span className="font-medium text-emerald-800">{test ? test.title : 'Test #' + ct.test_id}</span>
                      {test && test.description && <div className="text-emerald-700 mt-0.5">{test.description.slice(0, 150)}</div>}
                      <div className="text-emerald-400 mt-0.5">Pertinence : {Math.round((ct.relevance || 0) * 100)}% · {ct.usage}</div>
                    </div>;
                  })}
                </div>
              </div>;
            })()}
          </div>}
        </div>;
      })}
    </div>
  </div>;
}

// ── CONNEXIONS INTER-STRATES ──
function ConnectionsTab() {
  const [filter, setFilter] = React.useState('all');
  const importances = [...new Set(DATA.connections.map(c => c.importance).filter(Boolean))];
  const IMP_COLORS_DEFAULT = ['bg-red-100 text-red-700 border-red-200', 'bg-amber-100 text-amber-700 border-amber-200', 'bg-blue-100 text-blue-700 border-blue-200', 'bg-green-100 text-green-700 border-green-200', 'bg-purple-100 text-purple-700 border-purple-200'];
  const IMP_COLORS = DATA.imp_colors || Object.fromEntries(importances.map((imp, i) => [imp, IMP_COLORS_DEFAULT[i % IMP_COLORS_DEFAULT.length]]));
  const filtered = filter === 'all' ? DATA.connections : DATA.connections.filter(c => c.importance === filter);

  // Group by strate pair
  const pairs = {};
  filtered.forEach(c => {
    const key = c.strate_source + '-' + c.strate_cible;
    if (!pairs[key]) pairs[key] = [];
    pairs[key].push(c);
  });

  return <div>
    <p className="text-sm text-gray-500 mb-3">{DATA.connections.length} connexions semantiques entre strates — flux de concepts qui traversent le corpus. Chaque connexion identifie un pont conceptuel entre deux documents de strates differentes.</p>
    <div className="flex gap-2 mb-4 flex-wrap">
      <button onClick={() => setFilter('all')} className={`px-3 py-1 rounded-lg text-sm ${filter === 'all' ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-700'}`}>
        Toutes ({DATA.connections.length})
      </button>
      {importances.map(imp => {
        const n = DATA.connections.filter(c => c.importance === imp).length;
        return <button key={imp} onClick={() => setFilter(filter === imp ? 'all' : imp)}
          className={`px-3 py-1 rounded-lg text-sm ${filter === imp ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-700'}`}>
          {imp} ({n})
        </button>;
      })}
    </div>

    {Object.entries(pairs).sort((a,b) => b[1].length - a[1].length).map(([key, conns]) => {
      const [src, dst] = key.split('-');
      return <div key={key} className="mb-4">
        <div className="flex items-center gap-2 mb-2">
          <Badge strate={src} small /><span className="text-gray-400 text-lg">&rarr;</span><Badge strate={dst} small />
          <span className="text-xs text-gray-400">{conns.length} connexion{conns.length > 1 ? 's' : ''}</span>
        </div>
        <div className="space-y-2 ml-2">
          {conns.map((c, i) => <div key={i} className={`border rounded-lg p-3 ${IMP_COLORS[c.importance] || 'border-gray-200'}`}>
            <div className="flex justify-between items-start mb-1">
              <span className="font-medium text-sm">{c.terme_source}</span>
              <span className={`text-xs rounded-full px-2 py-0.5 ${IMP_COLORS[c.importance] || 'bg-gray-100'}`}>{c.importance}</span>
            </div>
            <p className="text-sm leading-relaxed opacity-80">{c.connexion}</p>
            <div className="text-xs opacity-60 mt-1.5 flex gap-3">
              <span>De : {c.doc_source?.split(' ')[0]}</span>
              <span>Vers : {c.doc_cible?.split(' ')[0]}</span>
              {c.is_documented ? <span className="text-green-600">Documente</span> : <span className="text-orange-500">Non documente</span>}
            </div>
          </div>)}
        </div>
      </div>;
    })}
  </div>;
}

// ── ILLUSTRATIONS ──
function IllustrationsTab() {
  const [expanded, setExpanded] = React.useState(null);
  return <div>
    <p className="text-sm text-gray-500 mb-4">{DATA.illustrations.length} diagrammes conceptuels generes depuis le corpus. Chaque illustration synthetise un mecanisme cle sous forme visuelle (Mermaid).</p>
    <div className="space-y-3">
      {DATA.illustrations.map((ill, i) => <div key={i} className="card">
        <div className="flex justify-between items-start cursor-pointer" onClick={() => setExpanded(expanded === i ? null : i)}>
          <div className="flex-1">
            <div className="font-semibold text-gray-800">{ill.concept}</div>
            <div className="flex gap-1 mt-1">
              {(Array.isArray(ill.docs_codes) ? ill.docs_codes : []).map((dc, j) => <Badge key={j} strate={dc[0]} small />)}
              <span className={`text-xs rounded-full px-2 py-0.5 ml-1 ${ill.statut === 'produit' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}`}>{ill.statut}</span>
            </div>
          </div>
          <span className={`text-lg text-gray-400 leading-none transition-transform ${expanded === i ? 'rotate-45' : ''}`}>+</span>
        </div>
        {expanded === i && <div className="mt-3 pt-3 border-t border-gray-100 space-y-3">
          {ill.mermaid && <div>
            <div className="text-xs text-gray-400 uppercase tracking-wider mb-1">Code Mermaid</div>
            <pre className="text-xs bg-gray-900 text-green-300 rounded-lg p-3 overflow-x-auto whitespace-pre leading-relaxed" style={{maxHeight: '400px', overflowY: 'auto'}}>{ill.mermaid}</pre>
          </div>}
          {ill.sources && <div>
            <div className="text-xs text-gray-400 uppercase tracking-wider mb-1">Sources</div>
            <div className="text-sm text-gray-600">{ill.sources}</div>
          </div>}
          {ill.notes && <div className="text-xs text-gray-400 italic">{ill.notes}</div>}
        </div>}
      </div>)}
    </div>
  </div>;
}

// ── TECHNIQUE (optionnel) ──
function TechniqueTab() {
  if (!DATA.scripts) return <p className="text-gray-500">Partie technique non incluse. Relancer avec --technique.</p>;
  return <div>
    <h3 className="text-lg font-semibold mb-3">Scripts ({DATA.scripts.length})</h3>
    <div className="space-y-1 mb-6">
      {DATA.scripts.map((s, i) => <div key={i} className="flex justify-between items-center py-1.5 border-b border-gray-50">
        <div><span className="text-gray-400 text-sm">{s.folder}</span><span className="font-medium">{s.nom}</span></div>
        <div className="flex gap-3 items-center">
          <span className="text-xs bg-blue-50 text-blue-700 rounded px-2 py-0.5">v{s.version}</span>
        </div>
      </div>)}
    </div>
    <h3 className="text-lg font-semibold mb-3">Tables ({DATA.tables.length})</h3>
    <div className="grid grid-cols-2 md:grid-cols-3 gap-1">
      {DATA.tables.map((t, i) => <div key={i} className="text-sm flex justify-between py-1 px-2 bg-gray-50 rounded">
        <span>{t.name}</span>
        <span className="text-gray-400">{t.rows}</span>
      </div>)}
    </div>
  </div>;
}

// ── APP ──
function App() {
  const baseTabs = [
    {id: 'documents', label: 'Documents'},
    {id: 'chaines', label: 'Chaines Causales'},
    {id: 'thesaurus', label: 'Thesaurus'},
    {id: 'crossrefs', label: 'Cross-refs'},
    {id: 'cascade', label: `Cascade N0-N${DATA.cascade.length - 1}`},
    {id: 'cards', label: 'Concept Cards'},
    {id: 'connections', label: `Flux (${DATA.connections.length})`},
    {id: 'illustrations', label: `Illustrations (${DATA.illustrations.length})`},
  ];
  if (HAS_TECHNIQUE) baseTabs.push({id: 'technique', label: 'Infrastructure'});
  const [tab, setTab] = React.useState('documents');

  return <div className="max-w-5xl mx-auto px-4 pb-12">
    <Header />
    <div className="flex gap-1 border-b border-gray-200 mb-6 overflow-x-auto">
      {baseTabs.map(t => <button key={t.id} onClick={() => setTab(t.id)}
        className={`px-4 py-2.5 text-sm whitespace-nowrap transition ${tab === t.id ? 'tab-active' : 'text-gray-500 hover:text-gray-700'}`}>
        {t.label}
      </button>)}
    </div>
    <div>
      {tab === 'documents' && <DocumentsTab />}
      {tab === 'chaines' && <ChainesTab />}
      {tab === 'thesaurus' && <ThesaurusTab />}
      {tab === 'crossrefs' && <CrossRefsTab />}
      {tab === 'cascade' && <CascadeTab />}
      {tab === 'cards' && <ConceptCardsTab />}
      {tab === 'connections' && <ConnectionsTab />}
      {tab === 'illustrations' && <IllustrationsTab />}
      {tab === 'technique' && <TechniqueTab />}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);


</script>

</body>
</html>
