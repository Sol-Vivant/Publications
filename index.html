l'ISR est induite par les bactéries bénéfiques (voie jasmonate/éthylène), la SAR par les pathogènes (voie salicylique). Les deux voies sont complémentaires mais partiellement antagonistes (trade-off jasmonate/salicylique).\n→ L'ISR comme alternative fonctionnelle aux fongicides : un sol riche en PGPR déclencheurs d'ISR réduit les maladies fongiques de 40-70% (méta-analyses). Moins de fongicides = moins de pression de sélection sur les résistances.", "contexte_sci": "Deux voies de résistance systémique : ISR (induite par les microbes bénéfiques, voie jasmonate/éthylène) et SAR (induite par les pathogènes, voie salicylique). Les deux confèrent une protection systémique à toute la plante. Lien avec la santé humaine (les polyphénols produits par ISR/SAR sont des nutriments protecteurs pour l'humain).", "instructions": "Distinguer ISR et SAR : déclencheurs, voies de signalisation, effets. Relier à la réduction des intrants phytosanitaires. Termes : ISR, SAR, élicitation par les débris microbiens.", "style": "scientifique dense"}, {"type": "section", "chapitre": 4, "section": 2, "titre_h1": null, "titre_h2": "4.2 Communication inter-règnes : miARN, volatils et signaux", "titre_h3": null, "tableau": 0, "enrichissement": "→ La communication inter-règnes : (1) miARN végétaux ingérés par les bactéries → modifient l'expression génique bactérienne (2) volatils bactériens perçus par la plante → modifient la croissance et la défense (3) quorum sensing bactérien → coordonne les biofilms.\n→ Le quorum sensing = les bactéries « comptent leurs effectifs » via des molécules signal (AHL). Quand la densité critique est atteinte, elles basculent en mode biofilm. La plante peut BROUILLER ces signaux (mimicry des AHL) pour empêcher les pathogènes de former des biofilms.\n→ Les composés organiques volatils (COV) bactériens (2,3-butanediol, acétoïne) traversent le sol gazeux et stimulent la croissance des plantes à distance. La communication sol-plante n'est pas que liquide — elle est aussi gazeuse.", "contexte_sci": "La communication inter-règnes utilise des signaux chimiques diversifiés : miARN, composés organiques volatils, métabolites fermentaires. Le quorum sensing bactérien est intercepté par les plantes.", "instructions": "Explorer les modes de communication : volatils, signaux hormonaux, ARN. Termes : détection du quorum, LCO/facteurs Myc, strigolactones.", "style": "scientifique dense"}, {"type": "section", "chapitre": 5, "section": 1, "titre_h1": "V. Trophobiose", "titre_h2": "5.1 La trophobiose : plante saine sur sol vivant", "titre_h3": null, "tableau": 0, "enrichissement": "→ La trophobiose (Chaboussou 1985) : une plante sur sol sain produit des protéines complètes (sève pauvre en acides aminés libres = peu attractive pour les ravageurs). Une plante sur sol dégradé accumule des acides aminés libres = festin pour pucerons et champignons.\n→ La trophobiose est le MÉCANISME qui explique pourquoi l'agriculture régénérative réduit les problèmes phytosanitaires : sol riche en PGPR → ISR activée → protéines complètes → moins de ravageurs → moins de pesticides.\n→ L'azote de synthèse (urée, ammonitrate) crée un excès d'acides aminés libres dans la sève = appel à ravageurs. L'azote biologique (fixation rhizobienne, minéralisation contrôlée) est métabolisé progressivement = protéines complètes. Le MODE d'apport d'azote change tout.", "contexte_sci": "La loi de la trophobiose (Chaboussou) : une plante correctement nourrie par un sol vivant résiste naturellement aux ravageurs et maladies. L'excès d'azote soluble et les carences en oligo-éléments fragilisent la plante.", "instructions": "Expliquer la trophobiose : plante équilibrée = protéinogenèse complète = pas de substrat pour les ravageurs. Relier au sol vivant comme source de nutrition équilibrée. Termes : loi de la trophobiose.", "style": "scientifique synthétique"}, {"type": "conclusion", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": null, "contexte_sci": "Ce document couvre 8 sections organisées autour de 5 chapitres : I. Communication plante-microbiome, II. Hormones et signaux, III. Rhizophagie, IV. ISR et SAR et 1 autres. La conclusion doit synthétiser les mécanismes clés et ouvrir sur les perspectives pratiques ou scientifiques.", "instructions": "La plante ne vit pas seule. Synthétiser : les exsudats recrutent, les hormones stimulent, la rhizophagie nourrit, l'ISR/SAR protège, la trophobiose ferme la boucle. L'holobionte est plus résilient que la plante isolée.", "style": "narratif synthétique"}], "n_terms": 38}, {"code": "V3", "titre": "Les Fermentations Microbiennes", "strate": "V", "note": "Absorbe Stratégies Microbiennes (bio). Thermodynamique ΔG, bokashi, lactofermentation, LAB, acide 3-phényllactique, succession microbienne, KNF.", "titre_jenni": "Les Fermentations Microbiennes — Thermodynamique et applications", "style": "scientifique accessible", "statut_redaction": "a_faire", "priorite": 12, "angle_entree": "La fermentation n'est pas une technique — c'est le métabolisme primitif de la vie. Elle structure le sol depuis 3,8 Ga.", "public_cible": "agronome praticien, grand public", "sources_core": null, "notes_jenni": "Lactofermentation, bokashi, successions microbiennes. Lien F1 (évolution) et P3 (pratiques).", "sections": [{"type": "intro", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": "→ Le lacto-fermenté n'est pas un amendement — c'est une BOMBE BIOLOGIQUE à 6 effets simultanés : (1) réimplantation microbiome fonctionnel (2) choc redox descendant (-170 mV) (3) solubilisation Fe²⁺, Mn²⁺, P (4) métabolites anti-stress (vitamines B, GABA, polyphénols) (5) bascule S→A→Y (6) formation biofilms sur argile.\n→ L'inversion acide/réduit : en chimie classique, acidifier = oxyder. Les bactéries lactiques font l'INVERSE (pH 3.5 ET Eh -170 mV). Impossible sans biologie.\n→ Lacto-fermentés = reproduction contrôlée des conditions anaérobies primitives (4 Ga). Même métabolisme, même Eh, même logique.\n→ Sols méditerranéens bio à 500-620 mV (oxydés). Correction mesurable à 40 cm, 1 mois après application.", "contexte_sci": "La fermentation n'est pas une technique — c'est le métabolisme primitif de la vie. Elle structure le sol depuis 3,8 Ga. Il mobilise 20 termes canoniques et 7 connexions vers d'autres documents du corpus.", "instructions": "Présenter les fermentations comme le pont entre le sol et l'alimentation humaine. Les mêmes guildes microbiennes qui fonctionnent dans le sol sont domestiquées dans les fermentations agricoles et alimentaires. Lien évolutif avec le temps long (continuité anaérobiose archéenne → fermentations modernes). Annoncer : thermodynamique, bokashi, EM, KNF/LiFoFer, lactofermentation.", "style": "scientifique accessible"}, {"type": "section", "chapitre": 1, "section": 1, "titre_h1": "I. Fermentation vs aérobiose", "titre_h2": "1.1 Thermodynamique comparée : fermentation vs compostage aérobie", "titre_h3": null, "tableau": 1, "enrichissement": "→ Thermodynamique comparée : fermentation lactique ΔG = -196 kJ/mol glucose, conservation C/N = 93%. Compostage aérobie : ΔG = -2870 kJ/mol, conservation C/N = 30-40%. La fermentation conserve 3× plus de carbone et d'énergie par unité de substrat.\n→ Le compostage DISSIPE l'énergie en chaleur (60-70°C). La fermentation la CONSERVE dans les liaisons chimiques des métabolites (lactate, acétate, éthanol). C'est le même substrat, deux destins énergétiques opposés.\n→ EROI (Energy Return On Investment) : fermentation à la ferme = ∞ (aucune énergie fossile requise). Compostage industriel = 3-5:1 (retournement, transport). L'argument thermodynamique est imparable.", "contexte_sci": "La fermentation (anaérobie) et le compostage (aérobie) sont deux voies de transformation de la MO aux bilans énergétiques opposés. La fermentation conserve l'énergie chimique dans les métabolites, le compostage la dissipe en chaleur. Lien avec les grands cycles (fondement physico-chimique de la conservation énergétique).", "instructions": "Comparer thermodynamique fermentation vs compostage : rendement énergétique, bilan redox, produits finaux. Termes : potentiel redox (Eh).", "style": "scientifique dense"}, {"type": "section", "chapitre": 1, "section": 2, "titre_h1": null, "titre_h2": "1.2 Successions microbiennes dans la fermentation", "titre_h3": null, "tableau": 0, "enrichissement": "→ Succession en fermentation lactique : (1) Leuconostoc (hétérofermentatif, pH 6→4.5, 0-48h) (2) Lactobacillus plantarum (homofermentatif, pH 4.5→3.5, 2-14j) (3) Pediococcus (stabilisation, pH 3.5). La succession est PILOTÉE par le pH — chaque espèce crée les conditions de la suivante.\n→ En fermentation longue (>30j), apparition de Acetobacter (si O₂) et de levures (tolérance acide). Le contrôle de l'anaérobiose est CRITIQUE : une fermentation qui prend l'air bascule en vinaigre (Acetobacter) ou en putréfaction (Clostridium).\n→ La succession fermentaire MIME la succession du sol : pionniers rapides (copiotrophes) → spécialistes lents (oligotrophes) → équilibre stable. Le bokashi en 2-4 semaines = le sol en 2-5 ans.", "contexte_sci": "Les successions microbiennes dans une fermentation lactique suivent une séquence prévisible : levures → lactobacilles → acétobacters. Le pH chute, le milieu se stabilise. Les mêmes successions se produisent dans le sol.", "instructions": "Décrire la chronologie microbienne d'une fermentation. Relier aux successions du sol. Termes : acide lactique, fermentations anaérobies.", "style": "scientifique dense"}, {"type": "section", "chapitre": 2, "section": 1, "titre_h1": "II. Bokashi", "titre_h2": "2.1 Composition et fabrication du bokashi", "titre_h3": null, "tableau": 1, "enrichissement": "→ Le bokashi = substrat carboné (son de riz/blé) + EM (consortium LAB + levures + PNSB) + mélasse + eau, fermenté en anaérobiose 2-4 semaines. Le produit final : pH 3.5-4.0, odeur vinaigrée, C/N 15-20.\n→ 6 effets simultanés du bokashi : (1) apport MO fermentée (C labile + C stable) (2) inoculation microbienne (LAB, Bacillus, levures) (3) choc redox descendant (-170 mV → correction du Eh) (4) métabolites actifs (GABA, vitamines B) (5) solubilisation minérale (Fe²⁺, Mn²⁺, P) (6) biofilms sur argile.\n→ Sur sol dégradé (Zone 4, C/Argile < 1/13) : bokashi INCORPORÉ. Contact MO-argile + inoculation + correction redox. Sur sol biologiquement actif (Zone 1-2) : bokashi EN SURFACE seulement — le sol a ses propres acteurs.", "contexte_sci": "Le bokashi est une fermentation anaérobie de matière organique inoculée (son de blé + EM + mélasse). Il produit un amendement riche en métabolites et en micro-organismes vivants. Lien avec les grands cycles (risque d'effet d'amorçage par le carbone labile du bokashi).", "instructions": "Composition, fabrication, paramètres critiques (humidité, anaérobiose, température). Termes : bokashi, fermentations anaérobies.", "style": "opérationnel pratique"}, {"type": "section", "chapitre": 2, "section": 2, "titre_h1": null, "titre_h2": "2.2 Les PNSB : bactéries photosynthétiques non soufrées", "titre_h3": null, "tableau": 0, "enrichissement": "→ Les PNSB (Rhodopseudomonas, Rhodospirillum) sont les bactéries les plus POLYVALENTES du sol : photosynthèse anoxygénique, fixation N, production H₂, dégradation de composés aromatiques. Elles fonctionnent en anaérobiose à la lumière.\n→ Dans le bokashi, les PNSB convertissent les acides organiques (succinate, malate) en biomasse cellulaire riche en caroténoïdes, coenzyme Q10, et vitamines B. Elles transforment les « déchets » de la fermentation en biomolécules de haute valeur.\n→ Les PNSB sont présentes naturellement dans les rizières inondées (1 million de cellules/mL). Elles contribuent à 20-30% de la fixation N dans les systèmes rizicoles sans engrais. C'est un service écosystémique gratuit depuis 3 Ga.", "contexte_sci": "Les PNSB (bactéries photosynthétiques non soufrées) sont un groupe fonctionnel unique : elles fixent l'azote, produisent des vitamines, et métabolisent les composés soufrés malodorants. Elles sont au cœur du bokashi et des EM.", "instructions": "Écologie et métabolisme des PNSB. Leur rôle dans les fermentations et dans le sol. Termes : PNSB.", "style": "scientifique dense"}, {"type": "section", "chapitre": 3, "section": 1, "titre_h1": "III. EM et dérivés", "titre_h2": "3.1 EM : origine, composition et philosophie", "titre_h3": null, "tableau": 0, "enrichissement": "→ Les EM (Effective Microorganisms, Higa 1982) : consortium de ~80 espèces dominé par LAB (Lactobacillus), levures (Saccharomyces), PNSB (Rhodopseudomonas). Le principe : reproduire le consortium du sol sain dans un liquide concentré.\n→ Philosophie EM : le sol sain est DOMINÉ par les micro-organismes « positifs » (fermentatifs, constructeurs) vs « négatifs » (putréfacteurs, pathogènes). Les EM basculent l'équilibre vers le positif par compétition et modification du milieu (pH, Eh).\n→ Limite scientifique : les résultats des EM varient considérablement selon le sol, le climat, et le mode d'application. Les méta-analyses montrent un effet positif significatif sur sol dégradé et un effet faible à nul sur sol déjà fertile.", "contexte_sci": "Les EM (Effective Microorganisms / micro-organismes efficaces) sont un consortium standardisé créé par le Pr Higa : lactobacilles, levures, PNSB, actinomycètes. La philosophie : coexistence et non compétition.", "instructions": "Origine (Higa, Okinawa), composition, philosophie. Distinguer EM authentiques et dérivés locaux. Termes : micro-organismes efficaces (EM).", "style": "scientifique synthétique"}, {"type": "section", "chapitre": 3, "section": 2, "titre_h1": null, "titre_h2": "3.2 Applications des EM en agriculture : données probantes", "titre_h3": null, "tableau": 0, "enrichissement": "→ Les données probantes : 3 méta-analyses (Mayer 2010, Olle 2013, Shin 2017) montrent un effet moyen de +15-25% sur la biomasse végétale, +10-20% sur le rendement. Effet maximal sur sol pauvre, effet minimal sur sol riche.\n→ Le mécanisme principal n'est PAS l'inoculation directe (les souches EM survivent rarement > 2 semaines dans le sol). C'est la STIMULATION du microbiome indigène par les métabolites fermentaires (lactate, acétate, vitamines B, GABA).\n→ Les EM fonctionnent mieux EN COMBINAISON : EM + mulch > EM seul. EM + bokashi > EM + compost. EM + non-labour > EM + labour. L'efficacité dépend du contexte agronomique global, pas du produit seul.", "contexte_sci": "Les données probantes sur les EM en agriculture : effets sur la suppressivité, la décomposition de la MO, la croissance des plantes. Résultats variables selon les conditions.", "instructions": "Revue des études : effets positifs documentés, conditions de succès, limites. Évaluation critique et honnête. Termes : micro-organismes efficaces (EM), suppressivité.", "style": "scientifique dense"}, {"type": "section", "chapitre": 4, "section": 1, "titre_h1": "IV. KNF et dérivés", "titre_h2": "4.1 Korean Natural Farming et IMO", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le KNF (Korean Natural Farming, Cho Han-kyu) repose sur 5 piliers : LAB (bactéries lactiques), FPJ (extraction osmotique de pousses végétatives), FAA (hydrolyse enzymatique de poisson), OHN (extraction alcoolique d'herbes médicinales), WCA (calcium soluble). Les IMO (Indigenous Micro-Organisms) sont le complément d'inoculation.\n→ Distinction CRITIQUE : le FPJ et le FFJ sont des fermentations (sucre + végétal + microbes endogènes → LAB → métabolites). Le FAA est une décomposition ENZYMATIQUE : 1:1 poisson/sucre de canne, SANS eau — la pression osmotique met les bactéries en dormance et ce sont les protéases endogènes du poisson qui hydrolysent les protéines en acides aminés. Deux mécanismes distincts.\n→ Limite scientifique (Thompson et al. 2025) : le processus IMO sélectionne un nombre limité de taxons et RÉDUIT la diversité fongique, contrairement à l'objectif affiché. La diversité bactérienne est mieux préservée. L'efficacité dépend fortement du site de collecte (forêt locale vs importée).", "contexte_sci": "Le Korean Natural Farming (KNF) utilise les micro-organismes indigènes (IMO) collectés localement. Le LiFoFer (litière forestière fermentée) est l'adaptation française. Principe : inoculer avec la biodiversité locale plutôt qu'avec un consortium standardisé.", "instructions": "Décrire la collecte d'IMO et la fabrication du LiFoFer. Comparer avec les EM (indigène vs standardisé). Termes : Korean Natural Farming (KNF), inoculum microbien indigène (IMO/LiFoFer), LiFoFer.", "style": "scientifique pratique"}, {"type": "section", "chapitre": 4, "section": 2, "titre_h1": null, "titre_h2": "4.2 LiFoFer : la litière forestière fermentée", "titre_h3": null, "tableau": 0, "enrichissement": "→ Le LiFoFer (Litière Forestière Fermentée) = litière de sous-bois + mélasse + eau, fermentée en anaérobiose 3-4 semaines. On capture les champignons forestiers (saprotrophes, ECM, Trichoderma) et on les reproduit en milieu liquide.\n→ Le LiFoFer est plus DIVERSIFIÉ que les EM commerciaux : il contient 200-500 espèces fongiques + 5000-10000 espèces bactériennes du sol forestier local, adaptées au climat et aux pathogènes locaux.\n→ Application : dilution 1/100 à 1/500, arrosage ou pulvérisation foliaire. Le LiFoFer inocule le sol en micro-organismes forestiers qui relancent la succession écologique vers un état plus mature (ratio F/B ↑).", "contexte_sci": "Le LiFoFer est la litière forestière fermentée : collecte de litière sous couvert forestier mature, fermentation anaérobie, activation. C'est l'inoculum le plus diversifié et le plus adapté au terroir.", "instructions": "Protocole de fabrication détaillé. Pourquoi la litière forestière contient la diversité maximale. Termes : LiFoFer, inoculum microbien indigène (IMO/LiFoFer).", "style": "scientifique pratique"}, {"type": "section", "chapitre": 5, "section": 1, "titre_h1": "V. Lactofermentation", "titre_h2": "5.1 La lactofermentation : du sol à l'assiette", "titre_h3": null, "tableau": 0, "enrichissement": "→ La lactofermentation aliment (choucroute, kimchi, kéfir) et la lactofermentation sol (bokashi, EM) utilisent les MÊMES organismes (Lactobacillus plantarum, L. brevis, levures) et les MÊMES voies métaboliques. La fermentation est universelle.\n→ Les aliments fermentés sont des vecteurs de transmission directe des consortia microbiens fonctionnels vers l'intestin humain. Un kéfir contient 10⁹-10¹⁰ bactéries/mL — c'est un inoculant intestinal, pas un aliment ordinaire.\n→ La boucle sol → fermentation → alimentation → microbiome intestinal → santé est le fil rouge qui relie l'agriculture régénérative à la santé humaine. Briser un maillon (sol dégradé OU alimentation ultra-transformée OU antibiotiques) casse toute la chaîne.", "contexte_sci": "La lactofermentation est le pont entre le sol et l'alimentation humaine. Les mêmes lactobacilles qui protègent le sol produisent les aliments fermentés (kéfir, kimchi, choucroute). Lien avec la santé humaine (métabolites fermentés et densité nutritionnelle) et le microbiome intestinal.", "instructions": "Du sol à l'assiette : les fermentations lactiques dans l'agriculture et l'alimentation. L'acide 3-phényllactique comme éliciteur de l'ISR. Termes : acide lactique, acide 3-phényllactique, FAA (Fish Amino Acid).", "style": "scientifique synthétique"}, {"type": "conclusion", "chapitre": null, "section": null, "titre_h1": null, "titre_h2": null, "titre_h3": null, "tableau": 0, "enrichissement": null, "contexte_sci": "Ce document couvre 9 sections organisées autour de 5 chapitres : I. Fermentation vs aérobiose, II. Bokashi, III. EM et dérivés, IV. KNF et dérivés et 1 autres. La conclusion doit synthétiser les mécanismes clés et ouvrir sur les perspectives pratiques ou scientifiques.", "instructions": "Les fermentations sont la technologie la plus ancienne de l'humanité. Synthétiser : bokashi nourrit le sol, EM et LiFoFer inoculent, la lactofermentation nourrit l'humain. Le fil rouge : les mêmes micro-organismes, du sol à l'intestin.", "style": "narratif synthétique"}], "n_terms": 23}], "terms": [{"fr": "Agriculture Biodynamique", "en": "biodynamic agriculture", "doc_code": "F1/F2", "strate": "F", "definition": "Système agricole fondé sur l'anthroposophie de Rudolf Steiner (conférences de Koberwitz, 1924), reposant sur des préparations ésotériques (BD 500-507 : bouse en corne de vache, achillée en vessie de cerf, écorce de chêne en crâne animal) et un calendrier astrologique (Maria Thun). Aucune méta-analyse indépendante (Chalker-Scott 2013, Rienth et al. 2024, FiBL 21 ans) n'a démontré d'effet des préparations au-delà de l'agriculture biologique classique. Les bonnes pratiques associées (absence d'intrants chimiques, biodiversité, apports organiques) relèvent de l'agronomie standard et ne sont pas spécifiques à la biodynamie. Le label Demeter finance la Société Anthroposophique Universelle. La MIVILUDES (rapport 2024) recense un nombre de saisines égal à celui de la Scientologie. ⚠ Pseudoscience — ne pas valoriser dans le corpus.", "statut": "◆", "syn_fr": "biodynamie", "rt": "organisme-ferme · capital biologique · Cycle d\\ · ,", "bt": "agriculture biologique", "type": "concept"}, {"fr": "Agriculture Organique Régénératrice", "en": "regenerative organic agriculture", "doc_code": "F1/F2", "strate": "F", "definition": "Modèle combinant la certification biologique et les objectifs de régénération active du capital biologique. Amélioration mesurable des indicateurs de vie du sol à chaque cycle cultural. Intègre les dimensions sociale et économique de la transition (Rodale Institute ; Newton et al., 2020).", "statut": "◆", "syn_fr": "AR ; Agriculture biologique régénératrice", "syn_en": "regenerative organic agriculture ; ROAg", "rt": "paradigme régénératif · capital biologique · chronoséquence de transition", "bt": "agriculture régénératrice", "type": "concept"}, {"fr": "Anthropocène", "en": "Anthropocene", "doc_code": "F2", "strate": "F", "definition": "Époque géologique actuelle caractérisée par l'impact prédominant des activités humaines sur l'écosystème terrestre. L'agriculture industrielle est identifiée comme l'un des principaux vecteurs de cette rupture planétaire. La transition régénératrice constitue un levier majeur pour inverser la trajectoire (Grimonprez, 2022).", "statut": "◆", "syn_fr": "Anthropozoïque", "rt": "pédogenèse · 133 GtC · Haber-Bosch · paradigme régénératif", "bt": "ère géologique", "type": "concept"}, {"fr": "Archéen", "en": "Archean", "doc_code": "F1", "strate": "F", "definition": "Ère géologique 4-2,5 Ga, caractérisée par une atmosphère anoxique et une vie exclusivement microbienne (procaryotes). L'Archéen a développé tous les métabolismes de base : fermentation, photosynthèse anoxygénique, chimiolithotrophe. Ces voies sont conservées dans les micro-organismes actuels et réactivées dans les microsites anoxiques du sol.", "statut": "◆", "syn_en": "Archaean", "rt": "GOE · anaérobiose · microsites anoxiques · fermentation", "bt": "éon", "type": "concept"}, {"fr": "BIFs", "en": "banded iron formations", "doc_code": "F1", "strate": "F", "definition": "Formations sédimentaires marines témoins de l'atmosphère anoxique archéenne. Le fer dissous (Fe²⁺) précipitait en cycles alternant oxydes (Fe₂O₃, hématite) et carbonates selon les fluctuations de l'O₂ photosynthétique. Marqueurs géochimiques de la transition Archéen → Protérozoïque.", "statut": "◆", "syn_fr": "formations de fer rubanées · BIF ; formations de fer rubané ; gisements de fer rubané", "syn_en": "BIFs", "inrae": "06. SCIENCES DE LA TERRE › 06.02 GÉOLOGIE (correction v2.2)", "rt": "GOE · Archéen · oxydes Fe/Al", "bt": "sédiment chimique", "type": "concept"}, {"fr": "Biofilms", "en": "biofilms", "doc_code": "F1/S1/S0", "strate": "F", "definition": "Matrices de polymères extracellulaires (EPS : polysaccharides, protéines, ADN) sécrétées par les bactéries pour adhérer aux agrégats et créer des microenvironnements protégés. Ciment bactérien des agrégats, complémentaire de la glomaline (ciment fongique). Favorisés par les apports de sucres simples et d'exsudats (couverts jeunes) qui nourrissent les bactéries productrices d'EPS. Rôle clé dans la stabilisation de la structure du sol à l'échelle microscopique (Costa et al., 2018).", "statut": "◆", "syn_fr": "matrices microbiennes · EPS", "syn_en": "biofilms · EPS", "rt": "glomaline · agrégation · CAH · EPS", "bt": "communauté microbienne", "type": "concept"}, {"fr": "Cycle d'Indore", "en": "Indore process", "doc_code": "F1/V3", "strate": "F", "definition": "Procédé de compostage aérobie mis au point par Albert Howard à Indore (Inde, années 1920-30). Alternance de couches de matières végétales et animales, retourné régulièrement. Première démonstration à grande échelle de régénération de fertilité sans intrants de synthèse. Fondateur de l'agriculture organique moderne.", "statut": "◆", "syn_fr": "méthode Indore · compostage Howard ; procédé Indore ; méthode d'Indore", "syn_en": "Indore composting process", "rt": "compostage · MO · capital biologique", "bt": "compostage", "type": "concept"}, {"fr": "Dust Bowl", "en": "Dust Bowl", "doc_code": "F1", "strate": "F", "definition": "Catastrophe écologique des années 1930 dans les Grandes Plaines américaines. Le labour intensif des prairies a détruit la structure du sol, provoquant des tempêtes de poussière massives et la perte de millions d hectares de terres arables. Cas d étude fondamental de la dégradation des sols.", "statut": "◆", "syn_fr": "tempêtes de poussière", "bt": "érosion éolienne", "type": "concept"}, {"fr": "EROI", "en": "energy return on investment", "doc_code": "F2", "strate": "F", "definition": "Ratio énergie alimentaire produite / énergie fossile investie. L'agriculture conventionnelle a souvent un EROI faible (< 3:1) voire négatif à cause des engrais de synthèse Haber-Bosch (Courtonne et al., 2015 ; Tello et al., 2023 ; Dardonville, 2021). L'ACS vise un EROI > 5:1 en réduisant les intrants fossiles. Levier : 30-40% de légumineuses en rotation pour court-circuiter la synthèse industrielle d'azote.", "statut": "~", "syn_fr": "retour sur investissement énergétique ; TRE (taux de retour énergétique) ; ROI énergétique", "syn_en": "EROI · energy return on investment ; EROEI (energy return on energy invested)", "inrae": "07. SCIENCES HUMAINES ET SOCIALES › 07.02 ÉCONOMIE (correction v2.2 — suppression alignement Leuconostoc)", "rt": "Haber-Bosch · externalités · capital biologique · EROI calcul", "bt": "indicateur d'efficacité énergétique", "type": "concept"}, {"fr": "Grand Événement d'Oxydation", "en": "Great Oxidation Event", "doc_code": "F1", "strate": "F", "definition": "Augmentation spectaculaire de l'O₂ atmosphérique au Paléoprotérozoïque (~2,45-2,0 Ga), causée par la photosynthèse oxygénique des cyanobactéries. Événement évolutif majeur ayant rendu la vie aérobie possible. Correspond à la précipitation des formations de fer rubanées (BIFs). La commutation métabolique anaérobiose→aérobiose a façonné tous les métabolismes actuels, incluant les voies fermentatives préservées dans les microsites anoxiques du sol.", "statut": "◆", "syn_fr": "Grande Oxydation ; Grande Oxydation · GOE", "syn_en": "GOE ; GOE · Great Oxidation Event · Great Oxygenation Event", "bt": "événement paléoclimatique", "type": "concept"}, {"fr": "Great Oxidation Event", "en": "Great Oxidation Event", "doc_code": "F1", "strate": "F", "definition": "Événement géologique majeur (~2.4 Ga) : l accumulation d O₂ atmosphérique produit par les cyanobactéries a provoqué l extinction massive des anaérobies stricts et l apparition de la respiration aérobie. A transformé la géochimie de la Terre (formation des BIFs, oxydes Fe).", "statut": "◆", "syn_fr": "Grand Événement d'Oxydation", "syn_en": "GOE", "bt": "atmospheric evolution", "type": "concept"}, {"fr": "Haber-Bosch", "en": "Haber-Bosch process", "doc_code": "F2", "strate": "F", "definition": "Procédé industriel de synthèse de l'ammoniac (N₂+H₂→NH₃) à haute pression et température (1913). Consomme 1-2% de l'énergie mondiale (Robertson & Groffman, 2014). Responsable de la rupture des cycles naturels de l'azote et de la dépendance aux énergies fossiles. Levier : 30-40% de légumineuses en rotation pour court-circuiter ce procédé. Connexion Loi de la Trophobiose : l'azote Haber-Bosch favorise un excès d'acides aminés libres dans la sève, rendant les plantes vulnérables aux ravageurs.", "statut": "◆", "syn_fr": "procédé Haber-Bosch ; synthèse industrielle de l'ammoniac", "syn_en": "HB process", "rt": "EROI · légumineuses · Loi de la Trophobiose · N2O · stœchiométrie C/N", "bt": "synthèse chimique", "type": "concept"}, {"fr": "L'Organisme-Ferme", "en": "The Farm as Organism (whole-farm concept)", "doc_code": "F2", "strate": "F", "definition": "Concept fondateur de l'agriculture \"organique\" (bio), stipulant que la ferme doit posséder une \"complétude biologique\" et un équilibre interne (Bless et al., 2023).\n\nEnjeu : Distinction entre traiter la terre comme une ressource inanimée (industriel) et la gérer comme une entité vivante complexe (Bless et al., 2023).\n\nLevier de décision : Concevoir les rotations non pas comme des successions de cultures mais comme des cycles de renouvellement de la vie du sol(Trabelsi, 2017).", "statut": "◆", "syn_fr": "organisme agricole ; individualité agricole", "syn_en": "agricultural individuality", "bt": "concept holistique en agriculture", "type": "concept"}, {"fr": "Loi de la Trophobiose", "en": "trophobiosis law", "doc_code": "V2/F2", "strate": "F", "definition": "Théorie de Francis Chaboussou (1985) : un parasite ne peut s'attaquer qu'à une plante dont le métabolisme est déséquilibré, présentant un excès d'acides aminés libres et de sucres réducteurs non transformés en protéines complètes. Les engrais azotés solubles (Haber-Bosch) provoquent ce déséquilibre biochimique en perturbant la synthèse protéique. Maillon 5 de la chaîne causale C2.\n\nEnjeu : démontre que la vulnérabilité phytosanitaire n'est pas un problème de plante mais un problème de nutrition azotée.\n\nLevier : nutrition azotée biologique (légumineuses, fixation N) garantissant une synthèse protéique complète et une résistance naturelle aux ravageurs.", "statut": "◆", "syn_fr": "trophobiose · loi de Chaboussou ; théorie de la santé des plantes par la nutrition", "syn_en": "trophobiosis · Chaboussou law", "inrae": "04. SANTÉ HUMAINE, ANIMALE ET VÉGÉTALE › 04.02 CAUSES ET VECTEURS DE MALADIE", "rt": "Haber-Bosch · ISR · PGPR · holobionte", "bt": "théorie de la résistance des plantes", "type": "concept"}, {"fr": "Loi du Minimum", "en": "Liebig's law of the minimum", "doc_code": "F2", "strate": "F", "definition": "Principe (Liebig, 1840) : la croissance d'un organisme est limitée par la ressource la plus rare, quelle que soit l'abondance des autres. En agriculture régénératrice, s'applique au capital biologique total : un sol pauvre en diversité fongique limitera la nutrition minérale même en présence de NPK abondant (Kokou, 2011). La CMA est souvent le facteur limitant le moins visible mais le plus structurant.", "statut": "◆", "syn_fr": "baril de Liebig ; loi de Liebig ; loi des facteurs limitants", "syn_en": "Liebig's law · barrel model", "rt": "Haber-Bosch · CMA · stœchiométrie de Kirkby · capital biologique", "bt": "principe agronomique", "type": "concept"}, {"fr": "Néguentropie", "en": "negentropy", "doc_code": "F1/F2", "strate": "F", "definition": "Processus par lequel le vivant capte l'énergie solaire pour créer de l'organisation et de la complexité à partir du chaos minéral(Alombert & Krzykawski, 2021).\n\nEnjeu : Un sol vivant est une structure hautement organisée qui lutte contre la dégradation naturelle(Martins, 2019).\n\nLevier de décision : Chaque passage d'outil qui simplifie le sol (travail du sol) augmente l'entropie ; chaque implantation de plante augmente la néguentropie(Loiret, 2016).", "statut": "◆", "syn_fr": "entropie négative", "syn_en": "negative entropy", "bt": "thermodynamique", "type": "concept"}, {"fr": "Rhynie Chert", "en": "Rhynie Chert", "doc_code": "F1", "strate": "F", "definition": "Gisement fossile écossais (~407 Ma) préservant les premiers témoignages des symbioses mycorhiziennes CMA associées aux premières plantes terrestres. Démontre que les mycorhizes ont précédé les systèmes racinaires complexes — les CMA ont colonisé la terre avant les racines.", "statut": "◆", "syn_fr": "chert de Rhynie", "rt": "CMA · Glomeromycota · évolution mycorhizes", "bt": "Konservat-Lagerstätte", "type": "concept"}, {"fr": "Révolution verte", "en": "Green Revolution", "doc_code": "F1", "strate": "F", "definition": "Période d'intensification agricole basée sur la génétique à haut rendement et les intrants de synthèse (azote, pesticides)(Lorel, 2018).\n\nEnjeu : Si elle a augmenté les calories produites, elle a souvent conduit à une \"faim cachée\" : des aliments abondants mais pauvres en micronutriments et protecteurs naturels (Erisman, 2020; Montgomery & Biklé, 2021).", "statut": "◆", "bt": "politique agricole", "type": "concept"}, {"fr": "Scope 3", "en": "Scope 3 emissions", "doc_code": "F2", "strate": "F", "definition": "Émissions indirectes de la chaîne de valeur agricole (amont : production des intrants ; aval : transport, transformation). Les plus sous-déclarées. Inclut notamment les émissions de la synthèse Haber-Bosch (N₂O des engrais) et du labour (déstockage de CO₂ du sol).", "statut": "≈", "syn_fr": "émissions indirectes amont/aval · chaîne de valeur carbone ; émissions indirectes de GES ; émissions de la chaîne de valeur", "syn_en": "indirect emissions", "inrae": "07. SCIENCES HUMAINES ET SOCIALES › 07.02 ÉCONOMIE (correction v2.2)", "rt": "EROI · externalités · Haber-Bosch · N2O", "bt": "bilan gaz à effet de serre", "type": "concept"}, {"fr": "Théorie de l'Humus", "en": "humus theory", "doc_code": "F1/S4", "strate": "F", "definition": "Théorie (Thaer, 1809) selon laquelle les plantes se nourrissent directement d'humus. Réfutée par Liebig (1840) au profit de la théorie de la nutrition minérale. Partiellement réhabilitée par la découverte du rôle de la nécromasse microbienne (80% du C stable) et de la nutrition non-ionique (rhizophagie, White et al. 2018) : la plante digère bien de la MO microbienne via des endophytes. La continuité Thaer→nécromasse→rhizophagie est le récit scientifique fondateur du corpus (Kokou, 2011 ; Gunina & Kuzyakov, 2023).", "statut": "◆", "syn_fr": "doctrine de l'humus ; théorie de Thaer", "rt": "nécromasse microbienne · rhizophagie · Loi du Minimum · nutrition non-ionique", "bt": "théorie agronomique historique", "type": "concept"}, {"fr": "agroécologie", "en": "agroecology", "doc_code": "F2", "strate": "F", "definition": "Science, mouvement et pratique intégrant principes écologiques dans les systèmes agricoles. Triple approche : scientifique, sociale, politique.", "statut": "◆", "type": "concept"}, {"fr": "altération minérale", "en": "mineral weathering", "doc_code": "F1", "strate": "F", "definition": "Dégradation des roches par processus physiques, chimiques et biologiques. Source primaire des argiles et du phosphore.", "statut": "~", "syn_fr": "météorisation", "syn_en": "rock weathering", "bt": "processus de formation des sols", "type": "glossaire"}, {"fr": "antifragilité", "en": "antifragility", "doc_code": "F2", "strate": "F", "definition": "Propriété d'un système qui se renforce face aux chocs plutôt que de simplement y résister (Taleb). Un sol vivant diversifié est plus performant après un stress (sécheresse, inondation) qu'un sol stérile protégé artificiellement (Equihua et al., 2020 ; Shi et al., 2021). Construite par la diversité spécifique : mélanges de 10-12 espèces en couverts pour saturer les niches écologiques (Bommarco et al., 2012). L'antifragilité est l'horizon de la transition, au-delà de la résilience.", "statut": "◆", "syn_fr": "aucun (concept de N. Taleb utilisé tel quel en français académique)", "rt": "résilience · résistance · couverts végétaux · succession écologique", "bt": "propriété systémique", "type": "concept"}, {"fr": "bioéconomie circulaire", "en": "circular bioeconomy", "doc_code": "F2", "strate": "F", "definition": "Économie basée sur le carbone photosynthétique, pas sur le carbone fossile (Hamant). Biodiversité → agroécologie → biomasse → biomatériaux biodégradables compostables qui nourrissent les écosystèmes. Condition : les objets doivent pouvoir retourner au sol. Le sol vivant est le socle de la bioéconomie circulaire.", "statut": "◆", "syn_fr": "économie circulaire biosourcée", "bt": "bioéconomie", "type": "concept"}, {"fr": "burnout planétaire", "en": "planetary burnout", "doc_code": "F2", "strate": "F", "definition": "Métaphore systémique de Hamant : comme un burnout humain est causé par un excès de performance, le burnout planétaire (dérèglement climatique, effondrement de la biodiversité, pollutions, pénuries) est le produit de notre performance collective. La réponse habituelle à un burnout — demander encore plus d'effort — est exactement ce que font les politiques actuelles face à la crise écologique. Le monde fluctuant (écart-type, pas moyenne) qui en résulte est le signal que le système a dépassé ses limites de performance.", "statut": "◆", "syn_fr": "épuisement des ressources planétaires ; surchauffe écologique", "bt": "crise écologique globale", "type": "concept"}, {"fr": "capital biologique", "en": "biological capital", "doc_code": "F2", "strate": "F", "definition": "Stock intégré de biodiversité fonctionnelle et de matière organique stable accumulé dans un sol, générant des intérêts annuels sous forme de fertilité gratuite (fixation d'azote, solubilisation du phosphore, suppressivité, résilience hydrique, densité nutritionnelle). Contrairement au matériel, ce capital se valorise avec le temps si on ne le perturbe pas (Bourgeois et al., 2012). Calculer le ROI sur la capitalisation de l'humus à 5 ans, pas sur le rendement de la culture suivante.", "statut": "◆", "syn_fr": "actifs biologiques ; patrimoine biotique", "syn_en": "biocapital", "rt": "COS · PLFA · Chao1 · antifragilité · chronoséquence de transition", "bt": "capital naturel", "type": "concept"}, {"fr": "cascade hydraulique évolutive", "en": "evolutionary hydraulic cascade", "doc_code": "F1", "strate": "F", "definition": "Chronologie de la gestion de l'eau dans le vivant terrestre. Biofilms anaérobies (4 Ga) → rétention d'eau dans micropores. Champignons saprotrophes (1 Ga) → transport d'eau par réseau hyphique. CMA + plantes (470 Ma) → livraison à la plante + photosynthèse → exsudats → nourriture bactéries et champignons → plus de biofilms → boucle fermée. Les anaérobies sont la FONDATION, les champignons l'INFRASTRUCTURE, les plantes les CLIENTS, la litière le PAIEMENT.", "statut": "◆", "bt": "évolution végétale", "type": "concept"}, {"fr": "chimiolithoautotrophie", "en": "chemolithotrophy", "doc_code": "F1", "strate": "F", "definition": "Métabolisme d'organismes utilisant des composés inorganiques (H₂S, Fe²⁺, NH₄⁺, H₂) comme source d'énergie et le CO₂ comme source de carbone. Première forme de nutrition de la biosphère, antérieure à la photosynthèse. Conservée dans les bactéries nitrifiantes (Nitrosomonas, Nitrobacter), les bactéries sulfureuses et les archées méthanogènes.", "statut": "◆", "syn_fr": "chimiolithotrophie", "syn_en": "chemolithotrophy", "rt": "serpentinisation · nitrification · Archéen", "bt": "métabolisme microbien", "type": "concept"}, {"fr": "colonisation terrestre", "en": "land colonization (plants)", "doc_code": "F1", "strate": "F", "definition": "Sortie des plantes hors de l eau il y a ~470 Ma. Impossible sans la symbiose mycorhizienne (Glomeromycota) qui a permis l accès aux nutriments du sol minéral. Co-évolution racines/champignons comme moteur de la formation des premiers sols.", "statut": "◆", "syn_fr": "terrestrialisation", "syn_en": "terrestrialization", "bt": "évolution biologique", "type": "concept"}, {"fr": "compromis performance/robustesse", "en": "performance-robustness trade-off", "doc_code": "F2", "strate": "F", "definition": "Loi universelle (Hamant, 2024) : un système ne peut pas être simultanément très performant et très robuste. Performant = optimisé, spécialisé, adapté, donc peu adaptable. Robuste = diversifié, redondant, sous-optimal, donc très adaptable. Le sol vivant est robuste (ratio F/B équilibré, diversité microbienne élevée, résilience aux stress). Le sol industriel est performant (rendement maximal année 1, effondrement décennie 2). Les êtres vivants sont robustes parce qu'ils ne sont pas performants — c'est ce que sélectionne l'évolution darwinienne.", "statut": "◆", "syn_fr": "trade-off performance-robustesse ; compromis évolutif", "syn_en": "robustness-performance trade-off", "bt": "stratégie adaptative", "type": "concept"}, {"fr": "contreperformances du vivant", "en": "biological counter-performances", "doc_code": "F2", "strate": "F", "definition": "Caractéristiques sélectionnées par l'évolution darwinienne parce qu'elles élargissent l'espace de viabilité : inefficacité, hétérogénéité, redondance, lenteur, incohérence, imprécision, inachèvement. Dans le sol vivant : redondance fonctionnelle (des centaines d'espèces pour la même fonction), hétérogénéité spatiale (microsites aérobies et anaérobies), lenteur de la MO stable (humification sur des décennies). Un sol industriel « optimisé » est fragile ; un sol vivant « contreperformant » est robuste.", "statut": "◆", "syn_fr": "non-optimalité évolutive ; fardeau génétique", "syn_en": "evolutionary constraints", "bt": "biologie de l'évolution", "type": "concept"}, {"fr": "contreperformances sélectionnées", "en": "selected counter-performances", "doc_code": "F2", "strate": "F", "definition": "Observation biologique fondamentale (Hamant) : l'évolution darwinienne sélectionne l'inefficacité, l'hétérogénéité, la redondance, la lenteur, l'imprécision — parce que ces propriétés élargissent l'espace de viabilité du système. Un arbre a des milliers de feuilles (redondance), une crosse aortique sous-optimale (imprécision), un système immunitaire en veilleuse à 37°C (sous-performance de croisière). Transposé au sol : la diversité microbienne, les guildes fonctionnelles redondantes et les cycles lents de la MO stable sont des contreperformances qui garantissent la robustesse.", "statut": "◆", "syn_en": "indirect selection", "bt": "sélection naturelle", "type": "concept"}, {"fr": "contreperformances sélectionnées par l évolution", "en": "evolutionary selection of counter-performance", "doc_code": "F2", "strate": "F", "definition": "Ce que l'évolution darwinienne sélectionne dans les systèmes vivants : inefficacité, hétérogénéité, redondance, lenteur, erreur, imprécision, incohérence, inachèvement. Ce sont des marges de manœuvre — du jeu dans les rouages. Un arbre optimisé serait une tige avec une feuille ; un arbre réel a des milliers de feuilles redondantes. Un sol vivant est redondant (mille espèces pour la même fonction), hétérogène (microsites aérobies et anaérobies), lent (humification sur des décennies). C'est exactement pourquoi il est résilient.", "statut": "◆", "type": "concept"}, {"fr": "contreperformances sélectionnées par l'évolution", "en": "evolutionary selection of counter-performance", "doc_code": "F2", "strate": "F", "definition": "", "statut": "◆", "syn_fr": "fardeau de sélection", "bt": "évolution biologique", "type": "concept"}, {"fr": "coûts cachés", "en": "hidden costs", "doc_code": "F2", "strate": "F", "definition": "Coûts environnementaux et sociaux non reflétés dans le prix de marché, synonyme opérationnel des externalités. Ex : coût de la dépollution de l'eau, soins médicaux liés aux pesticides, effondrement des pollinisateurs.", "statut": "◆", "syn_fr": "externalités négatives ; coûts sociaux", "syn_en": "shadow costs", "rt": "externalités · EROI · Anthropocène", "bt": "économie de l'environnement", "type": "concept"}, {"fr": "culture de la variabilité", "en": "culture of variability", "doc_code": "F2", "strate": "F", "definition": "Compétence clé pour habiter le monde fluctuant (Hamant / TED-Néo Loco). Remplacer les moyennes par les écarts-types dans les tableurs, construire son modèle économique sur les colonnes les plus fluctuantes. Pour l'agriculture : piloter par le diagnostic de variabilité (P1), pas par le rendement moyen.", "statut": "◆", "syn_fr": "gestion de l'aléa ; acceptation de l'hétérogénéité", "bt": "stratégie de résilience", "type": "concept"}, {"fr": "cyanobactéries", "en": "cyanobacteria", "doc_code": "F1", "strate": "F", "definition": "Procaryotes photosynthétiques oxygéniques apparus il y a ~2,7 Ga. À l'origine du GOE et des chloroplastes (endosymbiose).", "statut": "~", "syn_fr": "algues bleues ; cyanophycées ; cyanophytes", "syn_en": "blue-green algae", "bt": "procaryotes photosynthétiques", "type": "glossaire"}, {"fr": "efficiency trap (piège de la performance)", "en": "efficiency trap", "doc_code": "F2", "strate": "F", "definition": "Boucle auto-renforçante décrite par Olivier Hamant (ENS Lyon) : crise → besoin de sécurité → besoin de contrôle → augmentation de la performance → épuisement des ressources → crise suivante. Explique pourquoi l'agriculture industrielle ne peut pas se réformer de l'intérieur : chaque crise (résistance aux pesticides, érosion, perte de fertilité) déclenche une réponse performante (nouvel intrant, nouvelle molécule, nouveau OGM) qui prépare la crise suivante. Le sprinter qui épuise ses ressources.", "statut": "◆", "syn_fr": "paradoxe de Jevons ; effet de seuil", "syn_en": "Jevons paradox", "bt": "effet rebond", "type": "concept"}, {"fr": "endosymbiose", "en": "endosymbiosis", "doc_code": "F1", "strate": "F", "definition": "Incorporation d'un organisme procaryote dans une cellule hôte, à l'origine des mitochondries (α-protéobactérie, ~2 Ga) et des chloroplastes (cyanobactérie, ~1.5 Ga). Théorie de Lynn Margulis. Fondement de toute vie eucaryote.", "statut": "◆", "syn_fr": "symbiose intracellulaire", "syn_en": "intracellular symbiosis", "bt": "symbiose", "type": "concept"}, {"fr": "esclaves énergétiques", "en": "energy slave", "doc_code": "F2", "strate": "F", "definition": "Métaphore : équivalent en travail humain d'une unité d'énergie fossile. Un litre de pétrole équivaut à ~10 jours de travail humain. Permet de visualiser concrètement le capital énergétique fossile mobilisé par l'agriculture conventionnelle.", "statut": "◆", "syn_fr": "aucun (terme de métrologie énergétique)", "rt": "EROI · Haber-Bosch · externalités", "bt": "consommation d'énergie", "type": "concept"}, {"fr": "externalités", "en": "externalities", "doc_code": "F2", "strate": "F", "definition": "Coûts environnementaux et sociaux non internalisés dans le prix de marché des produits agricoles. Estimés à 12 000 milliards $/an mondialement (eutrophisation, maladies chroniques, effondrement de la biodiversité, coût des antibiorésistances). Le prix réel d'un aliment conventionnel intégrant les externalités est 3-5× le prix de marché.", "statut": "✓", "syn_fr": "effet externe ; effets externes", "syn_en": "externalities · external costs", "inrae": "07. SCIENCES HUMAINES ET SOCIALES › 07.02 ÉCONOMIE", "rt": "EROI · Haber-Bosch · coûts cachés · Anthropocène", "bt": "économie politique", "type": "concept"}, {"fr": "homéostasie du sol", "en": "soil homeostasis", "doc_code": "F2/S1", "strate": "F", "definition": "Capacité du sol à maintenir des conditions internes stables (pH, T°, humidité, activité biologique) malgré les variations extérieures. Un sol nu perd son homéostasie en quelques heures lors de pics thermiques, tuant la biologie de surface (Feng et al., 2025). Levier : mulch permanent pour stabiliser les conditions du microbiome de surface. Distinct de l'homéostasie microbienne (stœchiométrie interne des micro-organismes).", "statut": "◆", "syn_fr": "régulation homéostatique du sol ; équilibre Eh-pH du sol", "rt": "mulch · couverture permanente · homéostasie microbienne · microbiome", "bt": "santé des sols", "type": "concept"}, {"fr": "maladaptation", "en": "maladaptation", "doc_code": "F2", "strate": "F", "definition": "Solution performante à un problème complexe qui aggrave les problèmes adjacents. Exemples : l'usine de capture directe du CO₂ en Islande (Climeworks, 2024) qui privatise le CO₂ et permet aux industries de continuer à émettre via des quotas carbone. La batterie au lithium qui lutte contre le changement climatique mais aggrave les pénuries de ressources, l'effondrement de la biodiversité et les pollutions. En agriculture : la biofortification agronomique (engrais enrichis) au lieu de la biofortification biologique (sol vivant).", "statut": "◆", "syn_fr": "mauvaise adaptation", "bt": "adaptation aux changements climatiques", "type": "concept"}, {"fr": "monde fluctuant", "en": "volatile world / VUCA world", "doc_code": "F2", "strate": "F", "definition": "Caractérisation du monde post-Holocène (Hamant) : variable et imprévisible. La fréquence des événements climatiques extrêmes en France a été multipliée par 4,5 depuis 2000. Le monde fluctuant exige la robustesse, pas la performance. Implications pour l'agriculture : le rendement stable n'existe plus, seule la résilience du système compte.", "statut": "◆", "syn_fr": "environnement VUCA ; instabilité systémique", "syn_en": "VUCA world", "bt": "contexte systémique", "type": "concept"}, {"fr": "paradigme régénératif", "en": "regenerative paradigm", "doc_code": "F2", "strate": "F", "definition": "Cadre de pensée dépassant la durabilité (ne pas dégrader) pour viser la reconstruction active des écosystèmes. Repositionne l'agriculture comme ingénierie écosystémique et branche de la santé publique (Newton et al., 2020).", "statut": "◆", "syn_fr": "approche régénératrice", "rt": "antifragilité · capital biologique · One Health", "bt": "modèle de développement durable", "type": "concept"}, {"fr": "photosynthèse oxygénique", "en": "oxygenic photosynthesis", "doc_code": "F1", "strate": "F", "definition": "Processus métabolique apparu chez les cyanobactéries il y a ~2.7 Ga, utilisant H₂O comme donneur d'électrons et libérant O₂. A provoqué le Great Oxidation Event (GOE, ~2.4 Ga) qui a transformé l'atmosphère et ouvert la voie à la respiration aérobie.", "statut": "◆", "bt": "photosynthèse", "type": "concept"}, {"fr": "pédogenèse", "en": "pedogenesis", "doc_code": "F1", "strate": "F", "definition": "Ensemble des processus biologiques, chimiques et physiques par lesquels la roche mère se transforme progressivement en sol (Dokouchaïev, 1883 — sol comme 'corps naturel organisé'). Processus multi-millénaire (1 cm / 200 à 2 000 ans selon le climat). Mobilise des communautés pionnières de lichens, bactéries lithotrophes et champignons altérant les minéraux. Les pratiques agricoles dégradantes peuvent détruire en décennies ce que la pédogenèse a construit en millénaires. Évaluer toute pratique selon son impact sur la vitesse de pédogenèse (Montagne, 2020).", "statut": "◆", "syn_fr": "formation des sols ; évolution des sols", "syn_en": "soil formation", "rt": "altération minérale · microbiome du sol · COS · Anthropocène", "bt": "pédologie", "type": "concept"}, {"fr": "résilience", "en": "resilience", "doc_code": "F2/P1", "strate": "F", "definition": "Vitesse à laquelle un sol retrouve son fonctionnement optimal après une perturbation (Bommarco et al., 2012). Distinct de la résistance (ne pas être affecté) et de l'antifragilité (s'améliorer). Les réseaux mycorhiziens (CMN) agissent comme des pipelines de secours pour l'eau en période de stress (Simard, 2018). Un sol résilient sécurise les rendements en contexte climatique instable (Vialatte et al., 2023).", "statut": "◆", "syn_fr": "maintien d'un potentiel évolutif ; capacité de récupération", "rt": "antifragilité · CMN · diversité microbienne · capital biologique", "bt": "dynamique des écosystèmes", "type": "concept"}, {"fr": "résistance", "en": "resistance", "doc_code": "F2", "strate": "F", "definition": "Capacité d'un système à résister à une perturbation sans changer d'état. Distincte de la résilience (retour) et de l'antifragilité (gain).", "statut": "~", "syn_fr": "stabilité fonctionnelle ; invariance systémique", "bt": "stabilité écologique", "type": "glossaire"}, {"fr": "serpentinisation", "en": "serpentinization", "doc_code": "F1", "strate": "F", "definition": "Réaction géochimique de l'eau avec les roches ultrabasiques (péridotites, dunites) produisant de l'H₂ abiotique et de la chaleur. Source d'énergie primitive pour les premiers micro-organismes chimio-lithotropes avant l'apparition de la photosynthèse.", "statut": "◆", "rt": "chimiolithoautotrophie · Archéen · H₂ abiotique", "bt": "processus géochimique", "type": "concept"}, {"fr": "sobriété comme produit de sortie", "en": "sufficiency as output (not input)", "doc_code": "F2", "strate": "F", "definition": "Concept clé de Hamant : la sobriété ne doit pas être la contrainte d'entrée mais le produit de sortie. Quand la sobriété s'hybride avec le culte de la performance, elle produit de l'efficience énergétique — des avions sobres en kérosène qui transportent de l'ultra-fast fashion, des SUV électriques, des effets rebonds généralisés. À l'inverse, un objet réparable (non sobre, plus gros, avec des boulons) génère de la sobriété comme résultat : il dure, se transmet, crée du lien social. Le sol vivant suit la même logique : il n'est pas sobre (il est redondant, diversifié, exubérant), mais il produit de la sobriété systémique en éliminant le besoin d'intrants.", "statut": "◆", "syn_fr": "frugalité choisie", "bt": "sobriété énergétique", "type": "concept"}, {"fr": "sobriété récupérée (effet rebond)", "en": "rebound effect (recovered sobriety)", "doc_code": "F2", "strate": "F", "definition": "Mécanisme par lequel la sobriété, hybridée au culte de la performance, produit de l'efficience qui libère des ressources pour encore plus de consommation (Hamant). L'avion sobre en kérosène transporte de l'ultra fast fashion. Le SUV électrique pèse 2.5 tonnes. L'écran basse consommation fait 65 pouces. La sobriété comme contrainte d'entrée produit de l'ébriété. La sobriété doit être le produit de sortie (objets réparables → durabilité → sobriété émergente), pas la contrainte d'entrée.", "statut": "◆", "syn_fr": "effet rebond ; paradoxe de Jevons", "syn_en": "backfire effect", "bt": "paradoxe de Jevons", "type": "concept"}, {"fr": "succession écologique", "en": "ecological succession", "doc_code": "F1/P4", "strate": "F", "definition": "Évolution naturelle d'un écosystème depuis un stade pionnier (dominance bactérienne, copiotrophes, ratio F/B < 0,5) vers un stade climacique stable (dominance fongique, oligotrophes, ratio F/B > 2). Cadre théorique expliquant l'évolution du microbiome lors d'une transition vers l'ACS. L'agriculture régénératrice cherche à accélérer cette succession via les couverts diversifiés, les biostimulants et l'absence de labour.", "statut": "◆", "syn_fr": "succession végétale · succession biologique ; dynamique de la végétation", "syn_en": "ecological succession · soil succession", "inrae": "05. SCIENCES BIOLOGIQUES › 05.12 ÉCOLOGIE", "rt": "ratio F/B · copiotrophes · oligotrophes · agriculture syntropic", "bt": "écologie des communautés", "type": "concept"}, {"fr": "technodiversité", "en": "technodiversity", "doc_code": "F2", "strate": "F", "definition": "Maintien de la diversité des technologies et savoir-faire dans un territoire, par analogie avec la biodiversité (Hamant). Le monde de la performance est technophobe (une technologie performante écrase les autres). Le monde de la robustesse est technophile (on garde tout ce qui est robuste). Exemples : terre crue + impression 3D, bokashi + métabarcoding.", "statut": "◆", "syn_fr": "aucun (concept philosophique et technique)", "bt": "diversité technique", "type": "concept"}, {"fr": "terra preta", "en": "terra preta (Amazonian dark earths)", "doc_code": "F1", "strate": "F", "definition": "Sols anthropiques amazoniennes créés entre 450 et 8000 ans par les populations indigènes. Enrichis en charbon de bois (biochar), tessons de poterie, déchets organiques fermentés. COS 3-10× supérieur aux sols adjacents. Preuve que l homme peut construire un sol fertile durablement.", "statut": "◆", "syn_fr": "Terra Preta do Indio ; Terres noires d'Amazonie", "syn_en": "ADE", "bt": "anthrosol", "type": "concept"}, {"fr": "transformation par les marges", "en": "transformation from the margins", "doc_code": "F2", "strate": "F", "definition": "Loi de transformation des systèmes complexes (Hamant, d'après les nuées d'étourneaux). Ce sont toujours les acteurs à la périphérie — les premiers exposés aux fluctuations — qui guident le changement. La marge contamine le cœur. En agriculture : les pionniers ACS/MSV (marge) contaminent l'agriculture conventionnelle (cœur). Mélanges variétaux : 5% en 2010 → 40% en 2020.", "statut": "◆", "syn_fr": "innovation par les marges ; transformation par les périphéries", "bt": "changement social", "type": "concept"}, {"fr": "AMR", "en": "antimicrobial resistance (AMR)", "doc_code": "H3", "strate": "H", "definition": "Résistance des pathogènes aux antibiotiques. Crise sanitaire mondiale amplifiée par l'usage d'antibiotiques vétérinaires en élevage industriel et la transmission sol-plante-intestin du résistome (Ma et al., 2025). L'agriculture régénératrice réduit la pression de sélection via la diversité microbienne et l'absence d'antibiotiques dans les préparations.", "statut": "≈", "syn_fr": "antibiorésistance · résistance antimicrobienne ; RAM ; résistance aux antimicrobiens ; antibiorésistance", "syn_en": "AMR · antimicrobial resistance ; AMR", "inrae": "04. SANTÉ HUMAINE, ANIMALE ET VÉGÉTALE › 04.03 MESURES PRÉVENTIVES ET CURATIVES › résistance aux antibiotiques (correction v2.2)", "rt": "résistome · THG · ARG · sol suppressif", "bt": "Enjeu de santé mondiale One Health", "type": "concept"}, {"fr": "ARG (gènes de résistance aux antibiotiques)", "en": "ARG (antibiotic resistance genes)", "doc_code": "H3", "strate": "H", "definition": "Gènes codant des mécanismes de résistance aux antibiotiques, présents naturellement dans le résistome du sol mais amplifiés par l usage d antibiotiques vétérinaires et les épandages de lisiers. Transférables horizontalement entre bactéries via plasmides, transposons et intégrons.", "statut": "◆", "syn_fr": "Gènes de résistance ; gènes d'antibiorésistance ; ARGs", "syn_en": "ARG", "bt": "Déterminant génétique environnemental", "type": "concept"}, {"fr": "Beauveria bassiana", "en": "B. bassiana", "doc_code": "H3", "strate": "H", "definition": "", "statut": "◆", "syn_fr": "B. bassiana", "syn_en": "Botrytis bassiana ; Spicaria bassiana", "bt": "champignons entomopathogènes", "type": "concept"}, {"fr": "Bio-accessibilité et Chélation Naturelle", "en": "Bioaccessibility and Natural Chelation", "doc_code": "H1", "strate": "H", "definition": "Aptitude des nutriments contenus dans l'aliment à être libérés de la matrice alimentaire et absorbés par l'intestin, facilitée par les complexes organiques (chélates) formés par la biologie du sol (Montgomery et al., 2022; White, 2018).\n\nEnjeu : Un fer ou un zinc \"bio-fortifié\" biologiquement par le sol est mieux assimilé qu'un supplément minéral de synthèse (Montgomery et al., 2022).\n\nLevier de décision : Stimuler les bactéries sidérophores (solubilisatrices de fer) pour améliorer naturellement la qualité minérale biodisponible des produits (Delaporte‐Quintana et al., 2020).", "statut": "◆", "syn_fr": "Mobilisation des oligo-éléments ; chélation microbienne ; protonation des métaux", "bt": "Processus de nutrition minérale", "type": "concept"}, {"fr": "Biodisponibilité", "en": "Bioavailability", "doc_code": "H1", "strate": "H", "definition": "Fraction d'un nutriment ingéré qui est réellement absorbée et utilisée par l'organisme.\n\nEnjeu : La présence de métabolites microbiens et de chélates naturels dans les aliments issus de sols vivants favorise leur absorption intestinale (White, 2018).", "statut": "◆", "syn_fr": "Fraction assimilable ; phyto-disponibilité ; disponibilité nutritionnelle", "bt": "Indicateur de qualité nutritionnelle", "type": "concept"}, {"fr": "Biofortification biologique", "en": "Biological Biofortification", "doc_code": "H1", "strate": "H", "definition": "Amélioration de la teneur en nutriments des plantes via la stimulation de la biologie du sol (mycorhizes, PGPR) plutôt que par enrichissement chimique (Montgomery et al., 2022).\n\nEnjeu : Les micro-organismes comme les bactéries solubilisatrices ou les champignons mycorhiziens augmentent l'extraction des oligo-éléments du sol vers la plante (Delaporte‐Quintana et al., 2020; Martin, 2017; Simard, 2018).", "statut": "◆", "syn_fr": "Biofortification par les PGPR ; enrichissement biologique des cultures ; bio-enrichissement", "bt": "Stratégie d'agroécologie nutritionnelle", "type": "concept"}, {"fr": "LPS", "en": "Lipopolysaccharides (LPS)", "doc_code": "H2", "strate": "H", "definition": "Endotoxines issues de la paroi des bactéries Gram-négatives(Vors, 2012). Leur passage dans le sang (endotoxémie) déclenche une inflammation chronique de bas grade (Cani et al., 2007).\n\nEnjeu : Un déséquilibre du microbiome intestinal (dysbiose) augmente la charge en LPS circulants.", "statut": "◆", "syn_fr": "Lipopolysaccharides ; endotoxines bactériennes ; marqueurs de structure microbienne", "syn_en": "LPS", "bt": "Signal immunitaire", "type": "concept"}, {"fr": "Leaky gut", "en": "Leaky Gut (Intestinal Permeability)", "doc_code": "H2", "strate": "H", "definition": "Altération de la barrière muqueuse laissant passer des toxines ou des pathogènes dans le sang (Chelakkot, 2018).\n\nEnjeu : Souvent induit par une alimentation pauvre en nutriments ou contenant des résidus de pesticides qui perturbent l'équilibre microbien.", "statut": "◆", "syn_fr": "Perméabilité intestinale ; syndrome de l'intestin poreux ; translocation de LPS", "syn_en": "Intestinal Permeability", "bt": "Pathologie de l'homéostasie intestinale", "type": "concept"}, {"fr": "Metarhizium anisopliae", "en": "M. anisopliae", "doc_code": "H3", "strate": "H", "definition": "", "statut": "◆", "syn_fr": "M. anisopliae", "syn_en": "Entomophthora anisopliae", "bt": "champignons entomopathogènes", "type": "concept"}, {"fr": "Microbiome (ou Microbiote) intestinal", "en": "Gut Microbiome (Gut Microbiota)", "doc_code": "H2", "strate": "H", "definition": "Communauté de micro-organismes résidant dans l'appareil digestif humain, dont la diversité est influencée par le microbiome des aliments consommés (Ma et al., 2025; Rosier et al., 2025).\n\nEnjeu : Un microbiome intestinal appauvri est lié à l'obésité, au diabète et aux maladies inflammatoires (Ananthakrishnan, 2015; Cani et al., 2007).\n\nLevier de décision : Favoriser la consommation d'aliments \"vivants\" (lactofermentés, issus de sols régénérés) pour entretenir la diversité du microbiote intestinal.", "statut": "◆", "syn_fr": "Flore intestinale ; microbiote humain ; organe métabolique", "syn_en": "Gut Microbiota", "bt": "Système de régulation de l'hôte", "type": "concept"}, {"fr": "One Health", "en": "One Health", "doc_code": "H1", "strate": "H", "definition": "Approche intégrée (OMS/OIE/FAO) reconnaissant l interdependance des santés humaine, animale et environnementale. Cadre liant santé des sols, écosystèmes, animaux et humains. Clé pour comprendre les liens alimentation-santé et le rôle des pratiques agricoles sur la santé publique.", "statut": "✓", "syn_fr": "santé globale · santé unique · une seule santé ; Santé globale ; une seule santé ; approche intégrée de la santé", "inrae": "04. SANTÉ HUMAINE, ANIMALE ET VÉGÉTALE › 04.04 SANTÉ ET BIEN-ÊTRE", "rt": "co-évolution sol-microbiome-humain · continuum sol-intestin · AMR", "bt": "Modèle de santé systémique", "type": "concept"}, {"fr": "Pression de sélection", "en": "Selection Pressure", "doc_code": "H3", "strate": "H", "definition": "Force environnementale (pH, toxiques, azote massif) qui élimine les espèces fragiles et favorise les plus résistantes (souvent des pathogènes r-stratèges) (Fierer et al., 2007; Philippot, 2013).\n\nEnjeu : En agriculture conventionnelle, la pression de sélection chimique appauvrit le microbiome, ne laissant que des espèces opportunistes potentiellement néfastes pour l'humain.", "statut": "◆", "syn_fr": "Contrainte évolutive ; mimétisme moléculaire inter-microbiomes", "bt": "Dynamique des communautés microbiennes", "type": "concept"}, {"fr": "SCFA (Acides gras à chaîne courte : Butyrate, Propionate, Acétate)", "en": "Short-Chain Fatty Acids (SCFA: Butyrate, Propionate, Acetate)", "doc_code": "H2", "strate": "H", "definition": "Métabolites produits par la fermentation des fibres (prébiotiques) par les bactéries intestinales.\n\nEnjeu : Le butyrate est la source d'énergie principale des colonocytes et assure l'étanchéité de la muqueuse intestinale (Chelakkot, 2018).\n\nLevier de décision : Produire des végétaux riches en polysaccharides complexes (inuline, fructanes) pour maximiser la production de SCFA dans l'intestin.", "statut": "◆", "type": "concept"}, {"fr": "THG", "en": "HGT", "doc_code": "H3", "strate": "H", "definition": "Transfert horizontal de gènes. Échange de matériel génétique entre bactéries via plasmides, transposons ou transformation. Vecteur des ARG.", "statut": "~", "syn_fr": "Transfert horizontal de gènes ; transfert latéral de gènes", "syn_en": "HGT", "bt": "Mécanisme d'évolution microbienne", "type": "glossaire"}, {"fr": "axe intestin-cerveau", "en": "gut-brain axis", "doc_code": "H2", "strate": "H", "definition": "Communication bidirectionnelle entre le microbiome intestinal et le système nerveux central via le nerf vague, les métabolites microbiens (SCFA, tryptophane), les neurotransmetteurs (90% de la sérotonine produite dans l'intestin), et le système immunitaire muqueux. Impliqué dans la dépression, l'anxiété et les troubles neurodégénératifs.", "statut": "◆", "syn_fr": "axe microbiote-intestin-cerveau ; communication bidirectionnelle intestin-cerveau ; signalisation neuro-intestinale", "bt": "système de régulation neuro-immunitaire", "type": "concept"}, {"fr": "axe sol-plante-goût", "en": "soil-plant-gut axis", "doc_code": "H1", "strate": "H", "definition": "", "statut": "◆", "syn_fr": "aucun (terme lié à la perception sensorielle et nutritionnelle)", "bt": "Continuum de transfert de l'information biologique", "type": "concept"}, {"fr": "axe sol-plante-goût (SPG)", "en": "soil-plant-gut axis", "doc_code": "H1/H2/H3", "strate": "H", "definition": "Continuum de transfert bidirectionnel micro-organismes et métabolites : sol → endophytes végétaux → microbiote intestinal humain lors de la consommation d'aliments. Service de vaccination microbienne silencieuse : consommer des aliments issus de sols biologiquement diversifiés entretient la diversité du microbiote intestinal. Ma et al. (2025) ; Duarte et al. (2024). Sous-ensemble de l axe sol-plante-homme focalisé sur les composés aromatiques, les polyphénols et la densité en micronutriments. SPG = dimension sensorielle et nutritionnelle de la chaîne sol-alimentation.", "statut": "◆", "syn_fr": "continuum sol-intestin · SPG axis", "syn_en": "soil-plant-gut axis · SPG", "rt": "transfert sol-microbiote intestinal · cycle de la rhizophagie · microbiome intestinal", "type": "concept"}, {"fr": "axe sol-plante-homme", "en": "soil-plant-human continuum", "doc_code": "H1", "strate": "H", "definition": "Continuum fonctionnel large liant santé du sol, qualité nutritionnelle et santé humaine. Cadre conceptuel englobant. Voir entrée H — Axe sol-plante-goût (SPG) pour le mécanisme de transfert microbien spécifique (Ma et al., 2025).", "statut": "≈", "syn_fr": "continuum sol-plante-microbiote humain ; axe sol-santé", "syn_en": "soil-plant-human gut microbiome axis", "inrae": "04. SANTÉ HUMAINE, ANIMALE ET VÉGÉTALE › 04.04 SANTÉ ET BIEN-ÊTRE", "rt": "densité nutritionnelle · axe sol-plante-goût (SPG) · continuum sol-intestin", "bt": "One Health", "type": "concept"}, {"fr": "biodiversity hypothesis", "en": "biodiversity hypothesis", "doc_code": "H2", "strate": "H", "definition": "Extension de l'hypothèse hygiéniste : la perte de biodiversité environnementale (sols appauvris, alimentation industrielle) réduit la résilience immunitaire des populations humaines (Rook, 2011 ; 2013). Prédirait une augmentation des maladies auto-immunes corrélée avec la simplification des agroécosystèmes.", "statut": "◆", "syn_fr": "hypothèse de la biodiversité ; théorie du lien entre diversité biologique et protection immunitaire", "rt": "hygiene hypothesis · One Health · couverts végétaux", "bt": "écologie de la santé", "type": "concept"}, {"fr": "biofortification par le sol vivant", "en": "biofortification through living soil", "doc_code": "H1", "strate": "H", "definition": "Enrichissement naturel des aliments en micronutriments (Fe, Zn, Se, vitamines B) par l action combinée des CMA (transport P, Zn, Cu), des PGPR (solubilisation Fe, Mn) et de la diversité microbienne du sol vivant. Alternative à la biofortification agronomique (engrais enrichis) ou génétique (sélection variétale).", "statut": "◆", "syn_fr": "biofortification microbienne ; enrichissement nutritionnel par les PGPR ; bio-enrichissement édaphique", "syn_en": "microbial-assisted biofortification", "bt": "Stratégie de sécurité nutritionnelle", "type": "concept"}, {"fr": "champignons entomopathogènes", "en": "entomopathogenic fungi", "doc_code": "H3", "strate": "H", "definition": "", "statut": "◆", "syn_fr": "agents de contrôle biologique des insectes ; biopesticides fongiques ; agents de biocontrôle", "syn_en": "EPF ; EPFs", "bt": "biocontrôle", "type": "concept"}, {"fr": "chitine", "en": "chitin", "doc_code": "H3", "strate": "H", "definition": "", "statut": "◆", "bt": "polysaccharide", "type": "concept"}, {"fr": "co-évolution sol-microbiome-humain", "en": "soil-microbiome-human co-evolution", "doc_code": "H2", "strate": "H", "definition": "Interdépendance évolutive entre microbiotes du sol et microbiote intestinal humain, co-évoluant depuis des millions d'années au contact des mêmes phyla microbiens. La transition vers des environnements urbains et une agriculture 'stérile' a rompu ce contact, corrélée à l'émergence de maladies auto-immunes (hypothèse hygiéniste, Rook, 2011).", "statut": "◆", "syn_fr": "évolution conjointe des microbiomes édaphiques et humains ; symbiose ancestrale homme-microbes", "rt": "hygiene hypothesis · microbiome global · One Health", "bt": "dynamique évolutive des microbiomes", "type": "concept"}, {"fr": "densité nutritionnelle", "en": "nutrient density", "doc_code": "H1", "strate": "H", "definition": "Concentration en micronutriments (minéraux, vitamines) et métabolites secondaires (polyphénols, antioxydants) des aliments. Les sols régénératifs produisent des cultures à densité nutritionnelle supérieure aux sols conventionnels : +30-50% en polyphénols, +20% en minéraux biodisponibles, synthèse de vitamines B par le microbiome (Rosier et al., 2025 — meilleur indicateur proxy de la santé du sol ; Montgomery et al., 2022). L'effet de dilution (excès d'azote + croissance rapide) est la cause principale de la baisse de densité nutritionnelle observée depuis 1950.", "statut": "✓", "syn_fr": "concentration en micronutriments ; valeur nutritionnelle des aliments", "syn_en": "nutritional quality", "inrae": "05. SCIENCES BIOLOGIQUES › 05.06 NUTRITION ET ALIMENTATION", "rt": "polyphénols · ISR · phyto-élicitation · effet de dilution · microbiome intestinal", "bt": "Qualité de l'alimentation", "type": "concept"}, {"fr": "dysbiose", "en": "dysbiosis", "doc_code": "H2", "strate": "H", "definition": "Perturbation qualitative et/ou quantitative de la composition du microbiote intestinal. Associée à la perte de diversité (chute de Chao1 intestinal), à la dominance de pathobiontes et à l'augmentation de la perméabilité intestinale (leaky gut). Facteurs : antibiotiques, alimentation ultra-transformée, stress chronique.", "statut": "◆", "syn_fr": "déséquilibre microbien ; altération fonctionnelle du microbiote ; perte de diversité commensale", "bt": "pathologie du microbiome", "type": "concept"}, {"fr": "effet de dilution", "en": "dilution effect", "doc_code": "H1", "strate": "H", "definition": "Diminution de la concentration en micronutriments et métabolites secondaires à mesure que le rendement augmente (fertilisation azotée intensive + sélection variétale volume). Un grain de blé contenant 30% plus d'eau et d'amidon qu'en 1950 présente mécaniquement des concentrations relatives moindres en zinc, fer, protéines et antioxydants. Cause principale de la 'faim cachée' (Rosier et al., 2025 ; Montgomery et al., 2022).", "statut": "◆", "syn_fr": "dilution minérale par le rendement ; baisse de densité nutritionnelle", "rt": "densité nutritionnelle · Haber-Bosch · polyphénols · faim cachée", "bt": "Phénomène agronomique de productivité", "type": "concept"}, {"fr": "endophyte", "en": "endophyte", "doc_code": "H3", "strate": "H", "definition": "", "statut": "◆", "syn_fr": "organisme endophyte", "syn_en": "plant endophyte", "bt": "micro-organisme", "type": "concept"}, {"fr": "eutrophisation", "en": "eutrophication", "doc_code": "H1/F2", "strate": "H", "definition": "Enrichissement excessif en N et P des eaux de surface par le lessivage agricole. Provoque prolifération algale et hypoxie.", "statut": "~", "syn_fr": "saturation trophique des milieux aquatiques ; pollution azotée et phosphorée des eaux", "bt": "Impact environnemental des transferts de nutriments", "type": "glossaire"}, {"fr": "exposome cumulé", "en": "cumulative exposome", "doc_code": "H1/H3", "strate": "H", "definition": "Somme totale des expositions environnementales d'un individu (pesticides, métaux, perturbateurs endocriniens) via l'alimentation, l'air, l'eau et le contact cutané. L'agriculture régénératrice réduit l'exposome des populations locales au-delà des résidus alimentaires : qualité de l'air et des eaux de surface (Rebouillat, 2021 ; Cognez, 2020).", "statut": "◆", "syn_fr": "somme des expositions environnementales ; charge toxique et biologique globale", "rt": "AMR · LPS · inflammation chronique · biodiversity hypothesis", "bt": "Santé environnementale", "type": "concept"}, {"fr": "faim cachée", "en": "hidden hunger", "doc_code": "H1", "strate": "H", "definition": "Carences en micronutriments (Fe, Zn, Se, vitamines B) malgré un apport calorique suffisant. Liée à la dilution nutritionnelle.", "statut": "~", "syn_fr": "carence en micronutriments ; malnutrition invisible ; déficit en oligo-éléments", "syn_en": "micronutrient deficiency", "bt": "Enjeu de santé publique", "type": "glossaire"}, {"fr": "flavonoïdes", "en": "flavonoids", "doc_code": "H1", "strate": "H", "definition": "Sous-classe majeure de polyphénols aux propriétés anti-inflammatoires, antivirales et antioxydantes. Produits par la voie ISR/SAR déclenchée par le microbiome du sol. Marqueurs de densité nutritionnelle des aliments issus de sols vivants.", "statut": "◆", "syn_fr": "métabolites secondaires polyphénoliques ; antioxydants végétaux ; composés phénoliques actifs", "rt": "polyphénols · ISR · phytochimie fonctionnelle", "bt": "polyphénols", "type": "concept"}, {"fr": "hygiene hypothesis", "en": "hygiene hypothesis", "doc_code": "H2", "strate": "H", "definition": "L'exposition réduite aux micro-organismes environnementaux (sols, végétaux, animaux) dans les pays industrialisés est corrélée à l'augmentation des maladies allergiques et auto-immunes. Le contact avec la biodiversité microbienne du sol éduque le système immunitaire. L'alimentation issue de sols régénératifs = 'inoculation' du microbiote intestinal depuis le microbiome local.", "statut": "◆", "syn_fr": "hypothèse hygiéniste ; théorie de la réduction de l'exposition microbienne précoce", "rt": "biodiversity hypothesis · microbiome intestinal · continuum sol-intestin", "bt": "santé environnementale", "type": "concept"}, {"fr": "inflammation chronique", "en": "chronic inflammation", "doc_code": "H1/H2", "strate": "H", "definition": "État inflammatoire de bas grade persistant, associé à la dysbiose intestinale et la carence en métabolites anti-inflammatoires (SCFA, polyphénols).", "statut": "~", "syn_fr": "inflammation systémique de bas grade ; inflammation métabolique", "syn_en": "low-grade inflammation", "bt": "Pathologie de l'homéostasie intestinale", "type": "glossaire"}, {"fr": "inoculation du microbiome par l'achat local", "en": "local microbiome inoculation via food", "doc_code": "H3", "strate": "H", "definition": "Concept du Corpus Le Sol Vivant cet Holobionte : l'achat local est une forme d'inoculation du microbiome intestinal par le microbiome local du terroir. Les aliments issus de sols locaux transmettent des micro-organismes et des métabolites adaptés à l'environnement microbien de la région, diversifiant et renforçant le microbiome intestinal du consommateur local.", "statut": "◆", "syn_fr": "Colonisation microbienne par le régime alimentaire local ; apport de microbes indigènes via l'alimentation", "rt": "axe sol-plante-goût (SPG) · microbiome intestinal · hygiene hypothesis · biodiversity hypothesis", "bt": "Transfert sol-microbiote intestinal", "type": "concept"}, {"fr": "microbiome global", "en": "global microbiome", "doc_code": "H2", "strate": "H", "definition": "Interconnexion des microbiomes sol, rhizosphère, plante, intestin humain et poumon. Même phyla dominants (Firmicutes, Proteobacteria, Actinobacteria), mêmes voies métaboliques fermentaires conservées depuis l'Archéen. Fondement de l'approche One Microbiome et de l'hypothèse hygiéniste (Rook, 2011).", "statut": "◆", "syn_fr": "métabiome planétaire ; réseau interconnecté des communautés microbiennes", "rt": "continuum sol-intestin · One Health · hygiene hypothesis", "bt": "écologie microbienne globale", "type": "concept"}, {"fr": "microbiome intestinal", "en": "gut microbiome", "doc_code": "H2", "strate": "H", "definition": "Communauté microbienne du tube digestif humain (>10¹³ cellules, >1 000 espèces). Sa diversité est directement influencée par la diversité microbienne des aliments consommés (continuum sol→aliment→intestin). Un microbiome intestinal appauvri est lié à l'obésité, au diabète et aux maladies inflammatoires (Ananthakrishnan, 2015 ; Cani et al., 2007).", "statut": "✓", "syn_fr": "microbiote intestinal ; écosystème digestif humain ; organe métabolique microbien", "syn_en": "gut microbiome · gut microbiota ; gut microbiota", "inrae": "12. ORGANISMES VIVANTS › 12.02 NOTIONS LIÉES AUX ORGANISMES › microbiote", "rt": "continuum sol-intestin · diversité microbienne · co-évolution sol-microbiome-humain", "bt": "microbiote humain", "type": "concept"}, {"fr": "microbiome pulmonaire", "en": "lung microbiome", "doc_code": "H2", "strate": "H", "definition": "Communauté microbienne des voies respiratoires basses (< 10⁶ bactéries/g de tissu). Modulé par les particules microbiennes de l'air et par l'environnement agricole. Lien documenté entre exposition aux micro-organismes des sols sains et réduction des allergies respiratoires (hypothèse hygiéniste).", "statut": "◆", "syn_fr": "microbiote respiratoire ; axe intestin-poumon", "rt": "hygiene hypothesis · exposome · One Health", "bt": "microbiote humain", "type": "concept"}, {"fr": "phyto-élicitation par le sol", "en": "soil-induced phyto-elicitation", "doc_code": "H1/V2", "strate": "H", "definition": "Stimulation de la synthèse des métabolites secondaires de la plante (polyphénols, flavonoïdes, antioxydants) déclenchée par les signaux biochimiques du microbiome du sol via les voies ISR/SAR. Les sols biologiquement actifs, en maintenant une pression biotique positive sur les racines, amplifient la qualité nutritionnelle et sanitaire des récoltes. Feliziani et al. (2025) valident l'interconnexion entre agriculture régénératrice et préventi
