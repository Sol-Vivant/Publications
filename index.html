eview", "notes": null, "adapted": 0}, {"id": 14, "title": "Profil sol calcaire/argilo-calcaire : calcium structurant, risques de blocages P/oligo", "description": "Sol calcaire : calcium structurant (floculation), porosité durable ; attention aux blocages P et oligo-éléments (soufre/bore) qui impactent métabolismes & symbioses.", "scope_type": "global", "category": "profil_sol", "status": "active", "docs_codes": ["S1", "S4"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 15, "title": "Profil sol hydromorphe/organique : redox bas, émissions, gestion de l’eau centrale", "description": "Sol hydromorphe/organique : redox bas fréquent ; risques N2O/CH4 et toxicités (Fe/Mn réduits). Éviter apports réduits enfouis ; gérer l’eau et la continuité racinaire.", "scope_type": "global", "category": "profil_sol", "status": "active", "docs_codes": ["S1", "S0", "S4"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 16, "title": "Profil sol 'franc' (loam) : effets intermédiaires, sensibilité au travail du sol", "description": "Sol loam : bon compromis texture ; répond bien aux apports réguliers et couverts ; sensible aux perturbations mécaniques qui cassent habitats/biofilms.", "scope_type": "global", "category": "profil_sol", "status": "active", "docs_codes": ["S1"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 17, "title": "Mode d’application : surface vs incorporation (profondeur) change le diagnostic", "description": "Cadre : par défaut, beaucoup de raisonnements supposent des apports en surface (mulch/compost de surface). Si incorporation/enfouissement, le redox, la cinétique et les risques (anoxie, faim d'azote, pertes) changent radicalement. Toute analyse doit déclarer la profondeur d'application.\n\nDEUX VOIES DISTINCTES :\n• Surface (aérobie, Eh 300-500 mV) : humification lente, mimétisme forestier (litière → faune → incorporation biotique). Champignons lignivores, préservation de la macroporosité biologique. Recommandation par défaut.\n• Incorporation (mixtion minéral/organique) : humification rapide SI conditions aérobies maintenues. Le mélange intime à l'échelle du cm stabilise les agrégats par action du mycélium saprophyte (rayon d'action ~1-2 cm). Technique d'intrant massif (50-400 t MS/ha) documentée par le réseau MSV / Ver de Terre Production sur 10 ans.\n\nCONDITIONS DE SUCCÈS DE L'INCORPORATION :\n1. Décompaction préalable du sol\n2. Bon drainage (pas d'hydromorphie — sinon bascule anaérobie)\n3. Maintien de l'humidité (irrigation si nécessaire)\n4. Chaleur accélère la reprise biologique\n5. Mélange à l'échelle du centimètre\n6. Accepter 18-24 mois de faim d'azote → retour fertilité + vers de terre\n\nDIMENSION REDOX (Eh/pH) :\nL'incorporation change le contexte redox. Eh > 200 mV = aérobie → humification OK. Eh < 200 mV = anaérobie → fermentation → production H₂S, Fe²⁺/Mn²⁺ toxiques, émissions N₂O/CH₄.\nSignaux terrain anaérobie : odeurs de soufre, horizons bleutés/gris, racines noires.\nEn sol argileux/hydromorphe, l'enfouissement de MO fraîche peut basculer en anaérobie : drainage d'abord, incorporation ensuite.\n\nCAS DOCUMENTÉS :\n• Talus de Marseille : sol très dégradé → +7-9 pts MO en 12-18 mois (50+ cm BRF, broyeur à marteau, chaleur + irrigation).\n• Ferme de Cagnolle (B. Le Baube, Dordogne) : 1.4% → 9% MO en 10 ans par agrorecyclerie.\n• Réseau MSV : BRF mélangé au sol → agrégats stables à 120 jours dans l'eau. Sans mélange, le sol fond à travers la grille.", "scope_type": "global", "category": "symptome", "status": "active", "docs_codes": ["P1", "P2", "P3", "F1", "S4", "V3"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 18, "title": "Amendements organiques : compostage aérobie thermophile vs fermentations vs autres voies", "description": "Cadre : comparer des apports par (matière × procédé × état × usage), pas par mots. Compost thermophile (aérobie chaud), compostage en pile statique, compost 'de surface', compost réductif, compost fermenté… n’ont pas les mêmes processus ni les mêmes effets (redox, pertes de masse, stimulation vs stabilisation).", "scope_type": "global", "category": "symptome", "status": "active", "docs_codes": ["P3", "V3"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 29, "title": "MO–argile → transition stœchiométrique → stratégies microbiennes", "description": "Carte passerelle : trajectoire écologique + MO (SOC) + taux d’argile → disponibilité/qualité du C + transitions stœchiométriques (C:N:P) → bascules de stratégies microbiennes (r/K, copio/oligo, Y-A-S). Outil d’audit + set de recherche.", "scope_type": "global", "category": "symptome", "status": "active", "docs_codes": ["S2", "S4"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 30, "title": "Hydrique & redox → stress / microzones → stratégies", "description": "Passerelle : régime hydrique (sécheresse/réhumectation), microzones redox, diffusion dans agrégats → stress + opportunisme → déplacements Y-A-S, dormance, syntrophie.", "scope_type": "global", "category": "symptome", "status": "active", "docs_codes": ["S0", "S4", "S2"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 31, "title": "Azote (formes, pertes) → stœchiométrie → stratégies microbiennes", "description": "Passerelle : formes d’azote, minéralisation/immobilisation, nitrification/dénitrification, pertes (N2O) → bascules de limitation et d’investissement A/Y/S.", "scope_type": "global", "category": "symptome", "status": "active", "docs_codes": ["S2", "S4"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 32, "title": "Structure du sol (agrégats/EPS) → habitats → stabilité/résilience", "description": "Passerelle : structure, agrégats, EPS/biofilms, porosité → habitats et protection → stabilité/résilience, trajectoires microbiennes.", "scope_type": "global", "category": "symptome", "status": "active", "docs_codes": ["S1", "S2"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 33, "title": "Compaction / semelle / faible porosité", "description": "Diagnostic terrain : compaction, semelle, limitation racinaire, infiltration faible. Objectif : discriminer structure vs hydrique vs MO/stœchio.", "scope_type": "global", "category": "symptome", "status": "active", "docs_codes": ["P1", "S1"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 34, "title": "Asphyxie / anaérobie locale (odeurs, horizons réduits)", "description": "Diagnostic terrain : signaux redox/anoxie, odeurs, racines stressées. Objectif : relier hydrique, structure, C labile, microzones.", "scope_type": "global", "category": "symptome", "status": "active", "docs_codes": ["P1", "S4", "S0"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 35, "title": "Battance / croûte / ruissellement (surface)", "description": "Diagnostic terrain : croûte, ruissellement, éclaboussures, infiltration de surface faible. Objectif : structure, MO de surface, agrégation.", "scope_type": "global", "category": "symptome", "status": "active", "docs_codes": ["P1", "S1", "S0"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 36, "title": "Infiltration lente / engorgement (profil)", "description": "Diagnostic terrain : infiltration lente, engorgement, stagnation. Objectif : distinguer hydrique (nappe), structure, texture/argile.", "scope_type": "global", "category": "symptome", "status": "active", "docs_codes": ["P1", "S0"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 37, "title": "Hydrophobie / infiltration hétérogène (spots secs)", "description": "Diagnostic terrain : zones qui refusent l’eau, infiltration patchy. Objectif : MO, hydrique, structure, biofilms/EPS.", "scope_type": "global", "category": "symptome", "status": "active", "docs_codes": ["P1", "S0"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 38, "title": "‘Faim d’azote’ après apport carboné (immobilisation)", "description": "Diagnostic terrain : jaunissement post-apport C, ralentissement croissance. Objectif : stœchiométrie, immobilisation, C labile.", "scope_type": "global", "category": "symptome", "status": "active", "docs_codes": ["P1", "S2", "S4"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 39, "title": "Excès de C très fermentescible (odeurs, chauffe, instabilités)", "description": "Diagnostic terrain : odeurs, chaleur, instabilités post-apports. Objectif : bascules redox, microzones, trajectoires.", "scope_type": "global", "category": "symptome", "status": "active", "docs_codes": ["P1", "S4", "V3"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 40, "title": "Sol ‘inerte’ / faible activité apparente", "description": "Diagnostic terrain : faible faune visible, agrégats pauvres, racines superficielles. Objectif : éviter faux diagnostic (saison/hydrique), cibler drivers.", "scope_type": "global", "category": "symptome", "status": "active", "docs_codes": ["P1", "S2"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 41, "title": "Racines superficielles / enracinement bloqué", "description": "Diagnostic terrain : racines en surface, peu profondes, déviation. Objectif : compaction, anoxie, sécheresse, stœchio.", "scope_type": "global", "category": "symptome", "status": "active", "docs_codes": ["P1", "S1", "S0"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}, {"id": 42, "title": "Stabilité d’agrégats faible / désagrégation rapide", "description": "Diagnostic terrain : slaking, agrégats qui se défont. Objectif : EPS, MO, structure, hydrique.", "scope_type": "global", "category": "symptome", "status": "active", "docs_codes": ["P1", "S1", "S2"], "source": "legacy_v1_to_review", "notes": null, "adapted": 0}], "rules": [{"id": 1, "rule_name": "Fermentation sans putréfaction", "condition_text": "Présence biofilms + gradients redox + couverture du sol", "action_text": "Autoriser apports fermentés (bokashi, BRF fermenté)", "expected_effect": "Stabilisation micro-agrégats, faible perte C/N", "confidence": 0.85, "docs_codes": ["P3", "V3", "S2"], "source": "legacy_remplace_par_husson"}, {"id": 2, "rule_name": "Prévention faim d'azote", "condition_text": "Apport MO C/N élevé + présence fermentation", "action_text": "Maintenir mulch + inoculum fermentaire", "expected_effect": "Immobilisation courte, restitution rapide via nécromasse", "confidence": 0.8, "docs_codes": ["P2", "P3", "S2"], "source": "legacy_remplace_par_husson"}, {"id": 3, "rule_name": "Compatibilité sol sableux", "condition_text": "Sol sableux + forte aération", "action_text": "Favoriser fermentation et apports fractionnés", "expected_effect": "Augmentation rapide porosité fonctionnelle", "confidence": 0.9, "docs_codes": ["S1", "P3"], "source": "legacy_remplace_par_husson"}, {"id": 4, "rule_name": "Risque asphyxie sol argileux", "condition_text": "Sol argileux + excès matière réduite + enfouissement", "action_text": "Limiter profondeur d'incorporation", "expected_effect": "Maintien redox fonctionnel", "confidence": 0.9, "docs_codes": ["S1", "S4"], "source": "legacy_remplace_par_husson"}, {"id": 5, "rule_name": "Activation métabolisme collectif", "condition_text": "Diversité microbienne + exsudats racinaires", "action_text": "Maintenir couvert vivant", "expected_effect": "Résilience biologique accrue", "confidence": 0.88, "docs_codes": ["V2", "P2"], "source": "legacy_remplace_par_husson"}, {"id": 6, "rule_name": "Gradient redox fonctionnel", "condition_text": "Présence simultanée zones oxydées et micro-zones anaérobies", "action_text": "Maintenir couverture + limiter travail du sol", "expected_effect": "Coexistence fermentation/aérobie, stabilité biologique", "confidence": 0.9, "docs_codes": ["S4", "S0", "P2"], "source": "legacy_remplace_par_husson"}, {"id": 7, "rule_name": "Activation biofilms structurants", "condition_text": "Présence sucres simples + humidité modérée", "action_text": "Autoriser inoculum fermentaire ou résidus frais", "expected_effect": "Production EPS, formation micro-agrégats", "confidence": 0.88, "docs_codes": ["S2", "S1"], "source": "legacy_remplace_par_husson"}, {"id": 8, "rule_name": "Préservation micro-agrégats", "condition_text": "Sol structuré + absence perturbation mécanique", "action_text": "Éviter labour et enfouissement profond", "expected_effect": "Maintien porosité et MAOM", "confidence": 0.92, "docs_codes": ["S1", "S4"], "source": "legacy_remplace_par_husson"}, {"id": 9, "rule_name": "HGT et résilience adaptative", "condition_text": "Diversité microbienne élevée + biofilms actifs", "action_text": "Favoriser apports diversifiés et continuité biologique", "expected_effect": "Adaptation rapide aux stress", "confidence": 0.87, "docs_codes": ["S2", "S3"], "source": "legacy_remplace_par_husson"}, {"id": 10, "rule_name": "Anaérobiose de surface fonctionnelle", "condition_text": "Mulch + biofilms + humidité stable", "action_text": "Éviter dessiccation brutale", "expected_effect": "Fermentation contrôlée et recyclage énergétique", "confidence": 0.89, "docs_codes": ["P3", "S4", "S0"], "source": "legacy_remplace_par_husson"}, {"id": 11, "rule_name": "Compatibilité sol argileux", "condition_text": "CEC élevée + forte rétention eau", "action_text": "Fractionner apports fermentés, calcium actif", "expected_effect": "Structure stable sans asphyxie", "confidence": 0.91, "docs_codes": ["S1", "P3"], "source": "legacy_conserve"}, {"id": 12, "rule_name": "Optimisation sol sableux", "condition_text": "Faible CEC + forte aération", "action_text": "Multiplier apports fermentés légers et couverture", "expected_effect": "Montée rapide fertilité fonctionnelle", "confidence": 0.9, "docs_codes": ["S1", "P3"], "source": "legacy_remplace_par_husson"}, {"id": 13, "rule_name": "Activation enzymatique optimale", "condition_text": "Biofilms actifs + humidité stable + MO disponible", "action_text": "Éviter sols nus et chocs hydriques", "expected_effect": "Augmentation efficacité enzymatique et recyclage nutriments", "confidence": 0.9, "docs_codes": ["S2", "S0"], "source": "legacy_remplace_par_husson"}, {"id": 14, "rule_name": "Calcium structurant prioritaire", "condition_text": "Sol argileux ou limono-argileux", "action_text": "Assurer calcium échangeable fonctionnel", "expected_effect": "Floculation argiles, porosité durable", "confidence": 0.92, "docs_codes": ["S1", "S4"], "source": "legacy_conserve"}, {"id": 15, "rule_name": "Gestion soufre et oligo-éléments", "condition_text": "Baisse activité microbienne ou carences répétées", "action_text": "Apports soufre, bore, oligo-éléments à faibles doses", "expected_effect": "Relance métabolismes et symbioses", "confidence": 0.85, "docs_codes": ["S4", "P1"], "source": "legacy_remplace_par_husson"}, {"id": 16, "rule_name": "Stabilisation MAOM", "condition_text": "Présence nécromasse + argiles + biofilms", "action_text": "Limiter perturbations mécaniques", "expected_effect": "Stockage carbone stable et résilience accrue", "confidence": 0.93, "docs_codes": ["S4", "S1", "S2"], "source": "legacy_conserve"}, {"id": 17, "rule_name": "Lecture redox des stress plantes", "condition_text": "Plantes en stress sans carence minérale", "action_text": "Analyser redox sol et continuité biologique", "expected_effect": "Correction causes systémiques plutôt que symptômes", "confidence": 0.88, "docs_codes": ["P1", "S4"], "source": "legacy_remplace_par_husson"}, {"id": 18, "rule_name": "Compatibilité légumineuses", "condition_text": "Faim d’azote transitoire ou MO C/N élevé", "action_text": "Introduire légumineuses ou couverts associés", "expected_effect": "Maintien croissance végétale malgré immobilisation", "confidence": 0.9, "docs_codes": ["P2", "V2"], "source": "legacy_conserve"}, {"id": 19, "rule_name": "Pulse microbien carbonaté", "condition_text": "hot_moment AND respiration_microbienne_elevee", "action_text": "Modification rapide du pCO2 et du pH local", "expected_effect": "Dissolution ou précipitation transitoire des carbonates", "confidence": 0.75, "docs_codes": ["S4", "S1"], "source": "legacy_remplace_par_husson"}, {"id": 20, "rule_name": "Formule mélange C/N cible", "condition_text": "C/N > 25 sur un apport organique", "action_text": "Calculer C/N cible = (C1+C2)/(N1+N2). Mélanger pour atteindre 20-25.", "expected_effect": "Fermentation contrôlée, minéralisation sans faim d'azote", "confidence": 0.92, "docs_codes": ["P3", "S4"], "source": "legacy_conserve"}, {"id": 21, "rule_name": "Couvert C/N > 30 implique apport N", "condition_text": "Couvert ou résidu C/N > 30 à incorporer", "action_text": "Roulage-crimpage avant épiaison (C/N encore < 30) OU apport 10-15 kg N/ha", "expected_effect": "Évite immobilisation N sur 4-8 semaines pour culture suivante", "confidence": 0.9, "docs_codes": ["P2", "P3"], "source": "legacy_conserve"}, {"id": 22, "rule_name": "Bois de structure = mulch physique uniquement", "condition_text": "Copeaux, sciure ou carton C/N > 200", "action_text": "Utiliser uniquement comme mulch physique, pas comme apport nutritif", "expected_effect": "Évite immobilisation N extrême. Rôle: structure, habitat faune, protection", "confidence": 0.95, "docs_codes": ["P3", "P4"], "source": "legacy_conserve"}, {"id": 23, "rule_name": "Zone Husson 1 — Sol autonome (C/Argile > 24%)", "condition_text": "Ratio C/Argile > 24%. Sol biologiquement mature, CUE élevée, stratégie Y dominante.", "action_text": "Entretien : couverts permanents, zéro travail du sol, restitution résidus. Pas d'apports massifs. Surveillance ratio F/B (objectif > 0.8).", "expected_effect": null, "confidence": 0.95, "docs_codes": null, "source": "husson_cirad_2025"}, {"id": 24, "rule_name": "Zone Husson 2 — Transition avancée (C/Argile 17-24%)", "condition_text": "Ratio C/Argile entre 17% et 24%. Faux plat du rendement : les micro-organismes captent N,P,S pour construire l'humus AVANT la plante.", "action_text": "Patience : le faux plat N'EST PAS un échec. Maintenir couverts diversifiés, bokashi régulier, éviter l'impatience chimique. Gain C proportionnel à l'effort.", "expected_effect": null, "confidence": 0.95, "docs_codes": null, "source": "husson_cirad_2025"}, {"id": 25, "rule_name": "Zone Husson 3 — Construction MO (C/Argile 12-17%)", "condition_text": "Ratio C/Argile entre 12% et 17%. Sol en construction, stratégie A dominante, CUE moyenne.", "action_text": "Couverts obligatoires multi-espèces (10-12 sp.), apports fermentés réguliers (bokashi, LiFoFer), stœchiométrie C/N surveillée. Objectif +0,1% MO/an.", "expected_effect": null, "confidence": 0.95, "docs_codes": null, "source": "husson_cirad_2025"}, {"id": 26, "rule_name": "Zone Husson 4 — Urgence (C/Argile < 12%)", "condition_text": "Ratio C/Argile < 12%. Sol biologiquement appauvri, stratégie S dominante, CUE faible, risque priming effect maximal.", "action_text": "Apports massifs MO externe (compost, BRF), couvert permanent, AUCUN travail du sol, inoculation ciblée (PGPR, CMA). Patience 3-5 ans minimum. ATTENTION priming effect Phase 1.", "expected_effect": null, "confidence": 0.95, "docs_codes": null, "source": "husson_cirad_2025"}], "tests": [{"code": "t01_test_beche", "title": "Test bêche", "description": "Observation directe du sol à la bêche pour évaluer la structure, la porosité, l’enracinement, la compaction et l’activité biologique visible.", "docs_codes": ["P1", "S1"], "source": "base_obsolete_v1"}, {"code": "t02_profil_cultural", "title": "Profil cultural", "description": "Ouverture d’une fosse ou tranchée pour analyser les horizons du sol, l’historique des pratiques, les zones compactées et la dynamique racinaire.", "docs_codes": ["P1", "S1"], "source": "base_obsolete_v1"}, {"code": "t03_test_bocal_test_de_sedimentation", "title": "Test bocal (test de sédimentation)", "description": "Mise en suspension du sol dans l’eau pour observer la décantation et estimer les proportions sable, limon et argile.", "docs_codes": ["S1"], "source": "base_obsolete_v1"}, {"code": "t04_test_dinfiltration", "title": "Test d’infiltration", "description": "Mesure du temps nécessaire à l’eau pour pénétrer dans le sol afin d’évaluer la porosité fonctionnelle et le risque de ruissellement.", "docs_codes": ["P1", "S0"], "source": "base_obsolete_v1"}, {"code": "t05_test_de_stabilite_des_agregats", "title": "Test de stabilité des agrégats", "description": "Observation de la résistance des mottes du sol à la désagrégation dans l’eau, indicateur de sensibilité à l’érosion.", "docs_codes": ["P1", "S1", "S2"], "source": "base_obsolete_v1"}, {"code": "t06_test_de_battance", "title": "Test de battance", "description": "Observation de la formation de croûtes de surface après mouillage ou pluie simulée.", "docs_codes": ["P1", "S1"], "source": "base_obsolete_v1"}, {"code": "t07_comptage_des_vers_de_terre", "title": "Comptage des vers de terre", "description": "Dénombrement des lombrics pour estimer l’activité biologique et la structuration naturelle du sol.", "docs_codes": ["P1", "V1"], "source": "base_obsolete_v1"}, {"code": "t08_test_racinaire", "title": "Test racinaire", "description": "Observation de la profondeur, de la densité et de l’orientation des racines pour diagnostiquer compaction et fertilité fonctionnelle.", "docs_codes": ["P1", "S1", "S0"], "source": "base_obsolete_v1"}, {"code": "t09_test_olfactif_du_sol", "title": "Test olfactif du sol", "description": "Évaluation de l’odeur du sol pour détecter fermentation, putréfaction ou asphyxie.", "docs_codes": ["P1", "S4", "S0"], "source": "base_obsolete_v1"}, {"code": "t10_test_de_couleur_du_sol", "title": "Test de couleur du sol", "description": "Observation visuelle de la couleur du sol pour inférer matière organique, hydromorphie ou oxydation.", "docs_codes": ["P1", "S1", "S4"], "source": "base_obsolete_v1"}, {"code": "t11_test_de_portance", "title": "Test de portance", "description": "Appréciation de la résistance du sol au tassement sous une charge légère.", "docs_codes": ["P1", "S1"], "source": "base_obsolete_v1"}, {"code": "t12_test_de_friabilite", "title": "Test de friabilité", "description": "Évaluation de la facilité avec laquelle le sol se fragmente entre les doigts.", "docs_codes": ["P1", "S1"], "source": "base_obsolete_v1"}, {"code": "t13_test_de_croute_de_surface", "title": "Test de croûte de surface", "description": "Observation de la présence et de l’épaisseur de croûtes limitant les échanges sol–air–eau.", "docs_codes": ["P1", "S1"], "source": "base_obsolete_v1"}, {"code": "t14_test_dhumidite_au_toucher", "title": "Test d’humidité au toucher", "description": "Appréciation manuelle de l’état hydrique du sol.", "docs_codes": ["P1", "S0"], "source": "base_obsolete_v1"}, {"code": "t15_test_de_respiration_du_sol_simplifie", "title": "Test de respiration du sol (simplifié)", "description": "Estimation de l’activité biologique par dégagement de CO₂ dans un dispositif simple.", "docs_codes": ["P1", "S2"], "source": "base_obsolete_v1"}, {"code": "t16_test_de_decomposition_des_residus", "title": "Test de décomposition des résidus", "description": "Observation de la vitesse de dégradation de résidus organiques enfouis ou en surface.", "docs_codes": ["P1", "S2", "V1"], "source": "base_obsolete_v1"}, {"code": "t17_test_de_couverture_du_sol", "title": "Test de couverture du sol", "description": "Évaluation visuelle de la proportion du sol protégée par des résidus ou couverts végétaux.", "docs_codes": ["P1", "P2"], "source": "base_obsolete_v1"}, {"code": "t18_test_de_compactage_a_la_tige", "title": "Test de compactage à la tige", "description": "Enfoncement manuel d’une tige pour détecter des couches compactées.", "docs_codes": ["P1", "S1"], "source": "base_obsolete_v1"}, {"code": "t19_test_de_ruissellement", "title": "Test de ruissellement", "description": "Observation du comportement de l’eau en surface après pluie ou arrosage.", "docs_codes": ["P1", "S0"], "source": "base_obsolete_v1"}, {"code": "t20_test_de_biodiversite_visible", "title": "Test de biodiversité visible", "description": "Observation globale de la faune et flore du sol visibles à l’œil nu.", "docs_codes": ["P1", "V1"], "source": "base_obsolete_v1"}], "connections": [{"strate_source": "F", "doc_source": "F1 Le Temps Long", "terme_source": "Succession Écologique", "strate_cible": "P", "doc_cible": "P4 Agroforesterie et Systèmes Pérennes", "connexion": "L'agroforesterie est la mise en pratique de la succession écologique : faire évoluer le sol agricole d'un stade pionnier bactérien vers un stade plus fongique et stable en introduisant des composants ligneux. Ce lien théorique F1→P4 n'est pas formalisé.", "importance": "significative", "is_documented": 0}, {"strate_source": "F", "doc_source": "F2 L'Économie du Vivant", "terme_source": "EROI", "strate_cible": "V", "doc_cible": "V3 Les Fermentations Microbiennes", "connexion": "Les fermentations à la ferme (bokashi, JMS, LiFoFer) ont un EROI extrêmement favorable : énergie investie quasi nulle (anaérobie, température ambiante) vs énergie biochimique conservée (~95% du C et N). Ce calcul EROI des biostimulants fermentés devrait être intégré au chapitre économique de F2.", "importance": "significative", "is_documented": 0}, {"strate_source": "F", "doc_source": "F1 Le Temps Long", "terme_source": "Néguentropie", "strate_cible": "S", "doc_cible": "S4 Le Carbone et les Grands Cycles", "connexion": "La photosynthèse est le moteur de la néguentropie (captation d'énergie solaire → organisation du carbone). Le stockage du carbone dans le sol (MAOM, POC) est la matérialisation mesurable de cette néguentropie. Chaque passage d'outil qui minéralise l'humus augmente l'entropie (Loiret, 2016). Ce lien thermodynamique fondamental entre F1 et S4 n'est pas formalisé.", "importance": "significative", "is_documented": 0}, {"strate_source": "F", "doc_source": "F1 Le Temps Long §II (Rhynie Chert, premières mycorhizes)", "terme_source": "LCO (Lipochitooligosaccharides / Facteurs Myc)", "strate_cible": "S", "doc_cible": "S3 Le Microbiome Fongique et Mycorhizien §I (CMA, signalisation symbiotique)", "connexion": "La signalisation LCO/facteurs Myc identifiée par Marks et al. (2025) est une voie de signalisation conservée depuis le Rhynie Chert (407 Ma). Le gène DMI/SYMRK de la voie de signalisation de symbiose commune existe chez toutes les plantes terrestres — preuve que la mycorhization précède l'évolution des racines complexes. Cette connexion F1→S3 ancre la symbiose mycorhizienne dans l'histoire évoluti", "importance": "significative", "is_documented": 0}, {"strate_source": "F", "doc_source": "F1 Le Temps Long", "terme_source": "Anaérobiose universelle", "strate_cible": "V", "doc_cible": "V3 Les Fermentations Microbiennes", "connexion": "F1 pose le contexte de 3,8 Ga d'anaérobiose comme héritage métabolique conservé. V3 décrit la biochimie des fermentations. Mais le lien évolutif explicite entre les voies fermentatives actuelles (Embden-Meyerhof, acide lactique) et leur origine archéenne n'est pas formalisé comme pont entre F1 et V3, alors que c'est précisément l'argument fondateur du corpus.", "importance": "significative", "is_documented": 0}, {"strate_source": "F", "doc_source": "F2 L'Économie du Vivant", "terme_source": "EROI / Procédé Haber-Bosch", "strate_cible": "H", "doc_cible": "H1 Sol, Alimentation et Santé Humaine", "connexion": "L'EROI faible de l'agriculture conventionnelle (F2) est causé en grande partie par l'azote Haber-Bosch. Or cet azote soluble est aussi le facteur de la Loi de la Trophobiose (excès d'acides aminés libres rendant les plantes appétantes pour les parasites) et de la baisse de densité nutritionnelle (dilution par croissance rapide). Le coût énergétique (F2), la vulnérabilité phytosanitaire (V2 via trophobiose) et l'appauvrissement nutritionnel (H1) sont trois conséquences du même intrant mais ne sont jamais présentés comme un faisceau convergent.", "importance": "significative", "is_documented": 0}, {"strate_source": "H", "doc_source": "H2 Résistances Antimicrobiennes", "terme_source": "AMR et ARG", "strate_cible": "V", "doc_cible": "V1 La Faune du Sol", "connexion": "Les protozoaires et nématodes bactérivores exercent une pression de prédation sélective qui limite la prolifération des bactéries résistantes aux antibiotiques. La phagie microbienne est un mécanisme de contrôle des ARG non documenté dans les renvois actuels entre V1 et H2.", "importance": "significative", "is_documented": 0}, {"strate_source": "H", "doc_source": "H1 Sol, Alimentation et Santé Humaine §II (ISR/SAR et phytochimie fonctionnelle)", "terme_source": "SCFA (Butyrate, Propionate, Acétate)", "strate_cible": "V", "doc_cible": "V3 Les Fermentations Microbiennes §III (LAB et métabolites)", "connexion": "Les SCFA (butyrate, propionate, acétate) produits par la fermentation intestinale des fibres sont chimiquement et métaboliquement homologues aux métabolites des fermentations LAB du sol (acide lactique, acide acétique). La voie de production est la même (Embden-Meyerhof-Parnas). Le lien H1→V3 démontre que le microbiome intestinal et les fermentations du sol partagent les mêmes outils biochimiques,", "importance": "significative", "is_documented": 0}, {"strate_source": "H", "doc_source": "H2 Résistances Antimicrobiennes §II (Pression de sélection et agriculture)", "terme_source": "Pression de sélection", "strate_cible": "V", "doc_cible": "V1 La Faune du Sol §II (Nématodes, indice de maturité de Bongers)", "connexion": "L'indice de maturité de Bongers est un indicateur indirect de la pression de sélection exercée sur le sol : un indice bas (dominance de r-stratèges opportunistes) signale une pression chimique ou mécanique qui est aussi celle qui sélectionne les ARG. L'indice de Bongers pourrait donc servir de proxy terrain pour évaluer le risque AMR sans recourir au séquençage métagénomique.", "importance": "significative", "is_documented": 0}, {"strate_source": "P", "doc_source": "P5 La Transition", "terme_source": "Paradigme régénératif", "strate_cible": "H", "doc_cible": "H1 Sol, Alimentation et Santé Humaine", "connexion": "Les 4 phases de la transition (sevrage, restructuration, capitalisation, antifragilité) devraient avoir des corrélats mesurables en termes de densité nutritionnelle des récoltes. Phase 1 : baisse possible de rendement ET de qualité nutritionnelle (sol en stress). Phase 3-4 : augmentation de la densité nutritionnelle mesurable au réfractomètre Brix et en analyse minérale. Cette chronoséquence nutri", "importance": "significative", "is_documented": 0}, {"strate_source": "P", "doc_source": "P1 Diagnostic du Sol Vivant", "terme_source": "Indice de maturité de Bongers", "strate_cible": "F", "doc_cible": "F2 L'Économie du Vivant", "connexion": "L'indice de maturité de Bongers (nématodes) pourrait servir de proxy terrain pour estimer la valeur du capital biologique d'une parcelle. Un indice élevé (dominance de K-stratèges) corrèle avec un réseau trophique mature, un stockage de carbone stabilisé et des services écosystémiques fonctionnels — donc un capital biologique élevé. Ce lien entre un indicateur biologique de terrain et la valorisat", "importance": "significative", "is_documented": 0}, {"strate_source": "P", "doc_source": "P4 Agroforesterie et Systèmes Pérennes", "terme_source": "Agroforesterie et Bocage", "strate_cible": "V", "doc_cible": "V2 L'Holobionte Plante-Microbiome", "connexion": "Les arbres en agroforesterie ne fournissent pas seulement de l'hydraulic lift et du carbone racinaire : ils hébergent des endophytes et des réseaux mycorhiziens matures (stade fongique climacique) qui peuvent servir de réservoir de biodiversité microbienne pour recoloniser les cultures annuelles adjacentes via le CMN. L'arbre comme 'banque d'inoculum vivant permanent' pour l'holobionte des culture", "importance": "significative", "is_documented": 0}, {"strate_source": "P", "doc_source": "P2 Agriculture de Conservation", "terme_source": "Roulage-crimping", "strate_cible": "V", "doc_cible": "V1 La Faune du Sol", "connexion": "Le mulch créé par le roulage-crimping constitue l'habitat de surface essentiel pour les vers épigés et les microarthropodes détritivores (collemboles, acariens oribates). La qualité du crimping (degré d'écrasement, stade phénologique) détermine la vitesse de colonisation faunistique et donc la vitesse de décomposition des résidus. Cette connexion pratique culturale → habitat de la mésofaune est ab", "importance": "significative", "is_documented": 0}, {"strate_source": "P", "doc_source": "P3 Biostimulants et Fermentations Appliquées", "terme_source": "Jeevamrit / Biofertilisants fermentés", "strate_cible": "F", "doc_cible": "F1 Le Temps Long", "connexion": "Le Jeevamrit et les biofertilisants fermentés traditionnels sont des pratiques millénaires (Inde, Corée) qui constituent une lignée technique directe des fermentations ancestrales décrites en F1§V. Cette continuité historique entre les savoirs traditionnels et la réactivation des métabolismes archéens n'est pas formalisée.", "importance": "significative", "is_documented": 0}, {"strate_source": "P", "doc_source": "P4 Agroforesterie et Systèmes Pérennes §V (Pâturage tournant dynamique)", "terme_source": "Pâturage tournant dynamique", "strate_cible": "V", "doc_cible": "V2 L'Holobionte Plante-Microbiome §II (Rhizodéposition, SIREM)", "connexion": "Le broutage contrôlé du pâturage tournant dynamique provoque un pic de rhizodéposition compensatoire (la plante broutée injecte massivement des exsudats pour recruter des microbes et régénérer sa partie aérienne). Ce mécanisme est un cas extrême de SIREM où le stress de défoliation déclenche un recrutement microbien massif documenté indirectement par Hinsinger et al. (2016) et Rasse et al. (2005).", "importance": "significative", "is_documented": 0}, {"strate_source": "P", "doc_source": "P3 Biostimulants et Fermentations Appliquées §III (Enrobage de semences biologique)", "terme_source": "Enrobage de semences biologique", "strate_cible": "V", "doc_cible": "V2 L'Holobionte Plante-Microbiome §IV (Cycle de la rhizophagie)", "connexion": "L'enrobage biologique de semences (P3 §III) est le premier acte de constitution de l'holobionte : il fournit les bactéries endophytes qui entreront dans le cycle de rhizophagie dès la germination. Un enrobage chimique (fongicide systémique) détruit ce recrutement initial et retarde de plusieurs semaines l'établissement du cycle de rhizophagie décrit en V2 §IV.", "importance": "significative", "is_documented": 0}, {"strate_source": "P", "doc_source": "P1 Diagnostic du Sol Vivant §II (Test ficelle GEPPA)", "terme_source": "Test ficelle GEPPA", "strate_cible": "S", "doc_cible": "S1 Architecture du Sol §I (Fraction minérale, minéralogie des argiles)", "connexion": "Le test ficelle GEPPA fournit une estimation rapide de la texture qui doit être interprétée à la lumière de la minéralogie des argiles (illite, kaolinite, smectites) décrite en S1 §I. Un boudin cassant peut indiquer soit un sol sableux, soit un sol à kaolinite dominante — le levier agronomique est radicalement différent dans les deux cas.", "importance": "significative", "is_documented": 0}, {"strate_source": "P", "doc_source": "P2 Agriculture de Conservation §III (Design des couverts multi-espèces)", "terme_source": "Niche Partitioning", "strate_cible": "V", "doc_cible": "V1 La Faune du Sol §IV (Réseau trophique intégré)", "connexion": "La diversité racinaire des couverts multi-espèces (niche partitioning spatial et temporel) structure directement la diversité du réseau trophique souterrain : chaque type d'exsudat alimente une guilde bactérienne spécifique, qui à son tour nourrit des nématodes bactérivores, des protozoaires et des collemboles distincts. Le design du couvert en P2 est donc le levier direct de la complexité trophiq", "importance": "significative", "is_documented": 0}, {"strate_source": "P", "doc_source": "P5 La Transition", "terme_source": "Antifragilité", "strate_cible": "S", "doc_cible": "S2 Le Microbiome du Sol", "connexion": "L'antifragilité comme horizon de la transition (P5) repose sur la diversité microbienne mesurée par l'indice Chao1 et la richesse des guildes fonctionnelles (S2). Mais le lien quantitatif entre seuil de diversité microbienne et émergence de propriétés antifragiles (amélioration après stress) n'est formalisé nulle part.", "importance": "significative", "is_documented": 0}, {"strate_source": "P", "doc_source": "P2 Agriculture de Conservation", "terme_source": "Couverts végétaux multi-espèces", "strate_cible": "S", "doc_cible": "S4 Le Carbone et les Grands Cycles", "connexion": "La diversité végétale des couverts augmente mécaniquement la CUE (Efficience d'Utilisation du Carbone) selon Domeignoz-Horta et al. 2024. Le design des couverts (P2) et le flux de carbone via la pompe microbienne (S4) sont deux faces du même processus, mais la connexion quantitative entre nombre d'espèces du couvert et CUE mesurée n'est pas formalisée.", "importance": "significative", "is_documented": 0}, {"strate_source": "S", "doc_source": "S4 Le Carbone et les Grands Cycles", "terme_source": "Priming Effect", "strate_cible": "V", "doc_cible": "V1 La Faune du Sol", "connexion": "Le priming effect n'est pas uniquement microbien : la mésofaune (collemboles, acariens) qui broute sélectivement les champignons saprotrophes libère des nutriments séquestrés dans les hyphes, ce qui peut amplifier ou moduler le priming effect. Un réseau trophique complet avec prédateurs (nématodes fongivores, microarthropodes) régule la vitesse de minéralisation et peut freiner un priming excessif", "importance": "significative", "is_documented": 0}, {"strate_source": "S", "doc_source": "S1 Architecture du Sol", "terme_source": "Complexe Argilo-Humique", "strate_cible": "H", "doc_cible": "H1 Sol, Alimentation et Santé Humaine", "connexion": "La CEC du complexe argilo-humique détermine la disponibilité des cations nutritifs (Ca²⁺, Mg²⁺, K⁺, Zn²⁺) pour la plante et donc leur concentration dans l'aliment. Un CAH dégradé (pH acide, ponts calciques rompus) libère préférentiellement Al³⁺ et Mn²⁺ (toxiques) au détriment des cations essentiels, ce qui impacte directement la qualité minérale de l'aliment. Cette connexion CAH → composition miné", "importance": "significative", "is_documented": 0}, {"strate_source": "S", "doc_source": "S1 Architecture du Sol", "terme_source": "Hystérésis hydrique", "strate_cible": "H", "doc_cible": "H1 Sol, Alimentation et Santé Humaine", "connexion": "L'hystérésis hydrique réduit la disponibilité en eau pour les plantes, ce qui diminue la turgescence cellulaire et la dilution des solutés dans les tissus végétaux. En période de stress hydrique modéré (hormèse), la plante concentre ses métabolites secondaires (polyphénols, terpènes), augmentant la densité nutritionnelle. Mais un stress sévère (hystérésis irréversible) effondre la photosynthèse et", "importance": "significative", "is_documented": 0}, {"strate_source": "S", "doc_source": "S2 Le Microbiome du Sol", "terme_source": "Biofilms", "strate_cible": "H", "doc_cible": "H2 Résistances Antimicrobiennes", "connexion": "Les biofilms bactériens dans le sol constituent des foyers de transfert horizontal de gènes (THG) à haute fréquence, car la proximité physique des cellules dans la matrice extracellulaire favorise la conjugaison. Les biofilms sont simultanément des stabilisateurs structuraux bénéfiques (S2) et des points chauds potentiels de dissémination d'ARG (H2).", "importance": "significative", "is_documented": 0}, {"strate_source": "S", "doc_source": "S1 Architecture du Sol", "terme_source": "Surface spécifique", "strate_cible": "S", "doc_cible": "S2 Le Microbiome du Sol", "connexion": "La surface spécifique des argiles et de l'humus détermine directement la capacité d'hébergement microbien. Un sol sableux (faible surface spécifique) ne peut accueillir une diversité microbienne élevée sans augmentation de la matière organique. Ce lien physique-biologique entre S1 et S2 n'est pas formalisé.", "importance": "significative", "is_documented": 0}, {"strate_source": "S", "doc_source": "S1 Architecture du Sol §II (CEC et complexe argilo-humique)", "terme_source": "Capacité d'Échange Cationique", "strate_cible": "H", "doc_cible": "H1 Sol, Alimentation et Santé Humaine §I (Densité nutritionnelle)", "connexion": "La CEC détermine la disponibilité en cations essentiels (Ca²⁺, Mg²⁺, K⁺, Zn²⁺) dans la solution du sol. Un sol à faible CEC ne peut pas fournir les oligoéléments nécessaires à la biofortification biologique, même avec un microbiome actif. La CEC est donc une condition limite physico-chimique de la densité nutritionnelle documentée en H1.", "importance": "significative", "is_documented": 0}, {"strate_source": "S", "doc_source": "S2 Le Microbiome du Sol §IV (Suppressivité et immunité du sol)", "terme_source": "Quorum Sensing", "strate_cible": "V", "doc_cible": "V3 Les Fermentations Microbiennes §IV (Bokashi, EM et succession microbienne)", "connexion": "La suppressivité repose en partie sur la saturation de l'environnement en signaux contradictoires (quorum quenching) qui empêchent les pathogènes de coordonner leur attaque (Vivant, 2014; Cohen-Loro, 2020). Les métabolites du Bokashi (acides organiques, PLA) interfèrent directement avec le quorum sensing des pathogènes Gram-négatifs, constituant un mécanisme de suppressivité chimique complémentair", "importance": "significative", "is_documented": 0}, {"strate_source": "S", "doc_source": "S4 Le Carbone et les Grands Cycles §III (Cycle du phosphore)", "terme_source": "Oxydes Fe/Al", "strate_cible": "V", "doc_cible": "V2 L'Holobionte Plante-Microbiome §V (LCO, hormones et volatils microbiens)", "connexion": "Les bactéries solubilisatrices de phosphore (PSB) sécrètent des acides organiques qui décrochent le P fixé sur les oxydes Fe/Al (S4 §III). Mais cette solubilisation est déclenchée par les exsudats racinaires (strigolactones, acides organiques) via le SIREM (V2 §II). Le couplage redox-biologique entre oxydes Fe/Al et recrutement microbien est une connexion S4↔V2 non documentée dans les renvois exis", "importance": "significative", "is_documented": 0}, {"strate_source": "S", "doc_source": "S3 Le Microbiome Fongique et Mycorhizien", "terme_source": "CMN (Common Mycorrhizal Network)", "strate_cible": "H", "doc_cible": "H1 Sol, Alimentation et Santé Humaine", "connexion": "Les CMN transfèrent non seulement C, N et eau entre plantes mais aussi des nutriments minéraux (P, Zn, Cu) via les hyphes mycorhiziens. La densité nutritionnelle des aliments (H1) dépend donc directement de l'intégrité des réseaux mycorhiziens. Cette connexion entre CMN et qualité nutritionnelle n'est documentée dans aucun document.", "importance": "significative", "is_documented": 0}, {"strate_source": "S", "doc_source": "S2 Le Microbiome du Sol", "terme_source": "Stœchiométrie de Kirkby C:N:P:S", "strate_cible": "P", "doc_cible": "P2 Agriculture de Conservation", "connexion": "Le ratio C:N:P:S (10000:833:200:143) est le verrou stœchiométrique de la formation d'humus (S2). Le design des couverts végétaux (P2) doit respecter le C/N pour éviter la faim d'azote. Mais la stœchiométrie complète incluant P et S n'est pas intégrée dans les recommandations pratiques de P2, qui se limite souvent au seul ratio C/N.", "importance": "significative", "is_documented": 0}, {"strate_source": "S", "doc_source": "S3 Le Microbiome Fongique et Mycorhizien", "terme_source": "GRSP (glomaline)", "strate_cible": "S", "doc_cible": "S1 Architecture du Sol", "connexion": "La glomaline (GRSP) produite par les CMA est décrite dans S3 comme ciment des agrégats, mais S1 (Architecture du Sol) traite la structure physique sans mentionner explicitement la glomaline comme facteur d'agrégation. S1 décrit le support physique sans biologie, mais les biofilms et la glomaline sont les colles qui font la transition entre la physique (S1) et la biologie (S3). Cette interface n'est pas documentée.", "importance": "significative", "is_documented": 0}, {"strate_source": "S", "doc_source": "S4 Le Carbone et les Grands Cycles", "terme_source": "Potentiel redox Eh/pH", "strate_cible": "V", "doc_cible": "V3 Les Fermentations Microbiennes", "connexion": "La thermodynamique des fermentations (Delta G, conservation du C et du N) repose directement sur les conditions redox du milieu. Le diagramme Eh-pH de S4 prédit quelles voies métaboliques (aérobies vs fermentatives) sont thermodynamiquement favorables. V3 décrit les fermentations comme conservation énergétique mais ne renvoie pas au cadre redox de S4 qui fournit le fondement physico-chimique de cette conservation.", "importance": "significative", "is_documented": 0}, {"strate_source": "V", "doc_source": "V2 L'Holobionte Plante-Microbiome", "terme_source": "LCO (Lipochitooligosaccharides / Facteurs Myc)", "strate_cible": "H", "doc_cible": "H1 Sol, Alimentation et Santé Humaine", "connexion": "Les LCO activent la voie de signalisation de symbiose commune chez la plante, ce qui déclenche non seulement la mycorhization mais aussi une reprogrammation métabolique globale incluant la production accrue de flavonoïdes et d'isoflavonoïdes. Ces molécules se retrouvent dans les graines et les fruits, où elles constituent des facteurs anti-inflammatoires majeurs pour le consommateur. Le lien LCO →", "importance": "significative", "is_documented": 0}, {"strate_source": "V", "doc_source": "V2 L'Holobionte Plante-Microbiome", "terme_source": "Endophytes", "strate_cible": "P", "doc_cible": "P3 Biostimulants et Fermentations Appliquées", "connexion": "Les endophytes présents dans les semences (transmission verticale) sont détruits par les traitements de semences conventionnels (fongicides systémiques). Les inoculums fermentés (JMS, LiFoFer) appliqués en enrobage de semences biologique peuvent partiellement compenser cette perte, mais ne restaurent pas la transmission verticale mère-semence. Cette distinction entre endophytes hérités et endophyt", "importance": "significative", "is_documented": 0}, {"strate_source": "V", "doc_source": "V3 Les Fermentations Microbiennes", "terme_source": "Fermentations anaérobies (Lactiques / JADAM)", "strate_cible": "F", "doc_cible": "F2 L'Économie du Vivant", "connexion": "Le coût de production des biostimulants fermentés (bokashi, JMS, LiFoFer, Jeevamrit) est quasi nul (matières premières locales, pas d'énergie fossile) par rapport aux intrants de synthèse. L'EROI des fermentations à la ferme est potentiellement >100:1 (énergie métabolique microbienne / énergie investie), ce qui en fait le levier avec le meilleur ratio énergétique du système agricole. Ce calcul d'E", "importance": "significative", "is_documented": 0}, {"strate_source": "V", "doc_source": "V2 L'Holobionte Plante-Microbiome", "terme_source": "Hormèse", "strate_cible": "P", "doc_cible": "P2 Agriculture de Conservation", "connexion": "L'hormèse (stress modéré → stimulation des défenses) est le mécanisme par lequel le roulage-crimping au bon stade ou le pâturage tournant dynamique stimulent les symbioses microbiennes. Ce lien entre le concept biologique V2 et les pratiques P2 n'est pas formalisé.", "importance": "significative", "is_documented": 0}, {"strate_source": "V", "doc_source": "V1 La Faune du Sol", "terme_source": "Vers de terre", "strate_cible": "H", "doc_cible": "H1 Sol, Alimentation et Santé Humaine", "connexion": "Les turricules de vers de terre concentrent les nutriments biodisponibles (Zn, P, N-NH4) à des taux 2 à 10× supérieurs au sol environnant. Ce mécanisme de bioconcentration par la faune du sol est un levier direct de densité nutritionnelle des aliments non mentionné dans la chaîne V1→H1.", "importance": "significative", "is_documented": 0}, {"strate_source": "V", "doc_source": "V2 L'Holobionte Plante-Microbiome §III (ISR/SAR et polyphénols)", "terme_source": "Hormèse", "strate_cible": "P", "doc_cible": "P2 Agriculture de Conservation §V (Impact sur la santé humaine)", "connexion": "L'hormèse (stress modéré stimulant les défenses) est le mécanisme qui explique pourquoi les plantes en ACS, soumises à des stress modérés (compétition en couverts multi-espèces, micro-broutage par la mésofaune), produisent davantage de polyphénols et de flavonoïdes que les plantes en culture intensive irriguée et fertilisée. La connexion hormèse→ISR/SAR→densité nutritionnelle est le mécanisme biol", "importance": "significative", "is_documented": 0}, {"strate_source": "V", "doc_source": "V1 La Faune du Sol", "terme_source": "Vers de terre anéciques", "strate_cible": "S", "doc_cible": "S1 Architecture du Sol", "connexion": "Les vers de terre anéciques sont les principaux ingénieurs de la macroporosité biologique (galeries verticales) décrite dans S1. Mais S1 ne traite que la physique du sol sans biologie, et V1 traite la faune sans formaliser l'impact quantitatif sur la conductivité hydraulique et la structure physique. Le concept de bio-tillage (Zhang & Peng 2020) constitue le pont manquant.", "importance": "significative", "is_documented": 0}, {"strate_source": "P", "doc_source": "P2 Agriculture de Conservation", "terme_source": "Biopuncture", "strate_cible": "S", "doc_cible": "S4 Le Carbone et les Grands Cycles", "connexion": "Les macropores créés par la biopuncture (radis daikon, mélilot) sont tapissés de carbone organique (exsudats, racines mortes) qui forment des microsites privilégiés de stockage de carbone (MAOM). La biopuncture est un levier de séquestration de carbone en profondeur non documenté entre P2 et S4.", "importance": "interessante", "is_documented": 0}, {"strate_source": "P", "doc_source": "P1 Diagnostic du Sol Vivant", "terme_source": "Diagramme Eh-pH", "strate_cible": "V", "doc_cible": "V1 La Faune du Sol", "connexion": "Les conditions redox (Eh) du sol déterminent la survie des différentes guildes de nématodes et la structure du réseau trophique. Un sol engorgé (faible Eh) élimine les prédateurs aérobies et favorise les herbivores opportunistes. Ce diagnostic Eh-pH devrait être croisé avec l'indice de maturité de Bongers pour un diagnostic intégré.", "importance": "interessante", "is_documented": 0}, {"strate_source": "P", "doc_source": "P1 Diagnostic du Sol Vivant", "terme_source": "Score VESS", "strate_cible": "F", "doc_cible": "F2 L'Économie du Vivant", "connexion": "Le score VESS et les analyses PLFA (P1) sont des indicateurs de performance mais ne sont pas traduits en indicateurs économiques dans F2. Le capital biologique comme actif de bilan nécessite une conversion des scores biologiques en valeur monétaire (ex: chaque point VESS gagné = X€/ha de réduction de charges), connexion absente.", "importance": "interessante", "is_documented": 0}, {"strate_source": "P", "doc_source": "P4 Agroforesterie et Systèmes Pérennes", "terme_source": "Hydraulic lift", "strate_cible": "S", "doc_cible": "S4 Le Carbone et les Grands Cycles", "connexion": "L'hydraulic lift redistribue l'eau des horizons profonds vers la surface via les racines des arbres la nuit. Ce flux d'eau modifie localement le potentiel redox (Eh) des microsites de surface, influençant la disponibilité du phosphore et du fer (diagramme Eh-pH). L'impact de l'hydraulic lift agroforestier sur les conditions redox et les cycles biogéochimiques couplés n'est documenté dans aucun document.", "importance": "interessante", "is_documented": 0}, {"strate_source": "S", "doc_source": "S4 Le Carbone et les Grands Cycles", "terme_source": "Diagramme Eh-pH", "strate_cible": "V", "doc_cible": "V1 La Faune du Sol", "connexion": "Les conditions redox (Eh) dans les microsites anoxiques déterminent la spéciation chimique des métaux (Fe²⁺/Fe³⁺, Mn²⁺/Mn⁴⁺) qui à leur tour affectent la toxicité pour la mésofaune. Les vers de terre anéciques, en créant des galeries ventilées, modifient le gradient Eh local et peuvent transformer des microsites toxiques (Mn²⁺ en excès) en microsites habitables. Ce rôle d'ingénierie redox de la ma", "importance": "interessante", "is_documented": 0}, {"strate_source": "S", "doc_source": "S3 Le Microbiome Fongique et Mycorhizien", "terme_source": "Réseau Mycorhizien", "strate_cible": "H", "doc_cible": "H2 Résistances Antimicrobiennes", "connexion": "Les réseaux mycorhiziens (CMN) transportent non seulement des nutriments et de l'eau, mais aussi des molécules de signalisation et potentiellement des éléments génétiques mobiles entre plantes connectées. Un CMN intact pourrait diluer la concentration locale d'ARG en redistribuant les populations microbiennes sur un plus grand volume de sol, réduisant les points chauds de transfert horizontal. Cet", "importance": "interessante", "is_documented": 0}, {"strate_source": "S", "doc_source": "S3 Le Microbiome Fongique et Mycorhizien", "terme_source": "LCO (Lipochitooligosaccharides / Facteurs Myc)", "strate_cible": "H", "doc_cible": "H1 Sol, Alimentation et Santé Humaine", "connexion": "Les LCO qui déclenchent la symbiose mycorhizienne sont structurellement proches de la chitine et des chitooligosaccharides utilisés comme prébiotiques intestinaux. La signalisation moléculaire de la symbiose sol-plante a des implications directes sur la santé intestinale via les mêmes familles de molécules.", "importance": "interessante", "is_documented": 0}, {"strate_source": "V", "doc_source": "V3 Les Fermentations Microbiennes", "terme_source": "Acide 3-phényllactique", "strate_cible": "V", "doc_cible": "V2 L'Holobionte Plante-Microbiome", "connexion": "L'acide 3-phényllactique produit par les bactéries lactiques dans le Bokashi (V3, Jaffar et al. 2023, Maki et al. 2021) est un promoteur de l'enracinement latéral. Ce métabolite agit sur la plante via des voies hormonales (auxine-like) qui relèvent de l'orchestration hormonale décrite dans V2. Le métabolite fermentaire et la réponse de l'holobionte ne sont pas connectés.", "importance": "interessante", "is_documented": 0}, {"strate_source": "F", "doc_source": "F1 Le Temps Long", "terme_source": "Succession Écologique", "strate_cible": "H", "doc_cible": "H3 Le Microbiome Global", "connexion": "La succession écologique du sol (stade pionnier bactérien → stade climacique fongique) a un parallèle direct dans la maturation du microbiome intestinal humain (stade néonatal dominé par Bifidobacterium → stade adulte diversifié Firmicutes/Bacteroidetes). L'agriculture qui maintient le sol en stade pionnier bactérien produit des aliments qui favorisent un microbiome intestinal immature. Cette homo", "importance": "critique", "is_documented": 0}, {"strate_source": "F", "doc_source": "F2 L'Économie du Vivant", "terme_source": "EROI", "strate_cible": "H", "doc_cible": "H1 Sol, Alimentation et Santé Humaine", "connexion": "L'EROI conventionnel ne mesure que les calories alimentaires produites par calorie fossile investie. Il faudrait un 'EROI nutritionnel' intégrant la densité en micronutriments et en phytochimiques par unité d'énergie investie. Un système régénératif avec un rendement brut inférieur mais une densité nutritionnelle supérieure pourrait avoir un EROI nutritionnel supérieur au conventionnel. Ce concept", "importance": "critique", "is_documented": 0}, {"strate_source": "F", "doc_source": "F1 Le Temps Long", "terme_source": "Néguentropie", "strate_cible": "H", "doc_cible": "H3 Le Microbiome Global", "connexion": "La néguentropie (création d'ordre biologique à partir de l'énergie solaire) s'applique au continuum sol-plante-intestin : le sol vivant crée de l'organisation moléculaire complexe (humus, métabolites), la plante la concentre (phytochimie fonctionnelle), et le microbiome intestinal la transforme en signaux métaboliques ordonnés (SCFA, neurotransmetteurs). L'agriculture industrielle augmente l'entro", "importance": "critique", "is_documented": 0}, {"strate_source": "F", "doc_source": "F2 L'Économie du Vivant §I (EROI, Haber-Bosch)", "terme_source": "Procédé Haber-Bosch", "strate_cible": "P", "doc_cible": "P2 Agriculture de Conservation §IV (Rotations, 30-40% légumineuses)", "connexion": "Le calcul de l'EROI de la ferme (F2) doit inclure la quantification de l'azote fixé biologiquement par les légumineuses des rotations (P2 §IV). Chaque kg de N fixé par les légumineuses remplace l'équivalent de 1,5 litre de pétrole consommé par le procédé Haber-Bosch. La boucle F2→P2 est le fondement du calcul du gain EROI de la transition.", "importance": "critique", "is_documented": 0}, {"strate_source": "F", "doc_source": "F1 Le Temps Long §III (Anaérobiose universelle dans le vivant actuel)", "terme_source": "Microsites", "strate_cible": "H", "doc_cible": "H3 Le Microbiome Global §I (Convergence des microbiomes)", "connexion": "Les microsites anoxiques du sol actuel (F1 §III, S4 §II) et le microbiome intestinal humain (H3) partagent les mêmes conditions anaérobies et les mêmes phyla dominants (Firmicutes, Bacteroidetes). La convergence des microbiomes documentée par Ma et al. (2025) s'explique par la conservation des mêmes niches physicochimiques (Eh bas, pH neutre, absence d'O2) depuis 3,8 Ga. Ce pont F1→H3 est le fonde", "importance": "critique", "is_documented": 0}, {"strate_source": "H", "doc_source": "H2 Résistances Antimicrobiennes", "terme_source": "AMR et ARG", "strate_cible": "V", "doc_cible": "V3 Les Fermentations Microbiennes", "connexion": "Les fermentations à la ferme (bokashi, EM, JMS) impliquent des communautés microbiennes complexes qui pourraient théoriquement servir de vecteurs de THG (transfert horizontal de gènes) si les substrats contiennent des résidus d'antibiotiques ou de métaux lourds (fumiers traités). Le renvoi P3→H2 est identifié mais le mécanisme spécifique du risque ARG dans les fermentations LAB n'est pas détaillé.", "importance": "critique", "is_documented": 0}, {"strate_source": "H", "doc_source": "H1 Sol, Alimentation et Santé Humaine", "terme_source": "L'Effet de Dilution", "strate_cible": "V", "doc_cible": "V2 L'Holobionte Plante-Microbiome", "connexion": "L'effet de dilution est mécanistiquement lié à la rupture de la symbiose holobionte : une plante gavée d'azote soluble réduit ses exsudats (SIREM), perd ses mycorhizes, et ne peut plus extraire les oligoéléments du sol. La dilution nutritionnelle n'est pas un simple effet volumique mais un effondrement du système holobionte. Ce lien mécaniste H1→V2 n'est pas formalisé.", "importance": "critique", "is_documented": 0}, {"strate_source": "H", "doc_source": "H1 Sol, Alimentation et Santé Humaine §IV (Chaîne de dégradation C2)", "terme_source": "L'Effet de Dilution", "strate_cible": "F", "doc_cible": "F2 L'Économie du Vivant §II (Externalités invisibles)", "connexion": "L'effet de dilution (Rosier et al. 2025) est une externalité sanitaire non comptabilisée : la perte de densité nutritionnelle induite par la fertilisation azotée intensive génère un coût de santé publique (carences en Zn, Fe, Mg → maladies chroniques) qui n'apparaît dans aucun bilan d'exploitation. C'est le chaînon manquant entre les externalités de F2 et la chaîne de dégradation C2 documentée en ", "importance": "critique", "is_documented": 0}, {"strate_source": "H", "doc_source": "H3 Le Microbiome Global §II (Continuum sol-plante-intestin)", "terme_source": "Co-évolution sol-microbiome-humain", "strate_cible": "V", "doc_cible": "V3 Les Fermentations Microbiennes §IV (Bokashi, EM et succession microbienne)", "connexion": "Les aliments fermentés (kimchi, kéfir, miso) réintroduisent dans l'intestin des consortia microbiens dont les voies métaboliques (fermentation lactique, acétique) sont homologues à celles des fermentations du sol (Bokashi, EM). La co-évolution sol-microbiome-humain de Ma et al. (2025) et Rosier et al. (2025) implique que ces voies conservées depuis l'Archéen constituent le pont fonctionnel entre m", "importance": "critique", "is_documented": 0}, {"strate_source": "H", "doc_source": "H2 Résistances Antimicrobiennes", "terme_source": "ARG / Transfert Horizontal de Gènes", "strate_cible": "P", "doc_cible": "P3 Biostimulants et Fermentations Appliquées", "connexion": "Les fermentations appliquées introduisent des consortia microbiens exogènes dans le sol. Le risque de transfert horizontal de gènes de résistance aux antibiotiques (THG) via ces inoculums n'est pas évalué dans P3. H2 traite la vigilance ARG mais ne mentionne pas spécifiquement le risque lié aux biostimulants fermentés comme vecteur potentiel.", "importance": "critique", "is_documented": 0}, {"strate_source": "P", "doc_source": "P3 Biostimulants et Fermentations Appliquées", "terme_source": "Acide 3-Phényllactique", "strate_cible": "H", "doc_cible": "H3 Le Microbiome Global", "connexion": "L'acide 3-phényllactique (PLA) produit par les LAB dans le bokashi est structurellement et fonctionnellement identique au PLA produit par les Lactobacillus intestinaux. Ce métabolite exerce une activité antifongique dans le sol (suppressivité) ET dans l'intestin (protection contre Candida). Cette homologie fonctionnelle sol-intestin via un même métabolite fermentaire est un argument puissant pour ", "importance": "critique", "is_documented": 0}, {"strate_source": "P", "doc_source": "P5 La Transition", "terme_source": "Paradigme régénératif", "strate_cible": "H", "doc_cible": "H1 Sol, Alimentation et Santé Humaine", "connexion": "La chronoséquence de transition en 4 phases (P5) devrait être mise en parallèle avec une trajectoire de restauration de la densité nutritionnelle des aliments (H1). Le gain de +0,1% MO/an devrait être corrélé à un gain mesurable en micronutriments dans les récoltes.", "importance": "critique", "is_documented": 0}, {"strate_source": "P", "doc_source": "P5 La Transition §II (Chronoséquence 4 phases)", "terme_source": "Succession Écologique", "strate_cible": "S", "doc_cible": "S3 Le Microbiome Fongique et Mycorhizien §IV (Ratio F/B et succession fongique)", "connexion": "Les 4 phases de la chronoséquence de transition (Madarász 2025) correspondent directement à la trajectoire du ratio F/B mesuré par PLFA : Phase 1 Sevrage (F/B <0,3), Phase 2 Redémarrage (F/B 0,3-0,8), Phase 3 Consolidation (F/B 0,8-2,0), Phase 4 Antifragilité (F/B >2,0). Le ratio F/B est donc l'indicateur biologique de positionnement sur la chronoséquence économique.", "importance": "critique", "is_documented": 0}, {"strate_source": "S", "doc_source": "S2 Le Microbiome du Sol", "terme_source": "Oligotrophes", "strate_cible": "H", "doc_cible": "H3 Le Microbiome Global", "connexion": "La dichotomie copiotrophes/oligotrophes du sol est homologue à la dichotomie Bacteroidetes (dégradeurs rapides de polysaccharides simples) / Firmicutes producteurs de butyrate (dégradeurs lents de fibres complexes) dans l'intestin. Un sol dominé par les copiotrophes (excès d'azote soluble) produit des aliments pauvres en fibres complexes qui, à leur tour, favorisent les espèces copiotrophes intest", "importance": "critique", "is_documented": 0}, {"strate_source": "S", "doc_source": "S4 Le Carbone et les Grands Cycles", "terme_source": "Priming Effect", "strate_cible": "V", "doc_cible": "V3 Les Fermentations Microbiennes", "connexion": "Le risque de priming effect est identifié dans les renvois croisés P3→S4, mais le lien inverse manque : V3 devrait explicitement documenter les conditions dans lesquelles un bokashi (riche en carbone labile) peut provoquer un priming effect destructeur sur l'humus stable, et comment la maturation du bokashi (phase 4 : humification) atténue ce risque.", "importance": "critique", "is_documented": 0}, {"strate_source": "S", "doc_source": "S2 Le Microbiome du Sol", "terme_source": "Oligotrophes", "strate_cible": "F", "doc_cible": "F2 L'Économie du Vivant", "connexion": "Le ratio copiotrophes/oligotrophes est un indicateur économique déguisé : un sol dominé par les copiotrophes (induit par l'excès d'engrais solubles) consomme son capital humique plus vite qu'il ne le reconstitue, ce qui traduit une faillite biologique anticipable. Ce lien entre la dynamique microbienne S2 et le concept de capital biologique F2 n'est pas formalisé.", "importance": "critique", "is_documented": 0}, {"strate_source": "S", "doc_source": "S1 Architecture du Sol", "terme_source": "Hystérésis hydrique", "strate_cible": "P", "doc_cible": "P2 Agriculture de Conservation", "connexion": "Le maintien d'un mulch permanent (pilier ACS) est le levier direct pour éviter le point de non-retour hydrophobe décrit par l'hystérésis hydrique. Le glossaire mentionne ce lien mais aucun renvoi croisé ne le formalise entre S1 et P2.", "importance": "critique", "is_documented": 0}, {"strate_source": "S", "doc_source": "S4 Le Carbone et les Grands Cycles §IV (Priming Effect)", "terme_source": "Priming Effect", "strate_cible": "P", "doc_cible": "P5 La Transition §II (Chronoséquence, Phase 1 Sevrage)", "connexion": "Le risque de Priming Effect est maximal en Phase 1 de la transition (sevrage), lorsque l'agriculteur commence à apporter des matières organiques fraîches sur un sol encore riche en COS ancien mais biologiquement appauvri. L'absence de diversité microbienne empêche la régulation du priming. Cet avertissement doit figurer explicitement dans P5 §II, avec renvoi vers S4 §IV et P3 §IV.", "importance": "critique", "is_documented": 0}, {"strate_source": "S", "doc_source": "S2 Le Microbiome du Sol §III (Nécromasse microbienne, CUE)", "terme_source": "Minéralisation Secondaire", "strate_cible": "F", "doc_cible": "F2 L'Économie du Vivant §III (Capital biologique comme actif de bilan)", "connexion": "Le coefficient k2 (vitesse de minéralisation secondaire de l'humus stable, Balesdent & Recous 1997) est l'équivalent biologique du taux de dépréciation d'un actif comptable. Un k2 élevé (labour intensif) = dépréciation accélérée du capital biologique. Ce lien manque pour fonder économiquement la notion de capital biologique sur un paramètre biogéochimique mesurable.", "importance": "critique", "is_documented": 0}, {"strate_source": "S", "doc_source": "S1 Architecture du Sol", "terme_source": "Hystérésis hydrique", "strate_cible": "P", "doc_cible": "P4 Agroforesterie et Systèmes Pérennes §II (Hydraulic lift)", "connexion": "L'hydraulic lift nocturne des arbres profonds est le mécanisme naturel qui prévient le franchissement du seuil d'hystérésis hydrique dans les horizons de surface. Un sol agroforestier évite le point de non-retour hydrophobe grâce à la redistribution hydraulique permanente.", "importance": "critique", "is_documented": 0}, {"strate_source": "S", "doc_source": "S4 Le Carbone et les Grands Cycles", "terme_source": "Priming Effect", "strate_cible": "P", "doc_cible": "P3 Biostimulants et Fermentations Appliquées", "connexion": "L'apport de carbone labile via les biostimulants fermentés peut déclencher un Priming Effect négatif (déstockage de carbone humique). Ce risque est documenté dans S4 (Cardinael et al. 2016) mais n'est pas mentionné dans P3 comme précaution lors de l'application de préparations riches en sucres simples.", "importance": "critique", "is_documented": 0}, {"strate_source": "S", "doc_source": "S2 Le Microbiome du Sol", "terme_source": "Ratio F/B (Fungi/Bacteria)", "strate_cible": "P", "doc_cible": "P3 Biostimulants et Fermentations Appliquées", "connexion": "Les fermentations lactiques (Bokashi, EM) introduisent majoritairement des bactéries (Lactobacillus, levures) et tendent à favoriser la composante bactérienne du microbiome. Or la succession écologique vers un sol fongique stable (décrite dans le glossaire sous Succession Écologique) exige un ratio F/B croissant. L'impact des biostimulants fermentés sur l'équilibre F/B et la trajectoire de succession écologique du sol n'est jamais discuté dans P3.", "importance": "critique", "is_documented": 0}, {"strate_source": "S", "doc_source": "S4 Le Carbone et les Grands Cycles", "terme_source": "Nécromasse microbienne", "strate_cible": "H", "doc_cible": "H1 Sol, Alimentation et Santé Humaine", "connexion": "La nécromasse microbienne (jusqu'à 80% du carbone stable du sol) constitue la matrice dans laquelle se forment les complexes organo-minéraux qui déterminent la biodisponibilité des minéraux (Fe, Zn, Se) absorbés par les plantes et qui conditionnent directement la densité nutritionnelle des aliments. Le turnover microbien qui génère cette nécromasse produit également les vitamines du complexe B mentionnées en H1 mais sans que le mécanisme de synthèse microbienne soit relié au flux de carbone qui le sous-tend.", "importance": "critique", "is_documented": 0}, {"strate_source": "V", "doc_source": "V1 La Faune du Sol", "terme_source": "Vers de terre", "strate_cible": "S", "doc_cible": "S4 Le Carbone et les Grands Cycles", "connexion": "Les vers de terre anéciques ingèrent et mélangent matière organique de surface et argiles profondes dans leur intestin, produisant des turricules dont le ratio MAOM/POC est significativement supérieur à celui du sol environnant. Le transit intestinal du ver (pH alcalin, mucus riche en polysaccharides) favorise la formation de complexes organo-minéraux stables. Ce mécanisme de 'pompe à MAOM' par le", "importance": "critique", "is_documented": 0}, {"strate_source": "V", "doc_source": "V2 L'Holobionte Plante-Microbiome", "terme_source": "Quorum Sensing", "strate_cible": "H", "doc_cible": "H2 Résistances Antimicrobiennes", "connexion": "Le quorum sensing des pathogènes du sol (coordination d'attaque à seuil de population critique) est un mécanisme directement homologue à celui des pathogènes intestinaux (ex: Pseudomonas aeruginosa, Vibrio cholerae). La diversité microbienne du sol qui brouille le quorum sensing tellurique constitue un modèle prédictif pour comprendre comment la diversité du microbiote intestinal empêche la coordi", "importance": "critique", "is_documented": 0}, {"strate_source": "V", "doc_source": "V2 L'Holobionte Plante-Microbiome", "terme_source": "Elicitation par les débris microbiens", "strate_cible": "H", "doc_cible": "H3 Le Microbiome Global", "connexion": "L'élicitation par les fragments de parois microbiennes (chitine, flagelline, peptidoglycane) est homologue au mécanisme immunitaire intestinal (PAMP recognition via TLR). L'entraînement immunitaire de la plante par les débris microbiens du sol est structurellement identique à l'entraînement immunitaire de l'intestin humain. Ce parallélisme fondamental n'est pas formalisé.", "importance": "critique", "is_documented": 0}, {"strate_source": "V", "doc_source": "V3 Les Fermentations Microbiennes", "terme_source": "Fermentations anaérobies (Lactiques / JADAM)", "strate_cible": "H", "doc_cible": "H3 Le Microbiome Global", "connexion": "Les voies fermentaires lactiques du bokashi (Lactobacillus, Leuconostoc) sont homologues aux voies fermentaires des mêmes genres dans le côlon humain, produisant les mêmes SCFA (butyrate, propionate, acétate). Cette homologie métabolique sol-intestin est l'argument central de la co-évolution mais n'est pas formalisée comme renvoi entre V3 et H3.", "importance": "critique", "is_documented": 0}, {"strate_source": "V", "doc_source": "V2 L'Holobionte Plante-Microbiome", "terme_source": "Quorum Sensing", "strate_cible": "H", "doc_cible": "H2 Résistances Antimicrobiennes", "connexion": "Le quorum sensing est le mécanisme par lequel les pathogènes coordonnent leur attaque. Les concentrations sublétales d'antibiotiques/fongicides modifient les seuils de quorum, favorisant l'expression des ARG. Cette connexion quorum sensing → pression de sélection ARG manque entre V2 et H2.", "importance": "critique", "is_documented": 0}, {"strate_source": "V", "doc_source": "V1 La Faune du Sol §III (Collemboles et acariens oribates)", "terme_source": "Phagie microbienne", "strate_cible": "S", "doc_cible": "S2 Le Microbiome du Sol §III (Nécromasse microbienne, turnover)", "connexion": "Le broutage des champignons par les collemboles et des bactéries par les protozoaires est le moteur principal du turnover microbien qui génère la nécromasse — source de 80% du C stable (Zhu 2020). Sans prédation par la mésofaune (V1), le turnover ralentit et la pompe microbienne à carbone (S2 §III) perd en efficacité. La phagie microbienne est donc un prérequis de la séquestration du carbone.", "importance": "critique", "is_documented": 0}, {"strate_source": "V", "doc_source": "V3 Les Fermentations Microbiennes §II (Thermodynamique ΔG, conservation C/N)", "terme_source": "Néguentropie", "strate_cible": "F", "doc_cible": "F1 Le Temps Long §V (Les fermentations comme réactivation)", "connexion": "La fermentation anaérobie conserve 93% de l'énergie libre du glucose (ΔG -196 vs -2870 kJ/mol en aérobie) — c'est un processus maximalement néguentropique car il crée de l'organisation (métabolites complexes, consortia microbiens) avec une dissipation minimale d'énergie. Ce lien thermodynamique V3→F1 est le fondement physique de la thèse philosophique du corpus : les fermentations augmentent l'org", "importance": "critique", "is_documented": 0}, {"strate_source": "V", "doc_source": "V2 L'Holobionte Plante-Microbiome §II (Exsudats racinaires, SIREM)", "terme_source": "SIREM", "strate_cible": "S", "doc_cible": "S3 Le Microbiome Fongique et Mycorhizien §I (CMA, strigolactones)", "connexion": "Le SIREM (recrutement sélectif de microbes par exsudats spécifiques) inclut la sécrétion de strigolactones qui activent la germination des spores CMA et initient la signalisation LCO/facteurs Myc. Le SIREM est donc le mécanisme amont qui conditionne l'efficacité de la symbiose mycorhizienne décrite en S3 §I.", "importance": "critique", "is_documented": 0}, {"strate_source": "V", "doc_source": "V1 La Faune du Sol §I (Vers de terre anéciques)", "terme_source": "Vers de terre", "strate_cible": "S", "doc_cible": "S4 Le Carbone et les Grands Cycles §II (Microsites anoxiques)", "connexion": "Les galeries de vers anéciques créent des interfaces aérobie/anaérobie le long de leurs parois — les drilosphères sont des sites majeurs de couplage nitrification/dénitrification. La destruction de ces galeries par le labour supprime des microsites anoxiques fonctionnels documentés par Young & Crawford (2004) et Borer et al. (2018).", "importance": "critique", "is_documented": 0}, {"strate_source": "V", "doc_source": "V2 L'Holobionte Plante-Microbiome", "terme_source": "ISR/SAR", "strate_cible": "H", "doc_cible": "H1 Sol, Alimentation et Santé Humaine", "connexion": "L'Induced Systemic Resistance (ISR) et la Systemic Acquired Resistance (SAR) induisent la production de polyphénols, flavonoïdes et acides phénoliques dans les tissus végétaux. Ces métabolites secondaires de défense sont précisément les composés antioxydants et anti-inflammatoires qui constituent la phyto-élicitation mentionnée dans H1 (Feliziani et al. 2025). Le mécanisme biologique (V2) et le bénéfice santé (H1) ne sont jamais explicitement connectés par une référence croisée.", "importance": "critique", "is_documented": 0}, {"strate_source": "V", "doc_source": "V2 L'Holobionte Plante-Microbiome", "terme_source": "Cycle de la Rhizophagie", "strate_cible": "H", "doc_cible": "H3 Le Microbiome Global", "connexion": "Le cycle de la rhizophagie (digestion partielle de bactéries endophytes par stress oxydatif racinaire puis réexpulsion) est le mécanisme par lequel les endophytes colonisent les tissus végétaux internes. Ces mêmes endophytes sont ensuite transmis au microbiome intestinal humain via la consommation d'aliments crus (axe sol-plante-intestin de Ma et al. 2025 et Duarte et al. 2024). La rhizophagie est donc le premier maillon de la chaîne de transmission verticale microbiome sol → microbiome humain, mais cette connexion n'est documentée ni dans V2 ni dans H3.", "importance": "critique", "is_documented": 0}], "illustrations": [{"concept": "Cycle de la Rhizophagie", "docs_codes": ["V2", "S2"], "mermaid": "flowchart LR\n    SOL[\"🌍 PHASE SOL\\n─────────────────\\nMicro-organismes libres\\n(bactéries, levures)\\n\\nAcquisition de nutriments :\\nN · P · Fe · Zn · Cu\\nvia sidérophores\\nfixation N₂ possible\"]\n\n    EXSUDAT[\"🌿 EXSUDATS RACINAIRES\\n─────────────────\\nZone méristématique\\n(apex racinaire)\\n\\nGlucides · Acides organiques\\nProtéines · Vitamines\\n\\n→ Attire et nourrit\\nles micro-organismes\"]\n\n    INTERNALISATION[\"🔬 INTERNALISATION\\n─────────────────\\nEntrée dans les cellules\\nméristématiques\\n(paroi cellulaire incomplète)\\n\\nMicrobes → espace périplasmique\\n(entre paroi et membrane)\"]\n\n    EXTRACTION[\"⚡ EXTRACTION DES NUTRIMENTS\\n─────────────────\\nNADPH oxydase membranaire\\n→ superoxyde (O₂⁻)\\n\\nSuperoxyde :\\n• Dissout la paroi microbienne\\n• Crée des protoplastes (L-forms)\\n• Libère N · P · minéraux\\n\\nCyclose : circulation rapide\\ndes protoplastes ~8–11 µm/s\"]\n\n    TRANSFERT[\"🌱 TRANSFERT À LA PLANTE\\n─────────────────\\nNutriments absorbés\\nà travers la membrane\\nplasmique\\n\\n~30% de l'azote\\nde la plante peut venir\\nde la rhizophagie\\n(White et al., 2019)\"]\n\n    POIL[\"💚 POIL ABSORBANT\\n─────────────────\\nProtoplastes accumulés\\nà l'apex du poil\\n\\nÉlongation du poil racinaire\\n(signal NO — oxyde nitrique)\\n\\nÉjection forcée\\nà travers un pore apical\"]\n\n    SOL -->|\"Microbes captés\\npar les exsudats\"| EXSUDAT\n    EXSUDAT -->|\"Internalisation\\nau niveau méristème\"| INTERNALISATION\n    INTERNALISATION -->|\"NADPH oxydase\\nsuperoxyde\"| EXTRACTION\n    EXTRACTION -->|\"Passage transmembranaire\\nN · P · Fe · Zn\"| TRANSFERT\n    TRANSFERT -->|\"Protoplastes survivants\\nmigrent vers poils\"| POIL\n    POIL -->|\"Éjection + reformation\\nde la paroi cellulaire\"| SOL\n\n    NOTE[\"⚠️ Facteurs limitants :\\n• CO₂ élevé supprime le superoxyde\\n  → réduit l'extraction des nutriments\\n• Perte d'endophytes lors\\n  de la domestication des plantes\\n• Perturbation par les pesticides\\n  et les engrais de synthèse\"]\n\n    TRANSFERT -.->|\"Implications\\nagronomiques\"| NOTE\n\n    style SOL          fill:#FFF8DC,stroke:#8B6914,color:#5D4037\n    style EXSUDAT      fill:#E8F5E9,stroke:#2E7D32,color:#1B5E20\n    style INTERNALISATION fill:#E3F2FD,stroke:#1565C0,color:#0D47A1\n    style EXTRACTION   fill:#EDE7F6,stroke:#4527A0,color:#311B92\n    style TRANSFERT    fill:#E8F5E9,stroke:#388E3C,color:#1B5E20\n    style POIL         fill:#F1F8E9,stroke:#558B2F,color:#33691E\n    style NOTE         fill:#FFF3E0,stroke:#E65100,color:#BF360C", "sources": "[{\"auteur\": \"White et al.\", \"annee\": 2019, \"doi\": \"10.1002/ps.5527\"}, {\"auteur\": \"Paungfoo-Lonhienne et al.\", \"annee\": 2014, \"doi\": \"10.2135/cropsci2013.07.0488\"}]", "notes": "~30% de l'azote végétal via la rhizophagie. Lien V2 (holobionte) et S2 (guildes endophytes). Analogie avec le cycle de vida intracellulaire.", "statut": "produit"}, {"concept": "Colonne de Winogradsky — Stratification Redox", "docs_codes": ["S4", "S1", "S2"], "mermaid": "flowchart TB\n    LUMIERE[\"☀️ LUMIÈRE SOLAIRE\"]\n\n    Z1[\"🔵 ZONE AÉROBIE — Surface\\n─────────────────────────────\\nEh : +400 à +600 mV · O₂ présent\\n\\nCyanobactéries (filaments bleu-vert)\\nAlgues vertes\\n\\nPhotosynthèse oxygénique :\\nCO₂ + H₂O → O₂ + matière org.\\n─────────────────────────────\\nAccepteur d'électrons : O₂\"]\n\n    Z2[\"🟠 CHIMIOCLINE — Interface\\n─────────────────────────────\\nEh : +100 à +300 mV\\nGradient O₂ ↓ · H₂S ↑\\n\\nBactéries pourpres sulfureuses\\n(Chromatiaceae, Thiobacillus)\\n\\nPhotosynthèse anoxygénique :\\nH₂S + CO₂ → S⁰ + matière org.\\n─────────────────────────────\\nAccepteur : NO₃⁻ → N₂ (dénitrification)\"]\n\n    Z3[\"🟡 ZONE SUBOXIQUE\\n─────────────────────────────\\nEh : -100 à +100 mV\\nH₂S présent\\n\\nBactéries vertes sulfureuses\\n(Chlorobiaceae)\\nBactéries réductrices de sulfate\\n(Desulfovibrio, Desulfobacter)\\n\\nSO₄²⁻ + matière org. → H₂S + CO₂\\n─────────────────────────────\\nAccepteur : Mn⁴⁺→Mn²⁺ · Fe³⁺→Fe²⁺\"]\n\n    Z4[\"🟤 ZONE ANAÉROBIE — Fermentation\\n─────────────────────────────\\nEh : -200 à -100 mV\\n\\nBactéries fermentaires\\n(Clostridium, Bacteroidetes)\\nBactéries cellulolytiques\\n\\nCellulose → Acides gras courts\\n+ H₂ + CO₂\\n────────────────────────
