st un contournement historique. Le fix définitif va dans l'import docx. `SvRichText` sera simplifié en rendu plat paragraphe + bullets au fur et à mesure que les sources (fiches, concept_cards, config) sont re-nettoyées à l'entrée.\n\n### Navigation unifiée\n\nToutes les pages utilisent `SvTabs` pour les onglets. Patterns actuels :\n- **Outils** (MO, LiFoFer, Triangle) : Pratique / Comprendre\n- **Index** : onglets métier (Documents, Thésaurus, etc.)\n- **Cahier de Science** : 1 onglet par rubrique thématique (Intro, MO, Textures, Cycles, Microbiome, Holobionte, Santé, Pratiques, Fermentations, Méthodologie), piloté par `config.cahier.onglets`. Chaque onglet rend le chapitre pédagogique et/ou un groupe de fiches intégrées.\n\nChaque onglet a un `sv-tab-content` comme wrapper pleine page uniforme. `.sv-tabs` est déjà sticky (top:0, z-index:10) — ne pas ré-envelopper dans un wrapper custom.\n\n### Pattern standard d'une page multi-onglets\n\n```jsx\nreturn <div className=\"sv-page\">\n  <SvTabs tabs={tabs} active={active} onChange={setActive} />\n  <div className=\"sv-tab-content\">\n    <SvTabIntro resume={desc.resume} detail={desc.detail} />\n    {/* contenu spécifique de l'onglet actif */}\n  <\/div>\n<\/div>;\n```\n\n`SvTabIntro` sert de **point de référence d'alignement** : son conteneur hérite du padding de `.sv-page` (1.25rem gauche/droite), et toute la suite (cards, sections, tables) s'aligne dessus. Ne pas ajouter de wrapper custom entre.\n\n### Composants React ajoutés (avril 2026)\n\n| Composant | Props | Usage |\n|-----------|-------|-------|\n| `SvCallout` | variant, title, icon, children | Encart sémantique unifié — remplace les `<div className=\"sv-callout sv-callout-*\">` |\n| `SvAlert` | variant, title, children | Alerte compacte |\n| `SvImageCard` | src, alt, caption, maxHeight, maxWidth | Image illustrative + légende standardisée |\n| `SvProcedureSteps` | title, steps, materiel, duree | Procédure pas-à-pas numérotée |\n| `SvTestCard` | test={...} | Carte standardisée pour un `terrain_test` |\n| `SvSubTabs` | tabs, active, onChange | Sous-onglets niveau 2 (pills compactes) |\n\n### Anti-pattern : SvTabs imbriqués\n\nNe **jamais** utiliser deux `SvTabs` l'un dans l'autre. Si un onglet de premier niveau contient des sous-vues, utiliser `SvSubTabs` pour le niveau 2 (pills compactes, visuellement distinct).\n\nToujours accompagner `SvSubTabs` d'un `useEffect(() => setStateLocal(null), [subtab])` pour réinitialiser les states locaux (accordéons ouverts) au changement de sous-onglet.\n\n\n### SvRichText — tolérance H1 (avril 2026)\n\nLe parser accepte désormais `# Titre` (H1) **en plus** de `## ` / `### ` / `#### `. Les H1 sont rendus comme H2 (convention corpus : pas de H1 au niveau des sections, réservé au titre du doc via `meta.title`).\n\nRaison : Jenni produit parfois des fiches avec `# Introduction` / `# 1. Section` (template ancien). Sans cette tolérance, ces titres étaient affichés bruts en paragraphe. Le parser tolérant sert de filet de sécurité ; les fiches existantes ont aussi été normalisées en DB (H1 → H2).\n\n### Doctrine formatage `fiche_contenus.contenu_integre`\n\nConventions impératives pour que `SvRichText` rende correctement :\n1. **Titres** : `## X` à `### X`. Les `# X` sont tolérés mais non recommandés.\n2. **Paragraphes** : séparés par `\\n\\n` (ligne vide). Les `\\n` simples sont fusionnés dans un même paragraphe.\n3. **Pas de tags Jenni résiduels** en début (ex: `[Fiche zoom #X v1: ... 2026-XX-XX]`) — filtrés au parser mais à retirer en DB.\n4. **Refs consécutives** : séparer par espace `) (Ref2)` et non `)(Ref2)`.\n5. **Apostrophes** typographiques `'` recommandées (droites `'` tolérées, cosmétique).\n\nAudit et normalisation automatique via script ad hoc (voir audit_log 2026-04-19 : 27 H1 corrigés, 22 tags retirés, 70 refs espacées sur 28 fiches).\n", "type": "reference", "crit": true}, {"id": 81, "titre": "html_templates — carte des composants web", "contenu": "Table `html_templates` : CSS, JS et HEAD pour les pages web.\n\n| ID | page_slug | type | Contenu |\n|---|---|---|---|\n| 1 | (global) | head | CDN React 18 + Babel |\n| 2 | (global) | head | CDN Tailwind CSS |\n| 3 | (global) | head | CDN Tailwind CSS (version fixe) |\n| 4 | triangle_textures | page_css | CSS Triangle |\n| 5 | triangle_textures | page_js | JS React Triangle (17k) |\n| 6 | mo_calculateur | page_css | CSS Calculateur MO (3.7k) |\n| 7 | mo_calculateur | page_js | JS React Calculateur MO (22k) |\n| 8 | index | page_css | CSS Cartographie |\n| 9 | index | page_js | JS React Cartographie (46k) |\n| 10 | mo_calculateur | head | CDN Calculateur MO |\n| 11 | index | head | CDN Cartographie |\n| 12 | triangle_textures | head | CDN Triangle |\n\n**Modifier un composant React :**\n```python\ncon = get_connection('sol_vivant.db')\njs = con.execute(\"SELECT contenu FROM html_templates WHERE id=7\").fetchone()[0]\n# ... modifier js ...\ncon.execute(\"UPDATE html_templates SET contenu=?, updated_at=datetime('now') WHERE id=7\", (js,))\ncon.commit()\n```\nPuis regénérer : `python3 tools/docs/gen_mo_calc.py --db sol_vivant.db`", "type": "reference", "crit": false}, {"id": 100, "titre": "Mode hors-ligne et déploiement", "contenu": "## Mode hors-ligne et déploiement\n\n### Architecture des dépôts\n\n```\n/Tools/                          ← Sol-Vivant/Tools (scripts + DB)\n  Publications/web/              ← Pages générées\n    index.html, *.html\n    vendor/                      ← Dépendances JS/CSS locales\n    img/                         ← Images OG et previews\n\n        │ rsync -av Publications/web/ → /Publications/\n        ▼\n\n/Publications/                   ← Sol-Vivant/Publications (GitHub Pages)\n  index.html, *.html\n  vendor/, img/\n```\n\n### Vendor local (Publications/web/vendor/)\n\nToutes les dépendances JS sont téléchargées localement pour le mode hors-ligne :\n\n| Fichier | Taille | Statut | Utilisé par |\n|---------|--------|--------|-------------|\n| `react.production.min.js` | 11 Ko | actif | toutes les pages React |\n| `react-dom.production.min.js` | 129 Ko | actif | toutes les pages React |\n| `babel.min.js` | 3.0 Mo | fallback | non chargé dans le HTML final (JSX pré-compilé via Node). Conservé comme fallback au cas où la pré-compilation échoue |\n| `marked.min.js` | 35 Ko | actif | `explorer.html` (rendu markdown des rapports) |\n| `tailwind.min.css` | 2.8 Mo | obsolète | plus référencé (refactor sv-* avril 2026) — conservé pour compatibilité rétroactive, à supprimer dans une passe de nettoyage |\n| `tailwind.js` | 398 Ko | obsolète | idem |\n\nLes URLs sont définies dans les templates `head` en DB (`html_templates` type=head).\n\n### Pré-compilation JSX\n\nDepuis avril 2026, le JSX est **pré-compilé à la génération** via Node (`tools/lib/compile_jsx.js` qui utilise `@babel/core` + `@babel/preset-react`). Les blocs `<script type=\"text/babel\">` sont remplacés par `<script>` contenant du `React.createElement()` pur.\n\nInstallation des dépendances Node :\n```bash\nnpm install   # installe @babel/core et @babel/preset-react dans node_modules/\n```\n\nLe `node_modules/` est gitignoré. Si la pré-compilation échoue (Node absent, dépendances manquantes), le bloc JSX est conservé tel quel et Babel in-browser peut prendre le relais — à condition que le vendor Babel soit présent dans le HTML, ce qui n'est **plus** le cas par défaut.\n\n### gen_archive.py\n\nGénère un ZIP 100% autonome :\n\n```bash\npython3 tools/docs/gen_archive.py --db sol_vivant.db              # archive seule\npython3 tools/docs/gen_archive.py --db sol_vivant.db --regenerate  # regénère + archive\n```\n\nSortie : `Publications/sol-vivant-web.zip` (~16 Mo avec images)\n\nUsage : `unzip sol-vivant-web.zip -d sol-vivant && open sol-vivant/index.html`\n\n### Fonctionnement hors-ligne\n\nLes pages fonctionnent dans tous les contextes :\n- **GitHub Pages** : chemins relatifs `vendor/...` résolus par le serveur\n- **file://** : ouverture directe dans le navigateur\n- **Archive ZIP** : décompresser et ouvrir index.html\n- **Serveur local** : `python -m http.server` dans le dossier web/\n", "type": "reference", "crit": false}, {"id": 75, "titre": "Templates React/Babel — encoding et pièges", "contenu": "Les pages web (calculateur MO, triangle textures, cartographie) utilisent **Babel standalone** pour transpiler le JSX.\n\n**Pièges connus :**\n- `\\u{1F331}` (ES6 unicode avec accolades) → **CRASH Babel**. Utiliser le caractère UTF-8 direct : 🌱\n- `\\u25BE`, `\\u2014` etc. → préférer les caractères directs (▾, —) dans le JSX\n- Doublons de composants : si on injecte 2 fois dans `html_templates`, les 2 coexistent → erreur silencieuse\n- `className` avec Tailwind : les classes comme `space-y-1.5` marchent avec le CDN, pas besoin de purge\n\n**Vérification après modification html_templates :**\n```python\njs = con.execute(\"SELECT contenu FROM html_templates WHERE id=7\").fetchone()[0]\nassert js.count('function MonComposant') == 1, \"Doublon de composant !\"\nassert '\\\\u{' not in js, \"ES6 unicode escape interdit !\"\n```\n\n**Historique** : composant EncartIncorporation en doublon + unicode crash (session 03/04).\n\n### Pièges CSS : escapes unicode dans content: (ajout session 2026-04-12)\n\n**Règle : JAMAIS d'escapes CSS unicode dans `content:` des `::before`/`::after`.**\n\nExemples de bugs rencontrés :\n- `content: '\\2713 '` → affiché `¹3` (le navigateur lit `\\271` + `3`)\n- `content: '\\2022 '` → affiché `²` ou `•2`\n- `content: '\\203A'` → affiché `A` (le navigateur lit `\\203` + `A`)\n\n**Fix : toujours utiliser le caractère UTF-8 direct :**\n```css\n/* ❌ INTERDIT */\ncontent: '\\2713 ';\ncontent: '\\203A';\n\n/* ✓ CORRECT */\ncontent: '✓ ';\ncontent: '▸';\ncontent: '• ';\n```\n\n**Pourquoi :** les escapes CSS `\\XXXX` nécessitent un espace terminal pour délimiter le code. Si le code fait 4 chiffres et que l'espace est oublié ou que le caractère suivant est un chiffre/lettre hex, le navigateur lit un code plus long que prévu. UTF-8 direct élimine ce risque.\n\n**Vérification :** `grep -n \"content.*'\\\\\\\\\" tools/lib/web_template.py` → doit retourner 0 résultats.\n\n### Emojis dans les templates React (complément session 2026-04-12)\n\n**Règle : toujours le caractère UTF-8 direct, jamais d'escape.**\n- ❌ `icon=\"\\ud83d\\udd2c\"` → affiché en texte brut `\\ud83d\\udd2c`\n- ✓ `icon=\"🔬\"` → affiché correctement\n\n**Bibliothèque d'icônes :** `config.web.icon_library` — source de vérité pour la cohérence visuelle.\n- Navigation/onglets : emojis autorisés (repères fixes)\n- Accordéons SvCollapse : UN seul emoji (`🔬`) pour tous\n- Règle JMJ : « beaucoup de créativité tue la créativité »\n\n### Checklist avant modification html_templates (mise à jour)\n\n```python\njs = con.execute(\"SELECT contenu FROM html_templates WHERE id=?\", (tid,)).fetchone()[0]\n\n# 1. Pas de doublon de composant\nimport re\nfuncs = re.findall(r'function\\s+(\\w+)\\s*\\(', js)\nfrom collections import Counter\ndupes = {k:v for k,v in Counter(funcs).items() if v > 1}\nassert not dupes, f\"Doublon: {dupes}\"\n\n# 2. Pas d'unicode escape JS\nassert '\\\\u{' not in js, \"ES6 unicode escape interdit\"\nassert '\\\\ud8' not in js, \"Surrogate pair interdit\"\n\n# 3. Pas d'emoji corrompu\nassert '\\\\ud83d' not in js, \"Emoji en escape au lieu de UTF-8 direct\"\n\n# 4. Test pre-compilation Babel\nimport subprocess\nwith open('/tmp/test.jsx', 'w') as f: f.write(js)\nresult = subprocess.run(['node', '-e', '''\n  const babel = require(\"@babel/core\");\n  const fs = require(\"fs\");\n  try { babel.transformSync(fs.readFileSync(\"/tmp/test.jsx\",\"utf8\"), {presets:[\"@babel/preset-react\"]}); console.log(\"OK\"); }\n  catch(e) { console.log(\"FAIL: \" + e.message.substring(0,200)); process.exit(1); }\n'''], capture_output=True, text=True)\nassert result.returncode == 0, f\"Babel: {result.stdout}\"\n```\n", "type": "conseil", "crit": false}, {"id": 93, "titre": "Régénération pipeline — regen_all.py + gen_*.py", "contenu": "## Régénération complète depuis la DB\n\nPrincipe : **la DB est la source de vérité unique**. Après toute modification de données, régénérer les outputs.\n\n### Commande unique\n\n```bash\npython3 tools/regen_all.py --db sol_vivant.db\n```\n\nRégénère séquentiellement les 6 générateurs (gen_web, gen_mo_calc, gen_triangle_textures, gen_lifofer, gen_readme, gen_workflows).\n\n### Régénération sélective\n\n```bash\npython3 tools/regen_all.py --only gen_lifofer.py\n```\n\n### Quand l'utiliser\n\n- Après modification d'une table (terms, refs, lifofer_*, etc.)\n- Après modification de config\n- Après modification d'un template html_templates\n\n### Ne jamais faire\n\n- Ne JAMAIS éditer directement les HTML/README générés (écrasés)\n- Ne JAMAIS hardcoder des valeurs dans les générateurs\n\n### (fusionné depuis #80 : Pipeline de génération : script → tables DB → fichier)\n\nChaque fichier dans `Publications/` est généré par un script qui lit des tables DB.\n\n| Script | Tables sources | Fichier généré |\n|---|---|---|\n| `gen_mo_calc.py` | refs (kind=matiere, cn_regle), ref_cn_incorporation, ref_melanges_predefinies, ref_kirkby, html_templates | `Publications/web/mo_calculateur.html` |\n| `gen_triangle_textures.py` | refs (kind=texture), html_templates | `Publications/web/triangle_textures.html` |\n| `gen_web.py` | documents, prompts, terms, chains_causales, concept_cards, html_templates (id=8,9,11) | `Publications/web/index.html` |\n| `gen_web.py` | documents, prompts, terms, chains_causales, concept_cards | `Publications/cartographie/solvivant_docs.html` |\n| `export_jenni_doc.py` | prompts, terms, jenni_doc_specs, doc_cross_refs | `Publications/prompts/prompts_jenni_*.txt` |\n| `export_fiche.py` | fiches | `recherches/prompts_fiche_*.txt` |\n| `gen_readme.py` | scripts, domaines_techniques, domaine_bq, bq_entries | `tools/*/README.md` |\n| `gen_workflows.py` | scripts, config | `Publications/workflows/*.md` |\n\n**Pour modifier un fichier généré** : modifier la table source → regénérer avec le script.", "type": "workflow", "crit": true}, {"id": 135, "titre": "Mode sombre + Zoom typo + Toolbar utilisateur", "contenu": "## Mode sombre + Zoom typo + Toolbar utilisateur\n\nToutes les pages web Sol Vivant intègrent une **toolbar flottante** (`.sv-toolbar` en haut à droite) avec :\n\n| Bouton | Effet | Persistance |\n|--------|-------|-------------|\n| `A−` | Réduit le texte (×0.85) | `localStorage('sv-font-scale')` |\n| `A`  | Texte normal (×1) | idem |\n| `A+` | Agrandit le texte (×1.15) | idem |\n| `☾/☀` | Bascule clair/sombre | `localStorage('sv-theme')` |\n\n### Mécanisme — Mode sombre\n\n- Variables CSS définies dans `:root` (light) et `:root[data-theme=\"dark\"]` (dark) + `@media (prefers-color-scheme: dark) :root:not([data-theme=\"light\"])` pour le défaut système\n- Toggle JS : `data-theme=\"dark\"|\"light\"` sur `<html>`\n- Init : restaure `localStorage('sv-theme')` si présent, sinon suit le système\n- Variables : `--bg`, `--card-bg`, `--text`, `--border`, `--shadow`, `--paper-bg/2/border`, `--success/-light`, `--warning/-light`, `--danger/-light`, `--info/-light`, `--accent*`, `--header-from/to`, `--zone-*`\n\n### Mécanisme — Zoom typo\n\n- Une variable `--font-scale` (défaut `1`) sur `:root`\n- Toutes les `--font-*` sont en `calc(<rem> * var(--font-scale))`\n- Le bouton modifie `--font-scale` via `document.documentElement.style.setProperty(...)` → tout le DOM suit\n- 4 niveaux : 0.85, 1.0, 1.15, 1.3 (le bouton 3-niveaux UI expose 0.85/1.0/1.15)\n\n### Implications pour les page_css et page_js\n\n1. **Aucun `font-size: <rem>` hardcodé** → utiliser `var(--font-*)`. Idem pour `style={{fontSize:'…'}}` en JSX.\n2. **Couleurs sémantiques** via `var(--color-*-text)` quand on a un fond `--*-light` (callouts, alertes, encarts).\n3. **Fonds blancs hardcodés `#fff/#f8fafc/#fdfbf7`** interdits → utiliser `var(--card-bg)`, `var(--color-bg-subtle)`, `var(--paper-bg)`.\n4. **Couleurs texte foncées** `#1e293b/#000` interdites → utiliser `var(--text)`.\n\n### Composants React unifiés (avril 2026)\n\n| Composant | Props | Usage |\n|-----------|-------|-------|\n| `SvCallout` | variant, title, icon, children | Encart sémantique (warning/success/danger/info). Remplace les `<div className=\"sv-callout sv-callout-warning\">` JSX bruts. |\n| `SvAlert` | variant, title, children | Alerte compacte (variantes idem) |\n| `SvImageCard` | src, alt, caption, maxHeight, maxWidth | Image illustrative + légende, styles standardisés (résout bug \"double style\") |\n| `SvProcedureSteps` | title, steps, materiel, duree | Procédure pas-à-pas numérotée (compteur visuel pastille). Réutilisable test bocal/recettes/mode opératoire. |\n| `SvTestCard` | test={code,title,description,dimension_label,procedure,materiel,duree,interpretation,image_url,source} | Carte standardisée pour un `terrain_test`. Prête pour la future page `tests_terrain` autonome. |\n| `SvSubTabs` | tabs, active, onChange | Sous-onglets niveau 2 (pills compactes). À utiliser quand un onglet `SvTabs` contient lui-même plusieurs vues. |\n| `SvTabIntro` | resume, detail | Intro accordéon sous les onglets. Profite de la nav captive pour ne pas être direct·e dès l'arrivée sur un onglet. |\n\n### Convention SvTabIntro\n\nChaque page multi-onglets doit lire ses intros depuis `config.<page>.tab_intros` (JSON) :\n```json\n{\"pratique\": {\"resume\": \"...\", \"detail\": \"...\"}, \"comprendre\": {\"resume\": \"...\", \"detail\": \"...\"}}\n```\nLe `resume` est affiché en ligne sous les tabs ; le `detail` se déplie via \"▸ en savoir plus\".\n", "type": "reference", "crit": true}, {"id": 110, "titre": "Bibliothèque d'icônes unifiée — règles visuelles", "contenu": "## Bibliothèque d'icônes unifiée Sol Vivant\n\nSource de vérité : `config.web.icon_library`\n\n### Règles\n\n1. **Navigation et onglets** : emojis autorisés (repères fixes, rares)\n2. **Accordéons SvCollapse** : UN seul emoji (🔬) pour toutes les pages\n3. **Listes à puces** : chevron ▸ (sv-bullet-list) ou bullet • (signaux), JAMAIS d'emoji\n4. **Cohérence** : le même emoji = le même concept, partout\n5. **Sobriété** : « beaucoup de créativité tue la créativité » (JMJ)\n\n### Catégories\n\n| Catégorie | Usage |\n|-----------|-------|\n| `navigation` | Barre nav inter-pages (🗺️ 🔺 🧪 🌿 🔍) |\n| `onglets` | Tabs internes (📚 🧪 🔬 📊) |\n| `thematiques` | Concepts du corpus (💧 🌱 🧱 ⚡ 🍄) |\n| `strates` | F=📜 S=🧱 V=🌱 P=🧪 H=🔬 |\n| `accordeons` | Pas d'emoji. Chevron ▸/▾ uniquement |\n\n### Accès depuis Python\n\n```python\nfrom config import get_json\nicons = get_json(conn, 'web', 'icon_library')\nicon_nav = icons['navigation']['calculateur']  # 🧪\n```\n\n### Accès depuis React/JSX\n\n```jsx\n// Les icônes sont injectées dans DATA par le gen_*.py\n// Ou utilisées directement en UTF-8 dans le template\n<SvCollapse title=\"Ma section\" icon=\"🔬\">\n```\n\n### Interdit\n\n- Escapes unicode (`\\ud83d\\udd2c`) → toujours le caractère direct\n- Emojis variés dans les SvCollapse (un seul pour tous)\n- Couleurs de fond sur les titres de sections (gradient, etc.)\n", "type": "reference", "crit": true}, {"id": 118, "titre": "Dashboard — outils de pilotage inter-sessions", "contenu": "## Pages de pilotage\n\n### Dashboard\n\n```bash\npython3 tools/docs/gen_dashboard.py --db sol_vivant.db\n# Output : Publications/web/dashboard.html\n```\n\nKPIs projet, dettes en cours, avancement par doc/strate, audit_log et\ngit log récents, checks intégrité, doctrine BQ.\n", "type": "commande", "crit": false}, {"id": 141, "titre": "Pattern Comprendre unifié — SvComprendre", "contenu": "## Pattern Comprendre unifié — SvComprendre + config.<page>.comprendre\n\nRefonte avril 2026 : les onglets « Comprendre » des calculateurs (MO, LiFoFer, Triangle)\nsont désormais pilotés par DB via le composant `SvComprendre`, éliminant tout\ntexte éditorial en dur dans les templates JS.\n\n### Principe\n\nChaque page calculateur a une entrée `config.<page_slug>.comprendre` (JSON) :\n\n```json\n{\n  \"cahier_link\": { \"chapitre\": \"mo\", \"titre\": \"...\" },\n  \"sections\": [\n    { \"type\": \"fiche\",    \"fiche_id\": 11, \"titre\": \"...\", \"defaultOpen\": true },\n    { \"type\": \"fiche\",    \"fiche_id\": 4,  \"titre\": \"...\" },\n    { \"type\": \"cards\",    \"ids\": [98, 45, 54], \"titre\": \"Cartes conceptuelles\" },\n    { \"type\": \"terms\",    \"ids\": [38, 61, 71], \"titre\": \"Glossaire\" },\n    { \"type\": \"cahier\",   \"chapitre\": \"textures\", \"section\": \"importance\", \"titre\": \"...\" },\n    { \"type\": \"richtext\", \"titre\": \"Sources\", \"contenu\": \"...\" }\n  ]\n}\n```\n\n### Hydratation\n\n`tools/lib/web_template.py::build_comprendre_data(conn, page_slug)` enrichit\nchaque section avec les données DB :\n\n| type | source | données injectées |\n|------|--------|-------------------|\n| `fiche` | `fiche_contenus` | `contenu` (tag Jenni `[...]` strippé) + `refs` normalisées |\n| `cards` | `concept_cards` + `concept_dimensions` | `{id, title, description, dimension}` |\n| `terms` | `terms` | `{id, fr, syn_en, definition}` |\n| `cahier` | `config.cahier.chapitres` | `contenu` de la section référencée |\n| `richtext` | inline | `contenu` tel quel |\n\nChaque `gen_<page>.py` appelle `build_comprendre_data(con, '<page_slug>')` et\ninjecte le résultat dans `DATA.comprendre`.\n\n### Rendu JSX\n\n```jsx\nfunction ComprendreView() {\n  return <SvComprendre data={DATA.comprendre} />;\n}\n```\n\nLe composant `SvComprendre` (dans `sv-shared-components`) rend :\n- `SvCahierLink` en tête si `cahier_link` défini\n- Une `SvCollapse` par section, avec sous-composant selon le type :\n  - `SvComprendreFiche` → `SvRichText` + `SvSourceList` (refs)\n  - `SvComprendreCards` → grille `.sv-comprendre-cards` avec liens `concept_cards.html#card-<id>`\n  - `SvComprendreTerms` → liste `.sv-comprendre-terms` (FR/EN/définition thésaurus)\n  - `cahier`/`richtext` → `SvRichText` sur le contenu\n\n### Règles\n\n1. **Zéro texte éditorial dans le JSX** — tout passe par `config.<page>.comprendre`\n2. **Les définitions viennent du thésaurus** (`terms.definition`), pas de re-rédaction\n3. **Les explications viennent des fiches Jenni** (`fiche_contenus.contenu_integre`)\n4. **Les concepts viennent des concept_cards** (`concept_cards.description`)\n5. **Un même terme affiché sur 2 calculateurs = même définition** (single source of truth)\n\n### Ajouter une nouvelle page avec onglet Comprendre\n\n1. `INSERT INTO config(categorie, cle, valeur) VALUES ('<page_slug>', 'comprendre', '<json>')`\n2. Dans `gen_<page>.py` : `data['comprendre'] = build_comprendre_data(con, '<page_slug>')`\n3. Dans le template JS : `<SvComprendre data={DATA.comprendre} />`\n4. Regénérer la page\n\nPlus besoin de coder un nouveau JSX — remplir le JSON en DB suffit.", "type": "reference", "crit": true}]}}}</script>
<script>
const DATA = JSON.parse(document.getElementById('bq-data').textContent);
function norm(s) {
  return (s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[-_\s]+/g,' ');
}
function escape(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function mdInline(s) {
  // Escape HTML d'abord, puis applique formatages markdown
  s = escape(s);
  // Code inline `code`
  s = s.replace(/`([^`\n]+?)`/g, '<code>$1</code>');
  // Barre ~~text~~
  s = s.replace(/~~([^~\n]+?)~~/g, '<del>$1</del>');
  // Gras **text**
  s = s.replace(/\*\*([^\*\n]+?)\*\*/g, '<strong>$1</strong>');
  // Italique *text*
  s = s.replace(/(^|[^\*])\*([^\*\n]+?)\*(?!\*)/g, '$1<em>$2</em>');
  return s;
}
function mdBlock(s) {
  // Rend paragraphes + titres + puces (minimal)
  const lines = s.split('\n');
  const out = [];
  let inList = false;
  for (const raw of lines) {
    const line = raw.replace(/\s+$/, '');
    const h = line.match(/^(#{1,4})\s+(.+)$/);
    if (h) {
      if (inList) { out.push('</ul>'); inList = false; }
      const lvl = Math.min(h[1].length + 2, 6);
      out.push(`<h${lvl} style="margin:.5em 0 .2em;font-size:${1.05 - lvl*0.05}em">${mdInline(h[2])}</h${lvl}>`);
      continue;
    }
    const li = line.match(/^\s*[-•]\s+(.+)$/);
    if (li) {
      if (!inList) { out.push('<ul style="margin:.3em 0;padding-left:1.5em">'); inList = true; }
      out.push(`<li>${mdInline(li[1])}</li>`);
      continue;
    }
    if (inList) { out.push('</ul>'); inList = false; }
    if (!line.trim()) { out.push(''); continue; }
    out.push(`<p style="margin:.3em 0">${mdInline(line)}</p>`);
  }
  if (inList) out.push('</ul>');
  return out.join('\n');
}
function render(filter) {
  const f = norm(filter);
  const body = document.getElementById('body');
  body.innerHTML = '';
  let visible = 0;
  for (const [cat, doms] of Object.entries(DATA)) {
    const entries = [];
    for (const [dslug, dinfo] of Object.entries(doms)) {
      for (const e of dinfo.entries) {
        if (!f || norm(e.titre).includes(f) || norm(e.contenu).includes(f)) {
          entries.push({dom: dinfo.nom || dslug, ...e});
        }
      }
    }
    if (entries.length === 0) continue;
    const catDiv = document.createElement('div');
    catDiv.innerHTML = `<div class="cat">${cat} (${entries.length})</div>`;
    const domMap = {};
    for (const e of entries) {
      (domMap[e.dom] = domMap[e.dom] || []).push(e);
    }
    for (const [dom, es] of Object.entries(domMap)) {
      const dd = document.createElement('div');
      dd.innerHTML = `<div class="dom">${dom}</div>`;
      for (const e of es) {
        visible++;
        const crit = e.crit ? '<span class="crit-mark">🔴</span>' : '';
        const critClass = e.crit ? ' crit' : '';
        const typ = e.type ? `<span class="type">${e.type}</span>` : '';
        const det = document.createElement('details');
        det.className = 'e' + critClass;
        det.innerHTML = `<summary><span class="id">#${e.id}</span>${crit}${e.titre}${typ}</summary><div class="contenu"></div>`;
        det.querySelector('.contenu').innerHTML = mdBlock(e.contenu);
        dd.appendChild(det);
      }
      catDiv.appendChild(dd);
    }
    body.appendChild(catDiv);
  }
  document.getElementById('stats').textContent = `${visible} entrée(s) visibles${f ? ' — filtre: \'' + filter + '\'' : ''}`;
}
document.getElementById('filter').addEventListener('input', e => render(e.target.value));
render('');
</script>
</body></html>
