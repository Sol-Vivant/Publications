<script id="bq-data" type="application/json">{"corpus": {"concept-cards": {"nom": "Cartes de concept", "entries": [{"id": 106, "titre": "Concept cards — filtre de rigueur (« une affirmation bancale ne passe pas »)", "contenu": "## Concept cards — système de filtre de rigueur\n\n> **« Une affirmation bancale ne passe pas dans le corpus. »** (règle absolue JMJ)\n\nLes `concept_cards` sont l''**outil de filtre** qui garantit la qualité scientifique du corpus *Le Sol Vivant cet Holobionte*. Toute hypothèse captée — qu''elle vienne d''une note de vulgarisation, d''une intuition de lecture, d''un audit ou d''une fiche en construction — doit passer la confrontation aux dimensions conceptuelles et aux tests terrain avant d''être intégrée.\n\n### Position dans le workflow\n\n```\nCaptation (notes, lectures, intuitions)\n   ↓\nHypothèse formulée\n   ↓\n┌─────────────────────────────────────────────┐\n│ FILTRE concept_cards :                      │\n│   - Création/affinement de la carte         │\n│   - Positionnement dimension                │\n│   - Confrontation autres dimensions         │\n│   - Confrontation concept_card_tests        │\n│   - Cohérence corpus                        │\n└─────────────────────────────────────────────┘\n   ↓                            ↓\n✗ bancale                    ✓ solide\n   ↓                            ↓\narchive (mémoire de rejet)   active\n                                ↓\n                         Alimentation possible :\n                          - terms (nouveau terme canonique)\n                          - fiches (zoom proactif)\n                          - validations (confirmation/comblement)\n                          - prompts.contexte_sci/.enrichissement\n```\n\n### Architecture (tables existantes)\n\n#### `concept_dimensions` (12 axes)\n\n| ID | Dimension | Description |\n|---|---|---|\n| 1 | Cadre — Eau | Eau facteur limitant, modes d''application |\n| 2 | Cadre — Redox | Gradients redox, microzones, redox ladder |\n| 3 | Cadre — Économique | Coûts réels, énergie, filières |\n| 4 | Cadre — Socio-économique | Travail, filières, risques |\n| 5 | Cadre — Évolutif | Temporalité, évolution anaérobie→aérobie |\n| 6 | Types de sols | Comportements différenciés par texture |\n| 7 | Histoire | Histoire des sols : désastres et réussites |\n| 9 | Symptôme — MO/Hydrique | Stress MO, redox, stratégies adaptatives |\n| 10 | Symptôme — Structure | Compaction, asphyxie, diagnostic |\n| 11 | Pratique | ACS, diagnostic terrain, interventions |\n| 12 | Cycle | Cycles biogéochimiques (N, P, C, S...) |\n| 13 | Continuum | Continuum sol-plante-humain, résistome |\n\n#### `concept_cards`\n\n```sql\nCREATE TABLE concept_cards (\n    id           INTEGER PRIMARY KEY,\n    dimension_id INTEGER REFERENCES concept_dimensions(id),\n    title        TEXT,\n    description  TEXT,\n    scope_type   TEXT,\n    scope_ref    TEXT,\n    status       TEXT DEFAULT ''archive'',  -- active | archive\n    docs_codes   TEXT,    -- JSON [doc_code, ...]\n    sections     TEXT,    -- JSON [section, ...]\n    adapted      INTEGER, -- 0=archive brut, 1=adapté cartographie v2\n    source       TEXT,\n    category     TEXT,\n    notes        TEXT,\n    created_at   TEXT\n);\n```\n\n#### `concept_card_tests`\n\n```sql\nCREATE TABLE concept_card_tests (\n    card_id   INTEGER REFERENCES concept_cards(id),\n    test_id   INTEGER REFERENCES terrain_tests(id),\n    relevance REAL,\n    usage     TEXT,\n    PRIMARY KEY (card_id, test_id)\n);\n```\n\n→ Liens **carte ↔ test terrain** pour validation empirique. C''est l''ancrage qui empêche l''abstraction pure.\n\n### Cycle de vie\n\n```\n[création]\n  - Nouvelle hypothèse à tester (souvent issue d''une note vulga ou d''une lecture)\n  - Création d''une carte avec dimension, scope, description\n  - statut = ''archive'' par défaut\n   ↓\n[confrontation]\n  - Recherche de tests terrain pertinents → ajout dans concept_card_tests\n  - Vérification cohérence avec autres cartes de la même dimension\n  - Vérification cohérence avec corpus existant (docs_codes, sections)\n   ↓\n[verdict]\n  - ✓ Solide → status = ''active'' + adapted = 1 (cartographie v2) → utilisable\n  - ✗ Bancale → reste en archive (mémoire de rejet)\n   ↓\n[exploitation aval]\n  - Cartes ''active'' alimentent : terms, fiches, validations, prompts\n```\n\n### État actuel (2026-04-10)\n\n| Statut | Cartes | Notes |\n|---|---|---|\n| `active` | 4 | Toutes en dimension Cadre — Eau |\n| `archive` | 48 | Hypothèses non passées ou non encore confrontées |\n| Adaptées cartographie v2 | 4 | Sur 52 (8%) |\n\n**Observation** : le système concept_cards a été mis en place mais s''est mis en sommeil. Lourde réserve de matière à reprendre, mais ce n''est **pas urgent** — décision reportée à une phase ultérieure. Tant que la table existe et reste cohérente avec ce document, on peut la rebrancher quand on voudra.\n\n### Règles d''usage (à respecter)\n\n1. **Toute pépite captée dans une note volante** (BQ #102) doit créer ou affiner une concept_card avant d''être intégrée au corpus. Pas de raccourci.\n\n2. **Toute fiche nouvelle** doit s''appuyer sur au moins une concept_card cohérente. Si aucune carte existante ne couvre le sujet → en créer une et la confronter avant de produire la fiche.\n\n3. **Une carte en `archive` n''est pas ressuscitée à la légère** : elle représente une affirmation qui n''a pas passé le filtre. Pour la passer en `active`, il faut une **nouvelle preuve** ou un nouveau test terrain qui change la donne.\n\n4. **Les concept_card_tests** sont obligatoires : une carte sans aucun test terrain associé est considérée comme une **hypothèse abstraite non vérifiée** — elle ne peut pas alimenter le corpus tant qu''elle n''est pas reliée à au moins un test.\n\n5. **Si Claude utilise les concept_cards dans une analyse**, il doit le mentionner explicitement dans ses recommandations (« basé sur la carte #X dimension Y, status active, tests Z »). Pas d''affirmation orpheline sans ancrage.\n\n### Lien avec les notes volantes (BQ #102)\n\nLa règle des pépites de BQ #102 (« ne pas écarter la vulgarisation trop vite ») est complétée par cette règle des concept_cards :\n\n> **Trouver une pépite ne suffit pas. La pépite doit passer le filtre concept_card avant d''entrer dans le corpus.**\n\nC''est ce double processus (largeur de captation × rigueur de filtrage) qui garantit que le corpus s''enrichit sans se polluer.\n\n---\n\n## Navigation et utilisation (ajout session 2026-04-11)\n\n### Les 5 rôles des concept_cards\n\nLe système concept_cards n'est pas seulement un filtre de rigueur — il est un **artefact multi-rôle** :\n\n| Rôle | Description | Utilisateur principal |\n|---|---|---|\n| **1. Filtre de rigueur** | Gate en amont des fiches/validations/termes. Bloque les affirmations bancales. | Claude (production) |\n| **2. Navigation interne** | Cartes reliées par `concept_card_links` et `concept_card_tests`. Permet la traversée sémantique du corpus. | Claude (consultation) |\n| **3. Diagnostic terrain** | Cartes symptômes (#33-#42), profils sols (#11-#16), tests terrain (`terrain_tests`). Entrée par observation de terrain. | Agronomes, praticiens |\n| **4. Pédagogique** | Cards structurées en arbre de décision, conditions numérotées, cas documentés. Consommables par utilisateurs finaux. | Étudiants, formateurs |\n| **5. Audit / stress-test** | Éprouver le corpus : confronter chaque affirmation aux cartes, détecter les faiblesses et contradictions. | Claude (audit), JMJ |\n\n### Tables impliquées\n\n| Table | Rôle | Lignes |\n|---|---|---|\n| `concept_dimensions` | 12 axes de pensée | 12 |\n| `concept_cards` | Cartes proprement dites | 56 (post-migration v2) |\n| `concept_card_tests` | Liaison cartes ↔ tests terrain | 33 |\n| `concept_card_links` | Réseau inter-cartes (types: completes, contradicts, prerequisite, derives_from, related_to, supersedes, example_of) | 32 (amorçage) |\n| `terrain_tests` | 20 tests de terrain (VESS, infiltration, bocal, etc.) | 20 |\n\n### Répartition post-migration v2 (2026-04-11)\n\n| Dim | Nom | Cartes |\n|---|---|---|\n| 1 | Cadre — Eau | 1 |\n| 2 | Cadre — Redox | 1 |\n| 3 | Cadre — Économique | 1 |\n| 4 | Cadre — Socio-économique | 1 |\n| 5 | Cadre — Évolutif | 5 |\n| 6 | Types de sols | 7 |\n| 7 | Histoire | 1 |\n| 9 | Symptôme — MO/Hydrique | 5 |\n| 10 | Symptôme — Structure | 10 |\n| 11 | Pratique | 8 |\n| 12 | Cycle | 6 |\n| 13 | Continuum | 6 |\n\n### Migration v1 → v2 (session 2026-04-11)\n\n**Contexte** : 48 des 52 cartes initiales étaient en `status='archive'` avec source `legacy_v1_to_review` ou `base_obsolete_v1`. Seules 4 cartes (dim Cadre—Eau, source `analyse_fiches`) étaient `active`. La dim 1 (Cadre—Eau) servait de fourre-tout : 12 de ses 13 cartes appartenaient à d'autres dimensions.\n\n**Actions réalisées** :\n1. Correction dimension de 12 cartes mal placées (dim 1 → dim correcte)\n2. Activation massive des 48 cartes archive → active (adapted=1)\n3. Réécriture de 3 cartes touchées par la session (#11 sableux, #14 calcaire, #38 faim d'azote)\n4. Création de 4 nouvelles cartes (#60-#63)\n5. Tissage initial de 32 `concept_card_links`\n\n**Résultat** : 56 cartes actives, 0 archive, réseau amorcé.\n\n**Post-migration archive = rejet.** Dorénavant, une carte en `archive` signifie explicitement \"hypothèse rejetée\" (mémoire de rejet, pas legacy en attente).\n\n### Règles d'accès pour Claude (claude_rules)\n\n- `audit_cards_first` : AVANT toute création de terme/carte/fiche/validation, Claude DOIT lancer un audit `SELECT ... FROM concept_cards WHERE ...` sur les keywords du domaine concerné\n- `bq_access` : AVANT toute décision structurelle, Claude DOIT lancer `bq_query.py --search \"<keyword>\"`\n\n### Backlog outillage (identifié session 2026-04-11, non implémenté)\n\n- `bq_query.py --cards` / `--card <id>` / `--dim <nom>` : sous-commandes exploration cartes\n- `session_start.py` : ligne cartes dans le dashboard (total, par dim, orphelines)\n- `check_integrity.py --cards` : heuristique de détection de contradictions entre cartes\n- `gen_concept_cards.py` : rendering HTML/web des cartes comme outil pédagogique interactif\n", "type": "reference", "crit": true}, {"id": 112, "titre": "Concept cards — contradictions explicites uniquement (pas d'heuristique texte)", "contenu": "## Concept cards — contradictions explicites uniquement\n\n**Règle** : les contradictions entre concept cards doivent être **tissées\nexplicitement** via `concept_card_links.link_type='contradicts'`. Pas de\ndétection par heuristique texte (trop de faux positifs — cf session\n2026-04-12 où 10 faux positifs `surface/incorpor` ont été détectés dans la\ndimension Pratique alors que c'était précisément son objet).\n\n### Source de vérité\n\n```sql\nSELECT ccl.from_id, ccl.to_id, c1.title, c2.title, ccl.notes\nFROM concept_card_links ccl\nJOIN concept_cards c1 ON c1.id = ccl.from_id\nJOIN concept_cards c2 ON c2.id = ccl.to_id\nWHERE ccl.link_type = 'contradicts'\n  AND c1.status = 'active' AND c2.status = 'active';\n```\n\n### Cycle de vie d'une contradiction\n\n```\n[détection]\n  - Claude ou JMJ identifie une opposition de fond entre deux cartes actives\n    (pas un simple antonyme de vocabulaire — un désaccord doctrinal)\n   ↓\n[tissage]\n  - INSERT dans concept_card_links avec link_type='contradicts'\n  - notes = justification brève de l'opposition\n   ↓\n[arbitrage]\n  - Relecture des deux cartes + corpus + tests terrain\n  - Trois issues possibles :\n    (a) une carte est affinée/reformulée → le conflit disparaît\n    (b) une carte passe en archive → l'autre survit\n    (c) les deux restent avec un link_type='completes' + note pour expliquer\n        le contexte où chacune s'applique (fausse opposition contextuelle)\n   ↓\n[résolution]\n  - Le lien 'contradicts' est supprimé (a et b) ou remplacé par 'completes' (c)\n  - check_integrity retombe à 0 sur ce check\n```\n\n### Pourquoi pas d'heuristique texte\n\nL'heuristique testée (co-occurrence d'antonymes dans les descriptions) a\nproduit 10/10 faux positifs sur `surface`/`incorpor` dans la dim Pratique.\nRaisons :\n- la dimension Pratique traite précisément du débat surface vs incorporation\n- les cartes citent les deux termes pour distinguer les contextes, pas pour\n  s'opposer\n- le texte ne dit pas qui pose la thèse et qui l'antithèse\n\nUne contradiction réelle demande une analyse sémantique que seule la lecture\n(Claude + JMJ) peut produire. Le texte libre n'est pas une source de vérité\npour les contradictions — le tissage explicite l'est.\n\n### État au 2026-04-12\n\n- 0 lien `contradicts` en DB → check vert\n- 4 `link_type` actuellement utilisés dans `concept_card_links` : related_to\n  (101), completes (23), prerequisite (3), derives_from (2)\n- Les autres types mentionnés dans le schéma (`contradicts`, `supersedes`,\n  `example_of`) sont disponibles à l'usage\n", "type": "regle", "crit": true}]}, "chaines": {"nom": "Chaînes causales", "entries": [{"id": 144, "titre": "Chaînes causales — concept, structure, workflow", "contenu": "## Chaînes causales — concept, structure, workflow\n\nLes **chaînes causales** (`chains_causales`) sont les démonstrations narratives transverses du corpus Sol Vivant. Elles relient des mécanismes scientifiques étape par étape à travers les strates (F→S→V→P→H), rendant visible l'enchaînement causal d'un phénomène depuis sa racine jusqu'à ses conséquences globales.\n\n### Ce qu'une chaîne EST\n\n- Un **outil pédagogique transverse** : une chaîne traverse plusieurs docs et plusieurs strates, alors qu'une fiche zoome sur un point précis.\n- Un **argumentaire pour les prompts** : `prompts.contexte_sci` peut invoquer une chaîne pour illustrer une causalité de bout en bout.\n- Une **démonstration scientifique** : chaque étape doit être étayée par le thésaurus (`terms`) et la littérature interne (`jenni_sources`).\n\n### Ce qu'une chaîne N'EST PAS\n\n- Ce n'est pas une fiche (zoom ponctuel).\n- Ce n'est pas un schéma libre : chaque étape doit pointer vers un terme canonique du thésaurus.\n- Ce n'est pas un texte rédigé par Jenni : les chaînes sont rédigées par Claude/JMJ en direct (workflow spécifique, pas de cycle prompt Jenni).\n\n### Structure DB\n\n```sql\n-- Table des chaînes\nCREATE TABLE chains_causales (\n  id TEXT PRIMARY KEY,              -- C1, C2, ..., C16 (format \"C<N>\", préfixe C obligatoire)\n  titre TEXT NOT NULL,              -- \"A → B\" (flèche unicode comme séparateur)\n  docs_traverses TEXT,              -- \"P2/S4/S2/...\" (slash-joined, ordre des strates visitées)\n  valeur_ajoutee TEXT,              -- argumentaire pour les décideurs / enseignants\n  created_at TEXT\n);\n\n-- Étapes d'une chaîne (1-N)\nCREATE TABLE chain_etapes (\n  id INTEGER PRIMARY KEY AUTOINCREMENT,\n  chain_id TEXT REFERENCES chains_causales(id),\n  position INTEGER NOT NULL,        -- 1, 2, 3, ... (ordre narratif)\n  term_id INTEGER REFERENCES terms(id),  -- OBLIGATOIRE : terme pivot canonique\n  term_fr_text TEXT,                -- miroir lisible du terme (DOIT correspondre à terms.fr)\n  strate_etape TEXT,                -- F | S | V | P | H (strate de l'étape, peut différer du doc_code)\n  role_dans_chaine TEXT             -- rédaction 1-3 phrases qui LIE explicitement à la position précédente\n);\n```\n\n### Conventions (incidents 2026-04-11 → règles)\n\n1. **Numérotation** : `C<N>` uniquement (C1, C2, ..., C16). Pas de 0-padding, pas de préfixe doc.\n2. **Pas de placeholders `[XX]`** : les étapes créées en mars 2026 avaient `term_fr_text = '[P2]'` — incident résolu par la session 22 qui a rédigé C1-C6 à partir de zéro (cf. audit_reports #32).\n3. **term_id obligatoire** : une étape sans `term_id` est un bug. Le terme doit exister dans `terms` avant insertion de l'étape.\n4. **Cohérence term_fr_text ↔ term_id.fr** : `term_fr_text` est un miroir lisible. Si un terme est renommé dans `terms.fr`, re-synchroniser les étapes concernées.\n5. **Pas de préfixes parasites dans role_dans_chaine** : la session 2026-04-11 (audit #34) a retiré 13 préfixes `[P2]`, `[S4]` ajoutés par erreur lors de la rédaction automatique.\n6. **Lien narratif explicite** : chaque `role_dans_chaine` (sauf position 1) doit relier l'étape à la précédente par un verbe de liaison causale (\"→ alimente\", \"→ favorise\", \"→ transfère\").\n\n### Workflow création (pattern validé session 22)\n\nPattern `agent_runner` pour une chaîne complète (N étapes → 1 agent dédié) :\n\n1. **Préparer le contexte** (JSON par chaîne) :\n   - `titre` + `valeur_ajoutee`\n   - liste ordonnée des positions avec `doc_code` + titre du doc correspondant\n   - thésaurus filtré : pour chaque position, tous les termes dont `doc_code` contient le code doc cible (~80 candidats par position)\n2. **Lancer 1 agent par chaîne** (général-purpose, parallèle massif) avec mission :\n   - Choisir 1 terme pivot par position parmi les candidats\n   - Rédiger `role_dans_chaine` (1-3 phrases, liaison explicite à la position précédente)\n   - Maintenir cohérence narrative avec `titre` + `valeur_ajoutee`\n   - Sortir JSON strict : `{chain_id, etapes: [{position, doc_code, term_id, term_fr_text, role_dans_chaine, justification_choix}]}`\n3. **Consolider** : valider `term_id` existe, `strate_etape` cohérente, INSERT chain_etapes.\n4. **Référence de style** : pointer les agents vers les chaînes déjà rédigées (C7, C8, C9 après avril 2026, puis toutes les 16 après la session 22).\n\n### Workflow édition\n\n- **Changer un terme pivot** : UPDATE `term_id` + resynchroniser `term_fr_text` + réécrire `role_dans_chaine` si la connexion narrative change.\n- **Réordonner** : UPDATE `position`. Attention à la liaison narrative (1→2, 2→3...) qui dépend de l'ordre.\n- **Ajouter une étape** : shift des positions suivantes, puis INSERT avec le term_id canonique.\n- **Supprimer une étape** : vérifier qu'aucune `role_dans_chaine` suivante ne fait référence explicite à ce terme.\n\n### Articulation avec le corpus\n\n| Table amont/aval | Rôle | Obligatoire |\n|---|---|---|\n| `terms` | Terme pivot de chaque étape (`chain_etapes.term_id`) | Oui |\n| `documents` | Strates traversées (`chains_causales.docs_traverses`) | Oui |\n| `jenni_sources` | Étayage scientifique dans `role_dans_chaine` (via référence textuelle) | Recommandé |\n| `concept_cards` | Concept(s) renforcés par la chaîne (via `card_chain_links`) | Optionnel |\n| `fiches` | Certaines fiches transversales invoquent des chaînes | Optionnel |\n| `prompts.contexte_sci` | Les chaînes peuvent être citées comme argumentaire | Optionnel |\n\n### Requêtes utiles\n\n```sql\n-- Inventaire des chaînes\nSELECT id, titre, docs_traverses FROM chains_causales ORDER BY CAST(substr(id,2) AS INTEGER);\n\n-- Chaîne détaillée\nSELECT position, strate_etape, term_fr_text, role_dans_chaine\nFROM chain_etapes WHERE chain_id='C1' ORDER BY position;\n\n-- Audit : étapes sans term_id (bug)\nSELECT chain_id, position, term_fr_text FROM chain_etapes WHERE term_id IS NULL;\n\n-- Audit : placeholders résiduels\nSELECT chain_id, position, term_fr_text FROM chain_etapes\nWHERE term_fr_text LIKE '[%' OR role_dans_chaine LIKE '%[%]%';\n\n-- Audit : term_fr_text désynchronisé de terms.fr\nSELECT ce.chain_id, ce.position, ce.term_fr_text, t.fr\nFROM chain_etapes ce JOIN terms t ON t.id=ce.term_id\nWHERE ce.term_fr_text != t.fr;\n```\n\n### Historique et sessions de référence\n\n- **2026-03-20** : création initiale C1-C9 avec placeholders `[XX]` (jamais rédigé).\n- **2026-04-11 Session 22** :\n  - `audit_reports #32` — rédaction C1-C6 (43 étapes, 6 agents parallèles)\n  - `audit_reports #33` — création C10-C16 (7 chaînes, 56 étapes)\n  - `audit_reports #34` — harmonisation C7-C9 + retrait 13 préfixes parasites\n- **État actuel** : 16 chaînes, 121 étapes, aucun placeholder, toutes les étapes liées à un `term_id`.\n\n### Scripts consommateurs\n\n- `tools/admin/check_integrity.py` (audit placeholders + FK term_id)\n- `tools/admin/audit_opus.py` (inventaire des chaînes)\n- `tools/docs/gen_web.py` + `gen_dashboard.py` (rendu cartographie onglet \"Chaînes\")\n- `tools/docs/gen_concept_cards.py` (liens `card_chain_links`)\n- `tools/docs/gen_explorer.py` (exploration via interface web)\n", "type": "reference", "crit": true}]}}, "pipeline": {"thesaurus": {"nom": "Pipeline thesaurus", "entries": [{"id": 138, "titre": "Ne pas modifier le libelle fr canonique d'un terme existant", "contenu": "## Règle absolue — le `fr` canonique d'un terme ne se modifie JAMAIS automatiquement\n\n**Le champ `terms.fr` est la CLÉ ÉDITORIALE qui fait l'aller-retour avec Jenni.**\n\nWorkflow Jenni :\n1. On exporte une liste de termes vers Jenni (via `export_thesaurus_incomplets.py` ou `gen_prompt_thesaurus.py`)\n2. Jenni reçoit le libellé EXACT de la DB → elle le recopie verbatim dans son docx de retour\n3. On réimporte via `import_termes_jenni.py --replace` → le TERME du docx remplace/matche le terme en DB\n\n**Conséquence** : si on modifie automatiquement le `fr` en DB (casse, ponctuation, espaces, apostrophes, tirets), on crée un cycle vicieux :\n- Export : Jenni reçoit la version modifiée\n- Retour Jenni : le docx a la version modifiée (Jenni ne rétablit pas)\n- Réimport : DB reste avec la version modifiée\n- Perte définitive de la casse/ponctuation d'origine\n\n**Incident de référence — 2026-04-20** : le Chantier A (normalisation casse initiale via agents Task, commit 5970137) avait baissé la Majuscule initiale de **216 termes** (Antifragilité → antifragilité, Biofilms → biofilms, Bioturbation → bioturbation, etc.) selon une règle typographique française stricte (noms communs en min). Or Jenni écrit ces termes en Majuscule initiale (convention standard de thésaurus). Après le Chantier A :\n- Les exports envoyaient à Jenni \"antifragilité\" → Jenni retournait \"antifragilité\"\n- Le cycle a failli être définitif\n\nCorrection (commit 86408df) : restauration de la casse Jenni pour les 216 termes + migration des term_relations associées.\n\n**Interdictions absolues** :\n- ❌ Lancer un script qui modifie automatiquement la casse initiale de tous les termes\n- ❌ Normaliser les apostrophes, tirets, espaces dans le `fr` sans audit préalable de la casse Jenni\n- ❌ Appliquer une règle typographique abstraite (française, ISO 25964, etc.) au `fr` existant\n- ❌ Baser un fix sur une décision agent Task automatisée sans validation JMJ\n\n**Règles autorisées** :\n- ✅ Modifier le `fr` d'UN terme spécifique après validation explicite JMJ\n- ✅ Les agents Task peuvent CLASSIFIER / ANALYSER / COMPTER mais pas DÉCIDER d'un changement de libellé\n- ✅ Normalisations typographiques dans les champs `definition`, `syn_fr`, `syn_en`, `bt`, `rt` (qui ne font pas l'aller-retour direct avec Jenni comme clé)\n\n**Conséquence sur les scripts existants** :\n- `import_termes_jenni.py` : en mode `--replace` match par `fr` normalisé (casse/apostrophes ignorées) — OK\n- Chantier A doit être considéré comme une erreur qui ne doit JAMAIS être reproduite sur le `fr` canonique\n- Si une décision éditoriale veut changer la casse/ponctuation d'un terme : passer par JMJ + export Jenni coordonné\n\n**Pour les champs secondaires** (definition, syn_fr, syn_en, bt, rt) : les modifications (normalisation apostrophes, cleanup URLs, ajout formules OMML via parser math-aware) sont OK car ces champs ne font pas clé avec Jenni.", "type": "regle_absolue", "crit": true}, {"id": 53, "titre": "Maintenance thésaurus", "contenu": "Ajouter un terme concept :\n```sql\nINSERT INTO terms (section_key, strate, fr, en, definition, doc_code, type, statut)\nVALUES ('S2', 'S', 'terme fr', 'english term', 'Définition complète.', 'S2', 'concept', '◆');\n```\n\nAjouter un terme glossaire (support, définition courte) :\n```sql\nINSERT INTO terms (section_key, strate, fr, en, definition, doc_code, type, statut)\nVALUES ('S2', 'S', 'terme fr', 'english term', 'Définition courte.', 'S2', 'glossaire', '~');\n```\n\n**Deux types de termes :**\n- `concept` (défaut) — terme structurant du corpus avec définition complète, synonymes, INRAE, relations\n- `glossaire` — terme support apparaissant dans les relations (rt), définition courte, pas de synonymes requis\n\nRéassigner un terme :\n```sql\nUPDATE terms SET doc_code = 'S1', section_key = 'S1' WHERE id = 237;\n```\n\nFusionner un doublon :\n```sql\nDELETE FROM terms WHERE id = 238;  -- garder le plus complet\n```", "type": "commande", "crit": false}, {"id": 71, "titre": "Pseudoscience — flag et définitions factuelles", "contenu": "**Règle** : le corpus ne fait pas de publicité pour la pseudoscience.\n\n**Terme concerné** : `Agriculture Biodynamique` (ID 160, strate F, doc F1/F2)\n- Définition réécrite : factuelle, sourcée (Chalker-Scott 2013, Rienth 2024, FiBL 21 ans, MIVILUDES 2024)\n- `flag_pseudoscience = 1` dans la table `terms`\n\n**Mécanisme** :\n- La colonne `flag_pseudoscience` (INTEGER, défaut 0) permet de marquer tout terme relevant de la pseudoscience\n- Les scripts d'export (Jenni, prompts) doivent filtrer ou signaler les termes marqués\n- La définition contient un avertissement visible : ⚠ Pseudoscience\n\n**Principe** : le corpus traite d'agriculture régénératrice fondée sur la science. Les pratiques sans validation scientifique (biodynamie, électroculture, basalte magnétique) sont documentées factuellement mais jamais valorisées.\n\n**Dossier source** : `jmj/biodynamie.docx` — analyse critique complète (Steiner, préparations, MIVILUDES, infiltration INRAE, marché commercial).\n\n**Requête de contrôle** :\n```sql\nSELECT id, fr, definition FROM terms WHERE flag_pseudoscience = 1;\n```", "type": "regle", "crit": true}, {"id": 115, "titre": "Listes de termes triées alphabétiquement (règle absolue workflow Jenni)", "contenu": "## Thésaurus — listes de termes triées alphabétiquement obligatoire\n\n**Règle** : toute liste de termes envoyée à Jenni (workflow thésaurus : bloc\nde 10, complétion, redéfinition) **doit être triée alphabétiquement** sur le\nlibellé FR.\n\n### Justification\n\nObservé en conditions de production : une liste non triée (par ordre\nd'ajout, par id, ou par strate) perturbe le traitement Jenni — elle se\nperd dans la « position » dans la liste (`Dernier terme traité : X`),\nrate des termes, ou mélange les blocs de 10.\n\nAvec un tri alphabétique strict :\n- Jenni retrouve immédiatement où reprendre (« après Z comes AA »)\n- Les blocs de 10 sont prédictibles\n- Pas de dérive dans la séquence\n\n### Application côté production\n\nLes scripts qui génèrent des listes pour Jenni appliquent déjà ce tri :\n\n- `tools/jenni/export_thesaurus_incomplets.py` : `ORDER BY lower(fr)`\n- Tout nouveau script de génération de listes de termes doit suivre la\n  même convention\n\nVérif SQL standard :\n```sql\nSELECT fr FROM terms WHERE strate='S' ORDER BY lower(fr);\n```\n\nLe `lower()` garantit que la casse ne casse pas le tri (« mulch » et\n« Mulch » classés ensemble).\n\n### Format du docx de sortie\n\nListe à puces verticale, un terme par ligne, sans indication de champs\nmanquants ni formatage de consigne (cf règle « docx minimal » et charte\nde travail JMJ). Jenni applique son propre format de sortie via son prompt.\n\n### Référence\n\nRègle formalisée par JMJ le 2026-04-14 suite à observation répétée de\nconfusions Jenni sur listes non triées.\n", "type": "regle", "crit": true}, {"id": 116, "titre": "Workflow thésaurus — import, complétion, déduplication", "contenu": "## Workflow thésaurus Jenni — scripts et doctrine\n\n**Chaîne de traitement complète** d'un docx Jenni de thésaurus (format TERME/EN/DEF/SYN_FR/SYN_EN/BT/RT) :\n\n### 1. Export demande de complétion\n\nLes termes incomplets **repassent dans le workflow thésaurus standard** :\nlistes à puces en docx qui fait le round-trip avec Jenni, pas de prompt\ntexte spécifique.\n\n```bash\n# Export docx listes à puces (triées alphabétiquement, pour Jenni workflow bloc de 10)\npython3 tools/jenni/export_thesaurus_incomplets.py --db sol_vivant.db --strates F,S,V,P,H\n```\n\nSortie : `recherches/thesaurus/thesaurus_incomplets_strate_<X>_<date>.docx`\n\n**Filtre doctrine** : `flag_pseudoscience=1` exclu (les définitions des\ntermes tagués pseudoscience — Agriculture Biodynamique — sont figées et\nne doivent pas être redéfinies par Jenni).\n\nLe retour Jenni arrive en `recherches/thesaurus/thesaurus___strate_X.docx`\n(même format que les imports initiaux), ce qui permet le réimport via\n`import_termes_jenni.py --replace` (étape 2).\n\n⚠ **Déprécié** : `gen_prompt_completion.py` générait des prompts texte\n`complete_{strate}_{date}.txt`. Redondant avec le workflow docx ci-dessus.\nLes fichiers générés sont archivés dans `recherches/archives/completion/`.\n\n### 2. Import retour Jenni\n\n```bash\n# Dry-run puis apply\npython3 tools/jenni/import_termes_jenni.py --db sol_vivant.db \\\n    --docx recherches/thesaurus/thesaurus___strate_X.docx --strate X --replace\npython3 tools/jenni/import_termes_jenni.py ... --apply\n```\n\nMode `--replace` = UPDATE intégral si match unique trouvé. Sans match = INSERT.\nMultiples matches = BLOQUÉ (conflit à résoudre).\n\nContrôle anti-doublon 8 axes : fr/en cross × syn_fr/syn_en cross.\n\n### 3. Résolution conflits (bloqués multi-match)\n\n```bash\npython3 tools/jenni/resolve_import_conflicts.py --db sol_vivant.db --docx X.docx \\\n    --skip-fr \"MO,Rhizodéposition\"  # faux positifs norm()\npython3 tools/jenni/resolve_import_conflicts.py ... --apply\n```\n\n**Fonctionnalités clés** :\n- `--skip-fr` : exclut les termes dont `norm()` collisionne à tort\n  (ex: `norm(\"Mo\") = norm(\"MO\") = \"mo\"` : Molybdène vs Matière Organique)\n- Reload d'index entre chaque résolution : évite chain-collisions\n  (résoudre A peut modifier les matches de B)\n\n### 4. Déduplication périodique\n\n```bash\npython3 tools/admin/dedupe_thesaurus.py --db sol_vivant.db  # dry-run\npython3 tools/admin/dedupe_thesaurus.py --db sol_vivant.db --apply\n```\n\nFusion avec scoring qualité + migration term_relations + merge syn_fr/syn_en.\n\n### 5. Audit\n\nScript inline dans sessions : vérifier 11 axes (distribution, complétude,\nleaks méta-vocab, doublons, acronymes orphelins, pseudoscience, statut,\norphelins relations, couverture INRAE, isolation).\n\n### ⚠ Qualité éditoriale des listes — pas la taille (constat 2026-04-14)\n\nJMJ : *\"Non ça passe jusqu'à 150 tranquille, si la liste est bonne. Même\nune petite liste peut dérailler\"*.\n\nLa taille n'est PAS le facteur principal de dérive de Jenni. Elle tient\njusqu'à ~150 termes en un envoi si la liste est propre. À l'inverse, une\npetite liste mal cadrée peut aussi la faire dériver.\n\nCauses réelles de dérive (à diagnostiquer en pré-envoi) :\n\n1. **Tri erratique** — case-sensitive ASCII (COV avant Candida) cassait\n   la perception d'ordre. Corrigé par `lower(fr)` partout (commit 2026-04-14).\n2. **Termes `fr == en` (anglais déguisé)** — 140 cas dans la DB au\n   constat. Demander à Jenni de \"définir Soil Continuum Model\" en français\n   alors que le terme est en anglais la fait dériver vers une définition\n   anglaise ou une improvisation. Audit + correction au cas par cas\n   (taxons et noms propres restent identiques, vrais termes EN à traduire).\n3. **Doublons / sub-concepts mélangés** — ex : avoir \"polysaccharides\"\n   et \"EPS\" tous deux dans la liste sans hiérarchie crée de l'ambiguïté\n   (Jenni redéfinit l'un en référence à l'autre, génère des conflits).\n4. **Termes mal cadrés** — entrées historiques imprécises ou avec\n   méta-vocab résiduel.\n\n**Solution prioritaire** : qualité de la liste avant envoi, pas\nfragmentation forcée.\n\nLe script `export_thesaurus_incomplets.py` accepte `--max-per-batch=N`\nen option (défaut 0 = pas de fragmentation) — à utiliser uniquement en\ncas de dérive avérée comme palliatif.\n\n### Tri alphabétique strict (constat 2026-04-14)\n\nTous les exports `ORDER BY fr` sont passés à `ORDER BY lower(fr)` pour\néviter le tri ASCII case-sensitive (qui mettait majuscules d'abord puis\nminuscules — ex : COV, CUE, Candida au lieu de Candida, COV, CUE).\n", "type": "commande", "crit": true}]}, "fiches": {"nom": "Pipeline fiches", "entries": [{"id": 69, "titre": "Fiches — zoom d'un point précis du corpus", "contenu": "## Fiches — zoom d'un point précis du corpus\n\n### Définition (canonique)\n\n> **Une fiche est un zoom d'un point du corpus.**\n\n- **Zoom** : approfondissement, focalisation\n- **Un point** : un sujet précis, ponctuel, délimité (un taxon, un mécanisme, une technique, un concept circonscrit)\n- **Du corpus** : ancré dans un ou plusieurs documents existants — la fiche enrichit ces docs cibles\n\n### Ce qu'une fiche EST\n\n- Un travail proactif d'**élargissement du savoir** sur un point intéressant\n- Un sujet **transversal** qui touche plusieurs strates ou plusieurs docs sans appartenir à un seul\n- Une **demande à Jenni** structurée, qui produit un .docx → contenu intégré dans `prompts.contexte_sci/.enrichissement` des docs cibles\n\n### Ce qu'une fiche N'EST PAS\n\n- ❌ Une **validation** d'affirmation ou d'une chaîne causale → table `validations` (mode `validation`)\n- ❌ Un **comblement de lacune** identifié par audit → table `validations` (mode `renforcement` ou `comblement`)\n- ❌ Un fourre-tout de notes ou d'informations vrac\n- ❌ Un dépôt méta-commenté par Claude (« Le corpus contient désormais… »)\n- ❌ Une analyse croisée trop large qui chevauche un doc de strate (= devrait être absorbé dans le doc P/S/V/F/H concerné)\n\n### Sous-types de fiches (`fiches.type`)\n\n| Type | Définition | Charte applicable |\n|---|---|---|\n| `zoom` | Zoom standard sur un point précis | Charte Jenni générique (BQ #40, #41, #101) |\n| `technique` | Zoom sur une technique / protocole DIY | **Charte fiches techniques** (BQ dédiée) — structure standardisée 8 sous-blocs |\n\n### Structure DB\n\n- `fiches` : métadonnées (slug, titre, type, strates, docs_cibles, statut)\n- `fiche_sections` : sections du prompt à envoyer à Jenni (contexte_sci, instructions par section)\n- `fiche_contenus` : **contenu Jenni intégré post-production** (contenu_brut, contenu_integre, refs, notes_claude)\n\n**Règle stricte de séparation des champs** :\n- `fiche_sections.contexte_sci` = ce que la science dit déjà sur le sujet (avant la demande à Jenni)\n- `fiche_sections.instructions` = ce que Jenni doit produire pour cette section\n- `fiche_sections.enrichissement` = ⚠ champ à usage strict — réservé à du contexte additionnel pour Jenni, jamais du méta-commentaire Claude, jamais le contenu Jenni reçu (qui va dans `fiche_contenus`)\n- `fiche_contenus.contenu_integre` = contenu Jenni reçu et intégré\n\n### Champs à NE PAS utiliser\n\n- `fiches.prompt_jenni` : **legacy mort**, plus lu par `export_fiche.py` v2.0. À vider.\n- `fiches.sources_dois` : **dead data**, jamais utilisé par les scripts. La biblio de référence est dans Zotero, alimentée via le pipeline Jenni. Cf. règle BQ #102 (workflow notes volantes).\n\n### Cycle de vie (`fiches.statut`)\n\n```\na_faire    → créée en DB avec docs cibles + objet\nen_cours   → Claude prépare/affine le prompt Jenni\nenvoye     → fichier .txt généré et copié dans Jenni\nrecu       → .docx Jenni récupéré\nintegre    → contenu intégré dans prompts.contexte_sci/.enr des docs cibles + fiche_contenus\narchive    → terminé, sort de la vue active\n```\n\n### Workflow\n\n1. Identifier un point précis qui mérite un zoom (audit, lecture, intuition)\n2. Créer la fiche (slug, titre, type, docs_cibles)\n3. Renseigner `fiche_sections` (1 par section attendue dans le rendu Jenni)\n4. Générer le prompt via `export_fiche.py` → `recherches/prompts_fiche_{slug}.txt`\n5. Copier dans Jenni, récupérer le .docx\n6. Claude analyse → contenu vers `fiche_contenus.contenu_integre` + extraction termes vers `terms` + intégration dans `prompts.contexte_sci/.enr` des docs cibles\n7. Marquer la fiche `integre`\n\n### Lien avec la production du corpus\n\nUne fiche **integre** alimente les `prompts` des docs cibles, ce qui contribue à leur **clôture** (cf. BQ « Modèle conceptuel — production du corpus »). Tant qu'une fiche pertinente reste à produire, le doc cible n'est pas en `pret_a_rediger`.", "type": "reference", "crit": true}, {"id": 107, "titre": "Reprise d'une fiche validée — export .docx vers Jenni", "contenu": "## Reprise d'une fiche déjà validée — format d'entrée pour Jenni\n\n**Contexte** : une fiche déjà en statut `integre` (contenu validé scientifiquement) doit être retouchée — enrichissement bibliographique, ajout d'une section, correction, reformatage `[N]`, etc.\n\n**Règle** : le format d'entrée dépend du canal utilisé.\n\n### Canal 1 — Chat Jenni (direct)\n\nPour une demande simple et ponctuelle, JMJ peut interroger Jenni directement dans le chat : copier-coller du contenu ou description de la modification attendue. Jenni enrichit à la volée.\n\n**Claude n'a rien à préparer** — c'est un flux conversationnel côté JMJ.\n\n### Canal 2 — Document de travail (upload)\n\nPour une reprise structurée avec plusieurs sections ou un enrichissement systématique, Jenni travaille sur un **document de travail uploadé dans le projet**. Le format d'import attendu est `.docx`.\n\n**Règle Claude** : dans ce cas uniquement, Claude doit produire un `.docx` depuis le contenu DB (contenu_integre ou prompt structuré). Jamais de `.txt` brut, Jenni ne le reconnaît pas comme document de travail.\n\n**Outils** : `python-docx` via un script ad-hoc ou une fonction dans `tools/jenni/`.\n\n### Ce qui reste inchangé\n\n- Nouvelle fiche (jamais rédigée) : Claude produit un `.txt` via `export_fiche.py` → copier-coller dans le chat Jenni (pas d'upload)\n- Enrichissement thésaurus : `gen_prompt_enrichissement.py` → `.txt` copier-coller\n- Prompts Jenni en chat direct : toujours `.txt`\n\n### Pourquoi ce format spécifique au cas « reprise fiche validée »\n\nJenni distingue le **document de travail** (uploadé, qu'elle peut `fetch_document`) d'une **demande du chat** (one-shot). Le .docx est le format canonique du document de travail — il permet à Jenni de lire le contenu validé, le citer, l'étendre, sans perdre le fil entre sessions.\n\n### Workflow type — reprise fiche validée via .docx\n\n1. Claude exporte `fiche_contenus.contenu_integre` → `.docx` (nettoyer les codes docs, métadonnées corpus)\n2. JMJ upload le `.docx` dans le projet Jenni concerné\n3. Dans le chat : « Jenni, consulte mon document [titre]. Enrichis la section X en ajoutant les refs [N] »\n4. Jenni produit une nouvelle version enrichie + .ris\n5. JMJ récupère, import Zotero, Claude réintègre dans `fiche_contenus.contenu_integre`\n", "type": "regle", "crit": false}, {"id": 130, "titre": "Fiche — création → Jenni → intégration consciente", "contenu": "## Workflow Fiche — création → Jenni → intégration consciente\n\n### Qu'est-ce qu'une fiche\n\n> Une fiche = un **zoom** d'un point du corpus.\n> - *Zoom* : approfondissement, focalisation\n> - *Un point* : un sujet précis, scientifiquement original\n> - *Du corpus* : elle **nourrit** les `prompts.contexte_sci / .enrichissement` d'un ou plusieurs documents cibles\n\nTable `fiches` · 3 types actifs :\n\n| Type | Usage | Structure |\n|---|---|---|\n| `transversale` | Relie plusieurs documents (ex : quorum sensing → S2 + V2 + P1) | Charte §1.C : Title + Intro + H1 numérotés + Résumé + Termes |\n| `technique` | Protocole DIY (KNF, chélation AA, Rhodopseudomonas) | Charte §1.D : idem + 5 H2 par section (Contexte sci / Protocole / Indicateurs / Précautions / Applications) |\n| `zoom` | Approfondissement ciblé (ex : Kirkby/AMG) | Structure standard |\n\n### Cycle de vie — statuts\n\n```\na_faire    → Fiche créée en DB, sujet défini, docs_cibles choisis\nen_cours   → Claude prépare/affine le prompt Jenni\nenvoye     → Fichier .docx généré et donné à Jenni\nrecu       → .docx Jenni récupéré (stocké dans docx/)\nintegre    → Contenu intégré en DB + docx archivé\narchive    → terminé, sort de la vue active\n```\n\n`integre_partiel` : intégration incomplète (ex : fiche technique sans protocole testé).\n\n---\n\n## Principe unique — le docx = le doc dans son état actuel\n\n**Le prompt n'est pas une discussion avec Jenni.**\n\n**La graine = l'état de la connaissance du corpus à l'instant t.** Claude ne simule pas un manque avec une typographie distinctive ; il écrit ce que le corpus dit aujourd'hui, dans une prose continue. Jenni voit un document, elle le complète là où elle identifie des manques, comme un auteur qui reprend son propre brouillon. C'est le **document lui-même**, dans son état courant dans le corpus.\n\nJenni lit un document, pas des instructions. Elle voit ce qui est écrit, elle voit ce qui manque , et elle complète — comme un auteur qui reprend son propre brouillon.\n\n### Continuum d'état\n\nUn même doc évolue selon son avancement en DB :\n\n| État | Ce qu'on exporte dans le .docx |\n|---|---|\n| **Fiche nouvelle** (jamais rédigée) | Titre + structure H1/H2 + graine complète (état de la connaissance du corpus à l'instant t) |\n| **Fiche en cours** (sections partielles) | Contenu final là où c'est rédigé · densité variable selon l'état du corpus · structure complète visible |\n| **Fiche presque finie** (enrichissement final) | Quasi-final · amorces seulement sur ce qui reste à creuser |\n\nLe docx est **toujours lisible comme document**. Jamais de `[à compléter]`, jamais de métaphrases « Jenni, rédige cette section ». Le contenu est rédigé en continu, densité plus ou moins forte selon l'état actuel du corpus. Pas de marque visuelle distinguant « déjà écrit » de « à développer ».\n\n### Conséquence : même script pour tous les états\n\n`tools/jenni/gen_fiche_prompt_docx.py --fiche-id <id>` produit le docx quel que soit l'état. Il lit :\n- La structure canonique (charte §1.C + §1.D pour technique)\n- Le contenu existant dans `fiche_contenus.contenu_integre` + `fiche_section_h2_notes.contenu_md`\n- Les texte rédigé dans `fiche_section_h2_notes.note_md`\n\nEt il assemble le document dans son état courant : contenu là où il existe, amorce là où il manque.\n\n### Format = sortie Jenni (on mime ce qu'elle nous rend)\n\nLe docx est produit dans le **même format que celui que Jenni renvoie** : mêmes styles Word (Title, Heading 1/2/3), même ordre des blocs (Title → Introduction → sections → Résumé → Termes → Bibliographie), même typographie. Cohérence d'aller-retour : Jenni voit son propre format, reconnaît son document, enrichit sans artefact de reformatage.\n\n**Inclusion des sources** (format Jenni natif) :\n- Citations inline dans les amorces au format `(Auteur, année)`, au plus près des affirmations qu'elles soutiennent.\n- Section `H1 Références` en fin de doc avec les refs complètes format APA : une ref par paragraphe, tri alphabétique par premier auteur, DOI/URL à la fin.\n- C'est le pattern Jenni (voir `docx/quorum_sensing_rhizosphere.docx`) : elle utilise inline + style `JenniRefBody` en fin. Au retour, elle remplace par ses propres hyperlinks internes (dummy-citation.com) et reformate la biblio.\n\n**⚠ Piège à tester — autoréférence `(nd)`**\n\nQuand on upload un docx à Jenni comme « document de travail » et qu'elle l'enrichit, il y a un risque qu'elle cite **le document lui-même** comme source (format typique : `(nd)` = *no date*, ou `(Titre du doc, nd)`). C'est un artefact de projets où l'outil considère le document d'entrée comme une ressource.\n\n**Cas à monitorer** : après un retour Jenni sur un docx enrichi, scanner le contenu :\n```python\nimport re\nm = re.findall(r'\\(([^)]*(?:n\\.?d\\.?|nd|Untitled|Document))[^)]*\\)', contenu)\n# Si des matches -> autoreference a corriger\n```\n\nSi détecté → amender le workflow (ex : marquer clairement le docx comme *brouillon*, ne pas mettre de Title trop spécifique qui pourrait être cité, ou préfixer la Title par `[Working]`).\n\n**Test à faire** : produire un docx avec sources existantes, l'uploader dans un projet Jenni, lui demander d'enrichir une section précise, vérifier que les nouvelles refs ajoutées n'incluent pas le docx lui-même.\n\n### Structure canonique de référence\n\n```\n[Title court sans accent — ex : \"Coevolution Plante Microbe 450Ma\"]\n\n[# H1] Introduction\n  {contenu rédigé selon l'état actuel du corpus}\n\n[# H1] 1. [Titre section 1]\n  {contenu · sinon amorce}\n\n[# H1] 2. [Titre section 2]\n  {contenu · sinon amorce}\n\n...\n\n[# H1] Résumé\n  {contenu · sinon amorce}\n\n[# H1] Termes canoniques\n  [tableau : Terme — EN: Traduction]\n```\n\nPour fiche `technique` : chaque H1 numérotée a en plus 5 H2 plats (Contexte scientifique · Protocole · Indicateurs de qualité · Précautions & Stockage · Applications & Dosages). Sous Protocole : paragraphes **Ingrédients —**, **Équipement —**, **Procédure —** (préfixe gras, pas H3).\n\n### Le cadrage éditorial — la graine\n\n1. **Délégation cognitive** — l'amorce nomme les dimensions attendues (« mécanismes, constantes thermodynamiques, comparaisons avec alternatives, niveaux de preuve »). Jenni dépense son budget recherche sur l'approfondissement, pas sur la reconstruction du cahier des charges.\n\n2. **Souveraineté éditoriale** — *nous* décidons de l'angle (mécanismes thermodynamiques *plutôt que* histoire du concept), du niveau de précision, des comparaisons. Jenni devient exécutante d'un plan, pas co-décideuse.\n\n3. **Activation lexicale du thésaurus** — les amorces sont écrites **dans le vocabulaire du thésaurus corpus**, pas en français neutre. Planter 3-5 termes canoniques dans chaque amorce active leur présence dans le contexte cognitif de Jenni.\n\nExemple bon vs mauvais :\n\n> ✗ Neutre : *\"Expliquer comment les acides aminés se lient aux métaux.\"*\n> ✓ Corpus : *\"Mécanismes de chélation (stabilité des complexes, liaisons coordonnées), constantes thermodynamiques, comparaison avec alternatives, niveaux de preuve d'absorption foliaire ou racinaire.\"*\n\n### Canaux selon l'état\n\n- **Fiche nouvelle ou trous significatifs** → .docx dans `recherches/fiches/`, donné à Jenni comme document de travail (upload dans le projet concerné)\n- **Enrichissement ponctuel simple** → chat Jenni direct, JMJ dialogue, pas de docx nécessaire\n- **Reprise structurée multi-sections** → .docx uploadé dans projet Jenni, elle `fetch_document` et complète les trous signalés\n\n---\n\n## Contraintes de rendu (tous docx destinés à Jenni)\n\n**Hiérarchie** : Title (level 0) + H1/H2/H3 (H3 max). Pas de H4 — sous-structures au-delà passent en gras inline ou liste.\n\n**Title** : court (≤ 5 mots), sans accent, sans caractères spéciaux. Jenni utilise le Title comme nom de fichier de retour. Dériver via `titre_court_sans_accent(slug)`.\n\n**Pas d'ASCII décoratif** : aucune ligne de séparation (`─`, `===`, `---`), aucune banderole (`## TITRE ##`), aucun ornement (`▸ ▪ ❯`). La structure visuelle passe uniquement par Title/H1/H2/H3.\n\n**Structure plate sous un H1** : si un H1 a plusieurs H2 au même niveau (ex : 5 blocs charte technique), éviter d'ajouter des H3 dans l'un d'eux. Utiliser des paragraphes **préfixe gras** pour les sous-listes.\n\n**Règles BQ-clean** : aucun code doc (S0, S1, V2…), aucun méta-vocab (`corpus`, `strate`, `cross-ref`, `concept card`, `thésaurus`, `sol_vivant.db`). Le prompt parle science, pas structure interne.\n\n---\n\n## Phase 4 — Intégration consciente (retour Jenni → DB)\n\nMême règle d'or que l'intégration de sources : **une fiche à la fois, lecture complète, jamais de batch.**\n\n**4.1 Lecture intégrale** du .docx retour. Identification :\n- Nouveaux termes canoniques (candidats au thésaurus)\n- Concept cards du corpus concernées (1-6 cartes renforcées par fiche)\n- Citations et refs biblio (auteurs, année, DOI)\n\n**4.2 Extraction — structurée par section, pas en blob** (avril 2026) :\n\nLe parser docx lit le plan DB (`fiche_sections` par ordre) et extrait le texte **section par section**. Pour chaque section il nettoie **une seule fois** :\n- OMML → Unicode (formules Jenni, déjà implémenté dans `import_termes_jenni`)\n- LaTeX inline → Unicode\n- `**gras**`, backticks, `Card #N` → rendu final propre\n- Tags Jenni résiduels (`[Fiche zoom...]`, `(nd)` autoréférences) → supprimés\n- Refs inline normalisées FR→EN (`auteurs`→`authors`, `annee`→`year`) + DOI→url\n\nRésultat : `fiche_sections.contenu` (TEXT, nouveau champ) — une ligne = une section, texte prêt à afficher, aucun parsing au rendu.\n\nChamps `fiche_contenus` :\n- `refs` : liste JSON `{authors, year, title, doi, url}` (cache d'affichage reconstruit à chaque import)\n- `notes_claude` : choix éditoriaux, dettes identifiées\n- `contenu_integre` : **legacy** — conservé en lecture pour l'historique des fiches déjà intégrées, plus écrit par les nouveaux imports (blob markdown non structuré)\n\nVoir BQ `trios_parallels` pour le principe architectural générique.\n\n**4.3 Enrichissement thésaurus** (si termes nouveaux) — protocole strict avec dedup 4 axes (`import_termes_jenni`).\n\n**4.4 Audit concept_cards** (obligatoire, cf. #106) :\n- Rechercher cartes existantes qui couvrent le sujet\n- Renforcer via bloc « Analyse Claude » dans `concept_cards.notes`\n- Ne pas créer de nouvelle carte sans nécessité\n\n**4.5 Statut** → `integre`.\n\n**4.6 Archivage auto** (règle absolue CLAUDE.md) :\n```\ndocx/<name>.docx → docx/archives/<name>.docx\nrecherches/fiches/prompt_fiche_*.docx → recherches/fiches/archives/...\n```\nVia `tools/admin/integrate_fiche_docx.py::archive_fiche_files()` — idempotent, journalisé `audit_log(operation='ARCHIVE', table='files')`.\n\n**4.7 Audit log** :\n```python\nINSERT INTO audit_log (operation, table_name, record_ref, detail) VALUES (\n  'UPDATE', 'fiche #<id> — audit concept_cards',\n  f'Post-integration fiche #<id> (<slug>). <N> cartes enrichies (#..., #...). Bloc Analyse Claude ajoute.'\n)\n```\n\n---\n\n## Workflow granulaire optionnel — `fiche_section_h2_notes`\n\nPour fiches techniques complexes, une table de travail bloc par bloc (H2) existe : `fiche_section_h2_notes` (64 rows). Permet de :\n- Éditer une note H2 sans régénérer toute la fiche\n- Analyser un contenu retour sur 1 bloc (libère le contexte Claude)\n- Versionner par H2\n- Partager les notes communes (ex : precautions similaires entre fiches DIY)\n\nPipeline : prompt → envoye → retour (extraction auto termes/sources/[N] bruts) → analyse → valide → integre.\n\nScripts : `integrate_fiche_retour.py` (parse docx retour), `gen_fiche_prompt_docx.py` (lit `note_md` par bloc H2).\n\n---\n\n## Scripts clés\n\n| Script | Rôle |\n|---|---|\n| `tools/jenni/gen_fiche_prompt_docx.py` | Génère le .docx (Cas A : plan-graine · Cas B : final + trous graines) |\n| `tools/jenni/integrate_fiche_retour.py` | Parse docx retour → fiche_section_h2_notes (workflow granulaire) |\n| `tools/admin/integrate_fiche_docx.py` | Archive auto post-intégration + règle absolue |\n| `tools/jenni/edit_fiche_note.py` | Edit du champ `notes_editoriales_h2` |\n\n## Règles de production du docx (rappels pratiques)\n\nLeçons accumulées des sessions. À **respecter par défaut** sans qu'il faille les redemander :\n\n1. **Aucune consigne dans le docx** — jamais de « Dimensions attendues », « Jenni, rédige… », « [à compléter] », « Tableau comparatif X vs Y ». Le docx est un document, pas un dossier d'instructions. Les consignes restent dans les amorces scientifiques, pas en meta.\n\n2. **Accents français corrects** — `évolution`, `écologie`, `énergie`, `é/è/ê/à/ô/ç`. Jamais d'ascii dépouillé pour \"simplifier\". Même les amorces que Claude rédige pour le corpus doivent être dans un français soigné.\n\n3. **Termes canoniques dans le texte, pas en tableau final** — première mention avec EN entre parenthèses (ex : *« mycorhize arbusculaire (arbuscular mycorrhiza, AM) »*). Pas de section « Termes canoniques » en fin. L'activation lexicale se fait par **usage** dans les amorces.\n\n4. **Title court sans accent** — Jenni utilise le Title comme nom de fichier de retour (ex : `Mycorhizes Am Ecm Symbiose Fonctionnelle`). ≤ 5 mots, pas d'accents, pas de caractères spéciaux.\n\n5. **Refs inline + Références en fin (chaque ref avec DOI et/ou URL)** — citations inline au format `(Auteur, année)` + section `H1 Références` APA, une par paragraphe, tri alpha. **Chaque ref doit avoir DOI et/ou URL** pour être résoluble. Si DOI seul : `https://doi.org/<doi>` est utilisé. Si les deux différents : afficher les deux (`doi:10.X/Y https://...`). Alerte script si ref sans lien. Même pattern que Jenni (cf. `docx/quorum_sensing_rhizosphere.docx`).\n\n6. **Pas de décoration ASCII** — aucune ligne de séparation (`---`, `═══`), aucune banderole, aucun ornement. La structure vient de Title/H1/H2/H3 natifs Word.\n\n7. **Pas de renumérotation parasite** — si les titres en DB contiennent déjà `1.`, `2.`, le générateur ne doit pas ajouter de préfixe. Inverse : si la DB contient des titres clean, ne pas ajouter de numéros.\n\n8. **Sections body en H1 numérotées** (`1.`, `2.`...) — retour au pattern stable des anciens prompts (Introduction → `1. Titre`, `2. Titre`… → Résumé). Introduction et Résumé sans numéro. Sous-sections H2 (`1.1.`, `1.2.`…) **si justifié** (plusieurs sous-thèmes distincts, comparaison structurée, volume dense) — pas systématique. H3 max (BQ #122). Numérotation portée par les titres DB (`fiche_sections.titre`), jamais ajoutée par le script.\n\n## Règles absolues\n\n1. **Pas de batch** — une fiche à la fois (intégration comme génération)\n2. **Le .docx Jenni ne rentre jamais tel quel en DB** — tout passe par lecture Claude\n3. **Archivage systématique** post-intégration (docx + prompts)\n4. **Audit concept_cards** obligatoire avant/après\n5. **Termes canoniques** : jamais inventer, toujours adosser à l'article source\n6. **Le docx représente le doc dans son état courant, pas une discussion avec Jenni** — contenu rédigé selon l'état de connaissance du corpus. Pas de `[à compléter]`, pas de métaphrases « Jenni, rédige… ». Jenni lit un document.\n\n## BQ liées\n\n- Plan-graine → #89\n- Charte fiches techniques DIY détails → #121\n- Contraintes rendu docx → #122\n- Workflow granulaire H2 → #123\n- Reprise validée via upload projet → #107\n- Concept cards filtre de rigueur → #106\n- Intégration source (brique similaire, plus légère) → `wf_source_integration` #129\n\n## Nouveau modèle d'intégration (2026-04-18)\n\nSuite au plan d'intégration fiche (`jmj/plan_integration_fiche_2026-04-18.md`), le modèle est simplifié :\n\n### Pas d'historique en DB\n\nToute intégration **remplace** la version précédente :\n- `fiche_contenus` : une ligne par fiche (UNIQUE contrainte), plus de versioning en DB\n- Les champs `contenu_brut` et `version` de `fiche_contenus` ont été supprimés\n- L'historique reste dans `audit_log` + git (commits)\n\n### Responsabilité Claude — détection de perte\n\nAvant d'écraser, Claude compare l'ancien contenu/refs au nouveau :\n- Refs présentes dans l'ancien et absentes du nouveau → **Report clair**\n- Passages/concepts significatifs non repris → **Report clair**\n- Décision au cas par cas :\n  - **Merge** si simple (1-2 refs oubliées) — rare, JMJ valide\n  - **Régénération** si trop de perte — produire le nouveau docx + seconde passe Jenni. Avec la lourdeur actuelle des prompts (19 fiches/jour possibles, confirmé 2026-04-17), la régénération est la solution par défaut si doute.\n\n### Source de vérité refs\n\n- `source_usages` = **source de vérité** (pointeurs vers jenni_sources)\n- `fiche_contenus.refs` (JSON) = cache d'affichage, reconstruit à chaque import\n- Reconstruction à chaque intégration = garantie de cohérence\n\n### Scripts actifs (Phase 1 nettoyage)\n\n- `tools/jenni/gen_fiche_docx.py` : génère le docx au format état-du-doc (anciennement `gen_fiche_docx_v2.py`)\n- `tools/jenni/archives/gen_fiche_prompt_docx.py.legacy` : v1 archivée\n- `tools/jenni/integrate_fiche.py` : **à venir** — pipeline unifié (Phase 2)\n- `tools/admin/integrate_fiche_docx.py` : **legacy**, sera remplacé par `integrate_fiche.py`\n- `tools/jenni/archives/integrate_fiche_retour.py.legacy` : overlay h2_notes déprécié\n\n### Tables dépréciées\n\n- `fiche_section_h2_notes` (64 rows) : plus d'écriture. Le workflow granulaire H2 est remplacé par la structure `fiche_sections` avec `type='body_h2'` (cf. règle 9). Données historiques conservées pour référence.\n- Voir `config.deprecation.fiche_section_h2_notes` pour détails.\n\n### Champs supprimés de `fiches`\n\n- `prompt_jenni`, `notes_editoriales_h2`, `refs_a_zotero`, `sources_dois` — sous-utilisés ou redondants. Les rares données sauvées dans `fiches.notes` (5 fiches concernées).", "type": "workflow", "crit": true}, {"id": 117, "titre": "Workflow fiches — génération prompts .docx et intégration", "contenu": "## Workflow fiches — 1 fiche = 1 .docx prompt = 1 sujet\n\n### Génération prompt\n\n```bash\n# 1 fiche\npython3 tools/jenni/gen_fiche_prompt_docx.py --db sol_vivant.db --fiche-id 27\n\n# Toutes les fiches éligibles (a_faire / en_cours / envoye)\npython3 tools/jenni/gen_fiche_prompt_docx.py --db sol_vivant.db --all-eligible\n```\n\nFormat : docx minimal (Title + termes canoniques en tableau + sections H1\navec contexte_sci + instructions italique grisé). **Aucune consigne de format** :\nJenni applique sa charte depuis le chat. Output : `recherches/fiches/`.\n\n### Intégration retour Jenni\n\n```bash\npython3 tools/admin/integrate_fiche_docx.py --db sol_vivant.db \\\n    --fiche-id 19 --docx-retour protozoaires_jenni.docx --apply\n```\n\nPipeline : fiche.docx → nouvelle version dans fiche_contenus + source_usages\nenregistrés + UPDATE fiche.statut → integre + propagation premier prompt\n\"sans chapitre\" des docs cibles.\n\n### Statuts fiches\n- `a_faire`  : prompt à générer\n- `en_cours` : en rédaction côté JMJ ou Claude\n- `envoye`   : prompt envoyé à Jenni, en attente retour\n- `integre`  : retour intégré au corpus\n- `archive`  : non pertinent ou remplacé", "type": "commande", "crit": true}, {"id": 121, "titre": "Charte de travail Jenni — fiches techniques DIY", "contenu": "## Charte de travail — Fiches (toutes) + spécificités techniques\n\nCharte rédigée par Jenni : `docx/charte_de_travail___fiches_techniques.docx`.\n\n**La structure générale** (ordre des blocs, numérotation, termes en fin)\ns'applique à **toutes les fiches** (`technique` + `transversale`).\n**Les 5 blocs H2 par section** (Contexte sci / Protocole / Indicateurs /\nPrécautions / Applications) sont spécifiques aux **fiches techniques DIY**.\n\n### Ordre des blocs — TOUTES les fiches (charte §1.C + §1.D + §5.5)\n\n1. **Titre** (style Title — voir BQ `contraintes_rendu_docx` pour format\n   court sans accent)\n2. **Introduction** (H1)\n3. **Sections body numérotées** (H1 \"1. Titre\", \"2. Titre\"…) — charte §1.D\n   `## [Numéro]. [Titre de la section]`\n4. **Résumé** (H1) — charte §5.5\n5. **Termes canoniques** (H1, **EN FIN**) — charte §1.C explicite\n\n### Spécificité fiches `type='technique'` (§1.D)\n\nChaque section body a en plus 5 sous-chapitres H2 **au même niveau** (structure\nplate — pas de H3 dans Protocole pour éviter les ambiguïtés d'interprétation\nWord quand on remonte d'un H3 à un H2) :\n\n- H2 Contexte scientifique\n- H2 Protocole — les sous-blocs (**Ingrédients**, **Équipement nécessaire**,\n  **Procédure**) sont des paragraphes avec préfixe gras, pas des H3\n- H2 Indicateurs de qualité\n- H2 Précautions & Stockage\n- H2 Applications & Dosages\n\n### Document amorce, pas template vide\n\nLe document produit est un **document de travail amorce / partiellement\nrédigé**, pas un template avec des `[à compléter]`. Chaque bloc H2 contient\nune **description éditoriale en italique** (notes de travail) qui indique\nce qui est attendu, plutôt qu'un placeholder vide. Exemple sous H2\n« Contexte scientifique » :\n\n> *Principes physico-chimiques sous-jacents : mécanismes de chélation\n> (stabilité des complexes, liaisons coordonnées), constantes\n> thermodynamiques, comparaison avec alternatives, niveaux de preuve…*\n\nJenni lit ces notes comme tout autre texte et les utilise comme cadrage\npour rédiger la section. Le principe : \"oublier Jenni, sauf pour le format\ndu document\" — ce qu'on produit doit être lisible et utile comme notes\npréparatoires à la rédaction, même sans Jenni.\n\n### Recommandations protocoles DIY (Jenni §3)\n\n**Dosages** : système métrique (L, g, kg, mL). Pureté chimique (ex :\n\"FeSO₄·7H₂O 99%\"). Concentrations finales (ex : \"Solution à 5% w/v\").\n\n**Sécurité** : EPI requis, risques chimiques spécifiques, procédures\nd'incident.\n\n**Indicateurs** : visuels (couleur, clarté, précipitation), chimiques\n(pH cible, densité), sensoriels (odeur caractéristique).\n\n**Stockage** : durée (\"Stable 3 mois à 4°C\"), contenant (\"Bouteille PET\nopaque\"), conditions (lumière, température).\n\n### Gestion des termes canoniques (Jenni §4)\n\n- Intégrer dans le texte quand pertinents\n- Traduction EN entre parenthèses à la **première mention**\n- Tableau en **fin** de document (charte §1.C)\n\n### Workflow recommandé (Jenni §5)\n\n1. Validation du plan\n2. Rédaction **section par section** (une à la fois dans chat Jenni)\n3. Révision scientifique (citations + précision)\n4. Uniformisation (même structure partout)\n5. **Finalisation** : résumé (Jenni ajoute automatiquement la bibliographie APA à la fin du docx — voir BQ 'Jenni — ce que c\\'est')\n\n### Prompt type pour chat Jenni (Jenni §2)\n\n> « Jenni, consulte mon document [Nom].\n> Nous travaillons sur la section [N et titre].\n> Objectif : rédiger en respectant la structure standardisée.\n> Contraintes : termes canoniques · citations [N] · dosages métriques\n> (si technique) · indicateurs visuels · précautions sécurité. »\n\n### Contraintes de rendu (référence)\n\nVoir BQ `[jenni/contraintes_rendu_docx]` pour les contraintes transverses\n(hiérarchie Title/H1/H2/H3 avec H3 max, titre du document court et sans accent).\n\n\n### Principe du cadrage éditorial — pourquoi les notes sous H2\n\nLes **descriptions éditoriales en italique** sous chaque H2 ne sont pas une\ndécoration : c'est un **mécanisme de délégation cognitive** qui augmente la\nprofondeur du retour Jenni.\n\n**Sans cadrage** (placeholders `[à compléter]`) :\nJenni doit d'abord deviner ce qui est attendu pour chaque bloc vide avant\nde chercher les sources. Elle dépense du budget \"recherche\" sur la question\n*\"que dois-je écrire ici ?\"*. Résultat : retour superficiel, sections\nredondantes, dispersions.\n\n**Avec cadrage** (notes décrivant l'attendu) :\nLe contexte de chaque section / sous-section est déjà posé. Jenni sait\nexactement **quel angle**, **quel niveau de précision**, **quels éléments\nchiffrés** sont attendus. Elle peut dédier son budget \"recherche\" à\n**l'approfondissement** (trouver les sources récentes, les données\nquantitatives, les comparaisons pertinentes) plutôt qu'à la reconstruction\ndu cahier des charges.\n\n**Règle en conséquence** : une note éditoriale sous un H2 doit nommer\nexplicitement les dimensions attendues (ex : *\"mécanismes, constantes\nthermodynamiques, comparaisons avec alternatives, niveaux de preuve\"*)\nplutôt que paraphraser le titre du H2. La note est un *cahier des\ncharges miniature* de la section.\n\nCe principe s'étend à tout document Jenni : plus le cadrage éditorial est\nprécis en amont, plus le retour est approfondi en aval. Le travail de\nClaude (ou JMJ) = poser le cadre ; le travail de Jenni = remplir en\nprofondeur.\n\n\n### Souveraineté éditoriale — c'est nous qui décidons de l'information\n\nLe cadrage éditorial n'a pas qu'un rôle d'efficacité pour Jenni. Il a\nsurtout un rôle de **contrôle de la ligne éditoriale du corpus**.\n\nSans cadrage précis, Jenni remplit librement :\n- Elle reproduit les lieux communs les plus répandus dans ses sources\n  (Open Access, Google Scholar) — souvent des revues généralistes\n- Elle biaise vers les thèmes les plus médiatisés, pas forcément les plus\n  pertinents pour l'agriculture régénératrice\n- Elle traite les dimensions qu'**elle** juge importantes, pas celles que\n  **nous** voulons mettre en avant\n\nAvec cadrage précis (notes éditoriales nommant les dimensions attendues) :\n- **Nous** décidons de l'angle (ex : mécanismes thermodynamiques *plutôt*\n  que histoire du concept)\n- **Nous** décidons du niveau de précision (ex : constantes quantitatives\n  *plutôt* que description qualitative)\n- **Nous** décidons des comparaisons à établir (ex : comparaison avec EDTA\n  synthétique *plutôt* que avec chelation citrique)\n- **Nous** décidons des lacunes à combler (ex : données scale-ferme\n  *plutôt* que laboratoire)\n\nJenni devient **exécutante d'un plan éditorial** défini par le corpus,\npas co-décideuse de ce qui compose la fiche. Elle apporte la profondeur\nscientifique (sources, données) sur les axes que nous avons tracés.\n\nCe principe explique aussi pourquoi :\n- Les listes de termes canoniques imposent notre vocabulaire\n- La structure H1/H2/H3 est fixée en amont\n- Les notes éditoriales nomment explicitement les dimensions attendues\n\n**La fiche produite reflète notre ligne éditoriale, pas la synthèse\nmoyenne des sources de Jenni.**\n\n\n### Activation lexicale du thésaurus — langage des notes éditoriales\n\nTroisième rôle du cadrage : les notes éditoriales doivent être rédigées\n**dans le vocabulaire du thésaurus corpus**. Pas dans un français neutre,\npas avec des paraphrases, pas avec des synonymes de facilité.\n\nExemple — note sous H2 « Contexte scientifique » pour une fiche chélation :\n\n✗ Mauvais (langage neutre) :\n> \"Expliquer comment les acides aminés se lient aux métaux et améliorent\n>  leur absorption par la plante.\"\n\n✓ Bon (langage du thésaurus) :\n> \"Principes physico-chimiques sous-jacents : mécanismes de **chélation**\n>  (stabilité des complexes, liaisons coordonnées), **constantes\n>  thermodynamiques** pertinentes, comparaison avec alternatives\n>  concurrentes, niveaux de preuve des mécanismes d'**absorption foliaire**\n>  ou **racinaire**.\"\n\nPourquoi c'est critique :\n- Les termes canoniques qu'on liste en fin de document ne sont qu'un\n  tableau de référence. Jenni peut les survoler sans les mobiliser.\n- En les **plantant dans le texte même des notes**, on les rend actifs\n  dans son contexte cognitif au moment de la rédaction.\n- Résultat : elle reprend naturellement notre vocabulaire dans ses\n  phrases, ne pas le réinventer ni le traduire.\n\nCe principe compose avec les deux précédents :\n1. Délégation cognitive → elle sait quoi chercher\n2. Souveraineté éditoriale → nous décidons l'angle\n3. **Activation lexicale** → elle écrit dans notre langue\n\n### Conséquence pour la rédaction des notes éditoriales\n\nQuand on rédige une note sous H2, lever le thésaurus de la fiche et\n**intégrer au moins 3-5 termes canoniques pertinents** dans la\ndescription. La note devient à la fois :\n- Un cahier des charges (Principe 1)\n- Un filtre éditorial (Principe 2)\n- Un amorçage lexical (Principe 3)\n\nFormulation fidèle au corpus > formulation \"naturelle\".\n", "type": "reference", "crit": true}, {"id": 123, "titre": "Workflow granulaire fiches — fiche_section_h2_notes", "contenu": "## Workflow granulaire fiches — table `fiche_section_h2_notes`\n\nTable de travail granulaire pour construire, exporter, importer et analyser\nles fiches techniques **bloc par bloc (H2)** plutôt que d'un seul tenant.\n\n### Schéma `fiche_section_h2_notes`\n\n| Colonne | Usage |\n|---|---|\n| `fiche_id`, `section_id`, `h2_key` | Coordonnées du bloc (section_id NULL = note applicable à toutes sections body de la fiche) |\n| `note_md` | **Prompt** : note éditoriale rédigée par Claude (cadrage + activation lexicale thésaurus) |\n| `contenu_md` | **Retour** : contenu Jenni rédigé pour ce bloc (import depuis docx retour) |\n| `statut` | cycle : prompt → envoye → retour → analyse → valide → integre |\n| `version` | traçage évolution |\n| `termes_candidats` | JSON : termes extraits du contenu Jenni, candidats pour enrichir `terms` |\n| `sources_candidats` | JSON : refs [N] extraites, candidats pour `jenni_sources` |\n| `sources_brutes` | JSON : liste des numéros [N] cités dans le retour |\n| `notes_analyse` | Notes Claude pendant analyse (cohérence corpus, doublons détectés) |\n| `integre_vers` | Ex : \"fiche_contenus#42\" — où le contenu a fini |\n| `date_export`, `date_retour` | Traçabilité du cycle |\n\n### Clés H2 attendues (`h2_key`)\n\nPour fiches techniques (charte Jenni §1.D) :\n- `contexte_sci`, `protocole`, `ingredients`, `equipement`, `procedure`,\n  `indicateurs`, `precautions`, `applications`\n- `resume` (section_id=NULL), `introduction` (blocs hors structure charte)\n\nPour fiches transversales : `resume` (section_id=NULL) seulement.\n\n### Workflow type pour une fiche technique\n\n1. **Rédaction prompt** : Claude écrit les `note_md` H2 par H2 avec termes\n   canoniques spécifiques à la fiche (Principe 3 activation lexicale).\n   `statut = prompt`.\n2. **Export docx** : `gen_fiche_prompt_docx.py` lit `note_md` par bloc H2 et\n   génère le prompt docx (fallback sur descriptions génériques si note absente).\n   `statut = envoye`, `date_export` posé.\n   → Passage manuel à 'envoye' via UPDATE ou au lancement `gen_fiche_prompt_docx`.\n3. **Retour Jenni** : `integrate_fiche_retour.py` parse le docx retour (détection\n   auto de la fiche par slug, mapping H2→h2_key, split Protocole en 3 sous-blocs\n   Ingrédients/Équipement/Procédure), remplit `contenu_md` + extrait `sources_brutes`\n   (citations [N]) + `termes_candidats` (acronymes, noms latins, composés Title Case\n   non présents dans `terms.fr`). `statut = retour`, `date_retour` posé.\n\n   ```bash\n   # Dry-run (détection + preview)\n   python3 tools/jenni/integrate_fiche_retour.py --db sol_vivant.db \\\n       --docx docx/retour_jenni_knf-jadam-preparations.docx\n   # Apply\n   python3 tools/jenni/integrate_fiche_retour.py --db sol_vivant.db \\\n       --docx ... --fiche-id 2 --apply\n   ```\n4. **Analyse granulaire** : Claude analyse chaque `contenu_md` en isolation\n   (moins de contexte en tête que le docx entier) :\n   - Revue `termes_candidats` → décisions ajout/rejet/fusion dans `terms`\n   - Revue `sources_brutes` ([N] bruts) → croisement avec `jenni_sources` /\n     RIS d'origine pour remplir `sources_candidats` avec les DOI/URL réels\n   - Notes de cohérence corpus → `notes_analyse`\n   `statut = analyse`.\n5. **Validation** : Claude croise avec `terms`, `jenni_sources`, décide ce\n   qui entre en canonique. `statut = valide`.\n6. **Intégration** : migration vers tables canoniques + `fiche_contenus`\n   (agrégation du bloc final). `statut = integre`, `integre_vers` tracé.\n\n### Intérêt vs approche monolithique\n\n- **Édition bloc par bloc** : modifier une note H2 sans régénérer toute la fiche\n- **Analyse ciblée** : évaluer un contenu sur 1 bloc, pas sur un docx entier\n  (libère le contexte Claude lors de l'analyse)\n- **Versioning granulaire** : trace per bloc de l'évolution\n- **Réutilisabilité** : notes communes peuvent être partagées (ex: toutes\n  les fiches DIY ont des `precautions` similaires)\n- **Zone tampon** : garde le contenu en DB à la granularité H2 le temps de\n  l'analyse, sans polluer les tables canoniques prématurément\n", "type": "commande", "crit": true}, {"id": 108, "titre": "Workflow fiche/validation — de la source à l'intégration (référence)", "contenu": "## Workflow fiche/validation — de la source à l'intégration\n\n### Deux régimes de création\n\n**Régime 1 — Source externe (primaire)** :\nOrigine : transcription vidéo de confiance, note de lecture, article.\n1. Analyse ensemble (Claude + JMJ) : extraction d'affirmations discrètes\n2. Croisement de chaque affirmation avec le corpus existant (concept_cards, termes, fiches)\n3. Identification des lacunes\n4. Demande TARGETÉE à Jenni (sur les lacunes uniquement, pas de rédaction from-scratch)\n5. Intégration (termes, prompts, cartes si nécessaire)\n\n**Régime 2 — Travail exploratoire (secondaire)** :\nOrigine : session Claude qui fait émerger des points, des contradictions, des synthèses nouvelles.\nMême workflow en 5 phases, mais la « source » est la session elle-même.\n\n### Distinction fiche vs validation\n\n| | Fiche | Validation |\n|---|---|---|\n| Posture | **Proactive** — zoom sur un sujet intéressant en soi | **Réactive** — comble une dette identifiée par audit ou manque |\n| Exemple | « Les amendements minéraux structurants » | « Renforcement couverture bibliographique modules faibles » |\n| Sortie Jenni | contexte_sci / enrichissement des docs cibles | idem |\n| Table | `fiches` | `validations` |\n\nLes deux contribuent au même but : nourrir les `prompts` pour les amener à `clôture`.\n\n### Le prompt Jenni est SURGICAL\n\nNe PAS demander à Jenni de rédiger un sujet complet from scratch. Le prompt doit :\n- Lister les affirmations à valider / développer\n- Préciser ce qui est DÉJÀ dans le corpus (et que Jenni ne doit PAS redévelopper)\n- Spécifier les termes existants à réutiliser (`terme X`, Card #Y)\n- Fixer des contraintes de taille par section\n- Demander une liste de termes candidats + DOI en sortie\n\n### Cycle de vie (rappel)\n\n```\na_faire   → créée en DB (objet + docs cibles + prompt)\nen_cours  → Claude prépare/affine le prompt Jenni\nenvoye    → .txt généré et copié dans Jenni\nrecu      → .docx Jenni récupéré\nintegre   → contenu intégré dans prompts.contexte_sci/.enrichissement\narchive   → terminé\n```\n\n### Prérequis concept_card (rappel règle absolue)\n\nAvant de créer une fiche pour zoomer sur un point, vérifier qu'il y a au moins une concept_card cohérente qui le supporte. Si la carte n'existe pas, la créer d'abord. Si elle ne passe pas le filtre → pas de fiche.\n", "type": "reference", "crit": true}, {"id": 145, "titre": "Cadre de rédaction des fiches par Claude (brouillon → Jenni → intégration)", "contenu": "## Cadre de rédaction des fiches par Claude (brouillon → Jenni → intégration)\n\nQuand JMJ demande à Claude de rédiger un brouillon de fiche destiné à Jenni\n(enrichissement → retour docx → intégration en DB), le travail suit les\nprincipes suivants, issus de la session 2026-04-21 (audit fiches +\nfiche pilote ACS 3 piliers + itération rumen/DIY).\n\n### 1. Une fiche = un zoom ancré au corpus\n\nCe n'est **pas un cours complet** sur le sujet. C'est un zoom pertinent\nsur un point précis qui manque ou mérite un approfondissement dans le\ncorpus. Définition canonique : cf. BQ #69 `fiches_zoom_point_precis`.\n\n**Conséquence pratique** :\n- Ne pas re-détailler ce que le corpus contient déjà (termes thésaurus,\n  concept cards actives, chaînes causales, fiches voisines). **Renvoyer** ou\n  **citer** (`cf. fiche #34`, `card #47`, `chaîne C5`).\n- La densité est **proportionnelle à l'apport spécifique** du zoom, pas\n  à la taille générale du sujet.\n- Une fiche peut tenir en 1 500 mots si elle est pertinente ; ou 5 000\n  si le zoom exige plusieurs mécanismes imbriqués.\n\n### 2. Précision > volume\n\nLe critère de succès d'un brouillon n'est pas sa longueur mais la\n**pertinence** de chaque paragraphe :\n- Chiffres ancrés (ex: `~14 % des terres arables en ACS mondialement`)\n- Études nommées avec année (`Pittelkow et al. 2015`)\n- Mécanismes spécifiques (non génériques)\n- Renvois au thésaurus via termes canoniques\n- Renvois aux cards / chaînes / fiches existantes\n\n**Règle JMJ** : *« Plus ta rédaction est précise, plus Jenni ajoutera\nde la valeur. »* Une rédaction vague donne à Jenni un espace de dérive ;\nune rédaction précise la force à enrichir plutôt qu'à inventer.\n\n### 3. Graines, pas vérités finales — le cycle itératif\n\n**La graine = l'état de la connaissance du corpus à l'instant t.** Claude rédige ce que le corpus dit aujourd'hui en prose continue ; pas de typographie distinctive pour marquer « à compléter » ; Jenni enrichit là où elle voit des manques.\n\n\nLe brouillon Claude est un **planting**, pas un livrable. Il s'inscrit\ndans un cycle à trois étapes :\n\n1. **Claude sème les graines** : structure + affirmations ancrées dans\n   ses connaissances + chiffres d'ordre de grandeur + références\n   principales. Claude peut être affirmatif même quand il n'est pas à\n   100 % certain — si une affirmation est fausse, Jenni la rectifie.\n2. **Jenni enrichit et conteste** : elle fait ses propres recherches.\n   Si la littérature actuelle diverge de ce que Claude a écrit, Jenni\n   **modifie** le contenu (pas de déférence). Elle ajoute les sources\n   qu'elle trouve.\n3. **JMJ fait plusieurs passes de révision** pour valider les\n   affirmations et renforcer les sources peu soutenues. C'est là que\n   la qualité finale émerge.\n\n**Implication pour Claude** : ne pas édulcorer par peur de se tromper.\nPoser des affirmations fortes et précises, qui serviront de point\nd'ancrage productif pour Jenni et JMJ.\n\n### 4. Intégration des termes canoniques dans le texte\n\nLes termes du thésaurus apparaissent **dans les phrases**, pas en liste\nséparée en fin de fiche. L'orthographe exacte (`terms.fr`) doit être\nrespectée — pas de synonyme inventé au détour d'une phrase.\n\nRaisons :\n- L'activation lexicale du vocabulaire contrôlé force la cohérence\n  avec le reste du corpus\n- Jenni recrute son propre style sur le vocabulaire présent dans le\n  brouillon → termes canoniques présents dans le brouillon = termes\n  canoniques présents dans le retour Jenni\n- La liste séparée fait redondance avec le thésaurus et invite Jenni\n  à inventer des définitions locales parasites\n\n### 5. Structure H1 / H2 / H3 selon le besoin\n\nPas de structure uniforme imposée. La hiérarchie suit la logique du\ncontenu :\n- **H1** = chapitres principaux de la fiche (Introduction, 1. XXX,\n  2. YYY, Synergies, Limites, Résumé, Références)\n- **H2** = sous-chapitres dans un H1 quand le chapitre a plusieurs\n  angles distincts à traiter (typologie, mécanismes, indicateurs…)\n- **H3** = précisions ponctuelles (cinétique d'un phénomène, étude\n  spécifique, cas limite)\n\nÉviter : H3 sous un seul H2 (promouvoir en H2 directement),\nH4 et plus (texte gras inline ou paragraphes à la place).\n\n### 6. Citations et bibliographie — format Google Doc natif\n\n**Citations inline** : format APA `(Auteur, année)` ou `(Auteur et al.,\nannée)` pour ≥3 auteurs. Intégrées au plus près de l'affirmation qu'elles\nsoutiennent.\n\n**Bibliographie finale** : H1 `Références`, une entrée par paragraphe,\ntri alphabétique par premier auteur, format APA complet avec **DOI ou\nURL résoluble** à la fin de chaque entrée.\n\n**Format Google Doc natif** (différent de Word) : les citations inline\nsont des **liens hypertextes internes** (cross-refs `w:hyperlink\nw:anchor`) pointant vers des **bookmarks** (`w:bookmarkStart w:name`)\nplacés sur chaque entrée biblio. C'est le format que Jenni produit en\nretour et que l'intégration reconnait nativement.\n\nMa rédaction markdown → copier-coller dans Google Doc → les références\ndeviennent clickables. Pour envoi initial Claude → Jenni, le script\n`gen_fiche_prompt_docx.py` doit produire ce format (patch à venir si\nce n'est pas déjà le cas).\n\n### 7. Limite DIY — volet science uniquement pour Claude\n\nLes fiches **techniques DIY** (type `technique` : KNF, JADAM, IPMO,\nPNSB, chélation AA, bokashi…) exigent :\n- **Protocole** : ingrédients, équipement, procédure\n- **Indicateurs** de réussite visuelle\n- **Précautions** et risques\n- **Applications** et dosages\n\nCe volet ne peut PAS être rédigé par Claude (pas de base empirique,\npas de pratique). Il vient de JMJ (expérience terrain) ou de Jenni\n(sources KNF/JADAM, fermes-expérimentales).\n\n**Claude peut rédiger uniquement le volet SCIENCE** :\n- Mécanismes microbiologiques\n- Rôle écologique et agronomique\n- État de l'art\n- Taxons impliqués, métabolismes, enzymes\n\nDans le cas d'une fiche DIY : Claude rédige le H1 `Contexte\nscientifique` et laisse les autres H1 (Protocole, Indicateurs,\nPrécautions, Applications) vides ou en texte rédigé (charte §1.D\nfiche technique, cf. BQ #130).\n\n### 8. Workflow d'envoi et d'intégration — prompts EN BASE\n\n**Règle absolue** : les prompts de fiches vivent dans la base de\ndonnées, pas dans des fichiers markdown/txt ou des scripts temporaires.\n\n1. **Claude rédig
