Quand un chapitre H1 a plusieurs sous-chapitres H2 au même niveau\n(ex : 5 blocs charte fiches techniques), **éviter d'ajouter des H3 dans\nl'un d'eux** — la remontée H3 → H2 crée une ambiguïté d'interprétation\ndans Word (fin du sous-groupe H3 ? ou retour niveau H2 parent ?).\n\nSolution : garder tous les sous-chapitres au même niveau H2, et utiliser\ndes **paragraphes avec préfixe gras** pour les sous-listes à l'intérieur\nd'un H2 (ex : sous H2 « Protocole » → paragraphe « **Ingrédients —** … »).\n", "type": "regle", "crit": true}, {"id": 146, "titre": "Règles de rédaction des documents Jenni — référence unique", "contenu": "## Règles de rédaction des documents Jenni — référence unique\n\n**Portée** : toute rédaction destinée à Jenni — prompts de documents de\nstrate, prompts de fiches, prompts de validation, prompts d'enrichissement\ndu thésaurus, docx de reprise, docx de travail. Pas de cas particulier :\nles règles ci-dessous s'appliquent **toujours**. Pour un workflow\nspécifique (thésaurus, fiche, validation, doc de strate), consulter les\nBQ workflow correspondantes, mais les règles de rédaction restent celles\nqui suivent.\n\n### 1. Le document = le document lui-même\n\nLe prompt **n'est pas une discussion avec Jenni**. C'est le document\ndans son état courant. Jenni le lit comme un auteur reprendrait son\npropre brouillon — elle voit le contenu, elle identifie les manques,\nelle enrichit.\n\n- Pas de métaphrases (« Jenni, rédige cette section », « à compléter\n  par Jenni »)\n- Pas de marqueurs `[à compléter]`, `[TODO]`, `[à développer]`\n- Pas de typographie distinctive pour marquer « déjà écrit » vs « à\n  développer » — prose continue, le style est identique partout\n\n### 2. La graine = l'état du corpus à l'instant t\n\nClaude rédige ce que le corpus dit **aujourd'hui**, en prose continue,\navec la densité que l'état des connaissances actuelles permet. Pas\nd'amorce stylisée, pas d'italique « brouillon » — le document vit tel\nqu'il est. Jenni complète là où elle identifie un manque, comme un\nauteur reprend un brouillon.\n\n### 3. Contenu issu du corpus uniquement\n\nLa matière d'une rédaction Claude vient :\n- Du thésaurus (définitions, synonymes, relations)\n- Des concept cards (contenu des descriptions, pas leur identifiant)\n- Des chaînes causales (narration, pas leur code)\n- Des fiches déjà intégrées (contenu assimilé, pas leur numéro)\n- De `jenni_sources` (bibliographie interne)\n- Des PDF de `jmj/pdf/` (sources externes validées)\n- Des notes JMJ (synthèses, analyses, arbitrages)\n\nPas de sources sorties de la mémoire générale de Claude. Si une\naffirmation ne peut être sourcée par le corpus ou un PDF local, soit\non la retire, soit on la marque comme hypothèse à confirmer par Jenni.\n\n### 4. Zéro méta-vocab dans le texte\n\n**Interdiction absolue** dans tout document destiné à Jenni :\n\n- Codes documents : `S0, S1, S2, S3, S4, V1, V2, V3, P1, P2, P3, P4,\n  P5, F1, F2, H1, H2, H3`\n- Vocabulaire méta-projet : `corpus`, `Corpus Le Sol Vivant`, `strate`,\n  `cross-ref`, `chaîne causale`, `concept card`, `thésaurus`,\n  `sol_vivant.db`, `section_key`, `doc_code`\n- Renvois internes : `card #N`, `fiche #N`, `chaîne CN`, `doc XN`,\n  `cf. fiche X`, `cf. card Y`\n- Instructions internes : « voir chapitre X », « comme décrit dans…\n  (en interne) », références aux scripts, tables, DB\n\n**Jenni ne sait rien de l'organisation du corpus**. Elle lit un\ndocument autonome qui tient debout tout seul.\n\n**Vérification avant tout commit ou envoi** :\n\n```python\nimport re\nFORBIDDEN = [\n    r'\\bcard #\\d+\\b', r'\\bfiche #\\d+\\b', r'\\bchaîne C\\d+\\b',\n    r'\\bchaîne causale\\b', r'\\bcross[- ]ref\\b', r'\\bconcept card\\b',\n    r'\\bsol_vivant\\b', r'\\bdu corpus\\b', r'\\bdans le corpus\\b',\n    r'\\bthésaurus\\b', r'\\bthesaurus\\b',\n    r'\\b[SV][0-4]\\b(?![a-zA-Z])', r'\\b[PF][1-5]\\b(?![a-zA-Z])',\n    r'\\bH[1-3]\\b(?![a-zA-Z])', r'\\bdoc [SPVFH]\\d*\\b',\n]\n```\n\nZéro violation obligatoire avant tout commit.\n\n### 5. Structure Word / Google Doc\n\n- **Title** (level 0) : titre du document, **court, sans accent**\n  (Jenni l'utilise comme nom de fichier), `≤ 5 mots`, `sans caractère\n  spécial` (pas de `—`, `,`, `é/è/à/ô/ç`)\n- **Heading 1** : chapitres (Introduction, 1. …, 2. …, Résumé,\n  Références)\n- **Heading 2** : sous-chapitres quand un H1 a plusieurs angles\n- **Heading 3** : max — au-delà, texte gras inline ou paragraphe\n- Pas de H4, pas de H5\n\nPas de décoration ASCII (`---`, `===`, banderoles, `▸ ▪ ❯`). La\nstructure visuelle passe par la hiérarchie Word native.\n\n### 6. Termes canoniques intégrés dans le texte\n\nLes termes du thésaurus apparaissent **dans les phrases**, orthographe\nexacte (`terms.fr`). **Jamais en liste séparée** en fin de document\n— la liste redondante invite Jenni à inventer des définitions locales\nparasites et duplique le thésaurus.\n\n### 7. Citations et bibliographie (format Google Doc)\n\n**Citations inline** : format APA `(Auteur, année)` ou `(Auteur\net al., année)` pour ≥ 3 auteurs. Intégrées au plus près de\nl'affirmation.\n\n**Bibliographie finale** : section `Heading 1 — Références`, une\nentrée par paragraphe, tri alphabétique par premier auteur, format\nAPA complet avec **DOI ou URL résoluble** à la fin.\n\n**Hyperliens internes** (pattern Google Doc natif Jenni) : chaque\ncitation inline pointe vers un bookmark sur l'entrée biblio\ncorrespondante. C'est le format naturel de Jenni en retour. Claude\nproduit le markdown, le script de génération docx assemble les\nhyperliens lors de l'export.\n\n### 8. Règle du « Bloc de 10 » (listes pour Jenni)\n\nToute liste d'items envoyée à Jenni en bloc (termes à définir,\nsynonymes à compléter, points à préciser) ne dépasse pas **10 par\nenvoi**. Au-delà, qualité des recherches documentaires diminue, risque\nde mélange de sources. Multi-lots = plusieurs fichiers successifs,\navec **balise de repère** (« dernier terme traité : X, nouveau bloc\ncommence à Y »).\n\n### 9. Listes triées alphabétiquement (`lower(fr)`)\n\nToute liste de termes destinée à Jenni est triée alphabétiquement\nsur le libellé FR (`ORDER BY lower(fr)`). Le tri ASCII\ncase-sensitive (`COV` avant `Candida`) perturbe Jenni — toujours\nutiliser `lower()`.\n\n### 10. Pas de conseils rédactionnels redondants\n\nJenni produit naturellement un style concis, académique, adapté au\ncontexte donné. Ne pas ajouter de méta-instructions du type « rédige\n1500 mots », « cite les sources », « respecte le vocabulaire ». Elle\ncite et assemble intrinsèquement. Les seules consignes qui ajoutent\nde la valeur sont :\n- Format de citation imposé (`[N]` numérique vs `(Auteur, année)`)\n- Structure attendue (H1/H2/H3 du document)\n- Périmètre de contenu (ce que le document doit couvrir)\n\n### 11. Refs et sources — cadre de vérification\n\nChaque affirmation scientifique dans le document doit pouvoir être\nsourcée. Trois statuts possibles :\n\n- **Déjà sourcée** : citation inline `(Auteur, année)` + entrée biblio\n- **Issue du corpus sans source directe** : Claude synthétise à\n  partir du corpus existant (définitions, cards, chaînes, fiches) sans\n  inventer. Jenni ajoutera les sources au besoin.\n- **Hypothèse non sourcée** : à éviter. Si nécessaire, formuler\n  prudemment, Jenni décidera si elle trouve matière à confirmer.\n\nNe jamais citer des sources externes que Claude ne peut pas vérifier\n(pas de Pittelkow 2015 sorti de la mémoire si ce n'est pas dans\n`jenni_sources` ou un PDF local).\n\n### 12. Cycle itératif Claude → Jenni → JMJ\n\nLa rédaction Claude est une **graine**, pas une vérité finale.\n\n1. **Claude sème** : structure + affirmations ancrées dans le corpus\n   + chiffres d'ordre de grandeur + références principales. Affirmer\n   proprement, pas éluder par peur de se tromper — Jenni rectifiera\n   si la littérature diverge.\n2. **Jenni enrichit et conteste** : recherche dans ses sources\n   académiques, modifie si nécessaire, ajoute ses sources.\n3. **JMJ révise** en plusieurs passes pour valider et renforcer les\n   sources faibles.\n\nLa qualité finale émerge des trois étapes.\n\n## Règles d'intégration du retour Jenni\n\n**Les mêmes règles de rigueur que la rédaction s'appliquent à l'intégration**, sauf pour le thésaurus qui a son workflow dédié (cf. fin de section).\n\n### A. Aucun docx Jenni ne rentre tel quel en DB\n\nTout document de retour Jenni passe par **analyse Claude + scripts\nd'import contrôlés**. Le .docx vit hors DB. La DB stocke le résultat\nstructuré de l'analyse consciente :\n\n- Contenu rédigé → `fiche_contenus.contenu_integre` (fiche) ou\n  `doc_contenus.contenu_integre` (strate)\n- Termes candidats extraits → table `terms`\n- Références bibliographiques → `jenni_sources` + DOI normalisé\n- Formules chimiques (OMML) → Unicode préservé via parser math-aware\n  obligatoire (sinon `()` vides)\n\n### B. Parser OMML obligatoire (formules chimiques)\n\nJenni écrit toutes les formules chimiques/indices/exposants (NH₃, CO₂,\nFe²⁺, k₁, NO₃⁻, …) en Office Math ML (`<m:oMath>`). Le parser Python\n`python-docx` ignore les `<m:oMath>` et produit des `()` vides.\n\nTout script d'import d'un docx Jenni **doit** utiliser un parseur XML\ncustom qui extrait `<m:oMath>` et le convertit en Unicode. Référence :\n`tools/jenni/import_termes_jenni.py::parse_docx()`, réutilisable.\n\nVérification post-import : scan `\\(\\s*\\)` sur tous les champs texte\nintégrés. Zéro parenthèse vide tolérée.\n\n### C. Déduplication avant insertion\n\nAvant tout INSERT, vérifier absence de doublon par axes multiples :\n\n- **Sources** : DOI normalisé, titre complet, titre court, auteurs + année\n- **Termes** : `fr` normalisé (accents, casse, pluriel), `en` normalisé,\n  syn_fr/syn_en croisés (8 axes, cf. `import_termes_jenni.py`)\n- **Concept cards** : `title` + `description` substring\n- **Fiches** : `slug` unique, `titre` proche\n\nSi doublon détecté → **UPDATE** (enrichissement) plutôt que **INSERT**,\nou BLOCK + arbitrage manuel.\n\n### D. Substitution citations et validation sources\n\nLes citations inline au format `(Auteur, année)` doivent être **traçables**\ndans la bibliographie finale du docx et dans `jenni_sources`. Les `n.d.`\n(no date) doivent être résolues avant intégration (via Crossref DOI ou\nrapport Zotero enrichi).\n\n### E. Audit log systématique\n\nTout INSERT / UPDATE / MERGE en DB s'accompagne d'une ligne dans\n`audit_log` (horodaté, opération, table, référence, détail). Traçabilité\nobligatoire.\n\n### F. Archivage post-intégration\n\nDès qu'une fiche passe en statut `integre` ou `integre_partiel`, les\nfichiers sources associés sont **automatiquement** déplacés dans leurs\ndossiers `archives/` respectifs :\n\n- `docx/<nom>.docx` → `docx/archives/<nom>.docx`\n- `recherches/fiches/prompt_fiche_*.docx` → `recherches/fiches/archives/`\n\nImplémenté dans `integrate_fiche_docx.py::archive_fiche_files()` appelé\nautomatiquement à la fin de `apply_integration()`.\n\n### G. Cycle itératif — même principe que la rédaction\n\nL'intégration Claude est une **analyse consciente**, pas automatique :\n\n1. **Lire** le docx attentivement (contenu scientifique, termes, refs)\n2. **Extraire** : termes candidats, refs DOI, formules, cards liées\n3. **Dédupliquer** avant INSERT\n4. **Intégrer** avec audit log\n5. **Vérifier** : parenthèses vides, dummy-citations URLs, leaks méta-vocab\n6. **Archiver** le docx source\n\nJMJ valide après chaque intégration majeure.\n\n### H. Exception thésaurus — workflow dédié et analyse consciente\n\nL'intégration d'un retour Jenni thésaurus (`thesaurus___strate_X.docx`,\n`thesaurus_N_YYYYMMDD.docx`) est un chantier d'**analyse consciente\nlourde**, pas un simple import. Chaque docx contient typiquement\n30-100 termes avec définition + EN + SYN_FR + SYN_EN + BT + RT +\nrefs biblio inline + biblio finale + formules chimiques (OMML). Toutes\nces dimensions doivent être traitées consciemment.\n\n**Enjeu structurel** : les termes canoniques sont **portés dans tous les\nprompts** (fiches, documents de strate, validations). La qualité du\nthésaurus conditionne directement la qualité des prompts et donc du\ncorpus final. Un terme mal défini, un synonyme absent, une relation\nBT/RT orpheline ou mal orientée, une casse incohérente — tout cela se\npropage aux prompts et donc au travail de Jenni. D'où le travail\nd'arbitrage éditorial lourd en amont : chaque entrée du thésaurus doit\nêtre **stable**, **non-ambiguë**, **correctement reliée**, **avec des\nsynonymes cohérents**. L'intégration est consciente parce que le\nthésaurus est l'ossature lexicale du corpus.\n\n#### H.1 Matching et anti-doublon 8 axes\n\nChaque terme entrant est confronté à 8 axes de match normalisés\n(`norm()` : casse, accents, apostrophes, pluriel simple) :\n\n| Axe | Description |\n|---|---|\n| 1 | `norm(TERME)` ∈ `terms.fr` — même FR existant |\n| 2 | `norm(TERME)` ∈ `terms.en` — notre FR matche un EN ailleurs |\n| 3 | `norm(EN)` ∈ `terms.fr` — notre EN matche un FR ailleurs |\n| 4 | `norm(EN)` ∈ `terms.en` — même EN existant |\n| 5 | `norm(TERME)` ∈ `terms.syn_fr` — synonyme FR ailleurs |\n| 6 | `norm(TERME)` ∈ `terms.syn_en` — synonyme EN ailleurs |\n| 7 | `norm(EN)` ∈ `terms.syn_fr` — croisé |\n| 8 | `norm(EN)` ∈ `terms.syn_en` — synonyme |\n\nRègle de priorité (fix 2026-04-21) : **si aucun match direct (axes 1-4)\net multi-match uniquement via synonymes (axes 5-8), INSERT permis** — la\npolysémie d'un syn_en entre plusieurs termes est tolérée si le `fr` est\nunique. Ex : `Substance humique` (fr unique) + `Humic substance`\n(syn_en présent dans deux termes distincts : humus et acides humiques\net fulviques) → INSERT légitime.\n\n#### H.2 Résolution BT/NT/RT et orphelines\n\nLes relations BT (Broader Term), NT (Narrower Term), RT (Related Term)\nfournies par Jenni en texte brut sont résolues vers `to_term_id` via\nl'index normalisé `fr | en | syn_fr | syn_en`. Workflow :\n\n1. `build_fr_index(con)` construit `{norm(champ) → term_id}` à partir\n   des colonnes terms (fr, en, syn_fr, syn_en)\n2. `write_relations(from_id, rel_type, raw_text)` split le texte brut\n   sur `;,·`, normalise, cherche dans l'index, insère en\n   `term_relations` avec `to_term_id` résolu (ou NULL si orphelin)\n\n**Orphelines** : beaucoup de cibles BT/RT pointent vers des termes\nnon présents dans le thésaurus (formes courtes génériques, catégories\ntaxonomiques, hyperonymes non créés). Elles sont stockées en\n`to_term_text` avec `to_term_id = NULL`. C'est **informatif** (on\nvoit quels concepts Jenni relie), pas toujours à combler (cf. règle\ndoctrinale : le thésaurus est un vocabulaire contrôlé, pas une\nencyclopédie).\n\n**Re-résolution périodique** : après chaque intégration d'un lot de\nnouveaux termes, repasser sur toutes les orphelines existantes\n(`to_term_id IS NULL`) pour vérifier si les nouveaux termes n'ont pas\nrendu résolubles d'anciennes cibles. Gain typique : +5 à +10 % de\nrésolution par passe.\n\n#### H.3 Arbitrage éditorial conscient\n\n**Fusions de termes** (doublons latents, ex : `antibiorésistance` ↔\n`résistance aux antibiotiques`) :\n\n- Détection : syn d'un terme = fr d'un autre terme (scan périodique)\n- Décision : qui garde ? → JMJ arbitre selon convention éditoriale\n- Exécution : script `resolve_import_conflicts.py --apply` + merge\n  manuel consciencieux (syn_fr/syn_en concaténés, relations migrées,\n  doublons supprimés)\n\n**Nettoyage syn_fr erronés** (hiérarchie confondue avec synonymie) :\n\n- Cas : `goethite` est syn_fr de « Oxydes Fe/Al » → c'est un membre,\n  pas un synonyme\n- Correction : retirer de `syn_fr` + créer une RT ou BT/NT vers le\n  terme spécifique correspondant\n\n**Polysémie et acronymes** — cas comme `MO` vs `Mo` (Matière organique\nvs Molybdène) : `norm()` les collisionne à tort → utiliser `--skip-fr`\ndans `resolve_import_conflicts.py` pour protéger.\n\n#### H.4 Règle absolue : ne jamais modifier `terms.fr` automatiquement\n\nLe champ `terms.fr` est la **clé éditoriale** qui fait l'aller-retour\navec Jenni. Toute modification automatique (casse, ponctuation,\nespaces, apostrophes, tirets) crée un cycle vicieux : export avec\nforme modifiée → Jenni retourne la forme modifiée → la forme originale\nest perdue définitivement.\n\nInterdictions strictes :\n- Scripts de normalisation automatique de casse/ponctuation sur `fr`\n- Agents Task qui décident d'un changement de libellé\n- Règles typographiques abstraites (française, ISO 25964) appliquées\n  au `fr` existant\n\nAutorisé :\n- Modifications ciblées d'UN terme après validation explicite JMJ\n- Classification / analyse / comptage par agents Task\n- Normalisation sur champs secondaires (definition, syn_fr, syn_en,\n  bt, rt) qui ne font pas clé avec Jenni\n\n**Incident 2026-04-20** : Chantier A avait baissé la Majuscule initiale\nde 216 termes (« Antifragilité » → « antifragilité ») selon règle\ntypographique française — or Jenni utilise la Majuscule initiale\n(convention thésaurus). Cycle cassé de justesse. À ne jamais\nreproduire.\n\n#### H.5 Résolution citations `n.d.` pre-intégration\n\nJenni peut produire des citations inline `(Titre, n.d.)` quand elle n'a\npas extrait la date d'une source. Workflow de correction avant\nintégration :\n\n1. Extraire le RIS du docx, identifier les refs biblio avec DOI\n2. Résoudre les DOI via Crossref (gratuit, pas de clé) pour récupérer\n   année + auteurs + journal\n3. Produire un RIS enrichi (nouveau fichier, ne modifie pas l'original)\n4. Patcher le docx en substituant les `(Titre, n.d.)` par `(Auteur,\n   année)` — opération mécanique length-preserving pour préserver la\n   structure des runs Word (`<w:t>`, `<w:br>`)\n5. Re-vérifier : 0 `n.d.` restant avant intégration en DB\n\nCe patch n'est **pas** de la rédaction (c'est une substitution de\nmétadonnées factuelles vérifiables) — donc autorisé côté Claude sans\npasser par Jenni.\n\n#### H.6 Reclassement strates et doc_code\n\nLes nouveaux termes entrent par défaut en strate arbitraire (souvent S).\nReclassement nécessaire selon le **thème** du terme :\n\n- **F** : fondements, thermodynamique, évolution, politique, économie\n- **S** : sol, rhizosphère, bactérie du sol, cycle biogéochimique\n- **V** : plante, racine, photosynthèse, symbiose plante-microbe\n- **P** : pratique, rotation, couvert, compost, biochar, fermentation\n- **H** : humain, intestin, microbiome humain, santé, allergie\n\nClassification par heuristique mots-clés dans fr + definition. Les\nindécidables restent en S par défaut. JMJ corrige les cas particuliers\nà l'œil (ex : `érosion` classé automatiquement en H par co-occurrence\navec « humain » alors qu'il est clairement S).\n\n#### H.7 Audit post-intégration obligatoire\n\nAprès chaque `--apply`, vérification systématique :\n\n- **Diff source docx / DB** : chaque terme intégré doit avoir ses\n  DEF/SYN_FR/SYN_EN/EN identiques à la source (whitespace normalisé)\n- **Parenthèses vides** `\\(\\s*\\)` dans def/syn → 0 toléré (indicateur\n  de formule OMML mal parsée)\n- **URLs dummy-citation** `dummy-citation.com` → 0 toléré (artefact\n  Google Docs à nettoyer par le parser)\n- **n.d.** dans les définitions → 0 toléré (traité en pre-intégration)\n- **Relations BT/RT résolues** : compter le ratio résolues/orphelines\n  par type\n- **Re-résolution globale** des orphelines préexistantes\n- **Audit strates et docs_code** sur les nouveaux termes\n- **Scan doublons latents** (syn d'un = fr d'un autre) pour arbitrage\n  ultérieur\n\n#### H.9 Discipline amont — termes envoyés à Jenni doivent être propres\n\n**Règle opérationnelle** : toute liste de termes préparée pour Jenni\n(liste à puces, prompt, tableau d'entrée) doit être **vérifiée\northographiquement avant envoi**.\n\nPourquoi c'est critique :\n\n- **Jenni ne corrige pas l'orthographe.** Elle traite ce qu'on lui\n  donne tel quel — une casse bizarre, une ponctuation surnuméraire,\n  un accent manquant : elle les reproduit dans son retour docx.\n- **Le retour devient la nouvelle référence.** Au réimport, la forme\n  altérée écrase la forme originale en DB. Au cycle suivant, la\n  forme altérée part à nouveau chez Jenni → verrouillage définitif.\n- **Ça casse le flow de Jenni.** Une forme étrange (*Biodiversité*\n  avec double espace, `mycorhize,` avec virgule parasite,\n  `Mycorhize` mélangé avec `mycorhize` dans la même liste) perturbe\n  son traitement par bloc de 10, elle hésite, produit des variantes\n  non désirées, ou rate des entrées.\n\nContrôles obligatoires avant envoi à Jenni :\n\n1. **Tri `ORDER BY lower(fr)`** — évite les mélanges de casse\n   (`COV, Candida, CUE` en ASCII-tri vs `Candida, COV, CUE` en\n   tri normalisé)\n2. **Casse cohérente** : convention thésaurus = Majuscule initiale\n   pour les concepts + minuscule pour les taxons latins ajustés\n   (ex : *Rhizobium*). Vérifier la cohérence à l'œil sur la liste\n3. **Pas de ponctuation parasite** : pas de virgule terminale, pas de\n   point final, pas de double espace, pas de `-` en début\n4. **Apostrophes normalisées** : préférer l'apostrophe droite `'`\n   ou l'apostrophe typographique `'` selon convention adoptée, mais\n   jamais mélangées dans une même liste\n5. **Forme canonique** : si un terme existe en DB, envoyer la forme\n   exacte `terms.fr` — pas une variante orthographique\n\n**Outil** : `export_thesaurus_incomplets.py` et\n`gen_prompt_thesaurus.py` appliquent déjà ces règles (tri\n`lower(fr)`, forme `terms.fr` exacte, filtre `flag_pseudoscience=1`).\nLes listes manuelles (fiche prépa, prompt ad-hoc) doivent être\nvérifiées avant envoi — à l'œil ou via scan `check_integrity.py`.\n\n**Lien avec H.4** : H.4 interdit la modification automatique du\n`terms.fr` en DB. H.9 impose en amont que la forme envoyée soit\npropre. Les deux règles forment le **cycle fermé qui protège\nl'intégrité du thésaurus** contre la dérive orthographique\ninconsciente par l'aller-retour Jenni.\n\n#### H.8 Scripts et fonctions clés\n\n- `tools/jenni/import_termes_jenni.py` : import principal, matching\n  8 axes, modes `--replace` / `--insert-only`\n- `tools/jenni/resolve_import_conflicts.py` : résolution bloqués\n  multi-match avec `--skip-fr`\n- `tools/admin/dedupe_thesaurus.py` : déduplication périodique\n- `tools/lib/term_rels.py::build_fr_index()` + `write_relations()`:\n  résolution FK `to_term_id`\n- `tools/lib/term_rels.py::norm()` : normalisation matching (casse,\n  accents, apostrophes, pluriel)\n\nVoir BQ dédiées pour les workflows opérationnels détaillés.\n\n## BQ workflow spécifiques (consulter en complément)\n\nPour le **workflow opérationnel** propre à chaque type de document\n(quand exporter, comment générer le docx, comment intégrer le\nretour…), consulter la BQ workflow correspondante :\n\n- **Thésaurus** : workflow import/export/complétion (BQ thesaurus)\n- **Fiches** : création/Jenni/intégration consciente, structure\n  `fiche_sections` (BQ fiches)\n- **Validations** : workflow comblement de dette (BQ validations)\n- **Documents de strate** : prompts de strate via `export_jenni_doc.py`\n  (BQ strate)\n\nLes règles ci-dessus s'appliquent à **tous**, sans exception.\n\n### Historique\n\n- **2026-04-21** : consolidation unique des règles de rédaction.\n  Remplace l'éparpillement antérieur sur #3, #40, #89, #115, #120,\n  #130, #145, #101, #104, #109, #121, #122. Origine : session\n  2026-04-21 où Claude a violé 106 fois les règles sur 14 fiches par\n  manque de visibilité sur les garde-fous dispersés. BQ synthétique\n  consolidée + affichage au session_start via\n  `claude_rules.redaction_documents_jenni`.\n", "type": "workflow", "crit": true}]}, "sources-autoritaires": {"nom": "Sources autoritaires externes", "entries": [{"id": 114, "titre": "Doctrine alignement INRAE — corpus = référence, INRAE = préférence", "contenu": "## Doctrine d'alignement INRAE — préférence, pas autorité\n\n**Règle** : le corpus *Le Sol Vivant cet Holobionte* est la **référence**.\nLe thésaurus INRAE (v2.6, ~16 500 concepts) est une **préférence d'alignement**\nquand c'est pertinent, pas une autorité qui primerait sur le corpus.\n\n### Justification\n\nLe corpus est alimenté exclusivement par :\n- Jenni AI avec sources académiques uniquement (pas de vulgarisation non sourcée)\n- Analyses croisées Claude sur les fiches intégrées\n- Validation JMJ (cohérence doctrinale)\n\nIl est **spécialisé** (agriculture régénératrice, biologie des sols fine,\nfermentations KNF/JADAM, holobionte, continuum sol-plante-humain) alors que\nINRAE est généraliste (toute l'agriculture + environnement).\n\nStatistiquement : au 2026-04-13, sur 900 termes corpus, **81% sont hors INRAE**.\nCe n'est pas une dette à combler, c'est une **spécificité assumée**.\n\n### Usage d'INRAE (ce qu'on fait)\n\n1. **Enrichissement synonymes** (`sync_syn_inrae.py`) : pour les 138 matchs\n   parfaits, on ajoute les altLabel INRAE comme synonymes (syn_fr, syn_en).\n   Non-destructif : on n'écrase jamais une valeur corpus.\n\n2. **Signal de divergence** : quand FR est identique mais EN diverge, on\n   génère un docx d'arbitrage (`export_mismatches_inrae.py`). JMJ arbitre\n   cas par cas (conserver corpus / adopter INRAE / fusion en synonyme).\n\n3. **Benchmark audit** : la section BENCHMARK INRAE dans `audit_opus.py`\n   sert à positionner le corpus (part de spécificité vs alignement), pas\n   à détecter des erreurs.\n\n### Usage d'INRAE (ce qu'on ne fait pas)\n\n- ❌ Corriger automatiquement les EN du corpus sur INRAE\n- ❌ Supprimer les termes corpus qui n'ont pas d'équivalent INRAE\n- ❌ Considérer un mismatch EN comme une erreur à corriger d'office\n\n### Cas concrets (2026-04-13)\n\n**Mismatches où le corpus est plus précis ou plus actuel** :\n- `Rhizophagus irregularis` (corpus) vs `Rhizophagus` (INRAE) → corpus gardé\n- `systemic acquired resistance (SAR)` (corpus) vs `systemic acquired\n  resistance` simple (INRAE sans acronyme) → corpus gardé\n\n**Mismatches où INRAE propose une version plus récente** :\n- `Proteobacteria` (corpus) vs `Pseudomonadota` (INRAE, dénomination récente\n  GTDB) → à arbitrer\n\n**Mismatches cosmétiques** :\n- `externalités` pluriel (corpus) vs `externalité` singulier (INRAE) →\n  décidé au cas par cas par JMJ\n\n### Référence\n\nCe document formalise la position exprimée par JMJ le 2026-04-13 après\nl'intégration d'INRAE comme référentiel auxiliaire.\n", "type": "regle", "crit": true}, {"id": 131, "titre": "Doctrine Shift Project — source autoritaire transition FR", "contenu": "## Doctrine — The Shift Project comme source autoritaire pour la transition FR\n\nLe Shift Project (fondé par Jean-Marc Jancovici) est la référence de fait pour\ntoute analyse chiffrée de la transition énergie-climat en France. Scientifiquement\nsolide, consensus d'experts, revue par pairs interne, méthodologie transparente.\n**Les données Shift ne nécessitent pas de re-vérification** — elles sont intégrées\ntelles quelles dans le corpus, avec attribution claire.\n\n### Sources Shift disponibles dans la DB\n\n- **`jenni_sources` #1667** — The Shift Project (organisation, 2026)\n- **`jenni_sources` #1668** — Carbone 4 (cabinet conseil Jancovici, paire)\n- **`jenni_sources` #1669** — **Rapport final PREF 2026** — « Réussir la transition\n  dans l'incertitude : la méthode Shift en 20 chantiers » (340 pages, avril 2026)\n  → `jmj/pdf/Reussir-dans-lincertitude-SHIFT-PROJECT-avril-2026.pdf`\n- **`jenni_sources` #1670** — Synthèse PREF 2026 (28 pages)\n  → `jmj/pdf/PREF_Shift-Project_Transition-robuste_14-avril-2026.pdf`\n\n### Tables dérivées du PREF 2026\n\n- **`refs` (kind=esclave_energ)** — sections `france_*` (88 params validés)\n  - `france_macro` — 8 params (émissions FR, conso énergie/élec, cibles 2050)\n  - `france_energie` — 5 params (fossiles, exposition, objectifs PTEF)\n  - `france_secteurs` — 3 params (transport, industrie, bâtiment)\n  - `france_scenarios_2050` — 13 params (trajectoires H/I/B)\n  - `france_agriculture` — 14 params (azote, Haber-Bosch, légumineuses)\n  - `france_elevage` — 15 params (bovins, revenus, CH4, ETP)\n  - `france_puits_c` — 15 params (prairies, couverts, haies, agroforesterie)\n  - `france_foret` — 10 params (mortalité, essences, scolytes, sols)\n  - `france_historique` — 1 param (COVID)\n\n- **`refs` (kind=shift_chantier)** — les 20 chantiers avec variantes H/I/B\n  - Cœur de corpus (4) : ch.14 Azote, ch.15 Élevage, ch.18 Bioénergies partiel, ch.19 Puits C\n  - Hors scope (16) : transports, bâtiment, numérique, industrie, production électrique\n\n### Règle de priorité\n\n1. **Pour une donnée France agri/énergie/climat** : chercher d'abord dans\n   `refs` (kind=esclave_energ) sections `france_*` ou `refs` (kind=shift_chantier).\n   Si présente → source unique Shift PREF 2026.\n2. **Conflit Shift vs autre** : priorité Shift (sauf si autre source est\n   primaire physique — Smil, Even, Fuller — pour les constantes physiques).\n3. **Chiffres cités dans fiches / validations / calculateurs** : format\n   `(Shift Project, 2026, p.X)` + lien source jenni_sources.\n4. **Ne jamais re-calculer Jancovici** — c'était l'erreur de la session\n   précédente. Les références physiques (PCI, rendements, puissance humaine)\n   restent Smil 2017 / Fuller 1938 ; le cadre transition FR reste Shift.\n\n### Contrepartie\n\n- Sources académiques individuelles (Jenni) → vérification systématique\n- Livres primaires (Fuller, Smil, Jancovici grand public) → vérification allégée\n- **Rapports institutionnels autoritaires (Shift, Carbone 4, ADEME, HCC, CITEPA)\n  → acceptés sans re-vérification**", "type": "doctrine", "crit": true}]}}, "web": {"web": {"nom": "Pages web (toutes)", "entries": [{"id": 33, "titre": "12 illustrations produites", "contenu": "Tous les prompts sont en DB :\n```sql\nSELECT concept, docs_codes, statut FROM illustration_prompts ORDER BY concept;\n```\n\n**Lot 1 :** Rhizophagie · Colonne de Winogradsky\n**Lot 2 :** Priming effect · Micro-agrégats · Nécromasse\n**Lot 3 :** CMN · ISR/SAR · Y-A-S · Fe/P shuttle · Agrégat microsites · C/N · Chaîne C1\n\nRécupérer un prompt FigureLabs :\n```sql\nSELECT figurelabs FROM illustration_prompts WHERE concept='Stratégies Y-A-S';\nSELECT mermaid FROM illustration_prompts WHERE concept='Cycle de la Rhizophagie';\n```", "type": "reference", "crit": false}, {"id": 84, "titre": "Architecture pages web", "contenu": "## Architecture des pages HTML\n\nChaque page web interactive suit le même pattern en 4 couches :\n\n1. **`web_pages`** — Métadonnées (slug, title, subtitle, description, og_image, script_path, status, icon, ordre)\n2. **`html_templates`** — Templates par page (head, page_css, page_js) identifiés par `page_slug`\n3. **Script Python** `gen_*.py` — Extrait les données de la DB, charge les templates, appelle `render_page()`\n4. **`web_template.py`** — Module partagé : charte CSS, header SV, OG tags, favicon, structure HTML, pré-compilation JSX\n\n### Pages actives (état avril 2026)\n\n**Pages publiques** (visibles dans la nav bar) :\n\n| Slug | Script | Status | Icône | Description |\n|------|--------|--------|-------|-------------|\n| `index` | `gen_web.py` | publie | 🗺️ | Cartographie interactive du corpus |\n| `mo_calculateur` | `gen_mo_calc.py` | publie | 🧪 | Calculateur C/N et matière organique |\n| `lifofer` | `gen_lifofer.py` | active | 🌿 | Calculateur LiFoFer |\n| `triangle_textures` | `gen_triangle_textures.py` | publie | 🔺 | Triangle GEPPA interactif |\n| `concept_cards` | `gen_concept_cards.py` | active | 📋 | Atomes conceptuels du corpus (grille) |\n| `cahier` | `gen_cahier.py` | publie | 📚 | Cahier de Science — livre pédagogique multi-onglets (chapitres existants + fiches intégrées regroupées par thème). Charge `config.cahier.chapitres`, `config.cahier.onglets` et `fiche_contenus.contenu_integre`. |\n\n**Pages internes** (hors nav — outils de pilotage JMJ/Claude) :\n\n| Slug | Script | Status | Icône | Description |\n|------|--------|--------|-------|-------------|\n| `dashboard` | `gen_dashboard.py` | interne | 📊 | Tableau de bord (vision rapide corpus pour Claude) |\n| `ebauches` | `gen_ebauches_web.py` | interne | 📝 | Lecture web des ébauches Jenni (mammoth) |\n| `explorer` | `gen_explorer.py` | interne | 🔍 | Explorer DB — inspection tables et dashboard maintenance |\n| `technique` | `gen_technique.py` | interne | 📖 | Guide technique (architecture, sessions, git) |\n\nLe statut `interne` exclut la page de la barre de navigation inter-pages (filtre `status != 'interne'` dans `load_nav_pages()`). La page est toujours régénérée par `regen_all.py` et accessible par URL directe.\n\n### Cahier de Science — spécificités\n\n- **Structure des onglets** : `config.cahier.onglets` (JSON). Par défaut 2 onglets : `Pédagogie` (type=`all_chapitres`, rend tous les chapitres de `config.cahier.chapitres`) et `Fiches` (type=`all_fiches`, rend toutes les fiches intégrées en accordéon, groupées par type). Un onglet peut aussi référencer un `chapitre_id` ou une liste explicite `fiche_ids` si besoin.\n- **Rendu des fiches** : pour chaque `fiche_id`, `gen_cahier.py` lit `fiche_contenus.contenu_integre` et `fiche_contenus.refs` (liste JSON) et les passe à `SvRichText` + `SvSourceList`. Les refs sont normalisées depuis les clés FR (`auteurs`, `annee`) vers les clés attendues par `SvSourceList` (`authors`, `year`).\n- **Format des fiches** : les `contenu_integre` suivent la charte Jenni (Introduction + sections `## 1. Titre` + sous-sections `#### Titre`). `SvRichText` rend directement ces headings Markdown.\n- **Deep-link** : `cahier.html#tab-<id_onglet>` ouvre directement l'onglet choisi.\n- **Navigation** : `SvTabs` sticky en haut (charte `.sv-tabs` top:0 z-index:10). Pas de sidebar.\n\n### Workflow de création d'une nouvelle page\n\n1. Créer l'entrée `web_pages` (slug, title, subtitle, status, icon, ordre)\n2. Créer les 3 `html_templates` : head (CDN React/Babel), page_css, page_js (React JSX)\n3. Créer le script `gen_*.py` dans `tools/docs/`\n4. Enregistrer le script dans la table `scripts`\n5. Ajouter le script dans la liste `GENERATORS` de `tools/regen_all.py`\n6. Tester : `python3 tools/docs/gen_<page>.py --db sol_vivant.db`\n7. Les données sont toujours dans `config` ou dans les tables de référence — **jamais hardcodées dans le template JS**", "type": "reference", "crit": true}, {"id": 34, "titre": "Structure d'un prompt FigureLabs", "contenu": "```\n⚠️ IMPORTANT: All text labels, titles, annotations and captions must be written in FRENCH.\n\n[Description générale et titre français]\n\n[Zones/étapes numérotées avec couleurs exactes]\n[Morphologie exacte des microbes si présents]\n[Éléments latéraux et annotations]\n[Style journal cible]\n[Labels obligatoires en français]\n```\n⚠️ L'instruction FRENCH doit être en première ligne — FigureLabs la respecte mieux en position 1.", "type": "reference", "crit": false}, {"id": 85, "titre": "Charte graphique Sol Vivant", "contenu": "## Charte graphique Sol Vivant\n\nStockée en DB `html_templates(slug='sv-charter-css', page_slug=NULL, type='page_css')` — chargée lazy par `tools/lib/web_template.py::get_charter_css(conn)` au 1er `load_templates()` (migration 2026-04). Editer la charte = UPDATE DB, pas besoin de toucher au code Python. Toutes les pages DOIVENT utiliser ces variables et classes.\n\n### Variables CSS (26)\n\n```\n--bg: #f4f6f8          --card-bg: #ffffff\n--text: #1e293b         --text-secondary: #64748b\n--accent: #2563EB       --accent-dark: #1d4ed8    --accent-light: #DBEAFE\n--border: #e2e8f0       --border-hover: #cbd5e1\n--radius: 10px          --shadow / --shadow-hover\n--success: #059669      --success-light: #D1FAE5\n--warning: #D97706      --warning-light: #FEF3C7\n--danger: #DC2626       --danger-light: #FEE2E2\n--info: #2563EB         --info-light: #DBEAFE\n--header-from: #0f172a  --header-to: #1e3a5f\n```\n\n### Classes communes\n\n| Classe | Usage |\n|--------|-------|\n| `.sv-header` | Bandeau bleu gradient (auto via `render_page`) |\n| `.sv-container` | Wrapper centré max-width 1400px |\n| `.sv-card` | Carte blanche avec ombre et border |\n| `.sv-tag` / `.sv-tag-*` | Badges colorés (doc, term, info, risk, test) |\n| `.sv-callout` / `.sv-callout-*` | Encarts warning/success/danger |\n| `.sv-btn` | Bouton accent |\n| `.sv-input` | Champ de saisie |\n| `.sv-nav` | Fil d'Ariane |\n| `.sv-footer` | Pied de page |\n\n### Inline emphasis (refonte avril 2026)\n\n| Classe | Usage |\n|--------|-------|\n| `.sv-mark` | Surlignage inline léger (fond `--accent-light`, texte `--accent-dark`). Pour les termes-clés, concepts pivot, ou fragments à mettre en valeur dans un paragraphe. |\n| `.sv-emphasis` | Gras inline (équivalent sémantique de `<strong>`), couleur `--text`. |\n\n### Bloc de section unifié (refonte avril 2026)\n\n| Classe | Usage |\n|--------|-------|\n| `.sv-section-block` | Conteneur d'une section de page (marge verticale unifiée) |\n| `.sv-section-title` | Titre de section. Modificateurs : `.sv-section-title-h2` et `.sv-section-title-h3` |\n| `.sv-section-icon` | Préfixe emoji optionnel dans le titre |\n\nUtiliser via le composant React `SvSection` plutôt qu'en JSX brut (cf. BQ #99).\n\n### Bloc texte riche (refonte avril 2026)\n\n| Classe | Usage |\n|--------|-------|\n| `.sv-richtext` | Wrapper autour du rendu `SvRichText` : line-height unifié, spacing des `<p>` et `<ul>` internes |\n\n### Règle : pas de couleurs hardcodées\n\nDans le CSS spécifique à la page (html_templates type=page_css), toujours utiliser `var(--*)` plutôt que des hex. Exemple : `color: var(--success)` et non `color: #059669`.\n\nDans le JSX React (page_js), idem : utiliser `style={{color:'var(--success)'}}`. Les classes Tailwind ne sont plus autorisées depuis la refonte vers la charte sv-* unifiée (avril 2026). Toute classe de style (`bg-*`, `text-*`, `rounded-*`…) doit être soit une classe `sv-*` soit un style inline avec les variables CSS.\n\n### Legacy en cours de migration\n\n- `.sv-accordion*` (CSS dans CHARTER_CSS) est **legacy** — remplacé par `SvCollapse` + `.sv-collapse*`. Encore utilisé par `mo-calc-js` et `index-js` (migration progressive). Toute nouvelle page doit utiliser `SvCollapse` uniquement.\n- `vendor/tailwind.min.css` et `vendor/tailwind.js` sont obsolètes (plus référencés depuis la refonte sv-*). À supprimer dans une passe de nettoyage dédiée.\n\n### Échelle typographique pilotée par --font-scale (avril 2026)\n\nL'échelle font-* dérive d'une variable `--font-scale` (defaut `1`) :\n```\n--font-scale: 1;\n--font-2xs: calc(0.68rem * var(--font-scale));\n--font-xs:  calc(0.75rem * var(--font-scale));\n--font-sm:  calc(0.82rem * var(--font-scale));\n--font-base:calc(0.9rem  * var(--font-scale));\n--font-md:  calc(1rem    * var(--font-scale));\n--font-lg:  calc(1.15rem * var(--font-scale));\n--font-xl:  calc(1.5rem  * var(--font-scale));\n--font-2xl: calc(1.8rem  * var(--font-scale));\n--font-1-4: calc(1.4rem  * var(--font-scale));\n```\n\nLe bouton zoom typo `A−/A/A+` (toolbar flottante) modifie `--font-scale` en runtime → toutes les `--font-*` suivent. Persistance `localStorage('sv-font-scale')`.\n\n**Règle absolue** : ne jamais hardcoder de `font-size: <rem>` dans un page_css ou un style inline JSX. Toujours `var(--font-*)`. Sinon le zoom typo ne suit pas.\n\n### Échelle d'espacement\n\n```\n--space-2xs: 0.25rem\n--space-xs:  0.5rem\n--space-sm:  0.75rem\n--space-md:  1rem\n--space-lg:  1.25rem\n--space-xl:  1.5rem\n--space-2xl: 2rem\n```\n\nÀ utiliser pour padding/margin plutôt que des valeurs `rem` arbitraires.\n\n### Mode sombre — variables theme-aware\n\nVariables CSS dupliquées dans `[data-theme=\"dark\"]` ET `@media (prefers-color-scheme: dark)`. Toggle via le bouton `☾/☀` de la toolbar.\n\n**Règles** :\n- TOUJOURS définir `color` explicite quand on définit `background`. Sans ça, le texte hérité peut devenir illisible quand le fond change en dark.\n- Les `--*-light` (success/warning/danger/info) deviennent **très foncés** en dark (#064e3b, #451a03, etc.). Les classes `.sv-callout-*` doivent forcer leur `color` via `var(--color-*-text)`.\n- Pour les fonds papier crème (`.sv-cahier`, `.sv-science-note`), utiliser `var(--paper-bg)` / `--paper-bg-2` / `--paper-border` (theme-aware).\n- Pour fonds secondaires (accordéon, callout neutre), utiliser `var(--color-bg-subtle)` jamais `#f8fafc` en dur.\n\n### Navigation captive (sticky)\n\n`.sv-nav-pages` est `position: sticky; top: 0; z-index: 20` ; reste sur **1 ligne** (`overflow-x: auto` si débordement). Le bandeau `.sv-header` peut donc s'effacer au scroll.\n\n`.sv-tabs` est `sticky; top: 2.1rem` (2.5rem mobile) — collé juste sous la nav-pages. Profite de l'espace libéré pour mettre une intro accordéon (`SvTabIntro`) au-dessus du contenu.\n\n### Onglets — 2 niveaux distincts\n\n| Composant | Usage | Look |\n|-----------|-------|------|\n| `SvTabs` | Niveau 1 (Pratique / Comprendre, Données / Analyse, etc.) | Vrais onglets : coin arrondi haut + fond carte sur active |\n| `SvSubTabs` | Niveau 2 (sous-onglets dans un onglet niveau 1) | Pills compactes inline, fond vert sur active |\n\n**Règle** : ne jamais utiliser deux `SvTabs` imbriqués (confusion hiérarchique). Si un onglet niveau 1 a des sous-vues, utiliser `SvSubTabs`.\n\n`SvSubTabs` doit être accompagné d'un `useEffect(() => setStateLocal(null), [subtab])` pour réinitialiser les states locaux (accordéons ouverts, etc.) au changement de sous-onglet.\n\n\n### Bandeau `.sv-header` — hiérarchie refondue (avril 2026)\n\n**Principe** : le seul élément qui change d'une page à l'autre est le **titre de la page**. Le nom du corpus (identique partout) est relégué en lien discret au-dessus.\n\n```html\n<header class=\"sv-header\">\n  <a class=\"sv-corpus-link\" href=\"index.html\">Le Sol Vivant cet Holobionte<\/a>  <!-- petit, opacity 0.6 -->\n  <h1>Calculateur Matière Organique<\/h1>                                       <!-- titre de la page -->\n  <div class=\"sv-subtitle\">C/N, humification, mélanges interactifs<\/div>       <!-- description -->\n  <div class=\"sv-meta\">Jean-Michel Juzan — Généré le ... — CC BY-NC-SA<\/div>   <!-- meta -->\n<\/header>\n```\n\n**Règles strictes** :\n- Chaque ligne du bandeau est contrainte sur **une ligne stricte** (`white-space: nowrap; overflow: hidden; text-overflow: ellipsis`). Garantit une hauteur de bandeau identique sur toutes les pages.\n- Police via variables charte uniquement :\n  - `.sv-corpus-link` : `var(--font-xs)` + opacity 0.6\n  - `.sv-header h1` : `var(--font-xl)` (1.5rem × --font-scale)\n  - `.sv-subtitle` : `var(--font-sm)` + opacity 0.7\n  - `.sv-meta` : `var(--font-xs)` + opacity 0.45\n- Responsive `@media (max-width: 900px)` : h1 passe à `var(--font-lg)`.\n- **Aucun page_css ne doit overrider** `.sv-header*`. Le bandeau est strictement identique sur toutes les pages.\n\n### Sync cross-tab zoom typo + thème (avril 2026)\n\nQuand l'utilisateur change `A−/A/A+` ou `☾/☀` dans un onglet, tous les autres onglets ouverts se mettent à jour sans reload, via l'event `window.addEventListener('storage', ...)`.\n\nMécanisme :\n- Écriture : `svSetFontScale(scale)` et `svToggleTheme()` écrivent dans `localStorage('sv-font-scale'|'sv-theme')`.\n- Réception : chaque onglet écoute `storage`, lit `e.newValue`, applique à `:root` et rafraîchit l'état actif des boutons.\n- Au chargement initial, `localStorage('sv-font-scale')` est relu directement (pas via `getComputedStyle`) pour déterminer le bouton actif — évite un flicker où `--font-scale` est encore à 1 quand le DOM est parsé.\n\n### Colonne de lecture — `.sv-text-column` (avril 2026)\n\n**Règle** — tout contenu textuel destiné à la lecture (fiches, documents,\nchapitres, accordéons d'explication) DOIT être enveloppé dans un wrapper\n`<div className=\"sv-text-column\">` (max-width: 900px par défaut, pilotée\npar `--text-column-max`).\n\n**Pourquoi** — sur écran large (>1200px), une colonne pleine largeur\noblige le balayage horizontal et casse le rythme de lecture (longueur\nde ligne optimale ≈ 60-80 caractères). 900px maintient cette longueur\ntout en restant responsive : sous cette taille, le wrapper s'adapte\nau container parent.\n\n**Pages obligatoires** :\n- Cahier de Science : les 2 onglets (Pédagogie, Fiches) sont wrappés\n  au niveau App.\n- Index (cartographie) : `DocumentsTab` est wrappé.\n- `SvComprendre` : utilise `.sv-text-column` (anciennement style inline\n  `maxWidth:'900px'`).\n\n**Hors-scope** :\n- Dashboards, tables larges, grilles de données (Explorer, Dashboard,\n  ConceptCards quand affichées en grille pleine largeur). Pour ces\n  vues, l'utilisateur veut tirer parti de la largeur disponible.\n- Calculateurs avec sidebar (MO, LiFoFer, Triangle) : la colonne\n  contenu est déjà gérée par leur layout `sv-sidebar-layout`.\n\n**Variable** : `--text-column-max: 900px;` dans `:root`. Pour ajuster\nglobalement la largeur de lecture, modifier cette variable.\n", "type": "regle", "crit": true}, {"id": 86, "titre": "web_template.py — API", "contenu": "## web_template.py — Module partagé\n\nModule `tools/lib/web_template.py` — génère le HTML final avec la charte.\n\n### Fonctions\n\n| Fonction | Signature | Rôle |\n|----------|-----------|------|\n| `load_page_meta(conn, slug)` | → dict | Charge titre, subtitle, description, og_image depuis `web_pages` |\n| `load_templates(conn, page_slug)` | → dict {css, js, head} | Charge les 3 templates depuis `html_templates` |\n| `load_nav_pages(conn)` | → list[dict] | Charge les pages web pour la navigation inter-pages (exclut `status='interne'`) |\n| `render_page(meta, body, ...)` | → str HTML | Assemble le HTML final avec charte, OG tags, favicon, nav bar, puis pré-compile le JSX |\n| `update_last_generated(conn, slug)` | — | Met à jour `web_pages.last_generated` |\n| `_compile_jsx_in_html(html)` | → str HTML | Pré-compile les blocs `<script type=\"text/babel\">` via Node `tools/lib/compile_jsx.js` (fallback : conserve le bloc original pour Babel in-browser) |\n\n### load_nav_pages\n\nRetourne une liste de dicts `{slug, title, icon, url}` pour toutes les pages sauf celles en `status='interne'` (ex : `explorer`). Utilisée par chaque `gen_*.py` pour construire la barre de navigation inter-pages.\n\n### _build_nav_bar(nav_pages, current_slug)\n\nFonction interne appelée par `render_page()`. Génère le HTML `<nav class=\"sv-nav-pages\">` avec la page courante en gras (`sv-nav-current`) et les autres en liens cliquables, séparés par `·`.\n\n### render_page — paramètres\n\n```python\nrender_page(meta, body,\n    css_extra='',        # CSS de la page (depuis tpl['css'])\n    scripts_extra='',    # JS de la page (DATA + React JSX)\n    head_extra='',       # CDN React + Babel (depuis tpl['head']) — pas de Tailwind\n    data_json=None,      # Alternative : inject DATA directement\n    show_header=True,    # False si la page a son propre header React\n    nav_pages=None,      # list[dict] depuis load_nav_pages() — active la nav bar\n    current_slug=None    # slug de la page courante (gras dans la nav)\n)\n```\n\n**Note** : `head_extra` vient intégralement de la DB (`html_templates.contenu`). Plus de strip automatique des CDN depuis avril 2026 — chaque page déclare ses dépendances dans son `*-head` template en DB. Le `<script src=\"vendor/babel.min.js\">` est automatiquement retiré du HTML final quand tous les blocs JSX ont été pré-compilés avec succès (cf. `_compile_jsx_in_html`).\n\n### Pattern standard d'un gen_*.py\n\n```python\ndef build_html(conn, data):\n    meta = load_page_meta(conn, 'mon_slug')\n    tpl = load_templates(conn, 'mon_slug')  # tpl['js'] est enveloppé <script type=\"text/babel\">\n    nav_pages = load_nav_pages(conn)\n    body = '<div id=\"root\"><\/div>'\n    data_json = json.dumps(data, ensure_ascii=False)\n    # Strip l'enveloppe de tpl['js'] pour re-poser DATA + JSX dans un seul bloc babel\n    # (évite l'imbrication <script> qui casse le parse)\n    js_content = tpl['js'].replace('<script type=\"text/babel\">', '').replace('<\/script>', '')\n    scripts = f'<script>const DATA = {data_json};<\/script>\\n'\n    scripts += f'<script type=\"text/babel\">{js_content}<\/script>'\n    return render_page(meta, body, css_extra=tpl['css'],\n                       scripts_extra=scripts, head_extra=tpl['head'],\n                       nav_pages=nav_pages, current_slug='mon_slug')\n```\n\nLe bloc `<script type=\"text/babel\">` est ensuite pré-compilé en `<script>` contenant du `React.createElement()` via `_compile_jsx_in_html` → Node + Babel (cf. BQ #100). Si la pré-compilation échoue, le bloc reste JSX brut (pas de Babel in-browser chargé par défaut).\n", "type": "reference", "crit": true}, {"id": 87, "titre": "html_templates — Convention + workflow (DB uniquement)", "contenu": "## html_templates — Convention\n\nTable `html_templates` stocke le CSS et JS de chaque page.\n\n### Structure\n\n| Colonne | Rôle |\n|---------|------|\n| `slug` | Identifiant unique (ex: `lifofer-js`) |\n| `page_slug` | Lien vers `web_pages.slug` (ex: `lifofer`) |\n| `type` | `head` (CDN), `page_css`, `page_js` |\n| `label` | Description lisible |\n| `contenu` | Le code CSS ou JS complet |\n| `ordre` | 0=head, 1=css, 2=js |\n| `is_active` | 1=inclus dans la génération |\n\n### Règles\n\n1. **3 templates par page** : head (CDN React+Babel), page_css, page_js\n2. **Le JS est du JSX React**, pré-compilé à la génération via Node (`tools/lib/compile_jsx.js` + `@babel/core` + `@babel/preset-react`). Fallback : Babel in-browser si la pré-compilation échoue.\n3. **Les données sont dans `DATA`** (injecté par le script Python, pas hardcodé dans le template)\n4. **Le CSS utilise les variables charte** (`var(--*)`) — **pas de classes Tailwind** (cf. BQ #85 refactor sv-*)\n5. **Pas de `<script>` ou `<style>` dans le contenu** — le script Python les ajoute\n6. **Lire depuis la DB** : `SELECT contenu FROM html_templates WHERE id=X` (pas Read fichier — risque de troncature)\n\n### (fusionné depuis #91 : Workflow modification templates — DB uniquement)\n\n**Règle** : pour modifier le CSS ou le JS d'une page web, on met à jour **uniquement** la table `html_templates` en DB. Jamais de fichier `.js` ou `.css` standalone dans le dépôt.\n\n### Workflow correct\n\n```python\nimport sqlite3\ncon = get_connection('sol_vivant.db')\n\n# Lire le template actuel\njs = con.execute(\"SELECT contenu FROM html_templates WHERE slug='lifofer-js'\").fetchone()[0]\n\n# Modifier\njs = js.replace('ancien', 'nouveau')\n\n# Injecter\ncon.execute(\"UPDATE html_templates SET contenu=?, updated_at=datetime('now') WHERE slug='lifofer-js'\", (js,))\ncon.commit()\n```\n\nPuis regénérer la page :\n\n```bash\npython3 tools/docs/gen_<page>.py --db sol_vivant.db\n```\n\n### Pourquoi\n\n- La DB est la source de vérité unique\n- Les scripts `gen_*.py` lisent les templates depuis la DB et assemblent le HTML final via `web_template.render_page()`\n- Écrire un `.js` local court-circuite ce pipeline → divergence entre code versionné et rendu\n- Le champ `updated_at` trace les modifications\n\n### Pour construire un gros template from scratch\n\nAcceptable : écrire le JS dans `/tmp/` pour travailler confortablement, puis **injecter en DB** en fin de tâche. Ne jamais commit un fichier `.js` de page dans le dépôt.\n", "type": "regle", "crit": false}, {"id": 88, "titre": "Données dynamiques — Règle zéro statique", "contenu": "## Données dynamiques — Règle zéro statique\n\n**Aucune donnée du corpus ne doit être hardcodée dans le template JS.**\n\n### Où stocker les données\n\n| Type de donnée | Table DB | Exemple |\n|----------------|----------|---------|\n| Données de référence | `refs` (kind=matiere, texture, ...) via `tools/lib/refs.py::load_refs(con, kind)` | matieres, textures, esclaves_energ, shift_chantier, cn_regle |\n| Configuration UI (couleurs, labels) | `config(categorie, cle)` | mo_calc/cat_colors |\n| Textes didactiques | `config(categorie, cle)` | triangle/sections_didactiques |\n| Métadonnées page | `web_pages` | title, subtitle, description |\n| Nom/auteur du projet | `config(corpus/*)` | corpus/nom, corpus/auteur |\n\n### Le script Python injecte tout via DATA\n\n```python\ndata['meta'] = {'nom_projet': get(conn, 'corpus', 'nom'), ...}\ndata['cat_colors'] = get_json(conn, 'mo_calc', 'cat_colors')\n```\n\n### Ce qui est acceptable dans le template JS\n\n- Labels d'UI courts (« Rechercher... », « Tout afficher »)\n- Noms de classes CSS `sv-*` (charte unifiée — cf. BQ #85, #99)\n- Styles inline avec variables CSS : `style={{color:'var(--success)'}}`\n- Logique de rendu (conditions, boucles, calculs)\n- Palettes de couleurs **en fallback** (`DATA.colors || [default]`)\n\n### Ce qui ne l'est PAS\n\n- Compteurs (`\"N documents\"`, `\"N termes\"`)\n- Noms de catégories (`\"Végétale\"`, `\"Fumier/compost\"`)\n- Textes descriptifs (introductions d'onglets)\n- Titre, sous-titre, auteur\n- Listes de valeurs qui viennent de la DB (statuts, importances, etc.)\n- **Classes Tailwind** (`bg-blue-500`, `text-xs`, `flex`…) — interdit depuis le refactor sv-* (avril 2026). À remplacer par `sv-*` ou `style={{}}` avec variables CSS.\n", "type": "regle", "crit": true}, {"id": 99, "titre": "Charte pédagogique unifiée — Cahier de Science", "contenu": "## Charte pédagogique unifiée — Cahier de Science\n\n### Composants CSS partagés (CHARTER_CSS)\n\nClasses `sv-*` dans `web_template.py` pour la présentation pédagogique :\n\n| Classe | Usage |\n|--------|-------|\n| `sv-sidebar-layout` / `sv-sidebar` / `sv-main` | Layout 2 colonnes unifié |\n| `sv-cahier` | Fond papier crème pour sections Comprendre |\n| `sv-tab-content` | Wrapper pleine page pour contenu d'onglet |\n| `sv-prose` | Texte didactique courant |\n| `sv-collapse` / `sv-collapse-header` / `sv-collapse-body` | Section compactable/décompactable |\n| `sv-science-note` | Encart cahier de labo |\n| `sv-formula` / `sv-formula-highlight` | Formule scientifique (fond violet) |\n| `sv-rule` | Règle pratique \"à retenir\" (fond vert) |\n| `sv-kpi-grid` / `sv-kpi` | Indicateurs clés (grille auto-fit) |\n| `sv-timeline` / `sv-timeline-item` | Frise chronologique verticale |\n| `sv-phase-card` | Étape/phase colorée (succession, process) |\n| `sv-alert` + variantes | Alertes danger/warning/success/info |\n| `sv-diag-grid` / `sv-diag-ok` / `sv-diag-ko` | Diagnostic binaire OK/KO |\n| `sv-compare` / `sv-compare-good` / `sv-compare-bad` | Comparaison côte-à-côte |\n| `sv-term` | Terme glossaire |\n| `sv-source` | Source bibliographique |\n| `sv-ref-box` / `sv-ref-grid` | Encart référence chiffrée |\n| `sv-data-table` | Table de données stylisée |\n| `sv-highlight-box` | Conclusion / point clé |\n| `sv-bullet-list` / `sv-bullet-list-dense` | Liste pédagogique avec chevrons ▸ verts (CSS) |\n| `sv-section-label` | Titre de section uppercase |\n| `sv-section-block` / `sv-section-title` | Bloc de section unifié (utiliser via `SvSection`) |\n| `sv-richtext` | Wrapper pour le rendu `SvRichText` |\n| `sv-mark` / `sv-emphasis` | Highlight et gras inline (cf. BQ #85) |\n\n### Composants React partagés (DB `html_templates` slug=`sv-shared-components`, page_slug NULL)\n\nTemplate chargé automatiquement dans toutes les pages React.\n\n| Composant | Props | Usage |\n|-----------|-------|-------|\n| `SvCollapse` | title, icon, defaultOpen, children, id | Section compactable |\n| `SvFormula` | children, source | Formule scientifique |\n| `SvRule` | children, title | Règle pratique |\n| `SvScienceNote` | children, title, icon | Encart cahier de labo |\n| `SvKPI` / `SvKPIGrid` | value, unit, label, color, detail / cols | KPIs |\n| `SvTabs` | tabs, active, onChange | Navigation onglets unifiée |\n| `SvTimeline` | items (date, place, text, tags) | Frise chronologique |\n| `SvPhaseCard` | title, color, label, stats, tags, children | Phase/étape |\n| `SvCompare` | good, bad | Comparaison bon/mauvais |\n| `SvDiagnostic` | ok, ko | Diagnostic OK/KO |\n| `SvTermList` | terms | Liste de termes |\n| `SvSourceList` | sources | Liste de sources |\n| `SvNoteAccordion` | text, label | Mini-note inline |\n| `SvRefBox` | title, items, note, children | Référence chiffrée |\n| `SvHighlightBox` | title, children, color | Point clé |\n| `SvDataTable` | headers, rows / children | Table de données |\n| **`SvBulletList`** | items, dense | **Liste à puces unifiée** (remplace `<ul className=\"sv-bullet-list\">` manuel). `items` accepte string ou `{text, emphasis, strong}` |\n| **`SvSection`** | title, label, level, icon, id, children | **Titre de section uniforme** (remplace `<h2>` / `<h3>` bruts). `level`=2 ou 3. |\n| **`SvTabIntro`** | resume, detail | **Ligne accordéon de présentation** sous les tabs. Résumé court en ligne, lien \"▸ en savoir plus\" qui déploie le détail. Sert aussi de repère d'alignement horizontal sous le bandeau. |\n| **`SvExpandableCard`** | badge, color, title, subtitle, progress, open, onClick, children | **Carte expansible du pattern cartographie**. Badge coloré à gauche, titre, sous-titre (ex: \"2 docs · 84 termes\"), barre de progression facultative 0-100, chevron ▸/▾. État ouvert contrôlé (prop `open`). |\n| **`SvTagButton`** | code, label, stat, color, active, onClick | **Pill pour sous-item**. Code gras à gauche (ex: \"F1\", \"#11\"), label tronqué, stat à droite (ex: \"49t\"). Utilisé pour lister les sous-items d'un `SvExpandableCard` ouvert. |\n| **`SvRichText`** | text, onCardRef, skipPrefixes | **Rendu pédagogique de texte semi-structuré**. Split `\\n\\n` → `<p>`, `• ` ou `- ` → `SvBulletList`, MAJUSCULES: → `sv-section-label`, `## titre` → `<h2 class=sv-section-title>`, `### / #### titre` → `<h3 class=sv-section-title>`, `Card #N` → liens, `` `terme` `` → `.sv-mark`, `**gras**` → `.sv-emphasis`. Filtre les lignes `[2026-...` par défaut. Le rendu accepte le markdown produit par Jenni dans `fiche_contenus.contenu_integre`. |\n\n### Règle : zéro texte hardcodé\n\nTous les composants sont pilotés par props. Les textes viennent de `DATA` (injecté par le script Python depuis la DB), jamais du template JS.\n\n### Règle : zéro liste brute\n\nUtiliser `SvBulletList` (listes à puces pédagogiques) ou `SvCompare`/`SvDiagnostic` (listes structurées). Pas de `<ul>` / `<ol>` bruts, sauf cas très spécifiques (listes plates sans puces volontaires, sémantique native `<nav>` ou `<menu>`).\n\n### Règle : zéro titre brut\n\nUtiliser `SvSection` pour les titres pédagogiques (h2/h3). Les `<h2>` / `<h3>` bruts disséminés dans les templates sont en cours de migration — toute nouvelle page doit utiliser `SvSection`.\n\n### Règle : le nettoyage se fait à l'import, pas au rendu (avril 2026)\n\n`SvRichText` **n'a plus vocation à parser du markdown**. Le texte en DB (`fiche_sections.contenu`, futur `doc_sections.contenu`) est déjà propre et découpé par section, écrit une fois par le parser d'import (cf. BQ `wf_fiche` §4.2 et `trios_parallels`).\n\nLe composant de rendu se contente de :\n- lire le plan DB (liste de sections ordonnées : titre + type + contenu)\n- afficher chaque section avec `<SvSection>` + paragraphes\n- afficher les refs via `<SvSourceList>`\n\nTout parser côté JS qui tolère des variantes Jenni (`# Titre`, `## `, MAJUSCULES:, bullets, `**gras**`, `Card #N`, backticks) est un contournement historique. Le fix définitif va dans l'import docx. `SvRichText` sera simplifié en rendu plat paragraphe + bullets au fur et à mesure que les sources (fiches, concept_cards, config) sont re-nettoyées à l'entrée.\n\n### Navigation unifiée\n\nToutes les pages utilisent `SvTabs` pour les onglets. Patterns actuels :\n- **Outils** (MO, LiFoFer, Triangle) : Pratique / Comprendre\n- **Index** : onglets métier (Documents, Thésaurus, etc.)\n- **Cahier de Science** : 1 onglet par rubrique thématique (Intro, MO, Textures, Cycles, Microbiome, Holobionte, Santé, Pratiques, Fermentations, Méthodologie), piloté par `config.cahier.onglets`. Chaque onglet rend le chapitre pédagogique et/ou un groupe de fiches intégrées.\n\nChaque onglet a un `sv-tab-content` comme wrapper pleine page uniforme. `.sv-tabs` est déjà sticky (top:0, z-index:10) — ne pas ré-envelopper dans un wrapper custom.\n\n### Pattern standard d'une page multi-onglets\n\n```jsx\nreturn <div className=\"sv-page\">\n  <SvTabs tabs={tabs} active={active} onChange={setActive} />\n  <div className=\"sv-tab-content\">\n    <SvTabIntro resume={desc.resume} detail={desc.detail} />\n    {/* contenu spécifique de l'onglet actif */}\n  <\/div>\n<\/div>;\n```\n\n`SvTabIntro` sert de **point de référence d'alignement** : son conteneur hérite du padding de `.sv-page` (1.25rem gauche/droite), et toute la suite (cards, sections, tables) s'aligne dessus. Ne pas ajouter de wrapper custom entre.\n\n### Composants React ajoutés (avril 2026)\n\n| Composant | Props | Usage |\n|-----------|-------|-------|\n| `SvCallout` | variant, title, icon, children | Encart sémantique unifié — remplace les `<div className=\"sv-callout sv-callout-*\">` |\n| `SvAlert` | variant, title, children | Alerte compacte |\n| `SvImageCard` | src, alt, caption, maxHeight, maxWidth | Image illustrative + légende standardisée |\n| `SvProcedureSteps` | title, steps, materiel, duree | Procédure pas-à-pas numérotée |\n| `SvTestCard` | test={...} | Carte standardisée pour un `terrain_test` |\n| `SvSubTabs` | tabs, active, onChange | Sous-onglets niveau 2 (pills compactes) |\n\n### Anti-pattern : SvTabs imbriqués\n\nNe **jamais** utiliser deux `SvTabs` l'un dans l'autre. Si un onglet de premier niveau contient des sous-vues, utiliser `SvSubTabs` pour le niveau 2 (pills compactes, visuellement distinct).\n\nToujours accompagner `SvSubTabs` d'un `useEffect(() => setStateLocal(null), [subtab])` pour réinitialiser les states locaux (accordéons ouverts) au changement de sous-onglet.\n\n\n### SvRichText — tolérance H1 (avril 2026)\n\nLe parser accepte désormais `# Titre` (H1) **en plus** de `## ` / `### ` / `#### `. Les H1 sont rendus comme H2 (convention corpus : pas de H1 au niveau des sections, réservé au titre du doc via `meta.title`).\n\nRaison : Jenni produit parfois des fiches avec `# Introduction` / `# 1. Section` (template ancien). Sans cette tolérance, ces titres étaient affichés bruts en paragraphe. Le parser tolérant sert de filet de sécurité ; les fiches existantes ont aussi été normalisées en DB (H1 → H2).\n\n### Doctrine formatage `fiche_contenus.contenu_integre`\n\nConventions impératives pour que `SvRichText` rende correctement :\n1. **Titres** : `## X` à `### X`. Les `# X` sont tolérés mais non recommandés.\n2. **Paragraphes** : séparés par `\\n\\n` (ligne vide). Les `\\n` simples sont fusionnés dans un même paragraphe.\n3. **Pas de tags Jenni résiduels** en début (ex: `[Fiche zoom #X v1: ... 2026-XX-XX]`) — filtrés au parser mais à retirer en DB.\n4. **Refs consécutives** : séparer par espace `) (Ref2)` et non `)(Ref2)`.\n5. **Apostrophes** typographiques `'` recommandées (droites `'` tolérées, cosmétique).\n\nAudit et normalisation automatique via script ad hoc (voir audit_log 2026-04-19 : 27 H1 corrigés, 22 tags retirés, 70 refs espacées sur 28 fiches).\n", "type": "reference", "crit": true}, {"id": 81, "titre": "html_templates — carte des composants web", "contenu": "Table `html_templates` : CSS, JS et HEAD pour les pages web.\n\n| ID | page_slug | type | Contenu |\n|---|---|---|---|\n| 1 | (global) | head | CDN React 18 + Babel |\n| 2 | (global) | head | CDN Tailwind CSS |\n| 3 | (global) | head | CDN Tailwind CSS (version fixe) |\n| 4 | triangle_textures | page_css | CSS Triangle |\n| 5 | triangle_textures | page_js | JS React Triangle (17k) |\n| 6 | mo_calculateur | page_css | CSS Calculateur MO (3.7k) |\n| 7 | mo_calculateur | page_js | JS React Calculateur MO (22k) |\n| 8 | index | page_css | CSS Cartographie |\n| 9 | index | page_js | JS React Cartographie (46k) |\n| 10 | mo_calculateur | head | CDN Calculateur MO |\n| 11 | index | head | CDN Cartographie |\n| 12 | triangle_textures | head | CDN Triangle |\n\n**Modifier un composant React :**\n```python\ncon = get_connection('sol_vivant.db')\njs = con.execute(\"SELECT contenu FROM html_templates WHERE id=7\").fetchone()[0]\n# ... modifier js ...\ncon.execute(\"UPDATE html_templates SET contenu=?, updated_at=datetime('now') WHERE id=7\", (js,))\ncon.commit()\n```\nPuis regénérer : `python3 tools/docs/gen_mo_calc.py --db sol_vivant.db`", "type": "reference", "crit": false}, {"id": 100, "titre": "Mode hors-ligne et déploiement", "contenu": "## Mode hors-ligne et déploiement\n\n### Architecture des dépôts\n\n```\n/Tools/                          ← Sol-Vivant/Tools (scripts + DB)\n  Publications/web/              ← Pages générées\n    index.html, *.html\n    vendor/                      ← Dépendances JS/CSS locales\n    img/                         ← Images OG et previews\n\n        │ rsync -av Publications/web/ → /Publications/\n        ▼\n\n/Publications/                   ← Sol-Vivant/Publications (GitHub Pages)\n  index.html, *.html\n  vendor/, img/\n```\n\n### Vendor local (Publications/web/vendor/)\n\nToutes les dépendances JS sont téléchargées localement pour le mode hors-ligne :\n\n| Fichier | Taille | Statut | Utilisé par |\n|---------|--------|--------|-------------|\n| `react.production.min.js` | 11 Ko | actif | toutes les pages React |\n| `react-dom.production.min.js` | 129 Ko | actif | toutes les pages React |\n| `babel.min.js` | 3.0 Mo | fallback | non chargé dans le HTML final (JSX pré-compilé via Node). Conservé comme fallback au cas où la pré-compilation échoue |\n| `marked.min.js` | 35 Ko | actif | `explorer.html` (rendu markdown des rapports) |\n| `tailwind.min.css` | 2.8 Mo | obsolète | plus référencé (refactor sv-* avril 2026) — conservé pour compatibilité rétroactive, à supprimer dans une passe de nettoyage |\n| `tailwind.js` | 398 Ko | obsolète | idem |\n\nLes URLs sont définies dans les templates `head` en DB (`html_templates` type=head).\n\n### Pré-compilation JSX\n\nDepuis avril 2026, le JSX est **pré-compilé à la génération** via Node (`tools/lib/compile_jsx.js` qui utilise `@babel/core` + `@babel/preset-react`). Les blocs `<script type=\"text/babel\">` sont remplacés par `<script>` contenant du `React.createElement()` pur.\n\nInstallation des dépendances Node :\n```bash\nnpm install   # installe @babel/core et @babel/preset-react dans node_modules/\n```\n\nLe `node_modules/` est gitignoré. Si la pré-compilation échoue (Node absent, dépendances manquantes), le bloc JSX est conservé tel quel et Babel in-browser peut prendre le relais — à condition que le vendor Babel soit présent dans le HTML, ce qui n'est **plus** le cas par défaut.\n\n### gen_archive.py\n\nGénère un ZIP 100% autonome :\n\n```bash\npython3 tools/docs/gen_archive.py --db sol_vivant.db              # archive seule\npython3 tools/docs/gen_archive.py --db sol_vivant.db --regenerate  # regénère + archive\n```\n\nSortie : `Publications/sol-vivant-web.zip` (~16 Mo avec images)\n\nUsage : `unzip sol-vivant-web.zip -d sol-vivant && open sol-vivant/index.html`\n\n### Fonctionnement hors-ligne\n\nLes pages fonctionnent dans tous les contextes :\n- **GitHub Pages** : chemins relatifs `vendor/...` résolus par le serveur\n- **file://** : ouverture directe dans le navigateur\n- **Archive ZIP** : décompresser et ouvrir index.html\n- **Serveur local** : `python -m http.server` dans le dossier web/\n", "type": "reference", "crit": false}, {"id": 75, "titre": "Templates React/Babel — encoding et pièges", "contenu": "Les pages web (calculateur MO, triangle textures, cartographie) utilisent **Babel standalone** pour transpiler le JSX.\n\n**Pièges connus :**\n- `\\u{1F331}` (ES6 unicode avec accolades) → **CRASH Babel**. Utiliser le caractère UTF-8 direct : 🌱\n- `\\u25BE`, `\\u2014` etc. → préférer les caractères directs (▾, —) dans le JSX\n- Doublons de composants : si on injecte 2 fois dans `html_templates`, les 2 coexistent → erreur silencieuse\n- `className` avec Tailwind : les classes comme `space-y-1.5` marchent avec le CDN, pas besoin de purge\n\n**Vérification après modification html_templates :**\n```python\njs = con.execute(\"SELECT contenu FROM html_templates WHERE id=7\").fetchone()[0]\nassert js.count('function MonComposant') == 1, \"Doublon de composant !\"\nassert '\\\\u{' not in js, \"ES6 unicode escape interdit !\"\n```\n\n**Historique** : composant EncartIncorporation en doublon + unicode crash (session 03/04).\n\n### Pièges CSS : escapes unicode dans content: (ajout session 2026-04-12)\n\n**Règle : JAMAIS d'escapes CSS unicode dans `content:` des `::before`/`::after`.**\n\nExemples de bugs rencontrés :\n- `content: '\\2713 '` → affiché `¹3` (le navigateur lit `\\271` + `3`)\n- `content: '\\2022 '` → affiché `²` ou `•2`\n- `content: '\\203A'` → affiché `A` (le navigateur lit `\\203` + `A`)\n\n**Fix : toujours utiliser le caractère UTF-8 direct :**\n```css\n/* ❌ INTERDIT */\ncontent: '\\2713 ';\ncontent: '\\203A';\n\n/* ✓ CORRECT */\ncontent: '✓ ';\ncontent: '▸';\ncontent: '• ';\n```\n\n**Pourquoi :** les escapes CSS `\\XXXX` nécessitent un espace terminal pour délimiter le code. Si le code fait 4 chiffres et que l'espace est oublié ou que le caractère suivant est un chiffre/lettre hex, le navigateur lit un code plus long que prévu. UTF-8 direct élimine ce risque.\n\n**Vérification :** `grep -n \"content.*'\\\\\\\\\" tools/lib/web_template.py` → doit retourner 0 résultats.\n\n### Emojis dans les templates React (complément session 2026-04-12)\n\n**Règle : toujours le caractère UTF-8 direct, jamais d'escape.**\n- ❌ `icon=\"\\ud83d\\udd2c\"` → affiché en texte brut `\\ud83d\\udd2c`\n- ✓ `icon=\"🔬\"` → affiché correctement\n\n**Bibliothèque d'icônes :** `config.web.icon_library` — source de vérité pour la cohérence visuelle.\n- Navigation/onglets : emojis autorisés (repères fixes)\n- Accordéons SvCollapse : UN seul emoji (`🔬`) pour tous\n- Règle JMJ : « beaucoup de créativité tue la créativité »\n\n### Checklist avant modification html_templates (mise à jour)\n\n```python\njs = con.execute(\"SELECT contenu FROM html_templates WHERE id=?\", (tid,)).fetchone()[0]\n\n# 1. Pas de doublon de composant\nimport re\nfuncs = re.findall(r'function\\s+(\\w+)\\s*\\(', js)\nfrom collections import Counter\ndupes = {k:v for k,v in Counter(funcs).items() if v > 1}\nassert not dupes, f\"Doublon: {dupes}\"\n\n# 2. Pas d'unicode escape JS\nassert '\\\\u{' not in js, \"ES6 unicode escape interdit\"\nassert '\\\\ud8' not in js, \"Surrogate pair interdit\"\n\n# 3. Pas d'emoji corrompu\nassert '\\\\ud83d' not in js, \"Emoji en escape au lieu de UTF-8 direct\"\n\n# 4. Test pre-compilation Babel\nimport subprocess\nwith open('/tmp/test.jsx', 'w') as f: f.write(js)\nresult = subprocess.run(['node', '-e', '''\n  const babel = require(\"@babel/core\");\n  const fs = require(\"fs\");\n  try { babel.transformSync(fs.readFileSync(\"/tmp/test.jsx\",\"utf8\"), {presets:[\"@babel/preset-react\"]}); console.log(\"OK\"); }\n  catch(e) { console.log(\"FAIL: \" + e.message.substring(0,200)); process.exit(1); }\n'''], capture_output=True, text=True)\nassert result.returncode == 0, f\"Babel: {result.stdout}\"\n```\n", "type": "conseil", "crit": false}, {"id": 93, "titre": "Régénération pipeline — regen_all.py + gen_*.py", "contenu": "## Régénération complète depuis la DB\n\nPrincipe : **la DB est la source de vérité unique**. Après toute modification de données, régénérer les outputs.\n\n### Commande unique\n\n```bash\npython3 tools/regen_all.py --db sol_vivant.db\n```\n\nRégénère séquentiellement les 6 générateurs (gen_web, gen_mo_calc, gen_triangle_textures, gen_lifofer, gen_readme, gen_workflows).\n\n### Régénération sélective\n\n```bash\npython3 tools/regen_all.py --only gen_lifofer.py\n```\n\n### Quand l'utiliser\n\n- Après modification d'une table (terms, refs, lifofer_*, etc.)\n- Après modification de config\n- Après modification d'un template html_templates\n\n### Ne jamais faire\n\n- Ne JAMAIS éditer directement les HTML/README générés (écrasés)\n- Ne JAMAIS hardcoder des valeurs dans les générateurs\n\n### (fusionné depuis #80 : Pipeline de génération : script → tables DB → fichier)\n\nChaque fichier dans `Publications/` est généré par un script qui lit des tables DB.\n\n| Script | Tables sources | Fichier généré |\n|---|---|---|\n| `gen_mo_calc.py` | refs (kind=matiere, cn_regle), ref_cn_incorporation, ref_melanges_predefinies, ref_kirkby, html_templates | `Publications/web/mo_calculateur.html` |\n| `gen_triangle_textures.py` | refs (kind=texture), html_templates | `Publications/web/triangle_textures.html` |\n| `gen_web.py` | documents, prompts, terms, chains_causales, concept_cards, html_templates (id=8,9,11) | `Publications/web/index.html` |\n| `gen_web.py` | documents, prompts, terms, chains_causales, concept_cards | `Publications/cartographie/solvivant_docs.html` |\n| `export_jenni_doc.py` | prompts, terms, jenni_doc_specs, doc_cross_refs | `Publications/prompts/prompts_jenni_*.txt` |\n| `export_fiche.py` | fiches | `recherches/prompts_fiche_*.txt` |\n| `gen_readme.py` | scripts, domaines_techniques, domaine_bq, bq_entries | `tools/*/README.md` |\n| `gen_workflows.py` | scripts, config | `Publications/workflows/*.md` |\n\n**Pour modifier un fichier généré** : modifier la table source → regénérer avec le script.", "type": "workflow", "crit": true}, {"id": 135, "titre": "Mode sombre + Zoom typo + Toolbar utilisateur", "contenu": "## Mode sombre + Zoom typo + Toolbar utilisateur\n\nToutes les pages web Sol Vivant intègrent une **toolbar flottante** (`.sv-toolbar` en haut à droite) avec :\n\n| Bouton | Effet | Persistance |\n|--------|-------|-------------|\n| `A−` | Réduit le texte (×0.85) | `localStorage('sv-font-scale')` |\n| `A`  | Texte normal (×1) | idem |\n| `A+` | Agrandit le texte (×1.15) | idem |\n| `☾/☀` | Bascule clair/sombre | `localStorage('sv-theme')` |\n\n### Mécanisme — Mode sombre\n\n- Variables CSS définies dans `:root` (light) et `:root[data-theme=\"dark\"]` (dark) + `@media (prefers-color-scheme: dark) :root:not([data-theme=\"light\"])` pour le défaut système\n- Toggle JS : `data-theme=\"dark\"|\"light\"` sur `<html>`\n- Init : restaure `localStorage('sv-theme')` si présent, sinon suit le système\n- Variables : `--bg`, `--card-bg`, `--text`, `--border`, `--shadow`, `--paper-bg/2/border`, `--success/-light`, `--warning/-light`, `--danger/-light`, `--info/-light`, `--accent*`, `--header-from/to`, `--zone-*`\n\n### Mécanisme — Zoom typo\n\n- Une variable `--font-scale` (défaut `1`) sur `:root`\n- Toutes les `--font-*` sont en `calc(<rem> * var(--font-scale))`\n- Le bouton modifie `--font-scale` via `document.documentElement.style.setProperty(...)` → tout le DOM suit\n- 4 niveaux : 0.85, 1.0, 1.15, 1.3 (le bouton 3-niveaux UI expose 0.85/1.0/1.15)\n\n### Implications pour les page_css et page_js\n\n1. **Aucun `font-size: <rem>` hardcodé** → utiliser `var(--font-*)`. Idem pour `style={{fontSize:'…'}}` en JSX.\n2. **Couleurs sémantiques** via `var(--color-*-text)` quand on a un fond `--*-light` (callouts, alertes, encarts).\n3. **Fonds blancs hardcodés `#fff/#f8fafc/#fdfbf7`** interdits → utiliser `var(--card-bg)`, `var(--color-bg-subtle)`, `var(--paper-bg)`.\n4. **Couleurs texte foncées** `#1e293b/#000` interdites → utiliser `var(--text)`.\n\n### Composants React unifiés (avril 2026)\n\n| Composant | Props | Usage |\n|-----------|-------|-------|\n| `SvCallout` | variant, title, icon, children | Encart sémantique (warning/success/danger/info). Remplace les `<div className=\"sv-callout sv-callout-warning\">` JSX bruts. |\n| `SvAlert` | variant, title, children | Alerte compacte (variantes idem) |\n| `SvImageCard` | src, alt, caption, maxHeight, maxWidth | Image illustrative + légende, styles standardisés (résout bug \"double style\") |\n| `SvProcedureSteps` | title, steps, materiel, duree | Procédure pas-à-pas numérotée (compteur visuel pastille). Réutilisable test bocal/recettes/mode opératoire. |\n| `SvTestCard` | test={code,title,description,dimension_label,procedure,materiel,duree,interpretation,image_url,source} | Carte standardisée pour un `terrain_test`. Prête pour la future page `tests_terrain` autonome. |\n| `SvSubTabs` | tabs, active, onChange | Sous-onglets niveau 2 (pills compactes). À utiliser quand un onglet `SvTabs` contient lui-même plusieurs vues. |\n| `SvTabIntro` | resume, detail | Intro accordéon sous les onglets. Profite de la nav captive pour ne pas être direct·e dès l'arrivée sur un onglet. |\n\n### Convention SvTabIntro\n\nChaque page multi-onglets doit lire ses intros depuis `config.<page>.tab_intros` (JSON) :\n```json\n{\"pratique\": {\"resume\": \"...\", \"detail\": \"...\"}, \"comprendre\": {\"resume\": \"...\", \"detail\": \"...\"}}\n```\nLe `resume` est affiché en ligne sous les tabs ; le `detail` se déplie via \"▸ en savoir plus\".\n", "type": "reference", "crit": true}, {"id": 110, "titre": "Bibliothèque d'icônes unifiée — règles visuelles", "contenu": "## Bibliothèque d'icônes unifiée Sol Vivant\n\nSource de vérité : `config.web.icon_library`\n\n### Règles\n\n1. **Navigation et onglets** : emojis autorisés (repères fixes, rares)\n2. **Accordéons SvCollapse** : UN seul emoji (🔬) pour toutes les pages\n3. **Listes à puces** : chevron ▸ (sv-bullet-list) ou bullet • (signaux), JAMAIS d'emoji\n4. **Cohérence** : le même emoji = le même concept, partout\n5. **Sobriété** : « beaucoup de créativité tue la créativité » (JMJ)\n\n### Catégories\n\n| Catégorie | Usage |\n|-----------|-------|\n| `navigation` | Barre nav inter-pages (🗺️ 🔺 🧪 🌿 🔍) |\n| `onglets` | Tabs internes (📚 🧪 🔬 📊) |\n| `thematiques` | Concepts du corpus (💧 🌱 🧱 ⚡ 🍄) |\n| `strates` | F=📜 S=🧱 V=🌱 P=🧪 H=🔬 |\n| `accordeons` | Pas d'emoji. Chevron ▸/▾ uniquement |\n\n### Accès depuis Python\n\n```python\nfrom config import get_json\nicons = get_json(conn, 'web', 'icon_library')\nicon_nav = icons['navigation']['calculateur']  # 🧪\n```\n\n### Accès depuis React/JSX\n\n```jsx\n// Les icônes sont injectées dans DATA par le gen_*.py\n// Ou utilisées directement en UTF-8 dans le template\n<SvCollapse title=\"Ma section\" icon=\"🔬\">\n```\n\n### Interdit\n\n- Escapes unicode (`\\ud83d\\udd2c`) → toujours le caractère direct\n- Emojis variés dans les SvCollapse (un seul pour tous)\n- Couleurs de fond sur les titres de sections (gradient, etc.)\n", "type": "reference", "crit": true}, {"id": 118, "titre": "Dashboard — outils de pilotage inter-sessions", "contenu": "## Pages de pilotage\n\n### Dashboard\n\n```bash\npython3 tools/docs/gen_dashboard.py --db sol_vivant.db\n# Output : Publications/web/dashboard.html\n```\n\nKPIs projet, dettes en cours, avancement par doc/strate, audit_log et\ngit log récents, checks intégrité, doctrine BQ.\n", "type": "commande", "crit": false}, {"id": 141, "titre": "Pattern Comprendre unifié — SvComprendre", "contenu": "## Pattern Comprendre unifié — SvComprendre + config.<page>.comprendre\n\nRefonte avril 2026 : les onglets « Comprendre » des calculateurs (MO, LiFoFer, Triangle)\nsont désormais pilotés par DB via le composant `SvComprendre`, éliminant tout\ntexte éditorial en dur dans les templates JS.\n\n### Principe\n\nChaque page calculateur a une entrée `config.<page_slug>.comprendre` (JSON) :\n\n```json\n{\n  \"cahier_link\": { \"chapitre\": \"mo\", \"titre\": \"...\" },\n  \"sections\": [\n    { \"type\": \"fiche\",    \"fiche_id\": 11, \"titre\": \"...\", \"defaultOpen\": true },\n    { \"type\": \"fiche\",    \"fiche_id\": 4,  \"titre\": \"...\" },\n    { \"type\": \"cards\",    \"ids\": [98, 45, 54], \"titre\": \"Cartes conceptuelles\" },\n    { \"type\": \"terms\",    \"ids\": [38, 61, 71], \"titre\": \"Glossaire\" },\n    { \"type\": \"cahier\",   \"chapitre\": \"textures\", \"section\": \"importance\", \"titre\": \"...\" },\n    { \"type\": \"richtext\", \"titre\": \"Sources\", \"contenu\": \"...\" }\n  ]\n}\n```\n\n### Hydratation\n\n`tools/lib/web_template.py::build_comprendre_data(conn, page_slug)` enrichit\nchaque section avec les données DB :\n\n| type | source | données injectées |\n|------|--------|-------------------|\n| `fiche` | `fiche_contenus` | `contenu` (tag Jenni `[...]` strippé) + `refs` normalisées |\n| `cards` | `concept_cards` + `concept_dimensions` | `{id, title, description, dime
