\n```\n\n**Conventions de nommage :**\n- Pages web : noms fixes (index.html, mo_calculateur.html, triangle_textures.html) — trackées par git, versionnées\n- Images OG : dans Publications/img/ (miroir du dépôt GitHub Pages)\n- URL OG : `https://sol-vivant.github.io/Publications/img/<nom>.png`\n- Favicon : `href=\"../img/<nom>.png\"` (chemin relatif depuis web/)\n- Scripts : `--db` optionnel (défaut `sol_vivant.db` à la racine)\n- Pas d'horodatage sur les HTML web (une seule version, git fait le versioning)", "type": "reference", "crit": true}, {"id": 76, "titre": "Workflow : design avant code, commits fréquents", "contenu": "**Anti-pattern observé** : coder immédiatement → corrections multiples → doublons → bugs d'encoding.\n\n**Séquence recommandée :**\n1. **Comprendre** : lire le code existant, les données en DB, les patterns\n2. **Concevoir** : décider où mettre les données (nouvelle table ? colonne ? config ?), écrire le composant sur papier\n3. **Implémenter** : DB d'abord, puis script, puis template\n4. **Tester** : regénérer, vérifier le HTML, tester dans le navigateur\n5. **Commit** : un commit par étape logique, pas un gros commit final\n\n**Commits de checkpoint** : commiter tous les 2-3 items pour éviter les pertes.\nUn fichier cassé par un Edit partiel se restaure avec `git checkout -- fichier` — mais seulement si le commit précédent est propre.\n\n**Historique** : fichier cassé restauré par git checkout (session 01/04), 3 commits correctifs successifs sur l'encart MO (session 03/04).", "type": "conseil", "crit": false}, {"id": 96, "titre": "Explorer DB — interface web locale", "contenu": "## Explorer la DB localement\n\n```bash\npython3 tools/admin/explorer.py [--db sol_vivant.db] [--port 8765]\n```\n\nOuvre une interface web sur http://localhost:8765 pour naviguer :\n- Toutes les tables et vues (groupées par domaine)\n- Recherche dans les colonnes\n- Pagination\n- Panneau de détail pour les textes longs\n- BQ modules avec contenu Markdown\n- Sessions de maintenance\n\n**Ne modifie rien** — consultation seule.", "type": "workflow", "crit": false}, {"id": 129, "titre": "Intégration source — rapport JMJ → biblio interne", "contenu": "## Workflow intégration de source — opération consciente\n\n### Principe\n\nJMJ fournit un **rapport de source** (métadonnées d'un article scientifique, souvent copié-collé depuis un PDF reader, Semantic Scholar, PubMed, un groupe de veille…). Claude intègre cette source **une à la fois**, avec le même soin que l'intégration d'une fiche. Cette opération enrichit la biblio interne (`jenni_sources`) et **peut renforcer le thésaurus** si des termes canoniques manquent.\n\n**Règle d'or** : jamais de batch-insert. Chaque source est une pièce du corpus, elle mérite une lecture attentive.\n\n### Entrée — ce que JMJ donne\n\nUn bloc brut comme :\n\n```\nTitre de l'article\nType de document : Article de revue\nAuteur : A. Untel / B. Untel ...\nRésumé : [abstract complet]\nDate : YYYY/MM/DD\nDOI : 10.XXXX/...\nURL : https://...\nPublication : Nom du journal\nVolume, Pages, Numéro, ISSN\n```\n\nFormat variable (export RIS, Semantic Scholar copy, PubMed metadata, groupe email…). Claude **normalise mentalement** avant d'écrire.\n\n### Séquence (Claude pilote, JMJ valide)\n\n**1. Lecture consciente**\n- Lire le titre + résumé intégralement\n- Identifier le **thème principal** (ex : bone char contamination arsenic / riziculture)\n- Identifier les **concepts clés** candidats à enrichir le thésaurus (ex : `bone char`, `arsenic speciation`, `arsenic methylation`, `arsC/arsM genes`)\n- Identifier les **documents / fiches / cards** du corpus potentiellement concernés\n\n**2. Dedup**\n```python\ncur.execute(\"SELECT id, doi, titre_complet FROM jenni_sources WHERE doi = ? OR titre_complet LIKE ?\",\n            (doi, f'%{titre_court}%'))\n```\n- Si déjà présent → proposer un UPDATE (enrichissement) plutôt qu'un nouvel INSERT\n- Si nouveau → continuer\n\n**3. Insertion `jenni_sources`** (champs critiques)\n- `doi` (normalisé sans préfixe)\n- `auteurs` (format : `Nom1 P, Nom2 Q, Nom3 R, et al.`)\n- `annee` (INTEGER)\n- `titre_complet` (exact, pas tronqué)\n- `titre_court` (extrait-clé en 4-8 mots, lisible)\n- `journal`\n- `resume_court` (150-300 mots, reformulation synthétique — pas l'abstract brut)\n- `pertinence` (ex : `S2 microbiome + P2 conservation` ou `H3 AMR`)\n- `tags` (JSON list : mots-clés thématiques du corpus)\n- `url` (lien DOI ou URL article)\n\n**4. Liens `source_usages`** (si pertinent)\nSi la source cite/justifie directement un contenu du corpus, ajouter un lien :\n```python\nINSERT INTO source_usages (source_id, entity_type, entity_id, contexte, citation_brute)\nVALUES (?, 'fiche', ?, 'Section Contexte scientifique', '(Hao et al., 2026)')\n```\n`entity_type` ∈ `{doc, fiche, term, card, prompt}`.\n\n**5. Renforcement thésaurus** (si termes nouveaux)\nSi l'article introduit des termes canoniques absents du thésaurus :\n- Vérifier `SELECT id FROM terms WHERE fr=? OR en=?`\n- Si absent : **proposer** à JMJ un ajout (titre, def depuis résumé, syn_fr/en, bt, rt)\n- JMJ valide → insert dans `terms` avec `doc_code='S'` ou autre\n- **Ne jamais** inventer des définitions sans base article\n\n**6. Audit log**\n```python\nINSERT INTO audit_log (operation, table_name, record_ref, detail)\nVALUES ('INSERT', 'jenni_sources', f'source #{src_id}',\n        f'{auteurs_court} {annee} {journal} — {theme_en_une_ligne} ({doc_codes_cibles})')\n```\n\n### Exemple d'intégration (modèle)\n\n**Entrée** (rapport JMJ) :\n```\nMicro-nanoscale bone char modulates rhizosphere As-cycling genes…\nAuteur : Yi Hao, Weitao Wu, … Chuanxin Ma\nDOI : 10.1007/s44246-026-00258-4\nPublication : Carbon Research\n```\n\n**Traitement Claude** :\n- Thème : bone char amendement / arsenic speciation / rice paddy\n- Corpus concerné : `S1 architecture sol` (amendement), `S2 microbiome` (arsC/arsM genes), `P1 diagnostic` (contamination), `P2 conservation`\n- Nouveaux termes potentiels (à valider) : `bone char`, `arsenic speciation`, `arsenic methylation gene (arsM)`\n- Source déjà en DB ? → SELECT par DOI → non\n- `resume_court` synthétise : « MNBC 25 g/kg sur sol contaminé 75 mg/kg As : urease +94-166%, catalase +35-519%, carbone organique +9-30%, arsC/arsR −6-52%, arsM +11-20%. Amélioration de la santé du sol sans changer l'accumulation As dans le riz. »\n- `pertinence` : `S1/S2/P1 amendement bone char contamination arsenic`\n- `tags` : `[\"bone char\", \"arsenic\", \"paddy soil\", \"arsC arsM\", \"soil remediation\"]`\n\n**Sortie** (Claude rend compte à JMJ) :\n- Source #XXXX insérée\n- 0 ou N termes candidats identifiés (liste)\n- 0 ou N liens source_usages créés\n\n### Ce qui n'est **pas** ce workflow\n\n- Import batch biblio → archivé (modules retirés)\n- Enrichissement auto depuis PubMed/E-utilities → utile comme outil annexe (cf. `wf_veille`), mais la décision d'intégration reste manuelle\n- Ajouter des refs dans `fiche_contenus.refs` → ça c'est le job de Jenni à la rédaction, pas de Claude à la veille\n\n### Scripts (à construire au besoin)\n\nIl n'existe pas encore de script dédié. Aujourd'hui c'est interactif dans la session :\n\n```sql\n-- Template d'insertion (à adapter à chaque source)\nINSERT INTO jenni_sources (doi, auteurs, annee, titre_complet, titre_court,\n                           journal, resume_court, pertinence, tags, url, created_at)\nVALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, datetime('now'));\n```\n\nUn futur `tools/veille/integrate_source.py` pourrait automatiser le dedup + template, mais la **lecture consciente** reste en session.\n\n### BQ liées\n\n- `wf_veille` (à venir) : scan PubMed hebdo qui produit des candidats\n- `wf_fiche` : intégration de fiches (même logique consciente à plus grande échelle)\n- #106 concept_cards : filtre de rigueur — une source introduit souvent une hypothèse qui doit passer par une card avant d'entrer dans le corpus\n\n\n### Fiabilité des sources : règle « livre/rapport vs Jenni »\n\n**Source primaire validée (livre, rapport institutionnel, publication académique à DOI)** — les valeurs chiffrées sont **fiables par construction** :\n- Smil 2017, Fuller 1938, Jancovici 2015, Nikiforuk 2012 (livres)\n- The Shift Project PREF 2024, Carbone 4 (rapports institutionnels)\n- Arvalis Triple Performance, IPCC, ministère (guides/rapports officiels)\n- JMJ synthèses (docs travail propres, JMJ pilote)\n\n→ **Entrée en `ref_*` directe** sans double-vérification cognitive. Ancrage sur la page/ref de la source. La révision concerne la pertinence (est-ce dans notre scope ?) pas la véracité numérique.\n\n**Sortie Jenni** — les valeurs chiffrées sont **à vérifier systématiquement** :\n- Jenni peut halluciner des nombres plausibles mais faux\n- Jenni peut agglomérer deux valeurs de sources différentes\n- Jenni ne sait pas nuancer les unités (kWh utile vs thermique)\n\n→ **Lecture ligne-à-ligne** avant intégration, rejet de toute valeur non ancrée à une source primaire consultable, préférence à réécrire ou demander régénération plutôt qu'accepter avec doute.\n\n**Workflow pour sources livres PDF (`jmj/pdf/`)** :\n1. Read PDF via outil Read (fonction PDF native, `pages` pour PDF > 10 pages)\n2. Extraction ciblée des tableaux / valeurs chiffrées (pas copier tout le texte)\n3. INSERT dans `ref_*` avec `source_id` → entrée jenni_sources\n4. INSERT jenni_sources (type='livre' / 'rapport' / 'organisation') si pas déjà présent\n5. Pas de régression cognitive : la valeur en DB devient autoritaire pour la session\n\n### Flag « haute valeur » pour récupération PDF\n\nJMJ maintient un accès au texte intégral via son outil de collecte externe\n(biblio interne + bibliothèques institutionnelles). L'abstract RIS est suffisant\npour une intégration standard, mais certains articles justifient d'aller\nplus loin.\n\n**Flag explicitement « haute valeur — demander PDF »** quand :\n- Apport chiffré unique ou méthodologie inédite dans le corpus\n- Source primaire sur un concept pivot (souvent jamais cité ailleurs)\n- Données quantitatives qui dimensionneraient un calculateur (Kirkby, MO,\n  esclaves, triangle textures, transition robuste)\n- Revue de synthèse couvrant une zone aveugle du corpus\n- Article fondateur qu'on cite partout sans avoir lu\n\n**Ne pas flag** (intégration abstract suffit) quand :\n- Sujet déjà structurellement couvert (fiches + cards existantes)\n- Apport incrémental chiffré mais non-structurant\n- Donnée pays-spécifique qui ne généralise pas\n\nSi le PDF n'est pas disponible mais que la source mérite d'être gardée :\n- INSERT jenni_sources normal\n- `notes` : `'PDF indisponible 2026-AA-JJ — intégration abstract seul'`\n- Pas de concept_card détaillée, juste liens usages basiques", "type": "workflow", "crit": true}, {"id": 126, "titre": "Trios parallèles *_sections / *_contenus (redondance structurelle connue)", "contenu": "## Trios parallèles `*_sections` / `*_contenus` (DB pattern connu)\n\n**Constat de maintenance 2026-04-14** : 6 tables dupliquent le schéma\nentre 3 types de production (fiches / docs de strate / validations).\n\n### Trio 1 — Sections éditoriales\n\n```\nfiche_sections       (143 rows, 4 scripts) — fiches\nprompts              (191 rows, 24 scripts) — docs de strate (schéma enrichi)\nvalidation_sections  (81 rows, 1 script)   — validations\n```\n\nColonnes communes : `type`, `ordre`, `titre`, `contexte_sci`, `instructions`,\n`enrichissement`, `tableau`. `prompts` ajoute `titre_h1/h2/h3`, `doc_code`,\n`chapitre`, `section`, `style`, `statut`.\n\n### Trio 2 — Retours Jenni (contenus)\n\n```\nfiche_contenus        (28 rows, 3 scripts)  — retours Jenni fiches\nprompt_contenus       (12 rows, 2 scripts)  — retours docs\nvalidation_contenus   (16 rows, 0 script)   — ORPHELINE\n```\n\nQuasi identiques : `version`, `contenu_brut`, `contenu_integre`, `refs`,\n`notes_claude`, `date_import`. `prompt_contenus` avait un champ `contenu`\natypique — désormais `contenu_brut` rempli en parallèle (migration 2026-04-14).\n\n### Vues unifiées (historique, retirées 2026-04-20)\n\nDeux vues SQL avaient été créées le 2026-04-14 pour unifier l'accès aux 3 trios :\n`v_content_sections` (UNION ALL fiche_sections + prompts + validation_sections) et\n`v_content_retours` (UNION ALL fiche_contenus + prompt_contenus + validation_contenus).\n\nElles ont été **droppées le 2026-04-20** (cf. audit_log) :\n- aucun consommateur dans `tools/` ou `tests/`\n- `v_content_retours` exposait `contenu_integre` legacy (le contenu est maintenant dans `fiche_sections.contenu` par section, cf. BQ #130 §4.2)\n- `v_content_sections` ne connaissait pas les nouveaux champs (`contenu`, `analyse_claude`)\n\nSi un besoin de lecture transversale réapparaît, les vues sont à recréer avec les colonnes post-refonte (incluant `contenu` et `analyse_claude` pour `fiche_sections`).\n\n\n### Décision physique : pas de migration\n\n**Factorisation physique non appliquée** : risque de casser 24 scripts qui\nassument la structure actuelle, pour un gain modeste (~500 Ko, 6→2 tables).\nLes vues couvrent le besoin de lecture transversale sans toucher au stockage.\n\n**Actions complémentaires possibles** :\n- Archiver `validation_contenus` (0 script, table morte) — cf. BQ #127\n- Documenter le pattern pour les futures sessions (cette entrée)\n\n### À envisager après maturation complète\n\nUne fois le corpus stabilisé (fiches matures, docs de strate peuplés,\nplus de cycle d'écriture intensif), une migration vers l'architecture\nphysique unifiée serait plus sûre.\n\n### Autres redondances mineures (non critiques)\n\n- `doc_code` / `docs_codes` / `docs_cibles` : 3 formats pour désigner\n  des documents (string / string multi-slash / JSON array)\n- `categorie` / `tags` : conventions variables selon domaine\n- `notes_claude` vs `notes` : 2 conventions d'annotation\n\n\n### Principe architectural — préparation à l'import, rendu trivial (avril 2026)\n\nLes 3 trios (fiche / doc / validation) partagent une règle :\n\n> **Le nettoyage du texte se fait une fois à l'intégration**, dans `<entity>_sections.contenu` (TEXT, nouveau champ). Le rendu HTML devient du `fetch → afficher`.\n\nCorollaires :\n\n- Un seul parser docx partagé (`tools/lib/parse_jenni_docx.py`) alimente les 3 trios — gère OMML, LaTeX, refs FR→EN, tags Jenni résiduels, découpage par section selon le plan DB.\n- Un seul composant de rendu React (`SvRichContent`) consomme les 3 trios — lit le plan DB + affiche sections et refs. Plus de parser côté JS.\n- Si le format Jenni change → un seul point de maintenance (le parser d'import).\n- Les champs `<entity>_contenus.contenu_integre` (blob markdown) deviennent **legacy** : conservés pour l'historique des intégrations antérieures, plus écrits par les nouveaux imports.\n\nCette règle remplace la doctrine précédente qui acceptait du markdown brut en DB et laissait `SvRichText` faire un parsing tolérant côté client.\n\n### ⚠ Etat actuel (avril 2026)\n\n`validation_sections` et `validation_contenus` existent en DB avec des donnees historiques (81 et 16 rows respectivement) mais **aucun script actif ne les alimente**. La logique des validations est en pause (cf. BQ #127). Les BQ qui decrivent leur workflow sont conservees comme reference, mais les scripts `export_validation.py` / `import_validation.py` ne sont pas operationnels aujourd'hui.\n", "type": "reference", "crit": false}, {"id": 127, "titre": "`validation_contenus` en sommeil (0 script actif)", "contenu": "## `validation_contenus` — table en sommeil\n\n**Constat maintenance 2026-04-14** : table présente (16 rows, schéma\ncohérent avec `fiche_contenus`) mais **aucun script ne la lit**.\n\n### État\n- Rows : 16\n- Données depuis : 2026-04-10 (15 jours avant constat)\n- FK : `validation_id` → `validations(id)` ON DELETE CASCADE\n- Scripts qui la référencent : 0\n\n### Usage prévu (historique)\n\nStockage des retours Jenni pour les documents de validation (table\n`validations`, workflow parallèle à fiches et docs de strate). L'extension\ndu workflow vers les validations n'a pas été développée — la table\nattend son usage.\n\n### Décision de maintenance\n\n**Conserver** : les 16 rows contiennent des données (non-vides),\nprobablement des brouillons de validations. Ne pas supprimer tant que le\nworkflow validation n'est pas clarifié.\n\n**À décider** ultérieurement :\n- Développer le workflow validation (lecture + intégration)\n- OU archiver définitivement si validation_sections non plus exploitée\n", "type": "reference", "crit": false}, {"id": 134, "titre": "Structure jmj/ et config.paths — rapports et audits centralises", "contenu": "## Structure jmj/ et config.paths\n\n### Vue d'ensemble\n\nTous les **rapports** et **audits** sont centralises dans `jmj/`. Les paths\nsont en base (`config.paths.*`) et les scripts les lisent via\n`lib.config.get_path()`. Pas de path hardcode.\n\n```\njmj/\n├── rapports/            ← rapports centralises\n│   ├── session/         ← cloture session Claude Code (date YYYY-MM-DD.md)\n│   └── audit/           ← rapports audit (fiches, thesaurus, BQ, sources)\n├── analyses/            ← sortie gen_reports.py depuis audit_reports\n│   └── reports/\n├── archives/            ← docx sources archives\n├── docx/                ← docx sources JMJ (drafts, propositions Jenni)\n├── journaux/            ← journaux de seances\n├── pdf/                 ← biblio PDF externe (Shift, Triple Perf, etc.)\n├── revues/              ← revues JMJ\n├── session/             ← contexte session\n├── transcriptions/      ← transcriptions audio\n└── notes*.txt           ← notes volantes a la racine\n```\n\n### Table config — categorie `paths`\n\nPaths disponibles via `lib.config.get_path(conn, 'CLE')` :\n\n| Cle | Valeur | Usage |\n|---|---|---|\n| `rapports_session` | `jmj/rapports/session` | Sortie rapport fin de session |\n| `rapports_audit` | `jmj/rapports/audit` | Sorties audits (scripts audit_*.py) |\n| `analyses_reports` | `jmj/analyses/reports` | Sortie gen_reports.py |\n| `recherches_fiches` | `recherches/fiches` | Docx Jenni fiches (cycle) |\n| `recherches_thesaurus` | `recherches/thesaurus` | Exports thesaurus + audits semantiques |\n| `recherches_sources` | `recherches/sources` | Exports sources |\n| `recherches_veille` | `recherches/veille` | Veille hebdo (PubMed) |\n| `recherches_archives` | `recherches/archives` | Archives fiches/thesaurus |\n| `jmj_docx` | `jmj/docx` | Docx sources JMJ |\n| `jmj_archives` | `jmj/archives` | Archives docx sources |\n| `jmj_pdf` | `jmj/pdf` | PDF biblio externe JMJ |\n| `jmj_notes` | `jmj` | Racine pour notes*.txt |\n| `publications_web` | `Publications/web` | Pages HTML publiees |\n| `publications_workflows` | `Publications/workflows` | Workflows horodates |\n| `docx_en_cours` | `docx` | Docx en cours (envoyes Jenni) |\n| `docx_archives` | `docx/archives` | Docx retournes + integres |\n\n### Regles\n\n1. **Pas de path hardcode** dans les scripts. Utiliser `get_path()`.\n2. **Defaults** : chaque `get_path()` doit avoir un fallback au cas ou la\n   config serait absente (ex: `get_path(conn, 'rapports_audit', 'jmj/rapports/audit')`).\n3. **Creation automatique** : `get_path(..., ensure_exists=True)` cree le\n   dossier si besoin. A utiliser pour les sorties qui peuvent tomber sur\n   un path non encore cree.\n4. **Distinguer rapports vs recherches** :\n   - `rapports/` = artefacts peripheriques, memoire de sessions, non\n     consommes par les scripts (lecture humaine JMJ)\n   - `recherches/` = cycle Jenni actif, consommes/produits par les scripts\n     d'import/export fiches, thesaurus, etc.\n5. **Distinguer jmj/ vs racine** : `jmj/` = JMJ personnel + memoire ;\n   racine (`docx/`, `recherches/`, `Publications/`) = cycle de production\n   actif partage avec Jenni / publications.\n\n### Lien avec les autres BQ\n\n- **#125 structure_recherches** : structure `recherches/` detaillee (cycle\n  Jenni). Ce BQ-ci complete avec la structure `jmj/` centrale.\n- **#128 wf_session** : la cloture de session ecrit dans\n  `config paths.rapports_session`.\n- **#102 traitement_notes** : les notes volantes restent a la racine de\n  `jmj/` (path `jmj_notes`).\n\n### Migration 2026-04-18\n\n- `rapports_sessions/` (racine) → `jmj/rapports/session/`\n- `jmj/SESSION_*.md` → `jmj/rapports/session/`\n- `jmj/audit_fiches_*.md`, `jmj/revue_bq_*.md`, `jmj/plan_integration_*.md`\n  → `jmj/rapports/audit/`\n- `recherches/audits/*` (9 fichiers) → `jmj/rapports/audit/`\n\nLe dossier `recherches/audits/` a ete supprime ; les nouveaux audits\nvont dans `jmj/rapports/audit/`.", "type": "doctrine", "crit": true}, {"id": 143, "titre": "BQ — architecture domaines_techniques (refonte 2026-04-20)", "contenu": "## Architecture BQ — domaines techniques (refonte 2026-04-20)\n\nLa BQ est classée par **domaines techniques** (table `domaines_techniques`)\nvia une table de jointure N-N `domaine_bq` (rôle `primaire` ou `reference`).\nUne entrée BQ a **1 domaine primaire** (le pipeline où elle fait loi) et\n0-5 domaines de référence (où elle sert de doctrine transverse).\n\n### Schéma\n\n```sql\n-- Domaines\nCREATE TABLE domaines_techniques (\n  id INTEGER PRIMARY KEY AUTOINCREMENT,\n  slug TEXT UNIQUE NOT NULL,\n  nom TEXT NOT NULL,\n  description TEXT,\n  categorie TEXT CHECK(categorie IN ('pipeline','corpus','web','technique','specifique')),\n  ordre INTEGER DEFAULT 0,\n  is_active INTEGER DEFAULT 1\n);\n\n-- Jointure N-N\nCREATE TABLE domaine_bq (\n  domaine_id INTEGER REFERENCES domaines_techniques(id) ON DELETE CASCADE,\n  bq_entry_id INTEGER REFERENCES bq_entries(id) ON DELETE CASCADE,\n  role TEXT CHECK(role IN ('primaire','reference')),\n  notes TEXT,\n  ordre INTEGER DEFAULT 0,\n  PRIMARY KEY (domaine_id, bq_entry_id)\n);\n```\n\n### 4 catégories\n\n- **pipeline** : cycle prompt Jenni → .docx → intégration (thesaurus, fiches, docs, validations)\n- **corpus** : contenu en base, édition directe Claude, pas de cycle Jenni (concept-cards, chaines)\n- **web** : toutes les pages du site (web)\n- **technique** : infrastructure transverse (bq, session, integrite, analyse, archivage, jenni-workflow, sources-autoritaires)\n- **specifique** : chantier one-shot (vide au seed)\n\n### Consultation (bq_query.py v2.0)\n\n```bash\n# Inventaire des domaines groupés par catégorie\npython3 tools/admin/bq_query.py --list\n\n# Charger un domaine entier (primaires + references)\npython3 tools/admin/bq_query.py --domaine fiches\n\n# Primaires seulement\npython3 tools/admin/bq_query.py --domaine bq --primaire-only\n\n# Entrées critiques d'un domaine\npython3 tools/admin/bq_query.py --domaine web --critical-only\n```\n\n### Ajouter une entrée BQ\n\n```sql\nINSERT INTO bq_entries (titre, contenu_md, type, is_critique)\nVALUES ('...', '...', 'workflow', 1);\n\nINSERT INTO domaine_bq (domaine_id, bq_entry_id, role)\nVALUES ((SELECT id FROM domaines_techniques WHERE slug='fiches'), last_insert_rowid(), 'primaire');\n\n-- Optionnel : rattacher comme reference à d'autres domaines\nINSERT INTO domaine_bq (domaine_id, bq_entry_id, role, ordre)\nVALUES ((SELECT id FROM domaines_techniques WHERE slug='jenni-workflow'), last_insert_rowid(), 'reference', 1);\n```\n\n### Historique\n\n- **avant 2026-04-20** : `bq_modules` (9 modules : jenni, claude, web, sqlite…) +\n  `bq_entries.module_code` (1 entrée = 1 module). Limite : une entrée multi-pipeline\n  ne pouvait se rattacher qu'à un seul module, classification par « famille d'outil »\n  plutôt que par chantier.\n- **2026-04-20** : refonte vers `domaines_techniques` (14 slugs en 4 catégories) +\n  `domaine_bq` (N-N, role primaire|reference). 84 entrées BQ re-classées via\n  `map_bq_domaines.py` (pattern agent_runner, 9 agents Task parallèles).\n  Drop de `bq_modules` et `bq_entries.module_code`.\n\n### Scripts consommateurs\n\n- `tools/admin/bq_query.py` (API principale, `--domaine`)\n- `tools/admin/audit_opus.py` (audit par domaine primaire)\n- `tools/admin/explorer.py` (sidebar BQ groupée par catégorie)\n- `tools/docs/gen_explorer.py`, `gen_readme.py`, `gen_dashboard.py`,\n  `gen_workflows.py`, `gen_web.py` (génération HTML/MD)\n- `tools/admin/map_bq_domaines.py` (classification initiale + reclassification)\n", "type": "reference", "crit": true}]}, "session": {"nom": "Gestion de session", "entries": [{"id": 70, "titre": "Git — toujours travailler sur main", "contenu": "**Règle** : travailler directement sur `main`. Pas de branches.\n\nLe projet est géré par un seul utilisateur + Claude Code. Les branches ajoutent de la complexité inutile (merge, stash, divergence) sans bénéfice.\n\n- `git commit` sur main\n- `git push origin main`\n- Pas de `git checkout -b`, pas de PR, pas de merge\n- Si l'environnement force une branche (Claude Code web), merger dans main dès que possible", "type": "contrainte", "crit": true}, {"id": 54, "titre": "Scripts — gestion et synchronisation", "contenu": "**Sync scripts DB ↔ fichiers :**\n```\npython3 tools/sync_scripts.py --db sol_vivant.db --extract   # DB → fichiers\npython3 tools/sync_scripts.py --db sol_vivant.db --inject    # fichiers → DB\npython3 tools/sync_scripts.py --db sol_vivant.db --diff      # comparer\n```\n\n**Architecture fichiers :**\n```\ntools/\n├── admin/     session_start, audit_opus, bq_query, check_integrity, export_tools, explorer\n├── batch/     analyse_corpus\n├── docs/      gen_web, gen_mo_calc, gen_triangle_textures, gen_lifofer, gen_explorer, gen_readme, gen_workflows, gen_reports\n├── jenni/     export_jenni_doc, export_fiche, gen_prompt_enrichissement, import_enrichissement\n├── lib/       config, db, cli, pub_path, agent_runner, inrae, jenni_format, repair_json, sources, web_template\n├── batch/      (archivé — pipeline biblio retiré)\n├── sync_scripts.py\n└── regen_all.py\n```\n\n**Modules partagés `lib/` :**\n\n| Module | Rôle | Fonctions clés |\n|--------|------|----------------|\n| `db.py` | Connexion DB centralisée | `get_connection(db_path, readonly=False)` |\n| `cli.py` | Boilerplate CLI | `add_db_arg(parser)`, `check_db(db_path)` |\n| `config.py` | Table config | `get()`, `get_int()`, `get_float()`, `get_json()` |\n| `pub_path.py` | Chemins publication | `pub_output(dir, name, ext, timestamp)` |\n| `agent_runner.py` | API Anthropic | `run_session()`, `run_batch()`, `load_config_prices()` |\n| `repair_json.py` | Réparation JSON | `repair_json(text)` |\n| `web_template.py` | Templates HTML | `render_page()`, `load_templates()`, CDN_REACT, etc. |\n| `jenni_format.py` | Formatage prompts | `format_instructions()`, `format_terms_block()` |\n\n**Génération pages web (noms fixes, pas d'horodatage) :**\n```\npython3 tools/docs/gen_web.py              → Publications/web/index.html\npython3 tools/docs/gen_mo_calc.py          → Publications/web/mo_calculateur.html\npython3 tools/docs/gen_triangle_textures.py → Publications/web/triangle_textures.html\npython3 tools/docs/gen_lifofer.py          → Publications/web/lifofer.html\npython3 tools/docs/gen_explorer.py         → Publications/web/explorer.html\n```\n\n**Convention** : tous les scripts utilisent `add_db_arg(parser)` (défaut: `sol_vivant.db`). Connexion via `get_connection(db_path)`.\n\n**Rappel** : les fichiers dans `Publications/` sont des **vues** de la DB. Toujours modifier la source (DB + scripts), puis regénérer.", "type": "commande", "crit": false}, {"id": 52, "titre": "Ce que Claude ne fait PAS", "contenu": "- Stocker le contenu Jenni (.docx) directement dans la DB\n- Modifier le RIS biblio à la main (toujours passer par le pipeline `normalise → agents Task → validate`)\n- Ajouter des codes docs (S2, P1...) dans les instructions des prompts\n- Demander à Jenni de sourcer (c'est intrinsèque à son fonctionnement)\n- Interpréter les résultats de LIKE case-insensitive comme des vrais positifs\n", "type": "regle", "crit": true}, {"id": 64, "titre": "maintenance_sessions — journal de bord", "contenu": "Table `maintenance_sessions` — journal de bord des sessions Claude Code.\n\n**Procédure :**\n1. **Fin de session** : insérer UN enregistrement par session Claude Code\n2. **Pas de rapport intermédiaire** — un seul INSERT en fin de session\n3. Si plusieurs sessions dans la journée → 1 enregistrement par session (pas par jour)\n4. L'`objectif` résume la session en une ligne, `actions` contient le rapport complet en Markdown\n\n**15 sessions** archivées (27/03 → 07/04/2026).\n\n| Colonne | Rôle |\n|---------|------|\n| `ts_start` / `ts_end` | Horodatage |\n| `objectif` | Résumé une ligne |\n| `declencheur` | Ce qui a motivé la session |\n| `etat_avant` / `etat_apres` | JSON snapshot (terms, config, tables...) |\n| `actions` | Rapport MD complet de la session |\n| `decisions` | Choix architecturaux et leçons |\n| `scripts_touches` | Liste des fichiers modifiés |\n| `tables_touchees` | Tables DB modifiées |\n| `reste_a_faire` | TODO pour la session suivante |\n| `alertes` | Problèmes détectés |\n| `commit_refs` | Références git |\n\n**Consultation :**\n```sql\nSELECT id, ts_start, objectif FROM maintenance_sessions ORDER BY ts_start;\n```", "type": "instruction", "crit": true}, {"id": 78, "titre": "Nouveau script — checklist d'enregistrement", "contenu": "Après création d'un nouveau script Python dans `tools/` :\n\n1. Ajouter les imports partagés :\n   ```python\n   sys.path.insert(0, str(Path(__file__).resolve().parent.parent / 'lib'))\n   from db import get_connection\n   from cli import add_db_arg, check_db\n   ```\n2. Utiliser `add_db_arg(parser)` au lieu de `parser.add_argument('--db', ...)`\n3. Utiliser `check_db(args.db)` pour valider l'existence de la DB\n4. Utiliser `get_connection(args.db)` au lieu de `sqlite3.connect()` + `get_connection (inclut row_factory)`\n5. `python3 tools/sync_scripts.py --db sol_vivant.db --inject` → enregistre en table `scripts`\n6. Vérifier : `SELECT nom, version FROM scripts WHERE nom LIKE '%nouveau_script%';`\n7. Si le script génère des fichiers → l'ajouter dans `regen_all.py`\n\n**Pour les scripts `batch/` et `batch/` (archivé)** (qui importent via `from lib.xxx`) :\n```python\nsys.path.insert(0, str(Path(__file__).resolve().parent.parent))\nfrom lib.db import get_connection\nfrom lib.cli import add_db_arg, check_db\n```", "type": "instruction", "crit": false}, {"id": 119, "titre": "Rituel de clôture de session — session_end.py", "contenu": "## Rituel session_end.py\n\n```bash\npython3 tools/admin/session_end.py --db sol_vivant.db\n```\n\n**Séquence obligatoire** :\n1. Vérif working tree propre + branche courante\n2. Régénération des pages (dashboard, ebauches, explorer, etc.)\n3. `check_integrity.py` (validation DB)\n4. **Insert rapport de session en DB** (étape obligatoire, non encore implémentée dans session_end.py — à faire manuellement en attendant) :\n   - `audit_reports` (`categorie='session_recap'`, `content_md`, `tags`, `date_session`) — rapport narratif\n   - `maintenance_sessions` (objectif, declencheur, actions, decisions, etat_avant/apres, scripts_touches, tables_touchees, reste_a_faire, alertes, commit_refs) — log structuré\n5. `git add` étendu : sol_vivant.db, Publications/, MANIFEST.md, README.md, tools/\n6. Commit avec message structuré\n7. `git push origin claude/<branche-session>`\n8. `git checkout main && git merge --ff-only` + push\n\n### Pourquoi l'insert en DB est obligatoire (doctrine 2026-04-20)\n\nLa DB est la **source de vérité unique**. Les `.md` orphelins dans `jmj/rapports/session/` sont **hors-doctrine** — ils étaient écrits manuellement avant 2026-04-20 mais ne doivent plus l'être.\n\n**Les deux tables sont complémentaires, pas redondantes** :\n- `audit_reports` (cat=session_recap) = narratif rédigé (contexte, décisions, dette identifiée, pédagogie)\n- `maintenance_sessions` = log structuré (objectif, actions, commits, tables touchées) — source temporelle de vérité, permet de reconstruire l'historique par requête SQL\n\n### Template SQL minimal\n\n```sql\n-- 1. Rapport narratif\nINSERT INTO audit_reports (slug, titre, categorie, content_md, date_session, tags, is_active)\nVALUES ('session_<N>_<YYYY-MM-DD>_<theme_slug>',\n        'Session <N> (<YYYY-MM-DD>) — <titre court>',\n        'session_recap',\n        '<markdown complet>',\n        '<YYYY-MM-DD>',\n        '[\"<tag1>\",\"<tag2>\",...]',\n        1);\n\n-- 2. Log structuré (champs tous remplis, sinon requêtes d'audit trouent)\nINSERT INTO maintenance_sessions\n  (ts_start, ts_end, objectif, declencheur, etat_avant, actions, decisions,\n   etat_apres, scripts_touches, tables_touchees, reste_a_faire, alertes, commit_refs)\nVALUES ('<YYYY-MM-DD HH:MM:SS>', '<YYYY-MM-DD HH:MM:SS>',\n        '<objectif 1-2 phrases>',\n        '<ce qui a déclenché la session>',\n        '<état DB/code avant>',\n        '<actions menées bout-en-bout>',\n        '<décisions structurantes prises>',\n        '<état DB/code après>',\n        '<liste des scripts modifiés>',\n        '<liste des tables touchées>',\n        '<dette identifiée pour prochaines sessions>',\n        '<alertes / points de friction>',\n        '<SHA1 court des commits>');\n```\n\n### Contenu attendu du `audit_reports.content_md`\n\nSections recommandées (pas obligatoires, on s'adapte) :\n- **Objectif initial** (ce qu'on voulait faire)\n- **Décisions structurantes** (pourquoi tel choix, alternatives écartées)\n- **Réalisations** (par commit si session à commits multiples)\n- **Dette identifiée** pour prochaines sessions (très important — alimente l'audit de dette doctrinale)\n- **Statistiques DB** finales (chiffres clés qui permettent de mesurer l'impact)\n- **État technique** (branche, commits, integrité)\n\n### Cas d'usage futurs\n\n- **Audit temporel** : `SELECT ts_start, objectif FROM maintenance_sessions ORDER BY ts_start` → inventaire de ce qui a été fait quand\n- **Recherche thématique** : `SELECT * FROM audit_reports WHERE content_md LIKE '%<kw>%' OR tags LIKE '%<kw>%'`\n- **Reprise de dette** : `SELECT ts_start, reste_a_faire FROM maintenance_sessions WHERE reste_a_faire != '' ORDER BY ts_start DESC`\n- **Audit de dette doctrinale** : parser `reste_a_faire` + `alertes` pour détecter les chantiers ouverts non repris (cf. dette session 2026-04-20 — script `audit_dette_doctrinale.py` à venir)\n\n### Règle absolue\n\nToute session doit se terminer avec :\n- working tree **propre**\n- `main` **synchronisé** (merge FF depuis claude/…)\n- **rapport en DB** (pas de `.md` orphelin dans `jmj/rapports/session/`)\n\nNe jamais laisser la branche `claude/…` en avance sur main (cf. CLAUDE.md \"Clôture de session — propagation obligatoire\").\n\n### État d'implémentation (2026-04-20)\n\n- `session_end.py` : régen + integrity + commit + push + merge FF **OK**\n- Insert rapport en DB : **manuel pour l'instant**, à automatiser\n- Proposition d'automatisation : étape interactive dans session_end.py (Claude remplit le template SQL avant commit), ou template pré-généré à valider.\n\n### Dette identifiée — session_end.py ne regen pas toutes les pages (2026-04-21)\n\n**Symptôme** — `session_end.py` ne régénère que 5 pages en dur (`gen_readme`,\n`gen_web`, `gen_concept_cards`, `gen_ebauches_web`, `gen_dashboard`), alors\nque `regen_all.py` en couvre **15** (cahier, triangle, lifofer, mo_calc,\nexplorer, technique, tests_terrain, esclaves, transition_robuste, workflows,\nrapports, etc.).\n\n**Impact** — dès qu'une session touche la **charte partagée**\n(`sv-charter-css`, `sv-shared-components`, variables `--font-*`,\n`.sv-text-column`…), les pages non listées gardent l'ancien rendu après\nclôture. Bug invisible tant que le rituel ne déclenche pas explicitement\nun `regen_all`. L'utilisateur voit les pages à jour uniquement si Claude\na pensé à lancer `regen_all.py` manuellement pendant la session.\n\n**Sessions à risque** : toute modif des 2 templates globaux\n(`page_slug IS NULL`), des variables CSS, ou de composants React\npartagés (SvRichText, SvSectionsNav, SvCollapse, etc.).\n\n**Fix proposé** — remplacer la boucle hardcodée dans `session_end.py`\npar un appel unique :\n\n```python\n# Avant (hardcoded) :\nfor script, args_extra in [\n    ('tools/docs/gen_readme.py', []),\n    ('tools/docs/gen_web.py', []),\n    ('tools/docs/gen_concept_cards.py', []),\n    ('tools/docs/gen_ebauches_web.py', []),\n    ('tools/docs/gen_dashboard.py', []),\n]:\n    ...\n\n# Après :\nrc, out, err = run(['python3', 'tools/regen_all.py', '--db', args.db])\n```\n\n`regen_all.py` fait déjà le bon dispatch (voir `GENERATORS` liste interne)\net affiche le résumé (15/15 générateurs OK). La liste en dur de\n`session_end.py` est un héritage pré-`regen_all`.\n\n**Contournement en attendant** — Claude lance `python3 tools/regen_all.py`\nexplicitement pendant les sessions qui touchent la charte. Le commit\n`session_end : régénération pages web + dashboard` emporte alors toutes\nles pages régénérées en plus des 5 hardcodées.\n", "type": "commande", "crit": true}, {"id": 128, "titre": "Session Claude Code — démarrage + clôture", "contenu": "## Workflow Session — démarrage + clôture\n\n### Démarrage (toujours, en premier)\n\n```bash\npython3 tools/admin/session_start.py --db sol_vivant.db\n```\n\nCe script fait tout :\n1. **Sync git** — fetch origin/main, checkout main, rebase si besoin. Les commits fantômes d'une ancienne session sont écrasés (par design, cf. CLAUDE.md)\n2. **Backup DB** — snapshot horodaté de `sol_vivant.db` dans `jmj/session/`\n3. **Dashboard** — chiffres vitaux : termes, fiches, chaînes, concept cards, dettes, commits récents\n4. **Intégrité** — check rapide (0 criticité attendue)\n5. **Règles actives** — affichage des BQ critiques (depuis `config.claude_rules`)\n\n**Après le démarrage** : la plateforme Claude Code web impose une branche `claude/<nom-session>`. Claude travaille sur cette branche puis propage vers main en clôture.\n\n### Pendant la session (flux standard)\n\n```\n1. Lire le dashboard\n2. Comprendre la demande JMJ\n3. Chercher dans BQ si pattern applicable :    bq_query.py --search <mot>\n4. Faire (éditer DB / scripts / Publications/)\n5. Sync scripts : python3 tools/sync_scripts.py --db sol_vivant.db --inject\n6. Régénérer : python3 tools/regen_all.py --db sol_vivant.db (si outputs touchés)\n7. check_integrity.py --db sol_vivant.db\n8. Commit + push (sur la branche claude/ imposée)\n```\n\n### Clôture de session (obligatoire avant de rendre la main)\n\nLe workflow est **mono-utilisateur** avec DB **binaire non mergeable**. Laisser du travail sur une branche feature → collision garantie (JMJ merge manuellement dans GitKraken).\n\n**Séquence fast-forward uniquement** :\n\n```bash\n# 1. Working tree propre\ngit status   # rien à committer\n\n# 2. Push de la branche courante\ngit push -u origin claude/<branche-session>\n\n# 3. Propagation vers main\ngit checkout main\ngit pull origin main\ngit merge --ff-only claude/<branche-session>\ngit push origin main\n```\n\n**Si le FF échoue** (ne devrait jamais arriver en mono-session) → STOP, demander à JMJ.\n\n**Rester sur `main`** à la fin + annoncer explicitement à JMJ que la session est close.\n\n### Clôture prématurée (test en cours de session)\n\nSi JMJ demande à tester un fichier (script, HTML, export), Claude exécute la même séquence immédiatement, reste dispo sur `main` pour le test, puis reprend les modifs suivantes sur la branche `claude/…` imposée par la plateforme.\n\n### Scripts annexes\n\n| Script | Usage |\n|---|---|\n| `tools/admin/bq_query.py --modules workflow` | Relire ce module |\n| `tools/admin/check_integrity.py` | Valider l'état DB à tout moment |\n| `tools/admin/session_end.py` | (optionnel) rituel de clôture formel avec résumé |\n\n### BQ liées\n\n- Règles absolues → #1 (carte), #70 (git main), #73 (DB source de vérité)\n- Maintenance détail → module `maintenance` (scripts, journal, check)\n\n\n### Path de sortie — config\n\nLe rapport de cloture va dans `config paths.rapports_session`\n(= `jmj/rapports/session/`). Utiliser `get_path(conn, 'rapports_session',\nensure_exists=True)`. Fichier nomme `rapport_YYYY-MM-DD.md`.\n\nVoir BQ #134 pour la structure jmj/ complete.", "type": "workflow", "crit": true}, {"id": 90, "titre": "Environnement — pas de binaire sqlite3, utiliser python3", "contenu": "Le binaire `sqlite3` **n'est pas installé** dans l'environnement Claude Code (erreur `sqlite3: command not found`).\n\n**Toujours utiliser le module Python** pour interroger la DB :\n\n```bash\npython3 -c \"\ncon = get_connection('sol_vivant.db')\nfor r in con.execute(\"SELECT ... FROM ...\"):\n    print(dict(r))\n\"\n```\n\n**Note** : dans les scripts, toujours utiliser `get_connection()` de `lib/db.py` (inclut `row_factory=Row`). L'import direct `sqlite3.connect` n'est utilisé que dans les one-liners CLI.\n\n**Ne jamais tenter** `sqlite3 sol_vivant.db \"...\"` — ça échoue systématiquement.", "type": "contrainte", "crit": true}]}, "integrite": {"nom": "Intégrité DB", "entries": [{"id": 56, "titre": "audit_log", "contenu": "Voir les dernières opérations :\nSELECT ts, operation, table_name, record_ref, substr(detail, 1, 100) FROM audit_log ORDER BY ts DESC LIMIT 20;\n\nLogger une opération :\nINSERT INTO audit_log (operation, table_name, record_ref, detail) VALUES ('UPDATE', 'terms', 'strate S', 'description...');", "type": "commande", "crit": false}, {"id": 74, "titre": "Audit d'intégrité DB — checklist", "contenu": "Lancer régulièrement (toutes les 3-5 sessions) un audit d'intégrité :\n\n```sql\n-- Doublons thésaurus\nSELECT fr, COUNT(*) c FROM terms GROUP BY LOWER(fr) HAVING c > 1;\n\n-- Termes orphelins (doc_code inexistant)\nSELECT t.fr, t.doc_code FROM terms t\nLEFT JOIN documents d ON d.code = t.doc_code WHERE d.code IS NULL;\n\n-- Sections sans titre\nSELECT doc_code, chapitre, section FROM prompts WHERE titre_h2 IS NULL OR titre_h2 = '';\n\n-- FK fantômes concept_cards\nSELECT cc.title FROM concept_cards cc\nLEFT JOIN documents d ON d.code IN (SELECT value FROM json_each(cc.docs_codes))\nWHERE d.code IS NULL AND cc.docs_codes IS NOT NULL;\n\n-- Scripts fichier vs DB\npython3 tools/sync_scripts.py --db sol_vivant.db --diff\n```\n\n**Historique** : 36 doublons termes corrigés (session 03/04), 77 orphelins term_relations, 2 FK fantômes cascade_prerequis (session 31/03).", "type": "instruction", "crit": true}]}, "analyse": {"nom": "Analyse corpus", "entries": [{"id": 55, "titre": "Faux positifs Opus récurrents", "contenu": "Claude Code est lui-même Opus — ces erreurs récurrentes doivent être détectées chez lui-même avant d'agir :\n\n1. **« Mentions problématiques dans prompts »** → SQLite LIKE est case-insensitive. `sol vivant` (scientifique) matche `Le Sol Vivant cet Holobionte` (projet). Vérifier en Python avec un match exact avant d'agir.\n\n2. **Tables droppées** → `prompt_contenus` et `term_connections` ont été remplacées. Ne pas les recréer.\n\n3. **Cross-refs `doc_source/doc_cible`** → ces colonnes contiennent des descripteurs longs, pas un bug. Les colonnes normalisées sont `doc_code_source`/`doc_code_cible`.\n\n**Règle** : ne pas agir sur un signalement sans vérification indépendante — même si c'est moi (Claude) qui ai signalé le point.\n", "type": "conseil", "crit": true}, {"id": 98, "titre": "Pipeline analyse → fiches/validations → prompts → clôture", "contenu": "## Pipeline analyse → fiches/validations → prompts → clôture\n\n**Cf. BQ « Modèle conceptuel — production du corpus » pour la vue d''ensemble.**\n\n### Déclencheurs\n- Audit du corpus (analyse_corpus.py, audit_opus.py, agents spécialisés)\n- Attribution sources (archivé)\n- Intégration de notes volantes (jmj/notes*.txt) — cf. BQ #102\n\n### Étapes (à chaîner)\n\n**1. Analyse** → produit un JSON de manques :\n- `termes_manquants` → enrichissement thésaurus\n- `sujets_zoom` → nouvelles **fiches** (zoom sur un point précis)\n- `chaines_a_valider` → nouvelles **validations** mode `validation`\n- `concepts_faibles` → nouvelles **validations** mode `renforcement`\n- `lacunes` → nouvelles **validations** mode `comblement`\n\n**2. Création DB** (depuis le JSON, après validation JMJ) :\n- INSERT termes → `terms`\n- INSERT fiches + fiche_sections → `fiches` / `fiche_sections`\n- INSERT validations + validation_sections → `validations` / `validation_sections`\n- Pas de UPDATE direct sur `prompts` à ce stade — les prompts ne sont enrichis qu''**après retour Jenni**\n\n**3. Génération des prompts Jenni** :\n- Enrichissement thésaurus : `gen_prompt_enrichissement.py` (charte « Bloc de 10 », BQ #101)\n- Fiches : `export_fiche.py` (charte fiches techniques BQ #104 si type=`technique`, sinon charte générique)\n- Validations : `export_validation.py` (charte générique)\n\n**4. Export fichiers** → `recherches/`\n- `enrich_*.txt` — enrichissement thésaurus (lots de 10)\n- `prompts_fiche_*.txt` — fiches (zoom proactif)\n- `prompts_validation_*.txt` — validations (vérification/comblement réactif)\n\n**5. Cycle Jenni** : copier prompts → recevoir .docx\n\n**6. Retour Jenni — analyse Claude** :\n- `.docx` analysé → contenu structuré\n- Termes extraits → `terms`\n- Contenu fiche → `fiche_contenus.contenu_integre` + `prompts.contexte_sci/.enrichissement` des docs cibles\n- Contenu validation → `validation_contenus.contenu_integre` + `prompts.contexte_sci/.enrichissement` des docs cibles\n- Refs → `jenni_sources` (intégration consciente)\n- Statut fiche/validation → `integre` puis `archive`\n\n**7. Clôture des prompts** (auto-déduit) :\n- Vue SQL : un prompt est `cloture` quand aucune fiche/validation **ouverte** ne le référence ET que `contexte_sci` + `instructions` sont remplis\n- Tous les prompts d''un doc en `cloture` → doc en `pret_a_rediger`\n\n**8. Passe finale Jenni** : doc en `pret_a_rediger` → rédaction finale → `redige`\n\n### Règles (rappels)\n- Pas de code doc dans les fichiers Jenni (BQ #40)\n- Lots de 10 termes max pour enrichissement thésaurus (charte Jenni « Bloc de 10 », BQ #101)\n- Citations format `[N]` uniquement (BQ #101)\n- Chunks de 500 refs max pour attribution sources\n- Fiches = sujets transversaux qui zooment sur un point précis (BQ #69)\n- Validations = comblement réactif des dettes du corpus (BQ #105)\n- **Les prompts de strate ne sont modifiés qu''après retour Jenni** (jamais en spéculation)\n- **Tout retour Jenni** va dans la bonne table : `fiche_contenus` / `validation_contenus`, **pas** dans `fiche_sections.enrichissement` ni `validation_sections.enrichissement`\n\n### ⚠ Etat actuel (avril 2026)\n\n`validation_sections` et `validation_contenus` existent en DB avec des donnees historiques (81 et 16 rows respectivement) mais **aucun script actif ne les alimente**. La logique des validations est en pause (cf. BQ #127). Les BQ qui decrivent leur workflow sont conservees comme reference, mais les scripts `export_validation.py` / `import_validation.py` ne sont pas operationnels aujourd'hui.\n", "type": "workflow", "crit": true}, {"id": 102, "titre": "Workflow — traitement des notes volantes (jmj/notes*.txt)", "contenu": "## Workflow — traitement des notes volantes\n\n**Fichiers concernés** : `jmj/notes*.txt`, `jmj/transcriptions/*.txt` et tout matériel brut que JMJ capture \"au pied levé\" (posts LinkedIn, abstracts, fragments de lecture).\n\n### Contexte\n\nLes notes volantes sont des captures rapides d'informations scientifiques croisées au gré des recherches de JMJ. **Elles ne sont pas sourcées de manière académique** — l'objectif de JMJ est la collecte rapide d'informations, pas leur traçabilité bibliographique. Les sources académiques viendront plus tard, **apportées par Jenni** lors de la rédaction des fiches/documents.\n\n### Règle sur les DOIs dans les notes\n\nLes DOIs qui apparaissent parfois dans les notes sont **accessoires et optionnels** :\n\n- ✅ **Utilisables** comme porte d'entrée pour une recherche web de clarification conceptuelle si Claude en a besoin pour comprendre un mécanisme cité\n- ❌ **Ne pas stocker systématiquement** dans `fiches.sources_dois` ou ailleurs\n- ❌ **Ne pas chercher à extraire tous les DOIs** d'une note pour les tracer\n- ✅ **Bibliographie de référence = `jenni_sources`**, alimentée via le pipeline Jenni → analyse .docx → attribution\n\n### Pipeline d'intégration\n\n**Étape 1 — Analyse**\nClaude lit la note, identifie les concepts scientifiques, mécanismes, taxa, molécules.\n\n**Étape 2 — Tri**\nClasser chaque note (ou segment) en :\n- 🟢 **Retenue** : apporte un mécanisme, un taxon, un concept, une hypothèse ou une donnée pertinente\n- 🟡 **Enrichissement** : complète une fiche/section existante plutôt qu'une nouveauté\n- 🔴 **Écartée** : doublon, fragment trop court sans contexte, ou vraiment sans aucun apport (rare)\n\n⚠ **Règle des pépites — ne pas confondre niveau de vulgarisation et absence d'intérêt**\n\nJMJ prend volontairement des notes de **vulgarisation** parce qu'il y a parfois des **pépites dans des hypothèses** apparemment basiques. Plusieurs concepts du corpus actuel ont été identifiés ainsi (zoom apparemment trivial qui masque une hypothèse féconde).\n\n**Le critère d'écartement n'est PAS** :\n- ❌ « niveau cours de lycée »\n- ❌ « vulgarisation grand public »\n- ❌ « pas de DOI »\n- ❌ « format LinkedIn »\n\n**Le bon critère d'écartement est** :\n- ✅ Aucune hypothèse, aucun mécanisme, aucune connexion conceptuelle, aucune donnée chiffrée nouvelle\n- ✅ Strict recopiage d'une définition académique standard sans angle particulier\n- ✅ Doublon littéral d'une note précédente\n\n**Avant d'écarter une note dite \"vulgarisation\", chercher activement** :\n- Une hypothèse formulée même implicitement\n- Un mécanisme expliqué d'un angle inhabituel\n- Une donnée chiffrée inattendue\n- Une connexion entre deux domaines (ex: gut-brain × sol)\n- Un terme/concept émergent absent du thésaurus\n\nSi **rien** de tout cela → écarter. Sinon → la note mérite d'être lue avec soin et probablement intégrée comme zoom ou enrichissement.\n\n**Étape 3 — Regroupement (clustering)**\nRapprocher les notes qui traitent d'un même thème cohérent. Une note peut nourrir plusieurs clusters si elle contient plusieurs mécanismes distincts.\n\n**Étape 4 — Synthèse**\nPour chaque cluster retenu, décider :\n- **Nouvelle fiche** si le sujet n'est pas couvert par une fiche existante\n- **Enrichissement d'une fiche existante** si scope aligné\n- **Enrichissement de `prompts.enrichissement`** d'une section si le contenu relève d'un seul document de strate\n\n**Étape 5 — Proposition utilisateur**\nPrésenter à JMJ le clustering + la proposition d'action avant toute écriture DB. JMJ valide/ajuste. Pas d'écriture sans validation.\n\n**Étape 6 — Écriture DB**\nAprès validation :\n- Créer/enrichir les fiches dans `fiches` + `fiche_sections`\n- Extraire les termes candidats → lot enrichissement thésaurus (`gen_prompt_enrichissement.py`, charte Jenni « Bloc de 10 »)\n- Éventuellement UPDATE `prompts.enrichissement` pour les sections ciblées\n\n### Ce qu'on NE fait PAS\n\n- ❌ Pas d'extraction automatique de DOIs depuis les notes (intégration consciente dans `jenni_sources` uniquement)\n- ❌ Pas d'écriture directe en DB avant validation JMJ sur le plan\n- ❌ Pas de création d'entrées terms avec définitions forgées depuis les notes — les définitions viennent de Jenni\n- ❌ Pas d'intégration de notes \"trop basiques\" (niveau cours de lycée) au corpus scientifique, même si les termes sont canoniques\n\n### Où archiver les notes déjà traitées\n\nAprès intégration complète et validation, déplacer la note vers `jmj/archives/notes_traitees/` avec un préfixe date et référence aux fiches créées, afin de tracer l'origine sans polluer le répertoire `jmj/` actif.", "type": "regle", "crit": true}, {"id": 132, "titre": "Stratégie agents Task — quand, comment, résilience", "contenu": "## Stratégie — quand et comment utiliser des agents Task\n\nTrois patterns d'usage des **agents** dans le corpus Sol Vivant. Chaque pattern\na son domaine, ses pièges, ses règles de résilience.\n\n### 1. Pattern `agent_runner` — prepare → batches → Task → consolidate\n\n**Quand :** tâche LLM répétitive sur N items indépendants (attribution sources\nsur 100 refs, audit_opus sur 50 fiches, validation RIS sur 200 entrées).\nGain : parallélisation massive + reprise sur échec partiel (batches isolés).\n\n**Comment :** utiliser `tools/lib/agent_runner.py`\n- Phase 1 : script `--prepare` écrit les batches JSON dans `tmp/<script>/batches/`\n- Phase 2 : **Claude Code lance les agents Task** lisant les batches, écrivant\n  dans `tmp/<script>/responses/`\n- Phase 3 : script `--consolidate` recharge les responses et produit l'artefact\n\n**Exemples existants :** `audit_opus.py`, `attribution.py`, `analyse_corpus.py`,\n`validate_ris.py` (tous via `lib/agent_runner.py`).\n\n**Pièges :**\n- Ne jamais appeler l'API Anthropic externe — Claude Code EST Opus (règle\n  CLAUDE.md absolue #4). L'agent Task s'exécute dans la session courante.\n- Batches trop gros → timeout. Viser < 60 s d'exécution agent par batch.\n- State.json partagé — ne pas re-préparer sans purger (cf. docstring).\n\n### 2. Pattern agents Task in-session (exploration/extraction)\n\n**Quand :** recherche ouverte dans le code (`Explore`), extraction structurée\nd'un long document, résumé d'un corpus — tâches où je n'ai pas besoin du\nrésultat immédiat en contexte ou quand ça va saturer mon contexte.\n\n**Comment :** `Agent(subagent_type='Explore'|'general-purpose', prompt=...,\nrun_in_background=True)` si je peux continuer d'autres tâches pendant.\n\n**Pièges observés 2026-04-18 :**\n- **Timeout stream idle** après ~130 s. Un agent qui démarre gros plante\n  avant d'écrire son résultat. Leçon : **écriture progressive obligatoire**\n  dans le prompt (« écris tes trouvailles au fil de l'extraction dans\n  /tmp/<file>, ne pas attendre la fin »).\n- **Pas de reprise automatique.** Si l'agent plante, tout son travail est\n  perdu sauf si le prompt l'a forcé à écrire en streaming.\n- **Limite de taille des prompts.** Plus de 1000 lignes d'instructions →\n  l'agent rate la consigne. Viser < 500 lignes.\n\n**Recette anti-timeout :**\n```\n- Briefer l'agent avec un plan en N étapes (N ≤ 6)\n- Exiger une écriture partielle (append) à la fin de CHAQUE étape\n- Demander un résumé final ≤ 300 mots (pas de restitution complète)\n- run_in_background=True quand les tâches ne sont pas bloquantes\n```\n\n### 3. Pattern lecture directe (tool use inline)\n\n**Quand :** analyse qui nécessite d'intégrer le contenu dans mon contexte\npour rédaction, synthèse, articulation avec le reste du corpus. Un agent\nTask me ferait perdre cette capacité (son résultat ne serait qu'un résumé).\n\n**Exemples :** lire un chapitre PDF, rédiger une fiche transversale à partir\nde plusieurs sources, croiser des BQ pour produire un plan.\n\n**Règle :** si je dois produire ensuite un artefact cohérent qui croise ce\nque je lis avec d'autres informations → lecture directe + Write pour\nsauvegarder au fur et à mesure (pour récupération si la session plante).\n\n### Arbitrage — quel pattern ?\n\n| Situation | Pattern |\n|---|---|\n| 50 items LLM indépendants (attribution, audit) | 1 — agent_runner |\n| Extraction structurée d'un long doc (>50 p), résultat en artefact | 2 — Task in-session (avec writes progressifs) |\n| Exploration ouverte du code, recherche ouverte | 2 — Task Explore |\n| Rédaction qui nécessite intégration contextuelle | 3 — lecture directe |\n| Tâche parallélisable où je peux faire autre chose | 2 — Task en background |\n| Artefact unique long (fiche, synthèse) | 3 — lecture + Write progressif |\n\n### Principes transverses\n\n1. **Sauvegarder tôt, sauvegarder souvent.** Tout travail long doit laisser\n   une trace persistante (fichier `/tmp/<work>.md`, ou commit git) au plus\n   tard à mi-parcours. Le timeout Anthropic peut survenir à tout moment.\n\n2. **Ne pas déléguer la compréhension.** Un agent Task ne doit pas recevoir\n   de prompt du type « analyse X puis fais Y » — je dois faire la synthèse\n   moi-même. L'agent extrait, classe, compte. Moi je conclus.\n\n3. **Pas de chaîne d'agents profonde.** Un agent ne devrait pas lancer un\n   autre agent (risque de timeout cascade). Je suis le chef d'orchestre.\n\n4. **Contexte vs parallélisme.** Chaque agent Task a un contexte frais —\n   brief complet dans le prompt, pas de référence à « ce qu'on a dit tout à\n   l'heure ». C'est une feature, pas un bug.\n\n5. **Post-mortem après crash.** Quand un agent plante (timeout, erreur) :\n   - Vérifier ce qui a été écrit sur /tmp/\n   - Raccourcir le périmètre si nécessaire\n   - Relancer avec writes plus fréquents\n\n### Anti-pattern : agents un-a-un au lieu d'agent_runner (incident 2026-04-20)\n\nSession 2026-04-20 : lancement de 27 agents Task individuels pour analyse\nde fiches, au lieu d utiliser `tools/lib/agent_runner.py`. Consequences :\n\n- 27 messages separes, chaque agent pollue le contexte avec son prompt\n  (resume puis resultat) alors que le pattern agent_runner garde les\n  responses hors contexte (`responses/<cid>.json`).\n- Pas de reprise possible si un agent plante a mi-parcours.\n- Parallelisation artisanale (4 a la fois) au lieu de parallele massif\n  dans un seul message.\n- Trois formats de JSON differents produits par les agents (strict, wrap\n  `{sections: ...}`, liste), forcant un normalisateur cote consolidation\n  qui aurait ete evite par un prompt centralise.\n\nCorrection : creation de `tools/admin/analyse_fiches.py` (prepare +\nconsolidate) pour basculer les fiches restantes sur le bon pattern.\n\n**Declencheur mental** : des que j'identifie une tache avec > 5 items LLM\nindependants, avant de lancer le premier agent, penser 'agent_runner'.\nCf. claude_rules.agent_runner_reflexe (affichee a chaque session_start).", "type": "doctrine", "crit": true}, {"id": 140, "titre": "Workflows d analyse — pattern unifie agent_runner", "contenu": "## Workflows d'analyse — pattern unifie agent_runner\n\nToute tache d'analyse repetitive sur N items (fiches, sources, sections,\ndocs, termes) suit le **meme pattern en 3 phases**. Centralisation de\ntoutes les recettes et composants reutilisables.\n\n### Principe\n\n```\n[donnees DB] -> --prepare -> batches/<cid>.json\n               |                  |\n               |          agents Task paralleles (Claude Code, un seul message)\n               |                  |\n               |                  v\n               |           responses/<cid>.json\n               |                  |\n               -> --consolidate -> [DB enrichie / artefact final]\n```\n\n**Ne JAMAIS** lancer les agents un par un via plusieurs messages successifs\n(cf. anti-pattern BQ #132 section finale).\n\n### Scripts partages\n\n| Module | Role |\n|--------|------|\n| `tools/lib/agent_runner.py` | `prepare_batches()` + `load_responses()` |\n| `tools/lib/repair_json.py` | Robustesse parsing JSON d'agents |\n\n### Exemples en production\n\n| Script | Domaine | Format entree | Format sortie |\n|--------|---------|---------------|---------------|\n| `tools/batch/analyse_corpus.py` | Audit modulaire corpus (T1-T2, S1-S2, C1-C2, K1-K2, B1) | 1 batch par passe | JSON rapport par passe |\n| `tools/batch/audit_opus.py` | Audit structure fiches (~50) | 1 batch par fiche | JSON per-fiche |\n| `(module archivé)` | Attribution `jenni_sources` ~100 refs | 1 batch par ref | JSON attribution |\n| `(module archivé)` | Validation RIS ~200 entrees | 1 batch par entree | JSON validation |\n| `tools/admin/analyse_fiches.py` | Extraction consciente fiches (formules, chiffres, cards, termes candidats) | 1 batch par fiche | JSON par section `{<ordre>: {chiffres_cles, formules, termes_candidats, cards_liees, fiches_liees}}` |\n\n### Recette prompt type pour extraction\n\nLe prompt d'un agent d'analyse DOIT contenir :\n\n1. **Cible explicite** (fiche_id, source_id, ou autre)\n2. **Doctrine rappelee** : \"extraction uniquement, zero redaction\"\n   (reference CLAUDE.md BQ #136 pas_agent_redacteur)\n3. **Format de sortie strict** (JSON avec schema documente) — toujours le\n   MEME format pour que `--consolidate` puisse parser sans normaliseur.\n4. **Commandes SQL pretes a copier-coller** pour l'exploration\n5. **Un modele reference en DB** (\"la fiche #23 a son analyse_claude, consulte-la\")\n6. **Regles concretes** : motifs concrets pas generiques, verifier absence\n   thesaurus avant proposer candidat, etc.\n7. **Output attendu exact** : chemin fichier + resume max 5 lignes\n\n### Anti-patterns frequents\n\n- **Wrapper JSON** : l'agent produit `{\"fiche_id\": X, \"sections\": [...]}`\n  au lieu du schema strict `{\"<ordre>\": {...}}`. Prevention : exemple\n  literal dans le prompt + instruction \"PAS DE WRAPPER\".\n- **Liste au lieu de dict** : l'agent produit `[{ordre:0,...}, ...]`.\n  Prevention : instruction \"cles = ordre (str)\".\n- **Redaction subreptice** : motifs des cards_liees deviennent des resumes\n  rediges. Prevention : \"motif = ce que la section APPORTE, verbe au\n  present indicatif, ≤ 15 mots\".\n- **Cards 'archive' melangees avec 'active'** : rappeler `status='active' UNIQUEMENT`.\n\n### Declencheurs mentaux (pour moi, Claude)\n\n- \"J'ai N fiches / sources / termes a traiter\" avec N > 5\n  → reflexe agent_runner\n- \"Je vais lancer un Agent() pour chaque item\"\n  → STOP, utilise agent_runner (prepare + parallel + consolidate)\n- \"Chaque agent doit retourner du JSON structure\"\n  → agent_runner garde responses hors du contexte principal\n\n### Stockage des resultats d'analyse\n\n| Artefact | Destination |\n|----------|-------------|\n| Extraction par fiche/section | `fiche_sections.analyse_claude` (JSON) |\n| Extraction par source | `jenni_sources.notes_claude` ou table dediee |\n| Rapports d'audit corpus | `audit_reports/<theme>_<date>.md` |\n| Rapport de session | `jmj/rapports/session/rapport_YYYY-MM-DD.md` |\n\n### Voir aussi\n\n- BQ #132 \"Strategie agents Task — quand/comment/resilience\" (doctrine generale)\n- BQ #136 \"Pas d'agents redacteurs\" (regle absolue sur les limites)\n- `claude_rules.agent_runner_reflexe` (affichee a chaque session_start)\n\n### Recette anti-timeout `analyse_corpus.py` (session 2026-04-21)\n\nConstat : run complet (9 passes) sur le corpus entier avec `max_ctx_analyse_corpus=55000` :\n\n| Passe | Contexte brut | Contexte livré agent | Résultat |\n|---|---|---|---|\n| T1 | thes + secs = 532 k chars | 110 k (truncate) | **stream idle timeout** × 2, même avec progressive writes |\n| K1 | cascade + secs | 88 k | OK mais 22 min |\n| S1 / C1 | secs / chains | 56-74 k | **timeout** 1er tour, OK après relance progressive |\n| T2, S2, C2, K2, B1 | variable | 55-110 k | OK 1er tour mais **corpus amputé** |\n\n**Cause racine** : `truncate(text, max_chars=55000)` coupe au milieu du payload. Avec `max_ctx_analyse_corpus=55000` :\n- Thésaurus complet = ~450 k chars (def + syn + BT/RT) → agents voient **12 %**\n- Sections complètes (18 docs) = 81 k chars → agents voient 12 docs sur 18 (6 docs absents : P3 P4 P5 S0 S1 S2)\n\n**Patch appliqué** (T1 uniquement, session 2026-04-21) :\n\n1. **Index thésaurus condensé** : au lieu de passer le thésaurus complet avec définitions/BT/RT, construire un index `id + [strate] + fr / syn_en` (70 k chars pour 1071 termes). Suffit pour vérifier présence/absence d'un terme.\n2. **Sections complètes** : appeler `extract_sections(con)` en direct pour avoir les 18 docs entiers (81 k chars).\n3. **Split par groupes de docs** : T1 éclaté en T1a (F+H, 5 docs, 90 k) / T1b (P, 5 docs, 92 k) / T1c (S, 5 docs, 98 k) / T1d (V, 3 docs, 85 k). Chaque sous-batch sous la limite de timeout (≈ 5-7 min agent).\n4. **Fusion responses T1a-d → T1_completude.json** avant `--consolidate`.\n\n**Généralisation recommandée** (non encore appliquée au script, à faire) :\n- Passer `max_ctx_analyse_corpus` à 90 000 pour éviter la troncature des sections (81 k suffisent).\n- Pour T1/T2/B1 qui consomment le thésaurus : basculer sur un mode `index` (id+fr+syn_en) avec définitions disponibles via un second helper si l'agent veut creuser. Économise 90 % du contexte thésaurus sans perte de capacité de détection.\n- Pour T1 : ajouter un flag `--split-by-strate` qui produit 4 batches au lieu d'1 (F+H / P / S / V). Sortie : 4 responses à fusionner dans le consolidate.\n- Pour S1 / S2 / K1 qui utilisent beaucoup les sections : même pattern de split par strate en cas de timeout (pas obligatoire, selon volume DB).\n\n**Écriture progressive pour ces passes** : dans le prompt agent, exiger `Write tmp/analyse_corpus/responses/<cid>.json après chaque doc traité` avec JSON partiel cumulatif. Garantit un résultat partiel même si timeout à mi-parcours. Pattern appliqué avec succès sur C1 (2 min → 9 min 17 min) et T1a-d.\n\n**Règle** : dès qu'un batch dépasse 80 k chars utiles **ET** fait de l'analyse cross-section (pas juste extraction d'un item), prévoir le split ou l'écriture progressive. 80 k chars utiles ≈ limite où un agent tient en 5-10 min.", "type": "workflow", "crit": true}]}, "archivage": {"nom": "Archivage post-intégration", "entries": [{"id": 125, "titre": "Structure `recherches/` — rangement canonique", "contenu": "## Structure des dossiers de travail `recherches/`\n\n**Source unique** pour tout ce qui est \"document de travail en cours ou\nhistorique\" lié au corpus. Publications/recherches n'existe plus (éliminé\nle 2026-04-14 pour cause de doublon).\n\n### Arborescence canonique\n\n### Biblio PDF JMJ : `jmj/pdf/`\n\nBiblio PDF personnelle de JMJ (poussée sur le repo). Contient les publications académiques, rapports et ressources de référence en PDF que JMJ a rassemblés. Exemples : Shift Project PREF, Kirkby et al. 2016, rapports Triple Performance (Arvalis), guides techniques (Maraîchage Sol Vivant, bilan humique AMG), etc.\n\nUtilisation par Claude : **lecture directe via l'outil Read** (fonction PDF native, avec `pages` pour PDF > 10 pages). Extraire les valeurs chiffrées, paramètres, tableaux pour enrichir `ref_*` tables + `jenni_sources`. Ne jamais copier-coller le contenu dans des fichiers — extraction ciblée et ancrage en DB (comme pour `refs (kind=esclave_energ)` depuis `jmj/pdf/PREF_Shift-Project_Transition-robuste_14-avril-2026.pdf`).\n\n### Arborescence canonique\n\n```\njmj/\n├── pdf/                 # Biblio PDF JMJ (publications académiques, rapports, guides)\n├── archives/            # Documents de travail JMJ (docx, notes, drafts)\n├── session/             # Snapshots DB inter-sessions\n├── analyses/            # Rapports d'audit générés\n└── journaux/            # Journaux de session\n\nrecherches/\n├── fiches/              # Prompts docx fiches en cours (envoye / a_faire)\n├── thesaurus/           # Enrichissement thesaurus (Jenni) :\n│                         #   - thesaurus___strate_*.docx (retours Jenni avec nouveaux termes)\n│                         #   - thesaurus_incomplets_strate_*.docx (listes à compléter)\n│                         #   - enrich_thesaurus_<axe>_<strate>_YYYY-MM-DD.docx (lots export par gen enrich_thesaurus.py)\n├── audits/              # Rapports et audits (mismatches INRAE, sources orphelines, etc.)\n├── sources/             # Exports RIS biblio interne (sources_incomplete_*.ris)\n└── archives/\n    ├── fiches/          # Fiches traitées (statut integre ou archive)\n    ├── thesaurus/       # Thesaurus traités (à venir)\n    └── prompts_validation/  # Anciens prompts validation archivés\n```\n\n### Règle de rangement\n\n| Ce qu'on produit | Où le ranger |\n|---|---|\n| Prompt docx d'une fiche technique/transversale | `recherches/fiches/` |\n| Retour Jenni thesaurus strate X | `recherches/thesaurus/thesaurus___strate_X.docx` |\n| Docx d'une strate à compléter | `recherches/thesaurus/thesaurus_incomplets_strate_X_<date>.docx` |\n| Audit INRAE / sources orphelines / termes candidats / rapport de session | `recherches/audits/` |\n| Export RIS des sources à enrichir en biblio interne | `recherches/sources/` |\n| Une fois traité (fiche intégrée, thesaurus digéré) | `recherches/archives/<catégorie>/` |\n\n### Scripts conformes\n\nScripts mis à jour le 2026-04-14 :\n- `gen_fiche_prompt_docx.py` → `recherches/fiches/`\n- `gen_prompt_completion.py` → `recherches/completion/`\n- `gen_prompt_enrichissement.py` → `recherches/completion/`\n- `gen_prompt_thesaurus.py` → `recherches/thesaurus/`\n- `export_fiche.py` → `recherches/fiches/`\n- `export_validation.py` → `recherches/audits/`\n- `export_thesaurus_incomplets.py` → `recherches/thesaurus/`\n- `export_sources_incomplete.py` → `recherches/sources/` (à migrer)\n- `export_mismatches_inrae.py` → `recherches/audits/` (à migrer)\n- `export_termes_candidats.py` → `recherches/audits/` (à migrer)\n- `audit_sources_orphelines.py` → `recherches/audits/` (OK)\n\n### Anti-pattern à éviter\n\n- ❌ Créer un `Publications/recherches/` bis (doublonnage historique)\n- ❌ Mettre des audits ou rapports dans `recherches/thesaurus/` (fourre-tout)\n- ❌ Scripts avec chemins hardcodés dans `Publications/` pour du travail\n  intermédiaire (`Publications/` = outputs publiables uniquement)\n\n\n### Note 2026-04-14 — `completion/` déprécié\n\nLe dossier `recherches/completion/` a été supprimé : les termes incomplets\ndu thésaurus repassent désormais dans le workflow initial (docx d'import).\nWorkflow unique :\n- Listes d'incomplets générées en docx dans `recherches/thesaurus/thesaurus_incomplets_strate_X_<date>.docx`\n- Retours Jenni dans `recherches/thesaurus/thesaurus___strate_X.docx`\n- Réimport via `import_termes_jenni.py --replace`\n\nLes anciens `complete_*.txt` sont archivés dans\n`recherches/archives/completion/`. Le script `gen_prompt_completion.py`\nest marqué déprécié.\n\n\n---\n\n### Rapports et audits : voir BQ #134\n\nLes **rapports de session** et **rapports d'audit** ne sont PAS dans\n`recherches/` mais dans `jmj/rapports/` (session / audit) — voir BQ\n#134 pour la structure complete et les paths config. Le dossier\n`recherches/audits/` a ete supprime en avril 2026 (migration vers\n`jmj/rapports/audit/`).\n\n---\n\n### Préfixe de priorité sur les fichiers docx fiches (2026-04-23)\n\n**Convention** : les docx de `recherches/fiches/` portent un préfixe\nnumérique à 2 chiffres qui reflète leur **priorité de lecture/traitement**\n(ordre dans lequel Jenni ou le lecteur doit les prendre). Pattern :\n\n```\nNN_fiche_<slug>_<YYYY-MM-DD>.docx\n```\n\nExemples :\n```\n01_fiche_cascade-temporelle-t0-t5_2026-04-22.docx\n06_fiche_drilosphere-maom-bioreacteur-carbone_2026-04-22.docx\n07_fiche_carences-minerales-silencieuses_2026-04-22.docx\n07_fiche_lombriciens-ecologie-pilotage_2026-04-23.docx  ← même niveau 07 accepté\n```\n\n### Règle : niveau d'index partagé autorisé\n\n**Quand une nouvelle fiche est aussi prioritaire qu'une fiche existante, elle\npeut porter le même préfixe.** Plusieurs fiches au même niveau d'index\ncoexistent sans conflit — le système de fichiers les classe simplement\ndans l'ordre alphabétique du slug, ce qui est acceptable (deux fiches\nco-prioritaires sont lues l'une après l'autre, l'ordre entre elles\nn'a pas d'importance éditoriale).\n\nConséquences :\n- **Pas de décalage forcé** de toutes les fiches suivantes quand une\n  fiche prioritaire s'insère (évite les renommages en cascade).\n- **Pas de numéro isolé** (ex. `19_`) pour une fiche qui est en réalité\n  co-prioritaire avec un niveau antérieur — le `19_` suggère « après\n  les 18 précédentes » alors que la fiche est prioritaire.\n- Le préfixe reste un **indicateur de priorité**, pas un identifiant\n  unique. L'identifiant unique d'une fiche c'est son `slug` (+ `id` DB).\n\n### Anti-pattern à éviter\n\n- ❌ Créer un préfixe tout neuf (ex. `19_`) juste pour éviter un doublon\n  de préfixe, si la fiche mérite éditorialement le niveau 07.\n- ❌ Renuméroter toutes les fiches suivantes (`07` → `08`, `08` → `09`…)\n  pour insérer une nouvelle fiche en `07` — les docx archivés garderaient\n  leurs anciens noms, les historiques git ne matchent plus.\n- ❌ Considérer le préfixe comme un identifiant : deux fiches `07_` ≠\n  collision — elles partagent un *niveau de priorité*, pas une identité.\n", "type": "reference", "crit": true}]}, "jenni-workflow": {"nom": "Workflow Jenni", "entries": [{"id": 39, "titre": "Jenni — ce que c'est", "contenu": "Jenni est un outil de rédaction académique qui produit des **assemblages de citations** depuis des sources Open Access et Google Scholar. Elle ne rédige pas librement — elle cite et structure.\n\nCe que Jenni produit :\n- Un **.docx** = compilation sourcée pilotée par le prompt\n- Un **.ris** = bibliographie des sources utilisées\n\nCe que Jenni fait bien : trouver des sources récentes, citer proprement, structurer un plan H1/H2/H3.\nCe que Jenni ne fait pas : rédiger de la pédagogie, synthétiser, interpréter, relier des concepts entre documents.\n\n**Règle fondamentale** : ne JAMAIS demander à Jenni de sourcer ou citer dans les prompts. C'est **intrinsèquement** ce qu'elle fait — son output EST un assemblage de citations. Lui demander de citer est redondant et peut dégrader la qualité (elle force des citations au lieu de laisser son algorithme sélectionner les plus pertinentes). Les sources viennent du RIS uploadé dans le projet + sa propre recherche Open Access/Scholar.\n\n### Modele de fonctionnement (ajout session 2026-04-12)\n\nJenni n''est pas un chatbot qui repond a des commandes. C''est une **co-redactrice sur document partage** qui developpe un texte existant en le sourcant academiquement. Le prompt .txt est le plan du document (statique), le chat Jenni est le dialogue de co-redaction (dynamique). Ces deux canaux sont distincts et ne doivent pas etre confondus.\n\nVoir BQ : \"Comment Jenni comprend les instructions — modele mental (chartes)\" pour le detail complet.\n\n\n### Bibliographie automatique en fin de docx\n\n**Jenni ajoute AUTOMATIQUEMENT la bibliographie complète au format APA\nà la fin de chaque docx qu'elle produit.** Ne pas demander dans les\nprompts \"ajoute les références\" ou créer de placeholder \"Références\nbibliographiques\" — c'est intrinsèque et redondant, même effet que de\ndemander \"cite les sources\" (BQ règle fondamentale).\n\nConséquence pour les templates de prompt docx (fiches, ébauches) :\n- **Pas de bloc \"Références bibliographiques\"** à pré-poser\n- **Pas de bloc \"Sources\"** à pré-poser\n- Jenni le fera automatiquement dans le document de retour", "type": "regle", "crit": true}, {"id": 137, "titre": "Parser docx Jenni — extraction des formules chimiques OMML obligatoire", "contenu": "## Parseur docx : inclure les formules Office Math ML (OMML)\n\nLes docx produits par Jenni contiennent **TOUTES les formules chimiques, mathématiques, indices et exposants** sous forme d'équations Office Math ML (`<m:oMath>` dans le XML Word). Ex : `NH₃`, `CO₂`, `Fe²⁺`, `NO₃⁻`, `k₁`, `k₂`, `ΔG`, `qCO₂`, `N₂`, `O₂`.\n\n**PIÈGE** : `python-docx` ne lit que `paragraph.text` qui IGNORE les `<m:oMath>`. Un parseur naïf récupère `(...)` vide à la place des formules. Résultat : 24 parenthèses vides dans les 215 termes du 2026-04-20 (`ammoniac ()`, `fer ferreux ()`, `CO₂ ()` → formules manquantes).\n\n**SOLUTION** — parseur XML custom qui :\n1. Parse `word/document.xml` via `xml.etree.ElementTree`\n2. Pour chaque `<w:p>`, parcourt les éléments :\n   - `<w:t>` → texte normal (en skippant ceux à l'intérieur d'un `<m:oMath>`)\n   - `<w:br>` → `\\n`\n   - `<m:oMath>` → conversion récursive en Unicode (sub/sup)\n3. Détecte et supprime les fallbacks texte que Jenni produit parfois après un oMath (ex: `NH₃NH3` → `NH₃`)\n\n**Mapping OMML → Unicode** :\n- `<m:sSub>` : base + chiffres en indices (`₀₁₂₃₄₅₆₇₈₉`)\n- `<m:sSup>` : base + chiffres en exposants (`⁰¹²³⁴⁵⁶⁷⁸⁹⁺⁻`)\n- `<m:sSubSup>` : base + indice + exposant (ex: `Fe²⁺` = Fe sub vide sup 2+)\n- `<m:f>` : fraction `num/den`\n\n**Implémenté dans** : `tools/jenni/import_termes_jenni.py::parse_docx()` (à partir du 2026-04-20).\n\n**Vérification** : après un import Jenni, chercher les `\\(\\s*\\)` dans `definition`, `rt`, `bt`, `syn_fr`, `syn_en`. Si > 0 occurrences, le parser est défaillant ou Jenni a produit des parenthèses vides réelles (rare).\n\n```python\nimport re\nfor r in cur.execute(\"SELECT id, fr FROM terms\"):\n    for f in ['definition','syn_fr','syn_en','bt','rt']:\n        content = cur.execute(f\"SELECT {f} FROM terms WHERE id=?\", (r[0],)).fetchone()[0] or ''\n        if re.search(r'\\(\\s*\\)', content):\n            print(f\"⚠ #{r[0]} {r[1]} [{f}]\")\n```\n\n**Autres sources à patcher** si formules aussi nécessaires :\n- `enrich_thesaurus.py::*` : pas encore de parser math-aware (à vérifier)\n- `integrate_fiche_docx.py` : les fiches utilisent aussi des formules (à vérifier)\n\n**Historique** : violation détectée 2026-04-20 (24 parenthèses vides dans 20 termes après import des docx thesaurus_1/2_20260420.docx). Corrigé en reparse avec OMML puis restauration 45 def + 1 rt. Parser officiel mis à jour.", "type": "technique", "crit": true}, {"id": 40, "titre": "Règle absolue — ce que Jenni ne voit jamais", "contenu": "**S'applique à TOUT contenu destiné à Jenni** : prompts de documents (via export_jenni_doc.py), prompts de fiches, prompts de validation, prompts d'enrichissement du thésaurus — TOUT fichier dans recherches/ ou Publications/prompts/.\n\nAucune référence au corpus dans les prompts :\n- Pas de codes documents (S2, V1, P3, F2...)\n- Pas de \"corpus\", \"strate\", \"Le Sol Vivant cet Holobionte\"\n- Pas de renvois internes (\"voir chapitre X\", \"comme décrit dans...\")\n- Pas de méta-instructions (\"cite les sources\", \"respecte les termes\")\n- Pas de \"chaîne causale C1\", \"concept card\", \"cross-ref\", \"thésaurus\"\n- Pas de références à la DB, aux tables, aux scripts\n\nJenni ne connaît rien du corpus. Elle fait ce qu'on lui dit dans le contexte présent.\n\n**Test de conformité** : avant de générer un prompt, vérifier qu'aucun des termes suivants n'apparaît dans le texte final :\nS0, S1, S2, S3, S4, V1, V2, V3, P1, P2, P3, P4, P5, F1, F2, H1, H2, H3, corpus, strate, cross-ref, chaîne causale, concept card, thésaurus, sol_vivant.db", "type": "regle", "crit": true}, {"id": 120, "titre": "Discipline BQ-clean — prompts jamais en contact avec méta-vocab", "contenu": "## Règle absolue BQ-clean — aucune fuite de méta-vocab dans les prompts Jenni\n\n**Liste noire** (vérifier AVANT génération de tout prompt Jenni) :\n\n- Codes doc : S0-S4, V1-V3, P1-P5, F1-F2, H1-H3\n- Vocab méta-projet : `corpus`, `strate`, `cross-ref`, `chaîne causale`,\n  `concept card`, `thésaurus`, `sol_vivant.db`, `section_key`, `doc_code`\n\n**Sources des leaks** (déjà rencontrés) :\n\n1. **terms.definition** : certains termes ont des définitions qui citent\n   des doc_codes (ex: \"Voir S2 — PGPR\") — violation directe.\n   → Audit et reformulation.\n\n2. **terms.fr / en** : concepts méta tels que\n   \"Chaîne 1 — Photosynthèse → Immunité intestinale\"\n   appartiennent à `chains_causales` (table dédiée), PAS à `terms`.\n   → Supprimer du `terms` si présents.\n\n3. **prompts.titre_h2 / contexte_sci / instructions / enrichissement** :\n   fuites manuelles fréquentes (cross-ref, chaîne causale).\n   → Scan régulier toutes colonnes texte.\n\n**Vérification systématique** :\n\n```python\nFORBIDDEN = [r'\\bchaîne causale\\b', r'\\bcross-ref\\b', r'\\bconcept card\\b',\n             r'\\bsol_vivant\\b', r'Corpus Le Sol Vivant', r'\\bdu corpus\\b',\n             r'\\bdans le corpus\\b', r'\\bthésaurus\\b', r'\\bthesaurus\\b',\n             r'\\bS[0-4]\\b', r'\\bV[1-3]\\b', r'\\bP[1-5]\\b',\n             r'\\bF[12]\\b', r'\\bH[1-3]\\b']\nfor pat in FORBIDDEN:\n    matches = re.findall(pat, text, re.IGNORECASE)\n    assert not matches, f\"Leak {pat}: {matches}\"\n```\n\n**À lancer à chaque régénération** des prompts_jenni_*.txt et\nprompt_fiche_*.docx.", "type": "regle", "crit": true}, {"id": 89, "titre": "Prompts manuels — fiches, enrichissement, pédagogie (templates + destinations)", "contenu": "## Prompts manuels — fiches, validation, enrichissement\n\nLes prompts générés par `export_jenni_doc.py` suivent le masque v3.0 (BQ ID=41). Mais Claude produit aussi des **prompts manuels** pour d'autres usages : fiches de recherche, validation de cohérence, enrichissement terminologique.\n\n**Ces prompts sont AUSSI destinés à Jenni** et doivent respecter les mêmes règles
