<script id="bq-data" type="application/json">{"(sans catégorie)": {"(sans domaine)": {"nom": "(sans domaine)", "entries": [{"id": 154, "titre": "Sujets interdits dans le corpus — biodynamie, Steiner, anthroposophie", "contenu": "## Sujets interdits dans le corpus Sol Vivant\n\n### Règle absolue\n\nLe corpus \"Le Sol Vivant cet Holobionte\" est un corpus **scientifique**. Certains courants ou doctrines **pseudoscientifiques** ne doivent pas y apparaître comme références constructives (définitions qui s'appuient dessus, relations qui les valorisent, citations qui les adoptent).\n\n### Liste noire (à date)\n\n- **Biodynamie** (Rudolf Steiner, 1924)\n- **Anthroposophie** (doctrine source de la biodynamie)\n- **Préparations biodynamiques** (BD 500-507 : bouse en corne, achillée en vessie, etc.)\n- **Calendrier lunaire biodynamique**\n- Par extension, toute doctrine ésotérique présentée comme technique agricole validée\n\n### Ce qui est autorisé\n\n- **Contre-exemple pédagogique** : mentionner la biodynamie comme illustration d'une dérive pseudoscientifique, dans une section **dédiée et explicitement critique** (ex. un encadré \"pièges épistémiques\"). Doit rester exceptionnel et marqué.\n- **Flag `flag_pseudoscience=1`** sur un terme isolé (mais pas utilisé comme hyperonyme/rt pour des termes scientifiques).\n\n### Ce qui est interdit\n\n- Définition d'un terme scientifique qui **attribue son origine** ou **donne comme référence principale** la biodynamie / Steiner.\n- Relations `BT`/`RT` entre un terme scientifique et un terme pseudoscientifique (ex : Capital biologique --RT--> Agriculture Biodynamique).\n- Citations bibliographiques sur préparations biodynamiques utilisées dans une fiche scientifique.\n- Tout doublon d'un concept scientifique avec une version pseudoscientifique (ex : \"L'Organisme-Ferme\" thermodynamique **vs** \"l'Organisme-Ferme\" steinerien).\n\n### Process de vigilance\n\nÀ lancer avant tout import massif (export Jenni, analyse corpus, création fiche) :\n\n```sql\n-- Termes\nSELECT id, fr, doc_code, definition, flag_pseudoscience\nFROM terms\nWHERE lower(fr) LIKE '%biodynam%'\n   OR lower(definition) LIKE '%biodynam%'\n   OR lower(definition) LIKE '%steiner%'\n   OR lower(definition) LIKE '%anthroposoph%';\n\n-- Relations\nSELECT id, from_term_id, rel_type, to_term_id, to_term_text\nFROM term_relations\nWHERE lower(to_term_text) LIKE '%biodynam%'\n   OR lower(to_term_text) LIKE '%steiner%'\n   OR lower(to_term_text) LIKE '%anthroposoph%';\n\n-- Sources Jenni\nSELECT id, doi, auteurs, annee, titre_court\nFROM jenni_sources\nWHERE lower(titre_court) LIKE '%biodynam%'\n   OR lower(titre_complet) LIKE '%biodynam%'\n   OR lower(auteurs) LIKE '%steiner%';\n\n-- Sections (prompts), concept_cards, fiches : mêmes recherches textuelles\n```\n\nLe terme `flag_pseudoscience=1` dans le thésaurus reste la trace technique, mais cette BQ est la **doctrine visible** au démarrage de session via `session_start.py --db sol_vivant.db`.\n\n### Incident de référence — 2026-04-23\n\nAudit corpus complet (`analyse_corpus.py --type complet`). La passe T2 détecte un doublon `L'Organisme-Ferme` :\n- **#1158 (F)** — définition thermodynamique scientifique (Ikerd, Tello et al.) — **propre**\n- **#214 (F2)** — définition steinerienne (\"concept central de l'agriculture biodynamique, formulé par Rudolf Steiner en 1924\") — **contaminée**\n\nContamination associée :\n- Terme **#160 \"Agriculture Biodynamique\"** (F1/F2), flag_pseudoscience=1, déf détaillant les préparations BD 500-507\n- Relation **#168 Capital biologique --RT--> #160** (valorisation croisée)\n- Relations depuis #214 vers \"Rudolf Steiner\", \"Autosuffisance\" (concepts anthroposophiques)\n- Source **jenni_sources #404 Pettinelli 2023** \"Is there any influence of biodynamic preparation 501...\"\n\nCorrectif appliqué (2026-04-23) :\n- `DELETE FROM terms WHERE id IN (160, 214)` → 2 termes supprimés\n- `DELETE FROM term_relations WHERE from_term_id IN (160, 214) OR to_term_id IN (160, 214)` → ~11 relations supprimées\n- #1158 \"L'Organisme-Ferme\" (F) conservé comme source unique\n\nSource js#404 et citation dans fiche #33 : arbitrage séparé JMJ (référence bibliographique utilisée par §3.11 d'une fiche intégrée).\n\n### Corollaire — contrôle de nouveaux imports\n\nTout nouvel import (Jenni, enrichissement thésaurus, nouvelle source) qui ramène biodynamie/Steiner sans marqueur critique explicite doit être **rejeté à l'import** ou **flaggé** pour validation manuelle JMJ.\n\n### Faux positifs à ne pas traiter\n\nLes requêtes SQL de vigilance ci-dessus remontent des occurrences légitimes qui ne sont **pas** des contaminations :\n\n- **Steinernema** — genre de nématodes entomopathogènes (*Steinernema carpocapsae*, *S. feltiae*). Utilisé en protection biologique. Cf. card #91 IPMO.\n- **Auteurs nommés Steiner** — nom de famille scientifique courant (ex. Steiner 2019 agronomie soja brésilien, Steiner dans études basalt / enhanced weathering). Ne rien faire si le contexte est bibliographique strict.\n- **Système de Steiner** en mathématiques / autres contextes non-agricoles.\n\nRègle : ne purger que si le contexte est **agricole + doctrinal** (préparations biodynamiques, anthroposophie, calendrier lunaire, \"organisme-ferme\" steinerien, etc.). Avant toute suppression, lire le contexte et confirmer.\n", "type": "doctrine", "crit": true}]}}, "corpus": {"concept-cards": {"nom": "Cartes de concept", "entries": [{"id": 151, "titre": "pedago_links — table générique entité ↦ concept_card (passerelle pédagogique)", "contenu": "## pedago_links — table générique de liens « entité ↦ concept_card »\n\n**Mécanisme** : table normalisée, FK vers `concept_cards`, qui permet de\nproposer pédagogiquement à l'utilisateur, à côté de toute entité du corpus\n(fiche, doc de strate, règle C/N, terme, matière), les concept cards\nles plus pertinentes pour aller plus loin.\n\n### Schéma\n\n```sql\nCREATE TABLE pedago_links (\n    id          INTEGER PRIMARY KEY AUTOINCREMENT,\n    entity_type TEXT NOT NULL CHECK(entity_type IN ('fiche', 'doc', 'regle', 'terme', 'matiere')),\n    entity_id   INTEGER NOT NULL,\n    card_id     INTEGER NOT NULL REFERENCES concept_cards(id) ON DELETE CASCADE,\n    role        TEXT NOT NULL DEFAULT 'reference' CHECK(role IN ('primaire', 'reference', 'passerelle')),\n    ordre       INTEGER NOT NULL DEFAULT 0,\n    motif       TEXT,\n    created_at  TEXT NOT NULL DEFAULT CURRENT_TIMESTAMP,\n    UNIQUE(entity_type, entity_id, card_id)\n);\nCREATE INDEX idx_pedago_links_entity ON pedago_links(entity_type, entity_id);\nCREATE INDEX idx_pedago_links_card   ON pedago_links(card_id);\n```\n\n**entity_id** :\n- pour `fiche` → `fiches.id`\n- pour `doc`   → `documents.ROWID` (car PK = `code` TEXT, on stocke le ROWID INTEGER stable)\n- pour `regle` → `refs.legacy_id` (cn_regle ; même convention que mo_calc)\n- pour `terme` → `terms.id`\n- pour `matiere` → `refs.id`\n\n### Pourquoi une table et pas un JSON dans la colonne data\n\n- **FK = updates propagés** : si une card est désactivée/renommée, la jointure\n  active reste cohérente (on filtre `status='active'`). Un JSON figé pointerait\n  vers un ID qui n'existe plus.\n- **Vues inverses** : `SELECT entity_type, entity_id FROM pedago_links WHERE card_id=N`\n  donne instantanément « qui pointe vers cette card », utile pour l'audit.\n- **Évolution** : ajouter un nouvel entity_type est une simple modif du CHECK,\n  rien à migrer dans 50 colonnes JSON.\n\n### Workflow d'alimentation\n\n```\n1. tools/admin/pedago_links_suggest.py --entity fiche|doc\n   → audit_reports/pedago_links_proposed_<entity>_<date>.{md,json}\n   Score Overlap pondéré IDF + bonus titre :\n     - 70% recall(card_title, fiche_title)\n     - 30% recall(card_title, fiche_full)\n   Tokenizer : split sur '/' '-', stem singulier/pluriel, seuil 3 chars\n   (acronymes CEP/NPK/AMG indispensables).\n\n2. (Validation JMJ — édition manuelle du JSON si besoin)\n\n3. tools/admin/pedago_links_apply.py --json <rapport.json> --entity-type fiche|doc\n   → INSERT en bloc, role='primaire' pour top1 si score >= --primary-min,\n     role='reference' pour suivants si score >= --reference-min,\n     max --max-per-entity liens par entité.\n   --dry-run pour preview, --replace pour repartir de zéro.\n\n4. python3 tools/regen_all.py --db sol_vivant.db\n   → cahier.html, index.html (docs strates), pages outils via build_comprendre_data\n     affichent automatiquement le bloc « Pour aller plus loin — Concept Cards (N) »\n     juste avant Sources, sous chaque entité.\n```\n\n### Rendu côté front\n\nBloc `SvCollapse title='Pour aller plus loin — Concept Cards (N)' icon='🧭'`\ncontenant une liste verticale de liens vers `concept_cards.html#card-N` avec :\n- badge **#N** colorié selon `role` (info pour primaire, gris pour reference)\n- titre de la card\n\nPrésent actuellement dans :\n- **cahier.html** (sous chaque fiche déployée, via `gen_cahier.py`)\n- **index.html** (sous chaque doc strate, via `gen_web.py`)\n- **mo_calculateur.html** (sous chaque règle C/N via `cards_pedago` dans\n  `refs.cn_regle.data` — pré-existant, pattern complémentaire à pedago_links)\n- pages outils via `build_comprendre_data` (sections `fiche` enrichies)\n\n### Cas d'usage futurs\n\n- **Étendre** à `entity_type='regle'` (déjà fait dans cards_pedago via JSON,\n  à migrer vers pedago_links pour homogénéité)\n- **Étendre** à `entity_type='terme'` (un mot-clé ↦ cards qui le détaillent)\n- **Étendre** à `entity_type='matiere'` (matière MO ↦ cards minéralisation/immo)\n- **Audit hub** : `SELECT card_id, COUNT(*) FROM pedago_links GROUP BY card_id`\n  → cards qui sont les nœuds pédagogiques majeurs du corpus\n- **Cards orphelines** : `SELECT id FROM concept_cards WHERE id NOT IN\n  (SELECT card_id FROM pedago_links)` → cards jamais référencées comme\n  passerelle pédagogique, candidates à archivage ou enrichissement\n\n### Premier passage (2026-04-23)\n\n- 85 liens fiches (23 primaires + 62 références sur 34 fiches `integre*`)\n- 26 liens docs (8 primaires + 18 références sur 18 docs)\n- TOTAL : 111 liens\n- Cards-hubs émergentes : #55 Cycle eau (8), #68 M-genes (7),\n  #69 Mémoire transgénérationnelle (7), #31 Cycle N (5), #53 Cycle P (5)\n\n### Règle absolue\n\nToujours **passer par `pedago_links_suggest.py` puis `apply.py`** plutôt que\nd'éditer les liens à la main : le scoring est tracé via `motif`, et la\nreproductibilité (ré-exécuter sur un corpus enrichi) est garantie. Les\nexclusions manuelles s'éditent dans le JSON proposé avant `apply`.\n", "type": "doctrine", "crit": true}, {"id": 153, "titre": "LiFoFer — position pédagogique du corpus sur le repiquage (pas une règle universelle)", "contenu": "**Préambule** : il n'y a pas de règle universelle sur la réactivation/repiquage en LiFoFer. Chaque praticien adapte selon son échelle, son matériel et ses contraintes. La position ci-dessous est celle **retenue pour le corpus** (cohérence pédagogique), elle n'arbitre pas les pratiques.\n\n---\n\n### Variantes mondiales reconnues — le corpus n'arbitre pas\n\nLa fermentation appliquée à l'agroécologie a des traditions locales multiples, chacune avec ses ratios, ses substrats, ses cycles d'activation et de réactivation. Quelques exemples reconnus :\n\n- **LiFoFer** (Terre & Humanisme, France) — litière forestière + son + petit-lait + mélasse\n- **MM (Microorganismos de Montaña)** (Costa Rica, Amérique centrale/Sud) — humus de forêt + son + mélasse, activation liquide ciblée 5-9 j (champignons/bactéries selon usage feuille ou sol)\n- **Super Magro** (D. Pinheiro Machado, Brésil ; large diffusion en Afrique) — biofertilisant multi-éléments, fumier frais + cocktail minéral (Zn, Mn, B, Co, Cu, Mg, Ca…) fermenté ~30 j\n- **KNF / Korean Natural Farming** (Cho Han-Kyu, Corée) — IMO, FPJ, FFJ, OHN, LAB collectés de niches précises\n- **JADAM** (Cho Youngsang, Corée) — version simplifiée et low-cost du KNF\n- **Bokashi** (Japon, EM-Kyusei) — son + EM commercial, fermentation rapide\n\nAucune de ces pratiques n'est universellement supérieure ; chaque culture a optimisé pour son climat, ses ressources locales, son échelle. **Le corpus retient T&H comme référence pédagogique** parce que :\n1. Documentation accessible en français, datée et reproductible\n2. Pratique JMJ sur 4 ans validée\n3. Ratios cohérents avec les principes physiologiques généraux de la lacto-fermentation\n\nPour les autres traditions (MM, Super Magro, KNF…), le corpus renvoie aux sources de chaque école sans prétendre arbitrer les divergences.\n\n**Variante française — fermentation lactique de plantes** : en parallèle de l'activation liquide LiFoFer, certains praticiens français fermentent des plantes (ortie, consoude, prêle, fougère, achillée…) selon le **même principe lactique anaérobie**. C'est une variante des **purins classiques** mais avec un mécanisme bien différent :\n- **Purins classiques** = putréfaction anaérobie (pH neutre/alcalin, odeurs ammoniacales, dégradation par bactéries protéolytiques)\n- **Fermentation lactique de plantes** = acidification rapide < pH 4.5, conservation longue (mois/années), peu d'odeurs, biomasse LAB intégrée\n\nCette variante combine les bénéfices de la LiFoFer (inoculum LAB stable) avec les principes actifs des plantes (silice, alcaloïdes, dérivés salicylés…). Cohérente avec le reste de la pratique, elle reste une adaptation locale parmi d'autres.\n\n### Les pratiques dépendent de l'usage ciblé\n\nLa recette, la dilution, la fréquence d'application et le choix de repiquer ou non dépendent directement de **l'usage final** :\n\n- **Application foliaire** (pulvérisation sur feuilles) — biostimulation + défense. Dilution typique 1:100 à 1:500. Nécessite une biomasse microbienne vivante → activation récente (< 7 j après production).\n- **Destruction de couvert** (terminer un engrais vert) — la fermentation lactique acidifie et lyse les tissus végétaux, restitue C/N plus rapidement qu'un simple roulage. Doses plus concentrées (1:10 à 1:50).\n- **Litière animaux** (poulaillers, étables, porcheries) — approche type Bokashi : inoculation de la litière qui fermente sur place, réduit odeurs (NH₃, H₂S), valorise fumier. Application directe ou dilution 1:100.\n- **Biostimulants** (catégorie réglementaire UE 2019/1009 — terme propre, vs « phytothérapie » réservé au soin médical *par* les plantes, vs « phytosanitaire » confisqué par le langage réglementaire pour les pesticides) — renforcement des défenses naturelles, compétition avec pathogènes, ISR/SAR. Fermentations de plantes acides (ortie, consoude, prêle) en complément. Dilution 1:50 à 1:200.\n- **Amendement de sol** — application au sol avant travail ou semis, plus tolérant sur la fraîcheur biologique.\n\n**Conséquence sur le repiquage** : plus l'usage exige une richesse microbienne fongique (foliaire défense, biostimulants), plus la doctrine « litière fraîche à chaque batch » est importante. Pour un usage amendement de sol ou litière animaux, un repiquage modéré est moins critique car l'écosystème sol/litière réensemence ensuite.\n\n---\n\n\n---\n\n## Pourquoi pas de réactivation / repiquage en série (LiFoFer, bokashi, KNF, MM)\n\nPosition corpus : une LiFoFer se refait toujours **à partir de litière forestière fraîche** pour la phase solide. Le repiquage de la phase liquide est tolérable à la rigueur (gros exploitants).\n\n### Argument principal — appauvrissement progressif\n\nCertains guides (notamment *Recettes-Lifofer-solides-liquides-et-reactivations*, 2023) proposent de prélever une partie d'une mère pour amorcer la suivante, et de réitérer 5-6 fois. Cette pratique **dégrade** progressivement le produit pour deux raisons :\n\n**1. Sélection des rapides au détriment de la diversité**\nLa valeur d'une LiFoFer est dans l'**inoculum massif et diversifié** apporté par la litière fraîche : milliers d'espèces de bactéries, levures, champignons, archées en coexistence. En repiquant depuis une mère, on ne récupère que la fraction végétative active (majoritairement LAB — *Lactobacillus*, *Leuconostoc*, *Pediococcus*) qui a dominé la fermentation. Chaque repiquage resserre le cortège sur les souches les plus compétitives en conditions anaérobies acides.\n\n**2. Les spores ne se multiplient pas — argument décisif**\nPendant la fermentation lactique anaérobie, les spores (champignons, actinomycètes, bactéries sporulantes comme *Bacillus* ou *Clostridium*) restent en état **dormant**. Elles ne se multiplient pas dans le milieu acide/anaérobie. Au repiquage, on transfère donc surtout la biomasse LAB active, peu de spores. Après 5-6 repiquages, le pool de spores est mécaniquement **appauvri** par dilution (chaque mère contient 1/Nᵏ des spores initiales, où N est le facteur de dilution et k le nombre de repiquages).\n\nRésultat : une mère de 6ᵉ génération a perdu l'essentiel de son **patrimoine fongique** (mycélium, spores actinomycètes) même si elle reste vigoureuse en activité LAB.\n\n### Nuance : gros exploitants\n\nLa doctrine « litière fraîche à chaque batch » s'applique strictement à l'échelle artisanale (60-220 L). Pour de **gros exploitants** qui produisent en fûts 220 L de mère puis en IBC 1000 L, le coût logistique de refaire à zéro à chaque cycle peut justifier un repiquage limité — en gardant à l'esprit la perte de diversité.\n\n**Phase liquide activée** : tolérable à la rigueur. La liquide a déjà perdu une part de la biodiversité solide (sélection durant la phase d'activation), et certains usages (foliaire, fertirrigation) ne nécessitent pas la richesse fongique complète.\n\n**Phase solide (mère)** : refus catégorique du repiquage en série — c'est là que le patrimoine fongique compte le plus.\n\n### Doctrine opérationnelle\n\n- Échelle artisanale : **toujours repartir d'une litière forestière fraîche** à chaque batch de mère.\n- Échelle industrielle (IBC 1000 L) : repiquage liquide acceptable, repiquage solide à éviter.\n- Sur 4 ans de pratique JMJ (60-220 L) : litière fraîche = résultats reproductibles et constants.\n\n### Ce qu'on peut réutiliser sans repiquage en série\n\n- La **mère solide** : un même batch peut servir plusieurs activations liquides (prélever 5% à chaque fois).\n- La **liquide activée** : peut s'appliquer pendant 1-2 semaines après production (au-delà, qualité décroît).\n\n### Références\n\n- Terre & Humanisme, *Guide LiFoFer* (valeurs retenues — cf. lifofer_recettes en DB)\n- *Recettes-Lifofer-solides-liquides-et-reactivations.pdf* (2023) : proposition de repiquage 5-6 fois — **position corpus : non pour la solide, à la rigueur pour la liquide chez les gros exploitants**.\n\n\n### Note éditoriale — réglementation PNPP\n\nLa réglementation française PNPP (Préparations Naturelles Peu Préoccupantes, Code rural art. L253-1, liste positive ANSES) et le règlement UE 2019/1009 (biostimulants) encadrent strictement la commercialisation de ce type de préparation. Les recettes LiFoFer/MM/Bokashi en tant que tels ne figurent pas dans la liste positive ANSES.\n\n**Position éditoriale du corpus** (responsabilité assumée par JMJ) : les recettes sont publiées à des **fins pédagogiques** pour usage personnel à la ferme, sans aucune visée commerciale. Le corpus n'est pas un avis juridique et chaque praticien reste responsable de la conformité de son usage selon son contexte (autoconsommation vs vente, ferme vs jardin, plantes traitées, etc.). Ces recettes sont par ailleurs **largement diffusées** dans la sphère agroécologique francophone (livres T&H grand public, chaînes YouTube, MOOC paysans, formations Maraîchage Sol Vivant…) — le corpus en propose une compilation pédagogique cohérente, sans diffuser d'information non publique. Enfin, le corpus **ne vend rien et ne promet rien** — aucun produit n'est commercialisé, aucune allégation sanitaire (efficacité contre maladie/ravageur, rendement garanti, etc.) n'est faite. Le corpus reste hors du périmètre opérationnel de la réglementation PNPP, qui cible la commercialisation et la communication promotionnelle de préparations à usage phytosanitaire.\n", "type": "doctrine", "crit": false}, {"id": 106, "titre": "Concept cards — filtre de rigueur (« une affirmation bancale ne passe pas »)", "contenu": "## Concept cards — système de filtre de rigueur\n\n> **« Une affirmation bancale ne passe pas dans le corpus. »** (règle absolue JMJ)\n\nLes `concept_cards` sont l''**outil de filtre** qui garantit la qualité scientifique du corpus *Le Sol Vivant cet Holobionte*. Toute hypothèse captée — qu''elle vienne d''une note de vulgarisation, d''une intuition de lecture, d''un audit ou d''une fiche en construction — doit passer la confrontation aux dimensions conceptuelles et aux tests terrain avant d''être intégrée.\n\n### Position dans le workflow\n\n```\nCaptation (notes, lectures, intuitions)\n   ↓\nHypothèse formulée\n   ↓\n┌─────────────────────────────────────────────┐\n│ FILTRE concept_cards :                      │\n│   - Création/affinement de la carte         │\n│   - Positionnement dimension                │\n│   - Confrontation autres dimensions         │\n│   - Confrontation concept_card_tests        │\n│   - Cohérence corpus                        │\n└─────────────────────────────────────────────┘\n   ↓                            ↓\n✗ bancale                    ✓ solide\n   ↓                            ↓\narchive (mémoire de rejet)   active\n                                ↓\n                         Alimentation possible :\n                          - terms (nouveau terme canonique)\n                          - fiches (zoom proactif)\n                          - validations (confirmation/comblement)\n                          - prompts.contexte_sci/.enrichissement\n```\n\n### Architecture (tables existantes)\n\n#### `concept_dimensions` (12 axes)\n\n| ID | Dimension | Description |\n|---|---|---|\n| 1 | Cadre — Eau | Eau facteur limitant, modes d''application |\n| 2 | Cadre — Redox | Gradients redox, microzones, redox ladder |\n| 3 | Cadre — Économique | Coûts réels, énergie, filières |\n| 4 | Cadre — Socio-économique | Travail, filières, risques |\n| 5 | Cadre — Évolutif | Temporalité, évolution anaérobie→aérobie |\n| 6 | Types de sols | Comportements différenciés par texture |\n| 7 | Histoire | Histoire des sols : désastres et réussites |\n| 9 | Symptôme — MO/Hydrique | Stress MO, redox, stratégies adaptatives |\n| 10 | Symptôme — Structure | Compaction, asphyxie, diagnostic |\n| 11 | Pratique | ACS, diagnostic terrain, interventions |\n| 12 | Cycle | Cycles biogéochimiques (N, P, C, S...) |\n| 13 | Continuum | Continuum sol-plante-humain, résistome |\n\n#### `concept_cards`\n\n```sql\nCREATE TABLE concept_cards (\n    id           INTEGER PRIMARY KEY,\n    dimension_id INTEGER REFERENCES concept_dimensions(id),\n    title        TEXT,\n    description  TEXT,\n    scope_type   TEXT,\n    scope_ref    TEXT,\n    status       TEXT DEFAULT ''archive'',  -- active | archive\n    docs_codes   TEXT,    -- JSON [doc_code, ...]\n    sections     TEXT,    -- JSON [section, ...]\n    adapted      INTEGER, -- 0=archive brut, 1=adapté cartographie v2\n    source       TEXT,\n    category     TEXT,\n    notes        TEXT,\n    created_at   TEXT\n);\n```\n\n#### `concept_card_tests`\n\n```sql\nCREATE TABLE concept_card_tests (\n    card_id   INTEGER REFERENCES concept_cards(id),\n    test_id   INTEGER REFERENCES terrain_tests(id),\n    relevance REAL,\n    usage     TEXT,\n    PRIMARY KEY (card_id, test_id)\n);\n```\n\n→ Liens **carte ↔ test terrain** pour validation empirique. C''est l''ancrage qui empêche l''abstraction pure.\n\n### Cycle de vie\n\n```\n[création]\n  - Nouvelle hypothèse à tester (souvent issue d''une note vulga ou d''une lecture)\n  - Création d''une carte avec dimension, scope, description\n  - statut = ''archive'' par défaut\n   ↓\n[confrontation]\n  - Recherche de tests terrain pertinents → ajout dans concept_card_tests\n  - Vérification cohérence avec autres cartes de la même dimension\n  - Vérification cohérence avec corpus existant (docs_codes, sections)\n   ↓\n[verdict]\n  - ✓ Solide → status = ''active'' + adapted = 1 (cartographie v2) → utilisable\n  - ✗ Bancale → reste en archive (mémoire de rejet)\n   ↓\n[exploitation aval]\n  - Cartes ''active'' alimentent : terms, fiches, validations, prompts\n```\n\n### État actuel (2026-04-10)\n\n| Statut | Cartes | Notes |\n|---|---|---|\n| `active` | 4 | Toutes en dimension Cadre — Eau |\n| `archive` | 48 | Hypothèses non passées ou non encore confrontées |\n| Adaptées cartographie v2 | 4 | Sur 52 (8%) |\n\n**Observation** : le système concept_cards a été mis en place mais s''est mis en sommeil. Lourde réserve de matière à reprendre, mais ce n''est **pas urgent** — décision reportée à une phase ultérieure. Tant que la table existe et reste cohérente avec ce document, on peut la rebrancher quand on voudra.\n\n### Règles d''usage (à respecter)\n\n1. **Toute pépite captée dans une note volante** (BQ #102) doit créer ou affiner une concept_card avant d''être intégrée au corpus. Pas de raccourci.\n\n2. **Toute fiche nouvelle** doit s''appuyer sur au moins une concept_card cohérente. Si aucune carte existante ne couvre le sujet → en créer une et la confronter avant de produire la fiche.\n\n3. **Une carte en `archive` n''est pas ressuscitée à la légère** : elle représente une affirmation qui n''a pas passé le filtre. Pour la passer en `active`, il faut une **nouvelle preuve** ou un nouveau test terrain qui change la donne.\n\n4. **Les concept_card_tests** sont obligatoires : une carte sans aucun test terrain associé est considérée comme une **hypothèse abstraite non vérifiée** — elle ne peut pas alimenter le corpus tant qu''elle n''est pas reliée à au moins un test.\n\n5. **Si Claude utilise les concept_cards dans une analyse**, il doit le mentionner explicitement dans ses recommandations (« basé sur la carte #X dimension Y, status active, tests Z »). Pas d''affirmation orpheline sans ancrage.\n\n### Lien avec les notes volantes (BQ #102)\n\nLa règle des pépites de BQ #102 (« ne pas écarter la vulgarisation trop vite ») est complétée par cette règle des concept_cards :\n\n> **Trouver une pépite ne suffit pas. La pépite doit passer le filtre concept_card avant d''entrer dans le corpus.**\n\nC''est ce double processus (largeur de captation × rigueur de filtrage) qui garantit que le corpus s''enrichit sans se polluer.\n\n---\n\n## Navigation et utilisation (ajout session 2026-04-11)\n\n### Les 5 rôles des concept_cards\n\nLe système concept_cards n'est pas seulement un filtre de rigueur — il est un **artefact multi-rôle** :\n\n| Rôle | Description | Utilisateur principal |\n|---|---|---|\n| **1. Filtre de rigueur** | Gate en amont des fiches/validations/termes. Bloque les affirmations bancales. | Claude (production) |\n| **2. Navigation interne** | Cartes reliées par `concept_card_links` et `concept_card_tests`. Permet la traversée sémantique du corpus. | Claude (consultation) |\n| **3. Diagnostic terrain** | Cartes symptômes (#33-#42), profils sols (#11-#16), tests terrain (`terrain_tests`). Entrée par observation de terrain. | Agronomes, praticiens |\n| **4. Pédagogique** | Cards structurées en arbre de décision, conditions numérotées, cas documentés. Consommables par utilisateurs finaux. | Étudiants, formateurs |\n| **5. Audit / stress-test** | Éprouver le corpus : confronter chaque affirmation aux cartes, détecter les faiblesses et contradictions. | Claude (audit), JMJ |\n\n### Tables impliquées\n\n| Table | Rôle | Lignes |\n|---|---|---|\n| `concept_dimensions` | 12 axes de pensée | 12 |\n| `concept_cards` | Cartes proprement dites | 56 (post-migration v2) |\n| `concept_card_tests` | Liaison cartes ↔ tests terrain | 33 |\n| `concept_card_links` | Réseau inter-cartes (types: completes, contradicts, prerequisite, derives_from, related_to, supersedes, example_of) | 32 (amorçage) |\n| `terrain_tests` | 20 tests de terrain (VESS, infiltration, bocal, etc.) | 20 |\n\n### Répartition post-migration v2 (2026-04-11)\n\n| Dim | Nom | Cartes |\n|---|---|---|\n| 1 | Cadre — Eau | 1 |\n| 2 | Cadre — Redox | 1 |\n| 3 | Cadre — Économique | 1 |\n| 4 | Cadre — Socio-économique | 1 |\n| 5 | Cadre — Évolutif | 5 |\n| 6 | Types de sols | 7 |\n| 7 | Histoire | 1 |\n| 9 | Symptôme — MO/Hydrique | 5 |\n| 10 | Symptôme — Structure | 10 |\n| 11 | Pratique | 8 |\n| 12 | Cycle | 6 |\n| 13 | Continuum | 6 |\n\n### Migration v1 → v2 (session 2026-04-11)\n\n**Contexte** : 48 des 52 cartes initiales étaient en `status='archive'` avec source `legacy_v1_to_review` ou `base_obsolete_v1`. Seules 4 cartes (dim Cadre—Eau, source `analyse_fiches`) étaient `active`. La dim 1 (Cadre—Eau) servait de fourre-tout : 12 de ses 13 cartes appartenaient à d'autres dimensions.\n\n**Actions réalisées** :\n1. Correction dimension de 12 cartes mal placées (dim 1 → dim correcte)\n2. Activation massive des 48 cartes archive → active (adapted=1)\n3. Réécriture de 3 cartes touchées par la session (#11 sableux, #14 calcaire, #38 faim d'azote)\n4. Création de 4 nouvelles cartes (#60-#63)\n5. Tissage initial de 32 `concept_card_links`\n\n**Résultat** : 56 cartes actives, 0 archive, réseau amorcé.\n\n**Post-migration archive = rejet.** Dorénavant, une carte en `archive` signifie explicitement \"hypothèse rejetée\" (mémoire de rejet, pas legacy en attente).\n\n### Règles d'accès pour Claude (claude_rules)\n\n- `audit_cards_first` : AVANT toute création de terme/carte/fiche/validation, Claude DOIT lancer un audit `SELECT ... FROM concept_cards WHERE ...` sur les keywords du domaine concerné\n- `bq_access` : AVANT toute décision structurelle, Claude DOIT lancer `bq_query.py --search \"<keyword>\"`\n\n### Backlog outillage (identifié session 2026-04-11, non implémenté)\n\n- `bq_query.py --cards` / `--card <id>` / `--dim <nom>` : sous-commandes exploration cartes\n- `session_start.py` : ligne cartes dans le dashboard (total, par dim, orphelines)\n- `check_integrity.py --cards` : heuristique de détection de contradictions entre cartes\n- `gen_concept_cards.py` : rendering HTML/web des cartes comme outil pédagogique interactif\n", "type": "reference", "crit": true}, {"id": 112, "titre": "Concept cards — contradictions explicites uniquement (pas d'heuristique texte)", "contenu": "## Concept cards — contradictions explicites uniquement\n\n**Règle** : les contradictions entre concept cards doivent être **tissées\nexplicitement** via `concept_card_links.link_type='contradicts'`. Pas de\ndétection par heuristique texte (trop de faux positifs — cf session\n2026-04-12 où 10 faux positifs `surface/incorpor` ont été détectés dans la\ndimension Pratique alors que c'était précisément son objet).\n\n### Source de vérité\n\n```sql\nSELECT ccl.from_id, ccl.to_id, c1.title, c2.title, ccl.notes\nFROM concept_card_links ccl\nJOIN concept_cards c1 ON c1.id = ccl.from_id\nJOIN concept_cards c2 ON c2.id = ccl.to_id\nWHERE ccl.link_type = 'contradicts'\n  AND c1.status = 'active' AND c2.status = 'active';\n```\n\n### Cycle de vie d'une contradiction\n\n```\n[détection]\n  - Claude ou JMJ identifie une opposition de fond entre deux cartes actives\n    (pas un simple antonyme de vocabulaire — un désaccord doctrinal)\n   ↓\n[tissage]\n  - INSERT dans concept_card_links avec link_type='contradicts'\n  - notes = justification brève de l'opposition\n   ↓\n[arbitrage]\n  - Relecture des deux cartes + corpus + tests terrain\n  - Trois issues possibles :\n    (a) une carte est affinée/reformulée → le conflit disparaît\n    (b) une carte passe en archive → l'autre survit\n    (c) les deux restent avec un link_type='completes' + note pour expliquer\n        le contexte où chacune s'applique (fausse opposition contextuelle)\n   ↓\n[résolution]\n  - Le lien 'contradicts' est supprimé (a et b) ou remplacé par 'completes' (c)\n  - check_integrity retombe à 0 sur ce check\n```\n\n### Pourquoi pas d'heuristique texte\n\nL'heuristique testée (co-occurrence d'antonymes dans les descriptions) a\nproduit 10/10 faux positifs sur `surface`/`incorpor` dans la dim Pratique.\nRaisons :\n- la dimension Pratique traite précisément du débat surface vs incorporation\n- les cartes citent les deux termes pour distinguer les contextes, pas pour\n  s'opposer\n- le texte ne dit pas qui pose la thèse et qui l'antithèse\n\nUne contradiction réelle demande une analyse sémantique que seule la lecture\n(Claude + JMJ) peut produire. Le texte libre n'est pas une source de vérité\npour les contradictions — le tissage explicite l'est.\n\n### État au 2026-04-12\n\n- 0 lien `contradicts` en DB → check vert\n- 4 `link_type` actuellement utilisés dans `concept_card_links` : related_to\n  (101), completes (23), prerequisite (3), derives_from (2)\n- Les autres types mentionnés dans le schéma (`contradicts`, `supersedes`,\n  `example_of`) sont disponibles à l'usage\n", "type": "regle", "crit": true}]}, "chaines": {"nom": "Chaînes causales", "entries": [{"id": 144, "titre": "Chaînes causales — concept, structure, workflow", "contenu": "## Chaînes causales — concept, structure, workflow\n\nLes **chaînes causales** (`chains_causales`) sont les démonstrations narratives transverses du corpus Sol Vivant. Elles relient des mécanismes scientifiques étape par étape à travers les strates (F→S→V→P→H), rendant visible l'enchaînement causal d'un phénomène depuis sa racine jusqu'à ses conséquences globales.\n\n### Ce qu'une chaîne EST\n\n- Un **outil pédagogique transverse** : une chaîne traverse plusieurs docs et plusieurs strates, alors qu'une fiche zoome sur un point précis.\n- Un **argumentaire pour les prompts** : `prompts.contexte_sci` peut invoquer une chaîne pour illustrer une causalité de bout en bout.\n- Une **démonstration scientifique** : chaque étape doit être étayée par le thésaurus (`terms`) et la littérature interne (`jenni_sources`).\n\n### Ce qu'une chaîne N'EST PAS\n\n- Ce n'est pas une fiche (zoom ponctuel).\n- Ce n'est pas un schéma libre : chaque étape doit pointer vers un terme canonique du thésaurus.\n- Ce n'est pas un texte rédigé par Jenni : les chaînes sont rédigées par Claude/JMJ en direct (workflow spécifique, pas de cycle prompt Jenni).\n\n### Structure DB\n\n```sql\n-- Table des chaînes\nCREATE TABLE chains_causales (\n  id TEXT PRIMARY KEY,              -- C1, C2, ..., C16 (format \"C<N>\", préfixe C obligatoire)\n  titre TEXT NOT NULL,              -- \"A → B\" (flèche unicode comme séparateur)\n  docs_traverses TEXT,              -- \"P2/S4/S2/...\" (slash-joined, ordre des strates visitées)\n  valeur_ajoutee TEXT,              -- argumentaire pour les décideurs / enseignants\n  created_at TEXT\n);\n\n-- Étapes d'une chaîne (1-N)\nCREATE TABLE chain_etapes (\n  id INTEGER PRIMARY KEY AUTOINCREMENT,\n  chain_id TEXT REFERENCES chains_causales(id),\n  position INTEGER NOT NULL,        -- 1, 2, 3, ... (ordre narratif)\n  term_id INTEGER REFERENCES terms(id),  -- OBLIGATOIRE : terme pivot canonique\n  term_fr_text TEXT,                -- miroir lisible du terme (DOIT correspondre à terms.fr)\n  strate_etape TEXT,                -- F | S | V | P | H (strate de l'étape, peut différer du doc_code)\n  role_dans_chaine TEXT             -- rédaction 1-3 phrases qui LIE explicitement à la position précédente\n);\n```\n\n### Conventions (incidents 2026-04-11 → règles)\n\n1. **Numérotation** : `C<N>` uniquement (C1, C2, ..., C16). Pas de 0-padding, pas de préfixe doc.\n2. **Pas de placeholders `[XX]`** : les étapes créées en mars 2026 avaient `term_fr_text = '[P2]'` — incident résolu par la session 22 qui a rédigé C1-C6 à partir de zéro (cf. audit_reports #32).\n3. **term_id obligatoire** : une étape sans `term_id` est un bug. Le terme doit exister dans `terms` avant insertion de l'étape.\n4. **Cohérence term_fr_text ↔ term_id.fr** : `term_fr_text` est un miroir lisible. Si un terme est renommé dans `terms.fr`, re-synchroniser les étapes concernées.\n5. **Pas de préfixes parasites dans role_dans_chaine** : la session 2026-04-11 (audit #34) a retiré 13 préfixes `[P2]`, `[S4]` ajoutés par erreur lors de la rédaction automatique.\n6. **Lien narratif explicite** : chaque `role_dans_chaine` (sauf position 1) doit relier l'étape à la précédente par un verbe de liaison causale (\"→ alimente\", \"→ favorise\", \"→ transfère\").\n\n### Workflow création (pattern validé session 22)\n\nPattern `agent_runner` pour une chaîne complète (N étapes → 1 agent dédié) :\n\n1. **Préparer le contexte** (JSON par chaîne) :\n   - `titre` + `valeur_ajoutee`\n   - liste ordonnée des positions avec `doc_code` + titre du doc correspondant\n   - thésaurus filtré : pour chaque position, tous les termes dont `doc_code` contient le code doc cible (~80 candidats par position)\n2. **Lancer 1 agent par chaîne** (général-purpose, parallèle massif) avec mission :\n   - Choisir 1 terme pivot par position parmi les candidats\n   - Rédiger `role_dans_chaine` (1-3 phrases, liaison explicite à la position précédente)\n   - Maintenir cohérence narrative avec `titre` + `valeur_ajoutee`\n   - Sortir JSON strict : `{chain_id, etapes: [{position, doc_code, term_id, term_fr_text, role_dans_chaine, justification_choix}]}`\n3. **Consolider** : valider `term_id` existe, `strate_etape` cohérente, INSERT chain_etapes.\n4. **Référence de style** : pointer les agents vers les chaînes déjà rédigées (C7, C8, C9 après avril 2026, puis toutes les 16 après la session 22).\n\n### Workflow édition\n\n- **Changer un terme pivot** : UPDATE `term_id` + resynchroniser `term_fr_text` + réécrire `role_dans_chaine` si la connexion narrative change.\n- **Réordonner** : UPDATE `position`. Attention à la liaison narrative (1→2, 2→3...) qui dépend de l'ordre.\n- **Ajouter une étape** : shift des positions suivantes, puis INSERT avec le term_id canonique.\n- **Supprimer une étape** : vérifier qu'aucune `role_dans_chaine` suivante ne fait référence explicite à ce terme.\n\n### Articulation avec le corpus\n\n| Table amont/aval | Rôle | Obligatoire |\n|---|---|---|\n| `terms` | Terme pivot de chaque étape (`chain_etapes.term_id`) | Oui |\n| `documents` | Strates traversées (`chains_causales.docs_traverses`) | Oui |\n| `jenni_sources` | Étayage scientifique dans `role_dans_chaine` (via référence textuelle) | Recommandé |\n| `concept_cards` | Concept(s) renforcés par la chaîne (via `card_chain_links`) | Optionnel |\n| `fiches` | Certaines fiches transversales invoquent des chaînes | Optionnel |\n| `prompts.contexte_sci` | Les chaînes peuvent être citées comme argumentaire | Optionnel |\n\n### Requêtes utiles\n\n```sql\n-- Inventaire des chaînes\nSELECT id, titre, docs_traverses FROM chains_causales ORDER BY CAST(substr(id,2) AS INTEGER);\n\n-- Chaîne détaillée\nSELECT position, strate_etape, term_fr_text, role_dans_chaine\nFROM chain_etapes WHERE chain_id='C1' ORDER BY position;\n\n-- Audit : étapes sans term_id (bug)\nSELECT chain_id, position, term_fr_text FROM chain_etapes WHERE term_id IS NULL;\n\n-- Audit : placeholders résiduels\nSELECT chain_id, position, term_fr_text FROM chain_etapes\nWHERE term_fr_text LIKE '[%' OR role_dans_chaine LIKE '%[%]%';\n\n-- Audit : term_fr_text désynchronisé de terms.fr\nSELECT ce.chain_id, ce.position, ce.term_fr_text, t.fr\nFROM chain_etapes ce JOIN terms t ON t.id=ce.term_id\nWHERE ce.term_fr_text != t.fr;\n```\n\n### Historique et sessions de référence\n\n- **2026-03-20** : création initiale C1-C9 avec placeholders `[XX]` (jamais rédigé).\n- **2026-04-11 Session 22** :\n  - `audit_reports #32` — rédaction C1-C6 (43 étapes, 6 agents parallèles)\n  - `audit_reports #33` — création C10-C16 (7 chaînes, 56 étapes)\n  - `audit_reports #34` — harmonisation C7-C9 + retrait 13 préfixes parasites\n- **État actuel** : 16 chaînes, 121 étapes, aucun placeholder, toutes les étapes liées à un `term_id`.\n\n### Scripts consommateurs\n\n- `tools/admin/check_integrity.py` (audit placeholders + FK term_id)\n- `tools/admin/audit_opus.py` (inventaire des chaînes)\n- `tools/docs/gen_web.py` + `gen_dashboard.py` (rendu cartographie onglet \"Chaînes\")\n- `tools/docs/gen_concept_cards.py` (liens `card_chain_links`)\n- `tools/docs/gen_explorer.py` (exploration via interface web)\n", "type": "reference", "crit": true}]}}, "pipeline": {"thesaurus": {"nom": "Pipeline thesaurus", "entries": [{"id": 138, "titre": "Ne pas modifier le libelle fr canonique d'un terme existant", "contenu": "## Règle absolue — le `fr` canonique d'un terme ne se modifie JAMAIS automatiquement\n\n**Le champ `terms.fr` est la CLÉ ÉDITORIALE qui fait l'aller-retour avec Jenni.**\n\nWorkflow Jenni :\n1. On exporte une liste de termes vers Jenni (via `export_thesaurus_incomplets.py` ou `gen_prompt_thesaurus.py`)\n2. Jenni reçoit le libellé EXACT de la DB → elle le recopie verbatim dans son docx de retour\n3. On réimporte via `import_termes_jenni.py --replace` → le TERME du docx remplace/matche le terme en DB\n\n**Conséquence** : si on modifie automatiquement le `fr` en DB (casse, ponctuation, espaces, apostrophes, tirets), on crée un cycle vicieux :\n- Export : Jenni reçoit la version modifiée\n- Retour Jenni : le docx a la version modifiée (Jenni ne rétablit pas)\n- Réimport : DB reste avec la version modifiée\n- Perte définitive de la casse/ponctuation d'origine\n\n**Incident de référence — 2026-04-20** : le Chantier A (normalisation casse initiale via agents Task, commit 5970137) avait baissé la Majuscule initiale de **216 termes** (Antifragilité → antifragilité, Biofilms → biofilms, Bioturbation → bioturbation, etc.) selon une règle typographique française stricte (noms communs en min). Or Jenni écrit ces termes en Majuscule initiale (convention standard de thésaurus). Après le Chantier A :\n- Les exports envoyaient à Jenni \"antifragilité\" → Jenni retournait \"antifragilité\"\n- Le cycle a failli être définitif\n\nCorrection (commit 86408df) : restauration de la casse Jenni pour les 216 termes + migration des term_relations associées.\n\n**Interdictions absolues** :\n- ❌ Lancer un script qui modifie automatiquement la casse initiale de tous les termes\n- ❌ Normaliser les apostrophes, tirets, espaces dans le `fr` sans audit préalable de la casse Jenni\n- ❌ Appliquer une règle typographique abstraite (française, ISO 25964, etc.) au `fr` existant\n- ❌ Baser un fix sur une décision agent Task automatisée sans validation JMJ\n\n**Règles autorisées** :\n- ✅ Modifier le `fr` d'UN terme spécifique après validation explicite JMJ\n- ✅ Les agents Task peuvent CLASSIFIER / ANALYSER / COMPTER mais pas DÉCIDER d'un changement de libellé\n- ✅ Normalisations typographiques dans les champs `definition`, `syn_fr`, `syn_en`, `bt`, `rt` (qui ne font pas l'aller-retour direct avec Jenni comme clé)\n\n**Conséquence sur les scripts existants** :\n- `import_termes_jenni.py` : en mode `--replace` match par `fr` normalisé (casse/apostrophes ignorées) — OK\n- Chantier A doit être considéré comme une erreur qui ne doit JAMAIS être reproduite sur le `fr` canonique\n- Si une décision éditoriale veut changer la casse/ponctuation d'un terme : passer par JMJ + export Jenni coordonné\n\n**Pour les champs secondaires** (definition, syn_fr, syn_en, bt, rt) : les modifications (normalisation apostrophes, cleanup URLs, ajout formules OMML via parser math-aware) sont OK car ces champs ne font pas clé avec Jenni.", "type": "regle_absolue", "crit": true}, {"id": 53, "titre": "Maintenance thésaurus", "contenu": "Ajouter un terme concept :\n```sql\nINSERT INTO terms (section_key, strate, fr, en, definition, doc_code, type, statut)\nVALUES ('S2', 'S', 'terme fr', 'english term', 'Définition complète.', 'S2', 'concept', '◆');\n```\n\nAjouter un terme glossaire (support, définition courte) :\n```sql\nINSERT INTO terms (section_key, strate, fr, en, definition, doc_code, type, statut)\nVALUES ('S2', 'S', 'terme fr', 'english term', 'Définition courte.', 'S2', 'glossaire', '~');\n```\n\n**Deux types de termes :**\n- `concept` (défaut) — terme structurant du corpus avec définition complète, synonymes, INRAE, relations\n- `glossaire` — terme support apparaissant dans les relations (rt), définition courte, pas de synonymes requis\n\nRéassigner un terme :\n```sql\nUPDATE terms SET doc_code = 'S1', section_key = 'S1' WHERE id = 237;\n```\n\nFusionner un doublon :\n```sql\nDELETE FROM terms WHERE id = 238;  -- garder le plus complet\n```", "type": "commande", "crit": false}, {"id": 71, "titre": "Pseudoscience — flag et définitions factuelles", "contenu": "**Règle** : le corpus ne fait pas de publicité pour la pseudoscience.\n\n**Terme concerné** : `Agriculture Biodynamique` (ID 160, strate F, doc F1/F2)\n- Définition réécrite : factuelle, sourcée (Chalker-Scott 2013, Rienth 2024, FiBL 21 ans, MIVILUDES 2024)\n- `flag_pseudoscience = 1` dans la table `terms`\n\n**Mécanisme** :\n- La colonne `flag_pseudoscience` (INTEGER, défaut 0) permet de marquer tout terme relevant de la pseudoscience\n- Les scripts d'export (Jenni, prompts) doivent filtrer ou signaler les termes marqués\n- La définition contient un avertissement visible : ⚠ Pseudoscience\n\n**Principe** : le corpus traite d'agriculture régénératrice fondée sur la science. Les pratiques sans validation scientifique (biodynamie, électroculture, basalte magnétique) sont documentées factuellement mais jamais valorisées.\n\n**Dossier source** : `jmj/biodynamie.docx` — analyse critique complète (Steiner, préparations, MIVILUDES, infiltration INRAE, marché commercial).\n\n**Requête de contrôle** :\n```sql\nSELECT id, fr, definition FROM terms WHERE flag_pseudoscience = 1;\n```", "type": "regle", "crit": true}, {"id": 115, "titre": "Listes de termes triées alphabétiquement (règle absolue workflow Jenni)", "contenu": "## Thésaurus — listes de termes triées alphabétiquement obligatoire\n\n**Règle** : toute liste de termes envoyée à Jenni (workflow thésaurus : bloc\nde 10, complétion, redéfinition) **doit être triée alphabétiquement** sur le\nlibellé FR.\n\n### Justification\n\nObservé en conditions de production : une liste non triée (par ordre\nd'ajout, par id, ou par strate) perturbe le traitement Jenni — elle se\nperd dans la « position » dans la liste (`Dernier terme traité : X`),\nrate des termes, ou mélange les blocs de 10.\n\nAvec un tri alphabétique strict :\n- Jenni retrouve immédiatement où reprendre (« après Z comes AA »)\n- Les blocs de 10 sont prédictibles\n- Pas de dérive dans la séquence\n\n### Application côté production\n\nLes scripts qui génèrent des listes pour Jenni appliquent déjà ce tri :\n\n- `tools/jenni/export_thesaurus_incomplets.py` : `ORDER BY lower(fr)`\n- Tout nouveau script de génération de listes de termes doit suivre la\n  même convention\n\nVérif SQL standard :\n```sql\nSELECT fr FROM terms WHERE strate='S' ORDER BY lower(fr);\n```\n\nLe `lower()` garantit que la casse ne casse pas le tri (« mulch » et\n« Mulch » classés ensemble).\n\n### Format du docx de sortie\n\nListe à puces verticale, un terme par ligne, sans indication de champs\nmanquants ni formatage de consigne (cf règle « docx minimal » et charte\nde travail JMJ). Jenni applique son propre format de sortie via son prompt.\n\n### Référence\n\nRègle formalisée par JMJ le 2026-04-14 suite à observation répétée de\nconfusions Jenni sur listes non triées.\n", "type": "regle", "crit": true}, {"id": 116, "titre": "Workflow thésaurus — import, complétion, déduplication", "contenu": "## Workflow thésaurus Jenni — scripts et doctrine\n\n**Chaîne de traitement complète** d'un docx Jenni de thésaurus (format TERME/EN/DEF/SYN_FR/SYN_EN/BT/RT) :\n\n### 1. Export demande de complétion\n\nLes termes incomplets **repassent dans le workflow thésaurus standard** :\nlistes à puces en docx qui fait le round-trip avec Jenni, pas de prompt\ntexte spécifique.\n\n```bash\n# Export docx listes à puces (triées alphabétiquement, pour Jenni workflow bloc de 10)\npython3 tools/jenni/export_thesaurus_incomplets.py --db sol_vivant.db --strates F,S,V,P,H\n```\n\nSortie : `recherches/thesaurus/thesaurus_incomplets_strate_<X>_<date>.docx`\n\n**Filtre doctrine** : `flag_pseudoscience=1` exclu (les définitions des\ntermes tagués pseudoscience — Agriculture Biodynamique — sont figées et\nne doivent pas être redéfinies par Jenni).\n\nLe retour Jenni arrive en `recherches/thesaurus/thesaurus___strate_X.docx`\n(même format que les imports initiaux), ce qui permet le réimport via\n`import_termes_jenni.py --replace` (étape 2).\n\n⚠ **Déprécié** : `gen_prompt_completion.py` générait des prompts texte\n`complete_{strate}_{date}.txt`. Redondant avec le workflow docx ci-dessus.\nLes fichiers générés sont archivés dans `recherches/archives/completion/`.\n\n### 2. Import retour Jenni\n\n```bash\n# Dry-run puis apply\npython3 tools/jenni/import_termes_jenni.py --db sol_vivant.db \\\n    --docx recherches/thesaurus/thesaurus___strate_X.docx --strate X --replace\npython3 tools/jenni/import_termes_jenni.py ... --apply\n```\n\nMode `--replace` = UPDATE intégral si match unique trouvé. Sans match = INSERT.\nMultiples matches = BLOQUÉ (conflit à résoudre).\n\nContrôle anti-doublon 8 axes : fr/en cross × syn_fr/syn_en cross.\n\n### 3. Résolution conflits (bloqués multi-match)\n\n```bash\npython3 tools/jenni/resolve_import_conflicts.py --db sol_vivant.db --docx X.docx \\\n    --skip-fr \"MO,Rhizodéposition\"  # faux positifs norm()\npython3 tools/jenni/resolve_import_conflicts.py ... --apply\n```\n\n**Fonctionnalités clés** :\n- `--skip-fr` : exclut les termes dont `norm()` collisionne à tort\n  (ex: `norm(\"Mo\") = norm(\"MO\") = \"mo\"` : Molybdène vs Matière Organique)\n- Reload d'index entre chaque résolution : évite chain-collisions\n  (résoudre A peut modifier les matches de B)\n\n### 4. Déduplication périodique\n\n```bash\npython3 tools/admin/dedupe_thesaurus.py --db sol_vivant.db  # dry-run\npython3 tools/admin/dedupe_thesaurus.py --db sol_vivant.db --apply\n```\n\nFusion avec scoring qualité + migration term_relations + merge syn_fr/syn_en.\n\n### 5. Audit\n\nScript inline dans sessions : vérifier 11 axes (distribution, complétude,\nleaks méta-vocab, doublons, acronymes orphelins, pseudoscience, statut,\norphelins relations, couverture INRAE, isolation).\n\n### ⚠ Qualité éditoriale des listes — pas la taille (constat 2026-04-14)\n\nJMJ : *\"Non ça passe jusqu'à 150 tranquille, si la liste est bonne. Même\nune petite liste peut dérailler\"*.\n\nLa taille n'est PAS le facteur principal de dérive de Jenni. Elle tient\njusqu'à ~150 termes en un envoi si la liste est propre. À l'inverse, une\npetite liste mal cadrée peut aussi la faire dériver.\n\nCauses réelles de dérive (à diagnostiquer en pré-envoi) :\n\n1. **Tri erratique** — case-sensitive ASCII (COV avant Candida) cassait\n   la perception d'ordre. Corrigé par `lower(fr)` partout (commit 2026-04-14).\n2. **Termes `fr == en` (anglais déguisé)** — 140 cas dans la DB au\n   constat. Demander à Jenni de \"définir Soil Continuum Model\" en français\n   alors que le terme est en anglais la fait dériver vers une définition\n   anglaise ou une improvisation. Audit + correction au cas par cas\n   (taxons et noms propres restent identiques, vrais termes EN à traduire).\n3. **Doublons / sub-concepts mélangés** — ex : avoir \"polysaccharides\"\n   et \"EPS\" tous deux dans la liste sans hiérarchie crée de l'ambiguïté\n   (Jenni redéfinit l'un en référence à l'autre, génère des conflits).\n4. **Termes mal cadrés** — entrées historiques imprécises ou avec\n   méta-vocab résiduel.\n\n**Solution prioritaire** : qualité de la liste avant envoi, pas\nfragmentation forcée.\n\nLe script `export_thesaurus_incomplets.py` accepte `--max-per-batch=N`\nen option (défaut 0 = pas de fragmentation) — à utiliser uniquement en\ncas de dérive avérée comme palliatif.\n\n### Tri alphabétique strict (constat 2026-04-14)\n\nTous les exports `ORDER BY fr` sont passés à `ORDER BY lower(fr)` pour\néviter le tri ASCII case-sensitive (qui mettait majuscules d'abord puis\nminuscules — ex : COV, CUE, Candida au lieu de Candida, COV, CUE).\n", "type": "commande", "crit": true}]}, "fiches": {"nom": "Pipeline fiches", "entries": [{"id": 69, "titre": "Fiches — définition et taxonomie", "contenu": "## Fiches — définition et taxonomie\n\n### Définition canonique\n\n> **Une fiche est un zoom d'un point précis du corpus.**\n\n- **Zoom** : approfondissement, focalisation sur un sujet circonscrit\n- **Un point** : un taxon, un mécanisme, une technique, un concept, une controverse\n- **Du corpus** : la fiche s'ancre dans un ou plusieurs documents de strate existants, et enrichit leurs `prompts.contexte_sci`/`.enrichissement` après intégration\n\n### Ce qu'une fiche EST\n\n- Travail proactif d'élargissement ciblé sur un point pertinent du corpus\n- Sujet souvent transversal (touche plusieurs strates) sans appartenir à une seule\n- Document autonome, lisible hors contexte interne (Jenni ne sait rien du corpus)\n\n### Ce qu'une fiche N'EST PAS\n\n- Une validation d'affirmation ou de chaîne causale → table `validations`\n- Un comblement de lacune audit → `validations` (mode renforcement/comblement)\n- Un fourre-tout de notes vrac\n- Un dépôt méta-commenté par Claude (« Le corpus contient désormais… »)\n- Une analyse croisée trop large qui chevauche un doc de strate (= à absorber dans le doc concerné)\n\n### Sous-types (`fiches.type`)\n\n| Type | Usage | Structure attendue |\n|---|---|---|\n| `transversale` | Relie plusieurs strates autour d'un concept ou d'une controverse (cascade E0-E5, trophobiose, controverse CMN Karst, etc.) | Title + Intro + 6-7 H1 body + Résumé + Références |\n| `zoom` | Approfondissement ciblé sur un point précis (ex : Kirkby/AMG) | Même structure, généralement 5-6 H1 body |\n| `technique` | Protocole DIY ou méthode de mesure (KNF, chélation AA, Rhodopseudomonas) | Charte dédiée : 8 sous-blocs H2 par section — voir BQ `charte_fiches_techniques_diy` |\n\n### Tables du modèle\n\n- **`fiches`** : métadonnées (slug, titre, type, strates, docs_cibles, statut, version, dates)\n- **`fiche_sections`** : structure et contenu par section (ordre, type, titre, `contenu` — nouveau canon, `contexte_sci`/`instructions` — legacy brouillon)\n- **`fiche_contenus`** : une ligne par fiche (UNIQUE), champs `contenu_integre` (blob markdown issu du retour Jenni intégré), `refs` (JSON liste d'entrées APA), `notes_claude`, `date_import`\n- **`source_usages`** : FK vers `jenni_sources` quand la fiche cite des refs déjà en DB (évite redondance)\n\n### Champs et tables dépréciés (**ne pas utiliser**)\n\n- `fiches.prompt_jenni` : legacy mort, plus lu par `export_fiche.py` depuis v2.0. À vider si rencontré.\n- `fiches.sources_dois`, `fiches.notes_editoriales_h2` : supprimés en 2026-04.\n- `fiche_section_h2_notes` : **table dépréciée** (64 rows historiques conservées). Le workflow granulaire H2 est remplacé par la structure `fiche_sections` avec `type='body_h2'`.\n- `fiche_contenus.contenu_brut`, `fiche_contenus.version` : supprimés en 2026-04.\n\n### Cycle de vie (`fiches.statut`)\n\n```\na_faire          → créée en DB avec docs cibles + objet\nen_cours         → Claude rédige le brouillon ou peaufine les sections\nenvoye           → docx généré, donné à Jenni comme document de travail\nrecu             → docx retour Jenni récupéré dans docx/<slug>.docx\nintegre          → retour intégré en DB, statut nominal final\nintegre_extrait  → statut transitoire utilisé pour les fiches dont seuls termes/refs ont été extraits (sans intégration complète du contenu)\nintegre_partiel  → intégration incomplète, gate OK avec warnings (ex : fiche technique sans protocole testé)\narchive          → terminé, sort de la vue active\n```\n\n### Lien avec la production du corpus\n\nUne fiche `integre` nourrit les `prompts.contexte_sci`/`enrichissement` des documents de strate cibles via la propagation optionnelle (étape finale de l'intégration). Tant qu'une fiche pertinente reste à produire sur un sujet, le doc cible concerné n'est pas en `pret_a_rediger`.\n\n### BQ complémentaires\n\n- `wf_fiche_production` — workflow de production d'une fiche (brouillon → docx → envoi Jenni)\n- `wf_fiche_integration` — intégration consciente du retour Jenni (parse → apply → phase 4bis propagation)\n- `charte_fiches_techniques_diy` — charte spécifique aux fiches `type='technique'`\n- `redaction_documents_jenni` (BQ #146) — règles unifiées de rédaction pour tout document Jenni\n", "type": "reference", "crit": true}, {"id": 130, "titre": "Production d'une fiche — de l'identification à l'envoi Jenni", "contenu": "## Production d'une fiche — de l'identification à l'envoi Jenni\n\nWorkflow éprouvé sur les 19 fiches produites lors de la session 2026-04-22 (fiches #57 à #75, lot complet après audit de corpus).\n\n### Étape 1 — Identification du besoin\n\nSources de déclenchement validées en pratique :\n\n- **Audit `analyse_corpus.py` type `complet`** : 9 passes en parallèle (T1/T2/S1/S2/C1/C2/K1/K2/B1). La passe K2 identifie les cards sur-sollicitées sans zoom dédié (→ candidats fiche transversale). La passe C2 propose de nouvelles chaînes causales (→ certaines deviennent fiches). La passe B1 repère les sujets biblio orphelins.\n- **Cards `concept_cards` avec description dense** et docs_codes traversant plusieurs strates : candidates à fiche transversale.\n- **Audit concept_cards obligatoire avant création** : `SELECT id, title, description FROM concept_cards WHERE lower(title) LIKE '%<kw>%' OR lower(description) LIKE '%<kw>%'` + `bq_query.py --search <kw>` — confirme qu'aucune fiche existante ne couvre déjà le sujet.\n- **Retour JMJ** (demande explicite, liste de sujets à traiter en lot).\n\n### Étape 2 — Création DB\n\n```sql\nINSERT INTO fiches (slug, titre, type, strates, docs_cibles, statut, created_at, updated_at, version)\nVALUES ('<slug-kebab>', '<titre complet>', '<transversale|zoom|technique>',\n        '[\"F\",\"S\",\"V\",...]', '[\"F2\",\"P5\",\"S4\",...]', 'en_cours',\n        datetime('now'), datetime('now'), 1);\n```\n\n**Règle slug** : kebab-case, sans accent, descriptif, prévisible (`cascade-consequences-e0-e5`, `pompe-microbienne-carbone-maom`).\n\n**Docs cibles** : strates concernées par le sujet (cf. audit card source). Une fiche transversale touche typiquement 3-7 docs.\n\n### Étape 3 — Rédaction du brouillon (Claude)\n\nRègles strictes (cf. BQ `redaction_documents_jenni` #146 pour le détail complet) :\n\n- **Le docx = le document dans son état actuel**, pas une discussion avec Jenni. Zéro métaphrase (« Jenni, rédige… »), zéro placeholder.\n- **Zéro méta-vocab** : ni `corpus`, `strate`, `thésaurus`, `card #N`, `fiche #N`, `chaîne CN`, ni codes docs (S0, V2, P1, H3…). Vérification regex obligatoire post-rédaction.\n- **Prose continue**, densité variable selon l'état de connaissance, pas d'italique brouillon.\n- **Termes canoniques intégrés dans les phrases** (orthographe exacte `terms.fr`), pas en liste séparée en fin.\n- **Citations inline** APA `(Auteur, année)` au plus près des affirmations ; bibliographie finale avec DOI/URL résoluble.\n- **Title court sans accent ≤ 5 mots** (Jenni l'utilise comme nom de fichier de retour).\n\n#### Structure canonique d'une fiche transversale\n\n```\n[Title : \"Cascade Consequences E0 E5\"]\n\n[H1] Introduction\n  — Pose la problématique, annonce la grille de lecture, situe l'enjeu.\n  \n[H1] 1. [Titre section 1]\n  ...\n[H1] 6 ou 7. [Titre section N]\n\n[H1] Lecture transversale (ou équivalent)\n  — Articulation, principe général, généralisation.\n\n[H1] Résumé\n  — Synthèse finale, reprend les points structurants.\n```\n\n#### Budget par section\n\nObservé sur les 19 fiches livrées : Intro ~1400 chars, sections body ~1400-1800 chars, Résumé ~1400 chars. Total rédigé ~12-15 k chars avant Jenni. Le retour Jenni multiplie le volume par 15-25×.\n\n#### Stratégie anti-timeout (critique)\n\n**Règle de pratique opérationnelle** : écrire chaque section dans un fichier temporaire séparé via `Write` (< 5 k chars / fichier), puis insérer en DB via un script Python qui lit les fichiers un par un. Cette technique évite les erreurs `Stream idle timeout — partial response received` côté API Anthropic qui surviennent sur les écritures > 10 k chars dans un seul appel. Pattern :\n\n```python\n# Un fichier par section\nWrite /tmp/f57_s0_intro.txt  # ~1.5 k chars\nWrite /tmp/f57_s1_e0.txt     # ~1.5 k chars\n...\n# Script d'insertion final\npython3 /tmp/f57_insert.py   # SQLite INSERT par section\n```\n\nCette pratique a permis de produire les 19 fiches en continu sans perdre de travail aux timeouts.\n\n### Étape 4 — Références bibliographiques\n\nLes refs sont stockées dans `fiche_contenus.refs` (JSON liste).\n\n```json\n[{\"auteurs\": \"Rockström, J., Gupta, J., ...\", \"annee\": 2023,\n  \"titre\": \"Safe and just Earth system boundaries\",\n  \"journal\": \"Nature\", \"doi\": \"10.1038/s41586-023-06083-8\",\n  \"url\": \"https://doi.org/10.1038/s41586-023-06083-8\"}, ...]\n```\n\n**Règles** :\n- Chaque ref doit avoir `doi` ET/OU `url` résoluble (pas les deux optionnels simultanément).\n- Format APA complet `Auteurs (année). Titre. Journal. URL/DOI.`.\n- Une seule ligne par paragraphe dans la bibliographie du docx, tri alphabétique par premier auteur (fait par `gen_fiche_docx.py`).\n- Pas d'invention : ne citer que des sources réelles (Crossref-résolubles).\n\n### Étape 5 — Génération du .docx pour Jenni\n\n```bash\nPYTHONPATH=tools python3 tools/jenni/gen_fiche_docx.py --fiche-id <N>\n# → recherches/fiches/fiche_<slug>_<date>.docx\n```\n\nLe script :\n- Title court sans accent (`titre_court_sans_accent(slug)`).\n- Hiérarchie Word native : Title + Heading 1-3 (H3 max).\n- Lit `fiche_sections.contenu` (nouveau canon) avant `contexte_sci` (fallback amorce).\n- Insère la bibliographie en Heading 1 `Références` en fin, tri alphabétique, format APA.\n- Extrait les termes canoniques pertinents (mode activation lexicale, pas liste en tableau).\n\n### Étape 6 — Vérification post-génération\n\n**Scan méta-vocab obligatoire** avant envoi :\n\n```python\nfrom docx import Document\nimport re\nd = Document('recherches/fiches/fiche_<slug>_<date>.docx')\ntxt = '\\n'.join(p.text for p in d.paragraphs)\nFORBIDDEN = [\n    r'\\bcard #\\d+\\b', r'\\bfiche #\\d+\\b', r'\\bcha[iî]ne C\\d+\\b',\n    r'\\bcorpus\\b', r'\\bstrate\\b', r'\\bth[eé]saurus\\b',\n    r'\\b[SV][0-4]\\b(?![a-zA-Z])', r'\\b[PF][1-5]\\b(?![a-zA-Z])',\n    r'\\bH[1-3]\\b(?![a-zA-Z])',\n]\nviolations = [p for p in FORBIDDEN if re.search(p, txt, re.IGNORECASE)]\nassert not violations, f\"Méta-vocab détecté : {violations}\"\n```\n\n**Zéro violation obligatoire** avant commit. Les cas rencontrés en pratique (session 2026-04-22) : `corpus agronomique` résiduel dans fiche #65, corrigé par substitution `champ agronomique`.\n\n### Étape 7 — Commit et envoi Jenni\n\n```bash\ngit add sol_vivant.db recherches/fiches/fiche_<slug>_<date>.docx\ngit commit -m \"fiche #<N> <titre court> — docx + <K> refs\"\ngit push origin <branche>\n```\n\n**Statut** : `en_cours` (reste ainsi jusqu'à réception du retour Jenni). JMJ prend le docx en main, l'uploade dans le projet Jenni concerné, pilote les révisions (7 révisions + 2 relectures observées sur fiche #57 qui ont multiplié le contenu par 10×).\n\n### Scripts actifs\n\n| Script | Rôle |\n|---|---|\n| `tools/jenni/gen_fiche_docx.py` | Génération du .docx de travail (quel que soit l'état de la fiche) |\n| `tools/jenni/integrate_fiche.py` | Intégration consciente du retour Jenni (voir BQ `wf_fiche_integration`) |\n| `tools/admin/bq_query.py --search <kw>` | Audit préalable avant création |\n\n### Anti-patterns confirmés\n\n- **Pas d'agent Task pour rédiger le brouillon** (règle BQ #136 `pas_agent_redacteur`). La rédaction est le travail de Claude + JMJ + Jenni, jamais d'un sous-agent.\n- **Pas de Write unique > 10 k chars** : les timeouts API provoquent des pertes partielles. Découper par section.\n- **Pas de rédaction sans audit préalable** (concept_cards + BQ search). Risque de doublon ou de contradiction avec une fiche existante.\n\n\n### Règle critique : numérotation portée par le titre DB (pas par le niveau Word)\n\nChaque section body (types `section`, `body`, `body_h2`) doit porter son numéro directement dans le texte du titre (`fiche_sections.titre`) :\n\n- Body H1 : `1.`, `2.`, `3.`, …\n- Body H2 sous H1 N : `N.1.`, `N.2.`, …\n- Body H3 si besoin : `N.M.1.`, …\n\nIntro et conclusion (Résumé) ne sont **pas numérotés**.\n\n**Pourquoi** : cette règle garantit la robustesse du matching à l'intégration. Deux cas fréquents :\n\n1. **Jenni change le niveau** d'un titre (H2 au lieu de H1, ou inverse) mais conserve généralement le numéro de chapitre dans le texte. Si le numéro est dans le titre DB, le parseur d'intégration retrouve la correspondance par le numéro même si le niveau Word diffère.\n2. **JMJ corrige un titre lors de la relecture** : le texte éditorial change, mais le numéro reste. Le matching à l'intégration reste stable.\n\nSans cette numérotation dans le titre DB, toute divergence d'ordre des titres entre docx retour et plan DB provoque un désalignement cascade de toutes les sections suivantes, visible seulement à l'intégration et coûteux à corriger.\n\n**Mise en œuvre** : le script `gen_fiche_docx.py` écrit le `titre` tel quel en Heading 1/2/3 (pas de renumérotation par le script, pas de double préfixe). La numérotation est posée une fois dans `fiche_sections.titre` à la création ou à la mise à jour.\n\nExemple de structure DB pour la fiche #58 Cascade temporelle :\n\n```\n[intro]      Introduction                              (pas de numéro)\n[section]    1. T0 — Instantané : enzymes, priming…    (H1, numéro 1)\n[section]    2. T1 — Saisonnier…                        (H1, numéro 2)\n...\n[section]    7. Lecture transversale…                   (H1, numéro 7)\n[conclusion] Résumé                                     (pas de numéro)\n```\n\n---\n\n### Refs-seed exploratoires par recherche web (2026-04-23)\n\n**Règle** : pour les fiches en `statut='en_cours'` (fiches graines exploratoires\nnon encore envoyées à Jenni), Claude peut faire des recherches web pour\nenrichir le seed biblio dans `fiche_contenus.refs` — avec UNE condition\nabsolue.\n\n**Condition absolue** — les refs trouvées par recherche web\n**NE DOIVENT PAS** être insérées dans `jenni_sources` (biblio curatée du\ncorpus). Elles restent uniquement dans le JSON `fiche_contenus.refs` de\nla fiche concernée.\n\n**Raison** : `jenni_sources` = source de vérité biblio **validée** du\ncorpus. Les refs exploratoires trouvées via web (DOI Crossref, abstracts)\nn'ont pas encore été lues/validées par JMJ. Elles guident Jenni mais ne\npolluent pas la biblio maîtresse. Si Jenni confirme leur pertinence en\nretour (citation effective dans le contenu), elles pourront être\nintégrées ensuite dans `jenni_sources` via le workflow normal (BQ #129\nwf_source_integration).\n\n**Workflow web-search refs-seed** :\n\n1. Identifier les concepts-clés de chaque section de la fiche\n2. Rechercher sur Crossref / Google Scholar via WebSearch :\n   - termes-clés en anglais (couverture internationale)\n   - termes-clés en français (spécificité FR/MSV)\n   - préférer méta-analyses, review papers, publications récentes (<5 ans)\n3. Pour chaque ref retenue, récupérer : auteurs, année, DOI, URL, titre\n4. Composer le JSON au format standard :\n   ```json\n   {\n     \"auteurs\": \"Nom, P., Autre, Q., et al.\",\n     \"annee\": \"YYYY\",\n     \"doi\": \"10.xxxx/yyyy\",\n     \"url\": \"https://doi.org/10.xxxx/yyyy\",\n     \"raw\": \"Citation complète style APA\"\n   }\n   ```\n5. INSERT / UPDATE `fiche_contenus.refs` (JSON array) — **jamais** INSERT\n   dans `jenni_sources`\n6. Régénérer le docx via `gen_fiche_docx.py` pour Jenni\n\n**Documentation dans `notes_claude`** : toujours mentionner\n« refs ajoutées par recherche web Claude, non validées en biblio\nprincipale » pour tracer.\n\n**Ratio recommandé** : 8-15 refs seed par fiche — trop peu = Jenni\nperdue, trop = dispersion. Couvrir toutes les sections, privilégier\n2 refs majeures par thème-clé + 1 ref historique/référence française\nsi existante.\n\n**Cas d'application au 2026-04-23** :\n- Fiche #76 Lombriciens : 12 refs seed (dont 11 avec DOI, 1 ref historique\n  Bouché 1977 sans DOI) — mix biblio interne + web search.\n\n### Anti-patterns à éviter\n\n- ❌ Ajouter les refs web directement dans `jenni_sources` avant validation\n- ❌ Copier des refs depuis des sites suspects (prédateurs, moulins à\n  citations, contenu généré) — préférer Crossref, DOI-resolved, publis\n  de maisons d'édition reconnues\n- ❌ Oublier le champ `raw` (citation complète humaine) — utile quand le\n  DOI pointe vers un paywall ou une mauvaise page\n\n---\n\n### Appels in-text (Auteur et al., année) dans le contexte_sci des sections\n\n**Règle** : chaque graine de `fiche_sections.contexte_sci` rédigée par Claude\ndoit inclure des **appels in-text** au format `(Auteur et al., année)` ou\n`(Auteur & Co-auteur, année)` aux endroits où une affirmation précise\ns'appuie sur une ref présente dans `fiche_contenus.refs`.\n\n**Pourquoi** : Jenni garde la traçabilité ref-texte, complète les refs\nincomplètes, et produit un contenu déjà stylé scientifiquement. Sans\nappels in-text, Jenni peut citer une ref en biblio finale sans savoir\nprécisément où l'ancrer dans le texte.\n\n**Format** :\n- 1 auteur : `(Bouché, 1977)` — pas de virgule entre auteur et année\n  (style APA français usuel dans le corpus)\n- 2 auteurs : `(Irshad & Frouz, 2024)`\n- 3+ auteurs : `(Bertrand et al., 2015)`\n- plusieurs refs : `(Pérès et al., 2011 ; Cluzeau et al., 2012)`\n  — séparateur « ; » (point-virgule)\n\n**Anti-pattern** : rédiger un paragraphe entier sans appels et laisser\nJenni deviner quelles refs de la biblio s'appliquent — perte d'information\net risque de mauvaise attribution.", "type": "workflow", "crit": true}, {"id": 121, "titre": "Charte fiches techniques DIY — structure spécifique", "contenu": "## Charte fiches techniques DIY — structure spécifique\n\nCharte spécifique aux fiches `type='technique'` — protocoles DIY, préparations biologiques, méthodes de mesure à la ferme. Source initiale : `docx/charte_de_travail___fiches_techniques.docx` rédigée par Jenni en 2026-04.\n\n**S'applique à** : `chelation-aminoacide-diy`, `knf-jadam-preparations`, `ipmo-jakoba-natural-farming`, `rhodopseudomonas-palustris`, `diagnostic-seve-ph-ec` et toute nouvelle fiche technique à venir.\n\n### Structure générale (héritée des fiches transversales)\n\nIdentique aux fiches transversales pour l'ossature :\n\n```\n[Title court sans accent ≤ 5 mots]\n\n[H1] Introduction\n[H1] 1. [Titre section 1]  (avec 5 H2 — voir détail ci-dessous)\n[H1] 2. [Titre section 2]  (avec 5 H2)\n...\n[H1] Résumé\n[H1] Termes canoniques en fin (Jenni §1.C)\n[H1] Références\n```\n\n### Spécificité : 5 sous-blocs H2 immuables par section numérotée\n\nChaque section body H1 numérotée contient **5 H2 au même niveau** (structure plate, pas de H3 pour éviter les ambiguïtés d'interprétation Word) :\n\n```\n[H1] 1. Préparation du LiFoFer\n  [H2] Contexte scientifique\n  [H2] Protocole\n  [H2] Indicateurs de qualité\n  [H2] Précautions & Stockage\n  [H2] Applications & Dosages\n\n[H1] 2. [Autre préparation]\n  [H2] Contexte scientifique\n  [H2] Protocole\n  [H2] Indicateurs de qualité\n  [H2] Précautions & Stockage\n  [H2] Applications & Dosages\n```\n\n### Détail des 5 H2\n\n#### H2 — Contexte scientifique\n\nPourquoi ce protocole fonctionne. Mécanismes biologiques, chimiques, écologiques mobilisés. Références scientifiques. **Rédigé par Claude + enrichi par Jenni**.\n\n#### H2 — Protocole\n\nStructure à sous-paragraphes en **préfixe gras** (pas de H3) :\n\n```\n**Ingrédients —** liste des matériels et matières consommables avec quantités précises, sources d'approvisionnement, alternatives de substitution.\n\n**Équipement nécessaire —** ustensiles, capacités volumiques, conditions (obscurité, température, aération). Inclure les EPI (gants, lunettes, masque filtrant si applicable).\n\n**Procédure —** suite d'étapes chronologiques numérotées ou en listes, avec durées, températures, signes sensoriels à vérifier à chaque étape (changement de couleur, odeur attendue, consistance).\n```\n\n**Règle doctrine** : la rédaction du Protocole est du **volet pratique** confié à JMJ (qui teste, ajuste, documente) et à Jenni (qui recherche sources praticiens : Carandang, Cho Han-kyu, Tao Orion, Gil Carandang, Higa EM-1, retours aquaculture asiatique, etc.). Claude rédige **uniquement le Contexte scientifique** et la partie théorique — pas d'invention de protocole par Claude seul.\n\n#### H2 — Indicateurs de qualité\n\nComment savoir que la préparation est réussie. Paramètres mesurables (pH, couleur, odeur, température, densité), valeurs de référence, signaux de dérive (mouillage, odeurs putrides, changement de teinte anormale), durée de maturation typique.\n\n#### H2 — Précautions & Stockage\n\nRisques chimiques et biologiques, incompatibilités, conditions de stockage (température, lumière, durée de conservation), signes d'altération justifiant le rejet, gestion des résidus et déchets.\n\n#### H2 — Applications & Dosages\n\nCultures ou contextes où la préparation est utile, doses recommandées (par litre, par hectare, par plant), fréquences d'application, modalités (trempage de semences, pulvérisation foliaire, incorporation sol, dilution irrigation), compatibilités / incompatibilités avec d'autres pratiques concurrentes.\n\n### Document amorce, pas template vide\n\nLe docx produit est un document de travail **amorce/partiellement rédigé**, pas un template avec `[à compléter]`. Les sous-blocs H2 contiennent une description éditoriale concise (5-15 lignes) qui pose le cadre de ce qui est attendu, plutôt qu'un placeholder vide.\n\n### Recommandations protocoles DIY (sources Jenni)\n\nLes sources praticiennes reconnues que Jenni mobilise pour les protocoles :\n\n- **Carandang, Gil** — Natural Farming Philippines, IMO, FAA, FPJ, FFJ\n- **Cho Han-kyu** — Korean Natural Farming (KNF), IMO1-4, JADAM\n- **Tao Orion** — permaculture thérapeutique, intégrations\n- **Higa, Teruo** — Effective Microorganisms (EM-1)\n- **Aquaculture asiatique** — usage combinés en riziculture-pisciculture\n\n**Règle** : les doses et protocoles issus de ces sources sont contextuels. Toute adaptation locale doit être testée en pilote avant généralisation.\n\n### Gestion des termes canoniques\n\nComme pour les fiches transversales (cf. BQ `wf_fiche_production`) :\n- Termes canoniques **intégrés dans les phrases** (orthographe exacte `terms.fr`).\n- Pas de liste séparée en fin de document.\n- Première mention avec EN entre parenthèses : `« micro-organismes efficaces (Effective Microorganisms, EM) »`.\n\n### Contraintes de rendu (rappel)\n\nIdentiques aux fiches transversales :\n- Title ≤ 5 mots sans accent\n- Hiérarchie Word native (Title + H1-H3 max, pas de H4)\n- Pas d'ASCII décoratif\n- Structure plate sous un H1 technique (5 H2 sans H3 dans l'un d'eux)\n- Zéro méta-vocab\n\n### Principe du cadrage éditorial\n\nLes 5 H2 sont **immuables** pour garantir la cohérence inter-fiches techniques : un lecteur qui ouvre plusieurs fiches techniques retrouve toujours la même architecture et sait où chercher chaque type d'information. Cette standardisation vaut contrainte : si une fiche technique n'a rien à dire dans un H2 (ex : pas de Précautions spécifiques à documenter pour une préparation particulièrement bénigne), le H2 est conservé avec une mention concise, pas supprimé.\n\n### BQ complémentaires\n\n- `fiche_definition` — définition, taxonomie, cycle de vie des fiches\n- `wf_fiche_production` — workflow de production (s'applique aussi aux techniques)\n- `wf_fiche_integration` — intégration consciente du retour Jenni\n- `redaction_documents_jenni` (#146) — règles unifiées de rédaction Jenni\n", "type": "reference", "crit": true}, {"id": 147, "titre": "Intégration consciente du retour Jenni — workflow canonique", "contenu": "## Intégration consciente du retour Jenni — workflow canonique\n\nWorkflow éprouvé sur la fiche #57 Cascade Consequences E0-E5 (session 2026-04-22) : retour Jenni de 339 k chars raw (7 révisions + 2 relectures JMJ), intégration complète via `integrate_fiche.py`, phase 4bis de propagation, audit croisé.\n\n### Règle d'or\n\n**Aucun docx Jenni ne rentre tel quel en DB.** Toute intégration passe par analyse consciente via le pipeline `integrate_fiche.py` qui structure l'extraction, vérifie la cohérence, applique en DB et propage aux autres éléments du corpus.\n\n### Pipeline à 7 étapes\n\n```bash\n# Dry-run obligatoire\npython3 tools/jenni/integrate_fiche.py --db sol_vivant.db --fiche-id <N> \\\n        --docx docx/<slug>.docx\n\n# Apply si gate OK\npython3 tools/jenni/integrate_fiche.py --db sol_vivant.db --fiche-id <N> \\\n        --docx docx/<slug>.docx --apply\n\n# Propagation optionnelle aux prompts des docs cibles\npython3 tools/jenni/integrate_fiche.py ... --apply --propagate\n```\n\n### Étape 1 — Parse\n\nParseur custom OMML math-aware (dérivé de `import_termes_jenni.py::parse_docx`) qui extrait :\n\n- **Sections** via niveaux de heading : Title, H1, H2, H3 (hiérarchie Jenni avec souvent 4 H2 par H1 body, H3 dans Introduction et Résumé).\n- **Refs biblio** via style `JenniRefBody` (format natif Jenni dans le docx retour).\n- **Citations inline** APA `(Auteur, année)` ou `(Auteur et al., année)`.\n- **Formules chimiques Unicode** depuis les `<m:oMath>` (NH₃, CO₂, Fe²⁺, etc.). Sans parseur math-aware, `python-docx` produit des `()` vides — **toujours vérifier zéro parens vides après parse**.\n- **Tags Jenni résiduels** `[Fiche zoom...]`, `(nd)` autoréférences → supprimés au parse.\n\n### Étape 2 — Match\n\nIdentification automatique ou explicite de la fiche cible :\n- `--fiche-id <N>` → force le match\n- Sinon détection par slug/titre avec normalisation (casse, accents).\n\n### Étape 3 — Diff\n\nComparaison avec la version précédente :\n- **Première intégration** (`fiche_contenus.contenu_integre` NULL) : note « Premiere integration (pas d'ancien contenu) ».\n- **Réintégration** (fiche déjà `integre` et retouchée) : comparaison textuelle section par section, refs ajoutées/retirées signalées, passages disparus flaggés pour revue.\n\nResponsabilité Claude (BQ #130 modèle 2026-04-18) : avant d'écraser, identifier les pertes significatives (refs oubliées, passages supprimés). Décision :\n- **Merge simple** si 1-2 refs oubliées → acceptable, log dans `notes_claude`.\n- **Régénération** si perte importante → produire nouveau docx + seconde passe Jenni.\n\n### Étape 4 — Refs\n\n- **Refs Jenni parsées** (typiquement 20-90 par fiche selon enrichissement).\n- **Croisement** avec `jenni_sources` par DOI normalisé + auteurs/année :\n  - Déjà présentes → INSERT dans `source_usages` (liens fiche ↔ ref existante).\n  - Nouvelles → notées comme « à intégrer séparément dans jenni_sources » (chantier dédié Crossref DOI + `jenni_sources`).\n- **Cache d'affichage** : `fiche_contenus.refs` (JSON) reconstruit à chaque intégration, garantit cohérence.\n\nSource de vérité : `source_usages` (pointeurs fiche → jenni_sources). Le JSON dans `fiche_contenus.refs` est un cache d'affichage.\n\n### Étape 5 — Termes candidats\n\nLe parseur extrait automatiquement des candidats termes depuis les refs et le contenu :\n- **Filtrage** : acronymes isolés (HAL), fragments latins/anglais de titres de refs (« Agriculture and »), méta-vocab → écartés.\n- **Vérification 4 axes** avant proposition : norm(TERME) contre `terms.fr`, `terms.en`, `terms.syn_fr`, `terms.syn_en`.\n- **Proposition uniquement** : jamais d'INSERT automatique dans `terms`. Les vrais nouveaux termes passent par workflow thésaurus (export liste à Jenni → retour docx → `import_termes_jenni.py`).\n\n### Étape 6 — Cards\n\nScan de toutes les `concept_cards` avec scoring basé sur :\n- Intersection `fiches.docs_cibles` / `concept_cards.docs_codes`\n- Tokens distinctifs du titre de la card présents dans le contenu Jenni\n\nCards identifiées avec score ≥ 4 → candidats à renforcement via note `[Apport fiche #<N> v<version> (<date>)]` dans
