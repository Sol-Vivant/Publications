as de cycle Jenni (concept-cards, chaines)\n- **web** : toutes les pages du site (web)\n- **technique** : infrastructure transverse (bq, session, integrite, analyse, archivage, jenni-workflow, sources-autoritaires)\n- **specifique** : chantier one-shot (vide au seed)\n\n### Consultation (bq_query.py v2.0)\n\n```bash\n# Inventaire des domaines groupés par catégorie\npython3 tools/admin/bq_query.py --list\n\n# Charger un domaine entier (primaires + references)\npython3 tools/admin/bq_query.py --domaine fiches\n\n# Primaires seulement\npython3 tools/admin/bq_query.py --domaine bq --primaire-only\n\n# Entrées critiques d'un domaine\npython3 tools/admin/bq_query.py --domaine web --critical-only\n```\n\n### Ajouter une entrée BQ\n\n```sql\nINSERT INTO bq_entries (titre, contenu_md, type, is_critique)\nVALUES ('...', '...', 'workflow', 1);\n\nINSERT INTO domaine_bq (domaine_id, bq_entry_id, role)\nVALUES ((SELECT id FROM domaines_techniques WHERE slug='fiches'), last_insert_rowid(), 'primaire');\n\n-- Optionnel : rattacher comme reference à d'autres domaines\nINSERT INTO domaine_bq (domaine_id, bq_entry_id, role, ordre)\nVALUES ((SELECT id FROM domaines_techniques WHERE slug='jenni-workflow'), last_insert_rowid(), 'reference', 1);\n```\n\n### Historique\n\n- **avant 2026-04-20** : `bq_modules` (9 modules : jenni, claude, web, sqlite…) +\n  `bq_entries.module_code` (1 entrée = 1 module). Limite : une entrée multi-pipeline\n  ne pouvait se rattacher qu'à un seul module, classification par « famille d'outil »\n  plutôt que par chantier.\n- **2026-04-20** : refonte vers `domaines_techniques` (14 slugs en 4 catégories) +\n  `domaine_bq` (N-N, role primaire|reference). 84 entrées BQ re-classées via\n  `map_bq_domaines.py` (pattern agent_runner, 9 agents Task parallèles).\n  Drop de `bq_modules` et `bq_entries.module_code`.\n\n### Scripts consommateurs\n\n- `tools/admin/bq_query.py` (API principale, `--domaine`)\n- `tools/admin/audit_opus.py` (audit par domaine primaire)\n- `tools/admin/explorer.py` (sidebar BQ groupée par catégorie)\n- `tools/docs/gen_explorer.py`, `gen_readme.py`, `gen_dashboard.py`,\n  `gen_workflows.py`, `gen_web.py` (génération HTML/MD)\n- `tools/admin/map_bq_domaines.py` (classification initiale + reclassification)\n", "type": "reference", "crit": true}]}, "session": {"nom": "Gestion de session", "entries": [{"id": 63, "titre": "Workflow session Claude Code (git + sync + dashboard)", "contenu": "**Début de session :**\n```\ngit pull origin main\npython3 tools/admin/session_start.py --db sol_vivant.db\n```\nLe script produit le dashboard : santé thésaurus, documents, chaînes causales, scripts, historique.\n\n**Récupérer le contexte de la dernière session :**\n```sql\nSELECT objectif, reste_a_faire, alertes FROM maintenance_sessions ORDER BY id DESC LIMIT 1;\n```\n\n**Charger les BQ pertinentes :**\n```\npython3 tools/admin/bq_query.py --db sol_vivant.db --modules projet,claude\npython3 tools/admin/bq_query.py --db sol_vivant.db --modules jenni   # si rédaction\npython3 tools/admin/bq_query.py --db sol_vivant.db --modules batch   # si Zotero\n```\n\n**Pendant le travail :**\n- Modifier la DB (tables, templates, config) — jamais les fichiers générés\n- Tester les scripts\n- `sync_scripts.py --inject` si des scripts ont changé\n\n**Fin de session (procédure manuelle) :**\n```\npython3 tools/sync_scripts.py --db sol_vivant.db --diff\npython3 tools/sync_scripts.py --db sol_vivant.db --inject   # si diff\npython3 tools/regen_all.py --db sol_vivant.db               # OBLIGATOIRE — regen pages depuis DB\npython3 tools/admin/check_integrity.py --db sol_vivant.db   # validation finale\ngit add sol_vivant.db tools/ Publications/ jmj/\ngit commit -m \"description\"\ngit push origin main\n```\n\n**⚠ Règle absolue `regen_all.py`** : toute session qui touche `html_templates`,\n`config`, `web_pages` ou la charte (`web_template.py`) doit se terminer par\n`regen_all.py`. Sinon les fichiers HTML publiés (`Publications/web/*.html`)\ndivergent de la DB. La clôture ne peut être considérée comme terminée tant\nque `Publications/web/` ne reflète pas l'état courant de la DB.\n\n**Alternative automatisée (recommandée)** : `python3 tools/admin/session_end.py --db sol_vivant.db`\nenchaîne régénération + check_integrity + git add + commit + push + merge main FF.\nVoir BQ #119 pour le détail.\n\n**Rapport + journal (obligatoire en clôture) :**\n- `jmj/rapports/session/rapport_YYYY-MM-DD.md` — rapport détaillé actions/décisions/reste_à_faire/alertes\n- `jmj/journaux/journal_session_YYYY-MM-DD.md` — journal court des itérations JMJ ↔ Claude\n- Entrée dans `maintenance_sessions` avec les 11 colonnes (objectif, déclencheur, actions=rapport MD, décisions, scripts_touches, tables_touchees, reste_a_faire, alertes, commit_refs)\n\n### (fusionné depuis #77 : Vérifier branche + sync au démarrage)\n\n**Premier réflexe de chaque session :**\n```bash\ngit branch -v                    # Doit afficher * main\ngit status                       # Pas de fichiers non commités\ngit pull origin main             # Récupérer les derniers changements\npython3 tools/sync_scripts.py --db sol_vivant.db --diff  # Vérifier sync\n```\n\n**Quand l'utilisateur dit avoir poussé des fichiers :** toujours faire `git pull origin main` AVANT de chercher les fichiers localement. L'utilisateur pousse sur le remote, pas dans le répertoire local.\n\n**Attention — scripts gen_*.py et DB :**\nLes scripts de génération HTML (gen_web, gen_mo_calc, gen_triangle_textures, gen_lifofer) **écrivent dans la DB** (`update_last_generated` dans `web_pages`). Si l'utilisateur regénère une page entre deux sessions, la DB locale diverge du remote.\n\nAu démarrage, `session_start.py` fait `git pull` — mais si la DB locale a été modifiée par un gen_*.py, il y aura un conflit binaire (la DB ne se merge pas). Solution :\n- Soit l'utilisateur commit+push après avoir regénéré\n- Soit on fait `git checkout -- sol_vivant.db` pour reprendre la version remote (perte des `last_generated` locaux — sans importance)\n\n**Si pas sur main** : `git checkout main && git pull origin main`\nSi des changements sont sur une autre branche : `git checkout main && git merge <branche>`\n\n**Historique** : confusion branche claude/init vs main (session 01/04), travail sur claude/project-discovery au lieu de main (session 03/04).", "type": "instruction", "crit": true}, {"id": 70, "titre": "Git — toujours travailler sur main", "contenu": "**Règle** : travailler directement sur `main`. Pas de branches.\n\nLe projet est géré par un seul utilisateur + Claude Code. Les branches ajoutent de la complexité inutile (merge, stash, divergence) sans bénéfice.\n\n- `git commit` sur main\n- `git push origin main`\n- Pas de `git checkout -b`, pas de PR, pas de merge\n- Si l'environnement force une branche (Claude Code web), merger dans main dès que possible", "type": "contrainte", "crit": true}, {"id": 54, "titre": "Scripts — gestion et synchronisation", "contenu": "**Sync scripts DB ↔ fichiers :**\n```\npython3 tools/sync_scripts.py --db sol_vivant.db --extract   # DB → fichiers\npython3 tools/sync_scripts.py --db sol_vivant.db --inject    # fichiers → DB\npython3 tools/sync_scripts.py --db sol_vivant.db --diff      # comparer\n```\n\n**Architecture fichiers :**\n```\ntools/\n├── admin/     session_start, audit_opus, bq_query, check_integrity, export_tools, explorer\n├── batch/     analyse_corpus\n├── docs/      gen_web, gen_mo_calc, gen_triangle_textures, gen_lifofer, gen_explorer, gen_readme, gen_workflows, gen_reports\n├── jenni/     export_jenni_doc, export_fiche, gen_prompt_enrichissement, import_enrichissement\n├── lib/       config, db, cli, pub_path, agent_runner, inrae, jenni_format, repair_json, sources, web_template\n├── zotero/    attribution, normalise_ris, validate_ris\n├── sync_scripts.py\n└── regen_all.py\n```\n\n**Modules partagés `lib/` :**\n\n| Module | Rôle | Fonctions clés |\n|--------|------|----------------|\n| `db.py` | Connexion DB centralisée | `get_connection(db_path, readonly=False)` |\n| `cli.py` | Boilerplate CLI | `add_db_arg(parser)`, `check_db(db_path)` |\n| `config.py` | Table config | `get()`, `get_int()`, `get_float()`, `get_json()` |\n| `pub_path.py` | Chemins publication | `pub_output(dir, name, ext, timestamp)` |\n| `agent_runner.py` | API Anthropic | `run_session()`, `run_batch()`, `load_config_prices()` |\n| `repair_json.py` | Réparation JSON | `repair_json(text)` |\n| `web_template.py` | Templates HTML | `render_page()`, `load_templates()`, CDN_REACT, etc. |\n| `jenni_format.py` | Formatage prompts | `format_instructions()`, `format_terms_block()` |\n\n**Génération pages web (noms fixes, pas d'horodatage) :**\n```\npython3 tools/docs/gen_web.py              → Publications/web/index.html\npython3 tools/docs/gen_mo_calc.py          → Publications/web/mo_calculateur.html\npython3 tools/docs/gen_triangle_textures.py → Publications/web/triangle_textures.html\npython3 tools/docs/gen_lifofer.py          → Publications/web/lifofer.html\npython3 tools/docs/gen_explorer.py         → Publications/web/explorer.html\n```\n\n**Convention** : tous les scripts utilisent `add_db_arg(parser)` (défaut: `sol_vivant.db`). Connexion via `get_connection(db_path)`.\n\n**Rappel** : les fichiers dans `Publications/` sont des **vues** de la DB. Toujours modifier la source (DB + scripts), puis regénérer.", "type": "commande", "crit": false}, {"id": 52, "titre": "Ce que Claude ne fait PAS", "contenu": "- Stocker le contenu Jenni (.docx) directement dans la DB\n- Modifier le RIS Zotero à la main (toujours passer par le pipeline `normalise → agents Task → validate`)\n- Ajouter des codes docs (S2, P1...) dans les instructions des prompts\n- Demander à Jenni de sourcer (c'est intrinsèque à son fonctionnement)\n- Interpréter les résultats de LIKE case-insensitive comme des vrais positifs\n", "type": "regle", "crit": true}, {"id": 64, "titre": "maintenance_sessions — journal de bord", "contenu": "Table `maintenance_sessions` — journal de bord des sessions Claude Code.\n\n**Procédure :**\n1. **Fin de session** : insérer UN enregistrement par session Claude Code\n2. **Pas de rapport intermédiaire** — un seul INSERT en fin de session\n3. Si plusieurs sessions dans la journée → 1 enregistrement par session (pas par jour)\n4. L'`objectif` résume la session en une ligne, `actions` contient le rapport complet en Markdown\n\n**15 sessions** archivées (27/03 → 07/04/2026).\n\n| Colonne | Rôle |\n|---------|------|\n| `ts_start` / `ts_end` | Horodatage |\n| `objectif` | Résumé une ligne |\n| `declencheur` | Ce qui a motivé la session |\n| `etat_avant` / `etat_apres` | JSON snapshot (terms, config, tables...) |\n| `actions` | Rapport MD complet de la session |\n| `decisions` | Choix architecturaux et leçons |\n| `scripts_touches` | Liste des fichiers modifiés |\n| `tables_touchees` | Tables DB modifiées |\n| `reste_a_faire` | TODO pour la session suivante |\n| `alertes` | Problèmes détectés |\n| `commit_refs` | Références git |\n\n**Consultation :**\n```sql\nSELECT id, ts_start, objectif FROM maintenance_sessions ORDER BY ts_start;\n```", "type": "instruction", "crit": true}, {"id": 78, "titre": "Nouveau script — checklist d'enregistrement", "contenu": "Après création d'un nouveau script Python dans `tools/` :\n\n1. Ajouter les imports partagés :\n   ```python\n   sys.path.insert(0, str(Path(__file__).resolve().parent.parent / 'lib'))\n   from db import get_connection\n   from cli import add_db_arg, check_db\n   ```\n2. Utiliser `add_db_arg(parser)` au lieu de `parser.add_argument('--db', ...)`\n3. Utiliser `check_db(args.db)` pour valider l'existence de la DB\n4. Utiliser `get_connection(args.db)` au lieu de `sqlite3.connect()` + `get_connection (inclut row_factory)`\n5. `python3 tools/sync_scripts.py --db sol_vivant.db --inject` → enregistre en table `scripts`\n6. Vérifier : `SELECT nom, version FROM scripts WHERE nom LIKE '%nouveau_script%';`\n7. Si le script génère des fichiers → l'ajouter dans `regen_all.py`\n\n**Pour les scripts `batch/` et `zotero/`** (qui importent via `from lib.xxx`) :\n```python\nsys.path.insert(0, str(Path(__file__).resolve().parent.parent))\nfrom lib.db import get_connection\nfrom lib.cli import add_db_arg, check_db\n```", "type": "instruction", "crit": false}, {"id": 119, "titre": "Rituel de clôture de session — session_end.py", "contenu": "## Rituel session_end.py\n\n```bash\npython3 tools/admin/session_end.py --db sol_vivant.db\n```\n\n**Séquence obligatoire** :\n1. Vérif working tree propre + branche courante\n2. Régénération des pages (dashboard, ebauches, explorer, etc.)\n3. `check_integrity.py` (validation DB)\n4. **Insert rapport de session en DB** (étape obligatoire, non encore implémentée dans session_end.py — à faire manuellement en attendant) :\n   - `audit_reports` (`categorie='session_recap'`, `content_md`, `tags`, `date_session`) — rapport narratif\n   - `maintenance_sessions` (objectif, declencheur, actions, decisions, etat_avant/apres, scripts_touches, tables_touchees, reste_a_faire, alertes, commit_refs) — log structuré\n5. `git add` étendu : sol_vivant.db, Publications/, MANIFEST.md, README.md, tools/\n6. Commit avec message structuré\n7. `git push origin claude/<branche-session>`\n8. `git checkout main && git merge --ff-only` + push\n\n### Pourquoi l'insert en DB est obligatoire (doctrine 2026-04-20)\n\nLa DB est la **source de vérité unique**. Les `.md` orphelins dans `jmj/rapports/session/` sont **hors-doctrine** — ils étaient écrits manuellement avant 2026-04-20 mais ne doivent plus l'être.\n\n**Les deux tables sont complémentaires, pas redondantes** :\n- `audit_reports` (cat=session_recap) = narratif rédigé (contexte, décisions, dette identifiée, pédagogie)\n- `maintenance_sessions` = log structuré (objectif, actions, commits, tables touchées) — source temporelle de vérité, permet de reconstruire l'historique par requête SQL\n\n### Template SQL minimal\n\n```sql\n-- 1. Rapport narratif\nINSERT INTO audit_reports (slug, titre, categorie, content_md, date_session, tags, is_active)\nVALUES ('session_<N>_<YYYY-MM-DD>_<theme_slug>',\n        'Session <N> (<YYYY-MM-DD>) — <titre court>',\n        'session_recap',\n        '<markdown complet>',\n        '<YYYY-MM-DD>',\n        '[\"<tag1>\",\"<tag2>\",...]',\n        1);\n\n-- 2. Log structuré (champs tous remplis, sinon requêtes d'audit trouent)\nINSERT INTO maintenance_sessions\n  (ts_start, ts_end, objectif, declencheur, etat_avant, actions, decisions,\n   etat_apres, scripts_touches, tables_touchees, reste_a_faire, alertes, commit_refs)\nVALUES ('<YYYY-MM-DD HH:MM:SS>', '<YYYY-MM-DD HH:MM:SS>',\n        '<objectif 1-2 phrases>',\n        '<ce qui a déclenché la session>',\n        '<état DB/code avant>',\n        '<actions menées bout-en-bout>',\n        '<décisions structurantes prises>',\n        '<état DB/code après>',\n        '<liste des scripts modifiés>',\n        '<liste des tables touchées>',\n        '<dette identifiée pour prochaines sessions>',\n        '<alertes / points de friction>',\n        '<SHA1 court des commits>');\n```\n\n### Contenu attendu du `audit_reports.content_md`\n\nSections recommandées (pas obligatoires, on s'adapte) :\n- **Objectif initial** (ce qu'on voulait faire)\n- **Décisions structurantes** (pourquoi tel choix, alternatives écartées)\n- **Réalisations** (par commit si session à commits multiples)\n- **Dette identifiée** pour prochaines sessions (très important — alimente l'audit de dette doctrinale)\n- **Statistiques DB** finales (chiffres clés qui permettent de mesurer l'impact)\n- **État technique** (branche, commits, integrité)\n\n### Cas d'usage futurs\n\n- **Audit temporel** : `SELECT ts_start, objectif FROM maintenance_sessions ORDER BY ts_start` → inventaire de ce qui a été fait quand\n- **Recherche thématique** : `SELECT * FROM audit_reports WHERE content_md LIKE '%<kw>%' OR tags LIKE '%<kw>%'`\n- **Reprise de dette** : `SELECT ts_start, reste_a_faire FROM maintenance_sessions WHERE reste_a_faire != '' ORDER BY ts_start DESC`\n- **Audit de dette doctrinale** : parser `reste_a_faire` + `alertes` pour détecter les chantiers ouverts non repris (cf. dette session 2026-04-20 — script `audit_dette_doctrinale.py` à venir)\n\n### Règle absolue\n\nToute session doit se terminer avec :\n- working tree **propre**\n- `main` **synchronisé** (merge FF depuis claude/…)\n- **rapport en DB** (pas de `.md` orphelin dans `jmj/rapports/session/`)\n\nNe jamais laisser la branche `claude/…` en avance sur main (cf. CLAUDE.md \"Clôture de session — propagation obligatoire\").\n\n### État d'implémentation (2026-04-20)\n\n- `session_end.py` : régen + integrity + commit + push + merge FF **OK**\n- Insert rapport en DB : **manuel pour l'instant**, à automatiser\n- Proposition d'automatisation : étape interactive dans session_end.py (Claude remplit le template SQL avant commit), ou template pré-généré à valider.\n\n### Dette identifiée — session_end.py ne regen pas toutes les pages (2026-04-21)\n\n**Symptôme** — `session_end.py` ne régénère que 5 pages en dur (`gen_readme`,\n`gen_web`, `gen_concept_cards`, `gen_ebauches_web`, `gen_dashboard`), alors\nque `regen_all.py` en couvre **15** (cahier, triangle, lifofer, mo_calc,\nexplorer, technique, tests_terrain, esclaves, transition_robuste, workflows,\nrapports, etc.).\n\n**Impact** — dès qu'une session touche la **charte partagée**\n(`sv-charter-css`, `sv-shared-components`, variables `--font-*`,\n`.sv-text-column`…), les pages non listées gardent l'ancien rendu après\nclôture. Bug invisible tant que le rituel ne déclenche pas explicitement\nun `regen_all`. L'utilisateur voit les pages à jour uniquement si Claude\na pensé à lancer `regen_all.py` manuellement pendant la session.\n\n**Sessions à risque** : toute modif des 2 templates globaux\n(`page_slug IS NULL`), des variables CSS, ou de composants React\npartagés (SvRichText, SvSectionsNav, SvCollapse, etc.).\n\n**Fix proposé** — remplacer la boucle hardcodée dans `session_end.py`\npar un appel unique :\n\n```python\n# Avant (hardcoded) :\nfor script, args_extra in [\n    ('tools/docs/gen_readme.py', []),\n    ('tools/docs/gen_web.py', []),\n    ('tools/docs/gen_concept_cards.py', []),\n    ('tools/docs/gen_ebauches_web.py', []),\n    ('tools/docs/gen_dashboard.py', []),\n]:\n    ...\n\n# Après :\nrc, out, err = run(['python3', 'tools/regen_all.py', '--db', args.db])\n```\n\n`regen_all.py` fait déjà le bon dispatch (voir `GENERATORS` liste interne)\net affiche le résumé (15/15 générateurs OK). La liste en dur de\n`session_end.py` est un héritage pré-`regen_all`.\n\n**Contournement en attendant** — Claude lance `python3 tools/regen_all.py`\nexplicitement pendant les sessions qui touchent la charte. Le commit\n`session_end : régénération pages web + dashboard` emporte alors toutes\nles pages régénérées en plus des 5 hardcodées.\n", "type": "commande", "crit": true}, {"id": 128, "titre": "Session Claude Code — démarrage + clôture", "contenu": "## Workflow Session — démarrage + clôture\n\n### Démarrage (toujours, en premier)\n\n```bash\npython3 tools/admin/session_start.py --db sol_vivant.db\n```\n\nCe script fait tout :\n1. **Sync git** — fetch origin/main, checkout main, rebase si besoin. Les commits fantômes d'une ancienne session sont écrasés (par design, cf. CLAUDE.md)\n2. **Backup DB** — snapshot horodaté de `sol_vivant.db` dans `jmj/session/`\n3. **Dashboard** — chiffres vitaux : termes, fiches, chaînes, concept cards, dettes, commits récents\n4. **Intégrité** — check rapide (0 criticité attendue)\n5. **Règles actives** — affichage des BQ critiques (depuis `config.claude_rules`)\n\n**Après le démarrage** : la plateforme Claude Code web impose une branche `claude/<nom-session>`. Claude travaille sur cette branche puis propage vers main en clôture.\n\n### Pendant la session (flux standard)\n\n```\n1. Lire le dashboard\n2. Comprendre la demande JMJ\n3. Chercher dans BQ si pattern applicable :    bq_query.py --search <mot>\n4. Faire (éditer DB / scripts / Publications/)\n5. Sync scripts : python3 tools/sync_scripts.py --db sol_vivant.db --inject\n6. Régénérer : python3 tools/regen_all.py --db sol_vivant.db (si outputs touchés)\n7. check_integrity.py --db sol_vivant.db\n8. Commit + push (sur la branche claude/ imposée)\n```\n\n### Clôture de session (obligatoire avant de rendre la main)\n\nLe workflow est **mono-utilisateur** avec DB **binaire non mergeable**. Laisser du travail sur une branche feature → collision garantie (JMJ merge manuellement dans GitKraken).\n\n**Séquence fast-forward uniquement** :\n\n```bash\n# 1. Working tree propre\ngit status   # rien à committer\n\n# 2. Push de la branche courante\ngit push -u origin claude/<branche-session>\n\n# 3. Propagation vers main\ngit checkout main\ngit pull origin main\ngit merge --ff-only claude/<branche-session>\ngit push origin main\n```\n\n**Si le FF échoue** (ne devrait jamais arriver en mono-session) → STOP, demander à JMJ.\n\n**Rester sur `main`** à la fin + annoncer explicitement à JMJ que la session est close.\n\n### Clôture prématurée (test en cours de session)\n\nSi JMJ demande à tester un fichier (script, HTML, export), Claude exécute la même séquence immédiatement, reste dispo sur `main` pour le test, puis reprend les modifs suivantes sur la branche `claude/…` imposée par la plateforme.\n\n### Scripts annexes\n\n| Script | Usage |\n|---|---|\n| `tools/admin/bq_query.py --modules workflow` | Relire ce module |\n| `tools/admin/check_integrity.py` | Valider l'état DB à tout moment |\n| `tools/admin/session_end.py` | (optionnel) rituel de clôture formel avec résumé |\n\n### BQ liées\n\n- Règles absolues → #1 (carte), #70 (git main), #73 (DB source de vérité)\n- Maintenance détail → module `maintenance` (scripts, journal, check)\n\n\n### Path de sortie — config\n\nLe rapport de cloture va dans `config paths.rapports_session`\n(= `jmj/rapports/session/`). Utiliser `get_path(conn, 'rapports_session',\nensure_exists=True)`. Fichier nomme `rapport_YYYY-MM-DD.md`.\n\nVoir BQ #134 pour la structure jmj/ complete.", "type": "workflow", "crit": true}, {"id": 90, "titre": "Environnement — pas de binaire sqlite3, utiliser python3", "contenu": "Le binaire `sqlite3` **n'est pas installé** dans l'environnement Claude Code (erreur `sqlite3: command not found`).\n\n**Toujours utiliser le module Python** pour interroger la DB :\n\n```bash\npython3 -c \"\ncon = get_connection('sol_vivant.db')\nfor r in con.execute(\"SELECT ... FROM ...\"):\n    print(dict(r))\n\"\n```\n\n**Note** : dans les scripts, toujours utiliser `get_connection()` de `lib/db.py` (inclut `row_factory=Row`). L'import direct `sqlite3.connect` n'est utilisé que dans les one-liners CLI.\n\n**Ne jamais tenter** `sqlite3 sol_vivant.db \"...\"` — ça échoue systématiquement.", "type": "contrainte", "crit": true}]}, "integrite": {"nom": "Intégrité DB", "entries": [{"id": 56, "titre": "audit_log", "contenu": "Voir les dernières opérations :\nSELECT ts, operation, table_name, record_ref, substr(detail, 1, 100) FROM audit_log ORDER BY ts DESC LIMIT 20;\n\nLogger une opération :\nINSERT INTO audit_log (operation, table_name, record_ref, detail) VALUES ('UPDATE', 'terms', 'strate S', 'description...');", "type": "commande", "crit": false}, {"id": 74, "titre": "Audit d'intégrité DB — checklist", "contenu": "Lancer régulièrement (toutes les 3-5 sessions) un audit d'intégrité :\n\n```sql\n-- Doublons thésaurus\nSELECT fr, COUNT(*) c FROM terms GROUP BY LOWER(fr) HAVING c > 1;\n\n-- Termes orphelins (doc_code inexistant)\nSELECT t.fr, t.doc_code FROM terms t\nLEFT JOIN documents d ON d.code = t.doc_code WHERE d.code IS NULL;\n\n-- Sections sans titre\nSELECT doc_code, chapitre, section FROM prompts WHERE titre_h2 IS NULL OR titre_h2 = '';\n\n-- FK fantômes concept_cards\nSELECT cc.title FROM concept_cards cc\nLEFT JOIN documents d ON d.code IN (SELECT value FROM json_each(cc.docs_codes))\nWHERE d.code IS NULL AND cc.docs_codes IS NOT NULL;\n\n-- Scripts fichier vs DB\npython3 tools/sync_scripts.py --db sol_vivant.db --diff\n```\n\n**Historique** : 36 doublons termes corrigés (session 03/04), 77 orphelins term_relations, 2 FK fantômes cascade_prerequis (session 31/03).", "type": "instruction", "crit": true}]}, "analyse": {"nom": "Analyse corpus", "entries": [{"id": 55, "titre": "Faux positifs Opus récurrents", "contenu": "Claude Code est lui-même Opus — ces erreurs récurrentes doivent être détectées chez lui-même avant d'agir :\n\n1. **« Mentions problématiques dans prompts »** → SQLite LIKE est case-insensitive. `sol vivant` (scientifique) matche `Le Sol Vivant cet Holobionte` (projet). Vérifier en Python avec un match exact avant d'agir.\n\n2. **Tables droppées** → `prompt_contenus` et `term_connections` ont été remplacées. Ne pas les recréer.\n\n3. **Cross-refs `doc_source/doc_cible`** → ces colonnes contiennent des descripteurs longs, pas un bug. Les colonnes normalisées sont `doc_code_source`/`doc_code_cible`.\n\n**Règle** : ne pas agir sur un signalement sans vérification indépendante — même si c'est moi (Claude) qui ai signalé le point.\n", "type": "conseil", "crit": true}, {"id": 98, "titre": "Pipeline analyse → fiches/validations → prompts → clôture", "contenu": "## Pipeline analyse → fiches/validations → prompts → clôture\n\n**Cf. BQ « Modèle conceptuel — production du corpus » pour la vue d''ensemble.**\n\n### Déclencheurs\n- Audit du corpus (analyse_corpus.py, audit_opus.py, agents spécialisés)\n- Attribution Zotero (normalise + attribution + analyse-termes)\n- Intégration de notes volantes (jmj/notes*.txt) — cf. BQ #102\n\n### Étapes (à chaîner)\n\n**1. Analyse** → produit un JSON de manques :\n- `termes_manquants` → enrichissement thésaurus\n- `sujets_zoom` → nouvelles **fiches** (zoom sur un point précis)\n- `chaines_a_valider` → nouvelles **validations** mode `validation`\n- `concepts_faibles` → nouvelles **validations** mode `renforcement`\n- `lacunes` → nouvelles **validations** mode `comblement`\n\n**2. Création DB** (depuis le JSON, après validation JMJ) :\n- INSERT termes → `terms`\n- INSERT fiches + fiche_sections → `fiches` / `fiche_sections`\n- INSERT validations + validation_sections → `validations` / `validation_sections`\n- Pas de UPDATE direct sur `prompts` à ce stade — les prompts ne sont enrichis qu''**après retour Jenni**\n\n**3. Génération des prompts Jenni** :\n- Enrichissement thésaurus : `gen_prompt_enrichissement.py` (charte « Bloc de 10 », BQ #101)\n- Fiches : `export_fiche.py` (charte fiches techniques BQ #104 si type=`technique`, sinon charte générique)\n- Validations : `export_validation.py` (charte générique)\n\n**4. Export fichiers** → `recherches/`\n- `enrich_*.txt` — enrichissement thésaurus (lots de 10)\n- `prompts_fiche_*.txt` — fiches (zoom proactif)\n- `prompts_validation_*.txt` — validations (vérification/comblement réactif)\n\n**5. Cycle Jenni** : copier prompts → recevoir .docx\n\n**6. Retour Jenni — analyse Claude** :\n- `.docx` analysé → contenu structuré\n- Termes extraits → `terms`\n- Contenu fiche → `fiche_contenus.contenu_integre` + `prompts.contexte_sci/.enrichissement` des docs cibles\n- Contenu validation → `validation_contenus.contenu_integre` + `prompts.contexte_sci/.enrichissement` des docs cibles\n- Refs → Zotero (RIS via attribution.py)\n- Statut fiche/validation → `integre` puis `archive`\n\n**7. Clôture des prompts** (auto-déduit) :\n- Vue SQL : un prompt est `cloture` quand aucune fiche/validation **ouverte** ne le référence ET que `contexte_sci` + `instructions` sont remplis\n- Tous les prompts d''un doc en `cloture` → doc en `pret_a_rediger`\n\n**8. Passe finale Jenni** : doc en `pret_a_rediger` → rédaction finale → `redige`\n\n### Règles (rappels)\n- Pas de code doc dans les fichiers Jenni (BQ #40)\n- Lots de 10 termes max pour enrichissement thésaurus (charte Jenni « Bloc de 10 », BQ #101)\n- Citations format `[N]` uniquement (BQ #101)\n- Chunks de 500 refs max pour attribution Zotero\n- Fiches = sujets transversaux qui zooment sur un point précis (BQ #69)\n- Validations = comblement réactif des dettes du corpus (BQ #105)\n- **Les prompts de strate ne sont modifiés qu''après retour Jenni** (jamais en spéculation)\n- **Tout retour Jenni** va dans la bonne table : `fiche_contenus` / `validation_contenus`, **pas** dans `fiche_sections.enrichissement` ni `validation_sections.enrichissement`\n\n### ⚠ Etat actuel (avril 2026)\n\n`validation_sections` et `validation_contenus` existent en DB avec des donnees historiques (81 et 16 rows respectivement) mais **aucun script actif ne les alimente**. La logique des validations est en pause (cf. BQ #127). Les BQ qui decrivent leur workflow sont conservees comme reference, mais les scripts `export_validation.py` / `import_validation.py` ne sont pas operationnels aujourd'hui.\n", "type": "workflow", "crit": true}, {"id": 102, "titre": "Workflow — traitement des notes volantes (jmj/notes*.txt)", "contenu": "## Workflow — traitement des notes volantes\n\n**Fichiers concernés** : `jmj/notes*.txt`, `jmj/transcriptions/*.txt` et tout matériel brut que JMJ capture \"au pied levé\" (posts LinkedIn, abstracts, fragments de lecture).\n\n### Contexte\n\nLes notes volantes sont des captures rapides d'informations scientifiques croisées au gré des recherches de JMJ. **Elles ne sont pas sourcées de manière académique** — l'objectif de JMJ est la collecte rapide d'informations, pas leur traçabilité bibliographique. Les sources académiques viendront plus tard, **apportées par Jenni** lors de la rédaction des fiches/documents.\n\n### Règle sur les DOIs dans les notes\n\nLes DOIs qui apparaissent parfois dans les notes sont **accessoires et optionnels** :\n\n- ✅ **Utilisables** comme porte d'entrée pour une recherche web de clarification conceptuelle si Claude en a besoin pour comprendre un mécanisme cité\n- ❌ **Ne pas stocker systématiquement** dans `fiches.sources_dois` ou ailleurs\n- ❌ **Ne pas chercher à extraire tous les DOIs** d'une note pour les tracer\n- ✅ **Bibliographie de référence = Zotero**, alimentée via le pipeline Jenni → analyse .docx → attribution\n\n### Pipeline d'intégration\n\n**Étape 1 — Analyse**\nClaude lit la note, identifie les concepts scientifiques, mécanismes, taxa, molécules.\n\n**Étape 2 — Tri**\nClasser chaque note (ou segment) en :\n- 🟢 **Retenue** : apporte un mécanisme, un taxon, un concept, une hypothèse ou une donnée pertinente\n- 🟡 **Enrichissement** : complète une fiche/section existante plutôt qu'une nouveauté\n- 🔴 **Écartée** : doublon, fragment trop court sans contexte, ou vraiment sans aucun apport (rare)\n\n⚠ **Règle des pépites — ne pas confondre niveau de vulgarisation et absence d'intérêt**\n\nJMJ prend volontairement des notes de **vulgarisation** parce qu'il y a parfois des **pépites dans des hypothèses** apparemment basiques. Plusieurs concepts du corpus actuel ont été identifiés ainsi (zoom apparemment trivial qui masque une hypothèse féconde).\n\n**Le critère d'écartement n'est PAS** :\n- ❌ « niveau cours de lycée »\n- ❌ « vulgarisation grand public »\n- ❌ « pas de DOI »\n- ❌ « format LinkedIn »\n\n**Le bon critère d'écartement est** :\n- ✅ Aucune hypothèse, aucun mécanisme, aucune connexion conceptuelle, aucune donnée chiffrée nouvelle\n- ✅ Strict recopiage d'une définition académique standard sans angle particulier\n- ✅ Doublon littéral d'une note précédente\n\n**Avant d'écarter une note dite \"vulgarisation\", chercher activement** :\n- Une hypothèse formulée même implicitement\n- Un mécanisme expliqué d'un angle inhabituel\n- Une donnée chiffrée inattendue\n- Une connexion entre deux domaines (ex: gut-brain × sol)\n- Un terme/concept émergent absent du thésaurus\n\nSi **rien** de tout cela → écarter. Sinon → la note mérite d'être lue avec soin et probablement intégrée comme zoom ou enrichissement.\n\n**Étape 3 — Regroupement (clustering)**\nRapprocher les notes qui traitent d'un même thème cohérent. Une note peut nourrir plusieurs clusters si elle contient plusieurs mécanismes distincts.\n\n**Étape 4 — Synthèse**\nPour chaque cluster retenu, décider :\n- **Nouvelle fiche** si le sujet n'est pas couvert par une fiche existante\n- **Enrichissement d'une fiche existante** si scope aligné\n- **Enrichissement de `prompts.enrichissement`** d'une section si le contenu relève d'un seul document de strate\n\n**Étape 5 — Proposition utilisateur**\nPrésenter à JMJ le clustering + la proposition d'action avant toute écriture DB. JMJ valide/ajuste. Pas d'écriture sans validation.\n\n**Étape 6 — Écriture DB**\nAprès validation :\n- Créer/enrichir les fiches dans `fiches` + `fiche_sections`\n- Extraire les termes candidats → lot enrichissement thésaurus (`gen_prompt_enrichissement.py`, charte Jenni « Bloc de 10 »)\n- Éventuellement UPDATE `prompts.enrichissement` pour les sections ciblées\n\n### Ce qu'on NE fait PAS\n\n- ❌ Pas d'extraction automatique de DOIs vers Zotero depuis les notes\n- ❌ Pas d'écriture directe en DB avant validation JMJ sur le plan\n- ❌ Pas de création d'entrées terms avec définitions forgées depuis les notes — les définitions viennent de Jenni\n- ❌ Pas d'intégration de notes \"trop basiques\" (niveau cours de lycée) au corpus scientifique, même si les termes sont canoniques\n\n### Où archiver les notes déjà traitées\n\nAprès intégration complète et validation, déplacer la note vers `jmj/archives/notes_traitees/` avec un préfixe date et référence aux fiches créées, afin de tracer l'origine sans polluer le répertoire `jmj/` actif.", "type": "regle", "crit": true}, {"id": 132, "titre": "Stratégie agents Task — quand, comment, résilience", "contenu": "## Stratégie — quand et comment utiliser des agents Task\n\nTrois patterns d'usage des **agents** dans le corpus Sol Vivant. Chaque pattern\na son domaine, ses pièges, ses règles de résilience.\n\n### 1. Pattern `agent_runner` — prepare → batches → Task → consolidate\n\n**Quand :** tâche LLM répétitive sur N items indépendants (attribution Zotero\nsur 100 refs, audit_opus sur 50 fiches, validation RIS sur 200 entrées).\nGain : parallélisation massive + reprise sur échec partiel (batches isolés).\n\n**Comment :** utiliser `tools/lib/agent_runner.py`\n- Phase 1 : script `--prepare` écrit les batches JSON dans `tmp/<script>/batches/`\n- Phase 2 : **Claude Code lance les agents Task** lisant les batches, écrivant\n  dans `tmp/<script>/responses/`\n- Phase 3 : script `--consolidate` recharge les responses et produit l'artefact\n\n**Exemples existants :** `audit_opus.py`, `attribution.py`, `analyse_corpus.py`,\n`validate_ris.py` (tous via `lib/agent_runner.py`).\n\n**Pièges :**\n- Ne jamais appeler l'API Anthropic externe — Claude Code EST Opus (règle\n  CLAUDE.md absolue #4). L'agent Task s'exécute dans la session courante.\n- Batches trop gros → timeout. Viser < 60 s d'exécution agent par batch.\n- State.json partagé — ne pas re-préparer sans purger (cf. docstring).\n\n### 2. Pattern agents Task in-session (exploration/extraction)\n\n**Quand :** recherche ouverte dans le code (`Explore`), extraction structurée\nd'un long document, résumé d'un corpus — tâches où je n'ai pas besoin du\nrésultat immédiat en contexte ou quand ça va saturer mon contexte.\n\n**Comment :** `Agent(subagent_type='Explore'|'general-purpose', prompt=...,\nrun_in_background=True)` si je peux continuer d'autres tâches pendant.\n\n**Pièges observés 2026-04-18 :**\n- **Timeout stream idle** après ~130 s. Un agent qui démarre gros plante\n  avant d'écrire son résultat. Leçon : **écriture progressive obligatoire**\n  dans le prompt (« écris tes trouvailles au fil de l'extraction dans\n  /tmp/<file>, ne pas attendre la fin »).\n- **Pas de reprise automatique.** Si l'agent plante, tout son travail est\n  perdu sauf si le prompt l'a forcé à écrire en streaming.\n- **Limite de taille des prompts.** Plus de 1000 lignes d'instructions →\n  l'agent rate la consigne. Viser < 500 lignes.\n\n**Recette anti-timeout :**\n```\n- Briefer l'agent avec un plan en N étapes (N ≤ 6)\n- Exiger une écriture partielle (append) à la fin de CHAQUE étape\n- Demander un résumé final ≤ 300 mots (pas de restitution complète)\n- run_in_background=True quand les tâches ne sont pas bloquantes\n```\n\n### 3. Pattern lecture directe (tool use inline)\n\n**Quand :** analyse qui nécessite d'intégrer le contenu dans mon contexte\npour rédaction, synthèse, articulation avec le reste du corpus. Un agent\nTask me ferait perdre cette capacité (son résultat ne serait qu'un résumé).\n\n**Exemples :** lire un chapitre PDF, rédiger une fiche transversale à partir\nde plusieurs sources, croiser des BQ pour produire un plan.\n\n**Règle :** si je dois produire ensuite un artefact cohérent qui croise ce\nque je lis avec d'autres informations → lecture directe + Write pour\nsauvegarder au fur et à mesure (pour récupération si la session plante).\n\n### Arbitrage — quel pattern ?\n\n| Situation | Pattern |\n|---|---|\n| 50 items LLM indépendants (attribution, audit) | 1 — agent_runner |\n| Extraction structurée d'un long doc (>50 p), résultat en artefact | 2 — Task in-session (avec writes progressifs) |\n| Exploration ouverte du code, recherche ouverte | 2 — Task Explore |\n| Rédaction qui nécessite intégration contextuelle | 3 — lecture directe |\n| Tâche parallélisable où je peux faire autre chose | 2 — Task en background |\n| Artefact unique long (fiche, synthèse) | 3 — lecture + Write progressif |\n\n### Principes transverses\n\n1. **Sauvegarder tôt, sauvegarder souvent.** Tout travail long doit laisser\n   une trace persistante (fichier `/tmp/<work>.md`, ou commit git) au plus\n   tard à mi-parcours. Le timeout Anthropic peut survenir à tout moment.\n\n2. **Ne pas déléguer la compréhension.** Un agent Task ne doit pas recevoir\n   de prompt du type « analyse X puis fais Y » — je dois faire la synthèse\n   moi-même. L'agent extrait, classe, compte. Moi je conclus.\n\n3. **Pas de chaîne d'agents profonde.** Un agent ne devrait pas lancer un\n   autre agent (risque de timeout cascade). Je suis le chef d'orchestre.\n\n4. **Contexte vs parallélisme.** Chaque agent Task a un contexte frais —\n   brief complet dans le prompt, pas de référence à « ce qu'on a dit tout à\n   l'heure ». C'est une feature, pas un bug.\n\n5. **Post-mortem après crash.** Quand un agent plante (timeout, erreur) :\n   - Vérifier ce qui a été écrit sur /tmp/\n   - Raccourcir le périmètre si nécessaire\n   - Relancer avec writes plus fréquents\n\n### Anti-pattern : agents un-a-un au lieu d'agent_runner (incident 2026-04-20)\n\nSession 2026-04-20 : lancement de 27 agents Task individuels pour analyse\nde fiches, au lieu d utiliser `tools/lib/agent_runner.py`. Consequences :\n\n- 27 messages separes, chaque agent pollue le contexte avec son prompt\n  (resume puis resultat) alors que le pattern agent_runner garde les\n  responses hors contexte (`responses/<cid>.json`).\n- Pas de reprise possible si un agent plante a mi-parcours.\n- Parallelisation artisanale (4 a la fois) au lieu de parallele massif\n  dans un seul message.\n- Trois formats de JSON differents produits par les agents (strict, wrap\n  `{sections: ...}`, liste), forcant un normalisateur cote consolidation\n  qui aurait ete evite par un prompt centralise.\n\nCorrection : creation de `tools/admin/analyse_fiches.py` (prepare +\nconsolidate) pour basculer les fiches restantes sur le bon pattern.\n\n**Declencheur mental** : des que j'identifie une tache avec > 5 items LLM\nindependants, avant de lancer le premier agent, penser 'agent_runner'.\nCf. claude_rules.agent_runner_reflexe (affichee a chaque session_start).", "type": "doctrine", "crit": true}, {"id": 140, "titre": "Workflows d analyse — pattern unifie agent_runner", "contenu": "## Workflows d'analyse — pattern unifie agent_runner\n\nToute tache d'analyse repetitive sur N items (fiches, sources, sections,\ndocs, termes) suit le **meme pattern en 3 phases**. Centralisation de\ntoutes les recettes et composants reutilisables.\n\n### Principe\n\n```\n[donnees DB] -> --prepare -> batches/<cid>.json\n               |                  |\n               |          agents Task paralleles (Claude Code, un seul message)\n               |                  |\n               |                  v\n               |           responses/<cid>.json\n               |                  |\n               -> --consolidate -> [DB enrichie / artefact final]\n```\n\n**Ne JAMAIS** lancer les agents un par un via plusieurs messages successifs\n(cf. anti-pattern BQ #132 section finale).\n\n### Scripts partages\n\n| Module | Role |\n|--------|------|\n| `tools/lib/agent_runner.py` | `prepare_batches()` + `load_responses()` |\n| `tools/lib/repair_json.py` | Robustesse parsing JSON d'agents |\n\n### Exemples en production\n\n| Script | Domaine | Format entree | Format sortie |\n|--------|---------|---------------|---------------|\n| `tools/batch/analyse_corpus.py` | Audit modulaire corpus (T1-T2, S1-S2, C1-C2, K1-K2, B1) | 1 batch par passe | JSON rapport par passe |\n| `tools/batch/audit_opus.py` | Audit structure fiches (~50) | 1 batch par fiche | JSON per-fiche |\n| `tools/zotero/attribution.py` | Attribution Zotero ~100 refs | 1 batch par ref | JSON attribution |\n| `tools/zotero/validate_ris.py` | Validation RIS ~200 entrees | 1 batch par entree | JSON validation |\n| `tools/admin/analyse_fiches.py` | Extraction consciente fiches (formules, chiffres, cards, termes candidats) | 1 batch par fiche | JSON par section `{<ordre>: {chiffres_cles, formules, termes_candidats, cards_liees, fiches_liees}}` |\n\n### Recette prompt type pour extraction\n\nLe prompt d'un agent d'analyse DOIT contenir :\n\n1. **Cible explicite** (fiche_id, source_id, ou autre)\n2. **Doctrine rappelee** : \"extraction uniquement, zero redaction\"\n   (reference CLAUDE.md BQ #136 pas_agent_redacteur)\n3. **Format de sortie strict** (JSON avec schema documente) — toujours le\n   MEME format pour que `--consolidate` puisse parser sans normaliseur.\n4. **Commandes SQL pretes a copier-coller** pour l'exploration\n5. **Un modele reference en DB** (\"la fiche #23 a son analyse_claude, consulte-la\")\n6. **Regles concretes** : motifs concrets pas generiques, verifier absence\n   thesaurus avant proposer candidat, etc.\n7. **Output attendu exact** : chemin fichier + resume max 5 lignes\n\n### Anti-patterns frequents\n\n- **Wrapper JSON** : l'agent produit `{\"fiche_id\": X, \"sections\": [...]}`\n  au lieu du schema strict `{\"<ordre>\": {...}}`. Prevention : exemple\n  literal dans le prompt + instruction \"PAS DE WRAPPER\".\n- **Liste au lieu de dict** : l'agent produit `[{ordre:0,...}, ...]`.\n  Prevention : instruction \"cles = ordre (str)\".\n- **Redaction subreptice** : motifs des cards_liees deviennent des resumes\n  rediges. Prevention : \"motif = ce que la section APPORTE, verbe au\n  present indicatif, ≤ 15 mots\".\n- **Cards 'archive' melangees avec 'active'** : rappeler `status='active' UNIQUEMENT`.\n\n### Declencheurs mentaux (pour moi, Claude)\n\n- \"J'ai N fiches / sources / termes a traiter\" avec N > 5\n  → reflexe agent_runner\n- \"Je vais lancer un Agent() pour chaque item\"\n  → STOP, utilise agent_runner (prepare + parallel + consolidate)\n- \"Chaque agent doit retourner du JSON structure\"\n  → agent_runner garde responses hors du contexte principal\n\n### Stockage des resultats d'analyse\n\n| Artefact | Destination |\n|----------|-------------|\n| Extraction par fiche/section | `fiche_sections.analyse_claude` (JSON) |\n| Extraction par source | `jenni_sources.notes_claude` ou table dediee |\n| Rapports d'audit corpus | `audit_reports/<theme>_<date>.md` |\n| Rapport de session | `jmj/rapports/session/rapport_YYYY-MM-DD.md` |\n\n### Voir aussi\n\n- BQ #132 \"Strategie agents Task — quand/comment/resilience\" (doctrine generale)\n- BQ #136 \"Pas d'agents redacteurs\" (regle absolue sur les limites)\n- `claude_rules.agent_runner_reflexe` (affichee a chaque session_start)", "type": "workflow", "crit": true}]}, "archivage": {"nom": "Archivage post-intégration", "entries": [{"id": 125, "titre": "Structure `recherches/` — rangement canonique", "contenu": "## Structure des dossiers de travail `recherches/`\n\n**Source unique** pour tout ce qui est \"document de travail en cours ou\nhistorique\" lié au corpus. Publications/recherches n'existe plus (éliminé\nle 2026-04-14 pour cause de doublon).\n\n### Arborescence canonique\n\n### Biblio PDF JMJ : `jmj/pdf/`\n\nBiblio PDF personnelle de JMJ (poussée sur le repo). Contient les publications académiques, rapports et ressources de référence en PDF que JMJ a rassemblés. Exemples : Shift Project PREF, Kirkby et al. 2016, rapports Triple Performance (Arvalis), guides techniques (Maraîchage Sol Vivant, bilan humique AMG), etc.\n\nUtilisation par Claude : **lecture directe via l'outil Read** (fonction PDF native, avec `pages` pour PDF > 10 pages). Extraire les valeurs chiffrées, paramètres, tableaux pour enrichir `ref_*` tables + `jenni_sources`. Ne jamais copier-coller le contenu dans des fichiers — extraction ciblée et ancrage en DB (comme pour `refs (kind=esclave_energ)` depuis `jmj/pdf/PREF_Shift-Project_Transition-robuste_14-avril-2026.pdf`).\n\n### Arborescence canonique\n\n```\njmj/\n├── pdf/                 # Biblio PDF JMJ (publications académiques, rapports, guides)\n├── archives/            # Documents de travail JMJ (docx, notes, drafts)\n├── session/             # Snapshots DB inter-sessions\n├── analyses/            # Rapports d'audit générés\n└── journaux/            # Journaux de session\n\nrecherches/\n├── fiches/              # Prompts docx fiches en cours (envoye / a_faire)\n├── thesaurus/           # Enrichissement thesaurus (Jenni) :\n│                         #   - thesaurus___strate_*.docx (retours Jenni avec nouveaux termes)\n│                         #   - thesaurus_incomplets_strate_*.docx (listes à compléter)\n│                         #   - enrich_thesaurus_<axe>_<strate>_YYYY-MM-DD.docx (lots export par gen enrich_thesaurus.py)\n├── audits/              # Rapports et audits (mismatches INRAE, sources orphelines, etc.)\n├── sources/             # Exports RIS pour Zotero (sources_incomplete_*.ris)\n└── archives/\n    ├── fiches/          # Fiches traitées (statut integre ou archive)\n    ├── thesaurus/       # Thesaurus traités (à venir)\n    └── prompts_validation/  # Anciens prompts validation archivés\n```\n\n### Règle de rangement\n\n| Ce qu'on produit | Où le ranger |\n|---|---|\n| Prompt docx d'une fiche technique/transversale | `recherches/fiches/` |\n| Retour Jenni thesaurus strate X | `recherches/thesaurus/thesaurus___strate_X.docx` |\n| Docx d'une strate à compléter | `recherches/thesaurus/thesaurus_incomplets_strate_X_<date>.docx` |\n| Audit INRAE / sources orphelines / termes candidats / rapport de session | `recherches/audits/` |\n| Export RIS des sources à enrichir dans Zotero | `recherches/sources/` |\n| Une fois traité (fiche intégrée, thesaurus digéré) | `recherches/archives/<catégorie>/` |\n\n### Scripts conformes\n\nScripts mis à jour le 2026-04-14 :\n- `gen_fiche_prompt_docx.py` → `recherches/fiches/`\n- `gen_prompt_completion.py` → `recherches/completion/`\n- `gen_prompt_enrichissement.py` → `recherches/completion/`\n- `gen_prompt_thesaurus.py` → `recherches/thesaurus/`\n- `export_fiche.py` → `recherches/fiches/`\n- `export_validation.py` → `recherches/audits/`\n- `export_thesaurus_incomplets.py` → `recherches/thesaurus/`\n- `export_sources_incomplete.py` → `recherches/sources/` (à migrer)\n- `export_mismatches_inrae.py` → `recherches/audits/` (à migrer)\n- `export_termes_candidats.py` → `recherches/audits/` (à migrer)\n- `audit_sources_orphelines.py` → `recherches/audits/` (OK)\n\n### Anti-pattern à éviter\n\n- ❌ Créer un `Publications/recherches/` bis (doublonnage historique)\n- ❌ Mettre des audits ou rapports dans `recherches/thesaurus/` (fourre-tout)\n- ❌ Scripts avec chemins hardcodés dans `Publications/` pour du travail\n  intermédiaire (`Publications/` = outputs publiables uniquement)\n\n\n### Note 2026-04-14 — `completion/` déprécié\n\nLe dossier `recherches/completion/` a été supprimé : les termes incomplets\ndu thésaurus repassent désormais dans le workflow initial (docx d'import).\nWorkflow unique :\n- Listes d'incomplets générées en docx dans `recherches/thesaurus/thesaurus_incomplets_strate_X_<date>.docx`\n- Retours Jenni dans `recherches/thesaurus/thesaurus___strate_X.docx`\n- Réimport via `import_termes_jenni.py --replace`\n\nLes anciens `complete_*.txt` sont archivés dans\n`recherches/archives/completion/`. Le script `gen_prompt_completion.py`\nest marqué déprécié.\n\n\n---\n\n### Rapports et audits : voir BQ #134\n\nLes **rapports de session** et **rapports d'audit** ne sont PAS dans\n`recherches/` mais dans `jmj/rapports/` (session / audit) — voir BQ\n#134 pour la structure complete et les paths config. Le dossier\n`recherches/audits/` a ete supprime en avril 2026 (migration vers\n`jmj/rapports/audit/`).", "type": "reference", "crit": true}]}, "jenni-workflow": {"nom": "Workflow Jenni", "entries": [{"id": 39, "titre": "Jenni — ce que c'est", "contenu": "Jenni est un outil de rédaction académique qui produit des **assemblages de citations** depuis des sources Open Access et Google Scholar. Elle ne rédige pas librement — elle cite et structure.\n\nCe que Jenni produit :\n- Un **.docx** = compilation sourcée pilotée par le prompt\n- Un **.ris** = bibliographie des sources utilisées\n\nCe que Jenni fait bien : trouver des sources récentes, citer proprement, structurer un plan H1/H2/H3.\nCe que Jenni ne fait pas : rédiger de la pédagogie, synthétiser, interpréter, relier des concepts entre documents.\n\n**Règle fondamentale** : ne JAMAIS demander à Jenni de sourcer ou citer dans les prompts. C'est **intrinsèquement** ce qu'elle fait — son output EST un assemblage de citations. Lui demander de citer est redondant et peut dégrader la qualité (elle force des citations au lieu de laisser son algorithme sélectionner les plus pertinentes). Les sources viennent du RIS uploadé dans le projet + sa propre recherche Open Access/Scholar.\n\n### Modele de fonctionnement (ajout session 2026-04-12)\n\nJenni n''est pas un chatbot qui repond a des commandes. C''est une **co-redactrice sur document partage** qui developpe un texte existant en le sourcant academiquement. Le prompt .txt est le plan du document (statique), le chat Jenni est le dialogue de co-redaction (dynamique). Ces deux canaux sont distincts et ne doivent pas etre confondus.\n\nVoir BQ : \"Comment Jenni comprend les instructions — modele mental (chartes)\" pour le detail complet.\n\n\n### Bibliographie automatique en fin de docx\n\n**Jenni ajoute AUTOMATIQUEMENT la bibliographie complète au format APA\nà la fin de chaque docx qu'elle produit.** Ne pas demander dans les\nprompts \"ajoute les références\" ou créer de placeholder \"Références\nbibliographiques\" — c'est intrinsèque et redondant, même effet que de\ndemander \"cite les sources\" (BQ règle fondamentale).\n\nConséquence pour les templates de prompt docx (fiches, ébauches) :\n- **Pas de bloc \"Références bibliographiques\"** à pré-poser\n- **Pas de bloc \"Sources\"** à pré-poser\n- Jenni le fera automatiquement dans le document de retour", "type": "regle", "crit": true}, {"id": 137, "titre": "Parser docx Jenni — extraction des formules chimiques OMML obligatoire", "contenu": "## Parseur docx : inclure les formules Office Math ML (OMML)\n\nLes docx produits par Jenni contiennent **TOUTES les formules chimiques, mathématiques, indices et exposants** sous forme d'équations Office Math ML (`<m:oMath>` dans le XML Word). Ex : `NH₃`, `CO₂`, `Fe²⁺`, `NO₃⁻`, `k₁`, `k₂`, `ΔG`, `qCO₂`, `N₂`, `O₂`.\n\n**PIÈGE** : `python-docx` ne lit que `paragraph.text` qui IGNORE les `<m:oMath>`. Un parseur naïf récupère `(...)` vide à la place des formules. Résultat : 24 parenthèses vides dans les 215 termes du 2026-04-20 (`ammoniac ()`, `fer ferreux ()`, `CO₂ ()` → formules manquantes).\n\n**SOLUTION** — parseur XML custom qui :\n1. Parse `word/document.xml` via `xml.etree.ElementTree`\n2. Pour chaque `<w:p>`, parcourt les éléments :\n   - `<w:t>` → texte normal (en skippant ceux à l'intérieur d'un `<m:oMath>`)\n   - `<w:br>` → `\\n`\n   - `<m:oMath>` → conversion récursive en Unicode (sub/sup)\n3. Détecte et supprime les fallbacks texte que Jenni produit parfois après un oMath (ex: `NH₃NH3` → `NH₃`)\n\n**Mapping OMML → Unicode** :\n- `<m:sSub>` : base + chiffres en indices (`₀₁₂₃₄₅₆₇₈₉`)\n- `<m:sSup>` : base + chiffres en exposants (`⁰¹²³⁴⁵⁶⁷⁸⁹⁺⁻`)\n- `<m:sSubSup>` : base + indice + exposant (ex: `Fe²⁺` = Fe sub vide sup 2+)\n- `<m:f>` : fraction `num/den`\n\n**Implémenté dans** : `tools/jenni/import_termes_jenni.py::parse_docx()` (à partir du 2026-04-20).\n\n**Vérification** : après un import Jenni, chercher les `\\(\\s*\\)` dans `definition`, `rt`, `bt`, `syn_fr`, `syn_en`. Si > 0 occurrences, le parser est défaillant ou Jenni a produit des parenthèses vides réelles (rare).\n\n```python\nimport re\nfor r in cur.execute(\"SELECT id, fr FROM terms\"):\n    for f in ['definition','syn_fr','syn_en','bt','rt']:\n        content = cur.execute(f\"SELECT {f} FROM terms WHERE id=?\", (r[0],)).fetchone()[0] or ''\n        if re.search(r'\\(\\s*\\)', content):\n            print(f\"⚠ #{r[0]} {r[1]} [{f}]\")\n```\n\n**Autres sources à patcher** si formules aussi nécessaires :\n- `enrich_thesaurus.py::*` : pas encore de parser math-aware (à vérifier)\n- `integrate_fiche_docx.py` : les fiches utilisent aussi des formules (à vérifier)\n\n**Historique** : violation détectée 2026-04-20 (24 parenthèses vides dans 20 termes après import des docx thesaurus_1/2_20260420.docx). Corrigé en reparse avec OMML puis restauration 45 def + 1 rt. Parser officiel mis à jour.", "type": "technique", "crit": true}, {"id": 40, "titre": "Règle absolue — ce que Jenni ne voit jamais", "contenu": "**S'applique à TOUT contenu destiné à Jenni** : prompts de documents (via export_jenni_doc.py), prompts de fiches, prompts de validation, prompts d'enrichissement du thésaurus — TOUT fichier dans recherches/ ou Publications/prompts/.\n\nAucune référence au corpus dans les prompts :\n- Pas de codes documents (S2, V1, P3, F2...)\n- Pas de \"corpus\", \"strate\", \"Le Sol Vivant cet Holobionte\"\n- Pas de renvois internes (\"voir chapitre X\", \"comme décrit dans...\")\n- Pas de méta-instructions (\"cite les sources\", \"respecte les termes\")\n- Pas de \"chaîne causale C1\", \"concept card\", \"cross-ref\", \"thésaurus\"\n- Pas de références à la DB, aux tables, aux scripts\n\nJenni ne connaît rien du corpus. Elle fait ce qu'on lui dit dans le contexte présent.\n\n**Test de conformité** : avant de générer un prompt, vérifier qu'aucun des termes suivants n'apparaît dans le texte final :\nS0, S1, S2, S3, S4, V1, V2, V3, P1, P2, P3, P4, P5, F1, F2, H1, H2, H3, corpus, strate, cross-ref, chaîne causale, concept card, thésaurus, sol_vivant.db", "type": "regle", "crit": true}, {"id": 120, "titre": "Discipline BQ-clean — prompts jamais en contact avec méta-vocab", "contenu": "## Règle absolue BQ-clean — aucune fuite de méta-vocab dans les prompts Jenni\n\n**Liste noire** (vérifier AVANT génération de tout prompt Jenni) :\n\n- Codes doc : S0-S4, V1-V3, P1-P5, F1-F2, H1-H3\n- Vocab méta-projet : `corpus`, `strate`, `cross-ref`, `chaîne causale`,\n  `concept card`, `thésaurus`, `sol_vivant.db`, `section_key`, `doc_code`\n\n**Sources des leaks** (déjà rencontrés) :\n\n1. **terms.definition** : certains termes ont des définitions qui citent\n   des doc_codes (ex: \"Voir S2 — PGPR\") — violation directe.\n   → Audit et reformulation.\n\n2. **terms.fr / en** : concepts méta tels que\n   \"Chaîne 1 — Photosynthèse → Immunité intestinale\"\n   appartiennent à `chains_causales` (table dédiée), PAS à `terms`.\n   → Supprimer du `terms` si présents.\n\n3. **prompts.titre_h2 / contexte_sci / instructions / enrichissement** :\n   fuites manuelles fréquentes (cross-ref, chaîne causale).\n   → Scan régulier toutes colonnes texte.\n\n**Vérification systématique** :\n\n```python\nFORBIDDEN = [r'\\bchaîne causale\\b', r'\\bcross-ref\\b', r'\\bconcept card\\b',\n             r'\\bsol_vivant\\b', r'Corpus Le Sol Vivant', r'\\bdu corpus\\b',\n             r'\\bdans le corpus\\b', r'\\bthésaurus\\b', r'\\bthesaurus\\b',\n             r'\\bS[0-4]\\b', r'\\bV[1-3]\\b', r'\\bP[1-5]\\b',\n             r'\\bF[12]\\b', r'\\bH[1-3]\\b']\nfor pat in FORBIDDEN:\n    matches = re.findall(pat, text, re.IGNORECASE)\n    assert not matches, f\"Leak {pat}: {matches}\"\n```\n\n**À lancer à chaque régénération** des prompts_jenni_*.txt et\nprompt_fiche_*.docx.", "type": "regle", "crit": true}, {"id": 89, "titre": "Prompts manuels — fiches, enrichissement, pédagogie (templates + destinations)", "contenu": "## Prompts manuels — fiches, validation, enrichissement\n\nLes prompts générés par `export_jenni_doc.py` suivent le masque v3.0 (BQ ID=41). Mais Claude produit aussi des **prompts manuels** pour d'autres usages : fiches de recherche, validation de cohérence, enrichissement terminologique.\n\n**Ces prompts sont AUSSI destinés à Jenni** et doivent respecter les mêmes règles (BQ ID=40).\n\n### Règles de construction\n\n1. **Séparateur** : `---` (pas de `======` ni de `──────`)\n2. **Aucun code interne** : pas de S0, S1, V2, P3, F1, H2, etc.\n3. **Aucun méta-vocabulaire** : pas de corpus, strate, cross-ref, chaîne causale, concept card, thésaurus, sol_vivant.db\n4. **Organiser par thème scientifique**, pas par code document\n5. **Ne jamais demander de citer** — Jenni cite intrinsèquement\n6. **Termes canoniques** : utiliser les noms scientifiques complets, pas les abréviations internes\n\n### Types de prompts manuels\n\n| Type | Usage | Emplacement |\n|------|-------|-------------|\n| Fiche recherche | Explorer un sujet transversal | `recherches/fiches/fiche_*.txt` |\n| Enrichissement thésaurus | Ajouter des termes au glossaire | `recherches/enrich_*.txt` |\n| Renforcement corpus | Enrichir défs vagues, résoudre doublons | `recherches/renforce_*.txt` |\n| Pédagogie calculateurs | Contenu \"cahier de sciences\" pour onglet Comprendre | `recherches/pedago_*.txt` |\n| Validation strate | Vérifier la cohérence d'un ensemble de documents | `recherches/prompt_validation_*.txt` |\n\n### Test de conformité avant export\n\nVérifier qu'aucun des termes suivants n'apparaît dans le prompt final :\n`S0 S1 S2 S3 S4 V1 V2 V3 P1 P2 P3 P4 P5 F1 F2 H1 H2 H3 corpus strate cross-ref chaîne causale concept card thésaurus sol_vivant.db`\n\n### Modèle minimal d'un prompt fiche\n\n```\n---\n[Titre scientifique du sujet]\n---\n\nContexte scientifique :\n[Description du sujet en termes scientifiques purs, sans référence interne]\n\nPlan :\n- Section 1\n- Section 2\n- ...\n\nInstructions :\n[Ce que Jenni doit produire pour chaque section]\n\nTermes à utiliser :\n[Liste de termes scientifiques canoniques]\n---\n```\n\n### (fusionné depuis #94 : Template prompt — Enrichissement thésaurus)\n\n## Template prompt — Enrichissement thésaurus\n\nStocké dans `config.jenni.prompt_enrichissement_thesaurus`.\n\n### Variables de substitution\n- `{section_titre}` : titre de la section (ex: \"concepts structurants\", \"soutien\", \"complémentaire\")\n- `{liste_termes}` : liste formatée des termes, un par ligne avec tiret\n- `{total}` : nombre total de termes\n\n### Format de réponse attendu de Jenni\n```\nTERME : [terme français]\nEN : [traduction anglaise]\nDEF : [définition]\nSYN_FR : [synonyme(s)]\nSYN_EN : [synonyme(s) anglais]\nBT : [terme parent]\nRT : [termes reliés, séparés par ;]\n```\n\n### Usage depuis Python\n\n```python\nfrom config import get\ntemplate = get(conn, 'jenni', 'prompt_enrichissement_thesaurus')\nprompt = template.format(\n    section_titre=\"concepts structurants\",\n    liste_termes='\\n'.join(f'  - {t}' for t in termes),\n    total=len(termes)\n)\n```\n\n### Workflow\n1. Identifier les termes à définir (via audit, fiche, doc cible)\n2. Les grouper par lots thématiques (10 termes max — règle Jenni « Bloc de 10 », cf. BQ charte Jenni)\n3. Remplir le template avec les variables\n4. Coller dans Jenni, récupérer le bloc de réponses\n5. Parser et insérer dans `terms` via import script\n\n### Format plan-graine pour les fiches (ajout session 2026-04-12)\n\nLe prompt fiche n''est pas une liste d''instructions — c''est un **plan de document avec des graines plantees**. La redaction oriente naturellement la reponse de Jenni.\n\n**Structure correcte :**\n```\n[Titre du document]\n\n\nI. [Titre chapitre 1]\n\n[2-4 phrases d''affirmations scientifiques qui plantent la direction. Jenni va les developper et les sourcer.]\n\n\nII. [Titre chapitre 2]\n\nII.1 [Sous-chapitre]\n\n[Graines : affirmations, mecanismes, chiffres a confirmer.]\n\nII.2 [Sous-chapitre]\n\n[Graines...]\n```\n\n**Regles du format plan-graine :**\n- Ecrire comme si c''etait le DEBUT du document reel\n- Structurer avec chapitres numerotes (I, II.1, II.2...)\n- Planter des affirmations scientifiques, pas des questions\n- Les termes canoniques apparaissent dans le corps du texte (pas en liste separee)\n- Pas de meta-instructions dans le .txt (pas de \"redige 1500 mots\", pas de \"cite les sources\")\n- Le .txt est statique, les ajustements se font dans le chat Jenni\n", "type": "regle", "crit": true}, {"id": 95, "titre": "Règle — pas de conseils rédactionnels redondants", "contenu": "## Règle prompts Jenni — pas de conseils rédactionnels redondants\n\nJenni produit naturellement un style concis et adapté au contexte donné. **Ne pas répéter** les conseils de style dans les prompts si le contexte est déjà clair.\n\n### Principe\n\nLe style est défini UNE FOIS dans l'**accroche/contexte initial** du prompt :\n- \"Je travaille sur un glossaire scientifique...\" → suffit à cadrer le style scientifique\n- \"Je rédige un document narratif pour grand public...\" → cadre le style narratif\n\nDans le corps du prompt, **pas besoin** de répéter :\n- ❌ \"Définition **scientifique**\" → mettre \"Définition\"\n- ❌ \"Traduction **académique**\" → mettre \"Traduction\"\n- ❌ \"Registre : manuels universitaires\" → redondant avec \"glossaire scientifique\"\n- ❌ \"Les définitions doivent être concises\" → Jenni est concise par défaut\n\n### Exception : style narratif\n\nSi le doc cible demande un style spécifique NON scientifique (narratif accessible, journalistique, récit), précisez-le dans l'accroche seulement :\n- \"Je rédige un article de vulgarisation pour le grand public...\"\n\n### Bénéfice\n\n- Prompts plus courts et plus lisibles\n- Moins de bruit = meilleure obéissance de Jenni au cadre global\n- Cohérence des réponses (pas de mini-contradictions entre cadre et champs)", "type": "contrainte", "crit": true}, {"id": 101, "titre": "Charte Jenni — règles opérationnelles (enrichissement thésaurus)", "contenu": "## Charte Jenni — règles opérationnelles (enrichissement thésaurus)\n\nSource : `docx/charte_de_recommandations_pour_un_travail_efficace.docx` — document produit par Jenni elle-même pour décrire son fonctionnement et ses attentes de prompt.\n\n**Portée** : s'applique principalement au workflow d'**enrichissement terminologique du thésaurus** mais les principes (bloc borné, balise de repère, structure immuable, validation de format) sont transposables à tous les prompts manuels envoyés à Jenni.\n\n---\n\n### 1. Règle du « Bloc de 10 »\n\nJenni travaille **par blocs de 10 termes maximum** par demande. Au-delà, la qualité des recherches documentaires diminue et le risque de mélange de sources augmente.\n\n**Implication technique** :\n- `gen_prompt_enrichissement.py` → `--max 10` par défaut\n- Plus de termes → plusieurs fichiers `enrich_*_lot{i}.txt`\n- Un fichier = une demande copiée dans Jenni\n\n### 2. La « Balise de Repère »\n\nJenni peut perdre le fil d'une liste longue sur une session étendue. Chaque nouvelle demande doit contenir **un point d'ancrage explicite** :\n\n> « On s'est arrêté à *Mucor hiemalis*. Reprends à partir de *Rhizopus stolonifer* pour les 10 prochains. »\n\n**Implication** : en mode multi-lots, inclure dans chaque prompt généré une phrase du type :\n`Dernier terme validé au lot précédent : {dernier_terme}. Nouveau bloc (10 termes) : commence à {premier_terme}.`\n\n### 3. La structure immuable des champs\n\nJenni a tendance à dévier du format si on ne le rappelle pas. **Chaque prompt doit lister explicitement les champs attendus**, dans l'ordre :\n\n```\nTERME : [terme français]\nEN : [traduction anglaise]\nDEF : [définition scientifique avec citations [N]]\nSYN_FR : [synonymes français]\nSYN_EN : [synonymes anglais]\nBT : [terme générique / parent]\nRT : [termes associés, max 5, séparés par ;]\n```\n\nCe bloc est déjà injecté par `gen_prompt_enrichissement.py` via la constante `STUB`. Ne pas supprimer, même si cela paraît redondant avec le template `config.jenni.prompt_enrichissement_thesaurus`.\n\n### 4. Validation des sources — format `[N]` uniquement\n\nJenni peut utiliser deux formats de citation :\n- `[1] [2] [3]` — identifiants numériques issus de ses outils de recherche (RIS projet + Open Access + Scholar)\n- `(Dupont et al., 2023)` ou URLs inline — format libre\n\n**Règle** : imposer le format `[N]`. Le template `prompt_enrichissement_thesaurus` contient la consigne `Citations au format numérique [N] uniquement — pas d'URLs ni noms d'auteurs entre parenthèses`.\n\n**Règle de validation côté Claude** : lors du parsing du .docx Jenni retourné, **rejeter toute définition** contenant :\n- Des URLs inline (`http://`, `https://`, `www.`)\n- Des noms d'auteurs entre parenthèses avec année (`(Dupont 2023)`, `(Smith et al., 2021)`)\n\nSi format mixte → renvoyer à Jenni avec rappel explicite.\n\n**Note importante** — distinction avec la règle BQ #39 (« Ne jamais demander à Jenni de sourcer ou citer ») :\n- BQ #39 concerne la **demande de citer** elle-même (redondant : Jenni cite intrinsèquement)\n- Cette règle concerne le **format** de citation (Jenni cite par défaut mais peut mélanger les formats)\n- Ce n'est pas contradictoire : on ne lui demande pas de citer, on lui demande d'utiliser un format précis.\n\n---\n\n### 5. Usage de `fetch_document` — présenter un doc de travail à Jenni\n\nJenni dispose d'un outil interne `fetch_document` qui lit un doc actif dans son espace. Pour les workflows longs (enrichissement multi-lots), on peut lui fournir un document de travail plutôt que coller les termes un à un.\n\n**Bonnes pratiques** :\n- **Ne pas donner le `doc_id` alphanumérique seul** — Jenni ne peut pas \"ouvrir\" un ID comme un fichier.\n- **Nommer le document par son titre exact** — confirme à Jenni qu'elle lit la bonne source.\n- **Structurer le document avec une section dédiée** en fin de document :\n\n```markdown\n### LISTE DES TERMES À TRAITER\n\n- Siderophore\n- Biofertilisant\n- Solubilisation du phosphate\n- Mycorhize à arbuscules\n- Rhizobactérie\n...\n```\n\nJenni repère cette section via `fetch_document`, identifie le dernier terme déjà rempli dans le corps, et lit les termes suivants dans la liste. Zéro invention, zéro dérive.\n\n### 6. Prompt type pour un bloc d'enrichissement\n\n```\nJenni, consulte mon document [Titre exact du document].\nNous reprenons le travail d'enrichissement.\n\nDernier terme traité : [nom du dernier terme validé]\nNouveau bloc : Génère les 10 termes suivants de la liste présente dans le document.\n\nStructure à respecter strictement :\nTERME : [Nom]\nEN : [Traduction]\nDEF : [Définition scientifique avec citations [N]]\nSYN_FR : [Synonymes français]\nSYN_EN : [Synonymes anglais]\nBT : [Terme générique]\nRT : [Termes associés]\n\nUtilise uniquement des sources académiques et cite au format [N].\n```\n\n---\n\n### Synthèse — check-list avant envoi d'un prompt d'enrichissement\n\n- [ ] Bloc de **10 termes maximum** ?\n- [ ] **Dernier terme validé** explicitement mentionné ?\n- [ ] **Structure des 7 champs** rappelée dans le prompt ?\n- [ ] Consigne **format `[N]` uniquement** présente ?\n- [ ] Si usage `fetch_document` : **titre exact** du doc utilisé (pas l'ID) ?\n- [ ] Aucun code interne (S0, V2…) — règle BQ #40 ?\n", "type": "regle", "crit": true}, {"id": 104, "titre": "Charte fiches techniques (Jenni) — structure standardisée 8 sous-blocs", "contenu": "## Charte fiches techniques (Jenni)\n\n**Source** : `docx/charte_de_travail___fiches_techniques.docx` — produit par Jenni elle-même pour décrire ses attentes spécifiques aux fiches techniques / protocoles DIY.\n\n**Portée** : s''applique aux fiches `type='technique'` (protocoles DIY, préparations, méthodes de mesure). Vient en complément de la charte Jenni générique (BQ #40, #41, #101).\n\n**S''applique notamment à** : `chelation-aminoacide-diy`, `knf-jadam-preparations`, `ipmo-jakoba-natural-farming`, `rhodopseudomonas-palustris`, `diagnostic-seve-ph-ec`, et toute future fiche de protocole.\n\n---\n\n### Structure du document de travail (en-tête + plan)\n\n```\n# Fiche — [Titre de la fiche]\n# Sections : [Nombre]\n# Termes canoniques : [Nombre]\n---\n\nPlan de la fiche : [Titre]\n  Introduction\n  1. [Section 1]\n  2. [Section 2]\n  ...\n\n---\n```\n\nListe des termes canoniques en **fin** de document, format `Terme — EN: Traduction`.\n\n---\n\n### Structure immuable de chaque section technique (8 sous-blocs)\n\n```\n## [Numéro]. [Titre de la section]\n\n### Contexte scientifique\n[Explication scientifique du mécanisme, de la chimie, des principes actifs]\n\n### Protocole\n#### Ingrédients\n• [Quantité] [Ingrédient 1]\n• [Quantité] [Ingrédient 2]\n\n#### Équipement nécessaire\n• [Équipement 1]\n• [Équipement 2]\n\n#### Procédure\n1. [Étape 1]\n2. [Étape 2]\n\n### Indicateurs de qualité\n• [Indicateur visuel, chimique ou sensoriel]\n\n### Précautions & Stockage\n• [Précaution]\n• [Conditions de stockage]\n\n### Applications & Dosages\n• [Culture] : [Dosage]\n```\n\nCette structure est **demandée explicitement** dans le prompt Jenni de chaque section technique.\n\n---\n\n### Règles métier spécifiques aux protocoles\n\n**A. Précision des dosages**\n- Système métrique (L, g, kg, mL)\n- Pureté chimique explicite (ex. `FeSO₄·7H₂O 99%`)\n- Concentrations finales (ex. `Solution à 5% w/v`)\n\n**B. Sécurité (obligatoire)**\n- EPI requis\n- Risques chimiques spécifiques\n- Procédures en cas d''incident\n\n**C. Indicateurs de qualité**\n- Visuels (couleur, clarté, précipitation)\n- Chimiques (pH cible, densité)\n- Sensoriels (odeur caractéristique)\n\n**D. Stockage**\n- Durée de conservation (ex. `Stable 3 mois à 4°C`)\n- Type de contenant (ex. `Bouteille PET opaque`)\n- Conditions (lumière, température)\n\n**E. Citations**\n- Format `[N]` uniquement (cohérent avec charte Jenni générique)\n- Pas d''URLs ni de noms d''auteurs entre parenthèses\n\n---\n\n### Workflow d''interaction avec Jenni (section par section)\n\nJenni traite **une section à la fois**. Le prompt type pour une section :\n\n```\nJenni, consulte mon document [Nom du document].\nNous travaillons sur la section [Numéro et titre de la section].\nObjectif : Rédiger le contenu complet de cette section en respectant la structure standardisée.\n\nContraintes :\n• Utilise les termes canoniques de la liste quand applicable\n• Cite les sources scientifiques avec le format [N]\n• Inclut les dosages précis et les unités métriques\n• Précise les indicateurs visuels de qualité\n• Mentionne les précautions de sécurité\n\nCommence par le Contexte scientifique, puis le Protocole détaillé.\n```\n\n**Workflow recommandé Jenni** :\n1. Validation du plan\n2. Rédaction section par section (jamais tout d''un coup)\n3. Révision scientifique\n4. Uniformisation\n5. Finalisation (résumé + références)\n\n---\n\n### Implications pour `export_fiche.py`\n\nQuand `fiche.type = 'technique'`, le script doit :\n1. Générer un en-tête conforme (`# Fiche — Titre`, `# Sections : N`, `# Termes canoniques : N`)\n2. Pour chaque section : insérer les contraintes métier explicites dans le prompt\n3. Mentionner la structure 8 sous-blocs attendue\n4. Lister les termes canoniques en fin de document, format `Terme — EN: Traduction`\n5. Ne pas concaténer toutes les sections dans un seul bloc — séparer par `---` (le copier-coller bloc par bloc dans Jenni respecte le « section par section »)\n\n### Check-list avant export d''une fiche technique\n\n- [ ] Type de la fiche = `technique` ?\n- [ ] Sections structurées en `fiche_sections` (1 par section attendue) ?\n- [ ] Termes canoniques liés aux docs cibles bien remplis ?\n- [ ] Aucun code doc (S0, V2…) dans `instructions` / `contexte_sci` ?\n- [ ] Aucun méta-vocabulaire (`corpus`, `thésaurus`…) ?\n- [ ] Citations en format `[N]` (pas d''Auteur, année) ?\n- [ ] Dosages en métrique ?\n- [ ] EPI/sécurité prévus ?", "type": "regle", "crit": true}, {"id": 109, "titre": "Comment Jenni comprend les instructions — modele mental (chartes)", "contenu": "## Comment Jenni comprend les instructions — modele mental (source : chartes Jenni)\n\nSource : deux chartes redigees par Jenni elle-meme (docx/charte_de_recommandations_pour_un_travail_efficace.docx et docx/charte_de_travail___fiches_techniques.docx).\n\n### Jenni est une co-redactrice sur document partage, pas un chatbot\n\nJenni ne repond pas a des \"commandes\". Elle **developpe un document existant** :\n- Elle scanne le document de travail via `fetch_document` pour comprendre la structure\n- Elle lit le plan pour savoir ou elle en est\n- Elle lit les graines (affirmations plantees) pour orienter ses recherches academiques\n- Elle travaille **section par section** dans le chat, pas tout d''un bloc\n- Si une section est vide (pas de graine), elle improvise — et risque de diverger\n\n### Le prompt .txt est le plan du document, le chat est le dialogue\n\n**Deux canaux distincts, deux roles distincts :**\n\n| Canal | Role | Contient |\n|---|---|---|\n| **.txt** (prompt) | Plan statique du document | Structure (chapitres, sous-chapitres), graines (affirmations a developper), termes canoniques |\n| **Chat Jenni** | Dialogue vivant | Demande section par section, remarques de Jenni, propositions de recherches, ajustements |\n\nLe .txt ne dialogue pas. Il pose le cadre. Le chat execute section par section.\n\n**Consequence pratique** : ne jamais mettre d''instructions (\"fais ceci\", \"ne fais pas cela\", \"cite en format X\") dans le .txt. Ces consignes passent par le chat.\n\n### Le prompt ideal est un document amorce\n\nLe prompt n''est pas une commande — c''est un **etat initial synthetique du document** pour lequel on demande un enrichissement. La redaction oriente naturellement la reponse :\n- Chaque phrase plantee est une graine que Jenni va developper et sourcer\n- La structure (I, II.1, II.2...) conditionne la structure du retour\n- Les termes scientifiques utilises dans les graines orientent les recherches de Jenni\n- Plus les graines sont precises et scientifiques, plus les recherches de Jenni sont poussees\n\n### Mecanismes internes de Jenni (reveles par les chartes)\n\n1. **Perte de fil en session longue** : Jenni peut perdre le contexte apres ~4-5 sections. Solution : travailler section par section dans le chat, avec balise de repere (\"on s''est arrete a la section V, reprends a VI\").\n\n2. **Divergence si document vide** : si le document ne contient pas de contenu apres le dernier point traite, Jenni improvise (invente des sections, change de sujet). Solution : planter des graines dans toutes les sections, meme minimales.\n\n3. **fetch_document** : Jenni scanne le document de travail pour se reperer. Elle voit la structure, les titres, les termes. D''ou l''importance d''une numerotation claire et de termes canoniques presents dans le corps du texte.\n\n4. **Recherches spontanees** : quand un sujet l''inspire ou qu''elle detecte un angle sous-documente, Jenni propose spontanement des recherches recentes via le chat. Ces propositions sont souvent les plus precieuses.\n\n5. **Format APA par defaut** : configure globalement dans le projet Jenni, pas besoin de le preciser dans les prompts.\n\n### Implications pour la construction des prompts\n\n| Faire | Ne pas faire |\n|---|---|\n| Ecrire le prompt comme si c''etait le debut du document | Ecrire le prompt comme une liste d''instructions |\n| Structurer avec chapitres numerotes (I, II.1...) | Laisser Jenni inventer la structure |\n| Planter des affirmations scientifiques comme graines | Poser des questions generiques |\n| Mettre les termes canoniques dans le corps du texte | Mettre une liste de termes en annexe deconnectee |\n| Travailler section par section dans le chat | Demander tout d''un coup |\n| Utiliser les balises de repere en session longue | Presumer que Jenni se souvient de tout |\n", "type": "reference", "crit": true}, {"id": 122, "titre": "Contraintes de rendu — docx destinés à Jenni (tous types)", "contenu": "## Contraintes de rendu — docx destinés à Jenni\n\n**S'applique à TOUS les .docx générés pour Jenni** : prompts de fiches\n(techniques ou transversales), ébauches de documents de strate, prompts\nde complétion, docx de travail.\n\n### 1. Hiérarchie des titres — Title / H1 / H2 / H3 (H3 max)\n\nJenni ne gère pas les titres au-delà de H3. Hiérarchie effective :\n\n- **Title** (python-docx level 0) : nom du document — un seul, en tête\n- **H1** (level 1) : chapitres = sections principales\n  (Plan, Introduction, sections body, Conclusion, Résumé, Références,\n  Glossaire, Annexes, Termes canoniques)\n- **H2** (level 2) : sous-chapitres\n  (Ex fiche technique : Contexte scientifique, Protocole, Indicateurs,\n  Précautions, Applications. Ex doc strate : 1.1, 1.2, 2.1… sous un H1 chapitre)\n- **H3** (level 3) : sous-sous-chapitres\n  (Ex fiche technique : Ingrédients, Équipement, Procédure sous Protocole)\n\n**Pas de H4** — toute sous-structure au-delà de H3 doit passer en texte gras\ninline, liste à puces ou paragraphe normal.\n\n### 2. Titre du document — court, sans accent\n\nJenni sauvegarde son document de retour en utilisant le titre (style Title)\ncomme **nom de fichier**. Le titre doit donc être :\n\n- **court** (≤ 5 mots si possible, idéalement 2-4)\n- **sans accent** (compatibilité système de fichiers : pas de é, è, à, ô, ç)\n- **sans caractères spéciaux** (virgules, dashes étendus `—`, tirets cadratins)\n\nImplémentation : dériver le titre du slug via une fonction\n`titre_court_sans_accent(slug)`. Ex : slug `'chelation-aminoacide-diy'` →\ntitre `\"Chelation Aminoacide DIY\"`.\n\nLe titre descriptif complet (avec accents, long) peut rester dans un\nen-tête métadonnées après le Title (ex : `# Fiche — [titre complet]`).\n\n### 3. Scripts concernés\n\nTous les scripts qui émettent du docx pour Jenni doivent respecter\nces contraintes :\n\n| Script | Rôle |\n|---|---|\n| `tools/jenni/gen_fiche_prompt_docx.py` | Prompts de fiches (tous types) |\n| `tools/jenni/gen_doc_ebauche.py` | Ébauches docs de strate |\n| `tools/jenni/export_thesaurus_incomplets.py` | Liste termes à compléter |\n\nEn cas de modification d'un de ces scripts ou de création d'un nouveau :\n- Titre → style Title (level 0), court sans accent\n- Chapitres (sections principales) → H1\n- Sous-chapitres → H2\n- Sous-sous-chapitres → H3 max (sinon texte gras)\n\n\n### 3. Pas de séparateurs / décorations ASCII\n\nAucune décoration ASCII dans le corps des docx destinés à Jenni :\n- Pas de lignes de séparation (`─ * 40`, `─ * 60`, `=========`, `---`)\n- Pas de banderoles de titres (`## TITRE ##`, `== SECTION ==`)\n- Pas d'ornements Unicode (`▸ ▪ ❯ ▰`)\n\nRègle cohérente avec la BQ Jenni qui interdit déjà l'encadrement de titres\net la décoration ASCII dans les prompts. La structure visuelle passe\nuniquement par la hiérarchie H1/H2/H3 native de Word (bonne pratique\néditoriale : le lecteur navigue via le volet Navigation).\n\nImplémentation corrigée 2026-04-14 :\n- `gen_fiche_prompt_docx.py` : suppression des `─ * 40`\n- `gen_doc_ebauche.py` : suppression de `SEPARATOR`, `add_separator()`\n\n\n### 4. Préférer la structure plate au sein d'un chapitre H1\n\n
