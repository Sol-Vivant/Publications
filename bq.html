nsion}` |\n| `terms` | `terms` | `{id, fr, syn_en, definition}` |\n| `cahier` | `config.cahier.chapitres` | `contenu` de la section référencée |\n| `richtext` | inline | `contenu` tel quel |\n\nChaque `gen_<page>.py` appelle `build_comprendre_data(con, '<page_slug>')` et\ninjecte le résultat dans `DATA.comprendre`.\n\n### Rendu JSX\n\n```jsx\nfunction ComprendreView() {\n  return <SvComprendre data={DATA.comprendre} />;\n}\n```\n\nLe composant `SvComprendre` (dans `sv-shared-components`) rend :\n- `SvCahierLink` en tête si `cahier_link` défini\n- Une `SvCollapse` par section, avec sous-composant selon le type :\n  - `SvComprendreFiche` → `SvRichText` + `SvSourceList` (refs)\n  - `SvComprendreCards` → grille `.sv-comprendre-cards` avec liens `concept_cards.html#card-<id>`\n  - `SvComprendreTerms` → liste `.sv-comprendre-terms` (FR/EN/définition thésaurus)\n  - `cahier`/`richtext` → `SvRichText` sur le contenu\n\n### Règles\n\n1. **Zéro texte éditorial dans le JSX** — tout passe par `config.<page>.comprendre`\n2. **Les définitions viennent du thésaurus** (`terms.definition`), pas de re-rédaction\n3. **Les explications viennent des fiches Jenni** (`fiche_contenus.contenu_integre`)\n4. **Les concepts viennent des concept_cards** (`concept_cards.description`)\n5. **Un même terme affiché sur 2 calculateurs = même définition** (single source of truth)\n\n### Ajouter une nouvelle page avec onglet Comprendre\n\n1. `INSERT INTO config(categorie, cle, valeur) VALUES ('<page_slug>', 'comprendre', '<json>')`\n2. Dans `gen_<page>.py` : `data['comprendre'] = build_comprendre_data(con, '<page_slug>')`\n3. Dans le template JS : `<SvComprendre data={DATA.comprendre} />`\n4. Regénérer la page\n\nPlus besoin de coder un nouveau JSX — remplir le JSON en DB suffit.", "type": "reference", "crit": true}]}}}</script>
<script>
const DATA = JSON.parse(document.getElementById('bq-data').textContent);
function norm(s) {
  return (s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[-_\s]+/g,' ');
}
function escape(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function mdInline(s) {
  // Escape HTML d'abord, puis applique formatages markdown
  s = escape(s);
  // Code inline `code`
  s = s.replace(/`([^`\n]+?)`/g, '<code>$1</code>');
  // Barre ~~text~~
  s = s.replace(/~~([^~\n]+?)~~/g, '<del>$1</del>');
  // Gras **text**
  s = s.replace(/\*\*([^\*\n]+?)\*\*/g, '<strong>$1</strong>');
  // Italique *text*
  s = s.replace(/(^|[^\*])\*([^\*\n]+?)\*(?!\*)/g, '$1<em>$2</em>');
  return s;
}
function mdBlock(s) {
  // Rend paragraphes + titres + puces (minimal)
  const lines = s.split('\n');
  const out = [];
  let inList = false;
  for (const raw of lines) {
    const line = raw.replace(/\s+$/, '');
    const h = line.match(/^(#{1,4})\s+(.+)$/);
    if (h) {
      if (inList) { out.push('</ul>'); inList = false; }
      const lvl = Math.min(h[1].length + 2, 6);
      out.push(`<h${lvl} style="margin:.5em 0 .2em;font-size:${1.05 - lvl*0.05}em">${mdInline(h[2])}</h${lvl}>`);
      continue;
    }
    const li = line.match(/^\s*[-•]\s+(.+)$/);
    if (li) {
      if (!inList) { out.push('<ul style="margin:.3em 0;padding-left:1.5em">'); inList = true; }
      out.push(`<li>${mdInline(li[1])}</li>`);
      continue;
    }
    if (inList) { out.push('</ul>'); inList = false; }
    if (!line.trim()) { out.push(''); continue; }
    out.push(`<p style="margin:.3em 0">${mdInline(line)}</p>`);
  }
  if (inList) out.push('</ul>');
  return out.join('\n');
}
function render(filter) {
  const f = norm(filter);
  const body = document.getElementById('body');
  body.innerHTML = '';
  let visible = 0;
  for (const [cat, doms] of Object.entries(DATA)) {
    const entries = [];
    for (const [dslug, dinfo] of Object.entries(doms)) {
      for (const e of dinfo.entries) {
        if (!f || norm(e.titre).includes(f) || norm(e.contenu).includes(f)) {
          entries.push({dom: dinfo.nom || dslug, ...e});
        }
      }
    }
    if (entries.length === 0) continue;
    const catDiv = document.createElement('div');
    catDiv.innerHTML = `<div class="cat">${cat} (${entries.length})</div>`;
    const domMap = {};
    for (const e of entries) {
      (domMap[e.dom] = domMap[e.dom] || []).push(e);
    }
    for (const [dom, es] of Object.entries(domMap)) {
      const dd = document.createElement('div');
      dd.innerHTML = `<div class="dom">${dom}</div>`;
      for (const e of es) {
        visible++;
        const crit = e.crit ? '<span class="crit-mark">🔴</span>' : '';
        const critClass = e.crit ? ' crit' : '';
        const typ = e.type ? `<span class="type">${e.type}</span>` : '';
        const det = document.createElement('details');
        det.className = 'e' + critClass;
        det.innerHTML = `<summary><span class="id">#${e.id}</span>${crit}${e.titre}${typ}</summary><div class="contenu"></div>`;
        det.querySelector('.contenu').innerHTML = mdBlock(e.contenu);
        dd.appendChild(det);
      }
      catDiv.appendChild(dd);
    }
    body.appendChild(catDiv);
  }
  document.getElementById('stats').textContent = `${visible} entrée(s) visibles${f ? ' — filtre: \'' + filter + '\'' : ''}`;
}
document.getElementById('filter').addEventListener('input', e => render(e.target.value));
render('');
</script>
</body></html>
