 `concept_cards.notes`.\n\n**Exécution dans phase 4bis** (pas automatique dans `--apply`) : voir section dédiée ci-dessous.\n\n### Étape 7 — Gate\n\nContrôle de cohérence final :\n\n- **Violations** (bloquent apply) : parens vides résiduelles, autoréférences `(nd)` non résolues, méta-vocab détecté dans le retour Jenni.\n- **Warnings** (apply autorisé avec `--partial`) : refs sans DOI/URL, sections vides, structure incomplète.\n\n**Zéro violation + zéro warning requis** pour `statut=integre` nominal. Avec warnings → `statut=integre_partiel` si `--partial`.\n\n### Apply (exécution)\n\nAu green-light du gate :\n\n```\n✓ UPSERT fiche_contenus (contenu_integre + refs JSON)\n✓ DELETE source_usages anciens pour la fiche\n✓ INSERT N source_usages (refs déjà en DB)\n✓ UPDATE fiches : statut=integre, version=version+1, updated_at\n✓ audit_log (operation=INTEGRATE)\n✓ COMMIT\n```\n\n### Archivage automatique\n\nRègle absolue (CLAUDE.md) : dès qu'une fiche passe `integre` ou `integre_partiel`, déplacer les fichiers sources dans `archives/` :\n\n```\ndocx/<slug>.docx                         → docx/archives/<slug>.docx\nrecherches/fiches/fiche_<slug>_<date>.docx → recherches/fiches/archives/\n```\n\nImplémenté dans `tools/admin/integrate_fiche_docx.py::archive_fiche_files()`. Idempotent, journalisé `audit_log(operation='ARCHIVE', table='files')`.\n\n**Note** : le script `integrate_fiche.py --apply` ne fait pas encore l'archivage automatique (TODO signalé dans sa sortie). L'archivage est à appeler manuellement ou via le script admin.\n\n---\n\n## Phase 4bis — Effet d'entraînement (règle absolue)\n\n**Nouveau, ajouté 2026-04-22 suite à la demande explicite JMJ.**\n\n### Pourquoi cette phase est obligatoire\n\nUne fiche intégrée peut contenir des données, paradigmes ou arbitrages qui impactent d'autres fiches en cours ou en attente d'envoi Jenni. Envoyer à Jenni une fiche obsolète parce qu'on n'a pas propagé l'apport d'une intégration précédente produit du contenu incohérent et du travail perdu.\n\n**Cas de référence** : articulation `k1 / MAOM / POM` entre fiches #4 (Kirkby NPS), #11 (Soil Continuum Model), #65 (pompe microbienne). Si #65 est intégrée avec un nouveau paradigme mais que #4 et #11 gardent leur version antérieure au moment d'aller à Jenni, on produit un corpus qui se contredit.\n\n### Procédure obligatoire post-apply\n\n**1. Scan des impacts potentiels** — pour chaque fiche `en_cours`, `a_faire` ou `integre_extrait`, mesurer le recoupement de contenu :\n\n- Cards partagées (intersection `docs_cibles` + cards communes)\n- Termes-clés du thésaurus en commun\n- Chaînes causales traversées en commun\n- Tokens distinctifs du slug et titre\n\n**2. Renforcement des cards prioritaires** — pour les cards avec score ≥ 5 dans l'audit croisé, ajouter une note dans `concept_cards.notes` :\n\n```\n[Apport fiche #<N> v<version> (<date>)]\nApport fiche #<N> v<version> : <synthèse 3-5 lignes de ce que la fiche enrichit\ndans cette card en particulier>.\n```\n\nExécuté sur fiche #57 : 8 cards prioritaires renforcées (#80 mère, #77/#78/#79 sœurs cascades, #56 continuum, #8 socio-éco, #57 résistome, #93 triangle maladies).\n\n**3. Décision éditoriale par fiche impactée** :\n\n- **Mise à jour automatique sans envoi Jenni** : si l'impact est mécanique (ex : ajout d'une ref de la fiche source dans la biblio de la fiche impactée) → script peut le faire.\n- **Mise à jour manuelle avant envoi Jenni** : si l'impact est éditorial (reformulation d'une affirmation contradictoire, intégration d'un nouveau paradigme) → Claude édite `fiche_sections.contenu` avec validation JMJ.\n- **Simple alerte** : si l'impact est minime → ajouter une note dans `fiches.notes` de la fiche impactée pour que JMJ en tienne compte lors de la revue du retour Jenni.\n\n**4. Ne jamais envoyer à Jenni une fiche en cours** qui cite explicitement un sujet traité dans une fiche plus récemment intégrée sans avoir propagé les apports. La fiche reçue en retour serait datée.\n\n**5. Audit log systématique** — chaque fiche impactée met à jour ses `notes` avec une entrée `[Propagation fiche #<src> v<N> (<date>)]` synthétisant la correction apportée.\n\n### Règle d'ordre des intégrations\n\nQuand plusieurs fiches sont au retour Jenni en même temps et se recoupent (cas fréquent lot thématique), intégrer dans l'ordre :\n\n1. **Fiche maîtresse ou la plus transversale** (ex : cascade E0-E5, pompe microbienne MAOM, continuum sol-plante-humain)\n2. **Fiches plus spécifiques** qui peuvent ensuite être réalignées sur la maîtresse\n\nIntégrer une spécifique avant la transversale produit l'effet inverse : la transversale devra être révisée au regard de la spécifique, alors qu'elle aurait dû fixer le cadre.\n\n### Rapport d'audit croisé\n\nPour chaque intégration significative, produire `audit_reports/audit_croise_fiche<N>_<date>.md` avec 7 volets :\n\n- A. Cards concernées (scores overlap)\n- B. Chaînes causales traversées\n- C. Termes thésaurus mobilisés (par strate)\n- D. Autres fiches en recouvrement (redondance / articulation)\n- E. Contradictions potentielles (vérification manuelle Claude + JMJ)\n- F. Bibliographie (refs liées vs nouvelles)\n- G. Actions recommandées par priorité\n\nModèle exécuté avec succès sur fiche #57 : `audit_reports/audit_croise_fiche57_2026-04-22.md` (9 k octets).\n\n### Script d'aide (TODO)\n\nUn module `tools/admin/propagate_integration_to_pending_fiches.py` pourrait automatiser les étapes 1-2 (scan impacts + renforcement cards). L'étape 3 (décision éditoriale par fiche) reste humaine.\n\n---\n\n## Reprise d'une fiche déjà intégrée (canal Jenni)\n\nUne fiche en statut `integre` peut être retouchée pour :\n- Enrichissement biblio ponctuel\n- Ajout d'une section\n- Correction d'une affirmation à la suite d'une nouvelle étude\n- Reformatage `[N]`\n\nDeux canaux selon le besoin :\n\n### Canal 1 — Chat Jenni direct\n\nPour une demande simple et ponctuelle, JMJ interroge Jenni dans le chat : copier-coller du contenu ou description de la modification. Jenni enrichit à la volée. **Claude n'a rien à préparer**.\n\n### Canal 2 — Document de travail uploadé\n\nPour une reprise structurée multi-sections, Jenni travaille sur un `.docx` uploadé dans le projet. **Claude produit le `.docx` depuis le contenu DB** via `gen_fiche_docx.py` (qui lit `fiche_sections.contenu` et la biblio stockée dans `fiche_contenus.refs`), jamais un `.txt`.\n\nAu retour, le pipeline d'intégration s'applique normalement (version passe à N+1, diff vs version précédente calculée).\n\n---\n\n## Scripts clés\n\n| Script | Rôle |\n|---|---|\n| `tools/jenni/integrate_fiche.py` | Pipeline d'intégration complet (dry-run puis --apply) |\n| `tools/admin/integrate_fiche_docx.py::archive_fiche_files()` | Archivage automatique post-intégration |\n| `tools/jenni/gen_fiche_docx.py` | Génération docx depuis DB (fiche rédigée ou reprise) |\n\n## Anti-patterns confirmés\n\n- **Pas d'intégration automatique sans gate vert** — toujours dry-run d'abord, vérifier absence de violations.\n- **Pas d'oubli de la phase 4bis** — chaque intégration impacte potentiellement les fiches en cours. Absence de propagation = construction silencieuse d'incohérences dans le corpus.\n- **Pas d'import direct des nouvelles refs Jenni dans `terms`** — seul le workflow thésaurus standard (export liste à Jenni → retour docx → `import_termes_jenni.py`) crée des termes canoniques.\n- **Pas d'archivage manuel oublié** — les `docx/` et `recherches/fiches/` doivent rester propres ; seules les fiches en cycle actif y restent.\n\n\n### Matching des sections à l'intégration — rôle de la numérotation dans le titre\n\nLe parseur (étape 1) aligne les sections du docx retour Jenni avec les sections du plan DB (`fiche_sections` ordonnées par `ordre`). L'alignement utilise :\n\n1. **Prioritairement la numérotation dans le texte du titre** (règle de production, cf. BQ #130 `wf_fiche_production`). Un titre de section qui commence par `1.`, `2.`, … dans le docx retour est matché avec la section DB qui porte le même numéro dans son `fiche_sections.titre`.\n2. **Secondairement le niveau Word** (H1, H2, H3). Si Jenni a changé le niveau, l'alignement fonctionne toujours via le numéro.\n3. **Le texte complet** comme tie-breaker si ambiguïté (correspondance floue acceptable sur le reste du titre après le numéro).\n\nSans numérotation dans le titre DB, un décalage d'ordre entre docx retour et plan DB désaligne toutes les sections suivantes en cascade — erreur visible seulement à l'intégration, coûteuse à corriger manuellement. C'est pourquoi la règle de numérotation dans le titre DB est **critique** pour la robustesse du pipeline d'intégration.", "type": "workflow", "crit": true}]}, "docs": {"nom": "Pipeline docs strate", "entries": [{"id": 2, "titre": "18 documents — état de production", "contenu": "Requête de démarrage :\n```sql\nSELECT d.code, d.titre, d.strate,\n       jdv.version, CASE jdv.is_frozen WHEN 1 THEN '🔒' ELSE '✏️' END as etat,\n       jds.statut_redaction, jds.priorite\nFROM documents d\nLEFT JOIN jenni_doc_versions jdv ON jdv.doc_code=d.code\nLEFT JOIN jenni_doc_specs jds ON jds.doc_code=d.code\nORDER BY jds.priorite;\n```", "type": "commande", "crit": false}, {"id": 4, "titre": "Ordre de rédaction des 18 documents", "contenu": "Phase 1 — Fondations Sol (tout le corpus y renvoie) : F1 > F2 > S0 > S1 > S2 > S3 > S4\nPhase 2 — Vivant : V1 > V2 > V3\nPhase 3 — Pratiques : P1 > P2 > P3 > P4 > P5\nPhase 4 — Humain (EN DERNIER) : H3 > H2 > H1\n\nH1 est toujours le dernier document — synthèse de tout le corpus.", "type": "reference", "crit": false}, {"id": 42, "titre": "Workflow de rédaction", "contenu": "**Passe 1 — Rédaction (Jenni) :**\n1. Générer les prompts :\n   `python3 export_jenni_doc.py --db sol_vivant.db --doc S0`\n2. Dans Jenni : créer un projet, uploader le RIS filtré (sources pertinentes depuis `jenni_sources`)\n3. Copier-coller le bloc initial (plan + termes) puis chaque prompt un par un\n   → Jenni produit le jet brut one-shot (assemblage de citations sourcées)\n   → Jenni peut proposer des enrichissements spontanés quand le sujet l'inspire\n4. Exporter le .docx et le .ris produits\n\n**Passe 2 — Analyse et intégration (Claude) :**\n1. Donner le .docx à Claude\n2. Claude analyse chaque section :\n   - Extraire les faits établis, données chiffrées, mécanismes\n   - Identifier les nouveaux termes candidats → table terms\n   - Extraire les références → `jenni_sources` (via le RIS)\n   - Enrichir le corpus : cross-refs, relations, concept cards si nécessaire\n3. Intégrer dans la DB\n\n**Passe 3 — Validation (3 révisions par agent spécialisé) :**\n1. Agent de validation vérifie les affirmations du .docx\n2. 3 passes de révision pour confirmer la solidité scientifique\n3. Corrections intégrées si nécessaire\n\n**Ancien workflow (obsolète) :** analyse Claude → retour Jenni → re-analyse Claude. Abandonné car les prompts enrichis en amont guident suffisamment la rédaction — Jenni produit directement un contenu solide et ses recherches sont plus poussées quand le prompt est précis.\n\n**Règles :**\n- Ne JAMAIS demander à Jenni de sourcer (c'est intrinsèque)\n- Le .docx Jenni ne rentre JAMAIS tel quel en DB — tout passe par analyse Claude\n- Aucune référence au corpus dans les prompts (BQ ID=40)\n- Ordre de rédaction : F → S → V → P → H\n\n### Precision workflow Passe 1 (ajout session 2026-04-12)\n\n**Le travail avec Jenni se fait section par section dans le chat**, pas en copier-collant tout le prompt d''un coup. Le .txt pose le plan complet, mais JMJ le parcourt avec Jenni une section a la fois :\n1. Coller le bloc initial (plan + termes) dans le document Jenni\n2. Dans le chat : demander a Jenni de rediger la section I\n3. Jenni redige, propose des recherches, fait des remarques\n4. JMJ valide ou ajuste dans le chat\n5. Passer a la section II, etc.\n6. Utiliser des balises de repere si la session est longue (\"on reprend a la section V\")\n\nJenni perd le fil apres ~4-5 sections sans balise. Ne jamais presumer qu''elle se souvient du contexte complet.\n", "type": "commande", "crit": true}, {"id": 43, "titre": "Commande de génération", "contenu": "python3 export_jenni_doc.py --db sol_vivant.db --doc S2\n\nOu toute une strate :\nfor doc in S0 S1 S2 S3 S4; do python3 export_jenni_doc.py --db sol_vivant.db --doc $doc; done\n\nOu tous les documents :\npython3 export_jenni_doc.py --db sol_vivant.db --all\n\nLe fichier produit (prompts_jenni_S2.txt) contient tous les prompts séparés par `---`. Copier-coller un par un.", "type": "commande", "crit": false}, {"id": 148, "titre": "Documents de strate — définition et taxonomie", "contenu": "## Documents de strate — définition et taxonomie\n\n### Définition canonique\n\n> **Un document de strate est une partie structurante du corpus, rédigée autour d'un axe thématique précis, couvrant un périmètre défini par sa place dans la carte F/S/V/P/H.**\n\nLes 18 documents composent l'ossature éditoriale du corpus. Chaque document est unique, fixé dès la conception du projet, et couvre un angle qui ne se recoupe que partiellement avec les autres. À la différence des fiches (zoom d'un point précis), un document de strate est une **synthèse organisée** qui couvre son sujet en profondeur sur plusieurs chapitres et sections.\n\n### Les 18 documents du corpus\n\n| Strate | Code | Titre | Position plan |\n|---|---|---|---|\n| F (Fondements) | F1 | Le Temps Long | P1 |\n| F (Fondements) | F2 | L'Économie du Vivant | P2 |\n| S (Sol) | S0 | L'Eau dans le Sol Vivant | P5 |\n| S (Sol) | S1 | Architecture du Sol | P6 |\n| S (Sol) | S2 | Le Microbiome du Sol | P7 |\n| S (Sol) | S3 | Le Microbiome Fongique et Mycorhizien | P8 |\n| S (Sol) | S4 | Le Carbone et les Grands Cycles | P9 |\n| V (Vivant) | V1 | La Faune du Sol | P10 |\n| V (Vivant) | V2 | L'Holobionte Plante-Microbiome | P11 |\n| V (Vivant) | V3 | Les Fermentations Microbiennes | P12 |\n| P (Pratiques) | P1 | Diagnostic du Sol Vivant | P13 |\n| P (Pratiques) | P2 | Agriculture de Conservation | P14 |\n| P (Pratiques) | P3 | Biostimulants et Fermentations Appliquées | P15 |\n| P (Pratiques) | P4 | Agroforesterie et Systèmes Pérennes | P16 |\n| P (Pratiques) | P5 | La Transition | P17 |\n| H (Humain) | H1 | Sol, Alimentation et Santé Humaine | P19 |\n| H (Humain) | H2 | Le Microbiome Intestinal | P18 |\n| H (Humain) | H3 | La Résistance Antimicrobienne | P20 |\n\n### Ce qu'un document EST\n\n- Une synthèse structurée en chapitres et sections sur un axe thématique précis\n- Un texte long (15-40 k mots rédigés) construit pour servir de socle éditorial\n- Un élément fixe de l'ossature du corpus (les 18 docs sont définis, pas créés à la demande)\n- Un cadre nourri par les fiches transversales et zooms intégrés au fil du temps\n\n### Ce qu'un document N'EST PAS\n\n- Une fiche (zoom court d'un point précis) — voir BQ `fiche_definition`\n- Une validation d'affirmation ou de chaîne — voir BQ validations\n- Un document créé à la demande — les 18 docs sont fixés dès la conception\n\n### Tables du modèle\n\n- **`documents`** : métadonnées (code, titre, sous_titre, strate, resume, statut)\n- **`prompts`** : sections du plan (une ligne par section avec type `intro`/`section`/`conclusion`), champs `chapitre`, `section`, `titre_h1`, `titre_h2`, `titre_h3`, `contexte_sci`, `instructions`, `enrichissement`, `style`, `tableau`, `ordre`, `statut`\n- **`doc_contenus`** : contenu rédigé INTÉGRÉ (blob markdown du retour Jenni, une ligne par doc avec `contenu_integre`, `refs` JSON, versionné). **Source canonique du texte final.**\n- **`jenni_doc_specs`** : métadonnées amont du prompt de document (titre_jenni, angle_entree, public, priorite, style global)\n- **`source_usages`** : FK vers `jenni_sources` quand le doc cite des refs déjà en DB\n\n### Vues utiles\n\n- `v_prompts_actifs` — prompts de sections en cours\n- `v_prompts_incomplets` — sections sans contexte_sci ou instructions\n- `v_avancement` — état du cycle de production par doc\n- `v_sante` — dashboard santé globale du corpus\n\n### Champs et tables dépréciés (**ne pas utiliser**)\n\n- `jenni_doc_versions` : **legacy** — versions historiques prompts/ébauches. Non lue par la carto (`gen_web.py`). Conservée pour archive uniquement.\n- `prompt_contenus` : legacy remplacé par `prompts.enrichissement`. Ne plus écrire.\n\n### Cycle de vie (`documents.statut`)\n\n```\na_faire          → prompts pas encore rédigés pour toutes les sections\nen_cours         → prompts rédigés en DB, pas encore exportés à Jenni\npret_a_rediger   → prompts complets, export possible, envoi Jenni\nenvoye           → .docx généré et remis à Jenni\nrecu             → .docx retour Jenni récupéré dans docx/\nintegre          → contenu Jenni intégré via integrate_doc_docx.py, version ≥ 1 dans doc_contenus\ncloture          → doc considéré finalisé éditorialement (JMJ validation finale)\n```\n\n### Lien avec le reste du corpus\n\n- Les **fiches** intégrées enrichissent les `prompts.contexte_sci`/`enrichissement` des sections pertinentes via la propagation (phase 4 des fiches, étape --propagate).\n- Les **termes canoniques** du thésaurus sont automatiquement injectés dans chaque prompt selon `terms.doc_code`.\n- Les **chaînes causales** qui traversent un document peuvent être citées dans les amorces de section.\n- Les **concept cards** pertinentes au doc sont référencées dans `enrichissement`.\n\n### Principe éditorial\n\nLe document est écrit **une seule fois dans sa version finale** (le prompt envoyé à Jenni doit déjà être le brouillon mûr, pas un squelette). La stratégie cercle vertueux F → S → V → P → H garantit que chaque strate rédigée enrichit la DB pour les suivantes (voir `wf_doc_production` §cercle_vertueux).\n\n### BQ complémentaires\n\n- `wf_doc_production` — workflow de production d'un doc (prompts → export → envoi Jenni)\n- `wf_doc_integration` — intégration consciente du retour Jenni + propagation\n- `redaction_documents_jenni` (BQ #146) — règles unifiées de rédaction pour tout document Jenni\n- `bq_clean_discipline` (BQ #120) — discipline BQ-clean sur les prompts\n", "type": "reference", "crit": true}, {"id": 149, "titre": "Production d'un document de strate — prompts et envoi Jenni", "contenu": "## Production d'un document de strate — des prompts à l'envoi Jenni\n\nWorkflow éprouvé sur les documents F, S, V déjà rédigés et intégrés (sessions 2025-2026). Le document est un élément fixe de l'ossature du corpus ; la production consiste à préparer les prompts de ses sections pour qu'un brouillon complet et structuré parte à Jenni.\n\n### Règle d'or : le prompt est le brouillon\n\nUn document de strate n'a pas de « brouillon Claude » intermédiaire ni de phase manuelle de rédaction pré-Jenni. Le prompt en DB (tables `prompts` + `jenni_doc_specs`) est, une fois mûr, le brouillon lui-même. Il est envoyé tel quel à Jenni via le `.docx` généré, qui sert de document de travail.\n\nCette règle distingue les docs des fiches : pour une fiche, Claude rédige un brouillon en prose continue (voir BQ `wf_fiche_production`) ; pour un doc, Claude construit un prompt section par section qui sert directement de base à Jenni.\n\n### Étape 1 — État des prompts en DB\n\nInventaire :\n\n```bash\n# Dashboard\npython3 tools/admin/session_start.py --db sol_vivant.db\n\n# Prompts incomplets d'un doc\nSELECT chapitre, section, titre_h1, titre_h2,\n       CASE WHEN contexte_sci IS NULL OR contexte_sci='' THEN '✗' ELSE '✓' END AS ctx,\n       CASE WHEN instructions IS NULL OR instructions='' THEN '✗' ELSE '✓' END AS ins\nFROM prompts WHERE doc_code='S2' ORDER BY ordre;\n```\n\n**Cible** : chaque section (type `section`) a au minimum `contexte_sci` non vide et `instructions` non vide. Les sections `intro` ont en plus un champ `enrichissement` (cadre conceptuel).\n\n### Étape 2 — Enrichissement des prompts\n\nQuand des fiches transversales ou des zooms sont intégrés, leurs apports peuvent enrichir les prompts du document. Trois voies :\n\n1. **Propagation automatique depuis une fiche** : `tools/jenni/integrate_fiche.py --propagate --fiche-id N` ajoute l'apport dans `prompts.enrichissement` des sections concernées (flag à valider avant application).\n\n2. **Édition directe en DB** (pour un ajustement ciblé) :\n```sql\nUPDATE prompts SET contexte_sci = 'Nouveau contexte'\nWHERE doc_code = 'S0' AND chapitre = 2 AND section = 1;\n\nUPDATE prompts SET instructions = 'Nouvelles instructions'\nWHERE doc_code = 'S0' AND chapitre = 3 AND section = 1;\n\nUPDATE prompts SET tableau = 1\nWHERE doc_code = 'S0' AND chapitre = 3 AND section = 1;\n```\nNe jamais éditer le script d'export ni le fichier de sortie. La source de vérité est la table `prompts`.\n\n3. **Utilisation d'une concept_card** comme cadre éditorial : copier la description dans `enrichissement` avec une phrase d'ancrage (« Ce cadre s'applique dans le présent document à la section X »).\n\n### Étape 3 — Architecture des prompts (masque v3.0)\n\nLes prompts sont générés mécaniquement par `tools/jenni/export_jenni_doc.py` depuis la DB. Architecture fixe :\n\n```\n[Header/titre_jenni + plan du document]\n---\n[Termes canoniques du doc]\n---\n[Bloc section 1]\n---\n[Bloc section 2]\n---\n...\n```\n\n**Chaque bloc de section** :\n```\n[H1 titre chapitre]\nRédige la section intitulée \"H2\"\nContexte scientifique (si rempli)\nInstructions de rédaction\nTableau structuré (si demandé)\n```\n\n**Sections `intro` uniquement** : l'enrichissement (cadre conceptuel) est ajouté avant les instructions.\n\n### Étape 4 — Format blocs séparés par `---`\n\nRègle structurelle absolue : un fichier prompt Jenni est une suite de blocs successifs séparés par `\\n\\n---\\n\\n`. Contraintes :\n\n- **Pas d'encadrement de titres** (pas de banderoles `## TITRE ##`, pas de décoration ASCII)\n- **Pas de méta-description** autour des blocs (pas d'introduction méta, pas de métadonnées hors du format)\n- **Chaque bloc = une demande autonome** qui se suffit à elle-même\n- **Séparateur strict** : `\\n\\n---\\n\\n` (défini dans `tools/lib/jenni_format.py::SEPARATOR`)\n\nJustification : Jenni traite chaque bloc comme une demande indépendante. Tout balisage de titres ou description méta pollue le contexte et fait dériver la réponse.\n\n### Étape 5 — Règles de contenu des prompts (discipline BQ-clean)\n\nUn prompt Jenni est un document autonome qui ne doit **rien révéler** de l'organisation interne du corpus. Règles cumulées :\n\n- **Zéro méta-vocab** : ni `corpus`, `strate`, `thésaurus`, `card #N`, `fiche #N`, `chaîne CN`, ni codes docs (`S0`, `V2`, `P1`, `H3`, `F2`…) dans les champs rédigés (`contexte_sci`, `instructions`, `enrichissement`).\n- **Zéro renvoi interne** : pas de « voir fiche X », « cf. card Y », « comme vu dans le chapitre Z d'un autre doc ».\n- **Termes canoniques intégrés dans le texte**, pas en liste séparée (sauf le bloc initial « termes canoniques du doc » qui est une annonce, pas un mode d'emploi).\n- **Prose ou instructions factuelles**, jamais de méta-pédagogie (« Jenni, merci de rédiger en 1500 mots avec un style accessible » est à éviter au profit d'instructions concrètes sur le contenu attendu).\n\nDiscipline BQ-clean détaillée : BQ #120 `bq_clean_discipline`. Référence unique des règles de rédaction Jenni : BQ #146 `redaction_documents_jenni`.\n\n### Étape 6 — Stratégie cercle vertueux : ordre F → S → V → P → H\n\nLes strates se rédigent dans un ordre qui maximise l'enrichissement mutuel :\n\n1. **F (Fondements)** — cadre historique et économique, posé en premier pour situer tout le reste.\n2. **S (Sol)** — mécanismes physico-chimiques et biologiques du sol, socle des strates suivantes.\n3. **V (Vivant)** — faune, holobionte, fermentations ; s'appuie sur S.\n4. **P (Pratiques)** — diagnostic, ACS, biostimulants, transition ; intègre F+S+V.\n5. **H (Humain)** — santé, microbiome intestinal, AMR ; clôt le continuum sol-plante-humain.\n\n**Principe opérationnel** : ne pas rédiger P ou H avant que S soit analysé et intégré. Le socle F/S conditionne la précision de tout le reste, et la rédaction de Jenni sur P/H bénéficie des termes canoniques enrichis, des fiches intégrées et des sources accumulées pendant F/S.\n\nEntre deux passes Jenni :\n- Claude analyse le retour (DOI, niveau de preuve, lacunes)\n- Enrichissement DB : thésaurus, chaînes causales, cross-refs, concept cards\n- Les prompts des strates suivantes héritent de ce contexte consolidé\n\nRésultat : meilleure qualité Jenni sur les strates aval, moins de corrections en passe 2.\n\n### Étape 7 — Génération du .docx pour Jenni\n\n```bash\n# Export d'un doc complet\npython3 tools/jenni/export_jenni_doc.py --db sol_vivant.db --doc S2\n# → recherches/docs/S2_prompts_<date>.docx (ou chemin config)\n```\n\nVérifications post-export :\n\n- **Zéro méta-vocab** (regex identique à celle des fiches, voir BQ `wf_fiche_production` §6).\n- **Structure de blocs propre** : premier bloc = header+plan, deuxième = termes canoniques, puis une section par bloc.\n- **Nombres de sections cohérent** avec l'état DB (pas de section manquante ni dupliquée).\n\n### Étape 8 — Envoi Jenni\n\nLe `.docx` est uploadé par JMJ dans le projet Jenni concerné comme document de travail. Jenni fait `fetch_document` dessus et rédige le contenu final en enrichissant chaque bloc section. Le retour est un `.docx` complet, structuré, avec refs biblio APA + citations inline dans le style natif Jenni (JenniRefBody, dummy-citation links).\n\nStatut `documents.statut` : `pret_a_rediger` → `envoye` (après remise à Jenni) → `recu` (quand docx retour est dans `docx/<code>_<date>.docx`).\n\n### Scripts actifs\n\n| Script | Rôle |\n|---|---|\n| `tools/jenni/export_jenni_doc.py` | Génération du .docx prompt Jenni (masque v3.0, blocs séparés) |\n| `tools/lib/jenni_format.py` | Constantes de format (SEPARATOR, etc.) |\n| `tools/admin/integrate_doc_docx.py` | Intégration du retour Jenni (voir BQ `wf_doc_integration`) |\n| `tools/admin/session_start.py` | Dashboard état des prompts |\n\n### Anti-patterns confirmés\n\n- **Pas d'édition du script d'export** pour changer le format : toute variation de contenu passe par UPDATE sur la table `prompts`.\n- **Pas d'édition du fichier de sortie** `.docx` avant envoi Jenni : tout ajustement est fait en DB puis regénéré.\n- **Pas de rédaction par strate P/H avant analyse complète de S** : casse le cercle vertueux, dégrade la qualité.\n- **Pas de méta-vocab dans contexte_sci ni instructions** (audit `check_forbidden_jenni.py` à faire tourner avant envoi).\n", "type": "workflow", "crit": true}, {"id": 150, "titre": "Intégration consciente du retour Jenni — document de strate", "contenu": "## Intégration consciente du retour Jenni — document de strate\n\nRefonte avril 2026 : les 18 documents suivent le même pattern d'intégration consciente que les fiches, avec des spécificités liées à la structure chapitrée et au volume (15-40 k mots par doc).\n\n### Règle d'or\n\n**Aucun docx Jenni ne rentre tel quel en DB.** L'intégration passe par analyse consciente via `integrate_doc_docx.py`, structurée par section, avec vérification de cohérence et propagation aux autres éléments du corpus.\n\n### Chaîne complète\n\n```\n[DB prompts]         export_jenni_doc.py                 → recherches/docs/<code>_prompts_<date>.docx\n      │\n      ▼\n[Rédaction Jenni]    .docx enrichi retour              (outil Jenni, opaque côté corpus)\n      │\n      ▼\n[Analyse Claude]     lecture intégrale + extraction refs, termes, cohérence doctrine\n      │\n      ▼\n[Pipeline]           tools/admin/integrate_doc_docx.py --doc-code <X> --docx <path> --apply\n      │                → parse (OMML, sections, refs JenniRefBody)\n      │                → diff avec version précédente si existante\n      │                → INSERT/UPSERT doc_contenus (contenu_integre + refs JSON, version++)\n      │                → source_usages pour refs déjà en DB\n      │                → UPDATE documents.statut = 'integre'\n      │                → archive docx → docx/archives/\n      │                → audit_log systématique\n      ▼\n[Phase 4bis]         propagation aux fiches, cards, autres docs impactés\n      │\n      ▼\n[Rendu carto]        onglet Documents : bandeau « Document intégré »\n                     SvRichText + SvSourceList depuis doc_contenus\n```\n\n### Règle absolue : intégration par section, jamais en blob\n\nLe `.docx` retour Jenni est structuré par chapitres et sections. L'intégration respecte cette structure :\n\n- **Parseur par section** (hérité du parseur fiches) : lit le plan DB (`prompts` ordonnés par `ordre`) et extrait le texte section par section du docx.\n- **Nettoyage une seule fois** par section : OMML → Unicode (formules), LaTeX → Unicode, `**gras**` et backticks rendus propres, `(nd)` autoréférences supprimées, refs inline normalisées FR → EN (`auteurs` → `authors`, `annee` → `year`) + DOI → url.\n- **Refs inline** `(Auteur, année)` repérées et croisées avec `jenni_sources` (source_usages créés pour les existantes, nouvelles signalées à part).\n\nRésultat en DB : `doc_contenus.contenu_integre` contient le markdown structuré par sections (H1 chapitres + H2 sections) prêt à afficher, reconstruit à chaque intégration. La table `doc_contenus` est versionnée (une ligne par intégration successive).\n\n### Pipeline à 7 étapes\n\n1. **Parse** — OMML math-aware, sections alignées au plan DB, refs JenniRefBody (20-100 par doc), citations inline.\n2. **Match** — doc identifié explicitement par `--doc-code` (pas d'autodétection).\n3. **Diff** — comparaison avec la version précédente si `doc_contenus` existe déjà. Passages disparus, refs perdues signalées pour revue.\n4. **Refs** — croisement avec `jenni_sources` par DOI normalisé + auteurs/année. Les nouvelles refs sont notées à intégrer séparément (chantier Crossref DOI + `jenni_sources`).\n5. **Termes candidats** — extraction de candidats termes depuis les refs et le contenu ; filtrage automatique des artefacts (acronymes isolés HAL, fragments latins/anglais de titres de refs, méta-vocab) ; **proposition seulement**, jamais d'INSERT automatique dans `terms`.\n6. **Cards** — scan des concept_cards dont les docs_codes recoupent le doc intégré, avec scoring sur tokens du titre présents dans le contenu.\n7. **Gate** — violations (parens vides, autoréférences, méta-vocab) bloquent ; warnings (refs sans DOI, sections vides) autorisent `--apply --partial`.\n\nApply au green-light du gate :\n\n```\n✓ UPSERT doc_contenus (contenu_integre + refs JSON, version incrementée)\n✓ DELETE source_usages anciens pour le doc\n✓ INSERT N source_usages (refs déjà en DB)\n✓ UPDATE documents : statut = 'integre', updated_at\n✓ audit_log (operation = INTEGRATE)\n✓ COMMIT\n```\n\n### Phase 4bis — Effet d'entraînement documentaire (règle absolue)\n\nHérité de la doctrine fiche (voir BQ `wf_fiche_integration` §Phase 4bis). **S'applique avec la même rigueur aux docs de strate.**\n\nPourquoi c'est critique pour les docs :\n\n- Un doc intégré peut redéfinir un cadre conceptuel (paradigme MAOM, loi de trophobiose, controverse CMN Karst 2023) qui sera cité dans d'autres docs à venir ou qui impacte les fiches déjà rédigées.\n- La stratégie cercle vertueux (F → S → V → P → H) suppose que chaque strate intégrée enrichit la DB pour les suivantes. Sans propagation consciente, les strates aval héritent d'un contexte incomplet.\n\nProcédure post-apply :\n\n**1. Scan des impacts potentiels** — pour chaque fiche `en_cours`, `a_faire` ou `integre_extrait`, chaque doc avec `statut != integre`, et chaque prompt de section pas encore envoyé : mesurer le recoupement (docs partagés, termes-clés communs, chaînes traversées en commun).\n\n**2. Renforcement des cards prioritaires** — cards avec score ≥ 5 reçoivent une note `[Apport doc <code> v<N> (<date>)]` dans `concept_cards.notes`, synthétisant ce que le doc apporte à la card.\n\n**3. Décision éditoriale par élément impacté** :\n\n- **Mise à jour automatique** : ajout d'une ref de la source dans la biblio, ajustement de `contexte_sci` dans les prompts.\n- **Mise à jour manuelle avant envoi Jenni** : reformulation d'une affirmation contradictoire, intégration d'un nouveau paradigme dans les prompts aval.\n- **Simple alerte** : note dans `fiches.notes` ou `documents.notes` pour que JMJ en tienne compte plus tard.\n\n**4. Ne jamais envoyer à Jenni un prompt de doc aval** qui cite explicitement un paradigme maintenant consolidé dans un doc plus récent sans avoir propagé l'apport.\n\n**5. Audit log systématique** — chaque élément impacté met à jour ses `notes` avec une entrée `[Propagation doc <code> v<N> (<date>)]`.\n\n**Règle d'ordre** : intégrer d'abord la strate amont complète (F/S en priorité), puis V, puis P, puis H. Cette règle est structurellement la règle cercle vertueux — elle garantit que chaque intégration aval s'appuie sur un contexte amont stabilisé.\n\n### Rapport d'audit croisé\n\nPour chaque intégration significative, produire `audit_reports/audit_croise_doc<code>_<date>.md` avec les mêmes 7 volets que pour les fiches :\n\n- A. Cards concernées (scores overlap)\n- B. Chaînes causales traversées\n- C. Termes thésaurus mobilisés (par strate)\n- D. Fiches du corpus en recouvrement\n- E. Contradictions potentielles (vérification manuelle)\n- F. Bibliographie (refs liées vs nouvelles)\n- G. Actions recommandées par priorité\n\n### Archivage automatique\n\nRègle absolue (CLAUDE.md) : dès qu'un doc passe `integre`, déplacer les fichiers sources dans `archives/` :\n\n```\ndocx/<code>_<date>.docx                     → docx/archives/<code>_<date>.docx\nrecherches/docs/<code>_prompts_<date>.docx  → recherches/docs/archives/<...>\n```\n\nImplémenté dans `tools/admin/integrate_doc_docx.py` (équivalent `archive_fiche_files` pour les docs). Idempotent, journalisé `audit_log(operation='ARCHIVE', table='files')`.\n\n### Intégration par section vs retouche ciblée\n\nDeux cas d'usage :\n\n**Cas 1 — Première intégration** (doc_contenus inexistant)\n- `--apply` pose la version 1. Tout le contenu est nouveau.\n\n**Cas 2 — Reprise / retouche** (doc déjà `integre`, nouveau retour Jenni sur quelques sections)\n- Le parseur lit toutes les sections du docx retour. Le pipeline crée la version N+1 de `doc_contenus`.\n- Diff avec la version précédente : signaler les passages disparus, les refs perdues, pour revue consciente avant apply.\n- Si la retouche porte sur un nombre limité de sections, l'option `--sections <list>` (à implémenter) permettrait une intégration ciblée. Pour l'instant, la version entière est remplacée et l'historique conservé par le champ `version` incrémenté.\n\n### Rendu carto (index onglet Documents)\n\nQuand un doc a `doc_contenus.contenu_integre` non vide, la carto (`gen_web.py`) affiche :\n\n- **Bandeau « Document intégré »** avec version et date\n- **Contenu rendu** via `SvRichText` (markdown → HTML côté client)\n- **Bibliographie** via `SvSourceList` à partir des `source_usages` + refs JSON\n\nQuand un doc est `en_cours` ou `pret_a_rediger`, la carto affiche :\n\n- **Bandeau « En cours de rédaction »**\n- **Sections cliquables** qui montrent l'état de préparation (`contexte_sci` / `instructions` / `enrichissement` par section)\n\n### Scripts actifs\n\n| Script | Rôle |\n|---|---|\n| `tools/admin/integrate_doc_docx.py` | Pipeline d'intégration complet (dry-run puis --apply) |\n| `tools/admin/integrate_doc_docx.py::archive_doc_files()` | Archivage automatique post-intégration |\n| `tools/jenni/export_jenni_doc.py` | Génération .docx prompt depuis DB |\n| `tools/docs/gen_web.py` | Rendu carto onglet Documents |\n\n### Anti-patterns confirmés\n\n- **Pas d'intégration en blob** : toujours par sections alignées au plan DB.\n- **Pas d'apply sans gate vert** : dry-run obligatoire, vérifier absence de violations.\n- **Pas d'oubli de la phase 4bis** : chaque intégration doc impacte fiches, cards, prompts aval. Absence de propagation = construction silencieuse d'incohérences.\n- **Pas d'écriture directe dans `doc_contenus` hors du pipeline** : le script est la seule voie d'écriture légitime (audit_log + version + source_usages cohérents).\n- **Pas de propagation automatique aux prompts sans validation Claude/JMJ** : l'enrichissement automatique des `contexte_sci`/`instructions` peut dégrader un prompt finement ajusté ; systématiquement en mode propose-puis-valide.\n", "type": "workflow", "crit": true}]}, "validations": {"nom": "Pipeline validations", "entries": [{"id": 105, "titre": "Validations — workflow et structure (table dédiée)", "contenu": "## Validations — workflow et structure\n\n**Différence avec une fiche** : la fiche est un **zoom proactif** sur un sujet intéressant en soi ; la validation est un **comblement réactif** d''une dette identifiée dans le corpus (chaîne non validée, concept non étayé, lacune détectée par audit).\n\nLes deux contribuent au même objectif : **clôturer les prompts des docs de strate**. Cf. BQ « Modèle conceptuel — production du corpus ».\n\n### Tables\n\n```sql\nCREATE TABLE validations (\n  id              INTEGER PRIMARY KEY AUTOINCREMENT,\n  slug            TEXT UNIQUE NOT NULL,\n  titre           TEXT NOT NULL,\n  mode            TEXT NOT NULL,    -- 'validation' | 'renforcement' | 'comblement'\n\n  -- Objet à valider/combler\n  objet_type      TEXT,             -- 'chaine_causale' | 'concept' | 'lacune' | 'affirmation' | 'transversal'\n  objet_ref       TEXT,             -- ex: 'C7', id_term, 'S2.ch3.s2', texte libre\n\n  -- Cibles : ce qui sera clôturé par cette validation\n  docs_cibles     TEXT,             -- JSON ['F2','S2','P2','P5']\n  prompts_cibles  TEXT,             -- JSON [prompt_id,...] optionnel si granularité fine\n\n  -- Demande\n  question        TEXT,             -- formulation claire de ce qu'on cherche / ce qu'on valide\n\n  -- Cycle de vie\n  statut          TEXT DEFAULT 'a_faire',\n                                    -- a_faire | en_cours | envoye | recu | integre | archive\n  verdict         TEXT,             -- pour mode='validation' : 'confirme'|'infirme'|'nuance'|'reserves'\n\n  date_creation   TEXT DEFAULT (datetime('now')),\n  date_envoi      TEXT,\n  date_retour     TEXT,\n  date_integration TEXT,\n\n  notes           TEXT,             -- notes libres Claude (pas pour Jenni)\n  updated_at      TEXT DEFAULT (datetime('now'))\n);\n\nCREATE TABLE validation_sections (\n  id              INTEGER PRIMARY KEY AUTOINCREMENT,\n  validation_id   INTEGER NOT NULL REFERENCES validations(id),\n  ordre           INTEGER NOT NULL,\n  type            TEXT NOT NULL DEFAULT 'section',  -- intro | section | verdict\n  titre           TEXT,\n  contexte_sci    TEXT,             -- ce que le corpus dit déjà\n  instructions    TEXT,              -- questions/demandes précises à Jenni\n  enrichissement  TEXT,             -- contexte additionnel pour Jenni (rare)\n  UNIQUE(validation_id, ordre)\n);\n\nCREATE TABLE validation_contenus (\n  id              INTEGER PRIMARY KEY AUTOINCREMENT,\n  validation_id   INTEGER NOT NULL REFERENCES validations(id),\n  version         INTEGER DEFAULT 1,\n  contenu_brut    TEXT,             -- contenu .docx Jenni brut\n  contenu_integre TEXT,             -- contenu nettoyé/intégré\n  refs            TEXT,             -- JSON [doi,...] récupérés post-Jenni → intégrés dans `jenni_sources`\n  notes_claude    TEXT,             -- notes d'analyse Claude\n  date_import     TEXT DEFAULT (datetime('now')),\n  UNIQUE(validation_id, version)\n);\n```\n\n### Modes\n\n| Mode | Quand l''utiliser | Objet typique |\n|---|---|---|\n| `validation` | Vérifier une affirmation existante du corpus, valider une chaîne causale | `chaine_causale` (C1-C9), `affirmation` |\n| `renforcement` | Renforcer un sujet sous-couvert dans le corpus | `transversal` (par strate ou thématique) |\n| `comblement` | Combler une lacune précise identifiée par audit | `lacune` (section/chapitre précis) |\n\nLa frontière entre les 3 modes peut être floue — c''est intentionnel. Ce qui compte est l''objet (`objet_type`/`objet_ref`) et les docs cibles. Le mode est informatif.\n\n### Cycle de vie (`validations.statut`)\n\n```\na_faire   → créée en DB (objet, mode, docs_cibles, sections)\nen_cours  → Claude prépare/affine le prompt Jenni\nenvoye    → fichier .txt généré et copié dans Jenni\nrecu      → .docx Jenni récupéré\nintegre   → contenu intégré dans prompts.contexte_sci/.enr des docs cibles\n            + termes extraits vers terms\n            + contenu brut/intégré stocké dans validation_contenus\n            + verdict renseigné si mode='validation'\narchive   → terminé, sort de la vue active\n```\n\n### Workflow\n\n1. **Identifier une dette** : audit révèle une lacune, une chaîne causale non validée, un concept faible\n2. **Créer la validation** : `INSERT INTO validations` avec mode + objet + docs_cibles\n3. **Renseigner les sections** : `validation_sections` (intro, sections de question, verdict si validation)\n4. **Générer le prompt** : `export_validation.py --slug <slug>` → `recherches/prompts_validation_{slug}.txt`\n5. **Envoyer à Jenni**, récupérer le .docx\n6. **Intégrer** : Claude analyse le .docx → `validation_contenus` + `prompts.contexte_sci/.enr` des docs cibles + verdict si validation\n7. **Marquer `integre`**, puis `archive` quand terminé\n\n### Charte applicable\n\nLes prompts de validation suivent la **charte Jenni générique** (BQ #40, #41, #101) :\n- Pas de codes docs (S0, V2…)\n- Pas de méta-vocabulaire (corpus, thésaurus…)\n- Citations format `[N]`\n- Blocs séparés par `---`\n\n**Pas de structure standardisée 8 sous-blocs** (qui est spécifique aux fiches techniques). Une validation a une structure libre adaptée à la question posée.\n\n### Distinction des champs (règle stricte)\n\n- `validation_sections.contexte_sci` = ce que le corpus/la science dit déjà sur l''objet\n- `validation_sections.instructions` = questions précises à Jenni pour valider/combler\n- `validation_sections.enrichissement` = contexte additionnel pour Jenni si nécessaire (rare)\n- `validation_contenus.contenu_integre` = ce que Jenni a renvoyé, intégré\n\n**Jamais** mélanger contenu reçu et instructions de production — chacun dans sa table.\n\n### Lien avec la production du corpus\n\nUne validation `integre` alimente les `prompts` des docs cibles, contribuant à leur clôture. Tant qu''une validation pertinente reste à produire, le doc cible n''est pas en `pret_a_rediger`.\n\n### Exemples actuels (à migrer en Phase 2)\n\n| Slug actuel | Source | Migration |\n|---|---|---|\n| `validation-c7-performance-robustesse` (table fiches) | `revue_critique` de la chaîne C7 | mode=`validation`, objet=`chaine_causale:C7` |\n| `thermotolerance-microbiome-sol` (table fiches) | `revue_critique` | mode=`validation`, objet=`transversal:thermotolerance` |\n| `prompt_validation_notes_2026-04-08.txt` (orphelin) | Affirmations issues de notes Jenni | mode=`validation`, objet=`affirmation` (multi) |\n| `renforce_sections_manquantes_*.txt` (orphelin) | Audit | mode=`comblement`, objet=`lacune` (multi) |\n| `renforce_modules_faibles_*.txt` (orphelin) | Audit | mode=`renforcement` |\n| `renforce_pratiques_fermentations_economie_*.txt` | Audit P | mode=`renforcement`, objet=`transversal:fermentations_economie` |\n| `renforce_sol_carbone_redox_methodes_*.txt` | Audit S | mode=`renforcement` |\n| `renforce_vegetal_holobionte_nutrition_*.txt` | Audit V | mode=`renforcement` |\n\n### ⚠ Etat actuel (avril 2026)\n\n`validation_sections` et `validation_contenus` existent en DB avec des donnees historiques (81 et 16 rows respectivement) mais **aucun script actif ne les alimente**. La logique des validations est en pause (cf. BQ #127). Les BQ qui decrivent leur workflow sont conservees comme reference, mais les scripts `export_validation.py` / `import_validation.py` ne sont pas operationnels aujourd'hui.\n", "type": "reference", "crit": true}]}}, "technique": {"bq": {"nom": "BQ elle-même", "entries": [{"id": 136, "titre": "Pas d'agents rédacteurs — la rédaction c'est JMJ + Claude + Jenni, jamais un sous-agent", "contenu": "## Règle absolue — pas d'agents rédacteurs\n\n**La rédaction de contenu éditorial du corpus est STRICTEMENT limitée à :**\n- **Jenni** (via le workflow docx : prompt → Jenni rédige → retour docx → import contrôlé)\n- **JMJ** (directement, ou en demandant à Claude de rédiger spécifiquement)\n- **Claude** (moi) SEULEMENT quand JMJ me le demande explicitement en direct\n\n**Sont interdits** :\n- Lancer un agent Task (`Agent` tool) pour rédiger **définitions**, **synonymes**, **contenus de fiches**, **contenus de prompts**, **descriptions de concept_cards**, **contenus BQ** ou tout autre contenu éditorial du corpus\n- Demander à un agent de \"produire des définitions courtes\", \"rédiger une synthèse\", \"écrire une amorce\", \"compléter une description\"\n- Inventer des définitions ou contenus sans base docx/prompt Jenni ou indication explicite de JMJ\n\n**Sont autorisés pour les agents Task** :\n- Classification, extraction, analyse (ex: normaliser la casse, détecter des orphelins, trier des termes)\n- Recherche dans le code ou la DB\n- Parsing/formatage de données existantes\n- Audit/comparaison\n\n**Workflow correct pour créer un nouveau terme** :\n1. Identifier le besoin (ex: hyperonyme manquant)\n2. Écrire le nom du terme dans une liste à faire passer par Jenni\n3. Exporter via `export_thesaurus_incomplets.py` ou `gen_prompt_thesaurus.py`\n4. Jenni rédige la définition\n5. Réimport via `import_termes_jenni.py --replace`\n\n**Justification** : JMJ passe des heures à faire rédiger Jenni avec soin. Toute définition Claude-made sabote ce travail et pollue le thésaurus avec du contenu non validé. Violation détectée 2026-04-20 (14 termes créés avec def Claude en commit af35413 — supprimés et à refaire via Jenni).\n\n**Exception limitée** : les définitions que JMJ demande à Claude de rédiger EN DIRECT (dans la conversation) sont OK car c'est explicite et JMJ valide immédiatement.", "type": "regle_absolue", "crit": true}, {"id": 1, "titre": "Carte du projet — vue d'ensemble (à lire en premier)", "contenu": "## Carte du projet — Le Sol Vivant cet Holobionte\n\n**Lire en premier.** Cette entrée donne la vue d'ensemble. Toutes les BQ sont ensuite des références détaillées.\n\n### Le projet en 4 lignes\n\nCorpus scientifique en **18 documents** sur l'agriculture régénératrice et la biologie des sols, écrit par Jean-Michel Juzan. Claude Code édite la DB et les scripts ; Jenni AI rédige. Biblio interne dans la table `jenni_sources` (1639 refs), alimentée par intégration consciente des rapports de sources fournis par JMJ. DB unique `sol_vivant.db` = source de vérité. Branche `main` = production.\n\n### Les 3 acteurs\n\n| Acteur | Rôle | Interface |\n|---|---|---|\n| **Claude Code** (moi) | Édite la DB, les scripts, audit corpus, intégration retours Jenni, veille | Terminal + sol_vivant.db |\n| **Jenni AI** | Rédige à partir de prompts, produit des .docx | Web, piloté par .txt prompts |\n| **JMJ** (auteur) | Donne des rapports de sources à intégrer, valide les actions Claude | Session + .md |\n\n### Pipeline global\n\n```\n    ┌─────────────────────────────────────────────────────────────┐\n    │          CORPUS = 18 documents rédigés par Jenni            │\n    └──────────────────────────▲──────────────────────────────────┘\n                               │ passe finale Jenni\n                               │\n          ┌────────────────────┴────────────────────┐\n          │   PROMPTS clôturés (prompts.statut=cloture)  │\n          │     contexte_sci + instructions + enrichissement       │\n          └────────────────────▲────────────────────┘\n                               │\n       ┌───────────────────────┼───────────────────────┐\n       │                       │                       │\n  ┌────┴─────┐           ┌─────┴─────┐           ┌─────┴──────┐\n  │ THÉSAURUS │           │  FICHES   │           │VALIDATIONS│\n  │ 962 termes│           │ 27 intégr.│           │ (en pause)│\n  └────▲─────┘           └─────▲─────┘           └─────▲──────┘\n       │                       │                       │\n       │ enrich_thesaurus       │ fiches zoom           │ combler dette\n       │                       │ (transversale/        │ (audit révèle)\n       │                       │  technique/zoom)      │\n       │                       │                       │\n  ┌────┴───────────────────────┴───────────────────────┴────┐\n  │              AUDIT du corpus / notes volantes           │\n  │    analyse_corpus · audit_opus · check_integrity        │\n  └─────────────────────────────────────────────────────────┘\n```\n\n**Note** : les `concept_cards` (91 actives) agissent en **filtre de rigueur** entre captation et intégration : toute nouvelle affirmation doit d'abord passer par une carte (cf. #106).\n\n### Les 5 scripts à connaître (chaque session)\n\n| Commande | Rôle |\n|---|---|\n| `python3 tools/admin/session_start.py --db sol_vivant.db` | Démarre la session (sync git, backup DB, dashboard, règles actives) |\n| `python3 tools/admin/bq_query.py --list` / `--modules <code>` / `--search <kw>` | Consulter cette BQ (onze modules) |\n| `python3 tools/admin/check_integrity.py --db sol_vivant.db` | Valider l'état DB (FK, orphelins, doublons) |\n| `python3 tools/regen_all.py --db sol_vivant.db` | Régénérer tous les outputs (HTML, README, workflows) depuis la DB |\n| `python3 tools/sync_scripts.py --db sol_vivant.db --inject` | Pousser les scripts locaux modifiés vers la DB |\n| `python3 tools/veille/weekly_scan.py --db sol_vivant.db` | Veille PubMed hebdomadaire (9 thèmes, 28 requêtes) |\n\n### Les 4 règles absolues\n\n1. **`main` est la production** — travailler et pousser directement sur main (cf. #70)\n2. **La DB est source de vérité** — fichiers générés = vues (cf. #73). Ne jamais modifier un fichier de sortie ; toujours modifier la source puis `regen_all.py`\n3. **Le .docx Jenni ne rentre jamais tel quel en DB** — tout passe par analyse Claude + scripts d'import contrôlés\n4. **Pas de codes docs / méta-vocab dans les prompts** — S2, V1, \"strate\", \"corpus\", \"thésaurus\" interdits dans `prompts.contexte_sci/.instructions/.enrichissement` (cf. #120)\n\n### Infrastructure transverse\n\n**Table `config` (84 clés)** — paramètres centralisés par catégorie/clé. Toute valeur partagée entre scripts va là, pas en dur.\n- `config.corpus.*` : nom, auteur, version du projet\n- `config.veille.hot_topics` : 9 thèmes PubMed de la veille\n- `config.web.icon_library` : bibliothèque d'icônes unifiée\n- `config.cahier.onglets`, `config.cahier.chapitres`, `config.cahier.tab_descriptions` : structure du Cahier de Science\n- `config.jenni.*` : templates de prompts Jenni\n- `config.claude_rules.*` : règles Claude affichées au démarrage\n\nLecture Python : `from config import get, get_json, get_int, get_float` (dans `tools/lib/config.py`).\n\n**Table `audit_log` (1200+ entrées)** — trace horodatée de toutes les opérations significatives en DB. Colonnes : `ts, operation, table_name, record_ref, detail`. Opérations les plus courantes : `GENERATE` (régénération page), `UPDATE` (modification), `INSERT` (ajout), `IMPORT` (import docx), `MERGE`, `SYNC`.\n\nUtile pour :\n- Reconstituer l'historique d'une fiche ou d'un terme\n- Debugger « qui a modifié quoi quand »\n- Produire les rapports de session\n\n**Écriture systématique** : tout script qui modifie la DB doit écrire dans audit_log :\n```python\ncon.execute(\"INSERT INTO audit_log (operation, table_name, record_ref, detail) VALUES (?, ?, ?, ?)\",\n            ('UPDATE', 'terms', f'term #{tid}', 'Correction definition corrompue'))\n```\n\n**Table `jenni_sources` (1639 refs)** — biblio interne du projet. Chaque source a `doi, auteurs, annee, titre_complet, journal, resume_court, pertinence, tags, url`. Alimentée par **intégration consciente** (un rapport de source à la fois — cf. workflow `wf_source_integration`). Jamais de batch-insert aveugle.\n\n**Table `source_usages` (2322 liens)** — relie une source à une entité (fiche / document / terme / card / prompt) avec contexte et citation brute. Permet de reconstituer « où est cette source citée ? ».\n\n### Modules BQ — où chercher quoi\n\n| Module | Contenu | Quand aller voir |\n|---|---|---|\n| **projet** | Doctrine corpus, modèle conceptuel, concept cards | Avant de toucher la rédaction ou la structure |\n| **claude** | Règles Claude (git, DB, pseudoscience, faux positifs) | Avant toute action |\n| **workflow** | Un workflow métier par BQ (fiche, thésaurus, veille, web…) | Pour retrouver le bon enchaînement |\n| **web** | Charte graphique, composants React, pages HTML | Génération/modif de pages |\n| **jenni** | Chartes rédaction, format prompts, enrichissement | Avant de produire un prompt Jenni |\n| **sqlite** | Schéma tables, vues, requêtes utiles | Inspection DB |\n| **maintenance** | Sessions, scripts, régénération, intégrité | Opérations de maintenance |\n\n", "type": "info", "crit": true}, {"id": 57, "titre": "Architecture DB — tables, vues, colonnes clés", "contenu": "**Comptages à jour** (générés dynamiquement par `session_start.py`) :\n```sql\nSELECT\n  (SELECT COUNT(*) FROM sqlite_master WHERE type='table' AND name != 'sqlite_sequence') as tables,\n  (SELECT COUNT(*) FROM sqlite_master WHERE type='view') as vues,\n  (SELECT COUNT(*) FROM scripts) as scripts;\n```\n\nNe pas mettre de chiffres en dur ici — utiliser la requête ci-dessus ou `session_start.py`.\n\n**Noyau documentaire** : documents, prompts, prompt_contenus, doc_cross_refs, jenni_doc_specs, jenni_doc_versions\n**Thésaurus** : terms, term_relations, term_connections\n**Chaînes** : chains_causales, chain_etapes\n**Cascade** : cascade_prerequis, cascade_level_links, concept_cards, terrain_tests, diagnostic_rules\n**BQ** : domaines_techniques, domaine_bq, bq_entries\n**Config** : config, db_meta, scripts, audit_log, maintenance_sessions, requetes_utiles\n**Fiches** : fiches\n\n### (fusionné depuis #58 : Tables actives vs legacy)\n\n**Tables actives (utilisées quotidiennement) :**\ndocuments, prompts, terms, term_relations, jenni_doc_specs, jenni_doc_versions, jenni_section_specs, doc_cross_refs, chains_causales, chain_etapes, scripts, bq_entries, domaines_techniques, domaine_bq, db_meta, audit_log, config, fiches\n\n**Tables de référence (calculateurs, données scientifiques) :**\nrefs (unifiee 2026-04, kind=matiere|texture|esclave_energ|shift_chantier|cn_regle, 317 rows) + ref_cn_incorporation, ref_melanges_predefinies, ref_kirkby (conservees, structures specifiques)\n\n**Tables web (templates, pages) :**\nhtml_templates, web_pages\n\n**Tables cascade & diagnostic :**\ncascade_prerequis, cascade_level_links, concept_cards, terrain_tests, diagnostic_rules\n\n**Tables de maintenance :**\nmaintenance_sessions, requetes_utiles\n\n**Tables legacy (peuvent être supprimées) :**\nprompt_contenus (remplacé par prompts.enrichissement), term_connections (vide)\n\nCompter les tables :\n```sql\nSELECT COUNT(*) FROM sqlite_master WHERE type='table' AND name != 'sqlite_sequence';\n```\n\n### (fusionné depuis #82 : Colonnes clés par table — aide-mémoire)\n\nColonnes les plus utilisées (évite les PRAGMA table_info à répétition) :\n\n**terms** : id, section_key, strate, fr, en, definition, syn_fr, syn_en, inrae, doc_code, statut, type, flag_pseudoscience\n**prompts** : id, doc_code, type (intro/section/conclusion), chapitre, section, titre_h1, titre_h2, contexte_sci, instructions, enrichissement, style, tableau, ordre\n**documents** : code, titre, strate, sous_titre, resume\n**config** : categorie, cle, valeur\n**concept_cards** : id, title, description, category, docs_codes (JSON), status\n**refs** (migration 2026-04) : id, ref_kind, code, label, description, source, source_id, data JSON, ordre, is_active, legacy_id. Helper `tools/lib/refs.py::load_refs(con, kind)` deplie data + alias compat\n    **refs (kind=matiere)** : 110 rows. Colonnes specifiques (cn_min/max, k1_min/max, NPK, densite, cout, synonymes, source) dans le champ `data` JSON, deplies a la racine par `load_refs(con, 'matiere')`\n**ref_cn_incorporation** : id, cn_seuil_min, cn_seuil_max, niveau, titre, contenu, conditions (JSON), cas_etude (JSON), redox (JSON), timeline\n**html_templates** : id, slug, page_slug, type (page_css/page_js/head), contenu\n**bq_entries** : id, code_bq, titre, contenu_md, type, is_critique, tags (JSON), ordre · **domaines_techniques** : id, slug, nom, categorie, description · **domaine_bq** : domaine_id, bq_entry_id, role (primaire|reference), ordre\n**chains_causales** : id, titre, docs_traverses\n**chain_etapes** : id, chain_id, etape, doc_code, description", "type": "reference", "crit": true}, {"id": 73, "titre": "DB = source de vérité — données en DB, fichiers = vues", "contenu": "**Règle** : `sol_vivant.db` est la source de vérité unique. Les fichiers générés sont des **vues** de la DB.\n\n**Ne jamais modifier directement :**\n- `Publications/prompts/prompts_jenni_*.txt` → générés par `export_jenni_doc.py` depuis les tables `prompts`, `terms`, `jenni_doc_specs`\n- `Publications/web/*.html` → générés par `gen_mo_calc.py`, `gen_web.py`, `gen_triangle_textures.py` depuis les tables `ref_*`, `html_templates`\n- `Publications/cartographie/*.html` → généré par `gen_web.py`\n- `Publications/workflows/*.md` → générés par `gen_workflows.py`\n- `tools/**/README.md` → générés par `gen_readme.py`\n\n**Toujours corriger la source :**\n- Contenu des prompts → modifier dans table `prompts` ou dans le script `export_jenni_doc.py`\n- CSS/JS des calculateurs → modifier dans table `html_templates`\n- Données de référence → modifier dans les tables `ref_*`\n- Puis regénérer le fichier avec le script approprié\n\n**Workflow correct :**\n1. Modifier la DB (tables, templates, config)\n2. Regénérer les fichiers (`python3 tools/docs/gen_*.py --db sol_vivant.db`)\n3. `sync --inject` si des scripts ont changé\n4. `git add` + `git commit` + `git push`\n\n### (fusionné depuis #79 : Données = DB, code = logique uniquement)\n\n**Règle** : toute donnée paramétrable va dans la DB, jamais en dur dans le code Python ou JS.\n\n**Où stocker quoi :**\n| Type de donnée | Table DB |\n|---|---|\n| Paramètres API (modèle, tokens, prix) | `config` |\n| Données de référence (C/N, matières, textures) | `ref_*` |\n| CSS/JS des pages web | `html_templates` |\n| Contenu des prompts Jenni | `prompts` |\n| Termes canoniques | `terms` |\n| Mélanges prédéfinis | `ref_melanges_predefinies` |\n\n**Exceptions tolérées** : constantes physiques universelles, noms de colonnes SQL, noms de fichiers de sortie.\n\n**Lire depuis la DB, pas depuis les fichiers :**\nLes scripts et templates sont stockés dans la DB (`scripts.contenu`, `html_templates.contenu`). Toujours interroger la DB pour lire du contenu — ne pas utiliser Read sur les fichiers, qui dépasse souvent la limite de tokens et tronque le résultat.\n\n| Pour lire... | Faire | Ne pas faire |\n|---|---|---|\n| Un script | `SELECT contenu FROM scripts WHERE nom = 'xxx.py'` | `Read tools/xxx.py` (risque dépassement tokens) |\n| Un template React | `SELECT contenu FROM html_templates WHERE id = N` | `Read` sur le HTML généré |\n| Une config | `SELECT valeur FROM config WHERE cle = 'xxx'` | Lire CLAUDE.md |\n| Des données | `SELECT ... FROM refs / terms / ...` (helper `tools/lib/refs.py`) | Lire un export JSON/CSV |\n\n**Exception** : si on vient de modifier un fichier script et qu'on n'a pas encore fait `sync_scripts.py --inject`, le fichier disque est en avance sur la DB. Dans ce cas, lire le fichier est légitime.\n\n**Historique** : polygones GEPPA hardcodés dans gen_triangle_textures.py, nombre de cartes \"35\" en dur (sessions 31/03, 01/04). Lecture fichier gen_triangle_textures.py dépassant 10K tokens (session 04/04).", "type": "contrainte", "crit": true}, {"id": 3, "titre": "Règle absolue — Contenu Jenni", "contenu": "Aucun contenu produit par Jenni (.docx) ne rentre **directement** dans la DB. Tout document Jenni passe par analyse Claude avant intégration corpus. Le .docx vit hors DB.\n\n**Précision :** les documents Jenni sont des assemblages de citations académiques (Open Access principalement), pas de la rédaction libre. Le contenu scientifique (citations, données, mécanismes) est exploitable par Claude pour :\n- Rédiger la partie pédagogique (reformulation accessible du contenu scientifique)\n- Extraire les termes candidats → table terms\n- Extraire les références → `jenni_sources` (via le RIS accompagnant chaque document)\n- Identifier les corrections → table prompts\n\nDB gère : specs / prompts / suivi / extraction post-analyse.", "type": "regle", "crit": true}, {"id": 59, "titre": "Requêtes utiles — pilotage, thésaurus, diagnostic", "contenu": "Les requêtes de référence sont stockées dans la table `requetes_utiles` (27 requêtes).\n\n```sql\n-- Trouver une requête par nom\nSELECT sql_text FROM requetes_utiles WHERE nom = 'etat_production';\n\n-- Requêtes de démarrage de session\nSELECT nom, description FROM requetes_utiles WHERE usage_type = 'session';\n\n-- Requêtes de diagnostic\nSELECT nom, description FROM requetes_utiles WHERE usage_type = 'diagnostic';\n\n-- Requêtes d'un domaine\nSELECT nom, description, sql_text FROM requetes_utiles WHERE categorie = 'thesaurus';\n```\n\nCatégories : sante, documents, thesaurus, chaines, bq, scripts, maintenance, biblio, cascade, pilotage.\nTypes : session (10), pilotage (8), diagnostic (6), export (2), maintenance (1).\n\n### (fusionné depuis #60 : Requêtes thésaurus)\n\nLes requêtes thésaurus sont dans `requetes_utiles` :\n```sql\nSELECT sql_text FROM requetes_utiles WHERE categorie = 'thesaurus';\n```\n\nRequêtes disponibles : termes_document, termes_partages, doublons_termes, termes_sans_definition, densite_termes_par_doc, thesaurus_complet_compact.\n\n### (fusionné depuis #83 : Requêtes diagnostic rapide — copier-coller)\n\nRequêtes courantes à copier-coller au démarrage ou pendant le travail :\n\n```sql\n-- État du corpus\nSELECT strate, COUNT(*) FROM documents GROUP BY strate;\n\n-- Termes par doc\nSELECT doc_code, COUNT(*) FROM terms GROUP BY doc_code ORDER BY doc_code;\n\n-- Prompts incomplets (pas d'enrichissement)\nSELECT doc_code, titre_h2 FROM prompts WHERE enrichissement IS NULL OR enrichissement = '';\n\n-- Dernières opérations\nSELECT ts, operation, table_name, substr(detail,1,80) FROM audit_log ORDER BY ts DESC LIMIT 10;\n\n-- Config API\nSELECT cle, valeur FROM config WHERE categorie = 'api';\n\n-- Scripts en DB vs fichiers\nSELECT nom, version, substr(updated_at,1,16) FROM scripts ORDER BY updated_at DESC;\n\n-- BQ par module\n-- Répartition par domaine primaire\nSELECT d.slug, COUNT(*) FROM bq_entries be\n  JOIN domaine_bq db ON db.bq_entry_id=be.id AND db.role='primaire'\n  JOIN domaines_techniques d ON d.id=db.domaine_id\nWHERE be.is_active=1 GROUP BY d.slug;\n```", "type": "commande", "crit": true}, {"id": 65, "titre": "requetes_utiles — catalogue SQL", "contenu": "27 requêtes de référence organisées par catégorie et type d'usage.\n\n**Catégories :** sante, documents, thesaurus, chaines, bq, scripts, maintenance, biblio, cascade, pilotage\n\n**Types d'usage :**\n- `session` (10) — démarrage, contexte rapide\n- `pilotage` (8) — suivi production, décisions\n- `diagnostic` (6) — recherche de problèmes\n- `export` (2) — contexte LLM/biblio\n- `maintenance` (1) — logging\n\n```sql\nSELECT nom, description FROM requetes_utiles WHERE usage_type = 'session';\nSELECT sql_text FROM requetes_utiles WHERE nom = 'etat_production';\n```", "type": "instruction", "crit": true}, {"id": 139, "titre": "Refactor term_relations - source unique BT/NT/RT (2026-04-20)", "contenu": "## Refactoring term_relations — source de vérité unique pour BT/NT/RT\n\n**Depuis le 2026-04-20** : les colonnes `terms.bt`, `terms.nt`, `terms.rt` ont été **supprimées**. La table `term_relations` est la SEULE source de vérité pour les relations entre termes.\n\n### Schéma actuel\n\n```sql\nCREATE TABLE term_relations (\n    id              INTEGER PRIMARY KEY AUTOINCREMENT,\n    from_term_id    INTEGER NOT NULL REFERENCES terms(id) ON DELETE CASCADE,\n    to_term_text    TEXT NOT NULL,          -- libellé brut (Jenni/docx)\n    to_term_id      INTEGER REFERENCES terms(id),  -- FK si résolu, NULL si orphelin\n    rel_type        TEXT NOT NULL CHECK(rel_type IN ('BT','NT','RT'))\n);\nCREATE INDEX idx_term_relations_to ON term_relations(to_term_id);\n```\n\n### Vues\n\n**`v_term_relations`** — joint source et cible, expose `display_text` (COALESCE to_fr, to_term_text) et `is_orphan` :\n```sql\nSELECT ... FROM v_term_relations WHERE from_id = ? AND rel_type = 'RT'\n```\n\n**`v_terms_full`** — expose `terms` avec `bt`/`nt`/`rt` agrégés automatiquement depuis `v_term_relations` (GROUP_CONCAT avec ` · ` comme séparateur). Remplace les anciennes colonnes `terms.bt`/`terms.rt`. Les scripts lecteurs doivent faire `SELECT ... FROM v_terms_full` au lieu de `FROM terms` quand ils ont besoin de bt/rt.\n\n### Module partagé\n\n**`tools/lib/term_rels.py`** — helpers pour les scripts écrivains :\n- `norm(s)` : normalisation matching (apostrophes, accents, casse, sing/plur)\n- `build_fr_index(con)` : construit le dict `{norm(fr|en|syn) → term_id}`\n- `write_relations(con, from_id, rel_type, raw_text, index=None)` : delete existantes + split + insert avec `to_term_id` résolu automatiquement\n- `get_relations(con, from_id, rel_type)` / `get_relations_text(...)` : lecture formatée\n\n### Scripts patchés (2026-04-20)\n\n**Lecteurs** (maintenant `SELECT ... FROM v_terms_full`) :\n- `tools/batch/analyse_corpus.py`\n- `tools/jenni/gen_prompt_completion.py`\n- `tools/jenni/gen_prompt_thesaurus.py`\n- `tools/docs/gen_web.py`\n\n**Écrivains** (retire `bt/rt` des INSERT/UPDATE sur terms, écrit via `term_rels.write_relations`) :\n- `tools/jenni/import_termes_jenni.py`\n- `tools/jenni/enrich_thesaurus.py`\n- `tools/jenni/import_enrichissement.py`\n- `tools/jenni/resolve_import_conflicts.py`\n- `tools/admin/dedupe_thesaurus.py` (met aussi à jour `to_term_id` quand il migre `to_term_text`)\n\n### Migration effectuée\n\n**Phase 0 — Synchronisation** : toutes les relations des anciennes colonnes `terms.bt`/`terms.rt` qui n'étaient pas dans `term_relations` y ont été ajoutées :\n- BT : 437 → 852 (+415)\n- RT : 3488 → 5927 (+2439)\n- NT : 14 (inchangé)\n\n**Phase 1 — Migration FK** : `to_term_id` résolu via `norm()` pour 4296 relations ; 2497 restent orphelines (texte cible hors thésaurus, à arbitrer via agents Task ou décisions éditoriales).\n\n**Phase 2 — Vues** : v_term_relations + v_terms_full créées.\n\n**Phase 3 — Scripts patchés** : 8 scripts mis à jour.\n\n**Phase 4 — Drop colonnes** : `terms.bt`, `terms.nt`, `terms.rt` supprimées (ALTER TABLE DROP COLUMN — SQLite ≥ 3.35).\n\n### Bénéfices\n\n- **Orphelins explicites** : `SELECT * FROM v_term_relations WHERE is_orphan = 1` liste directement les 2497 relations dont la cible n'est pas dans le thésaurus\n- **Plus de redondance** : une seule source de vérité, la vue reconstruit le texte à la volée\n- **FK suivie automatiquement** : si on renomme un terme, les relations vers lui n'ont plus à être réécrites (le `to_term_id` reste valide)\n- **Audit de cohérence simplifié** : une requête SQL simple (plus besoin de parser les champs texte)\n\n### Comportement orphelins\n\nQuand une relation pointe vers un texte qui ne matche aucun terme (`to_term_id IS NULL`) :\n- `v_term_relations.display_text` = `to_term_text` (le texte brut)\n- `is_orphan = 1`\n- `v_terms_full.rt` inclura ce texte brut dans la concaténation\n\nQuand l'orphelin deviendra résolu (un nouveau terme est créé ou un syn est ajouté qui matche), il suffit de ré-exécuter une passe de résolution :\n```python\nfrom lib.term_rels import build_fr_index\nidx = build_fr_index(con)\nfor r in con.execute(\"SELECT id, to_term_text FROM term_relations WHERE to_term_id IS NULL\"):\n    tid = idx.get(norm(r[1]))\n    if tid:\n        con.execute(\"UPDATE term_relations SET to_term_id=? WHERE id=?\", (tid, r[0]))\n```\n\nVoir commit de référence : `claude/refactor-term-relations`.\n\n### Alerte post-import `detect_cross_syn_fr()` (session 2026-04-21)\n\n**Problème** : le format strict de Jenni protège le `fr` canonique (règle absolue CLAUDE.md). Conséquence perverse : si on envoie à Jenni un terme mal formaté (ex : `'BRF (Bois Raméal Fragmenté)'`), elle garde le `fr` tel quel et met la version propre (`'Bois Raméal Fragmenté'`) en `syn_fr`. Si ce libellé existe déjà comme `fr` canonique d'un terme séparé → **deux entrées désignent le même concept sans détection automatique**.\n\n**Diagnostic** : scan rétroactif = 50 collisions syn↔fr dans le thésaurus courant.\n\n**Solution** (commit `084a043`) :\n\n- `tools/lib/term_rels.py::detect_cross_syn_fr(con, term_ids=None)` — scanne les `syn_fr`/`syn_en` de `term_ids` (ou tout le thésaurus si None) et retourne la liste des collisions avec un `fr` canonique existant. Format de retour :\n  ```python\n  [{'from_id': ..., 'from_fr': ..., 'syn_text': ..., 'syn_field': 'syn_fr'|'syn_en',\n    'collides_with_id': ..., 'collides_with_fr': ...}]\n  ```\n- Hook post-commit ajouté dans les 3 scripts qui écrivent dans `syn_fr`/`syn_en` :\n  - `tools/jenni/import_termes_jenni.py`\n  - `tools/jenni/enrich_thesaurus.py`\n  - `tools/jenni/import_enrichissement.py`\n- Le hook affiche les collisions (⚠) et écrit un WARN dans `audit_log` (operation='WARN', table='terms').\n\n**Règle stricte** : aucune modification automatique des termes. L'alerte **surface** pour arbitrage JMJ — jamais d'action silencieuse sur le thésaurus.\n\n**Arbitrage par paire détectée** :\n1. Même concept → fusion (via `dedupe_thesaurus.py` ou manuel)\n2. Concepts distincts mais syn mal attribué → retirer le syn fautif (ne pas modifier le fr canonique)\n3. Hiérarchie réelle → poser BT/NT explicite, retirer le syn\n\n**Historique** : cette doctrine avait été implémentée la veille (2026-04-20) et perdue dans un rollback. Documentée ici pour survivre aux prochains rollbacks.", "type": "technique", "crit": true}, {"id": 103, "titre": "Modèle conceptuel — production du corpus (référence absolue)", "contenu": "## Modèle conceptuel — production du corpus\n\n**Document de référence absolu.** Toute future session Claude doit lire cette entrée en priorité avant d'agir sur les fiches, validations, prompts ou production du corpus.\n\n### Objectif final\n\nProduire les **18 documents scientifiques** du corpus *Le Sol Vivant cet Holobionte*, rédigés en passe finale par Jenni.\n\n### Étape pivot — la « clôture » des prompts\n\nPour qu'un document soit prêt pour la passe finale Jenni, **tous ses prompts doivent être clôturés**. Un prompt est clôturé quand :\n1. `contexte_sci` est rempli (ce que la science dit déjà)\n2. `instructions` sont claires (ce que Jenni doit produire)\n3. **Aucune dette de contenu ne reste** : pas de chaîne causale non validée, pas de concept à étayer, pas de lacune connue\n\n### Les outils pour amener un prompt à la clôture\n\n| Outil | Action conceptuelle | Sortie Jenni intègre… | Table source |\n|---|---|---|---|\n| **Thésaurus** | Définir un terme canonique | `prompts.instructions` (vocabulaire utilisable par Jenni) | `terms` |\n| **Concept card** ⚠ | **Filtrer la rigueur** d'une hypothèse avant intégration corpus | (gate, bloque les affirmations bancales) | `concept_cards` |\n| **Fiche** | *Zoomer* sur un point précis (proactif) | `prompts.contexte_sci` / `.enrichissement` des docs cibles | `fiches` |\n| **Validation** | *Vérifier* une affirmation, *étayer* un concept, *combler* une lacune (réactif) | `prompts.contexte_sci` / `.enrichissement` des docs cibles | `validations` |\n| **Enrichissement thésaurus** | Cas particulier : enrichir massivement le thésaurus à partir d'une liste | thésaurus | `terms` (ajouts) |\n\n**Distinction Fiche vs Validation** :\n- **Fiche** = élargir le savoir, sujet intéressant en soi (proactif)\n- **Validation** = combler une dette identifiée par audit ou par manque détecté (réactif)\n\nLes deux contribuent au **même but** : nourrir les prompts pour les amener à clôture.\n\n### Concept cards — le filtre de rigueur (règle absolue)\n\n> **Une affirmation bancale ne passe pas dans le corpus.**\n\nLe système `concept_cards` est l'**outil de filtre** qui s'intercale entre la **captation** d'une hypothèse (note volante, vulgarisation, intuition de lecture) et son **intégration** au corpus (fiche, validation, prompt). Sans ce filtre, le corpus se laisse polluer par des affirmations séduisantes mais non vérifiées.\n\n**Workflow** :\n```\nNote vulga / hypothèse / intuition\n   ↓\nCréation/affinement d'une concept_card\n   (positionnement dans une dimension conceptuelle parmi les 12)\n   ↓\nConfrontation rigoureuse :\n  - Cohérence avec les autres dimensions\n  - Compatibilité avec les concept_card_tests (validation empirique terrain)\n  - Cohérence avec le corpus existant\n   ↓\n✗ Affirmation bancale → REJET (la carte reste en archive ou est supprimée)\n✓ Affirmation solide → la carte passe en active → l'hypothèse peut alimenter\n                       une fiche, une validation, un prompt, ou un terme\n```\n\n**Plusieurs concepts du corpus actuel ont été identifiés ainsi** : note de vulgarisation captée → pépite extraite → concept_card créée → confrontation → validation → intégration.\n\n**Rôle dans le modèle** :\n- **Amont** des fiches/validations : avant de créer une fiche pour zoomer sur un point, vérifier qu'il y a au moins une concept_card cohérente qui le supporte\n- **Filtre des notes volantes** : avant d'intégrer une pépite de note (BQ #102), tester via concept_card si l'affirmation tient la route\n- **Mémoire de rejet** : les cartes en `archive` représentent l'historique des hypothèses non passées — éviter de les ressusciter sans raison nouvelle\n\n**Tables impliquées** :\n- `concept_dimensions` (12) : axes de pensée transversaux (Cadre Eau/Redox/Économique/Évolutif, Types de sols, Histoire, Symptômes, Pratique, Cycle, Continuum)\n- `concept_cards` : les cartes proprement dites (statut `active` | `archive`)\n- `concept_card_tests` : liaisons vers `terrain_tests` pour validation empirique\n\n**Voir BQ dédiée** : *« Concept cards — système de filtre de rigueur »* (à venir).\n\n### Cycle de vie d''une fiche ou d''une validation\n\n```\na_faire   → créée en DB avec objet + docs cibles\nen_cours  → Claude prépare/affine le prompt Jenni\nenvoye    → fichier .txt généré et copié dans Jenni\nrecu      → .docx Jenni récupéré (stocké docx/ ou docx/)\nintegre   → contenu intégré dans prompts.contexte_sci/.enrichissement des docs cibles\n            + termes extraits vers `terms`\n            + contenu brut/intégré stocké dans fiche_contenus / validation_contenus\narchive   → terminé, sort de la vue active\n```\n\n### Cycle de vie d''un prompt\n\n```\na_completer → des fiches/validations en cours pointent vers lui (objet ouvert)\ncloture     → toutes les dépendances integre, prêt pour passe finale Jenni\n```\n\nCalculé automatiquement par vue SQL : si une fiche/validation **ouverte** (`statut != 'integre' && statut != 'archive'`) référence ce prompt dans ses `docs_cibles` ou `prompts_cibles`, alors le prompt est `a_completer`.\n\n### Cycle de vie d''un document de strate\n\n```\na_rediger        → certains prompts en a_completer\npret_a_rediger   → tous les prompts en cloture\nen_redaction     → envoyé à Jenni passe finale\nredige           → .docx final reçu et intégré\n```\n\n### Tables et leur rôle\n\n| Table | Rôle | Statuts |\n|---|---|---|\n| `documents` (18) | Docs cibles du corpus | a_rediger / pret_a_rediger / en_redaction / redige |\n| `prompts` (~191) | Prompts par section | a_completer / cloture |\n| `terms` | Thésaurus canonique | (présent ou manquant, pas de cycle) |\n| `fiches` | **Zooms** sur un point précis (sous-types `zoom`, `technique`) | a_faire / en_cours / envoye / recu / integre / archive |\n| `validations` | **Vérifications + comblements** (modes `validation`, `renforcement`, `comblement`) | idem fiches |\n| `chains_causales` (C1-C9) | Chaînes scientifiques du corpus | objet potentiellement référencé par une validation |\n| `audit_reports` | Audits qui révèlent des lacunes | source possible de validations |\n\n### Workflow de production complet\n\n```\n1. AUDIT du corpus (analyse_corpus.py, audit_opus.py, agents)\n   ↓\n2. Identification des manques :\n   - termes manquants → enrichissement thésaurus (gen_prompt_enrichissement.py)\n   - sujets transversaux non couverts → nouvelles fiches\n   - chaînes/concepts/lacunes → nouvelles validations\n   ↓\n3. Production des prompts Jenni\n   - export_fiche.py            → prompts_fiche_*.txt\n   - export_validation.py       → prompts_validation_*.txt\n   - gen_prompt_enrichissement  → enrich_*.txt (lots de 10, charte Jenni)\n   ↓\n4. Cycle Jenni (envoye → recu)\n   ↓\n5. Intégration Claude :\n   - termes → terms\n   - contenu fiches → fiche_contenus + prompts.contexte_sci/.enr\n   - contenu validations → validation_contenus + prompts.contexte_sci/.enr\n   ↓\n6. Clôture des prompts (auto-déduit par vue SQL)\n   ↓\n7. Doc en pret_a_rediger\n   ↓\n8. Passe finale Jenni → doc rédigé\n```\n\n### Règles de séparation (pour éviter la dérive)\n\n1. **Une fiche n'est pas une validation**. Tables séparées, sémantiques distinctes.\n2. **Un prompt de strate ne contient jamais de méta-commentaire Claude**. Tout méta va dans `notes` ou `audit_reports`, jamais dans `contexte_sci/.instructions/.enrichissement`.\n3. **Les DOIs ne sont pas stockés** comme métadonnée d'une fiche/validation. `jenni_sources` est la source bibliographique unique. Cf. BQ #102.\n4. **Tout retour Jenni intégré** va dans le bon champ : `fiche_contenus` pour les fiches, `validation_contenus` pour les validations, et `prompts.contexte_sci/.enrichissement` pour les docs cibles. **Jamais** dans le champ `instructions` qui sert à la prochaine demande Jenni.\n5. **Les statuts sont la vérité** : on ne marque pas `exporte` ou `produit` sans cycle de vie cohérent. Le statut reflète l'état réel à tout moment.\n6. **Charte Jenni générique** (BQ #40, #41, #101) s'applique à TOUT prompt destiné à Jenni : pas de codes docs, pas de méta-vocabulaire, citations format `[N]`, blocs de 10 max pour l'enrichissement.\n7. **Charte fiches techniques** s'applique en plus aux fiches `type='technique'` : structure standardisée 8 sous-blocs (Contexte sci / Protocole / Ingrédients / Équipement / Procédure / Indicateurs qualité / Précautions & Stockage / Applications & Dosages).\n\n### État cible (idéal)\n\n- 100% des `terms` définis\n- 100% des `fiches` valides en `integre` ou `archive`\n- 100% des `validations` valides en `integre` ou `archive`\n- 100% des `prompts` en `cloture`\n- 100% des `documents` en `pret_a_rediger` puis `redige`\n\n### ⚠ Etat actuel (avril 2026)\n\n`validation_sections` et `validation_contenus` existent en DB avec des donnees historiques (81 et 16 rows respectivement) mais **aucun script actif ne les alimente**. La logique des validations est en pause (cf. BQ #127). Les BQ qui decrivent leur workflow sont conservees comme reference, mais les scripts `export_validation.py` / `import_validation.py` ne sont pas operationnels aujourd'hui.\n", "type": "reference", "crit": true}, {"id": 72, "titre": "Structure dépôt et conventions de nommage", "contenu": "**Arborescence du dépôt :**\n```\nTools/                          ← racine git\n├── sol_vivant.db               ← source de vérité unique\n├── CLAUDE.md                   ← généré par session_start.py\n├── tools/                      ← scripts Python\n├── Publications/\n│   ├── img/                    ← images (OG, favicons, logos)\n│   ├── web/                    ← pages HTML publiques (noms fixes)\n│   ├── cartographie/           ← documentation statique\n│   ├── prompts/                ← exports Jenni horodatés\n│   ├── workflows/              ← workflows horodatés\n│   └── journal/                ← journaux de session\n├── jmj/                        ← documents de travail auteur\n└── Ma bibliothèque.ris         ← export RIS
