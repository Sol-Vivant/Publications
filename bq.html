e** le brouillon en markdown dans la conversation\n   (réflexion + contrôle JMJ)\n2. **Claude injecte directement en DB** : `fiche_sections.contexte_sci`\n   pour chaque section, optionnellement `fiche_section_h2_notes.note_md`\n   pour les texte rédigé granulaires H2\n3. **JMJ valide** (ou demande révision → re-draft)\n4. **`gen_fiche_prompt_docx.py --fiche-id <id>`** produit le docx depuis\n   la DB au moment de l'envoi à Jenni\n5. **JMJ envoie à Jenni** via Google Doc (copier-coller) ou upload\n6. **Jenni enrichit** → retour docx dans `docx/<slug>.docx`\n7. **Claude intègre** via `integrate_fiche_docx.py` (parser OMML,\n   sections, refs, termes_candidats)\n\n**Anti-pattern** : produire un fichier `.md` ou `.txt` intermédiaire\npour le prompt. La DB est la source de vérité unique.\n\n### 9. Rédaction en direct uniquement — pas d'agent Task\n\nLa rédaction éditoriale est strictement limitée à JMJ + Claude en\ndirect + Jenni (cf. BQ #136 `pas_agent_redacteur`). Interdit de\nsous-traiter la rédaction d'un brouillon de fiche à un Agent Task.\n\nLes agents Task peuvent assister par de l'**extraction** :\n- Analyser les concept cards liées à un sujet pour nourrir le\n  brouillon (`analyse_fiches.py` déjà en place)\n- Extraire les termes candidats présents dans la littérature corpus\n- Lister les chaînes causales traversant le sujet\n\nMais la rédaction des paragraphes = Claude en direct, avec réflexion\nexplicite.\n\n### 10. Calibrage du niveau de détail\n\nQuestions à se poser avant de rédiger :\n- Quelles concept cards actives sont au cœur de ce sujet ?\n- Quelles chaînes causales le traversent ?\n- Quelles fiches voisines existent déjà (à renvoyer vs reproduire) ?\n- Quels termes canoniques sont à activer (sans re-définir) ?\n- Quels chiffres / études majeurs doivent apparaître ?\n- Quels points sont les plus *spécifiques* au corpus Sol Vivant\n  (à prioriser) ?\n\nLe brouillon résultant est le **réacteur** qui maximise la valeur ajoutée\nde Jenni : moins elle a à inventer, plus elle peut apporter (sources,\nprécisions, formulations éditoriales, cohérence stylistique).\n\n### Historique\n\n- **2026-04-21 matin** : Formalisation après tentative initiale d'un\n  brouillon ACS 3 piliers de 5 500 mots (trop large, voudrait être un\n  cours FAO) → recadrage JMJ : « précision > volume », « pertinence\n  ancrée au corpus », « ne pas refaire ce qu'il contient déjà ».\n- **2026-04-21 après-midi** : Ajouts après fiche Cycle de l'azote +\n  proposition rumen :\n  - §3 Graines pas vérités finales : expliciter le cycle itératif\n    Claude → Jenni → JMJ (Jenni conteste si littérature diverge,\n    JMJ valide en plusieurs passes)\n  - §6 Refs format Google Doc (cross-refs hyperliens + bookmarks)\n  - §7 Limite DIY (Claude → volet science, pas protocole)\n  - §8 Prompts en DB (jamais dans des fichiers tmp)\n", "type": "workflow", "crit": true}]}, "docs": {"nom": "Pipeline docs strate", "entries": [{"id": 2, "titre": "18 documents — état de production", "contenu": "Requête de démarrage :\n```sql\nSELECT d.code, d.titre, d.strate,\n       jdv.version, CASE jdv.is_frozen WHEN 1 THEN '🔒' ELSE '✏️' END as etat,\n       jds.statut_redaction, jds.priorite\nFROM documents d\nLEFT JOIN jenni_doc_versions jdv ON jdv.doc_code=d.code\nLEFT JOIN jenni_doc_specs jds ON jds.doc_code=d.code\nORDER BY jds.priorite;\n```", "type": "commande", "crit": false}, {"id": 41, "titre": "Architecture des prompts — masque v3.0 + format blocs ---", "contenu": "Les prompts sont générés **mécaniquement** par `export_jenni_doc.py` v3.0 depuis les tables :\n\n| Table | Données |\n|---|---|\n| `jenni_doc_specs` | titre_jenni, style, angle_entree |\n| `prompts` | H1, H2, contexte_sci, instructions, enrichissement, style, tableau |\n| `terms` | termes canoniques par doc_code (automatique) |\n\n**Règle absolue** : aucune référence au corpus dans les prompts (pas de codes docs, pas de cross-refs).\n\n**Masque fixe par section :**\n```\n[H1 titre chapitre]\nRédige la section intitulée \"H2\"\nContexte scientifique (si rempli)\nInstructions de rédaction\nTableau structuré (si demandé)\n```\n\n**Intro uniquement** : enrichissement (cadre conceptuel) ajouté avant les instructions.\n\n**Bloc initial** (copié en premier dans Jenni) :\n```\nPlan du document\nAccroche\nTermes canoniques\n```\n\n### (fusionné depuis #92 : Format blocs séparés — règle structurelle)\n\n## Format des prompts Jenni — blocs séparés\n\n**Règle structurelle** : un fichier de prompts Jenni est une **suite de blocs successifs séparés par `---`**.\n\n### Pattern\n```\nbloc 1 (header/titre_jenni + plan)\n---\nbloc 2 (termes canoniques)\n---\nbloc 3 (prompt section 1)\n---\nbloc 4 (prompt section 2)\n---\n...\n```\n\n### Contraintes absolues\n- **PAS d'encadrement de titres** (pas de banderoles `## TITRE ##`, pas de décoration ASCII)\n- **PAS de doc/description** autour des blocs (pas d'introduction méta, pas de métadonnées)\n- **Chaque bloc = une demande autonome** qui se suffit à elle-même\n- **Séparateur strict** : `\\n\\n---\\n\\n` (défini dans `tools/lib/jenni_format.py` constante `SEPARATOR`)\n\n### Justification\nJenni traite chaque bloc comme une demande indépendante. Ajouter du balisage de titres ou des descriptions méta pollue le contexte et fait dériver la réponse. Le format blocs-séparés-par-tirets est le plus sobre possible tout en restant structuré.\n\n### Comment c'est construit\nDans `tools/jenni/export_jenni_doc.py` :\n```python\nfull_text = header + SEPARATOR + plan_block + SEPARATOR + terms_jenni + SEPARATOR + SEPARATOR.join(prompts) + \"\\n\"\n```\n\nTous les prompts manuels (fiches, validations, enrichissements) doivent suivre la même règle.", "type": "reference", "crit": true}, {"id": 4, "titre": "Ordre de rédaction des 18 documents", "contenu": "Phase 1 — Fondations Sol (tout le corpus y renvoie) : F1 > F2 > S0 > S1 > S2 > S3 > S4\nPhase 2 — Vivant : V1 > V2 > V3\nPhase 3 — Pratiques : P1 > P2 > P3 > P4 > P5\nPhase 4 — Humain (EN DERNIER) : H3 > H2 > H1\n\nH1 est toujours le dernier document — synthèse de tout le corpus.", "type": "reference", "crit": false}, {"id": 42, "titre": "Workflow de rédaction", "contenu": "**Passe 1 — Rédaction (Jenni) :**\n1. Générer les prompts :\n   `python3 export_jenni_doc.py --db sol_vivant.db --doc S0`\n2. Dans Jenni : créer un projet, uploader le RIS filtré (sources pertinentes depuis Zotero)\n3. Copier-coller le bloc initial (plan + termes) puis chaque prompt un par un\n   → Jenni produit le jet brut one-shot (assemblage de citations sourcées)\n   → Jenni peut proposer des enrichissements spontanés quand le sujet l'inspire\n4. Exporter le .docx et le .ris produits\n\n**Passe 2 — Analyse et intégration (Claude) :**\n1. Donner le .docx à Claude\n2. Claude analyse chaque section :\n   - Extraire les faits établis, données chiffrées, mécanismes\n   - Identifier les nouveaux termes candidats → table terms\n   - Extraire les références → Zotero (via le RIS)\n   - Enrichir le corpus : cross-refs, relations, concept cards si nécessaire\n3. Intégrer dans la DB\n\n**Passe 3 — Validation (3 révisions par agent spécialisé) :**\n1. Agent de validation vérifie les affirmations du .docx\n2. 3 passes de révision pour confirmer la solidité scientifique\n3. Corrections intégrées si nécessaire\n\n**Ancien workflow (obsolète) :** analyse Claude → retour Jenni → re-analyse Claude. Abandonné car les prompts enrichis en amont guident suffisamment la rédaction — Jenni produit directement un contenu solide et ses recherches sont plus poussées quand le prompt est précis.\n\n**Règles :**\n- Ne JAMAIS demander à Jenni de sourcer (c'est intrinsèque)\n- Le .docx Jenni ne rentre JAMAIS tel quel en DB — tout passe par analyse Claude\n- Aucune référence au corpus dans les prompts (BQ ID=40)\n- Ordre de rédaction : F → S → V → P → H\n\n### Precision workflow Passe 1 (ajout session 2026-04-12)\n\n**Le travail avec Jenni se fait section par section dans le chat**, pas en copier-collant tout le prompt d''un coup. Le .txt pose le plan complet, mais JMJ le parcourt avec Jenni une section a la fois :\n1. Coller le bloc initial (plan + termes) dans le document Jenni\n2. Dans le chat : demander a Jenni de rediger la section I\n3. Jenni redige, propose des recherches, fait des remarques\n4. JMJ valide ou ajuste dans le chat\n5. Passer a la section II, etc.\n6. Utiliser des balises de repere si la session est longue (\"on reprend a la section V\")\n\nJenni perd le fil apres ~4-5 sections sans balise. Ne jamais presumer qu''elle se souvient du contexte complet.\n", "type": "commande", "crit": true}, {"id": 43, "titre": "Commande de génération", "contenu": "python3 export_jenni_doc.py --db sol_vivant.db --doc S2\n\nOu toute une strate :\nfor doc in S0 S1 S2 S3 S4; do python3 export_jenni_doc.py --db sol_vivant.db --doc $doc; done\n\nOu tous les documents :\npython3 export_jenni_doc.py --db sol_vivant.db --all\n\nLe fichier produit (prompts_jenni_S2.txt) contient tous les prompts séparés par `---`. Copier-coller un par un.", "type": "commande", "crit": false}, {"id": 44, "titre": "Modifier le contenu d'un prompt", "contenu": "Ne jamais éditer le script ni le fichier de sortie.\n\nModifier les données dans la table `prompts` :\n```sql\nUPDATE prompts SET instructions = 'Nouvelles instructions'\nWHERE doc_code = 'S0' AND chapitre = 1 AND section = 1;\n\nUPDATE prompts SET contexte_sci = 'Nouveau contexte'\nWHERE doc_code = 'S0' AND chapitre = 2 AND section = 1;\n\nUPDATE prompts SET tableau = 1\nWHERE doc_code = 'S0' AND chapitre = 3 AND section = 1;\n\nUPDATE prompts SET enrichissement = 'Cadre conceptuel'\nWHERE doc_code = 'S0' AND type = 'intro';\n```\n\nPuis regénérer : `python3 export_jenni_doc.py --db sol_vivant.db --doc S0`", "type": "commande", "crit": false}, {"id": 142, "titre": "Workflow documents — pattern fiche + doc_contenus", "contenu": "## Workflow documents de strate — pattern fiche (refonte avril 2026)\n\nLes 18 documents (F1-F2, S0-S4, V1-V3, P1-P5, H1-H3) suivent desormais\nle meme workflow que les fiches integrees, elimine la notion de\n\"brouillon\" (le prompt EST le brouillon).\n\n### Chaine complete\n\n```\n[Claude/JMJ]         prompts/docs/doc-<code>.docx    (genere depuis DB — sections + contexte_sci + instructions)\n      │\n      ▼\n[Rédaction externe]  docx redige                    (outil de redaction, opaque cote corpus)\n      │\n      ▼\n[Claude conscient]   analyse consciente du retour   (refs matchees, termes, coherence doctrine)\n      │\n      ▼\n[Claude]             tools/admin/integrate_doc_docx.py --doc-code X --docx ... --apply\n      │                → INSERT doc_contenus(doc_code, version, contenu_integre, refs)\n      │                → UPDATE documents.statut = 'integre'\n      │                → register_usage sur sources RIS matchees\n      │                → archive docx -> docx/archives/\n      ▼\n[Index carto]        onglet Documents → section ouverte :\n                       - si doc_contenus.contenu_integre existe : bandeau \"Document intégré\",\n                         rendu SvRichText + refs via SvSourceList\n                       - sinon : bandeau \"En cours de rédaction\", sections cliquables\n                         montrent l'état de préparation (contexte_sci/instructions/enrichissement)\n```\n\n### Tables\n\n| Table | Role |\n|-------|------|\n| `documents` | 18 docs corpus (code, titre, strate, statut) |\n| `doc_contenus` | Contenu redige INTEGRE (contenu_integre + refs JSON). Versionne. **Source canonique**. |\n| `jenni_doc_specs` | Metadonnees prompt (titre, angle, public, priorite) — configuration amont |\n| `jenni_doc_versions` | Legacy — versions historiques prompts/ebauches. Non lue par la carto. |\n| `prompts` | Sections du plan + contexte_sci/instructions/enrichissement (prompt detaille par section) |\n\n### Scripts\n\n| Script | Role |\n|--------|------|\n| `tools/admin/integrate_doc_docx.py` | Import docx redige -> doc_contenus. Pattern symetrique integrate_fiche_docx.py |\n| `tools/jenni/archives/gen_doc_ebauche.py` | Archive — obsolete |\n| `tools/docs/archives/gen_ebauches_web.py` | Archive — page ebauches web supprimee |\n\n### Regles d'affichage carto (index onglet Documents)\n\n1. **Zéro mention d'outil de rédaction externe** dans l'UI. Neutre : \"En cours de rédaction\" / \"Document intégré\".\n2. Les champs prompts (`contexte_sci`, `instructions`, `enrichissement`) ne sont visibles\n   qu'en état \"En cours\". Dès l'intégration, seul `contenu_integre` est affiché.\n3. Bascule automatique pilotee par la présence de `doc_contenus.contenu_integre` (fallback legacy sur `jenni_doc_versions.contenu`).\n\n---\n\n## Intégration par section — règle absolue (doc ET fiche)\n\n**Motivation** — symétrie avec `fiche_sections.contenu` (BQ #130 §4.2).\nLe `contenu_integre` unique, flat, est un *anti-pattern* hérité : à chaque\nrendu (carto, cahier, futures pages) il faut re-parser le blob pour en\nextraire les sections. Ce parsing est fragile, duplique la logique et\nempêche tout affichage per-section propre (navigation compacte, collapse,\ndeep-link vers une section, édition section par section).\n\n**Règle** — l'intégration doit produire un **contenu structuré section\npar section**, identique au pattern fiche :\n\n| Entité | Table / champ | Forme |\n|--------|---------------|-------|\n| Fiche | `fiche_sections.contenu` (TEXT) | Tableau JSON `[{kind, text}, …]` par section (para / h3 / bullet) |\n| Document | **cible : `prompts.contenu` ou `doc_sections.contenu`** (à migrer) | Même forme JSON blocs par section |\n\n**Aujourd'hui (2026-04) — état transitoire** :\n- Fiches : ✓ conforme (`fiche_sections.contenu` alimenté par\n  `integrate_fiche_docx.py` + `reintegrate_fiches_sections.py`)\n- Docs : ✗ non conforme (`doc_contenus.contenu_integre` = blob brut\n  écrit par `integrate_doc_docx.py`).\n\n**Chantier à lancer** :\n1. Ajouter une colonne `contenu` (TEXT JSON) à `prompts` — OU créer\n   `doc_sections` (schéma miroir de `fiche_sections`).\n2. Adapter `integrate_doc_docx.py` pour écrire la version structurée\n   section par section (parser docx → aligne sur le plan `prompts`\n   via `doc_code/chapitre/section` → sérialise blocs JSON).\n3. Garder `doc_contenus.contenu_integre` en legacy (historique,\n   lecture seule), plus jamais écrit par les nouveaux imports.\n4. Migration des 0-2 docs déjà intégrés : re-parser le blob existant\n   vers la nouvelle structure via un script miroir de\n   `reintegrate_fiches_sections.py`.\n\n**Rendu unifié — `SvSectionsNav` (sv-shared-components)** :\n\nDès que les docs sont stockés par section, le même composant\n`SvSectionsNav` sert pour fiches (cahier) et docs (index) — navigation\ncompacte, click-to-expand, typo sobre (num monospace + titre sm + dot\nd'état + chevron). Voir `html_templates(slug='sv-shared-components')`\nfonction `SvSectionsNav` + CSS `.sv-sections-nav*`.\n\n**Principe** : *le nettoyage / découpage se fait à l'import, pas au\nrendu*. Toute logique de parsing côté JS (splitter un blob au\n`##`, extraire les refs inline) est un contournement. Corriger\nl'entrée, pas la sortie.\n", "type": "reference", "crit": true}]}, "validations": {"nom": "Pipeline validations", "entries": [{"id": 105, "titre": "Validations — workflow et structure (table dédiée)", "contenu": "## Validations — workflow et structure\n\n**Différence avec une fiche** : la fiche est un **zoom proactif** sur un sujet intéressant en soi ; la validation est un **comblement réactif** d''une dette identifiée dans le corpus (chaîne non validée, concept non étayé, lacune détectée par audit).\n\nLes deux contribuent au même objectif : **clôturer les prompts des docs de strate**. Cf. BQ « Modèle conceptuel — production du corpus ».\n\n### Tables\n\n```sql\nCREATE TABLE validations (\n  id              INTEGER PRIMARY KEY AUTOINCREMENT,\n  slug            TEXT UNIQUE NOT NULL,\n  titre           TEXT NOT NULL,\n  mode            TEXT NOT NULL,    -- 'validation' | 'renforcement' | 'comblement'\n\n  -- Objet à valider/combler\n  objet_type      TEXT,             -- 'chaine_causale' | 'concept' | 'lacune' | 'affirmation' | 'transversal'\n  objet_ref       TEXT,             -- ex: 'C7', id_term, 'S2.ch3.s2', texte libre\n\n  -- Cibles : ce qui sera clôturé par cette validation\n  docs_cibles     TEXT,             -- JSON ['F2','S2','P2','P5']\n  prompts_cibles  TEXT,             -- JSON [prompt_id,...] optionnel si granularité fine\n\n  -- Demande\n  question        TEXT,             -- formulation claire de ce qu'on cherche / ce qu'on valide\n\n  -- Cycle de vie\n  statut          TEXT DEFAULT 'a_faire',\n                                    -- a_faire | en_cours | envoye | recu | integre | archive\n  verdict         TEXT,             -- pour mode='validation' : 'confirme'|'infirme'|'nuance'|'reserves'\n\n  date_creation   TEXT DEFAULT (datetime('now')),\n  date_envoi      TEXT,\n  date_retour     TEXT,\n  date_integration TEXT,\n\n  notes           TEXT,             -- notes libres Claude (pas pour Jenni)\n  updated_at      TEXT DEFAULT (datetime('now'))\n);\n\nCREATE TABLE validation_sections (\n  id              INTEGER PRIMARY KEY AUTOINCREMENT,\n  validation_id   INTEGER NOT NULL REFERENCES validations(id),\n  ordre           INTEGER NOT NULL,\n  type            TEXT NOT NULL DEFAULT 'section',  -- intro | section | verdict\n  titre           TEXT,\n  contexte_sci    TEXT,             -- ce que le corpus dit déjà\n  instructions    TEXT,              -- questions/demandes précises à Jenni\n  enrichissement  TEXT,             -- contexte additionnel pour Jenni (rare)\n  UNIQUE(validation_id, ordre)\n);\n\nCREATE TABLE validation_contenus (\n  id              INTEGER PRIMARY KEY AUTOINCREMENT,\n  validation_id   INTEGER NOT NULL REFERENCES validations(id),\n  version         INTEGER DEFAULT 1,\n  contenu_brut    TEXT,             -- contenu .docx Jenni brut\n  contenu_integre TEXT,             -- contenu nettoyé/intégré\n  refs            TEXT,             -- JSON [doi,...] récupérés post-Jenni → renvoyés vers Zotero\n  notes_claude    TEXT,             -- notes d'analyse Claude\n  date_import     TEXT DEFAULT (datetime('now')),\n  UNIQUE(validation_id, version)\n);\n```\n\n### Modes\n\n| Mode | Quand l''utiliser | Objet typique |\n|---|---|---|\n| `validation` | Vérifier une affirmation existante du corpus, valider une chaîne causale | `chaine_causale` (C1-C9), `affirmation` |\n| `renforcement` | Renforcer un sujet sous-couvert dans le corpus | `transversal` (par strate ou thématique) |\n| `comblement` | Combler une lacune précise identifiée par audit | `lacune` (section/chapitre précis) |\n\nLa frontière entre les 3 modes peut être floue — c''est intentionnel. Ce qui compte est l''objet (`objet_type`/`objet_ref`) et les docs cibles. Le mode est informatif.\n\n### Cycle de vie (`validations.statut`)\n\n```\na_faire   → créée en DB (objet, mode, docs_cibles, sections)\nen_cours  → Claude prépare/affine le prompt Jenni\nenvoye    → fichier .txt généré et copié dans Jenni\nrecu      → .docx Jenni récupéré\nintegre   → contenu intégré dans prompts.contexte_sci/.enr des docs cibles\n            + termes extraits vers terms\n            + contenu brut/intégré stocké dans validation_contenus\n            + verdict renseigné si mode='validation'\narchive   → terminé, sort de la vue active\n```\n\n### Workflow\n\n1. **Identifier une dette** : audit révèle une lacune, une chaîne causale non validée, un concept faible\n2. **Créer la validation** : `INSERT INTO validations` avec mode + objet + docs_cibles\n3. **Renseigner les sections** : `validation_sections` (intro, sections de question, verdict si validation)\n4. **Générer le prompt** : `export_validation.py --slug <slug>` → `recherches/prompts_validation_{slug}.txt`\n5. **Envoyer à Jenni**, récupérer le .docx\n6. **Intégrer** : Claude analyse le .docx → `validation_contenus` + `prompts.contexte_sci/.enr` des docs cibles + verdict si validation\n7. **Marquer `integre`**, puis `archive` quand terminé\n\n### Charte applicable\n\nLes prompts de validation suivent la **charte Jenni générique** (BQ #40, #41, #101) :\n- Pas de codes docs (S0, V2…)\n- Pas de méta-vocabulaire (corpus, thésaurus…)\n- Citations format `[N]`\n- Blocs séparés par `---`\n\n**Pas de structure standardisée 8 sous-blocs** (qui est spécifique aux fiches techniques). Une validation a une structure libre adaptée à la question posée.\n\n### Distinction des champs (règle stricte)\n\n- `validation_sections.contexte_sci` = ce que le corpus/la science dit déjà sur l''objet\n- `validation_sections.instructions` = questions précises à Jenni pour valider/combler\n- `validation_sections.enrichissement` = contexte additionnel pour Jenni si nécessaire (rare)\n- `validation_contenus.contenu_integre` = ce que Jenni a renvoyé, intégré\n\n**Jamais** mélanger contenu reçu et instructions de production — chacun dans sa table.\n\n### Lien avec la production du corpus\n\nUne validation `integre` alimente les `prompts` des docs cibles, contribuant à leur clôture. Tant qu''une validation pertinente reste à produire, le doc cible n''est pas en `pret_a_rediger`.\n\n### Exemples actuels (à migrer en Phase 2)\n\n| Slug actuel | Source | Migration |\n|---|---|---|\n| `validation-c7-performance-robustesse` (table fiches) | `revue_critique` de la chaîne C7 | mode=`validation`, objet=`chaine_causale:C7` |\n| `thermotolerance-microbiome-sol` (table fiches) | `revue_critique` | mode=`validation`, objet=`transversal:thermotolerance` |\n| `prompt_validation_notes_2026-04-08.txt` (orphelin) | Affirmations issues de notes Jenni | mode=`validation`, objet=`affirmation` (multi) |\n| `renforce_sections_manquantes_*.txt` (orphelin) | Audit | mode=`comblement`, objet=`lacune` (multi) |\n| `renforce_modules_faibles_*.txt` (orphelin) | Audit | mode=`renforcement` |\n| `renforce_pratiques_fermentations_economie_*.txt` | Audit P | mode=`renforcement`, objet=`transversal:fermentations_economie` |\n| `renforce_sol_carbone_redox_methodes_*.txt` | Audit S | mode=`renforcement` |\n| `renforce_vegetal_holobionte_nutrition_*.txt` | Audit V | mode=`renforcement` |\n\n### ⚠ Etat actuel (avril 2026)\n\n`validation_sections` et `validation_contenus` existent en DB avec des donnees historiques (81 et 16 rows respectivement) mais **aucun script actif ne les alimente**. La logique des validations est en pause (cf. BQ #127). Les BQ qui decrivent leur workflow sont conservees comme reference, mais les scripts `export_validation.py` / `import_validation.py` ne sont pas operationnels aujourd'hui.\n", "type": "reference", "crit": true}]}}, "technique": {"bq": {"nom": "BQ elle-même", "entries": [{"id": 136, "titre": "Pas d'agents rédacteurs — la rédaction c'est JMJ + Claude + Jenni, jamais un sous-agent", "contenu": "## Règle absolue — pas d'agents rédacteurs\n\n**La rédaction de contenu éditorial du corpus est STRICTEMENT limitée à :**\n- **Jenni** (via le workflow docx : prompt → Jenni rédige → retour docx → import contrôlé)\n- **JMJ** (directement, ou en demandant à Claude de rédiger spécifiquement)\n- **Claude** (moi) SEULEMENT quand JMJ me le demande explicitement en direct\n\n**Sont interdits** :\n- Lancer un agent Task (`Agent` tool) pour rédiger **définitions**, **synonymes**, **contenus de fiches**, **contenus de prompts**, **descriptions de concept_cards**, **contenus BQ** ou tout autre contenu éditorial du corpus\n- Demander à un agent de \"produire des définitions courtes\", \"rédiger une synthèse\", \"écrire une amorce\", \"compléter une description\"\n- Inventer des définitions ou contenus sans base docx/prompt Jenni ou indication explicite de JMJ\n\n**Sont autorisés pour les agents Task** :\n- Classification, extraction, analyse (ex: normaliser la casse, détecter des orphelins, trier des termes)\n- Recherche dans le code ou la DB\n- Parsing/formatage de données existantes\n- Audit/comparaison\n\n**Workflow correct pour créer un nouveau terme** :\n1. Identifier le besoin (ex: hyperonyme manquant)\n2. Écrire le nom du terme dans une liste à faire passer par Jenni\n3. Exporter via `export_thesaurus_incomplets.py` ou `gen_prompt_thesaurus.py`\n4. Jenni rédige la définition\n5. Réimport via `import_termes_jenni.py --replace`\n\n**Justification** : JMJ passe des heures à faire rédiger Jenni avec soin. Toute définition Claude-made sabote ce travail et pollue le thésaurus avec du contenu non validé. Violation détectée 2026-04-20 (14 termes créés avec def Claude en commit af35413 — supprimés et à refaire via Jenni).\n\n**Exception limitée** : les définitions que JMJ demande à Claude de rédiger EN DIRECT (dans la conversation) sont OK car c'est explicite et JMJ valide immédiatement.", "type": "regle_absolue", "crit": true}, {"id": 1, "titre": "Carte du projet — vue d'ensemble (à lire en premier)", "contenu": "## Carte du projet — Le Sol Vivant cet Holobionte\n\n**Lire en premier.** Cette entrée donne la vue d'ensemble. Toutes les BQ sont ensuite des références détaillées.\n\n### Le projet en 4 lignes\n\nCorpus scientifique en **18 documents** sur l'agriculture régénératrice et la biologie des sols, écrit par Jean-Michel Juzan. Claude Code édite la DB et les scripts ; Jenni AI rédige. Biblio interne dans la table `jenni_sources` (1639 refs), alimentée par intégration consciente des rapports de sources fournis par JMJ. Zotero est un outil exploratoire annexe. DB unique `sol_vivant.db` = source de vérité. Branche `main` = production.\n\n### Les 3 acteurs\n\n| Acteur | Rôle | Interface |\n|---|---|---|\n| **Claude Code** (moi) | Édite la DB, les scripts, audit corpus, intégration retours Jenni, veille | Terminal + sol_vivant.db |\n| **Jenni AI** | Rédige à partir de prompts, produit des .docx | Web, piloté par .txt prompts |\n| **JMJ** (auteur) | Donne des rapports de sources à intégrer, valide les actions Claude | Session + .md |\n\n### Pipeline global\n\n```\n    ┌─────────────────────────────────────────────────────────────┐\n    │          CORPUS = 18 documents rédigés par Jenni            │\n    └──────────────────────────▲──────────────────────────────────┘\n                               │ passe finale Jenni\n                               │\n          ┌────────────────────┴────────────────────┐\n          │   PROMPTS clôturés (prompts.statut=cloture)  │\n          │     contexte_sci + instructions + enrichissement       │\n          └────────────────────▲────────────────────┘\n                               │\n       ┌───────────────────────┼───────────────────────┐\n       │                       │                       │\n  ┌────┴─────┐           ┌─────┴─────┐           ┌─────┴──────┐\n  │ THÉSAURUS │           │  FICHES   │           │VALIDATIONS│\n  │ 962 termes│           │ 27 intégr.│           │ (en pause)│\n  └────▲─────┘           └─────▲─────┘           └─────▲──────┘\n       │                       │                       │\n       │ enrich_thesaurus       │ fiches zoom           │ combler dette\n       │                       │ (transversale/        │ (audit révèle)\n       │                       │  technique/zoom)      │\n       │                       │                       │\n  ┌────┴───────────────────────┴───────────────────────┴────┐\n  │              AUDIT du corpus / notes volantes           │\n  │    analyse_corpus · audit_opus · check_integrity        │\n  └─────────────────────────────────────────────────────────┘\n```\n\n**Note** : les `concept_cards` (91 actives) agissent en **filtre de rigueur** entre captation et intégration : toute nouvelle affirmation doit d'abord passer par une carte (cf. #106).\n\n### Les 5 scripts à connaître (chaque session)\n\n| Commande | Rôle |\n|---|---|\n| `python3 tools/admin/session_start.py --db sol_vivant.db` | Démarre la session (sync git, backup DB, dashboard, règles actives) |\n| `python3 tools/admin/bq_query.py --list` / `--modules <code>` / `--search <kw>` | Consulter cette BQ (onze modules) |\n| `python3 tools/admin/check_integrity.py --db sol_vivant.db` | Valider l'état DB (FK, orphelins, doublons) |\n| `python3 tools/regen_all.py --db sol_vivant.db` | Régénérer tous les outputs (HTML, README, workflows) depuis la DB |\n| `python3 tools/sync_scripts.py --db sol_vivant.db --inject` | Pousser les scripts locaux modifiés vers la DB |\n| `python3 tools/veille/weekly_scan.py --db sol_vivant.db` | Veille PubMed hebdomadaire (9 thèmes, 28 requêtes) |\n\n### Les 4 règles absolues\n\n1. **`main` est la production** — travailler et pousser directement sur main (cf. #70)\n2. **La DB est source de vérité** — fichiers générés = vues (cf. #73). Ne jamais modifier un fichier de sortie ; toujours modifier la source puis `regen_all.py`\n3. **Le .docx Jenni ne rentre jamais tel quel en DB** — tout passe par analyse Claude + scripts d'import contrôlés\n4. **Pas de codes docs / méta-vocab dans les prompts** — S2, V1, \"strate\", \"corpus\", \"thésaurus\" interdits dans `prompts.contexte_sci/.instructions/.enrichissement` (cf. #120)\n\n### Infrastructure transverse\n\n**Table `config` (84 clés)** — paramètres centralisés par catégorie/clé. Toute valeur partagée entre scripts va là, pas en dur.\n- `config.corpus.*` : nom, auteur, version du projet\n- `config.veille.hot_topics` : 9 thèmes PubMed de la veille\n- `config.web.icon_library` : bibliothèque d'icônes unifiée\n- `config.cahier.onglets`, `config.cahier.chapitres`, `config.cahier.tab_descriptions` : structure du Cahier de Science\n- `config.jenni.*` : templates de prompts Jenni\n- `config.claude_rules.*` : règles Claude affichées au démarrage\n\nLecture Python : `from config import get, get_json, get_int, get_float` (dans `tools/lib/config.py`).\n\n**Table `audit_log` (1200+ entrées)** — trace horodatée de toutes les opérations significatives en DB. Colonnes : `ts, operation, table_name, record_ref, detail`. Opérations les plus courantes : `GENERATE` (régénération page), `UPDATE` (modification), `INSERT` (ajout), `IMPORT` (import docx), `MERGE`, `SYNC`.\n\nUtile pour :\n- Reconstituer l'historique d'une fiche ou d'un terme\n- Debugger « qui a modifié quoi quand »\n- Produire les rapports de session\n\n**Écriture systématique** : tout script qui modifie la DB doit écrire dans audit_log :\n```python\ncon.execute(\"INSERT INTO audit_log (operation, table_name, record_ref, detail) VALUES (?, ?, ?, ?)\",\n            ('UPDATE', 'terms', f'term #{tid}', 'Correction definition corrompue'))\n```\n\n**Table `jenni_sources` (1639 refs)** — biblio interne du projet. Chaque source a `doi, auteurs, annee, titre_complet, journal, resume_court, pertinence, tags, url`. Alimentée par **intégration consciente** (un rapport de source à la fois — cf. workflow `wf_source_integration`). Jamais de batch-insert aveugle.\n\n**Table `source_usages` (2322 liens)** — relie une source à une entité (fiche / document / terme / card / prompt) avec contexte et citation brute. Permet de reconstituer « où est cette source citée ? ».\n\n### Modules BQ — où chercher quoi\n\n| Module | Contenu | Quand aller voir |\n|---|---|---|\n| **projet** | Doctrine corpus, modèle conceptuel, concept cards | Avant de toucher la rédaction ou la structure |\n| **claude** | Règles Claude (git, DB, pseudoscience, faux positifs) | Avant toute action |\n| **workflow** | Un workflow métier par BQ (fiche, thésaurus, veille, web…) | Pour retrouver le bon enchaînement |\n| **web** | Charte graphique, composants React, pages HTML | Génération/modif de pages |\n| **jenni** | Chartes rédaction, format prompts, enrichissement | Avant de produire un prompt Jenni |\n| **sqlite** | Schéma tables, vues, requêtes utiles | Inspection DB |\n| **maintenance** | Sessions, scripts, régénération, intégrité | Opérations de maintenance |\n\n", "type": "info", "crit": true}, {"id": 57, "titre": "Architecture DB — tables, vues, colonnes clés", "contenu": "**Comptages à jour** (générés dynamiquement par `session_start.py`) :\n```sql\nSELECT\n  (SELECT COUNT(*) FROM sqlite_master WHERE type='table' AND name != 'sqlite_sequence') as tables,\n  (SELECT COUNT(*) FROM sqlite_master WHERE type='view') as vues,\n  (SELECT COUNT(*) FROM scripts) as scripts;\n```\n\nNe pas mettre de chiffres en dur ici — utiliser la requête ci-dessus ou `session_start.py`.\n\n**Noyau documentaire** : documents, prompts, prompt_contenus, doc_cross_refs, jenni_doc_specs, jenni_doc_versions\n**Thésaurus** : terms, term_relations, term_connections\n**Chaînes** : chains_causales, chain_etapes\n**Cascade** : cascade_prerequis, cascade_level_links, concept_cards, terrain_tests, diagnostic_rules\n**BQ** : domaines_techniques, domaine_bq, bq_entries\n**Config** : config, db_meta, scripts, audit_log, maintenance_sessions, requetes_utiles\n**Fiches** : fiches\n\n### (fusionné depuis #58 : Tables actives vs legacy)\n\n**Tables actives (utilisées quotidiennement) :**\ndocuments, prompts, terms, term_relations, jenni_doc_specs, jenni_doc_versions, jenni_section_specs, doc_cross_refs, chains_causales, chain_etapes, scripts, bq_entries, domaines_techniques, domaine_bq, db_meta, audit_log, config, fiches\n\n**Tables de référence (calculateurs, données scientifiques) :**\nrefs (unifiee 2026-04, kind=matiere|texture|esclave_energ|shift_chantier|cn_regle, 317 rows) + ref_cn_incorporation, ref_melanges_predefinies, ref_kirkby (conservees, structures specifiques)\n\n**Tables web (templates, pages) :**\nhtml_templates, web_pages\n\n**Tables cascade & diagnostic :**\ncascade_prerequis, cascade_level_links, concept_cards, terrain_tests, diagnostic_rules\n\n**Tables de maintenance :**\nmaintenance_sessions, requetes_utiles\n\n**Tables legacy (peuvent être supprimées) :**\nprompt_contenus (remplacé par prompts.enrichissement), term_connections (vide)\n\nCompter les tables :\n```sql\nSELECT COUNT(*) FROM sqlite_master WHERE type='table' AND name != 'sqlite_sequence';\n```\n\n### (fusionné depuis #82 : Colonnes clés par table — aide-mémoire)\n\nColonnes les plus utilisées (évite les PRAGMA table_info à répétition) :\n\n**terms** : id, section_key, strate, fr, en, definition, syn_fr, syn_en, inrae, doc_code, statut, type, flag_pseudoscience\n**prompts** : id, doc_code, type (intro/section/conclusion), chapitre, section, titre_h1, titre_h2, contexte_sci, instructions, enrichissement, style, tableau, ordre\n**documents** : code, titre, strate, sous_titre, resume\n**config** : categorie, cle, valeur\n**concept_cards** : id, title, description, category, docs_codes (JSON), status\n**refs** (migration 2026-04) : id, ref_kind, code, label, description, source, source_id, data JSON, ordre, is_active, legacy_id. Helper `tools/lib/refs.py::load_refs(con, kind)` deplie data + alias compat\n    **refs (kind=matiere)** : 110 rows. Colonnes specifiques (cn_min/max, k1_min/max, NPK, densite, cout, synonymes, source) dans le champ `data` JSON, deplies a la racine par `load_refs(con, 'matiere')`\n**ref_cn_incorporation** : id, cn_seuil_min, cn_seuil_max, niveau, titre, contenu, conditions (JSON), cas_etude (JSON), redox (JSON), timeline\n**html_templates** : id, slug, page_slug, type (page_css/page_js/head), contenu\n**bq_entries** : id, code_bq, titre, contenu_md, type, is_critique, tags (JSON), ordre · **domaines_techniques** : id, slug, nom, categorie, description · **domaine_bq** : domaine_id, bq_entry_id, role (primaire|reference), ordre\n**chains_causales** : id, titre, docs_traverses\n**chain_etapes** : id, chain_id, etape, doc_code, description", "type": "reference", "crit": true}, {"id": 73, "titre": "DB = source de vérité — données en DB, fichiers = vues", "contenu": "**Règle** : `sol_vivant.db` est la source de vérité unique. Les fichiers générés sont des **vues** de la DB.\n\n**Ne jamais modifier directement :**\n- `Publications/prompts/prompts_jenni_*.txt` → générés par `export_jenni_doc.py` depuis les tables `prompts`, `terms`, `jenni_doc_specs`\n- `Publications/web/*.html` → générés par `gen_mo_calc.py`, `gen_web.py`, `gen_triangle_textures.py` depuis les tables `ref_*`, `html_templates`\n- `Publications/cartographie/*.html` → généré par `gen_web.py`\n- `Publications/workflows/*.md` → générés par `gen_workflows.py`\n- `tools/**/README.md` → générés par `gen_readme.py`\n\n**Toujours corriger la source :**\n- Contenu des prompts → modifier dans table `prompts` ou dans le script `export_jenni_doc.py`\n- CSS/JS des calculateurs → modifier dans table `html_templates`\n- Données de référence → modifier dans les tables `ref_*`\n- Puis regénérer le fichier avec le script approprié\n\n**Workflow correct :**\n1. Modifier la DB (tables, templates, config)\n2. Regénérer les fichiers (`python3 tools/docs/gen_*.py --db sol_vivant.db`)\n3. `sync --inject` si des scripts ont changé\n4. `git add` + `git commit` + `git push`\n\n### (fusionné depuis #79 : Données = DB, code = logique uniquement)\n\n**Règle** : toute donnée paramétrable va dans la DB, jamais en dur dans le code Python ou JS.\n\n**Où stocker quoi :**\n| Type de donnée | Table DB |\n|---|---|\n| Paramètres API (modèle, tokens, prix) | `config` |\n| Données de référence (C/N, matières, textures) | `ref_*` |\n| CSS/JS des pages web | `html_templates` |\n| Contenu des prompts Jenni | `prompts` |\n| Termes canoniques | `terms` |\n| Mélanges prédéfinis | `ref_melanges_predefinies` |\n\n**Exceptions tolérées** : constantes physiques universelles, noms de colonnes SQL, noms de fichiers de sortie.\n\n**Lire depuis la DB, pas depuis les fichiers :**\nLes scripts et templates sont stockés dans la DB (`scripts.contenu`, `html_templates.contenu`). Toujours interroger la DB pour lire du contenu — ne pas utiliser Read sur les fichiers, qui dépasse souvent la limite de tokens et tronque le résultat.\n\n| Pour lire... | Faire | Ne pas faire |\n|---|---|---|\n| Un script | `SELECT contenu FROM scripts WHERE nom = 'xxx.py'` | `Read tools/xxx.py` (risque dépassement tokens) |\n| Un template React | `SELECT contenu FROM html_templates WHERE id = N` | `Read` sur le HTML généré |\n| Une config | `SELECT valeur FROM config WHERE cle = 'xxx'` | Lire CLAUDE.md |\n| Des données | `SELECT ... FROM refs / terms / ...` (helper `tools/lib/refs.py`) | Lire un export JSON/CSV |\n\n**Exception** : si on vient de modifier un fichier script et qu'on n'a pas encore fait `sync_scripts.py --inject`, le fichier disque est en avance sur la DB. Dans ce cas, lire le fichier est légitime.\n\n**Historique** : polygones GEPPA hardcodés dans gen_triangle_textures.py, nombre de cartes \"35\" en dur (sessions 31/03, 01/04). Lecture fichier gen_triangle_textures.py dépassant 10K tokens (session 04/04).", "type": "contrainte", "crit": true}, {"id": 3, "titre": "Règle absolue — Contenu Jenni", "contenu": "Aucun contenu produit par Jenni (.docx) ne rentre **directement** dans la DB. Tout document Jenni passe par analyse Claude avant intégration corpus. Le .docx vit hors DB.\n\n**Précision :** les documents Jenni sont des assemblages de citations académiques (Open Access principalement), pas de la rédaction libre. Le contenu scientifique (citations, données, mécanismes) est exploitable par Claude pour :\n- Rédiger la partie pédagogique (reformulation accessible du contenu scientifique)\n- Extraire les termes candidats → table terms\n- Extraire les références → Zotero (via le RIS accompagnant chaque document)\n- Identifier les corrections → table prompts\n\nDB gère : specs / prompts / suivi / extraction post-analyse.", "type": "regle", "crit": true}, {"id": 59, "titre": "Requêtes utiles — pilotage, thésaurus, diagnostic", "contenu": "Les requêtes de référence sont stockées dans la table `requetes_utiles` (27 requêtes).\n\n```sql\n-- Trouver une requête par nom\nSELECT sql_text FROM requetes_utiles WHERE nom = 'etat_production';\n\n-- Requêtes de démarrage de session\nSELECT nom, description FROM requetes_utiles WHERE usage_type = 'session';\n\n-- Requêtes de diagnostic\nSELECT nom, description FROM requetes_utiles WHERE usage_type = 'diagnostic';\n\n-- Requêtes d'un domaine\nSELECT nom, description, sql_text FROM requetes_utiles WHERE categorie = 'thesaurus';\n```\n\nCatégories : sante, documents, thesaurus, chaines, bq, scripts, maintenance, zotero, cascade, pilotage.\nTypes : session (10), pilotage (8), diagnostic (6), export (2), maintenance (1).\n\n### (fusionné depuis #60 : Requêtes thésaurus)\n\nLes requêtes thésaurus sont dans `requetes_utiles` :\n```sql\nSELECT sql_text FROM requetes_utiles WHERE categorie = 'thesaurus';\n```\n\nRequêtes disponibles : termes_document, termes_partages, doublons_termes, termes_sans_definition, densite_termes_par_doc, thesaurus_complet_compact.\n\n### (fusionné depuis #83 : Requêtes diagnostic rapide — copier-coller)\n\nRequêtes courantes à copier-coller au démarrage ou pendant le travail :\n\n```sql\n-- État du corpus\nSELECT strate, COUNT(*) FROM documents GROUP BY strate;\n\n-- Termes par doc\nSELECT doc_code, COUNT(*) FROM terms GROUP BY doc_code ORDER BY doc_code;\n\n-- Prompts incomplets (pas d'enrichissement)\nSELECT doc_code, titre_h2 FROM prompts WHERE enrichissement IS NULL OR enrichissement = '';\n\n-- Dernières opérations\nSELECT ts, operation, table_name, substr(detail,1,80) FROM audit_log ORDER BY ts DESC LIMIT 10;\n\n-- Config API\nSELECT cle, valeur FROM config WHERE categorie = 'api';\n\n-- Scripts en DB vs fichiers\nSELECT nom, version, substr(updated_at,1,16) FROM scripts ORDER BY updated_at DESC;\n\n-- BQ par module\n-- Répartition par domaine primaire\nSELECT d.slug, COUNT(*) FROM bq_entries be\n  JOIN domaine_bq db ON db.bq_entry_id=be.id AND db.role='primaire'\n  JOIN domaines_techniques d ON d.id=db.domaine_id\nWHERE be.is_active=1 GROUP BY d.slug;\n```", "type": "commande", "crit": true}, {"id": 65, "titre": "requetes_utiles — catalogue SQL", "contenu": "27 requêtes de référence organisées par catégorie et type d'usage.\n\n**Catégories :** sante, documents, thesaurus, chaines, bq, scripts, maintenance, zotero, cascade, pilotage\n\n**Types d'usage :**\n- `session` (10) — démarrage, contexte rapide\n- `pilotage` (8) — suivi production, décisions\n- `diagnostic` (6) — recherche de problèmes\n- `export` (2) — contexte LLM/Zotero\n- `maintenance` (1) — logging\n\n```sql\nSELECT nom, description FROM requetes_utiles WHERE usage_type = 'session';\nSELECT sql_text FROM requetes_utiles WHERE nom = 'etat_production';\n```", "type": "instruction", "crit": true}, {"id": 139, "titre": "Refactor term_relations - source unique BT/NT/RT (2026-04-20)", "contenu": "## Refactoring term_relations — source de vérité unique pour BT/NT/RT\n\n**Depuis le 2026-04-20** : les colonnes `terms.bt`, `terms.nt`, `terms.rt` ont été **supprimées**. La table `term_relations` est la SEULE source de vérité pour les relations entre termes.\n\n### Schéma actuel\n\n```sql\nCREATE TABLE term_relations (\n    id              INTEGER PRIMARY KEY AUTOINCREMENT,\n    from_term_id    INTEGER NOT NULL REFERENCES terms(id) ON DELETE CASCADE,\n    to_term_text    TEXT NOT NULL,          -- libellé brut (Jenni/docx)\n    to_term_id      INTEGER REFERENCES terms(id),  -- FK si résolu, NULL si orphelin\n    rel_type        TEXT NOT NULL CHECK(rel_type IN ('BT','NT','RT'))\n);\nCREATE INDEX idx_term_relations_to ON term_relations(to_term_id);\n```\n\n### Vues\n\n**`v_term_relations`** — joint source et cible, expose `display_text` (COALESCE to_fr, to_term_text) et `is_orphan` :\n```sql\nSELECT ... FROM v_term_relations WHERE from_id = ? AND rel_type = 'RT'\n```\n\n**`v_terms_full`** — expose `terms` avec `bt`/`nt`/`rt` agrégés automatiquement depuis `v_term_relations` (GROUP_CONCAT avec ` · ` comme séparateur). Remplace les anciennes colonnes `terms.bt`/`terms.rt`. Les scripts lecteurs doivent faire `SELECT ... FROM v_terms_full` au lieu de `FROM terms` quand ils ont besoin de bt/rt.\n\n### Module partagé\n\n**`tools/lib/term_rels.py`** — helpers pour les scripts écrivains :\n- `norm(s)` : normalisation matching (apostrophes, accents, casse, sing/plur)\n- `build_fr_index(con)` : construit le dict `{norm(fr|en|syn) → term_id}`\n- `write_relations(con, from_id, rel_type, raw_text, index=None)` : delete existantes + split + insert avec `to_term_id` résolu automatiquement\n- `get_relations(con, from_id, rel_type)` / `get_relations_text(...)` : lecture formatée\n\n### Scripts patchés (2026-04-20)\n\n**Lecteurs** (maintenant `SELECT ... FROM v_terms_full`) :\n- `tools/batch/analyse_corpus.py`\n- `tools/jenni/gen_prompt_completion.py`\n- `tools/jenni/gen_prompt_thesaurus.py`\n- `tools/docs/gen_web.py`\n\n**Écrivains** (retire `bt/rt` des INSERT/UPDATE sur terms, écrit via `term_rels.write_relations`) :\n- `tools/jenni/import_termes_jenni.py`\n- `tools/jenni/enrich_thesaurus.py`\n- `tools/jenni/import_enrichissement.py`\n- `tools/jenni/resolve_import_conflicts.py`\n- `tools/admin/dedupe_thesaurus.py` (met aussi à jour `to_term_id` quand il migre `to_term_text`)\n\n### Migration effectuée\n\n**Phase 0 — Synchronisation** : toutes les relations des anciennes colonnes `terms.bt`/`terms.rt` qui n'étaient pas dans `term_relations` y ont été ajoutées :\n- BT : 437 → 852 (+415)\n- RT : 3488 → 5927 (+2439)\n- NT : 14 (inchangé)\n\n**Phase 1 — Migration FK** : `to_term_id` résolu via `norm()` pour 4296 relations ; 2497 restent orphelines (texte cible hors thésaurus, à arbitrer via agents Task ou décisions éditoriales).\n\n**Phase 2 — Vues** : v_term_relations + v_terms_full créées.\n\n**Phase 3 — Scripts patchés** : 8 scripts mis à jour.\n\n**Phase 4 — Drop colonnes** : `terms.bt`, `terms.nt`, `terms.rt` supprimées (ALTER TABLE DROP COLUMN — SQLite ≥ 3.35).\n\n### Bénéfices\n\n- **Orphelins explicites** : `SELECT * FROM v_term_relations WHERE is_orphan = 1` liste directement les 2497 relations dont la cible n'est pas dans le thésaurus\n- **Plus de redondance** : une seule source de vérité, la vue reconstruit le texte à la volée\n- **FK suivie automatiquement** : si on renomme un terme, les relations vers lui n'ont plus à être réécrites (le `to_term_id` reste valide)\n- **Audit de cohérence simplifié** : une requête SQL simple (plus besoin de parser les champs texte)\n\n### Comportement orphelins\n\nQuand une relation pointe vers un texte qui ne matche aucun terme (`to_term_id IS NULL`) :\n- `v_term_relations.display_text` = `to_term_text` (le texte brut)\n- `is_orphan = 1`\n- `v_terms_full.rt` inclura ce texte brut dans la concaténation\n\nQuand l'orphelin deviendra résolu (un nouveau terme est créé ou un syn est ajouté qui matche), il suffit de ré-exécuter une passe de résolution :\n```python\nfrom lib.term_rels import build_fr_index\nidx = build_fr_index(con)\nfor r in con.execute(\"SELECT id, to_term_text FROM term_relations WHERE to_term_id IS NULL\"):\n    tid = idx.get(norm(r[1]))\n    if tid:\n        con.execute(\"UPDATE term_relations SET to_term_id=? WHERE id=?\", (tid, r[0]))\n```\n\nVoir commit de référence : `claude/refactor-term-relations`.", "type": "technique", "crit": true}, {"id": 68, "titre": "Stratégie de rédaction — cercle vertueux", "contenu": "**Ordre de rédaction : F → S → V → P → H**\n\nChaque strate rédigée enrichit la DB pour les suivantes :\n\n1. **F/S rédigés** (Jenni passe 1)\n2. **Claude analyse** (passe 2 : DOI, niveau de preuve, lacunes)\n3. **Enrichissement DB** :\n   - Thésaurus : nouveaux termes, définitions affinées\n   - Chaînes causales : nouvelles chaînes identifiées\n   - Cross-refs : connexions complétées\n   - Enrichissement des sections sans enrichissement (contexte pour les prompts suivants)\n4. **Prompts V/P/H** générés avec ce contexte enrichi\n5. **Meilleure qualité Jenni** → moins de corrections passe 2\n\n**Principe** : ne pas rédiger P ou H avant que S soit analysé et intégré. Le socle F/S conditionne la précision de tout le reste.\n\n**Strates et priorités :**\n- F (Fondements) : F1 P1, F2 P2 — cadre historique et économique\n- S (Sol) : S0 P5 → S4 P9 — mécanismes physico-chimiques et biologiques\n- V (Vivant) : V1 P10 → V3 P12 — faune, holobionte, fermentations\n- P (Pratiques) : P1 P13 → P5 P17 — diagnostic, ACS, biostimulants, transition\n- H (Humain) : H2 P18 → H3 P20 — microbiome intestinal, AMR", "type": "workflow", "crit": true}, {"id": 103, "titre": "Modèle conceptuel — production du corpus (référence absolue)", "contenu": "## Modèle conceptuel — production du corpus\n\n**Document de référence absolu.** Toute future session Claude doit lire cette entrée en priorité avant d'agir sur les fiches, validations, prompts ou production du corpus.\n\n### Objectif final\n\nProduire les **18 documents scientifiques** du corpus *Le Sol Vivant cet Holobionte*, rédigés en passe finale par Jenni.\n\n### Étape pivot — la « clôture » des prompts\n\nPour qu'un document soit prêt pour la passe finale Jenni, **tous ses prompts doivent être clôturés**. Un prompt est clôturé quand :\n1. `contexte_sci` est rempli (ce que la science dit déjà)\n2. `instructions` sont claires (ce que Jenni doit produire)\n3. **Aucune dette de contenu ne reste** : pas de chaîne causale non validée, pas de concept à étayer, pas de lacune connue\n\n### Les outils pour amener un prompt à la clôture\n\n| Outil | Action conceptuelle | Sortie Jenni intègre… | Table source |\n|---|---|---|---|\n| **Thésaurus** | Définir un terme canonique | `prompts.instructions` (vocabulaire utilisable par Jenni) | `terms` |\n| **Concept card** ⚠ | **Filtrer la rigueur** d'une hypothèse avant intégration corpus | (gate, bloque les affirmations bancales) | `concept_cards` |\n| **Fiche** | *Zoomer* sur un point précis (proactif) | `prompts.contexte_sci` / `.enrichissement` des docs cibles | `fiches` |\n| **Validation** | *Vérifier* une affirmation, *étayer* un concept, *combler* une lacune (réactif) | `prompts.contexte_sci` / `.enrichissement` des docs cibles | `validations` |\n| **Enrichissement thésaurus** | Cas particulier : enrichir massivement le thésaurus à partir d'une liste | thésaurus | `terms` (ajouts) |\n\n**Distinction Fiche vs Validation** :\n- **Fiche** = élargir le savoir, sujet intéressant en soi (proactif)\n- **Validation** = combler une dette identifiée par audit ou par manque détecté (réactif)\n\nLes deux contribuent au **même but** : nourrir les prompts pour les amener à clôture.\n\n### Concept cards — le filtre de rigueur (règle absolue)\n\n> **Une affirmation bancale ne passe pas dans le corpus.**\n\nLe système `concept_cards` est l'**outil de filtre** qui s'intercale entre la **captation** d'une hypothèse (note volante, vulgarisation, intuition de lecture) et son **intégration** au corpus (fiche, validation, prompt). Sans ce filtre, le corpus se laisse polluer par des affirmations séduisantes mais non vérifiées.\n\n**Workflow** :\n```\nNote vulga / hypothèse / intuition\n   ↓\nCréation/affinement d'une concept_card\n   (positionnement dans une dimension conceptuelle parmi les 12)\n   ↓\nConfrontation rigoureuse :\n  - Cohérence avec les autres dimensions\n  - Compatibilité avec les concept_card_tests (validation empirique terrain)\n  - Cohérence avec le corpus existant\n   ↓\n✗ Affirmation bancale → REJET (la carte reste en archive ou est supprimée)\n✓ Affirmation solide → la carte passe en active → l'hypothèse peut alimenter\n                       une fiche, une validation, un prompt, ou un terme\n```\n\n**Plusieurs concepts du corpus actuel ont été identifiés ainsi** : note de vulgarisation captée → pépite extraite → concept_card créée → confrontation → validation → intégration.\n\n**Rôle dans le modèle** :\n- **Amont** des fiches/validations : avant de créer une fiche pour zoomer sur un point, vérifier qu'il y a au moins une concept_card cohérente qui le supporte\n- **Filtre des notes volantes** : avant d'intégrer une pépite de note (BQ #102), tester via concept_card si l'affirmation tient la route\n- **Mémoire de rejet** : les cartes en `archive` représentent l'historique des hypothèses non passées — éviter de les ressusciter sans raison nouvelle\n\n**Tables impliquées** :\n- `concept_dimensions` (12) : axes de pensée transversaux (Cadre Eau/Redox/Économique/Évolutif, Types de sols, Histoire, Symptômes, Pratique, Cycle, Continuum)\n- `concept_cards` : les cartes proprement dites (statut `active` | `archive`)\n- `concept_card_tests` : liaisons vers `terrain_tests` pour validation empirique\n\n**Voir BQ dédiée** : *« Concept cards — système de filtre de rigueur »* (à venir).\n\n### Cycle de vie d''une fiche ou d''une validation\n\n```\na_faire   → créée en DB avec objet + docs cibles\nen_cours  → Claude prépare/affine le prompt Jenni\nenvoye    → fichier .txt généré et copié dans Jenni\nrecu      → .docx Jenni récupéré (stocké docx/ ou docx/)\nintegre   → contenu intégré dans prompts.contexte_sci/.enrichissement des docs cibles\n            + termes extraits vers `terms`\n            + contenu brut/intégré stocké dans fiche_contenus / validation_contenus\narchive   → terminé, sort de la vue active\n```\n\n### Cycle de vie d''un prompt\n\n```\na_completer → des fiches/validations en cours pointent vers lui (objet ouvert)\ncloture     → toutes les dépendances integre, prêt pour passe finale Jenni\n```\n\nCalculé automatiquement par vue SQL : si une fiche/validation **ouverte** (`statut != 'integre' && statut != 'archive'`) référence ce prompt dans ses `docs_cibles` ou `prompts_cibles`, alors le prompt est `a_completer`.\n\n### Cycle de vie d''un document de strate\n\n```\na_rediger        → certains prompts en a_completer\npret_a_rediger   → tous les prompts en cloture\nen_redaction     → envoyé à Jenni passe finale\nredige           → .docx final reçu et intégré\n```\n\n### Tables et leur rôle\n\n| Table | Rôle | Statuts |\n|---|---|---|\n| `documents` (18) | Docs cibles du corpus | a_rediger / pret_a_rediger / en_redaction / redige |\n| `prompts` (~191) | Prompts par section | a_completer / cloture |\n| `terms` | Thésaurus canonique | (présent ou manquant, pas de cycle) |\n| `fiches` | **Zooms** sur un point précis (sous-types `zoom`, `technique`) | a_faire / en_cours / envoye / recu / integre / archive |\n| `validations` | **Vérifications + comblements** (modes `validation`, `renforcement`, `comblement`) | idem fiches |\n| `chains_causales` (C1-C9) | Chaînes scientifiques du corpus | objet potentiellement référencé par une validation |\n| `audit_reports` | Audits qui révèlent des lacunes | source possible de validations |\n\n### Workflow de production complet\n\n```\n1. AUDIT du corpus (analyse_corpus.py, audit_opus.py, agents)\n   ↓\n2. Identification des manques :\n   - termes manquants → enrichissement thésaurus (gen_prompt_enrichissement.py)\n   - sujets transversaux non couverts → nouvelles fiches\n   - chaînes/concepts/lacunes → nouvelles validations\n   ↓\n3. Production des prompts Jenni\n   - export_fiche.py            → prompts_fiche_*.txt\n   - export_validation.py       → prompts_validation_*.txt\n   - gen_prompt_enrichissement  → enrich_*.txt (lots de 10, charte Jenni)\n   ↓\n4. Cycle Jenni (envoye → recu)\n   ↓\n5. Intégration Claude :\n   - termes → terms\n   - contenu fiches → fiche_contenus + prompts.contexte_sci/.enr\n   - contenu validations → validation_contenus + prompts.contexte_sci/.enr\n   ↓\n6. Clôture des prompts (auto-déduit par vue SQL)\n   ↓\n7. Doc en pret_a_rediger\n   ↓\n8. Passe finale Jenni → doc rédigé\n```\n\n### Règles de séparation (pour éviter la dérive)\n\n1. **Une fiche n'est pas une validation**. Tables séparées, sémantiques distinctes.\n2. **Un prompt de strate ne contient jamais de méta-commentaire Claude**. Tout méta va dans `notes` ou `audit_reports`, jamais dans `contexte_sci/.instructions/.enrichissement`.\n3. **Les DOIs ne sont pas stockés** comme métadonnée d'une fiche/validation. Zotero est la source bibliographique unique. Cf. BQ #102.\n4. **Tout retour Jenni intégré** va dans le bon champ : `fiche_contenus` pour les fiches, `validation_contenus` pour les validations, et `prompts.contexte_sci/.enrichissement` pour les docs cibles. **Jamais** dans le champ `instructions` qui sert à la prochaine demande Jenni.\n5. **Les statuts sont la vérité** : on ne marque pas `exporte` ou `produit` sans cycle de vie cohérent. Le statut reflète l'état réel à tout moment.\n6. **Charte Jenni générique** (BQ #40, #41, #101) s'applique à TOUT prompt destiné à Jenni : pas de codes docs, pas de méta-vocabulaire, citations format `[N]`, blocs de 10 max pour l'enrichissement.\n7. **Charte fiches techniques** s'applique en plus aux fiches `type='technique'` : structure standardisée 8 sous-blocs (Contexte sci / Protocole / Ingrédients / Équipement / Procédure / Indicateurs qualité / Précautions & Stockage / Applications & Dosages).\n\n### État cible (idéal)\n\n- 100% des `terms` définis\n- 100% des `fiches` valides en `integre` ou `archive`\n- 100% des `validations` valides en `integre` ou `archive`\n- 100% des `prompts` en `cloture`\n- 100% des `documents` en `pret_a_rediger` puis `redige`\n\n### ⚠ Etat actuel (avril 2026)\n\n`validation_sections` et `validation_contenus` existent en DB avec des donnees historiques (81 et 16 rows respectivement) mais **aucun script actif ne les alimente**. La logique des validations est en pause (cf. BQ #127). Les BQ qui decrivent leur workflow sont conservees comme reference, mais les scripts `export_validation.py` / `import_validation.py` ne sont pas operationnels aujourd'hui.\n", "type": "reference", "crit": true}, {"id": 72, "titre": "Structure dépôt et conventions de nommage", "contenu": "**Arborescence du dépôt :**\n```\nTools/                          ← racine git\n├── sol_vivant.db               ← source de vérité unique\n├── CLAUDE.md                   ← généré par session_start.py\n├── tools/                      ← scripts Python\n├── Publications/\n│   ├── img/                    ← images (OG, favicons, logos)\n│   ├── web/                    ← pages HTML publiques (noms fixes)\n│   ├── cartographie/           ← documentation statique\n│   ├── prompts/                ← exports Jenni horodatés\n│   ├── workflows/              ← workflows horodatés\n│   └── journal/                ← journaux de session\n├── jmj/                        ← documents de travail auteur\n└── Ma bibliothèque.ris         ← export Zotero\n```\n\n**Conventions de nommage :**\n- Pages web : noms fixes (index.html, mo_calculateur.html, triangle_textures.html) — trackées par git, versionnées\n- Images OG : dans Publications/img/ (miroir du dépôt GitHub Pages)\n- URL OG : `https://sol-vivant.github.io/Publications/img/<nom>.png`\n- Favicon : `href=\"../img/<nom>.png\"` (chemin relatif depuis web/)\n- Scripts : `--db` optionnel (défaut `sol_vivant.db` à la racine)\n- Pas d'horodatage sur les HTML web (une seule version, git fait le versioning)", "type": "reference", "crit": true}, {"id": 76, "titre": "Workflow : design avant code, commits fréquents", "contenu": "**Anti-pattern observé** : coder immédiatement → corrections multiples → doublons → bugs d'encoding.\n\n**Séquence recommandée :**\n1. **Comprendre** : lire le code existant, les données en DB, les patterns\n2. **Concevoir** : décider où mettre les données (nouvelle table ? colonne ? config ?), écrire le composant sur papier\n3. **Implémenter** : DB d'abord, puis script, puis template\n4. **Tester** : regénérer, vérifier le HTML, tester dans le navigateur\n5. **Commit** : un commit par étape logique, pas un gros commit final\n\n**Commits de checkpoint** : commiter tous les 2-3 items pour éviter les pertes.\nUn fichier cassé par un Edit partiel se restaure avec `git checkout -- fichier` — mais seulement si le commit précédent est propre.\n\n**Historique** : fichier cassé restauré par git checkout (session 01/04), 3 commits correctifs successifs sur l'encart MO (session 03/04).", "type": "conseil", "crit": false}, {"id": 96, "titre": "Explorer DB — interface web locale", "contenu": "## Explorer la DB localement\n\n```bash\npython3 tools/admin/explorer.py [--db sol_vivant.db] [--port 8765]\n```\n\nOuvre une interface web sur http://localhost:8765 pour naviguer :\n- Toutes les tables et vues (groupées par domaine)\n- Recherche dans les colonnes\n- Pagination\n- Panneau de détail pour les textes longs\n- BQ modules avec contenu Markdown\n- Sessions de maintenance\n\n**Ne modifie rien** — consultation seule.", "type": "workflow", "crit": false}, {"id": 129, "titre": "Intégration source — rapport JMJ → biblio interne", "contenu": "## Workflow intégration de source — opération consciente\n\n### Principe\n\nJMJ fournit un **rapport de source** (métadonnées d'un article scientifique, souvent copié-collé depuis un PDF reader, Semantic Scholar, PubMed, un groupe de veille…). Claude intègre cette source **une à la fois**, avec le même soin que l'intégration d'une fiche. Cette opération enrichit la biblio interne (`jenni_sources`) et **peut renforcer le thésaurus** si des termes canoniques manquent.\n\n**Règle d'or** : jamais de batch-insert. Chaque source est une pièce du corpus, elle mérite une lecture attentive.\n\n### Entrée — ce que JMJ donne\n\nUn bloc brut comme :\n\n```\nTitre de l'article\nType de document : Article de revue\nAuteur : A. Untel / B. Untel ...\nRésumé : [abstract complet]\nDate : YYYY/MM/DD\nDOI : 10.XXXX/...\nURL : https://...\nPublication : Nom du journal\nVolume, Pages, Numéro, ISSN\n```\n\nFormat variable (Zotero export, Semantic Scholar copy, PubMed metadata, groupe email…). Claude **normalise mentalement** avant d'écrire.\n\n### Séquence (Claude pilote, JMJ valide)\n\n**1. Lecture consciente**\n- Lire le titre + résumé intégralement\n- Identifier le **thème principal** (ex : bone char contamination arsenic / riziculture)\n- Identifier les **concepts clés** candidats à enrichir le thésaurus (ex : `bone char`, `arsenic speciation`, `arsenic methylation`, `arsC/arsM genes`)\n- Identifier les **documents / fiches / cards** du corpus potentiellement concernés\n\n**2. Dedup**\n```python\ncur.execute(\"SELECT id, doi, titre_complet FROM jenni_sources WHERE doi = ? OR titre_complet LIKE ?\",\n            (doi, f'%{titre_court}%'))\n```\n- Si déjà présent → proposer un UPDATE (enrichissement) plutôt qu'un nouvel INSERT\n- Si nouveau → continuer\n\n**3. Insertion `jenni_sources`** (champs critiques)\n- `doi` (normalisé sans préfixe)\n- `auteurs` (format : `Nom1 P, Nom2 Q, Nom3 R, et al.`)\n- `annee` (INTEGER)\n- `titre_complet` (exact, pas tronqué)\n- `titre_court` (extrait-clé en 4-8 mots, lisible)\n- `journal`\n- `resume_court` (150-300 mots, reformulation synthétique — pas l'abstract brut)\n- `pertinence` (ex : `S2 microbiome + P2 conservation` ou `H3 AMR`)\n- `tags` (JSON list : mots-clés thématiques du corpus)\n- `url` (lien DOI ou URL article)\n\n**4. Liens `source_usages`** (si pertinent)\nSi la source cite/justifie directement un contenu du corpus, ajouter un lien :\n```python\nINSERT INTO source_usages (source_id, entity_type, entity_id, contexte, citation_brute)\nVALUES (?, 'fiche', ?, 'Section Contexte scientifique', '(Hao et al., 2026)')\n```\n`entity_type` ∈ `{doc, fiche, term, card, prompt}`.\n\n**5. Renforcement thésaurus** (si termes nouveaux)\nSi l'article introduit des termes canoniques absents du thésaurus :\n- Vérifier `SELECT id FROM terms WHERE fr=? OR en=?`\n- Si absent : **proposer** à JMJ un ajout (titre, def depuis résumé, syn_fr/en, bt, rt)\n- JMJ valide → insert dans `terms` avec `doc_code='S'` ou autre\n- **Ne jamais** inventer des définitions sans base article\n\n**6. Audit log**\n```python\nINSERT INTO audit_log (operation, table_name, record_ref, detail)\nVALUES ('INSERT', 'jenni_sources', f'source #{src_id}',\n        f'{auteurs_court} {annee} {journal} — {theme_en_une_ligne} ({doc_codes_cibles})')\n```\n\n### Exemple d'intégration (modèle)\n\n**Entrée** (rapport JMJ) :\n```\nMicro-nanoscale bone char modulates rhizosphere As-cycling genes…\nAuteur : Yi Hao, Weitao Wu, … Chuanxin Ma\nDOI : 10.1007/s44246-026-00258-4\nPublication : Carbon Research\n```\n\n**Traitement Claude** :\n- Thème : bone char amendement / arsenic speciation / rice paddy\n- Corpus concerné : `S1 architecture sol` (amendement), `S2 microbiome` (arsC/arsM genes), `P1 diagnostic` (contamination), `P2 conservation`\n- Nouveaux termes potentiels (à valider) : `bone char`, `arsenic speciation`, `arsenic methylation gene (arsM)`\n- Source déjà en DB ? → SELECT par DOI → non\n- `resume_court` synthétise : « MNBC 25 g/kg sur sol contaminé 75 mg/kg As : urease +94-166%, catalase +35-519%, carbone organique +9-30%, arsC/arsR −6-52%, arsM +11-20%. Amélioration de la santé du sol sans changer l'accumulation As dans le riz. »\n- `pertinence` : `S1/S2/P1 amendement bone char contamination arsenic`\n- `tags` : `[\"bone char\", \"arsenic\", \"paddy soil\", \"arsC arsM\", \"soil remediation\"]`\n\n**Sortie** (Claude rend compte à JMJ) :\n- Source #XXXX insérée\n- 0 ou N termes candidats identifiés (liste)\n- 0 ou N liens source_usages créés\n\n### Ce qui n'est **pas** ce workflow\n\n- Import batch Zotero → archivé (modules `zotero` et `batch` désactivés)\n- Enrichissement auto depuis PubMed/E-utilities → utile comme outil annexe (cf. `wf_veille`), mais la décision d'intégration reste manuelle\n- Ajouter des refs dans `fiche_contenus.refs` → ça c'est le job de Jenni à la rédaction, pas de Claude à la veille\n\n### Scripts (à construire au besoin)\n\nIl n'existe pas encore de script dédié. Aujourd'hui c'est interactif dans la session :\n\n```sql\n-- Template d'insertion (à adapter à chaque source)\nINSERT INTO jenni_sources (doi, auteurs, annee, titre_complet, titre_court,\n                           journal, resume_court, pertinence, tags, url, created_at)\nVALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, datetime('now'));\n```\n\nUn futur `tools/veille/integrate_source.py` pourrait automatiser le dedup + template, mais la **lecture consciente** reste en session.\n\n### BQ liées\n\n- `wf_veille` (à venir) : scan PubMed hebdo qui produit des candidats\n- `wf_fiche` : intégration de fiches (même logique consciente à plus grande échelle)\n- #106 concept_cards : filtre de rigueur — une source introduit souvent une hypothèse qui doit passer par une card avant d'entrer dans le corpus\n\n\n### Fiabilité des sources : règle « livre/rapport vs Jenni »\n\n**Source primaire validée (livre, rapport institutionnel, publication académique à DOI)** — les valeurs chiffrées sont **fiables par construction** :\n- Smil 2017, Fuller 1938, Jancovici 2015, Nikiforuk 2012 (livres)\n- The Shift Project PREF 2024, Carbone 4 (rapports institutionnels)\n- Arvalis Triple Performance, IPCC, ministère (guides/rapports officiels)\n- JMJ synthèses (docs travail propres, JMJ pilote)\n\n→ **Entrée en `ref_*` directe** sans double-vérification cognitive. Ancrage sur la page/ref de la source. La révision concerne la pertinence (est-ce dans notre scope ?) pas la véracité numérique.\n\n**Sortie Jenni** — les valeurs chiffrées sont **à vérifier systématiquement** :\n- Jenni peut halluciner des nombres plausibles mais faux\n- Jenni peut agglomérer deux valeurs de sources différentes\n- Jenni ne sait pas nuancer les unités (kWh utile vs thermique)\n\n→ **Lecture ligne-à-ligne** avant intégration, rejet de toute valeur non ancrée à une source primaire consultable, préférence à réécrire ou demander régénération plutôt qu'accepter avec doute.\n\n**Workflow pour sources livres PDF (`jmj/pdf/`)** :\n1. Read PDF via outil Read (fonction PDF native, `pages` pour PDF > 10 pages)\n2. Extraction ciblée des tableaux / valeurs chiffrées (pas copier tout le texte)\n3. INSERT dans `ref_*` avec `source_id` → entrée jenni_sources\n4. INSERT jenni_sources (type='livre' / 'rapport' / 'organisation') si pas déjà présent\n5. Pas de régression cognitive : la valeur en DB devient autoritaire pour la session\n\n### Flag « haute valeur » pour récupération PDF\n\nJMJ maintient un accès au texte intégral via son outil de collecte externe\n(Zotero + bibliothèques institutionnelles). L'abstract Zotero est suffisant\npour une intégration standard, mais certains articles justifient d'aller\nplus loin.\n\n**Flag explicitement « haute valeur — demander PDF »** quand :\n- Apport chiffré unique ou méthodologie inédite dans le corpus\n- Source primaire sur un concept pivot (souvent jamais cité ailleurs)\n- Données quantitatives qui dimensionneraient un calculateur (Kirkby, MO,\n  esclaves, triangle textures, transition robuste)\n- Revue de synthèse couvrant une zone aveugle du corpus\n- Article fondateur qu'on cite partout sans avoir lu\n\n**Ne pas flag** (intégration abstract suffit) quand :\n- Sujet déjà structurellement couvert (fiches + cards existantes)\n- Apport incrémental chiffré mais non-structurant\n- Donnée pays-spécifique qui ne généralise pas\n\nSi le PDF n'est pas disponible mais que la source mérite d'être gardée :\n- INSERT jenni_sources normal\n- `notes` : `'PDF indisponible 2026-AA-JJ — intégration abstract seul'`\n- Pas de concept_card détaillée, juste liens usages basiques", "type": "workflow", "crit": true}, {"id": 126, "titre": "Trios parallèles *_sections / *_contenus (redondance structurelle connue)", "contenu": "## Trios parallèles `*_sections` / `*_contenus` (DB pattern connu)\n\n**Constat de maintenance 2026-04-14** : 6 tables dupliquent le schéma\nentre 3 types de production (fiches / docs de strate / validations).\n\n### Trio 1 — Sections éditoriales\n\n```\nfiche_sections       (143 rows, 4 scripts) — fiches\nprompts              (191 rows, 24 scripts) — docs de strate (schéma enrichi)\nvalidation_sections  (81 rows, 1 script)   — validations\n```\n\nColonnes communes : `type`, `ordre`, `titre`, `contexte_sci`, `instructions`,\n`enrichissement`, `tableau`. `prompts` ajoute `titre_h1/h2/h3`, `doc_code`,\n`chapitre`, `section`, `style`, `statut`.\n\n### Trio 2 — Retours Jenni (contenus)\n\n```\nfiche_contenus        (28 rows, 3 scripts)  — retours Jenni fiches\nprompt_contenus       (12 rows, 2 scripts)  — retours docs\nvalidation_contenus   (16 rows, 0 script)   — ORPHELINE\n```\n\nQuasi identiques : `version`, `contenu_brut`, `contenu_integre`, `refs`,\n`notes_claude`, `date_import`. `prompt_contenus` avait un champ `contenu`\natypique — désormais `contenu_brut` rempli en parallèle (migration 2026-04-14).\n\n### Vues unifiées (historique, retirées 2026-04-20)\n\nDeux vues SQL avaient été créées le 2026-04-14 pour unifier l'accès aux 3 trios :\n`v_content_sections` (UNION ALL fiche_sections + prompts + validation_sections) et\n`v_content_retours` (UNION ALL fiche_contenus + prompt_contenus + validation_contenus).\n\nElles ont été **droppées le 2026-04-20** (cf. audit_log) :\n- aucun consommateur dans `tools/` ou `tests/`\n- `v_content_retours` exposait `contenu_integre` legacy (le contenu est maintenant dans `fiche_sections.contenu` par section, cf. BQ #130 §4.2)\n- `v_content_sections` ne connaissait pas les nouveaux champs (`contenu`, `analyse_claude`)\n\nSi un besoin de lecture transversale réapparaît, les vues sont à recréer avec les colonnes post-refonte (incluant `contenu` et `analyse_claude` pour `fiche_sections`).\n\n\n### Décision physique : pas de migration\n\n**Factorisation physique non appliquée** : risque de casser 24 scripts qui\nassument la structure actuelle, pour un gain modeste (~500 Ko, 6→2 tables).\nLes vues couvrent le besoin de lecture transversale sans toucher au stockage.\n\n**Actions complémentaires possibles** :\n- Archiver `validation_contenus` (0 script, table morte) — cf. BQ #127\n- Documenter le pattern pour les futures sessions (cette entrée)\n\n### À envisager après maturation complète\n\nUne fois le corpus stabilisé (fiches matures, docs de strate peuplés,\nplus de cycle d'écriture intensif), une migration vers l'architecture\nphysique unifiée serait plus sûre.\n\n### Autres redondances mineures (non critiques)\n\n- `doc_code` / `docs_codes` / `docs_cibles` : 3 formats pour désigner\n  des documents (string / string multi-slash / JSON array)\n- `categorie` / `tags` : conventions variables selon domaine\n- `notes_claude` vs `notes` : 2 conventions d'annotation\n\n\n### Principe architectural — préparation à l'import, rendu trivial (avril 2026)\n\nLes 3 trios (fiche / doc / validation) partagent une règle :\n\n> **Le nettoyage du texte se fait une fois à l'intégration**, dans `<entity>_sections.contenu` (TEXT, nouveau champ). Le rendu HTML devient du `fetch → afficher`.\n\nCorollaires :\n\n- Un seul parser docx partagé (`tools/lib/parse_jenni_docx.py`) alimente les 3 trios — gère OMML, LaTeX, refs FR→EN, tags Jenni résiduels, découpage par section selon le plan DB.\n- Un seul composant de rendu React (`SvRichContent`) consomme les 3 trios — lit le plan DB + affiche sections et refs. Plus de parser côté JS.\n- Si le format Jenni change → un seul point de maintenance (le parser d'import).\n- Les champs `<entity>_contenus.contenu_integre` (blob markdown) deviennent **legacy** : conservés pour l'historique des intégrations antérieures, plus écrits par les nouveaux imports.\n\nCette règle remplace la doctrine précédente qui acceptait du markdown brut en DB et laissait `SvRichText` faire un parsing tolérant côté client.\n\n### ⚠ Etat actuel (avril 2026)\n\n`validation_sections` et `validation_contenus` existent en DB avec des donnees historiques (81 et 16 rows respectivement) mais **aucun script actif ne les alimente**. La logique des validations est en pause (cf. BQ #127). Les BQ qui decrivent leur workflow sont conservees comme reference, mais les scripts `export_validation.py` / `import_validation.py` ne sont pas operationnels aujourd'hui.\n", "type": "reference", "crit": false}, {"id": 127, "titre": "`validation_contenus` en sommeil (0 script actif)", "contenu": "## `validation_contenus` — table en sommeil\n\n**Constat maintenance 2026-04-14** : table présente (16 rows, schéma\ncohérent avec `fiche_contenus`) mais **aucun script ne la lit**.\n\n### État\n- Rows : 16\n- Données depuis : 2026-04-10 (15 jours avant constat)\n- FK : `validation_id` → `validations(id)` ON DELETE CASCADE\n- Scripts qui la référencent : 0\n\n### Usage prévu (historique)\n\nStockage des retours Jenni pour les documents de validation (table\n`validations`, workflow parallèle à fiches et docs de strate). L'extension\ndu workflow vers les validations n'a pas été développée — la table\nattend son usage.\n\n### Décision de maintenance\n\n**Conserver** : les 16 rows contiennent des données (non-vides),\nprobablement des brouillons de validations. Ne pas supprimer tant que le\nworkflow validation n'est pas clarifié.\n\n**À décider** ultérieurement :\n- Développer le workflow validation (lecture + intégration)\n- OU archiver définitivement si validation_sections non plus exploitée\n", "type": "reference", "crit": false}, {"id": 134, "titre": "Structure jmj/ et config.paths — rapports et audits centralises", "contenu": "## Structure jmj/ et config.paths\n\n### Vue d'ensemble\n\nTous les **rapports** et **audits** sont centralises dans `jmj/`. Les paths\nsont en base (`config.paths.*`) et les scripts les lisent via\n`lib.config.get_path()`. Pas de path hardcode.\n\n```\njmj/\n├── rapports/            ← rapports centralises\n│   ├── session/         ← cloture session Claude Code (date YYYY-MM-DD.md)\n│   └── audit/           ← rapports audit (fiches, thesaurus, BQ, sources)\n├── analyses/            ← sortie gen_reports.py depuis audit_reports\n│   └── reports/\n├── archives/            ← docx sources archives\n├── docx/                ← docx sources JMJ (drafts, propositions Jenni)\n├── journaux/            ← journaux de seances\n├── pdf/                 ← biblio PDF externe (Shift, Triple Perf, etc.)\n├── revues/              ← revues JMJ\n├── session/             ← contexte session\n├── transcriptions/      ← transcriptions audio\n└── notes*.txt           ← notes volantes a la racine\n```\n\n### Table config — categorie `paths`\n\nPaths disponibles via `lib.config.get_path(conn, 'CLE')` :\n\n| Cle | Valeur | Usage |\n|---|---|---|\n| `rapports_session` | `jmj/rapports/session` | Sortie rapport fin de session |\n| `rapports_audit` | `jmj/rapports/audit` | Sorties audits (scripts audit_*.py) |\n| `analyses_reports` | `jmj/analyses/reports` | Sortie gen_reports.py |\n| `recherches_fiches` | `recherches/fiches` | Docx Jenni fiches (cycle) |\n| `recherches_thesaurus` | `recherches/thesaurus` | Exports thesaurus + audits semantiques |\n| `recherches_sources` | `recherches/sources` | Exports sources |\n| `recherches_veille` | `recherches/veille` | Veille hebdo (PubMed) |\n| `recherches_archives` | `recherches/archives` | Archives fiches/thesaurus |\n| `jmj_docx` | `jmj/docx` | Docx sources JMJ |\n| `jmj_archives` | `jmj/archives` | Archives docx sources |\n| `jmj_pdf` | `jmj/pdf` | PDF biblio externe JMJ |\n| `jmj_notes` | `jmj` | Racine pour notes*.txt |\n| `publications_web` | `Publications/web` | Pages HTML publiees |\n| `publications_workflows` | `Publications/workflows` | Workflows horodates |\n| `docx_en_cours` | `docx` | Docx en cours (envoyes Jenni) |\n| `docx_archives` | `docx/archives` | Docx retournes + integres |\n\n### Regles\n\n1. **Pas de path hardcode** dans les scripts. Utiliser `get_path()`.\n2. **Defaults** : chaque `get_path()` doit avoir un fallback au cas ou la\n   config serait absente (ex: `get_path(conn, 'rapports_audit', 'jmj/rapports/audit')`).\n3. **Creation automatique** : `get_path(..., ensure_exists=True)` cree le\n   dossier si besoin. A utiliser pour les sorties qui peuvent tomber sur\n   un path non encore cree.\n4. **Distinguer rapports vs recherches** :\n   - `rapports/` = artefacts peripheriques, memoire de sessions, non\n     consommes par les scripts (lecture humaine JMJ)\n   - `recherches/` = cycle Jenni actif, consommes/produits par les scripts\n     d'import/export fiches, thesaurus, etc.\n5. **Distinguer jmj/ vs racine** : `jmj/` = JMJ personnel + memoire ;\n   racine (`docx/`, `recherches/`, `Publications/`) = cycle de production\n   actif partage avec Jenni / publications.\n\n### Lien avec les autres BQ\n\n- **#125 structure_recherches** : structure `recherches/` detaillee (cycle\n  Jenni). Ce BQ-ci complete avec la structure `jmj/` centrale.\n- **#128 wf_session** : la cloture de session ecrit dans\n  `config paths.rapports_session`.\n- **#102 traitement_notes** : les notes volantes restent a la racine de\n  `jmj/` (path `jmj_notes`).\n\n### Migration 2026-04-18\n\n- `rapports_sessions/` (racine) → `jmj/rapports/session/`\n- `jmj/SESSION_*.md` → `jmj/rapports/session/`\n- `jmj/audit_fiches_*.md`, `jmj/revue_bq_*.md`, `jmj/plan_integration_*.md`\n  → `jmj/rapports/audit/`\n- `recherches/audits/*` (9 fichiers) → `jmj/rapports/audit/`\n\nLe dossier `recherches/audits/` a ete supprime ; les nouveaux audits\nvont dans `jmj/rapports/audit/`.", "type": "doctrine", "crit": true}, {"id": 143, "titre": "BQ — architecture domaines_techniques (refonte 2026-04-20)", "contenu": "## Architecture BQ — domaines techniques (refonte 2026-04-20)\n\nLa BQ est classée par **domaines techniques** (table `domaines_techniques`)\nvia une table de jointure N-N `domaine_bq` (rôle `primaire` ou `reference`).\nUne entrée BQ a **1 domaine primaire** (le pipeline où elle fait loi) et\n0-5 domaines de référence (où elle sert de doctrine transverse).\n\n### Schéma\n\n```sql\n-- Domaines\nCREATE TABLE domaines_techniques (\n  id INTEGER PRIMARY KEY AUTOINCREMENT,\n  slug TEXT UNIQUE NOT NULL,\n  nom TEXT NOT NULL,\n  description TEXT,\n  categorie TEXT CHECK(categorie IN ('pipeline','corpus','web','technique','specifique')),\n  ordre INTEGER DEFAULT 0,\n  is_active INTEGER DEFAULT 1\n);\n\n-- Jointure N-N\nCREATE TABLE domaine_bq (\n  domaine_id INTEGER REFERENCES domaines_techniques(id) ON DELETE CASCADE,\n  bq_entry_id INTEGER REFERENCES bq_entries(id) ON DELETE CASCADE,\n  role TEXT CHECK(role IN ('primaire','reference')),\n  notes TEXT,\n  ordre INTEGER DEFAULT 0,\n  PRIMARY KEY (domaine_id, bq_entry_id)\n);\n```\n\n### 4 catégories\n\n- **pipeline** : cycle prompt Jenni → .docx → intégration (thesaurus, fiches, docs, validations)\n- **corpus** : contenu en base, édition directe Claude, p
