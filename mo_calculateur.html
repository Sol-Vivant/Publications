Paillette (lin,miscanthus,chanvre)", "densite": 0.1, "taux_ms": 60.0, "cn_min": 30.0, "cn_max": 60.0, "k1_pct": 12.0, "cout_min": 20.0, "cout_max": 80.0, "effet": "++", "epaisseur": null, "notes": null, "volume_l_par_kg": 10.0}, {"matiere": "Tonte gazon", "densite": 0.4, "taux_ms": 20.0, "cn_min": 10.0, "cn_max": 15.0, "k1_pct": 25.0, "cout_min": 0.0, "cout_max": 0.0, "effet": "+", "epaisseur": null, "notes": null, "volume_l_par_kg": null}, {"matiere": "Urine", "densite": 1.0, "taux_ms": 5.0, "cn_min": 0.8, "cn_max": 0.8, "k1_pct": null, "cout_min": 0.0, "cout_max": 0.0, "effet": "+", "epaisseur": null, "notes": "C/N 0,8", "volume_l_par_kg": null}], "regles": [{"cn_min": null, "cn_max": 10.0, "label": "< 10", "comportement": "MINÉRALISATION TRÈS RAPIDE", "interpretation": "Risque de lessivage N. Amendement puissant.", "diagnostic": "Matière très azotée, décomposition quasi immédiate. L'azote est libéré massivement — risque de lessivage vers les nappes si le sol est nu. Ce type d'apport agit comme un engrais organique rapide, pas comme un amendement de fond.", "recommandation": "Utiliser uniquement en période de croissance active (printemps). Toujours associer à un couvert végétal ou une culture en place pour capter l'azote libéré. Ne jamais appliquer sur sol nu en automne/hiver. Pour un effet plus durable, mélanger avec une matière carbonée (paille, BRF) pour remonter le C/N vers 20-25.", "icone": "🔴"}, {"cn_min": 10.0, "cn_max": 15.0, "label": "10–15", "comportement": "MINÉRALISATION ACTIVE", "interpretation": "N libéré rapidement. Cible pour apports frais.", "diagnostic": "Matière riche en azote, minéralisation active dans les 2-4 semaines. L'azote est rapidement disponible pour les plantes. Bon pour un coup de boost en début de culture. Le fumier frais, les tontes et les légumineuses sont typiques de cette plage.", "recommandation": "Idéal en apport de surface au printemps, avant implantation ou en top-dressing. Pour construire du stock de MO à long terme, compléter avec des matières plus carbonées. Le mélange avec du BRF ou de la paille (ratio 1:2) donne un excellent compromis fertilisation/humification.", "icone": "🟠"}, {"cn_min": 15.0, "cn_max": 20.0, "label": "15–20", "comportement": "ÉQUILIBRE LÉGÈREMENT +", "interpretation": "Légère minéralisation. Fumiers bien maturés.", "diagnostic": "Légère minéralisation nette — le sol reçoit un peu plus d'azote qu'il n'en consomme. C'est la zone des fumiers bien maturés et des composts jeunes. Bon équilibre entre nutrition immédiate et construction de sol.", "recommandation": "Zone confortable pour la plupart des usages. Convient en toute saison sur culture en place. Pour le maraîchage, c'est la cible idéale pour les apports réguliers (compost mi-mûr, fumier composté 3-6 mois).", "icone": "🟡"}, {"cn_min": 20.0, "cn_max": 25.0, "label": "20–25", "comportement": "ZONE NEUTRE", "interpretation": "Ni gain ni perte nette d'N. Compost mature cible.", "diagnostic": "Zone neutre — ni minéralisation ni immobilisation nette. Le mélange ne provoque pas de faim d'azote et ne libère pas d'excédent. C'est la cible pour les composts mûrs et les mélanges équilibrés type bokashi.", "recommandation": "C'est le C/N idéal pour un amendement polyvalent applicable en toute situation. Si votre mélange tombe dans cette zone, il est prêt à l'emploi sans correction. C'est aussi la cible de la formule de Kirkby : le ratio CNPS 100:8:2:1.5 correspond à cette zone d'humification optimale.", "icone": "🟢"}, {"cn_min": 25.0, "cn_max": 30.0, "label": "25–30", "comportement": "DÉBUT D'IMMOBILISATION", "interpretation": "Faible faim d'azote. Surveiller les cultures.", "diagnostic": "Début d'immobilisation — les micro-organismes commencent à puiser l'azote du sol pour décomposer la matière. Effet léger et temporaire (quelques semaines). La paille broyée et les couverts végétaux mûrs sont typiques.", "recommandation": "Surveiller les cultures sensibles (salades, jeunes plants). Si vous observez un jaunissement, apporter un complément azoté rapide (purin d'ortie, fiente diluée). Sinon, laisser faire — l'azote sera restitué après décomposition. Excellent pour mulcher entre les rangs.", "icone": "🟡"}, {"cn_min": 30.0, "cn_max": 50.0, "label": "30–50", "comportement": "IMMOBILISATION", "interpretation": "Faim d'azote. Apport N recommandé. Pailles.", "diagnostic": "Immobilisation significative — les micro-organismes captent activement l'azote du sol. La faim d'azote peut durer plusieurs semaines à plusieurs mois. Les pailles de céréales non broyées et les feuilles mortes sont typiques.", "recommandation": "Ne pas appliquer en contact direct avec les racines des cultures en croissance. Privilégier un apport en surface (mulch) plutôt qu'incorporé. Compenser par un apport azoté : 8 kg N pour chaque tonne de C apportée (formule de Kirkby). En pratique : 1 m³ de paille → ajouter 3 kg de fiente ou 15 L de purin concentré.", "icone": "🟠"}, {"cn_min": 50.0, "cn_max": 100.0, "label": "50–100", "comportement": "IMMOBILISATION FORTE", "interpretation": "Apport N nécessaire. Pailles de céréales.", "diagnostic": "Immobilisation forte et prolongée. La décomposition est lente (6-18 mois). Mais c'est aussi dans cette zone que se forme le plus d'humus stable — le coefficient d'humification k₁ est maximal pour le BRF et les matières ligneuses.", "recommandation": "Appliquer en surface, JAMAIS enfoui. Le BRF dans cette zone est un excellent constructeur de sol à long terme : il stimule les champignons lignivores et produit de l'humus stable. Prévoir une source d'azote d'accompagnement la première année. À partir de la 2e année, l'effet s'inverse et le sol devient plus fertile.", "icone": "🔴"}, {"cn_min": 100.0, "cn_max": null, "label": "> 100", "comportement": "IMMOBILISATION TRÈS FORTE", "interpretation": "Décomposition très lente. Bois, sciure, carton.", "diagnostic": "Décomposition très lente (1-3 ans). Matière presque inerte à court terme — bois massif, sciure sèche, carton. Immobilisation maximale de l'azote. Mais rôle important pour la structure du sol et l'habitat fongique.", "recommandation": "Réserver au paillage de surface épais (chemins, allées, pied de haies) ou au BRF pré-composté. Ne jamais incorporer au sol tel quel — la faim d'azote serait sévère et prolongée. Pour accélérer la décomposition, pré-tremper dans du purin ou du jus de bokashi avant application.", "icone": "🔴"}], "melanges": [{"id": 1, "nom": "Bokashi classique", "description": "Mélange fermenté anaérobie avec EM", "objectif": "Amendement humifiant, conservation maximale de la MO", "composants": [{"matiere_id": 29, "matiere": "Drèches de brasserie", "proportion": 75}, {"matiere_id": 6, "matiere": "Paille de blé / orge", "proportion": 25}], "cn_cible_min": 20.0, "cn_cible_max": 25.0, "ratio_ideal": "3:1 (azoté:carboné)", "notes": "Ratio 3:1 en masse. Ajouter EM + argile + calcaire coquillier. Fermentation 6-8 semaines."}, {"id": 2, "nom": "Compost thermophile équilibré", "description": "Compostage aérobie classique en tas retourné", "objectif": "Amendement stable, hygiénisé (>60°C)", "composants": [{"matiere_id": 6, "matiere": "Paille de blé / orge", "proportion": 60}, {"matiere_id": 1, "matiere": "Jeunes matériaux végétaux / Légumineuses", "proportion": 20}, {"matiere_id": 25, "matiere": "Fumier de bovin", "proportion": 20}], "cn_cible_min": 25.0, "cn_cible_max": 30.0, "ratio_ideal": "3:1 (carboné:azoté)", "notes": "Retourner toutes les 2 semaines. Température cible >55°C pendant 3 jours. Maturité : 3-6 mois."}, {"id": 3, "nom": "Paillage BRF", "description": "Bois raméal fragmenté en couverture du sol", "objectif": "Humification directe, stimulation fongique, couverture", "composants": [{"matiere_id": 7, "matiere": "Bois broyé BRF / rameaux frais", "proportion": 100}], "cn_cible_min": 50.0, "cn_cible_max": 80.0, "ratio_ideal": "100% BRF", "notes": "Étaler 5-10 cm en surface. Ne pas incorporer. Favorise les champignons lignivores. Faim d azote possible la 1ère année."}, {"id": 4, "nom": "Couvert vesce-seigle", "description": "Couvert hivernal légumineuse + graminée", "objectif": "Fixation N2 + biomasse carbonée, bon compromis C/N", "composants": [{"matiere_id": 38, "matiere": "Couvert hivernal décomposable (vesce + seigle, ~2:1)", "proportion": 100}], "cn_cible_min": 22.0, "cn_cible_max": 28.0, "ratio_ideal": "2:1 (vesce:seigle)", "notes": "Semis septembre-octobre. Destruction au rouleau ou gel. La vesce fixe 50-100 kg N/ha."}, {"id": 5, "nom": "Lombricompost maison", "description": "Vermicompostage de déchets de cuisine", "objectif": "Amendement riche et vivant, petit volume", "composants": [{"matiere_id": 30, "matiere": "Marc de raisin", "proportion": 30}, {"matiere_id": 1, "matiere": "Jeunes matériaux végétaux / Légumineuses", "proportion": 50}, {"matiere_id": 24, "matiere": "Fumier de bovin", "proportion": 20}], "cn_cible_min": 15.0, "cn_cible_max": 20.0, "ratio_ideal": "déchets verts + bruns", "notes": "Eisenia fetida. Température 15-25°C. Récolte tous les 3-4 mois. Perte MO 20-30%."}], "kirkby": [{"section": "formule", "titre": "La formule de Kirkby", "contenu": "Pour chaque tonne de carbone stockée dans le sol sous forme d'humus stable, le sol a besoin de fixer simultanément 80 kg d'azote, 20 kg de phosphore et 15 kg de soufre. C'est la stœchiométrie CNPS : le ratio 100:8:2:1.5 (Kirkby et al., 2011, 2016).\n\nConséquence contre-intuitive : apporter de l'azote minéral au sol AUGMENTE la séquestration de carbone, car N est souvent le facteur limitant de l'humification.", "donnees": {"C": 100, "N": 8, "P": 2, "S": 1.5}}, {"section": "implication", "titre": "Implication pratique", "contenu": "Si vous apportez 1 tonne de BRF (C/N 60, k1=50%) :\n- Carbone apporté : ~200 kg C (40% de MS × 50% C)\n- Humus potentiel : 100 kg C (k1=50%)\n- Besoin N pour humifier : 100 × 8/100 = 8 kg N\n- Besoin P : 100 × 2/100 = 2 kg P\n- Besoin S : 100 × 1.5/100 = 1.5 kg S\n\nSans cet azote, le BRF provoque une 'faim d'azote' — les microbes immobilisent le N du sol pour décomposer le bois. Solution : associer un apport azoté (tonte, légumineuse).", "donnees": null}, {"section": "curseur", "titre": "Le curseur C/N", "contenu": "Le ratio C/N détermine ce que les microorganismes font de la matière organique :\n\nC/N < 15 : MINÉRALISATION — les microbes libèrent N, P, S. Effet fertilisant rapide.\nC/N 20-25 : ZONE NEUTRE — équilibre humification/minéralisation.\nC/N > 30 : IMMOBILISATION — les microbes captent le N du sol (faim d'azote). Mais c'est aussi là que se forme l'humus stable (k1 élevé).\n\nL'objectif n'est pas de viser un C/N unique mais de comprendre le levier :\n- Besoin rapide de nutriments → matière à C/N bas (tonte, fiente)\n- Construction de sol long terme → matière à C/N élevé (BRF, paille) + apport N", "donnees": {"zones": [{"min": 0, "max": 15, "label": "Minéralisation", "color": "#DC2626"}, {"min": 15, "max": 25, "label": "Zone neutre", "color": "#10B981"}, {"min": 25, "max": 100, "label": "Immobilisation", "color": "#F59E0B"}]}}, {"section": "sol", "titre": "Influence du type de sol", "contenu": "Le type de sol modifie la vitesse de minéralisation ET la capacité de stockage :\n\n- Sol argileux : protège la MO (complexe organo-minéral). Minéralisation lente. Stock C élevé. Le ratio MO/argile doit dépasser 17% (seuil structural).\n- Sol sableux : peu de protection. Minéralisation rapide. Stock C faible. Nécessite des apports fréquents et des couverts permanents.\n- Sol limoneux : intermédiaire. Risque de battance si MO < 2%.\n\nLe modèle AMG montre que l'argile réduit le coefficient de minéralisation K de façon exponentielle. Chaque 10% d'argile en plus = ~15% de minéralisation en moins.", "donnees": {"seuils_mo_argile": {"optimal": 24, "realiste": 17, "degrade": 12}}}, {"section": "modes", "titre": "Les 4 modes de transformation", "contenu": "Selon comment vous traitez la MO avant de l'appliquer, les pertes et l'effet changent radicalement :\n\n| Mode | Perte MO | CO2 eq/t | C/N final | Humus |\n| BRF/paillage direct | 0% | 0 | conservé | maximum |\n| Bokashi (anaérobie) | 5-10% | 25 | conservé | 95% |\n| Lombricompost | 20-30% | ~80 | amélioré | 75% |\n| Compost thermophile | 40-60% | 669 | réduit | 45% |\n\nLe bokashi conserve 97% de la MO initiale vs 38% pour le compost (SPNA 2016). L'empreinte carbone est 27× plus faible par tonne de produit fini (Agriton).", "donnees": {"modes": ["brf_direct", "bokashi", "lombricompost", "thermophile"]}}]};

<script type="text/babel">



const CATEGORIES = [...new Set(DATA.matieres.map(m => m.categorie))];
const CAT_COLORS = {
  'Végétale': '#059669', 'Fumier/compost': '#D97706',
  'Résidus': '#DC2626', 'Mélange': '#2563EB', 'Sol/biomasse': '#6B7280'
};

function parseCnNote(note) {
  if (!note) return null;
  const cleaned = note.replace('~', '').replace(',', '.').trim();
  const val = parseFloat(cleaned);
  return isNaN(val) ? null : val;
}

function getCnAvg(m) {
  const min = m.cn_min, max = m.cn_max;
  if (min != null && max != null) return (min + max) / 2;
  if (min != null) return min;
  if (max != null) return max;
  return parseCnNote(m.cn_note);
}

function findCarac(matiere) {
  return DATA.caracterisation.find(c =>
    matiere.toLowerCase().includes(c.matiere.toLowerCase().split(' ')[0]) ||
    c.matiere.toLowerCase().includes(matiere.toLowerCase().split(' ')[0])
  );
}

function getRegle(cn) {
  if (cn == null || isNaN(cn)) return null;
  return DATA.regles.find(r =>
    (r.cn_min === null || cn >= r.cn_min) && (r.cn_max === null || cn <= r.cn_max)
  );
}

const PERTE = {
  'brf_direct': { min: 0, max: 0, label: 'BRF / Paillage direct', desc: 'Pas de perte — humification directe in situ', color: '#059669' },
  'bokashi': { min: 5, max: 10, label: 'Bokashi', desc: 'Fermentation anaérobie. 97% MO conservée. CO₂ : 25 kg/t', color: '#2563EB' },
  'lombricompost': { min: 20, max: 30, label: 'Lombricompost', desc: 'Vermicompostage. 70-80% MO conservée', color: '#7C3AED' },
  'thermophile': { min: 40, max: 60, label: 'Compost thermophile', desc: 'Compostage aérobie. CO₂ : 669 kg/t. Hygiénisation >60°C', color: '#DC2626' },
};

function cnColor(cn) {
  if (cn < 10) return '#DC2626';
  if (cn < 15) return '#F59E0B';
  if (cn < 25) return '#059669';
  if (cn <= 30) return '#F59E0B';
  return '#DC2626';
}

function cnZone(cn) {
  if (cn < 15) return { label: 'Minéralisation', color: '#DC2626', desc: 'Libère N, P, S rapidement' };
  if (cn <= 25) return { label: 'Zone neutre', color: '#059669', desc: 'Équilibre humification/minéralisation' };
  return { label: 'Immobilisation', color: '#F59E0B', desc: 'Faim d\'azote possible — formation humus' };
}

// ── KPI Card ──
function KPI({ value, unit, label, color, sub }) {
  return <div className="text-center p-4 bg-white rounded-xl border border-gray-200 shadow-sm">
    <div className="text-3xl font-bold" style={{color: color || '#1e293b'}}>{value}</div>
    {unit && <div className="text-xs text-gray-400">{unit}</div>}
    <div className="text-sm font-medium text-gray-600 mt-1">{label}</div>
    {sub && <div className="text-xs text-gray-400 mt-0.5">{sub}</div>}
  </div>;
}

// ── Gauge bar ──
function Gauge({ value, min, max, color }) {
  const pct = Math.min(100, Math.max(0, ((value - min) / (max - min)) * 100));
  return <div className="h-2 rounded-full bg-gray-200 overflow-hidden mt-1">
    <div className="h-full rounded-full transition-all duration-500" style={{width: pct+'%', background: color}} />
  </div>;
}

// ── Search with synonyms ──
function matchFilter(m, query) {
  if (!query) return true;
  const q = query.toLowerCase();
  return m.matiere.toLowerCase().includes(q) ||
    (m.synonymes || '').toLowerCase().includes(q) ||
    m.categorie.toLowerCase().includes(q);
}

function App() {
  const [panier, setPanier] = React.useState([]);
  const [filter, setFilter] = React.useState('');
  const [catFilter, setCatFilter] = React.useState(null);
  const [showKirkby, setShowKirkby] = React.useState(null);

  const addMatiere = (m) => {
    if (panier.find(p => p.id === m.id)) return;
    setPanier([...panier, { ...m, qty: 100 }]);
  };
  const updateQty = (id, qty) => setPanier(panier.map(p => p.id === id ? { ...p, qty: Math.max(0, qty) } : p));
  const removeMatiere = (id) => setPanier(panier.filter(p => p.id !== id));
  const loadMelange = (mel) => {
    const items = mel.composants.map(c => {
      const m = DATA.matieres.find(x => x.id === c.matiere_id);
      return m ? { ...m, qty: c.proportion * 10 } : null;
    }).filter(Boolean);
    setPanier(items);
  };

  // Calculs
  const totalQty = panier.reduce((s, p) => s + p.qty, 0);
  const cnGlobal = totalQty > 0 ? panier.reduce((s, p) => {
    const cn = getCnAvg(p) || 25;
    return s + cn * p.qty;
  }, 0) / totalQty : null;

  const k1Avg = totalQty > 0 ? panier.reduce((s, p) => {
    const k1 = (p.k1_min && p.k1_max) ? (p.k1_min + p.k1_max) / 2 : 20;
    return s + k1 * p.qty;
  }, 0) / totalQty : null;

  const humusKg = (totalQty && k1Avg) ? totalQty * (k1Avg / 100) : null;
  const regle = cnGlobal ? getRegle(cnGlobal) : null;
  const zone = cnGlobal ? cnZone(cnGlobal) : null;

  const filtered = DATA.matieres.filter(m =>
    matchFilter(m, filter) && (!catFilter || m.categorie === catFilter)
  );

  return <div className="max-w-7xl mx-auto px-4 py-6">

    {/* ── TITRE ── */}
    <div className="text-center mb-6">
      <h1 className="text-2xl font-bold text-gray-800">Matière Organique — Tableau de bord</h1>
      <p className="text-gray-500 text-sm mt-1">{DATA.matieres.length} matières · {DATA.melanges.length} mélanges · {DATA.kirkby.length} fiches · {DATA.regles.length} règles</p>
    </div>

    {/* ── KPI ROW ── */}
    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
      <KPI value={cnGlobal ? cnGlobal.toFixed(1) : '—'} label="C/N global"
        color={cnGlobal ? cnColor(cnGlobal) : '#999'}
        sub={zone ? zone.label : 'Ajoutez des matières'} />
      <KPI value={k1Avg ? k1Avg.toFixed(0)+'%' : '—'} label="k₁ humification"
        color={k1Avg > 25 ? '#059669' : k1Avg > 15 ? '#F59E0B' : '#999'}
        sub={k1Avg ? (k1Avg > 30 ? 'Très humifiant' : k1Avg > 20 ? 'Bon' : 'Faible') : ''} />
      <KPI value={humusKg ? humusKg.toFixed(0) : '—'} unit="kg humus"
        label={'par ' + totalQty + ' kg'} color="#7C3AED"
        sub={humusKg ? 'potentiel d\'humification' : ''} />
      <KPI value={totalQty || '—'} unit="kg" label="Masse totale"
        color="#1e293b" sub={panier.length + ' matière' + (panier.length !== 1 ? 's' : '')} />
    </div>

    {/* ── MAIN GRID ── */}
    <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">

      {/* ── COL 1 : Mélange ── */}
      <div className="space-y-4">
        {/* Mélanges prédéfinis */}
        <div className="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
          <h2 className="font-bold text-gray-800 mb-2 text-sm uppercase tracking-wide">Mélanges prédéfinis</h2>
          <div className="space-y-1">
            {DATA.melanges.map(mel =>
              <button key={mel.id} onClick={() => loadMelange(mel)}
                className="w-full text-left p-2 rounded-lg hover:bg-blue-50 border border-transparent hover:border-blue-200 transition text-sm">
                <div className="font-medium text-gray-700">{mel.nom}</div>
                <div className="text-xs text-gray-400">{mel.objectif} · C/N {mel.cn_cible_min}-{mel.cn_cible_max}</div>
              </button>
            )}
          </div>
        </div>

        {/* Panier */}
        <div className="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
          <h2 className="font-bold text-gray-800 mb-2 text-sm uppercase tracking-wide">
            Mélange ({panier.length} · {totalQty} kg)
          </h2>
          {panier.length === 0 && <p className="text-gray-400 text-sm italic">Sélectionnez un mélange prédéfini ou ajoutez des matières</p>}
          {panier.map(p => {
            const cn = getCnAvg(p) || 0;
            return <div key={p.id} className="flex items-center gap-2 py-1.5 border-b border-gray-50 last:border-0">
              <button onClick={() => removeMatiere(p.id)} className="text-red-300 hover:text-red-500 text-sm">✕</button>
              <div className="flex-1 min-w-0">
                <div className="text-sm font-medium text-gray-700 truncate">{p.matiere}</div>
                <div className="text-xs text-gray-400">C/N {cn.toFixed(0)} · k₁ {p.k1_min||'?'}-{p.k1_max||'?'}%</div>
              </div>
              <input type="number" min="0" max="10000" value={p.qty}
                onChange={e => updateQty(p.id, parseInt(e.target.value) || 0)}
                className="w-16 text-right text-sm border border-gray-200 rounded px-2 py-1" />
              <span className="text-xs text-gray-400 w-6">kg</span>
            </div>;
          })}
          {cnGlobal && regle && <div className="mt-3 space-y-2">
            <div className="p-3 rounded-lg" style={{background: zone.color+'10', borderLeft: '4px solid '+zone.color}}>
              <div className="flex items-center gap-2 mb-1">
                <span className="text-lg">{regle.icone}</span>
                <span className="font-bold text-sm" style={{color: zone.color}}>{regle.label} — {regle.comportement}</span>
              </div>
              {regle.diagnostic && <p className="text-xs text-gray-600 leading-relaxed">{regle.diagnostic}</p>}
            </div>
            {regle.recommandation && <div className="p-3 rounded-lg bg-green-50 border-l-4 border-green-500">
              <div className="text-xs font-semibold text-green-700 mb-1">Recommandation</div>
              <p className="text-xs text-gray-600 leading-relaxed">{regle.recommandation}</p>
            </div>}
          </div>}
        </div>
      </div>

      {/* ── COL 2 : Comprendre (Kirkby) ── */}
      <div className="space-y-4">
        <div className="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
          <h2 className="font-bold text-gray-800 mb-3 text-sm uppercase tracking-wide">Comprendre la MO</h2>
          {DATA.kirkby.map((k, i) =>
            <div key={i} className="mb-2">
              <button onClick={() => setShowKirkby(showKirkby === i ? null : i)}
                className="w-full text-left p-2 rounded-lg hover:bg-gray-50 transition">
                <div className="flex justify-between items-center">
                  <span className="text-sm font-medium text-gray-700">{k.titre}</span>
                  <span className="text-gray-300">{showKirkby === i ? '▾' : '▸'}</span>
                </div>
              </button>
              {showKirkby === i && <div className="px-2 pb-2 text-xs text-gray-600 leading-relaxed whitespace-pre-line">
                {k.contenu}
                {k.donnees && k.section === 'formule' && <div className="mt-2 grid grid-cols-4 gap-2">
                  {Object.entries(k.donnees).map(([el, val]) =>
                    <div key={el} className="text-center p-2 bg-blue-50 rounded-lg">
                      <div className="text-lg font-bold text-blue-700">{val}</div>
                      <div className="text-xs text-blue-500">{el}</div>
                    </div>
                  )}
                </div>}
                {k.donnees && k.section === 'curseur' && <div className="mt-2">
                  {k.donnees.zones.map((z, j) =>
                    <div key={j} className="flex items-center gap-2 py-1">
                      <div className="w-3 h-3 rounded-full" style={{background: z.color}} />
                      <span className="text-xs"><strong>C/N {z.min}-{z.max}</strong> : {z.label}</span>
                    </div>
                  )}
                  {cnGlobal && <div className="mt-2 h-3 rounded-full bg-gray-200 relative overflow-hidden">
                    <div className="absolute left-0 top-0 h-full bg-red-500 opacity-30" style={{width: '15%'}} />
                    <div className="absolute top-0 h-full bg-green-500 opacity-30" style={{left: '15%', width: '10%'}} />
                    <div className="absolute top-0 h-full bg-yellow-500 opacity-30" style={{left: '25%', width: '75%'}} />
                    <div className="absolute top-0 w-1 h-full bg-gray-800 rounded"
                      style={{left: Math.min(95, cnGlobal)+'%'}} title={'C/N '+cnGlobal.toFixed(1)} />
                  </div>}
                </div>}
                {k.donnees && k.section === 'sol' && <div className="mt-2 grid grid-cols-3 gap-1">
                  {Object.entries(k.donnees.seuils_mo_argile).map(([key, val]) =>
                    <div key={key} className="text-center p-1.5 bg-gray-50 rounded">
                      <div className="text-sm font-bold">{val}%</div>
                      <div className="text-xs text-gray-500">{key}</div>
                    </div>
                  )}
                </div>}
              </div>}
            </div>
          )}
        </div>
      </div>

      {/* ── COL 3 : Bibliothèque matières ── */}
      <div className="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
        <h2 className="font-bold text-gray-800 mb-2 text-sm uppercase tracking-wide">Matières ({filtered.length})</h2>
        <input type="text" placeholder="Rechercher : tonte, gazon, BRF..." value={filter}
          onChange={e => setFilter(e.target.value)}
          className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm mb-2 focus:outline-none focus:border-blue-400" />
        <div className="flex flex-wrap gap-1 mb-2">
          <button onClick={() => setCatFilter(null)}
            className={`text-xs px-2 py-0.5 rounded-full ${!catFilter ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-600'}`}>Tout</button>
          {CATEGORIES.map(c => <button key={c} onClick={() => setCatFilter(catFilter === c ? null : c)}
            className={`text-xs px-2 py-0.5 rounded-full ${catFilter === c ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-600'}`}>{c}</button>)}
        </div>
        <div className="max-h-[500px] overflow-y-auto space-y-0.5">
          {filtered.map(m => {
            const inP = panier.find(p => p.id === m.id);
            const cn = getCnAvg(m);
            return <div key={m.id} onClick={() => !inP && addMatiere(m)}
              className={`p-2 rounded-lg text-sm cursor-pointer transition ${inP ? 'bg-green-50 border border-green-200' : 'hover:bg-gray-50 border border-transparent'}`}>
              <div className="flex justify-between items-center">
                <span className="font-medium text-gray-700">{m.matiere}</span>
                <span className="text-xs text-gray-400">C/N {cn ? cn.toFixed(0) : '?'}</span>
              </div>
              <div className="flex gap-1 mt-0.5 items-center">
                <span className="text-xs px-1.5 py-0 rounded-full" style={{background: (CAT_COLORS[m.categorie]||'#888')+'20', color: CAT_COLORS[m.categorie]||'#888'}}>{m.categorie}</span>
                {m.k1_min && <span className="text-xs text-gray-400">k₁ {m.k1_min}-{m.k1_max}%</span>}
              </div>
              {m.synonymes && filter && <div className="text-xs text-gray-300 mt-0.5 truncate">{m.synonymes}</div>}
            </div>;
          })}
        </div>
      </div>
    </div>

    {/* ── MODES DE TRANSFORMATION ── */}
    <div className="bg-white rounded-xl border border-gray-200 p-4 shadow-sm mb-6">
      <h2 className="font-bold text-gray-800 mb-3 text-sm uppercase tracking-wide">Modes de transformation — Comparaison</h2>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        {Object.entries(PERTE).map(([key, mode]) => {
          const humusMin = humusKg ? humusKg * (100 - mode.max) / 100 : null;
          const humusMax = humusKg ? humusKg * (100 - mode.min) / 100 : null;
          return <div key={key} className="p-3 rounded-xl border-2 transition" style={{borderColor: mode.color+'40'}}>
            <div className="font-medium text-sm mb-1" style={{color: mode.color}}>{mode.label}</div>
            <div className="text-xs text-gray-500 mb-2">{mode.desc}</div>
            <div className="space-y-1">
              <div className="flex justify-between text-xs">
                <span className="text-gray-400">Perte MO</span>
                <span className="font-medium">{mode.min === mode.max ? mode.min+'%' : mode.min+'-'+mode.max+'%'}</span>
              </div>
              {humusMin != null && <div className="flex justify-between text-xs">
                <span className="text-gray-400">Humus</span>
                <span className="font-bold" style={{color: mode.color}}>{humusMin.toFixed(0)}-{humusMax.toFixed(0)} kg</span>
              </div>}
              <Gauge value={100-mode.max} min={0} max={100} color={mode.color} />
            </div>
          </div>;
        })}
      </div>
    </div>

    {/* ── FOOTER ── */}
    <div className="text-center text-xs text-gray-400 mt-4 pb-4">
      Données depuis sol_vivant.db · Formule de Kirkby (2016) · Modèle AMG · SPNA · Agriton
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);


</script>

</body>
</html>
