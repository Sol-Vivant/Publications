g": null}, {"matiere": "Urine", "densite": 1.0, "taux_ms": 5.0, "cn_min": 0.8, "cn_max": 0.8, "k1_pct": null, "cout_min": 0.0, "cout_max": 0.0, "effet": "+", "epaisseur": null, "notes": "C/N 0,8", "volume_l_par_kg": null}], "regles": [{"cn_min": null, "cn_max": 10.0, "label": "< 10", "comportement": "MINÉRALISATION TRÈS RAPIDE", "interpretation": "Risque de lessivage N. Amendement puissant.", "diagnostic": "Matière très azotée, décomposition quasi immédiate. L'azote est libéré massivement — risque de lessivage vers les nappes si le sol est nu. Ce type d'apport agit comme un engrais organique rapide, pas comme un amendement de fond.", "recommandation": "Utiliser uniquement en période de croissance active (printemps). Toujours associer à un couvert végétal ou une culture en place pour capter l'azote libéré. Ne jamais appliquer sur sol nu en automne/hiver. Pour un effet plus durable, mélanger avec une matière carbonée (paille, BRF) pour remonter le C/N vers 20-25.", "icone": "🔴", "note_incorporation": ""}, {"cn_min": 10.0, "cn_max": 15.0, "label": "10–15", "comportement": "MINÉRALISATION ACTIVE", "interpretation": "N libéré rapidement. Cible pour apports frais.", "diagnostic": "Matière riche en azote, minéralisation active dans les 2-4 semaines. L'azote est rapidement disponible pour les plantes. Bon pour un coup de boost en début de culture. Le fumier frais, les tontes et les légumineuses sont typiques de cette plage.", "recommandation": "Idéal en apport de surface au printemps, avant implantation ou en top-dressing. Pour construire du stock de MO à long terme, compléter avec des matières plus carbonées. Le mélange avec du BRF ou de la paille (ratio 1:2) donne un excellent compromis fertilisation/humification.", "icone": "🟠", "note_incorporation": ""}, {"cn_min": 15.0, "cn_max": 20.0, "label": "15–20", "comportement": "ÉQUILIBRE LÉGÈREMENT +", "interpretation": "Légère minéralisation. Fumiers bien maturés.", "diagnostic": "Légère minéralisation nette — le sol reçoit un peu plus d'azote qu'il n'en consomme. C'est la zone des fumiers bien maturés et des composts jeunes. Bon équilibre entre nutrition immédiate et construction de sol.", "recommandation": "Zone confortable pour la plupart des usages. Convient en toute saison sur culture en place. Pour le maraîchage, c'est la cible idéale pour les apports réguliers (compost mi-mûr, fumier composté 3-6 mois).", "icone": "🟡", "note_incorporation": ""}, {"cn_min": 20.0, "cn_max": 25.0, "label": "20–25", "comportement": "ZONE NEUTRE", "interpretation": "Ni gain ni perte nette d'N. Compost mature cible.", "diagnostic": "Zone neutre — ni minéralisation ni immobilisation nette. Le mélange ne provoque pas de faim d'azote et ne libère pas d'excédent. C'est la cible pour les composts mûrs et les mélanges équilibrés type bokashi.", "recommandation": "C'est le C/N idéal pour un amendement polyvalent applicable en toute situation. Si votre mélange tombe dans cette zone, il est prêt à l'emploi sans correction. C'est aussi la cible de la formule de Kirkby : le ratio CNPS 100:8:2:1.5 correspond à cette zone d'humification optimale.", "icone": "🟢", "note_incorporation": ""}, {"cn_min": 25.0, "cn_max": 30.0, "label": "25–30", "comportement": "DÉBUT D'IMMOBILISATION", "interpretation": "Faible faim d'azote. Surveiller les cultures.", "diagnostic": "Début d'immobilisation — les micro-organismes commencent à puiser l'azote du sol pour décomposer la matière. Effet léger et temporaire (quelques semaines). La paille broyée et les couverts végétaux mûrs sont typiques.", "recommandation": "Surveiller les cultures sensibles (salades, jeunes plants). Si vous observez un jaunissement, apporter un complément azoté rapide (purin d'ortie, fiente diluée). Sinon, laisser faire — l'azote sera restitué après décomposition. Excellent pour mulcher entre les rangs.", "icone": "🟡", "note_incorporation": ""}, {"cn_min": 30.0, "cn_max": 50.0, "label": "30–50", "comportement": "IMMOBILISATION", "interpretation": "Faim d'azote. Apport N recommandé. Pailles.", "diagnostic": "Immobilisation significative — les micro-organismes captent activement l'azote du sol. La faim d'azote peut durer plusieurs semaines à plusieurs mois. Les pailles de céréales non broyées et les feuilles mortes sont typiques.", "recommandation": "Ne pas appliquer en contact direct avec les racines des cultures en croissance. Privilégier un apport en surface (mulch). L'incorporation est une alternative documentée pour les sols dégradés, sous conditions spécifiques (décompaction, drainage). Compenser par un apport azoté : 8 kg N pour chaque tonne de C apportée (formule de Kirkby). En pratique : 1 m³ de paille → ajouter 3 kg de fiente ou 15 L de purin concentré.", "icone": "🟠", "note_incorporation": "L'incorporation est une alternative documentée par le réseau MSV sous conditions (décompaction, drainage, humidité). Voir encart ci-dessous."}, {"cn_min": 50.0, "cn_max": 100.0, "label": "50–100", "comportement": "IMMOBILISATION FORTE", "interpretation": "Apport N nécessaire. Pailles de céréales.", "diagnostic": "Immobilisation forte et prolongée. La décomposition est lente (6-18 mois). Mais c'est aussi dans cette zone que se forme le plus d'humus stable — le coefficient d'humification k₁ est maximal pour le BRF et les matières ligneuses.", "recommandation": "Appliquer en surface par défaut. Le BRF dans cette zone est un excellent constructeur de sol à long terme : il stimule les champignons lignivores et produit de l'humus stable. L'incorporation massive est cependant une technique éprouvée pour restaurer les sols dégradés (<2% MO) — voir conditions dans l'encart ci-dessous. Prévoir une source d'azote d'accompagnement la première année. À partir de la 2e année, l'effet s'inverse et le sol devient plus fertile.", "icone": "🔴", "note_incorporation": "L'incorporation massive de BRF (intrant massif 50-400 t MS/ha) est une technique éprouvée pour sols dégradés. Conditions requises : décompaction, drainage, humidité, mélange au cm. Voir encart."}, {"cn_min": 100.0, "cn_max": null, "label": "> 100", "comportement": "IMMOBILISATION TRÈS FORTE", "interpretation": "Décomposition très lente. Bois, sciure, carton.", "diagnostic": "Décomposition très lente (1-3 ans). Matière presque inerte à court terme — bois massif, sciure sèche, carton. Immobilisation maximale de l'azote. Mais rôle important pour la structure du sol et l'habitat fongique.", "recommandation": "Réserver de préférence au paillage de surface épais (chemins, allées, pied de haies) ou au BRF pré-composté. L'incorporation au sol est possible dans le cadre d'un intrant massif sur sol très dégradé — voir conditions dans l'encart ci-dessous. Pour accélérer la décomposition, pré-tremper dans du purin ou du jus de bokashi avant application.", "icone": "🔴", "note_incorporation": "L'incorporation est possible avec pré-trempage et mélange au centimètre. Résultats documentés sur sols très dégradés (<2% MO). Voir encart."}], "melanges": [{"id": 1, "nom": "Bokashi classique", "description": "Mélange fermenté anaérobie avec EM", "objectif": "Amendement humifiant, conservation maximale de la MO", "composants": [{"matiere_id": 29, "matiere": "Drèches de brasserie", "proportion": 75}, {"matiere_id": 6, "matiere": "Paille de blé / orge", "proportion": 25}], "cn_cible_min": 20.0, "cn_cible_max": 25.0, "ratio_ideal": "3:1 (azoté:carboné)", "notes": "Ratio 3:1 en masse. Ajouter EM + argile + calcaire coquillier. Fermentation 6-8 semaines."}, {"id": 2, "nom": "Compost thermophile équilibré", "description": "Compostage aérobie classique en tas retourné", "objectif": "Amendement stable, hygiénisé (>60°C)", "composants": [{"matiere_id": 6, "matiere": "Paille de blé / orge", "proportion": 60}, {"matiere_id": 1, "matiere": "Jeunes matériaux végétaux / Légumineuses", "proportion": 20}, {"matiere_id": 25, "matiere": "Fumier de bovin", "proportion": 20}], "cn_cible_min": 25.0, "cn_cible_max": 30.0, "ratio_ideal": "3:1 (carboné:azoté)", "notes": "Retourner toutes les 2 semaines. Température cible >55°C pendant 3 jours. Maturité : 3-6 mois."}, {"id": 3, "nom": "Paillage BRF", "description": "Bois raméal fragmenté en couverture du sol", "objectif": "Humification directe, stimulation fongique, couverture", "composants": [{"matiere_id": 7, "matiere": "Bois broyé BRF / rameaux frais", "proportion": 100}], "cn_cible_min": 50.0, "cn_cible_max": 80.0, "ratio_ideal": "100% BRF", "notes": "Étaler 5-10 cm en surface. Ne pas incorporer. Favorise les champignons lignivores. Faim d azote possible la 1ère année."}, {"id": 4, "nom": "Couvert vesce-seigle", "description": "Couvert hivernal légumineuse + graminée", "objectif": "Fixation N2 + biomasse carbonée, bon compromis C/N", "composants": [{"matiere_id": 38, "matiere": "Couvert hivernal décomposable (vesce + seigle, ~2:1)", "proportion": 100}], "cn_cible_min": 22.0, "cn_cible_max": 28.0, "ratio_ideal": "2:1 (vesce:seigle)", "notes": "Semis septembre-octobre. Destruction au rouleau ou gel. La vesce fixe 50-100 kg N/ha."}, {"id": 5, "nom": "Lombricompost maison", "description": "Vermicompostage de déchets de cuisine", "objectif": "Amendement riche et vivant, petit volume", "composants": [{"matiere_id": 30, "matiere": "Marc de raisin", "proportion": 30}, {"matiere_id": 1, "matiere": "Jeunes matériaux végétaux / Légumineuses", "proportion": 50}, {"matiere_id": 24, "matiere": "Fumier de bovin", "proportion": 20}], "cn_cible_min": 15.0, "cn_cible_max": 20.0, "ratio_ideal": "déchets verts + bruns", "notes": "Eisenia fetida. Température 15-25°C. Récolte tous les 3-4 mois. Perte MO 20-30%."}], "kirkby": [{"section": "formule", "titre": "La formule de Kirkby", "contenu": "Pour chaque tonne de carbone stockée dans le sol sous forme d'humus stable, le sol a besoin de fixer simultanément 80 kg d'azote, 20 kg de phosphore et 15 kg de soufre. C'est la stœchiométrie CNPS : le ratio 100:8:2:1.5 (Kirkby et al., 2011, 2016).\n\nConséquence contre-intuitive : apporter de l'azote minéral au sol AUGMENTE la séquestration de carbone, car N est souvent le facteur limitant de l'humification.", "donnees": {"C": 100, "N": 8, "P": 2, "S": 1.5}}, {"section": "implication", "titre": "Implication pratique", "contenu": "Si vous apportez 1 tonne de BRF (C/N 60, k1=50%) :\n- Carbone apporté : ~200 kg C (40% de MS × 50% C)\n- Humus potentiel : 100 kg C (k1=50%)\n- Besoin N pour humifier : 100 × 8/100 = 8 kg N\n- Besoin P : 100 × 2/100 = 2 kg P\n- Besoin S : 100 × 1.5/100 = 1.5 kg S\n\nSans cet azote, le BRF provoque une 'faim d'azote' — les microbes immobilisent le N du sol pour décomposer le bois. Solution : associer un apport azoté (tonte, légumineuse).", "donnees": null}, {"section": "curseur", "titre": "Le curseur C/N", "contenu": "Le ratio C/N détermine ce que les microorganismes font de la matière organique :\n\nC/N < 15 : MINÉRALISATION — les microbes libèrent N, P, S. Effet fertilisant rapide.\nC/N 20-25 : ZONE NEUTRE — équilibre humification/minéralisation.\nC/N > 30 : IMMOBILISATION — les microbes captent le N du sol (faim d'azote). Mais c'est aussi là que se forme l'humus stable (k1 élevé).\n\nL'objectif n'est pas de viser un C/N unique mais de comprendre le levier :\n- Besoin rapide de nutriments → matière à C/N bas (tonte, fiente)\n- Construction de sol long terme → matière à C/N élevé (BRF, paille) + apport N", "donnees": {"zones": [{"min": 0, "max": 15, "label": "Minéralisation", "color": "#DC2626"}, {"min": 15, "max": 25, "label": "Zone neutre", "color": "#10B981"}, {"min": 25, "max": 100, "label": "Immobilisation", "color": "#F59E0B"}]}}, {"section": "sol", "titre": "Influence du type de sol", "contenu": "Le type de sol modifie la vitesse de minéralisation ET la capacité de stockage :\n\n- Sol argileux : protège la MO (complexe organo-minéral). Minéralisation lente. Stock C élevé. Le ratio MO/argile doit dépasser 17% (seuil structural).\n- Sol sableux : peu de protection. Minéralisation rapide. Stock C faible. Nécessite des apports fréquents et des couverts permanents.\n- Sol limoneux : intermédiaire. Risque de battance si MO < 2%.\n\nLe modèle AMG montre que l'argile réduit le coefficient de minéralisation K de façon exponentielle. Chaque 10% d'argile en plus = ~15% de minéralisation en moins.", "donnees": {"seuils_mo_argile": {"optimal": 24, "realiste": 17, "degrade": 12}}}, {"section": "modes", "titre": "Les 4 modes de transformation", "contenu": "Selon comment vous traitez la MO avant de l'appliquer, les pertes et l'effet changent radicalement :\n\n| Mode | Perte MO | CO2 eq/t | C/N final | Humus |\n| BRF/paillage direct | 0% | 0 | conservé | maximum |\n| Bokashi (anaérobie) | 5-10% | 25 | conservé | 95% |\n| Lombricompost | 20-30% | ~80 | amélioré | 75% |\n| Compost thermophile | 40-60% | 669 | réduit | 45% |\n\nLe bokashi conserve 97% de la MO initiale vs 38% pour le compost (SPNA 2016). L'empreinte carbone est 27× plus faible par tonne de produit fini (Agriton).", "donnees": {"modes": ["brf_direct", "bokashi", "lombricompost", "thermophile"]}}], "incorporation": [{"cn_seuil_min": 25.0, "cn_seuil_max": 30.0, "niveau": "info", "titre": "Incorporation : une alternative documentée", "contenu": "Dans cette zone de C/N, l'application en surface (mulch) reste la méthode la plus simple. Cependant, pour les sols dégradés (<2% MO), l'incorporation massive est une technique éprouvée par le réseau MSV (Ver de Terre Production) qui permet de remonter rapidement les taux de matière organique.", "conditions": [], "cas_etude": [], "redox": null, "timeline": "18-24 mois de faim d'azote avant retour de fertilité", "source": "Réseau MSV / Ver de Terre Production"}, {"cn_seuil_min": 30.0, "cn_seuil_max": 100.0, "niveau": "detail", "titre": "Incorporation massive : technique MSV pour sols dégradés", "contenu": "L'incorporation de matières à C/N élevé (BRF, paille, broyats) est une technique documentée pour restaurer rapidement les sols dégradés. Contrairement à l'idée reçue, l'enfouissement n'est pas interdit — il requiert des conditions précises. Le mélange intime minéral/organique à l'échelle du centimètre stabilise les agrégats par action du mycélium saprophyte. La distinction clé est entre anaérobiose subie (sol engorgé → toxicité) et anaérobiose choisie (bokashi, LiFoFer → conservation C/N maximale).", "conditions": [{"id": "decompaction", "label": "Décompaction préalable du sol", "detail": "Le sol doit être décompacté avant incorporation pour permettre la circulation d'air et d'eau. Sans porosité, l'incorporation crée des conditions anaérobies subies."}, {"id": "drainage", "label": "Bon drainage — pas d'hydromorphie", "detail": "Éviter les sols engorgés. En anaérobie subie (sol saturé), l'incorporation produit H₂S, Fe²⁺/Mn²⁺ toxiques et émissions N₂O/CH₄. Signaux : odeurs de soufre, horizons bleutés."}, {"id": "humidite", "label": "Maintenir l'humidité du sol", "detail": "Irriguer régulièrement pour soutenir l'activité biologique. Humidité + chaleur = reprise biologique rapide (cas du Talus de Marseille : 12 mois)."}, {"id": "chaleur", "label": "Chaleur accélère la reprise", "detail": "Les saisons chaudes sont idéales. La combinaison chaleur + humidité maximise la vitesse de colonisation fongique et bactérienne."}, {"id": "melange_cm", "label": "Mélange à l'échelle du centimètre", "detail": "Le champignon saprophyte a un rayon d'action de ~1-2 cm. Le mélange intime minéral/organique à cette échelle est la clé de la stabilisation des agrégats (expériences MSV : agrégats stables 120 jours dans l'eau)."}, {"id": "patience", "label": "Accepter 18-24 mois de faim d'azote", "detail": "L'activité biologique d'humification entre en concurrence avec les rhizosphères. La fertilité revient après 18-24 mois avec retour massif des vers de terre."}], "cas_etude": [{"nom": "Talus de Marseille", "type": "permaculture urbaine", "mo_avant": "très dégradé", "mo_apres": "+7-9 points", "duree": "12-18 mois", "detail": "50+ cm de BRF incorporé au broyeur à marteau. Retour fertilité en 12 mois grâce à chaleur + irrigat function parseCnNote(note) {
  if (!note) return null;
  const cleaned = note.replace('~', '').replace(',', '.').trim();
  const val = parseFloat(cleaned);
  return isNaN(val) ? null : val;
}

function getCnAvg(m) {
  const min = m.cn_min, max = m.cn_max;
  if (min != null && max != null) return (min + max) / 2;
  if (min != null) return min;
  if (max != null) return max;
  return parseCnNote(m.cn_note);
}

function findCarac(matiere) {
  return DATA.caracterisation.find(c =>
    matiere.toLowerCase().includes(c.matiere.toLowerCase().split(' ')[0]) ||
    c.matiere.toLowerCase().includes(matiere.toLowerCase().split(' ')[0])
  );
}

function getRegle(cn) {
  if (cn == null || isNaN(cn)) return null;
  return DATA.regles.find(r =>
    (r.cn_min === null || cn >= r.cn_min) && (r.cn_max === null || cn <= r.cn_max)
  );
}

function cnColor(cn) {
  if (cn < 10) return '#DC2626';
  if (cn < 15) return '#F59E0B';
  if (cn < 25) return '#059669';
  if (cn <= 30) return '#F59E0B';
  return '#DC2626';

  if (cn < 15) return { label: 'Minéralisation', color: '#DC2626' };

  const addMatiere = (m) => {

      return m ? { ...m, qty: c.proportion * 10 } : null;
    }).filter(Boolean);
    setPanier(items);
  };

  // ── Calculs ──
  const totalQty = panier.reduce((s, p) => s + p.qty, 0);
  const cnGlobal = totalQty > 0 ? panier.reduce((s, p) => {
    const cn = getCnAvg(p) || 25;

    const k1 = (p.k1_min && p.k1_max) ? (p.k1_min + p.k1_max) / 2 : 20;
    return s + k1 * p.qty;

  const regle = cnGlobal ? getRegle(cnGlobal) : null;
  const zone = cnGlobal ? cnZone(cnGlobal) : null;

  // ── Alertes ──

    if (cnGlobal >= 20 && cnGlobal <= 25) alertes.push({ type: 'success', text: "Zone optimale pour l'humification. Équilibre minéralisation/immobilisation." });
  }
  if (k1Avg !== null && k1Avg < 10) {
    alertes.push({ type: 'info', text: "Coefficient isohumique faible (<10%) — carbone très stable mais peu d'effet nutritif à court terme." });
  }

  // Kirkby ratio
  const showKirkbyRatio = cnGlobal && cnGlobal >= 15 && cnGlobal <= 30;

  // ── Filtrage matières ──
  const filtered = DATA.matieres.filter(m =>
    matchFilter(m, filter) &&
    (!catFilter || m.categorie === catFilter) &&
    (showSolBio || m.categorie !== 'Sol/biomasse')
  );

  return <div>
    {/* ── HEADER ── */}
    <div style={{textAlign:'center', padding:'1rem 1.5rem 0.5rem'}}>
      <h1 style={{fontSize:'1.5rem',fontWeight:800,color:'#1e293b',margin:0}}>Calculateur Matière Organique</h1>
      <p style={{fontSize:'0.8rem',color:'#94a3b8',marginTop:'0.25rem'}}>{DATA.matieres.length} matières · {DATA.melanges.length} mélanges · {DATA.regles.length} règles</p>
    </div>

    <div className="mo-layout">
      {/* ══════════ SIDEBAR GAUCHE : Matières ══════════ */}
      <aside className="mo-sidebar">
        <h2 style={{fontSize:'0.8rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.04em',color:'#334155',marginBottom:'0.5rem'}}>
          Matières ({filtered.length})
        </h2>
        <input type="text" placeholder="Rechercher : tonte, gazon, BRF..."
          value={filter} onChange={e => setFilter(e.target.value)}
          style={{width:'100%',padding:'0.4rem 0.6rem',border:'1px solid #e2e8f0',borderRadius:'8px',fontSize:'0.82rem',marginBottom:'0.5rem',outline:'none'}} />
        <div style={{display:'flex',flexWrap:'wrap',gap:'4px',marginBottom:'0.5rem'}}>
          <button onClick={() => setCatFilter(null)}
            style={{fontSize:'0.7rem',padding:'2px 8px',borderRadius:'12px',border:'none',cursor:'pointer',
              background: !catFilter ? '#1e293b' : '#f1f5f9', color: !catFilter ? '#fff' : '#64748b'}}>Tout</button>
          {ACTIVE_CATS.map(c => <button key={c} onClick={() => setCatFilter(catFilter === c ? null : c)}
            style={{fontSize:'0.7rem',padding:'2px 8px',borderRadius:'12px',border:'none',cursor:'pointer',
              background: catFilter === c ? '#1e293b' : '#f1f5f9', color: catFilter === c ? '#fff' : '#64748b'}}>{c}</button>)}
        </div>
        <div style={{overflowY:'auto',flex:1}}>
          {filtered.map(m => {
            const inP = panier.find(p => p.id === m.id);
            const cn = getCnAvg(m);
            return <div key={m.id} onClick={() => !inP && addMatiere(m)}
              className={'mat-item' + (inP ? ' in-panier' : '')}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span className="mat-name">{m.matiere}</span>
                <span className="mat-cn">C/N {cn ? cn.toFixed(0) : '?'}</span>
              </div>
              <div style={{display:'flex',gap:'4px',marginTop:'2px',alignItems:'center'}}>
                <span className="mat-cat" style={{background:(CAT_COLORS[m.categorie]||'#888')+'20',color:CAT_COLORS[m.categorie]||'#888'}}>{m.categorie}</span>
                {m.k1_min && <span style={{fontSize:'0.7rem',color:'#94a3b8'}}>k₁ {m.k1_min}-{m.k1_max}%</span>}
              </div>
              {m.synonymes && filter && <div className="mat-syn">{m.synonymes}</div>}
            </div>;
          })}
        </div>
        {/* Toggle Sol/biomasse */}
        <div style={{marginTop:'0.5rem',paddingTop:'0.5rem',borderTop:'1px solid #e2e8f0'}}>
          <button onClick={() => setShowSolBio(!showSolBio)}
            style={{fontSize:'0.7rem',color:'#94a3b8',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>
            {showSolBio ? 'Masquer' : 'Afficher'} Sol/biomasse (7 réf.)
          </button>
        </div>
      </aside>
      {/* ══════════ MAIN CONTENT ══════════ */}
      <main className="mo-main">

        {/* ── KPI ROW ── */}
        <div className="kpi-grid">
          <div className="kpi-card">
            <div className="kpi-value" style={{color: cnGlobal ? cnColor(cnGlobal) : '#ccc'}}>{cnGlobal ? cnGlobal.toFixed(1) : '—'}</div>
            <div className="kpi-label">C/N global</div>
            <div className="kpi-sub">{zone ? zone.label : 'Ajoutez des matières'}</div>
          </div>
          <div className="kpi-card">
            <div className="kpi-value" style={{color: k1Avg > 25 ? '#059669' : k1Avg > 15 ? '#F59E0B' : '#ccc'}}>{k1Avg ? k1Avg.toFixed(0)+'%' : '—'}</div>
            <div className="kpi-label">k₁ humification</div>
            <div className="kpi-sub">{k1Avg ? (k1Avg > 30 ? 'Très humifiant' : k1Avg > 20 ? 'Bon' : 'Faible') : ''}</div>
          </div>
          <div className="kpi-card">
            <div className="kpi-value" style={{color:'#7C3AED'}}>{humusKg ? humusKg.toFixed(0) : '—'}</div>
            <div className="kpi-unit">kg humus</div>
            <div className="kpi-label">par {totalQty || 0} kg</div>
          </div>
          <div className="kpi-card">
            <div className="kpi-value" style={{color:'#1e293b'}}>{totalQty || '—'}</div>
            <div className="kpi-unit">kg</div>
            <div className="kpi-label">Masse totale</div>
            <div className="kpi-sub">{panier.length} matière{panier.length !== 1 ? 's' : ''}</div>
          </div>
        </div>

        {/* ── Jauge C/N ── */}
        {cnGlobal && <div style={{marginBottom:'1rem'}}>
          <div className="cn-gauge">
            <div className="cn-gauge-marker" style={{left: Math.min(95, Math.max(2, cnGlobal / 100 * 100))+'%'}} />
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.65rem',color:'#94a3b8',marginTop:'2px'}}>
            <span>0</span><span>10</span><span>20</span><span>30</span><span>50</span><span>100</span>
          </div>
        </div>}

                {/* ── Panier ── */}
        <div className="mo-card">
          <h2>Mélange ({panier.length} matière{panier.length !== 1 ? 's' : ''} · {totalQty} kg)</h2>
          {panier.length === 0 && <p style={{color:'#94a3b8',fontSize:'0.85rem',fontStyle:'italic'}}>
            Cliquez sur une matière à gauche ou choisissez un mélange prédéfini
          </p>}
          {panier.map(p => {
            const cn = getCnAvg(p) || 0;
            const pct = totalQty > 0 ? (p.qty / totalQty * 100).toFixed(0) : 0;
            return <div key={p.id} className="panier-item">
              <button className="panier-remove" onClick={() => removeMatiere(p.id)}>✕</button>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:'0.85rem',fontWeight:500,color:'#334155',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.matiere}</div>
                <div style={{fontSize:'0.72rem',color:'#94a3b8'}}>C/N {cn.toFixed(0)} · k₁ {p.k1_min||'?'}-{p.k1_max||'?'}% · {pct}%</div>
              </div>
              <input type="range" min="0" max="1000" step="10" value={p.qty}
                onChange={e => updateQty(p.id, parseInt(e.target.value))}
                style={{width:'80px'}} />
              <input type="number" min="0" max="10000" value={p.qty}
                onChange={e => updateQty(p.id, parseInt(e.target.value) || 0)}
                style={{width:'60px',textAlign:'right',fontSize:'0.82rem',border:'1px solid #e2e8f0',borderRadius:'6px',padding:'3px 6px'}} />
              <span style={{fontSize:'0.7rem',color:'#94a3b8',width:'20px'}}>kg</span>
            </div>;
          })}
        </div>

        {/* ── Diagnostic + Recommandation ── */}
        {cnGlobal && regle && <div className="mo-card">
          <h2>Diagnostic</h2>
          <div className="diag-box" style={{borderLeftColor: zone.color, background: zone.color+'10'}}>
            <div style={{display:'flex',alignItems:'center',gap:'0.5rem',marginBottom:'0.35rem'}}>
              <span style={{fontSize:'1.1rem'}}>{regle.icone}</span>
              <span style={{fontWeight:700,fontSize:'0.9rem',color:zone.color}}>{regle.label} — {regle.comportement}</span>
            </div>
            {regle.interpretation && <p style={{fontSize:'0.82rem',color:'#475569',lineHeight:1.5,margin:0}}>{regle.interpretation}</p>}
            {regle.diagnostic && <p style={{fontSize:'0.8rem',color:'#64748b',lineHeight:1.5,marginTop:'0.35rem'}}>{regle.diagnostic}</p>}
          </div>
          {regle.recommandation && <div className="reco-box">
            <div style={{fontSize:'0.75rem',fontWeight:600,color:'#166534',marginBottom:'0.25rem'}}>Recommandation</div>
            <p style={{fontSize:'0.82rem',color:'#475569',lineHeight:1.5,margin:0}}>{regle.recommandation}</p>
          </div>}

          {/* Kirkby ratio */}
          {showKirkbyRatio && <div style={{padding:'0.7rem 1rem',borderRadius:'10px',background:'#faf5ff',borderLeft:'4px solid #7c3aed',marginBottom:'0.5rem'}}>
            <div style={{fontWeight:600,fontSize:'0.82rem',color:'#6d28d9',marginBottom:'0.25rem'}}>Ratio de Kirkby</div>
            <div style={{fontSize:'0.8rem',color:'#6b21a8'}}>Pour 1 tonne de C stabilisé : 83 kg N + 20 kg P + 14 kg S nécessaires.</div>
          </div>}

          {/* Alertes */}
          {alertes.map((a, i) => <div key={i} className={'alert-box alert-' + a.type}>
            {a.type === 'danger' ? '⚠' : a.type === 'warning' ? '⚡' : a.type === 'success' ? '✓' : 'ℹ'} {a.text}
          </div>)}

          {/* Encart incorporation (UNE SEULE FOIS — fix du doublon) */}
          {cnGlobal > 25 && <EncartIncorporation cn={cnGlobal} />}
        </div>}
        {/* ── Modes de transformation ── */}
        {panier.length > 0 && <div className="mo-card">
          <h2>Modes de transformation — Comparaison</h2>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4, 1fr)',gap:'0.75rem'}}>
            {Object.entries(PERTE).map(([key, mode]) => {
              const humusMin = humusKg ? humusKg * (100 - mode.max) / 100 : null;
              const humusMax = humusKg ? humusKg * (100 - mode.min) / 100 : null;
              return <div key={key} style={{padding:'0.75rem',borderRadius:'10px',border:'2px solid '+mode.color+'40'}}>
                <div style={{fontWeight:600,fontSize:'0.82rem',color:mode.color,marginBottom:'0.25rem'}}>{mode.label}</div>
                <div style={{fontSize:'0.72rem',color:'#64748b',marginBottom:'0.5rem'}}>{mode.desc}</div>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.72rem'}}>
                  <span style={{color:'#94a3b8'}}>Perte MO</span>
                  <span style={{fontWeight:600}}>{mode.min === mode.max ? mode.min+'%' : mode.min+'-'+mode.max+'%'}</span>
                </div>
                {humusMin != null && <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.72rem',marginTop:'2px'}}>
                  <span style={{color:'#94a3b8'}}>Humus</span>
                  <span style={{fontWeight:700,color:mode.color}}>{humusMin.toFixed(0)}-{humusMax.toFixed(0)} kg</span>
                </div>}
                <div style={{height:'6px',borderRadius:'3px',background:'#e5e7eb',overflow:'hidden',marginTop:'0.4rem'}}>
                  <div style={{height:'100%',borderRadius:'3px',background:mode.color,width:(100-mode.max)+'%',transition:'width 0.3s'}} />
                </div>
              </div>;
            })}
          </div>
        </div>}

        {/* ══════════ SECTION DIDACTIQUE (collapsible) ══════════ */}
        <div className="didactic-toggle" onClick={() => setShowDidactic(!showDidactic)}>
          <h2>Comprendre la Matière Organique</h2>
          <span className={'chevron' + (showDidactic ? ' open' : '')}>▸</span>
        </div>

        {showDidactic && <div className="didactic-content">

          {/* ── Kirkby accordion ── */}
          <div className="mo-card">
            <h2>La formule de Kirkby et les fondamentaux</h2>
            {DATA.kirkby.map((k, i) =>
              <div key={i} style={{marginBottom:'0.5rem'}}>
                <button onClick={() => setShowKirkby(showKirkby === i ? null : i)}
                  style={{width:'100%',textAlign:'left',padding:'0.5rem 0.6rem',borderRadius:'8px',border:'none',background:showKirkby===i?'#f1f5f9':'transparent',cursor:'pointer',transition:'background 0.15s'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span style={{fontSize:'0.85rem',fontWeight:500,color:'#334155'}}>{k.titre}</span>
                    <span style={{color:'#94a3b8',fontSize:'0.8rem'}}>{showKirkby === i ? '▾' : '▸'}</span>
                  </div>
                </button>
                {showKirkby === i && <div style={{padding:'0.5rem 0.6rem',fontSize:'0.8rem',color:'#475569',lineHeight:1.6,whiteSpace:'pre-line'}}>
                  {k.contenu}
                  {k.donnees && k.section === 'formule' && <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'0.5rem',marginTop:'0.5rem'}}>
                    {Object.entries(k.donnees).map(([el, val]) =>
                      <div key={el} style={{textAlign:'center',padding:'0.5rem',background:'#eff6ff',borderRadius:'8px'}}>
                        <div style={{fontSize:'1.2rem',fontWeight:700,color:'#2563eb'}}>{val}</div>
                        <div style={{fontSize:'0.72rem',color:'#60a5fa'}}>{el}</div>
                      </div>
                    )}
                  </div>}
                  {k.donnees && k.section === 'curseur' && <div style={{marginTop:'0.5rem'}}>
                    {k.donnees.zones.map((z, j) =>
                      <div key={j} style={{display:'flex',alignItems:'center',gap:'0.5rem',padding:'2px 0'}}>
                        <div style={{width:'10px',height:'10px',borderRadius:'50%',background:z.color}} />
                        <span style={{fontSize:'0.78rem'}}><strong>C/N {z.min}-{z.max}</strong> : {z.label}</span>
                      </div>
                    )}
                  </div>}
                  {k.donnees && k.section === 'sol' && <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'0.4rem',marginTop:'0.5rem'}}>
                    {Object.entries(k.donnees.seuils_mo_argile).map(([key, val]) =>
                      <div key={key} style={{textAlign:'center',padding:'0.4rem',background:'#f8fafc',borderRadius:'6px'}}>
                        <div style={{fontSize:'0.9rem',fontWeight:700}}>{val}%</div>
                        <div style={{fontSize:'0.7rem',color:'#64748b'}}>{key}</div>
                      </div>
                    )}
                  </div>}
                  {k.donnees && k.section === 'modes' && <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'0.4rem',marginTop:'0.5rem'}}>
                    {k.donnees.modes.map((mode, j) =>
                      <div key={j} style={{padding:'0.5rem',borderRadius:'8px',border:'1px solid #e2e8f0',background:'#fafafa'}}>
                        <div style={{fontWeight:600,fontSize:'0.8rem',color:'#334155'}}>{mode.nom}</div>
                        <div style={{fontSize:'0.72rem',color:'#64748b',marginTop:'2px'}}>{mode.description || mode.desc || ''}</div>
                      </div>
                    )}
                  </div>}
                </div>}
              </div>
            )}
          </div>

          {/* ── Référence : plages C/N ── */}
          <div className="mo-card">
            <h2>Référence : plages C/N</h2>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'0.5rem'}}>
              {DATA.regles.map((r, i) => <div key={i} style={{padding:'0.5rem',borderRadius:'8px',border:'1px solid '+cnColor((r.cn_min||0)+5)+'40'}}>
                <div style={{fontWeight:700,fontSize:'0.78rem',color:cnColor((r.cn_min||0)+5)}}>{r.label}</div>
                <div style={{fontSize:'0.72rem',color:'#64748b',marginTop:'2px'}}>{r.comportement}</div>
                {r.icone && <div style={{fontSize:'0.9rem',marginTop:'2px'}}>{r.icone}</div>}
              </div>)}
            </div>
          </div>

          {/* ── Caractérisation physique ── */}
          <div className="mo-card">
            <h2>Caractérisation physique ({DATA.caracterisation.length} matières)</h2>
            <p style={{fontSize:'0.75rem',color:'#94a3b8',marginBottom:'0.75rem'}}>Densité apparente, matière sèche, coût indicatif et effet sur l'autofertilité du sol.</p>
            <div style={{overflowX:'auto'}}>
              <table className="carac-table">
                <thead><tr>
                  <th>Matière</th><th style={{textAlign:'center'}}>Densité</th><th style={{textAlign:'center'}}>MS %</th>
                  <th style={{textAlign:'center'}}>C/N</th><th style={{textAlign:'center'}}>k₁ %</th>
                  <th style={{textAlign:'center'}}>Coût</th><th style={{textAlign:'center'}}>Effet</th><th>Notes</th>
                </tr></thead>
                <tbody>
                  {DATA.caracterisation.map((c, i) => <tr key={i}>
                    <td style={{fontWeight:500,color:'#334155'}}>{c.matiere}</td>
                    <td style={{textAlign:'center',color:'#64748b'}}>{c.densite}</td>
                    <td style={{textAlign:'center',color:'#64748b'}}>{c.taux_ms}</td>
                    <td style={{textAlign:'center',color:cnColor((c.cn_min+(c.cn_max||c.cn_min))/2)}}>
                      {c.cn_min === c.cn_max ? c.cn_min : c.cn_min+'–'+c.cn_max}
                    </td>
                    <td style={{textAlign:'center',color:'#2563eb'}}>{c.k1_pct || '—'}</td>
                    <td style={{textAlign:'center',color:'#64748b'}}>
                      {c.cout_min === 0 && c.cout_max === 0 ? 'Gratuit' : (c.cout_min < 0 ? 'Négatif' : c.cout_min+'–'+c.cout_max)}
                    </td>
                    <td style={{textAlign:'center'}}>
                      <span style={{color: c.effet==='+++'?'#059669':c.effet==='++'?'#10b981':'#6ee7b7',fontWeight:c.effet==='+++'?700:500}}>{c.effet}</span>
                    </td>
                    <td style={{color:'#94a3b8',fontSize:'0.72rem'}}>{c.notes || ''}{c.epaisseur ? ' ('+c.epaisseur+' cm)' : ''}</td>
                  </tr>)}
                </tbody>
              </table>
            </div>
          </div>

          
        </div>}

        {/* ── Footer ── */}
        <div style={{textAlign:'center',fontSize:'0.72rem',color:'#94a3b8',marginTop:'1.5rem',paddingBottom:'1rem'}}>
          Le Sol Vivant cet Holobionte · Calculateur MO · Données depuis sol_vivant.db · Formule de Kirkby (2016)
        </div>
      </main>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);


</script>

</body>
</html>
