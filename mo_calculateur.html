  'Résidus': '#DC2626', 'Mélange': '#2563EB', 'Sol/biomasse': '#6B7280'
};

// Parse C/N from cn_note string (e.g. "~10", "11,8", "~60")
function parseCnNote(note) {
  if (!note) return null;
  const cleaned = note.replace('~', '').replace(',', '.').trim();
  const val = parseFloat(cleaned);
  return isNaN(val) ? null : val;
}

// Get effective C/N average for a matiere, with cn_note fallback
function getCnAvg(m) {
  const min = m.cn_min;
  const max = m.cn_max;
  if (min != null && max != null) return (min + max) / 2;
  if (min != null) return min;
  if (max != null) return max;
  return parseCnNote(m.cn_note);
}

// Find matching carac data for a matiere
function findCarac(matiere) {
  return DATA.caracterisation.find(c =>
    matiere.toLowerCase().includes(c.matiere.toLowerCase().split(' ')[0]) ||
    c.matiere.toLowerCase().includes(matiere.toLowerCase().split(' ')[0])
  );
}

// Get C/N rule for a value
function getRegle(cn) {
  if (cn === null || cn === undefined || isNaN(cn)) return null;
  return DATA.regles.find(r =>
    (r.cn_min === null || cn >= r.cn_min) && (r.cn_max === null || cn <= r.cn_max)
  );
}

// Composting MO loss data (min/max as numbers for calculation)
const PERTE_COMPOSTAGE = {
  'thermophile': { perte_min: 40, perte_max: 60, label: 'Compostage thermophile', desc: 'Perte de 40 a 60 % de la MO initiale (emise en CO2). Le compost mur est stable mais represente moins de la moitie du volume initial.' },
  'lombricompost': { perte_min: 20, perte_max: 30, label: 'Lombricompostage', desc: 'Perte de 20 a 30 % de la MO. Processus plus efficient grace a l\'activite des vers.' },
  'bokashi': { perte_min: 5, perte_max: 10, label: 'Fermentation Bokashi', desc: 'Perte minimale (5-10 %) par fermentation anaerobie lactique. La MO est conservee puis se decompose au sol.' },
  'brf_direct': { perte_min: 0, perte_max: 0, label: 'BRF / Paillage direct', desc: 'Pas de perte prealable — la MO se decompose in situ. Humification maximale (k1 eleve).' },
};

function cnColor(cn) {
  if (cn < 10) return '#DC2626';
  if (cn < 15) return '#F59E0B';
  if (cn < 20) return '#10B981';
  if (cn <= 25) return '#059669';
  if (cn <= 30) return '#F59E0B';
  if (cn <= 50) return '#EA580C';
  return '#DC2626';
}

function App() {
  const [panier, setPanier] = React.useState([]);
  const [filter, setFilter] = React.useState('');
  const [catFilter, setCatFilter] = React.useState(null);

  const addMatiere = (m) => {
    if (panier.find(p => p.id === m.id)) return;
    setPanier([...panier, { ...m, qty: 100 }]);
  };

  const updateQty = (id, qty) => {
    setPanier(panier.map(p => p.id === id ? { ...p, qty: Math.max(0, qty) } : p));
  };

  const removeMatiere = (id) => {
    setPanier(panier.filter(p => p.id !== id));
  };

  // === CALCULS ===
  const totalQty = panier.reduce((s, p) => s + p.qty, 0);

  // C/N moyen pondéré (avec fallback cn_note)
  let cnGlobal = null;
  if (totalQty > 0 && panier.length > 0) {
    let sumCN = 0, sumW = 0;
    panier.forEach(p => {
      if (p.qty > 0) {
        const cn = getCnAvg(p);
        if (cn && cn > 0) { sumCN += p.qty * cn; sumW += p.qty; }
      }
    });
    cnGlobal = sumW > 0 ? sumCN / sumW : null;
  }

  // k1 moyen pondéré
  let k1Global = null;
  if (totalQty > 0) {
    let sumK1 = 0, sumW = 0;
    panier.forEach(p => {
      if (p.qty > 0 && p.k1_min) {
        const k1 = ((p.k1_min || 0) + (p.k1_max || p.k1_min || 0)) / 2;
        sumK1 += p.qty * k1; sumW += p.qty;
      }
    });
    k1Global = sumW > 0 ? sumK1 / sumW : null;
  }

  // Humus produit
  const humusKg = k1Global && totalQty ? (totalQty * k1Global / 100) : null;

  // Règle C/N
  const regle = cnGlobal ? getRegle(cnGlobal) : null;

  // Alertes
  const alertes = [];
  if (cnGlobal !== null) {
    if (cnGlobal < 10) alertes.push({ type: 'danger', text: "Minéralisation très rapide — risque de lessivage d'azote. Ajouter une source carbonée (paille, BRF)." });
    if (cnGlobal > 30 && cnGlobal <= 50) alertes.push({ type: 'warning', text: "Faim d'azote probable. Ajouter une source azotée (fumier volaille, urine, légumineuses)." });
    if (cnGlobal > 50) alertes.push({ type: 'danger', text: "Immobilisation forte de l'azote. Décomposition très lente. Compenser avec un apport N rapide." });
    if (cnGlobal >= 20 && cnGlobal <= 25) alertes.push({ type: 'success', text: "Zone optimale pour l'humification. Équilibre minéralisation/immobilisation." });
  }
  if (k1Global !== null && k1Global < 10) {
    alertes.push({ type: 'info', text: "Coefficient isohumique faible (<10%) — carbone très stable mais peu d'effet nutritif à court terme." });
  }

  // Filtrage matières
  const filtered = DATA.matieres.filter(m => {
    if (catFilter && m.categorie !== catFilter) return false;
    if (filter && !m.matiere.toLowerCase().includes(filter.toLowerCase())) return false;
    return true;
  });

  return <div className="max-w-6xl mx-auto px-4 py-8">
    <div className="text-center mb-8">
      <h1 className="text-3xl font-bold text-gray-800">Calculateur Matière Organique</h1>
      <p className="text-gray-500 mt-2">Sélectionnez des matières, ajustez les quantités, obtenez le C/N global et le taux d'humification</p>
      <p className="text-xs text-gray-400 mt-1">Données : {DATA.matieres.length} matières · {DATA.caracterisation.length} caractérisations · {DATA.regles.length} règles d'interprétation</p>
    </div>

    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">

      {/* === COLONNE GAUCHE : Sélecteur === */}
      <div className="lg:col-span-1">
        <div className="card">
          <h2 className="font-bold text-gray-800 mb-3">Matières disponibles</h2>
          <input type="text" placeholder="Filtrer..." value={filter} onChange={e => setFilter(e.target.value)}
            className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm mb-3 focus:outline-none focus:border-blue-400" />
          <div className="flex flex-wrap gap-1 mb-3">
            <button onClick={() => setCatFilter(null)}
              className={`text-xs px-2 py-1 rounded-full ${!catFilter ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>Tout</button>
            {CATEGORIES.map(c => <button key={c} onClick={() => setCatFilter(catFilter === c ? null : c)}
              className={`text-xs px-2 py-1 rounded-full ${catFilter === c ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>{c}</button>)}
          </div>
          <div className="max-h-96 overflow-y-auto space-y-1">
            {filtered.map(m => {
              const inPanier = panier.find(p => p.id === m.id);
              const cnAvg = getCnAvg(m);
              return <div key={m.id} onClick={() => !inPanier && addMatiere(m)}
                className={`p-2 rounded-lg text-sm cursor-pointer transition ${inPanier ? 'bg-green-50 border border-green-200' : 'hover:bg-gray-50 border border-transparent'}`}>
                <div className="flex justify-between items-center">
                  <span className="font-medium text-gray-700">{m.matiere}</span>
                  <span className="text-xs text-gray-400">C/N {cnAvg > 0 ? cnAvg.toFixed(0) : '?'}</span>
                </div>
                <div className="flex gap-2 mt-0.5">
                  <span className={`badge cat-${m.categorie}`}>{m.categorie}</span>
                  {m.k1_min && <span className="text-xs text-gray-400">k1: {m.k1_min}-{m.k1_max}%</span>}
                </div>
              </div>;
            })}
          </div>
        </div>
      </div>

      {/* === COLONNE DROITE : Panier + Résultats === */}
      <div className="lg:col-span-2 space-y-4">

        {/* Panier */}
        <div className="card">
          <h2 className="font-bold text-gray-800 mb-3">Mélange ({panier.length} matière{panier.length !== 1 ? 's' : ''} · {totalQty} kg)</h2>
          {panier.length === 0 && <p className="text-gray-400 text-sm italic">Cliquez sur une matière à gauche pour l'ajouter au mélange</p>}
          {panier.map(p => {
            const cnAvg = getCnAvg(p) || 0;
            const pct = totalQty > 0 ? (p.qty / totalQty * 100).toFixed(0) : 0;
            return <div key={p.id} className="flex items-center gap-3 py-2 border-b border-gray-100 last:border-0">
              <button onClick={() => removeMatiere(p.id)} className="text-red-400 hover:text-red-600 text-lg leading-none">&times;</button>
              <div className="flex-1 min-w-0">
                <div className="text-sm font-medium text-gray-700 truncate">{p.matiere}</div>
                <div className="text-xs text-gray-400">C/N {cnAvg.toFixed(0)} · k1 {p.k1_min || '?'}-{p.k1_max || '?'}% · {pct}%</div>
              </div>
              <div className="flex items-center gap-2">
                <input type="range" min="0" max="1000" step="10" value={p.qty}
                  onChange={e => updateQty(p.id, parseInt(e.target.value))}
                  className="w-24" />
                <input type="number" min="0" max="10000" value={p.qty}
                  onChange={e => updateQty(p.id, parseInt(e.target.value) || 0)}
                  className="w-16 text-right text-sm border border-gray-200 rounded px-2 py-1" />
                <span className="text-xs text-gray-400">kg</span>
              </div>
            </div>;
          })}
        </div>

        {/* Résultats */}
        {panier.length > 0 && <div className="card">
          <h2 className="font-bold text-gray-800 mb-4">Résultats du mélange</h2>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
            <div className="text-center p-3 bg-gray-50 rounded-lg">
              <div className="text-2xl font-bold" style={{color: cnGlobal ? cnColor(cnGlobal) : '#999'}}>{cnGlobal ? cnGlobal.toFixed(1) : '—'}</div>
              <div className="text-xs text-gray-500 mt-1">C/N global</div>
            </div>
            <div className="text-center p-3 bg-gray-50 rounded-lg">
              <div className="text-2xl font-bold text-blue-600">{k1Global ? k1Global.toFixed(0) + '%' : '—'}</div>
              <div className="text-xs text-gray-500 mt-1">k1 humification</div>
            </div>
            <div className="text-center p-3 bg-gray-50 rounded-lg">
              <div className="text-2xl font-bold text-green-700">{humusKg ? humusKg.toFixed(0) + ' kg' : '—'}</div>
              <div className="text-xs text-gray-500 mt-1">Humus stable / t</div>
            </div>
            <div className="text-center p-3 bg-gray-50 rounded-lg">
              <div className="text-2xl font-bold text-gray-700">{totalQty} kg</div>
              <div className="text-xs text-gray-500 mt-1">Masse totale</div>
            </div>
          </div>

          {/* Jauge C/N */}
          {cnGlobal && <div className="mb-4">
            <div className="flex justify-between text-xs text-gray-400 mb-1">
              <span>Minéralisation rapide</span>
              <span>Zone optimale</span>
              <span>Immobilisation</span>
            </div>
            <div className="relative h-3 rounded-full bg-gradient-to-r from-red-400 via-yellow-400 via-green-500 via-yellow-400 to-red-400">
              <div className="absolute top-0 w-1 h-3 bg-gray-800 rounded"
                style={{left: `${Math.min(100, Math.max(0, cnGlobal / 100 * 100))}%`}}></div>
            </div>
            <div className="flex justify-between text-xs text-gray-300 mt-0.5">
              <span>0</span><span>10</span><span>20</span><span>30</span><span>50</span><span>100</span>
            </div>
          </div>}

          {/* Interprétation */}
          {regle && <div className="p-3 bg-gray-50 rounded-lg mb-4">
            <div className="font-bold text-sm" style={{color: cnColor(cnGlobal)}}>{regle.comportement}</div>
            <div className="text-sm text-gray-600">{regle.interpretation}</div>
            <div className="text-xs text-gray-400 mt-1">Plage C/N : {regle.label}</div>
          </div>}

          {/* Alertes */}
          {alertes.map((a, i) => <div key={i} className={`p-3 rounded-lg mb-2 text-sm ${
            a.type === 'danger' ? 'bg-red-50 text-red-700 border border-red-200' :
            a.type === 'warning' ? 'bg-amber-50 text-amber-700 border border-amber-200' :
            a.type === 'success' ? 'bg-green-50 text-green-700 border border-green-200' :
            'bg-blue-50 text-blue-700 border border-blue-200'
          }`}>
            {a.type === 'danger' ? '⚠' : a.type === 'warning' ? '⚡' : a.type === 'success' ? '✓' : 'ℹ'} {a.text}
          </div>)}

          {/* Ratio de Kirkby */}
          {cnGlobal && cnGlobal >= 15 && cnGlobal <= 30 && <div className="p-3 bg-purple-50 rounded-lg text-sm">
            <div className="font-medium text-purple-800 mb-1">Ratio de Kirkby (pour 1 tonne de C stabilisé)</div>
            <div className="text-purple-700">83 kg N + 20 kg P + 14 kg S nécessaires. Si l'un manque, le carbone est minéralisé au lieu d'être stabilisé.</div>
          </div>}
        </div>}

        {/* Perte de MO au compostage */}
        {panier.length > 0 && <div className="card">
          <h2 className="font-bold text-gray-800 mb-3">Perte de MO selon le mode de transformation</h2>
          <p className="text-xs text-gray-500 mb-3">Le compostage transforme la MO brute en humus stable, mais une partie est perdue sous forme de CO₂. Le mode de transformation influence fortement le rendement final.</p>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            {Object.values(PERTE_COMPOSTAGE).map((p, i) => {
              const isThermo = p.label.includes('thermophile');
              const perteLabel = p.perte_min === p.perte_max ? p.perte_min + ' %' : p.perte_min + '–' + p.perte_max + ' %';
              const rendMin = 100 - p.perte_max;
              const rendMax = 100 - p.perte_min;
              const humusMin = humusKg ? (humusKg * rendMin / 100).toFixed(0) : null;
              const humusMax = humusKg ? (humusKg * rendMax / 100).toFixed(0) : null;
              return <div key={i} className={`p-3 rounded-lg border text-sm ${isThermo ? 'border-orange-300 bg-orange-50' : 'border-gray-200 bg-gray-50'}`}>
                <div className="flex justify-between items-center mb-1">
                  <span className={`font-bold ${isThermo ? 'text-orange-700' : 'text-gray-700'}`}>{p.label}</span>
                  <span className={`badge ${p.perte_max > 30 ? 'bg-red-100 text-red-700' : p.perte_max > 10 ? 'bg-amber-100 text-amber-700' : 'bg-green-100 text-green-700'}`}>
                    Perte : {perteLabel}
                  </span>
                </div>
                <div className="text-gray-600 text-xs">{p.desc}</div>
                {humusMin && <div className="mt-2 text-xs font-medium text-gray-700">
                  Humus estime : {humusMin === humusMax ? '~' + humusMin : humusMin + '–' + humusMax} kg <span className="text-gray-400">(sur {totalQty} kg brut, rendement {rendMin === rendMax ? rendMin : rendMin + '–' + rendMax} %)</span>
                </div>}
              </div>;
            })}
          </div>
        </div>}

        {/* Référence rapide */}
        <div className="card">
          <h2 className="font-bold text-gray-800 mb-3">Reference : plages C/N</h2>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
            {DATA.regles.map((r, i) => <div key={i} className="p-2 rounded-lg border text-xs" style={{borderColor: cnColor((r.cn_min || 0) + 5)}}>
              <div className="font-bold" style={{color: cnColor((r.cn_min || 0) + 5)}}>{r.label}</div>
              <div className="text-gray-500 mt-0.5">{r.comportement}</div>
            </div>)}
          </div>
        </div>

        {/* Caractérisation physique des matières */}
        <div className="card">
          <h2 className="font-bold text-gray-800 mb-3">Caracterisation physique ({DATA.caracterisation.length} matieres)</h2>
          <p className="text-xs text-gray-500 mb-3">Densite apparente, matiere seche, cout indicatif et effet sur l'autofertilite du sol.</p>
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead>
                <tr className="border-b border-gray-200 text-left text-gray-500">
                  <th className="py-1.5 pr-2">Matiere</th>
                  <th className="py-1.5 px-2 text-center">Densite</th>
                  <th className="py-1.5 px-2 text-center">MS %</th>
                  <th className="py-1.5 px-2 text-center">C/N</th>
                  <th className="py-1.5 px-2 text-center">k1 %</th>
                  <th className="py-1.5 px-2 text-center">Cout</th>
                  <th className="py-1.5 px-2 text-center">Effet</th>
                  <th className="py-1.5 pl-2">Notes</th>
                </tr>
              </thead>
              <tbody>
                {DATA.caracterisation.map((c, i) => <tr key={i} className="border-b border-gray-50 hover:bg-gray-50">
                  <td className="py-1.5 pr-2 font-medium text-gray-700">{c.matiere}</td>
                  <td className="py-1.5 px-2 text-center text-gray-600">{c.densite}</td>
                  <td className="py-1.5 px-2 text-center text-gray-600">{c.taux_ms}</td>
                  <td className="py-1.5 px-2 text-center" style={{color: cnColor((c.cn_min + (c.cn_max || c.cn_min)) / 2)}}>
                    {c.cn_min === c.cn_max ? c.cn_min : c.cn_min + '–' + c.cn_max}
                  </td>
                  <td className="py-1.5 px-2 text-center text-blue-600">{c.k1_pct || '—'}</td>
                  <td className="py-1.5 px-2 text-center text-gray-600">
                    {c.cout_min === 0 && c.cout_max === 0 ? 'Gratuit' : (c.cout_min < 0 ? 'Negatif' : c.cout_min + '–' + c.cout_max)}
                  </td>
                  <td className="py-1.5 px-2 text-center">
                    <span className={`${c.effet === '+++' ? 'text-green-700 font-bold' : c.effet === '++' ? 'text-green-600' : 'text-green-500'}`}>{c.effet}</span>
                  </td>
                  <td className="py-1.5 pl-2 text-gray-400">{c.notes || ''}{c.epaisseur ? ' (' + c.epaisseur + ' cm)' : ''}</td>
                </tr>)}
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>

    <footer className="text-center text-xs text-gray-400 mt-8 pb-4">
      Le Sol Vivant cet Holobionte · Calculateur MO · Données depuis sol_vivant.db
    </footer>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
