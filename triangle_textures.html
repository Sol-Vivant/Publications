_test_dinfiltration": {"title": "Test d’infiltration", "description": "Mesure du temps nécessaire à l’eau pour pénétrer dans le sol afin d’évaluer la porosité fonctionnelle et le risque de ruissellement."}, "t05_test_de_stabilite_des_agregats": {"title": "Test de stabilité des agrégats", "description": "Observation de la résistance des mottes du sol à la désagrégation dans l’eau, indicateur de sensibilité à l’érosion."}, "t06_test_de_battance": {"title": "Test de battance", "description": "Observation de la formation de croûtes de surface après mouillage ou pluie simulée."}, "t07_comptage_des_vers_de_terre": {"title": "Comptage des vers de terre", "description": "Dénombrement des lombrics pour estimer l’activité biologique et la structuration naturelle du sol."}, "t08_test_racinaire": {"title": "Test racinaire", "description": "Observation de la profondeur, de la densité et de l’orientation des racines pour diagnostiquer compaction et fertilité fonctionnelle."}, "t09_test_olfactif_du_sol": {"title": "Test olfactif du sol", "description": "Évaluation de l’odeur du sol pour détecter fermentation, putréfaction ou asphyxie."}, "t10_test_de_couleur_du_sol": {"title": "Test de couleur du sol", "description": "Observation visuelle de la couleur du sol pour inférer matière organique, hydromorphie ou oxydation."}, "t11_test_de_portance": {"title": "Test de portance", "description": "Appréciation de la résistance du sol au tassement sous une charge légère."}, "t12_test_de_friabilite": {"title": "Test de friabilité", "description": "Évaluation de la facilité avec laquelle le sol se fragmente entre les doigts."}, "t13_test_de_croute_de_surface": {"title": "Test de croûte de surface", "description": "Observation de la présence et de l’épaisseur de croûtes limitant les échanges sol–air–eau."}, "t14_test_dhumidite_au_toucher": {"title": "Test d’humidité au toucher", "description": "Appréciation manuelle de l’état hydrique du sol."}, "t15_test_de_respiration_du_sol_simplifie": {"title": "Test de respiration du sol (simplifié)", "description": "Estimation de l’activité biologique par dégagement de CO₂ dans un dispositif simple."}, "t16_test_de_decomposition_des_residus": {"title": "Test de décomposition des résidus", "description": "Observation de la vitesse de dégradation de résidus organiques enfouis ou en surface."}, "t17_test_de_couverture_du_sol": {"title": "Test de couverture du sol", "description": "Évaluation visuelle de la proportion du sol protégée par des résidus ou couverts végétaux."}, "t18_test_de_compactage_a_la_tige": {"title": "Test de compactage à la tige", "description": "Enfoncement manuel d’une tige pour détecter des couches compactées."}, "t19_test_de_ruissellement": {"title": "Test de ruissellement", "description": "Observation du comportement de l’eau en surface après pluie ou arrosage."}, "t20_test_de_biodiversite_visible": {"title": "Test de biodiversité visible", "description": "Observation globale de la faune et flore du sol visibles à l’œil nu."}}, "cards": [{"id": 11, "title": "Profil sol sableux : aération élevée, apports fractionnés, dynamique MO rapide", "description": "Sol sableux : faible CEC et réserve utile ; aération forte. Compatible avec apports fermentés si fractionnés ; attention à la minéralisation rapide.", "scope_ref": "soil_type:SAND", "docs_codes": ["S1", "S0"]}, {"id": 12, "title": "Profil sol argileux : potentiel élevé mais risques redox si enfouissement et excès d'eau", "description": "Sol argileux : potentiel d’agrégation élevé (Ca + biofilms/EPS), mais risque de réduction profonde/anoxie si enfouissement + excès matière réduite + saturation.", "scope_ref": "soil_type:CLAY", "docs_codes": ["S1", "S4", "S0"]}, {"id": 13, "title": "Profil sol limoneux : battance/érosion, priorité couverture et biofilms de surface", "description": "Sol limoneux : structure fragile ; battance/ruissellement si sol nu. Priorité à couverture permanente, apports de surface et consolidation biologique.", "scope_ref": "soil_type:SILT", "docs_codes": ["S1", "S0"]}, {"id": 14, "title": "Profil sol calcaire/argilo-calcaire : calcium structurant, risques de blocages P/oligo", "description": "Sol calcaire : calcium structurant (floculation), porosité durable ; attention aux blocages P et oligo-éléments (soufre/bore) qui impactent métabolismes & symbioses.", "scope_ref": "soil_type:CALC", "docs_codes": ["S1", "S4"]}, {"id": 15, "title": "Profil sol hydromorphe/organique : redox bas, émissions, gestion de l’eau centrale", "description": "Sol hydromorphe/organique : redox bas fréquent ; risques N2O/CH4 et toxicités (Fe/Mn réduits). Éviter apports réduits enfouis ; gérer l’eau et la continuité racinaire.", "scope_ref": "soil_type:HYDRO", "docs_codes": ["S1", "S0", "S4"]}, {"id": 16, "title": "Profil sol 'franc' (loam) : effets intermédiaires, sensibilité au travail du sol", "description": "Sol loam : bon compromis texture ; répond bien aux apports réguliers et couverts ; sensible aux perturbations mécaniques qui cassent habitats/biofilms.", "scope_ref": "soil_type:LOAM", "docs_codes": ["S1"]}], "terms": [{"fr": "Adsorption", "en": "adsorption", "definition": "Fixation réversible de molécules ou d'ions à la surface des colloïdes du sol (argiles, oxydes Fe/Al, MO) par forces électrostatiques, liaisons hydrogène ou interactions hydrophobes. L'adsorption contrôle la rétention des cations nutritifs (CEC), l'immobilisation du phosphate sur les oxydes Fe/Al et la stabilisation de la MO sur les surfaces minérales (MAOM). La matière organique augmente l'adsorption par sa charge négative et sa surface spécifique élevée. Gérer l'adsorption par le pH et la MO optimise la disponibilité nutritive.", "doc_code": "S1/S4", "strate": "S"}, {"fr": "CEC", "en": "CEC", "definition": "Capacité d'échange cationique. Quantité de cations (Ca²⁺, Mg²⁺, K⁺, Na⁺, H⁺) qu'un sol peut retenir sur ses sites d'échange (argiles, MO). Exprimée en cmol+/kg.", "doc_code": "S1", "strate": "S"}, {"fr": "Capacité d’Échange Cationique", "en": "Cation Exchange Capacity (CEC)", "definition": "Mesure de la quantité totale de cations (Ca²⁺, Mg²⁺, K⁺, NH₄⁺) qu'un sol peut retenir sur son complexe argilo-humique (Oursin, 2021). Elle dépend de la nature des argiles et, de manière critique, du taux de matière organique, dont la CEC est environ 10 fois supérieure à celle des argiles (Pellerin, Bamière, Savini, Rechauchère, et al., 2021; Pellerin, Bamière, Savini, Réchauchère, et al., 2021).\n\nEnjeu : Un sol avec une faible CEC est vulnérable au lessivage des nutriments, ce qui augmente les risques environnementaux et les coûts d'intrants (Nivelle, 2017).\n\nLevier de décision : En sols sableux (faible CEC minérale), l'augmentation du taux d'humus est le seul levier pour augmenter le \"réservoir\" de nutriments et limiter les pertes par lixiviation (Pellerin et al., 2021).", "doc_code": "S1", "strate": "S"}, {"fr": "Complexe Argilo-Humique (CAH)", "en": "organo-mineral complex", "definition": "Association intime argiles-humus stabilisée par des ponts cationiques bivalents (Ca²⁺, Mg²⁺) et des liaisons de coordination. Siège de la CEC et de la structure physique du sol. Le CAH protège la matière organique de la minéralisation rapide et détermine la stabilité des agrégats. Un sol à CAH bien développé (limon+argile+MO>3%) allie fertilité chimique, structure physique et résilience hydrique. Le labour détruit mécaniquement le CAH en fractionnant les agrégats organo-minéraux.", "doc_code": "S1", "strate": "S"}, {"fr": "Haber-Bosch", "en": "Haber-Bosch process", "definition": "Procédé industriel de synthèse de l'ammoniac (N₂+H₂→NH₃) à haute pression et température (1913). Consomme 1-2% de l'énergie mondiale (Robertson & Groffman, 2014). Responsable de la rupture des cycles naturels de l'azote et de la dépendance aux énergies fossiles. Levier : 30-40% de légumineuses en rotation pour court-circuiter ce procédé. Connexion Loi de la Trophobiose : l'azote Haber-Bosch favorise un excès d'acides aminés libres dans la sève, rendant les plantes vulnérables aux ravageurs.", "doc_code": "F2", "strate": "F"}, {"fr": "Illite", "en": "illite", "definition": "Argile micacée 2:1 non gonflante, intermédiaire entre micas et smectites. CEC modérée (15-40 cmol+/kg), source progressive de potassium structural par altération des bords des feuillets. Dominante dans les sols tempérés modérément altérés. Sa présence offre un équilibre favorable entre stabilité structurale et fertilité potassique. L'activité microbienne mobilise progressivement le K structural des illites — service écosystémique annulé par le recours au K soluble.", "doc_code": "S1", "strate": "S"}, {"fr": "Kaolinite", "en": "kaolinite", "definition": "Argile 1:1 stable, non gonflante, à faible CEC (3-15 cmol+/kg) et surface spécifique réduite. Caractéristique des sols tropicaux et subtropicaux fortement altérés et lessivés. Sa faible capacité de rétention nutritive impose des apports organiques élevés pour compenser les limitations minéralogiques. En ACS sur sols kaolinitiques : maximiser les apports de MO et l'activité biologique pour créer une fertilité par voie biologique.", "doc_code": "S1", "strate": "S"}, {"fr": "MAOM", "en": "mineral-associated organic matter", "definition": "Carbone organique d'origine microbienne associé et stabilisé aux surfaces des argiles et des oxydes Fe/Al. Fraction stable du sol (temps de résidence > 100 ans). Formée par précipitation de métabolites microbiens et de fragments de nécromasse sur les surfaces minérales. Complémentaire du POC (fraction labile). Le MAOM est le pool cible du carbon farming.", "doc_code": "S2/S4", "strate": "S"}, {"fr": "RothC", "en": "RothC model", "definition": "Modèle mécaniste de dynamique du carbone organique du sol développé à Rothamsted Research (Coleman & Jenkinson, 1996). Divise la MO en 5 pools : DPM (décomposable), RPM (résistante), BIO (biomasse microbienne), HUM (humus), IOM (inerte). Les transferts entre pools suivent des cinétiques du premier ordre modulées par température, humidité et couverture. Outil de référence pour certifier les crédits carbone agricoles. Entrées nécessaires : COS initial, pluviométrie, ETP, type de sol, apports de MO. Disponible en open source.", "doc_code": "S4", "strate": "S"}, {"fr": "Surface spécifique", "en": "specific surface area", "definition": "Aire totale des surfaces colloïdales par unité de masse (m²/g). Détermine la capacité d'adsorption, la rétention d'eau et la création de microhabitats microbiens. Varie de 1-10 m²/g (sables) à 10-40 m²/g (kaolinite), 80-120 m²/g (illite) et 600-800 m²/g (smectites). La MO humifiée atteint 800-900 m²/g. La surface spécifique active — argiles + MO — est l'indicateur physico-chimique le plus direct de la fertilité potentielle d'un sol.", "doc_code": "S1", "strate": "S"}, {"fr": "altération minérale", "en": "mineral weathering", "definition": "Dégradation des roches par processus physiques, chimiques et biologiques. Source primaire des argiles et du phosphore.", "doc_code": "F1", "strate": "F"}, {"fr": "biofilm comme système hydraulique", "en": "biofilm as water management system", "definition": "Le biofilm bactérien est la première technologie de rétention d'eau de l'histoire de la vie (4 Ga). Matrice d'EPS composée à 97% d'eau structurée, protégée de l'évaporation. Sur une surface minérale (argile, sable, roche), le biofilm CRÉE son propre environnement hydrique. C'est le fondement de la rétention d'eau dans les micropores et le premier maillon de la microagrégation (EPS + argile = premier micro-agrégat, bien avant les champignons).", "doc_code": "S2", "strate": "S"}, {"fr": "capacité au champ", "en": "field capacity", "definition": "Teneur en eau maximale retenue après ressuyage gravitaire (pF 2.5, -33 kPa). Limite supérieure de la réserve utile. Dépend de la texture, structure et MO du sol.", "doc_code": "S0", "strate": "S"}, {"fr": "coefficient de minéralisation", "en": "mineralization coefficient", "definition": "Taux annuel K de minéralisation du carbone actif du sol. Dépend de la température, pH, argile, C:N, bilan hydrique.", "doc_code": "S4", "strate": "S"}, {"fr": "complexe organo-minéral", "en": "organo-mineral complex", "definition": "Association entre matière organique et particules minérales (argile, limon) protégeant le carbone de la minéralisation.", "doc_code": "S1", "strate": "S"}, {"fr": "conductivité hydraulique", "en": "hydraulic conductivity", "definition": "Capacité du sol à transmettre l'eau sous l'effet d'un gradient de potentiel (loi de Darcy). Dépend de la texture, de la structure et de la macroporosité biologique. Unité : mm/h ou cm/jour.", "doc_code": "S0", "strate": "S"}, {"fr": "conductivité hydraulique saturée", "en": "saturated hydraulic conductivity", "definition": "Vitesse maximale d'écoulement de l'eau dans un sol saturé (Ksat), exprimée en mm/h. Détermine la capacité d'infiltration et le risque de ruissellement. Varie de 0,01 mm/h (argile compacte) à >1 000 mm/h (sol biologique actif). Les macropores biologiques (galeries de vers anéciques, biopores racinaires) contribuent à 90% du flux malgré <5% du volume. L'activité biologique peut multiplier Ksat par 100 par rapport à un sol nu compacté.", "doc_code": "S0/V1/P2", "strate": "S"}, {"fr": "densité apparente", "en": "bulk density", "definition": "Masse de sol sec par unité de volume (g/cm³). Indicateur direct de la compaction. Sol sain : 0,9–1,3 g/cm³ ; sol compacté : >1,5 g/cm³ pour un limon.", "doc_code": "S1", "strate": "S"}, {"fr": "endogés", "en": "endogeic earthworms", "definition": "Vers géophages vivant dans les horizons minéraux (5-40 cm), se nourrissant de la MO incorporée aux argiles. Créent des galeries horizontales non permanentes. Indicateurs d'une bonne agrégation biologique des horizons de labour.", "doc_code": "V1", "strate": "V"}, {"fr": "faux plat du rendement", "en": "yield plateau", "definition": "Phase de la trajectoire de régénération (MO/Argile 17-24%) où le rendement stagne ou baisse alors que le carbone du sol augmente rapidement. Cause : les micro-organismes Y (forte CUE) captent N, P, S pour construire l'humus avant la plante. Le gain C est proportionnel à la baisse de rendement (Kirkby). Levier : fertilisation foliaire pour nourrir la plante sans alimenter la compétition microbienne.", "doc_code": "S4", "strate": "S"}, {"fr": "horizon pédologique", "en": "soil horizon", "definition": "Couche de sol relativement homogène, parallèle à la surface, différenciée par sa couleur, texture, structure et composition. Horizons principaux : O (litière), A (organo-minéral), B (accumulation), C (altération roche-mère).", "doc_code": "S1", "strate": "S"}, {"fr": "micro-agrégat", "en": "micro-aggregate", "definition": "Unité fonctionnelle du sol de 20–250 µm, stabilisée par la nécromasse microbienne, les EPS et les argiles. Protège le carbone organique de la décomposition (MAOM). Sa formation dépend de la diversité microbienne et de la présence de calcium.", "doc_code": "S1/S2", "strate": "S"}, {"fr": "montmorillonite (smectite)", "en": "montmorillonite (smectite)", "definition": "Argile 2:1 gonflante à très forte CEC (80–120 cmol+/kg) et surface spécifique (600–800 m²/g). Responsable du retrait-gonflement des sols. Capacité de fixation des cations et de l'eau interfoliaire.", "doc_code": "S1", "strate": "S"}, {"fr": "point de flétrissement permanent", "en": "permanent wilting point", "definition": "Teneur en eau à pF 4.2 (-1.5 MPa) en dessous de laquelle les plantes ne peuvent plus extraire l eau. Limite inférieure de la réserve utile. Dépend principalement de la texture argileuse.", "doc_code": "S0", "strate": "S"}, {"fr": "ratio C/Argile", "en": "carbon-to-clay ratio", "definition": "Rapport C organique/argile. Seuils Husson/Boivin : <12% dégradé, 17% limite, >24% bonne structure.", "doc_code": "P1/S1/P5", "strate": "P"}, {"fr": "ratio Carbone/Argile (C/Argile)", "en": "Carbon-to-Clay ratio (C/Clay)", "definition": "Proxy de l'état structural du sol (Husson, CIRAD). MO/Argile > 24% (ou C/Argile > 1/8) = sol bien structuré (Zone 1). 17-24% = zone de transition avec faux plat du rendement (Zone 2). 12-17% = seuil critique de déstructuration (Zone 3). < 12% = sol effondré (Zone 4). Corrélé au score VESS. Utilisable comme indicateur de pilotage de la régénération.", "doc_code": "S4", "strate": "S"}, {"fr": "réserve utile", "en": "plant available water capacity", "definition": "Volume d'eau retenu dans le sol entre la capacité au champ (pF 2,5) et le point de flétrissement permanent (pF 4,2), disponible pour les plantes. Exprimée en mm/m de sol. Dépend de la texture (argiles > limons > sables), de la teneur en MO et de la profondeur du profil exploité par les racines. La RU d'un sol régénératif augmente avec le stock de MO : chaque point de MO supplémentaire accroît la RU d'environ 2 mm/m.", "doc_code": "S0/S1", "strate": "S"}, {"fr": "saturation en carbone du sol", "en": "soil carbon saturation", "definition": "Capacité maximale d un sol à stocker du carbone stable (MAOM). Dépend de la surface spécifique des minéraux argileux et de la CEC. Au-delà de la saturation, le C supplémentaire reste en POC labile.", "doc_code": "S4", "strate": "S"}, {"fr": "test de sédimentation (test bocal)", "en": "jar sedimentation test", "definition": "Mise en suspension du sol dans l'eau pour estimer les proportions de sable (décante en 30s), limon (2h) et argile (24h). Méthode terrain rapide pour évaluer la texture et adapter les recommandations (CEC, RU, risque de battance).", "doc_code": "P1", "strate": "P"}, {"fr": "test ficelle GEPPA", "en": "GEPPA ribbon test", "definition": "Test de terrain du Groupe d'Étude Pour les Problèmes de Pédologie Appliquée pour estimer la teneur en argile du sol. Humidifier une poignée de terre et former un boudin de 5-10 cm : s'il peut être courbé en anneau sans se rompre → > 18% d'argile. La plasticité et la cohésion orientent l'adaptation des pratiques (travail du sol, amendements). Gratuit, immédiat, accessible à tous les agriculteurs.", "doc_code": "P1", "strate": "P"}, {"fr": "texture", "en": "texture", "definition": "Proportions de sable, limon et argile. Détermine rétention d'eau, CEC, porosité. Test bocal ou granulométrie laser.", "doc_code": "P1", "strate": "P"}, {"fr": "texture du sol", "en": "soil texture", "definition": "Proportion relative de sable (2–0,05 mm), limon (0,05–0,002 mm) et argile (<0,002 mm) dans la terre fine. Propriété permanente du sol qui détermine sa capacité de rétention d'eau, sa CEC et son comportement mécanique.", "doc_code": "S1", "strate": "S"}], "rules": [{"id": 3, "rule_name": "Compatibilité sol sableux", "condition_text": "Sol sableux + forte aération", "action_text": "Favoriser fermentation et apports fractionnés", "confidence": 0.9}, {"id": 4, "rule_name": "Risque asphyxie sol argileux", "condition_text": "Sol argileux + excès matière réduite + enfouissement", "action_text": "Limiter profondeur d'incorporation", "confidence": 0.9}, {"id": 11, "rule_name": "Compatibilité sol argileux", "condition_text": "CEC élevée + forte rétention eau", "action_text": "Fractionner apports fermentés, calcium actif", "confidence": 0.91}, {"id": 12, "rule_name": "Optimisation sol sableux", "condition_text": "Faible CEC + forte aération", "action_text": "Multiplier apports fermentés légers et couverture", "confidence": 0.9}, {"id": 14, "rule_name": "Calcium structurant prioritaire", "condition_text": "Sol argileux ou limono-argileux", "action_text": "Assurer calcium échangeable fonctionnel", "confidence": 0.92}, {"id": 23, "rule_name": "Zone Husson 1 — Sol autonome (C/Argile > 24%)", "condition_text": "Ratio C/Argile > 24%. Sol biologiquement mature, CUE élevée, stratégie Y dominante.", "action_text": "Entretien : couverts permanents, zéro travail du sol, restitution résidus. Pas d'apports massifs. Surveillance ratio F/B (objectif > 0.8).", "confidence": 0.95}, {"id": 24, "rule_name": "Zone Husson 2 — Transition avancée (C/Argile 17-24%)", "condition_text": "Ratio C/Argile entre 17% et 24%. Faux plat du rendement : les micro-organismes captent N,P,S pour construire l'humus AVANT la plante.", "action_text": "Patience : le faux plat N'EST PAS un échec. Maintenir couverts diversifiés, bokashi régulier, éviter l'impatience chimique. Gain C proportionnel à l'effort.", "confidence": 0.95}, {"id": 25, "rule_name": "Zone Husson 3 — Construction MO (C/Argile 12-17%)", "condition_text": "Ratio C/Argile entre 12% et 17%. Sol en construction, stratégie A dominante, CUE moyenne.", "action_text": "Couverts obligatoires multi-espèces (10-12 sp.), apports fermentés réguliers (bokashi, LiFoFer), stœchiométrie C/N surveillée. Objectif +0,1% MO/an.", "confidence": 0.95}, {"id": 26, "rule_name": "Zone Husson 4 — Urgence (C/Argile < 12%)", "condition_text": "Ratio C/Argile < 12%. Sol biologiquement appauvri, stratégie S dominante, CUE faible, risque priming effect maximal.", "action_text": "Apports massifs MO externe (compost, BRF), couvert permanent, AUCUN travail du sol, inoculation ciblée (PGPR, CMA). Patience 3-5 ans minimum. ATTENTION priming effect Phase 1.", "confidence": 0.95}], "cadre_texture": {"id": 3, "title": "Types de sols et comportements différenciés", "description": "Cadre : mêmes apports et mêmes pratiques → effets différents selon texture (sable/limon/argile), minéralogie, calcaire, hydromorphie. Les règles de diagnostic doivent être filtrées par type de sol."}, "corpus_name": "Le Sol Vivant cet Holobionte", "strate_colors": {"F": "#8B5CF6", "S": "#3B82F6", "V": "#10B981", "P": "#F59E0B", "H": "#EF4444"}, "generated": "2026-04-04 11:13"};

<script type="text/babel">



const POLYGONS = {"SS": [[0, 0, 100], [0, 15, 85], [5, 10, 85], [5, 0, 95]], "S": [[5, 0, 95], [5, 10, 85], [0, 15, 85], [0, 20, 80], [10, 10, 80], [10, 0, 90]], "SL": [[0, 20, 80], [0, 50, 50], [15, 20, 65], [10, 10, 80]], "SA": [[10, 0, 90], [10, 10, 80], [15, 20, 65], [17.5, 30, 52.5], [25, 30, 45], [25, 0, 75]], "LS": [[0, 50, 50], [0, 65, 35], [12.5, 50, 37.5], [17.5, 50, 32.5], [17.5, 30, 52.5], [15, 20, 65]], "L": [[0, 65, 35], [0, 80, 20], [12.5, 80, 7.5], [20, 65, 15], [20, 45, 35], [17.5, 50, 32.5], [12.5, 50, 37.5]], "LL": [[0, 80, 20], [0, 100, 0], [10, 90, 0], [25, 75, 0], [12.5, 80, 7.5]], "La": [[20, 65, 15], [12.5, 80, 7.5], [25, 75, 0], [40, 60, 0], [30, 55, 15], [25, 45, 30], [20, 45, 35]], "LA": [[20, 45, 35], [25, 45, 30], [25, 30, 45], [17.5, 30, 52.5], [17.5, 50, 32.5]], "AL": [[30, 30, 40], [25, 30, 45], [25, 45, 30], [30, 55, 15]], "Al": [[45, 55, 0], [40, 20, 40], [30, 30, 40], [30, 55, 15], [40, 60, 0]], "AS": [[25, 0, 75], [25, 30, 45], [30, 30, 40], [40, 20, 40], [40, 0, 60]], "A": [[40, 0, 60], [40, 20, 40], [45, 55, 0], [60, 40, 0], [60, 0, 40]], "AA": [[60, 0, 40], [60, 40, 0], [100, 0, 0]]};

function ternToXY(a, l, s) {
  const scale = 400;
  const x = (l + a / 2) / 100 * scale;
  const y = (1 - a / 100) * scale * 0.866;
  return [x + 40, y + 20];
}

function getCentroid(pts) {
  let cx = 0, cy = 0;
  pts.forEach(p => { const [x, y] = ternToXY(p[0], p[1], p[2]); cx += x; cy += y; });
  return [cx / pts.length, cy / pts.length];
}

function pointInPoly(px, py, polyXY) {
  let inside = false;
  for (let i = 0, j = polyXY.length - 1; i < polyXY.length; j = i++) {
    const [xi, yi] = polyXY[i], [xj, yj] = polyXY[j];
    if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) inside = !inside;
  }
  return inside;
}

function identifyTexture(a, l, s) {
  // Try polygon-based first
  const [px, py] = ternToXY(a, l, s);
  for (const [code, pts] of Object.entries(POLYGONS)) {
    if (!pts.length) continue;
    const polyXY = pts.map(p => ternToXY(p[0], p[1], p[2]));
    if (pointInPoly(px, py, polyXY)) return code;
  }
  // Fallback: use ref_textures ranges (handles edge cases)
  for (const tex of DATA.textures) {
    if (a >= tex.argile_min && a <= tex.argile_max &&
        l >= tex.limon_min && l <= tex.limon_max &&
        s >= tex.sable_min && s <= tex.sable_max) return tex.code;
  }
  return null;
}

function findTexData(code) {
  return DATA.textures.find(t => t.code === code);
}

function KPI({ value, label, sub, color }) {
  return <div className="text-center p-3 bg-white rounded-xl border border-gray-200 shadow-sm">
    <div className="text-xl font-bold" style={{color: color || '#1e293b'}}>{value}</div>
    <div className="text-xs font-medium text-gray-600 mt-0.5">{label}</div>
    {sub && <div className="text-xs text-gray-400">{sub}</div>}
  </div>;
}

function App() {
  const [selected, setSelected] = React.useState(null);
  const [marker, setMarker] = React.useState(null);
  const [showSection, setShowSection] = React.useState(null);

  const tex = selected ? findTexData(selected) : null;

  const locate = () => {
    const a = parseFloat(document.getElementById('in-a').value) || 0;
    const l = parseFloat(document.getElementById('in-l').value) || 0;
    const s = parseFloat(document.getElementById('in-s').value) || 0;
    if (Math.abs(a + l + s - 100) > 1) { alert('La somme doit faire 100%'); return; }
    const code = identifyTexture(a, l, s);
    if (code) { setSelected(code); setMarker([a, l, s]); }
    else alert('Point hors triangle');
  };

  // Find matching concept card for selected texture
  const getProfileCard = (code) => {
    if (!code || !DATA.cards) return null;
    const map = { 'SS':'sableux','S':'sableux','SL':'sableux',
      'SA':'sableux','AS':'sableux',
      'L':'loam','LS':'loam','LA':'loam',
      'LL':'limoneux','La':'limoneux',
      'AL':'argileux','Al':'argileux','A':'argileux','AA':'argileux' };
    const keyword = map[code] || '';
    return DATA.cards.find(c => c.title && c.title.toLowerCase().includes(keyword));
  };

  const profileCard = tex ? getProfileCard(selected) : null;

  // Build SVG
  const triangleSVG = <svg viewBox="0 0 480 400" className="w-full" style={{maxHeight:'420px'}}>
    {/* Grid */}
    {[20,40,60,80].map(v => {
      const [x1,y1] = ternToXY(v, 0, 100-v);
      const [x2,y2] = ternToXY(v, 100-v, 0);
      return <line key={'ga'+v} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#e2e8f0" strokeWidth="0.5"/>;
    })}
    {[20,40,60,80].map(v => {
      const [x1,y1] = ternToXY(0, v, 100-v);
      const [x2,y2] = ternToXY(100-v, v, 0);
      return <line key={'gl'+v} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#e2e8f0" strokeWidth="0.5"/>;
    })}
    {[20,40,60,80].map(v => {
      const [x1,y1] = ternToXY(0, 100-v, v);
      const [x2,y2] = ternToXY(v, 0, 100-v);
      return <line key={'gs'+v} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#e2e8f0" strokeWidth="0.5"/>;
    })}
    {/* Polygons */}
    {Object.entries(POLYGONS).map(([code, pts]) => {
      if (!pts.length) return null;
      const points = pts.map(p => ternToXY(p[0], p[1], p[2]).join(',')).join(' ');
      const isSel = selected === code;
      return <polygon key={code} points={points}
        fill={isSel ? 'rgba(59,130,246,0.35)' : 'rgba(200,200,200,0.15)'}
        stroke={isSel ? '#3B82F6' : '#94a3b8'} strokeWidth={isSel ? 2 : 0.5}
        className="cursor-pointer hover:fill-blue-100 transition-colors"
        onClick={() => { setSelected(code); setMarker(null); }} />;
    })}
    {/* Labels */}
    {Object.entries(POLYGONS).map(([code, pts]) => {
      if (!pts.length) return null;
      const [cx, cy] = getCentroid(pts);
      return <text key={'t'+code} x={cx} y={cy} textAnchor="middle" dominantBaseline="central"
        fontSize="10" fontWeight="600" fill="#475569" className="pointer-events-none">{code}</text>;
    })}
    {/* Marker */}
    {marker && (() => {
      const [mx, my] = ternToXY(marker[0], marker[1], marker[2]);
      return <circle cx={mx} cy={my} r="5" fill="#EF4444" stroke="#fff" strokeWidth="2"/>;
    })()}
    {/* Vertex labels */}
    {(() => {
      const [ax, ay] = ternToXY(100, 0, 0);
      const [lx, ly] = ternToXY(0, 100, 0);
      const [sx, sy] = ternToXY(0, 0, 100);
      return <>
        <text x={ax} y={ay-8} textAnchor="middle" fontSize="11" fontWeight="700" fill="#1e293b">Argile</text>
        <text x={lx+15} y={ly+15} textAnchor="end" fontSize="11" fontWeight="700" fill="#1e293b">Limon</text>
        <text x={sx-15} y={sy+15} textAnchor="start" fontSize="11" fontWeight="700" fill="#1e293b">Sable</text>
      </>;
    })()}
    {/* Tick labels */}
    {[20,40,60,80].map(v => {
      const [x, y] = ternToXY(v, 0, 100-v);
      return <text key={'ta'+v} x={x-12} y={y} fontSize="7" fill="#94a3b8" textAnchor="end">{v}</text>;
    })}
  </svg>;

  return <div className="max-w-7xl mx-auto px-4 py-6">

    {/* ══════ 1. TRIANGLE + DETAIL ══════ */}
    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
      <div className="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
        <h2 className="font-bold text-gray-800 mb-2 text-sm uppercase tracking-wide">Triangle GEPPA</h2>
        {triangleSVG}
        <div className="mt-3 border-t border-gray-100 pt-3">
          <h3 className="text-sm font-semibold text-gray-700 mb-2">Identifier une texture</h3>
          <div className="flex gap-2 items-center flex-wrap">
            <label className="text-xs text-gray-500">Argile %</label>
            <input type="number" id="in-a" min="0" max="100" className="w-16 px-2 py-1 border border-gray-200 rounded text-sm text-center" />
            <label className="text-xs text-gray-500">Limon %</label>
            <input type="number" id="in-l" min="0" max="100" className="w-16 px-2 py-1 border border-gray-200 rounded text-sm text-center" />
            <label className="text-xs text-gray-500">Sable %</label>
            <input type="number" id="in-s" min="0" max="100" className="w-16 px-2 py-1 border border-gray-200 rounded text-sm text-center" />
            <button onClick={locate} className="px-3 py-1 bg-blue-600 text-white rounded text-sm hover:bg-blue-700">Localiser</button>
          </div>
        </div>
      </div>

      {/* Detail zone */}
      <div className="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
        <h2 className="font-bold text-gray-800 mb-2 text-sm uppercase tracking-wide">
          {tex ? `${tex.label} (${tex.code})` : 'Cliquez sur une zone'}
        </h2>
        {!tex ? <p className="text-gray-400 text-sm italic py-8 text-center">Sélectionnez une zone du triangle pour voir ses caractéristiques</p> :
        <div>
          <div className="grid grid-cols-3 gap-2 mb-3">
            <div className="text-center p-2 bg-rose-50 rounded-lg">
              <div className="text-sm font-bold text-rose-700">{tex.argile_min}-{tex.argile_max}%</div>
              <div className="text-xs text-rose-500">Argile</div>
            </div>
            <div className="text-center p-2 bg-indigo-50 rounded-lg">
              <div className="text-sm font-bold text-indigo-700">{tex.limon_min}-{tex.limon_max}%</div>
              <div className="text-xs text-indigo-500">Limon</div>
            </div>
            <div className="text-center p-2 bg-amber-50 rounded-lg">
              <div className="text-sm font-bold text-amber-700">{tex.sable_min}-{tex.sable_max}%</div>
              <div className="text-xs text-amber-500">Sable</div>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-2 mb-3">
            <div className="p-2 bg-green-50 rounded-lg text-center">
              <div className="text-sm font-bold text-green-700">{tex.ru_indicatif || '—'} mm/m</div>
              <div className="text-xs text-green-500">Réserve utile</div>
            </div>
            <div className="p-2 bg-purple-50 rounded-lg text-center">
              <div className="text-sm font-bold text-purple-700">{tex.cec_indicatif || '—'}</div>
              <div className="text-xs text-purple-500">CEC indicative</div>
            </div>
          </div>

          {tex.diagnostic_bio && <div className="p-3 rounded-lg bg-blue-50 text-sm text-gray-700 mb-3" style={{borderLeft: '3px solid #3B82F6'}}>
            {tex.diagnostic_bio}
          </div>}

          {tex.risques && Array.isArray(tex.risques) && tex.risques.length > 0 && <div className="mb-3">
            <span className="text-xs font-semibold text-gray-500 uppercase">Risques</span>
            <div className="flex flex-wrap gap-1 mt-1">
              {tex.risques.map((r, i) => <span key={i} className="text-xs px-2 py-0.5 rounded-full bg-red-50 text-red-700">{r}</span>)}
            </div>
          </div>}

          {tex.tests_recommandes && Array.isArray(tex.tests_recommandes) && <div className="mb-3">
            <span className="text-xs font-semibold text-gray-500 uppercase">Tests recommandés</span>
            <div className="flex flex-wrap gap-1 mt-1">
              {tex.tests_recommandes.map((t, i) => {
                const test = DATA.tests[t];
                return <span key={i} className="text-xs px-2 py-0.5 rounded-full bg-blue-50 text-blue-700 cursor-help"
                  title={test ? test.description : t}>{test ? test.title : t}</span>;
              })}
            </div>
          </div>}

          {/* Concept card profil */}
          {profileCard && <div className="mt-3 p-3 rounded-lg bg-emerald-50" style={{borderLeft: '3px solid #059669'}}>
            <div className="text-xs font-semibold text-emerald-700 uppercase mb-1">Profil sol</div>
            <div className="text-sm text-gray-700">{profileCard.description}</div>
            {profileCard.notes && <div className="text-xs text-gray-500 mt-1 italic">{profileCard.notes}</div>}
          </div>}
        </div>}
      </div>
    </div>

    {/* ══════ 2. ZONES HUSSON ══════ */}
    {DATA.rules && (() => {
      const husson = DATA.rules.filter(r => r.rule_name && r.rule_name.includes('Husson'));
      return husson.length > 0 && <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm mb-6">
        <h2 className="font-bold text-gray-800 mb-3 text-sm uppercase tracking-wide">Ratio MO/Argile — Zones de Husson</h2>
        <p className="text-sm text-gray-500 mb-3">Le rapport C/Argile (ou MO/Argile) indique la qualité structurale du sol. Plus le sol est argileux, plus il a besoin de matière organique.</p>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
          {husson.map((r, i) => {
            const colors = ['#059669','#2563EB','#D97706','#DC2626'];
            const bgs = ['#D1FAE5','#DBEAFE','#FEF3C7','#FEE2E2'];
            return <div key={i} className="p-3 rounded-lg" style={{background: bgs[i] || '#f1f5f9', borderLeft: `3px solid ${colors[i] || '#888'}`}}>
              <div className="text-sm font-bold" style={{color: colors[i] || '#333'}}>{r.rule_name}</div>
              <div className="text-xs text-gray-600 mt-1">{r.condition_text}</div>
              <div className="text-xs text-gray-500 mt-1">{r.action_text}</div>
            </div>;
          })}
        </div>
      </div>;
    })()}

    {/* ══════ 3. TESTS TERRAIN (dynamiques) ══════ */}
    <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm mb-6">
      <h2 className="font-bold text-gray-800 mb-3 text-sm uppercase tracking-wide">Tests de terrain</h2>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <h3 className="font-semibold text-gray-700 mb-2">Test du bocal — sédimentation</h3>
          <p className="text-sm text-gray-600 mb-2">Remplir un bocal 1L aux 2/3 d'eau, ajouter la terre tamisée, secouer vigoureusement, laisser reposer :</p>
          <div className="space-y-1.5 mb-3">
            <div className="flex gap-3 items-center p-2 bg-amber-50 rounded-lg">
              <span className="font-bold text-amber-700 w-12 text-right">30 s</span>
              <span className="text-sm"><strong>Sable</strong> décante au fond (&gt;50 µm)</span>
            </div>
            <div className="flex gap-3 items-center p-2 bg-indigo-50 rounded-lg">
              <span className="font-bold text-indigo-700 w-12 text-right">2 h</span>
              <span className="text-sm"><strong>Limon</strong> se dépose (2-50 µm)</span>
            </div>
            <div className="flex gap-3 items-center p-2 bg-rose-50 rounded-lg">
              <span className="font-bold text-rose-700 w-12 text-right">24 h</span>
              <span className="text-sm"><strong>Argile</strong> reste en suspension (&lt;2 µm)</span>
            </div>
          </div>
          <p className="text-xs text-gray-400">Mesurer les épaisseurs de chaque couche et calculer les pourcentages.</p>

          <h3 className="font-semibold text-gray-700 mt-4 mb-2">Test du boudin — au toucher</h3>
          <div className="space-y-1">
            <div className="flex gap-2 text-sm"><span className="font-medium w-16 text-amber-700">Sable</span> <span className="text-gray-600">Crisse sous le doigt — pas de boudin possible</span></div>
            <div className="flex gap-2 text-sm"><span className="font-medium w-16 text-indigo-700">Limon</span> <span className="text-gray-600">Soyeux au toucher — boudin fragile qui se casse</span></div>
            <div className="flex gap-2 text-sm"><span className="font-medium w-16 text-rose-700">Argile</span> <span className="text-gray-600">Collant, plastique — boudin solide dès 25% argile</span></div>
          </div>
        </div>
        <div className="flex items-center justify-center">
          <img src="img/test_bocal.png" alt="Test du bocal — sédimentation" className="w-full rounded-xl border border-gray-200 shadow-sm" style={{maxHeight:'300px', objectFit:'contain'}} />
        </div>
      </div>

      {/* Autres tests depuis la DB */}
      {DATA.tests && Object.keys(DATA.tests).length > 0 && <div className="mt-4 pt-4 border-t border-gray-100">
        <button onClick={() => setShowSection(showSection === 'tests' ? null : 'tests')}
          className="w-full text-left p-2 rounded-lg hover:bg-gray-50 transition flex justify-between items-center">
          <span className="text-sm font-medium text-gray-700">Tous les tests terrain ({Object.keys(DATA.tests).length})</span>
          <span className="text-gray-300">{showSection === 'tests' ? '▾' : '▸'}</span>
        </button>
        {showSection === 'tests' && <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mt-2">
          {Object.entries(DATA.tests).map(([code, t]) => <div key={code} className="p-2 bg-gray-50 rounded-lg">
            <div className="text-xs font-semibold text-blue-700">{t.title}</div>
            <div className="text-xs text-gray-500 mt-0.5">{t.description}</div>
          </div>)}
        </div>}
      </div>}
    </div>

    {/* ══════ 4. FICHES PROFIL SOL (concept cards) ══════ */}
    {DATA.cards && DATA.cards.length > 0 && <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm mb-6">
      <h2 className="font-bold text-gray-800 mb-3 text-sm uppercase tracking-wide">Fiches profil sol</h2>
      <p className="text-sm text-gray-500 mb-3">Recommandations agronomiques par type de sol, issues du corpus Le Sol Vivant.</p>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
        {DATA.cards.map((c, i) => <div key={i} className="p-3 rounded-lg bg-gray-50 border border-gray-100">
          <div className="text-sm font-bold text-gray-800 mb-1">{c.title}</div>
          <div className="text-xs text-gray-600 leading-relaxed">{c.description}</div>
          {c.notes && <div className="text-xs text-gray-400 mt-1 italic">{c.notes}</div>}
        </div>)}
      </div>
    </div>}

    {/* ══════ 5. COMPRENDRE ══════ */}
    <div className="bg-white rounded-xl border border-gray-200 p-4 shadow-sm mb-6">
      <h2 className="font-bold text-gray-800 mb-3 text-sm uppercase tracking-wide">Comprendre — Textures et sol vivant</h2>
      {[
        { id: 'importance', title: 'Pourquoi la texture est fondamentale',
          content: 'La texture — proportion de sable, limon et argile — détermine les propriétés physiques du sol :\n\n• Réserve utile (RU) : capacité à stocker l\'eau disponible pour les plantes. Un sol argileux stocke 150-200 mm/m, un sableux 50-80 mm/m.\n• CEC : capacité d\'échange cationique, donc rétention des nutriments. Directement proportionnelle à la teneur en argile.\n• Porosité et aération : un sol sableux draine bien mais retient peu. Un sol argileux retient bien mais peut devenir asphyxiant.\n• Portance : résistance au tassement par les engins agricoles.\n\nLa texture est le seul paramètre du sol qu\'on ne peut pas modifier. Tout le reste (structure, MO, biologie) s\'adapte à elle.' },
        { id: 'battance', title: 'Battance et croûte de surface',
          content: 'La battance est la destruction des agrégats de surface sous l\'impact des gouttes de pluie, formant une croûte imperméable.\n\n• Sols les plus sensibles : limons (LL, L) et sables limoneux (SL) — faible teneur en argile, pas assez de ciment organo-minéral.\n• Seuil critique : < 15% argile + faible MO = battance quasi certaine.\n• Protection : couverture permanente du sol (mulch, couverts), biofilms microbiens de surface (EPS), apports de matière organique.\n• Le test de stabilité des agrégats (test du tamis sous eau) mesure directement la sensibilité à la battance.' },
        { id: 'moargile', title: 'Ratio MO/Argile — seuils de Husson',
          content: 'Le rapport C/Argile (carbone organique / teneur en argile) est l\'indicateur clé de la santé structurale du sol :\n\n• < 12% : sol dégradé — structure effondrée, battance, compaction, faune appauvrie. Urgence.\n• 12-17% : sol en construction — la biologie reprend mais la structure est fragile. Couverts permanents indispensables.\n• 17-24% : transition avancée — sol fonctionnel, agrégats stables, bonne infiltration. Objectif réaliste en ACS.\n• > 24% : sol autonome — structure auto-entretenue par la biologie, résilience maximale.\n\nPlus un sol est argileux, plus il faut de MO pour atteindre ces seuils. Un sol à 40% d\'argile a besoin du double de MO qu\'un sol à 20%.' },
        { id: 'kirkby', title: 'Texture et stockage de carbone',
          content: 'L\'argile protège la matière organique de la minéralisation par adsorption sur les surfaces minérales (complexe organo-minéral, MAOM).\n\n• Chaque +10% d\'argile réduit le coefficient de minéralisation K du modèle AMG de ~15%.\n• Un sol argileux stocke donc plus de carbone qu\'un sol sableux à apports égaux.\n• La saturation en carbone (modèle Hassink) dépend de la fraction < 20 µm (argile + limon fin) : plus elle est élevée, plus le potentiel de stockage est grand.\n• Conséquence pratique : sur sol sableux, les apports doivent être plus fréquents car le turnover est rapide. Sur sol argileux, les apports s\'accumulent mais le risque est l\'asphyxie si enfouissement.' },
      ].map(s =>
        <div key={s.id} className="mb-1">
          <button onClick={() => setShowSection(showSection === s.id ? null : s.id)}
            className="w-full text-left p-2 rounded-lg hover:bg-gray-50 transition flex justify-between items-center">
            <span className="text-sm font-medium text-gray-700">{s.title}</span>
            <span className="text-gray-300">{showSection === s.id ? '▾' : '▸'}</span>
          </button>
          {showSection === s.id && <div className="px-3 pb-3 text-xs text-gray-600 leading-relaxed whitespace-pre-line">{s.content}</div>}
        </div>
      )}

      {/* Termes liés */}
      <div className="mb-1">
        <button onClick={() => setShowSection(showSection === 'terms' ? null : 'terms')}
          className="w-full text-left p-2 rounded-lg hover:bg-gray-50 transition flex justify-between items-center">
          <span className="text-sm font-medium text-gray-700">Termes du thésaurus ({DATA.terms.length})</span>
          <span className="text-gray-300">{showSection === 'terms' ? '▾' : '▸'}</span>
        </button>
        {showSection === 'terms' && <div className="px-2 pb-2 flex flex-wrap gap-1">
          {DATA.terms.map((t, i) => <span key={i} className="text-xs px-2 py-0.5 rounded-full bg-green-50 text-green-700"
            title={t.definition || ''}>{t.fr}{t.en ? ` (${t.en})` : ''}</span>)}
        </div>}
      </div>

      {/* Règles diagnostiques (hors Husson, déjà affichées) */}
      {DATA.rules && (() => {
        const nonHusson = DATA.rules.filter(r => !r.rule_name || !r.rule_name.includes('Husson'));
        return nonHusson.length > 0 && <div>
          <button onClick={() => setShowSection(showSection === 'rules' ? null : 'rules')}
            className="w-full text-left p-2 rounded-lg hover:bg-gray-50 transition flex justify-between items-center">
            <span className="text-sm font-medium text-gray-700">Règles diagnostiques ({nonHusson.length})</span>
            <span className="text-gray-300">{showSection === 'rules' ? '▾' : '▸'}</span>
          </button>
          {showSection === 'rules' && <div className="px-2 pb-2 space-y-1">
            {nonHusson.map((r, i) => <div key={i} className="text-xs p-2 bg-gray-50 rounded-lg">
              <strong>{r.rule_name}</strong> <span className="text-gray-400">({(r.confidence*100).toFixed(0)}%)</span>
              <div className="text-gray-500">{r.condition_text} → {r.action_text}</div>
            </div>)}
          </div>}
        </div>;
      })()}
    </div>

    <div className="text-center text-xs text-gray-400 mt-4 pb-4">
      Classification GEPPA 1963 · Données depuis sol_vivant.db
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>

</body>
</html>
