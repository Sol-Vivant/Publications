e", "Forte rétention", "Drainage lent"], "diagnostic_bio": "Moins de risque retrait-gonflement que AL. Surveiller engorgement profond.", "tests_recommandes": ["t01_test_beche", "t04_test_dinfiltration", "t02_profil_cultural"], "source": "GEPPA/USDA adapté"}, {"id": 13, "code": "A", "label": "Argile", "sable_min": 0.0, "sable_max": 40.0, "limon_min": 0.0, "limon_max": 40.0, "argile_min": 40.0, "argile_max": 60.0, "ru_indicatif": "150–200", "cec_indicatif": "25–45", "risques": ["Forte rétention", "Retrait-gonflement", "Engorgement"], "diagnostic_bio": "Fine, forte rétention, forte CEC. Retrait-gonflement et engorgement fréquents.", "tests_recommandes": ["t02_profil_cultural", "t10_test_de_couleur_du_sol", "t11_test_de_portance", "t09_test_olfactif_du_sol"], "source": "GEPPA/USDA adapté"}, {"id": 14, "code": "AA", "label": "Argile dominante", "sable_min": 0.0, "sable_max": 20.0, "limon_min": 0.0, "limon_max": 20.0, "argile_min": 60.0, "argile_max": 100.0, "ru_indicatif": "160–220", "cec_indicatif": ">45", "risques": ["Très plastique", "Engorgement sévère", "Retrait-gonflement fort"], "diagnostic_bio": "Très plastique. Ne pas intervenir mécaniquement hors ressuyage. Solvita très variable.", "tests_recommandes": ["t02_profil_cultural", "t10_test_de_couleur_du_sol", "t09_test_olfactif_du_sol"], "source": "GEPPA/USDA adapté"}], "tests": {"t01_test_beche": {"title": "Test bêche", "description": "Observation directe du sol à la bêche pour évaluer la structure, la porosité, l’enracinement, la compaction et l’activité biologique visible."}, "t02_profil_cultural": {"title": "Profil cultural", "description": "Ouverture d’une fosse ou tranchée pour analyser les horizons du sol, l’historique des pratiques, les zones compactées et la dynamique racinaire."}, "t03_test_bocal_test_de_sedimentation": {"title": "Test bocal (test de sédimentation)", "description": "Mise en suspension du sol dans l’eau pour observer la décantation et estimer les proportions sable, limon et argile."}, "t04_test_dinfiltration": {"title": "Test d’infiltration", "description": "Mesure du temps nécessaire à l’eau pour pénétrer dans le sol afin d’évaluer la porosité fonctionnelle et le risque de ruissellement."}, "t05_test_de_stabilite_des_agregats": {"title": "Test de stabilité des agrégats", "description": "Observation de la résistance des mottes du sol à la désagrégation dans l’eau, indicateur de sensibilité à l’érosion."}, "t06_test_de_battance": {"title": "Test de battance", "description": "Observation de la formation de croûtes de surface après mouillage ou pluie simulée."}, "t07_comptage_des_vers_de_terre": {"title": "Comptage des vers de terre", "description": "Dénombrement des lombrics pour estimer l’activité biologique et la structuration naturelle du sol."}, "t08_test_racinaire": {"title": "Test racinaire", "description": "Observation de la profondeur, de la densité et de l’orientation des racines pour diagnostiquer compaction et fertilité fonctionnelle."}, "t09_test_olfactif_du_sol": {"title": "Test olfactif du sol", "description": "Évaluation de l’odeur du sol pour détecter fermentation, putréfaction ou asphyxie."}, "t10_test_de_couleur_du_sol": {"title": "Test de couleur du sol", "description": "Observation visuelle de la couleur du sol pour inférer matière organique, hydromorphie ou oxydation."}, "t11_test_de_portance": {"title": "Test de portance", "description": "Appréciation de la résistance du sol au tassement sous une charge légère."}, "t12_test_de_friabilite": {"title": "Test de friabilité", "description": "Évaluation de la facilité avec laquelle le sol se fragmente entre les doigts."}, "t13_test_de_croute_de_surface": {"title": "Test de croûte de surface", "description": "Observation de la présence et de l’épaisseur de croûtes limitant les échanges sol–air–eau."}, "t14_test_dhumidite_au_toucher": {"title": "Test d’humidité au toucher", "description": "Appréciation manuelle de l’état hydrique du sol."}, "t15_test_de_respiration_du_sol_simplifie": {"title": "Test de respiration du sol (simplifié)", "description": "Estimation de l’activité biologique par dégagement de CO₂ dans un dispositif simple."}, "t16_test_de_decomposition_des_residus": {"title": "Test de décomposition des résidus", "description": "Observation de la vitesse de dégradation de résidus organiques enfouis ou en surface."}, "t17_test_de_couverture_du_sol": {"title": "Test de couverture du sol", "description": "Évaluation visuelle de la proportion du sol protégée par des résidus ou couverts végétaux."}, "t18_test_de_compactage_a_la_tige": {"title": "Test de compactage à la tige", "description": "Enfoncement manuel d’une tige pour détecter des couches compactées."}, "t19_test_de_ruissellement": {"title": "Test de ruissellement", "description": "Observation du comportement de l’eau en surface après pluie ou arrosage."}, "t20_test_de_biodiversite_visible": {"title": "Test de biodiversité visible", "description": "Observation globale de la faune et flore du sol visibles à l’œil nu."}}, "cards": [{"id": 11, "title": "Profil sol sableux : aération élevée, apports fractionnés, dynamique MO rapide", "description": "Sol sableux : faible CEC et réserve utile ; aération forte. Compatible avec apports fermentés si fractionnés ; attention à la minéralisation rapide.", "scope_ref": "soil_type:SAND", "docs_codes": ["S1", "S0"]}, {"id": 12, "title": "Profil sol argileux : potentiel élevé mais risques redox si enfouissement et excès d'eau", "description": "Sol argileux : potentiel d’agrégation élevé (Ca + biofilms/EPS), mais risque de réduction profonde/anoxie si enfouissement + excès matière réduite + saturation.", "scope_ref": "soil_type:CLAY", "docs_codes": ["S1", "S4", "S0"]}, {"id": 13, "title": "Profil sol limoneux : battance/érosion, priorité couverture et biofilms de surface", "description": "Sol limoneux : structure fragile ; battance/ruissellement si sol nu. Priorité à couverture permanente, apports de surface et consolidation biologique.", "scope_ref": "soil_type:SILT", "docs_codes": ["S1", "S0"]}, {"id": 14, "title": "Profil sol calcaire/argilo-calcaire : calcium structurant, risques de blocages P/oligo", "description": "Sol calcaire : calcium structurant (floculation), porosité durable ; attention aux blocages P et oligo-éléments (soufre/bore) qui impactent métabolismes & symbioses.", "scope_ref": "soil_type:CALC", "docs_codes": ["S1", "S4"]}, {"id": 15, "title": "Profil sol hydromorphe/organique : redox bas, émissions, gestion de l’eau centrale", "description": "Sol hydromorphe/organique : redox bas fréquent ; risques N2O/CH4 et toxicités (Fe/Mn réduits). Éviter apports réduits enfouis ; gérer l’eau et la continuité racinaire.", "scope_ref": "soil_type:HYDRO", "docs_codes": ["S1", "S0", "S4"]}, {"id": 16, "title": "Profil sol 'franc' (loam) : effets intermédiaires, sensibilité au travail du sol", "description": "Sol loam : bon compromis texture ; répond bien aux apports réguliers et couverts ; sensible aux perturbations mécaniques qui cassent habitats/biofilms.", "scope_ref": "soil_type:LOAM", "docs_codes": ["S1"]}], "terms": [{"fr": "Adsorption", "en": "adsorption", "definition": "Fixation réversible de molécules ou d'ions à la surface des colloïdes du sol (argiles, oxydes Fe/Al, MO) par forces électrostatiques, liaisons hydrogène ou interactions hydrophobes. L'adsorption contrôle la rétention des cations nutritifs (CEC), l'immobilisation du phosphate sur les oxydes Fe/Al et la stabilisation de la MO sur les surfaces minérales (MAOM). La matière organique augmente l'adsorption par sa charge négative et sa surface spécifique élevée. Gérer l'adsorption par le pH et la MO optimise la disponibilité nutritive.", "doc_code": "S1/S4", "strate": "S"}, {"fr": "CEC", "en": "CEC", "definition": "Capacité d'échange cationique. Quantité de cations (Ca²⁺, Mg²⁺, K⁺, Na⁺, H⁺) qu'un sol peut retenir sur ses sites d'échange (argiles, MO). Exprimée en cmol+/kg.", "doc_code": "S1", "strate": "S"}, {"fr": "Capacité d’Échange Cationique", "en": "Cation Exchange Capacity (CEC)", "definition": "Mesure de la quantité totale de cations (Ca²⁺, Mg²⁺, K⁺, NH₄⁺) qu'un sol peut retenir sur son complexe argilo-humique (Oursin, 2021). Elle dépend de la nature des argiles et, de manière critique, du taux de matière organique, dont la CEC est environ 10 fois supérieure à celle des argiles (Pellerin, Bamière, Savini, Rechauchère, et al., 2021; Pellerin, Bamière, Savini, Réchauchère, et al., 2021).\n\nEnjeu : Un sol avec une faible CEC est vulnérable au lessivage des nutriments, ce qui augmente les risques environnementaux et les coûts d'intrants (Nivelle, 2017).\n\nLevier de décision : En sols sableux (faible CEC minérale), l'augmentation du taux d'humus est le seul levier pour augmenter le \"réservoir\" de nutriments et limiter les pertes par lixiviation (Pellerin et al., 2021).", "doc_code": "S1", "strate": "S"}, {"fr": "Complexe Argilo-Humique (CAH)", "en": "organo-mineral complex", "definition": "Association intime argiles-humus stabilisée par des ponts cationiques bivalents (Ca²⁺, Mg²⁺) et des liaisons de coordination. Siège de la CEC et de la structure physique du sol. Le CAH protège la matière organique de la minéralisation rapide et détermine la stabilité des agrégats. Un sol à CAH bien développé (limon+argile+MO>3%) allie fertilité chimique, structure physique et résilience hydrique. Le labour détruit mécaniquement le CAH en fractionnant les agrégats organo-minéraux.", "doc_code": "S1", "strate": "S"}, {"fr": "Haber-Bosch", "en": "Haber-Bosch process", "definition": "Procédé industriel de synthèse de l'ammoniac (N₂+H₂→NH₃) à haute pression et température (1913). Consomme 1-2% de l'énergie mondiale (Robertson & Groffman, 2014). Responsable de la rupture des cycles naturels de l'azote et de la dépendance aux énergies fossiles. Levier : 30-40% de légumineuses en rotation pour court-circuiter ce procédé. Connexion Loi de la Trophobiose : l'azote Haber-Bosch favorise un excès d'acides aminés libres dans la sève, rendant les plantes vulnérables aux ravageurs.", "doc_code": "F2", "strate": "F"}, {"fr": "Illite", "en": "illite", "definition": "Argile micacée 2:1 non gonflante, intermédiaire entre micas et smectites. CEC modérée (15-40 cmol+/kg), source progressive de potassium structural par altération des bords des feuillets. Dominante dans les sols tempérés modérément altérés. Sa présence offre un équilibre favorable entre stabilité structurale et fertilité potassique. L'activité microbienne mobilise progressivement le K structural des illites — service écosystémique annulé par le recours au K soluble.", "doc_code": "S1", "strate": "S"}, {"fr": "Kaolinite", "en": "kaolinite", "definition": "Argile 1:1 stable, non gonflante, à faible CEC (3-15 cmol+/kg) et surface spécifique réduite. Caractéristique des sols tropicaux et subtropicaux fortement altérés et lessivés. Sa faible capacité de rétention nutritive impose des apports organiques élevés pour compenser les limitations minéralogiques. En ACS sur sols kaolinitiques : maximiser les apports de MO et l'activité biologique pour créer une fertilité par voie biologique.", "doc_code": "S1", "strate": "S"}, {"fr": "MAOM", "en": "mineral-associated organic matter", "definition": "Carbone organique d'origine microbienne associé et stabilisé aux surfaces des argiles et des oxydes Fe/Al. Fraction stable du sol (temps de résidence > 100 ans). Formée par précipitation de métabolites microbiens et de fragments de nécromasse sur les surfaces minérales. Complémentaire du POC (fraction labile). Le MAOM est le pool cible du carbon farming.", "doc_code": "S2/S4", "strate": "S"}, {"fr": "RothC", "en": "RothC model", "definition": "Modèle mécaniste de dynamique du carbone organique du sol développé à Rothamsted Research (Coleman & Jenkinson, 1996). Divise la MO en 5 pools : DPM (décomposable), RPM (résistante), BIO (biomasse microbienne), HUM (humus), IOM (inerte). Les transferts entre pools suivent des cinétiques du premier ordre modulées par température, humidité et couverture. Outil de référence pour certifier les crédits carbone agricoles. Entrées nécessaires : COS initial, pluviométrie, ETP, type de sol, apports de MO. Disponible en open source.", "doc_code": "S4", "strate": "S"}, {"fr": "Surface spécifique", "en": "specific surface area", "definition": "Aire totale des surfaces colloïdales par unité de masse (m²/g). Détermine la capacité d'adsorption, la rétention d'eau et la création de microhabitats microbiens. Varie de 1-10 m²/g (sables) à 10-40 m²/g (kaolinite), 80-120 m²/g (illite) et 600-800 m²/g (smectites). La MO humifiée atteint 800-900 m²/g. La surface spécifique active — argiles + MO — est l'indicateur physico-chimique le plus direct de la fertilité potentielle d'un sol.", "doc_code": "S1", "strate": "S"}, {"fr": "altération minérale", "en": "mineral weathering", "definition": "Dégradation des roches par processus physiques, chimiques et biologiques. Source primaire des argiles et du phosphore.", "doc_code": "F1", "strate": "F"}, {"fr": "biofilm comme système hydraulique", "en": "biofilm as water management system", "definition": "Le biofilm bactérien est la première technologie de rétention d'eau de l'histoire de la vie (4 Ga). Matrice d'EPS composée à 97% d'eau structurée, protégée de l'évaporation. Sur une surface minérale (argile, sable, roche), le biofilm CRÉE son propre environnement hydrique. C'est le fondement de la rétention d'eau dans les micropores et le premier maillon de la microagrégation (EPS + argile = premier micro-agrégat, bien avant les champignons).", "doc_code": "S2", "strate": "S"}, {"fr": "capacité au champ", "en": "field capacity", "definition": "Teneur en eau maximale retenue après ressuyage gravitaire (pF 2.5, -33 kPa). Limite supérieure de la réserve utile. Dépend de la texture, structure et MO du sol.", "doc_code": "S0", "strate": "S"}, {"fr": "conductivité hydraulique", "en": "hydraulic conductivity", "definition": "Capacité du sol à transmettre l'eau sous l'effet d'un gradient de potentiel (loi de Darcy). Dépend de la texture, de la structure et de la macroporosité biologique. Unité : mm/h ou cm/jour.", "doc_code": "S0", "strate": "S"}, {"fr": "conductivité hydraulique saturée", "en": "saturated hydraulic conductivity", "definition": "Vitesse maximale d'écoulement de l'eau dans un sol saturé (Ksat), exprimée en mm/h. Détermine la capacité d'infiltration et le risque de ruissellement. Varie de 0,01 mm/h (argile compacte) à >1 000 mm/h (sol biologique actif). Les macropores biologiques (galeries de vers anéciques, biopores racinaires) contribuent à 90% du flux malgré <5% du volume. L'activité biologique peut multiplier Ksat par 100 par rapport à un sol nu compacté.", "doc_code": "S0/V1/P2", "strate": "S"}, {"fr": "densité apparente", "en": "bulk density", "definition": "Masse de sol sec par unité de volume (g/cm³). Indicateur direct de la compaction. Sol sain : 0,9–1,3 g/cm³ ; sol compacté : >1,5 g/cm³ pour un limon.", "doc_code": "S1", "strate": "S"}, {"fr": "endogés", "en": "endogeic earthworms", "definition": "Vers géophages vivant dans les horizons minéraux (5-40 cm), se nourrissant de la MO incorporée aux argiles. Créent des galeries horizontales non permanentes. Indicateurs d'une bonne agrégation biologique des horizons de labour.", "doc_code": "V1", "strate": "V"}, {"fr": "faux plat du rendement (Zone 2)", "en": "yield plateau (regeneration Zone 2)", "definition": "Phase de la trajectoire de régénération (MO/Argile 17-24%) où le rendement stagne ou baisse alors que le carbone du sol augmente rapidement. Cause : les micro-organismes Y (forte CUE) captent N, P, S pour construire l'humus avant la plante. Le gain C est proportionnel à la baisse de rendement (Kirkby). Levier : fertilisation foliaire pour nourrir la plante sans alimenter la compétition microbienne.", "doc_code": "S4", "strate": "S"}, {"fr": "horizon pédologique", "en": "soil horizon", "definition": "Couche de sol relativement homogène, parallèle à la surface, différenciée par sa couleur, texture, structure et composition. Horizons principaux : O (litière), A (organo-minéral), B (accumulation), C (altération roche-mère).", "doc_code": "S1", "strate": "S"}, {"fr": "micro-agrégat", "en": "micro-aggregate", "definition": "Unité fonctionnelle du sol de 20–250 µm, stabilisée par la nécromasse microbienne, les EPS et les argiles. Protège le carbone organique de la décomposition (MAOM). Sa formation dépend de la diversité microbienne et de la présence de calcium.", "doc_code": "S1/S2", "strate": "S"}, {"fr": "montmorillonite (smectite)", "en": "montmorillonite (smectite)", "definition": "Argile 2:1 gonflante à très forte CEC (80–120 cmol+/kg) et surface spécifique (600–800 m²/g). Responsable du retrait-gonflement des sols. Capacité de fixation des cations et de l'eau interfoliaire.", "doc_code": "S1", "strate": "S"}, {"fr": "point de flétrissement permanent", "en": "permanent wilting point", "definition": "Teneur en eau à pF 4.2 (-1.5 MPa) en dessous de laquelle les plantes ne peuvent plus extraire l eau. Limite inférieure de la réserve utile. Dépend principalement de la texture argileuse.", "doc_code": "S0", "strate": "S"}, {"fr": "ratio C/Argile", "en": "carbon-to-clay ratio", "definition": "Rapport C organique/argile. Seuils Husson/Boivin : <12% dégradé, 17% limite, >24% bonne structure.", "doc_code": "P1/S1/P5", "strate": "P"}, {"fr": "ratio Carbone/Argile (C/Argile)", "en": "Carbon-to-Clay ratio (C/Clay)", "definition": "Proxy de l'état structural du sol (Husson, CIRAD). MO/Argile > 24% (ou C/Argile > 1/8) = sol bien structuré (Zone 1). 17-24% = zone de transition avec faux plat du rendement (Zone 2). 12-17% = seuil critique de déstructuration (Zone 3). < 12% = sol effondré (Zone 4). Corrélé au score VESS. Utilisable comme indicateur de pilotage de la régénération.", "doc_code": "S4", "strate": "S"}, {"fr": "réserve utile", "en": "plant available water capacity", "definition": "Volume d'eau retenu dans le sol entre la capacité au champ (pF 2,5) et le point de flétrissement permanent (pF 4,2), disponible pour les plantes. Exprimée en mm/m de sol. Dépend de la texture (argiles > limons > sables), de la teneur en MO et de la profondeur du profil exploité par les racines. La RU d'un sol régénératif augmente avec le stock de MO : chaque point de MO supplémentaire accroît la RU d'environ 2 mm/m.", "doc_code": "S0/S1", "strate": "S"}, {"fr": "saturation en carbone du sol", "en": "soil carbon saturation", "definition": "Capacité maximale d un sol à stocker du carbone stable (MAOM). Dépend de la surface spécifique des minéraux argileux et de la CEC. Au-delà de la saturation, le C supplémentaire reste en POC labile.", "doc_code": "S4", "strate": "S"}, {"fr": "test de sédimentation (test bocal)", "en": "jar sedimentation test", "definition": "Mise en suspension du sol dans l'eau pour estimer les proportions de sable (décante en 30s), limon (2h) et argile (24h). Méthode terrain rapide pour évaluer la texture et adapter les recommandations (CEC, RU, risque de battance).", "doc_code": "P1", "strate": "P"}, {"fr": "test ficelle GEPPA", "en": "GEPPA ribbon test", "definition": "Test de terrain du Groupe d'Étude Pour les Problèmes de Pédologie Appliquée pour estimer la teneur en argile du sol. Humidifier une poignée de terre et former un boudin de 5-10 cm : s'il peut être courbé en anneau sans se rompre → > 18% d'argile. La plasticité et la cohésion orientent l'adaptation des pratiques (travail du sol, amendements). Gratuit, immédiat, accessible à tous les agriculteurs.", "doc_code": "P1", "strate": "P"}, {"fr": "texture", "en": "texture", "definition": "Proportions de sable, limon et argile. Détermine rétention d'eau, CEC, porosité. Test bocal ou granulométrie laser.", "doc_code": "P1", "strate": "P"}, {"fr": "texture du sol", "en": "soil texture", "definition": "Proportion relative de sable (2–0,05 mm), limon (0,05–0,002 mm) et argile (<0,002 mm) dans la terre fine. Propriété permanente du sol qui détermine sa capacité de rétention d'eau, sa CEC et son comportement mécanique.", "doc_code": "S1", "strate": "S"}], "corpus_name": "Le Sol Vivant cet Holobionte", "strate_colors": {"F": "#8B5CF6", "S": "#3B82F6", "V": "#10B981", "P": "#F59E0B", "H": "#EF4444"}, "generated": "2026-04-01 04:12"};

const POLYGONS = {"AA": [[60, 0, 40], [60, 40, 0], [100, 0, 0], [100, 0, 0]], "A": [[40, 0, 60], [40, 20, 40], [45, 55, 0], [60, 40, 0], [60, 0, 40]], "Al": [[45, 55, 0], [40, 20, 40], [30, 30, 40], [30, 55, 15], [40, 60, 0]], "AL": [[30, 30, 40], [25, 30, 45], [25, 45, 30], [30, 55, 15]], "AS": [[25, 0, 75], [40, 0, 60], [40, 20, 40], [30, 30, 40], [25, 30, 45]], "La": [[30, 55, 15], [25, 45, 30], [20, 45, 35], [20, 65, 15], [25, 75, 0], [40, 60, 0]], "LA": [[25, 45, 30], [25, 30, 45], [17.5, 30, 52.5], [17.5, 50, 32.5], [20, 45, 35]], "L": [[20, 65, 15], [20, 45, 35], [17.5, 50, 32.5], [12.5, 50, 37.5], [0, 50, 50], [0, 80, 20], [12.5, 80, 7.5]], "LL": [[12.5, 80, 7.5], [0, 80, 20], [0, 100, 0], [10, 90, 0], [25, 75, 0]], "LS": [[12.5, 50, 37.5], [17.5, 50, 32.5], [17.5, 30, 52.5], [15, 20, 65], [0, 50, 50]], "SL": [[0, 50, 50], [15, 20, 65], [10, 10, 80], [0, 20, 80]], "SA": [[15, 20, 65], [17.5, 30, 52.5], [25, 30, 45], [25, 0, 75], [10, 0, 90], [10, 10, 80]], "S": [[0, 20, 80], [10, 10, 80], [10, 0, 90], [0, 0, 100]], "SS": []};

// ── Ternary → Cartesian conversion ──
// Triangle: Sable (bottom-left), Limon (bottom-right), Argile (top)
const W = 400, H = W * Math.sqrt(3) / 2;
const PAD = 35;
const TW = W, TH = H;

function ternToXY(argile, limon, sable) {
  // Normalize
  const total = argile + limon + sable;
  const a = argile / total, l = limon / total, s = sable / total;
  const x = PAD + (l + a / 2) * TW;
  const y = PAD + (1 - a) * TH;
  return [x, y];
}

// ── Build SVG ──
function buildTriangle() {
  const svgW = W + PAD * 2;
  const svgH = H + PAD * 2 + 10;
  let svg = `<svg viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">`;

  // Grid lines
  for (let pct = 10; pct < 100; pct += 10) {
    const f = pct / 100;
    // Argile lines (horizontal)
    const [x1, y1] = ternToXY(pct, 100 - pct, 0);
    const [x2, y2] = ternToXY(pct, 0, 100 - pct);
    svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" class="grid-line"/>`;
    // Limon lines
    const [x3, y3] = ternToXY(0, pct, 100 - pct);
    const [x4, y4] = ternToXY(100 - pct, pct, 0);
    svg += `<line x1="${x3}" y1="${y3}" x2="${x4}" y2="${y4}" class="grid-line"/>`;
    // Sable lines
    const [x5, y5] = ternToXY(0, 0, pct);  // Actually: sable axis
    const [x6, y6] = ternToXY(100 - pct, 0, pct);
    const [x5b, y5b] = ternToXY(0, 100 - pct, pct);
    svg += `<line x1="${x6}" y1="${y6}" x2="${x5b}" y2="${y5b}" class="grid-line"/>`;
  }

  // Tick labels
  for (let pct = 10; pct <= 90; pct += 10) {
    // Argile (left axis)
    const [ax, ay] = ternToXY(pct, 0, 100 - pct);
    svg += `<text x="${ax - 12}" y="${ay}" class="tick-label" text-anchor="end">${pct}</text>`;
    // Limon (right axis)
    const [lx, ly] = ternToXY(pct, 100 - pct, 0);
    svg += `<text x="${lx + 10}" y="${ly}" class="tick-label" text-anchor="start">${100-pct}</text>`;
    // Sable (bottom axis)
    const [sx, sy] = ternToXY(0, 100 - pct, pct);
    svg += `<text x="${sx}" y="${sy + 14}" class="tick-label">${pct}</text>`;
  }

  // Vertex labels
  const [topX, topY] = ternToXY(100, 0, 0);
  const [blX, blY] = ternToXY(0, 0, 100);
  const [brX, brY] = ternToXY(0, 100, 0);
  svg += `<text x="${topX}" y="${topY - 10}" class="vertex-label">Argile 100%</text>`;
  svg += `<text x="${blX}" y="${blY + 18}" class="vertex-label">Sable 100%</text>`;
  svg += `<text x="${brX}" y="${brY + 18}" class="vertex-label">Limon 100%</text>`;

  // Zone polygons
  for (const [code, verts] of Object.entries(POLYGONS)) {
    if (!verts.length) continue;
    const points = verts.map(v => ternToXY(v[0], v[1], v[2])).map(p => p.join(',')).join(' ');
    svg += `<polygon points="${points}" class="zone" data-code="${code}"/>`;
    // Label at centroid
    const cx = verts.reduce((s, v) => s + v[0], 0) / verts.length;
    const cl = verts.reduce((s, v) => s + v[1], 0) / verts.length;
    const cs = verts.reduce((s, v) => s + v[2], 0) / verts.length;
    const [lx, ly] = ternToXY(cx, cl, cs);
    const tex = DATA.textures.find(t => t.code === code);
    const label = tex ? tex.label.split(' ')[0] : code;
    svg += `<text x="${lx}" y="${ly}" class="zone-label">${code}</text>`;
  }

  // Marker placeholder
  svg += `<circle id="marker" cx="0" cy="0" r="5" class="marker" style="display:none"/>`;

  // Outer triangle border
  const [t1x, t1y] = ternToXY(100, 0, 0);
  const [t2x, t2y] = ternToXY(0, 0, 100);
  const [t3x, t3y] = ternToXY(0, 100, 0);
  svg += `<polygon points="${t1x},${t1y} ${t2x},${t2y} ${t3x},${t3y}" fill="none" stroke="#333" stroke-width="1.5"/>`;

  svg += '</svg>';
  document.getElementById('triangle-svg').innerHTML = svg;

  // Attach events
  document.querySelectorAll('.zone').forEach(z => {
    z.addEventListener('click', () => selectZone(z.dataset.code));
    z.addEventListener('mouseenter', () => z.classList.add('hovered'));
    z.addEventListener('mouseleave', () => z.classList.remove('hovered'));
  });
}

// ── Detail panel ──
function selectZone(code) {
  document.querySelectorAll('.zone').forEach(z => z.classList.remove('selected'));
  document.querySelectorAll(`.zone[data-code="${code}"]`).forEach(z => z.classList.add('selected'));

  const tex = DATA.textures.find(t => t.code === code);
  if (!tex) return;

  const panel = document.getElementById('detail-card');
  let html = `<h2>${tex.label} (${tex.code})</h2>`;

  // Ranges
  html += `<div class="ranges">
    <div class="range-box range-sable"><strong>Sable</strong>${tex.sable_min}–${tex.sable_max}%</div>
    <div class="range-box range-limon"><strong>Limon</strong>${tex.limon_min}–${tex.limon_max}%</div>
    <div class="range-box range-argile"><strong>Argile</strong>${tex.argile_min}–${tex.argile_max}%</div>
  </div>`;

  // Indicators
  html += `<div class="indicators">
    <div class="indicator"><strong>RU (mm/m)</strong>${tex.ru_indicatif || '–'}</div>
    <div class="indicator"><strong>CEC (cmol/kg)</strong>${tex.cec_indicatif || '–'}</div>
  </div>`;

  // Risks
  if (tex.risques && tex.risques.length) {
    html += '<h3>Risques</h3>';
    html += tex.risques.map(r => `<span class="tag tag-risk">${r}</span>`).join('');
  }

  // Diagnostic bio
  if (tex.diagnostic_bio) {
    html += '<h3>Diagnostic biologique</h3>';
    html += `<div class="diag-bio">${tex.diagnostic_bio}</div>`;
  }

  // Tests recommandés
  if (tex.tests_recommandes && tex.tests_recommandes.length) {
    html += '<h3>Tests terrain recommands</h3>';
    html += tex.tests_recommandes.map(tcode => {
      const test = DATA.tests[tcode];
      const title = test ? test.title : tcode;
      const desc = test ? test.description : '';
      return `<span class="tag tag-test" onmouseenter="showTooltip(event,'${desc.replace(/'/g, "\\'")}')" onmouseleave="hideTooltip()">${title}</span>`;
    }).join('');
  }

  // Concept card profil_sol
  const card = findCard(code);
  if (card) {
    html += '<h3>Fiche profil sol</h3>';
    html += `<div class="card-link"><strong>${card.title}</strong><br>${card.description}</div>`;
    if (card.docs_codes && card.docs_codes.length) {
      html += '<div>' + card.docs_codes.map(d => `<span class="tag tag-doc">${d}</span>`).join('') + '</div>';
    }
  }

  // Related terms
  const relatedTerms = findRelatedTerms(code);
  if (relatedTerms.length) {
    html += '<h3>Termes du thsaurus</h3>';
    html += relatedTerms.map(t => `<span class="tag tag-term" title="${(t.definition||'').substring(0,120)}...">${t.fr}</span>`).join('');
  }

  panel.innerHTML = html;
}

function findCard(code) {
  // Map texture code to concept card scope_ref
  const mapping = {
    'SS': 'soil_type:SAND', 'S': 'soil_type:SAND',
    'SL': 'soil_type:SAND', 'SA': 'soil_type:SAND',
    'LS': 'soil_type:LOAM', 'L': 'soil_type:LOAM',
    'LL': 'soil_type:SILT', 'La': 'soil_type:SILT',
    'LA': 'soil_type:CLAY_LOAM', 'AL': 'soil_type:CLAY_LOAM',
    'Al': 'soil_type:CLAY', 'A': 'soil_type:CLAY',
    'AA': 'soil_type:CLAY', 'AS': 'soil_type:CLAY'
  };
  // Try exact scope_ref match first
  const scopeRef = mapping[code];
  let card = DATA.cards.find(c => c.scope_ref === scopeRef);
  if (card) return card;
  // Fallback: match by keywords in title
  const keywords = {
    'SS': 'sableux', 'S': 'sableux', 'SL': 'sableux', 'SA': 'sableux',
    'LS': 'limoneux', 'LL': 'limoneux', 'La': 'limoneux', 'L': 'franc',
    'LA': 'argileux', 'AL': 'argileux', 'Al': 'argileux',
    'A': 'argileux', 'AA': 'argileux', 'AS': 'argileux'
  };
  const kw = keywords[code];
  if (kw) card = DATA.cards.find(c => c.title.toLowerCase().includes(kw));
  return card || null;
}

function findRelatedTerms(code) {
  const tex = DATA.textures.find(t => t.code === code);
  if (!tex) return [];
  const label = tex.label.toLowerCase();
  return DATA.terms.filter(t => {
    const def = (t.definition || '').toLowerCase();
    if (label.includes('sable') && def.includes('sable')) return true;
    if (label.includes('argile') && def.includes('argile')) return true;
    if (label.includes('limon') && def.includes('limon')) return true;
    if (def.includes('texture')) return true;
    return false;
  });
}

// ── Input mode ──
function locatePoint() {
  const argile = parseFloat(document.getElementById('in-argile').value) || 0;
  const limon = parseFloat(document.getElementById('in-limon').value) || 0;
  const sable = parseFloat(document.getElementById('in-sable').value) || 0;
  const total = argile + limon + sable;
  const result = document.getElementById('input-result');

  if (Math.abs(total - 100) > 1) {
    result.textContent = `La somme doit faire 100% (actuellement ${total.toFixed(1)}%)`;
    result.style.color = '#EF4444';
    return;
  }

  result.style.color = '#3B82F6';
  const [x, y] = ternToXY(argile, limon, sable);
  const marker = document.getElementById('marker');
  marker.setAttribute('cx', x);
  marker.setAttribute('cy', y);
  marker.style.display = 'block';

  // Find matching zone
  const matched = identifyTexture(argile, limon, sable);
  if (matched) {
    result.textContent = `Classe : ${matched.label} (${matched.code})`;
    selectZone(matched.code);
  } else {
    result.textContent = 'Classe non identifie pour ces valeurs';
  }
}

function identifyTexture(argile, limon, sable) {
  // Use ref_textures ranges for classification
  for (const tex of DATA.textures) {
    if (argile >= tex.argile_min && argile <= tex.argile_max &&
        limon >= tex.limon_min && limon <= tex.limon_max &&
        sable >= tex.sable_min && sable <= tex.sable_max) {
      return tex;
    }
  }
  return null;
}

// ── Tooltips ──
function showTooltip(e, text) {
  const tip = document.getElementById('test-tooltip');
  tip.textContent = text;
  tip.style.display = 'block';
  tip.style.left = (e.pageX + 10) + 'px';
  tip.style.top = (e.pageY - 30) + 'px';
}
function hideTooltip() {
  document.getElementById('test-tooltip').style.display = 'none';
}

// ── Init ──
buildTriangle();
</script>
